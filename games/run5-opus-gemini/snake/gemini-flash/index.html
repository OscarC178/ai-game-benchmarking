<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Vintage Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #111111;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        const INITIAL_TICK_RATE = 8;
        const MAX_TICK_RATE = 15;
        const TICK_RATE_INCREMENT = 0.5;

        // States
        const STATE_IDLE = 'IDLE';
        const STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED';
        const STATE_GAME_OVER = 'GAME_OVER';

        let currentState = STATE_IDLE;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let tickRate = INITIAL_TICK_RATE;
        let lastTickTime = 0;
        let tickAccumulator = 0;

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: -1, y: -1 };

        function resetGame() {
            score = 0;
            tickRate = INITIAL_TICK_RATE;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            spawnFood();
            currentState = STATE_PLAYING;
        }

        function spawnFood() {
            let emptyCells = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    let isSnake = false;
                    for (let segment of snake) {
                        if (segment.x === x && segment.y === y) {
                            isSnake = true;
                            break;
                        }
                    }
                    if (!isSnake) emptyCells.push({ x, y });
                }
            }
            if (emptyCells.length === 0) {
                // Win?
                currentState = STATE_GAME_OVER;
                return;
            }
            food = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) {
                    resetGame();
                }
            }
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }

            // Direction controls (Buffered: only one change per tick processed in tick logic)
            if (currentState === STATE_PLAYING) {
                if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && direction.y === 0) nextDirection = { x: 0, y: -1 };
                if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && direction.y === 0) nextDirection = { x: 0, y: 1 };
                if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && direction.x === 0) nextDirection = { x: -1, y: 0 };
                if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && direction.x === 0) nextDirection = { x: 1, y: 0 };
            }
        });

        function tick() {
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall Collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // Self Collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score / 10 > highScore / 10) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                tickRate = Math.min(tickRate + TICK_RATE_INCREMENT, MAX_TICK_RATE);
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            currentState = STATE_GAME_OVER;
        }

        function drawGrid() {
            ctx.strokeStyle = '#1A1A1A';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, 600);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(600, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function draw() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#4CAF50';
                ctx.font = '56px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('SNAKE', 300, 240);
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '20px monospace';
                ctx.fillText('Press Enter to Start', 300, 320);
                return;
            }

            drawGrid();

            // Food
            ctx.fillStyle = '#F44336';
            ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);

            // Snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4CAF50' : '#388E3C';
                ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            });

            // HUD
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'right';
            ctx.fillText(`Best: ${highScore}`, 590, 24);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', 300, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 300, 260);
                ctx.font = '24px monospace';
                ctx.fillText(`Score: ${score}`, 300, 310);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#AAAAAA';
                ctx.fillText('Press Enter to Restart', 300, 360);
            }
        }

        function gameLoop(timestamp) {
            if (!lastTickTime) lastTickTime = timestamp;
            const deltaTime = (timestamp - lastTickTime) / 1000;
            lastTickTime = timestamp;

            if (currentState === STATE_PLAYING) {
                tickAccumulator += deltaTime;
                const secondsPerTick = 1 / tickRate;
                while (tickAccumulator >= secondsPerTick) {
                    tick();
                    tickAccumulator -= secondsPerTick;
                }
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
