<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Vintage Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 80;
        const PADDLE_SPEED = 400;
        const CPU_SPEED_CAP = 300;
        const CPU_EASING = 0.08;
        const BALL_START_SPEED = 350;
        const BALL_SPEED_INC = 25;
        const BALL_SPEED_MAX = 600;

        // Game States
        const STATE_IDLE = 'IDLE';
        const STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED';
        const STATE_GAME_OVER = 'GAME_OVER';

        let currentState = STATE_IDLE;
        let lastTime = 0;
        let scorePlayer = 0;
        let scoreCpu = 0;
        let highScore = localStorage.getItem('pongHighScore') || 0;
        let resetTimer = 0;

        const keys = {};

        const player = { x: 30, y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2, width: PADDLE_WIDTH, height: PADDLE_HEIGHT };
        const cpu = { x: CANVAS_WIDTH - 30 - PADDLE_WIDTH, y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2, width: PADDLE_WIDTH, height: PADDLE_HEIGHT };
        const ball = { x: CANVAS_WIDTH / 2 - 6, y: CANVAS_HEIGHT / 2 - 6, width: 12, height: 12, vx: 0, vy: 0, speed: BALL_START_SPEED };

        function drawCenterLine() {
            ctx.strokeStyle = '#444444';
            ctx.lineWidth = 4;
            ctx.setLineDash([15, 10]);
            ctx.beginPath();
            ctx.moveTo(CANVAS_WIDTH / 2, 0);
            ctx.lineTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function resetBall(scoredOnPlayer) {
            ball.x = CANVAS_WIDTH / 2 - 6;
            ball.y = CANVAS_HEIGHT / 2 - 6;
            ball.vx = 0;
            ball.vy = 0;
            ball.speed = BALL_START_SPEED;
            resetTimer = 1.0; 

            setTimeout(() => {
                if (currentState !== STATE_PLAYING) return;
                const direction = scoredOnPlayer ? -1 : 1;
                const angle = (Math.random() * 60 - 30) * Math.PI / 180;
                ball.vx = direction * ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
                resetTimer = 0;
            }, 1000);
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') {
                if (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) {
                    scorePlayer = 0; scoreCpu = 0;
                    currentState = STATE_PLAYING;
                    resetBall(Math.random() > 0.5);
                }
            }
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function update(deltaTime) {
            if (currentState !== STATE_PLAYING) return;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= PADDLE_SPEED * deltaTime;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += PADDLE_SPEED * deltaTime;
            player.y = Math.max(0, Math.min(CANVAS_HEIGHT - player.height, player.y));

            const ballCenterY = ball.y + ball.height / 2;
            const cpuCenterY = cpu.y + cpu.height / 2;
            let cpuMove = (ballCenterY - cpuCenterY) * CPU_EASING;
            const maxMove = CPU_SPEED_CAP * deltaTime;
            if (Math.abs(cpuMove) > maxMove) cpuMove = Math.sign(cpuMove) * maxMove;
            cpu.y += cpuMove;
            cpu.y = Math.max(0, Math.min(CANVAS_HEIGHT - cpu.height, cpu.y));

            if (resetTimer > 0) { resetTimer -= deltaTime; return; }

            ball.x += ball.vx * deltaTime;
            ball.y += ball.vy * deltaTime;

            if (ball.y <= 0 || ball.y + ball.height >= CANVAS_HEIGHT) {
                ball.vy *= -1;
                ball.y = ball.y <= 0 ? 0 : CANVAS_HEIGHT - ball.height;
            }

            if (ball.vx < 0 && ball.x < player.x + player.width && ball.x + ball.width > player.x && ball.y < player.y + player.height && ball.y + ball.height > player.y) {
                ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_MAX);
                const relY = (player.y + player.height / 2) - (ball.y + ball.height / 2);
                const angle = (relY / (player.height / 2)) * (Math.PI / 3);
                ball.vx = ball.speed * Math.cos(angle);
                ball.vy = -ball.speed * Math.sin(angle);
                ball.x = player.x + player.width;
            } else if (ball.vx > 0 && ball.x < cpu.x + cpu.width && ball.x + ball.width > cpu.x && ball.y < cpu.y + cpu.height && ball.y + ball.height > cpu.y) {
                ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_MAX);
                const relY = (cpu.y + cpu.height / 2) - (ball.y + ball.height / 2);
                const angle = (relY / (cpu.height / 2)) * (Math.PI / 3);
                ball.vx = -ball.speed * Math.cos(angle);
                ball.vy = -ball.speed * Math.sin(angle);
                ball.x = cpu.x - ball.width;
            }

            if (ball.x < 0) {
                scoreCpu++;
                if (scoreCpu >= 7) currentState = STATE_GAME_OVER;
                else resetBall(true);
            } else if (ball.x > CANVAS_WIDTH) {
                scorePlayer++;
                if (scorePlayer > highScore) { highScore = scorePlayer; localStorage.setItem('pongHighScore', highScore); }
                if (scorePlayer >= 7) currentState = STATE_GAME_OVER;
                else resetBall(false);
            }
        }

        function draw() {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                ctx.font = '64px monospace'; ctx.fillText('PONG', 400, 200);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Start', 400, 350);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                ctx.font = '48px monospace'; ctx.fillText(scorePlayer >= 7 ? 'YOU WIN' : 'GAME OVER', 400, 250);
                ctx.font = '24px monospace'; ctx.fillText(`${scorePlayer} - ${scoreCpu}`, 400, 320);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Restart', 400, 400);
            } else {
                drawCenterLine();
                ctx.fillStyle = '#888888'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; 
                ctx.fillText(`HIGH SCORE: ${highScore}`, 400, 20);
                ctx.fillStyle = '#FFFFFF'; ctx.font = '48px monospace';
                ctx.fillText(scorePlayer, 300, 70); ctx.fillText(scoreCpu, 500, 70);
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);
                ctx.fillRect(ball.x, ball.y, ball.width, ball.height);
                if (currentState === STATE_PAUSED) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, 800, 600);
                    ctx.fillStyle = '#FFFFFF'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 400, 300);
                }
            }
        }

        function gameLoop(timestamp) {
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(deltaTime, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
