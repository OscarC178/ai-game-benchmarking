<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #000000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'middle';

        // Game Objects
        const player = { x: 30, y: 260, width: 12, height: 80, speed: 400 };
        const cpu = { x: 758, y: 260, width: 12, height: 80, speed: 300, easing: 0.08 };
        const ball = { x: 394, y: 294, size: 12, speed: 350, vx: 0, vy: 0 };

        function resetBall(serveLeft) {
            ball.x = 394;
            ball.y = 294;
            ball.speed = 350;
            const angle = (Math.random() * 60 - 30) * Math.PI / 180;
            const dirX = serveLeft !== undefined ? (serveLeft ? -1 : 1) : (Math.random() < 0.5 ? -1 : 1);
            ball.vx = Math.cos(angle) * ball.speed * dirX;
            ball.vy = Math.sin(angle) * ball.speed * (Math.random() < 0.5 ? -1 : 1);
        }

        // Game State Machine
        const STATE = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
        let currentState = STATE.IDLE;
        
        let delayedLaunchTimer = 0;
        let scorePlayer = 0;
        let scoreCpu = 0;

        // Input tracking
        const keys = { ArrowUp: false, ArrowDown: false, w: false, s: false, W: false, S: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
            } else if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    currentState = STATE.PLAYING;
                    scorePlayer = 0;
                    scoreCpu = 0;
                    resetBall();
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING) {
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = STATE.PLAYING;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.height + rect1.y > rect2.y;
        }

        let lastTime = 0;

        let highScore = parseInt(localStorage.getItem('pongHighScore')) || 0;
        function updateHighScore() {
            if (scorePlayer > highScore) {
                highScore = scorePlayer;
                localStorage.setItem('pongHighScore', highScore);
            }
        }

        function update(dt) {
            if (currentState === STATE.PLAYING) {
                // Delay timer
                if (delayedLaunchTimer > 0) {
                    delayedLaunchTimer -= dt;
                    if (delayedLaunchTimer <= 0) {
                        delayedLaunchTimer = 0;
                    } else {
                        return; // pause simulation during delay
                    }
                }

                // Player Movement
                let dy = 0;
                if (keys.ArrowUp || keys.w || keys.W) dy -= 1;
                if (keys.ArrowDown || keys.s || keys.S) dy += 1;
                player.y += dy * player.speed * dt;
                player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

                // CPU Movement
                const targetY = ball.y + ball.size / 2 - cpu.height / 2;
                let moveY = (targetY - cpu.y) * cpu.easing;
                const maxMove = cpu.speed * dt;
                if (Math.abs(moveY) > maxMove) moveY = maxMove * Math.sign(moveY);
                cpu.y += moveY;
                cpu.y = Math.max(0, Math.min(canvas.height - cpu.height, cpu.y));

                // Ball Movement
                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Wall Collisions
                if (ball.y <= 0) {
                    ball.y = 0;
                    ball.vy *= -1;
                } else if (ball.y + ball.size >= canvas.height) {
                    ball.y = canvas.height - ball.size;
                    ball.vy *= -1;
                }

                // Paddle Collisions
                const ballRect = {x: ball.x, y: ball.y, width: ball.size, height: ball.size};
                
                if (ball.vx < 0 && checkCollision(ballRect, player)) {
                    ball.x = player.x + player.width;
                    const offsety = (ball.y + ball.size / 2) - (player.y + player.height / 2);
                    const normOff = offsety / (player.height / 2);
                    const angle = normOff * (60 * Math.PI / 180);
                    ball.speed = Math.min(600, ball.speed + 25);
                    ball.vx = ball.speed * Math.cos(angle);
                    ball.vy = ball.speed * Math.sin(angle);
                } else if (ball.vx > 0 && checkCollision(ballRect, cpu)) {
                    ball.x = cpu.x - ball.size;
                    const offsety = (ball.y + ball.size / 2) - (cpu.y + cpu.height / 2);
                    const normOff = offsety / (cpu.height / 2);
                    const angle = normOff * (60 * Math.PI / 180);
                    ball.speed = Math.min(600, ball.speed + 25);
                    ball.vx = -ball.speed * Math.cos(angle);
                    ball.vy = ball.speed * Math.sin(angle);
                }

                // Game Flow & Mechanics 
                if (ball.x + ball.size < 0) {
                    scoreCpu++;
                    if (scoreCpu >= 7) {
                        currentState = STATE.GAME_OVER;
                        updateHighScore();
                    } else {
                        resetBall(true); // scored on player, point to cpu, serve to player
                        delayedLaunchTimer = 1.0;
                    }
                } else if (ball.x > canvas.width) {
                    scorePlayer++;
                    if (scorePlayer >= 7) {
                        currentState = STATE.GAME_OVER;
                        updateHighScore();
                    } else {
                        resetBall(false); // scored on cpu, point to player, serve to cpu
                        delayedLaunchTimer = 1.0;
                    }
                }
            }
        }

        function drawDashedLine() {
            ctx.beginPath();
            ctx.setLineDash([15, 10]);
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#444444';
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash for other drawings
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentState === STATE.PLAYING || currentState === STATE.GAME_OVER || currentState === STATE.PAUSED) {
                drawDashedLine();
                ctx.fillStyle = '#FFFFFF';
                // Paddles
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);
                // Ball
                ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

                // Scores
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(scorePlayer, 300, 50);
                ctx.fillText(scoreCpu, 500, 50);

                // High score
                ctx.font = '12px monospace';
                ctx.fillStyle = '#888888';
                ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width / 2, 16);
            }

            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '64px monospace';
                ctx.fillText('PONG', canvas.width / 2, 200);
                
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '20px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 350);
            } else if (currentState === STATE.PAUSED) {
                // Dimmer
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; // Semi-transparent black 000000CC is approx .8
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '36px monospace';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '48px monospace';
                
                const message = scorePlayer >= 7 ? 'YOU WIN' : 'GAME OVER';
                ctx.fillText(message, canvas.width / 2, 200);

                ctx.fillStyle = '#AAAAAA';
                ctx.font = '18px monospace';
                ctx.fillText('Press Enter to Restart', canvas.width / 2, 360);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
