  RUN:            run5-opus-gemini
  BUILDER:        google/gemini-3-flash-preview
  PLANNER:        anthropic/claude-opus-4-6

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800, HEIGHT = 600;
        const SHIP_SIZE = 30, SHIP_ROT_SPEED = 270;
        const SHIP_THRUST = 200, SHIP_FRICTION = 0.99, MAX_SPEED = 350;
        const BULLET_SPEED = 500, BULLET_LIFE = 0.8, MAX_BULLETS = 4;
        const INVULNERABILITY_TIME = 2, RESPAWN_DELAY = 2, RESPAWN_SAFE_DIST = 100;
        const UFO_SIZE = 32, UFO_SPEED = 120, UFO_FIRE_RATE = 1.5;

        // State machine
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        // Variables
        let score = 0, lives = 3, wave = 1, highScore = localStorage.getItem('asteroidsHighScore') || 0;
        let lastTime = 0, isThrusting = false;
        let ship = { x: 400, y: 300, vx: 0, vy: 0, rot: -Math.PI/2, active: true, invuln: 0, deadTime: 0 };
        let asteroids = [], bullets = [], ufo = null, ufoBullets = [], ufoSpawnTimer = 25;

        function createAsteroid(x, y, r, speedMult = 1) {
            const vertices = Math.floor(Math.random() * 4) + 7;
            const shape = [];
            for (let i = 0; i < vertices; i++) {
                const angle = (i / vertices) * Math.PI * 2;
                const dist = r * (0.7 + Math.random() * 0.6);
                shape.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
            }
            const angle = Math.random() * Math.PI * 2;
            const speed = (r === 40 ? 50 + Math.random() * 30 : r === 20 ? 80 + Math.random() * 40 : 120 + Math.random() * 60) * speedMult;
            return { x, y, r, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, shape };
        }

        function initWave() {
            asteroids = [];
            const count = 4 + wave - 1;
            for (let i = 0; i < count; i++) {
                let x, y;
                do { x = Math.random() * WIDTH; y = Math.random() * HEIGHT; }
                while (Math.hypot(x - ship.x, y - ship.y) < 150);
                asteroids.push(createAsteroid(x, y, 40));
            }
        }

        function resetGame() {
            score = 0; lives = 3; wave = 1;
            ship = { x: 400, y: 300, vx: 0, vy: 0, rot: -Math.PI/2, active: true, invuln: INVULNERABILITY_TIME, deadTime: 0 };
            bullets = []; ufo = null; ufoBullets = [];
            ufoSpawnTimer = 20 + Math.random() * 10;
            initWave();
            currentState = STATE_PLAYING;
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.code === 'KeyP') currentState = currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState);
            if (currentState === STATE_PLAYING && e.code === 'Space' && ship.active && bullets.length < MAX_BULLETS) {
                bullets.push({ 
                    x: ship.x + Math.cos(ship.rot) * 18, 
                    y: ship.y + Math.sin(ship.rot) * 18, 
                    vx: Math.cos(ship.rot) * BULLET_SPEED, 
                    vy: Math.sin(ship.rot) * BULLET_SPEED, 
                    life: BULLET_LIFE 
                });
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function wrap(obj) {
            if (obj.x < 0) obj.x += WIDTH; else if (obj.x > WIDTH) obj.x -= WIDTH;
            if (obj.y < 0) obj.y += HEIGHT; else if (obj.y > HEIGHT) obj.y -= HEIGHT;
        }

        function checkCollision(obj1, obj2) {
            return Math.hypot(obj1.x - obj2.x, obj1.y - obj2.y) < (obj1.r || 2) + (obj2.r || 2);
        }

        function update(dt) {
            if (currentState !== STATE_PLAYING) return;

            // Ship movement
            if (ship.active) {
                if (keys['ArrowLeft'] || keys['KeyA']) ship.rot -= (SHIP_ROT_SPEED * Math.PI/180) * dt;
                if (keys['ArrowRight'] || keys['KeyD']) ship.rot += (SHIP_ROT_SPEED * Math.PI/180) * dt;
                if (keys['ArrowUp'] || keys['KeyW']) {
                    ship.vx += Math.cos(ship.rot) * SHIP_THRUST * dt;
                    ship.vy += Math.sin(ship.rot) * SHIP_THRUST * dt;
                    isThrusting = true;
                } else isThrusting = false;

                ship.vx *= SHIP_FRICTION; ship.vy *= SHIP_FRICTION;
                const speed = Math.hypot(ship.vx, ship.vy);
                if (speed > MAX_SPEED) { ship.vx *= MAX_SPEED / speed; ship.vy *= MAX_SPEED / speed; }
                ship.x += ship.vx * dt; ship.y += ship.vy * dt;
                wrap(ship);
                if (ship.invuln > 0) ship.invuln -= dt;
            } else {
                ship.deadTime += dt;
                if (ship.deadTime >= RESPAWN_DELAY) {
                    if (asteroids.every(a => Math.hypot(a.x - 400, a.y - 300) > RESPAWN_SAFE_DIST)) {
                        ship.active = true; ship.x = 400; ship.y = 300; ship.vx = 0; ship.vy = 0;
                        ship.rot = -Math.PI/2; ship.invuln = INVULNERABILITY_TIME; ship.deadTime = 0;
                    }
                }
            }

            // Asteroids
            asteroids.forEach(a => { a.x += a.vx * dt; a.y += a.vy * dt; wrap(a); });

            // Bullets
            bullets.forEach((b, i) => {
                b.x += b.vx * dt; b.y += b.vy * dt; wrap(b); b.life -= dt;
                if (b.life <= 0) bullets.splice(i, 1);
            });

            // UFO
            ufoSpawnTimer -= dt;
            if (ufoSpawnTimer <= 0 && !ufo) {
                ufo = { x: -32, y: Math.random() * (HEIGHT - 100) + 50, vx: UFO_SPEED, vy: 0, r: 16, fire: UFO_FIRE_RATE };
            }
            if (ufo) {
                ufo.x += ufo.vx * dt; wrap(ufo);
                ufo.fire -= dt;
                if (ufo.fire <= 0 && ship.active) {
                    const angle = Math.atan2(ship.y - ufo.y, ship.x - ufo.x);
                    ufoBullets.push({ x: ufo.x, y: ufo.y, vx: Math.cos(angle) * 350, vy: Math.sin(angle) * 350, life: 1.5 });
                    ufo.fire = UFO_FIRE_RATE;
                }
                if (ufo.x > WIDTH - 1) { ufo = null; ufoSpawnTimer = 20 + Math.random() * 10; }
            }
            ufoBullets.forEach((b, i) => {
                b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
                if (b.life <= 0) ufoBullets.splice(i, 1);
            });

            // Collision detection
            if (ship.active && ship.invuln <= 0) {
                for (let a of asteroids) if (checkCollision(ship, a)) killPlayer();
                for (let b of ufoBullets) if (checkCollision(ship, b)) killPlayer();
            }

            bullets.forEach((b, bi) => {
                asteroids.forEach((a, ai) => {
                    if (checkCollision(b, a)) {
                        bullets.splice(bi, 1);
                        splitAsteroid(ai, b);
                        return;
                    }
                });
                if (ufo && checkCollision(b, ufo)) {
                    bullets.splice(bi, 1); score += 200; ufo = null; ufoSpawnTimer = 20 + Math.random() * 10;
                    if (score >= 10000 && score - 200 < 10000) lives++;
                }
            });

            if (asteroids.length === 0) { wave++; initWave(); }
        }

        function killPlayer() {
            ship.active = false; lives--; 
            if (lives <= 0) currentState = STATE_GAME_OVER;
        }

        function splitAsteroid(i, bullet) {
            const a = asteroids[i];
            score += a.r === 40 ? 20 : a.r === 20 ? 50 : 100;
            if (score >= 10000 && score - (a.r===40?20:a.r===20?50:100) < 10000) lives++;
            if (a.r > 10) {
                const angle1 = Math.atan2(bullet.vy, bullet.vx) + Math.PI/6;
                const angle2 = Math.atan2(bullet.vy, bullet.vx) - Math.PI/6;
                const r2 = a.r / 2;
                asteroids.push(createAsteroid(a.x, a.y, r2, 1.2));
                asteroids.push(createAsteroid(a.x, a.y, r2, 1.2));
            }
            asteroids.splice(i, 1);
        }

        function drawShip(x, y, rot, size, invuln) {
            if (invuln > 0 && Math.floor(Date.now() / 125) % 2 === 0) return;
            ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
            ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
            ctx.beginPath(); ctx.moveTo(SHIP_SIZE/2 + 3, 0); ctx.lineTo(-SHIP_SIZE/2, -SHIP_SIZE/2.5); ctx.lineTo(-SHIP_SIZE/2, SHIP_SIZE/2.5); ctx.closePath(); ctx.stroke();
            if (isThrusting && Math.random() > 0.4) {
                ctx.strokeStyle = '#FF8800'; ctx.beginPath(); ctx.moveTo(-SHIP_SIZE/2, -SHIP_SIZE/5); ctx.lineTo(-SHIP_SIZE/2 - 10, 0); ctx.lineTo(-SHIP_SIZE/2, SHIP_SIZE/5); ctx.stroke();
            }
            ctx.restore();
        }

        function drawAsteroid(a) {
            ctx.strokeStyle = '#AAA'; ctx.lineWidth = 1.5;
            ctx.save(); ctx.translate(a.x, a.y);
            ctx.beginPath(); ctx.moveTo(a.shape[0].x, a.shape[0].y);
            a.shape.forEach(v => ctx.lineTo(v.x, v.y)); ctx.closePath(); ctx.stroke();
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            if (currentState === STATE_IDLE) {
                asteroids.forEach(drawAsteroid);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '52px monospace'; ctx.fillText('ASTEROIDS', 400, 220);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Start', 400, 360);
            } else {
                if (ship.active) drawShip(ship.x, ship.y, ship.rot, SHIP_SIZE, ship.invuln);
                asteroids.forEach(drawAsteroid);
                ctx.fillStyle = '#FFF'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });
                if (ufo) {
                    ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y, 16, 6, 0, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y - 4, 10, 4, 0, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.fillStyle = '#FF4444'; ufoBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });

                // HUD
                ctx.fillStyle = '#FFF'; ctx.font = '18px monospace'; ctx.textAlign = 'left'; ctx.fillText(score, 10, 30);
                for (let i = 0; i < lives; i++) {
                    ctx.save(); ctx.translate(20 + i * 20, 50); ctx.rotate(-Math.PI/2);
                    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-4,-4); ctx.lineTo(-4,4); ctx.closePath(); ctx.stroke(); ctx.restore();
                }
                ctx.textAlign = 'right'; ctx.font = '16px monospace'; ctx.fillText(`BEST: ${highScore}`, 790, 30);

                if (currentState === STATE_PAUSED) {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                    ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 400, 300);
                } else if (currentState === STATE_GAME_OVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                    ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '40px monospace'; ctx.fillText('GAME OVER', 400, 260);
                    ctx.font = '20px monospace'; ctx.fillText(`Final: ${score}`, 400, 310);
                    ctx.font = '18px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 400, 360);
                }
            }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
