<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Vintage Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 14;
        const PADDLE_SPEED = 500;
        const BALL_RADIUS = 8;
        const INITIAL_BALL_SPEED = 350;
        const BALL_SPEED_INCREMENT = 20;
        const BALL_SPEED_MAX = 500;
        const BRICK_ROWS = 6;
        const BRICK_COLS = 10;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 20;
        const BRICK_GAP_H = 6;
        const BRICK_GAP_V = 4;
        const BRICK_OFFSET_X = 19;
        const BRICK_OFFSET_Y = 50;

        const ROW_COLORS = ['#FF0000', '#FF6600', '#FFCC00', '#00CC00', '#0088FF', '#8800FF'];
        const ROW_POINTS = [7, 5, 4, 3, 2, 1];

        // States
        const STATE_IDLE = 'IDLE';
        const STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED';
        const STATE_GAME_OVER = 'GAME_OVER';

        let currentState = STATE_IDLE;
        let isBallAttached = true;
        let score = 0;
        let lives = 3;
        let level = 1;
        let highScore = localStorage.getItem('breakoutHighScore') || 0;
        let lastTime = 0;

        const paddle = { x: 350, y: 560, w: PADDLE_WIDTH, h: PADDLE_HEIGHT };
        const ball = { x: 400, y: 550, r: BALL_RADIUS, vx: 0, vy: 0, speed: INITIAL_BALL_SPEED };
        let bricks = [];

        function initBricks() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: BRICK_OFFSET_X + c * (BRICK_WIDTH + BRICK_GAP_H),
                        y: BRICK_OFFSET_Y + r * (BRICK_HEIGHT + BRICK_GAP_V),
                        w: BRICK_WIDTH, h: BRICK_HEIGHT,
                        color: ROW_COLORS[r],
                        points: ROW_POINTS[r],
                        alive: true
                    });
                }
            }
        }

        function resetLevel() {
            initBricks();
            isBallAttached = true;
            ball.speed = Math.min(INITIAL_BALL_SPEED + (level - 1) * BALL_SPEED_INCREMENT, BALL_SPEED_MAX);
        }

        function launchBall() {
            if (!isBallAttached) return;
            isBallAttached = false;
            const angle = (225 + Math.random() * 90) * Math.PI / 180;
            ball.vx = ball.speed * Math.cos(angle);
            ball.vy = ball.speed * Math.sin(angle);
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') {
                if (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) {
                    score = 0; lives = 3; level = 1;
                    resetLevel();
                    currentState = STATE_PLAYING;
                }
            }
            if (e.key === ' ') {
                if (currentState === STATE_PLAYING && isBallAttached) launchBall();
            }
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.w / 2;
            clampPaddle();
        });

        function clampPaddle() {
            paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - paddle.w, paddle.x));
        }

        function update(deltaTime) {
            if (currentState !== STATE_PLAYING) return;

            // Keyboard Movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x -= PADDLE_SPEED * deltaTime;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += PADDLE_SPEED * deltaTime;
            clampPaddle();

            if (isBallAttached) {
                ball.x = paddle.x + paddle.w / 2;
                ball.y = paddle.y - ball.r;
                return;
            }

            ball.x += ball.vx * deltaTime;
            ball.y += ball.vy * deltaTime;

            // Wall Collisions
            if (ball.x - ball.r <= 0 || ball.x + ball.r >= CANVAS_WIDTH) {
                ball.vx *= -1;
                ball.x = ball.x - ball.r <= 0 ? ball.r : CANVAS_WIDTH - ball.r;
            }
            if (ball.y - ball.r <= 0) {
                ball.vy *= -1;
                ball.y = ball.r;
            }

            // Paddle Collision (Circle-Rect)
            if (ball.vy > 0 && ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                const angle = offset * 60 * Math.PI / 180;
                ball.vx = ball.speed * Math.sin(angle);
                ball.vy = -ball.speed * Math.cos(angle);
                ball.y = paddle.y - ball.r;
            }

            // Brick Collision
            let hitFound = false;
            for (let brick of bricks) {
                if (!brick.alive) continue;
                if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w &&
                    ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {
                    
                    brick.alive = false;
                    score += brick.points;
                    if (score > highScore) { highScore = score; localStorage.setItem('breakoutHighScore', highScore); }

                    // Determine collision face
                    const overlapLeft = (ball.x + ball.r) - brick.x;
                    const overlapRight = (brick.x + brick.w) - (ball.x - ball.r);
                    const overlapTop = (ball.y + ball.r) - brick.y;
                    const overlapBottom = (brick.y + brick.h) - (ball.y - ball.r);

                    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                    if (minOverlap === overlapLeft || minOverlap === overlapRight) ball.vx *= -1;
                    else ball.vy *= -1;

                    hitFound = true;
                    break; 
                }
            }

            // Level Clear
            if (bricks.every(b => !b.alive)) {
                level++;
                resetLevel();
            }

            // Lose Life
            if (ball.y - ball.r > CANVAS_HEIGHT) {
                lives--;
                if (lives <= 0) currentState = STATE_GAME_OVER;
                else isBallAttached = true;
            }
        }

        function draw() {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                ctx.font = '56px monospace'; ctx.fillText('BREAKOUT', 400, 250);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Start', 400, 330);
                return;
            }

            // Draw Paddle
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            // Draw Ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            // Draw Bricks
            bricks.forEach(brick => {
                if (brick.alive) {
                    ctx.fillStyle = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
                }
            });

            // HUD
            ctx.fillStyle = '#FFFFFF'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#AAAAAA'; ctx.fillText(`Level: ${level}`, 400, 24);
            ctx.textAlign = 'right';
            ctx.fillStyle = '#FF0000'; ctx.font = '18px monospace';
            ctx.fillText('♥'.repeat(lives), 790, 24);
            ctx.fillStyle = '#FFFFFF'; ctx.font = '12px monospace';
            ctx.fillText(`BEST: ${highScore}`, 790, 45);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFFFFF'; ctx.font = '36px monospace'; ctx.textAlign = 'center';
                ctx.fillText('PAUSED', 400, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFFFFF'; ctx.font = '40px monospace'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 400, 260);
                ctx.font = '20px monospace'; ctx.fillText(`Final Score: ${score}`, 400, 310);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Restart', 400, 360);
            }
        }

        function gameLoop(timestamp) {
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(deltaTime, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
