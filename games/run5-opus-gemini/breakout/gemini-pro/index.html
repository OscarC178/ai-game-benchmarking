<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
            color: #FFFFFF;
        }
        canvas {
            background-color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Machine
        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3,
            BALL_ATTACHED: 4
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.BALL_ATTACHED;

        // Game Entities
        const paddle = {
            width: 100,
            height: 14,
            x: 350,
            y: 560,
            speed: 500,
            color: '#FFFFFF'
        };

        const ball = {
            radius: 8,
            x: 400,
            y: 550,
            speed: 350,
            vx: 0,
            vy: 0,
            color: '#FFFFFF'
        };

        const bricksConfig = {
            cols: 10,
            rows: 6,
            width: 70,
            height: 20,
            paddingX: 6,
            paddingY: 4,
            offsetX: 19,
            offsetY: 50,
            colors: ['#FF0000', '#FF6600', '#FFCC00', '#00CC00', '#0088FF', '#8800FF']
        };

        let bricks = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let highScore = parseInt(localStorage.getItem('breakoutHighScore')) || 0;
        let bricksRemaining = 0;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('breakoutHighScore', highScore);
            }
        }
        
        function getRowPoints(r) {
            // Row colors top→bottom: red 7, orange 5, yellow 4, green 3, blue 2, purple 1
            const points = [7, 5, 4, 3, 2, 1];
            return points[r];
        }

        function createBricks() {
            bricks = [];
            bricksRemaining = bricksConfig.rows * bricksConfig.cols;
            for (let r = 0; r < bricksConfig.rows; r++) {
                bricks[r] = [];
                for (let c = 0; c < bricksConfig.cols; c++) {
                    const bx = bricksConfig.offsetX + c * (bricksConfig.width + bricksConfig.paddingX);
                    const by = bricksConfig.offsetY + r * (bricksConfig.height + bricksConfig.paddingY);
                    bricks[r][c] = {
                        x: bx,
                        y: by,
                        status: 1,
                        color: bricksConfig.colors[r]
                    };
                }
            }
        }

        function resetBall() {
            ball.speed = Math.min(500, 350 + (level - 1) * 20); // Cap at 500px/s
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius;
            ball.vx = 0;
            ball.vy = 0;
            currentState = STATE.BALL_ATTACHED;
        }

        function launchBall() {
            if (currentState === STATE.BALL_ATTACHED) {
                // Random angle between 225° and 315° (-135° to -45° relative to horizontal right = 0)
                // In canvas, top is negative y. So upwards is between 180+45 to 360-45
                const angleDeg = 225 + Math.random() * 90; // 225 to 315
                const angleRad = angleDeg * Math.PI / 180;
                ball.vx = ball.speed * Math.cos(angleRad);
                ball.vy = ball.speed * Math.sin(angleRad); // will be negative
                currentState = STATE.PLAYING;
            }
        }

        // Input Tracking
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            A: false,
            d: false,
            D: false,
            ' ': false
        };

        let mouseX = canvas.width / 2;

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
            } else if (e.key === ' ') {
                if (currentState === STATE.BALL_ATTACHED) {
                    launchBall();
                }
            } else if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    score = 0;
                    lives = 3;
                    level = 1;
                    createBricks();
                    resetBall();
                    currentState = STATE.BALL_ATTACHED;
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING || currentState === STATE.BALL_ATTACHED) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        let lastTime = 0;

        function update(dt) {
            if (currentState === STATE.PLAYING || currentState === STATE.BALL_ATTACHED) {
                // Paddle movement
                let dx = 0;
                if (keys.ArrowLeft || keys.a || keys.A) {
                    paddle.x -= paddle.speed * dt;
                } else if (keys.ArrowRight || keys.d || keys.D) {
                    paddle.x += paddle.speed * dt;
                } else if (lastTime > 0) { // avoid initial jump
                    // Mouse tracking
                    const targetX = mouseX - paddle.width / 2;
                    // Move towards mouse instantly
                    paddle.x = targetX;
                }
                
                // Clamp paddle
                if (paddle.x < 0) paddle.x = 0;
                if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

                if (currentState === STATE.BALL_ATTACHED) {
                    ball.x = paddle.x + paddle.width / 2;
                    ball.y = paddle.y - ball.radius;
                }

                if (currentState === STATE.PLAYING) {
                    ball.x += ball.vx * dt;
                    ball.y += ball.vy * dt;

                    // Wall collision
                    if (ball.y - ball.radius <= 0) {
                        ball.vy = -ball.vy;
                        ball.y = ball.radius; // depenetrate
                    }
                    if (ball.x - ball.radius <= 0) {
                        ball.vx = -ball.vx;
                        ball.x = ball.radius;
                    } else if (ball.x + ball.radius >= canvas.width) {
                        ball.vx = -ball.vx;
                        ball.x = canvas.width - ball.radius;
                    }

                    // Bottom -> Lose a life
                    if (ball.y - ball.radius > canvas.height) {
                        lives--;
                        if (lives <= 0) {
                            updateHighScore();
                            currentState = STATE.GAME_OVER;
                        } else {
                            resetBall();
                        }
                    }

                    // Paddle collision
                    // Circle-Rect collision logic from spec
                    let hitPaddleX = ball.x;
                    let hitPaddleY = ball.y;

                    if (ball.x < paddle.x) hitPaddleX = paddle.x;
                    else if (ball.x > paddle.x + paddle.width) hitPaddleX = paddle.x + paddle.width;

                    if (ball.y < paddle.y) hitPaddleY = paddle.y;
                    else if (ball.y > paddle.y + paddle.height) hitPaddleY = paddle.y + paddle.height;

                    let dX_p = ball.x - hitPaddleX;
                    let dY_p = ball.y - hitPaddleY;
                    let distance_p = Math.sqrt(dX_p*dX_p + dY_p*dY_p);

                    if (distance_p <= ball.radius && ball.vy > 0) {
                        // Collision with paddle!
                        
                        // Reflection logic
                        const hitOffset = ball.x - (paddle.x + paddle.width / 2);
                        const normOffset = hitOffset / (paddle.width / 2); // -1 to 1
                        
                        // Spec: offset * 60deg varying.
                        let angleDeg = normOffset * 60; // -60 to 60 from straight up
                        
                        // The upward zero angle in canvas is -90 degrees usually (or 270)
                        // If center is straight up -> -90
                        // Right side hit -> positive offset -> angle > -90 -> angle tilts right
                        const baseAngleRad = -Math.PI / 2; // -90 degree
                        const bounceAngleRad = baseAngleRad + (angleDeg * Math.PI / 180);

                        ball.vx = ball.speed * Math.cos(bounceAngleRad);
                        ball.vy = ball.speed * Math.sin(bounceAngleRad);
                        
                        // Push out
                        ball.y = paddle.y - ball.radius; 
                    }

                    // Brick collision
                    let collisionDetectedThisFrame = false;
                    for (let r = 0; r < bricksConfig.rows; r++) {
                        for (let c = 0; c < bricksConfig.cols; c++) {
                            const b = bricks[r][c];
                            if (b.status === 1) {
                                // Find closest point on AABB to circle center
                                let testX = ball.x;
                                let testY = ball.y;
                                
                                if (ball.x < b.x) testX = b.x;
                                else if (ball.x > b.x + bricksConfig.width) testX = b.x + bricksConfig.width;
                                
                                if (ball.y < b.y) testY = b.y;
                                else if (ball.y > b.y + bricksConfig.height) testY = b.y + bricksConfig.height;

                                const distX = ball.x - testX;
                                const distY = ball.y - testY;
                                const distance = Math.sqrt((distX * distX) + (distY * distY));

                                if (distance <= ball.radius && !collisionDetectedThisFrame) {
                                    b.status = 0; // Destroy
                                    collisionDetectedThisFrame = true;
                                    bricksRemaining--;
                                    score += getRowPoints(r);
                                    
                                    // Check level advance
                                    if (bricksRemaining === 0) {
                                        level++;
                                        createBricks();
                                        resetBall();
                                    }

                                    // Determine collision face
                                    // Check penetration from edge of brick
                                    const penTop = Math.abs((b.y) - (ball.y + ball.radius));
                                    const penBot = Math.abs((b.y + bricksConfig.height) - (ball.y - ball.radius));
                                    const penLeft = Math.abs((b.x) - (ball.x + ball.radius));
                                    const penRight = Math.abs((b.x + bricksConfig.width) - (ball.x - ball.radius));

                                    const minPen = Math.min(penTop, penBot, penLeft, penRight);

                                    // Small depenetration
                                    if (minPen === penTop) {
                                        ball.vy = -Math.abs(ball.vy);
                                        ball.y -= (penTop + 0.1);
                                    } else if (minPen === penBot) {
                                        ball.vy = Math.abs(ball.vy);
                                        ball.y += (penBot + 0.1);
                                    } else if (minPen === penLeft) {
                                        ball.vx = -Math.abs(ball.vx);
                                        ball.x -= (penLeft + 0.1);
                                    } else if (minPen === penRight) {
                                        ball.vx = Math.abs(ball.vx);
                                        ball.x += (penRight + 0.1);
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function drawPaddle(x, y, w, h) {
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.fill();
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentState !== STATE.IDLE) {
                // Draw Paddle
                ctx.fillStyle = paddle.color;
                drawPaddle(paddle.x, paddle.y, paddle.width, paddle.height);

                // Draw Ball
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
                ctx.closePath();

                // Draw Bricks
                for (let r = 0; r < bricksConfig.rows; r++) {
                    for (let c = 0; c < bricksConfig.cols; c++) {
                        const b = bricks[r][c];
                        if (b.status === 1) {
                            ctx.fillStyle = b.color;
                            ctx.fillRect(b.x, b.y, bricksConfig.width, bricksConfig.height);
                        }
                    }
                }
                
                // HUD
                ctx.fillStyle = '#FFFFFF';
                // Score
                ctx.font = '16px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`Score: ${score}`, 10, 24);
                
                // High Score
                ctx.textAlign = 'right';
                ctx.fillText(`Best: ${highScore}`, canvas.width - 10, 24);

                // Level
                ctx.fillStyle = '#AAAAAA';
                ctx.textAlign = 'center';
                ctx.fillText(`Level: ${level}`, canvas.width / 2, 24);

                // Lives
                ctx.fillStyle = '#FF0000';
                ctx.font = '18px monospace';
                ctx.textAlign = 'right';
                let livesStr = '';
                for (let i = 0; i < lives; i++) livesStr += '♥';
                ctx.fillText(livesStr, canvas.width - 10, 44);
            }

            // Draw based on state
            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '56px monospace';
                ctx.fillText('BREAKOUT', canvas.width / 2, 250);

                ctx.fillStyle = '#AAAAAA';
                ctx.font = '20px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 330);
            } else if (currentState === STATE.PAUSED) {
                // Overlays
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; // CC is slightly lighter, 0.8 is approx CC
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '36px monospace';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '40px monospace';
                ctx.fillText('GAME OVER', canvas.width / 2, 250);

                ctx.font = '24px monospace';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 300);

                ctx.fillStyle = '#AAAAAA';
                ctx.font = '18px monospace';
                ctx.fillText('Press Enter to Restart', canvas.width / 2, 360);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
