<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
            color: #FFFFFF;
        }
        canvas {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="700" height="800"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3,
            DYING: 4,
            LEVEL_COMPLETE: 5
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;
        let stateTimer = 0;

        // Input
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false,
            W: false, S: false, A: false, D: false,
            ' ': false
        };
        let spacePressed = false;

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();

            if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    initGame();
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            } else if (e.key === ' ' && !spacePressed) {
                spacePressed = true;
                if (currentState === STATE.PLAYING) handleJump();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
            if (e.key === ' ') spacePressed = false;
        });

        // Map Setup
        const platforms = [
            { id: 0, x1: 30, y1: 670, x2: 670, y2: 710, color: '#FF4444', dir: 1 },
            { id: 1, x1: 30, y1: 570, x2: 670, y2: 610, color: '#FF4444', dir: -1 },
            { id: 2, x1: 30, y1: 470, x2: 670, y2: 510, color: '#FF4444', dir: 1 },
            { id: 3, x1: 30, y1: 370, x2: 670, y2: 410, color: '#FF4444', dir: -1 },
            { id: 4, x1: 30, y1: 270, x2: 670, y2: 310, color: '#FF4444', dir: 1 },
            { id: 5, x1: 100, y1: 100, x2: 500, y2: 100, color: '#FF4444', dir: 1 } // Top flat
        ];

        function getPlatformY(p, x) {
            if (x < p.x1 || x > p.x2) return null;
            return p.y1 + ((x - p.x1) / (p.x2 - p.x1)) * (p.y2 - p.y1);
        }

        const ladders = [
            { id: 0, x: 600, topY: getPlatformY(platforms[1], 600), bottomY: getPlatformY(platforms[0], 600), broken: false },
            { id: 1, x: 250, topY: getPlatformY(platforms[1], 250) + 20, bottomY: getPlatformY(platforms[0], 250), broken: true },
            { id: 2, x: 100, topY: getPlatformY(platforms[2], 100), bottomY: getPlatformY(platforms[1], 100), broken: false },
            { id: 3, x: 350, topY: getPlatformY(platforms[2], 350) + 15, bottomY: getPlatformY(platforms[1], 350), broken: true },
            { id: 4, x: 500, topY: getPlatformY(platforms[3], 500), bottomY: getPlatformY(platforms[2], 500), broken: false },
            { id: 5, x: 150, topY: getPlatformY(platforms[4], 150), bottomY: getPlatformY(platforms[3], 150), broken: false },
            { id: 6, x: 400, topY: getPlatformY(platforms[5], 400), bottomY: getPlatformY(platforms[4], 400), broken: false },
            { id: 7, x: 310, topY: 38 + 28, bottomY: 100, broken: false }
        ];

        // Core Systems
        let lives = 3;
        let level = 1;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('dkHighScore')) || 0;
        let bonusTimer = 5000;
        let clockAcc = 0;
        let masterClock = 0;

        // Audio System (Inline)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            return osc;
        }

        function playJump() { playTone(330, 'triangle', 0.1, 0.2); }
        function playScore() { playTone(880, 'square', 0.1); }
        function playDeath() { playTone(150, 'sawtooth', 0.8, 0.3); }

        const GRAVITY = 900;
        const BARREL_GRAV = 600;

        // Entities
        const mario = {
            x: 80, y: 710 - 32,
            w: 24, h: 32,
            vx: 0, vy: 0,
            speed: 150,
            jumpForce: -340,
            climbSpeed: 100,
            state: 'grounded',
            platformId: 0,
            ladderIdx: -1,
            hammerTimer: 0
        };

        const dk = { x: 100, y: 80 - 56, w: 64, h: 56, throwTimer: 0 };
        const pauline = { x: 310, y: 38, w: 16, h: 28 };
        const oilDrum = { x: 60, y: 680, w: 28, h: 32, flicker: false };

        let barrels = [];
        let scoreTexts = [];
        let hammers = [];
        let mapHammers = [
            { x: 200, pId: 1, active: true },
            { x: 400, pId: 3, active: true }
        ];

        function getThrowInterval() {
            let base = 2.0 + Math.random() * 2.0; // 2-4s
            let adj = base - (level - 1) * 0.5;
            return Math.max(1.0, adj);
        }
        function getBarrelSpeed() {
            return 120 + (level - 1) * 20;
        }

        function initGame() {
            score = 0;
            lives = 3;
            level = 1;
            initLevel();
            currentState = STATE.PLAYING;
        }

        function initLevel() {
            bonusTimer = 5000;
            barrels = [];
            scoreTexts = [];
            hammers = JSON.parse(JSON.stringify(mapHammers));
            hammers.forEach(h => {
                let py = getPlatformY(platforms[h.pId], h.x);
                h.y = py - 20;
                h.w = 20;
                h.h = 20;
            });
            dk.throwTimer = getThrowInterval();
            resetMario();
        }

        function resetMario() {
            mario.x = 80;
            let py = getPlatformY(platforms[0], 80);
            mario.y = py ? py - mario.h : 670;
            mario.vx = 0;
            mario.vy = 0;
            mario.state = 'grounded';
            mario.platformId = 0;
            mario.ladderIdx = -1;
            mario.hammerTimer = 0;
        }

        function handleJump() {
            if (mario.state === 'grounded') {
                mario.state = 'airborne';
                mario.vy = mario.jumpForce;
                mario.platformId = -1;
                playJump();
            }
        }

        function addScore(pts, x, y) {
            score += pts;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dkHighScore', highScore);
            }
            if (pts > 0 && x !== undefined && y !== undefined) {
                scoreTexts.push({ text: `+${pts}`, x: x, y: y, life: 0.5 });
            }
        }

        function getHighestPlatformBelow(x, yFeet) {
            let bestP = null;
            let bestY = 9999;
            for (let i = 0; i < platforms.length; i++) {
                let py = getPlatformY(platforms[i], x);
                if (py !== null && py >= yFeet - 5 && py < bestY) {
                    bestY = py;
                    bestP = i;
                }
            }
            return { pIdx: bestP, py: bestY };
        }

        function getActiveLadderIdx(x) {
            if (mario.hammerTimer > 0) return -1; // Cannot climb with hammer
            for (let i = 0; i < ladders.length; i++) {
                let lad = ladders[i];
                if (!lad.broken && Math.abs(x + mario.w/2 - lad.x) <= 8) {
                    return i;
                }
            }
            return -1;
        }

        function checkAABB(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function playerDie() {
            playDeath();
            lives--;
            currentState = STATE.DYING;
            stateTimer = 0.8;
            mario.hammerTimer = 0;
        }

        function spawnBarrel() {
            barrels.push({
                x: dk.x + dk.w + 5,
                y: platforms[5].y1 - 16,
                w: 20,
                h: 16,
                vy: 0,
                state: 'rolling',
                platformId: 5,
                ladderIdx: -1,
                dir: platforms[5].dir,
                jumpedOver: false
            });
        }

        function updateMario(dt) {
            if (mario.hammerTimer > 0) {
                mario.hammerTimer -= dt;
                if (mario.hammerTimer <= 0) mario.hammerTimer = 0;
            }

            let dir = 0;
            if (keys.ArrowLeft || keys.a || keys.A) dir = -1;
            if (keys.ArrowRight || keys.d || keys.D) dir = 1;

            if (mario.state === 'grounded') {
                mario.x += dir * mario.speed * dt;
                
                let p = platforms[mario.platformId];
                if (p && mario.x < p.x1) mario.x = p.x1;
                if (p && mario.x + mario.w > p.x2) mario.x = p.x2 - mario.w;

                if (p) {
                    let py = getPlatformY(p, mario.x + mario.w/2);
                    if (py !== null) mario.y = py - mario.h;
                    else mario.state = 'airborne';
                }

                let clDir = 0;
                if (keys.ArrowUp || keys.w || keys.W) clDir = -1;
                if (keys.ArrowDown || keys.s || keys.S) clDir = 1;
                
                if (clDir !== 0 && mario.hammerTimer <= 0) {
                    let ladIdx = getActiveLadderIdx(mario.x);
                    if (ladIdx !== -1) {
                        let lad = ladders[ladIdx];
                        if (mario.y + mario.h >= lad.topY - 4 && mario.y + mario.h <= lad.bottomY + 4) {
                            mario.state = 'climbing';
                            mario.ladderIdx = ladIdx;
                            mario.x = lad.x - mario.w/2; 
                        }
                    }
                }
            } else if (mario.state === 'airborne') {
                mario.x += dir * mario.speed * dt;
                mario.vy += GRAVITY * dt;
                mario.y += mario.vy * dt;

                if (mario.x < 0) mario.x = 0;
                if (mario.x + mario.w > 700) mario.x = 700 - mario.w;

                if (mario.vy > 0) {
                    let centerFeetX = mario.x + mario.w/2;
                    let feetY = mario.y + mario.h;
                    let { pIdx, py } = getHighestPlatformBelow(centerFeetX, feetY - mario.vy * dt - 4);
                    
                    if (pIdx !== null && feetY >= py) {
                        mario.state = 'grounded';
                        mario.platformId = pIdx;
                        mario.vy = 0;
                        mario.y = py - mario.h;
                    }
                }
            } else if (mario.state === 'climbing') {
                let cDir = 0;
                if (keys.ArrowUp || keys.w || keys.W) cDir = -1;
                if (keys.ArrowDown || keys.s || keys.S) cDir = 1;

                mario.y += cDir * mario.climbSpeed * dt;

                let lad = ladders[mario.ladderIdx];
                
                if (mario.y + mario.h <= lad.topY + 4) {
                    mario.state = 'grounded';
                    let { pIdx, py } = getHighestPlatformBelow(mario.x + mario.w/2, lad.topY - 10);
                    if (pIdx !== null) {
                        mario.platformId = pIdx;
                        mario.y = py - mario.h;
                    } else {
                         mario.y = lad.topY - mario.h;
                         mario.state = 'airborne'; 
                    }
                } else if (mario.y + mario.h >= lad.bottomY) {
                    mario.state = 'grounded';
                    let { pIdx, py } = getHighestPlatformBelow(mario.x + mario.w/2, lad.bottomY - 10);
                    if (pIdx !== null) {
                        mario.platformId = pIdx;
                        mario.y = py - mario.h;
                    } else {
                        mario.y = lad.bottomY - mario.h;
                        mario.state = 'airborne';
                    }
                }
            }

            // Hammer Pickups
            for (let h of hammers) {
                if (h.active && checkAABB(mario.x, mario.y, mario.w, mario.h, h.x, h.y, h.w, h.h)) {
                    h.active = false;
                    mario.hammerTimer = 8.0;
                    playScore();
                }
            }
        }

        function updateBarrels(dt) {
            dk.throwTimer -= dt;
            if (dk.throwTimer <= 0) {
                spawnBarrel();
                dk.throwTimer = getThrowInterval();
            }

            for (let i = barrels.length - 1; i >= 0; i--) {
                let b = barrels[i];
                let speed = getBarrelSpeed();
                let destroyed = false;

                if (b.state === 'rolling') {
                    b.x += b.dir * speed * dt;
                    
                    let p = platforms[b.platformId];
                    let py = getPlatformY(p, b.x + b.w/2);
                    
                    if (py !== null) {
                        b.y = py - b.h;

                        // Ladder descend chance
                        for (let j = 0; j < ladders.length; j++) {
                            let lad = ladders[j];
                            if (!lad.broken && lad.topY > 200) {
                                let prevCenterX = b.x + b.w/2 - b.dir * speed * dt;
                                let nowCenterX = b.x + b.w/2;
                                
                                if ((prevCenterX <= lad.x && nowCenterX >= lad.x) || 
                                    (prevCenterX >= lad.x && nowCenterX <= lad.x)) {
                                    if (Math.abs(lad.topY - py) < 10) {
                                        if (Math.random() < 0.20) {
                                            b.state = 'descending';
                                            b.ladderIdx = j;
                                            b.x = lad.x - b.w/2;
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                    } else {
                        b.state = 'falling';
                        b.vy = 0;
                    }
                } else if (b.state === 'falling') {
                    b.vy += BARREL_GRAV * dt;
                    b.y += b.vy * dt;

                    let centerY = b.y + b.h;
                    let { pIdx, py } = getHighestPlatformBelow(b.x + b.w/2, centerY - b.vy * dt - 5);
                    if (pIdx !== null && centerY >= py) {
                        b.state = 'rolling';
                        b.platformId = pIdx;
                        b.y = py - b.h;
                        b.dir = platforms[pIdx].dir || 1; 
                        
                        // Oil drum
                        if (pIdx === 0 && b.x < 100) {
                            destroyed = true;
                            oilDrum.flicker = true;
                        }
                    }
                } else if (b.state === 'descending') {
                    b.y += speed * dt;
                    let lad = ladders[b.ladderIdx];
                    if (b.y + b.h >= lad.bottomY) {
                        b.state = 'rolling';
                        let { pIdx, py } = getHighestPlatformBelow(b.x + b.w/2, lad.bottomY - 10);
                        b.platformId = pIdx !== null ? pIdx : 0;
                        b.dir = platforms[b.platformId].dir || 1;
                    }
                }

                // Interaction with Mario
                if (!destroyed && currentState === STATE.PLAYING) {
                    let mx = mario.x, my = mario.y, mw = mario.w, mh = mario.h;
                    
                    if (checkAABB(mx, my, mw, mh, b.x, b.y, b.w, b.h)) {
                        if (mario.hammerTimer > 0) { // Smash logic
                            addScore(300, b.x, b.y);
                            playScore();
                            destroyed = true;
                        } else {
                            playerDie();
                        }
                    } else if (mario.state === 'airborne' && !b.jumpedOver) {
                        // Jump over logic: horizontal overlap, mario feet above barrel top
                        if (mx < b.x + b.w && mx + mw > b.x && my + mh < b.y + 4) {
                            b.jumpedOver = true;
                            addScore(100, b.x, b.y - 20);
                            playScore();
                        }
                    }
                }

                if (destroyed) {
                    barrels.splice(i, 1);
                }
            }

            if (oilDrum.flicker && Math.random() < 0.05) oilDrum.flicker = false;
        }

        function update(dt) {
            masterClock += dt * 1000;

            if (currentState === STATE.DYING) {
                stateTimer -= dt;
                if (stateTimer <= 0) {
                    if (lives <= 0) {
                        currentState = STATE.GAME_OVER;
                    } else {
                        resetMario();
                        currentState = STATE.PLAYING;
                    }
                }
                return;
            }

            if (currentState === STATE.LEVEL_COMPLETE) {
                stateTimer -= dt;
                if (stateTimer <= 0) {
                    level++;
                    initLevel();
                    currentState = STATE.PLAYING;
                }
                return;
            }

            if (currentState === STATE.PLAYING) {
                // Bonus Timer
                clockAcc += dt;
                if (clockAcc >= 2.0) {
                    clockAcc = 0;
                    bonusTimer -= 100;
                    if (bonusTimer <= 0) {
                        bonusTimer = 0;
                        playerDie();
                    }
                }

                updateMario(dt);
                updateBarrels(dt);
                
                // Score Texts
                for (let i = scoreTexts.length - 1; i >= 0; i--) {
                    scoreTexts[i].life -= dt;
                    scoreTexts[i].y -= 20 * dt;
                    if (scoreTexts[i].life <= 0) scoreTexts.splice(i, 1);
                }

                // Check Win
                if (mario.y <= pauline.y + pauline.h + 30 && mario.y > 0 && mario.platformId === 5) {
                    currentState = STATE.LEVEL_COMPLETE;
                    stateTimer = 2.0;
                    let ts = Math.max(0, bonusTimer * 10);
                    score += 500 + ts;
                    playScore(); // arpeggio standin
                }
            }
        }

        function drawMap() {
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2);
                ctx.lineTo(p.x2, p.y2 + 8); ctx.lineTo(p.x1, p.y1 + 8);
                ctx.closePath(); ctx.fill();
            }

            for (let l of ladders) {
                ctx.fillStyle = '#00CCFF';
                const ladX = l.x - 10;
                ctx.fillRect(ladX, l.topY, 3, l.bottomY - l.topY);
                ctx.fillRect(ladX + 17, l.topY, 3, l.bottomY - l.topY);
                for (let ry = l.topY + 8; ry < l.bottomY; ry += 16) {
                    ctx.fillRect(ladX, ry, 20, 3);
                }
            }

            // Oil Drum
            ctx.fillStyle = '#4444FF';
            ctx.fillRect(oilDrum.x, oilDrum.y, oilDrum.w, oilDrum.h);
            ctx.fillStyle = '#000000';
            ctx.fillRect(oilDrum.x + 4, oilDrum.y + 4, 20, 4);
            ctx.fillRect(oilDrum.x + 4, oilDrum.y + 12, 20, 4);
            ctx.fillRect(oilDrum.x + 4, oilDrum.y + 20, 20, 4);
            if (oilDrum.flicker) {
                ctx.fillStyle = '#FF4400';
                ctx.beginPath();
                ctx.moveTo(oilDrum.x, oilDrum.y);
                ctx.lineTo(oilDrum.x + 14, oilDrum.y - 15 + Math.random()*10);
                ctx.lineTo(oilDrum.x + 28, oilDrum.y);
                ctx.fill();
            }

            // Hammers
            for (let h of hammers) {
                if (h.active) {
                    ctx.fillStyle = '#FFCC00'; // head
                    ctx.fillRect(h.x, h.y, 20, 8);
                    ctx.fillStyle = '#885522'; // handle
                    ctx.fillRect(h.x + 8, h.y + 8, 4, 12);
                }
            }
        }

        function drawEntities() {
            // DK
            ctx.fillStyle = '#885522';
            ctx.fillRect(dk.x, dk.y, dk.w, dk.h);
            ctx.fillStyle = '#FFAA77';
            ctx.fillRect(dk.x + 22, dk.y + 10, 20, 16);
            // Toss anim
            if (dk.throwTimer < 0.2) {
                ctx.fillStyle = '#885522'; // Arm extended
                ctx.fillRect(dk.x + dk.w, dk.y + 20, 20, 10);
            }

            // Pauline
            ctx.fillStyle = '#FF66AA';
            ctx.fillRect(pauline.x, pauline.y, pauline.w, pauline.h);
            ctx.fillStyle = '#FFAA77';
            ctx.fillRect(pauline.x, pauline.y, pauline.w, 6);
            if (masterClock % 500 < 250) {
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '12px monospace';
                ctx.fillText('HELP!', pauline.x + 8, pauline.y - 10);
            }

            // Barrels
            for (let b of barrels) {
                ctx.fillStyle = '#CC6600';
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.w, b.h, 4);
                ctx.fill();
                ctx.fillStyle = '#884400';
                ctx.fillRect(b.x, b.y + 6, b.w, 4);
            }

            // Mario
            if (currentState === STATE.DYING) {
                if (masterClock % 200 < 100) {
                    ctx.fillStyle = '#CC0000';
                    ctx.fillRect(mario.x, mario.y + 8, mario.w, mario.h - 8);
                    ctx.fillStyle = '#FFAA77';
                    ctx.fillRect(mario.x, mario.y, mario.w, 8);
                }
            } else {
                ctx.fillStyle = '#CC0000';
                ctx.fillRect(mario.x, mario.y + 8, mario.w, mario.h - 8);
                ctx.fillStyle = '#FFAA77';
                ctx.fillRect(mario.x, mario.y, mario.w, 8);
                
                // Hammer active
                if (mario.hammerTimer > 0) {
                    if (mario.hammerTimer > 2.0 || masterClock % 200 < 100) {
                        ctx.fillStyle = '#FFCC00';
                        if (masterClock % 200 < 100) {
                            // Up swing
                            ctx.fillRect(mario.x + 4, mario.y - 12, 16, 8);
                            ctx.fillStyle = '#885522';
                            ctx.fillRect(mario.x + 10, mario.y - 4, 4, 12);
                        } else {
                            // Down swing
                            let hw = 16, hh = 8;
                            let dir = (keys.ArrowLeft || keys.a || keys.A) ? -1 : 1;
                            let hx = mario.x + (dir === 1 ? mario.w : -hw);
                            ctx.fillRect(hx, mario.y + 8, hw, hh);
                            ctx.fillStyle = '#885522';
                            ctx.fillRect(mario.x + (dir === 1 ? mario.w - 4 : 0), mario.y + 4, 4, 12);
                        }
                    }
                }
            }

            // Floating Text
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '14px monospace';
            for (let st of scoreTexts) {
                ctx.globalAlpha = st.life * 2;
