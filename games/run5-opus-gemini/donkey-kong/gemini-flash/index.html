<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="700" height="800"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 700, HEIGHT = 800;
        const MARIO_SPEED = 150, JUMP_VEL = -340, GRAVITY = 900, CLIMB_SPEED = 100;
        const BARREL_ROLL_SPEED = 120, BARREL_FALL_GRAVITY = 600;

        // States
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_DYING = 'DYING', STATE_CLEAR = 'LEVEL_COMPLETE', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        // Game Variables
        let score = 0, lives = 3, level = 1, bonus = 5000, high_score = localStorage.getItem('dk6HighScore') || 0;
        let lastTime = 0, spawnTimer = 0, bonusTick = 0, clearTimer = 0, deathTimer = 0;
        let mario = { x: 80, y: 710, vx: 0, vy: 0, jumping: false, climbing: false, hammer: 0, face: 1 };
        let barrels = [], platforms = [], ladders = [], hammers = [], floatingTexts = [];

        function initPlatforms() {
            platforms = [
                { lx: 30, rx: 670, ly: 670, ry: 710, h: 8, color: '#FF4444' }, // P1 (bottom) - right-down
                { lx: 30, rx: 670, ly: 610, ry: 570, h: 8, color: '#FF4444' }, // P2 - left-down
                { lx: 30, rx: 670, ly: 470, ry: 510, h: 8, color: '#FF4444' }, // P3 - right-down
                { lx: 30, rx: 670, ly: 410, ry: 370, h: 8, color: '#FF4444' }, // P4 - left-down
                { lx: 30, rx: 670, ly: 270, ry: 310, h: 8, color: '#FF4444' }, // P5 - right-down
                { lx: 100, rx: 500, ly: 100, ry: 100, h: 8, color: '#FF4444' } // P6 (top)
            ];
        }

        function initLadders() {
            ladders = [
                { x: 600, ty: 588, by: 688, broken: false }, // L1
                { x: 100, ty: 488, by: 588, broken: false }, // L2
                { x: 500, ty: 388, by: 488, broken: false }, // L3
                { x: 150, ty: 288, by: 388, broken: false }, // L4
                { x: 400, ty: 100, by: 288, broken: false }  // L5
            ];
        }

        function spawnHammer() {
            hammers = [
                { x: 200, y: 560, active: true },
                { x: 450, y: 360, active: true }
            ];
        }

        function resetMario() {
            mario = { x: 80, y: 710, vx: 0, vy: 0, jumping: false, climbing: false, hammer: 0, face: 1 };
        }

        function resetGame() {
            score = 0; lives = 3; level = 1; bonus = 5000;
            initPlatforms(); initLadders(); spawnHammer(); resetMario();
            barrels = []; floatingTexts = [];
            currentState = STATE_PLAYING;
        }

        function getPlatformY(x, p) {
            return p.ly + (x - p.lx) / (p.rx - p.lx) * (p.ry - p.ly);
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.code === 'KeyP') currentState = currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState);
            if (currentState !== STATE_PLAYING || mario.hammer > 0) return;
            if (e.code === 'Space' && !mario.jumping && !mario.climbing) {
                mario.vy = JUMP_VEL; mario.jumping = true;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update(dt) {
            if (dt > 0.1) dt = 0.1;
            if (currentState === STATE_PLAYING) {
                // Bonus timer
                bonusTick += dt; if (bonusTick >= 2) { bonus = Math.max(0, bonus - 100); bonusTick = 0; if (bonus <= 0) killMario(); }
                if (mario.hammer > 0) mario.hammer -= dt;

                updateMario(dt);
                updateBarrels(dt);
                
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    barrels.push({ x: 120, y: 70, vx: 0, vy: 0, airborne: true, status: 'moving', jumped: false });
                    spawnTimer = Math.max(1, 4 - (level - 1) * 0.5 + Math.random() * 2);
                }

                // Check Pauline
                if (mario.y < 120 && mario.x > 250 && mario.x < 370) {
                    score += 500 + bonus * 10; clearTimer = 2; currentState = STATE_CLEAR;
                }
            } else if (currentState === STATE_CLEAR) {
                clearTimer -= dt; if (clearTimer <= 0) { level++; bonus = 5000; resetMario(); barrels = []; spawnHammer(); currentState = STATE_PLAYING; }
            } else if (currentState === STATE_DYING) {
                deathTimer -= dt; if (deathTimer <= 0) { lives--; if (lives <= 0) currentState = STATE_GAME_OVER; else { resetMario(); currentState = STATE_PLAYING; } }
            }
            floatingTexts.forEach((t, i) => { t.life -= dt; if (t.life <= 0) floatingTexts.splice(i, 1); });
        }

        function updateMario(dt) {
            if (mario.climbing) {
                if (keys['ArrowUp'] || keys['KeyW']) mario.y -= CLIMB_SPEED * dt;
                else if (keys['ArrowDown'] || keys['KeyS']) mario.y += CLIMB_SPEED * dt;
                
                let curL = ladders.find(l => Math.abs(mario.x - l.x) < 8 && mario.y >= l.ty - 32 && mario.y <= l.by);
                if (!curL) { mario.climbing = false; }
            } else {
                let mv = 0;
                if (keys['ArrowLeft'] || keys['KeyA']) { mv = -MARIO_SPEED; mario.face = -1; }
                if (keys['ArrowRight'] || keys['KeyD']) { mv = MARIO_SPEED; mario.face = 1; }
                mario.x += mv * dt; mario.x = Math.max(30, Math.min(WIDTH - 30, mario.x));

                if (mario.jumping) {
                    mario.y += mario.vy * dt; mario.vy += GRAVITY * dt;
                    platforms.forEach(p => {
                        let py = getPlatformY(mario.x, p) - 32;
                        if (mario.vy > 0 && mario.x >= p.lx && mario.x <= p.rx && mario.y >= py - 10 && mario.y <= py + 10) {
                            mario.y = py; mario.vy = 0; mario.jumping = false;
                        }
                    });
                } else {
                    let onP = platforms.find(p => mario.x >= p.lx && mario.x <= p.rx && Math.abs(mario.y - (getPlatformY(mario.x, p) - 32)) < 15);
                    if (onP) mario.y = getPlatformY(mario.x, onP) - 32;
                    else mario.jumping = true; // Fall off

                    if (!mario.jumping && !mario.hammer && (keys['ArrowUp'] || keys['ArrowDown'] || keys['KeyW'] || keys['KeyS'])) {
                        let l = ladders.find(l => Math.abs(mario.x - l.x) < 8 && mario.y >= l.ty - 40 && mario.y <= l.by);
                        if (l) { mario.climbing = true; mario.x = l.x; }
                    }
                }
            }

            // Hammer pickup
            hammers.forEach(h => {
                if (h.active && Math.abs(mario.x - h.x) < 20 && Math.abs(mario.y - h.y) < 30) { h.active = false; mario.hammer = 8; }
            });
        }

        function updateBarrels(dt) {
            barrels.forEach((b, i) => {
                if (b.airborne) {
                    b.y += b.vy * dt; b.vy += BARREL_FALL_GRAVITY * dt;
                    platforms.forEach(p => {
                        let py = getPlatformY(b.x, p) - 16;
                        if (b.vy > 0 && b.x >= p.lx && b.x <= p.rx && b.y >= py - 10 && b.y <= py + 10) {
                            b.y = py; b.vy = 0; b.airborne = false;
                        }
                    });
                } else {
                    let onP = platforms.find(p => b.x >= p.lx && b.x <= p.rx && Math.abs(b.y - (getPlatformY(b.x, p) - 16)) < 15);
                    if (onP) {
                        const dir = (onP.ry > onP.ly) ? 1 : -1;
                        if (onP.ly === onP.ry) b.vx = BARREL_ROLL_SPEED; else b.vx = dir * BARREL_ROLL_SPEED;
                        b.x += b.vx * dt; b.y = getPlatformY(b.x, onP) - 16;
                        
                        // Ladder chance
                        if (Math.random() < 0.005) {
                            let l = ladders.find(lad => Math.abs(b.x - lad.x) < 5 && b.y < lad.by);
                            if (l) { b.airborne = true; b.vx = 0; }
                        }
                    } else { b.airborne = true; }
                }

                // Collision
                const dx = Math.abs(mario.x - b.x); const dy = Math.abs(mario.y - b.y);
                if (dx < 20 && dy < 25) {
                    if (mario.hammer > 0) { barrels.splice(i, 1); score += 300; floatingTexts.push({ x: b.x, y: b.y, txt: '300', life: 0.5 }); }
                    else if (!mario.jumping || mario.y + 20 > b.y) killMario();
                } else if (mario.jumping && !b.jumped && b.x > mario.x - 15 && b.x < mario.x + 15 && mario.y + 30 < b.y) {
                    score += 100; b.jumped = true; floatingTexts.push({ x: mario.x, y: mario.y - 20, txt: '100', life: 0.5 });
                }

                if (b.y > 680 && b.x < 100) barrels.splice(i, 1); // Oil drum
                if (b.x < -10 || b.x > WIDTH + 10 || b.y > HEIGHT) barrels.splice(i, 1);
            });
        }

        function killMario() { if (currentState === STATE_PLAYING) { currentState = STATE_DYING; deathTimer = 1.0; } }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            platforms.forEach(p => {
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.moveTo(p.lx, p.ly); ctx.lineTo(p.rx, p.ry);
                ctx.lineTo(p.rx, p.ry + p.h); ctx.lineTo(p.lx, p.ly + p.h); ctx.closePath(); ctx.fill();
            });
            ladders.forEach(l => {
                ctx.strokeStyle = '#00CCFF'; ctx.lineWidth = 2;
                ctx.strokeRect(l.x - 10, l.ty, 20, l.by - l.ty);
                for (let ry = l.ty + 8; ry < l.by; ry += 16) { ctx.beginPath(); ctx.moveTo(l.x - 10, ry); ctx.lineTo(l.x + 10, ry); ctx.stroke(); }
            });

            // Donkey Kong & Pauline
            ctx.fillStyle = '#885522'; ctx.fillRect(100, 44, 64, 56); ctx.fillStyle = '#FFAA77'; ctx.fillRect(122, 54, 20, 16);
            ctx.fillStyle = '#FF66AA'; ctx.fillRect(310, 38, 16, 28);
            if (Math.floor(Date.now() / 500) % 2 === 0) { ctx.fillStyle = '#FFF'; ctx.font = '14px monospace'; ctx.fillText('HELP!', 300, 30); }

            // Hammers
            hammers.forEach(h => { if (h.active) { ctx.fillStyle = '#FFCC00'; ctx.fillRect(h.x - 10, h.y - 5, 20, 10); ctx.fillStyle = '#885522'; ctx.fillRect(h.x - 2, h.y + 5, 4, 10); } });

            // Mario
            if (currentState !== STATE_IDLE) {
                let color = mario.hammer > 0 && Math.floor(Date.now()/100)%2===0 ? '#FFF' : '#CC0000';
                ctx.fillStyle = color; ctx.fillRect(mario.x - 12, mario.y, 24, 32);
                ctx.fillStyle = '#FFAA77'; ctx.fillRect(mario.x - 12, mario.y, 24, 8);
                if (mario.hammer > 0) {
                    ctx.fillStyle = '#FFCC00';
                    let sw = Math.floor(Date.now()/100)%2===0 ? -24 : 10;
                    ctx.fillRect(mario.x + (mario.face * 10), mario.y + sw, 20, 12);
                }
            }

            barrels.forEach(b => { ctx.fillStyle = '#CC6600'; ctx.beginPath(); ctx.ellipse(b.x, b.y + 8, 10, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#884400'; ctx.fillRect(b.x - 10, b.y + 7, 20, 3); });

            // HUD
            ctx.fillStyle = '#FFF'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24); ctx.fillText(`×${lives}`, 30, 44);
            ctx.textAlign = 'right'; ctx.fillText(`Best: ${high_score}`, 690, 24); ctx.fillText(`L=${level}`, 690, 44);
            ctx.textAlign = 'center'; ctx.fillText(`BONUS: ${bonus}`, 350, 24);
            ctx.fillStyle = '#F00'; ctx.fillRect(250, 30, bonus/20, 6);

            floatingTexts.forEach(t => { ctx.fillStyle = '#FFF'; ctx.font = '12px monospace'; ctx.fillText(t.txt, t.x, t.y); });

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FF4444'; ctx.font = '48px monospace'; ctx.textAlign = 'center'; ctx.fillText('DONKEY KONG', 350, 320);
                ctx.fillStyle = '#AAA'; ctx.font = '20px monospace'; ctx.fillText('Press Enter to Start', 350, 440);
            } else if (currentState === STATE_PAUSED) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#FFF'; ctx.font = '36px monospace'; ctx.textAlign = 'center'; ctx.fillText('PAUSED', 350, 400); }
            else if (currentState === STATE_GAME_OVER) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#FFF'; ctx.font = '40px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', 350, 350); ctx.font = '20px monospace'; ctx.fillText(`Final: ${score}`, 350, 400); ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 350, 450); }
            else if (currentState === STATE_CLEAR) { ctx.fillStyle = '#FFFF00'; ctx.font = '36px monospace'; ctx.textAlign = 'center'; ctx.fillText('STAGE CLEAR!', 350, 400); }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;
            update(dt); draw(); requestAnimationFrame(gameLoop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)
  try { window.__qa = {
    stateNum:  typeof state !== 'undefined' ? state : (typeof gameState !== 'undefined' ? gameState : (typeof game !== 'undefined' && game.state != null ? game.state : null)),
    pacX:      typeof pac   !== 'undefined' ? (pac.x  != null ? pac.x  : null) : null,
    pacY:      typeof pac   !== 'undefined' ? (pac.y  != null ? pac.y  : null) : null,
    pacDx:     typeof pac   !== 'undefined' ? (pac.dx != null ? pac.dx : null) : null,
    pacDy:     typeof pac   !== 'undefined' ? (pac.dy != null ? pac.dy : null) : null,
    pacNextDx: typeof pac   !== 'undefined' ? (pac.nextDx != null ? pac.nextDx : (pac.requestedDx != null ? pac.requestedDx : null)) : null,
    pacNextDy: typeof pac   !== 'undefined' ? (pac.nextDy != null ? pac.nextDy : (pac.requestedDy != null ? pac.requestedDy : null)) : null,
    marioX:    typeof mario !== 'undefined' ? (mario.x != null ? mario.x : null) : null,
    marioY:    typeof mario !== 'undefined' ? (mario.y != null ? mario.y : null) : null,
    marioVx:   typeof mario !== 'undefined' ? (mario.vx != null ? mario.vx : null) : null,
    marioVy:   typeof mario !== 'undefined' ? (mario.vy != null ? mario.vy : null) : null,
    score:     typeof score !== 'undefined' ? score : (typeof game !== 'undefined' && game.score != null ? game.score : null),
    lives:     typeof lives !== 'undefined' ? lives : (typeof game !== 'undefined' && game.lives != null ? game.lives : null),
    ts: Date.now(),
  }; } catch(e) { window.__qaErr = String(e); }

        }
        initPlatforms(); initLadders();
        requestAnimationFrame(gameLoop);
    </script>
