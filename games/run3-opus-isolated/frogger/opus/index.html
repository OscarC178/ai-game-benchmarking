<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frogger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="700"></canvas>
<script>
'use strict';
(function(){
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 700;
const CELL = 40, COLS = 15, ROWS = 13;
const PF_TOP = 40; // playfield y start

/* ═══ Audio ═══ */
let audioCtx = null;
function ac(){ if(!audioCtx){const A=window.AudioContext||window.webkitAudioContext;if(A)audioCtx=new A();}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();return audioCtx; }
function sfxHop(){const a=ac();if(!a)return;try{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;o.type='square';o.frequency.setValueAtTime(600,t);g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.03);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.03);}catch(e){}}
function sfxSplash(){const a=ac();if(!a)return;try{const dur=0.15,buf=a.createBuffer(1,a.sampleRate*dur|0,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.06*(1-i/d.length);const s=a.createBufferSource();s.buffer=buf;s.connect(a.destination);s.start();}catch(e){}}
function sfxSquash(){const a=ac();if(!a)return;try{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;o.type='square';o.frequency.setValueAtTime(110,t);g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.1);}catch(e){}}
function sfxBay(){const a=ac();if(!a)return;try{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;o.type='square';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(880,t+0.1);g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.12);}catch(e){}}
function sfxLevel(){const a=ac();if(!a)return;try{[523,659,784,1047].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime+i*0.06;o.type='square';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.08);});}catch(e){}}

/* ═══ Constants ═══ */
const IDLE=0, PLAYING=1, PAUSED=2, GAME_OVER=3;
const LS_KEY='frogger_hs_r3';
const TIMER_MAX=30;

// Home bay positions
const BAYS=[{x:20},{x:140},{x:260},{x:380},{x:500}];
const BAY_W=48, BAY_H=36;

/* ═══ State ═══ */
let state=IDLE;
let score=0, highScore=0, lives=0, level=0, timer=0;
let frog, maxRowReached;
let baysFilled;
let vehicles, platforms;
let deathAnim, deathTimer; // death animation
let hopAnim, hopTimer, hopFrom, hopTo; // hop animation
let levelTransTimer;

try{highScore=parseInt(localStorage.getItem(LS_KEY))||0;}catch(e){}
function saveHS(){try{localStorage.setItem(LS_KEY,highScore);}catch(e){}}

/* ═══ Input ═══ */
const keys={};
const justPressed={};
document.addEventListener('keydown',e=>{
  const c=e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter','KeyA','KeyD','KeyW','KeyS','KeyP'].includes(c))e.preventDefault();
  if(c==='Enter'){
    if(state===IDLE||state===GAME_OVER){startGame();return;}
  }
  if(c==='KeyP'){
    if(state===PLAYING)state=PAUSED;
    else if(state===PAUSED)state=PLAYING;
    return;
  }
  if(!keys[c]) justPressed[c]=true;
  keys[c]=true;
},{passive:false});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

/* ═══ Helpers ═══ */
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}

// Row index (0=home bays at top, 12=safe start at bottom)
// Y from row: PF_TOP + row * CELL
function rowY(r){ return PF_TOP + r * CELL; }

/* ═══ Vehicle / Platform Definitions ═══ */
function makeVehicles(speedMult){
  const v=[];
  const lanes=[
    // road lanes: row 12=safe(y=520), row 11=lane1(y=480), row 10=lane2(y=440), etc.
    {row:11, y:480, w:64,h:32, color:'#CCCC00', speed:80, dir:1,  spacing:200},  // yellow cars right
    {row:10, y:440, w:96,h:32, color:'#3344AA', speed:60, dir:-1, spacing:250},  // blue trucks left
    {row:9,  y:400, w:48,h:32, color:'#DD2222', speed:140,dir:1,  spacing:180},  // red cars right
    {row:8,  y:360, w:96,h:32, color:'#CCCCCC', speed:70, dir:-1, spacing:220},  // white trucks left
    {row:7,  y:320, w:48,h:32, color:'#FF66AA', speed:160,dir:1,  spacing:240},  // pink cars right
  ];
  for(const l of lanes){
    const sp = l.speed * speedMult;
    const count = Math.ceil(W / l.spacing) + 2;
    for(let i=0; i<count; i++){
      v.push({
        x: i * l.spacing,
        y: l.y + 4, // center in cell
        w: l.w, h: l.h,
        color: l.color,
        vx: sp * l.dir,
        lane: l.row
      });
    }
  }
  return v;
}

function makePlatforms(speedMult){
  const p=[];
  const lanes=[
    // river lanes: row 5=lane6(y=240), row 4=lane7(y=200), etc.
    {row:5, y:240, w:120, h:32, color:'#885522', speed:60,  dir:1,  spacing:200, type:'log',   diveEvery:0},
    {row:4, y:200, w:120, h:32, color:'#448844', speed:50,  dir:-1, spacing:180, type:'turtle', diveEvery:3},
    {row:3, y:160, w:200, h:32, color:'#774411', speed:40,  dir:1,  spacing:300, type:'log',   diveEvery:0},
    {row:2, y:120, w:80,  h:32, color:'#448844', speed:70,  dir:-1, spacing:160, type:'turtle', diveEvery:2},
    {row:1, y:80,  w:160, h:32, color:'#885522', speed:80,  dir:1,  spacing:250, type:'log',   diveEvery:0},
  ];
  for(const l of lanes){
    const sp = l.speed * speedMult;
    const count = Math.ceil(W / l.spacing) + 2;
    for(let i=0; i<count; i++){
      const isDiver = l.diveEvery > 0 && (i % l.diveEvery === 0);
      p.push({
        x: i * l.spacing,
        y: l.y + 4,
        w: l.w, h: l.h,
        color: l.color,
        vx: sp * l.dir,
        lane: l.row,
        type: l.type,
        isDiver: isDiver,
        divePhase: 0, // 0=visible, 1=sinking, 2=submerged, 3=rising
        diveTimer: isDiver ? Math.random()*3 : 0, // stagger
      });
    }
  }
  return p;
}

/* ═══ Game Init ═══ */
function startGame(){
  ac();
  score=0; lives=3; level=1;
  baysFilled=[false,false,false,false,false];
  const sm = 1;
  vehicles=makeVehicles(sm);
  platforms=makePlatforms(sm);
  resetFrog();
  deathAnim=false; deathTimer=0;
  hopAnim=false; hopTimer=0;
  levelTransTimer=0;
  state=PLAYING;
}

function resetFrog(){
  frog={
    x: 7*CELL, // col 7 → x=280
    y: rowY(12), // bottom safe row
    w: 32, h: 32,
    alive: true,
    ridingVx: 0
  };
  timer=TIMER_MAX;
  maxRowReached=12;
  deathAnim=false;
  hopAnim=false;
}

/* ═══ Frog Drawing ═══ */
function drawFrog(fx,fy,size){
  const s=size||32;
  const cx=fx+s/2, cy=fy+s/2;
  // Body
  ctx.fillStyle='#22CC22';
  ctx.beginPath();
  ctx.roundRect(fx,fy,s,s,4);
  ctx.fill();
  // Eyes
  const eyeR=s*0.12;
  const eyeY=fy+s*0.22;
  ctx.fillStyle='#000000';
  ctx.beginPath();
  ctx.arc(fx+s*0.3,eyeY,eyeR,0,Math.PI*2);
  ctx.arc(fx+s*0.7,eyeY,eyeR,0,Math.PI*2);
  ctx.fill();
  // Pupils
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();
  ctx.arc(fx+s*0.3,eyeY,eyeR*0.5,0,Math.PI*2);
  ctx.arc(fx+s*0.7,eyeY,eyeR*0.5,0,Math.PI*2);
  ctx.fill();
}

function drawMiniFrog(fx,fy,size){
  const s=size||20;
  ctx.fillStyle='#22CC22';
  ctx.fillRect(fx,fy,s,s);
}

/* ═══ Drawing Zones ═══ */
function drawBackground(){
  // Home bay row / water top area (y=40..80)
  ctx.fillStyle='#0044AA';
  ctx.fillRect(0, 40, W, 240); // river zone y=40..280

  // Home bays at y=40
  for(let i=0;i<5;i++){
    const b=BAYS[i];
    if(baysFilled[i]){
      ctx.fillStyle='#22CC22';
      ctx.fillRect(b.x, 42, BAY_W, BAY_H);
      drawMiniFrog(b.x+14, 48, 20);
    } else {
      ctx.fillStyle='#000066';
      ctx.fillRect(b.x, 42, BAY_W, BAY_H);
    }
  }

  // Median safe zone y=280
  ctx.fillStyle='#224422';
  ctx.fillRect(0, 280, W, CELL);

  // Road zone y=320..520
  ctx.fillStyle='#333333';
  ctx.fillRect(0, 320, W, 200);

  // Safe start strip y=520
  ctx.fillStyle='#222244';
  ctx.fillRect(0, 520, W, CELL);

  // Lane markings (dashed white lines between road lanes)
  ctx.strokeStyle='#555555';
  ctx.lineWidth=1;
  ctx.setLineDash([8,12]);
  for(const y of [360,400,440,480]){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

/* ═══ Update ═══ */
function update(dt){
  if(state!==PLAYING) return;

  // Level transition
  if(levelTransTimer>0){
    levelTransTimer-=dt;
    if(levelTransTimer<=0){
      nextLevel();
    }
    return;
  }

  // Death animation
  if(deathAnim){
    deathTimer-=dt;
    if(deathTimer<=0){
      deathAnim=false;
      if(lives<=0){
        state=GAME_OVER;
        if(score>highScore){highScore=score;saveHS();}
      } else {
        resetFrog();
      }
    }
    return;
  }

  // Hop animation
  if(hopAnim){
    hopTimer-=dt;
    if(hopTimer<=0){
      hopAnim=false;
      frog.x=hopTo.x;
      frog.y=hopTo.y;
    } else {
      const t=1-hopTimer/0.08;
      frog.x=hopFrom.x+(hopTo.x-hopFrom.x)*t;
      frog.y=hopFrom.y+(hopTo.y-hopFrom.y)*t;
    }
    // Still check collisions mid-hop? No — check after hop completes
    if(hopAnim) return;
  }

  // Timer
  timer-=dt;
  if(timer<=0){
    timer=0;
    killFrog('time');
    return;
  }

  // Movement input (grid-snapped, one hop per press)
  if(frog.alive && !hopAnim){
    let dx=0, dy=0;
    if(justPressed['ArrowUp']||justPressed['KeyW']){dy=-CELL;}
    else if(justPressed['ArrowDown']||justPressed['KeyS']){dy=CELL;}
    else if(justPressed['ArrowLeft']||justPressed['KeyA']){dx=-CELL;}
    else if(justPressed['ArrowRight']||justPressed['KeyD']){dx=CELL;}

    if(dx!==0||dy!==0){
      const nx=clamp(frog.x+dx, 0, (COLS-1)*CELL);
      const ny=clamp(frog.y+dy, PF_TOP, rowY(12));
      if(nx!==frog.x||ny!==frog.y){
        hopFrom={x:frog.x,y:frog.y};
        hopTo={x:nx,y:ny};
        hopAnim=true;
        hopTimer=0.08;
        sfxHop();

        // Forward progress scoring
        const newRow=Math.round((ny-PF_TOP)/CELL);
        if(newRow<maxRowReached){
          score+=10*(maxRowReached-newRow);
          maxRowReached=newRow;
        }
      }
    }
  }
  // Clear justPressed each frame
  for(const k in justPressed) delete justPressed[k];

  // Move vehicles
  for(const v of vehicles){
    v.x+=v.vx*dt;
    if(v.vx>0 && v.x>W) v.x=-v.w;
    if(v.vx<0 && v.x+v.w<0) v.x=W;
  }

  // Move platforms + dive cycles
  for(const p of platforms){
    p.x+=p.vx*dt;
    if(p.vx>0 && p.x>W) p.x=-p.w;
    if(p.vx<0 && p.x+p.w<0) p.x=W;

    // Dive cycle for divers
    if(p.isDiver){
      p.diveTimer+=dt;
      // Cycle: 0-3s visible, 3-4s sinking, 4-6s submerged, 6-7s rising
      const cycle=p.diveTimer%7;
      if(cycle<3) p.divePhase=0;        // visible
      else if(cycle<4) p.divePhase=1;   // sinking (blink)
      else if(cycle<6) p.divePhase=2;   // submerged
      else p.divePhase=3;               // rising (blink)
    }
  }

  // Riding logic — frog in river zone
  frog.ridingVx=0;
  const frogRow=Math.round((frog.y-PF_TOP)/CELL);
  const inRiver=(frogRow>=1 && frogRow<=5); // rows 1-5 = river lanes

  if(frog.alive && !hopAnim && inRiver){
    // Check home bay first (row 0)
    // Actually row 0 is home bays, rows 1-5 are river
    let onPlatform=false;
    const fcx=frog.x+16, fcy=frog.y+16; // frog center
    for(const p of platforms){
      // Skip submerged turtles
      if(p.isDiver && p.divePhase===2) continue;
      const pRow=p.lane;
      if(pRow!==frogRow) continue;
      // AABB check frog center vs platform rect
      if(fcx>=p.x && fcx<=p.x+p.w && fcy>=p.y && fcy<=p.y+p.h){
        onPlatform=true;
        frog.ridingVx=p.vx;
        // Check if diver is sinking while frog is on it
        if(p.isDiver && p.divePhase===2){
          onPlatform=false; // shouldn't reach here but safety
        }
        break;
      }
    }
    if(!onPlatform){
      killFrog('splash');
      return;
    }
    // Apply riding
    frog.x+=frog.ridingVx*dt;
    // Off-screen check
    if(frog.x+32<0 || frog.x>W){
      killFrog('splash');
      return;
    }
  }

  // Check home bay arrival (row 0)
  if(frog.alive && !hopAnim && frogRow===0){
    let landedBay=false;
    for(let i=0;i<5;i++){
      const b=BAYS[i];
      const fcx=frog.x+16;
      if(fcx>=b.x && fcx<=b.x+BAY_W){
        if(baysFilled[i]){
          // Filled bay = death
          killFrog('splash');
          return;
        } else {
          // Fill bay
          baysFilled[i]=true;
          const timeBonus=Math.floor(timer)*2;
          score+=50+timeBonus;
          if(score>highScore){highScore=score;saveHS();}
          sfxBay();
          landedBay=true;

          // Check all bays filled
          if(baysFilled.every(b=>b)){
            score+=1000;
            if(score>highScore){highScore=score;saveHS();}
            sfxLevel();
            levelTransTimer=1.5;
          }
          resetFrog();
          break;
        }
      }
    }
    if(!landedBay && !deathAnim){
      // Landed on gap between bays = death
      killFrog('splash');
    }
    return;
  }

  // Road collision
  if(frog.alive && !hopAnim && frogRow>=7 && frogRow<=11){
    const fRect={x:frog.x+4,y:frog.y+4,w:24,h:24}; // slightly smaller hitbox
    for(const v of vehicles){
      const vRow=v.lane;
      if(vRow!==frogRow) continue;
      if(fRect.x<v.x+v.w && fRect.x+fRect.w>v.x && fRect.y<v.y+v.h && fRect.y+fRect.h>v.y){
        killFrog('squash');
        return;
      }
    }
  }
}

function killFrog(type){
  if(!frog.alive) return;
  frog.alive=false;
  lives--;
  deathAnim=true;
  deathTimer=0.5;
  if(type==='splash') sfxSplash();
  else if(type==='squash') sfxSquash();
  else sfxSquash();
}

function nextLevel(){
  level++;
  baysFilled=[false,false,false,false,false];
  const speedMult=Math.pow(1.15, level-1);
  vehicles=makeVehicles(speedMult);
  platforms=makePlatforms(speedMult);
  resetFrog();
}

/* ═══ Render ═══ */
function render(dt){
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  if(state===IDLE){
    drawStartScreen(dt);
    return;
  }

  drawBackground();

  // Platforms (logs + turtles)
  for(const p of platforms){
    if(p.isDiver && p.divePhase===2) continue; // submerged = invisible
    if(p.isDiver && (p.divePhase===1||p.divePhase===3)){
      // Blink at 8Hz
      if(Math.floor(performance.now()/125)%2===0) continue;
    }
    ctx.fillStyle=p.color;
    if(p.type==='log'){
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, 6);
      ctx.fill();
      // Log texture lines
      ctx.strokeStyle='#664411';
      ctx.lineWidth=1;
      for(let lx=p.x+15;lx<p.x+p.w-10;lx+=20){
        ctx.beginPath();
        ctx.moveTo(lx,p.y+4);
        ctx.lineTo(lx+8,p.y+p.h-4);
        ctx.stroke();
      }
    } else {
      // Turtle group — draw individual turtle shells
      const shellW=p.w/(p.w>100?3:2);
      const count=p.w>100?3:2;
      for(let i=0;i<count;i++){
        const sx=p.x+i*shellW+2;
        const sw=shellW-4;
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.ellipse(sx+sw/2, p.y+p.h/2, sw/2, p.h/2-2, 0, 0, Math.PI*2);
        ctx.fill();
        // Shell pattern
        ctx.strokeStyle='#336633';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.ellipse(sx+sw/2, p.y+p.h/2, sw/3, p.h/3, 0, 0, Math.PI*2);
        ctx.stroke();
      }
    }
  }

  // Vehicles
  for(const v of vehicles){
    ctx.fillStyle=v.color;
    ctx.beginPath();
    ctx.roundRect(v.x, v.y, v.w, v.h, 4);
    ctx.fill();
    // Windshield
    ctx.fillStyle='rgba(100,200,255,0.3)';
    if(v.vx>0){
      ctx.fillRect(v.x+v.w-12, v.y+4, 8, v.h-8);
    } else {
      ctx.fillRect(v.x+4, v.y+4, 8, v.h-8);
    }
    // Wheels
    ctx.fillStyle='#111111';
    ctx.fillRect(v.x+4,v.y+v.h-4,8,4);
    ctx.fillRect(v.x+v.w-12,v.y+v.h-4,8,4);
  }

  // Frog
  if(frog.alive && !deathAnim){
    drawFrog(frog.x+4, frog.y+4, 32);
  } else if(deathAnim){
    // Flash red 3 times over 0.5s
    const flash=Math.floor((0.5-deathTimer)*6);
    if(flash%2===0){
      ctx.fillStyle='#FF0000';
      ctx.beginPath();
      ctx.roundRect(frog.x+4,frog.y+4,32,32,4);
      ctx.fill();
    }
  }

  // HUD
  drawHUD();

  // Timer bar
  const timerFrac=timer/TIMER_MAX;
  const barW=560*timerFrac;
  let barColor;
  if(timerFrac>0.5) barColor='#22CC22';
  else if(timerFrac>0.25) barColor='#CCCC00';
  else barColor='#DD2222';
  ctx.fillStyle='#222222';
  ctx.fillRect(20, 680, 560, 12);
  ctx.fillStyle=barColor;
  ctx.fillRect(20, 680, barW, 12);

  // Stage transition text
  if(levelTransTimer>0){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFFFFF';
    ctx.font='bold 32px monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('LEVEL '+(level+1),W/2,H/2);
  }

  if(state===PAUSED) drawPause();
  if(state===GAME_OVER) drawGameOver();
}

function drawHUD(){
  // Score top-left
  ctx.fillStyle='#FFFFFF';
  ctx.font='16px monospace';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Score: '+score, 10, 8);

  // High Score top-right
  ctx.textAlign='right';
  ctx.fillText('Best: '+highScore, W-10, 8);

  // Lives bottom-left
  ctx.textAlign='left';
  for(let i=0;i<lives;i++){
    drawMiniFrog(10+i*24, H-34, 18);
  }
  ctx.fillStyle='#FFFFFF';
  ctx.font='14px monospace';
  ctx.fillText('×'+lives, 10+lives*24+4, H-32);

  // Level bottom-right
  ctx.fillStyle='#AAAAAA';
  ctx.font='14px monospace';
  ctx.textAlign='right';
  ctx.fillText('Level: '+level, W-10, H-32);
}

function drawStartScreen(dt){
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  // Scrolling starfield effect (water shimmer)
  ctx.fillStyle='#003388';
  for(let i=0;i<30;i++){
    const sx=(i*37+performance.now()*0.02)%W;
    const sy=(i*53+performance.now()*0.01)%H;
    ctx.fillRect(sx,sy,2,2);
  }

  // Title
  ctx.fillStyle='#22CC22';
  ctx.font='bold 52px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('FROGGER',W/2,280);

  // Frog icon
  drawFrog(W/2-16, 310, 32);

  // Prompt
  ctx.fillStyle='#AAAAAA';
  ctx.font='20px monospace';
  ctx.fillText('Press Enter to Start',W/2,380);

  if(highScore>0){
    ctx.fillStyle='#FFFF00';
    ctx.font='14px monospace';
    ctx.fillText('High Score: '+highScore,W/2,420);
  }

  // Controls
  ctx.fillStyle='#555555';
  ctx.font='14px monospace';
  ctx.fillText('Arrow Keys / WASD to Move',W/2,520);
  ctx.fillText('P to Pause',W/2,545);
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 36px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('PAUSED',W/2,H/2);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 40px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('GAME OVER',W/2,H/2-50);
  ctx.font='24px monospace';
  ctx.fillText('Score: '+score,W/2,H/2+10);
  ctx.fillText('High Score: '+highScore,W/2,H/2+45);
  ctx.fillStyle='#AAAAAA';
  ctx.font='20px monospace';
  ctx.fillText('Press Enter to Restart',W/2,H/2+90);
}

/* ═══ Main Loop ═══ */
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-(lastTs||ts))/1000,0.05);
  lastTs=ts;
  // Clear justPressed at start of each frame after update uses them
  if(state===PLAYING) update(dt);
  else { for(const k in justPressed) delete justPressed[k]; }
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
