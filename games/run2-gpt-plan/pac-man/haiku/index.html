<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
      border: 2px solid #222;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="700" height="780"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // PAC-MAN GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 700;
    const CANVAS_HEIGHT = 780;
    const MAZE_COLS = 28;
    const MAZE_ROWS = 31;
    const CELL_SIZE = 24;
    const MAZE_X = 14;
    const MAZE_Y = 30;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let level = 1;
    let pelletsRemaining = 0;
    let pelletsEaten = 0;

    try {
      highScore = parseInt(localStorage.getItem('pacman_high_score') || '0');
    } catch (e) {}

    // ── Maze ────────────────────────────────────────────────────────────
    const maze = [
      '############################',
      '#......#........#........#.#',
      '#.##.###.######.######.##.#',
      '#.#...................#.#.#',
      '#.#.##.#####.####.#####.#.#',
      '#...#.#.....#....#.....#...#',
      '####.#.#####.####.#####.####',
      '#........#....#........#...#',
      '#.######.####.#.####.####..#',
      '#.#....#.#......#....#....#',
      '#.#.##.#.#.####.#.##.####.#',
      '#...#...#.......#...#......#',
      '##########.####.##########.#',
      '#....#.#.#.#..#.#.#....#...#',
      ' #######.#.####.#.####.#### ',
      '#....#.#.....#.....#.#.#...#',
      '#.####.#####.#####.#.#.###.#',
      '#................#...#.....#',
      '####.########.####.########.#',
      '#....#.#....#......#.#....#.#',
      '#.##.#.#.##.#.####.#.####.#.#',
      '#.#...#...#...#....#....#...#',
      '#.#.#########.#.####.##.###.#',
      '#...#.......#.#.....#.......#',
      '#####.#####.#.#####.#.#####.#',
      '#.#...#...#.....#...#.....#.#',
      '#.#.###.#.#####.#.#####.###.#',
      '#...#...#.......#.......#...#',
      '####.##########.#############',
      '#................#.............',
      '############################'
    ];

    const pellets = new Set();
    const powerPellets = new Set();

    function initPellets() {
      pellets.clear();
      powerPellets.clear();
      for (let r = 0; r < MAZE_ROWS; r++) {
        for (let c = 0; c < MAZE_COLS; c++) {
          if (maze[r][c] === '.') {
            pellets.add(r * MAZE_COLS + c);
          }
        }
      }
      powerPellets.add(3 * MAZE_COLS + 1);
      powerPellets.add(3 * MAZE_COLS + 26);
      powerPellets.add(23 * MAZE_COLS + 1);
      powerPellets.add(23 * MAZE_COLS + 26);
      pellets.delete(3 * MAZE_COLS + 1);
      pellets.delete(3 * MAZE_COLS + 26);
      pellets.delete(23 * MAZE_COLS + 1);
      pellets.delete(23 * MAZE_COLS + 26);
      pelletsRemaining = pellets.size + powerPellets.size;
      pelletsEaten = 0;
    }

    // ── Pac-Man ─────────────────────────────────────────────────────────
    const pacman = {
      col: 14,
      row: 23,
      direction: 0,
      nextDirection: 0,
      mouthAngle: 0
    };

    // ── Ghosts ──────────────────────────────────────────────────────────
    const ghosts = [
      { name: 'Blinky', col: 13, row: 14, color: '#FF0000', speed: 110, state: 'house', mode: 'scatter' },
      { name: 'Pinky', col: 14, row: 15, color: '#FFB8FF', speed: 110, state: 'house', mode: 'scatter' },
      { name: 'Inky', col: 15, row: 15, color: '#00FFFF', speed: 110, state: 'house', mode: 'scatter' },
      { name: 'Clyde', col: 14, row: 16, color: '#FFB852', speed: 110, state: 'house', mode: 'scatter' }
    ];

    let frightenedTimer = 0;
    let fruitActive = false;
    let fruitTimer = 0;
    let ghostsEatenThisPower = 0;

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.key]) {
        keys[e.key] = true;
        if (e.key === 'Enter') {
          if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
            startGame();
          }
        }
        if (e.key === 'p' || e.key === 'P') {
          if (gameState === GAME_STATES.PLAYING) {
            gameState = GAME_STATES.PAUSED;
          } else if (gameState === GAME_STATES.PAUSED) {
            gameState = GAME_STATES.PLAYING;
          }
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ──────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxChomp() { playTone(400, 0.1); }
    function sfxPowerPellet() { playTone(150, 0.3); }
    function sfxGhostEat() { playTone(800, 0.15); }

    // ── Game Logic ─────────────────────────────────────────────────────
    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = 3;
      level = 1;
      pacman.col = 14;
      pacman.row = 23;
      pacman.direction = 0;
      pacman.nextDirection = 0;
      ghostsEatenThisPower = 0;
      frightenedTimer = 0;
      fruitActive = false;
      initPellets();
      resetGhosts();
    }

    function resetGhosts() {
      ghosts[0].col = 13;
      ghosts[0].row = 14;
      ghosts[1].col = 14;
      ghosts[1].row = 15;
      ghosts[2].col = 15;
      ghosts[2].row = 15;
      ghosts[3].col = 14;
      ghosts[3].row = 16;
      for (const ghost of ghosts) {
        ghost.state = 'house';
        ghost.mode = 'scatter';
        ghost.speed = 110;
      }
    }

    function isTileWalkable(col, row) {
      if (col < 0 || col >= MAZE_COLS || row < 0 || row >= MAZE_ROWS) return true;
      return maze[row][col] !== '#';
    }

    function canMove(col, row) {
      return isTileWalkable(col, row);
    }

    function updatePacman(dt) {
      // Queue direction
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) pacman.nextDirection = 3;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) pacman.nextDirection = 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) pacman.nextDirection = 2;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) pacman.nextDirection = 0;

      // Try to turn
      let newCol = pacman.col;
      let newRow = pacman.row;
      if (pacman.nextDirection === 0) {
        newRow = pacman.row + 1;
      } else if (pacman.nextDirection === 1) {
        newCol = pacman.col + 1;
      } else if (pacman.nextDirection === 2) {
        newRow = pacman.row - 1;
      } else if (pacman.nextDirection === 3) {
        newCol = pacman.col - 1;
      }

      // Tunnel wrap
      if (newCol < 0) newCol = MAZE_COLS - 1;
      if (newCol >= MAZE_COLS) newCol = 0;

      if (canMove(newCol, newRow)) {
        pacman.direction = pacman.nextDirection;
        pacman.col = newCol;
        pacman.row = newRow;
      } else {
        // Try current direction
        newCol = pacman.col;
        newRow = pacman.row;
        if (pacman.direction === 0) {
          newRow = pacman.row + 1;
        } else if (pacman.direction === 1) {
          newCol = pacman.col + 1;
        } else if (pacman.direction === 2) {
          newRow = pacman.row - 1;
        } else if (pacman.direction === 3) {
          newCol = pacman.col - 1;
        }

        if (newCol < 0) newCol = MAZE_COLS - 1;
        if (newCol >= MAZE_COLS) newCol = 0;

        if (canMove(newCol, newRow)) {
          pacman.col = newCol;
          pacman.row = newRow;
        }
      }

      pacman.mouthAngle = (pacman.mouthAngle + 0.05) % (Math.PI * 2);

      // Check pellet
      const pelletKey = pacman.row * MAZE_COLS + pacman.col;
      if (pellets.has(pelletKey)) {
        pellets.delete(pelletKey);
        score += 10;
        pelletsEaten++;
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('pacman_high_score', String(highScore));
          } catch (e) {}
        }
        sfxChomp();
      }

      if (powerPellets.has(pelletKey)) {
        powerPellets.delete(pelletKey);
        score += 50;
        pelletsEaten++;
        frightenedTimer = 6;
        ghostsEatenThisPower = 0;
        for (const ghost of ghosts) {
          if (ghost.state !== 'eyes') {
            ghost.direction = (ghost.direction + 2) % 4;
          }
        }
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('pacman_high_score', String(highScore));
          } catch (e) {}
        }
        sfxPowerPellet();
      }

      if (pelletsRemaining === pellets.size + powerPellets.size) {
        level++;
        initPellets();
        resetGhosts();
      }
    }

    function updateGhosts(dt) {
      frightenedTimer = Math.max(0, frightenedTimer - dt);

      for (const ghost of ghosts) {
        if (ghost.state === 'eyes') {
          ghost.speed = 200;
          if (ghost.col === 14 && ghost.row === 15) {
            ghost.state = 'house';
            ghost.speed = 110;
          }
        } else if (frightenedTimer > 0) {
          ghost.speed = 60;
        } else {
          ghost.speed = 110;
        }

        if (Math.random() < 0.1) {
          let dir = Math.floor(Math.random() * 4);
          let newCol = ghost.col + (dir === 1 ? 1 : dir === 3 ? -1 : 0);
          let newRow = ghost.row + (dir === 0 ? 1 : dir === 2 ? -1 : 0);

          if (newCol < 0) newCol = MAZE_COLS - 1;
          if (newCol >= MAZE_COLS) newCol = 0;

          if (canMove(newCol, newRow)) {
            ghost.col = newCol;
            ghost.row = newRow;
          }
        }
      }
    }

    function checkCollisions() {
      for (const ghost of ghosts) {
        if (pacman.col === ghost.col && pacman.row === ghost.row) {
          if (frightenedTimer > 0 && ghost.state !== 'eyes') {
            ghost.state = 'eyes';
            ghost.direction = 0;
            ghostsEatenThisPower++;
            const points = [200, 400, 800, 1600][Math.min(3, ghostsEatenThisPower - 1)];
            score += points;
            if (score > highScore) {
              highScore = score;
              try {
                localStorage.setItem('pacman_high_score', String(highScore));
              } catch (e) {}
            }
            sfxGhostEat();
          } else if (ghost.state !== 'eyes') {
            lives--;
            if (lives <= 0) {
              gameState = GAME_STATES.GAME_OVER;
            } else {
              pacman.col = 14;
              pacman.row = 23;
              resetGhosts();
              frightenedTimer = 0;
            }
            return;
          }
        }
      }

      // Fruit
      if (fruitActive && pacman.col === 14 && pacman.row === 17) {
        fruitActive = false;
        score += 100;
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('pacman_high_score', String(highScore));
          } catch (e) {}
        }
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        updatePacman(dt);
        updateGhosts(dt);
        checkCollisions();

        fruitTimer += dt;
        if ((pelletsEaten === 70 || pelletsEaten === 170) && !fruitActive) {
          fruitActive = true;
          fruitTimer = 0;
        }
        if (fruitActive && fruitTimer > 10) {
          fruitActive = false;
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw maze
      ctx.strokeStyle = '#0066FF';
      ctx.lineWidth = 2;
      for (let r = 0; r < MAZE_ROWS; r++) {
        for (let c = 0; c < MAZE_COLS; c++) {
          if (maze[r][c] === '#') {
            ctx.strokeRect(MAZE_X + c * CELL_SIZE, MAZE_Y + r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
      }

      // Draw pellets
      ctx.fillStyle = '#FFCC99';
      for (const key of pellets) {
        const r = Math.floor(key / MAZE_COLS);
        const c = key % MAZE_COLS;
        ctx.beginPath();
        ctx.arc(MAZE_X + c * CELL_SIZE + CELL_SIZE / 2, MAZE_Y + r * CELL_SIZE + CELL_SIZE / 2, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw power pellets (blinking)
      if (Math.floor(Date.now() / 200) % 2 === 0) {
        for (const key of powerPellets) {
          const r = Math.floor(key / MAZE_COLS);
          const c = key % MAZE_COLS;
          ctx.beginPath();
          ctx.arc(MAZE_X + c * CELL_SIZE + CELL_SIZE / 2, MAZE_Y + r * CELL_SIZE + CELL_SIZE / 2, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw Pac-Man
      ctx.fillStyle = '#FFFF00';
      const pacX = MAZE_X + pacman.col * CELL_SIZE + CELL_SIZE / 2;
      const pacY = MAZE_Y + pacman.row * CELL_SIZE + CELL_SIZE / 2;
      ctx.beginPath();
      const mouthOpen = Math.abs(Math.sin(pacman.mouthAngle)) * 0.3;
      ctx.arc(pacX, pacY, 10, pacman.direction * Math.PI / 2 + mouthOpen, 
              pacman.direction * Math.PI / 2 + Math.PI * 2 - mouthOpen);
      ctx.lineTo(pacX, pacY);
      ctx.fill();

      // Draw ghosts
      for (const ghost of ghosts) {
        const gx = MAZE_X + ghost.col * CELL_SIZE + CELL_SIZE / 2;
        const gy = MAZE_Y + ghost.row * CELL_SIZE + CELL_SIZE / 2;

        if (ghost.state === 'eyes') {
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.arc(gx - 4, gy, 3, 0, Math.PI * 2);
          ctx.arc(gx + 4, gy, 3, 0, Math.PI * 2);
          ctx.fill();
        } else if (frightenedTimer > 0) {
          ctx.fillStyle = '#0066FF';
          ctx.fillRect(gx - 10, gy - 10, 20, 20);
        } else {
          ctx.fillStyle = ghost.color;
          ctx.fillRect(gx - 10, gy - 10, 20, 20);
        }
      }

      // Draw fruit
      if (fruitActive) {
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(MAZE_X + 14 * CELL_SIZE + CELL_SIZE / 2, MAZE_Y + 17 * CELL_SIZE + CELL_SIZE / 2, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 15);

      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH - 10, 15);

      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${lives}`, 10, CANVAS_HEIGHT - 5);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#AAA';
      ctx.fillText(`Level ${level}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 5);

      // Draw overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFFF00';
      ctx.font = '54px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAC-MAN', CANVAS_WIDTH / 2, 300);
      ctx.font = '20px monospace';
      ctx.fillStyle = '#FFF';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 380);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 390);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 340);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 390);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 440);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)
  try { window.__qa = {
    stateNum:  typeof state !== 'undefined' ? state : (typeof gameState !== 'undefined' ? gameState : null),
    pacX:      typeof pac   !== 'undefined' ? (pac.x  != null ? pac.x  : null) : null,
    pacY:      typeof pac   !== 'undefined' ? (pac.y  != null ? pac.y  : null) : null,
    pacDx:     typeof pac   !== 'undefined' ? (pac.dx != null ? pac.dx : null) : null,
    pacDy:     typeof pac   !== 'undefined' ? (pac.dy != null ? pac.dy : null) : null,
    pacNextDx: typeof pac   !== 'undefined' ? (pac.nextDx != null ? pac.nextDx : (pac.requestedDx != null ? pac.requestedDx : null)) : null,
    pacNextDy: typeof pac   !== 'undefined' ? (pac.nextDy != null ? pac.nextDy : (pac.requestedDy != null ? pac.requestedDy : null)) : null,
    score:     typeof score !== 'undefined' ? score : null,
    lives:     typeof lives !== 'undefined' ? lives : null,
    ts: Date.now(),
  }; } catch(e) { window.__qaErr = String(e); }

    }

    // ── Initialize ─────────────────────────────────────────────────────
    initPellets();
    requestAnimationFrame(gameLoop);
  </script>
