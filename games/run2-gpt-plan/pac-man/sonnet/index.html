<!DOCTYPE html>
<html lang="en">

<body>
<canvas id="c" width="560" height="720"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TW = 20, TH = 20; // tile size
const COLS = 28, ROWS = 31;
const OX = 0, OY = 60; // maze offset

// Maze definition (28 wide x 31 tall)
// 0=path, 1=wall, 2=dot, 3=power, 4=ghost-house, 5=tunnel
const MAZE_RAW = [
"1111111111111111111111111111",
"1222222222222122222222222221",
"1211112111121121112111121121",  // wait, need power pellets
"1311112111121121112111121131",

"1111121100111111001121111111",
"111112110144444441011211111 1",
"0000001100100000100110000000",
"111112110144444441011211111 1",
"1111121100111111001121111111",
"1111121100000000001121111111",
"1111121100111111001121111111",

"1211112111121121112111121121",

"1222122222222222222222221221",

];

// Simplified clean maze
const MAZE = [];
const mazeStr = [

"#............##............#",
"#.####.#####.##.#####.####.#",
"#o####.#####.##.#####.####o#",

// Build tile map: 0=empty, 1=wall, 2=dot, 3=power, 4=house, 5=tunnel
function buildMaze() {
  const tiles = [];
  const rows = [
    "############################",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#O####.#####.##.#####.####O#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "#.####.##.########.##.####.#",
    "#.####.##.########.##.####.#",
    "#......##....##....##......#",
    "######.#####.##.#####.######",
    "######.#####.##.#####.######",
    "######.##          ##.######",
    "######.## ###--### ##.######",
    "T     .   #      #   .     T",
    "######.## ######## ##.######",
    "######.##          ##.######",
    "######.## ######## ##.######",
    "######.##.########.##.######",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#O..##................##..O#",
    "###.##.##.########.##.##.###",
    "###.##.##.########.##.##.###",
    "#......##....##....##......#",
    "#.##########.##.##########.#",
    "#.##########.##.##########.#",
    "#..........................#",
    "#.####.#####.##.#####.####.#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "############################",
  ];
  
  for (const row of rows) {
    const tileRow = [];
    for (let i = 0; i < COLS; i++) {
      const ch = row[i] || ' ';
      if (ch === '#') tileRow.push(1);
      else if (ch === '.') tileRow.push(2);
      else if (ch === 'O') tileRow.push(3);
      else if (ch === '-') tileRow.push(4); // ghost door
      else if (ch === 'T') tileRow.push(5); // tunnel
      else if (ch === ' ') tileRow.push(0); // ghost house interior
      else tileRow.push(0);
    }
    tiles.push(tileRow);
  }
  return tiles;
}

let tiles = buildMaze();
let dotCount = 0;

function countDots() {
  dotCount = 0;
  for (const row of tiles) for (const t of row) if (t === 2 || t === 3) dotCount++;
}

// State
let state = 'start';
let score = 0, hi = parseInt(localStorage.getItem('pm_hi')||0);
let lives = 3, level = 1;
let pacman, ghosts, frightTimer = 0, eatCombo = 0;
let globalMode = 'scatter', globalModeTimer = 0;
const modeSequence = [7, 20, 7, 20, 5, 20, 5, 999];
let modeIdx = 0;
let readyTimer = 0;
let gameFrame = 0;

function initGame() {
  tiles = buildMaze();
  countDots();
  
  pacman = {
    x: 13.5 * TW + OX, y: 23 * TH + OY,
    tx: 13, ty: 23, // tile pos
    dir: 0, nextDir: 0, // 0=right,1=down,2=left,3=up
    mouthAngle: 0.2, mouthOpen: true,
    speed: 120, // px/s
    alive: true
  };
  
  const ghostDefs = [
    { name:'blinky', color:'#FF0000', sx:13, sy:11, scatterX:25, scatterY:0, mode:'scatter' },
    { name:'pinky',  color:'#FFB8FF', sx:13, sy:14, scatterX:2,  scatterY:0, mode:'house' },
    { name:'inky',   color:'#00FFFF', sx:11, sy:14, scatterX:27, scatterY:30,mode:'house' },
    { name:'clyde',  color:'#FFB852', sx:15, sy:14, scatterX:0,  scatterY:30,mode:'house' },
  ];
  
  ghosts = ghostDefs.map((g, i) => ({
    ...g,
    x: g.sx * TW + OX, y: g.sy * TH + OY,
    dir: 2, speed: 110, frightened: false, eaten: false,
    houseTimer: i * 200, exitTimer: 0,
    frame: 0
  }));
  
  frightTimer = 0;
  eatCombo = 0;
  globalMode = 'scatter';
  globalModeTimer = 0;
  modeIdx = 0;
  readyTimer = 180;
  gameFrame = 0;
}

const DIRS = [{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0},{dx:0,dy:-1}];
const dirKeys = ['ArrowRight','KeyD','ArrowLeft','KeyA','ArrowUp','KeyW','ArrowDown','KeyS'];

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter' && state !== 'playing') { state = 'playing'; initGame(); }
  if (e.code === 'KeyP') state = state === 'paused' ? 'playing' : 'paused';
  if ((e.code==='ArrowRight'||e.code==='KeyD')) pacman && (pacman.nextDir = 0);
  if ((e.code==='ArrowDown'||e.code==='KeyS'))  pacman && (pacman.nextDir = 1);
  if ((e.code==='ArrowLeft'||e.code==='KeyA'))  pacman && (pacman.nextDir = 2);
  if ((e.code==='ArrowUp'||e.code==='KeyW'))    pacman && (pacman.nextDir = 3);
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function isWall(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return true;
  const t = tiles[ty] && tiles[ty][tx];
  return t === 1 || t === 4;
}

function isWallForGhost(tx, ty) {
  if (tx < 0) tx = COLS - 1;
  if (tx >= COLS) tx = 0;
  if (ty < 0 || ty >= ROWS) return true;
  const t = tiles[ty] && tiles[ty][tx];
  return t === 1;
}

let lastTime = 0;

function update(dt) {
  if (state !== 'playing') return;
  if (readyTimer > 0) { readyTimer--; return; }
  
  gameFrame++;
  
  // Global mode timer
  globalModeTimer += dt;
  const modeLimit = modeSequence[modeIdx];
  if (globalModeTimer >= modeLimit) {
    globalModeTimer = 0;
    modeIdx = Math.min(modeIdx + 1, modeSequence.length - 1);
    globalMode = modeIdx % 2 === 0 ? 'scatter' : 'chase';
    // Reverse all non-frightened ghosts
    for (const g of ghosts) {
      if (!g.frightened && !g.eaten) g.dir = (g.dir + 2) % 4;
    }
  }
  
  if (frightTimer > 0) {
    frightTimer -= dt;
    if (frightTimer <= 0) {
      for (const g of ghosts) g.frightened = false;
    }
  }
  
  // Move pacman
  movePacman(dt);
  
  // Check dot eating
  const ptx = Math.round((pacman.x - OX) / TW);
  const pty = Math.round((pacman.y - OY) / TH);
  if (ptx >= 0 && ptx < COLS && pty >= 0 && pty < ROWS) {
    const t = tiles[pty][ptx];
    if (t === 2) { tiles[pty][ptx] = 0; score += 10; dotCount--; }
    else if (t === 3) {
      tiles[pty][ptx] = 0; score += 50; dotCount--;
      frightTimer = 8;
      eatCombo = 0;
      for (const g of ghosts) { g.frightened = true; g.dir = (g.dir+2)%4; }
    }
  }
  
  // Move ghosts
  for (const g of ghosts) moveGhost(g, dt);
  
  // Check ghost collisions
  for (const g of ghosts) {
    if (g.eaten) continue;
    const dx = pacman.x - g.x, dy = pacman.y - g.y;
    if (Math.abs(dx) < 14 && Math.abs(dy) < 14) {
      if (g.frightened) {
        g.frightened = false; g.eaten = true;
        eatCombo++;
        score += [200,400,800,1600][Math.min(eatCombo-1,3)];
      } else {
        // Die
        lives--;
        if (lives <= 0) {
          state = 'gameover';
          if (score > hi) { hi = score; localStorage.setItem('pm_hi', hi); }
        } else {
          readyTimer = 120;
          // Reset positions
          pacman.x = 13.5*TW+OX; pacman.y = 23*TH+OY; pacman.dir = 0; pacman.nextDir = 0;
          for (let i = 0; i < ghosts.length; i++) {
            ghosts[i].x = ghosts[i].sx*TW+OX;
            ghosts[i].y = ghosts[i].sy*TH+OY;
            ghosts[i].frightened = false; ghosts[i].eaten = false;
          }
          frightTimer = 0;
        }
        return;
      }
    }
  }
  
  // All dots cleared
  if (dotCount <= 0) {
    level++;
    tiles = buildMaze();
    countDots();
    readyTimer = 180;
    pacman.x=13.5*TW+OX; pacman.y=23*TH+OY; pacman.dir=0; pacman.nextDir=0;
    for (let i=0;i<ghosts.length;i++){
      ghosts[i].x=ghosts[i].sx*TW+OX; ghosts[i].y=ghosts[i].sy*TH+OY;
      ghosts[i].frightened=false; ghosts[i].eaten=false;
    }
  }
  
  // Mouth animation
  pacman.mouthAngle += pacman.mouthOpen ? 0.08 : -0.08;
  if (pacman.mouthAngle >= 0.35) pacman.mouthOpen = false;
  if (pacman.mouthAngle <= 0.02) pacman.mouthOpen = true;
}

function movePacman(dt) {
  const speed = pacman.speed * dt;
  
  // Try to turn to nextDir
  const nd = DIRS[pacman.nextDir];
  const ntx = Math.round((pacman.x - OX) / TW) + nd.dx;
  const nty = Math.round((pacman.y - OY) / TH) + nd.dy;
  
  // Can we make the turn?
  const snapX = Math.round((pacman.x - OX) / TW) * TW + OX;
  const snapY = Math.round((pacman.y - OY) / TH) * TH + OY;
  const closeToGrid = Math.abs(pacman.x - snapX) < speed+2 && Math.abs(pacman.y - snapY) < speed+2;
  
  if (closeToGrid && !isWall(ntx, nty)) {
    pacman.dir = pacman.nextDir;
    pacman.x = snapX; pacman.y = snapY;
  }
  
  // Move in current dir
  const d = DIRS[pacman.dir];
  const cx = Math.round((pacman.x - OX) / TW), cy = Math.round((pacman.y - OY) / TH);
  const nx = cx + d.dx, ny = cy + d.dy;
  
  if (!isWall(nx, ny)) {
    pacman.x += d.dx * speed;
    pacman.y += d.dy * speed;
  }
  
  // Tunnel wrap
  if (pacman.x < OX - TW) pacman.x = COLS * TW + OX - TW;
  if (pacman.x > COLS * TW + OX) pacman.x = OX;
}

function ghostTarget(g) {
  if (g.frightened) {
    // Random
    return { tx: Math.floor(Math.random()*COLS), ty: Math.floor(Math.random()*ROWS) };
  }
  if (g.eaten) {
    return { tx: 13, ty: 13 }; // ghost house
  }
  if (globalMode === 'scatter') {
    return { tx: g.scatterX, ty: g.scatterY };
  }
  // Chase
  const px = Math.round((pacman.x - OX) / TW);
  const py = Math.round((pacman.y - OY) / TH);
  const pd = DIRS[pacman.dir];
  
  if (g.name === 'blinky') return { tx: px, ty: py };
  if (g.name === 'pinky') return { tx: px + pd.dx*4, ty: py + pd.dy*4 };
  if (g.name === 'inky') {
    const bx = Math.round((ghosts[0].x - OX) / TW);
    const by = Math.round((ghosts[0].y - OY) / TH);
    const ix = px + pd.dx*2, iy = py + pd.dy*2;
    return { tx: ix*2-bx, ty: iy*2-by };
  }
  // Clyde: chase if far, scatter if close
  const dx = px - Math.round((g.x - OX)/TW), dy = py - Math.round((g.y - OY)/TH);
  if (dx*dx+dy*dy > 64) return { tx: px, ty: py };
  return { tx: g.scatterX, ty: g.scatterY };
}

function moveGhost(g, dt) {
  const speed = g.eaten ? 200 : (g.frightened ? 60 : g.speed);
  const step = speed * dt;
  
  // Ghost house exit logic
  if (g.mode === 'house') {
    g.houseTimer -= dt * 60;
    if (g.houseTimer <= 0) g.mode = 'active';
    else {
      // Bob up/down in house
      g.y += Math.sin(gameFrame * 0.1) * 0.5;
      return;
    }
  }
  
  // At tile center, choose new direction
  const gx = (g.x - OX) / TW, gy = (g.y - OY) / TH;
  const snapX = Math.round(gx) * TW + OX;
  const snapY = Math.round(gy) * TH + OY;
  
  if (Math.abs(g.x - snapX) < step + 1 && Math.abs(g.y - snapY) < step + 1) {
    g.x = snapX; g.y = snapY;
    const tgx = Math.round(gx), tgy = Math.round(gy);
    const { tx: targetX, ty: targetY } = ghostTarget(g);
    
    // Choose best direction (not reverse)
    let bestDir = g.dir, bestDist = Infinity;
    for (let d = 0; d < 4; d++) {
      if (d === (g.dir + 2) % 4) continue; // no reverse
      const nd = DIRS[d];
      const nx = tgx + nd.dx, ny = tgy + nd.dy;
      if (isWallForGhost(nx, ny)) continue;
      const ddx = nx - targetX, ddy = ny - targetY;
      const dist = ddx*ddx + ddy*ddy;
      if (dist < bestDist) { bestDist = dist; bestDir = d; }
    }
    g.dir = bestDir;
    
    // Eaten ghost returns to house
    if (g.eaten && tgx === 13 && tgy >= 11 && tgy <= 15) {
      g.eaten = false;
      g.frightened = false;
      g.mode = 'active';
    }
  }
  
  const d = DIRS[g.dir];
  g.x += d.dx * step;
  g.y += d.dy * step;
  
  // Tunnel wrap
  if (g.x < OX - TW) g.x = COLS * TW + OX;
  if (g.x > COLS * TW + OX) g.x = OX - TW;
}

function drawMaze() {
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const t = tiles[row][col];
      const x = col * TW + OX, y = row * TH + OY;
      
      if (t === 1) {
        ctx.fillStyle = '#0000CC';
        ctx.fillRect(x, y, TW, TH);
        ctx.strokeStyle = '#4444FF';
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, TW-2, TH-2);
      } else if (t === 2) {
        ctx.fillStyle = '#FFB8AE';
        ctx.beginPath();
        ctx.arc(x + TW/2, y + TH/2, 2, 0, Math.PI*2);
        ctx.fill();
      } else if (t === 3) {
        const blink = Math.floor(gameFrame/20) % 2;
        if (blink) {
          ctx.fillStyle = '#FFB8AE';
          ctx.beginPath();
          ctx.arc(x + TW/2, y + TH/2, 6, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (t === 4) {
        ctx.fillStyle = '#FF88FF';
        ctx.fillRect(x, y + TH/2 - 1, TW, 3);
      }
    }
  }
}

function drawGhost(g) {
  const x = g.x, y = g.y;
  let color = g.color;
  if (g.eaten) color = 'transparent';
  else if (g.frightened) {
    const flash = frightTimer < 2 && Math.floor(Date.now()/250)%2;
    color = flash ? '#FFFFFF' : '#0000CC';
  }
  
  if (g.eaten) {
    // Draw eyes only
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x-4, y-4, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-4, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00F';
    ctx.beginPath(); ctx.arc(x-4, y-4, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-4, 2, 0, Math.PI*2); ctx.fill();
    return;
  }
  
  ctx.fillStyle = color;
  // Body
  ctx.beginPath();
  ctx.arc(x, y - 4, 10, Math.PI, 0);
  ctx.lineTo(x+10, y+8);
  ctx.lineTo(x+6, y+4);
  ctx.lineTo(x+3, y+8);
  ctx.lineTo(x, y+4);
  ctx.lineTo(x-3, y+8);
  ctx.lineTo(x-6, y+4);
  ctx.lineTo(x-10, y+8);
  ctx.closePath();
  ctx.fill();
  
  if (!g.frightened) {
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x-4, y-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00F';
    const edir = DIRS[g.dir];
    ctx.beginPath(); ctx.arc(x-4+edir.dx*2, y-6+edir.dy*2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4+edir.dx*2, y-6+edir.dy*2, 1.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#FFF';
    ctx.fillRect(x-6, y-6, 4, 3);
    ctx.fillRect(x+2, y-6, 4, 3);
    ctx.fillStyle = '#FF0000';
    for (let i=-3; i<=3; i+=2) ctx.fillRect(x+i, y-2, 2, 2);
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 560, 720);
  
  // HUD
  ctx.fillStyle = '#FFF';
  ctx.font = '16px monospace';
  ctx.fillText(`SCORE: ${score}`, 10, 30);
  ctx.textAlign = 'center';
  ctx.fillText(`HI: ${hi}`, 280, 30);
  ctx.textAlign = 'right';
  ctx.fillText(`LV: ${level}`, 550, 30);
  ctx.textAlign = 'left';
  
  if (state === 'start') {
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAC-MAN', 280, 300);
    ctx.fillStyle = '#FFF';
    ctx.font = '20px monospace';
    ctx.fillText('Press ENTER to Start', 280, 380);
    ctx.textAlign = 'left';
    return;
  }
  
  if (state === 'gameover') {
    drawMaze();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, 560, 720);
    ctx.fillStyle = '#FF0000';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 280, 320);
    ctx.fillStyle = '#FFF';
    ctx.font = '20px monospace';
    ctx.fillText(`Score: ${score}`, 280, 380);
    ctx.fillText('Press ENTER to Restart', 280, 430);
    ctx.textAlign = 'left';
    return;
  }
  
  drawMaze();
  
  // Draw ghosts
  for (const g of ghosts) drawGhost(g);
  
  // Draw pacman
  if (pacman && pacman.alive) {
    const angle = pacman.mouthAngle * Math.PI;
    const rotation = [0, Math.PI/2, Math.PI, -Math.PI/2][pacman.dir];
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.moveTo(pacman.x, pacman.y);
    ctx.arc(pacman.x, pacman.y, 10, rotation + angle, rotation + Math.PI*2 - angle);
    ctx.closePath();
    ctx.fill();
  }
  
  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.arc(20 + i*25, 700, 8, 0.3, Math.PI*2-0.3);
    ctx.closePath();
    ctx.fill();
  }
  
  if (readyTimer > 0) {
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('READY!', 280, 500);
    ctx.textAlign = 'left';
  }
}

let _lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - _lastTs) / 1000, 0.05);
  _lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { _lastTs = ts; requestAnimationFrame(loop); });
</script>
