<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkey Kong (Opus)</title>
<style>
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  canvas { border: 1px solid #222; }
</style>
</head>
<body>
<canvas id="c" width="640" height="800"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W=640, H=800;

// Game state
let state='start', score=0, hi=+localStorage.getItem('dk2_hi')||0;
let lives=3, lv=1, bonus=5000, bonusTick=0;
let frame=0;

// Platforms [{x1,x2,y,tilt: 1=left-high, -1=right-high, 0=flat}]
const PLATS=[
  {x1:40,x2:600,y:740,tilt:0},
  {x1:40,x2:590,y:590,tilt:1},
  {x1:50,x2:600,y:440,tilt:-1},
  {x1:40,x2:590,y:290,tilt:1},
  {x1:40,x2:520,y:140,tilt:0},
];

// Ladders [{x, ytop, ybot, broken}]
const LADDS=[
  {x:510,ytop:590,ybot:740,broken:false},
  {x:130,ytop:440,ybot:590,broken:false},
  {x:490,ytop:290,ybot:440,broken:true},
  {x:180,ytop:140,ybot:290,broken:false},
  {x:410,ytop:140,ybot:290,broken:false},
];

// Get platform y at given x
function platY(idx, x) {
  const p=PLATS[idx];
  if(p.tilt===0) return p.y;
  const w=p.x2-p.x1;
  return p.tilt===1 ? p.y+(x-p.x1)/(w)*20 : p.y+(p.x2-x)/(w)*20;
}

// Find platform mario is standing on
function onPlat(mx, my, mh) {
  for(let i=0;i<PLATS.length;i++){
    const p=PLATS[i];
    if(mx+12<p.x1||mx+12>p.x2) continue;
    const py=platY(i,mx+12);
    if(my+mh>=py-5&&my+mh<=py+18) return {idx:i,py};
  }
  return null;
}

// Find ladder at position
function onLadd(mx, my, mh) {
  const cx=mx+12, cy=my+mh/2;
  for(const l of LADDS){
    if(Math.abs(cx-l.x)>18) continue;
    if(cy<l.ytop-10||cy>l.ybot+10) continue;
    if(l.broken){
      const mid=(l.ytop+l.ybot)/2;
      if(cy>mid-40&&cy<mid+40) continue; // broken section
    }
    return l;
  }
  return null;
}

// Mario
let M={x:80,y:700,vx:0,vy:0,onGround:false,climbing:false,facing:1,
        hammer:false,hammerT:0,f:0,ft:0};

// DK
let DK={x:80,y:88,f:0,ft:0,beatT:200};

// Pauline
const PAUL={x:430,y:108};

// Hammers
let HAMM=[{x:200,y:570,taken:false},{x:430,y:420,taken:false}];

// Barrels & particles
let barrels=[], parts=[], spawnT=0, SPAWN_INT=200;

function initGame(){
  M={x:80,y:platY(0,92)-28,vx:0,vy:0,onGround:false,climbing:false,facing:1,
     hammer:false,hammerT:0,f:0,ft:0};
  barrels=[]; parts=[];
  HAMM=[{x:200,y:570,taken:false},{x:430,y:420,taken:false}];
  bonus=5000; bonusTick=0; frame=0;
  SPAWN_INT=Math.max(80,200-(lv-1)*30);
}

function spawnParts(x,y,col){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*3;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,col,life:25});
  }
}

function die(){
  spawnParts(M.x+12,M.y+14,'#FF8800');
  lives--;
  setTimeout(()=>{
    if(lives<=0){state='over';if(score>hi){hi=score;localStorage.setItem('dk2_hi',hi);}}
    else{state='playing';initGame();}
  },1200);
  state='dead';
}

const K={};
document.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='Enter'&&state!=='playing'&&state!=='dead'){state='playing';initGame();}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{K[e.code]=false;});

function update(){
  if(state!=='playing') return;
  frame++;
  bonusTick++;
  if(bonusTick>=60){bonusTick=0;bonus=Math.max(0,bonus-100);if(bonus===0&&state==='playing')die();}

  // DK animation
  DK.ft++;
  if(DK.ft>DK.beatT){DK.f^=1;DK.ft=0;}

  // Barrel spawn
  spawnT++;
  if(spawnT>=SPAWN_INT){
    spawnT=0;
    barrels.push({x:DK.x+50,y:DK.y+30,vx:1.5+(lv-1)*0.3,vy:0,pIdx:-1,f:0,ft:0});
  }

  // Mario movement
  M.vx=0;
  if(!M.climbing){
    if((K.ArrowLeft||K.KeyA)&&M.x>40){M.vx=-2.5;M.facing=-1;}
    if((K.ArrowRight||K.KeyD)&&M.x<600-24){M.vx=2.5;M.facing=1;}
  }

  const lad=onLadd(M.x,M.y,28);
  if(lad){
    if(K.ArrowUp||K.KeyW){M.climbing=true;M.y-=2;M.vx=0;}
    else if(K.ArrowDown||K.KeyS){M.climbing=true;M.y+=2;M.vx=0;}
    else if(!K.ArrowLeft&&!K.KeyA&&!K.ArrowRight&&!K.KeyD) {} // on ladder, idle
  } else {
    M.climbing=false;
  }

  if((K.Space)&&M.onGround&&!M.climbing){
    M.vy=-13;M.onGround=false;K.Space=false;
  }

  if(!M.climbing){M.vy+=0.55;M.y+=M.vy;}
  M.x+=M.vx;
  M.x=Math.max(40,Math.min(600-24,M.x));

  M.onGround=false;
  const pl=onPlat(M.x,M.y,28);
  if(pl&&M.vy>=0){
    M.y=pl.py-28;M.vy=0;M.onGround=true;M.climbing=false;
  }
  if(M.y>H+50) die();

  // Hammer
  for(const h of HAMM){
    if(!h.taken&&Math.abs(M.x-h.x)<24&&Math.abs(M.y-h.y)<28){
      h.taken=true;M.hammer=true;M.hammerT=360;
    }
  }
  if(M.hammer){M.hammerT--;if(M.hammerT<=0)M.hammer=false;}

  // Barrels
  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    b.ft++;if(b.ft>6){b.f=(b.f+1)%8;b.ft=0;}
    b.vy+=0.5;b.y+=b.vy;b.x+=b.vx;

    // Platform landing
    const bpl=onPlat(b.x,b.y,20);
    if(bpl&&b.vy>=0&&b.y+20>=bpl.py-5){
      b.y=bpl.py-20;b.vy=0;
      // Randomly go down ladder
      for(const l of LADDS){
        if(Math.abs(b.x+10-l.x)<30&&Math.random()<0.2){
          barrels.splice(i,1);
          barrels.push({x:l.x-10,y:bpl.py,vx:0,vy:3,dropLad:true,dropY:l.ybot,f:0,ft:0});
          break;
        }
      }
    }
    if(b.dropLad){
      if(b.y>=b.dropY){
        b.dropLad=false;
        b.vx=Math.random()<0.5?1.5:−1.5;
        b.vy=0;
      }
    }
    // Reverse at edge
    if(b.x<42||b.x>590) b.vx*=-1;
    if(b.y>H+30){barrels.splice(i,1);continue;}

    // Collision
    const bx=b.x+10,by=b.y+10,mx=M.x+12,my=M.y+14;
    const dist=Math.abs(bx-mx)<18&&Math.abs(by-my)<18;
    if(dist){
      if(M.hammer){score+=300;spawnParts(bx,by,'#FF4400');barrels.splice(i,1);}
      else{die();return;}
    }
    // Jump over
    if(!M.onGround&&M.vy>0&&Math.abs(bx-mx)<20&&my+14<by&&my+14>by-20){
      score+=100;
    }
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;
    if(p.life<=0)parts.splice(i,1);
  }

  // Reach Pauline
  if(Math.abs(M.x-PAUL.x)<40&&Math.abs(M.y-PAUL.y)<40){
    score+=1000+bonus;
    lv++;
    state='clear';
    setTimeout(()=>{state='playing';initGame();},2000);
  }

  // Animate Mario
  M.ft++;if(M.ft>8){M.f=(M.f+1)%4;M.ft=0;}
}

function drawPlat(p){
  ctx.fillStyle='#CC8844';
  ctx.beginPath();
  const yl=p.tilt===1?p.y:p.tilt===-1?p.y+20:p.y;
  const yr=p.tilt===1?p.y+20:p.tilt===-1?p.y:p.y;
  ctx.moveTo(p.x1,yl);ctx.lineTo(p.x2,yr);
  ctx.lineTo(p.x2,yr+12);ctx.lineTo(p.x1,yl+12);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#AA6622';
  for(let x=p.x1+20;x<p.x2;x+=40){
    const yp=p.tilt===1?yl+(x-p.x1)/(p.x2-p.x1)*20:yr+(p.x2-x)/(p.x2-p.x1)*20;
    ctx.fillRect(x,yp+3,6,6);
  }
}

function drawLadd(l){
  ctx.strokeStyle='#CCAA44';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(l.x-8,l.ytop);ctx.lineTo(l.x-8,l.ybot);ctx.stroke();
  ctx.beginPath();ctx.moveTo(l.x+8,l.ytop);ctx.lineTo(l.x+8,l.ybot);ctx.stroke();
  for(let y=l.ytop+15;y<l.ybot;y+=18){
    if(l.broken){const m=(l.ytop+l.ybot)/2;if(y>m-40&&y<m+40)continue;}
    ctx.beginPath();ctx.moveTo(l.x-8,y);ctx.lineTo(l.x+8,y);ctx.stroke();
  }
}

function drawMario(){
  const x=Math.round(M.x),y=Math.round(M.y),f=M.facing;
  ctx.fillStyle='#FF2200';ctx.fillRect(x+4,y,20,6);ctx.fillRect(x+2,y+2,24,4);
  ctx.fillStyle='#FFAA66';ctx.fillRect(x+4,y+6,16,8);
  ctx.fillStyle='#4444FF';ctx.fillRect(x+4,y+14,16,10);ctx.fillRect(x+4,y+24,7,4);ctx.fillRect(x+13,y+24,7,4);
  ctx.fillStyle='#FF2200';ctx.fillRect(f>0?x:x+18,y+14,6,8);
  if(M.hammer&&Math.floor(frame/8)%2===0){
    ctx.fillStyle='#CC8800';
    ctx.fillRect(f>0?x+20:x-8,y+4,8,18);
    ctx.fillRect(f>0?x+16:x-12,y+2,18,8);
  }
}

function drawDK2(){
  const x=DK.x,y=DK.y;
  ctx.fillStyle='#884400';
  ctx.fillRect(x,y+20,64,46);ctx.fillRect(x+10,y,44,26);
  ctx.fillRect(x,y+4,14,14);ctx.fillRect(x+50,y+4,14,14);
  ctx.fillStyle='#CCAA66';ctx.fillRect(x+16,y+8,32,14);
  ctx.fillStyle='#FFF';ctx.fillRect(x+18,y+6,8,8);ctx.fillRect(x+38,y+6,8,8);
  ctx.fillStyle='#000';ctx.fillRect(x+20,y+8,4,4);ctx.fillRect(x+40,y+8,4,4);
  ctx.fillStyle='#884400';
  if(DK.f){ctx.fillRect(x-14,y+22,22,14);ctx.fillRect(x+54,y+22,22,14);}
  else{ctx.fillRect(x-6,y+28,14,10);ctx.fillRect(x+54,y+28,14,10);}
  ctx.fillRect(x+8,y+64,18,16);ctx.fillRect(x+38,y+64,18,16);
}

function draw(){
  ctx.fillStyle='#000033';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFF';ctx.font='16px monospace';
  ctx.fillText(`SCORE:${score}`,10,28);
  ctx.textAlign='center';ctx.fillText(`BONUS:${bonus}`,W/2,28);
  ctx.textAlign='right';ctx.fillText(`LIVES:${lives}  HI:${hi}`,W-10,28);
  ctx.textAlign='left';ctx.fillText(`LEVEL:${lv}`,10,46);ctx.textAlign='right';
  ctx.textAlign='left';

  if(state==='start'){
    ctx.fillStyle='#FF2200';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('DONKEY KONG',W/2,320);
    ctx.fillStyle='#FFF';ctx.font='18px monospace';
    ctx.fillText('ENTER to Start',W/2,400);
    ctx.fillText('← → Move   ↑↓ Ladder   SPACE Jump',W/2,440);
    ctx.textAlign='left';
    drawDK2();return;
  }

  for(const p of PLATS)drawPlat(p);
  for(const l of LADDS)drawLadd(l);

  // Hammers
  for(const h of HAMM){
    if(!h.taken){
      ctx.fillStyle='#CC8800';
      ctx.fillRect(h.x,h.y+8,8,18);
      ctx.fillRect(h.x-6,h.y+6,20,10);
    }
  }

  // Pauline
  ctx.fillStyle='#FF88AA';ctx.fillRect(PAUL.x,PAUL.y,20,30);
  ctx.fillStyle='#FFAA66';ctx.fillRect(PAUL.x+4,PAUL.y-12,12,14);
  ctx.fillStyle='#884422';ctx.fillRect(PAUL.x+2,PAUL.y-18,16,8);

  drawDK2();

  for(const b of barrels){
    ctx.fillStyle='#CC4400';ctx.beginPath();ctx.arc(b.x+10,b.y+10,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#AA2200';ctx.lineWidth=2;
    const ang=(b.f/8)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(b.x+10+Math.cos(ang)*8,b.y+10+Math.sin(ang)*8);
    ctx.lineTo(b.x+10-Math.cos(ang)*8,b.y+10-Math.sin(ang)*8);ctx.stroke();
  }

  for(const p of parts){
    ctx.fillStyle=p.col;ctx.globalAlpha=p.life/25;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  drawMario();

  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF2200';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,360);
    ctx.fillStyle='#FFF';ctx.font='22px monospace';
    ctx.fillText(`Score: ${score}`,W/2,430);ctx.fillText('ENTER to Restart',W/2,480);
    ctx.textAlign='left';
  }
  if(state==='clear'){
    ctx.fillStyle='rgba(0,0,180,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF0';ctx.font='bold 40px monospace';ctx.textAlign='center';
    ctx.fillText(`LEVEL ${lv-1} CLEAR!`,W/2,380);ctx.textAlign='left';
  }
  if(state==='dead'){
    ctx.globalAlpha=0.5;ctx.fillStyle='#F60';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
</html>
