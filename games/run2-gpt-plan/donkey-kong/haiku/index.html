<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>

      margin: 0;

      background: #000;

<body>
  <canvas id="gameCanvas" width="700" height="800"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // DONKEY KONG GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 700;
    const CANVAS_HEIGHT = 800;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let stage = 1;
    let bonusTime = 120;

    try {
      highScore = parseInt(localStorage.getItem('donkey_kong_high_score') || '0');
    } catch (e) {}

    // ── Stage Geometry ─────────────────────────────────────────────────
    const girders = [
      { y: 140, x1: 50, x2: 650, slope: 0 },
      { y: 240, x1: 100, x2: 600, slope: 0 },
      { y: 340, x1: 50, x2: 650, slope: 0 },
      { y: 440, x1: 100, x2: 600, slope: 0 },
      { y: 540, x1: 50, x2: 650, slope: 0 },
      { y: 650, x1: 60, x2: 640, slope: 0 }
    ];

    const ladders = [
      { x: 200, y1: 140, y2: 240 },
      { x: 500, y1: 140, y2: 240 },
      { x: 150, y1: 240, y2: 340 },
      { x: 550, y1: 240, y2: 340 },
      { x: 200, y1: 340, y2: 440 },
      { x: 500, y1: 340, y2: 440 },
      { x: 150, y1: 440, y2: 540 },
      { x: 550, y1: 440, y2: 540 },
      { x: 300, y1: 540, y2: 650 }
    ];

    // ── Mario ────────────────────────────────────────────────────────
    const mario = {
      x: 80,
      y: 650,
      vx: 0,
      vy: 0,
      width: 24,
      height: 32,
      jumping: false,
      onGirder: true,
      onLadder: false,
      climbing: false,
      hammerActive: false,
      hammerTimer: 0
    };

    // ── Barrels ─────────────────────────────────────────────────────
    let barrels = [];
    let barrelSpawnTimer = 0;

    class Barrel {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 180 + Math.random() * 60;
        this.vy = 0;
        this.onGirder = true;
        this.width = 18;
        this.height = 18;
        this.alive = true;
      }

      update(dt) {
        if (!this.alive) return;

        // Find current girder
        let currentGirder = null;
        for (const girder of girders) {
          if (Math.abs(this.y - girder.y) < 5) {
            currentGirder = girder;
            break;
          }
        }

        if (currentGirder) {
          this.x += this.vx * dt;
          this.vy = 0;

          if (this.x < currentGirder.x1 || this.x > currentGirder.x2) {
            this.x = this.x < currentGirder.x1 ? currentGirder.x1 : currentGirder.x2;
            this.vx = -this.vx;
          }
        } else {
          this.vy += 900 * dt;
          this.y += this.vy * dt;
        }

        if (this.y > CANVAS_HEIGHT) {
          this.alive = false;
        }
      }

      draw(ctx) {
        ctx.fillStyle = '#AA6633';
        ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
        ctx.strokeStyle = '#552200';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - this.width / 2 + 2, this.y - this.height / 2 + 5, this.width - 4, 4);
        ctx.strokeRect(this.x - this.width / 2 + 2, this.y - this.height / 2 + 12, this.width - 4, 4);
      }
    }

    // ── Hammer Pickups ──────────────────────────────────────────────
    const hammers = [
      { x: 200, y: 340, collected: false },
      { x: 500, y: 340, collected: false }
    ];

    // ── Input ────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.key]) {
        keys[e.key] = true;
        if (e.key === 'Enter') {
          if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
            startGame();
          }
        }
        if (e.key === 'p' || e.key === 'P') {
          if (gameState === GAME_STATES.PLAYING) {
            gameState = GAME_STATES.PAUSED;
          } else if (gameState === GAME_STATES.PAUSED) {
            gameState = GAME_STATES.PLAYING;
          }
        }
        if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && gameState === GAME_STATES.PLAYING && !mario.jumping && mario.onGirder) {
          mario.vy = -340;
          mario.jumping = true;
          sfxJump();
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxJump() { playTone(800, 0.1); }
    function sfxHit() { playTone(600, 0.1); }
    function sfxDeath() { playTone(200, 0.3); }

    // ── Game Logic ─────────────────────────────────────────────────────
    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = 3;
      stage = 1;
      bonusTime = 120;
      mario.x = 80;
      mario.y = 650;
      mario.vx = 0;
      mario.vy = 0;
      mario.jumping = false;
      mario.onGirder = true;
      mario.onLadder = false;
      mario.hammerActive = false;
      mario.hammerTimer = 0;
      barrels = [];
      barrelSpawnTimer = 0;
      hammers.forEach(h => h.collected = false);
    }

    function resetStage() {
      mario.x = 80;
      mario.y = 650;
      mario.vx = 0;
      mario.vy = 0;
      mario.jumping = false;
      mario.onGirder = true;
      mario.onLadder = false;
      mario.climbing = false;
      mario.hammerActive = false;
      mario.hammerTimer = 0;
      barrels = [];
      barrelSpawnTimer = 0;
      bonusTime = 120;
      hammers.forEach(h => h.collected = false);
    }

    function updateMario(dt) {
      // Horizontal movement
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        mario.vx = -150;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        mario.vx = 150;
      } else {
        mario.vx = 0;
      }

      mario.x += mario.vx * dt;
      mario.x = Math.max(50, Math.min(CANVAS_WIDTH - 50, mario.x));

      // Climbing
      if (!mario.jumping && (keys['ArrowUp'] || keys['w'] || keys['W'])) {
        for (const ladder of ladders) {
          if (Math.abs(mario.x - ladder.x) < 15 && mario.y >= ladder.y1 && mario.y <= ladder.y2) {
            mario.onLadder = true;
            mario.onGirder = false;
            mario.y -= 120 * dt;
            mario.vy = 0;
            return;
          }
        }
      }

      if (!mario.jumping && (keys['ArrowDown'] || keys['s'] || keys['S'])) {
        for (const ladder of ladders) {
          if (Math.abs(mario.x - ladder.x) < 15 && mario.y >= ladder.y1 && mario.y <= ladder.y2) {
            mario.onLadder = true;
            mario.onGirder = false;
            mario.y += 120 * dt;
            mario.vy = 0;
            return;
          }
        }
      }

      mario.onLadder = false;

      // Gravity and jumping
      if (mario.jumping) {
        mario.vy += 900 * dt;
        mario.y += mario.vy * dt;

        // Check if landed on girder
        for (const girder of girders) {
          if (mario.y + mario.height / 2 >= girder.y - 5 && mario.y + mario.height / 2 <= girder.y + 15 &&
              mario.x >= girder.x1 && mario.x <= girder.x2) {
            mario.y = girder.y - mario.height / 2;
            mario.vy = 0;
            mario.jumping = false;
            mario.onGirder = true;
            break;
          }
        }
      } else {
        // Check if on girder
        mario.onGirder = false;
        for (const girder of girders) {
          if (Math.abs(mario.y - girder.y + mario.height / 2) < 10 &&
              mario.x >= girder.x1 && mario.x <= girder.x2) {
            mario.y = girder.y - mario.height / 2;
            mario.onGirder = true;
            mario.vy = 0;
            break;
          }
        }
        if (!mario.onGirder && mario.y < CANVAS_HEIGHT - 50) {
          mario.vy += 900 * dt;
          mario.y += mario.vy * dt;
        }
      }

      // Hammer timer
      if (mario.hammerActive) {
        mario.hammerTimer -= dt;
        if (mario.hammerTimer <= 0) {
          mario.hammerActive = false;
        }
      }
    }

    function updateBarrels(dt) {
      barrelSpawnTimer += dt;
      if (barrelSpawnTimer > 0.5) {
        barrels.push(new Barrel(100, 140));
        barrelSpawnTimer = 0;
      }

      for (let i = barrels.length - 1; i >= 0; i--) {
        barrels[i].update(dt);
        if (!barrels[i].alive) {
          barrels.splice(i, 1);
        }
      }
    }

    function checkCollisions() {
      // Mario vs barrels
      for (const barrel of barrels) {
        if (barrel.x > mario.x - mario.width / 2 && barrel.x < mario.x + mario.width / 2 &&
            barrel.y > mario.y - mario.height / 2 && barrel.y < mario.y + mario.height / 2) {
          if (mario.hammerActive) {
            barrel.alive = false;
            score += 300;
            sfxHit();
          } else if (!mario.jumping || mario.vy > 0) {
            lives--;
            if (lives <= 0) {
              gameState = GAME_STATES.GAME_OVER;
            } else {
              sfxDeath();
              resetStage();
            }
          }
        }
      }

      // Mario vs hammers
      for (const hammer of hammers) {
        if (!hammer.collected && hammer.x > mario.x - mario.width / 2 && hammer.x < mario.x + mario.width / 2 &&
            hammer.y > mario.y - mario.height / 2 && hammer.y < mario.y + mario.height / 2) {
          hammer.collected = true;
          mario.hammerActive = true;
          mario.hammerTimer = 5;
          sfxHit();
        }
      }

      // Mario vs Pauline
      if (mario.x > 300 && mario.x < 320 && mario.y < 80) {
        score += 1000;
        score += Math.floor(bonusTime);
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('donkey_kong_high_score', String(highScore));
          } catch (e) {}
        }
        stage++;
        resetStage();
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        bonusTime = Math.max(0, bonusTime - dt);
        updateMario(dt);
        updateBarrels(dt);
        checkCollisions();

        if (bonusTime <= 0 && mario.onGirder) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          } else {
            resetStage();
          }
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw girders
      ctx.fillStyle = '#FF3366';
      ctx.strokeStyle = '#992244';
      ctx.lineWidth = 2;
      for (const girder of girders) {
        ctx.fillRect(girder.x1, girder.y, girder.x2 - girder.x1, 12);
        for (let x = girder.x1; x < girder.x2; x += 20) {
          ctx.strokeRect(x, girder.y + 2, 8, 8);
        }
      }

      // Draw ladders
      ctx.strokeStyle = '#66CCFF';
      ctx.lineWidth = 3;
      for (const ladder of ladders) {
        ctx.beginPath();
        ctx.moveTo(ladder.x - 8, ladder.y1);
        ctx.lineTo(ladder.x - 8, ladder.y2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(ladder.x + 8, ladder.y1);
        ctx.lineTo(ladder.x + 8, ladder.y2);
        ctx.stroke();

        for (let y = ladder.y1; y < ladder.y2; y += 15) {
          ctx.beginPath();
          ctx.moveTo(ladder.x - 8, y);
          ctx.lineTo(ladder.x + 8, y);
          ctx.stroke();
        }
      }

      // Draw barrels
      for (const barrel of barrels) {
        barrel.draw(ctx);
      }

      // Draw hammers
      for (const hammer of hammers) {
        if (!hammer.collected) {
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(hammer.x - 5, hammer.y - 5, 10, 10);
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(hammer.x - 3, hammer.y + 3, 6, 5);
        }
      }

      // Draw Donkey Kong
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(100, 80, 64, 56);
      ctx.fillStyle = '#D2A679';
      ctx.fillRect(108, 85, 48, 20);

      // Draw Pauline
      ctx.fillStyle = '#FF5CAA';
      ctx.fillRect(310, 60, 20, 32);
      ctx.fillStyle = '#AA5500';
      ctx.fillRect(312, 40, 16, 20);

      // Draw Mario
      ctx.fillStyle = '#DD3333';
      ctx.fillRect(mario.x - 5, mario.y - 15, 10, 15);
      ctx.fillStyle = '#3366CC';
      ctx.fillRect(mario.x - 8, mario.y, 16, 17);
      ctx.fillStyle = '#FFD39B';
      ctx.fillRect(mario.x - 8, mario.y - 18, 16, 3);

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 25);

      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH - 10, 25);

      ctx.fillText(`Lives: ${lives}`, CANVAS_WIDTH - 10, 50);

      ctx.fillStyle = '#FFFF00';
      ctx.fillText(`Bonus: ${Math.floor(bonusTime)}`, 10, CANVAS_HEIGHT - 10);

      ctx.fillStyle = '#AAA';
      ctx.fillText(`Stage ${stage}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);

      // Draw overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FF3366';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DONKEY KONG', CANVAS_WIDTH / 2, 260);
      ctx.font = '20px monospace';
      ctx.fillStyle = '#FFF';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 340);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 400);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 340);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 390);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 440);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)

    marioX:    typeof mario !== 'undefined' ? (mario.x != null ? mario.x : null) : null,

    // ── Initialize ─────────────────────────────────────────────────────
