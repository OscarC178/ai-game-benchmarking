<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // GALAGA GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Player
    const PLAYER_SPEED = 350;
    const PLAYER_START_X = 400;
    const PLAYER_START_Y = 550;

    // Bullets
    const PLAYER_BULLET_SPEED = 550;
    const ENEMY_BULLET_SPEED = 300;
    const MAX_PLAYER_BULLETS_SINGLE = 2;
    const MAX_PLAYER_BULLETS_DUAL = 4;

    // Formation
    const FORMATION_COLS = 10;
    const FORMATION_ROWS = 5;
    const FORMATION_X = 400;
    const FORMATION_Y = 160;
    const ENEMY_SPACING_X = 50;
    const ENEMY_SPACING_Y = 45;

    // Game state
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let stage = 1;

    try {
      highScore = parseInt(localStorage.getItem('galaga_high_score') || '0');
    } catch (e) {}

    // ── Player ─────────────────────────────────────────────────────────
    const player = {
      x: PLAYER_START_X,
      y: PLAYER_START_Y,
      vx: 0,
      dual: false,
      captured: false
    };

    // ── Starfield ─────────────────────────────────────────────────────
    let stars = [];
    function initStars() {
      stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.random() * CANVAS_WIDTH,
          y: Math.random() * CANVAS_HEIGHT,
          speed: 20
        });
      }
    }

    function updateStars(dt) {
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > CANVAS_HEIGHT) {
          star.y = -5;
          star.x = Math.random() * CANVAS_WIDTH;
        }
      }
    }

    // ── Enemies ────────────────────────────────────────────────────────
    let enemies = [];
    let enemyDiveTimer = 0;
    let diveEnemies = [];
    const ENEMY_TYPES = {
      bee: { w: 20, h: 18, color: '#FFCC00', score: 50, diving: 100 },
      butterfly: { w: 24, h: 20, color: '#FF4444', score: 80, diving: 160 },
      boss: { w: 28, h: 24, color: '#00CC00', score: 150, diving: 400, health: 2 }
    };

    function initFormation() {
      enemies = [];
      diveEnemies = [];
      const layout = [
        ['boss', 'boss', 'boss', 'boss', 'boss', 'boss', 'boss', 'boss', 'boss', 'boss'],
        ['butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly', 'butterfly'],
        ['bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee'],
        ['bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee'],
        ['bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee', 'bee']
      ];

      for (let row = 0; row < FORMATION_ROWS; row++) {
        for (let col = 0; col < FORMATION_COLS; col++) {
          const type = layout[row][col];
          const spec = ENEMY_TYPES[type];
          enemies.push({
            id: row * FORMATION_COLS + col,
            type: type,
            x: FORMATION_X + col * ENEMY_SPACING_X - FORMATION_COLS * ENEMY_SPACING_X / 2,
            y: FORMATION_Y + row * ENEMY_SPACING_Y,
            baseX: FORMATION_X + col * ENEMY_SPACING_X - FORMATION_COLS * ENEMY_SPACING_X / 2,
            baseY: FORMATION_Y + row * ENEMY_SPACING_Y,
            vx: 0,
            vy: 0,
            diving: false,
            diveTime: 0,
            health: type === 'boss' ? 2 : 1,
            capturedShip: false,
            ...spec
          });
        }
      }
    }

    function updateFormationSway(dt) {
      const sway = Math.sin(Date.now() * 0.0005) * 20;
      for (const enemy of enemies) {
        if (!enemy.diving) {
          enemy.x = enemy.baseX + sway;
        }
      }
    }

    function updateDives(dt) {
      enemyDiveTimer += dt;
      if (enemyDiveTimer > 2.5 + Math.random() * 0.5) {
        const activeEnemies = enemies.filter(e => !e.diving && e.health > 0);
        const count = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < Math.min(count, activeEnemies.length); i++) {
          const enemy = activeEnemies[Math.floor(Math.random() * activeEnemies.length)];
          if (!enemy.diving) {
            enemy.diving = true;
            enemy.diveTime = 0;
            const isBoss = enemy.type === 'boss';
            enemy.diveType = isBoss && Math.random() > 0.6 ? 'capture' : 'normal';
            diveEnemies.push(enemy);
          }
        }
        enemyDiveTimer = 0;
      }

      for (let i = diveEnemies.length - 1; i >= 0; i--) {
        const enemy = diveEnemies[i];
        enemy.diveTime += dt;

        if (enemy.diveType === 'capture' && enemy.capturedShip && player.captured) {
          // Continue holding
        }

        if (enemy.diveTime > 4 || enemy.y > CANVAS_HEIGHT) {
          enemy.diving = false;
          enemy.diveTime = 0;
          if (enemy.health > 0) {
            enemy.x = enemy.baseX;
            enemy.y = enemy.baseY;
          }
          diveEnemies.splice(i, 1);
        } else {
          const progress = enemy.diveTime / 3;
          const targetX = player.x;
          const targetY = CANVAS_HEIGHT;

          // Curved path
          const curve = Math.sin(progress * Math.PI) * 100;
          enemy.x = enemy.baseX + (targetX - enemy.baseX) * progress + curve;
          enemy.y = enemy.baseY + (targetY - enemy.baseY) * progress;

          // Fire occasionally
          if (Math.random() < 0.02 && enemy.diveTime > 1) {
            enemyBullets.push({
              x: enemy.x,
              y: enemy.y,
              vx: 0,
              vy: ENEMY_BULLET_SPEED
            });
          }
        }
      }
    }

    // ── Bullets ────────────────────────────────────────────────────────
    let playerBullets = [];
    let enemyBullets = [];
    let tractorBeams = [];

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
          startGame();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === GAME_STATES.PLAYING) {
          gameState = GAME_STATES.PAUSED;
        } else if (gameState === GAME_STATES.PAUSED) {
          gameState = GAME_STATES.PLAYING;
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ──────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxFire() { playTone(1200, 0.05); }
    function sfxHit() { playTone(800, 0.1); }

    // ── Game Logic ─────────────────────────────────────────────────────
    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = 3;
      stage = 1;
      player.x = PLAYER_START_X;
      player.y = PLAYER_START_Y;
      player.vx = 0;
      player.dual = false;
      player.captured = false;
      playerBullets = [];
      enemyBullets = [];
      tractorBeams = [];
      initStars();
      initFormation();
    }

    function updatePlayer(dt) {
      const speed = PLAYER_SPEED;

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.vx = -speed;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.vx = speed;
      } else {
        player.vx = 0;
      }

      player.x += player.vx * dt;
      player.x = Math.max(0, Math.min(CANVAS_WIDTH - (player.dual ? 60 : 28), player.x));

      if (keys[' ']) {
        const maxBullets = player.dual ? MAX_PLAYER_BULLETS_DUAL : MAX_PLAYER_BULLETS_SINGLE;
        if (playerBullets.length < maxBullets) {
          if (player.dual) {
            playerBullets.push({ x: player.x + 12, y: player.y, vx: 0, vy: -PLAYER_BULLET_SPEED });
            playerBullets.push({ x: player.x + 48, y: player.y, vx: 0, vy: -PLAYER_BULLET_SPEED });
          } else {
            playerBullets.push({ x: player.x + 14, y: player.y, vx: 0, vy: -PLAYER_BULLET_SPEED });
          }
          sfxFire();
        }
        keys[' '] = false;
      }
    }

    function updateBullets(dt) {
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const bullet = playerBullets[i];
        bullet.y += bullet.vy * dt;
        if (bullet.y < 0) {
          playerBullets.splice(i, 1);
        }
      }

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        bullet.y += bullet.vy * dt;
        if (bullet.y > CANVAS_HEIGHT) {
          enemyBullets.splice(i, 1);
        }
      }
    }

    function checkCollisions() {
      // Player bullet vs enemy
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const bullet = playerBullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          if (enemy.health <= 0) continue;

          if (bullet.x > enemy.x - enemy.w / 2 && bullet.x < enemy.x + enemy.w / 2 &&
              bullet.y > enemy.y - enemy.h / 2 && bullet.y < enemy.y + enemy.h / 2) {
            playerBullets.splice(i, 1);
            enemy.health--;

            if (enemy.health <= 0) {
              const isBoss = enemy.type === 'boss';
              if (isBoss && enemy.capturedShip && !player.captured) {
                player.captured = true;
                player.dual = true;
              }
              const points = enemy.diving ? enemy.diving : enemy.score;
              score += points;
              if (score > highScore) {
                highScore = score;
                try {
                  localStorage.setItem('galaga_high_score', String(highScore));
                } catch (e) {}
              }
            }
            sfxHit();
            break;
          }
        }
      }

      // Enemy bullet vs player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const bullet = enemyBullets[i];
        const playerW = player.dual ? 60 : 28;
        if (bullet.x > player.x - playerW / 2 && bullet.x < player.x + playerW / 2 &&
            bullet.y > player.y - 15 && bullet.y < player.y + 15) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          }
          enemyBullets.splice(i, 1);
        }
      }

      // Tractor beam capture
      for (const beam of tractorBeams) {
        if (beam.x > player.x - 30 && beam.x < player.x + 30 &&
            beam.y > player.y - 100 && beam.y < player.y + 10) {
          player.captured = true;
        }
      }

      // Check stage clear
      if (enemies.filter(e => e.health > 0).length === 0) {
        stage++;
        initFormation();
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        updateStars(dt);
        updatePlayer(dt);
        updateFormationSway(dt);
        updateDives(dt);
        updateBullets(dt);
        checkCollisions();

        // Update tractor beams
        tractorBeams = diveEnemies
          .filter(e => e.diveType === 'capture' && e.capturedShip)
          .map(e => ({ x: e.x, y: e.y }));
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw starfield
      ctx.fillStyle = '#FFF';
      for (const star of stars) {
        ctx.fillRect(star.x, star.y, 1, 1);
      }

      // Draw formation
      for (const enemy of enemies) {
        if (enemy.health <= 0) continue;
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x - enemy.w / 2, enemy.y - enemy.h / 2, enemy.w, enemy.h);

        // Damaged state
        if (enemy.health < enemy.w && enemy.type === 'boss' && enemy.health === 1) {
          ctx.fillStyle = '#666';
          ctx.fillRect(enemy.x - enemy.w / 4, enemy.y - enemy.h / 2, enemy.w / 2, enemy.h);
        }
      }

      // Draw tractor beams
      for (const beam of tractorBeams) {
        ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
        ctx.fillRect(beam.x - 20, beam.y, 40, 200);
      }

      // Draw player
      ctx.fillStyle = '#FFF';
      if (player.dual) {
        ctx.fillRect(player.x - 28, player.y - 15, 24, 30);
        ctx.fillRect(player.x + 4, player.y - 15, 24, 30);
      } else {
        ctx.fillRect(player.x - 14, player.y - 15, 28, 30);
      }

      // Draw bullets
      ctx.fillStyle = '#FFF';
      for (const bullet of playerBullets) {
        ctx.fillRect(bullet.x - 1.5, bullet.y, 3, 14);
      }

      ctx.fillStyle = '#FF6666';
      for (const bullet of enemyBullets) {
        ctx.fillRect(bullet.x - 1.5, bullet.y, 3, 10);
      }

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 30);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#AAA';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH / 2, 30);

      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${lives}`, 10, CANVAS_HEIGHT - 10);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#AAA';
      ctx.font = '14px monospace';
      ctx.fillText(`Stage ${stage}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFCC00';
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GALAGA', CANVAS_WIDTH / 2, 200);

      ctx.fillStyle = '#AAA';
      ctx.font = '12px monospace';
      ctx.fillText('Boss (green): 150pts | Butterfly (red): 80pts | Bee (yellow): 50pts', CANVAS_WIDTH / 2, 280);
      ctx.fillText('Destroyed while diving: 2-5x points | Rescue captured ship for dual fire!', CANVAS_WIDTH / 2, 300);

      ctx.fillStyle = '#FFF';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 420);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 300);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 250);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 300);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 350);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
    }

    // ── Initialize ─────────────────────────────────────────────────────
    initStars();
    initFormation();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
