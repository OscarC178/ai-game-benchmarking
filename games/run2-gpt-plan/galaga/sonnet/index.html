  <style>

<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
  (() => {
    'use strict';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 600;

    // ─── State Machine ────────────────────────────────────────────────────────
    const STATE = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER' };
    let state = STATE.IDLE;

    // ─── Audio ────────────────────────────────────────────────────────────────
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playTone(type, freq, endFreq, dur, vol = 0.08) {
      try {
        const ac = ensureAudio();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        if (endFreq !== null) osc.frequency.linearRampToValueAtTime(endFreq, ac.currentTime + dur);
        gain.gain.setValueAtTime(vol, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        osc.connect(gain); gain.connect(ac.destination);
        osc.start(); osc.stop(ac.currentTime + dur);
      } catch (e) {}
    }
    function sfxFire() { playTone('square', 1200, 800, 0.06, 0.05); }
    function sfxHit() { playTone('sawtooth', 400, 100, 0.1, 0.07); }
    function sfxDeath() { playTone('square', 660, 60, 0.4, 0.1); }
    function sfxBeam() {
      try {
        const ac = ensureAudio();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, ac.currentTime);
        osc.frequency.linearRampToValueAtTime(300, ac.currentTime + 0.3);
        osc.frequency.linearRampToValueAtTime(200, ac.currentTime + 0.6);
        gain.gain.setValueAtTime(0.05, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.6);
        osc.connect(gain); gain.connect(ac.destination);
        osc.start(); osc.stop(ac.currentTime + 0.6);
      } catch (e) {}
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    const keys = new Set();
    const justPressed = new Set();
    document.addEventListener('keydown', e => {
      const c = e.code;
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter','KeyP','KeyA','KeyD'].includes(c)) {
        e.preventDefault();
      }
      if (!keys.has(c)) justPressed.add(c);
      keys.add(c);
      if (c === 'Enter') {
        if (state === STATE.IDLE || state === STATE.GAME_OVER) startGame();
      }
      if (c === 'KeyP') {
        if (state === STATE.PLAYING) state = STATE.PAUSED;
        else if (state === STATE.PAUSED) state = STATE.PLAYING;
      }
    });
    document.addEventListener('keyup', e => keys.delete(e.code));
    function consumeJustPressed(c) { const v = justPressed.has(c); justPressed.delete(c); return v; }

    // ─── High Score ───────────────────────────────────────────────────────────
    let highScore = parseInt(localStorage.getItem('galaga_r2_hi') || '0', 10);
    function saveHi(s) { if (s > highScore) { highScore = s; localStorage.setItem('galaga_r2_hi', s); } }

    // ─── Stars ────────────────────────────────────────────────────────────────
    const STAR_COUNT = 80;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.5,
      brightness: Math.random() * 0.7 + 0.3
    }));
    function updateStars(dt) {
      for (const s of stars) {
        s.y += 20 * dt;
        if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      }
    }
    function drawStars() {
      for (const s of stars) {
        ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }
    }

    // ─── Formation Layout ─────────────────────────────────────────────────────
    // 10 cols × 5 rows; row 0=Boss, row 1=Butterfly, rows 2-3=Bee(yellow), row 4=Bee(blue)
    const COLS = 10, ROWS = 5;
    const FORM_CX = 400, FORM_TOP = 140;
    const CELL_W = 48, CELL_H = 40;

    const ENEMY_TYPE = { BOSS: 0, BUTTERFLY: 1, BEE: 2, BEE_BLUE: 3 };
    const ROW_TYPES = [ENEMY_TYPE.BOSS, ENEMY_TYPE.BUTTERFLY, ENEMY_TYPE.BEE, ENEMY_TYPE.BEE, ENEMY_TYPE.BEE_BLUE];
    const ROW_COLORS = ['#00CC00', '#FF4444', '#FFCC00', '#FFCC00', '#00BBFF'];

    // ─── Game State ───────────────────────────────────────────────────────────
    let score = 0, lives = 3, stage = 1;
    let player, playerBullets, enemies, enemyBullets;
    let formationOffset = 0, formationDir = 1;
    let diveTimer = 0, diveInterval = 2.5;
    let capturedShip = null; // { x, y, boss } - boss holding the captured ship
    let dualMode = false;
    let dualBulletCount = 0; // extra bullets in dual mode
    let tractorBeamActive = false;
    let tractorBeamTimer = 0;
    let captureTimer = 0; // how long player is in beam
    let CAPTURE_THRESHOLD = 2.0; // seconds of overlap to trigger capture
    let playerDead = false;
    let playerDeathTimer = 0;
    let playerInvuln = 0;

    function makeEnemy(col, row) {
      const type = ROW_TYPES[row];
      const color = ROW_COLORS[row];
      // size by type
      const sizes = [[28, 24], [24, 20], [20, 18], [20, 18]];
      const [w, h] = sizes[type];
      return {
        col, row, type, color, w, h,
        alive: true,
        hp: type === ENEMY_TYPE.BOSS ? 2 : 1,
        maxHp: type === ENEMY_TYPE.BOSS ? 2 : 1,
        diving: false,
        divePhase: 0,     // 0=formation, 1=diving, 2=returning
        diveT: 0,
        divePathPts: [],
        fireCooldown: Math.random() * 2,
        captured: false,  // this boss is holding captured ship
        tractorBeamOn: false,
        tractorBeamY: 0,  // tip of beam
        entryX: 0, entryY: 0, // dive entry point
        returnT: 0,
        homeX: 0, homeY: 0,
        x: 0, y: 0
      };
    }

    function makePlayer() {
      return {
        x: 400, y: 550,
        w: 28, h: 30,
        speed: 350,
        alive: true,
        fireCooldown: 0
      };
    }

    function startGame() {
      score = 0; lives = 3; stage = 1;
      dualMode = false;
      capturedShip = null;
      playerDead = false;
      playerInvuln = 0;
      player = makePlayer();
      playerBullets = [];
      enemyBullets = [];
      initFormation();
      diveTimer = 0;
      diveInterval = 2.5;
      tractorBeamActive = false;
      state = STATE.PLAYING;
    }

    function initFormation() {
      enemies = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const e = makeEnemy(c, r);
          enemies.push(e);
        }
      }
      updateFormationPositions();
    }

    function getFormationX(col) {
      return FORM_CX - (COLS - 1) * CELL_W / 2 + col * CELL_W + formationOffset;
    }
    function getFormationY(row) {
      return FORM_TOP + row * CELL_H;
    }
    function updateFormationPositions() {
      for (const e of enemies) {
        if (!e.diving && e.divePhase === 0 && e.alive) {
          e.x = getFormationX(e.col);
          e.y = getFormationY(e.row);
        }
      }
    }

    // ─── Curved Dive Paths ────────────────────────────────────────────────────
    // Generate cubic bezier control points for a visible curved attack run
    function makeDivePath(startX, startY, targetX) {
      // End point: fly off bottom or return to formation
      const endX = targetX + (Math.random() - 0.5) * 60;
      const endY = H + 40;
      const cp1x = startX + (Math.random() - 0.5) * 200;
      const cp1y = startY + (endY - startY) * 0.3;
      const cp2x = endX + (Math.random() - 0.5) * 150;
      const cp2y = endY - 150;
      return [
        { x: startX, y: startY },
        { x: cp1x,   y: cp1y },
        { x: cp2x,   y: cp2y },
        { x: endX,   y: endY }
      ];
    }

    function makeCaptureLoop(startX, startY) {
      // loops down and around then to player position
      const px = player ? player.x : 400;
      return [
        { x: startX, y: startY },
        { x: startX - 120, y: startY + 100 },
        { x: startX - 180, y: startY + 300 },
        { x: px, y: 420 }
      ];
    }

    function bezier(pts, t) {
      const [p0, p1, p2, p3] = pts;
      const mt = 1 - t;
      return {
        x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
        y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y
      };
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    let lastTime = 0;
    function update(dt) {
      if (state !== STATE.PLAYING) return;
      justPressed.clear(); // clear after checks below happen in same frame

      updateStars(dt);

      // Formation sway: ±20px at 0.5Hz
      formationOffset += formationDir * 40 * dt; // 40 * 0.5 = 20px amplitude over half period
      if (Math.abs(formationOffset) > 20) {
        formationOffset = Math.sign(formationOffset) * 20;
        formationDir *= -1;
      }

      // Update formation positions for non-diving enemies
      for (const e of enemies) {
        if (!e.diving && e.divePhase === 0 && e.alive) {
          e.x = getFormationX(e.col);
          e.y = getFormationY(e.row);
        }
      }

      // Player movement
      if (!playerDead) {
        const spd = player.speed * dt;
        const halfW = dualMode ? 30 : 14;
        if ((keys.has('ArrowLeft') || keys.has('KeyA')) && player.x - halfW > 0) player.x -= spd;
        if ((keys.has('ArrowRight') || keys.has('KeyD')) && player.x + halfW < W) player.x += spd;
        player.x = Math.max(halfW, Math.min(W - halfW, player.x));
        player.fireCooldown -= dt;
        const maxBullets = dualMode ? 4 : 2;
        if ((keys.has('Space')) && player.fireCooldown <= 0 && playerBullets.length < maxBullets) {
          if (dualMode) {
            playerBullets.push({ x: player.x - 14, y: player.y - 15, w: 3, h: 14, vy: -550 });
            playerBullets.push({ x: player.x + 14, y: player.y - 15, w: 3, h: 14, vy: -550 });
          } else {
            playerBullets.push({ x: player.x, y: player.y - 15, w: 3, h: 14, vy: -550 });
          }
          player.fireCooldown = 0.18;
          sfxFire();
        }

        // Invuln countdown
        if (playerInvuln > 0) playerInvuln -= dt;
      } else {
        playerDeathTimer -= dt;
        if (playerDeathTimer <= 0) {
          if (lives > 0) {
            playerDead = false;
            playerInvuln = 2;
            player.x = 400;
            player.y = 550;
          } else {
            saveHi(score);
            state = STATE.GAME_OVER;
          }
        }
      }

      // Update player bullets
      for (const b of playerBullets) b.y += b.vy * dt;
      playerBullets = playerBullets.filter(b => b.y + b.h > 0);

      // Enemy dive timer
      diveTimer -= dt;
      if (diveTimer <= 0) {
        diveTimer = diveInterval + Math.random() * 1;
        // Pick 1-3 non-diving alive enemies for attack
        const eligible = enemies.filter(e => e.alive && !e.diving && e.divePhase === 0);
        const count = Math.min(1 + Math.floor(Math.random() * 3), eligible.length);
        // Shuffle
        for (let i = eligible.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
        }
        for (let i = 0; i < count; i++) {
          const e = eligible[i];
          e.diving = true;
          e.divePhase = 1;
          e.diveT = 0;
          e.entryX = e.x;
          e.entryY = e.y;
          // Boss has chance to do capture attack if no captured ship already
          const doCaptureAttack = e.type === ENEMY_TYPE.BOSS && !capturedShip && Math.random() < 0.35;
          if (doCaptureAttack) {
            e.divePathPts = makeCaptureLoop(e.x, e.y);
            e.captureAttack = true;
          } else {
            e.divePathPts = makeDivePath(e.x, e.y, player ? player.x : 400);
            e.captureAttack = false;
          }
          e.fireCooldown = 0.5 + Math.random() * 0.5;
          e.firedBullets = 0;
        }
      }

      // Tractor beam effect
      if (tractorBeamActive) {
        tractorBeamTimer -= dt;
        sfxBeam();
        if (tractorBeamTimer <= 0) tractorBeamActive = false;
      }

      // Update diving enemies
      const DIVE_SPEED = 0.35 + stage * 0.03; // bezier t units per second
      for (const e of enemies) {
        if (!e.alive) continue;
        if (e.diving && e.divePhase === 1) {
          e.diveT += DIVE_SPEED * dt;
          if (e.diveT >= 1) {
            e.diveT = 1;
            // Reached end of path
            if (e.captureAttack) {
              // Position beam beneath boss
              tractorBeamActive = true;
              tractorBeamTimer = 2.5;
              e.tractorBeamOn = true;
            }
            // Start return path
            e.divePhase = 2;
            e.returnPathPts = [
              { x: e.x, y: e.y },
              { x: e.x + (Math.random() - 0.5) * 100, y: e.y - 150 },
              { x: getFormationX(e.col) + (Math.random() - 0.5) * 30, y: getFormationY(e.row) - 100 },
              { x: getFormationX(e.col), y: getFormationY(e.row) }
            ];
            e.returnT = 0;
            e.tractorBeamOn = false;
          } else {
            const pt = bezier(e.divePathPts, e.diveT);
            e.x = pt.x;
            e.y = pt.y;
          }

          // Enemy firing during dive
          if (e.firedBullets < 2) {
            e.fireCooldown -= dt;
            if (e.fireCooldown <= 0 && e.y < H - 50) {
              enemyBullets.push({ x: e.x, y: e.y + e.h / 2, w: 3, h: 10, vy: 300 });
              e.firedBullets++;
              e.fireCooldown = 0.6 + Math.random() * 0.4;
            }
          }

          // Tractor beam capture logic
          if (e.captureAttack && e.tractorBeamOn && !capturedShip && !playerDead && playerInvuln <= 0) {
            // Check beam overlap
            const bx = e.x - 20, by = e.y, bw = 40, bh = 200;
            if (!playerDead && player &&
                player.x + 14 > bx && player.x - 14 < bx + bw &&
                player.y + 15 > by && player.y - 15 < by + bh) {
              captureTimer += dt;
              if (captureTimer >= CAPTURE_THRESHOLD) {
                // Capture!
                capturedShip = { x: e.x, y: e.y + 40, boss: e };
                e.capturedPlayer = true;
                lives--; // lose the active ship
                playerDead = true;
                playerDeathTimer = 0.5; // short respawn
                captureTimer = 0;
                sfxDeath();
              }
            } else {
              captureTimer = Math.max(0, captureTimer - dt);
            }
          }
        } else if (e.divePhase === 2) {
          // Returning
          e.returnT += DIVE_SPEED * 0.8 * dt;
          if (e.returnT >= 1) {
            e.x = getFormationX(e.col);
            e.y = getFormationY(e.row);
            e.diving = false;
            e.divePhase = 0;
            e.captureAttack = false;
            e.tractorBeamOn = false;
          } else {
            const pt = bezier(e.returnPathPts, e.returnT);
            e.x = pt.x;
            e.y = pt.y;
          }
        }

        // Tractor beam follows boss
        if (e.tractorBeamOn) {
          tractorBeamActive = true;
        }
      }

      // Move enemy bullets
      for (const b of enemyBullets) b.y += b.vy * dt;
      enemyBullets = enemyBullets.filter(b => b.y < H + 20);

      // Update captured ship position (follows boss)
      if (capturedShip) {
        capturedShip.x = capturedShip.boss.x;
        capturedShip.y = capturedShip.boss.y + 35;
      }

      // ─── Collisions ─────────────────────────────────────────────────────────
      // Player bullets vs enemies
      const newBullets = [];
      for (const b of playerBullets) {
        let hit = false;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (aabb(b.x - b.w/2, b.y - b.h/2, b.w, b.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false;
              // Award score
              const pts = getPoints(e);
              score += pts;
              saveHi(score);
              sfxHit();
              // Check if this boss was holding captured ship
              if (capturedShip && capturedShip.boss === e) {
                // Rescue! Convert to dual ship
                dualMode = true;
                capturedShip = null;
                // Give back captured life (don't add extra)
                sfxFire();
              }
              if (e.capturedPlayer) e.capturedPlayer = false;
            } else {
              // Damaged state (boss first hit)
              sfxHit();
            }
            hit = true;
            break;
          }
        }
        if (!hit) newBullets.push(b);
      }
      playerBullets = newBullets;

      // Enemy bullets vs player
      if (!playerDead && playerInvuln <= 0) {
        const phw = dualMode ? 30 : 14;
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          if (aabb(player.x - phw, player.y - 15, phw*2, 30,
                   b.x - b.w/2, b.y - b.h/2, b.w, b.h)) {
            enemyBullets.splice(i, 1);
            killPlayer();
            break;
          }
        }
      }

      // Diving enemies vs player
      if (!playerDead && playerInvuln <= 0) {
        const phw = dualMode ? 30 : 14;
        for (const e of enemies) {
          if (!e.alive || !e.diving) continue;
          if (aabb(player.x - phw, player.y - 15, phw*2, 30,
                   e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
            e.alive = false;
            killPlayer();
            break;
          }
        }
      }

      // Check wave clear
      const aliveCount = enemies.filter(e => e.alive).length;
      if (aliveCount === 0) {
        stage++;
        diveInterval = Math.max(1, 2.5 - stage * 0.15);
        playerBullets = [];
        enemyBullets = [];
        tractorBeamActive = false;
        capturedShip = null;
        initFormation();
        diveTimer = 2;
      }
    }

    function killPlayer() {
      if (dualMode) {
        dualMode = false;
        playerInvuln = 2;
        sfxHit();
        return; // lose dual mode but keep life
      }
      lives--;
      sfxDeath();
      if (lives <= 0) {
        playerDead = true;
        playerDeathTimer = 1.5;
        // Trigger game over after death anim
      } else {
        playerDead = true;
        playerDeathTimer = 1.5;
      }
    }

    function getPoints(e) {
      const diving = e.diving || e.divePhase > 0;
      if (e.type === ENEMY_TYPE.BOSS)       return diving ? 400 : 150;
      if (e.type === ENEMY_TYPE.BUTTERFLY)  return diving ? 160 : 80;
      return diving ? 100 : 50; // Bee variants
    }

    function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    // ─── Drawing ──────────────────────────────────────────────────────────────
    function drawShip(x, y, w, h, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      // Body
      ctx.beginPath();
      ctx.moveTo(x, y - h/2);          // nose
      ctx.lineTo(x + w/2, y + h/2);    // right base
      ctx.lineTo(x + w/4, y + h/4);    // right indent
      ctx.lineTo(x, y + h/3);          // center base indent
      ctx.lineTo(x - w/4, y + h/4);    // left indent
      ctx.lineTo(x - w/2, y + h/2);    // left base
      ctx.closePath();
      ctx.stroke();
      // Engine glow
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y + h/4, 3, 0, Math.PI*2);
      ctx.fill();
    }

    function drawDualShip(x, y) {
      // Two merged fighters
      drawShip(x - 16, y, 24, 28, '#FFFFFF');
      drawShip(x + 16, y, 24, 28, '#FFFFFF');
      // Join bar
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 16, y + 8);
      ctx.lineTo(x + 16, y + 8);
      ctx.stroke();
    }

    function drawEnemy(e) {
      if (!e.alive) return;
      const x = e.x, y = e.y;
      const w = e.w, h = e.h;
      const damaged = e.hp < e.maxHp;
      const col = damaged ? '#886600' : e.color;
      ctx.save();
      if (e.type === ENEMY_TYPE.BOSS) {
        drawBoss(x, y, w, h, col, damaged);
      } else if (e.type === ENEMY_TYPE.BUTTERFLY) {
        drawButterfly(x, y, w, h, col);
      } else {
        drawBee(x, y, w, h, col);
      }
      ctx.restore();
    }

    function drawBoss(x, y, w, h, col, damaged) {
      // Insect-like silhouette, 2 wings, mandibles
      ctx.strokeStyle = col;
      ctx.fillStyle = col;
      ctx.lineWidth = 1.5;
      // Body
      ctx.beginPath();
      ctx.ellipse(x, y, w/4, h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // Wings
      ctx.beginPath();
      ctx.ellipse(x - w*0.4, y - h*0.1, w*0.35, h*0.3, -0.4, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(x + w*0.4, y - h*0.1, w*0.35, h*0.3, 0.4, 0, Math.PI*2);
      ctx.stroke();
      // Mandibles
      ctx.strokeStyle = col;
      ctx.beginPath();
      ctx.moveTo(x - w*0.15, y + h*0.4);
      ctx.lineTo(x - w*0.35, y + h*0.55);
      ctx.moveTo(x + w*0.15, y + h*0.4);
      ctx.lineTo(x + w*0.35, y + h*0.55);
      ctx.stroke();
      // Eyes
      ctx.fillStyle = damaged ? '#FFAA00' : '#00FF44';
      ctx.beginPath();
      ctx.arc(x - w*0.12, y - h*0.1, 2.5, 0, Math.PI*2);
      ctx.arc(x + w*0.12, y - h*0.1, 2.5, 0, Math.PI*2);
      ctx.fill();
      // Captured ship marker below boss
      if (e && e.capturedPlayer) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('✈', x, y + h + 12);
      }
    }
    // Closure bug fix - pass e explicitly
    function drawBossEnemy(e) {
      const damaged = e.hp < e.maxHp;
      const col = damaged ? '#886600' : e.color;
      drawBoss(e.x, e.y, e.w, e.h, col, damaged);
      // captured indicator
      if (e.capturedPlayer) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('captured', e.x, e.y + e.h + 14);
      }
    }

    function drawButterfly(x, y, w, h, col) {
      ctx.strokeStyle = col;
      ctx.fillStyle = col;
      ctx.lineWidth = 1.5;
      // Upper wings
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x - w*0.6, y - h*0.5, x - w*0.5, y + h*0.2, x - w*0.05, y + h*0.1);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x + w*0.6, y - h*0.5, x + w*0.5, y + h*0.2, x + w*0.05, y + h*0.1);
      ctx.fill();
      // Lower wings
      ctx.beginPath();
      ctx.moveTo(x - w*0.05, y + h*0.1);
      ctx.bezierCurveTo(x - w*0.45, y + h*0.3, x - w*0.3, y + h*0.6, x, y + h*0.5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + w*0.05, y + h*0.1);
      ctx.bezierCurveTo(x + w*0.45, y + h*0.3, x + w*0.3, y + h*0.6, x, y + h*0.5);
      ctx.fill();
      // Body
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(x, y, 2.5, h*0.35, 0, 0, Math.PI*2);
      ctx.fill();
    }

    function drawBee(x, y, w, h, col) {
      ctx.strokeStyle = col;
      ctx.fillStyle = col;
      ctx.lineWidth = 1.5;
      // Body
      ctx.beginPath();
      ctx.ellipse(x, y, w*0.2, h*0.4, 0, 0, Math.PI*2);
      ctx.fill();
      // Wings
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(x - w*0.3, y - h*0.1, w*0.25, h*0.2, -0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + w*0.3, y - h*0.1, w*0.25, h*0.2, 0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Stripes
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - w*0.15, y - 1);
      ctx.lineTo(x + w*0.15, y - 1);
      ctx.moveTo(x - w*0.15, y + 2);
      ctx.lineTo(x + w*0.15, y + 2);
      ctx.stroke();
      // Head
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(x, y - h*0.38, w*0.12, 0, Math.PI*2);
      ctx.fill();
    }

    function drawTractorBeam(boss) {
      const bx = boss.x - 20;
      const by = boss.y;
      const bw = 40, bh = 200;
      // Animated scanlines
      const t = Date.now() / 200;
      for (let i = 0; i < 5; i++) {
        const frac = ((i / 5) + t * 0.1) % 1;
        const yy = by + frac * bh;
        const alpha = 0.3 * (1 - frac);
        ctx.fillStyle = `rgba(0,255,0,${alpha})`;
        ctx.fillRect(bx, yy, bw, 8);
      }
      // Outline
      const grad = ctx.createLinearGradient(bx, by, bx, by + bh);
      grad.addColorStop(0, 'rgba(0,255,0,0.6)');
      grad.addColorStop(1, 'rgba(0,255,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = 'rgba(0,255,0,0.8)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
    }

    function drawCapturedShip() {
      if (!capturedShip) return;
      const { x, y } = capturedShip;
      ctx.globalAlpha = 0.7;
      drawShip(x, y, 24, 26, '#AAAAFF');
      ctx.globalAlpha = 1;
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      drawStars();

      if (state === STATE.IDLE) {
        drawStartScreen();
        return;
      }

      // Formation enemies
      for (const e of enemies) {
        if (!e.alive) continue;
        if (e.type === ENEMY_TYPE.BOSS) {
          drawBossEnemy(e);
        } else if (e.type === ENEMY_TYPE.BUTTERFLY) {
          drawButterfly(e.x, e.y, e.w, e.h, e.color);
        } else {
          drawBee(e.x, e.y, e.w, e.h, e.color);
        }
        // Tractor beam
        if (e.tractorBeamOn) drawTractorBeam(e);
      }

      // Enemy bullets
      ctx.fillStyle = '#FF6666';
      for (const b of enemyBullets) {
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      }

      // Captured ship
      drawCapturedShip();

      // Player
      if (!playerDead) {
        const blinking = playerInvuln > 0 && Math.floor(playerInvuln * 8) % 2 === 0;
        if (!blinking) {
          if (dualMode) {
            drawDualShip(player.x, player.y);
          } else {
            drawShip(player.x, player.y, player.w, player.h, '#FFFFFF');
          }
        }
      }

      // Player bullets
      ctx.fillStyle = '#FFFFFF';
      for (const b of playerBullets) {
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      }

      drawHUD();

      if (state === STATE.PAUSED) drawPause();
      if (state === STATE.GAME_OVER) drawGameOver();
    }

    function drawHUD() {
      ctx.font = '16px monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 12, 22);
      ctx.textAlign = 'center';
      ctx.fillText(`HI: ${highScore}`, W/2, 22);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.fillText(`STAGE ${stage}`, W - 12, H - 10);

      // Lives as ship icons bottom-left
      for (let i = 0; i < lives; i++) {
        ctx.save();
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 1.5;
        const lx = 16 + i * 22;
        const ly = H - 18;
        ctx.translate(lx, ly);
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(8, 8);
        ctx.lineTo(4, 4);
        ctx.lineTo(0, 6);
        ctx.lineTo(-4, 4);
        ctx.lineTo(-8, 8);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
      if (dualMode) {
        ctx.fillStyle = '#00FFCC';
        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('DUAL', 12, H - 32);
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = '#FFCC00';
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GALAGA', W/2, 200);

      // Enemy legend
      const legend = [
        { type: ENEMY_TYPE.BOSS, color: '#00CC00', label: 'BOSS GALAGA  150/400', y: 270 },
        { type: ENEMY_TYPE.BUTTERFLY, color: '#FF4444', label: 'BUTTERFLY    80/160', y: 310 },
        { type: ENEMY_TYPE.BEE, color: '#FFCC00', label: 'BEE          50/100', y: 350 },
        { type: ENEMY_TYPE.BEE_BLUE, color: '#00BBFF', label: 'BEE VARIANT  50/100', y: 390 },
      ];
      ctx.font = '14px monospace';
      for (const item of legend) {
        ctx.fillStyle = item.color;
        ctx.textAlign = 'left';
        ctx.fillText('■', W/2 - 160, item.y);
        ctx.fillStyle = '#CCCCCC';
        ctx.fillText(item.label, W/2 - 140, item.y);
      }

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press Enter to Start', W/2, 420);
    }

    function drawPause() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.font = '18px monospace';
      ctx.fillText('Press P to Resume', W/2, H/2 + 50);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 52px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '22px monospace';
      ctx.fillText(`SCORE: ${score}`, W/2, H/2 + 20);
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', W/2, H/2 + 70);
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    function loop(ts) {
      const dt = Math.min((ts - lastTime) / 1000, 0.05);
      lastTime = ts;
      if (state === STATE.PLAYING) {
        update(dt);
      } else if (state === STATE.IDLE || state === STATE.GAME_OVER) {
        updateStars(dt);
      }
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(ts => {
      lastTime = ts;
      requestAnimationFrame(loop);
    });

  })();
  </script>
