<!--
  GAME:           Galaga
  RUN:            run2-gpt-plan
  BUILDER:        openai/o3-mini
  PLANNER:        openai/gpt-5.4
  BUILD TIME:     38 seconds
  TOKENS IN:      3000
  TOKENS OUT:     3600
  ESTIMATED COST: $0.019
  ITERATIONS:     1
  TOOLS USED:     write
  STATUS:         complete
  TIMESTAMP:      2026-04-11T13:20:00Z
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaga (o3-mini)</title>
<style>body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}canvas{border:1px solid #222;}</style>
</head>
<body>
<canvas id="c" width="480" height="720"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=480,H=720;
let state='start',score=0,hi=+localStorage.getItem('g_hi')||0,lives=3,stage=1;
let px=W/2-14,py=H-80,pbullets=[],ebullets=[],enemies=[],stars=[];
let tick=0,fireCD=0;

// Init stars
for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:0.5+Math.random()*1.5});

function initGame(){
  px=W/2-14; py=H-80; pbullets=[]; ebullets=[]; enemies=[];
  tick=0; fireCD=0;
  // 8 rows x 5 cols
  const types=[['boss','boss','boss','boss','boss'],['boss','boss','boss','boss','boss'],
                ['butterfly','butterfly','butterfly','butterfly','butterfly'],['butterfly','butterfly','butterfly','butterfly','butterfly'],
                ['bee','bee','bee','bee','bee'],['bee','bee','bee','bee','bee'],
                ['bee','bee','bee','bee','bee'],['bee','bee','bee','bee','bee']];
  const colors={boss:'#FF00FF',butterfly:'#4488FF',bee:'#FFDD00'};
  const pts={boss:150,butterfly:80,bee:50};
  for(let r=0;r<types.length;r++){
    for(let c2=0;c2<types[r].length;c2++){
      const tp=types[r][c2];
      const tx=60+c2*40, ty=100+r*40;
      enemies.push({tp,color:colors[tp],pts:pts[tp],
        x:-50+Math.random()*20,y:-50-r*20,tx,ty,
        alive:true,inForm:false,diving:false,
        diveT:0,diveDir:1,speed:2,
        entryDone:false,entryDelay:r*20+c2*4
      });
    }
  }
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Enter' && state!=='playing'){state='playing';initGame();}
  if(e.code==='Space' && state==='playing' && fireCD<=0){
    pbullets.push({x:px+14,y:py});fireCD=15;
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function update(){
  if(state!=='playing')return;
  tick++;
  if(fireCD>0)fireCD--;
  
  // Stars
  for(const s of stars){s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W;}}
  
  // Player
  if((keys['ArrowLeft']||keys['KeyA'])&&px>0)px-=4;
  if((keys['ArrowRight']||keys['KeyD'])&&px+28<W)px+=4;
  
  // Enemy entry
  for(const e of enemies){
    if(!e.alive)continue;
    if(tick < e.entryDelay){continue;}
    if(!e.entryDone){
      const dx=e.tx-e.x,dy=e.ty-e.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<4){e.x=e.tx;e.y=e.ty;e.entryDone=true;e.inForm=true;}
      else{e.x+=dx/d*3;e.y+=dy/d*3;}
    }
  }
  
  // Formation sway
  const sway=Math.sin(tick*0.015)*25;
  for(const e of enemies){
    if(!e.alive||e.diving||!e.entryDone)continue;
    e.x=e.tx+sway; e.y=e.ty;
  }
  
  // Random dives
  if(tick%90===0 && enemies.some(e=>e.alive&&e.entryDone&&!e.diving)){
    const cands=enemies.filter(e=>e.alive&&e.entryDone&&!e.diving);
    if(cands.length){
      const d=cands[Math.floor(Math.random()*cands.length)];
      d.diving=true;d.diveT=0;d.diveDir=d.x<W/2?1:-1;
    }
  }
  
  // Dive movement
  for(const e of enemies){
    if(!e.alive||!e.diving)continue;
    e.diveT++;
    e.y+=3;
    e.x+=Math.sin(e.diveT*0.1)*3*e.diveDir;
    if(e.y>H+50){e.y=e.ty;e.x=e.tx;e.diving=false;e.inForm=true;}
  }
  
  // Enemy fire
  if(tick%80===0){
    const alive=enemies.filter(e=>e.alive);
    if(alive.length&&ebullets.length<3){
      const s=alive[Math.floor(Math.random()*alive.length)];
      ebullets.push({x:s.x+12,y:s.y+20,vy:5});
    }
  }
  
  // Player bullets
  for(let i=pbullets.length-1;i>=0;i--){
    pbullets[i].y-=10;
    if(pbullets[i].y<0){pbullets.splice(i,1);continue;}
    let hit=false;
    for(const e of enemies){
      if(!e.alive)continue;
      if(pbullets[i]&&pbullets[i].x>e.x&&pbullets[i].x<e.x+24&&pbullets[i].y>e.y&&pbullets[i].y<e.y+20){
        e.alive=false;score+=e.pts;pbullets.splice(i,1);hit=true;break;
      }
    }
  }
  
  // Enemy bullets
  for(let i=ebullets.length-1;i>=0;i--){
    ebullets[i].y+=ebullets[i].vy;
    if(ebullets[i].y>H){ebullets.splice(i,1);continue;}
    const b=ebullets[i];
    if(b.x>px&&b.x<px+28&&b.y>py&&b.y<py+24){
      lives--;ebullets.splice(i,1);
      if(lives<=0){state='gameover';if(score>hi){hi=score;localStorage.setItem('g_hi',hi);}}
      continue;
    }
  }
  
  // Wave clear
  if(enemies.every(e=>!e.alive)){stage++;score+=500;initGame();}
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(const s of stars){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(s.x,s.y,1,1);}
  
  if(state==='start'){
    ctx.fillStyle='#FF00FF';ctx.font='bold 40px monospace';ctx.textAlign='center';
    ctx.fillText('GALAGA',W/2,280);
    ctx.fillStyle='#FFF';ctx.font='18px monospace';
    ctx.fillText('ENTER to Start',W/2,340);ctx.textAlign='left';return;
  }
  if(state==='gameover'){
    ctx.fillStyle='#F00';ctx.font='bold 40px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,300);
    ctx.fillStyle='#FFF';ctx.font='20px monospace';ctx.fillText(`Score: ${score}`,W/2,360);
    ctx.fillText('ENTER to Restart',W/2,410);ctx.textAlign='left';return;
  }
  
  // HUD
  ctx.fillStyle='#FFF';ctx.font='14px monospace';
  ctx.fillText(`SCORE:${score}`,8,18);
  ctx.textAlign='right';ctx.fillText(`HI:${hi}`,W-8,18);ctx.textAlign='left';
  
  // Enemies
  for(const e of enemies){
    if(!e.alive)continue;
    ctx.fillStyle=e.color;
    ctx.fillRect(e.x,e.y,24,20);
    // Simple eye
    ctx.fillStyle='#000';ctx.fillRect(e.x+5,e.y+5,4,4);ctx.fillRect(e.x+15,e.y+5,4,4);
  }
  
  // Player
  ctx.fillStyle='#88AAFF';
  ctx.fillRect(px,py+8,28,16);
  ctx.fillRect(px+8,py+2,12,8);
  ctx.fillStyle='#FFF';ctx.fillRect(px+12,py,4,4);
  
  // Bullets
  ctx.fillStyle='#FFF';
  for(const b of pbullets)ctx.fillRect(b.x-1,b.y,3,12);
  ctx.fillStyle='#F44';
  for(const b of ebullets)ctx.fillRect(b.x-2,b.y,4,8);
  
  // Lives
  ctx.fillStyle='#88AAFF';
  for(let i=0;i<lives;i++)ctx.fillRect(8+i*18,H-28,14,16);
  ctx.fillStyle='#FFF';ctx.font='12px monospace';ctx.fillText(`Stage ${stage}`,W/2-25,H-15);
}

function loop(){update();draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
</html>
