<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="700"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // FROGGER GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 600;
    const CANVAS_HEIGHT = 700;
    const CELL_SIZE = 40;
    const GRID_COLS = 15;
    const GRID_ROWS = 13;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Player
    const FROG_START_X = 7;
    const FROG_START_Y = 13;
    const HOP_DURATION = 0.08;

    // Lanes
    const ROAD_LANES = [
      { y: 12, speed: 1.5, direction: 1, sizes: [48, 48, 64], color: '#CCCC00' },
      { y: 11, speed: 2.0, direction: -1, sizes: [48, 48, 48], color: '#3344AA' },
      { y: 10, speed: 1.8, direction: 1, sizes: [96], color: '#DD2222' },
      { y: 9, speed: 1.2, direction: -1, sizes: [48, 64, 64], color: '#CCCCCC' },
      { y: 8, speed: 1.6, direction: 1, sizes: [48, 48], color: '#FF66AA' }
    ];

    const RIVER_LANES = [
      { y: 6, speed: 1.0, direction: 1, size: 120, type: 'log' },
      { y: 5, speed: 1.4, direction: -1, size: 160, type: 'log' },
      { y: 4, speed: 1.2, direction: 1, size: 200, type: 'log' },
      { y: 3, speed: 1.3, direction: -1, size: 80, type: 'turtle', count: 2 },
      { y: 2, speed: 0.9, direction: 1, size: 120, type: 'turtle', count: 3 }
    ];

    const HOME_BAYS = [
      { x: 0, filled: false },
      { x: 3, filled: false },
      { x: 6, filled: false },
      { x: 9, filled: false },
      { x: 12, filled: false }
    ];

    // Game state
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let level = 1;
    let speedMultiplier = 1.0;

    try {
      highScore = parseInt(localStorage.getItem('frogger_high_score') || '0');
    } catch (e) {}

    // ── Player ─────────────────────────────────────────────────────────
    const player = {
      gridX: FROG_START_X,
      gridY: FROG_START_Y,
      hopX: FROG_START_X,
      hopY: FROG_START_Y,
      hopTimer: 0,
      hopping: false,
      farthestRow: FROG_START_Y,
      onPlatform: null
    };

    // ── Hazards ────────────────────────────────────────────────────────
    let vehicles = [];
    let logs = [];
    let turtles = [];

    function initHazards() {
      vehicles = [];
      logs = [];
      turtles = [];

      // Vehicles
      for (const lane of ROAD_LANES) {
        let x = 0;
        while (x < CANVAS_WIDTH + 200) {
          const size = lane.sizes[Math.floor(Math.random() * lane.sizes.length)];
          vehicles.push({
            x: x,
            y: lane.y * CELL_SIZE + CELL_SIZE / 4,
            w: size,
            h: 32,
            speed: lane.speed * speedMultiplier,
            direction: lane.direction,
            laneY: lane.y,
            color: lane.color
          });
          x += size + 40 + Math.random() * 40;
        }
      }

      // Logs and turtles
      for (const lane of RIVER_LANES) {
        let x = 0;
        while (x < CANVAS_WIDTH + 400) {
          if (lane.type === 'log') {
            logs.push({
              x: x,
              y: lane.y * CELL_SIZE + CELL_SIZE / 4,
              w: lane.size,
              h: 32,
              speed: lane.speed * speedMultiplier,
              direction: lane.direction,
              laneY: lane.y
            });
          } else {
            turtles.push({
              x: x,
              y: lane.y * CELL_SIZE + CELL_SIZE / 4,
              w: lane.size,
              h: 32,
              speed: lane.speed * speedMultiplier,
              direction: lane.direction,
              laneY: lane.y,
              count: lane.count,
              divePhase: Math.random() * 4,
              diveTime: 0
            });
          }
          x += (lane.type === 'log' ? lane.size : lane.size) + 60 + Math.random() * 60;
        }
      }
    }

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.key]) {
        keys[e.key] = true;

        if (e.key === 'Enter') {
          if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
            startGame();
          }
        }
        if (e.key === 'p' || e.key === 'P') {
          if (gameState === GAME_STATES.PLAYING) {
            gameState = GAME_STATES.PAUSED;
          } else if (gameState === GAME_STATES.PAUSED) {
            gameState = GAME_STATES.PLAYING;
          }
        }

        if (gameState === GAME_STATES.PLAYING && !player.hopping) {
          if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            if (player.gridY > 0) {
              player.hopX = player.gridX;
              player.hopY = player.gridY - 1;
              player.hopping = true;
              player.hopTimer = 0;
              sfxHop();
            }
          }
          if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            if (player.gridY < GRID_ROWS - 1) {
              player.hopX = player.gridX;
              player.hopY = player.gridY + 1;
              player.hopping = true;
              player.hopTimer = 0;
              sfxHop();
            }
          }
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            if (player.gridX > 0) {
              player.hopX = player.gridX - 1;
              player.hopY = player.gridY;
              player.hopping = true;
              player.hopTimer = 0;
              sfxHop();
            }
          }
          if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            if (player.gridX < GRID_COLS - 1) {
              player.hopX = player.gridX + 1;
              player.hopY = player.gridY;
              player.hopping = true;
              player.hopTimer = 0;
              sfxHop();
            }
          }
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ──────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxHop() { playTone(600, 0.05); }
    function sfxSplash() { playTone(200, 0.15); }
    function sfxSquash() { playTone(110, 0.1); }
    function sfxBayFill() { playTone(440, 0.1); }

    // ── Game Logic ─────────────────────────────────────────────────────
    let timerSeconds = 30;
    let timerDisplay = 30;

    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = 3;
      level = 1;
      speedMultiplier = 1.0;
      player.gridX = FROG_START_X;
      player.gridY = FROG_START_Y;
      player.farthestRow = FROG_START_Y;
      player.hopping = false;
      player.hopTimer = 0;
      player.onPlatform = null;
      timerSeconds = 30;
      timerDisplay = 30;
      HOME_BAYS.forEach(bay => bay.filled = false);
      initHazards();
    }

    function resetFrog() {
      player.gridX = FROG_START_X;
      player.gridY = FROG_START_Y;
      player.hopping = false;
      player.hopTimer = 0;
      player.onPlatform = null;
      timerSeconds = 30;
      timerDisplay = 30;
    }

    function updatePlayer(dt) {
      // Hop animation
      if (player.hopping) {
        player.hopTimer += dt;
        if (player.hopTimer >= HOP_DURATION) {
          player.gridX = player.hopX;
          player.gridY = player.hopY;
          player.hopping = false;
        }
      }

      // River platform carrying
      player.onPlatform = null;
      if (player.gridY >= 2 && player.gridY <= 6) {
        for (const log of logs) {
          const frogX = player.gridX * CELL_SIZE + CELL_SIZE / 2;
          const frogY = player.gridY * CELL_SIZE + CELL_SIZE / 2;
          if (frogX >= log.x && frogX < log.x + log.w && 
              Math.abs(frogY - (log.y + 16)) < CELL_SIZE / 2) {
            player.onPlatform = log;
            player.gridX += log.direction * log.speed * dt;
            break;
          }
        }

        // Check turtles
        if (!player.onPlatform) {
          for (const turtle of turtles) {
            if (turtle.divePhase >= 2) continue; // Submerged
            const frogX = player.gridX * CELL_SIZE + CELL_SIZE / 2;
            const frogY = player.gridY * CELL_SIZE + CELL_SIZE / 2;
            if (frogX >= turtle.x && frogX < turtle.x + turtle.w && 
                Math.abs(frogY - (turtle.y + 16)) < CELL_SIZE / 2) {
              player.onPlatform = turtle;
              player.gridX += turtle.direction * turtle.speed * dt;
              break;
            }
          }
        }

        // Check drowning
        if (!player.onPlatform && (player.gridY === 2 || player.gridY === 3 || player.gridY === 4 || player.gridY === 5 || player.gridY === 6)) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          } else {
            sfxSplash();
            resetFrog();
          }
          return;
        }
      }

      // Check carried off-screen
      if (player.onPlatform) {
        if (player.gridX < 0 || player.gridX >= GRID_COLS) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          } else {
            sfxSplash();
            resetFrog();
          }
          return;
        }
      }

      // Timer
      timerSeconds -= dt;
      timerDisplay = Math.ceil(timerSeconds);
      if (timerSeconds <= 0) {
        lives--;
        if (lives <= 0) {
          gameState = GAME_STATES.GAME_OVER;
        } else {
          sfxSplash();
          resetFrog();
        }
        return;
      }
    }

    function updateHazards(dt) {
      for (const vehicle of vehicles) {
        vehicle.x += vehicle.direction * vehicle.speed * dt;
        if (vehicle.direction > 0 && vehicle.x > CANVAS_WIDTH + 200) {
          vehicle.x = -vehicle.w - 200;
        }
        if (vehicle.direction < 0 && vehicle.x < -vehicle.w - 200) {
          vehicle.x = CANVAS_WIDTH + 200;
        }
      }

      for (const log of logs) {
        log.x += log.direction * log.speed * dt;
        if (log.direction > 0 && log.x > CANVAS_WIDTH + 200) {
          log.x = -log.w - 200;
        }
        if (log.direction < 0 && log.x < -log.w - 200) {
          log.x = CANVAS_WIDTH + 200;
        }
      }

      for (const turtle of turtles) {
        turtle.diveTime += dt;
        turtle.divePhase = (turtle.diveTime * 0.4) % 4;

        turtle.x += turtle.direction * turtle.speed * dt;
        if (turtle.direction > 0 && turtle.x > CANVAS_WIDTH + 200) {
          turtle.x = -turtle.w - 200;
        }
        if (turtle.direction < 0 && turtle.x < -turtle.w - 200) {
          turtle.x = CANVAS_WIDTH + 200;
        }
      }
    }

    function checkCollisions() {
      // Vehicle collision
      const frogX = player.gridX * CELL_SIZE;
      const frogY = player.gridY * CELL_SIZE;
      for (const vehicle of vehicles) {
        if (frogY >= vehicle.laneY * CELL_SIZE && frogY < (vehicle.laneY + 1) * CELL_SIZE) {
          if (frogX + CELL_SIZE > vehicle.x && frogX < vehicle.x + vehicle.w) {
            lives--;
            if (lives <= 0) {
              gameState = GAME_STATES.GAME_OVER;
            } else {
              sfxSquash();
              resetFrog();
            }
            return;
          }
        }
      }

      // Home bay
      if (player.gridY === 0) {
        let validBay = false;
        for (const bay of HOME_BAYS) {
          if (player.gridX === bay.x) {
            validBay = true;
            if (!bay.filled) {
              bay.filled = true;
              score += 50;
              score += timerDisplay * 2;
              if (score > highScore) {
                highScore = score;
                try {
                  localStorage.setItem('frogger_high_score', String(highScore));
                } catch (e) {}
              }
              sfxBayFill();

              if (HOME_BAYS.every(b => b.filled)) {
                score += 1000;
                level++;
                speedMultiplier *= 1.15;
                HOME_BAYS.forEach(b => b.filled = false);
                initHazards();
              }
              resetFrog();
            } else {
              lives--;
              if (lives <= 0) {
                gameState = GAME_STATES.GAME_OVER;
              } else {
                sfxSquash();
                resetFrog();
              }
            }
            break;
          }
        }
        if (!validBay) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          } else {
            sfxSquash();
            resetFrog();
          }
        }
      }

      // Update furthest row
      if (player.gridY < player.farthestRow) {
        score += 10;
        player.farthestRow = player.gridY;
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('frogger_high_score', String(highScore));
          } catch (e) {}
        }
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        updatePlayer(dt);
        updateHazards(dt);
        checkCollisions();
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw lanes
      for (let row = 0; row < GRID_ROWS; row++) {
        if (row === 1 || row === 7) {
          ctx.fillStyle = '#333';
          ctx.fillRect(0, row * CELL_SIZE, CANVAS_WIDTH, CELL_SIZE);
        }
      }

      // Draw home bays
      for (const bay of HOME_BAYS) {
        ctx.fillStyle = bay.filled ? '#22CC22' : '#000066';
        ctx.fillRect(bay.x * CELL_SIZE + 4, 4, CELL_SIZE - 8, CELL_SIZE - 8);
        ctx.strokeStyle = '#0066FF';
        ctx.lineWidth = 2;
        ctx.strokeRect(bay.x * CELL_SIZE + 4, 4, CELL_SIZE - 8, CELL_SIZE - 8);
      }

      // Draw vehicles
      for (const vehicle of vehicles) {
        ctx.fillStyle = vehicle.color;
        ctx.fillRect(vehicle.x, vehicle.y, vehicle.w, vehicle.h);
        ctx.fillStyle = '#000';
        ctx.fillRect(vehicle.x + 4, vehicle.y + 4, vehicle.w / 3, vehicle.h / 2);
      }

      // Draw logs
      for (const log of logs) {
        ctx.fillStyle = '#885522';
        ctx.fillRect(log.x, log.y, log.w, log.h);
        ctx.fillStyle = '#774411';
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(log.x + i * log.w / 4 + 2, log.y + 2, log.w / 8, log.h / 3);
        }
      }

      // Draw turtles
      for (const turtle of turtles) {
        const diveAlpha = Math.max(0.2, 1 - turtle.divePhase / 4);
        ctx.globalAlpha = diveAlpha;
        ctx.fillStyle = '#448844';
        for (let i = 0; i < turtle.count; i++) {
          const tx = turtle.x + i * 40;
          ctx.fillRect(tx, turtle.y, 36, turtle.h);
          ctx.fillStyle = '#225522';
          ctx.fillRect(tx + 2, turtle.y + 2, 8, 8);
          ctx.fillStyle = '#448844';
        }
        ctx.globalAlpha = 1.0;
      }

      // Draw frog
      const frogRenderX = player.hopping 
        ? player.gridX * CELL_SIZE + (player.hopX - player.gridX) * CELL_SIZE * (player.hopTimer / HOP_DURATION)
        : player.gridX * CELL_SIZE;
      const frogRenderY = player.hopping 
        ? player.gridY * CELL_SIZE + (player.hopY - player.gridY) * CELL_SIZE * (player.hopTimer / HOP_DURATION)
        : player.gridY * CELL_SIZE;

      ctx.fillStyle = '#22CC22';
      ctx.fillRect(frogRenderX + 4, frogRenderY + 4, CELL_SIZE - 8, CELL_SIZE - 8);

      ctx.fillStyle = '#000';
      ctx.fillRect(frogRenderX + 10, frogRenderY + 8, 4, 4);
      ctx.fillRect(frogRenderX + 18, frogRenderY + 8, 4, 4);

      ctx.fillStyle = '#FFF';
      ctx.fillRect(frogRenderX + 11, frogRenderY + 9, 2, 2);
      ctx.fillRect(frogRenderX + 19, frogRenderY + 9, 2, 2);

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 670);

      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH - 10, 670);

      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${lives}`, 10, CANVAS_HEIGHT - 10);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#AAA';
      ctx.font = '14px monospace';
      ctx.fillText(`Level ${level}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);

      // Draw timer
      const timerPercent = Math.max(0, timerSeconds / 30);
      ctx.fillStyle = timerPercent > 0.3 ? '#22CC22' : timerPercent > 0.1 ? '#CCCC00' : '#DD2222';
      ctx.fillRect(10, 680, Math.max(0, (CANVAS_WIDTH - 20) * timerPercent), 12);
      ctx.strokeStyle = '#AAA';
      ctx.lineWidth = 1;
      ctx.strokeRect(10, 680, CANVAS_WIDTH - 20, 12);

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#22CC22';
      ctx.font = '52px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FROGGER', CANVAS_WIDTH / 2, 280);
      ctx.font = '20px monospace';
      ctx.fillStyle = '#FFF';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 380);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 350);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 300);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 350);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 400);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
    }

    // ── Initialize ─────────────────────────────────────────────────────
    initHazards();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
