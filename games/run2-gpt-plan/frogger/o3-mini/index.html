<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #111;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <script>
    // Simple Frogger game implementation
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const laneCount = 5;           // Number of lanes with vehicles
    const laneHeight = 80;         // Height of each lane
    const roadY = 100;             // Y-position where road/lane begins

    // Frog object
    const frog = {
      x: canvas.width / 2 - 15,
      y: canvas.height - 40,
      width: 30,
      height: 30,
      speed: 30
    };

    // Vehicles array
    let vehicles = [];
    
    // Function to create vehicles for each lane
    function createVehicles() {
      vehicles = [];
      for (let i = 0; i < laneCount; i++) {
        let laneY = roadY + i * laneHeight + 10;
        let count = 3;                        // vehicles per lane
        let direction = i % 2 === 0 ? 1 : -1;   // alternate direction per lane
        for (let j = 0; j < count; j++) {
          let vehicleWidth = 60;
          let vehicleHeight = 30;
          let gap = canvas.width / count;
          let x = j * gap + (Math.random() * 20);
          vehicles.push({
            x: x,
            y: laneY,
            width: vehicleWidth,
            height: vehicleHeight,
            speed: direction * (2 + Math.random() * 2)
          });
        }
      }
    }
    
    createVehicles();

    // Input handling
    const keys = {};
    document.addEventListener('keydown', (e) => { keys[e.key] = true; });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // Update game state
    function update() {
      // Move frog with arrow keys (single move per key press)
      if (keys['ArrowLeft'] && frog.x - frog.speed >= 0) {
        frog.x -= frog.speed;
        keys['ArrowLeft'] = false;
      } else if (keys['ArrowRight'] && frog.x + frog.width + frog.speed <= canvas.width) {
        frog.x += frog.speed;
        keys['ArrowRight'] = false;
      } else if (keys['ArrowUp'] && frog.y - frog.speed >= 0) {
        frog.y -= frog.speed;
        keys['ArrowUp'] = false;
      } else if (keys['ArrowDown'] && frog.y + frog.height + frog.speed <= canvas.height) {
        frog.y += frog.speed;
        keys['ArrowDown'] = false;
      }

      // Update vehicles
      vehicles.forEach(v => {
        v.x += v.speed;
        // Wrap vehicles around the screen
        if (v.speed > 0 && v.x > canvas.width) {
          v.x = -v.width;
        } else if (v.speed < 0 && v.x + v.width < 0) {
          v.x = canvas.width;
        }
      });

      // Check for collisions between frog and vehicles
      vehicles.forEach(v => {
        if (rectIntersect(frog, v)) {
          resetFrog();
        }
      });

      // Win condition: Frog reaches top
      if (frog.y <= 0) {
        alert('YOU WIN!');
        resetFrog();
      }
    }

    function resetFrog() {
      frog.x = canvas.width / 2 - frog.width / 2;
      frog.y = canvas.height - 40;
    }

    function rectIntersect(a, b) {
      return !(a.x > b.x + b.width ||
               a.x + a.width < b.x ||
               a.y > b.y + b.height ||
               a.y + a.height < b.y);
    }

    // Draw game state
    function draw() {
      // Clear the canvas
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw lanes background
      for (let i = 0; i < laneCount; i++) {
        let laneY = roadY + i * laneHeight;
        ctx.fillStyle = '#333';
        ctx.fillRect(0, laneY, canvas.width, laneHeight);
      }

      // Draw frog
      ctx.fillStyle = '#0F0';
      ctx.fillRect(frog.x, frog.y, frog.width, frog.height);

      // Draw vehicles
      ctx.fillStyle = '#F00';
      vehicles.forEach(v => {
        ctx.fillRect(v.x, v.y, v.width, v.height);
      });
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
