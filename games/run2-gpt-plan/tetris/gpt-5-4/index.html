<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - run2-gpt-plan</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(100vw, 800px);
      height: auto;
      max-height: 100vh;
      background: #111111;
      box-shadow: 0 0 28px rgba(255,255,255,0.06);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600" aria-label="Tetris game canvas"></canvas>
  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 800;
      const HEIGHT = 600;
      const COLS = 10;
      const ROWS = 20;
      const CELL = 28;
      const WELL_X = 240;
      const WELL_Y = 20;
      const PANEL_X = 560;
      const PANEL_Y = 60;
      const LOCK_DELAY = 500;
      const MAX_LOCK_RESETS = 3;
      const INITIAL_GRAVITY = 1000;
      const MIN_GRAVITY = 100;

      const STATE = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      const COLORS = {
        I: '#00FFFF',
        O: '#FFFF00',
        T: '#AA00FF',
        S: '#00FF00',
        Z: '#FF0000',
        J: '#0000FF',
        L: '#FF8800'
      };

      const SHAPES = {
        I: [
          [[0,1],[1,1],[2,1],[3,1]],
          [[2,0],[2,1],[2,2],[2,3]],
          [[0,2],[1,2],[2,2],[3,2]],
          [[1,0],[1,1],[1,2],[1,3]]
        ],
        O: [
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]]
        ],
        T: [
          [[1,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[2,1],[1,2]],
          [[1,0],[0,1],[1,1],[1,2]]
        ],
        S: [
          [[1,0],[2,0],[0,1],[1,1]],
          [[1,0],[1,1],[2,1],[2,2]],
          [[1,1],[2,1],[0,2],[1,2]],
          [[0,0],[0,1],[1,1],[1,2]]
        ],
        Z: [
          [[0,0],[1,0],[1,1],[2,1]],
          [[2,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[1,2],[2,2]],
          [[1,0],[0,1],[1,1],[0,2]]
        ],
        J: [
          [[0,0],[0,1],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[1,2]],
          [[0,1],[1,1],[2,1],[2,2]],
          [[1,0],[1,1],[0,2],[1,2]]
        ],
        L: [
          [[2,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[1,2],[2,2]],
          [[0,1],[1,1],[2,1],[0,2]],
          [[0,0],[1,0],[1,1],[1,2]]
        ]
      };

      let audioCtx = null;
      let lastTime = 0;
      let dropAccumulator = 0;
      let lockTimer = 0;
      let state = STATE.IDLE;
      let board = createBoard();
      let bag = [];
      let active = null;
      let nextType = null;
      let score = 0;
      let lines = 0;
      let level = 1;
      let highScore = loadHighScore();
      let lineFlashTimer = 0;
      let flashingRows = [];
      const keysHeld = new Set();

      function createBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      }

      function loadHighScore() {
        const raw = Number(localStorage.getItem('tetris_run2_high_score'));
        return Number.isFinite(raw) ? raw : 0;
      }

      function saveHighScore(value) {
        localStorage.setItem('tetris_run2_high_score', String(value));
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          saveHighScore(highScore);
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return null;
          audioCtx = new AudioCtx();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      }

      function playTone(type, frequency, duration, rampTo = null, volume = 0.03) {
        const ac = ensureAudio();
        if (!ac) return;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        const now = ac.currentTime;
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (rampTo !== null) osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playMoveSound() { playTone('square', 220, 0.03, null, 0.018); }
      function playLineClearSound() { playTone('triangle', 440, 0.12, 880, 0.03); }
      function playHardDropSound() { playTone('square', 120, 0.05, 80, 0.025); }
      function playGameOverSound() { playTone('sawtooth', 420, 0.3, 120, 0.035); }

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function refillBagIfNeeded() {
        if (bag.length === 0) {
          bag = shuffle(['I','O','T','S','Z','J','L']);
        }
      }

      function pullType() {
        refillBagIfNeeded();
        return bag.shift();
      }

      function getGravityInterval() {
        return Math.max(MIN_GRAVITY, INITIAL_GRAVITY - (level - 1) * 75);
      }

      function pieceCells(type, rotation, x, y) {
        return SHAPES[type][rotation].map(([cx, cy]) => ({ x: x + cx, y: y + cy }));
      }

      function collides(x, y, rotation, type = active?.type) {
        const cells = pieceCells(type, rotation, x, y);
        return cells.some(cell => {
          if (cell.x < 0 || cell.x >= COLS || cell.y >= ROWS) return true;
          if (cell.y < 0) return false;
          return !!board[cell.y][cell.x];
        });
      }

      function spawnPiece() {
        const type = nextType || pullType();
        nextType = pullType();
        active = {
          type,
          x: 3,
          y: -1,
          rotation: 0,
          grounded: false,
          lockResets: 0
        };
        lockTimer = 0;
        if (collides(active.x, active.y, active.rotation, active.type)) {
          state = STATE.GAME_OVER;
          updateHighScore();
          playGameOverSound();
        }
      }

      function startGame() {
        ensureAudio();
        board = createBoard();
        bag = [];
        score = 0;
        lines = 0;
        level = 1;
        dropAccumulator = 0;
        flashingRows = [];
        lineFlashTimer = 0;
        nextType = pullType();
        spawnPiece();
        updateHighScore();
        state = STATE.PLAYING;
      }

      function addScore(points) {
        score += points;
        updateHighScore();
      }

      function tryMove(dx, dy, awardSoftDrop = false) {
        if (!active) return false;
        const nx = active.x + dx;
        const ny = active.y + dy;
        if (!collides(nx, ny, active.rotation)) {
          active.x = nx;
          active.y = ny;
          if (awardSoftDrop && dy > 0) addScore(1);
          if (active.grounded && active.lockResets < MAX_LOCK_RESETS) {
            lockTimer = 0;
            active.lockResets += 1;
          }
          active.grounded = false;
          return true;
        }
        return false;
      }

      function tryRotate() {
        if (!active) return false;
        const nextRotation = (active.rotation + 1) % 4;
        const kicks = [0, -1, 1, -2, 2];
        for (const kick of kicks) {
          if (!collides(active.x + kick, active.y, nextRotation)) {
            active.x += kick;
            active.rotation = nextRotation;
            if (active.grounded && active.lockResets < MAX_LOCK_RESETS) {
              lockTimer = 0;
              active.lockResets += 1;
            }
            active.grounded = false;
            playMoveSound();
            return true;
          }
        }
        return false;
      }

      function getGhostY() {
        if (!active) return 0;
        let ghostY = active.y;
        while (!collides(active.x, ghostY + 1, active.rotation)) {
          ghostY += 1;
        }
        return ghostY;
      }

      function lockPiece() {
        const cells = pieceCells(active.type, active.rotation, active.x, active.y);
        for (const cell of cells) {
          if (cell.y >= 0) board[cell.y][cell.x] = active.type;
        }
        resolveLineClear();
        spawnPiece();
      }

      function resolveLineClear() {
        const cleared = [];
        for (let y = 0; y < ROWS; y++) {
          if (board[y].every(Boolean)) cleared.push(y);
        }
        if (!cleared.length) return;

        flashingRows = cleared;
        lineFlashTimer = 0.08;

        for (const y of cleared.sort((a, b) => a - b)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
        }

        lines += cleared.length;
        level = Math.floor(lines / 10) + 1;
        const lineValues = { 1: 100, 2: 300, 3: 500, 4: 800 };
        addScore((lineValues[cleared.length] || 0) * level);
        playLineClearSound();
      }

      function hardDrop() {
        if (!active || state !== STATE.PLAYING) return;
        let dropped = 0;
        while (tryMove(0, 1, false)) {
          dropped += 1;
        }
        if (dropped > 0) addScore(dropped * 2);
        playHardDropSound();
        lockPiece();
      }

      function updatePlaying(dt) {
        if (!active) return;

        if (lineFlashTimer > 0) {
          lineFlashTimer -= dt;
        }

        dropAccumulator += dt * 1000;
        const gravity = getGravityInterval();

        if (dropAccumulator >= gravity) {
          dropAccumulator -= gravity;
          if (!tryMove(0, 1)) {
            active.grounded = true;
          }
        }

        if (collides(active.x, active.y + 1, active.rotation)) {
          active.grounded = true;
          lockTimer += dt * 1000;
          if (lockTimer >= LOCK_DELAY) {
            lockPiece();
          }
        } else {
          active.grounded = false;
          lockTimer = 0;
          active.lockResets = 0;
        }
      }

      function shadeColor(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function drawCell(gridX, gridY, color, alpha = 1) {
        const x = WELL_X + gridX * CELL;
        const y = WELL_Y + gridY * CELL;
        ctx.fillStyle = alpha === 1 ? color : shadeColor(color, alpha);
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
        ctx.fillStyle = alpha === 1 ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)';
        ctx.fillRect(x + 2, y + 2, CELL - 4, 4);
      }

      function drawPlayfield() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(WELL_X, WELL_Y, COLS * CELL, ROWS * CELL);
        ctx.strokeStyle = '#555555';
        ctx.lineWidth = 2;
        ctx.strokeRect(WELL_X, WELL_Y, COLS * CELL, ROWS * CELL);
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 1;
        for (let x = 1; x < COLS; x++) {
          const px = WELL_X + x * CELL + 0.5;
          ctx.beginPath();
          ctx.moveTo(px, WELL_Y);
          ctx.lineTo(px, WELL_Y + ROWS * CELL);
          ctx.stroke();
        }
        for (let y = 1; y < ROWS; y++) {
          const py = WELL_Y + y * CELL + 0.5;
          ctx.beginPath();
          ctx.moveTo(WELL_X, py);
          ctx.lineTo(WELL_X + COLS * CELL, py);
          ctx.stroke();
        }
      }

      function drawBoard() {
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const type = board[y][x];
            if (type) {
              const flash = flashingRows.includes(y) && lineFlashTimer > 0;
              drawCell(x, y, flash ? '#FFFFFF' : COLORS[type]);
            }
          }
        }
      }

      function drawPiece(piece, alpha = 1, yOverride = null) {
        if (!piece) return;
        const y = yOverride ?? piece.y;
        const cells = pieceCells(piece.type, piece.rotation, piece.x, y);
        for (const cell of cells) {
          if (cell.y >= 0) drawCell(cell.x, cell.y, COLORS[piece.type], alpha);
        }
      }

      function drawGhost() {
        if (!active) return;
        drawPiece(active, 0.3, getGhostY());
      }

      function drawNextPreview() {
        ctx.strokeStyle = '#555555';
        ctx.lineWidth = 2;
        ctx.strokeRect(PANEL_X, PANEL_Y, 112, 112);
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('NEXT', PANEL_X, PANEL_Y - 10);
        if (!nextType) return;
        const cells = SHAPES[nextType][0];
        const minX = Math.min(...cells.map(c => c[0]));
        const maxX = Math.max(...cells.map(c => c[0]));
        const minY = Math.min(...cells.map(c => c[1]));
        const maxY = Math.max(...cells.map(c => c[1]));
        const width = (maxX - minX + 1) * CELL;
        const height = (maxY - minY + 1) * CELL;
        const offsetX = PANEL_X + (112 - width) / 2;
        const offsetY = PANEL_Y + (112 - height) / 2;
        for (const [cx, cy] of cells) {
          ctx.fillStyle = COLORS[nextType];
          ctx.fillRect(offsetX + (cx - minX) * CELL + 2, offsetY + (cy - minY) * CELL + 2, CELL - 4, CELL - 4);
        }
      }

      function drawHud() {
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '14px monospace';
        ctx.fillText('SCORE', PANEL_X, 210);
        ctx.fillText('LEVEL', PANEL_X, 280);
        ctx.fillText('LINES', PANEL_X, 350);
        ctx.fillText('HIGH', PANEL_X, 420);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px monospace';
        ctx.fillText(String(score), PANEL_X, 232);
        ctx.fillText(String(level), PANEL_X, 302);
        ctx.fillText(String(lines), PANEL_X, 372);
        ctx.fillText(String(highScore), PANEL_X, 442);

        ctx.fillStyle = '#888888';
        ctx.font = '14px monospace';
        ctx.fillText('← → move', PANEL_X, 500);
        ctx.fillText('↑ rotate', PANEL_X, 522);
        ctx.fillText('↓ soft drop', PANEL_X, 544);
        ctx.fillText('Space hard drop', PANEL_X, 566);
      }

      function drawOverlay(title, subtitle, prompt, color = '#FFFFFF') {
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = color;
        ctx.font = '56px monospace';
        ctx.fillText(title, WIDTH / 2, 220);
        if (subtitle) {
          ctx.fillStyle = '#CCCCCC';
          ctx.font = '22px monospace';
          ctx.fillText(subtitle, WIDTH / 2, 300);
        }
        if (prompt) {
          ctx.fillStyle = '#FFFFFF';
          ctx.font = '28px monospace';
          ctx.fillText(prompt, WIDTH / 2, 360);
        }
      }

      function drawStartScreen() {
        drawOverlay('TETRIS', 'Seven pieces. One well. Don\'t top out.', 'Press Enter to Start', '#FFFFFF');
        const previewTypes = ['I','O','T','S','Z','J','L'];
        previewTypes.forEach((type, i) => {
          const baseX = 115 + i * 78;
          const baseY = 430;
          SHAPES[type][0].forEach(([cx, cy]) => {
            ctx.fillStyle = COLORS[type];
            ctx.fillRect(baseX + cx * 14, baseY + cy * 14, 12, 12);
          });
        });
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#111111';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        drawPlayfield();
        drawBoard();
        if (state !== STATE.IDLE) {
          drawGhost();
          drawPiece(active);
        }
        drawNextPreview();
        drawHud();

        if (state === STATE.IDLE) {
          drawStartScreen();
        } else if (state === STATE.PAUSED) {
          drawOverlay('PAUSED', null, 'Press P to Resume');
        } else if (state === STATE.GAME_OVER) {
          drawOverlay('GAME OVER', `Final Score ${score}`, 'Press Enter to Restart');
        }
      }

      function update(dt) {
        if (state !== STATE.PLAYING) return;
        updatePlaying(dt);
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', (event) => {
        const code = event.code;
        if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter','KeyA','KeyD','KeyW','KeyS','KeyP'].includes(code)) {
          event.preventDefault();
        }
        if (keysHeld.has(code)) {
          if (code === 'ArrowDown' || code === 'KeyS') return;
        }
        keysHeld.add(code);

        if (code === 'Enter') {
          if (state === STATE.IDLE || state === STATE.GAME_OVER) startGame();
          return;
        }
        if (code === 'KeyP') {
          if (state === STATE.PLAYING) state = STATE.PAUSED;
          else if (state === STATE.PAUSED) state = STATE.PLAYING;
          return;
        }
        if (state !== STATE.PLAYING || !active) return;

        if (code === 'ArrowLeft' || code === 'KeyA') {
          if (tryMove(-1, 0)) playMoveSound();
        } else if (code === 'ArrowRight' || code === 'KeyD') {
          if (tryMove(1, 0)) playMoveSound();
        } else if (code === 'ArrowUp' || code === 'KeyW') {
          tryRotate();
        } else if (code === 'ArrowDown' || code === 'KeyS') {
          if (tryMove(0, 1, true)) playMoveSound();
        } else if (code === 'Space') {
          hardDrop();
        }
      }, { passive: false });

      window.addEventListener('keyup', (event) => {
        keysHeld.delete(event.code);
      });

      render();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
