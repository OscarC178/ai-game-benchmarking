<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // ASTEROIDS GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Player ship
    const SHIP_ROTATION_SPEED = 270; // °/s
    const SHIP_THRUST = 200; // px/s²
    const SHIP_MAX_SPEED = 350; // px/s
    const SHIP_FRICTION = 0.98;

    // Bullets
    const BULLET_SPEED = 500;
    const BULLET_LIFETIME = 0.8;
    const MAX_BULLETS = 4;

    // Asteroids
    const ASTEROID_SIZES = {
      large: { radius: 40, speed: [50, 80], score: 20, polygon: null },
      medium: { radius: 20, speed: [80, 120], score: 50, polygon: null },
      small: { radius: 10, speed: [120, 180], score: 100, polygon: null }
    };

    // Game state
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let wave = 1;

    try {
      highScore = parseInt(localStorage.getItem('asteroids_high_score') || '0');
    } catch (e) {}

    // ── Player Ship ────────────────────────────────────────────────────
    const player = {
      x: CANVAS_WIDTH / 2,
      y: CANVAS_HEIGHT / 2,
      angle: 0,
      vx: 0,
      vy: 0,
      thrusting: false,
      alive: true,
      invulnerable: false,
      invulnTimer: 0
    };

    // ── Bullets ────────────────────────────────────────────────────────
    let bullets = [];

    // ── Asteroids ──────────────────────────────────────────────────────
    let asteroids = [];

    function generateAsteroidPolygon(size) {
      const radius = ASTEROID_SIZES[size].radius;
      const points = 8 + Math.floor(Math.random() * 6);
      const polygon = [];
      for (let i = 0; i < points; i++) {
        const angle = (i / points) * Math.PI * 2;
        const r = radius * (0.7 + Math.random() * 0.3);
        polygon.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r
        });
      }
      return polygon;
    }

    function spawnAsteroids(type, x, y, count = 1) {
      for (let i = 0; i < count; i++) {
        const [minSpeed, maxSpeed] = ASTEROID_SIZES[type].speed;
        const angle = Math.random() * Math.PI * 2;
        const speed = minSpeed + Math.random() * (maxSpeed - minSpeed);
        asteroids.push({
          x: x + (Math.random() - 0.5) * 20,
          y: y + (Math.random() - 0.5) * 20,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          type: type,
          polygon: generateAsteroidPolygon(type)
        });
      }
    }

    function initWave() {
      asteroids = [];
      for (let i = 0; i < 4 + wave - 1; i++) {
        let x, y;
        do {
          x = Math.random() * CANVAS_WIDTH;
          y = Math.random() * CANVAS_HEIGHT;
        } while (Math.hypot(x - player.x, y - player.y) < 150);
        spawnAsteroids('large', x, y);
      }
    }

    // ── UFO ────────────────────────────────────────────────────────────
    let ufo = null;
    let ufoTimer = 0;
    let ufoBullets = [];
    const UFO_SPAWN_INTERVAL = 20 + Math.random() * 10;

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
          startGame();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === GAME_STATES.PLAYING) {
          gameState = GAME_STATES.PAUSED;
        } else if (gameState === GAME_STATES.PAUSED) {
          gameState = GAME_STATES.PLAYING;
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ──────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxFire() { playTone(900, 0.05); }
    function sfxExplode(size) {
      const freq = size === 'large' ? 200 : size === 'medium' ? 400 : 600;
      playTone(freq, 0.1);
    }

    // ── Game Logic ─────────────────────────────────────────────────────
    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = 3;
      wave = 1;
      player.x = CANVAS_WIDTH / 2;
      player.y = CANVAS_HEIGHT / 2;
      player.angle = 0;
      player.vx = 0;
      player.vy = 0;
      player.alive = true;
      player.invulnerable = true;
      player.invulnTimer = 2;
      bullets = [];
      ufoBullets = [];
      ufo = null;
      ufoTimer = 0;
      initWave();
    }

    function updatePlayer(dt) {
      // Rotation
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.angle -= SHIP_ROTATION_SPEED * dt;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.angle += SHIP_ROTATION_SPEED * dt;
      }

      // Thrust
      player.thrusting = keys['ArrowUp'] || keys['w'] || keys['W'];
      if (player.thrusting) {
        const rad = player.angle * Math.PI / 180;
        player.vx += Math.cos(rad) * SHIP_THRUST * dt;
        player.vy += Math.sin(rad) * SHIP_THRUST * dt;
      }

      // Friction and speed cap
      player.vx *= SHIP_FRICTION;
      player.vy *= SHIP_FRICTION;
      const speed = Math.hypot(player.vx, player.vy);
      if (speed > SHIP_MAX_SPEED) {
        const scale = SHIP_MAX_SPEED / speed;
        player.vx *= scale;
        player.vy *= scale;
      }

      // Movement and wrapping
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      if (player.x < -20) player.x = CANVAS_WIDTH + 20;
      if (player.x > CANVAS_WIDTH + 20) player.x = -20;
      if (player.y < -20) player.y = CANVAS_HEIGHT + 20;
      if (player.y > CANVAS_HEIGHT + 20) player.y = -20;

      // Invulnerability
      if (player.invulnerable) {
        player.invulnTimer -= dt;
        if (player.invulnTimer <= 0) {
          player.invulnerable = false;
        }
      }

      // Fire
      if (keys[' '] && bullets.length < MAX_BULLETS) {
        const rad = player.angle * Math.PI / 180;
        bullets.push({
          x: player.x + Math.cos(rad) * 15,
          y: player.y + Math.sin(rad) * 15,
          vx: Math.cos(rad) * BULLET_SPEED,
          vy: Math.sin(rad) * BULLET_SPEED,
          life: BULLET_LIFETIME
        });
        sfxFire();
        keys[' '] = false;
      }
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;

        if (bullet.x < -20) bullet.x = CANVAS_WIDTH + 20;
        if (bullet.x > CANVAS_WIDTH + 20) bullet.x = -20;
        if (bullet.y < -20) bullet.y = CANVAS_HEIGHT + 20;
        if (bullet.y > CANVAS_HEIGHT + 20) bullet.y = -20;

        if (bullet.life <= 0) {
          bullets.splice(i, 1);
        }
      }
    }

    function updateAsteroids(dt) {
      for (const asteroid of asteroids) {
        asteroid.x += asteroid.vx * dt;
        asteroid.y += asteroid.vy * dt;

        if (asteroid.x < -50) asteroid.x = CANVAS_WIDTH + 50;
        if (asteroid.x > CANVAS_WIDTH + 50) asteroid.x = -50;
        if (asteroid.y < -50) asteroid.y = CANVAS_HEIGHT + 50;
        if (asteroid.y > CANVAS_HEIGHT + 50) asteroid.y = -50;
      }
    }

    function updateUFO(dt) {
      ufoTimer += dt;

      if (!ufo && ufoTimer >= UFO_SPAWN_INTERVAL) {
        const fromLeft = Math.random() > 0.5;
        ufo = {
          x: fromLeft ? -16 : CANVAS_WIDTH + 16,
          y: 120 + Math.random() * 100,
          vx: fromLeft ? 120 : -120,
          fire: 0
        };
        ufoTimer = 0;
      }

      if (ufo) {
        ufo.x += ufo.vx * dt;
        ufo.fire += dt;

        if (ufo.x < -50 || ufo.x > CANVAS_WIDTH + 50) {
          ufo = null;
          ufoTimer = 0;
        }

        // Fire at player
        if (ufo.fire > 1) {
          const angle = Math.atan2(player.y - ufo.y, player.x - ufo.x);
          ufoBullets.push({
            x: ufo.x,
            y: ufo.y,
            vx: Math.cos(angle) * 350,
            vy: Math.sin(angle) * 350,
            life: 5
          });
          ufo.fire = 0;
        }
      }

      // Update UFO bullets
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        const bullet = ufoBullets[i];
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;

        if (bullet.x < -20) bullet.x = CANVAS_WIDTH + 20;
        if (bullet.x > CANVAS_WIDTH + 20) bullet.x = -20;
        if (bullet.y < -20) bullet.y = CANVAS_HEIGHT + 20;
        if (bullet.y > CANVAS_HEIGHT + 20) bullet.y = -20;

        if (bullet.life <= 0) {
          ufoBullets.splice(i, 1);
        }
      }
    }

    function checkCollisions() {
      // Player bullet vs asteroids
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const asteroid = asteroids[j];
          const dist = Math.hypot(bullet.x - asteroid.x, bullet.y - asteroid.y);
          if (dist < ASTEROID_SIZES[asteroid.type].radius + 2) {
            score += ASTEROID_SIZES[asteroid.type].score;
            if (score > highScore) {
              highScore = score;
              try {
                localStorage.setItem('asteroids_high_score', String(highScore));
              } catch (e) {}
            }
            sfxExplode(asteroid.type);

            if (asteroid.type === 'large') {
              spawnAsteroids('medium', asteroid.x, asteroid.y, 2);
            } else if (asteroid.type === 'medium') {
              spawnAsteroids('small', asteroid.x, asteroid.y, 2);
            }

            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Player bullet vs UFO
      if (ufo) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          const dist = Math.hypot(bullet.x - ufo.x, bullet.y - ufo.y);
          if (dist < 16 + 2) {
            score += 200;
            if (score > highScore) {
              highScore = score;
              try {
                localStorage.setItem('asteroids_high_score', String(highScore));
              } catch (e) {}
            }
            sfxExplode('medium');
            ufo = null;
            ufoTimer = 0;
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Ship vs asteroids
      if (!player.invulnerable) {
        for (const asteroid of asteroids) {
          const dist = Math.hypot(player.x - asteroid.x, player.y - asteroid.y);
          if (dist < ASTEROID_SIZES[asteroid.type].radius + 12) {
            lives--;
            if (lives <= 0) {
              gameState = GAME_STATES.GAME_OVER;
            } else {
              player.alive = false;
              setTimeout(() => {
                player.x = CANVAS_WIDTH / 2;
                player.y = CANVAS_HEIGHT / 2;
                player.vx = 0;
                player.vy = 0;
                player.alive = true;
                player.invulnerable = true;
                player.invulnTimer = 2;
              }, 2000);
            }
            return;
          }
        }
      }

      // Ship vs UFO bullet
      if (!player.invulnerable) {
        for (let i = ufoBullets.length - 1; i >= 0; i--) {
          const bullet = ufoBullets[i];
          const dist = Math.hypot(player.x - bullet.x, player.y - bullet.y);
          if (dist < 12 + 2) {
            lives--;
            if (lives <= 0) {
              gameState = GAME_STATES.GAME_OVER;
            } else {
              player.alive = false;
              setTimeout(() => {
                player.x = CANVAS_WIDTH / 2;
                player.y = CANVAS_HEIGHT / 2;
                player.vx = 0;
                player.vy = 0;
                player.alive = true;
                player.invulnerable = true;
                player.invulnTimer = 2;
              }, 2000);
            }
            ufoBullets.splice(i, 1);
            return;
          }
        }
      }

      // Check wave clear
      if (asteroids.length === 0 && gameState === GAME_STATES.PLAYING) {
        wave++;
        initWave();
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        if (player.alive) {
          updatePlayer(dt);
        }
        updateBullets(dt);
        updateAsteroids(dt);
        updateUFO(dt);
        checkCollisions();
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = '18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 30);

      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH - 10, 30);

      // Draw wave
      ctx.fillStyle = '#AAA';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`Wave ${wave}`, CANVAS_WIDTH / 2, 30);

      // Draw lives
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${lives}`, 10, 55);

      // Draw player
      if (player.alive) {
        if (!player.invulnerable || Math.floor(player.invulnTimer * 4) % 2) {
          ctx.strokeStyle = '#FFF';
          ctx.lineWidth = 2;
          ctx.beginPath();
          const rad = player.angle * Math.PI / 180;
          const nose = { x: Math.cos(rad) * 18, y: Math.sin(rad) * 18 };
          const left = { x: Math.cos(rad + 2.35) * 12, y: Math.sin(rad + 2.35) * 12 };
          const right = { x: Math.cos(rad - 2.35) * 12, y: Math.sin(rad - 2.35) * 12 };
          ctx.moveTo(player.x + nose.x, player.y + nose.y);
          ctx.lineTo(player.x + left.x, player.y + left.y);
          ctx.lineTo(player.x + right.x, player.y + right.y);
          ctx.closePath();
          ctx.stroke();

          // Thrust flame
          if (player.thrusting) {
            ctx.fillStyle = '#FF9900';
            ctx.beginPath();
            const back = { x: Math.cos(rad + Math.PI) * 12, y: Math.sin(rad + Math.PI) * 12 };
            const fleft = { x: Math.cos(rad + Math.PI + 0.8) * 6, y: Math.sin(rad + Math.PI + 0.8) * 6 };
            const fright = { x: Math.cos(rad + Math.PI - 0.8) * 6, y: Math.sin(rad + Math.PI - 0.8) * 6 };
            ctx.moveTo(player.x + back.x, player.y + back.y);
            ctx.lineTo(player.x + fleft.x, player.y + fleft.y);
            ctx.lineTo(player.x + fright.x, player.y + fright.y);
            ctx.closePath();
            ctx.fill();
          }
        }
      }

      // Draw asteroids
      ctx.strokeStyle = '#AAA';
      ctx.lineWidth = 2;
      for (const asteroid of asteroids) {
        ctx.beginPath();
        const poly = asteroid.polygon;
        for (let i = 0; i < poly.length; i++) {
          const x = asteroid.x + poly[i].x;
          const y = asteroid.y + poly[i].y;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      // Draw bullets
      ctx.fillStyle = '#FFF';
      for (const bullet of bullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw UFO
      if (ufo) {
        ctx.strokeStyle = '#FF4444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(ufo.x, ufo.y, 16, 6, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(ufo.x, ufo.y - 8, 10, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Draw UFO bullets
      ctx.fillStyle = '#FF4444';
      for (const bullet of ufoBullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '52px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ASTEROIDS', CANVAS_WIDTH / 2, 220);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 360);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 300);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 250);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 300);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 350);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
    }

    // ── Initialize ─────────────────────────────────────────────────────
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
