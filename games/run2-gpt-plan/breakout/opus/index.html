<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
// T01: Scaffold complete
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur / 1000);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur / 1000);
}
function beepSweep(f1, f2, dur, type) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(f2, audioCtx.currentTime + dur / 1000);
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur / 1000);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur / 1000);
}
function sndPaddle() { beep(430, 45); }
function sndBrick() { beep(670, 45); }
function sndLifeLost() { beepSweep(500, 150, 300); }
function sndLevelClear() {
  [500, 630, 790, 1000].forEach((f, i) => {
    setTimeout(() => beep(f, 60, 'square'), i * 60);
  });
}

// T03: Game state
const IDLE = 0, PLAYING = 1, PAUSED = 2, GAME_OVER = 3;
let state = IDLE;

// Constants
const PADDLE_W = 104, PADDLE_H = 14, PADDLE_SPEED = 520;
const BALL_R = 8, BASE_SPEED = 340, SPEED_INC_LEVEL = 20, MAX_SPEED = 520;
const BRICK_W = 70, BRICK_H = 20, BRICK_COLS = 10, BRICK_ROWS = 6;
const BRICK_START_X = 19, BRICK_START_Y = 52;
const BRICK_PAD_X = (W - BRICK_START_X * 2 - BRICK_COLS * BRICK_W) / (BRICK_COLS - 1);
const ROW_COLORS = ['#FF0000', '#FF6A00', '#FFD400', '#20C020', '#1E88FF', '#8A2BE2'];
const ROW_POINTS = [7, 5, 4, 3, 2, 1];

// State vars
let paddle, ball, bricks, score, lives, level, highScore, attached, ballSpeed;

highScore = parseInt(localStorage.getItem('breakout_hs_r2') || '0', 10);

function initGame() {
  level = 1;
  score = 0;
  lives = 3;
  resetLevel();
}

function resetLevel() {
  paddle = { x: 348, y: 560, w: PADDLE_W, h: PADDLE_H };
  ballSpeed = Math.min(BASE_SPEED + (level - 1) * SPEED_INC_LEVEL, MAX_SPEED);
  attached = true;
  ball = { x: 0, y: 0, vx: 0, vy: 0 };
  attachBall();
  buildBricks();
}

function attachBall() {
  attached = true;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - BALL_R;
  ball.vx = 0;
  ball.vy = 0;
}

function launchBall() {
  if (!attached) return;
  attached = false;
  // Angle between 240° and 300° (upward spread)
  const angle = (240 + Math.random() * 60) * Math.PI / 180;
  ball.vx = Math.cos(angle) * ballSpeed;
  ball.vy = Math.sin(angle) * ballSpeed;
}

// T05: Bricks
function buildBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_START_X + c * (BRICK_W + BRICK_PAD_X),
        y: BRICK_START_Y + r * (BRICK_H + 4),
        w: BRICK_W,
        h: BRICK_H,
        color: ROW_COLORS[r],
        points: ROW_POINTS[r],
        alive: true
      });
    }
  }
}

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();

  if (e.code === 'Enter') {
    if (state === IDLE || state === GAME_OVER) {
      initGame();
      state = PLAYING;
    }
  }
  if (e.code === 'KeyP') {
    if (state === PLAYING) state = PAUSED;
    else if (state === PAUSED) state = PLAYING;
  }
  if (e.code === 'Space' && state === PLAYING) {
    launchBall();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// T02: Game loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 1 / 30);
  lastTime = ts;
  if (state === PLAYING) update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  // T04: Paddle
  if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= PADDLE_SPEED * dt;
  if (keys['ArrowRight'] || keys['KeyD']) paddle.x += PADDLE_SPEED * dt;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  if (attached) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - BALL_R;
    return;
  }

  // Ball movement
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // T07/T09: Wall bounce
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Bottom — lose life
  if (ball.y - BALL_R > H) {
    lives--;
    sndLifeLost();
    if (lives <= 0) {
      state = GAME_OVER;
      saveHighScore();
      return;
    }
    attachBall();
    return;
  }

  // T07: Paddle collision (circle vs rect)
  if (ball.vy > 0) {
    const cx = Math.max(paddle.x, Math.min(ball.x, paddle.x + paddle.w));
    const cy = Math.max(paddle.y, Math.min(ball.y, paddle.y + paddle.h));
    const dx = ball.x - cx, dy = ball.y - cy;
    if (dx * dx + dy * dy <= BALL_R * BALL_R) {
      ball.y = paddle.y - BALL_R;
      // Offset-based angle: -60° to +60° mapped across paddle
      const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const clampedOffset = Math.max(-1, Math.min(1, offset));
      const angle = clampedOffset * 60 * Math.PI / 180;
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      ball.vx = Math.sin(angle) * speed;
      ball.vy = -Math.cos(angle) * speed;
      sndPaddle();
    }
  }

  // T08/T09: Brick collision — one per frame
  for (let i = 0; i < bricks.length; i++) {
    const b = bricks[i];
    if (!b.alive) continue;

    // Circle vs AABB
    const cx = Math.max(b.x, Math.min(ball.x, b.x + b.w));
    const cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
    const ddx = ball.x - cx, ddy = ball.y - cy;
    if (ddx * ddx + ddy * ddy <= BALL_R * BALL_R) {
      b.alive = false;
      score += b.points;
      saveHighScore();
      sndBrick();

      // Determine reflection axis via minimum penetration
      const overlapL = (ball.x + BALL_R) - b.x;
      const overlapR = (b.x + b.w) - (ball.x - BALL_R);
      const overlapT = (ball.y + BALL_R) - b.y;
      const overlapB = (b.y + b.h) - (ball.y - BALL_R);
      const minX = Math.min(overlapL, overlapR);
      const minY = Math.min(overlapT, overlapB);
      if (minX < minY) {
        ball.vx = -ball.vx;
      } else {
        ball.vy = -ball.vy;
      }
      break; // one brick per frame
    }
  }

  // T08: Level clear check
  if (bricks.every(b => !b.alive)) {
    sndLevelClear();
    level++;
    resetLevel();
  }
}

function saveHighScore() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('breakout_hs_r2', String(highScore));
  }
}

// Rendering
function render() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  if (state === IDLE) {
    renderStart();
    return;
  }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Subtle highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x, b.y, b.w, 3);
  }

  // Paddle
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();

  // T10: HUD
  ctx.font = '16px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 10, 22);

  ctx.textAlign = 'right';
  ctx.fillText('Best: ' + highScore, W - 10, 22);

  // Level
  ctx.textAlign = 'center';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Level ' + level, W / 2, 22);

  // T11: Lives as hearts
  ctx.textAlign = 'right';
  ctx.fillStyle = '#FF4444';
  ctx.font = '16px monospace';
  let livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '♥ ';
  ctx.fillText(livesStr.trim(), W - 10, 42);

  // Game over
  if (state === GAME_OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '40px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.font = '22px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 10);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 50);
  }

  // Pause
  if (state === PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '36px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('PAUSED', W / 2, H / 2);
  }
}

// T13: Start screen
function renderStart() {
  ctx.textAlign = 'center';
  ctx.font = '56px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('BREAKOUT', W / 2, 246);
  ctx.font = '20px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Press Enter to Start', W / 2, 310);

  // Show brick color legend
  for (let r = 0; r < BRICK_ROWS; r++) {
    ctx.fillStyle = ROW_COLORS[r];
    ctx.fillRect(W / 2 - 90 + r * 30, 350, 24, 12);
  }
  ctx.font = '12px monospace';
  ctx.fillStyle = '#666666';
  ctx.fillText('Best: ' + highScore, W / 2, 400);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
