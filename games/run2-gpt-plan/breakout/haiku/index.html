<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // BREAKOUT GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Paddle
    const PADDLE_WIDTH = 104;
    const PADDLE_HEIGHT = 14;
    const PADDLE_SPEED = 520; // px/s
    const PADDLE_Y = 560;

    // Ball
    const BALL_RADIUS = 8;
    const BALL_BASE_SPEED = 340; // px/s
    const BALL_SPEED_INCREMENT = 20; // per level

    // Bricks
    const BRICK_WIDTH = 70;
    const BRICK_HEIGHT = 20;
    const BRICK_COLS = 10;
    const BRICK_ROWS = 6;
    const BRICK_START_X = 19;
    const BRICK_START_Y = 52;
    const BRICK_SPACING_X = 7;
    const BRICK_SPACING_Y = 5;

    const BRICK_COLORS = [
      '#FF0000', // row 1 - red
      '#FF6A00', // row 2 - orange
      '#FFD400', // row 3 - yellow
      '#20C020', // row 4 - green
      '#1E88FF', // row 5 - blue
      '#8A2BE2'  // row 6 - purple
    ];

    const BRICK_SCORES = [7, 5, 4, 3, 2, 1]; // points per row

    // Lives
    const STARTING_LIVES = 3;

    // ── Game State ─────────────────────────────────────────────────────
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = STARTING_LIVES;
    let level = 1;

    // Load high score from localStorage
    try {
      highScore = parseInt(localStorage.getItem('breakout_high_score') || '0');
    } catch (e) {}

    // ── Paddle ─────────────────────────────────────────────────────────
    const paddle = {
      x: CANVAS_WIDTH / 2 - PADDLE_WIDTH / 2,
      y: PADDLE_Y,
      vx: 0
    };

    // ── Ball ───────────────────────────────────────────────────────────
    const ball = {
      x: paddle.x + PADDLE_WIDTH / 2,
      y: paddle.y - BALL_RADIUS - 2,
      vx: 0,
      vy: 0,
      attached: true
    };

    // ── Bricks ────────────────────────────────────────────────────────
    let bricks = [];

    function initBricks() {
      bricks = [];
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          bricks.push({
            x: BRICK_START_X + col * (BRICK_WIDTH + BRICK_SPACING_X),
            y: BRICK_START_Y + row * (BRICK_HEIGHT + BRICK_SPACING_Y),
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            row: row,
            active: true
          });
        }
      }
    }

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
          startGame();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === GAME_STATES.PLAYING) {
          gameState = GAME_STATES.PAUSED;
        } else if (gameState === GAME_STATES.PAUSED) {
          gameState = GAME_STATES.PLAYING;
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio ──────────────────────────────────────────────────────────
    function getAudioContext() {
      if (typeof audioCtx === 'undefined') {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          window.audioCtx = new AudioCtx();
        }
      }
      if (window.audioCtx && window.audioCtx.state === 'suspended') {
        window.audioCtx.resume();
      }
      return window.audioCtx;
    }

    function playTone(frequency, duration, volume = 0.1) {
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxPaddle() { playTone(430, 0.05); }
    function sfxBrick() { playTone(670, 0.05); }

    // ── Game Logic ─────────────────────────────────────────────────────
    function startGame() {
      gameState = GAME_STATES.PLAYING;
      score = 0;
      lives = STARTING_LIVES;
      level = 1;
      initBricks();
      resetBall();
    }

    function resetBall() {
      ball.x = paddle.x + PADDLE_WIDTH / 2;
      ball.y = paddle.y - BALL_RADIUS - 2;
      ball.vx = 0;
      ball.vy = 0;
      ball.attached = true;
    }

    function launchBall() {
      if (ball.attached) {
        const angle = 240 + Math.random() * 60; // 240°-300°
        const radians = angle * Math.PI / 180;
        const speed = BALL_BASE_SPEED + (level - 1) * BALL_SPEED_INCREMENT;
        ball.vx = Math.cos(radians) * speed;
        ball.vy = Math.sin(radians) * speed;
        ball.attached = false;
        sfxPaddle();
      }
    }

    function updatePaddle(dt) {
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        paddle.vx = -PADDLE_SPEED;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        paddle.vx = PADDLE_SPEED;
      } else {
        paddle.vx = 0;
      }

      paddle.x += paddle.vx * dt;
      paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - PADDLE_WIDTH, paddle.x));
    }

    function updateBall(dt) {
      if (ball.attached) {
        ball.x = paddle.x + PADDLE_WIDTH / 2;
        ball.y = paddle.y - BALL_RADIUS - 2;
      } else {
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall bounces
        if (ball.x - BALL_RADIUS < 0 || ball.x + BALL_RADIUS > CANVAS_WIDTH) {
          ball.vx = -ball.vx;
          ball.x = Math.max(BALL_RADIUS, Math.min(CANVAS_WIDTH - BALL_RADIUS, ball.x));
        }
        if (ball.y - BALL_RADIUS < 0) {
          ball.vy = -ball.vy;
          ball.y = BALL_RADIUS;
        }

        // Paddle collision
        if (ball.vy > 0 && ball.y + BALL_RADIUS >= paddle.y && 
            ball.y - BALL_RADIUS <= paddle.y + PADDLE_HEIGHT &&
            ball.x >= paddle.x && ball.x <= paddle.x + PADDLE_WIDTH) {
          ball.vy = -Math.abs(ball.vy);
          // Angle based on hit position
          const hitOffset = (ball.x - (paddle.x + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2);
          const angleVariation = hitOffset * 40; // ±40° variation
          const baseAngle = 270; // straight up
          const angle = (baseAngle + angleVariation) * Math.PI / 180;
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          ball.vx = Math.sin(angleVariation * Math.PI / 180) * speed;
          ball.vy = -Math.abs(Math.cos(angleVariation * Math.PI / 180)) * speed;
          ball.y = paddle.y - BALL_RADIUS;
          sfxPaddle();
        }

        // Brick collision
        for (let i = 0; i < bricks.length; i++) {
          if (!bricks[i].active) continue;

          const brick = bricks[i];
          // Circle-rect collision
          const closestX = Math.max(brick.x, Math.min(ball.x, brick.x + brick.width));
          const closestY = Math.max(brick.y, Math.min(ball.y, brick.y + brick.height));
          const dx = ball.x - closestX;
          const dy = ball.y - closestY;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < BALL_RADIUS) {
            bricks[i].active = false;
            score += BRICK_SCORES[brick.row];
            if (score > highScore) {
              highScore = score;
              try {
                localStorage.setItem('breakout_high_score', String(highScore));
              } catch (e) {}
            }
            sfxBrick();

            // Reflect on collision axis
            if (Math.abs(dx) > Math.abs(dy)) {
              ball.vx = -ball.vx;
            } else {
              ball.vy = -ball.vy;
            }
            break; // Only one brick per frame
          }
        }

        // Bottom boundary (lose life)
        if (ball.y > CANVAS_HEIGHT) {
          lives--;
          if (lives <= 0) {
            gameState = GAME_STATES.GAME_OVER;
          } else {
            resetBall();
          }
        }
      }

      // Check level clear
      if (gameState === GAME_STATES.PLAYING) {
        const activeBricks = bricks.filter(b => b.active).length;
        if (activeBricks === 0) {
          level++;
          initBricks();
          resetBall();
        }
      }
    }

    function update(dt) {
      if (gameState === GAME_STATES.PLAYING) {
        updatePaddle(dt);
        updateBall(dt);

        // Handle space for launch
        if (keys[' ']) {
          launchBall();
          keys[' '] = false; // consume key
        }
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw score and level
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 20);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#AAA';
      ctx.fillText(`Level: ${level}`, CANVAS_WIDTH / 2, 20);
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, CANVAS_WIDTH - 10, 20);

      // Draw lives
      ctx.fillStyle = '#FF0000';
      ctx.textAlign = 'right';
      ctx.fillText(`Lives: ${lives}`, CANVAS_WIDTH - 10, 40);

      // Draw bricks
      ctx.font = 'normal';
      for (const brick of bricks) {
        if (brick.active) {
          ctx.fillStyle = BRICK_COLORS[brick.row];
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        }
      }

      // Draw paddle
      ctx.fillStyle = '#FFF';
      ctx.fillRect(paddle.x, paddle.y, PADDLE_WIDTH, PADDLE_HEIGHT);

      // Draw ball
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawStartScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BREAKOUT', CANVAS_WIDTH / 2, 246);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 320);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 300);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 250);
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH / 2, 300);
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 350);
    }

    // ── Main Loop ──────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016); // cap at 60fps
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
    }

    // ── Initialize ─────────────────────────────────────────────────────
    initBricks();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
