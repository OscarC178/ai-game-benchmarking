<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout - run2-gpt-plan</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(100vw, 800px);
      height: auto;
      max-height: 100vh;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600" aria-label="Breakout game canvas"></canvas>
  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 800;
      const HEIGHT = 600;
      const PADDLE = { width: 104, height: 14, speed: 520 };
      const BALL_RADIUS = 8;
      const BASE_BALL_SPEED = 340;
      const SPEED_PER_LEVEL = 20;
      const MAX_BALL_SPEED = 520;
      const BRICK_W = 70;
      const BRICK_H = 20;
      const BRICK_COLS = 10;
      const BRICK_ROWS = 6;
      const BRICK_START_X = 19;
      const BRICK_START_Y = 52;
      const BRICK_GAP_X = 8;
      const BRICK_GAP_Y = 6;
      const MAX_BOUNCE_ANGLE = Math.PI * (70 / 180);

      const COLORS = ['#FF0000', '#FF6A00', '#FFD400', '#20C020', '#1E88FF', '#8A2BE2'];
      const ROW_SCORES = [7, 5, 4, 3, 2, 1];

      const STATE = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      let audioCtx = null;
      let lastTime = 0;
      let state = STATE.IDLE;
      let highScore = loadHighScore();
      const keys = new Set();

      const game = {
        score: 0,
        lives: 3,
        level: 1,
        bricks: [],
        winner: false
      };

      const paddle = {
        x: 348,
        y: 560,
        width: PADDLE.width,
        height: PADDLE.height,
        vx: 0
      };

      const ball = {
        x: 400,
        y: 548,
        vx: 0,
        vy: 0,
        radius: BALL_RADIUS,
        attached: true,
        speed: BASE_BALL_SPEED
      };

      function loadHighScore() {
        const raw = Number(localStorage.getItem('breakout_run2_high_score'));
        return Number.isFinite(raw) ? raw : 0;
      }

      function saveHighScore(value) {
        localStorage.setItem('breakout_run2_high_score', String(value));
      }

      function updateHighScore() {
        if (game.score > highScore) {
          highScore = game.score;
          saveHighScore(highScore);
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return null;
          audioCtx = new AudioCtx();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      }

      function playTone(type, frequency, duration, rampTo = null, volume = 0.03) {
        const ac = ensureAudio();
        if (!ac) return;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        const now = ac.currentTime;
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (rampTo !== null) osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playPaddleSound() {
        playTone('square', 430, 0.05, null, 0.025);
      }

      function playBrickSound() {
        playTone('square', 670, 0.04, null, 0.02);
      }

      function playLoseLifeSound() {
        playTone('triangle', 480, 0.2, 180, 0.03);
      }

      function playLevelClearSound() {
        playTone('square', 440, 0.06, 660, 0.02);
        setTimeout(() => playTone('square', 660, 0.06, 880, 0.02), 70);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function currentBallSpeed() {
        return Math.min(MAX_BALL_SPEED, BASE_BALL_SPEED + (game.level - 1) * SPEED_PER_LEVEL);
      }

      function createBricks() {
        const bricks = [];
        for (let row = 0; row < BRICK_ROWS; row++) {
          for (let col = 0; col < BRICK_COLS; col++) {
            bricks.push({
              x: BRICK_START_X + col * (BRICK_W + BRICK_GAP_X),
              y: BRICK_START_Y + row * (BRICK_H + BRICK_GAP_Y),
              width: BRICK_W,
              height: BRICK_H,
              color: COLORS[row],
              score: ROW_SCORES[row],
              alive: true
            });
          }
        }
        game.bricks = bricks;
      }

      function attachBallToPaddle() {
        ball.attached = true;
        ball.speed = currentBallSpeed();
        ball.vx = 0;
        ball.vy = 0;
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - ball.radius - 4;
      }

      function launchBall() {
        if (!ball.attached || state !== STATE.PLAYING) return;
        const angle = Math.PI + (Math.random() * Math.PI / 3) + Math.PI / 3;
        ball.speed = currentBallSpeed();
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.attached = false;
      }

      function resetPaddle() {
        paddle.x = 348;
        paddle.vx = 0;
      }

      function resetRound() {
        resetPaddle();
        attachBallToPaddle();
      }

      function startGame() {
        ensureAudio();
        game.score = 0;
        game.lives = 3;
        game.level = 1;
        createBricks();
        resetRound();
        updateHighScore();
        state = STATE.PLAYING;
      }

      function circleRectCollision(circleX, circleY, radius, rect) {
        const closestX = clamp(circleX, rect.x, rect.x + rect.width);
        const closestY = clamp(circleY, rect.y, rect.y + rect.height);
        const dx = circleX - closestX;
        const dy = circleY - closestY;
        return { hit: dx * dx + dy * dy <= radius * radius, dx, dy, closestX, closestY };
      }

      function allBricksCleared() {
        return game.bricks.every(brick => !brick.alive);
      }

      function loseLife() {
        game.lives -= 1;
        playLoseLifeSound();
        if (game.lives <= 0) {
          updateHighScore();
          state = STATE.GAME_OVER;
        } else {
          resetRound();
        }
      }

      function nextLevel() {
        game.level += 1;
        createBricks();
        resetRound();
        playLevelClearSound();
      }

      function updatePaddle(dt) {
        let move = 0;
        if (keys.has('ArrowLeft') || keys.has('KeyA')) move -= 1;
        if (keys.has('ArrowRight') || keys.has('KeyD')) move += 1;
        paddle.vx = move * PADDLE.speed;
        paddle.x = clamp(paddle.x + paddle.vx * dt, 0, WIDTH - paddle.width);
        if (ball.attached) {
          ball.x = paddle.x + paddle.width / 2;
          ball.y = paddle.y - ball.radius - 4;
        }
      }

      function handleWallCollisions() {
        if (ball.x - ball.radius <= 0) {
          ball.x = ball.radius;
          ball.vx = Math.abs(ball.vx);
        } else if (ball.x + ball.radius >= WIDTH) {
          ball.x = WIDTH - ball.radius;
          ball.vx = -Math.abs(ball.vx);
        }

        if (ball.y - ball.radius <= 0) {
          ball.y = ball.radius;
          ball.vy = Math.abs(ball.vy);
        }
      }

      function handlePaddleCollision() {
        const paddleRect = paddle;
        const hit = circleRectCollision(ball.x, ball.y, ball.radius, paddleRect);
        if (!hit.hit || ball.vy <= 0) return;

        const offset = clamp((ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2), -1, 1);
        const angle = offset * MAX_BOUNCE_ANGLE;
        ball.speed = currentBallSpeed();
        ball.vx = Math.sin(angle) * ball.speed;
        ball.vy = -Math.cos(angle) * ball.speed;
        ball.y = paddle.y - ball.radius - 1;
        playPaddleSound();
      }

      function handleBrickCollision(prevX, prevY) {
        for (const brick of game.bricks) {
          if (!brick.alive) continue;
          const hit = circleRectCollision(ball.x, ball.y, ball.radius, brick);
          if (!hit.hit) continue;

          brick.alive = false;
          game.score += brick.score;
          updateHighScore();
          playBrickSound();

          const prevHit = circleRectCollision(prevX, prevY, ball.radius, brick).hit;
          const prevHitX = circleRectCollision(prevX, ball.y, ball.radius, brick).hit;
          const prevHitY = circleRectCollision(ball.x, prevY, ball.radius, brick).hit;

          if (!prevHitX) {
            ball.vx *= -1;
          } else if (!prevHitY) {
            ball.vy *= -1;
          } else if (prevHit) {
            ball.vy *= -1;
          } else {
            ball.vx *= -1;
            ball.vy *= -1;
          }

          if (allBricksCleared()) {
            nextLevel();
          }
          return;
        }
      }

      function updateBall(dt) {
        if (ball.attached) return;

        const prevX = ball.x;
        const prevY = ball.y;

        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        handleWallCollisions();
        handlePaddleCollision();
        handleBrickCollision(prevX, prevY);

        if (ball.y - ball.radius > HEIGHT) {
          loseLife();
        }
      }

      function update(dt) {
        if (state !== STATE.PLAYING) return;
        updatePaddle(dt);
        updateBall(dt);
      }

      function drawPaddle() {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      }

      function drawBall() {
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawBricks() {
        for (const brick of game.bricks) {
          if (!brick.alive) continue;
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillRect(brick.x, brick.y, brick.width, 3);
        }
      }

      function drawHud() {
        ctx.font = '16px monospace';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE ${game.score}`, 12, 10);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#AAAAAA';
        ctx.fillText(`LEVEL ${game.level}`, WIDTH / 2, 10);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText(`HIGH ${highScore}`, WIDTH - 12, 10);

        const livesX = WIDTH - 12;
        const livesY = 34;
        for (let i = 0; i < game.lives; i++) {
          const x = livesX - i * 18;
          ctx.fillStyle = '#FF4A4A';
          ctx.fillRect(x - 10, livesY, 12, 10);
          ctx.beginPath();
          ctx.arc(x - 4, livesY + 5, 5, Math.PI, 0);
          ctx.fill();
        }
      }

      function drawOverlay(title, subtitle, prompt) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '56px monospace';
        ctx.fillText(title, WIDTH / 2, 246);
        if (subtitle) {
          ctx.fillStyle = '#CFCFCF';
          ctx.font = '24px monospace';
          ctx.fillText(subtitle, WIDTH / 2, 318);
        }
        if (prompt) {
          ctx.fillStyle = '#FFFFFF';
          ctx.font = '28px monospace';
          ctx.fillText(prompt, WIDTH / 2, 370);
        }
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        if (game.bricks.length) drawBricks();
        drawPaddle();
        drawBall();
        drawHud();

        if (state === STATE.IDLE) {
          drawOverlay('BREAKOUT', 'Clear every brick and keep the ball alive.', 'Press Enter to Start');
        } else if (state === STATE.PAUSED) {
          drawOverlay('PAUSED', null, 'Press P to Resume');
        } else if (state === STATE.GAME_OVER) {
          drawOverlay('GAME OVER', `Final Score ${game.score}`, 'Press Enter to Restart');
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.033, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', (event) => {
        const code = event.code;
        if (['ArrowLeft', 'ArrowRight', 'Space', 'Enter', 'KeyA', 'KeyD', 'KeyP'].includes(code)) {
          event.preventDefault();
        }
        keys.add(code);

        if (code === 'Enter') {
          if (state === STATE.IDLE || state === STATE.GAME_OVER) startGame();
        } else if (code === 'KeyP') {
          if (state === STATE.PLAYING) state = STATE.PAUSED;
          else if (state === STATE.PAUSED) state = STATE.PLAYING;
        } else if (code === 'Space') {
          if (state === STATE.PLAYING) {
            ensureAudio();
            launchBall();
          }
        }
      }, { passive: false });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.code);
      });

      createBricks();
      resetRound();
      state = STATE.IDLE;
      render();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
