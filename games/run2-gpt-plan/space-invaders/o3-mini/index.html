<!--
  GAME:           Space Invaders
  RUN:            run2-gpt-plan
  BUILDER:        openai/o3-mini
  PLANNER:        openai/gpt-5.4
  BUILD TIME:     45 seconds
  TOKENS IN:      3200
  TOKENS OUT:     4800
  ESTIMATED COST: $0.025
  ITERATIONS:     1
  TOOLS USED:     write
  STATUS:         complete
  TIMESTAMP:      2026-04-11T13:10:00Z
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Invaders</title>
<style>
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const COLS = 11, ROWS = 5;
const ALIEN_W = 36, ALIEN_H = 24, ALIEN_PX = 50, ALIEN_PY = 40;
const ALIEN_COLORS = ['#FF0000','#FFCC00','#FFCC00','#00CCFF','#00CCFF'];

let state = 'start';
let score = 0, hiScore = parseInt(localStorage.getItem('si_hi')||0);
let lives = 3, wave = 1;
let aliens, bullets, enemyBullets, shields, player, ufos;
let alienDir = 1, alienSpeed = 30, alienMoveTimer = 0, alienDropFlag = false;
let alienFireTimer = 0, alienFireInterval = 1200;
let frameTime = 0, lastTime = 0;

function initGame() {
  player = { x: 380, y: 550, w: 40, h: 20, speed: 300 };
  bullets = [];
  enemyBullets = [];
  ufos = [];
  alienDir = 1;
  alienSpeed = 30 + (wave - 1) * 5;
  alienFireInterval = Math.max(400, 1200 - (wave - 1) * 100);
  alienFireTimer = 0;
  
  // Create aliens
  aliens = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      aliens.push({
        x: 120 + c * ALIEN_PX,
        y: 80 + r * ALIEN_PY,
        row: r,
        alive: true,
        frame: 0
      });
    }
  }
  
  // Create shields
  shields = [];
  const shieldPositions = [150, 300, 450, 600];
  for (const sx of shieldPositions) {
    // 7x5 blocks each 8x8px
    const blocks = [];
    for (let bx = 0; bx < 7; bx++) {
      for (let by = 0; by < 5; by++) {
        // arch shape: remove top corners
        if (by === 0 && (bx === 0 || bx === 6)) continue;
        if (by === 1 && (bx === 0 || bx === 6)) continue;
        blocks.push({ x: sx + bx * 8, y: 480 + by * 8, alive: true });
      }
    }
    shields.push(blocks);
  }
}

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (state === 'start' || state === 'gameover') { state = 'playing'; initGame(); }
  }
  if (e.code === 'Space' && state === 'playing') fireBullet();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function fireBullet() {
  if (bullets.length === 0) {
    bullets.push({ x: player.x + player.w/2, y: player.y, w: 3, h: 12, vy: -400 });
  }
}

function aliveCount() { return aliens.filter(a => a.alive).length; }

function alienBounds() {
  const alive = aliens.filter(a => a.alive);
  if (!alive.length) return null;
  return {
    left: Math.min(...alive.map(a => a.x)),
    right: Math.max(...alive.map(a => a.x + ALIEN_W)),
  };
}

function fireEnemyBullet() {
  const alive = aliens.filter(a => a.alive);
  if (!alive.length) return;
  const shooter = alive[Math.floor(Math.random() * alive.length)];
  if (enemyBullets.length < 3) {
    enemyBullets.push({ x: shooter.x + ALIEN_W/2, y: shooter.y + ALIEN_H, w: 4, h: 12, vy: 200 });
  }
}

function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + (a.w||3) > b.x &&
         a.y < b.y + b.h && a.y + (a.h||12) > b.y;
}

function update(dt) {
  if (state !== 'playing') return;

  // Player movement
  if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed * dt;
  if ((keys['ArrowRight'] || keys['KeyD']) && player.x + player.w < 800) player.x += player.speed * dt;

  // Move player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy * dt;
    if (bullets[i].y < 0) { bullets.splice(i, 1); continue; }
    
    // Check alien hits
    let hit = false;
    for (const a of aliens) {
      if (!a.alive) continue;
      if (rectHit(bullets[i], { x: a.x, y: a.y, w: ALIEN_W, h: ALIEN_H })) {
        a.alive = false;
        const pts = a.row === 0 ? 30 : a.row <= 2 ? 20 : 10;
        score += pts;
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;
    
    // Check shield hits
    for (const shield of shields) {
      for (const block of shield) {
        if (!block.alive) continue;
        if (rectHit(bullets[i], { x: block.x, y: block.y, w: 8, h: 8 })) {
          block.alive = false;
          bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) break;
    }
  }

  // Move alien formation
  const bounds = alienBounds();
  if (bounds) {
    alienMoveTimer += dt;
    const moveInterval = 0.8 / (1 + (55 - aliveCount()) * 0.05);
    if (alienMoveTimer >= moveInterval) {
      alienMoveTimer = 0;
      if (alienDropFlag) {
        for (const a of aliens) a.y += 20;
        alienDropFlag = false;
        alienDir *= -1;
      } else {
        const step = alienDir * 15;
        for (const a of aliens) { a.x += step; a.frame ^= 1; }
        const newBounds = alienBounds();
        if (newBounds.right >= 795 || newBounds.left <= 5) alienDropFlag = true;
      }
    }
    // Check if aliens reached ground
    const bottomAlien = Math.max(...aliens.filter(a => a.alive).map(a => a.y + ALIEN_H));
    if (bottomAlien >= 540) { state = 'gameover'; return; }
  }

  // Enemy firing
  alienFireTimer += dt * 1000;
  if (alienFireTimer >= alienFireInterval) {
    alienFireTimer = 0;
    fireEnemyBullet();
  }

  // Move enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    enemyBullets[i].y += enemyBullets[i].vy * dt;
    if (enemyBullets[i].y > 600) { enemyBullets.splice(i, 1); continue; }
    
    // Hit player
    if (rectHit(enemyBullets[i], player)) {
      enemyBullets.splice(i, 1);
      lives--;
      if (lives <= 0) { state = 'gameover'; if (score > hiScore) { hiScore = score; localStorage.setItem('si_hi', hiScore); } }
      continue;
    }
    
    // Hit shield
    let hit = false;
    for (const shield of shields) {
      for (const block of shield) {
        if (!block.alive) continue;
        if (rectHit(enemyBullets[i], { x: block.x, y: block.y, w: 8, h: 8 })) {
          block.alive = false;
          enemyBullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) break;
    }
  }

  // Wave clear
  if (aliveCount() === 0) {
    wave++;
    score += 500;
    initGame();
  }
}

function drawAlien(a) {
  const color = ALIEN_COLORS[a.row];
  ctx.fillStyle = color;
  const x = a.x, y = a.y;
  
  if (a.row === 0) {
    // Squid shape
    ctx.fillRect(x+10,y,16,4);
    ctx.fillRect(x+6,y+4,24,4);
    ctx.fillRect(x+2,y+8,32,8);
    ctx.fillRect(x,y+16,8,4);
    ctx.fillRect(x+28,y+16,8,4);
    if (a.frame) { ctx.fillRect(x+4,y+16,4,4); ctx.fillRect(x+28,y+16,4,4); }
  } else if (a.row <= 2) {
    // Crab shape
    ctx.fillRect(x+4,y+2,28,4);
    ctx.fillRect(x,y+6,36,8);
    ctx.fillRect(x+4,y+14,28,4);
    if (a.frame) { ctx.fillRect(x,y+6,4,8); ctx.fillRect(x+32,y+6,4,8); }
    else { ctx.fillRect(x+4,y+10,4,8); ctx.fillRect(x+28,y+10,4,8); }
  } else {
    // Octopus shape
    ctx.fillRect(x+6,y,24,4);
    ctx.fillRect(x+2,y+4,32,8);
    ctx.fillRect(x,y+12,36,8);
    if (a.frame) { ctx.fillRect(x,y+12,4,8); ctx.fillRect(x+32,y+12,4,8); }
    else { ctx.fillRect(x+4,y+14,4,6); ctx.fillRect(x+28,y+14,4,6); }
  }
}

function drawPlayer() {
  ctx.fillStyle = '#00FF00';
  ctx.fillRect(player.x, player.y + 12, player.w, 8);
  ctx.fillRect(player.x + 14, player.y + 4, 12, 8);
  ctx.fillRect(player.x + 18, player.y, 4, 4);
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 800, 600);

  // HUD
  ctx.fillStyle = '#FFF';
  ctx.font = '16px monospace';
  ctx.fillText(`SCORE: ${score}`, 10, 25);
  ctx.fillText(`HI: ${hiScore}`, 340, 25);
  ctx.fillText(`LIVES: ${lives}`, 680, 25);
  ctx.fillText(`WAVE: ${wave}`, 680, 45);
  
  // Ground line
  ctx.fillStyle = '#0F0';
  ctx.fillRect(0, 560, 800, 2);

  if (state === 'start') {
    ctx.fillStyle = '#0F0';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPACE INVADERS', 400, 200);
    ctx.fillStyle = '#FFF';
    ctx.font = '20px monospace';
    ctx.fillText('Press ENTER to Start', 400, 300);
    ctx.fillText('← → to move   SPACE to fire', 400, 340);
    ctx.textAlign = 'left';
    return;
  }

  if (state === 'gameover') {
    ctx.fillStyle = '#FF0000';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 400, 250);
    ctx.fillStyle = '#FFF';
    ctx.font = '24px monospace';
    ctx.fillText(`Score: ${score}`, 400, 310);
    ctx.fillText('Press ENTER to Restart', 400, 360);
    ctx.textAlign = 'left';
    return;
  }

  // Draw aliens
  for (const a of aliens) {
    if (a.alive) drawAlien(a);
  }

  // Draw shields
  ctx.fillStyle = '#00FF00';
  for (const shield of shields) {
    for (const block of shield) {
      if (block.alive) ctx.fillRect(block.x, block.y, 8, 8);
    }
  }

  // Draw player
  drawPlayer();

  // Draw player bullets
  ctx.fillStyle = '#FFF';
  for (const b of bullets) ctx.fillRect(b.x, b.y, b.w, b.h);

  // Draw enemy bullets
  ctx.fillStyle = '#FF0';
  for (const b of enemyBullets) ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
