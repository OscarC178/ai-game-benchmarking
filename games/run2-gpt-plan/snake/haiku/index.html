<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #111;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // SNAKE GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 600;
    const CANVAS_HEIGHT = 600;
    const GRID_SIZE = 20;
    const CELL_SIZE = CANVAS_WIDTH / GRID_SIZE; // 30px
    const SNAKE_SIZE = 28; // 28×28px in a 30×30 cell
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Initial speed: 8 ticks per second
    let baseSpeed = 8; // ticks per second
    const MAX_SPEED = 15;
    const SPEED_INCREMENT = 0.5;

    // ── Game State ─────────────────────────────────────────────────────
    let gameState = GAME_STATES.IDLE;
    let score = 0;
    let highScore = 0;

    // Load high score from localStorage
    try {
      highScore = parseInt(localStorage.getItem('snake_high_score') || '0');
    } catch (e) {}

    // ── Snake ──────────────────────────────────────────────────────────
    const snake = {
      body: [
        { x: 10, y: 10 }, // head
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ],
      direction: { x: 1, y: 0 }, // moving right
      nextDirection: { x: 1, y: 0 },
      isMovingThisTick: false
    };

    // ── Food ───────────────────────────────────────────────────────────
    let food = { x: 15, y: 15 };

    // ── Movement Timing ───────────────────────────────────────────────
    let tickAccumulator = 0;
    let tickDuration = 1 / baseSpeed; // seconds per tick

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
          startGame();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === GAME_STATES.PLAYING) {
          gameState = GAME_STATES.PAUSED;
        } else if (gameState === GAME_STATES.PAUSED) {
          gameState = GAME_STATES.PLAYING;
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio (Web Audio API) ──────────────────────────────────────────
    let audioContext = null;
    function getAudioContext() {
      if (!audioContext) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) {
          audioContext = new AC();
          if (audioContext.state === 'suspended') {
            audioContext.resume().catch(() => {});
          }
        }
      }
      return audioContext;
    }

    function playTone(freq, duration, type = 'sine') {
      const ac = getAudioContext();
      if (!ac) return;
      try {
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function playFreqRamp(freqStart, freqEnd, duration, type = 'sawtooth') {
      const ac = getAudioContext();
      if (!ac) return;
      try {
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.linearRampToValueAtTime(freqEnd, now + duration);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxEatFood() {
      playTone(900, 0.04);
    }

    function sfxDeath() {
      playFreqRamp(440, 120, 0.28);
    }

    // ── Initialization ─────────────────────────────────────────────────
    function startGame() {
      score = 0;
      baseSpeed = 8;
      tickDuration = 1 / baseSpeed;
      tickAccumulator = 0;
      snake.body = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      snake.direction = { x: 1, y: 0 };
      snake.nextDirection = { x: 1, y: 0 };
      snake.isMovingThisTick = false;
      food = spawnFood();
      gameState = GAME_STATES.PLAYING;
    }

    function spawnFood() {
      let newFood;
      let valid = false;
      while (!valid) {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        // Check if this cell is free (not occupied by snake)
        valid = !snake.body.some(seg => seg.x === newFood.x && seg.y === newFood.y);
      }
      return newFood;
    }

    // ── Update ─────────────────────────────────────────────────────────
    function update(dt) {
      if (gameState !== GAME_STATES.PLAYING) return;

      // ── Input handling ─────────────────────────────────────────────
      // Check direction changes (only one queued per tick)
      if (!snake.isMovingThisTick) {
        if (keys['ArrowUp'] || keys['w'] || keys['W']) {
          // Prevent direct reversal (moving up when moving down)
          if (snake.direction.y === 0 || snake.direction.y === 1) {
            snake.nextDirection = { x: 0, y: -1 };
            snake.isMovingThisTick = true;
          }
        }
        if (keys['ArrowDown'] || keys['s'] || keys['S']) {
          // Prevent direct reversal (moving down when moving up)
          if (snake.direction.y === 0 || snake.direction.y === -1) {
            snake.nextDirection = { x: 0, y: 1 };
            snake.isMovingThisTick = true;
          }
        }
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
          // Prevent direct reversal (moving left when moving right)
          if (snake.direction.x === 0 || snake.direction.x === 1) {
            snake.nextDirection = { x: -1, y: 0 };
            snake.isMovingThisTick = true;
          }
        }
        if (keys['ArrowRight'] || keys['d'] || keys['D']) {
          // Prevent direct reversal (moving right when moving left)
          if (snake.direction.x === 0 || snake.direction.x === -1) {
            snake.nextDirection = { x: 1, y: 0 };
            snake.isMovingThisTick = true;
          }
        }
      }

      // ── Tick-based movement ────────────────────────────────────────
      tickAccumulator += dt;
      while (tickAccumulator >= tickDuration) {
        tickAccumulator -= tickDuration;
        snake.isMovingThisTick = false;

        // Apply queued direction
        snake.direction = snake.nextDirection;

        // Move head
        const head = snake.body[0];
        const newHead = {
          x: head.x + snake.direction.x,
          y: head.y + snake.direction.y
        };

        // Check wall collision
        if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
          gameState = GAME_STATES.GAME_OVER;
          sfxDeath();
          if (score > highScore) {
            highScore = score;
            try {
              localStorage.setItem('snake_high_score', highScore.toString());
            } catch (e) {}
          }
          return;
        }

        // Check self collision
        if (snake.body.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
          gameState = GAME_STATES.GAME_OVER;
          sfxDeath();
          if (score > highScore) {
            highScore = score;
            try {
              localStorage.setItem('snake_high_score', highScore.toString());
            } catch (e) {}
          }
          return;
        }

        // Move head
        snake.body.unshift(newHead);

        // Check food collision
        if (newHead.x === food.x && newHead.y === food.y) {
          // Eat food - snake grows (don't pop the tail)
          score += 10;
          sfxEatFood();
          food = spawnFood();

          // Increase speed
          baseSpeed = Math.min(baseSpeed + SPEED_INCREMENT, MAX_SPEED);
          tickDuration = 1 / baseSpeed;

          // Check if board is full
          if (snake.body.length === GRID_SIZE * GRID_SIZE) {
            gameState = GAME_STATES.GAME_OVER;
          }
        } else {
          // Move tail (shrink back to normal length)
          snake.body.pop();
        }
      }
    }

    // ── Render ─────────────────────────────────────────────────────────
    function render() {
      // Clear canvas
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw grid
      ctx.strokeStyle = '#1A1A1A';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * CELL_SIZE;
        // Vertical lines
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, CANVAS_HEIGHT);
        ctx.stroke();
        // Horizontal lines
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(CANVAS_WIDTH, pos);
        ctx.stroke();
      }

      // Draw snake
      ctx.fillStyle = '#4CAF50'; // head
      const head = snake.body[0];
      const headX = head.x * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
      const headY = head.y * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
      ctx.fillRect(headX, headY, SNAKE_SIZE, SNAKE_SIZE);

      // Body segments
      ctx.fillStyle = '#2E7D32'; // body
      for (let i = 1; i < snake.body.length; i++) {
        const seg = snake.body[i];
        const x = seg.x * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
        const y = seg.y * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
        ctx.fillRect(x, y, SNAKE_SIZE, SNAKE_SIZE);
      }

      // Draw food
      ctx.fillStyle = '#F44336';
      const foodX = food.x * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
      const foodY = food.y * CELL_SIZE + (CELL_SIZE - SNAKE_SIZE) / 2;
      ctx.fillRect(foodX, foodY, SNAKE_SIZE, SNAKE_SIZE);

      // Draw score and high score
      ctx.font = '16px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + score, 10, 24);
      ctx.textAlign = 'right';
      ctx.fillText('HIGH: ' + highScore, CANVAS_WIDTH - 10, 24);

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawIdleScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawIdleScreen() {
      ctx.fillStyle = 'rgba(17,17,17,0.9)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '56px monospace';
      ctx.fillStyle = '#4CAF50';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', CANVAS_WIDTH / 2, 236);
      ctx.font = '20px monospace';
      ctx.fillStyle = '#FFF';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 320);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '48px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 300);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '48px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 200);
      ctx.font = '24px monospace';
      ctx.fillText('Score: ' + score, CANVAS_WIDTH / 2, 280);
      ctx.font = '16px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    // ── Main Game Loop ─────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016); // Cap at 60fps
      lastTime = currentTime;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
