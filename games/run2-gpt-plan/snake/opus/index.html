<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
// T01: HTML5 scaffold — complete
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600;
const GRID = 20, CELL = 30, INSET = 1; // 20×20 grid, 30px cells, 1px inset → 28×28 squares

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, endFreq, dur, type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (endFreq !== freq) osc.frequency.linearRampToValueAtTime(endFreq, audioCtx.currentTime + dur / 1000);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur / 1000);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur / 1000);
}
function sndEat() { playTone(900, 900, 40, 'sine'); }
function sndDeath() { playTone(440, 120, 280, 'sawtooth'); }

// T03: Game state
const IDLE = 0, PLAYING = 1, PAUSED = 2, GAME_OVER = 3;
let state = IDLE;

// T04/T05: Snake
let snake, dir, nextDir, score, highScore, tickRate, tickTimer, queuedThisTick;
let food;

highScore = parseInt(localStorage.getItem('snake_hs_r2') || '0', 10);

function initGame() {
  snake = [
    { x: 10, y: 10 }, // head
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  tickRate = 8; // ticks per second
  tickTimer = 0;
  queuedThisTick = false;
  spawnFood();
}

// T06: Food
function spawnFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  const free = [];
  for (let x = 0; x < GRID; x++) {
    for (let y = 0; y < GRID; y++) {
      if (!occupied.has(x + ',' + y)) free.push({ x, y });
    }
  }
  if (free.length === 0) {
    // Board full — completed run
    state = GAME_OVER;
    return;
  }
  food = free[Math.floor(Math.random() * free.length)];
}

// T07: Input
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();

  if (e.code === 'Enter') {
    if (state === IDLE || state === GAME_OVER) {
      initGame();
      state = PLAYING;
    }
    return;
  }
  if (e.code === 'KeyP') {
    if (state === PLAYING) state = PAUSED;
    else if (state === PAUSED) state = PLAYING;
    return;
  }

  if (state !== PLAYING || queuedThisTick) return;

  let nd = null;
  if (e.code === 'ArrowUp' || e.code === 'KeyW') nd = { x: 0, y: -1 };
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') nd = { x: 0, y: 1 };
  else if (e.code === 'ArrowLeft' || e.code === 'KeyA') nd = { x: -1, y: 0 };
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') nd = { x: 1, y: 0 };

  if (nd) {
    // No-reverse: can't go opposite of current direction
    if (nd.x !== -dir.x || nd.y !== -dir.y) {
      nextDir = nd;
      queuedThisTick = true;
    }
  }
});

// T02: Game loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 1 / 15);
  lastTime = ts;

  if (state === PLAYING) {
    tickTimer += dt;
    const tickInterval = 1 / tickRate;
    while (tickTimer >= tickInterval) {
      tickTimer -= tickInterval;
      tick();
      if (state !== PLAYING) break;
    }
  }

  render();
  requestAnimationFrame(loop);
}

function tick() {
  dir = { x: nextDir.x, y: nextDir.y };
  queuedThisTick = false;

  const head = snake[0];
  const nx = head.x + dir.x;
  const ny = head.y + dir.y;

  // T09: Wall collision
  if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
    die();
    return;
  }

  // T09: Self collision (check against all body except tail which will move)
  for (let i = 0; i < snake.length - 1; i++) {
    if (snake[i].x === nx && snake[i].y === ny) {
      die();
      return;
    }
  }

  // Move: add new head
  snake.unshift({ x: nx, y: ny });

  // T06: Food check
  if (nx === food.x && ny === food.y) {
    score += 10;
    sndEat();
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_hs_r2', String(highScore));
    }
    // T08: Speed escalation
    tickRate = Math.min(tickRate + 0.5, 15);
    spawnFood();
  } else {
    snake.pop(); // remove tail if no food eaten
  }
}

function die() {
  sndDeath();
  state = GAME_OVER;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snake_hs_r2', String(highScore));
  }
}

// Rendering
function render() {
  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  if (state === IDLE) {
    renderStartScreen();
    return;
  }

  // Grid lines
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(W, i * CELL);
    ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#F44336';
  ctx.fillRect(food.x * CELL + INSET, food.y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);

  // Snake body
  for (let i = snake.length - 1; i >= 1; i--) {
    ctx.fillStyle = '#2E7D32';
    ctx.fillRect(snake[i].x * CELL + INSET, snake[i].y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);
  }

  // Snake head
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(snake[0].x * CELL + INSET, snake[0].y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);

  // T10: HUD
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Score: ' + score, 10, 20);
  ctx.textAlign = 'right';
  ctx.fillText('Best: ' + highScore, W - 10, 20);

  // T12: Game over overlay
  if (state === GAME_OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '40px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.font = '22px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 10);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 50);
  }

  // Pause overlay
  if (state === PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '36px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('PAUSED', W / 2, H / 2);
  }
}

// T13: Start screen
function renderStartScreen() {
  ctx.textAlign = 'center';
  ctx.font = '56px monospace';
  ctx.fillStyle = '#4CAF50';
  ctx.fillText('SNAKE', W / 2, 236);
  ctx.font = '20px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Press Enter to Start', W / 2, 320);
  ctx.font = '14px monospace';
  ctx.fillStyle = '#666666';
  ctx.fillText('Best: ' + highScore, W / 2, 380);
}

// Go
requestAnimationFrame(loop);
</script>
</body>
</html>
