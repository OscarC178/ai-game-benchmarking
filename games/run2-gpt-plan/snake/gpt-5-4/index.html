<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake - run2-gpt-plan</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(100vw, 600px);
      height: min(100vh, 600px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.45);
      background: #111111;
    }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="600" aria-label="Snake game canvas"></canvas>
  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 600;
      const HEIGHT = 600;
      const GRID_SIZE = 20;
      const CELL = 30;
      const CELL_INSET = 1;
      const TILE_SIZE = 28;
      const INITIAL_TPS = 8;
      const MAX_TPS = 15;
      const TPS_GAIN = 0.5;
      const FOOD_SCORE = 10;

      const STATE = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER',
        COMPLETE: 'COMPLETE'
      };

      const DIRS = {
        Up: { x: 0, y: -1, opposite: 'Down' },
        Down: { x: 0, y: 1, opposite: 'Up' },
        Left: { x: -1, y: 0, opposite: 'Right' },
        Right: { x: 1, y: 0, opposite: 'Left' }
      };

      let audioCtx = null;
      let lastTime = 0;
      let accumulator = 0;
      let state = STATE.IDLE;
      let score = 0;
      let highScore = loadHighScore();
      let tickRate = INITIAL_TPS;
      let pendingDirection = null;
      let turnBufferedThisTick = false;
      let finalMessage = 'GAME OVER';

      let snake = [];
      let direction = 'Right';
      let food = { x: 0, y: 0 };

      function loadHighScore() {
        const value = Number(localStorage.getItem('snake_run2_high_score'));
        return Number.isFinite(value) ? value : 0;
      }

      function saveHighScore(value) {
        localStorage.setItem('snake_run2_high_score', String(value));
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          saveHighScore(highScore);
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return null;
          audioCtx = new AudioCtx();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      }

      function playTone(type, frequency, duration, rampTo = null, volume = 0.03) {
        const ac = ensureAudio();
        if (!ac) return;
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (rampTo !== null) osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playEatSound() {
        playTone('sine', 900, 0.04, null, 0.03);
      }

      function playDieSound() {
        playTone('sawtooth', 440, 0.28, 120, 0.035);
      }

      function resetSnake() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        direction = 'Right';
        pendingDirection = null;
        turnBufferedThisTick = false;
      }

      function isOccupied(x, y) {
        return snake.some(segment => segment.x === x && segment.y === y);
      }

      function randomInt(max) {
        return Math.floor(Math.random() * max);
      }

      function spawnFood() {
        const free = [];
        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            if (!isOccupied(x, y)) free.push({ x, y });
          }
        }
        if (free.length === 0) return false;
        food = free[randomInt(free.length)];
        return true;
      }

      function resetGame() {
        score = 0;
        tickRate = INITIAL_TPS;
        accumulator = 0;
        finalMessage = 'GAME OVER';
        resetSnake();
        spawnFood();
      }

      function startGame() {
        ensureAudio();
        resetGame();
        state = STATE.PLAYING;
      }

      function setGameOver(message = 'GAME OVER') {
        finalMessage = message;
        updateHighScore();
        state = message === 'BOARD FILLED' ? STATE.COMPLETE : STATE.GAME_OVER;
        playDieSound();
      }

      function queueDirection(next) {
        if (state !== STATE.PLAYING) return;
        if (turnBufferedThisTick) return;
        const current = pendingDirection || direction;
        if (DIRS[next].opposite === current) return;
        pendingDirection = next;
        turnBufferedThisTick = true;
      }

      function stepGame() {
        turnBufferedThisTick = false;
        if (pendingDirection && DIRS[pendingDirection].opposite !== direction) {
          direction = pendingDirection;
        }
        pendingDirection = null;

        const head = snake[0];
        const dir = DIRS[direction];
        const nextHead = { x: head.x + dir.x, y: head.y + dir.y };

        if (nextHead.x < 0 || nextHead.x >= GRID_SIZE || nextHead.y < 0 || nextHead.y >= GRID_SIZE) {
          setGameOver('GAME OVER');
          return;
        }

        const willEat = nextHead.x === food.x && nextHead.y === food.y;
        const bodyToCheck = willEat ? snake : snake.slice(0, -1);
        if (bodyToCheck.some(segment => segment.x === nextHead.x && segment.y === nextHead.y)) {
          setGameOver('GAME OVER');
          return;
        }

        snake.unshift(nextHead);

        if (willEat) {
          score += FOOD_SCORE;
          updateHighScore();
          tickRate = Math.min(MAX_TPS, tickRate + TPS_GAIN);
          playEatSound();
          if (!spawnFood()) {
            finalMessage = 'BOARD FILLED';
            updateHighScore();
            state = STATE.COMPLETE;
            return;
          }
        } else {
          snake.pop();
        }
      }

      function update(dt) {
        if (state !== STATE.PLAYING) return;
        accumulator += dt;
        const tickDuration = 1 / tickRate;
        while (accumulator >= tickDuration && state === STATE.PLAYING) {
          accumulator -= tickDuration;
          stepGame();
        }
      }

      function drawCell(x, y, color, size = TILE_SIZE) {
        ctx.fillStyle = color;
        ctx.fillRect(x * CELL + CELL_INSET, y * CELL + CELL_INSET, size, size);
      }

      function drawGrid() {
        ctx.strokeStyle = '#1A1A1A';
        ctx.lineWidth = 1;
        for (let i = 0; i <= GRID_SIZE; i++) {
          const p = i * CELL + 0.5;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, HEIGHT);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(WIDTH, p);
          ctx.stroke();
        }
      }

      function drawSnake() {
        snake.forEach((segment, index) => {
          drawCell(segment.x, segment.y, index === 0 ? '#4CAF50' : '#2E7D32');
        });
      }

      function drawFood() {
        drawCell(food.x, food.y, '#F44336');
      }

      function drawHud() {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(`SCORE ${score}`, 10, 10);

        ctx.textAlign = 'right';
        ctx.fillText(`HIGH ${highScore}`, WIDTH - 10, 10);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#A0A0A0';
        ctx.fillText(`SPEED ${tickRate.toFixed(1)} t/s`, WIDTH / 2, 10);
      }

      function drawOverlay(title, subline, prompt, titleColor = '#FFFFFF') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = titleColor;
        ctx.font = '56px monospace';
        ctx.fillText(title, WIDTH / 2, title === 'SNAKE' ? 236 : 250);
        if (subline) {
          ctx.fillStyle = '#CFCFCF';
          ctx.font = '22px monospace';
          ctx.fillText(subline, WIDTH / 2, 308);
        }
        if (prompt) {
          ctx.fillStyle = '#FFFFFF';
          ctx.font = '28px monospace';
          ctx.fillText(prompt, WIDTH / 2, title === 'SNAKE' ? 320 : 352);
        }
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#111111';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        drawGrid();
        if (state !== STATE.IDLE) {
          drawFood();
          drawSnake();
        }
        drawHud();

        if (state === STATE.IDLE) {
          drawOverlay('SNAKE', 'Eat. Grow. Don\'t crash.', 'Press Enter to Start', '#4CAF50');
        } else if (state === STATE.PAUSED) {
          drawOverlay('PAUSED', null, 'Press P to Resume');
        } else if (state === STATE.GAME_OVER) {
          drawOverlay(finalMessage, `Score ${score}`, 'Press Enter to Restart');
        } else if (state === STATE.COMPLETE) {
          drawOverlay('BOARD FILLED', `Perfect run - Score ${score}`, 'Press Enter to Restart', '#4CAF50');
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      function handleKeyDown(event) {
        const code = event.code;
        if ([
          'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
          'KeyW', 'KeyA', 'KeyS', 'KeyD', 'Enter', 'KeyP'
        ].includes(code)) {
          event.preventDefault();
        }

        if (code === 'Enter') {
          if (state === STATE.IDLE || state === STATE.GAME_OVER || state === STATE.COMPLETE) {
            startGame();
          }
          return;
        }

        if (code === 'KeyP') {
          if (state === STATE.PLAYING) state = STATE.PAUSED;
          else if (state === STATE.PAUSED) state = STATE.PLAYING;
          return;
        }

        const map = {
          ArrowUp: 'Up', KeyW: 'Up',
          ArrowDown: 'Down', KeyS: 'Down',
          ArrowLeft: 'Left', KeyA: 'Left',
          ArrowRight: 'Right', KeyD: 'Right'
        };

        if (map[code]) queueDirection(map[code]);
      }

      window.addEventListener('keydown', handleKeyDown, { passive: false });

      resetGame();
      state = STATE.IDLE;
      render();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
