<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function () {
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600;
const GRID = 20;       // 20×20 cells
const CELL = 30;       // 30px per cell
const INSET = 1;       // 1px inset → 28×28px sprite

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAC() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function sfxEat() {
  const ac = getAC(); if (!ac) return;
  try {
    const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = 900;
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o.start(t); o.stop(t + 0.04);
  } catch(e) {}
}
function sfxDeath() {
  const ac = getAC(); if (!ac) return;
  try {
    const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(440, t);
    o.frequency.linearRampToValueAtTime(120, t + 0.28);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.start(t); o.stop(t + 0.28);
  } catch(e) {}
}

// ── State Machine ─────────────────────────────────────────────────────────────
const ST = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
let state = ST.IDLE;

// ── Game variables ────────────────────────────────────────────────────────────
let snake = [];           // array of {x, y} grid cells, index 0 = head
let dir = { x: 1, y: 0 };// current direction
let nextDir = null;       // queued direction (one per tick)
let food = { x: 0, y: 0 };
let score = 0;
let highScore = 0;
try { highScore = parseInt(localStorage.getItem('snake_hs') || '0', 10) || 0; } catch(e) {}

// Tick timing
const TICK_START = 8;     // ticks/s
const TICK_MAX   = 15;    // ticks/s cap
const TICK_INC   = 0.5;   // per food eaten
let tickRate = TICK_START; // ticks per second
let tickAccum = 0;        // seconds accumulated since last tick
let inputConsumed = false; // one direction change per tick window

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const prev = keys[e.code];
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();

  if (!prev) {
    if (e.code === 'Enter') {
      if (state === ST.IDLE || state === ST.GAME_OVER) startGame();
    }
    if (e.code === 'KeyP') {
      if (state === ST.PLAYING) state = ST.PAUSED;
      else if (state === ST.PAUSED) state = ST.PLAYING;
    }
  }

  // Direction input — buffer only one per tick window
  if (state === ST.PLAYING && !inputConsumed) {
    let nd = null;
    if (e.code === 'ArrowUp'    || e.code === 'KeyW') nd = { x:  0, y: -1 };
    if (e.code === 'ArrowDown'  || e.code === 'KeyS') nd = { x:  0, y:  1 };
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') nd = { x: -1, y:  0 };
    if (e.code === 'ArrowRight' || e.code === 'KeyD') nd = { x:  1, y:  0 };
    if (nd) {
      // Reject direct reversal into neck
      const neck = snake[1];
      const headX = snake[0].x + nd.x;
      const headY = snake[0].y + nd.y;
      const wouldReverse = neck && headX === neck.x && headY === neck.y;
      if (!wouldReverse) {
        nextDir = nd;
        inputConsumed = true;
      }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Game init ─────────────────────────────────────────────────────────────────
function startGame() {
  snake = [
    { x: 10, y: 10 },
    { x:  9, y: 10 },
    { x:  8, y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = null;
  inputConsumed = false;
  score = 0;
  tickRate = TICK_START;
  tickAccum = 0;
  spawnFood();
  state = ST.PLAYING;
}

function spawnFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  let fx, fy;
  do {
    fx = Math.floor(Math.random() * GRID);
    fy = Math.floor(Math.random() * GRID);
  } while (occupied.has(fx + ',' + fy));
  food = { x: fx, y: fy };
}

// ── Tick logic ────────────────────────────────────────────────────────────────
function tick() {
  // Apply buffered direction
  if (nextDir) { dir = nextDir; nextDir = null; }
  inputConsumed = false;

  // Move head
  const newHead = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
    die(); return;
  }

  // Self collision
  for (const seg of snake) {
    if (newHead.x === seg.x && newHead.y === seg.y) { die(); return; }
  }

  // Prepend new head
  snake.unshift(newHead);

  // Food collision
  if (newHead.x === food.x && newHead.y === food.y) {
    score += 10;
    tickRate = Math.min(tickRate + TICK_INC, TICK_MAX);
    sfxEat();
    // Check board full
    if (snake.length === GRID * GRID) {
      state = ST.GAME_OVER; // completed run
      saveHigh();
      return;
    }
    spawnFood();
    // Don't remove tail (grow by 1)
  } else {
    snake.pop(); // remove tail
  }
}

function die() {
  sfxDeath();
  saveHigh();
  state = ST.GAME_OVER;
}

function saveHigh() {
  try {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_hs', highScore);
    }
  } catch(e) {}
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (state === ST.IDLE) {
    drawStartScreen();
    return;
  }

  drawGrid();
  drawFood();
  drawSnake();
  drawHUD();

  if (state === ST.PAUSED)    drawPauseOverlay();
  if (state === ST.GAME_OVER) drawGameOver();
}

function drawGrid() {
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(W, i * CELL);
    ctx.stroke();
  }
}

function drawSnake() {
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? '#4CAF50' : '#2E7D32';
    const s = snake[i];
    ctx.fillRect(s.x * CELL + INSET, s.y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);
  }
  // Eyes on head
  if (snake.length > 0) {
    const h = snake[0];
    ctx.fillStyle = '#000';
    const hx = h.x * CELL + INSET, hy = h.y * CELL + INSET;
    const hw = CELL - INSET * 2;
    // Eye positions vary by direction
    const ex1 = hx + (dir.y !== 0 ? 5  : dir.x > 0 ? hw - 8 : 4);
    const ey1 = hy + (dir.x !== 0 ? 5  : dir.y > 0 ? hw - 8 : 4);
    const ex2 = hx + (dir.y !== 0 ? hw - 8 : dir.x > 0 ? hw - 8 : 4);
    const ey2 = hy + (dir.x !== 0 ? hw - 8 : dir.y > 0 ? hw - 8 : 4);
    ctx.fillRect(ex1, ey1, 4, 4);
    ctx.fillRect(ex2, ey2, 4, 4);
  }
}

function drawFood() {
  ctx.fillStyle = '#F44336';
  ctx.fillRect(food.x * CELL + INSET, food.y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 28);
  ctx.fillStyle = '#FFF';
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 8, 20);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#AAA';
  ctx.fillText('Best: ' + highScore, W - 8, 20);
}

function drawStartScreen() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  ctx.fillStyle = '#4CAF50';
  ctx.font = '56px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SNAKE', W / 2, 236);
  ctx.fillStyle = '#AAA';
  ctx.font = '20px monospace';
  ctx.fillText('Press Enter to Start', W / 2, 320);
  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow Keys / WASD  •  P: Pause', W / 2, 370);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#FFF';
  ctx.font = '36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.fillStyle = '#AAA';
  ctx.font = '16px monospace';
  ctx.fillText('Press P to Resume', W / 2, H / 2 + 40);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#FFF';
  ctx.font = '48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, 240);
  ctx.fillStyle = '#4CAF50';
  ctx.font = '28px monospace';
  ctx.fillText('Score: ' + score, W / 2, 300);
  ctx.fillStyle = '#AAA';
  ctx.font = '18px monospace';
  ctx.fillText('Press Enter to Restart', W / 2, 360);
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) { lastTime = ts; }
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === ST.PLAYING) {
    tickAccum += dt;
    const tickInterval = 1 / tickRate;
    if (tickAccum >= tickInterval) {
      tickAccum -= tickInterval;
      tick();
    }
  }

  draw();
}

requestAnimationFrame(loop);
})();
</script>
</body>
</html>
