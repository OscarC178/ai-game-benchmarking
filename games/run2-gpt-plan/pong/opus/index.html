<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
// T01: HTML scaffold — complete
// T02: Main loop and timing
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, endFreq, dur, type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (endFreq !== freq) osc.frequency.linearRampToValueAtTime(endFreq, audioCtx.currentTime + dur / 1000);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur / 1000);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur / 1000);
}
function sndPaddle() { playSound(440, 440, 45); }
function sndWall() { playSound(220, 220, 45); }
function sndScore() { playSound(700, 320, 180); }

// T03: State flow
const IDLE = 0, SERVE = 1, PLAYING = 2, PAUSED = 3, GAME_OVER = 4;
let state = IDLE;
const WIN_SCORE = 7;

// T04: Player paddle
const PADDLE_W = 12, PADDLE_H = 84, PADDLE_SPEED = 420;
const player = { x: 32, y: 258, w: PADDLE_W, h: PADDLE_H };

// T05: CPU paddle
const CPU_SPEED = 320, CPU_DELAY = 0.08; // 80ms
const cpu = { x: 756, y: 258, w: PADDLE_W, h: PADDLE_H };
let cpuTarget = H / 2;
let cpuDelayTimer = 0;
let cpuLastBallY = H / 2;

// T06: Ball
const BALL_SIZE = 12, LAUNCH_SPEED = 340, SPEED_INC = 22, MAX_SPEED = 620;
const ball = { x: 0, y: 0, vx: 0, vy: 0, speed: 0 };

// Scoring
let playerScore = 0, cpuScore = 0;
let highScore = parseInt(localStorage.getItem('pong_hs_r2') || '0', 10);

// Serve
let serveTimer = 0;
let serveDir = 1; // 1 = toward CPU, -1 = toward player

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (state === IDLE || state === GAME_OVER) startGame();
  }
  if (e.code === 'KeyP') {
    if (state === PLAYING || state === SERVE) { prevState = state; state = PAUSED; }
    else if (state === PAUSED) state = prevState;
  }
  if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let prevState = PLAYING;

function startGame() {
  playerScore = 0;
  cpuScore = 0;
  player.y = 258;
  cpu.y = 258;
  cpuTarget = H / 2;
  cpuDelayTimer = 0;
  cpuLastBallY = H / 2;
  serveDir = Math.random() < 0.5 ? 1 : -1;
  resetBall();
  serveTimer = 0.9;
  state = SERVE;
}

function resetBall() {
  ball.x = W / 2 - BALL_SIZE / 2;
  ball.y = H / 2 - BALL_SIZE / 2;
  ball.vx = 0;
  ball.vy = 0;
  ball.speed = LAUNCH_SPEED;
}

function launchBall() {
  const angle = (Math.random() * 56 - 28) * Math.PI / 180;
  ball.vx = Math.cos(angle) * ball.speed * serveDir;
  ball.vy = Math.sin(angle) * ball.speed;
}

// T02: Main loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 1 / 30);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  if (state === SERVE) {
    updatePaddles(dt);
    serveTimer -= dt;
    if (serveTimer <= 0) {
      launchBall();
      state = PLAYING;
    }
    return;
  }
  if (state !== PLAYING) return;

  // T04: Player paddle movement
  updatePaddles(dt);

  // T06: Ball movement
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Wall bounce
  if (ball.y <= 0) {
    ball.y = -ball.y;
    ball.vy = Math.abs(ball.vy);
    sndWall();
  }
  if (ball.y + BALL_SIZE >= H) {
    ball.y = 2 * (H - BALL_SIZE) - ball.y;
    ball.vy = -Math.abs(ball.vy);
    sndWall();
  }

  // T07: Paddle collision
  // Player paddle
  if (ball.vx < 0 && ball.x <= player.x + player.w && ball.x + BALL_SIZE >= player.x &&
      ball.y + BALL_SIZE >= player.y && ball.y <= player.y + player.h) {
    ball.x = player.x + player.w;
    const offset = ((ball.y + BALL_SIZE / 2) - (player.y + player.h / 2)) / (player.h / 2);
    const angle = offset * 60 * Math.PI / 180;
    ball.speed = Math.min(ball.speed + SPEED_INC, MAX_SPEED);
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    sndPaddle();
  }
  // CPU paddle
  if (ball.vx > 0 && ball.x + BALL_SIZE >= cpu.x && ball.x <= cpu.x + cpu.w &&
      ball.y + BALL_SIZE >= cpu.y && ball.y <= cpu.y + cpu.h) {
    ball.x = cpu.x - BALL_SIZE;
    const offset = ((ball.y + BALL_SIZE / 2) - (cpu.y + cpu.h / 2)) / (cpu.h / 2);
    const angle = offset * 60 * Math.PI / 180;
    ball.speed = Math.min(ball.speed + SPEED_INC, MAX_SPEED);
    ball.vx = -Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    sndPaddle();
  }

  // T08: Scoring
  if (ball.x + BALL_SIZE < 0) {
    cpuScore++;
    sndScore();
    if (cpuScore >= WIN_SCORE) {
      endGame();
      return;
    }
    serveDir = -1; // toward the player who conceded
    resetBall();
    serveTimer = 0.9;
    state = SERVE;
  }
  if (ball.x > W) {
    playerScore++;
    sndScore();
    if (playerScore > highScore) {
      highScore = playerScore;
      localStorage.setItem('pong_hs_r2', String(highScore));
    }
    if (playerScore >= WIN_SCORE) {
      endGame();
      return;
    }
    serveDir = 1; // toward the player who conceded (CPU)
    resetBall();
    serveTimer = 0.9;
    state = SERVE;
  }
}

function updatePaddles(dt) {
  // Player
  if (keys['ArrowUp'] || keys['KeyW']) player.y -= PADDLE_SPEED * dt;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += PADDLE_SPEED * dt;
  player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

  // T05: CPU AI with reaction delay
  cpuDelayTimer += dt;
  if (cpuDelayTimer >= CPU_DELAY) {
    cpuTarget = ball.y + BALL_SIZE / 2;
    cpuDelayTimer = 0;
  }
  const cpuCenter = cpu.y + cpu.h / 2;
  const diff = cpuTarget - cpuCenter;
  if (Math.abs(diff) > 4) {
    const move = Math.sign(diff) * Math.min(CPU_SPEED * dt, Math.abs(diff));
    cpu.y += move;
  }
  cpu.y = Math.max(0, Math.min(H - PADDLE_H, cpu.y));
}

function endGame() {
  state = GAME_OVER;
  if (playerScore > highScore) {
    highScore = playerScore;
    localStorage.setItem('pong_hs_r2', String(highScore));
  }
}

// T09, T10, T11: Rendering
function render() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  if (state === IDLE) {
    renderStartScreen();
    return;
  }

  // Draw divider
  ctx.fillStyle = '#3A3A3A';
  for (let y = 0; y < H; y += 26) {
    ctx.fillRect(398, y, 4, 16);
  }

  // Draw paddles
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);

  // Draw ball
  ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

  // T09: HUD — scores
  ctx.font = '48px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.fillText(String(playerScore), 300, 54);
  ctx.fillText(String(cpuScore), 500, 54);

  // High score
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('Best: ' + highScore, W / 2, 18);

  // T10: Game over
  if (state === GAME_OVER) {
    renderGameOver();
  }

  // T11: Pause
  if (state === PAUSED) {
    ctx.fillStyle = '#000000CC';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '36px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2);
  }
}

function renderStartScreen() {
  ctx.font = '64px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.fillText('PONG', W / 2, 210);

  ctx.font = '20px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Press Enter to Start', W / 2, 344);

  // High score
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('Best: ' + highScore, W / 2, 410);
}

function renderGameOver() {
  ctx.fillStyle = '#000000CC';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.font = '36px monospace';
  ctx.fillStyle = '#FFFFFF';
  if (playerScore >= WIN_SCORE) {
    ctx.fillText('YOU WIN', W / 2, 250);
  } else {
    ctx.fillText('GAME OVER', W / 2, 250);
  }

  ctx.font = '24px monospace';
  ctx.fillText(playerScore + ' — ' + cpuScore, W / 2, 308);

  ctx.font = '18px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Press Enter to Restart', W / 2, 356);
}

// Start
requestAnimationFrame(loop);
</script>
</body>
</html>
