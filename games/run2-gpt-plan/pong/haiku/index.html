<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // ════════════════════════════════════════════════════════════════════
    // PONG GAME - run2-gpt-plan / haiku builder
    // ════════════════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Constants ──────────────────────────────────────────────────────
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const GAME_STATES = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Paddle specs
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 84;
    const PADDLE_SPEED = 420;
    const PLAYER_X = 32;
    const CPU_X = 756;
    const PADDLE_MIN_Y = 0;
    const PADDLE_MAX_Y = CANVAS_HEIGHT - PADDLE_HEIGHT; // 516

    // Ball specs
    const BALL_SIZE = 12;
    const BALL_INIT_SPEED = 340;
    const BALL_MAX_SPEED = 620;
    const BALL_SPEED_INCREMENT = 22;
    const BALL_CENTER_X = CANVAS_WIDTH / 2 - BALL_SIZE / 2; // 394
    const BALL_CENTER_Y = CANVAS_HEIGHT / 2 - BALL_SIZE / 2; // 294

    // Game logic
    const LAUNCH_ANGLE_MIN = -28;
    const LAUNCH_ANGLE_MAX = 28;
    const WIN_SCORE = 7;
    const SERVE_DELAY = 0.9;
    const CPU_REACTION_DELAY = 0.08; // 80ms

    // ── Game State ─────────────────────────────────────────────────────
    let gameState = GAME_STATES.IDLE;
    let score = { player: 0, cpu: 0 };
    let highScore = 0;
    let serveTimer = 0;
    let serveDirection = 1; // 1 = toward player (-x), -1 = toward CPU (+x)

    // Load high score
    try {
      highScore = parseInt(localStorage.getItem('pong_high_score') || '0');
    } catch (e) {}

    // ── Player Paddle ──────────────────────────────────────────────────
    const player = {
      x: PLAYER_X,
      y: CANVAS_HEIGHT / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      vy: 0
    };

    // ── CPU Paddle ─────────────────────────────────────────────────────
    const cpu = {
      x: CPU_X,
      y: CANVAS_HEIGHT / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      vy: 0,
      reactionTimer: 0,
      targetY: CANVAS_HEIGHT / 2 - PADDLE_HEIGHT / 2
    };

    // ── Ball ───────────────────────────────────────────────────────────
    const ball = {
      x: BALL_CENTER_X,
      y: BALL_CENTER_Y,
      size: BALL_SIZE,
      vx: 0,
      vy: 0,
      speed: BALL_INIT_SPEED
    };

    // ── Input ──────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        if (gameState === GAME_STATES.IDLE || gameState === GAME_STATES.GAME_OVER) {
          startGame();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === GAME_STATES.PLAYING) {
          gameState = GAME_STATES.PAUSED;
        } else if (gameState === GAME_STATES.PAUSED) {
          gameState = GAME_STATES.PLAYING;
        }
      }
    });
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // ── Audio (Web Audio API) ──────────────────────────────────────────
    let audioContext = null;
    function getAudioContext() {
      if (!audioContext) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) {
          audioContext = new AC();
          if (audioContext.state === 'suspended') {
            audioContext.resume().catch(() => {});
          }
        }
      }
      return audioContext;
    }

    function playTone(freq, duration, type = 'square') {
      const ac = getAudioContext();
      if (!ac) return;
      try {
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function playFreqRamp(freqStart, freqEnd, duration) {
      const ac = getAudioContext();
      if (!ac) return;
      try {
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.linearRampToValueAtTime(freqEnd, now + duration);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    function sfxPaddleHit() {
      playTone(440, 0.045);
    }

    function sfxWallBounce() {
      playTone(220, 0.045);
    }

    function sfxScore() {
      playFreqRamp(700, 320, 0.18);
    }

    // ── Initialization ─────────────────────────────────────────────────
    function startGame() {
      score = { player: 0, cpu: 0 };
      serveDirection = -1; // Start serving toward CPU
      launchBall(serveDirection);
      gameState = GAME_STATES.PLAYING;
    }

    function launchBall(direction) {
      // direction: 1 = toward player (left), -1 = toward CPU (right)
      const angle = (Math.random() * (LAUNCH_ANGLE_MAX - LAUNCH_ANGLE_MIN) + LAUNCH_ANGLE_MIN) * Math.PI / 180;
      const speed = BALL_INIT_SPEED;
      ball.vx = Math.cos(angle) * speed * direction * -1;
      ball.vy = Math.sin(angle) * speed;
      ball.speed = BALL_INIT_SPEED;
      ball.x = BALL_CENTER_X;
      ball.y = BALL_CENTER_Y;
      serveTimer = 0;
    }

    // ── Update ─────────────────────────────────────────────────────────
    function update(dt) {
      if (gameState !== GAME_STATES.PLAYING) return;

      // ── Player paddle input ────────────────────────────────────────
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        player.vy = -PADDLE_SPEED;
      } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        player.vy = PADDLE_SPEED;
      } else {
        player.vy = 0;
      }
      player.y += player.vy * dt;
      player.y = Math.max(PADDLE_MIN_Y, Math.min(PADDLE_MAX_Y, player.y));

      // ── CPU AI ─────────────────────────────────────────────────────
      cpu.reactionTimer += dt;
      if (cpu.reactionTimer >= CPU_REACTION_DELAY) {
        // Calculate target y based on ball y
        const ballCenter = ball.y + BALL_SIZE / 2;
        const cpuCenter = cpu.y + PADDLE_HEIGHT / 2;
        cpu.targetY = ballCenter - PADDLE_HEIGHT / 2;
        cpu.reactionTimer = 0;
      }
      // Move CPU toward target with capped speed (320px/s)
      const cpuSpeed = 320;
      const diff = cpu.targetY - cpu.y;
      if (Math.abs(diff) > cpuSpeed * dt) {
        cpu.vy = Math.sign(diff) * cpuSpeed;
      } else {
        cpu.vy = diff / dt;
      }
      cpu.y += cpu.vy * dt;
      cpu.y = Math.max(PADDLE_MIN_Y, Math.min(PADDLE_MAX_Y, cpu.y));

      // ── Ball update ────────────────────────────────────────────────
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Top/bottom wall collision
      if (ball.y < 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
        sfxWallBounce();
      } else if (ball.y + BALL_SIZE > CANVAS_HEIGHT) {
        ball.y = CANVAS_HEIGHT - BALL_SIZE;
        ball.vy = -ball.vy;
        sfxWallBounce();
      }

      // Paddle collision (AABB)
      // Player paddle (left)
      if (ball.vx < 0 && // Ball moving left
          ball.x < player.x + player.width &&
          ball.x + BALL_SIZE > player.x &&
          ball.y < player.y + player.height &&
          ball.y + BALL_SIZE > player.y) {
        // Hit! Calculate bounce angle
        const hitOffset = (ball.y + BALL_SIZE / 2 - (player.y + player.height / 2)) / (player.height / 2);
        const bounceAngle = hitOffset * 60 * Math.PI / 180; // ±60 degrees
        const newSpeed = Math.min(ball.speed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);
        ball.vx = -Math.cos(bounceAngle) * newSpeed;
        ball.vy = Math.sin(bounceAngle) * newSpeed;
        ball.speed = newSpeed;
        ball.x = player.x + player.width; // Push ball out
        sfxPaddleHit();
      }

      // CPU paddle (right)
      if (ball.vx > 0 && // Ball moving right
          ball.x + BALL_SIZE > cpu.x &&
          ball.x < cpu.x + cpu.width &&
          ball.y < cpu.y + cpu.height &&
          ball.y + BALL_SIZE > cpu.y) {
        // Hit! Calculate bounce angle
        const hitOffset = (ball.y + BALL_SIZE / 2 - (cpu.y + cpu.height / 2)) / (cpu.height / 2);
        const bounceAngle = hitOffset * 60 * Math.PI / 180; // ±60 degrees
        const newSpeed = Math.min(ball.speed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);
        ball.vx = Math.cos(bounceAngle) * newSpeed;
        ball.vy = Math.sin(bounceAngle) * newSpeed;
        ball.speed = newSpeed;
        ball.x = cpu.x - BALL_SIZE; // Push ball out
        sfxPaddleHit();
      }

      // Scoring boundaries (left/right exit)
      if (ball.x + BALL_SIZE < 0) {
        // Player scores (CPU missed)
        score.player++;
        sfxScore();
        serveDirection = 1; // Serve toward player (the one who scored concedes)
        if (score.player >= WIN_SCORE) {
          gameState = GAME_STATES.GAME_OVER;
        } else {
          serveTimer = SERVE_DELAY;
        }
      } else if (ball.x > CANVAS_WIDTH) {
        // CPU scores (player missed)
        score.cpu++;
        sfxScore();
        serveDirection = -1; // Serve toward CPU
        if (score.cpu >= WIN_SCORE) {
          gameState = GAME_STATES.GAME_OVER;
        } else {
          serveTimer = SERVE_DELAY;
        }
      }

      // Re-serve delay
      if (serveTimer > 0) {
        serveTimer -= dt;
        if (serveTimer <= 0) {
          launchBall(serveDirection);
        }
      }
    }

    // ── Render ─────────────────────────────────────────────────────────
    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw center divider (dashed line, 4px wide with 16px dashes, 10px gaps)
      ctx.strokeStyle = '#3A3A3A';
      ctx.lineWidth = 4;
      ctx.setLineDash([16, 10]);
      ctx.beginPath();
      ctx.moveTo(CANVAS_WIDTH / 2, 0);
      ctx.lineTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles
      ctx.fillStyle = '#FFF';
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);

      // Draw ball
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

      // Draw score
      ctx.font = '48px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      ctx.fillText(score.player, 300, 54);
      ctx.fillText(score.cpu, 500, 54);

      // Draw high score
      ctx.font = '12px monospace';
      ctx.fillStyle = '#888';
      ctx.textAlign = 'center';
      ctx.fillText('HIGH: ' + highScore, CANVAS_WIDTH / 2, 20);

      // Draw UI overlays
      if (gameState === GAME_STATES.IDLE) {
        drawIdleScreen();
      } else if (gameState === GAME_STATES.PAUSED) {
        drawPauseScreen();
      } else if (gameState === GAME_STATES.GAME_OVER) {
        drawGameOverScreen();
      }
    }

    function drawIdleScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '64px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      ctx.fillText('PONG', CANVAS_WIDTH / 2, 210);
      ctx.font = '24px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 344);
    }

    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '48px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, 300);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.font = '48px monospace';
      ctx.fillStyle = '#FFF';
      ctx.textAlign = 'center';
      if (score.player >= WIN_SCORE) {
        ctx.fillText('YOU WIN', CANVAS_WIDTH / 2, 200);
      } else {
        ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 200);
      }
      ctx.font = '24px monospace';
      ctx.fillText('Final Score: ' + score.player + ' - ' + score.cpu, CANVAS_WIDTH / 2, 280);
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);

      // Update and save high score
      if (score.player > highScore) {
        highScore = score.player;
        try {
          localStorage.setItem('pong_high_score', highScore.toString());
        } catch (e) {}
      }
    }

    // ── Main Game Loop ─────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016); // Cap at 60fps (~16.67ms)
      lastTime = currentTime;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
