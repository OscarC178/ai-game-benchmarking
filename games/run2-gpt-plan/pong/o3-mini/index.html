<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #000; display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // Pong Game Implementation
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game objects
    const paddleWidth = 10, paddleHeight = 100, ballSize = 10;
    let leftPaddleY = canvas.height / 2 - paddleHeight / 2;
    let rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    let ballX = canvas.width / 2 - ballSize / 2;
    let ballY = canvas.height / 2 - ballSize / 2;
    let ballSpeedX = 4, ballSpeedY = 4;
    const paddleSpeed = 6;

    // Player input
    const keys = {};
    document.addEventListener('keydown', (e) => { keys[e.key] = true; });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    function movePaddles() {
      if (keys['w'] || keys['W']) {
        leftPaddleY -= paddleSpeed;
      }
      if (keys['s'] || keys['S']) {
        leftPaddleY += paddleSpeed;
      }
      if (keys['ArrowUp']) {
        rightPaddleY -= paddleSpeed;
      }
      if (keys['ArrowDown']) {
        rightPaddleY += paddleSpeed;
      }
      leftPaddleY = Math.max(Math.min(leftPaddleY, canvas.height - paddleHeight), 0);
      rightPaddleY = Math.max(Math.min(rightPaddleY, canvas.height - paddleHeight), 0);
    }

    function moveBall() {
      ballX += ballSpeedX;
      ballY += ballSpeedY;
      if (ballY <= 0 || ballY + ballSize >= canvas.height) {
        ballSpeedY = -ballSpeedY;
      }
      // Check collision with left paddle
      if (ballX <= paddleWidth && ballY + ballSize >= leftPaddleY && ballY <= leftPaddleY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
        ballX = paddleWidth; // reposition ball
      }
      // Check collision with right paddle
      if (ballX + ballSize >= canvas.width - paddleWidth && ballY + ballSize >= rightPaddleY && ballY <= rightPaddleY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
        ballX = canvas.width - paddleWidth - ballSize; // reposition ball
      }
      // Reset ball if it goes past paddles
      if (ballX < 0 || ballX > canvas.width) {
        ballX = canvas.width / 2 - ballSize / 2;
        ballY = canvas.height / 2 - ballSize / 2;
        ballSpeedX = -ballSpeedX;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);
      ctx.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);
      ctx.fillRect(ballX, ballY, ballSize, ballSize);
    }

    function gameLoop() {
      movePaddles();
      moveBall();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
