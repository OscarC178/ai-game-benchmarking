<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong - run2-gpt-plan</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: monospace;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      width: min(100vw, 800px);
      height: auto;
      max-height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 32px rgba(255,255,255,0.08);
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600" aria-label="Pong game canvas"></canvas>
  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 800;
      const HEIGHT = 600;
      const WIN_SCORE = 7;
      const PLAYER_X = 32;
      const CPU_X = 756;
      const PADDLE_W = 12;
      const PADDLE_H = 84;
      const BALL_SIZE = 12;
      const PLAYER_SPEED = 420;
      const CPU_SPEED = 320;
      const CPU_REACTION_DELAY = 0.08;
      const BALL_START_SPEED = 340;
      const BALL_SPEED_INCREMENT = 22;
      const BALL_MAX_SPEED = 620;
      const RESERVE_DELAY = 0.9;
      const MAX_BOUNCE_ANGLE = Math.PI * (28 / 180);

      const STATE = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      const keys = new Set();
      let audioCtx = null;
      let lastTime = 0;
      let state = STATE.IDLE;
      let winner = null;
      let reserveTimer = 0;
      let pendingServeDirection = 1;
      let cpuThinkTimer = 0;
      let cpuTargetY = HEIGHT / 2;

      function loadHighScore() {
        const raw = localStorage.getItem('pong_run2_high_score');
        const parsed = Number(raw);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function saveHighScore(value) {
        localStorage.setItem('pong_run2_high_score', String(value));
      }

      let highScore = loadHighScore();

      const player = {
        x: PLAYER_X,
        y: 258,
        width: PADDLE_W,
        height: PADDLE_H,
        vy: 0
      };

      const cpu = {
        x: CPU_X,
        y: 258,
        width: PADDLE_W,
        height: PADDLE_H,
        vy: 0
      };

      const ball = {
        x: 394,
        y: 294,
        size: BALL_SIZE,
        vx: 0,
        vy: 0,
        speed: BALL_START_SPEED,
        active: false
      };

      const score = {
        player: 0,
        cpu: 0
      };

      function ensureAudio() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          audioCtx = new Ctx();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
      }

      function playTone(type, frequency, duration, rampTo = null, volume = 0.03) {
        const ac = ensureAudio();
        if (!ac) return;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        const now = ac.currentTime;
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (rampTo !== null) {
          osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        }
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playPaddleSound() {
        playTone('square', 440, 0.045, null, 0.025);
      }

      function playWallSound() {
        playTone('square', 220, 0.045, null, 0.02);
      }

      function playScoreSound() {
        playTone('triangle', 700, 0.18, 320, 0.03);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function resetPaddles() {
        player.y = 258;
        cpu.y = 258;
        player.vy = 0;
        cpu.vy = 0;
        cpuTargetY = HEIGHT / 2;
        cpuThinkTimer = 0;
      }

      function resetBall() {
        ball.x = 394;
        ball.y = 294;
        ball.vx = 0;
        ball.vy = 0;
        ball.speed = BALL_START_SPEED;
        ball.active = false;
      }

      function launchBall(direction) {
        const angle = (Math.random() * 2 - 1) * MAX_BOUNCE_ANGLE;
        ball.speed = BALL_START_SPEED;
        ball.vx = Math.cos(angle) * ball.speed * direction;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.active = true;
      }

      function scheduleBallLaunch(direction) {
        resetBall();
        reserveTimer = RESERVE_DELAY;
        pendingServeDirection = direction;
      }

      function updateHighScore() {
        const best = Math.max(highScore, score.player);
        if (best !== highScore) {
          highScore = best;
          saveHighScore(highScore);
        }
      }

      function startGame() {
        score.player = 0;
        score.cpu = 0;
        winner = null;
        resetPaddles();
        updateHighScore();
        scheduleBallLaunch(Math.random() < 0.5 ? -1 : 1);
        state = STATE.PLAYING;
      }

      function aabbIntersect(a, b) {
        return a.x < b.x + b.width &&
               a.x + a.width > b.x &&
               a.y < b.y + b.height &&
               a.y + a.height > b.y;
      }

      function applyPaddleBounce(paddle, direction) {
        const paddleCenter = paddle.y + paddle.height / 2;
        const ballCenter = ball.y + ball.size / 2;
        const normalized = clamp((ballCenter - paddleCenter) / (paddle.height / 2), -1, 1);
        const angle = normalized * MAX_BOUNCE_ANGLE;
        ball.speed = Math.min(BALL_MAX_SPEED, ball.speed + BALL_SPEED_INCREMENT);
        ball.vx = Math.cos(angle) * ball.speed * direction;
        ball.vy = Math.sin(angle) * ball.speed;
        playPaddleSound();
      }

      function updatePlayer(dt) {
        let move = 0;
        if (keys.has('ArrowUp') || keys.has('KeyW')) move -= 1;
        if (keys.has('ArrowDown') || keys.has('KeyS')) move += 1;
        player.vy = move * PLAYER_SPEED;
        player.y = clamp(player.y + player.vy * dt, 0, HEIGHT - player.height);
      }

      function updateCpu(dt) {
        cpuThinkTimer -= dt;
        if (cpuThinkTimer <= 0) {
          cpuThinkTimer = CPU_REACTION_DELAY;
          const ballCenterY = ball.y + ball.size / 2;
          const jitter = (Math.random() * 28) - 14;
          cpuTargetY = ballCenterY + jitter;
        }

        const cpuCenter = cpu.y + cpu.height / 2;
        const diff = cpuTargetY - cpuCenter;
        const deadZone = 8;
        if (Math.abs(diff) <= deadZone) {
          cpu.vy = 0;
        } else {
          cpu.vy = clamp(diff / Math.max(dt, 0.001), -CPU_SPEED, CPU_SPEED);
        }
        cpu.y = clamp(cpu.y + cpu.vy * dt, 0, HEIGHT - cpu.height);
      }

      function scorePoint(side) {
        if (side === 'player') {
          score.player += 1;
          updateHighScore();
          if (score.player >= WIN_SCORE) {
            winner = 'player';
            state = STATE.GAME_OVER;
            resetBall();
          } else {
            scheduleBallLaunch(-1);
          }
        } else {
          score.cpu += 1;
          if (score.cpu >= WIN_SCORE) {
            winner = 'cpu';
            state = STATE.GAME_OVER;
            resetBall();
          } else {
            scheduleBallLaunch(1);
          }
        }
        playScoreSound();
      }

      function updateBall(dt) {
        if (!ball.active) {
          if (reserveTimer > 0) {
            reserveTimer -= dt;
            if (reserveTimer <= 0) {
              launchBall(pendingServeDirection);
            }
          }
          return;
        }

        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        if (ball.y <= 0) {
          ball.y = 0;
          ball.vy *= -1;
          playWallSound();
        } else if (ball.y + ball.size >= HEIGHT) {
          ball.y = HEIGHT - ball.size;
          ball.vy *= -1;
          playWallSound();
        }

        const playerRect = player;
        const cpuRect = cpu;
        const ballRect = { x: ball.x, y: ball.y, width: ball.size, height: ball.size };

        if (ball.vx < 0 && aabbIntersect(ballRect, playerRect)) {
          ball.x = player.x + player.width;
          applyPaddleBounce(player, 1);
        } else if (ball.vx > 0 && aabbIntersect(ballRect, cpuRect)) {
          ball.x = cpu.x - ball.size;
          applyPaddleBounce(cpu, -1);
        }

        if (ball.x + ball.size < 0) {
          scorePoint('cpu');
        } else if (ball.x > WIDTH) {
          scorePoint('player');
        }
      }

      function update(dt) {
        if (state !== STATE.PLAYING) return;
        updatePlayer(dt);
        updateCpu(dt);
        updateBall(dt);
      }

      function drawCenterLine() {
        ctx.fillStyle = '#3A3A3A';
        for (let y = 0; y < HEIGHT; y += 26) {
          ctx.fillRect(398, y, 4, 16);
        }
      }

      function drawScores() {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(score.player), 300, 54);
        ctx.fillText(String(score.cpu), 500, 54);
      }

      function drawHighScore() {
        ctx.fillStyle = '#888888';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(`HIGH ${highScore}`, WIDTH / 2, 10);
      }

      function drawPaddle(paddle) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      }

      function drawBall() {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
      }

      function drawOverlayPanel() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
      }

      function drawStartScreen() {
        drawOverlayPanel();
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '64px monospace';
        ctx.fillText('PONG', WIDTH / 2, 210);
        ctx.font = '22px monospace';
        ctx.fillStyle = '#BBBBBB';
        ctx.fillText('Player vs CPU', WIDTH / 2, 280);
        ctx.font = '28px monospace';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText('Press Enter to Start', WIDTH / 2, 344);
        ctx.font = '16px monospace';
        ctx.fillStyle = '#999999';
        ctx.fillText('W / S or Arrow Keys to move   •   P to pause', WIDTH / 2, 390);
      }

      function drawPauseOverlay() {
        drawOverlayPanel();
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '56px monospace';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 16);
        ctx.font = '22px monospace';
        ctx.fillStyle = '#BBBBBB';
        ctx.fillText('Press P to continue', WIDTH / 2, HEIGHT / 2 + 42);
      }

      function drawGameOver() {
        drawOverlayPanel();
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '56px monospace';
        ctx.fillText(winner === 'player' ? 'YOU WIN' : 'GAME OVER', WIDTH / 2, 220);
        ctx.font = '28px monospace';
        ctx.fillStyle = '#CCCCCC';
        ctx.fillText(`Final Score ${score.player} - ${score.cpu}`, WIDTH / 2, 300);
        ctx.font = '26px monospace';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText('Press Enter to Restart', WIDTH / 2, 356);
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        drawCenterLine();
        drawScores();
        drawHighScore();
        drawPaddle(player);
        drawPaddle(cpu);
        if (ball.active || reserveTimer > 0 || state === STATE.GAME_OVER) {
          drawBall();
        }

        if (state === STATE.IDLE) {
          drawStartScreen();
        } else if (state === STATE.PAUSED) {
          drawPauseOverlay();
        } else if (state === STATE.GAME_OVER) {
          drawGameOver();
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.033, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      function handleEnter() {
        ensureAudio();
        if (state === STATE.IDLE || state === STATE.GAME_OVER) {
          startGame();
        }
      }

      function togglePause() {
        if (state === STATE.PLAYING) {
          state = STATE.PAUSED;
        } else if (state === STATE.PAUSED) {
          state = STATE.PLAYING;
        }
      }

      window.addEventListener('keydown', (event) => {
        if (['ArrowUp', 'ArrowDown', 'Space'].includes(event.key)) {
          event.preventDefault();
        }
        keys.add(event.code);
        if (event.code === 'Enter') {
          handleEnter();
        } else if (event.code === 'KeyP') {
          togglePause();
        }
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.code);
      });

      resetPaddles();
      resetBall();
      render();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
