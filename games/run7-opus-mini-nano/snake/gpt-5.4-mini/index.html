<!-- snake | spec:run7-opus-mini-nano | built-by:gpt-5.4-mini -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      background: #111111;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 600, GRID = 20, CELL = 30, PAD = 1, SIZE = 28;
  const colors = {
    bg: '#111111',
    grid: '#1A1A1A',
    head: '#4CAF50',
    body: '#388E3C',
    food: '#F44336',
    white: '#FFFFFF',
    overlay: '#000000CC',
    muted: '#AAAAAA'
  };

  const state = {
    mode: 'IDLE',
    snake: [],
    dir: {x: 1, y: 0},
    pendingDir: null,
    score: 0,
    best: Number(localStorage.getItem('snake_best') || 0),
    food: null,
    tickRate: 8,
    tickAccum: 0,
    lastTs: 0,
    audioCtx: null,
    gameOverReason: '',
    playedDeath: false
  };

  function resetGame() {
    state.snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    state.dir = {x:1,y:0};
    state.pendingDir = null;
    state.score = 0;
    state.tickRate = 8;
    state.tickAccum = 0;
    state.gameOverReason = '';
    state.playedDeath = false;
    spawnFood();
  }

  function startGame() {
    resetGame();
    state.mode = 'PLAYING';
  }

  function gameOver() {
    if (state.mode === 'GAME_OVER') return;
    state.mode = 'GAME_OVER';
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem('snake_best', String(state.best));
    }
    playDeath();
  }

  function playEat() {
    const ac = getAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = 880;
    g.gain.value = 0.05;
    o.connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.04);
  }

  function playDeath() {
    if (state.playedDeath) return;
    state.playedDeath = true;
    const ac = getAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(440, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.3);
    g.gain.value = 0.06;
    g.gain.setValueAtTime(0.06, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.3);
    o.connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.3);
  }

  function getAudio() {
    try {
      if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
      return state.audioCtx;
    } catch (e) { return null; }
  }

  function spawnFood() {
    const occupied = new Set(state.snake.map(s => `${s.x},${s.y}`));
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!occupied.has(`${x},${y}`)) free.push({x,y});
      }
    }
    if (!free.length) {
      state.food = null;
      if (state.mode === 'PLAYING') state.mode = 'GAME_OVER';
      return;
    }
    state.food = free[Math.floor(Math.random() * free.length)];
  }

  function setDir(nx, ny) {
    if (state.mode !== 'PLAYING') return;
    if (state.pendingDir) return;
    const cur = state.dir;
    if (cur.x === -nx && cur.y === -ny) return;
    state.pendingDir = {x:nx, y:ny};
  }

  function step() {
    if (state.pendingDir) {
      state.dir = state.pendingDir;
      state.pendingDir = null;
    }
    const head = state.snake[0];
    const next = {x: head.x + state.dir.x, y: head.y + state.dir.y};
    if (next.x < 0 || next.x >= GRID || next.y < 0 || next.y >= GRID) {
      state.gameOverReason = 'wall';
      gameOver();
      return;
    }
    const willEat = state.food && next.x === state.food.x && next.y === state.food.y;
    const bodyToCheck = willEat ? state.snake : state.snake.slice(0, -1);
    if (bodyToCheck.some(s => s.x === next.x && s.y === next.y)) {
      state.gameOverReason = 'self';
      gameOver();
      return;
    }
    state.snake.unshift(next);
    if (willEat) {
      state.score += 10;
      state.tickRate = Math.min(15, state.tickRate + 0.5);
      playEat();
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem('snake_best', String(state.best));
      }
      spawnFood();
    } else {
      state.snake.pop();
    }
  }

  function drawCell(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * CELL + PAD, y * CELL + PAD, SIZE, SIZE);
  }

  function renderGrid() {
    ctx.strokeStyle = colors.grid;
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      const p = i * CELL + 0.5;
      ctx.beginPath();
      ctx.moveTo(p, 0);
      ctx.lineTo(p, H);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, p);
      ctx.lineTo(W, p);
      ctx.stroke();
    }
  }

  function render() {
    ctx.fillStyle = colors.bg;
    ctx.fillRect(0, 0, W, H);
    renderGrid();

    if (state.mode === 'PLAYING' || state.mode === 'PAUSED' || state.mode === 'GAME_OVER') {
      if (state.food) drawCell(state.food.x, state.food.y, colors.food);
      state.snake.forEach((s, i) => drawCell(s.x, s.y, i === 0 ? colors.head : colors.body));
    }

    ctx.fillStyle = colors.white;
    ctx.font = '16px monospace';
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${state.score}`, 10, 24);
    ctx.textAlign = 'right';
    ctx.fillText(`Best: ${state.best}`, 590, 24);

    if (state.mode === 'IDLE') {
      overlay();
      ctx.fillStyle = colors.head;
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', 300, 240);
      ctx.fillStyle = colors.muted;
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', 300, 320);
    } else if (state.mode === 'PAUSED') {
      overlay();
      ctx.fillStyle = colors.white;
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', 300, 300);
    } else if (state.mode === 'GAME_OVER') {
      overlay();
      ctx.fillStyle = colors.white;
      ctx.font = '40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', 300, 260);
      ctx.font = '24px monospace';
      ctx.fillText(`Score: ${state.score}`, 300, 310);
      ctx.fillStyle = colors.muted;
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', 300, 360);
    }
  }

  function overlay() {
    ctx.fillStyle = colors.overlay;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(ts) {
    if (!state.lastTs) state.lastTs = ts;
    const dt = Math.min(0.05, (ts - state.lastTs) / 1000);
    state.lastTs = ts;
    if (state.mode === 'PLAYING') {
      state.tickAccum += dt;
      const tickInterval = 1 / state.tickRate;
      while (state.tickAccum >= tickInterval && state.mode === 'PLAYING') {
        state.tickAccum -= tickInterval;
        step();
      }
    }
    render();
    requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d','p','enter'].includes(k)) e.preventDefault();
    if (k === 'enter') {
      if (state.mode === 'IDLE' || state.mode === 'GAME_OVER') startGame();
      return;
    }
    if (k === 'p') {
      if (state.mode === 'PLAYING') state.mode = 'PAUSED';
      else if (state.mode === 'PAUSED') state.mode = 'PLAYING';
      return;
    }
    if (state.mode !== 'PLAYING') return;
    if (k === 'arrowup' || k === 'w') setDir(0, -1);
    else if (k === 'arrowdown' || k === 's') setDir(0, 1);
    else if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
    else if (k === 'arrowright' || k === 'd') setDir(1, 0);
  }, {passive:false});

  render();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
