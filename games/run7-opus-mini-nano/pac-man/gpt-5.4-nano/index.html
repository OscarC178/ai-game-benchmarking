      if (rr<0||rr>=GRID_ROWS||cc<0||cc>=GRID_COLS) continue;
      if (!isWalkable(rr,cc)) continue;
      if (maze[rr][cc]===4 && !isGhostHouseTile(rr,cc)) continue;
      // allow house tiles generally
      res.push({r:rr,c:cc, dx:d.dx, dy:d.dy});
    }
    return res;
  }

  function oppositeDir(d1,d2){ return d1 && d2 && d1.x===-d2.x && d1.y===-d2.y; }

  function chooseGhostDirection(g, targetTile){
    const t=tileFromPos(g.x,g.y);
    const neighbors = listNeighbors(t.r,t.c).filter(n=>{
      // don't reverse unless mode just changed: we handle by disallowing reverse always except if no other.
      if (g.dir && oppositeDir({x:n.dx,y:n.dy}, g.dir)) return false;
      // ghost cannot enter wall already ensured
      return true;
    });
    const options = neighbors.length? neighbors : listNeighbors(t.r,t.c); // if forced
    let bestOpt=null;
    let bestDist=Infinity;
    for (const opt of options){
      const center = tileCenter(opt.c,opt.r);
      const targetCenter = tileCenter(targetTile.c, targetTile.r);
      const dx=center.x-targetCenter.x;
      const dy=center.y-targetCenter.y;
      const dist = dx*dx+dy*dy;
      if (dist<bestDist){
        bestDist=dist; bestOpt=opt;
      }
    }
    return bestOpt ? {x:bestOpt.dx,y:bestOpt.dy} : g.dir;
  }

  function ghostTargetTile(g){
    const pacT = tileFromPos(pac.x,pac.y);
    const pDir = pac.dir || {x:0,y:-1};
    const ahead = (n) => ({ c: pacT.c + pDir.x*n, r: pacT.r + pDir.y*n });
    // clamp via walkable check by using fallback to pac tile
    const safeAhead = (n) => {
      const t=ahead(n);
      if (t.c<0||t.c>=GRID_COLS||t.r<0||t.r>=GRID_ROWS) return pacT;
      if (isWalkable(t.r,t.c)) return t;
      return pacT;
    };

    if (g.name === 'Blinky'){
      return {c: pacT.c, r: pacT.r};
    } else if (g.name === 'Pinky'){
      const t = safeAhead(4);
      // Original spec: 4 tiles ahead of Pac-Man facing direction.
      return t;
    } else if (g.name === 'Inky'){
      // vector from Blinky to 2 tiles ahead of Pac-Man, doubled
      const bl = ghosts[0];
      const blT = tileFromPos(bl.x, bl.y);
      const t2 = safeAhead(2);
      const vc = t2.c - blT.c;
      const vr = t2.r - blT.r;
      const target = {c: blT.c + vc*2, r: blT.r + vr*2};
      if (target.c<0||target.c>=GRID_COLS||target.r<0||target.r>=GRID_ROWS) return pacT;
      if (!isWalkable(target.r,target.c)) return pacT;
      return target;
    } else { // Clyde
      const dx = pacT.c - tileFromPos(g.x,g.y).c;
      const dy = pacT.r - tileFromPos(g.x,g.y).r;
      const distTiles = Math.sqrt(dx*dx+dy*dy);
      if (distTiles > 8) return {c: pacT.c, r: pacT.r};
      return g.scatterCorner;
    }
  }

  function randomAtIntersection(g){
    const t=tileFromPos(g.x,g.y);
    const nbs=listNeighbors(t.r,t.c);
    // frightened ghosts reverse immediately on entry; then choose randomly without reverse unless forced
    const options = nbs.filter(n => !oppositeDir({x:n.dx,y:n.dy}, g.dir));
    const pool = options.length?options:nbs;
    const pick = pool[Math.floor(Math.random()*pool.length)];
    return {x: pick.dx, y: pick.dy};
  }

  // Eaten ghosts / eyes returning
  function respawnGhost(g){
    // Return to ghost house entrance area then respawn when reaching house tile
    g.eyes=true;
    g.state='eaten';
  }

  let dotsTotal = 0, dotsEaten = 0;
  function resetDotsAndEntities({keepLevel=false}={}){
    maze = cloneGrid(baseGrid);
    dotsEaten = 0;
    dotsTotal = 0;
    for (let r=0;r<GRID_ROWS;r++){
      for (let c=0;c<GRID_COLS;c++){
        if (maze[r][c]===2 || maze[r][c]===3) dotsTotal++;
      }
    }
    // Fruit
    fruit.active = false;
    fruit.t=0;
    fruit.visible=false;

    setPacToStart();
    ghostSpawnPositions();

    // Release order
    for (const g of ghosts){
      g.active = (g.releaseAtDots===0 && g.name==='Blinky') || g.releaseAtDots===0 && g.name==='Pinky';
      if (g.name==='Blinky') g.active=true;
      else g.active = (g.releaseAtDots===0);
      g.eyes=false;
      g.frightenedFlashPhase=0;
      g.state='normal';
      g.dir = g.dir || {x:1,y:0};
      g.speedScale = 1;
    }
    ghosts[0].active = true;
    ghosts[1].active = true; // Pinky release immediately per spec
    ghosts[2].active = false;
    ghosts[3].active = false;
  }

  const fruit = {
    active:false, visible:false, points:100,
    x:0,y:0, c:14,r:17,
    t:0, appearAt: {dots:[70,170]}, lastAppeared:false
  };

  // --- Ghost frightened mode timer and flashing ---
  function enterFrightened(seconds){
    fright.active=true;
    fright.t=seconds;
    frightenedStartTime = performance.now();
    eatenCascade=0;
    // reverse direction immediately
    for (const g of ghosts){
      if (!g.active) continue;
      if (g.state==='eaten') continue;
      g.state='frightened';
      g.dir = {x:-g.dir.x, y:-g.dir.y};
      g.eyes=false;
    }
  }

  function leaveFrightened(){
    fright.active=false;
    for (const g of ghosts){
      if (!g.active) continue;
      if (g.state==='eaten') continue;
      if (g.state==='frightened') g.state='normal';
    }
  }

  // --- Death / respawn ---
  let death = { active:false, t:0, dir:0, dead: false, duration:1.0, respawnDelay:1.5 };
  function startDeath(){
    death.active=true;
    death.t=0;
    death.dead=true;
    pac.alive=false;
    // shrink animation while in death
    for (const g of ghosts){
      // freeze ghosts during death
    }
  }

  function finishDeath(){
    death.active=false;
    death.dead=false;
    lives--;
    if (lives<=0){
      state=GameState.GAME_OVER;
      return;
    }
    // reset positions and frightened reset
    fright.active=false;
    eatenCascade=0;
    pac.alive=true;
    setPacToStart();
    ghostSpawnPositions();
    // Release order resets
    for (const g of ghosts){
      g.eyes=false;
      g.state='normal';
      if (g.name==='Blinky') g.active=true;
      else if (g.name==='Pinky') g.active=true;
      else g.active=false;
    }
  }

  // --- Mode cycling logic ---
  function resetModeCycle(){
    modeIndex=0;
    mode = MODE_SCHEDULE[modeIndex].name;
    ghostModeTimer = MODE_SCHEDULE[modeIndex].time * (1/ (level===0?1:1)); // base seconds
    // We'll just store seconds remaining in update.
  }
  function applyModeStepIfNeeded(){
    // If frightened, don't advance timers; after leaving, resume.
    if (fright.active) return;
    const cur = MODE_SCHEDULE[modeIndex];
    if (ghostModeTimer<=0){
      modeIndex++;
      if (modeIndex>=MODE_SCHEDULE.length) modeIndex=MODE_SCHEDULE.length-1;
      mode = MODE_SCHEDULE[modeIndex].name;
      ghostModeTimer = MODE_SCHEDULE[modeIndex].time;
    }
  }

  // --- Movement utilities ---
  function speedForGhost(g){
    if (g.state==='eaten') return EYES_SPEED * speedLevelFactor();
    if (fright.active && g.state!=='eaten'){
      return FRIGHT_SPEED * speedLevelFactor();
    }
    return GHOST_SPEED_BASE * speedLevelFactor();
  }
  function speedLevelFactor(){
    // Next level ghosts move 5% faster, frightened time decreases -2s (min 2s).
    return 1 + (level-1)*0.05;
  }
  function frightenedDurationForLevel(){
    const base=8;
    const dec = (level-1)*2;
    return Math.max(2, base - dec);
  }

  function pacAttemptTurn(newDir){
    // Cornering assist: allow queue input and only apply when near intersection center and the next tile is walkable.
    if (!newDir || (newDir.x===0&&newDir.y===0)) return;
    pac.nextDir = {x:newDir.x, y:newDir.y};
  }

  function pacStep(dt){
    if (!pac.alive) return;

    // Apply queued direction when within tolerance and valid turn is available.
    const t = tileFromPos(pac.x,pac.y);
    const center = tileCenter(t.c,t.r);
    const distToCenter = Math.hypot(pac.x-center.x, pac.y-center.y);
    const near = distToCenter <= TURN_TOL+2;

    // Determine potential move for current dir
    const tryDir = pac.nextDir;
    if (near){
      const targetR = t.r + tryDir.y;
      const targetC = t.c + tryDir.x;
      if (!isWallTile(targetR,targetC) && isWalkable(targetR,targetC)){
        pac.dir = {x:tryDir.x,y:tryDir.y};
      }
    }

    // Move in pac.dir; if wall ahead stop.
    const v = pac.dir;
    const spd = pac.speed * (isTunnelTile(pac)?0.6:1);
    const step = spd*dt;

    // tunnel slow
    const t0=tileFromPos(pac.x,pac.y);
    let slow=1;
    if (t0.r===TUNNEL_ROW && (t0.c<=3 || t0.c>=24)) slow=0.6;

    // stop if wall
    const next = { x: pac.x + v.x*step, y: pac.y + v.y*step };
    // Validate by checking if path between centers crosses wall: simplest tile check at the destination tile
    const destT = tileFromPos(next.x,next.y);
    if (v.x===0 && v.y===0){ return; }
    if (isWallTile(destT.r, destT.c) || !isWalkable(destT.r,destT.c)){
      // snap to center if near
      const c2 = tileCenter(t0.c,t0.r);
      pac.x = c2.x; pac.y=c2.y;
      return;
    }
    pac.x=next.x; pac.y=next.y;

    // Wrap tunnel
    const before = tileFromPos(pac.x,pac.y);
    if (before.r===TUNNEL_ROW){
      if (before.c < 0){ pac.x = tileCenter(TUNNEL_RIGHT_C, TUNNEL_ROW).x; }
      if (before.c > GRID_COLS-1){ pac.x = tileCenter(TUNNEL_LEFT_C, TUNNEL_ROW).x; }
    }
  }

  function isTunnelTile(obj){
    const t=tileFromPos(obj.x,obj.y);
    return t.r===TUNNEL_ROW && (t.c<=3 || t.c>=24);
  }

  function ghostStep(dt, g){
    if (!g.active) return;

    // Eyes-only returning to house: head to gate tile or house center and re-enable
    if (g.state==='eaten'){
      // Move toward ghost house center (use gate target)
      const t=tileFromPos(g.x,g.y);
      const target = {c:14,r:14}; // center box area
      // direction chosen at intersections
      if (nearTileCenter(g)){
        const desiredDir = chooseGhostDirection(g, target);
        if (desiredDir) g.dir=desiredDir;
      }
      // move
      const slow = (t.r===TUNNEL_ROW && (t.c<=3||t.c>=24))?0.6:1;
      const step = speedForGhost(g)*dt*slow;
      g.x += g.dir.x*step;
      g.y += g.dir.y*step;

      // snap if close to tile center
      const tt=tileFromPos(g.x,g.y);
      const center=tileCenter(tt.c,tt.r);
      if (nearTileCenter(g)) { g.x=center.x; g.y=center.y; }

      // if reached house tile, respawn normal
      if (isGhostHouseTile(tt.r,tt.c)){
        g.state='normal';
        g.eyes=false;
        g.dir = {x:1,y:0};
      }
      return;
    }

    if (fright.active && g.state!=='frightened'){
      // ensure frightened state
    }

    // Determine desired dir at intersections / near tile center
    const t = tileFromPos(g.x,g.y);
    const near = nearTileCenter(g, TURN_TOL+1);

    if (near){
      // If frightened: random at intersections
      if (fright.active){
        if (g.state!=='frightened') g.state='frightened';
        g.dir = randomAtIntersection(g);
      } else {
        if (g.state==='frightened') g.state='normal';
        // Choose based on mode
        const target = (mode==='scatter') ? g.scatterCorner : ghostTargetTile(g);
        g.dir = chooseGhostDirection(g, target);
      }

      // Ensure not entering wall: if chosen dir hits wall, fallback by finding available non-wall neighbor.
      const nextR = t.r + g.dir.y;
      const nextC = t.c + g.dir.x;
      if (isWallTile(nextR,nextC) || !isWalkable(nextR,nextC)){
        const nbs = listNeighbors(t.r,t.c).filter(n => !(oppositeDir({x:n.dx,y:n.dy}, g.dir)));
        if (nbs.length){
          g.dir = {x:nbs[0].dx, y:nbs[0].dy};
        }
      }

      // Snap to center
      const c2 = tileCenter(t.c,t.r);
      g.x=c2.x; g.y=c2.y;
    }

    const slow = (t.r===TUNNEL_ROW && (t.c<=3||t.c>=24))?0.6:1;
    const step = speedForGhost(g)*dt*slow;
    g.x += g.dir.x*step;
    g.y += g.dir.y*step;

    // Wrap tunnel for ghosts
    if (t.r===TUNNEL_ROW){
      const tt=tileFromPos(g.x,g.y);
      if (tt.c < 0) g.x = tileCenter(TUNNEL_RIGHT_C, TUNNEL_ROW).x;
      if (tt.c > GRID_COLS-1) g.x = tileCenter(TUNNEL_LEFT_C, TUNNEL_ROW).x;
    }
  }

  // --- Collisions ---
  function checkDotEating(){
    const t=tileFromPos(pac.x,pac.y);
    if (t.c<0||t.c>=GRID_COLS||t.r<0||t.r>=GRID_ROWS) return;
    if (maze[t.r][t.c]===2){
      maze[t.r][t.c]=0;
      score += 10;
      dotsEaten++;
      wakaTimer=0;
      // release ghosts by dots eaten thresholds for those not active
      releaseGhostsByDots();
      maybeSpawnFruit();
      maybeExtraLife();
    } else if (maze[t.r][t.c]===3){
      maze[t.r][t.c]=0;
      score += 50;
      dotsEaten++;
      // frightened for duration by level
      enterFrightened(frightenedDurationForLevel());
      wakaTimer=0;
      releaseGhostsByDots();
      maybeSpawnFruit();
      maybeExtraLife();
    }
    if (dotsEaten>=240+4){ // target
      // win level
      nextLevel();
    }
  }

  function maybeExtraLife(){
    if (score>=10000 && !extraLifeAwarded && state===GameState.PLAYING){
      lives++;
      extraLifeAwarded=true;
    }
  }
  let extraLifeAwarded=false;

  function releaseGhostsByDots(){
    // spec: Pinky after 0 dots, Inky after 30, Clyde after 60.
    for (const g of ghosts){
      if (g.active) continue;
      if (g.name==='Inky' && dotsEaten>=30) g.active=true;
      if (g.name==='Clyde' && dotsEaten>=60) g.active=true;
      if (g.name==='Pinky' && dotsEaten>=0) g.active=true;
    }
  }

  function maybeSpawnFruit(){
    if (fruit.visible || fruit.active) return;
    const levels = [70,170];
    for (const at of levels){
      if (dotsEaten>=at && dotsEaten-at<1){ // when just crossed
        fruit.visible=true;
        fruit.active=true;
        fruit.t=10;
        fruit.x = tileCenter(fruit.c, fruit.r).x;
        fruit.y = tileCenter(fruit.c, fruit.r).y;
        break;
      }
    }
    // To ensure it triggers exactly at thresholds, we check via last fruit trigger:
    if (!fruit.lastAppeared && (dotsEaten===70 || dotsEaten===170)){
      fruit.visible=true; fruit.active=true; fruit.t=10;
      fruit.x=tileCenter(fruit.c,fruit.r).x; fruit.y=tileCenter(fruit.c,fruit.r).y;
      fruit.lastAppeared=dotsEaten;
    }
    // Handle second spawn
    if (fruit.lastAppeared!==170 && dotsEaten===170){
      fruit.visible=true; fruit.active=true; fruit.t=10;
      fruit.x=tileCenter(fruit.c,fruit.r).x; fruit.y=tileCenter(fruit.c,fruit.r).y;
      fruit.lastAppeared=170;
    }
  }

  function nextLevel(){
    level++;
    // update speeds already computed from level factor in movement
    // fright duration decreases by -2s
    // reset maze dots
    state = GameState.READY;
    extraLifeAwarded=false;
    // reset mode cycle
    resetModeCycle();
    // reset frightened
    fright.active=false;
    eatenCascade=0;
    // reset fruit trigger
    fruit.visible=false; fruit.active=false; fruit.lastAppeared=false;

    // rebuild dots/maze (need all dots reset)
    maze = cloneGrid(baseGrid);
    dotsEaten=0;
    dotsTotal=0;
    for (let r=0;r<GRID_ROWS;r++) for (let c=0;c<GRID_COLS;c++) if (maze[r][c]===2||maze[r][c]===3) dotsTotal++;
    // Entities
    setPacToStart();
    ghostSpawnPositions();
    for (const g of ghosts){
      g.active = (g.name==='Blinky'||g.name==='Pinky');
      g.state='normal';
      g.eyes=false;
      // start dir
      if (g.name==='Blinky') g.dir={x:1,y:0};
      if (g.name==='Pinky') g.dir={x:1,y:0};
      if (g.name==='Inky') g.dir={x:0,y:1};
      if (g.name==='Clyde') g.dir={x:0,y:1};
    }
    // Ready text 2 seconds
    readyTimer=2.0;
    // Ghost mode cycle timer resets
    resetModeCycle();
  }

  let readyTimer = 0;

  function checkFruit(){
    if (!fruit.active || !fruit.visible) return;
    // collision with pac tile (center distance small)
    const t=tileFromPos(pac.x,pac.y);
    if (t.c===fruit.c && t.r===fruit.r){
      fruit.visible=false; fruit.active=false;
      score += fruit.points;
    }
  }

  function updateFruit(dt){
    if (!fruit.active || !fruit.visible) return;
    fruit.t -= dt;
    if (fruit.t<=0){
      fruit.visible=false; fruit.active=false;
    }
  }

  let lastCollisionGhostIndex = new Set();

  function checkGhostCollision(){
    // Tile-based collision per spec: same tile
    const pt=tileFromPos(pac.x,pac.y);
    for (let i=0;i<ghosts.length;i++){
      const g=ghosts[i];
      if (!g.active) continue;
      const gt=tileFromPos(g.x,g.y);
      if (gt.c===pt.c && gt.r===pt.r){
        if (g.state==='eaten') continue;
        if (fright.active && g.state==='frightened'){
          // eat ghost
          if (lastCollisionGhostIndex.has(i)) continue;
          lastCollisionGhostIndex.add(i);
          // Only frightened ghosts can be eaten
          g.state='eaten';
          g.eyes=true;
          const seq=[200,400,800,1600];
          const pts = seq[Math.min(eatenCascade,3)];
          score += pts;
          eatenCascade = Math.min(eatenCascade+1,3);
          // reset collision token after a bit so pac can hit again after respawn
          // We'll clear when ghost leaves tile or mode changes.
        } else if (!fright.active){
          // death
          if (!death.active){
            startDeath();
          }
        } else {
          // If frightened active but ghost not in frightened state (edge), still treat as eat if it is frightened color
          if (g.state==='normal' && fright.active){
            g.state='frightened';
          }
          if (g.state==='frightened'){
            if (lastCollisionGhostIndex.has(i)) continue;
            lastCollisionGhostIndex.add(i);
            g.state='eaten'; g.eyes=true;
            const seq=[200,400,800,1600];
            const pts = seq[Math.min(eatenCascade,3)];
            score += pts;
            eatenCascade = Math.min(eatenCascade+1,3);
          } else if (g.state!=='frightened'){
            if (!death.active) startDeath();
          }
        }
      } else {
        lastCollisionGhostIndex.delete(i);
      }
    }
  }

  // --- Drawing ---
  function drawMaze(){
    // Background already black.
    // Draw walls as 2px #2121DE on borders facing path.
    const wallColor = '#2121DE';
    ctx.strokeStyle = wallColor;
    ctx.lineWidth = 2;
    ctx.lineCap = 'square';

    // We'll draw per wall tile the edges on sides where neighbor is not wall.
    for (let r=0;r<GRID_ROWS;r++){
      for (let c=0;c<GRID_COLS;c++){
        if (maze[r][c]!==1) continue;
        const x0 = mazeOffset.x + c*CELL;
        const y0 = mazeOffset.y + r*CELL;

        // right edge
        if (!isWallTile(r, c+1)){
          ctx.beginPath();
          ctx.moveTo(x0+CELL, y0);
          ctx.lineTo(x0+CELL, y0+CELL);
          ctx.stroke();
        }
        // left
        if (!isWallTile(r, c-1)){
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x0, y0+CELL);
          ctx.stroke();
        }
        // bottom
        if (!isWallTile(r+1, c)){
          ctx.beginPath();
          ctx.moveTo(x0, y0+CELL);
          ctx.lineTo(x0+CELL, y0+CELL);
          ctx.stroke();
        }
        // top
        if (!isWallTile(r-1, c)){
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x0+CELL, y0);
          ctx.stroke();
        }
      }
    }

    // Gate bar at row12 cols13-14 in house top-center
    ctx.fillStyle = '#FFB8FF';
    const gx0 = mazeOffset.x + GATE.c0*CELL;
    const gy0 = mazeOffset.y + GATE.r*CELL;
    ctx.fillRect(gx0 + CELL*0.35, gy0 + 0.1, CELL*1.3, 6);

    // Tunnel visual (optional none)
  }

  function drawDots(){
    // small dots and power pellets
    for (let r=0;r<GRID_ROWS;r++){
      for (let c=0;c<GRID_COLS;c++){
        const v=maze[r][c];
        if (v===2){
          const {x,y}=tileCenter(c,r);
          ctx.fillStyle='#FFCC99';
          ctx.beginPath();
          ctx.arc(x,y,2,0,Math.PI*2);
          ctx.fill();
        } else if (v===3){
          const {x,y}=tileCenter(c,r);
          const blink = Math.floor(performance.now()/250)%2===0;
          const radius = 5 + (blink?0:0.8);
          ctx.fillStyle='#FFCC99';
          ctx.beginPath();
          ctx.arc(x,y,radius,0,Math.PI*2);
          ctx.fill();
        }
      }
    }
    // Fruit
    if (fruit.active && fruit.visible){
      ctx.fillStyle='#FF0000';
      ctx.beginPath();
      ctx.arc(fruit.x, fruit.y, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#700000';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(fruit.x, fruit.y-10);
      ctx.lineTo(fruit.x+4, fruit.y-16);
      ctx.moveTo(fruit.x, fruit.y-10);
      ctx.lineTo(fruit.x-4, fruit.y-16);
      ctx.stroke();
    }
  }

  function drawPac(){
    const t=tileFromPos(pac.x,pac.y);
    if (!pac.alive && death.active){
      // shrink animation
    }
    const shrink = (!pac.alive && death.active) ? (1 - Math.min(1, death.t/death.duration)*0.7) : 1;
    const radius = pac.radius * shrink;
    const dir = pac.dir.x!==0||pac.dir.y!==0 ? pac.dir : {x:1,y:0};

    // animated mouth at 10Hz: opening/closing wedge 45° per frame
    pac.mouthPhase += (1/60);
    const open = Math.sin(performance.now()*0.01*2*Math.PI*10) > 0 ? 1 : 0; // approx 10Hz toggle
    const mouthAngle = (open ? Math.PI/4 : Math.PI/8);

    // facing angle
    let ang=0;
    if (dir.x===1) ang=0;
    else if (dir.x===-1) ang=Math.PI;
    else if (dir.y===-1) ang=-Math.PI/2;
    else if (dir.y===1) ang=Math.PI/2;

    ctx.fillStyle='#FFFF00';

    // draw pac circle with wedge cut
    ctx.beginPath();
    ctx.moveTo(pac.x, pac.y);
    ctx.arc(pac.x, pac.y, radius, ang+mouthAngle, ang+(Math.PI*2 - mouthAngle), false);
    ctx.closePath();
    ctx.fill();

    // small outline for contrast
    ctx.strokeStyle='rgba(255,255,0,0.4)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(pac.x,pac.y,radius,0,Math.PI*2);
    ctx.stroke();
  }

  function drawGhost(g, index){
    if (!g.active) return;

    const t=tileFromPos(g.x,g.y);
    const x=g.x, y=g.y;

    // Determine color and frightened flash
    let bodyColor = g.color;
    let frightFlashOn = false;

    const flashPhaseActive = fright.active && fright.t>0;
    if (flashPhaseActive){
      const last2 = fright.t <= 2.0;
      if (last2){
        // flash white/blue alternating at 4Hz
        const hz=4;
        const on = Math.floor((frightenedStartTime? (performance.now()-frightenedStartTime)/1000:0)*hz)%2===0;
        frightFlashOn = on;
        bodyColor = frightFlashOn ? '#FFFFFF' : '#2121FF';
      } else {
        if (g.state==='frightened') bodyColor='#2121FF';
      }
    }
    if (g.state==='eaten') bodyColor='#FFFFFF';

    // Ghost body 20x20 semicircle top + wavy bottom with 3 bumps
    // We'll draw relative to 20px size
    const s=10; // radius for shape
    const left=x-10, top=y-10;
    const w=20, h=20;

    // Body
    ctx.fillStyle=bodyColor;
    ctx.beginPath();
    // top semicircle
    ctx.moveTo(left+1, y);
    ctx.arc(x, y-8, 9, Math.PI, 0, false);
    // wavy bottom: 3 bumps -> 4 segments sin
    ctx.lineTo(left, y);
    const waveY = y+8;
    ctx.moveTo(left, y);
    ctx.lineTo(left+4, y+3);
    ctx.quadraticCurveTo(left+7, y+10, left+10, y+6);
    ctx.quadraticCurveTo(left+13, y+10, left+16, y+3);
    ctx.lineTo(left+20-4, y);
    ctx.closePath();
    // Use a simpler wave that looks consistent:
    ctx.beginPath();
    ctx.moveTo(left, y-1);
    ctx.arc(x, top+2, 9, Math.PI, 0, false);
    ctx.lineTo(left, y+2);
    // bottom waves
    ctx.quadraticCurveTo(left+4, y+11, x, y+5);
    ctx.quadraticCurveTo(x+4, y+11, left+20, y+2);
    ctx.lineTo(left+20, y-1);
    ctx.closePath();
    ctx.fill();

    // Eyes
    const eyeOffsetX = 4;
    const eyeOffsetY = -1;
    const pupilR = 2.3;

    // Default eye direction based on movement dir
    let dir = g.dir;
    if (g.state==='eaten') dir={x:0,y:-1};
    const dx = dir.x, dy = dir.y;
    const pdx = dx*3, pdy = dy*3;

    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(x-eyeOffsetX, y+eyeOffsetY, 3.2, 0, Math.PI*2);
    ctx.arc(x+eyeOffsetX, y+eyeOffsetY, 3.2, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#0000FF';
    // frightened eyes when flashing?
    if (g.state==='eaten') ctx.fillStyle='#0000FF';
    else ctx.fillStyle='#0055FF';

    const pupilColor = g.state==='eaten' ? '#0000FF' : (g.state==='frightened' ? '#0055FF' : '#0055FF');
    ctx.fillStyle = pupilColor;

    ctx.beginPath();
    ctx.arc(x-eyeOffsetX + pdx, y+eyeOffsetY + pdy, pupilR, 0, Math.PI*2);
    ctx.arc(x+eyeOffsetX + pdx, y+eyeOffsetY + pdy, pupilR, 0, Math.PI*2);
    ctx.fill();

    // Outline for clarity
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(left+1, y-1);
    ctx.arc(x, top+2, 9, Math.PI, 0, false);
    ctx.stroke();
  }
