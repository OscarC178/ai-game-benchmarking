<canvas id="game" width="600" height="700"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');

    whiteTruck:'#CCCCCC', pink:'#FF66AA', log:'#885522', longLog:'#774411', turtle:'#448844', hud:'#AAAAAA'

  const state = { mode:'IDLE', score:0, best: +(localStorage.getItem('frogger_best')||0), lives:3, level:1, bays:[0,0,0,0,0], maxRow:12, paused:false, messageTimer:0 };

  const keysDown = new Set(), moveQueue = [];
  let last = performance.now(), timeLeft = 30;
  function randSeed(i){ return Math.sin(i*999.13)*10000 % 1; }
  function laneY(row){ return row*40; }
  function makeVehicles() {

  function buildLine(w,h,count,offset){
    const arr=[];
    for(let i=0;i<count;i++) arr.push({x: offset + i*h});

  let vehicles = makeVehicles(), platforms = makePlatforms();
  function resetFrog(){ frog.x=START_X; frog.y=START_Y; frog.fromX=START_X; frog.fromY=START_Y; frog.toX=START_X; frog.toY=START_Y; frog.hopT=0; frog.riding=null; frog.alive=true; frog.home=false; frog.laneRow=12; }
  function startGame(restart=false){
    if(restart){ state.score=0; state.lives=3; state.level=1; state.bays=[0,0,0,0,0]; timeLeft=30; }
    state.mode='PLAYING'; state.paused=false; state.messageTimer=0; vehicles=makeVehicles(); platforms=makePlatforms(); resetFrog(); state.maxRow=12;
  }
  function gameOver(){ state.mode='GAME_OVER'; localStorage.setItem('frogger_best', String(Math.max(state.best, state.score))); state.best = Math.max(state.best, state.score); }
  function kill(type){
    if(state.mode!=='PLAYING' || frog.deathT>0) return;
    frog.deathType=type; frog.deathT=0.5; frog.alive=false; frog.riding=null; frog.flash=0;

  function fillBay(i){
    if(state.bays[i]) return false;
    state.bays[i]=1;

    if(state.score > state.best){ state.best = state.score; localStorage.setItem('frogger_best', String(state.best)); }

    return true;
  }
  function hop(dx,dy){
    if(state.mode!=='PLAYING' || frog.hopT>0 || frog.deathT>0) return;
    frog.fromX=frog.x; frog.fromY=frog.y; frog.toX=Math.max(0, Math.min(W-40, frog.x + dx*CELL)); frog.toY=Math.max(40, Math.min(520, frog.y + dy*CELL));

    if(dy<0 && frog.y>40) state.score += 10;
    frog.laneRow = Math.round(frog.toY / 40);
    if(frog.laneRow < state.maxRow && frog.laneRow <= 12){ state.maxRow = frog.laneRow; }
    state.score += (dy<0 ? 10 : 0);
  }
  function aabb(ax,ay,aw,ah,bx,by,bw,bh){ return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by; }
  function frogRect(){ return {x:frog.x+4,y:frog.y+4,w:32,h:32}; }
  function update(dt){
    if(state.mode==='PAUSED' || state.mode==='IDLE' || state.mode==='GAME_OVER') return;
    if(frog.deathT>0){
      frog.deathT -= dt;
      frog.flash = Math.floor((0.5 - frog.deathT) * 6) % 2;

        if(state.lives>0){ resetFrog(); timeLeft=30; }
        else { gameOver(); }

      return;
    }
    timeLeft -= dt;
    if(timeLeft<=0){ timeLeft=0; kill('time'); return; }
    if(frog.hopT>0){
      frog.hopT -= dt;
      const t = 1 - Math.max(0, frog.hopT)/0.08;
      frog.x = frog.fromX + (frog.toX-frog.fromX)*t;
      frog.y = frog.fromY + (frog.toY-frog.fromY)*t - Math.sin(t*Math.PI)*6;

    }
    vehicles.forEach(v => v.objs.forEach(o => { o.x += v.dir * v.speed * dt; wrapObject(o, v.w); }));
    platforms.forEach(p => { p.objs.forEach(o => { o.x += p.dir * p.speed * dt; wrapObject(o, p.w); }); });
    if(frog.hopT<=0) applyEnvironment(dt);
  }
  function wrapObject(o, w){
    if(o.x > W + 20) o.x = -w;
    if(o.x + w < -20) o.x = W;
  }
  function postHop(){
    const row = Math.round(frog.y / 40);
    frog.laneRow = row;
    if(row === 1){
      const baysX=[20,140,260,380,500];
      const idx = baysX.findIndex(x => frog.x+16 >= x && frog.x+16 <= x+48);
      if(idx>=0){
        if(state.bays[idx]) kill('filled-bay'); else { fillBay(idx); resetFrog(); timeLeft=30; return; }
      } else { kill('gap'); return; }
    }
    if(row >= 8 && row <= 12){
      for(const v of vehicles){ if(v.row===row){ for(const o of v.objs){ if(aabb(frog.x+4,frog.y+4,32,32,o.x,frog.y, v.w, v.h)){ kill('car'); return; } } } }
    }
    if(row >= 2 && row <= 6){
      let on=false, ride=0;
      for(const p of platforms){
        if(p.row!==row) continue;

          const visible = !(p.type==='turtle' && p.divers && isTurtleHidden(p, i));
          if(!visible) continue;
          const fx = frog.x+16, fy = frog.y+16;
          if(fx >= o.x && fx <= o.x + p.w && fy >= o.y && fy <= o.y + p.h){ on=true; ride = p.dir * p.speed; frog.riding = {lane:p, obj:o}; break; }
        }
        if(on) break;
      }
      if(!on){ kill('water'); return; }
    }
  }
  function isTurtleHidden(p, idx){
    const t = (performance.now()/1000) % 6;
    const phase = t;
    if(idx % (p.groupSize===3 ? 3 : 2) !== 0) return false;
    return (phase >= 3 && phase < 5);
  }
  function applyEnvironment(dt){
    const row = Math.round(frog.y/40);
    if(row >= 2 && row <= 6){
      let rideDx = 0, onPlat = false;
      for(const p of platforms){
        if(p.row!==row) continue;

          const o=p.objs[i];
          const hidden = p.type==='turtle' && p.divers && isTurtleHidden(p, i);
          if(hidden) continue;
          const fx = frog.x+16, fy = frog.y+16;
          if(fx >= o.x && fx <= o.x + p.w && fy >= o.y && fy <= o.y + p.h){
            onPlat = true; rideDx = p.dir * p.speed * dt; break;

        if(onPlat) break;

      if(onPlat){
        frog.x += rideDx;

      } else if(frog.deathT<=0) {
        kill('water');

      for(const v of vehicles){
        if(v.row!==row) continue;

  function drawText(txt,x,y,size,color,align='left'){
    ctx.fillStyle=color; ctx.font=`${size}px monospace`; ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillText(txt,x,y);
  }
  function drawFrog(x,y,flash=false,mini=false,filled=false){
    const s = mini ? 18 : 32;

    ctx.fillStyle = '#000';

  function roundRect(c,x,y,w,h,r){ c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); }
  function drawObj(o,w,h,color){ ctx.fillStyle=color; ctx.fillRect(o.x,o.y,w,h); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = colors.black; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = colors.bayEmpty; ctx.fillRect(0,40,W,40);

    const pct = Math.max(0, timeLeft/30);
    const remW = barW * pct;
    const c = pct > 0.5 ? '#22CC22' : pct > 0.25 ? '#CCCC00' : '#DD2222';
    ctx.fillStyle='#222'; ctx.fillRect(barX,barY,barW,barH);
    ctx.fillStyle=c; ctx.fillRect(barX + (barW - remW), barY, remW, barH);

      overlay();
      ctx.fillStyle='#22CC22'; ctx.font='52px monospace'; ctx.textAlign='center'; ctx.fillText('FROGGER',300,300);
      drawFrog(284,320,false,true);
      ctx.fillStyle='#AAAAAA'; ctx.font='20px monospace'; ctx.fillText('Press Enter to Start',300,380);
    } else if(state.mode==='PAUSED'){
      overlay();
      ctx.fillStyle='#fff'; ctx.font='36px monospace'; ctx.textAlign='center'; ctx.fillText('PAUSED',300,350);
    } else if(state.mode==='GAME_OVER'){
      overlay();
      ctx.fillStyle='#fff'; ctx.font='40px monospace'; ctx.textAlign='center'; ctx.fillText('GAME OVER',300,320);
      ctx.font='20px monospace'; ctx.fillText(`Score: ${state.score}`,300,360);

  function overlay(){ ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H); }
  function step(ts){
    const dt = Math.min(0.033, (ts-last)/1000 || 0); last=ts;

  window.addEventListener('keydown', e => {
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)) e.preventDefault();

    if(e.key==='Enter'){ if(state.mode==='IDLE' || state.mode==='GAME_OVER') startGame(state.mode==='GAME_OVER'); return; }

    else if(e.key==='ArrowDown' || e.key==='s' || e.key==='S') hop(0,1);
