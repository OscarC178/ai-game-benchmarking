  function findSupportPlatform(x,yFeet){

  function ladderAtMario(){

  function drawPopups(dt){
    textPopups = textPopups.filter(p=>{ p.life -= dt; return p.life>0; });

      ctx.font='16px monospace';
      ctx.fillText(p.text,p.x,p.y - (0.5-p.life)*30);

  function loop(now){

    ctx.clearRect(0,0,W,H);

      state.levelClearTimer -= dt;
      if(state.levelClearTimer <= 0){
