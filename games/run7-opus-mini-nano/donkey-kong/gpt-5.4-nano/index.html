<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Donkey Kong</title>
  <style>
    html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
    .wrap{
      width:700px; height:800px;
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      background:#000;
    }
    canvas{ display:block; width:700px; height:800px; image-rendering:pixelated; image-rendering:crisp-edges; }
    .hint{ position:absolute; left:0; top:0; color:#999; font:12px monospace; padding:6px; }
  </style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="700" height="800"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const W = canvas.width, H = canvas.height;

  // --- Utilities ---
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  // AABB collision
  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function segYAtX(seg, x) {
    const t = (x - seg.x1) / (seg.x2 - seg.x1);
    return seg.y1 + t * (seg.y2 - seg.y1);
  }

  function segXAtCenter(seg) {
    return (seg.x1 + seg.x2) * 0.5;
  }

  function normalizeSeg(seg) {
    if (seg.x2 === seg.x1) return seg;
    return seg;
  }

  // Segment hit / containment:
  // We'll use x-range check and "above platform" adjustment by computing y at x.
  // Mario and barrels will be placed in a discrete platform context.
  // For safety, treat platform as trapezoid thickness 8px.
  function platformTopYAtX(seg, x) { // platform upper surface
    // We model platform thickness below the segment; the spec implies y = interpolated surface.
    // We'll draw 8px height; Mario stands 32px above the surface.
    return segYAtX(seg, x);
  }

  // Compute platform "bounds" for collision convenience
  function platformContainsX(seg, x) {
    return x >= Math.min(seg.x1, seg.x2) && x <= Math.max(seg.x1, seg.x2);
  }

  // --- Input ---
  const keys = new Map();
  let justPressed = new Set();

  function keyDown(e){
    const k = e.key;
    if (!keys.get(k)) justPressed.add(k);
    keys.set(k, true);
    if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","w","a","s","d","Enter","p","P"].includes(k)) e.preventDefault();
    if (k === 'p' || k === 'P') e.preventDefault();
  }
  function keyUp(e){
    keys.set(e.key, false);
  }
  window.addEventListener('keydown', keyDown, {passive:false});
  window.addEventListener('keyup', keyUp);

  // --- Audio (optional, simple beeps) ---
  let audioCtx = null;
  function beep(freq, dur=0.05, type='triangle', vol=0.05) {
    try{
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      const t0 = audioCtx.currentTime;
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.start(t0);
      o.stop(t0 + dur + 0.01);
    }catch(e){}
  }

  // --- Game Spec Implementation ---
  const PLAT_H = 8;

  // Platforms: 6 sloped/flat beams.
  // Spec says platform definitions are (left-x, left-y) to (right-x, right-y).
  // We'll store x1,y1 as left end and x2,y2 as right end as given.
  const platforms = [
    { id:1, x1:30,  y1:670, x2:670, y2:710, color:'#FF4444' }, // slopes right-down
    { id:2, x1:30,  y1:570, x2:670, y2:610, color:'#FF4444' }, // slopes right-down in coordinates; spec says "opposite tilt" relative; our y increase matches left-to-right +40 => right-down.
    { id:3, x1:30,  y1:470, x2:670, y2:510, color:'#FF4444' }, // right-down
    { id:4, x1:30,  y1:370, x2:670, y2:410, color:'#FF4444' }, // left-down in spec alternation, but coordinates reflect right-down.
    { id:5, x1:30,  y1:270, x2:670, y2:310, color:'#FF4444' }, // right-down
    { id:6, x1:100, y1:100, x2:500, y2:100, color:'#FF4444' }  // flat
  ];

  // To respect spec "alternating" without changing endpoints, we can interpret rolling direction based on platform slope sign.
  // Our segments alternate by using explicit rollDir per platform:
  // Spec: Platform 1 slopes right-down => barrels right.
  // Platform 2 opposite slope => barrels left. Platform 3 right, 4 left, 5 right.
  const platformRollDir = {1:+1, 2:-1, 3:+1, 4:-1, 5:+1, 6:+1};

  // --- Ladders ---
  // Each ladder x center and top/bottom y ranges.
  // We'll add broken ladders as cosmetic partial height; only non-broken are climbable.
  const ladders = [
    { id:'L1', x:600, topY:610, bottomY:670, broken:false }, // between P1->P2 (note: top platform is P2 at y~610, bottom platform P1 at y~670)
    { id:'L2', x:100, topY:510, bottomY:570, broken:false }, // P2->P3
    { id:'L3', x:500, topY:410, bottomY:470, broken:false }, // P3->P4
    { id:'L4', x:150, topY:310, bottomY:370, broken:false }, // P4->P5
    { id:'L5', x:400, topY:100, bottomY:310, broken:false }, // P5->P6
    // Broken ladders (cosmetic, partial height, non-functional)
    { id:'b1', x:520, topY:430, bottomY:450, broken:true },
    { id:'b2', x:230, topY:330, bottomY:350, broken:true },
    { id:'b3', x:340, topY:200, bottomY:230, broken:true }
  ];

  const LAD_W = 20;
  const LAD_RUNG_GAP = 16;

  function ladderClimbBounds(l){
    const top = Math.min(l.topY, l.bottomY);
    const bottom = Math.max(l.topY, l.bottomY);
    return { top, bottom };
  }

  // --- Characters & Objects ---
  const MARIO = {
    w:24, h:32,
    red:'#CC0000', skin:'#FFAA77',
    speed:150,
    jumpVy0:-340,
    grav:900,
    climbSpeed:100,
    ladderXTol:8
  };

  const DK = {
    w:64, h:56,
    brown:'#885522',
    skin:'#FFAA77',
    x:100, y:80,
    tossMin:2.0, tossMax:4.0, // random
  };

  const PAULINE = {
    w:16, h:28,
    dress:'#FF66AA',
    skin:'#FFAA77',
    x:310, y:38
  };

  const barrel = {
    w:20, h:16,
    brown:'#CC6600',
    band:'#884400',
    rollSpeedBase:120,
    fallGrav:600
  };

  const OIL = {
    x:60, y:680, w:28, h:32,
    blue:'#4444FF'
  };

  const hammerDef = { w:20, h:20, gold:'#FFCC00', handle:'#885522' };

  // --- Game state ---
  const SCORE_START = 0;
  const LIVES_START = 3;

  let state = 'IDLE'; // IDLE | PLAYING | PAUSED | GAME_OVER
  let subState = null; // null | DYING | LEVEL_COMPLETE
  let lives = LIVES_START;
  let score = SCORE_START;
  let level = 1;
  let best = Number(localStorage.getItem('donkeykong_best')||0);
  let bonus = 5000;
  let bonusTickAcc = 0;

  let timeSinceStart = 0;

  let mario = null;
  let dk = null;
  let barrels = [];
  let particles = [];
  let floatingTexts = [];

  // Hammer objects
  let hammers = [];
  let hammerActiveUntil = 0; // time in ms
  let hammerSwingToggle = false;
  let hammerSwingAcc = 0;

  // Pauline help blink time
  let helpAcc = 0;

  // Barrel spawn control
  let barrelTimer = 0;
  let barrelNextIn = 2.5;
  let lastFrame = performance.now();
  let lastUpdateTime = lastFrame;

  // Keep barrels jump-over scoring
  // We'll track per barrel: lastScoredJumpId for current jump or a scoreKey that changes each jump.
  let marioJumpId = 0;
  let marioPrevOnGround = false;
  let marioWasJumping = false;

  // Dying animation
  let deathTimer = 0;
  let deathTotal = 0.8;

  function resetRound(fullReset=true){
    score = SCORE_START;
    lives = LIVES_START;
    level = 1;
    bonus = 5000;
    hammerActiveUntil = 0;
    hammerSwingToggle = false;
    hammerSwingAcc = 0;
    timeSinceStart = 0;

    barrels = [];
    particles = [];
    floatingTexts = [];
    helpAcc = 0;

    dk = {
      x:DK.x, y:DK.y,
      tossAcc:0,
      tossNext: rand(DK.tossMin, DK.tossMax),
      armCosmetic:0
    };

    barrelTimer = 0;
    barrelNextIn = rand(DK.tossMin, DK.tossMax);

    // Place Mario at starting platform 1 bottom-left platform.
    mario = {
      x:80, y:710,
      w:MARIO.w, h:MARIO.h,
      vx:0, vy:0,
      onLadder:false,
      ladderId:null,
      faceDir:1,
      jumping:false,
      onGround:true,
      lastPlatformId:1,
      prevFeetBelow:false,
      // Jump-over scoring tracking:
      currentJumpId: marioJumpId
    };

    // Ensure Mario y matches platform surface:
    snapMarioToPlatformUnder(true);

    placeHammers();
  }

  function placeHammers(){
    hammers = [
      { id:'h1', x:200, y:0, on:true, collected:false, blink:0, platformId:2 },
      { id:'h2', x:400, y:0, on:true, collected:false, blink:0, platformId:4 }
    ];
    for (const h of hammers){
      const p = platforms.find(pp=>pp.id===h.platformId);
      // Hammer sits on platform surface; Mario spec says y is on platform 2/4.
      const surfaceY = platformTopYAtX(p, h.x);
      // h sits with bottom aligned to platform surface: top = surfaceY - h.h + 8? Actually platform surface is at y.
      // We'll make hammer's base slightly embedded: set y = surfaceY - h.h + 8px padding.
      h.y = surfaceY - h.h + 8;
    }
  }

  function currentTimeMs(){ return performance.now(); }

  function rand(a,b){ return a + Math.random()*(b-a); }

  function isPointOnTopPlatformZone(){
    // Pauline at top platform; define zone around Pauline sprite.
    const zone = { x:PAULINE.x-8, y:PAULINE.y-8, w:PAULINE.w+16, h:PAULINE.h+16 };
    const marioZone = { x:mario.x, y:mario.y, w:mario.w, h:mario.h };
    return aabb(zone, marioZone);
  }

  function getLadderAtXWithinTol(x){
    // Find climbable ladder where x within 8 px of ladder center.
    for(const l of ladders){
      if (l.broken) continue;
      if (Math.abs(x - l.x) <= MARIO.ladderXTol) return l;
    }
    return null;
  }

  function getBarrelRollPlatformIdAtX(x){
    // Determine which platform x lies within, using platform x-range.
    for(const p of platforms){
      if (platformContainsX(p, x)) return p.id;
    }
    return null;
  }

  function findPlatformById(id){ return platforms.find(p=>p.id===id); }

  function snapMarioToPlatformUnder(force=false){
    // Determine platform where Mario feet are and snap y
    // Mario feet reference: y + h
    const feetX = mario.x + mario.w/2;
    // Choose platform with feetX within range and closest surface just under feet.
    let bestP = null;
    let bestDist = 1e9;
    for (const p of platforms){
      if (!platformContainsX(p, feetX)) continue;
      const surfaceY = platformTopYAtX(p, feetX);
      const dist = Math.abs((surfaceY) - (mario.y + mario.h));
      if (dist < bestDist){
        bestDist = dist; bestP = p;
      }
    }
    if (bestP){
      const surfaceY = platformTopYAtX(bestP, feetX);
      const targetY = surfaceY - mario.h; // Mario top such that feet at surfaceY
      if (force || Math.abs(targetY - mario.y) > 0.5){
        mario.y = targetY;
        mario.onGround = true;
        mario.onLadder = false;
        mario.ladderId = null;
        mario.vy = 0;
        mario.jumping = false;
        mario.lastPlatformId = bestP.id;
      } else {
        // still set onGround true if close
        if (bestDist < 2.5){
          mario.onGround = true;
          mario.vy = 0;
          mario.jumping = false;
          mario.lastPlatformId = bestP.id;
        }
      }
    }
  }

  function marioEnterLadder(l){
    if (hammerActiveUntil > currentTimeMs()) return; // cannot climb with hammer active
    const {top, bottom} = ladderClimbBounds(l);
    // clamp mario within ladder vertical range
    mario.onLadder = true;
    mario.ladderId = l.id;
    mario.vx = 0;
    mario.vy = 0;
    mario.jumping = false;
    mario.onGround = false;
    mario.x = l.x - mario.w/2;
    // Keep mario feet align to nearest rung? We'll just clamp within ladder bounds
    mario.y = clamp(mario.y, top - mario.h + 4, bottom - 4);
  }

  function marioExitLadder(toTop){
    const l = ladders.find(ll=>ll.id===mario.ladderId);
    if (!l) return;
    mario.onLadder = false;
    mario.ladderId = null;
    // When exiting, land on adjacent platform:
    // Determine which platform is nearest below/above based on toTop.
    // We'll choose platform containing ladder x and closest surface to mario feet.
    const feetX = mario.x + mario.w/2;
    let targetPlatform = null;
    let bestY = toTop ? -1e9 : 1e9;
    for(const p of platforms){
      if (!platformContainsX(p, l.x)) continue;
      const surfaceY = platformTopYAtX(p, feetX);
      if (toTop){
        if (surfaceY <= (mario.y + mario.h) + 10 && surfaceY > bestY){
          bestY = surfaceY; targetPlatform = p;
        }
      } else {
        if (surfaceY >= (mario.y + mario.h) - 10 && surfaceY < bestY){
          bestY = surfaceY; targetPlatform = p;
        }
      }
    }
    if (!targetPlatform){
      // fallback: closest in general
      let bestDist=1e9;
      for(const p of platforms){
        if (!platformContainsX(p, l.x)) continue;
        const surfaceY = platformTopYAtX(p, feetX);
        const dist = Math.abs(surfaceY - (mario.y + mario.h));
        if (dist < bestDist){ bestDist = dist; targetPlatform = p;}
      }
    }
    if (targetPlatform){
      const surfaceY = platformTopYAtX(targetPlatform, feetX);
      mario.y = surfaceY - mario.h;
      mario.onGround = true;
      mario.vy = 0;
      mario.jumping = false;
      mario.lastPlatformId = targetPlatform.id;
    }
  }

  // --- Barrel spawning & rolling ---
  function spawnBarrel(){
    const p = findPlatformById(mario.lastPlatformId) || platforms[0];
    // Barrel starts at DK position and will roll on platform it should currently be thrown to.
    // Spec: DK tosses barrel from its position every interval; barrels roll along current platform following slope.
    // We'll choose the highest platform directly under DK's throw point (x range), which is platform 6? But DK at y=80 near top platform.
    // We'll map DK y to a starting platform: platform 6.
    let startPlatformId = 6;
    // But gameplay expects barrels on slanted girders below; in original they start from top and fall to others.
    // We'll spawn on platform 6 if its x-range contains DK x; else pick closest.
    const feetX = DK.x + DK.w/2;
    if (!platformContainsX(findPlatformById(6), feetX)) startPlatformId = 5;
    barrels.push(makeBarrel(startPlatformId));
  }

  function makeBarrel(startPlatformId){
    // Barrel position at DK toss: start slightly below DK so it lands on platform quickly.
    // We'll place barrel centered on chosen platform surface near DK x.
    const p = findPlatformById(startPlatformId);
    const xCenter = clamp(DK.x + DK.w/2 - barrel.w/2, Math.min(p.x1,p.x2)+10, Math.max(p.x1,p.x2)-10);
    const surfaceY = platformTopYAtX(p, xCenter + barrel.w/2);
    return {
      id: Math.random().toString(16).slice(2),
      x: xCenter,
      y: surfaceY - barrel.h, // top aligned to barrel with bottom on surface
      w: barrel.w, h: barrel.h,
      platformId: startPlatformId,
      state: 'rolling', // rolling | falling
      vx:0, vy:0,
      justFellAt:0,
      scoredJumpIds: new Set(), // per jump
      ladderChoiceCooldown:0,
      fallenFromEdge:false
    };
  }

  function platformEdgeForBarrel(p, dir){
    // For roll direction: right => edge at x2, left => edge at x1.
    return dir > 0 ? Math.max(p.x1,p.x2) : Math.min(p.x1,p.x2);
  }

  function getRollDirForPlatformId(pid){
    return platformRollDir[pid] ?? +1;
  }

  function getNextPlatformBelowEdge(currPlatformId, edgeX){
    // Find which platform is immediately below at that x.
    // Among platforms that contain edgeX, pick the one with minimal surfaceY greater than current surfaceY.
    const currP = findPlatformById(currPlatformId);
    const surfaceCurr = platformTopYAtX(currP, edgeX);
    let candidate = null;
    let minDiff = 1e9;
    for(const p of platforms){
      if (!platformContainsX(p, edgeX)) continue;
      if (p.id === currPlatformId) continue;
      const surface = platformTopYAtX(p, edgeX);
      if (surface > surfaceCurr){
        const diff = surface - surfaceCurr;
        if (diff < minDiff){ minDiff = diff; candidate = p; }
      }
    }
    // If none found, fall to bottom (no platforms).
    return candidate;
  }

  function checkBarrelOnOilDrum(b){
    const br = { x:b.x, y:b.y, w:b.w, h:b.h };
    const d = { x:OIL.x, y:OIL.y, w:OIL.w, h:OIL.h };
    return aabb(br, d);
  }

  // --- Hammer mechanics ---
  function hammerActive(){
    return hammerActiveUntil > currentTimeMs();
  }

  function collectHammers(){
    if (!hammers.length) return;
    for(const h of hammers){
      if (!h.on || h.collected) continue;
      const hz = { x:h.x, y:h.y, w:h.w, h:h.h };
      const mz = { x:mario.x, y:mario.y, w:mario.w, h:mario.h };
      if (aabb(hz, mz)){
        h.collected = true;
        h.on = false;
        if (audioCtx){} // no-op
        hammerActiveUntil = currentTimeMs() + 8000;
        hammerSwingToggle = false;
        hammerSwingAcc = 0;
        // feedback
        beep(660,0.05,'square',0.04);
      }
    }
  }

  // --- Jump-over scoring ---
  function handleJumpOverScoring(){
    if (!mario.jumping && mario.onGround) return;
    const feetY = mario.y + mario.h;
    const feetX = mario.x + mario.w/2;
    // For each barrel not yet scored for current jumpId, if passes under Mario:
    for(const b of barrels){
      if (b.state !== 'rolling' && b.state !== 'falling') continue;
      if (b.scoredJumpIds.has(marioJumpId)) continue;
      // Condition: barrel top < Mario feet AND barrel is roughly under Mario horizontally
      const underX = b.x + b.w/2;
      const withinX = Math.abs(underX - feetX) < 14;
      const top = b.y; // top of barrel
      const below = top < feetY;
      // Also ensure Mario is above barrel height during pass: Mario feet are above barrel center by some amount
      const aboveEnough = (feetY - (b.y + b.h*0.5)) > -2; // lenient
      if (withinX && below && aboveEnough){
        b.scoredJumpIds.add(marioJumpId);
        score += 100;
        floatingTexts.push({ x:mario.x + mario.w/2, y:mario.y + 10, text:'+100', t:0, life:0.5, color:'#FFFFFF' });
        // sound
        beep(440,0.04,'triangle',0.04);
      }
    }
  }

  function killMario(){
    if (subState === 'DYING' || state !== 'PLAYING') return;
    subState = 'DYING';
    deathTimer = 0;
    // death sound
    beep(440,0.12,'sawtooth',0.03);
    beep(110,0.35,'triangle',0.04);
    lives -= 1;
    // reset hammer if needed? spec doesn't say; keep none.
    hammerActiveUntil = 0;
    hammerSwingToggle = false;
  }

  function respawnMario(){
    mario.x = 80;
    mario.y = 710;
    mario.vx = 0; mario.vy = 0;
    mario.onLadder = false;
    mario.ladderId = null;
    mario.jumping = false;
    mario.onGround = true;
    mario.lastPlatformId = 1;
    snapMarioToPlatformUnder(true);
    subState = null;
    marioJumpId = (marioJumpId + 1) % 1000000;
  }

  // --- Rendering ---
  function drawBackground(){
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,W,H);

    // Subtle grid / depth (optional)
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#222';
    for(let y=0;y<H;y+=40){
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(W,y);
      ctx.stroke();
    }
    for(let x=0;x<W;x+=50){
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x,H);
      ctx.stroke();
    }
    ctx.restore();

    // Platforms
    for(const p of platforms){
      drawPlatform(p);
    }

    // Ladders
    for(const l of ladders){
      drawLadder(l);
    }

    // Oil drum + flames
    drawOilDrum();

    // Hammers
    drawHammers();

    // Pauline
    drawPauline();

    // Donkey Kong
    drawDonkeyKong();

    // Barrels
    drawBarrels();

    // Mario
    drawMario();

    // Particles
    drawParticles();

    // Floating texts
    drawFloatingTexts();

    // HUD
    drawHUD();

    // Overlays
    drawOverlays();
  }

  function drawTrapezoidBeam(seg){
    // Draw 8px tall platform trapezoid along segment.
    // Compute normal vector to segment to create thickness.
    const x1 = seg.x1, y1 = seg.y1, x2 = seg.x2, y2 = seg.y2;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy/len;
    const ny = dx/len;
    const h = PLAT_H;

    const ax = x1 + nx*h, ay = y1 + ny*h;
    const bx = x2 + nx*h, by = y2 + ny*h;
    const cx = x2 - nx*h, cy = y2 - ny*h;
    const dx2 = x1 - nx*h, dy2 = y1 - ny*h;

    ctx.fillStyle = seg.color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.lineTo(cx, cy);
    ctx.lineTo(dx2, dy2);
    ctx.closePath();
    ctx.fill();

    // Outline
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.lineTo(cx, cy);
    ctx.lineTo(dx2, dy2);
    ctx.closePath();
    ctx.stroke();

    // Top highlight line
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function drawPlatform(p){

    const rr = Math.min(r, w/2, h/2);

    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();

  function update(dt, now){
    timeSinceStart += dt;

    // Bonus timer countdown
    bonusTickAcc += dt;
    while (bonusTickAcc >= 2.0){
      bonusTickAcc -= 2.0;
      bonus -= 100;
      if (bonus <= 0){
        bonus = 0;
        // Bonus reaching 0 -> Mario dies
        killMario();
      }
    }

    // Hammer swing timer
    if (hammerActive()){
      hammerSwingAcc += dt;
      while (hammerSwingAcc >= 0.1){
        hammerSwingAcc -= 0.1;
        hammerSwingToggle = !hammerSwingToggle;
      }
    } else {
      hammerSwingToggle = false;
    }

    helpAcc += dt;
    dk.armCosmetic += dt * (dk.tossAcc>0.2?8:3);

    // DK tossing
    dk.tossAcc += dt;
    // Barrel spawn interval based on level:
    // Next level barrels spawn faster (-0.5s interval min 1s)
    // roll speed +20px/s
    const interval = Math.max(1, DK.tossMin + (level-1)*0); // Actually spec: interval decreases next level by -0.5s from current; easiest: base interval = 3.0 and subtract 0.5*(level-1)
    // We'll implement proper using initial spawnNextIn for level 1 from dk.tossMin..tossMax average.
    // But interval in spec refers to spawn interval; we'll compute:
    const baseAvg = (DK.tossMin + DK.tossMax)/2;
    const spawnIntervalAvg = Math.max(1, baseAvg - 0.5*(level-1));

    barrelTimer += dt;
    // random threshold: we keep barrelNextIn from random but with faster scaling
    if (barrelNextIn === null || barrelNextIn === undefined){
      barrelNextIn = spawnIntervalAvg;
    }
    // Update next time if level changed
    if (barrelTimer >= barrelNextIn){
      spawnBarrel();
      // random interval around avg: ±0.5s, scaled
      barrelNextIn = rand(Math.max(1, spawnIntervalAvg - 0.8), spawnIntervalAvg + 0.8);
      barrelTimer = 0;
      // sound
      beep(220,0.04,'square',0.02);
    }

    // Update Mario
    updateMario(dt, now);

    // Collect hammers
    collectHammers();

    // Update barrels
    updateBarrels(dt, now);

    // Collisions
    handleCollisions(now);

    // Respawn / state transitions
    if (subState === 'DYING'){
      deathTimer += dt;
      if (deathTimer >= deathTotal){
        if (lives <= 0){

          state = 'GAME_OVER';

    if (isPointOnTopPlatformZone() && subState !== 'DYING'){
      // Level complete
      subState = 'LEVEL_COMPLETE';
      // Bonus timer remaining ×10
      const remaining = Math.max(0, Math.floor(bonus));
      const timeBonus = remaining * 10;
      score += 500 + timeBonus;

      barrels = barrels.filter(b => !b.dead);
