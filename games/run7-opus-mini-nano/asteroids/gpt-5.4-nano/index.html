        ship.invVisible = !ship.invVisible;
      }
      if (invulnerable < 0) invulnerable = 0;
    }
  }

  function updateShip(dt) {
    if (invulnerable > 0) updateInvulnerability(dt);
    const left = keys.has('ArrowLeft') || keys.has('a') || keys.has('A');
    const right = keys.has('ArrowRight') || keys.has('d') || keys.has('D');
    const thrusting = keys.has('ArrowUp') || keys.has('w') || keys.has('W');

    if (left) ship.angle -= SHIP_ROT_SPEED * dt;
    if (right) ship.angle += SHIP_ROT_SPEED * dt;

    if (thrusting) {
      const f = shipForward(ship.angle);
      ship.vx += f.x * SHIP_THRUST * dt;
      ship.vy += f.y * SHIP_THRUST * dt;

      // thrust audio low rumble while key held (throttle)
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
      if (!thrustThrottle) thrustThrottle = 0;
      thrustThrottle -= dt;
      if (thrustThrottle <= 0) {
        thrustThrottle = 0.08;
        playThrust(0.1);
      }
    }

    // friction per frame spec says *= 0.99 per frame; with variable dt, approximate using exp(log)
    // Keep feel consistent: apply friction factor based on frames at 60fps.
    const frameFactor = Math.pow(FRICTION, dt*60);
    ship.vx *= frameFactor;
    ship.vy *= frameFactor;

    // cap speed
    const sp = Math.hypot(ship.vx, ship.vy);
    if (sp > SHIP_MAX_SPEED) {
      const s = SHIP_MAX_SPEED / sp;
      ship.vx *= s;
      ship.vy *= s;
    }

    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;
    wrapEntity(ship);
  }

  let thrustThrottle = 0;

  function updateBullets(dt) {
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.t += dt;
      if (b.t > b.life) { bullets.splice(i,1); continue; }
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      wrapEntity(b);
    }
  }

  function updateUfoBullets(dt) {
    for (let i=ufoBullets.length-1;i>=0;i--){
      const b = ufoBullets[i];
      b.t += dt;
      if (b.t > 2.5) { ufoBullets.splice(i,1); continue; }
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      // wrap: vertical, horizontal wraps all edges generally
      // spec says UFO wraps vertically; bullets spec says screen wraps (all edges).
      wrapEntity(b);
    }
  }

  function updateAsteroids(dt) {
    for (const a of asteroids) {
      a.x += a.vx * dt;
      a.y += a.vy * dt;
      wrapEntity(a);
    }
  }

  function spawnUFOIfNeeded(dt) {
    if (ufo) return;
    ufoSpawnIn -= dt;
    if (ufoSpawnIn <= 0) {
      ufoSpawnIn = randomRange(20, 30);
      // spawn: horizontally wraps, so start off-screen?
      // We'll place at left or right edge randomly, with y random
      const y = randomRange(60, H-60);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const x = dir < 0 ? W + 40 : -40; // so it enters
      ufo = {
        x, y,
        vx: dir * UFO_SPEED,
        yWrap: true,
        radius: 26,
        alive: true,
        fireTimer: 0,
        audio: null
      };
      ufoFireTimer = 0;
      // start audio loop (only if audio available)
      startUfoLoop(ufo);
    }
  }

  function updateUFO(dt) {
    if (!ufo) return;
    if (!ufo.alive) return;

    ufo.x += ufo.vx * dt;

    // wraps vertically only for UFO; but we also need horizontal wrap for the whole play area.
    // Spec says moves horizontally at 120px/s, wraps vertically. We'll implement: y wraps, x wraps all edges for continuity.
    ufo.y += 0; // no vertical movement besides wrap

    // Wrap: x all edges, y wraps vertically (same)
    wrapEntity(ufo);

    ufoFireTimer += dt;
    if (ufoFireTimer >= UFO_FIRE_INTERVAL) {
      ufoFireTimer %= UFO_FIRE_INTERVAL;

      // Fire aimed bullets at player
      const dx = wrapDelta(ship.x, ufo.x, W);
      const dy = wrapDelta(ship.y, ufo.y, H);
      const ang = Math.atan2(dy, dx);
      const vx = Math.cos(ang) * UFO_BULLET_SPEED;
      const vy = Math.sin(ang) * UFO_BULLET_SPEED;

      const b = {
        x: ufo.x, y: ufo.y,
        vx, vy,
        t: 0,
        radius: UFO_BULLET_RADIUS
      };
      ufoBullets.push(b);

      // limit bullets? spec doesn't say; keep modest cap
      if (ufoBullets.length > 6) ufoBullets.splice(0, ufoBullets.length-6);

      // no fire sound specified for UFO (only oscillating while alive)
    }
  }

  function handleCollisions() {
    // Bullets vs asteroids
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];

      // bullet vs ufo
      if (ufo && ufo.alive) {
        const tmp = { x: ufo.x, y: ufo.y, radius: 22 };
        if (torusCircleHit({x:b.x,y:b.y,radius:b.radius}, tmp)) {
          // destroy UFO
          bullets.splice(i,1);
          if (ufo) {
            ufo.alive = false;
            stopUfoLoop(ufo);
            ufo = null;
          }
          score += 200;
          if (score >= 10000 && Math.floor(score/10000) > Math.floor((score-200)/10000)) {
            lives += 1;
          } else if (score % 10000 === 0) {
            lives += 1;
          }
          // if score surpasses 10000 multiple thresholds in one hit
          while (score >= (livesThresholdNext())) {} // ignore; we'll compute properly below

          return; // restart loops to keep simple
        }
      }

      for (let j=asteroids.length-1;j>=0;j--){
        const a = asteroids[j];
        if (torusCircleHit({x:b.x,y:b.y,radius:b.radius}, {x:a.x,y:a.y,radius:a.radius})) {
          // split/destroy asteroid. Need bullet direction from velocity
          const bdir = { x: b.vx, y: b.vy };
          const mag = Math.hypot(bdir.x, bdir.y) || 1;
          bdir.x /= mag; bdir.y /= mag;
          lastBulletDir = bdir;

          // scoring
          if (a.size === 'large') score += 20;
          else if (a.size === 'medium') score += 50;
          else score += 100;

          bullets.splice(i,1);
          destroyAsteroid(j);
          // extra life at 10,000 points
          // Award every time crossing a multiple of 10,000
          while (score >= nextLifeAt()) {
            lives += 1;
          }
          return; // bullet destroyed; exit to prevent index issues
        }
      }
    }

    // Player vs asteroids
    if (invulnerable <= 0 && ship && ship) {
      for (let j=asteroids.length-1;j>=0;j--){
        const a = asteroids[j];
        // ship circle collision approx
        const shipCircle = { x: ship.x, y: ship.y, radius: 16 };
        if (torusCircleHit(shipCircle, { x:a.x, y:a.y, radius:a.radius })) {
          playerDie('asteroid');
          break;
        }
      }
      if (lives > 0 && invulnerable <= 0 && ufo && ufo.alive) {
        // Player vs ufo handled via bullets only (spec says contact with UFO = death too)
        const ufoCircle = { x: ufo.x, y: ufo.y, radius: 26 };
        if (torusCircleHit({x:ship.x,y:ship.y,radius:16}, ufoCircle)) {
          playerDie('ufo');
        }
      }
      // Player vs UFO bullets
      if (lives > 0 && invulnerable <= 0) {
        for (let i=ufoBullets.length-1;i>=0;i--){
          const b = ufoBullets[i];
          if (torusCircleHit({x:ship.x,y:ship.y,radius:16}, {x:b.x,y:b.y,radius:b.radius})) {
            ufoBullets.splice(i,1);
            playerDie('ufoBullet');
            break;
          }
        }
      }
    } else {
      // even if invulnerable, still could hit ufo bullets? spec says death unless invulnerable
      // so skip when invulnerable>0
    }
  }

  function nextLifeAt() {
    // extra life at 10,000 points (each threshold)
    // derive from stored life awards? We'll track via nextExtraLife variable.
    return nextExtraLife;
  }

  let nextExtraLife = 10000;
  function resetExtraLifeTracking() {
    nextExtraLife = 10000;
  }
  function lifeAwardLoop() {
    while (score >= nextExtraLife) {
      lives += 1;
      nextExtraLife += 10000;
    }
  }

  // Ensure extra lives correctly
  function applyScoreAndLives() {
    if (score >= nextExtraLife) lifeAwardLoop();
  }

  // Override collision score awarding with proper tracking
  const originalHandleCollisions = handleCollisions;
  handleCollisions = function() {
    // Player Bullet ↔ Asteroid: split/destroy asteroid, destroy bullet
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];

      // Player bullet ↔ UFO
      if (ufo && ufo.alive) {
        // UFO "radius" for collision (approx)
        const u = { x: ufo.x, y: ufo.y, radius: 22 };
        const bb = { x: b.x, y: b.y, radius: b.radius };
        if (torusCircleHit(bb, u)) {
          bullets.splice(i,1);
          // destroy UFO
          ufo.alive = false;
          stopUfoLoop(ufo);
          ufo = null;
          score += 200;
          applyScoreAndLives();
          explodeUfo(0.12);
          break;
        }
      }

      for (let j=asteroids.length-1;j>=0;j--){
        const a = asteroids[j];
        const bb = { x: b.x, y: b.y, radius: b.radius };
        const aa = { x: a.x, y: a.y, radius: a.radius };
        if (torusCircleHit(bb, aa)) {
          // bullet dir
          const bdir = { x: b.vx, y: b.vy };
          const mag = Math.hypot(bdir.x, bdir.y) || 1;
          bdir.x /= mag; bdir.y /= mag;
          lastBulletDir = bdir;

          bullets.splice(i,1);

          // scoring and split
          if (a.size === 'large') score += 20;
          else if (a.size === 'medium') score += 50;
          else score += 100;

          destroyAsteroid(j);

          applyScoreAndLives();
          break;
        }
      }
    }

    // Player ↔ Asteroid: death
    if (invulnerable <= 0) {
      for (let j=asteroids.length-1;j>=0;j--){
        const a = asteroids[j];
        if (torusCircleHit({x:ship.x,y:ship.y,radius:16},{x:a.x,y:a.y,radius:a.radius})) {
          playerDie('asteroid');
          return;
        }
      }
      // Player ↔ UFO contact: death
      if (ufo && ufo.alive) {
        if (torusCircleHit({x:ship.x,y:ship.y,radius:16},{x:ufo.x,y:ufo.y,radius:26})) {
          playerDie('ufo');
          return;
        }
      }
      // Player ↔ UFO bullets: death
      for (let i=ufoBullets.length-1;i>=0;i--){
        const b = ufoBullets[i];
        if (torusCircleHit({x:ship.x,y:ship.y,radius:16},{x:b.x,y:b.y,radius:b.radius})) {
          ufoBullets.splice(i,1);
          playerDie('ufoBullet');
          return;
        }
      }
    }

    // UFO bullet ↔ Asteroid: destroy bullet (no asteroid damage)
    for (let i=ufoBullets.length-1;i>=0;i--){
      const b = ufoBullets[i];
      for (let j=asteroids.length-1;j>=0;j--){
        const a = asteroids[j];
        if (torusCircleHit({x:b.x,y:b.y,radius:b.radius},{x:a.x,y:a.y,radius:a.radius})) {
          ufoBullets.splice(i,1);
          break;
        }
      }
    }
  };

  function explodeUfo(duration=0.08) {
    // Use a slightly louder noise burst for UFO
    makeNoiseBurst(0.08, 0.28);
    // also a quick screen shake via particles
    for (let k=0;k<12;k++){
      particles.push({
        x: ufo ? ufo.x : ship.x,
        y: ufo ? ufo.y : ship.y,
        vx: randomRange(-200,200),
        vy: randomRange(-200,200),
        life: randomRange(0.15,0.35),
        t: 0,
        r: randomRange(1,3)
      });
    }
  }

  function updateParticles(dt) {
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.t += dt;
      if (p.t >= p.life) { particles.splice(i,1); continue; }
      p.x += p.vx*dt;
      p.y += p.vy*dt;
      p.vx *= Math.pow(0.9, dt*60);
      p.vy *= Math.pow(0.9, dt*60);
      p.r *= Math.pow(0.98, dt*60);
    }
  }

  function drawParticles() {
    if (!particles.length) return;
    ctx.save();
    for (const p of particles) {
      const alpha = 1 - p.t/p.life;
      ctx.globalAlpha = clamp(alpha, 0, 1);
      ctx.strokeStyle = 'rgba(255,255,255,1)';
      ctx.lineWidth = 1;
      drawWrappedShape(p.x, p.y, p.r+2, (ox, oy) => {
        ctx.beginPath();
        ctx.arc(ox, oy, p.r, 0, TAU);
        ctx.stroke();
      });
    }
    ctx.restore();
  }

  function drawHUD() {
    ctx.save();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.textBaseline = 'top';
    ctx.fillText('SCORE ' + score, 10, 30);

    // High score top-right
    ctx.font = '16px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('HI ' + highScore, W - 10, 10);
    ctx.textAlign = 'left';

    // Lives display
    const lx = 10, ly = 55;
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1.2;

    for (let i=0;i<lives;i++){
      const cx = lx + i*16;
      const cy = ly + 2;
      // small ship triangle
      ctx.beginPath();
      ctx.moveTo(cx, cy - 6);
      ctx.lineTo(cx - 6, cy + 6);
      ctx.lineTo(cx + 6, cy + 6);
      ctx.closePath();
      ctx.stroke();
    }

    // If ship is dead and lives remaining but invulnerable? no special UI.
    ctx.restore();
  }

  function drawStartScreen() {
    // background decorative asteroids drifting
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);

    // move decor
    for (const a of decorAst) {
      a.x += a.vx*(1/60);
      a.y += a.vy*(1/60);
      wrapEntity(a);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      drawWrappedShape(a.x, a.y, a.radius, (ox, oy) => {
        ctx.beginPath();
        for (let i=0;i<a.shape.length;i++){
          const p = a.shape[i];
          const X = ox + p.x;
          const Y = oy + p.y;
          if (i===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
        }
        ctx.closePath();
        ctx.stroke();
      });
    }
    ctx.restore();

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '52px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('ASTEROIDS', W/2, 220);

    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('Press Enter to Start', W/2, 360);

    ctx.textAlign = 'left';
    ctx.restore();
  }

  function drawGameOverScreen() {
    // dim overlay
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);

    // draw last things subtly? keep blank per spec
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,W,H);

    // Overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '40px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('SCORE ' + score, W/2, H/2 + 25);

    ctx.fillStyle = '#AAAAAA';
    ctx.font = '18px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('Press Enter to Restart', W/2, H/2 + 60);

    ctx.textAlign = 'left';
    ctx.restore();
  }

  function drawPausedOverlay() {
    ctx.save();
    ctx.fillStyle = '#000000CC';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '36px ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.restore();
  }

  function update(dt) {
    if (state === STATES.IDLE) {
      // animate decor slightly; keep ship not needed
      return;
    }
    if (state === STATES.PAUSED) return;
    if (state === STATES.GAME_OVER) return;

    // PLAYING
    spawnUFOIfNeeded(dt);

    // Update ship
    // If ship is in respawn countdown, still allow blink? We'll prevent movement when deathTimer > 0
    if (deathTimer > 0) {
      tryRespawn(dt);
    } else {
      updateShip(dt);
    }

    // Update other objects only when playing and not waiting for respawn? Spec says ship respawns after delay if area clear, but bullets/asteroids continue.
    updateAsteroids(dt);
    updateBullets(dt);
    updateUFO(dt);
    updateUfoBullets(dt);

    // Collisions
    handleCollisions();

    // Wave progression: when all asteroids destroyed
    if (asteroids.length === 0 && state === STATES.PLAYING) {
      waveNumber += 1;
      spawnWave(waveNumber, false);
    }

    updateParticles(dt);

    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function draw() {
    ctx.save();
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0,0,W,H);

    if (state === STATES.IDLE) {
      // start screen
      drawStartScreen();
      ctx.restore();
      return;
    }

    // PLAYING / PAUSED / GAME_OVER: draw objects
    // Particles behind HUD
    if (state !== STATES.GAME_OVER) {
      // draw asteroids
      for (const a of asteroids) drawAsteroid(a);
      // ufo
      if (ufo && ufo.alive) drawUFO();

      // bullets
      drawBullets();
      drawUfoBullets();

      // ship
      if (deathTimer <= 0) drawShip();

      // particles
      drawParticles();

      // HUD
      drawHUD();
    }

    if (state === STATES.PAUSED) {
      drawPausedOverlay();
    }

    if (state === STATES.GAME_OVER) {
      // update high score before screen
      if (score > highScore) {
        highScore = score;
        saveHighScore();
      }
      drawGameOverScreen();
    }

    ctx.restore();
  }

  function togglePause() {
    if (state === STATES.PLAYING) {
      state = STATES.PAUSED;
    } else if (state === STATES.PAUSED) {
      state = STATES.PLAYING;
      // reset lastT to avoid dt jump
      lastT = performance.now();
    }
  }

  // Main loop
  function loop(t) {
    const dt = Math.min(0.033, (t - lastT)/1000); // clamp
    lastT = t;

    // Fire handling (edge-trigger)
    if (state === STATES.PLAYING) {
      // Space can be held; implement edge detection
      if (keys.has(' ') || keys.has('Spacebar')) {
        if (!fireHeld) { handleFire(); fireHeld = true; }
      } else {
        fireHeld = false;
      }
    } else {
      fireHeld = false;
    }

    if (state === STATES.IDLE) {
      // allow enter to start
    }

    // Pause toggle edge
    if ((keys.has('p') || keys.has('P')) && !pauseHeld) {
      pauseHeld = true;
      if (state === STATES.PLAYING || state === STATES.PAUSED) togglePause();
    }
    if (!keys.has('p') && !keys.has('P')) pauseHeld = false;

    // Enter start/restart
    if ((keys.has('Enter')) && !enterHeld) {
      enterHeld = true;
      if (state === STATES.IDLE || state === STATES.GAME_OVER) {
        // resume audio on gesture
        const ac = ensureAudio(); if (ac && ac.state === 'suspended') ac.resume().catch(()=>{});
        resetGame();
        resetExtraLifeTracking();
        nextExtraLife = 10000;
      } else if (state === STATES.PAUSED) {
        state = STATES.PLAYING;
        lastT = performance.now();
      }
    }
    if (!keys.has('Enter')) enterHeld = false;

    // Update only in active state
    update(dt);
    draw();

    requestAnimationFrame(loop);
  }

  let fireHeld = false;
  let pauseHeld = false;
  let enterHeld = false;

  // Start
  loadHighScore();
  ensureDecor();

  // Make sure collision score extra life is correct from beginning
  resetExtraLifeTracking();

  // Autofocus click to enable audio if user wants
  window.addEventListener('pointerdown', () => { ensureAudio(); });

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(loop); });

  // Fix for splitAsteroid velocity bug: already corrected
  // Ensure state transitions and respawn logic with area safety and invulnerability blink
})();
</script>
