<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tetris</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; background: #111111; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }

<canvas id="game" width="800" height="600"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 600;
  const cell = 28, cols = 10, rows = 20;
  const fieldX = 240, fieldY = 10, fieldW = cols * cell, fieldH = rows * cell;
  const panelX = 560;
  const colors = {
    I: '#00FFFF', O: '#FFFF00', T: '#AA00FF', S: '#00FF00',

  const darker = {

    Z: '#8A0000', J: '#00008A', L: '#8A4A00'
  };
  const baseShapes = {
    I: [[-1,0],[0,0],[1,0],[2,0]],
    O: [[0,0],[1,0],[0,1],[1,1]],
    T: [[-1,0],[0,0],[1,0],[0,1]],
    S: [[0,0],[1,0],[-1,1],[0,1]],
    Z: [[-1,0],[0,0],[0,1],[1,1]],
    J: [[-1,0],[-1,1],[0,0],[1,0]],
    L: [[-1,0],[0,0],[1,0],[1,1]]

  function rotateCells(cells, times) {
    let out = cells.map(([x,y]) => [x,y]);

    return out;
  }
  const rotations = {};

  }
  const state = {
    mode: 'IDLE',
    grid: Array.from({length: rows}, () => Array(cols).fill(null)),
    current: null,
    nextType: null,
    bag: [],
    score: 0,
    level: 1,
    lines: 0,
    high: Number(localStorage.getItem('tetris_highscore') || 0),
    gravityAcc: 0,
    lockTimer: 0,
    lockResets: 0,
    softDrop: false,
    flashRows: [],
    flashTimer: 0,
    flashResolve: null,
    lastTime: 0,
    audioCtx: null
  };
  function randInt(n){ return Math.floor(Math.random()*n); }
  function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=randInt(i+1); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
  function refillBag(){ state.bag = shuffle(['I','O','T','S','Z','J','L'].slice()); }
  function drawBag(){ if(state.bag.length===0) refillBag(); return state.bag.shift(); }
  function makePiece(type){ return { type, rot:0, x:3, y:0 }; }
  function cellsFor(piece, x=piece.x, y=piece.y, rot=piece.rot){
    return rotations[piece.type][rot].map(([dx,dy]) => ({x:x+dx, y:y+dy}));
  }
  function collides(piece, dx=0, dy=0, rot=piece.rot){
    const cells = cellsFor(piece, piece.x+dx, piece.y+dy, rot);
    for (const c of cells){
      if (c.x < 0 || c.x >= cols || c.y >= rows) return true;
      if (c.y >= 0 && state.grid[c.y][c.x]) return true;
    }
    return false;
  }
  function spawnPiece(){
    if (state.nextType == null) state.nextType = drawBag();
    const type = state.nextType;
    state.nextType = drawBag();
    const p = makePiece(type);
    p.x = 4;
    p.y = 0;
    if (collides(p)) { state.mode = 'GAME_OVER'; updateHigh(); return; }

    state.lockTimer = 0;
    state.lockResets = 0;
    state.softDrop = false;
  }
  function startGame(){
    state.grid = Array.from({length: rows}, () => Array(cols).fill(null));
    state.score = 0; state.level = 1; state.lines = 0;
    state.gravityAcc = 0; state.lockTimer = 0; state.lockResets = 0;
    state.flashRows = []; state.flashTimer = 0; state.flashResolve = null;
    state.bag = []; refillBag();
    state.nextType = drawBag();
    state.current = null;
    state.mode = 'PLAYING';
    spawnPiece();
  }
  function updateHigh(){ if (state.score > state.high){ state.high = state.score; localStorage.setItem('tetris_highscore', String(state.high)); } }
  function canPlace(piece, x, y, rot){ return !collides(piece, x-piece.x, y-piece.y, rot); }
  function tryMove(dx, dy){
    if (!state.current || state.mode !== 'PLAYING') return false;

      state.current.x += dx; state.current.y += dy;
      if (dy > 0) { state.lockTimer = 0; if (state.lockResets < 3) state.lockResets++; }

    return false;
  }
  function tryRotate(dir){
    if (!state.current || state.mode !== 'PLAYING') return false;
    const p = state.current;
    const nextRot = (p.rot + dir + 4) % 4;
    const kicks = p.type === 'I' ? [[0,0],[-1,0],[1,0],[0,-1],[-2,0],[2,0]] : [[0,0],[-1,0],[1,0],[0,-1]];
    for (const [kx,ky] of kicks){
      if (!collides(p, kx, ky, nextRot)){
        p.x += kx; p.y += ky; p.rot = nextRot; state.lockTimer = 0; return true;
      }
    }
    return false;
  }
  function hardDrop(){
    if (!state.current || state.mode !== 'PLAYING') return;
    let d = 0;
    while (!collides(state.current, 0, d+1)) d++;
    state.current.y += d;
    state.score += d * 2;
    lockPiece();
    playSound('hard');
  }
  function beginLock(){ if (!state.lockTimer) state.lockTimer = 500; }
  function lockPiece(){
    const p = state.current;
    if (!p) return;
    for (const c of cellsFor(p)){
      if (c.y >= 0) state.grid[c.y][c.x] = p.type;
    }
    clearLines();
    state.current = null;
    if (state.mode === 'PLAYING') spawnPiece();
  }
  function clearLines(){
    const full = [];
    for (let y=0; y<rows; y++) if (state.grid[y].every(v => v)) full.push(y);
    if (!full.length) return;
    state.flashRows = full.slice();
    state.flashTimer = 100;
    const n = full.length;
    const points = [0,100,300,500,800][n] * state.level;
    state.score += points;
    state.lines += n;
    state.level = 1 + Math.floor(state.lines / 10);
    playSound(n === 4 ? 'tetris' : 'line');

    while (newGrid.length < rows) newGrid.unshift(Array(cols).fill(null));
    state.grid = newGrid;
  }
  function getGravity(){ return Math.max(100, 1000 - 75 * (state.level - 1)); }
  function getGhostY(){
    if (!state.current) return 0;
    let y = state.current.y;
    while (!collides(state.current, 0, (y - state.current.y) + 1)) y++;

  }
  function playSound(kind){

      const gain = ac.createGain(); gain.connect(ac.destination);
      const osc = (f, type='sine', dur=0.05, vol=0.04, when=t) => {

      else if (kind === 'line') { osc(440,'triangle',0.08,0.03); osc(660,'triangle',0.08,0.025, t+0.04); osc(880,'triangle',0.08,0.02, t+0.08); }
      else if (kind === 'tetris') { osc(200,'sawtooth',0.2,0.05); osc(250,'sawtooth',0.2,0.045, t+0.03); osc(300,'sawtooth',0.2,0.04, t+0.06); osc(400,'sawtooth',0.2,0.035, t+0.09); }
      else if (kind === 'hard') osc(110, 'square', 0.06, 0.06);
      else if (kind === 'over') { for (let i=0;i<6;i++) osc(440*Math.pow(0.5,i), 'sine', 0.08, 0.03, t+i*0.08); }

  function drawBlock(x,y,type,alpha=1){
    const px = fieldX + x*cell, py = fieldY + y*cell;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = colors[type];
    ctx.fillRect(px, py, cell, cell);
    ctx.strokeStyle = darker[type];
    ctx.lineWidth = 1;
    ctx.strokeRect(px+0.5, py+0.5, cell-1, cell-1);
    ctx.restore();
  }
  function drawPiece(piece, alpha=1, offsetX=0, offsetY=0, useRot=null){
    const rot = useRot == null ? piece.rot : useRot;
    for (const [dx,dy] of rotations[piece.type][rot]){
      const x = piece.x + dx + offsetX;
      const y = piece.y + dy + offsetY;
      if (y >= 0) drawBlock(x,y,piece.type,alpha);
    }
  }
  function drawPreview(type){
    const ox = 580, oy = 95;
    const cells = rotations[type][0];
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for (const [x,y] of cells){ minX=Math.min(minX,x); minY=Math.min(minY,y); maxX=Math.max(maxX,x); maxY=Math.max(maxY,y); }
    const bw = (maxX-minX+1)*cell, bh = (maxY-minY+1)*cell;
    const px = ox + (112 - bw)/2 - minX*cell;
    const py = oy + (112 - bh)/2 - minY*cell;
    for (const [x,y] of cells){
      const xx = px + x*cell, yy = py + y*cell;
      ctx.fillStyle = colors[type]; ctx.fillRect(xx, yy, cell, cell);
      ctx.strokeStyle = darker[type]; ctx.strokeRect(xx+0.5, yy+0.5, cell-1, cell-1);
    }
  }
  function drawMiniPiece(type, x, y, scale=16){
    const cells = rotations[type][0];
    for (const [dx,dy] of cells){
      ctx.fillStyle = colors[type];
      ctx.fillRect(x + dx*scale, y + dy*scale, scale, scale);
    }
  }
  function render(){
    ctx.fillStyle = '#111111';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#000000';
    ctx.fillRect(fieldX, fieldY, fieldW, fieldH);
    ctx.strokeStyle = '#555555';
    ctx.lineWidth = 2;
    ctx.strokeRect(fieldX+1, fieldY+1, fieldW-2, fieldH-2);
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 1;

    if (state.current && state.mode === 'PLAYING'){
      const gy = getGhostY();
      drawPiece(state.current, 0.3, 0, gy - state.current.y);
      drawPiece(state.current, 1);
    }

      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      for (const y of state.flashRows) ctx.fillRect(fieldX, fieldY + y*cell, fieldW, cell);

    ctx.fillText('NEXT', panelX, 45);
    ctx.strokeStyle = '#555555'; ctx.strokeRect(panelX, 60, 112, 112);
    if (state.nextType) drawPreview(state.nextType);

      ['SCORE', state.score.toString(), 200],
      ['LEVEL', state.level.toString(), 280],
      ['LINES', state.lines.toString(), 340],
      ['HIGH SCORE', state.high.toString(), 420],
    ];

      ctx.fillStyle = '#AAAAAA'; ctx.font = '14px sans-serif'; ctx.fillText(label, panelX, y);
      ctx.fillStyle = '#FFFFFF'; ctx.font = '20px monospace'; ctx.fillText(value, panelX, y + 26);
    }
    if (state.mode === 'IDLE'){
      ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center'; ctx.font = '48px sans-serif'; ctx.fillText('TETRIS', fieldX + fieldW/2, 200);

      let sx = fieldX + 20, sy = 250;
      for (let i=0;i<types.length;i++){ drawMiniPiece(types[i], sx + (i%4)*62, sy + Math.floor(i/4)*62, 16); }

    if (state.mode === 'PAUSED' || state.mode === 'GAME_OVER'){
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(fieldX, fieldY, fieldW, fieldH);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px sans-serif';
      ctx.fillText(state.mode === 'PAUSED' ? 'PAUSED' : 'GAME OVER', fieldX + fieldW/2, 270);
      if (state.mode === 'GAME_OVER'){
        ctx.font = '20px monospace';
        ctx.fillText('FINAL SCORE ' + state.score, fieldX + fieldW/2, 310);
        ctx.font = '18px sans-serif';
        ctx.fillText('Press Enter to Restart.', fieldX + fieldW/2, 345);

    }
  }
  function update(dt){

      if (!collides(state.current,0,1)) state.lockTimer = 0;

        if (state.lockTimer <= 0) state.lockTimer = 500;

          state.lockTimer -= dt;
          if (state.lockTimer <= 0) lockPiece();

    updateHigh();
  }
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['arrowleft','arrowright','arrowup','arrowdown',' ','a','d','w','s','z','p','enter'].includes(k) || e.key === ' ') e.preventDefault();

  });

    const k = e.key.toLowerCase();
    if (k === 'arrowdown' || k === 's') state.softDrop = false;

    render();
    if (state.mode === 'GAME_OVER') playSound('over');
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
