<!-- GAME: Snake | RUN: run4-gpt-isolated | BUILDER: claude-opus-4.6 | PLANNER: openai/gpt-5.4 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
canvas { display: block; border: 2px solid #1a1a1a; }
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 600, H = 600;
const CELL = 30, COLS = 20, ROWS = 20;
const GRID_OX = 0, GRID_OY = 0;

// ── State ─────────────────────────────────────────────────────────────────────
const STATE = { IDLE: 0, PLAYING: 1, GAME_OVER: 2 };
let state = STATE.IDLE;
let score = 0, hiScore = parseInt(localStorage.getItem('snake_hi') || '0');
let level = 1, applesEaten = 0;

let snake = [], dir = { x: 1, y: 0 }, nextDir = { x: 1, y: 0 };
let food = null, bonusFood = null;
let bonusTimer = 0;
let tickTimer = 0;
let tickRate = 0.15; // seconds per move

function getTickRate() {
  return Math.max(0.06, 0.15 - (level - 1) * 0.01);
}

function initGame() {
  snake = [];
  for (let i = 4; i >= 0; i--) snake.push({ x: 10 - i, y: 10 });
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0; level = 1; applesEaten = 0;
  tickRate = getTickRate();
  tickTimer = 0;
  placeFood();
  bonusFood = null;
  state = STATE.PLAYING;
}

function placeFood() {
  const empty = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const occupied = snake.some(s => s.x === c && s.y === r);
      if (!occupied) empty.push({ x: c, y: r });
    }
  if (!empty.length) return;
  food = empty[Math.floor(Math.random() * empty.length)];
}

function placeBonusFood() {
  const empty = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const occupied = snake.some(s => s.x === c && s.y === r);
      const isFoodCell = food && food.x === c && food.y === r;
      if (!occupied && !isFoodCell) empty.push({ x: c, y: r });
    }
  if (!empty.length) return;
  bonusFood = empty[Math.floor(Math.random() * empty.length)];
  bonusTimer = 5;
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {
    'ArrowUp':    { x:0,  y:-1 }, 'w': { x:0,  y:-1 }, 'W': { x:0,  y:-1 },
    'ArrowDown':  { x:0,  y:1  }, 's': { x:0,  y:1  }, 'S': { x:0,  y:1  },
    'ArrowLeft':  { x:-1, y:0  }, 'a': { x:-1, y:0  }, 'A': { x:-1, y:0  },
    'ArrowRight': { x:1,  y:0  }, 'd': { x:1,  y:0  }, 'D': { x:1,  y:0  },
  };
  if (map[e.key]) {
    const d = map[e.key];
    // No reversing
    if (!(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
    e.preventDefault();
  }
  if (e.key === 'Enter' || e.key === ' ') {
    if (state === STATE.IDLE || state === STATE.GAME_OVER) initGame();
  }
});

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== STATE.PLAYING) return;

  tickTimer += dt;
  if (tickTimer < tickRate) return;
  tickTimer -= tickRate;

  dir = { ...nextDir };

  const head = snake[0];
  let nx = head.x + dir.x;
  let ny = head.y + dir.y;

  // Wall collision
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
    gameOver(); return;
  }

  // Self collision
  if (snake.some(s => s.x === nx && s.y === ny)) {
    gameOver(); return;
  }

  snake.unshift({ x: nx, y: ny });

  let grew = false;

  // Food collision
  if (food && nx === food.x && ny === food.y) {
    score += 10;
    applesEaten++;
    grew = true;
    placeFood();
    // Level up every 5 apples
    const newLevel = Math.floor(applesEaten / 5) + 1;
    if (newLevel > level) {
      level = newLevel;
      tickRate = getTickRate();
    }
    // Bonus food chance
    if (!bonusFood && Math.random() < 0.3) placeBonusFood();
  }

  // Bonus food
  if (bonusFood && nx === bonusFood.x && ny === bonusFood.y) {
    score += 50;
    grew = true;
    bonusFood = null;
  }

  if (!grew) snake.pop();

  if (bonusFood) {
    bonusTimer -= tickRate;
    if (bonusTimer <= 0) bonusFood = null;
  }

  if (score > hiScore) { hiScore = score; localStorage.setItem('snake_hi', hiScore); }
}

function gameOver() {
  state = STATE.GAME_OVER;
  if (score > hiScore) { hiScore = score; localStorage.setItem('snake_hi', hiScore); }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawCell(x, y, color, radius = 3) {
  const px = GRID_OX + x * CELL, py = GRID_OY + y * CELL;
  const pad = 1;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, radius);
  ctx.fill();
}

function draw() {
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = '#161616';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
  }

  if (state === STATE.IDLE) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#4CAF50';
    ctx.font = 'bold 54px monospace';
    ctx.fillText('SNAKE', W / 2, 220);
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px monospace';
    ctx.fillText('WASD or Arrow Keys', W / 2, 290);
    ctx.fillText('Eat food, grow longer', W / 2, 325);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '22px monospace';
    ctx.fillText('Press Enter to Start', W / 2, 395);
    ctx.textAlign = 'left';
    return;
  }

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const r = Math.round(76 * (1 - t * 0.5));
    const g = Math.round(175 * (1 - t * 0.3));
    const b = Math.round(80 * (1 - t * 0.2));
    drawCell(seg.x, seg.y, `rgb(${r},${g},${b})`, i === 0 ? 6 : 3);
  });

  // Eyes on head
  if (snake.length > 0) {
    const hx = GRID_OX + snake[0].x * CELL + CELL / 2;
    const hy = GRID_OY + snake[0].y * CELL + CELL / 2;
    const eyeOff = 5;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath(); ctx.arc(hx + dir.y * eyeOff - dir.x * 3, hy + dir.x * eyeOff - dir.y * 3, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - dir.y * eyeOff - dir.x * 3, hy - dir.x * eyeOff - dir.y * 3, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(hx + dir.y * eyeOff - dir.x * 3 + dir.x, hy + dir.x * eyeOff - dir.y * 3 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - dir.y * eyeOff - dir.x * 3 + dir.x, hy - dir.x * eyeOff - dir.y * 3 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
  }

  // Food
  if (food) {
    const fx = GRID_OX + food.x * CELL + CELL / 2;
    const fy = GRID_OY + food.y * CELL + CELL / 2;
    ctx.fillStyle = '#FF4136';
    ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 - 3, 0, Math.PI * 2); ctx.fill();
    // Stem
    ctx.strokeStyle = '#228B22';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx, fy - CELL/2 + 3); ctx.lineTo(fx + 4, fy - CELL/2 - 2); ctx.stroke();
  }

  // Bonus food (star/diamond)
  if (bonusFood) {
    const bx = GRID_OX + bonusFood.x * CELL + CELL / 2;
    const by = GRID_OY + bonusFood.y * CELL + CELL / 2;
    const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 150);
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
      const r = i % 2 === 0 ? CELL / 2 - 2 : CELL / 4;
      if (i === 0) ctx.moveTo(bx + r * Math.cos(angle), by + r * Math.sin(angle));
      else ctx.lineTo(bx + r * Math.cos(angle), by + r * Math.sin(angle));
    }
    ctx.closePath(); ctx.fill();
    // Timer bar
    const barW = (bonusTimer / 5) * CELL;
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(GRID_OX + bonusFood.x * CELL + 2, GRID_OY + bonusFood.y * CELL + CELL - 5, barW - 4, 3);
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 36);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 10, 23);
  ctx.textAlign = 'center';
  ctx.fillText('Level ' + level, W / 2, 23);
  ctx.textAlign = 'right';
  ctx.fillText('Best: ' + hiScore, W - 10, 23);
  ctx.textAlign = 'left';

  if (state === STATE.GAME_OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FF4136';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('GAME OVER', W / 2, 250);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '24px monospace';
    ctx.fillText('Score: ' + score, W / 2, 305);
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px monospace';
    ctx.fillText('Length: ' + snake.length, W / 2, 340);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('Press Enter to Restart', W / 2, 400);
    ctx.textAlign = 'left';
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
