<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Constants ─────────────────────────────────────────────────────────────────
const W = 800, H = 600;
const PADDLE_W = 12, PADDLE_H = 84;
const BALL_SIZE = 12;
const PLAYER_X = 32, CPU_X = 756;
const PADDLE_SPEED = 420;
const BALL_INIT_SPEED = 280;
const BALL_MAX_SPEED = 560;
const WIN_SCORE = 7;

// ── State ─────────────────────────────────────────────────────────────────────
const STATE = { IDLE: 0, PLAYING: 1, POINT: 2, GAME_OVER: 3 };
let state = STATE.IDLE;
let playerScore = 0, cpuScore = 0;
let stateTimer = 0;

let player = { x: PLAYER_X, y: H / 2 - PADDLE_H / 2, dy: 0 };
let cpu    = { x: CPU_X,    y: H / 2 - PADDLE_H / 2 };
let ball   = { x: W / 2, y: H / 2, vx: 0, vy: 0 };

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === 'Enter' || e.key === ' ') && (state === STATE.IDLE || state === STATE.GAME_OVER)) {
    startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function serveBall(toRight) {
  const angle = (Math.random() * 0.8 - 0.4); // -0.4 to 0.4 rad
  const dir = toRight ? 1 : -1;
  ball.x = W / 2; ball.y = H / 2;
  ball.vx = dir * BALL_INIT_SPEED * Math.cos(angle);
  ball.vy = BALL_INIT_SPEED * Math.sin(angle);
}

function startGame() {
  playerScore = 0; cpuScore = 0;
  player.y = H / 2 - PADDLE_H / 2;
  cpu.y    = H / 2 - PADDLE_H / 2;
  serveBall(Math.random() > 0.5);
  state = STATE.PLAYING;
}

function update(dt) {
  if (state !== STATE.PLAYING) {
    if (state === STATE.POINT) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        if (playerScore >= WIN_SCORE || cpuScore >= WIN_SCORE) { state = STATE.GAME_OVER; }
        else { serveBall(ball.vx < 0); state = STATE.PLAYING; }
      }
    }
    return;
  }

  // Player paddle
  const moving = keys['ArrowUp'] || keys['w'] || keys['W'] || keys['ArrowDown'] || keys['s'] || keys['S'];
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= PADDLE_SPEED * dt;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += PADDLE_SPEED * dt;
  player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

  // CPU AI — track ball with slight lag
  const cpuCenter = cpu.y + PADDLE_H / 2;
  const targetY = ball.y;
  const cpuSpeed = 340 + level() * 10;
  if (cpuCenter < targetY - 8) cpu.y += cpuSpeed * dt;
  else if (cpuCenter > targetY + 8) cpu.y -= cpuSpeed * dt;
  cpu.y = Math.max(0, Math.min(H - PADDLE_H, cpu.y));

  // Ball movement
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Top / bottom wall bounce
  if (ball.y <= 0) { ball.y = 0; ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL_SIZE >= H) { ball.y = H - BALL_SIZE; ball.vy = -Math.abs(ball.vy); }

  // Player paddle collision
  if (ball.vx < 0 &&
      ball.x <= PLAYER_X + PADDLE_W &&
      ball.x + BALL_SIZE >= PLAYER_X &&
      ball.y + BALL_SIZE >= player.y &&
      ball.y <= player.y + PADDLE_H) {
    ball.x = PLAYER_X + PADDLE_W;
    const hitPos = (ball.y + BALL_SIZE / 2 - player.y) / PADDLE_H; // 0-1
    const angle = (hitPos - 0.5) * (Math.PI * 0.75); // ±67.5°
    const speed = Math.min(Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.05, BALL_MAX_SPEED);
    ball.vx = speed * Math.cos(angle);
    ball.vy = speed * Math.sin(angle);
    if (ball.vx < 0) ball.vx = -ball.vx; // always go right after player hit
  }

  // CPU paddle collision
  if (ball.vx > 0 &&
      ball.x + BALL_SIZE >= CPU_X &&
      ball.x <= CPU_X + PADDLE_W &&
      ball.y + BALL_SIZE >= cpu.y &&
      ball.y <= cpu.y + PADDLE_H) {
    ball.x = CPU_X - BALL_SIZE;
    const hitPos = (ball.y + BALL_SIZE / 2 - cpu.y) / PADDLE_H;
    const angle = (hitPos - 0.5) * (Math.PI * 0.75);
    const speed = Math.min(Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) * 1.05, BALL_MAX_SPEED);
    ball.vx = -speed * Math.cos(angle);
    ball.vy = speed * Math.sin(angle);
    if (ball.vx > 0) ball.vx = -ball.vx;
  }

  // Scoring
  if (ball.x < -BALL_SIZE) {
    cpuScore++;
    stateTimer = 1.5; state = STATE.POINT;
  }
  if (ball.x > W + BALL_SIZE) {
    playerScore++;
    stateTimer = 1.5; state = STATE.POINT;
  }
}

function level() { return playerScore + cpuScore; }

function draw() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Centre line
  ctx.setLineDash([10, 10]);
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.setLineDash([]);

  if (state === STATE.IDLE) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 56px monospace';
    ctx.fillText('PONG', W / 2, 220);
    ctx.font = '22px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('W/S or ↑/↓ to move', W / 2, 290);
    ctx.fillText('First to 7 wins', W / 2, 330);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('Press Enter to Start', W / 2, 400);
    ctx.textAlign = 'left';
    return;
  }

  // Scores
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 48px monospace';
  ctx.fillText(playerScore, W / 4, 70);
  ctx.fillText(cpuScore,    3 * W / 4, 70);
  ctx.textAlign = 'left';

  // Labels
  ctx.fillStyle = '#555555';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', W / 4, 95);
  ctx.fillText('CPU', 3 * W / 4, 95);
  ctx.textAlign = 'left';

  // Paddles
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(player.x, player.y, PADDLE_W, PADDLE_H);
  ctx.fillRect(cpu.x,    cpu.y,    PADDLE_W, PADDLE_H);

  // Ball
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

  if (state === STATE.GAME_OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = playerScore >= WIN_SCORE ? '#00FF88' : '#FF4444';
    ctx.font = 'bold 48px monospace';
    ctx.fillText(playerScore >= WIN_SCORE ? 'YOU WIN!' : 'CPU WINS!', W / 2, 260);
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '22px monospace';
    ctx.fillText(`${playerScore} – ${cpuScore}`, W / 2, 310);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('Press Enter to Play Again', W / 2, 380);
    ctx.textAlign = 'left';
  }

  if (state === STATE.POINT) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFFF00';
    ctx.font = '28px monospace';
    ctx.fillText('POINT!', W / 2, H / 2);
    ctx.textAlign = 'left';
  }
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
