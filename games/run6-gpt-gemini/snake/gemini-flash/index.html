<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #111111;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const CANVAS_SIZE = 600;
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        const INSET = 1;
        const INITIAL_SPEED = 8;
        const MAX_SPEED = 15;
        const SPEED_INC = 0.5;

        // States
        const STATE_IDLE = 'IDLE';
        const STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED';
        const STATE_GAME_OVER = 'GAME_OVER';

        let currentState = STATE_IDLE;
        let score = 0;
        let highScore = localStorage.getItem('snake6HighScore') || 0;
        let lastTime = 0;
        let tickAccumulator = 0;
        let currentSpeed = INITIAL_SPEED;

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: -1, y: -1 };
        let inputProcessedFlag = false;

        function resetGame() {
            score = 0;
            currentSpeed = INITIAL_SPEED;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            tickAccumulator = 0;
            inputProcessedFlag = false;
            spawnFood();
            currentState = STATE_PLAYING;
        }

        function spawnFood() {
            let availableCells = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    let isSnake = false;
                    for (let segment of snake) {
                        if (segment.x === x && segment.y === y) {
                            isSnake = true;
                            break;
                        }
                    }
                    if (!isSnake) availableCells.push({ x, y });
                }
            }
            if (availableCells.length === 0) {
                currentState = STATE_GAME_OVER; // Board full
                return;
            }
            food = availableCells[Math.floor(Math.random() * availableCells.length)];
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) resetGame();
            }
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }

            if (currentState === STATE_PLAYING && !inputProcessedFlag) {
                if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && direction.y === 0) {
                    nextDirection = { x: 0, y: -1 };
                    inputProcessedFlag = true;
                } else if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && direction.y === 0) {
                    nextDirection = { x: 0, y: 1 };
                    inputProcessedFlag = true;
                } else if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && direction.x === 0) {
                    nextDirection = { x: -1, y: 0 };
                    inputProcessedFlag = true;
                } else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && direction.x === 0) {
                    nextDirection = { x: 1, y: 0 };
                    inputProcessedFlag = true;
                }
            }
        });

        function tick() {
            direction = nextDirection;
            inputProcessedFlag = false;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall Collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                currentState = STATE_GAME_OVER;
                return;
            }

            // Self Collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    currentState = STATE_GAME_OVER;
                    return;
                }
            }

            snake.unshift(head);

            // Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > highScore) { 
                    highScore = score; 
                    localStorage.setItem('snake6HighScore', highScore); 
                }
                currentSpeed = Math.min(currentSpeed + SPEED_INC, MAX_SPEED);
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = '#1A1A1A';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function draw() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#4CAF50';
                ctx.textAlign = 'center';
                ctx.font = '56px monospace';
                ctx.fillText('SNAKE', 300, 236);
                ctx.font = '20px monospace';
                ctx.fillStyle = '#AAAAAA';
                ctx.fillText('Press Enter to Start', 300, 320);
                return;
            }

            drawGrid();

            // Food
            ctx.fillStyle = '#F44336';
            ctx.fillRect(food.x * CELL_SIZE + INSET, food.y * CELL_SIZE + INSET, CELL_SIZE - 2 * INSET, CELL_SIZE - 2 * INSET);

            // Snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4CAF50' : '#2E7D32';
                ctx.fillRect(segment.x * CELL_SIZE + INSET, segment.y * CELL_SIZE + INSET, CELL_SIZE - 2 * INSET, CELL_SIZE - 2 * INSET);
            });

            // HUD
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'right';
            ctx.fillText(`BEST: ${highScore}`, 590, 24);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', 300, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '40px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 300, 260);
                ctx.font = '24px monospace';
                ctx.fillText(`Final Score: ${score}`, 300, 310);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#AAAAAA';
                ctx.fillText('Press Enter to Restart', 300, 370);
            }
        }

        function gameLoop(timestamp) {
            if (lastTime === 0) { lastTime = timestamp; requestAnimationFrame(gameLoop); return; }
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (currentState === STATE_PLAYING) {
                tickAccumulator += deltaTime;
                const tickDuration = 1 / currentSpeed;
                while (tickAccumulator >= tickDuration) {
                    tick();
                    tickAccumulator -= tickDuration;
                }
            }

            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
