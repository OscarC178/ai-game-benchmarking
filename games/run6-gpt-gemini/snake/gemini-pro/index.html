<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        body {
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #FFFFFF;
            font-family: monospace;
        }
        canvas {
            background-color: #111111;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Note: Spec Section 8 and 11 say lives/health not applicable, but T11 checklists it. 
        // Snake conventionally has 1 life, game over on hit. I will implement single-run survival per standard snake logic and spec overview.

        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3,
            VICTORY: 4 // Board full
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;

        const GRID_SIZE = 20;
        const CELL_SIZE = 30; // 600 / 20

        const DIR = {
            UP: {x: 0, y: -1},
            DOWN: {x: 0, y: 1},
            LEFT: {x: -1, y: 0},
            RIGHT: {x: 1, y: 0}
        };

        // Input
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            w: false,
            W: false,
            s: false,
            S: false,
            a: false,
            A: false,
            d: false,
            D: false
        };

        // Prevent default scrolling for arrows
        window.addEventListener('keydown', (e) => {
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.key) > -1) {
                e.preventDefault();
            }
        });

        let nextDir = null;

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            
            if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER || currentState === STATE.VICTORY) {
                    initGame();
                    currentState = STATE.PLAYING;
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            }

            // Input buffering (T07)
            if (currentState === STATE.PLAYING) {
                let requestedDir = null;
                if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') requestedDir = DIR.UP;
                else if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') requestedDir = DIR.DOWN;
                else if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') requestedDir = DIR.LEFT;
                else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') requestedDir = DIR.RIGHT;

                if (requestedDir) {
                    // Prevent direct reversal
                    // If length > 1, prevent going opposite to current dir.
                    if (snake.length > 1) {
                        if (requestedDir.x === -currentDir.x && requestedDir.x !== 0) return;
                        if (requestedDir.y === -currentDir.y && requestedDir.y !== 0) return;
                    }
                    
                    // Buffer only the first valid turn per tick
                    if (!nextDir) {
                        nextDir = requestedDir;
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Entities
        let snake = [];
        let currentDir = DIR.RIGHT;
        let food = null;
        
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        
        // Timing
        let tickRate = 8; // ticks per second
        let tickInterval = 1 / tickRate;
        let tickTimer = 0;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        function spawnFood() {
            // Find empty cells
            let emptyCells = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let isOccupied = snake.some(segment => segment.x === x && segment.y === y);
                    if (!isOccupied) {
                        emptyCells.push({x: x, y: y});
                    }
                }
            }

            if (emptyCells.length === 0) {
                // Board full! (T05 rule 8 completion)
                updateHighScore();
                currentState = STATE.VICTORY;
                return;
            }

            let randomIndex = Math.floor(Math.random() * emptyCells.length);
            food = emptyCells[randomIndex];
        }

        function initGame() {
            food = null;
            snake = [
                {x: 10, y: 10}, // Head
                {x: 9, y: 10},  // Body 1
                {x: 8, y: 10}   // Body 2
            ];
            currentDir = DIR.RIGHT;
            nextDir = null;
            score = 0;
            tickRate = 8;
            tickInterval = 1 / tickRate;
            tickTimer = 0;
            spawnFood();
        }

        let lastTime = 0;

        function update(dt) {
            if (currentState === STATE.PLAYING) {
                tickTimer += dt;
                
                if (tickTimer >= tickInterval) {
                    tickTimer -= tickInterval; 
                    
                    // Apply buffered input
                    if (nextDir) {
                        currentDir = nextDir;
                        nextDir = null;
                    }

                    // Move snake
                    const head = snake[0];
                    const nextHead = {
                        x: head.x + currentDir.x,
                        y: head.y + currentDir.y
                    };

                    // Check collisions (T09)
                    // 1. Wall collision
                    if (nextHead.x < 0 || nextHead.x >= GRID_SIZE || nextHead.y < 0 || nextHead.y >= GRID_SIZE) {
                        updateHighScore();
                        currentState = STATE.GAME_OVER;
                        return; // Stop update loop
                    }

                    // 2. Self collision. Check all segments except the current tail
                    let hitSelf = false;
                    for (let i = 0; i < snake.length - 1; i++) {
                        if (nextHead.x === snake[i].x && nextHead.y === snake[i].y) {
                            hitSelf = true;
                            break;
                        }
                    }

                    if (hitSelf) {
                        updateHighScore();
                        currentState = STATE.GAME_OVER;
                        return; 
                    }

                    // Insert nextHead at beginning
                    snake.unshift(nextHead);

                    // 3. Food collision
                    if (food && nextHead.x === food.x && nextHead.y === food.y) {
                        // Grow (don't pop the tail)
                        score += 10;
                        tickRate = Math.min(15, tickRate + 0.5);
                        tickInterval = 1 / tickRate;
                        spawnFood();
                    } else {
                        // Normal move, pop tail
                        snake.pop();
                    }
                }
            }
        }

        function drawGrid() {
            ctx.strokeStyle = '#1A1A1A';
            ctx.lineWidth = 1;
            
            ctx.beginPath();
            for (let x = 0; x <= canvas.width; x += CELL_SIZE) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }
            for (let y = 0; y <= canvas.height; y += CELL_SIZE) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function draw() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            if (currentState !== STATE.IDLE) {
                // Draw Food
                if (currentState !== STATE.VICTORY && food) {
                    ctx.fillStyle = '#F44336';
                    // 28x28 inset in 30x30 cell (+1 offset)
                    ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, 28, 28);
                }

                // Draw Snake
                for (let i = 0; i < snake.length; i++) {
                    const segment = snake[i];
                    if (i === 0) {
                        ctx.fillStyle = '#4CAF50'; // Head
                    } else {
                        ctx.fillStyle = '#2E7D32'; // Body
                    }
                    ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, 28, 28);
                }

                // UI
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '16px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`Score: ${score}`, 10, 10);
                
                ctx.textAlign = 'right';
                ctx.fillText(`Best: ${highScore}`, canvas.width - 10, 10);
            }

            // Overlays
            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#4CAF50';
                ctx.font = '56px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SNAKE', canvas.width / 2, 236);

                ctx.fillStyle = '#FFFFFF';
                ctx.font = '24px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 320);
            } else if (currentState === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '36px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, 250);
                
                ctx.font = '24px monospace';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 310);
                ctx.fillText('Press Enter to restart', canvas.width / 2, 360);
            } else if (currentState === STATE.VICTORY) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#4CAF50';
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('YOU WIN!', canvas.width / 2, 250);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '24px monospace';
                ctx.fillText(`Perfect Score: ${score}`, canvas.width / 2, 310);
                ctx.fillText('Press Enter to restart', canvas.width / 2, 360);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            const safeDt = Math.min(dt, 0.1); 
            lastTime = timestamp;

            update(safeDt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
