<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #FFFFFF;
            font-family: monospace;
        }
        canvas {
            background-color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3,
            SERVE_DELAY: 4
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;

        // Input
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            w: false,
            W: false,
            s: false,
            S: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            
            if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    resetMatch();
                    currentState = STATE.SERVE_DELAY;
                    serveTimer = 0.9;
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING || currentState === STATE.SERVE_DELAY) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Entities
        const pScoreConfig = { y: 54, font: '48px monospace' };

        const player = {
            x: 32,
            y: 258,
            width: 12,
            height: 84,
            speed: 420,
            score: 0,
            color: '#FFFFFF'
        };

        const cpu = {
            x: 756,
            y: 258,
            width: 12,
            height: 84,
            speed: 320,
            score: 0,
            color: '#FFFFFF',
            delay: 0.08,
            targetY: 258,
            timer: 0
        };

        const ball = {
            x: 394,
            y: 294,
            size: 12,
            baseSpeed: 340,
            speed: 340,
            maxSpeed: 620,
            vx: 0,
            vy: 0,
            color: '#FFFFFF'
        };

        let serveTimer = 0;
        let serveToPlayer = true;
        let p1WonMessage = "";

        // T10 / T11 - Spec indicates lives/health not applicable to Pong, but task checklist has boilerplate.
        // Handled by standard Pong up-to-7 score logic.
        let highScore = parseInt(localStorage.getItem('pongHighScore')) || 0;

        function updateHighScore() {
            const maxScore = Math.max(player.score, cpu.score);
            if (maxScore > highScore) {
                highScore = maxScore;
                localStorage.setItem('pongHighScore', highScore);
            }
        }

        function resetMatch() {
            player.score = 0;
            cpu.score = 0;
            player.y = 258;
            cpu.y = 258;
            serveToPlayer = true;
            resetBall();
        }

        function resetBall() {
            ball.x = 394;
            ball.y = 294;
            ball.speed = ball.baseSpeed;
            ball.vx = 0;
            ball.vy = 0;
        }

        function launchBall() {
            // Random angle between -28 and +28 deg (0 is straight left/right)
            const angleDeg = (Math.random() * 56) - 28;
            const angleRad = angleDeg * Math.PI / 180;
            
            ball.vx = ball.speed * Math.cos(angleRad);
            ball.vy = ball.speed * Math.sin(angleRad);
            
            if (serveToPlayer) {
                ball.vx = -Math.abs(ball.vx);
            } else {
                ball.vx = Math.abs(ball.vx);
            }
            currentState = STATE.PLAYING;
        }

        function checkWin() {
            if (player.score >= 7) {
                p1WonMessage = "YOU WIN";
                updateHighScore();
                currentState = STATE.GAME_OVER;
                return true;
            } else if (cpu.score >= 7) {
                p1WonMessage = "GAME OVER";
                updateHighScore();
                currentState = STATE.GAME_OVER;
                return true;
            }
            return false;
        }

        let lastTime = 0;

        function update(dt) {
            if (currentState === STATE.SERVE_DELAY) {
                serveTimer -= dt;
                if (serveTimer <= 0) {
                    launchBall();
                }
            } else if (currentState === STATE.PLAYING) {
                // Player movement
                let pDir = 0;
                if (keys.ArrowUp || keys.w || keys.W) pDir = -1;
                else if (keys.ArrowDown || keys.s || keys.S) pDir = 1;

                player.y += pDir * player.speed * dt;

                // clamp player
                if (player.y < 0) player.y = 0;
                if (player.y > canvas.height - player.height) player.y = canvas.height - player.height;

                // CPU tracking with delay
                cpu.timer += dt;
                if (cpu.timer >= cpu.delay) {
                    // "Reaction" snapshot - where is the ball now?
                    // target center of paddle to ball y (adjusted for center of ball)
                    cpu.targetY = ball.y + ball.size / 2 - cpu.height / 2;
                    cpu.timer = 0;
                }

                // move CPU towards target
                if (cpu.y < cpu.targetY - 2) {
                    cpu.y += cpu.speed * dt;
                } else if (cpu.y > cpu.targetY + 2) {
                    cpu.y -= cpu.speed * dt;
                }
                
                // clamp CPU
                if (cpu.y < 0) cpu.y = 0;
                if (cpu.y > canvas.height - cpu.height) cpu.y = canvas.height - cpu.height;

                // Ball movement
                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Wall collisions (top / bottom)
                if (ball.y <= 0) {
                    ball.y = 0;
                    ball.vy = Math.abs(ball.vy);
                } else if (ball.y + ball.size >= canvas.height) {
                    ball.y = canvas.height - ball.size;
                    ball.vy = -Math.abs(ball.vy);
                }

                // Paddle collisions (AABB)
                // Left Paddle
                if (ball.vx < 0 && 
                    ball.x <= player.x + player.width && 
                    ball.x + ball.size >= player.x &&
                    ball.y + ball.size >= player.y &&
                    ball.y <= player.y + player.height) {
                    
                    ball.x = player.x + player.width; // Push out
                    
                    // Bounce shaping
                    const hitOffset = (ball.y + ball.size / 2) - (player.y + player.height / 2);
                    const normOffset = hitOffset / (player.height / 2); // -1 to 1
                    const angleRad = normOffset * (Math.PI / 4); // max 45 degrees
                    
                    ball.speed = Math.min(ball.maxSpeed, ball.speed + 22);
                    ball.vx = ball.speed * Math.cos(angleRad); // always positive (right)
                    ball.vy = ball.speed * Math.sin(angleRad);
                }

                // Right Paddle
                if (ball.vx > 0 && 
                    ball.x + ball.size >= cpu.x && 
                    ball.x <= cpu.x + cpu.width &&
                    ball.y + ball.size >= cpu.y &&
                    ball.y <= cpu.y + cpu.height) {
                    
                    ball.x = cpu.x - ball.size; // Push out
                    
                    // Bounce shaping
                    const hitOffset = (ball.y + ball.size / 2) - (cpu.y + cpu.height / 2);
                    const normOffset = hitOffset / (cpu.height / 2);
                    const angleRad = normOffset * (Math.PI / 4);
                    
                    ball.speed = Math.min(ball.maxSpeed, ball.speed + 22);
                    ball.vx = -ball.speed * Math.cos(angleRad); // always negative (left)
                    ball.vy = ball.speed * Math.sin(angleRad);
                }

                // Scoring
                if (ball.x + ball.size < 0) {
                    // CPU point
                    cpu.score++;
                    serveToPlayer = false; // logic spec rule 6: relaunch toward player who conceded
                    if (!checkWin()) {
                        resetBall();
                        currentState = STATE.SERVE_DELAY;
                        serveTimer = 0.9;
                    }
                } else if (ball.x > canvas.width) {
                    // Player point
                    player.score++;
                    serveToPlayer = true;
                    if (!checkWin()) {
                        resetBall();
                        currentState = STATE.SERVE_DELAY;
                        serveTimer = 0.9;
                    }
                }
            }
        }

        function drawNet() {
            ctx.fillStyle = '#3A3A3A';
            const dashHeight = 16;
            const gap = 10;
            const netWidth = 4;
            const x = canvas.width / 2 - netWidth / 2;
            
            for (let y = 0; y < canvas.height; y += dashHeight + gap) {
                ctx.fillRect(x, y, netWidth, dashHeight);
            }
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawNet();

            if (currentState !== STATE.IDLE) {
                // Paddles
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                ctx.fillStyle = cpu.color;
                ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);

                // Ball
                if (currentState !== STATE.GAME_OVER) { // hide ball on game over
                    ctx.fillStyle = ball.color;
                    ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
                }

                // Scores
                ctx.fillStyle = '#FFFFFF';
                ctx.font = pScoreConfig.font;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(player.score, 300, pScoreConfig.y);
                ctx.fillText(cpu.score, 500, pScoreConfig.y);
                
                // High Score
                ctx.fillStyle = '#888888';
                ctx.font = '12px monospace';
                ctx.fillText(`API Best: ${highScore}`, canvas.width / 2, 10);
            }

            // UI Overlays
            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '64px monospace';
                ctx.fillText('PONG', canvas.width / 2, 210);

                ctx.font = '24px monospace'; // Using 24 instead of sizing down too small, spec didn't strictly mandate px for start prompt
                ctx.fillText('Press Enter to Start', canvas.width / 2, 344);
            } else if (currentState === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '36px monospace';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '48px monospace';
                ctx.fillText(p1WonMessage, canvas.width / 2, 250);
                
                ctx.font = '24px monospace';
                ctx.fillText(`Final Score: ${player.score} - ${cpu.score}`, canvas.width / 2, 310);
                ctx.fillText('Press Enter to restart', canvas.width / 2, 360);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            // Cap dt to prevent massive jumps if tab is backgrounded
            const safeDt = Math.min(dt, 0.1); 
            lastTime = timestamp;

            update(safeDt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
