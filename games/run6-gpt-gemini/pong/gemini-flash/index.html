<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 84;
        const PLAYER_SPEED = 420;
        const CPU_SPEED_MAX = 320;
        const CPU_DELAY_MS = 80;
        const BALL_SIZE = 12;
        const INITIAL_BALL_SPEED = 340;
        const BALL_SPEED_INC = 22;
        const BALL_SPEED_MAX = 620;
        const WIN_SCORE = 7;

        // States
        const STATE_IDLE = 'IDLE';
        const STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED';
        const STATE_GAME_OVER = 'GAME_OVER';

        let currentState = STATE_IDLE;
        let scorePlayer = 0;
        let scoreCpu = 0;
        let highScore = localStorage.getItem('pong6HighScore') || 0;
        let lastTime = 0;
        let serveTimer = 0;
        let cpuTargetY = (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2;
        let cpuTargetHistory = [];

        const player = { x: 32, y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2, w: PADDLE_WIDTH, h: PADDLE_HEIGHT };
        const cpu = { x: 756, y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2, w: PADDLE_WIDTH, h: PADDLE_HEIGHT };
        const ball = { x: 394, y: 294, w: BALL_SIZE, h: BALL_SIZE, vx: 0, vy: 0, speed: INITIAL_BALL_SPEED };

        function drawDivider() {
            ctx.strokeStyle = '#3A3A3A';
            ctx.lineWidth = 4;
            ctx.setLineDash([16, 10]);
            ctx.beginPath();
            ctx.moveTo(CANVAS_WIDTH / 2, 0);
            ctx.lineTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function resetBall(scoredOnPlayer) {
            ball.x = 394;
            ball.y = 294;
            ball.vx = 0;
            ball.vy = 0;
            ball.speed = INITIAL_BALL_SPEED;
            serveTimer = 0.9;

            setTimeout(() => {
                if (currentState !== STATE_PLAYING) return;
                const direction = scoredOnPlayer ? -1 : 1;
                const angle = (Math.random() * 56 - 28) * Math.PI / 180;
                ball.vx = direction * ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
                serveTimer = 0;
            }, 900);
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') {
                if (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) {
                    scorePlayer = 0; scoreCpu = 0;
                    currentState = STATE_PLAYING;
                    resetBall(Math.random() > 0.5);
                }
            }
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function update(deltaTime) {
            if (currentState !== STATE_PLAYING) return;

            // Player Movement
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= PLAYER_SPEED * deltaTime;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += PLAYER_SPEED * deltaTime;
            player.y = Math.max(0, Math.min(CANVAS_HEIGHT - player.h, player.y));

            // CPU AI with Reaction Delay
            cpuTargetHistory.push({ y: ball.y + ball.h / 2, time: Date.now() });
            const delayedTime = Date.now() - CPU_DELAY_MS;
            while (cpuTargetHistory.length > 0 && cpuTargetHistory[0].time < delayedTime) {
                cpuTargetY = cpuTargetHistory.shift().y;
            }

            const cpuCenterY = cpu.y + cpu.h / 2;
            let cpuMove = cpuTargetY - cpuCenterY;
            const maxMove = CPU_SPEED_MAX * deltaTime;
            if (Math.abs(cpuMove) > maxMove) cpuMove = Math.sign(cpuMove) * maxMove;
            cpu.y += cpuMove;
            cpu.y = Math.max(0, Math.min(CANVAS_HEIGHT - cpu.h, cpu.y));

            if (serveTimer > 0) {
                serveTimer -= deltaTime;
                return;
            }

            // Ball Movement
            ball.x += ball.vx * deltaTime;
            ball.y += ball.vy * deltaTime;

            // Wall Collision
            if (ball.y <= 0 || ball.y + ball.h >= CANVAS_HEIGHT) {
                ball.vy *= -1;
                ball.y = ball.y <= 0 ? 0 : CANVAS_HEIGHT - ball.h;
            }

            // Paddle Collision
            let paddleHit = null;
            if (ball.vx < 0 && ball.x < player.x + player.w && ball.x + ball.w > player.x && ball.y < player.y + player.h && ball.y + ball.h > player.y) {
                paddleHit = player;
            } else if (ball.vx > 0 && ball.x < cpu.x + cpu.w && ball.x + ball.w > cpu.x && ball.y < cpu.y + cpu.h && ball.y + ball.h > cpu.y) {
                paddleHit = cpu;
            }

            if (paddleHit) {
                ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_MAX);
                const relY = (paddleHit.y + paddleHit.h / 2) - (ball.y + ball.h / 2);
                const normRelY = relY / (paddleHit.h / 2);
                const angle = normRelY * (Math.PI / 4); // 45 deg max
                ball.vx = (paddleHit === player ? 1 : -1) * ball.speed * Math.cos(angle);
                ball.vy = -ball.speed * Math.sin(angle);
                ball.x = paddleHit === player ? player.x + player.w : cpu.x - ball.w;
            }

            // Score Detection (Point awarded only after full ball exits)
            if (ball.x + ball.w < 0) {
                scoreCpu++;
                if (scoreCpu >= WIN_SCORE) currentState = STATE_GAME_OVER;
                else resetBall(true);
            } else if (ball.x > CANVAS_WIDTH) {
                scorePlayer++;
                if (scorePlayer > highScore) { highScore = scorePlayer; localStorage.setItem('pong6HighScore', highScore); }
                if (scorePlayer >= WIN_SCORE) currentState = STATE_GAME_OVER;
                else resetBall(false);
            }
        }

        function draw() {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
                ctx.font = '64px monospace'; ctx.fillText('PONG', 400, 210);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Start', 400, 344);
                return;
            }

            drawDivider();

            // High Score
            ctx.fillStyle = '#888888'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
            ctx.fillText(`BEST: ${highScore}`, 400, 20);

            // Scores
            ctx.fillStyle = '#FFFFFF'; ctx.font = '48px monospace';
            ctx.fillText(scorePlayer, 300, 54);
            ctx.fillText(scoreCpu, 500, 54);

            // Paddles and Ball
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);
            ctx.fillRect(ball.x, ball.y, ball.w, ball.h);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFFFFF'; ctx.font = '36px monospace'; ctx.textAlign = 'center';
                ctx.fillText('PAUSED', 400, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFFFFF'; ctx.font = '48px monospace'; ctx.textAlign = 'center';
                ctx.fillText(scorePlayer >= WIN_SCORE ? 'YOU WIN' : 'GAME OVER', 400, 250);
                ctx.font = '24px monospace'; ctx.fillText(`${scorePlayer} - ${scoreCpu}`, 400, 310);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAAAAA'; ctx.fillText('Press Enter to Restart', 400, 370);
            }
        }

        function gameLoop(timestamp) {
            const deltaTime = (timestamp - lastTime) / 1000;
            if (lastTime === 0) { lastTime = timestamp; requestAnimationFrame(gameLoop); return; }
            lastTime = timestamp;
            update(Math.min(deltaTime, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
