<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const SHIP_ROT_SPEED = 270, SHIP_THRUST = 200, MAX_SPEED = 350, SHIP_FRICTION = 0.99;
        const BULLET_SPEED = 500, BULLET_LIFE = 0.8, MAX_BULLETS = 4;
        const RESPAWN_TIME = 2, INVULNERABILITY_TIME = 2;

        // States
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        // Var
        let score = 0, lives = 3, wave = 1, highScore = localStorage.getItem('asteroids6HighScore') || 0;
        let lastTime = 0, keys = {};
        let ship = { x: 400, y: 300, vx: 0, vy: 0, rot: -Math.PI/2, active: true, invuln: 0, deadTime: 0 };
        let asteroids = [], bullets = [], ufo = null, ufoBullets = [], ufoTimer = 25;

        function createAsteroid(x, y, r, speedMult = 1) {
            const verts = Math.floor(Math.random() * 5) + 10;
            const shape = [];
            for (let i = 0; i < verts; i++) {
                const angle = (i / verts) * Math.PI * 2;
                const dist = r * (0.7 + Math.random() * 0.6);
                shape.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
            }
            const angle = Math.random() * Math.PI * 2;
            const speed = (r === 40 ? 50 + Math.random() * 30 : r === 20 ? 80 + Math.random() * 40 : 120 + Math.random() * 60) * speedMult;
            return { x, y, r, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, shape };
        }

        function initWave() {
            asteroids = [];
            const count = 4 + wave - 1;
            for (let i = 0; i < count; i++) {
                let ax, ay;
                do { ax = Math.random() * 800; ay = Math.random() * 600; }
                while (Math.hypot(ax - 400, ay - 300) < 150);
                asteroids.push(createAsteroid(ax, ay, 40));
            }
        }

        function resetGame() {
            score = 0; lives = 3; wave = 1;
            ship = { x: 400, y: 300, vx: 0, vy: 0, rot: -Math.PI/2, active: true, invuln: INVULNERABILITY_TIME, deadTime: 0 };
            bullets = []; ufo = null; ufoBullets = []; ufoTimer = 20 + Math.random() * 10;
            initWave();
            currentState = STATE_PLAYING;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.code === 'KeyP') currentState = (currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState));
            if (currentState === STATE_PLAYING && e.code === 'Space' && ship.active && bullets.length < MAX_BULLETS) {
                bullets.push({ 
                    x: ship.x + Math.cos(ship.rot) * 18, 
                    y: ship.y + Math.sin(ship.rot) * 18, 
                    vx: Math.cos(ship.rot) * BULLET_SPEED, 
                    vy: Math.sin(ship.rot) * BULLET_SPEED, 
                    life: BULLET_LIFE 
                });
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function wrap(obj) {
            if (obj.x < 0) obj.x += 800; else if (obj.x > 800) obj.x -= 800;
            if (obj.y < 0) obj.y += 600; else if (obj.y > 600) obj.y -= 600;
        }

        function update(dt) {
            if (currentState !== STATE_PLAYING) return;

            // Player logic
            if (ship.active) {
                if (keys['ArrowLeft'] || keys['KeyA']) ship.rot -= (SHIP_ROT_SPEED * Math.PI/180) * dt;
                if (keys['ArrowRight'] || keys['KeyD']) ship.rot += (SHIP_ROT_SPEED * Math.PI/180) * dt;
                if (keys['ArrowUp'] || keys['KeyW']) {
                    ship.vx += Math.cos(ship.rot) * SHIP_THRUST * dt;
                    ship.vy += Math.sin(ship.rot) * SHIP_THRUST * dt;
                }
                ship.vx *= SHIP_FRICTION; ship.vy *= SHIP_FRICTION;
                const speed = Math.hypot(ship.vx, ship.vy);
                if (speed > MAX_SPEED) { ship.vx *= MAX_SPEED/speed; ship.vy *= MAX_SPEED/speed; }
                ship.x += ship.vx * dt; ship.y += ship.vy * dt;
                wrap(ship);
                if (ship.invuln > 0) ship.invuln -= dt;
            } else {
                ship.deadTime += dt;
                if (ship.deadTime >= RESPAWN_TIME) {
                    if (asteroids.every(a => Math.hypot(a.x - 400, a.y - 300) > 100)) {
                        ship.active = true; ship.x = 400; ship.y = 300; ship.vx = 0; ship.vy = 0;
                        ship.invuln = INVULNERABILITY_TIME; ship.deadTime = 0; ship.rot = -Math.PI/2;
                    }
                }
            }

            // Asteroids
            asteroids.forEach(a => { a.x += a.vx * dt; a.y += a.vy * dt; wrap(a); });

            // Bullets
            bullets.forEach((b, i) => {
                b.x += b.vx * dt; b.y += b.vy * dt; wrap(b); b.life -= dt;
                if (b.life <= 0) bullets.splice(i, 1);
            });

            // UFO
            ufoTimer -= dt;
            if (ufoTimer <= 0 && !ufo) {
                ufo = { x: -32, y: 120 + Math.random() * 100, vx: 120, vy: 0, r: 16, fire: 1.5 };
            }
            if (ufo) {
                ufo.x += ufo.vx * dt;
                ufo.fire -= dt;
                if (ufo.fire <= 0 && ship.active) {
                    const angle = Math.atan2(ship.y - ufo.y, ship.x - ufo.x);
                    ufoBullets.push({ x: ufo.x, y: ufo.y, vx: Math.cos(angle) * 350, vy: Math.sin(angle) * 350, life: 2 });
                    ufo.fire = 1.5;
                }
                if (ufo.x > 800 + 40) { ufo = null; ufoTimer = 20 + Math.random() * 10; }
            }
            ufoBullets.forEach((b, i) => {
                b.x += b.vx * dt; b.y += b.vy * dt; wrap(b); b.life -= dt;
                if (b.life <= 0) ufoBullets.splice(i, 1);
            });

            checkCollisions();

            if (asteroids.length === 0) { wave++; initWave(); }
        }

        function checkCollisions() {
            const dist = (o1, o2) => Math.hypot(o1.x - o2.x, o1.y - o2.y);
            const radiusSum = (o1, o2) => (o1.r || 2) + (o2.r || 2);

            if (ship.active && ship.invuln <= 0) {
                for (let a of asteroids) if (dist(ship, a) < a.r + 10) killShip();
                for (let b of ufoBullets) if (dist(ship, b) < 12) killShip();
                if (ufo && dist(ship, ufo) < 24) killShip();
            }

            bullets.forEach((b, bi) => {
                for (let ai = 0; ai < asteroids.length; ai++) {
                    let a = asteroids[ai];
                    if (dist(b, a) < a.r + 2) {
                        bullets.splice(bi, 1);
                        splitAsteroid(ai, b);
                        return;
                    }
                }
                if (ufo && dist(b, ufo) < 18) {
                    bullets.splice(bi, 1); score += 200; checkExtraLife(200);
                    ufo = null; ufoTimer = 20 + Math.random() * 10;
                }
            });
        }

        function killShip() {
            ship.active = false; ship.deadTime = 0; lives--;
            if (lives <= 0) currentState = STATE_GAME_OVER;
        }

        function splitAsteroid(ai, b) {
            const a = asteroids[ai];
            const pts = (a.r === 40 ? 20 : a.r === 20 ? 50 : 100);
            score += pts; checkExtraLife(pts);
            if (a.r > 10) {
                const angle = Math.atan2(b.vy, b.vx);
                asteroids.push(createAsteroid(a.x, a.y, a.r / 2, 1.2));
                asteroids.push(createAsteroid(a.x, a.y, a.r / 2, 1.2));
            }
            asteroids.splice(ai, 1);
        }

        function checkExtraLife(pts) {
            if (Math.floor((score - pts) / 10000) < Math.floor(score / 10000)) lives++;
            if (score > highScore) { highScore = score; localStorage.setItem('asteroids6HighScore', highScore); }
        }

        function drawAsteroid(a) {
            ctx.save(); ctx.translate(a.x, a.y); ctx.strokeStyle = '#AAA'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(a.shape[0].x, a.shape[0].y);
            a.shape.forEach(v => ctx.lineTo(v.x, v.y)); ctx.closePath(); ctx.stroke(); ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 800, 600);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '52px monospace'; ctx.fillText('ASTEROIDS', 400, 220);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Start', 400, 360);
                asteroids.forEach(drawAsteroid);
                return;
            }

            if (ship.active) {
                if (!(ship.invuln > 0 && Math.floor(Date.now()/125)%2===0)) {
                    ctx.save(); ctx.translate(ship.x, ship.y); ctx.rotate(ship.rot);
                    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-12, -12); ctx.lineTo(-12, 12); ctx.closePath(); ctx.stroke();
                    if (keys['ArrowUp'] || keys['KeyW']) {
                        ctx.strokeStyle = '#FF9900'; ctx.beginPath(); ctx.moveTo(-12, -6); ctx.lineTo(-24, 0); ctx.lineTo(-12, 6); ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            asteroids.forEach(drawAsteroid);
            ctx.fillStyle = '#FFF'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });
            if (ufo) {
                ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y, 16, 6, 0, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y-4, 10, 4, 0, 0, Math.PI*2); ctx.stroke();
            }
            ctx.fillStyle = '#FF4444'; ufoBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });

            // HUD
            ctx.fillStyle = '#FFF'; ctx.font = '18px monospace'; ctx.textAlign = 'left'; ctx.fillText(`Score: ${score}`, 10, 30);
            for (let i = 0; i < lives; i++) {
                ctx.save(); ctx.translate(20 + i*20, 50); ctx.rotate(-Math.PI/2); ctx.strokeStyle = '#FFF'; ctx.beginPath();
                ctx.moveTo(8, 0); ctx.lineTo(-4, -4); ctx.lineTo(-4, 4); ctx.closePath(); ctx.stroke(); ctx.restore();
            }
            ctx.textAlign = 'right'; ctx.fillText(`BEST: ${highScore}`, 790, 30);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,800,600);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 400, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,800,600);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '40px monospace'; ctx.fillText('GAME OVER', 400, 260);
                ctx.font = '20px monospace'; ctx.fillText(`Final: ${score}`, 400, 310);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 400, 360);
            }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
