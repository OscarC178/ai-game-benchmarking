<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #FFFFFF;
            font-family: monospace;
        }
        canvas {
            background-color: #000000;
            border: 1px solid #333333;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3,
            SERVE: 4 // Ball attached to paddle
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;

        // Input
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            A: false,
            d: false,
            D: false,
            ' ': false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            
            if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    initGame();
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING || currentState === STATE.SERVE) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            } else if (e.key === ' ') {
                if (currentState === STATE.SERVE) {
                    launchBall();
                }
            }
            
            // Prevent default scrolling for Space and Arrows
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Entities
        const paddle = {
            width: 104,
            height: 14,
            x: 348,
            y: 560,
            speed: 520,
            color: '#FFFFFF'
        };

        const ball = {
            radius: 8,
            x: 400,
            y: 548,
            dx: 0,
            dy: 0,
            speed: 340, // Base level 1 speed
            color: '#FFFFFF'
        };

        const brickLayout = {
            cols: 10,
            rows: 6,
            width: 70,
            height: 20,
            paddingX: 7, 
            paddingY: 8,
            startX: 19,
            startY: 52,
            colors: [
                '#FF0000', '#FF6A00', '#FFD400', '#20C020', '#1E88FF', '#8A2BE2'  
            ]
        };

        let bricks = [];
        let activeBricks = 0;

        let level = 1;
        let lives = 3;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('breakoutHigh')) || 0;

        // Audio context logic inline
        let audioCtx = null;
        function playTone(freq, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { }
        }

        function playPaddleHit() { playTone(430, 'square', 0.1); }
        function playBrickHit() { playTone(670, 'square', 0.1); }
        function playLifeLost() { 
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }
        function playLevelClear() { 
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const notes = [440, 554, 659, 880];
                const noteLen = 0.05;
                for (let i = 0; i < notes.length; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * noteLen);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (i + 1) * noteLen);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + i * noteLen);
                    osc.stop(audioCtx.currentTime + (i + 1) * noteLen);
                }
            } catch (e) {}
        }

        function buildBricks() {
            bricks = [];
            activeBricks = brickLayout.rows * brickLayout.cols;
            for (let r = 0; r < brickLayout.rows; r++) {
                bricks[r] = [];
                for (let c = 0; c < brickLayout.cols; c++) {
                    bricks[r][c] = {
                        x: brickLayout.startX + c * (brickLayout.width + brickLayout.paddingX),
                        y: brickLayout.startY + r * (brickLayout.height + brickLayout.paddingY),
                        status: 1, 
                        scoreValue: getBrickScore(r)
                    };
                }
            }
        }

        function getBrickScore(row) {
            const scores = [7, 5, 4, 3, 2, 1];
            return scores[row] || 1;
        }

        function resetPaddleAndBall() {
            paddle.x = (canvas.width - paddle.width) / 2;
            paddle.y = 560; 
            
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 1;
            ball.dx = 0;
            ball.dy = 0;
            
            currentState = STATE.SERVE;
        }

        function launchBall() {
            ball.speed = Math.min(520, 340 + (level - 1) * 20);
            
            let angle = (240 + Math.random() * 60) * Math.PI / 180;
            
            ball.dx = ball.speed * Math.cos(angle);
            ball.dy = ball.speed * Math.sin(angle);
            
            currentState = STATE.PLAYING;
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('breakoutHigh', highScore);
            }
        }

        function loseLife() {
            lives--;
            playLifeLost();
            if (lives <= 0) {
                updateHighScore();
                currentState = STATE.GAME_OVER;
            } else {
                resetPaddleAndBall();
            }
        }

        function levelComplete() {
            playLevelClear();
            level++;
            buildBricks();
            resetPaddleAndBall();
        }

        function initGame() {
            level = 1;
            lives = 3;
            score = 0;
            buildBricks();
            resetPaddleAndBall();
        }

        let lastTime = 0;

        function checkBrickCollision(b) {
            // Find closest point on rect to ball center
            let closestX = Math.max(b.x, Math.min(ball.x, b.x + brickLayout.width));
            let closestY = Math.max(b.y, Math.min(ball.y, b.y + brickLayout.height));

            // Calculate distance
            let distanceX = ball.x - closestX;
            let distanceY = ball.y - closestY;
            let distance = Math.sqrt((distanceX * distanceX) + (distanceY * distanceY));

            if (distance < ball.radius) {
                // To determine which side was hit, we can see if the ball center was predominantly past an edge
                // or just standard AABB penetration
                let hitAxis = 'x';
                
                // Compare penetration
                let penX = (brickLayout.width / 2) - Math.abs(ball.x - (b.x + brickLayout.width / 2));
                let penY = (brickLayout.height / 2) - Math.abs(ball.y - (b.y + brickLayout.height / 2));
                
                if (penY < penX) {
                    hitAxis = 'y';
                }

                return { hit: true, axis: hitAxis };
            }
            return { hit: false };
        }

        function update(dt) {
            if (currentState === STATE.PLAYING || currentState === STATE.SERVE) {
                // Paddle movement
                let pdx = 0;
                if (keys.ArrowLeft || keys.a || keys.A) pdx = -1;
                if (keys.ArrowRight || keys.d || keys.D) pdx = 1;
                
                paddle.x += pdx * paddle.speed * dt;

                // Clamp paddle
                if (paddle.x < 0) paddle.x = 0;
                if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

                if (currentState === STATE.SERVE) {
                    ball.x = paddle.x + paddle.width / 2;
                    ball.y = paddle.y - ball.radius - 1; 
                } else if (currentState === STATE.PLAYING) {
                    // Split movement into sub-steps to prevent falling through bricks at high speeds
                    let steps = Math.ceil(ball.speed * dt / ball.radius);
                    let stepDt = dt / steps;

                    for (let s = 0; s < steps; s++) {
                        ball.x += ball.dx * stepDt;
                        ball.y += ball.dy * stepDt;

                        // Wall Collisions
                        if (ball.x - ball.radius < 0) {
                            ball.x = ball.radius;
                            ball.dx = -ball.dx;
                            playPaddleHit();
                        } else if (ball.x + ball.radius > canvas.width) {
                            ball.x = canvas.width - ball.radius;
                            ball.dx = -ball.dx;
                            playPaddleHit();
                        }

                        if (ball.y - ball.radius < 0) {
                            ball.y = ball.radius;
                            ball.dy = -ball.dy;
                            playPaddleHit();
                        } else if (ball.y + ball.radius > canvas.height) {
                            loseLife();
                            return; 
                        }

                        // Paddle Collision
                        let closestX = Math.max(paddle.x, Math.min(ball.x, paddle.x + paddle.width));
                        let closestY = Math.max(paddle.y, Math.min(ball.y, paddle.y + paddle.height));
                        
                        let distanceX = ball.x - closestX;
                        let distanceY = ball.y - closestY;
                        let distance = Math.sqrt((distanceX * distanceX) + (distanceY * distanceY));

                        // Hit paddle from top
                        if (distance < ball.radius && ball.dy > 0 && ball.y < paddle.y + paddle.height/2) {
                            playPaddleHit();
                            
                            // Map hit offset on paddle to angle
                            let hitOffset = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                            // Angle mapped from 210 to 330 (-150 to -30). So -PI/2 + (hitOffset * PI/3) => +/- 60 deg max
                            let bounceAngle = -Math.PI/2 + (hitOffset * Math.PI/3);
                            
                            ball.dx = ball.speed * Math.cos(bounceAngle);
                            ball.dy = ball.speed * Math.sin(bounceAngle);
                            
                            // Push explicitly above paddle
                            ball.y = paddle.y - ball.radius;
                        }

                        // Brick Collisions
                        let brickHit = false;
                        for (let r = 0; r < brickLayout.rows && !brickHit; r++) {
                            for (let c = 0; c < brickLayout.cols && !brickHit; c++) {
                                let b = bricks[r][c];
                                if (b.status === 1) {
                                    let col = checkBrickCollision(b);
                                    if (col.hit) {
                                        playBrickHit();
                                        b.status = 0;
                                        score += b.scoreValue;
                                        activeBricks--;
                                        
                                        if (col.axis === 'x') {
                                            ball.dx = -ball.dx;
                                            // Nudge out
                                            ball.x += ball.dx > 0 ? 1 : -1;
                                        } else {
                                            ball.dy = -ball.dy;
                                            // Nudge out
                                            ball.y += ball.dy > 0 ? 1 : -1;
                                        }
                                        
                                        brickHit = true;
                                        
                                        if (activeBricks === 0) {
                                            levelComplete();
                                            return;
                                        }
                                    }
                                }
                            }
                        }
                    } // end step loop
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Bricks
            if (activeBricks > 0) {
                for (let r = 0; r < brickLayout.rows; r++) {
                    for (let c = 0; c < brickLayout.cols; c++) {
                        let b = bricks[r][c];
                        if (b.status === 1) {
                            ctx.fillStyle = brickLayout.colors[r];
                            ctx.fillRect(b.x, b.y, brickLayout.width, brickLayout.height);
                        }
                    }
                }
            }

            // Draw Paddle
            if (currentState !== STATE.IDLE) {
                ctx.fillStyle = paddle.color;
                ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

                // Draw Ball
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
                ctx.closePath();
            }

            // HUD
            if (currentState !== STATE.IDLE) {
                ctx.fillStyle = '#FFFFFF';
                // Move text down to y=20 so it avoids top clips/edges visually
                ctx.font = '16px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`SCORE: ${score}`, 20, 20);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#AAAAAA';
                ctx.fillText(`LEVEL ${level}`, canvas.width / 2, 20);

                ctx.textAlign = 'right';
                // Adjust x-offset to fit Hearts inline or stacked nicely
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(`HIGH: ${Math.max(score, highScore)}`, canvas.width - 20, 20);
                
                // Draw Hearts for Lives below HIGH score
                ctx.fillStyle = '#FF0000';
                for (let i = 0; i < lives; i++) {
                    ctx.fillText('♥', canvas.width - 20 - (i * 18), 44);
                }
            }

            // Overlays
            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '56px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('BREAKOUT', canvas.width / 2, 246);

                ctx.fillStyle = '#AAAAAA';
                ctx.font = '24px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 340);
            } else if (currentState === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FFFFFF';
                ctx.font = '36px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FF0000';
                ctx.font = '56px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, 246);

                ctx.fillStyle = '#FFFFFF';
                ctx.font = '24px monospace';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 310);
                
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '18px monospace';
                ctx.fillText('Press Enter to restart', canvas.width / 2, 380);
            } else if (currentState === STATE.SERVE) {
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '24px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Press Space to Launch', canvas.width / 2, paddle.y + 36);
            }
        }

        function loop(timestamp) {
            // Delta time
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            // Cap to avoid huge jumps
            const safeDt = Math.min(dt, 0.1); 
            lastTime = timestamp;

            update(safeDt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
