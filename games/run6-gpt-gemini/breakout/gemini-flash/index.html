<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 104;
        const PADDLE_HEIGHT = 14;
        const PADDLE_SPEED = 520;
        const BALL_RADIUS = 8;
        const INITIAL_BALL_SPEED = 340;
        const SPEED_INC = 20;
        const MAX_BALL_SPEED = 520;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 20;
        const BRICK_COLS = 10;
        const BRICK_ROWS = 6;
        const BRICK_COLORS = ['#FF0000', '#FF6A00', '#FFD400', '#20C020', '#1E88FF', '#8A2BE2'];
        const BRICK_POINTS = [7, 5, 4, 3, 2, 1];

        // States
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        let score = 0, lives = 3, level = 1, highScore = localStorage.getItem('breakout6HighScore') || 0;
        let lastTime = 0, paddleX = 348;
        let ball = { x: 400, y: 548, vx: 0, vy: 0, attached: true, speed: INITIAL_BALL_SPEED };
        let bricks = [];

        function initBricks() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: 19 + c * (BRICK_WIDTH + 8),
                        y: 52 + r * (BRICK_HEIGHT + 8),
                        w: BRICK_WIDTH,
                        h: BRICK_HEIGHT,
                        color: BRICK_COLORS[r],
                        points: BRICK_POINTS[r],
                        alive: true
                    });
                }
            }
        }

        function resetGame() {
            score = 0; lives = 3; level = 1; paddleX = 348;
            ball.speed = INITIAL_BALL_SPEED;
            resetBall();
            initBricks();
            currentState = STATE_PLAYING;
        }

        function resetBall() {
            ball.attached = true;
            ball.x = paddleX + PADDLE_WIDTH / 2;
            ball.y = 560 - BALL_RADIUS;
            ball.vx = 0;
            ball.vy = 0;
        }

        function launchBall() {
            if (!ball.attached) return;
            ball.attached = false;
            const angle = (240 + Math.random() * 60) * (Math.PI / 180);
            ball.vx = ball.speed * Math.cos(angle);
            ball.vy = ball.speed * Math.sin(angle);
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.key === ' ') launchBall();
            if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function update(dt) {
            if (currentState !== STATE_PLAYING) return;

            // Paddle
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddleX -= PADDLE_SPEED * dt;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) paddleX += PADDLE_SPEED * dt;
            paddleX = Math.max(0, Math.min(CANVAS_WIDTH - PADDLE_WIDTH, paddleX));

            if (ball.attached) {
                ball.x = paddleX + PADDLE_WIDTH / 2;
                ball.y = 560 - BALL_RADIUS;
            } else {
                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Wall collisions
                if (ball.x - BALL_RADIUS < 0 || ball.x + BALL_RADIUS > CANVAS_WIDTH) {
                    ball.vx *= -1;
                    ball.x = ball.x - BALL_RADIUS < 0 ? BALL_RADIUS : CANVAS_WIDTH - BALL_RADIUS;
                }
                if (ball.y - BALL_RADIUS < 0) {
                    ball.vy *= -1;
                    ball.y = BALL_RADIUS;
                }

                // Bottom
                if (ball.y + BALL_RADIUS > CANVAS_HEIGHT) {
                    lives--;
                    if (lives <= 0) currentState = STATE_GAME_OVER;
                    else resetBall();
                }

                // Paddle collision
                if (ball.vy > 0 && ball.y + BALL_RADIUS > 560 && ball.y - BALL_RADIUS < 560 + PADDLE_HEIGHT &&
                    ball.x > paddleX && ball.x < paddleX + PADDLE_WIDTH) {
                    const hitOffset = (ball.x - (paddleX + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2);
                    const angle = (270 + hitOffset * 60) * (Math.PI / 180);
                    ball.vx = ball.speed * Math.cos(angle);
                    ball.vy = ball.speed * Math.sin(angle);
                    ball.y = 560 - BALL_RADIUS;
                }

                // Brick collision
                for (let brick of bricks) {
                    if (brick.alive && ball.x + BALL_RADIUS > brick.x && ball.x - BALL_RADIUS < brick.x + brick.w &&
                        ball.y + BALL_RADIUS > brick.y && ball.y - BALL_RADIUS < brick.y + brick.h) {
                        
                        brick.alive = false;
                        score += brick.points;
                        if (score > highScore) { highScore = score; localStorage.setItem('breakout6HighScore', highScore); }

                        // Simple side determination
                        const dx = Math.abs(ball.x - (brick.x + brick.w / 2));
                        const dy = Math.abs(ball.y - (brick.y + brick.h / 2));
                        if (dx / brick.w > dy / brick.h) ball.vx *= -1;
                        else ball.vy *= -1;

                        if (bricks.every(b => !b.alive)) {
                            level++;
                            ball.speed = Math.min(ball.speed + SPEED_INC, MAX_BALL_SPEED);
                            initBricks();
                            resetBall();
                        }
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '56px monospace'; ctx.fillText('BREAKOUT', 400, 246);
                ctx.font = '20px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Start', 400, 320);
                return;
            }

            // Paddle & Ball
            ctx.fillStyle = '#FFF'; ctx.fillRect(paddleX, 560, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2); ctx.fill();

            // Bricks
            bricks.forEach(b => { if (b.alive) { ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h); } });

            // HUD
            ctx.fillStyle = '#FFF'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'center'; ctx.fillStyle = '#AAA'; ctx.fillText(`Level: ${level}`, 400, 24);
            ctx.textAlign = 'right'; ctx.fillStyle = '#FF4444'; ctx.fillText(`Lives: ${'♥'.repeat(lives)}`, 790, 24);
            ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.fillText(`BEST: ${highScore}`, 790, 44);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFF'; ctx.font = '36px monospace'; ctx.textAlign = 'center'; ctx.fillText('PAUSED', 400, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#FFF'; ctx.font = '40px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', 400, 260);
                ctx.font = '24px monospace'; ctx.fillText(`Final Score: ${score}`, 400, 310);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 400, 370);
            }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            if (lastTime === 0) { lastTime = timestamp; requestAnimationFrame(gameLoop); return; }
            lastTime = timestamp;
            update(Math.min(dt, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
