<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
            color: #FFFFFF;
        }
        canvas {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="700" height="780"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATE = {
            IDLE: 0,
            READY: 1, 
            PLAYING: 2,
            PAUSED: 3,
            DYING: 4,
            GAME_OVER: 5,
            LEVEL_CLEAR: 6
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;
        let stateTimer = 0;

        // Input
        let queuedDir = {x: 0, y: 0};
        
        window.addEventListener('keydown', (e) => {
            const k = e.key;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(k)) e.preventDefault();

            if (k === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    initGame();
                }
            } else if (k.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            } else if (currentState === STATE.PLAYING || currentState === STATE.READY) {
                if (k === 'ArrowUp' || k === 'w') queuedDir = {x: 0, y: -1};
                else if (k === 'ArrowDown' || k === 's') queuedDir = {x: 0, y: 1};
                else if (k === 'ArrowLeft' || k === 'a') queuedDir = {x: -1, y: 0};
                else if (k === 'ArrowRight' || k === 'd') queuedDir = {x: 1, y: 0};
            }
        });

        // Map Setup
        const CELL = 24;
        const OFFSET_X = 14;
        const OFFSET_Y = 30;
        const COLS = 28;
        const ROWS = 31;

        // 0=Wall, 1=Pellet, 2=Empty, 3=Power, 4=Gate, 5=GhostHouse
        const originalMapData = [
            "0000000000000000000000000000",
            "0111111111111001111111111110",
            "0100001000001001000001000010",
            "0300001000001001000001000030",
            "0100001000001001000001000010",
            "0111111111111111111111111110",
            "0100001001000000001001000010",
            "0100001001000000001001000010",
            "0111111001111001111001111110",
            "0000001000002002000001000000",
            "2222201000002002000001022222",
            "2222201002222222222001022222",
            "0000001002000440002001000000",
            "2222221222055555502221222222",
            "0000001002000000002001000000",
            "2222201002222222222001022222",
            "2222201002000000002001022222",
            "0000001002000000002001000000",
            "0111111111111001111111111110",
            "0100001000001001000001000010",
            "0100001000001001000001000010",
            "0311001111111221111111001130",
            "0001001001000000001001001000",
            "0001001001000000001001001000",
            "0111111001111001111001111110",
            "0100000000001001000000000010",
            "0100000000001001000000000010",
            "0111111111111111111111111110",
            "0000000000000000000000000000",
            "0000000000000000000000000000",
            "0000000000000000000000000000"
        ].map(row => row.split('').map(Number));

        let grid = [];
        let totalPellets = 0;
        let pelletsEaten = 0;

        // Player
        const pacman = {
            gx: 14, gy: 23, 
            x: 0, y: 0,     
            dir: {x: -1, y: 0},
            speed: 120, // 100% normal
            radius: 12,
            mouthAnim: 0
        };

        const GHOST_MODES = { SCATTER: 0, CHASE: 1, FRIGHTENED: 2, EATEN: 3 };

        let ghostStateMode = GHOST_MODES.SCATTER;
        let ghostModeTimer = 7.0; // 7s scatter, 20s chase (simplified cycle)
        let frightenedTimer = 0;
        let ghostEatPoints = 200;

        class Ghost {
            constructor(name, color, startGx, startGy, scatterTarget) {
                this.name = name;
                this.color = color;
                this.homeGx = startGx;
                this.homeGy = startGy;
                this.scatterTarget = scatterTarget; // {x, y}
                this.reset();
            }

            reset() {
                this.gx = this.homeGx;
                this.gy = this.homeGy;
                let pPos = getPixelPos(Math.floor(this.gx), Math.floor(this.gy));
                this.x = pPos.x;
                this.y = pPos.y;
                this.dir = {x: 0, y: 0};
                this.speed = 110;
                this.mode = ghostStateMode;
                this.inHouse = true;
                this.releaseTimer = this.name === 'Blinky' ? 0 : (this.name === 'Pinky' ? 2 : (this.name === 'Inky' ? 5 : 8));
            }

            update(dt) {
                if (this.inHouse) {
                    this.releaseTimer -= dt;
                    if (this.releaseTimer <= 0) {
                        this.inHouse = false;
                        this.x = getPixelPos(14, 11).x;
                        this.y = getPixelPos(14, 11).y;
                        this.dir = {x: -1, y: 0}; // Exit left
                    } else {
                        // Bounce in house
                        this.y += Math.sin(Date.now() / 200) * 0.5;
                        return;
                    }
                }

                // Speed
                if (this.mode === GHOST_MODES.EATEN) this.speed = 200;
                else if (this.mode === GHOST_MODES.FRIGHTENED) this.speed = 60;
                else this.speed = 110;

                // Move
                this.x += this.dir.x * this.speed * dt;
                this.y += this.dir.y * this.speed * dt;

                // Wrap
                if (this.x < OFFSET_X - CELL) this.x = OFFSET_X + COLS * CELL;
                if (this.x > OFFSET_X + COLS * CELL + CELL) this.x = OFFSET_X;

                // Determine logical tile
                let cx = this.x - OFFSET_X;
                let cy = this.y - OFFSET_Y;
                let nextGx = Math.floor(cx / CELL);
                let nextGy = Math.floor(cy / CELL);

                // Are we near the center of a tile? 
                let pPos = getPixelPos(nextGx, nextGy);
                if (Math.abs(this.x - pPos.x) < 2 && Math.abs(this.y - pPos.y) < 2) {
                    this.x = pPos.x;
                    this.y = pPos.y; // Snap strictly for ghost grid AI
                    
                    // Reached home?
                    if (this.mode === GHOST_MODES.EATEN && nextGx === 14 && Math.abs(nextGy - 11) <= 1) {
                        this.mode = ghostStateMode;
                        this.inHouse = true;
                        this.releaseTimer = 0.5;
                        return;
                    }

                    // Decide next dir
                    let target = this.getTarget();
                    let bestDist = 99999;
                    let nextDir = this.dir;

                    let options = [
                        {x: 0, y: -1}, // Up
                        {x: -1, y: 0}, // Left
                        {x: 0, y: 1},  // Down
                        {x: 1, y: 0}   // Right
                    ];

                    // Cannot reverse direction unless forced by mode change
                    options = options.filter(d => !(d.x === -this.dir.x && d.y === -this.dir.y && (this.dir.x !== 0 || this.dir.y !== 0)));

                    // Allowed moves
                    let validMoves = options.filter(d => isWalkable(nextGx + d.x, nextGy + d.y, this.mode === GHOST_MODES.EATEN));

                    if (validMoves.length > 0) {
                        if (this.mode === GHOST_MODES.FRIGHTENED) {
                            // Random
                            nextDir = validMoves[Math.floor(Math.random() * validMoves.length)];
                        } else {
                            // Pick move closest to target Euclidean
                            for (let move of validMoves) {
                                let checkX = nextGx + move.x;
                                let checkY = nextGy + move.y;
                                let distSq = (checkX - target.x)**2 + (checkY - target.y)**2;
                                if (distSq < bestDist) {
                                    bestDist = distSq;
                                    nextDir = move;
                                }
                            }
                        }
                        this.dir = nextDir;
                    } else if (this.dir.x === 0 && this.dir.y === 0) {
                        // Start moving
                        this.dir = {x: -1, y: 0};
                    }
                }
            }

            getTarget() {
                if (this.mode === GHOST_MODES.EATEN) return {x: 14, y: 11}; // Ghost house exit
                if (this.mode === GHOST_MODES.SCATTER) return this.scatterTarget;
                
                let px = Math.floor((pacman.x - OFFSET_X) / CELL);
                let py = Math.floor((pacman.y - OFFSET_Y) / CELL);

                if (this.name === 'Blinky') {
                    return {x: px, y: py};
                } else if (this.name === 'Pinky') {
                    return {x: px + pacman.dir.x * 4, y: py + pacman.dir.y * 4};
                } else if (this.name === 'Inky') {
                    // Vector from Blinky to 2 tiles ahead of pacman, doubled
                    let bx = Math.floor((ghosts[0].x - OFFSET_X) / CELL);
                    let by = Math.floor((ghosts[0].y - OFFSET_Y) / CELL);
                    let tx = px + pacman.dir.x * 2;
                    let ty = py + pacman.dir.y * 2;
                    let vecX = tx - bx;
                    let vecY = ty - by;
                    return {x: bx + vecX * 2, y: by + vecY * 2};
                } else if (this.name === 'Clyde') {
                    let dSq = (px - this.gx)**2 + (py - this.gy)**2;
                    if (dSq > 64) return {x: px, y: py}; 
                    return this.scatterTarget;
                }
                return {x: px, y: py};
            }
        }

        let ghosts = [];

        function getPixelPos(gx, gy) {
            return {
                x: OFFSET_X + gx * CELL + CELL / 2,
                y: OFFSET_Y + gy * CELL + CELL / 2
            };
        }

        let lastTime = 0;
        let score = 0;

        let fruit = { active: false, timer: 0 };

        function initLevel() {
            grid = JSON.parse(JSON.stringify(originalMapData));
            totalPellets = 0;
            pelletsEaten = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1 || grid[r][c] === 3) totalPellets++;
                }
            }

            pacman.gx = 14; pacman.gy = 23;
            let pPos = getPixelPos(Math.floor(pacman.gx), Math.floor(pacman.gy));
            pacman.x = pPos.x; pacman.y = pPos.y;
            pacman.dir = {x: -1, y: 0};
            queuedDir = {x: -1, y: 0};

            ghosts = [
                new Ghost('Blinky', '#FF0000', 14, 11, {x: 25, y: -2}), // Top Right
                new Ghost('Pinky', '#FFB8FF', 14, 14, {x: 2, y: -2}),   // Top Left
                new Ghost('Inky', '#00FFFF', 12, 14, {x: 27, y: 31}),   // Bottom Right
                new Ghost('Clyde', '#FFB852', 16, 14, {x: 0, y: 31})    // Bottom Left
            ];

            ghostStateMode = GHOST_MODES.SCATTER;
            ghostModeTimer = 7.0;
            frightenedTimer = 0;
            fruit.active = false;
        }

        function initGame() {
            console.log("State: PLAYING");
            score = 0;
            currentState = STATE.PLAYING;
            initLevel();
        }

        function isWalkable(gx, gy, isGhostHouseExit = false) {
            if (gx < 0 || gx >= COLS) return true; 
            if (gy < 0 || gy >= ROWS) return false;
            let tile = grid[gy][gx];
            if (tile === 0) return false;
            if (tile === 4) return isGhostHouseExit; 
            return true;
        }

        function triggerFrightened() {
            frightenedTimer = 6.0;
            ghostEatPoints = 200;
            ghosts.forEach(g => {
                if (g.mode !== GHOST_MODES.EATEN) {
                    g.mode = GHOST_MODES.FRIGHTENED;
                    // Reverse
                    g.dir = {x: -g.dir.x, y: -g.dir.y};
                }
            });
        }

        function updatePacman(dt) {
            // Tunnel Speed (0.6x)
            let gx = Math.floor((pacman.x - OFFSET_X) / CELL);
            let gy = Math.floor((pacman.y - OFFSET_Y) / CELL);
            let speed = pacman.speed;
            if (gy === 14 && (gx < 5 || gx > 22)) speed *= 0.6;
            
            let cx = pacman.x;
            let cy = pacman.y;
            
            if (queuedDir && (queuedDir.x !== pacman.dir.x || queuedDir.y !== pacman.dir.y)) {
                // strict reversal
                if (queuedDir.x === -pacman.dir.x && queuedDir.y === -pacman.dir.y && (pacman.dir.x !== 0 || pacman.dir.y !== 0)) {
                    pacman.dir = {x: queuedDir.x, y: queuedDir.y};
                    queuedDir = null;
                } else {
                    let targetGx = Math.floor((cx + queuedDir.x * 6 - OFFSET_X) / CELL);
                    let targetGy = Math.floor((cy + queuedDir.y * 6 - OFFSET_Y) / CELL);
                    let pPos = getPixelPos(targetGx, targetGy);
                    
                    const ASSIST = 4;
                    if (isWalkable(targetGx, targetGy) && isWalkable(targetGx + queuedDir.x, targetGy + queuedDir.y)) {
                        // Rough cornering
                        if (Math.abs(cx - pPos.x) <= ASSIST && Math.abs(cy - pPos.y) <= ASSIST) {
                            pacman.x = pPos.x;
                            pacman.y = pPos.y;
                            pacman.dir = {x: queuedDir.x, y: queuedDir.y};
                            queuedDir = null; 
                        }
                    }
                }
            }
            
            let nx = pacman.x + pacman.dir.x * speed * dt;
            let ny = pacman.y + pacman.dir.y * speed * dt;

            // Leading boundary check
            let edgeOffset = pacman.radius - 2;
            let gXNext = Math.floor((nx + pacman.dir.x * edgeOffset - OFFSET_X) / CELL);
            let gYNext = Math.floor((ny + pacman.dir.y * edgeOffset - OFFSET_Y) / CELL);

            if (isWalkable(gXNext, gYNext)) {
                pacman.x = nx;
                pacman.y = ny;
            } else {
                // Snap to current tile center to stop cleanly
                let pPos = getPixelPos(gx, gy);
                if (pacman.dir.x !== 0) pacman.x = pPos.x;
                if (pacman.dir.y !== 0) pacman.y = pPos.y;
            }

            if (pacman.x < OFFSET_X - CELL) pacman.x = OFFSET_X + COLS * CELL;
            if (pacman.x > OFFSET_X + COLS * CELL + CELL) pacman.x = OFFSET_X;

            if (pacman.dir.x !== 0 || pacman.dir.y !== 0) {
                pacman.mouthAnim += dt * 15;
            }
            
            // Interaction
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
                if (grid[gy][gx] === 1) {
                    grid[gy][gx] = 2; 
                    score += 10;
                    pelletsEaten++;
                } else if (grid[gy][gx] === 3) {
                    grid[gy][gx] = 2; 
                    score += 50;
                    pelletsEaten++;
                    triggerFrightened();
                }

                // Fruit trigger
                if (pelletsEaten === 70 || pelletsEaten === 170) {
                    if (!fruit.active) {
                        fruit.active = true;
                        fruit.timer = 10.0;
                    }
                }

                if (fruit.active && gx === 14 && gy === 17) {
                    fruit.active = false;
                    score += 100;
                }
            }
        }

        function update(dt) {
            if (currentState === STATE.PLAYING) {

                // Ghost modes
                if (frightenedTimer > 0) {
                    frightenedTimer -= dt;
                    if (frightenedTimer <= 0) {
                        frightenedTimer = 0;
                        ghosts.forEach(g => {
                            if (g.mode === GHOST_MODES.FRIGHTENED) g.mode = ghostStateMode;
                        });
                    }
                } else {
                    ghostModeTimer -= dt;
                    if (ghostModeTimer <= 0) {
                        if (ghostStateMode === GHOST_MODES.SCATTER) {
                            ghostStateMode = GHOST_MODES.CHASE;
                            ghostModeTimer = 20.0;
                        } else {
                            ghostStateMode = GHOST_MODES.SCATTER;
                            ghostModeTimer = 7.0;
                        }
                        ghosts.forEach(g => {
                            if (g.mode !== GHOST_MODES.EATEN && g.mode !== GHOST_MODES.FRIGHTENED) {
                                g.mode = ghostStateMode;
                                g.dir = {x: -g.dir.x, y: -g.dir.y};
                            }
                        });
                    }
                }

                updatePacman(dt);

                if (fruit.active) {
                    fruit.timer -= dt;
                    if (fruit.timer <= 0) fruit.active = false;
                }

                ghosts.forEach(g => g.update(dt));

                // Collision
                for (let g of ghosts) {
                    let dSq = (pacman.x - g.x)**2 + (pacman.y - g.y)**2;
                    if (dSq < (pacman.radius + 8)**2) {
                        if (g.mode === GHOST_MODES.FRIGHTENED) {
                            g.mode = GHOST_MODES.EATEN;
                            score += ghostEatPoints;
                            ghostEatPoints *= 2;
                        } else if (g.mode !== GHOST_MODES.EATEN) {
                            console.log("Dead");
                            // currentState = STATE.DYING;
                        }
                    }
                }
            }
        }

        function drawMap() {
            ctx.fillStyle = '#1919A6';
            ctx.strokeStyle = '#1919A6';
            ctx.lineWidth = 2;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let tile = grid[r][c];
                    let tx = OFFSET_X + c * CELL;
                    let ty = OFFSET_Y + r * CELL;
                    
                    if (tile === 0) { 
                        // Draw simple wall outlines (very rough approximation for now)
                        ctx.strokeRect(tx+2, ty+2, CELL-4, CELL-4);
                    } else if (tile === 1) { 
                        ctx.fillStyle = '#FFCC99';
                        ctx.fillRect(tx + CELL/2 - 2, ty + CELL/2 - 2, 4, 4);
                    } else if (tile === 3) { 
                        ctx.fillStyle = '#FFCC99';
                        ctx.beginPath();
                        ctx.arc(tx + CELL/2, ty + CELL/2, 6, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (tile === 4) { 
                        ctx.fillStyle = '#FFB8FF';
                        ctx.fillRect(tx, ty + CELL/2 - 2, CELL, 4);
                    }
                }
            }

            if (fruit.active) {
                let fx = OFFSET_X + 14 * CELL;
                let fy = OFFSET_Y + 17 * CELL;
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(fx + CELL/2 - 4, fy + CELL/2 + 2, 5, 0, Math.PI * 2);
                ctx.arc(fx + CELL/2 + 4, fy + CELL/2 + 2, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#00FF00';
                ctx.beginPath(); ctx.moveTo(fx+CELL/2-4, fy+CELL/2-2); ctx.lineTo(fx+CELL/2+2, fy+CELL/2-8); ctx.stroke();
            }
        }

        function drawEntities() {
            // Ghosts
            for (let g of ghosts) {
                ctx.save();
                ctx.translate(g.x, g.y);
                
                if (g.mode === GHOST_MODES.EATEN) {
                    ctx.fillStyle = '#FFFFFF'; // Eyes
                    ctx.fillRect(-6, -2, 4, 4); ctx.fillRect(2, -2, 4, 4);
                    ctx.fillStyle = '#0000LL';
                    ctx.fillRect(-6 + Math.sign(g.dir.x)*2, -2 + Math.sign(g.dir.y)*2, 2, 2);
                    ctx.fillRect(2 + Math.sign(g.dir.x)*2, -2 + Math.sign(g.dir.y)*2, 2, 2);
                } else {
                    ctx.fillStyle = (g.mode === GHOST_MODES.FRIGHTENED) ? '#0000FF' : g.color;
                    ctx.beginPath();
                    ctx.arc(0, -2, 10, Math.PI, 0); // Head
                    ctx.lineTo(10, 10);
                    ctx.lineTo(5, 7);
                    ctx.lineTo(0, 10);
                    ctx.lineTo(-5, 7);
                    ctx.lineTo(-10, 10);
                    ctx.closePath();
                    ctx.fill();

                    if (g.mode !== GHOST_MODES.FRIGHTENED) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath(); ctx.arc(-4, -4, 3, 0, Math.PI*2); ctx.arc(4, -4, 3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#0000FF';
                        ctx.beginPath(); ctx.arc(-4 + Math.sign(g.dir.x)*1.5, -4 + Math.sign(g.dir.y)*1.5, 1.5, 0, Math.PI*2); 
                        ctx.arc(4 + Math.sign(g.dir.x)*1.5, -4 + Math.sign(g.dir.y)*1.5, 1.5, 0, Math.PI*2); ctx.fill();
                    } else {
                        // Frightened face
                        ctx.fillStyle = '#FFB852';
                        ctx.fillRect(-4, -4, 2, 2); ctx.fillRect(2, -4, 2, 2);
                        ctx.fillRect(-6, 2, 12, 2); // Wavy mouth flat for now
                    }
                }
                ctx.restore();
            }

            // Pacman
            ctx.save();
            ctx.translate(pacman.x, pacman.y);
            
            let angle = 0;
            if (pacman.dir.x === 1) angle = 0;
            else if (pacman.dir.y === 1) angle = Math.PI/2;
            else if (pacman.dir.x === -1) angle = Math.PI;
            else if (pacman.dir.y === -1) angle = -Math.PI/2;
            ctx.rotate(angle);

            let mouth = Math.max(0, Math.sin(pacman.mouthAnim)) * 0.4;
            ctx.fillStyle = '#FFFF00';
            ctx.beginPath();
            ctx.arc(0, 0, pacman.radius, mouth * Math.PI, (2 - mouth) * Math.PI);
            ctx.lineTo(0, 0);
            ctx.fill();
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentState !== STATE.IDLE) {
                drawMap();
                drawEntities();
                
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'left';
                ctx.font = '20px monospace';
                ctx.fillText(`SCORE: ${score}`, 10, 20);
            }

            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#FFFF00';
                ctx.font = '54px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('PAC-MAN', canvas.width / 2, 300);
                
                ctx.fillStyle = '#AAAAAA';
                ctx.font = '24px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 400);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            const safeDt = Math.min(dt, 0.1); 
            lastTime = timestamp;

            update(safeDt);
            draw();

            requestAnimationFrame(loop);

  try { window.__qa = {
    stateNum:  typeof state !== 'undefined' ? state : (typeof gameState !== 'undefined' ? gameState : null),
    pacX:      typeof pac   !== 'undefined' ? (pac.x  != null ? pac.x  : null) : null,
    pacY:      typeof pac   !== 'undefined' ? (pac.y  != null ? pac.y  : null) : null,
    pacDx:     typeof pac   !== 'undefined' ? (pac.dx != null ? pac.dx : null) : null,
    pacDy:     typeof pac   !== 'undefined' ? (pac.dy != null ? pac.dy : null) : null,
    pacNextDx: typeof pac   !== 'undefined' ? (pac.nextDx != null ? pac.nextDx : (pac.requestedDx != null ? pac.requestedDx : null)) : null,
    pacNextDy: typeof pac   !== 'undefined' ? (pac.nextDy != null ? pac.nextDy : (pac.requestedDy != null ? pac.requestedDy : null)) : null,
    score:     typeof score !== 'undefined' ? score : null,
    lives:     typeof lives !== 'undefined' ? lives : null,
    ts: Date.now(),
  }; } catch(e) { window.__qaErr = String(e); }

        }

        requestAnimationFrame(loop);
    </script>
