            g.x += d.dx * speed * dt; g.y += d.dy * speed * dt;
            if (g.x < -TILE) g.x = WIDTH; else if (g.x > WIDTH) g.x = -TILE;
        }

            ctx.textAlign = 'right'; ctx.fillStyle='#AAA'; ctx.fillText(`Level ${level}`, 686, 765);

            if (currentState === STATE_IDLE) { ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle='#FFFF00'; ctx.font='54px monospace'; ctx.textAlign='center'; ctx.fillText('PAC-MAN', 350, 300); ctx.fillStyle='#AAA'; ctx.font='20px monospace'; ctx.fillText('Press Enter to Start', 350, 420); }

        }
