<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #111111;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const COLS = 10, ROWS = 20, CELL = 28;
        const OFFSET_X = 240, OFFSET_Y = 20;
        const LOCK_DELAY_MS = 500, MAX_LOCK_RESETS = 3;

        const PIECES = {
            'I': { color: '#00FFFF', shapes: [[[0,1],[1,1],[2,1],[3,1]], [[2,0],[2,1],[2,2],[2,3]], [[0,2],[1,2],[2,2],[3,2]], [[1,0],[1,1],[1,2],[1,3]]] },
            'O': { color: '#FFFF00', shapes: [[[1,0],[2,0],[1,1],[2,1]]] },
            'T': { color: '#AA00FF', shapes: [[[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[2,1],[1,2]], [[0,1],[1,1],[2,1],[1,2]], [[1,0],[0,1],[1,1],[1,2]]] },
            'S': { color: '#00FF00', shapes: [[[1,0],[2,0],[0,1],[1,1]], [[1,0],[1,1],[2,1],[2,2]], [[1,1],[2,1],[0,2],[1,2]], [[0,0],[0,1],[1,1],[1,2]]] },
            'Z': { color: '#FF0000', shapes: [[[0,0],[1,0],[1,1],[2,1]], [[2,0],[1,1],[2,1],[1,2]], [[0,1],[1,1],[1,2],[2,2]], [[1,0],[0,1],[1,1],[0,2]]] },
            'J': { color: '#0000FF', shapes: [[[0,0],[0,1],[1,1],[2,1]], [[1,0],[2,0],[1,1],[1,2]], [[0,1],[1,1],[2,1],[2,2]], [[1,0],[1,1],[0,2],[1,2]]] },
            'L': { color: '#FF8800', shapes: [[[2,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[2,2]], [[0,1],[1,1],[2,1],[0,2]], [[0,0],[1,0],[1,1],[1,2]]] }
        };

        const KICKS = [[0,0], [-1,0], [1,0], [0,-1]];
        const I_KICKS = [[0,0], [-1,0], [1,0], [0,-1], [-2,0], [2,0]];

        // State
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;
        
        let grid = [], bag = [], score = 0, level = 1, lines = 0, highScore = localStorage.getItem('tetris6HighScore') || 0;
        let cur = null, next = null, ghostY = 0;
        let lastTime = 0, gravityTimer = 0, lockTimer = 0, lockResets = 0;
        let softDrop = false;

        function initGrid() {
            grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        }

        function shuffleBag() {
            bag = Object.keys(PIECES).sort(() => Math.random() - 0.5);
        }

        function getNextPiece() {
            if (bag.length === 0) shuffleBag();
            const type = bag.pop();
            return { type, color: PIECES[type].color, shapes: PIECES[type].shapes, rot: 0, x: 3, y: -2 };
        }

        function spawnPiece() {
            cur = next || getNextPiece();
            next = getNextPiece();
            if (collide(cur.x, cur.y, cur.rot)) currentState = STATE_GAME_OVER;
            updateGhost();
        }

        function collide(x, y, rot) {
            return cur.shapes[rot].some(([cx, cy]) => {
                let nx = x + cx, ny = y + cy;
                return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
            });
        }

        function move(dx) {
            if (!collide(cur.x + dx, cur.y, cur.rot)) {
                cur.x += dx;
                if (lockTimer > 0 && lockResets < MAX_LOCK_RESETS) { lockTimer = 0; lockResets++; }
                updateGhost();
                return true;
            }
            return false;
        }

        function rotate() {
            let nextRot = (cur.rot + 1) % cur.shapes.length;
            let kicks = cur.type === 'I' ? I_KICKS : KICKS;
            for (let [kx, ky] of kicks) {
                if (!collide(cur.x + kx, cur.y + ky, nextRot)) {
                    cur.x += kx; 
                    cur.y += ky;
                    cur.rot = nextRot;
                    if (lockTimer > 0 && lockResets < MAX_LOCK_RESETS) { lockTimer = 0; lockResets++; }
                    updateGhost();
                    return;
                }
            }
        }

        function updateGhost() {
            ghostY = cur.y;
            while (!collide(cur.x, ghostY + 1, cur.rot)) ghostY++;
        }

        function hardDrop() {
            let dist = ghostY - cur.y;
            cur.y = ghostY;
            score += dist * 2;
            lockPiece();
        }

        function lockPiece() {
            cur.shapes[cur.rot].forEach(([cx, cy]) => {
                if (cur.y + cy >= 0) grid[cur.y + cy][cur.x + cx] = cur.color;
            });
            clearLines();
            spawnPiece();
            lockTimer = 0; lockResets = 0;
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r].every(c => c)) {
                    grid.splice(r, 1);
                    grid.unshift(Array(COLS).fill(0));
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[cleared] * level;
                lines += cleared;
                level = Math.floor(lines / 10) + 1;
                if (score > highScore) { highScore = score; localStorage.setItem('tetris6HighScore', highScore); }
            }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? reset() : null;
            if (e.key.toLowerCase() === 'p') currentState = currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState);
            if (currentState !== STATE_PLAYING) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') move(-1);
            if (e.key === 'ArrowRight' || e.key === 'd') move(1);
            if (e.key === 'ArrowUp' || e.key === 'w') rotate();
            if (e.key === 'ArrowDown' || e.key === 's') softDrop = true;
            if (e.key === ' ') hardDrop();
        });
        window.addEventListener('keyup', e => { if (e.key === 'ArrowDown' || e.key === 's') softDrop = false; });

        function reset() {
            initGrid(); shuffleBag();
            score = 0; level = 1; lines = 0;
            next = getNextPiece(); spawnPiece();
            currentState = STATE_PLAYING;
        }

        function update(dt) {
            if (currentState !== STATE_PLAYING) return;
            let grav = softDrop ? 50 : Math.max(100, 1000 - 75 * (level - 1));
            gravityTimer += dt * 1000;
            if (gravityTimer >= grav) {
                if (!collide(cur.x, cur.y + 1, cur.rot)) {
                    cur.y++;
                    if (softDrop) score += 1;
                    gravityTimer = 0; lockTimer = 0;
                } else {
                    lockTimer += grav;
                    if (lockTimer >= LOCK_DELAY_MS) lockPiece();
                }
            }
        }

        function drawCell(x, y, color, alpha = 1) {
            if (y < 0) return;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.fillRect(OFFSET_X + x * CELL, OFFSET_Y + y * CELL, CELL, CELL);
            ctx.strokeStyle = '#333';
            ctx.strokeRect(OFFSET_X + x * CELL, OFFSET_Y + y * CELL, CELL, CELL);
            ctx.globalAlpha = 1;
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 800, 600);
            
            // Playfield
            ctx.fillStyle = '#000'; ctx.fillRect(OFFSET_X, OFFSET_Y, COLS * CELL, ROWS * CELL);
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.strokeRect(OFFSET_X - 1, OFFSET_Y - 1, COLS * CELL + 2, ROWS * CELL + 2);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '48px monospace'; ctx.fillText('TETRIS', 380, 200);
                ctx.fillStyle = '#AAA'; ctx.font = '18px monospace'; ctx.fillText('Press Enter to Start', 380, 420);
                return;
            }

            grid.forEach((row, y) => row.forEach((color, x) => color && drawCell(x, y, color)));
            if (cur) {
                cur.shapes[cur.rot].forEach(([cx, cy]) => {
                    drawCell(cur.x + cx, ghostY + cy, cur.color, 0.3);
                    drawCell(cur.x + cx, cur.y + cy, cur.color);
                });
            }

            // HUD
            ctx.fillStyle = '#AAAAAA'; ctx.textAlign = 'left'; ctx.font = '14px monospace';
            ctx.fillText('NEXT', 560, 50);
            ctx.strokeRect(560, 60, 112, 112);
            if (next) next.shapes[0].forEach(([cx, cy]) => {
                ctx.fillStyle = next.color;
                ctx.fillRect(560 + (cx + 0.5) * CELL, 80 + (cy + 0.5) * CELL, CELL, CELL);
            });

            ctx.fillText('SCORE', 560, 220); ctx.fillStyle = '#FFF'; ctx.font = '20px monospace'; ctx.fillText(score, 560, 245);
            ctx.fillStyle = '#AAAAAA'; ctx.font = '14px monospace'; ctx.fillText('LEVEL', 560, 290); ctx.fillStyle = '#FFF'; ctx.font = '20px monospace'; ctx.fillText(level, 560, 315);
            ctx.fillStyle = '#AAAAAA'; ctx.font = '14px monospace'; ctx.fillText('LINES', 560, 360); ctx.fillStyle = '#FFF'; ctx.font = '20px monospace'; ctx.fillText(lines, 560, 385);
            ctx.fillStyle = '#AAAAAA'; ctx.font = '14px monospace'; ctx.fillText('BEST', 560, 430); ctx.fillStyle = '#FFF'; ctx.font = '20px monospace'; ctx.fillText(highScore, 560, 455);

            if (currentState === STATE_PAUSED) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(OFFSET_X, OFFSET_Y, 280, 560); ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 380, 300); }
            if (currentState === STATE_GAME_OVER) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(OFFSET_X, OFFSET_Y, 280, 560); ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('GAME OVER', 380, 250); ctx.font = '18px monospace'; ctx.fillText(`Final: ${score}`, 380, 300); ctx.fillText('Press Enter', 380, 350); }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
