  BUILDER:        google/gemini-3.1-pro-preview

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #FFFFFF;
            font-family: monospace;
        }
        canvas {
            background-color: #000000;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Machine
        const STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2,
            GAME_OVER: 3
        };
        let currentState = STATE.IDLE;
        let savedStateBeforePause = STATE.IDLE;

        // Input
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false, A: false,
            d: false, D: false,
            ' ': false
        };

        let spacePressed = false;

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();

            if (e.key === 'Enter') {
                if (currentState === STATE.IDLE || currentState === STATE.GAME_OVER) {
                    initGame();
                }
            } else if (e.key.toLowerCase() === 'p') {
                if (currentState === STATE.PLAYING) {
                    savedStateBeforePause = currentState;
                    currentState = STATE.PAUSED;
                } else if (currentState === STATE.PAUSED) {
                    currentState = savedStateBeforePause;
                }
            } else if (e.key === ' ' && currentState === STATE.PLAYING) {
                if (!spacePressed) {
                    firePlayerBullet();
                    spacePressed = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
            if (e.key === ' ') spacePressed = false;
        });

        // Audio Context (Optional Bonus)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        function playShoot() { playTone(900, 'square', 0.1); }
        function playHit() { playTone(200, 'sawtooth', 0.1); }
        function playDeath() { playTone(150, 'sawtooth', 0.6); }

        // Entities
        const ship = {
            width: 40,
            height: 32,
            x: 380,
            y: 550,
            speed: 300,
            color: '#00FF00',
            deadTimer: 0
        };

        const bullets = [];
        const alienBullets = [];
        let aliens = [];
        let shields = [];
        
        const formation = {
            cols: 11,
            rows: 5,
            direction: 1, // 1 for right, -1 for left
            baseSpeed: 30,
            currentSpeed: 30, // Increases as aliens die
            dropAmount: 20
        };

        const mysteryShip = {
            active: false,
            width: 48,
            height: 16,
            x: 0,
            y: 35,
            speed: 150,
            color: '#FF0000',
            timer: 0,
            direction: 1
        };

        // UI / State variables
        let score = 0;
        let lives = 3;
        let wave = 1;
        let highScore = parseInt(localStorage.getItem('spaceInvHighScore')) || 0;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceInvHighScore', highScore);
            }
        }

        function createAliens() {
            aliens = [];
            // "first alien center at x=120, y=80 with 50px horizontal and 40px vertical spacing"
            // "top row 24x16, middle rows 28x20, bottom rows 32x20"
            // "top row #FF0000, middle #FFCC00, bottom #00CCFF"
            // Rows: 5 (1 top, 2 middle, 2 bottom)
            const rowsConfig = [
                { width: 24, height: 16, color: '#FF0000', score: 30 },
                { width: 28, height: 20, color: '#FFCC00', score: 20 },
                { width: 28, height: 20, color: '#FFCC00', score: 20 },
                { width: 32, height: 20, color: '#00CCFF', score: 10 },
                { width: 32, height: 20, color: '#00CCFF', score: 10 }
            ];

            for (let r = 0; r < formation.rows; r++) {
                for (let c = 0; c < formation.cols; c++) {
                    const cfg = rowsConfig[r];
                    aliens.push({
                        col: c,
                        row: r,
                        x: 120 + c * 50 - cfg.width / 2, // Centered
                        y: 80 + r * 40 - cfg.height / 2,
                        width: cfg.width,
                        height: cfg.height,
                        color: cfg.color,
                        score: cfg.score,
                        alive: true
                    });
                }
            }
            formation.direction = 1;
            recalculateAlienSpeed();
        }

        function recalculateAlienSpeed() {
            let aliveCount = aliens.filter(a => a.alive).length;
            let total = formation.rows * formation.cols;
            let ratio = aliveCount / total;
            // Base speed is 30. Max speed maybe 250 when 1 remains.
            formation.currentSpeed = formation.baseSpeed + ((1 - ratio) * 200) + (wave - 1) * 10;
        }

        function createShields() {
            shields = [];
            // "origins at x=140, 300, 460, 620 with y=480"
            // "4 clusters of destructible 4x4px cells forming arch shapes"
            // "roughly 80x64px" -> 20 cells wide, 16 cells high
            const originsX = [140, 300, 460, 620];
            const originY = 480;
            const size = 4;
            const wCells = 20;
            const hCells = 16;
            
            for (let i = 0; i < originsX.length; i++) {
                let ox = originsX[i];
                let oy = originY;
                for (let cx = 0; cx < wCells; cx++) {
                    for (let cy = 0; cy < hCells; cy++) {
                        // Arch cutouts
                        // Cut corners (top left/right)
                        if ((cx < 3 && cy < 3 - cx) || (cx > wCells - 4 && cy < cx - wCells + 4)) continue;
                        // Cut bottom middle
                        if (cy > 8 && cx > 5 && cx < 14) continue;
                        
                        shields.push({
                            x: ox + cx * size,
                            y: oy + cy * size,
                            width: size,
                            height: size,
                            alive: true
                        });
                    }
                }
            }
        }

        function firePlayerBullet() {
            if (bullets.length === 0 && ship.deadTimer <= 0) {
                bullets.push({
                    x: ship.x + ship.width / 2 - 1.5,
                    y: ship.y,
                    width: 3,
                    height: 12,
                    speed: 500,
                    color: '#FFFFFF'
                });
                playShoot();
            }
        }

        function fireAlienBullet() {
            if (alienBullets.length >= 3) return;

            // Find valid columns
            let columns = {};
            for (let i = 0; i < aliens.length; i++) {
                let a = aliens[i];
                if (a.alive) {
                    if (!columns[a.col] || a.row > columns[a.col].row) {
                        columns[a.col] = a;
                    }
                }
            }

            let validCols = Object.values(columns);
            if (validCols.length > 0) {
                let shooter = validCols[Math.floor(Math.random() * validCols.length)];
                alienBullets.push({
                    x: shooter.x + shooter.width / 2 - 1.5,
                    y: shooter.y + shooter.height,
                    width: 3,
                    height: 12,
                    speed: 250,
                    color: '#FF4444'
                });
            }
        }

        // Timer for alien shots
        let nextAlienShot = 0; 
        
        function getMysteryShipTimer() {
            // 20-30 seconds
            return 20 + Math.random() * 10;
        }

        function initGame() {
            ship.x = 380;
            ship.deadTimer = 0;
            score = 0;
            lives = 3;
            wave = 1;

            bullets.length = 0;
            alienBullets.length = 0;

            createAliens();
            createShields();
            
            mysteryShip.active = false;
            mysteryShip.timer = getMysteryShipTimer();
            
            currentState = STATE.PLAYING;
            
            // Resume audio ctx if needed
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function nextWave() {
            wave++;
            bullets.length = 0;
            alienBullets.length = 0;
            createAliens();
            // Shields do NOT reset on next wave in classic Space Invaders!
            mysteryShip.active = false;
            mysteryShip.timer = getMysteryShipTimer();
        }

        function checkAABB(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function loseLife() {
            lives--;
            playDeath();
            if (lives <= 0) {
                updateHighScore();
                currentState = STATE.GAME_OVER;
            } else {
                ship.deadTimer = 2; // Invulnerable / dead animation for 2s
            }
        }

        let lastTime = 0;

        function update(dt) {
            if (currentState === STATE.PLAYING) {
                // Death pause handling
                if (ship.deadTimer > 0) {
                    ship.deadTimer -= dt;
                    if (ship.deadTimer <= 0) {
                        // Reset player position after death
                        ship.x = 380;
                    } else {
                        return; // Freeze game during death anim
                    }
                }

                // Player Movement
                let dx = 0;
                if (keys.ArrowLeft || keys.a || keys.A) dx = -1;
                if (keys.ArrowRight || keys.d || keys.D) dx = 1;
                
                ship.x += dx * ship.speed * dt;
                if (ship.x < 0) ship.x = 0;
                if (ship.x + ship.width > canvas.width) ship.x = canvas.width - ship.width;

                // Player Bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.y -= b.speed * dt;
                    
                    if (b.y + b.height < 0) {
                        bullets.splice(i, 1);
                        continue;
                    }

                    // Collide with UFO
                    if (mysteryShip.active && checkAABB(b, mysteryShip)) {
                        playHit();
                        const scores = [50, 100, 150, 300];
                        score += scores[Math.floor(Math.random() * scores.length)];
                        mysteryShip.active = false;
                        mysteryShip.timer = getMysteryShipTimer();
                        bullets.splice(i, 1);
                        continue;
                    }

                    // Collide with Aliens
                    let hit = false;
                    for (let a of aliens) {
                        if (a.alive && checkAABB(b, a)) {
                            playHit();
                            a.alive = false;
                            score += a.score;
                            recalculateAlienSpeed();
                            bullets.splice(i, 1);
                            hit = true;
                            break;
                        }
                    }
                    if (hit) continue;

                    // Collide with Shields
                    for (let s of shields) {
                        if (s.alive && checkAABB(b, s)) {
                            s.alive = false;
                            bullets.splice(i, 1);
                            hit = true;
                            break;
                        }
                    }
                }

                // Wave clear check
                if (!aliens.some(a => a.alive)) {
                    nextWave();
                    return; // Skip rest of frame
                }

                // Alien Movement
                let moveDist = formation.currentSpeed * dt * formation.direction;
                let hitEdge = false;
                let leftEdge = canvas.width, rightEdge = 0, bottomEdge = 0;

                // Calculate bounds of living aliens
                for (let a of aliens) {
                    if (a.alive) {
                        if (a.x < leftEdge) leftEdge = a.x;
                        if (a.x + a.width > rightEdge) rightEdge = a.x + a.width;
                        if (a.y + a.height > bottomEdge) bottomEdge = a.y + a.height;
                    }
                }

                // Check edge
                if ((formation.direction === 1 && rightEdge + moveDist > canvas.width - 20) ||
                    (formation.direction === -1 && leftEdge + moveDist < 20)) {
                    hitEdge = true;
                }

                if (hitEdge) {
                    formation.direction *= -1;
                    // Move down
                    for (let a of aliens) {
                        a.y += formation.dropAmount;
                    }
                    bottomEdge += formation.dropAmount;
                } else {
                    // Move horiz
                    for (let a of aliens) {
                        a.x += moveDist;
                    }
                }

                // "Game also ends if the alien formation descends to y>=540"
                if (bottomEdge >= 540) {
                    updateHighScore();
                    currentState = STATE.GAME_OVER;
                }
                
                // Alien -> Shield erosion
                for (let a of aliens) {
                    if (a.alive && a.y + a.height > 480) { // Optimize: only check if deep enough
                        for (let s of shields) {
                            if (s.alive && checkAABB(a, s)) {
                                s.alive = false;
                            }
                        }
                    }
                }

                // Alien Bullets
                nextAlienShot -= dt;
                if (nextAlienShot <= 0) {
                    fireAlienBullet();
                    // Shot interval depends on remaining aliens, somewhat random
                    nextAlienShot = 0.5 + Math.random() * (1.5 * (aliens.filter(a=>a.alive).length / 55));
                }

                for (let i = alienBullets.length - 1; i >= 0; i--) {
                    let b = alienBullets[i];
                    b.y += b.speed * dt;
                    
                    if (b.y > canvas.height) {
                        alienBullets.splice(i, 1);
                        continue;
                    }

                    // Collide with Player
                    if (checkAABB(b, ship)) {
                        alienBullets.splice(i, 1);
                        loseLife();
                        continue;
                    }

                    // Collide with Shields
                    let hit = false;
                    for (let s of shields) {
                        if (s.alive && checkAABB(b, s)) {
                            s.alive = false;
                            alienBullets.splice(i, 1);
                            hit = true;
                            break; // Stop checking shields for this bullet
                        }
                    }
                }

                // Mystery Ship
                if (!mysteryShip.active) {
                    mysteryShip.timer -= dt;
                    if (mysteryShip.timer <= 0) {
                        mysteryShip.active = true;
                        mysteryShip.direction = Math.random() > 0.5 ? 1 : -1;
                        if (mysteryShip.direction === 1) {
                            mysteryShip.x = -mysteryShip.width;
                        } else {
                            mysteryShip.x = canvas.width;
                        }
                    }
                } else {
                    mysteryShip.x += mysteryShip.speed * mysteryShip.direction * dt;
                    if ((mysteryShip.direction === 1 && mysteryShip.x > canvas.width) ||
                        (mysteryShip.direction === -1 && mysteryShip.x + mysteryShip.width < 0)) {
                        mysteryShip.active = false;
                        mysteryShip.timer = getMysteryShipTimer();
                    }
                }
            }
        }

        function drawShipSprite(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y + ship.height - 12, ship.width, 12);     // Base
            ctx.fillRect(x + 4, y + 8, ship.width - 8, ship.height - 20); // Mid
            ctx.fillRect(x + ship.width / 2 - 2, y, 4, 8);               // Gun
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentState === STATE.PLAYING || currentState === STATE.PAUSED || currentState === STATE.GAME_OVER) {
                
                // Draw Shields
                for (let s of shields) {
                    if (s.alive) {
                        ctx.fillStyle = '#00FF00';
                        ctx.fillRect(s.x, s.y, s.width, s.height);
                    }
                }

                // Draw Aliens
                for (let a of aliens) {
                    if (a.alive) {
                        ctx.fillStyle = a.color;
                        ctx.fillRect(a.x, a.y, a.width, a.height);
                    }
                }

                // Draw Player
                if (ship.deadTimer <= 0) {
                    drawShipSprite(ship.x, ship.y, ship.color);
                } else if (Math.floor(Date.now() / 100) % 2 === 0 && currentState !== STATE.GAME_OVER) {
                    // Flash death state
                    ctx.fillStyle = '#FF0000';
                    ctx.fillRect(ship.x, ship.y + 16, ship.width, 16);
                }

                // Draw Bullets
                for (let b of bullets) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                }
                for (let b of alienBullets) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                }

                // Draw Mystery Ship
                if (mysteryShip.active) {
                    ctx.fillStyle = mysteryShip.color;
                    // Draw saucer shape
                    ctx.fillRect(mysteryShip.x + 8, mysteryShip.y, mysteryShip.width - 16, 4);
                    ctx.fillRect(mysteryShip.x + 4, mysteryShip.y + 4, mysteryShip.width - 8, 4);
                    ctx.fillRect(mysteryShip.x, mysteryShip.y + 8, mysteryShip.width, 4);
                    ctx.fillRect(mysteryShip.x + 8, mysteryShip.y + 12, mysteryShip.width - 16, 4);
                }

                // Draw HUD
                ctx.fillStyle = '#FFFFFF';
                // Score top-left
                ctx.font = '16px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`SCORE: ${score}`, 16, 16);
                
                // High Score top-right
                ctx.textAlign = 'right';
                ctx.fillText(`HI: ${Math.max(score, highScore)}`, canvas.width - 16, 16);
                
                // Lives bottom-left
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`LIVES:`, 16, canvas.height - 16);
                for (let i = 0; i < lives - 1; i++) { // Render remaining lives (-1 for current active)
                    drawShipSprite(90 + i * 50, canvas.height - 40, '#00FF00');
                }
                
                // Wave bottom-right
                ctx.textAlign = 'right';
                ctx.fillText(`WAVE: ${wave}`, canvas.width - 16, canvas.height - 16);
            }

            if (currentState === STATE.IDLE) {
                ctx.fillStyle = '#00FF00';
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SPACE INVADERS', canvas.width / 2, 220);
                
                // Score Legend
                ctx.font = '20px monospace';
                ctx.fillStyle = '#FF0000'; ctx.fillText('= 30 PTS', canvas.width/2 + 20, 280);
                ctx.fillStyle = '#FFCC00'; ctx.fillText('= 20 PTS', canvas.width/2 + 20, 310);
                ctx.fillStyle = '#00CCFF'; ctx.fillText('= 10 PTS', canvas.width/2 + 20, 340);
                ctx.fillStyle = '#FF0000'; ctx.fillText('? MYSTERY', canvas.width/2 + 20, 370); // Sauce red
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '24px monospace';
                ctx.fillText('Press Enter to Start', canvas.width / 2, 450);
            } else if (currentState === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '36px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            } else if (currentState === STATE.GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, 220);
                
                ctx.font = '24px monospace';
                ctx.fillText(`SCORE: ${score}`, canvas.width / 2, 280);
                
                ctx.fillStyle = '#AAAAAA';
                ctx.fillText('Press Enter to restart', canvas.width / 2, 350);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
            const safeDt = Math.min(dt, 0.1); 
            lastTime = timestamp;

            update(safeDt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
