  BUILDER:        google/gemini-3-flash-preview
  PLANNER:        openai/gpt-5.4

  FIRST FAILURE:  none

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000000;
            display: block;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800, HEIGHT = 600;
        const PLAYER_SPEED = 300, BULLET_SPEED = 500, ALIEN_BULLET_SPEED = 250;
        const ALIEN_BASE_SPEED = 30, ALIEN_DROP = 20;

        // States
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        // Variables
        let score = 0, lives = 3, wave = 1, highScore = localStorage.getItem('invaders6HighScore') || 0;
        let lastTime = 0, playerX = 380, playerBullet = null, alienBullets = [], alienFireTimer = 0;
        let aliens = [], alienDir = 1, alienSpeed = ALIEN_BASE_SPEED;
        let shields = [], ufo = null, ufoTimer = 20;

        function initAliens() {
            aliens = [];
            alienDir = 1;
            alienSpeed = ALIEN_BASE_SPEED + (wave - 1) * 10;
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 11; c++) {
                    let type = 'L', color = '#00CCFF', pts = 10, w = 32, h = 20;
                    if (r === 0) { type = 'S'; color = '#FF0000'; pts = 30; w = 24; h = 16; }
                    else if (r < 3) { type = 'M'; color = '#FFCC00'; pts = 20; w = 28; h = 20; }
                    aliens.push({ x: 120 + c * 50, y: 80 + r * 40, w, h, color, pts, alive: true });
                }
            }
        }

        function initShields() {
            shields = [];
            [140, 300, 460, 620].forEach(sx => {
                let s = { x: sx, y: 480, cells: [] };
                for (let r = 0; r < 16; r++) {
                    for (let c = 0; c < 20; c++) {
                        if (r > 12 && c > 4 && c < 15) continue; // Arch
                        s.cells.push({ x: sx + c * 4, y: 480 + r * 4, alive: true });
                    }
                }
                shields.push(s);
            });
        }

        function resetGame() {
            score = 0; lives = 3; wave = 1; playerX = 380;
            playerBullet = null; alienBullets = []; ufo = null;
            ufoTimer = 20 + Math.random() * 10;
            initAliens(); initShields();
            currentState = STATE_PLAYING;
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.code === 'Space' && currentState === STATE_PLAYING && !playerBullet) {
                playerBullet = { x: playerX + 18.5, y: 550, w: 3, h: 12 };
            }
            if (e.code === 'KeyP') currentState = currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState);
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update(dt) {
            if (currentState !== STATE_PLAYING) return;

            // Player movement
            if (keys['ArrowLeft'] || keys['KeyA']) playerX -= PLAYER_SPEED * dt;
            if (keys['ArrowRight'] || keys['KeyD']) playerX += PLAYER_SPEED * dt;
            playerX = Math.max(0, Math.min(WIDTH - 40, playerX));

            // Player Bullet
            if (playerBullet) {
                playerBullet.y -= BULLET_SPEED * dt;
                if (playerBullet.y < 0) playerBullet = null;
            }

            // Alien March
            let edge = false;
            const aliveCount = aliens.filter(a => a.alive).length;
            const speed = alienSpeed + (55 - aliveCount) * 4;
            aliens.forEach(a => {
                if (!a.alive) return;
                a.x += speed * alienDir * dt;
                if (a.x < 20 || a.x > 750) edge = true;
            });
            if (edge) {
                alienDir *= -1;
                aliens.forEach(a => { 
                    a.y += ALIEN_DROP;
                    if (a.alive && a.y >= 540) currentState = STATE_GAME_OVER;
                });
            }

            // Alien Fire
            alienFireTimer += dt;
            if (alienFireTimer > (1.0 + Math.random() * 0.5) && alienBullets.length < 3) {
                alienFireTimer = 0;
                let cols = {};
                aliens.forEach((a, i) => { if (a.alive) { let c = i % 11; if (!cols[c] || a.y > cols[c].y) cols[c] = a; } });
                let shooters = Object.values(cols);
                if (shooters.length) {
                    let s = shooters[Math.floor(Math.random() * shooters.length)];
                    alienBullets.push({ x: s.x + s.w/2, y: s.y + s.h, w: 3, h: 12 });
                }
            }
            alienBullets.forEach((b, i) => {
                b.y += ALIEN_BULLET_SPEED * dt;
                if (b.y > HEIGHT) alienBullets.splice(i, 1);
            });

            // UFO
            ufoTimer -= dt;
            if (ufoTimer <= 0 && !ufo) { ufo = { x: -48, y: 35, w: 48, h: 16, vx: 150 }; }
            if (ufo) {
                ufo.x += ufo.vx * dt;
                if (ufo.x > WIDTH) { ufo = null; ufoTimer = 20 + Math.random() * 10; }
            }

            checkCollisions();

            if (aliens.every(a => !a.alive)) { wave++; initAliens(); }
        }

        function checkCollisions() {
            const rect = (r1, r2) => r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;

            if (playerBullet) {
                for (let a of aliens) if (a.alive && rect(playerBullet, a)) { a.alive = false; score += a.pts; playerBullet = null; break; }
                if (playerBullet && ufo && rect(playerBullet, ufo)) { score += [50, 100, 150, 300][Math.floor(Math.random()*4)]; ufo = null; ufoTimer = 20 + Math.random()*10; playerBullet = null; }
                if (playerBullet) for (let s of shields) for (let c of s.cells) if (c.alive && rect(playerBullet, {x:c.x, y:c.y, w:4, h:4})) { c.alive = false; playerBullet = null; break; }
                if (score > highScore) { highScore = score; localStorage.setItem('invaders6HighScore', highScore); }
            }

            alienBullets.forEach((b, i) => {
                if (rect(b, {x:playerX, y:550, w:40, h:32})) { lives--; alienBullets.splice(i, 1); if (lives <= 0) currentState = STATE_GAME_OVER; }
                else for (let s of shields) for (let c of s.cells) if (c.alive && rect(b, {x:c.x, y:c.y, w:4, h:4})) { c.alive = false; alienBullets.splice(i, 1); return; }
            });

            aliens.forEach(a => { if (a.alive) for (let s of shields) for (let c of s.cells) if (c.alive && rect(a, {x:c.x, y:c.y, w:4, h:4})) c.alive = false; });
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);

            if (currentState === STATE_IDLE) {
                ctx.fillStyle = '#00FF00'; ctx.textAlign = 'center'; ctx.font = '48px monospace'; ctx.fillText('SPACE INVADERS', 400, 220);
                ctx.font = '16px monospace'; ctx.fillStyle = '#FFF'; ctx.fillText('Legend:', 400, 280);
                ctx.fillStyle = '#FF0000'; ctx.fillText('Small: 30 pts', 400, 310);
                ctx.fillStyle = '#FFCC00'; ctx.fillText('Medium: 20 pts', 400, 340);
                ctx.fillStyle = '#00CCFF'; ctx.fillText('Large: 10 pts', 400, 370);
                ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Start', 400, 440);
                return;
            }

            ctx.fillStyle = '#00FF00'; ctx.fillRect(playerX, 558, 40, 24); ctx.fillRect(playerX+15, 550, 10, 8);
            aliens.forEach(a => { if (a.alive) { ctx.fillStyle = a.color; ctx.fillRect(a.x, a.y, a.w, a.h); } });
            if (playerBullet) { ctx.fillStyle = '#FFF'; ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h); }
            alienBullets.forEach(b => { ctx.fillStyle = '#FF4444'; ctx.fillRect(b.x, b.y, b.w, b.h); });
            shields.forEach(s => s.cells.forEach(c => { if (c.alive) { ctx.fillStyle = '#00FF00'; ctx.fillRect(c.x, c.y, 4, 4); } }));
            if (ufo) { ctx.fillStyle = '#FF0000'; ctx.fillRect(ufo.x, ufo.y, ufo.w, ufo.h); }

            ctx.fillStyle = '#FFF'; ctx.font = '16px monospace'; ctx.textAlign = 'left'; ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'right'; ctx.fillText(`Best: ${highScore}`, 790, 24);
            ctx.textAlign = 'left'; ctx.fillText(`Lives: ${lives}`, 10, 580);
            ctx.textAlign = 'right'; ctx.fillText(`Wave: ${wave}`, 790, 580);

            if (currentState === STATE_PAUSED) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 400, 300);
            } else if (currentState === STATE_GAME_OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '40px monospace'; ctx.fillText('GAME OVER', 400, 260);
                ctx.font = '20px monospace'; ctx.fillText(`Final: ${score}`, 400, 310);
                ctx.font = '18px monospace'; ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 400, 360);
            }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.1));
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
