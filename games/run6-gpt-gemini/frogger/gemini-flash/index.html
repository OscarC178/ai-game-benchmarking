<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="700"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const GRID = 40, ROWS = 13, COLS = 15;
        const WIDTH = 600, HEIGHT = 700;
        const OFFSET_Y = 40;

        // States
        const STATE_IDLE = 'IDLE', STATE_PLAYING = 'PLAYING', STATE_PAUSED = 'PAUSED', STATE_GAME_OVER = 'GAME_OVER';
        let currentState = STATE_IDLE;

        // Variables
        let score = 0, high_score = localStorage.getItem('frogger6HighScore') || 0, lives = 3, level = 1;
        let timer = 30, timerMax = 30, lastTime = 0, maxRowReached = 12;
        let frog = { x: 7 * GRID, y: 12 * GRID + OFFSET_Y, targetX: 7 * GRID, targetY: 12 * GRID + OFFSET_Y, hopping: 0 };
        let vehicles = [], platforms = [], homeBays = [], deathTimer = 0;

        function initLanes() {
            vehicles = []; platforms = [];
            const speedScale = Math.pow(1.15, level - 1);
            
            // Road Lanes (y positions from spec)
            addLane(vehicles, 480 + OFFSET_Y, 80 * speedScale, 48, '#CCCC00', 180, 1);  // Lane 1
            addLane(vehicles, 440 + OFFSET_Y, -60 * speedScale, 96, '#3344AA', 240, -1); // Lane 2
            addLane(vehicles, 400 + OFFSET_Y, 140 * speedScale, 48, '#DD2222', 160, 1);  // Lane 3
            addLane(vehicles, 360 + OFFSET_Y, -70 * speedScale, 64, '#CCCCCC', 200, -1); // Lane 4
            addLane(vehicles, 320 + OFFSET_Y, 160 * speedScale, 96, '#FF66AA', 250, 1);  // Lane 5

            // River Lanes (y positions from spec)
            addLane(platforms, 240 + OFFSET_Y, 60 * speedScale, 120, '#885522', 200, 1, 'log');   // Lane 6
            addLane(platforms, 200 + OFFSET_Y, -50 * speedScale, 120, '#448844', 180, -1, 'turtle', 3); // Lane 7 (diving)
            addLane(platforms, 160 + OFFSET_Y, 160 * speedScale, 160, '#774411', 280, 1, 'log');   // Lane 8
            addLane(platforms, 120 + OFFSET_Y, -70 * speedScale, 80, '#448844', 160, -1, 'turtle', 2);  // Lane 9 (diving)
            addLane(platforms, 80 + OFFSET_Y, 80 * speedScale, 200, '#885522', 300, 1, 'log');     // Lane 10
        }

        function addLane(arr, y, speed, w, color, spacing, dir, type = 'car', divIdx = 0) {
            for (let x = -w; x < WIDTH + spacing; x += spacing) {
                const groupIdx = Math.floor((x + w) / spacing);
                arr.push({ x, y, speed, w, color, dir, type, diving: (divIdx > 0 && groupIdx % divIdx === 0) });
            }
        }

        function initHomeBays() {
            homeBays = [20, 140, 260, 380, 500].map(x => ({ x, y: 40 + OFFSET_Y - GRID, w: 48, h: 36, filled: false }));
        }

        function resetFrog() {
            frog = { x: 7 * GRID, y: 12 * GRID + OFFSET_Y, targetX: 7 * GRID, targetY: 12 * GRID + OFFSET_Y, hopping: 0 };
            timer = timerMax; maxRowReached = 12;
        }

        function resetGame() {
            score = 0; lives = 3; level = 1;
            initLanes(); initHomeBays(); resetFrog();
            currentState = STATE_PLAYING;
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Enter') (currentState === STATE_IDLE || currentState === STATE_GAME_OVER) ? resetGame() : null;
            if (e.code === 'KeyP') currentState = currentState === STATE_PLAYING ? STATE_PAUSED : (currentState === STATE_PAUSED ? STATE_PLAYING : currentState);
            if (currentState !== STATE_PLAYING || frog.hopping > 0 || deathTimer > 0) return;

            let nx = frog.x, ny = frog.y;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') ny -= GRID;
            else if (e.code === 'ArrowDown' || e.code === 'KeyS') ny += GRID;
            else if (e.code === 'ArrowLeft' || e.code === 'KeyA') nx -= GRID;
            else if (e.code === 'ArrowRight' || e.code === 'KeyD') nx += GRID;

            if (nx >= 0 && nx < WIDTH && ny >= OFFSET_Y && ny < HEIGHT - GRID) {
                frog.targetX = nx; frog.targetY = ny; frog.hopping = 0.08;
                const row = Math.round((ny - OFFSET_Y) / GRID);
                if (row < maxRowReached) { score += 10; maxRowReached = row; }
            }
        });

        function update(dt) {
            if (dt > 0.1) dt = 0.1;
            if (currentState === STATE_PLAYING) {
                if (deathTimer > 0) {
                    deathTimer -= dt;
                    if (deathTimer <= 0) {
                        lives--; if (lives <= 0) currentState = STATE_GAME_OVER; else resetFrog();
                    }
                    return;
                }

                timer -= dt;
                if (timer <= 0) { kill(); return; }

                [...vehicles, ...platforms].forEach(h => {
                    h.x += h.speed * dt;
                    if (h.speed > 0 && h.x > WIDTH) h.x = -h.w;
                    else if (h.speed < 0 && h.x < -h.w) h.x = WIDTH;
                });

                if (frog.hopping > 0) {
                    frog.hopping -= dt;
                    if (frog.hopping <= 0) { frog.x = frog.targetX; frog.y = frog.targetY; }
                }

                if (frog.hopping <= 0) {
                    const row = Math.round((frog.y - OFFSET_Y) / GRID);
                    // Road rows
                    if (row >= 7 && row <= 11) {
                        for (let v of vehicles) if (v.y === frog.y && frog.x + 20 > v.x && frog.x + 20 < v.x + v.w) { kill(); return; }
                    }
                    // River rows
                    if (row >= 1 && row <= 5) {
                        let supported = null;
                        platforms.forEach(p => {
                            if (p.y === frog.y && frog.x + 20 > p.x && frog.x + 20 < p.x + p.w) {
                                let submerged = false;
                                if (p.type === 'turtle' && p.diving) {
                                    const cycle = (Date.now() / 1000) % 7;
                                    if (cycle > 4 && cycle < 6) submerged = true;
                                }
                                if (!submerged) supported = p;
                            }
                        });
                        if (supported) {
                            frog.x += supported.speed * dt; frog.targetX = frog.x;
                            if (frog.x + 20 < 0 || frog.x + 20 > WIDTH) { kill(); return; }
                        } else { kill(); return; }
                    }
                    // Home row
                    if (row === 0) {
                        let bay = homeBays.find(b => frog.x + 20 > b.x && frog.x + 20 < b.x + b.w);
                        if (bay && !bay.filled) {
                            bay.filled = true; score += 50 + Math.floor(timer) * 2;
                            if (homeBays.every(b => b.filled)) { score += 1000; level++; initHomeBays(); initLanes(); }
                            resetFrog();
                        } else { kill(); return; }
                    }
                }
                if (score > high_score) { high_score = score; localStorage.setItem('frogger6HighScore', high_score); }
            }
        }

        function kill() { deathTimer = 1.0; }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#222244'; ctx.fillRect(0, 12 * GRID + OFFSET_Y, WIDTH, GRID); // Start
            ctx.fillStyle = '#333'; ctx.fillRect(0, 7 * GRID + OFFSET_Y, WIDTH, 5 * GRID); // Road
            ctx.fillStyle = '#224422'; ctx.fillRect(0, 6 * GRID + OFFSET_Y, WIDTH, GRID); // Median
            ctx.fillStyle = '#111188'; ctx.fillRect(0, 1 * GRID + OFFSET_Y, WIDTH, 5 * GRID); // River
            ctx.fillStyle = '#111188'; ctx.fillRect(0, OFFSET_Y, WIDTH, GRID); // Home wall
            
            homeBays.forEach(b => {
                ctx.fillStyle = '#000066'; ctx.fillRect(b.x, b.y, b.w, b.h);
                if (b.filled) drawFrog(b.x + 8, b.y + 2, 32);
            });

            vehicles.forEach(v => { ctx.fillStyle = v.color; ctx.fillRect(v.x, v.y + 4, v.w, GRID - 8); ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(v.x + v.w - 10, v.y + 10, 6, GRID - 20); });
            platforms.forEach(p => {
                let opacity = 1;
                if (p.type === 'turtle' && p.diving) {
                    const cycle = (Date.now() / 1000) % 7;
                    if (cycle > 3 && cycle < 4) opacity = (Math.floor(Date.now() / 125) % 2 === 0) ? 0.5 : 1;
                    else if (cycle >= 4 && cycle <= 6) opacity = 0;
                    else if (cycle > 6) opacity = (Math.floor(Date.now() / 125) % 2 === 0) ? 0.5 : 1;
                }
                if (opacity > 0) { ctx.globalAlpha = opacity; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y + 4, p.w, GRID - 8); ctx.globalAlpha = 1; }
            });

            if (deathTimer > 0) { if (Math.floor(Date.now() / 125) % 2 === 0) drawFrog(frog.x + 4, frog.y + 4, 32, '#FF0000'); }
            else if (currentState !== STATE_IDLE) { drawFrog(frog.x + 4, frog.y + 4, 32); }

            ctx.fillStyle = '#FFF'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 10, 24);
            ctx.textAlign = 'right'; ctx.fillText(`Best: ${high_score}`, 590, 24);
            const tRatio = timer / timerMax;
            ctx.fillStyle = tRatio > 0.5 ? '#22CC22' : tRatio > 0.2 ? '#CCCC00' : '#DD2222';
            ctx.fillRect(10, 680, 580 * tRatio, 12);
            ctx.fillStyle = '#FFF'; ctx.textAlign = 'left'; ctx.fillText('×' + lives, 40, 670);
            drawFrog(10, 650, 24);
            ctx.textAlign = 'right'; ctx.fillStyle = '#AAA'; ctx.fillText(`Level: ${level}`, 590, 670);

            if (currentState === STATE_IDLE) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#22CC22'; ctx.font = '52px monospace'; ctx.textAlign = 'center'; ctx.fillText('FROGGER', 300, 280); ctx.fillStyle = '#AAA'; ctx.font = '20px monospace'; ctx.fillText('Press Enter to Start', 300, 380); }
            else if (currentState === STATE_PAUSED) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('PAUSED', 300, 350); }
            else if (currentState === STATE_GAME_OVER) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = '40px monospace'; ctx.fillText('GAME OVER', 300, 300); ctx.font = '20px monospace'; ctx.fillText(`Final: ${score}`, 300, 350); ctx.fillStyle = '#AAA'; ctx.fillText('Press Enter to Restart', 300, 400); }
        }

        function drawFrog(x, y, s, color = '#22CC22') {
            ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(x, y, s, s, 6); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x + s * 0.3, y + s * 0.2, s * 0.1, 0, 7); ctx.arc(x + s * 0.7, y + s * 0.2, s * 0.1, 0, 7); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(x + s * 0.3, y + s * 0.15, s * 0.04, 0, 7); ctx.arc(x + s * 0.7, y + s * 0.15, s * 0.04, 0, 7); ctx.fill();
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;
            update(dt); draw(); requestAnimationFrame(gameLoop);
        }
        initLanes(); initHomeBays();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
