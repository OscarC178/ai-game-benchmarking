<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    canvas {
      background: #000000;
      width: 800px;
      height: 600px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: 1px solid #111;
      box-shadow: 0 0 0 1px #000, 0 12px 30px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="800" height="600" aria-label="Pong"></canvas>
  </div>

  <script>
    (() => {
      "use strict";

      // --- Constants / Spec ---
      const W = 800, H = 600;

      const PADDLE_W = 12;
      const PADDLE_H = 84;
      const PADDLE_COLOR = "#FFFFFF";

      const BALL_SIZE = 12;
      const BALL_COLOR = "#FFFFFF";

      const CENTER_DIVIDER_COLOR = "#3A3A3A";

      const PLAYER_X = 32;
      const CPU_X = 756;

      const PLAYER_SPEED = 420; // px/s @ spec
      const CPU_MAX_SPEED = 320; // px/s max
      const CPU_REACTION_DELAY_MS = 80;

      const LAUNCH_BASE_SPEED = 340;
      const LAUNCH_MIN_ANGLE = -28; // degrees
      const LAUNCH_MAX_ANGLE = 28;  // degrees

      const SPEED_INCREMENT_PER_PADDLE = 22;
      const SPEED_CAP = 620;

      const SERVE_DELAY_S = 0.9;

      const TARGET_POINTS = 7;

      // --- Canvas ---
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("2D context not available");

      // --- Audio (optional bonus) ---
      let audioCtx = null;
      function ensureAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === "suspended") {
          // Resume on user gesture when possible
          audioCtx.resume().catch(() => {});
        }
      }
      function playTone({ freq = 440, duration = 0.045, type = "square", gain = 0.04, ramp = 0.002 } = {}) {
        try {
          ensureAudio();
          if (!audioCtx) return;
          const t0 = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = type;
          osc.frequency.value = freq;

          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(gain, t0 + ramp);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

          osc.connect(g);
          g.connect(audioCtx.destination);

          osc.start(t0);
          osc.stop(t0 + duration + ramp + 0.01);
        } catch (_) {}
      }
      function playScoreSweep() {
        // descending 700 -> 320 over 180ms
        try {
          ensureAudio();
          if (!audioCtx) return;
          const t0 = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(700, t0);
          osc.frequency.exponentialRampToValueAtTime(320, t0 + 0.18);
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.05, t0 + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
          osc.connect(g); g.connect(audioCtx.destination);
          osc.start(t0);
          osc.stop(t0 + 0.20);
        } catch (_) {}
      }
      function playPaddleHit() { playTone({ freq: 440, duration: 0.045, type: "square", gain: 0.035 }); }
      function playWallBounce() { playTone({ freq: 220, duration: 0.045, type: "square", gain: 0.03 }); }
      function playServeSide() {} // no-op

      // --- Utility ---
      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function degToRad(d) { return d * Math.PI / 180; }
      function sign(n) { return n < 0 ? -1 : 1; }

      // --- State machine ---
      const State = Object.freeze({
        IDLE: "IDLE",
        PLAYING: "PLAYING",
        PAUSED: "PAUSED",
        GAME_OVER: "GAME_OVER"
      });

      let state = State.IDLE;

      // Spec: log transitions to console
      let lastState = null;
      function setState(next) {
        if (state === next) return;
        lastState = state;
        state = next;
        console.log(`State: ${lastState} -> ${state}`);
      }

      // --- Game objects ---
      const player = {
        x: PLAYER_X,
        y: 258,
        w: PADDLE_W,
        h: PADDLE_H,
        speed: PLAYER_SPEED
      };

      const cpu = {
        x: CPU_X,
        y: 258,
        w: PADDLE_W,
        h: PADDLE_H,
        maxSpeed: CPU_MAX_SPEED,
        reactionDelayMs: CPU_REACTION_DELAY_MS,
        targetY: 258,
        nextDecisionTime: 0
      };

      const ball = {
        x: 394,
        y: 294,
        s: BALL_SIZE,
        r: BALL_SIZE / 2,
        vx: 0,
        vy: 0,
        speed: LAUNCH_BASE_SPEED,
        lastHitSide: 0 // -1 player hit (ball moving left) or +1 cpu hit (moving right) for debug
      };

      const serve = {
        active: false,
        timer: 0,
        // who conceded: player side concede => cpu scores => serve toward player (right->left? actually ball travels toward conceding player)
        // We'll use serveDir: -1 => towards left (player), +1 => towards right (cpu)
        dir: 1
      };

      let playerScore = 0;
      let cpuScore = 0;
      let highScore = 0;

      const storageKey = "pong_high_score";
      function loadHighScore() {
        const v = Number(localStorage.getItem(storageKey) || "0");
        highScore = Number.isFinite(v) ? v : 0;
      }
      function saveHighScore() {
        const max = Math.max(highScore, playerScore);
        highScore = max;
        localStorage.setItem(storageKey, String(highScore));
      }

      // --- Input ---
      const keys = new Set();
      let awaitingAudioGesture = false;

      window.addEventListener("keydown", (e) => {
        // Prevent scrolling with arrows/space
        const k = e.key;
        if (["ArrowUp","ArrowDown"," "].includes(k)) e.preventDefault();

        if (["ArrowUp","ArrowDown","w","W","s","S","Enter","p","P"].includes(k) || ["p","P"].includes(k)) {
          ensureAudio();
        }

        if (k === "ArrowUp" || k === "w" || k === "W") keys.add("up");
        if (k === "ArrowDown" || k === "s" || k === "S") keys.add("down");

        if (k === "Enter") {
          if (state === State.IDLE) {
            startGame();
          } else if (state === State.GAME_OVER) {
            startGame(true);
          } else if (state === State.PAUSED) {
            // Spec doesn't say Enter to unpause; keep consistent: only Enter starts/restarts.
          } else {
            // If playing ignore Enter
          }
        }

        if (k === "p" || k === "P") {
          // Spec: Pause / Unpause overlays; completely halt motion.
          if (state === State.PLAYING) setState(State.PAUSED);
          else if (state === State.PAUSED) setState(State.PLAYING);
        }
      }, { passive: false });

      window.addEventListener("keyup", (e) => {
        const k = e.key;
        if (k === "ArrowUp" || k === "w" || k === "W") keys.delete("up");
        if (k === "ArrowDown" || k === "s" || k === "S") keys.delete("down");
      });

      // --- Serving / Reset ---
      function resetPositions() {
        player.y = 258;
        cpu.y = 258;
        ball.x = 394;
        ball.y = 294;
        ball.vx = 0;
        ball.vy = 0;
        ball.speed = LAUNCH_BASE_SPEED;
        cpu.targetY = cpu.y;
        cpu.nextDecisionTime = performance.now();
        serve.active = false;
        serve.timer = 0;
        serve.dir = 1;
      }

      function computeLaunch(dir) {
        // dir: -1 towards left, +1 towards right
        // angle in degrees between -28 and +28 toward a side.
        const angleDeg = (Math.random() * (LAUNCH_MAX_ANGLE - LAUNCH_MIN_ANGLE)) + LAUNCH_MIN_ANGLE;
        const angleRad = degToRad(angleDeg);
        // vx sign based on dir; vy uses tan(angle) relationship.
        // We define speed as ball.speed (or LAUNCH_BASE_SPEED) and split into components.
        // For 0 angle => straight horizontally.
        const s = ball.speed;
        const vx = Math.cos(angleRad) * s * dir;
        const vy = Math.sin(angleRad) * s; // same sign for up/down based on angle
        return { vx, vy };
      }

      function relaunchToward(dir) {
        // dir = -1 towards player (left), +1 towards cpu (right)
        ball.x = 394;
        ball.y = 294;
        ball.speed = LAUNCH_BASE_SPEED;
        const { vx, vy } = computeLaunch(dir);
        ball.vx = vx;
        ball.vy = vy;
        serve.active = false;
        serve.timer = 0;
      }

      function scheduleServe(dir) {
        serve.active = true;
        serve.timer = SERVE_DELAY_S;
        serve.dir = dir;
      }

      // --- Scoring / Game flow ---
      function checkWin() {
        if (playerScore >= TARGET_POINTS) {
          saveHighScore();
          setState(State.GAME_OVER);
        } else if (cpuScore >= TARGET_POINTS) {
          setState(State.GAME_OVER);
        }
      }

      function addPoint(side) {
        // side: "player" means player scored => cpu conceded => ball will serve toward CPU (right)
        // side: "cpu" means cpu scored => player conceded => ball will serve toward player (left)
        if (side === "player") playerScore++;
        else cpuScore++;

        // update high score only on win or persist - but spec says stored in localStorage
        highScore = Math.max(highScore, playerScore);
        playScoreSweep();

        // Reset and serve after 0.9s toward the player who conceded:
        // - If CPU scored, player conceded => serve toward player => dir = -1
        // - If Player scored, CPU conceded => serve toward CPU => dir = +1
        const dir = (side === "cpu") ? -1 : 1;
        ball.x = 394; ball.y = 294;
        ball.vx = 0; ball.vy = 0;
        scheduleServe(dir);

        checkWin();
      }

      function startGame(forceReset = false) {
        ensureAudio();
        if (forceReset) {
          playerScore = 0;
          cpuScore = 0;
        } else {
          playerScore = 0;
          cpuScore = 0;
        }
        loadHighScore();
        resetPositions();

        // ball starts center and launches after game start (immediately for feel)
        // Spec says ball launches after game start; we can do immediate launch with random angle.
        // Choose first serve toward CPU (player should be able to score by bouncing back).
        // We'll serve toward the player who is playing: ball starts and launches toward the right (CPU).
        setState(State.PLAYING);

        // initial speed at 340 and randomized angle toward a side: toward CPU (+1)
        ball.speed = LAUNCH_BASE_SPEED;
        const { vx, vy } = computeLaunch(+1);
        ball.vx = vx;
        ball.vy = vy;
      }

      // --- Collision Helpers ---
      function aabbOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      // --- Update ---
      let lastTime = performance.now();
      function update(dt) {
        if (state === State.PAUSED) return;

        if (state !== State.PLAYING) {
          // In IDLE/GAME_OVER keep static.
          return;
        }

        // Serve delay handling (still in PLAYING but ball is frozen)
        if (serve.active) {
          serve.timer -= dt;
          if (serve.timer <= 0) {
            serve.active = false;
            // speed reset and relaunch:
            relaunchToward(serve.dir);
          }
          return;
        }

        // Player movement
        let move = 0;
        if (keys.has("up")) move -= player.speed;
        if (keys.has("down")) move += player.speed;
        player.y = clamp(player.y + move * dt, 0, H - player.h - 0); // spec y clamp 0..516 for 600-84 = 516

        // CPU movement with imperfect delay
        const now = performance.now();
        if (now >= cpu.nextDecisionTime) {
          cpu.nextDecisionTime = now + cpu.reactionDelayMs;
          // Only update target if ball moving towards CPU or even if not; classic pong often tracks.
          // We'll track predicted intersection with CPU paddle's x, but with delay.
          const ballMovingRight = ball.vx > 0;
          const dx = (cpu.x + cpu.w) - (ball.x + ball.s / 2);
          let target = cpu.y + cpu.h / 2;

          if (ballMovingRight && dx !== 0) {
            // Predict time to reach CPU front edge:
            const t = dx / ball.vx;
            const yAt = (ball.y + ball.s / 2) + ball.vy * t;
            // Reflect prediction within walls (0..H)
            const top = 0;
            const bottom = H;
            // Map yAt to bouncing within [0, H] using modulo reflection
            const span = bottom - top;
            let y = yAt - top;
            if (span > 0) {
              y = ((y % (2 * span)) + (2 * span)) % (2 * span);
              if (y > span) y = 2 * span - y;
            }
            target = y + top;
          } else {
            // If ball moving away, loosely return to center
            target = H / 2;
          }

          cpu.targetY = target - cpu.h / 2;
        }

        // Move CPU toward target at max speed
        const dy = cpu.targetY - cpu.y;
        const maxStep = cpu.maxSpeed * dt;
        cpu.y += clamp(dy, -maxStep, maxStep);
        cpu.y = clamp(cpu.y, 0, H - cpu.h);

        // Ball movement
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall collisions (top/bottom)
        if (ball.y <= 0) {
          if (ball.vy < 0) playWallBounce();
          ball.y = 0;
          ball.vy = -ball.vy;
        } else if (ball.y + ball.s >= H) {
          if (ball.vy > 0) playWallBounce();
          ball.y = H - ball.s;
          ball.vy = -ball.vy;
        }

        // Scoring boundaries: full exit left/right => after full ball exits playfield
        if (ball.x + ball.s < 0) {
          // CPU scores
          addPoint("cpu");
          return;
        }
        if (ball.x > W) {
          // Player scores
          addPoint("player");
          return;
        }

        // Paddle collisions with AABB
        // Player paddle
        if (ball.vx < 0) {
          if (aabbOverlap(ball.x, ball.y, ball.s, ball.s, player.x, player.y, player.w, player.h)) {
            // Only bounce if ball is moving toward player (vx<0)
            // Snap out to avoid sticking
            ball.x = player.x + player.w;

            // Impact offset shaping: -1 top to +1 bottom relative to paddle center
            const paddleCenter = player.y + player.h / 2;
            const ballCenterY = ball.y + ball.s / 2;
            const offset = (ballCenterY - paddleCenter) / (player.h / 2); // -1..1
            const clampedOffset = clamp(offset, -1, 1);

            // Convert offset to angle: map to +-28 degrees
            const outAngleDeg = clampedOffset * LAUNCH_MAX_ANGLE;
            const outAngleRad = degToRad(outAngleDeg);

            // Increase speed each paddle hit (up to cap)
            ball.speed = Math.min(ball.speed + SPEED_INCREMENT_PER_PADDLE, SPEED_CAP);

            const s = ball.speed;
            ball.vx = Math.cos(outAngleRad) * s; // towards right after hitting left paddle
            ball.vy = Math.sin(outAngleRad) * s;

            playPaddleHit();
            ball.lastHitSide = -1;
          }
        }

        // CPU paddle
        if (ball.vx > 0) {
          if (aabbOverlap(ball.x, ball.y, ball.s, ball.s, cpu.x, cpu.y, cpu.w, cpu.h)) {
            ball.x = cpu.x - ball.s;

            const paddleCenter = cpu.y + cpu.h / 2;
            const ballCenterY = ball.y + ball.s / 2;
            const offset = (ballCenterY - paddleCenter) / (cpu.h / 2);
            const clampedOffset = clamp(offset, -1, 1);

            const outAngleDeg = clampedOffset * LAUNCH_MAX_ANGLE;
            const outAngleRad = degToRad(outAngleDeg);

            ball.speed = Math.min(ball.speed + SPEED_INCREMENT_PER_PADDLE, SPEED_CAP);

            const s = ball.speed;
            ball.vx = -Math.cos(outAngleRad) * s; // towards left after hitting right paddle
            ball.vy = Math.sin(outAngleRad) * s;

            playPaddleHit();
            ball.lastHitSide = +1;
          }
        }
      }

      // --- Render ---
      function drawDivider() {
        // Dashed vertical line centered at x=400 from top to bottom
        const x = 400 - 2; // 4px wide
        const dash = 16;
        const gap = 10;
        let y = 0;
        ctx.fillStyle = CENTER_DIVIDER_COLOR;
        while (y < H) {
          ctx.fillRect(x, y, 4, Math.min(dash, H - y));
          y += dash + gap;
        }
      }

      function drawTextCentered(text, y, size, color) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.font = `${size}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, W / 2, y);
        ctx.restore();
      }

      function draw() {
        // Clear
        ctx.clearRect(0, 0, W, H);
        // Background already black via style but ensure:
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, W, H);

        drawDivider();

        // Draw paddles
        ctx.fillStyle = PADDLE_COLOR;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);

        // Draw ball
        ctx.fillStyle = BALL_COLOR;
        ctx.fillRect(ball.x, ball.y, ball.s, ball.s);

        // Score + high score + lives/health (spec says not applicable but still render lives/health indicator)
        // We'll interpret as "Lives: N/A" or "HEALTH: —"; but spec requires render lives/health indicator top-right.
        // We'll keep it minimal: "HEALTH: —" to satisfy UI element.
        ctx.save();
        ctx.fillStyle = "#FFFFFF";
        ctx.font = `48px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        // Scores near top center: spec says x=300 y=54 for player and x=500 y=54 for CPU
        ctx.fillText(String(playerScore), 300, 54);
        ctx.fillText(String(cpuScore), 500, 54);

        // High score top-center in 12px #888888
        ctx.fillStyle = "#888888";
        ctx.font = `12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(`HIGH: ${highScore}`, W / 2, 14);

        // Lives/health top-right
        ctx.textAlign = "right";
        ctx.fillText(`HEALTH: —`, W - 18, 14);
        ctx.restore();

        if (state === State.IDLE) {
          drawTextCentered("PONG", 210, 64, "#FFFFFF");
          drawTextCentered("Press Enter to Start", 344, 20, "#FFFFFF");
        } else if (state === State.GAME_OVER) {
          const youWin = playerScore >= TARGET_POINTS;
          const msg = youWin ? "YOU WIN" : "GAME OVER";
          drawTextCentered(msg, 280, 64, "#FFFFFF");
          // Final score + press enter
          ctx.save();
          ctx.fillStyle = "#FFFFFF";
          ctx.font = `18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`FINAL: ${playerScore} - ${cpuScore}`, W / 2, 330);
          ctx.fillText("Press Enter to restart", W / 2, 365);
          ctx.restore();
        } else if (state === State.PAUSED) {
          // Overlay with centered "PAUSED"
          ctx.save();
          ctx.fillStyle = "#000000CC";
          ctx.fillRect(0, 0, W, H);
          drawTextCentered("PAUSED", 300, 40, "#FFFFFF");
          ctx.restore();
        }
      }

      // --- Main loop (requestAnimationFrame, dt) ---
      function frame(now) {
        const dt = Math.min(0.05, (now - lastTime) / 1000); // clamp to avoid huge jumps
        lastTime = now;

        update(dt);
        draw();

        requestAnimationFrame(frame);
      }

      // --- Initialize ---
      loadHighScore();
      resetPositions();
      setState(State.IDLE);
      lastTime = performance.now();
      requestAnimationFrame(frame);

      // Ensure canvas crisp for double-click and ensure focus:
      canvas.tabIndex = 0;
      canvas.style.cursor = "default";
    })();
  </script>
