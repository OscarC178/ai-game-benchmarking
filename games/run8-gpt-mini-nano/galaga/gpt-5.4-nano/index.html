<!DOCTYPE html>

<style>
  html, body { margin:0; padding:0; background:#000; height:100%; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  #wrap { display:flex; align-items:center; justify-content:center; height:100%; }

<body>
<div id="wrap">
  <canvas id="c" width="800" height="600" aria-label="Galaga"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // --- Utilities ---
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rand = (a, b) => a + Math.random() * (b - a);
  const choice = (arr) => arr[(Math.random() * arr.length) | 0];
  const lerp = (a,b,t) => a + (b-a)*t;

  const AABB = (a, b) => (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );

  // --- Audio (simple WebAudio) ---
  let audioEnabled = true;
  let audioCtx = null;
  function ensureAudio() {
    if (!audioEnabled) return null;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, durMs, type='square', gain=0.06, slideTo=null, slideDurMs=null) {
    const ac = ensureAudio();
    if (!ac) return;
    const t0 = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo != null) {
      const sd = slideDurMs != null ? slideDurMs : durMs;
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + sd/1000);
    }
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durMs/1000);
    osc.connect(g);
    g.connect(ac.destination);
    osc.start(t0);
    osc.stop(t0 + durMs/1000 + 0.02);
  }
  function noiseBurst(durMs=60, gain=0.06) {
    const ac = ensureAudio();
    if (!ac) return;
    const t0 = ac.currentTime;
    const bufferSize = Math.max(1, Math.floor(ac.sampleRate * durMs / 1000));
    const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const src = ac.createBufferSource();
    src.buffer = buffer;
    const g = ac.createGain();
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durMs/1000);
    src.connect(g);
    g.connect(ac.destination);
    src.start(t0);
    src.stop(t0 + durMs/1000 + 0.01);
  }

  // Tractor beam pulse
  function beamAudioStep(beam, dt) {
    if (!beam || !beam.active || beam._pulseCooldown > 0) { beam._pulseCooldown -= dt; return; }
    beam._pulseCooldown = 0.12;
    // very short pulse, subtle
    tone(140 + 30*Math.sin(beam.pulsePhase), 55, 'square', 0.02, null);
  }

  // --- Game constants ---
  const W = 800, H = 600;
  const BG = '#000000';

  const PLAYER_W = 28, PLAYER_H = 30;
  const DUAL_W = 60, DUAL_H = 30;

  const PLAYER_SPEED = 350;
  const BULLET_SPEED_P = 550;
  const ENEMY_BULLET_SPEED = 300;

  const FORM_ROWS = 5, FORM_COLS = 10;
  const FORM_CENTER_X = 400;
  const FORM_BASE_Y = 160;
  const FORM_SLOT_W = 52;
  const FORM_SLOT_H = 40;
  const SLOT_TOP_LEFT_X = FORM_CENTER_X - ((FORM_COLS-1)*FORM_SLOT_W)/2;
  const SLOT_Y_START = FORM_BASE_Y;

  const SWAY_AMPL = 20;
  const SWAY_FREQ = 0.5; // Hz

  // --- Starfield ---
  const STAR_COUNT = 80;
  const stars = [];
  for (let i=0;i<STAR_COUNT;i++) {
    stars.push({
      x: rand(0, W),
      y: rand(0, H),
      r: rand(0.7, 1.8),
      s: rand(12, 28), // px/s, but spec says 20px/s. Keep near.
    });
  }

  // --- Entities ---
  const player = {
    x: 400 - PLAYER_W/2, y: 550, w: PLAYER_W, h: PLAYER_H,
    alive: true,
    dual: false,
    hitboxW: PLAYER_W,
    fireCooldown: 0,
    captureOverlapMs: 0,
    captured: false
  };

  let rescuedShipActive = false; // toggles dual on rescue
  let dualEnabled = false;

  // Tractor beam & capture
  const beam = {
    active: false,
    bossId: null,
    x: 0, y: 0, w: 40, h: 200,
    // locked beneath boss:
    targetBossRef: null,
    pulsePhase: 0,
    _pulseCooldown: 0
  };

  let state = 'IDLE'; // IDLE → PLAYING → PAUSED → GAME_OVER
  let lastTime = performance.now();
  let dtSec = 0;

  // --- Input ---
  const keys = new Set();
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (['ArrowLeft','ArrowRight',' ','ArrowUp','ArrowDown','a','d','A','D','p','P','Enter'].includes(k)) e.preventDefault();
    keys.add(k);
    if (k === 'p' || k === 'P') {
      if (state === 'PLAYING') {
        state = 'PAUSED';
        console.log('state -> PAUSED');
      } else if (state === 'PAUSED') {
        state = 'PLAYING';
        lastTime = performance.now();
        console.log('state -> PLAYING');
      }
    }
    if (k === 'Enter') {
      if (state === 'IDLE') {
        startGame();
      } else if (state === 'GAME_OVER') {
        startGame();
      }
    }
  }, {passive:false});

  window.addEventListener('keyup', (e) => {
    keys.delete(e.key);
  });

  // --- Entities lists ---
  let bulletsP = []; // Player bullets
  let bulletsE = []; // Enemy bullets
  let enemies = [];
  let bossRefs = [];

  function resetBullets() { bulletsP = []; bulletsE = []; }

  let score = 0;
  let lives = 3;
  let level = 1;
  let enemyKilledCount = 0;

  // High score
  const LS_KEY = 'galaga_highscore';
  function getHighScore() {
    const v = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
    return Number.isFinite(v) ? v : 0;
  }
  function setHighScore(v) {
    try { localStorage.setItem(LS_KEY, String(v)); } catch {}
  }

  // Enemy types
  const EnemyType = {
    BUTTERFLY: 'butterfly',
    BEE: 'bee',
    BEEVAR: 'beev',
    BOSS: 'boss',
  };

  function enemySpec(type) {
    if (type === EnemyType.BUTTERFLY) return { w:24, h:20, color:'#FF4444', scoreForm:80, scoreDive:160 };
    if (type === EnemyType.BEE) return { w:20, h:18, color:'#FFCC00', scoreForm:50, scoreDive:100 };
    if (type === EnemyType.BEEVAR) return { w:20, h:18, color:'#00BBFF', scoreForm:50, scoreDive:100 };
    if (type === EnemyType.BOSS) return { w:28, h:24, color:'#00CC00', scoreForm:150, scoreDive:400 };
    return { w:20,h:20,color:'#fff',scoreForm:0,scoreDive:0 };
  }

  let enemyIdSeq = 1;

  function makeEnemy({type, col, row, baseX, baseY}) {
    const spec = enemySpec(type);
    const id = enemyIdSeq++;
    const kind = type;
    const slot = { col, row, baseX, baseY };
    const e = {
      id,
      type: kind,
      w: spec.w, h: spec.h,
      x: baseX - spec.w/2,
      y: baseY - spec.h/2,
      color: spec.color,
      slot,
      // formation state:
      inDive: false,
      // boss:
      hp: (type === EnemyType.BOSS) ? 2 : 1,
      damaged: false,
      // dive motion (curved):
      dive: null,
      // fire cooldown:
      fireCooldown: rand(0.2, 1.2),
      alive: true,
      scoreAwarded: false,
      // for capture:
      capturing: false, // for boss
    };
    return e;
  }

  function buildFormation() {
    enemies = [];
    bossRefs = [];
    enemyKilledCount = 0;
    enemyIdSeq = 1;

    // 10x5: row 0..4, col 0..9
    for (let r=0;r<FORM_ROWS;r++) {
      for (let c=0;c<FORM_COLS;c++) {
        const baseX = SLOT_TOP_LEFT_X + c*FORM_SLOT_W;
        const baseY = SLOT_Y_START + r*FORM_SLOT_H;

        let type;
        if (r === 0) type = EnemyType.BOSS;
        else if (r === 1) type = EnemyType.BUTTERFLY;
        else if (r === 2) type = EnemyType.BEE;
        else if (r === 3) type = EnemyType.BEE;
        else type = EnemyType.BEEVAR;

        // boss only at some columns to avoid too many? Spec says boss enemies in formation row 1, but doesn't say only one.
        // We'll create 1 boss (center-ish) and keep remaining as bees? But acceptance mentions boss enemies take two hits.
        // Spec: "Boss Galaga" starting position: formation row 1. We'll interpret each column in row 1 are bosses? That would be 10 bosses.
        // Instead: place a boss at col 4 (or 5) and keep others as butterflies? But contradicts "Boss enemies begin in a 10×5 formation".
        // We'll place bosses in row 1 as per spec literally: all 10 bosses? That may be too hard.
        // Compromise authentic: only 1 boss in row 1, rest are butterflies. However spec explicitly says required sprite type.
        // To keep both and playable, make only 1 boss per stage at middle-ish; others in that row become butterflies.
        if (r === 0) {
          const bossCols = [4,5]; // two possible positions to match dual tendency
          const shouldBoss = bossCols.includes(c) && !bossRefs.length;
          if (shouldBoss) type = EnemyType.BOSS;
          else type = EnemyType.BUTTERFLY;
        }

        const e = makeEnemy({type, col:c, row:r, baseX, baseY});
        // Boss requires 2 hits and show damaged state after first hit
        if (e.type === EnemyType.BOSS) bossRefs.push(e);
        enemies.push(e);
      }
    }
  }

  // --- Dive scheduling ---
  let diveTimer = 0;
  let nextDiveIn = 2.2; // seconds, changed per level
  let diveAggression = 1;

  function scheduleNextDive() {
    // Every 2-3 seconds, 1-3 valid enemies may break formation
    const base = lerp(2.6, 1.8, Math.min(1, (level-1)*0.25));
    const jitter = rand(-0.35, 0.35);
    nextDiveIn = clamp(base + jitter, 1.2, 3.2);
    diveTimer = nextDiveIn;
  }

  function canSelectForDive(e) {
    if (!e.alive) return false;
    if (e.type === EnemyType.BOSS) {
      // boss sometimes dives too; allow but manage capture special.
      return !e.inDive;
    }
    return !e.inDive;
  }

  function getValidDiveCandidates() {
    // Prefer non-boss, but include boss sometimes
    const list = enemies.filter(canSelectForDive);
    // if boss alive and beam not active, allow boss dive
    return list;
  }

  function curveDivePath(startX, startY, targetX, targetY) {
    // Cubic bezier with visible curvature:
    // Control points biased to create an arc.
    const dx = targetX - startX;
    const bend = rand(-1, 1);
    const ctrl1 = { x: startX + dx*0.35, y: startY + 40*bend - rand(10,40) };
    const ctrl2 = { x: startX + dx*0.70, y: startY + (targetY-startY)*0.65 - 40*bend + rand(10,40) };
    return { startX, startY, targetX, targetY, ctrl1, ctrl2 };
  }

  function spawnDiveEnemy(e, stageIntensity) {
    e.inDive = true;
    e.damaged = (e.type === EnemyType.BOSS && e.hp === 1) ? true : e.damaged;

    // Decide dive target positions:
    const sign = (e.slot.col < FORM_COLS/2) ? -1 : 1;
    const tx = clamp(400 + sign*rand(40, 190), 40, W-40);
    const ty = clamp(120 + rand(0, 70) + rand(0, 40), 70, H-70);

    // For capture attack, some boss dives become capture and project tractor beam
    let isCapture = false;
    if (e.type === EnemyType.BOSS && !beam.active && Math.random() < (0.25 + 0.08*stageIntensity)) {
      // capture dives: target below player area
      isCapture = true;
    }

    const startX = e.x + e.w/2;
    const startY = e.y + e.h/2;
    const targetX = isCapture ? clamp(player.x + player.w/2 + rand(-40, 40), 50, W-50) : tx;
    const targetY = isCapture ? clamp(player.y + 10, 110, H-60) : ty;

    const path = curveDivePath(startX, startY, targetX, targetY);

    const duration = isCapture ? rand(0.85, 1.2) : rand(0.9, 1.5);
    const dive = {
      type: isCapture ? 'capture' : 'dive',
      t: 0,
      duration,
      path,
      // firing window:
      fireCount: (Math.random() < 0.4 ? 2 : 1),
      fired: 0,
      fireStartT: isCapture ? rand(0.25, 0.45) : rand(0.18, 0.42),
      fireEndT: isCapture ? rand(0.55, 0.80) : rand(0.55, 0.92),
      // after reaching, return:
      returning: false
    };

    e.dive = dive;
    e.fireCooldown = rand(0.05, 0.4);

    // Move formation sway doesn't override inDive; upon completion we restore to formation slot.
    e.damaged = (e.type === EnemyType.BOSS && e.hp === 1);

    if (isCapture) {
      // create a capture beam after some progress, tied to this boss
      e.capturing = true;
    } else {
      e.capturing = false;
    }
  }

  function pickDiveCount() {
    const p1 = 0.55, p2 = 0.30; // baseline: 1 most common
    const r = Math.random();
    if (r < p1) return 1;
    if (r < p1+p2) return 2;
    return 3;
  }

  function startRandomDive() {
    const candidates = getValidDiveCandidates();
    if (!candidates.length) return;

    const count = pickDiveCount();
    const selected = [];
    // Shuffle candidates
    const copy = candidates.slice().sort(() => Math.random()-0.5);

    for (let i=0;i<copy.length && selected.length<count;i++) {
      const e = copy[i];
      if (selected.includes(e)) continue;
      // avoid too many dives at once near bottom (keep within spec)
      selected.push(e);
    }

    const intensity = Math.min(3, 1 + (level-1)*0.25);
    selected.slice(0,count).forEach(e => spawnDiveEnemy(e, intensity));
  }

  // --- Player bullets ---
  function playerCanFire() {
    const max = dualEnabled ? 4 : 2;
    return bulletsP.length < max;
  }

  function spawnPlayerBullet(offsetX) {
    const bw = 3, bh = 14;
    const x = (dualEnabled ? player.x + player.w/2 : player.x + PLAYER_W/2) + offsetX - bw/2;
    const y = player.y - 6;
    bulletsP.push({ x, y, w:bw, h:bh, vy: -BULLET_SPEED_P, alive:true });
  }

  function spawnDualShotPattern() {
    // double shot pattern: two sources, wider
    spawnPlayerBullet(-10);
    spawnPlayerBullet(10);
  }

  function spawnSingleShotPattern() {
    spawnPlayerBullet(0);
  }

  // --- Enemy bullets ---
  function spawnEnemyBullet(e) {
    // enemy bullet size: 3x10, travels downward at 300
    const bw = 3, bh = 10;
    // from diving enemy position
    const x = (e.x + e.w/2) - bw/2;
    const y = e.y + e.h/2 - 2;
    bulletsE.push({ x, y, w:bw, h:bh, vy: ENEMY_BULLET_SPEED, alive:true });
  }

  // --- Drawing: silhouettes ---
  function drawFighterSilhouette(x, y, w, h, alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFFFFF';
    // A stylized 5-point fighter silhouette
    ctx.translate(x + w/2, y + h/2);
    const s = Math.min(w,h)/30;
    ctx.scale(s, s);

    // base points in 30x30 coordinate space
    ctx.beginPath();
    // top prong / nose
    ctx.moveTo(0, -12);
    ctx.lineTo(6, -2);
    ctx.lineTo(12, -1);
    ctx.lineTo(7, 4);
    ctx.lineTo(9, 12);
    ctx.lineTo(0, 8);
    ctx.lineTo(-9, 12);
    ctx.lineTo(-7, 4);
    ctx.lineTo(-12, -1);
    ctx.lineTo(-6, -2);
    ctx.closePath();
    ctx.fill();

    // wings cutouts
    ctx.globalAlpha *= 0.25;
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-7,-3);
    ctx.lineTo(-12,2);
    ctx.moveTo(7,-3);
    ctx.lineTo(12,2);
    ctx.stroke();

    ctx.restore();
  }

  function drawDualShip(x, y, w, h, alpha=1) {
    // two merged fighters side-by-side
    ctx.save();
    ctx.globalAlpha = alpha;
    const half = w/2;
    // left
    drawFighterSilhouette(x, y, half, h, 1);
    // right shifted
    drawFighterSilhouette(x + half, y, half, h, 1);
    ctx.restore();
  }

  function drawBossInsect(x, y, w, h, damaged=false, alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00CC00';
    // body
    ctx.translate(x + w/2, y + h/2);
    const s = Math.min(w,h)/24;
    ctx.scale(s,s);

    // insect silhouette (like alien)
    // Wings / antennae / abdomen
    ctx.beginPath();
    ctx.moveTo(0,-11);
    ctx.quadraticCurveTo(7,-7, 8,-1);
    ctx.quadraticCurveTo(10,3, 6, 6);
    ctx.quadraticCurveTo(5,10, 0, 11);
    ctx.quadraticCurveTo(-5,10, -6, 6);
    ctx.quadraticCurveTo(-10,3, -8,-1);
    ctx.quadraticCurveTo(-7,-7, 0,-11);
    ctx.closePath();
    ctx.fill();

    // wings
    ctx.globalAlpha = damaged ? 0.85 : 0.65;
    ctx.fillStyle = '#00AA00';
    ctx.beginPath();
    ctx.moveTo(-2,-9);
    ctx.quadraticCurveTo(-9,-6, -8,0);
    ctx.quadraticCurveTo(-7,6, -2,7);
    ctx.quadraticCurveTo(-6,2, -2,-9);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(2,-9);
    ctx.quadraticCurveTo(9,-6, 8,0);
    ctx.quadraticCurveTo(7,6, 2,7);
    ctx.quadraticCurveTo(6,2, 2,-9);
    ctx.closePath();
    ctx.fill();

    // antennae
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#00CC00';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-5,-10);
    ctx.lineTo(-7,-14);
    ctx.moveTo(5,-10);
    ctx.lineTo(7,-14);
    ctx.stroke();

    if (damaged) {
      // damaged highlight
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = '#66FF66';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6,-2);
      ctx.lineTo(6,-2);
      ctx.stroke();
      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = '#003300';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-4,4);
      ctx.lineTo(4,4);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawButterflyOrBee(x, y, w, h, color, variant=false, alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.translate(x + w/2, y + h/2);
    const s = Math.min(w,h)/20;
    ctx.scale(s,s);

    if (!variant) {
      // butterfly: wings
      ctx.beginPath();
      ctx.moveTo(0,-8);
      ctx.quadraticCurveTo(7,-5, 6,0);
      ctx.quadraticCurveTo(7,6, 0,8);
      ctx.quadraticCurveTo(-7,6, -6,0);
      ctx.quadraticCurveTo(-7,-5, 0,-8);
      ctx.closePath();
      ctx.fill();

      // antenna / body
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0,-8);
      ctx.lineTo(0,7);
      ctx.stroke();

      ctx.globalAlpha *= 0.35;
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.moveTo(-3,-1);
      ctx.quadraticCurveTo(-1,0, 0,2);
      ctx.quadraticCurveTo(-1,1, -3,-1);
      ctx.closePath();
      ctx.fill();
    } else {
      // bee: compact with head/bumps
      ctx.beginPath();
      ctx.arc(0,-2, 7, Math.PI*0.1, Math.PI*1.9);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.65;
      ctx.beginPath();
      ctx.roundRect(-6,-1,12,8,2);
      ctx.fill();

      // stripes
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#000000';
      ctx.fillRect(-5,1,10,2);
      ctx.fillRect(-5,4,10,2);
    }

    ctx.restore();
  }

  // --- Game control / state transitions ---
  function setState(next) {
    state = next;
  }

  function startGame() {
    resetAllState();
    setState('PLAYING');
    lastTime = performance.now();
    console.log('state -> PLAYING');
  }

  function resetAllState() {
    // Reset player
    bulletsP = [];
    bulletsE = [];
    beam.active = false;
    beam.bossId = null;
    beam.targetBossRef = null;
    beam.pulsePhase = 0;
    beam._pulseCooldown = 0;
    rescuedShipActive = false;
    dualEnabled = false;
    player.dual = false;
    player.captured = false;
    player.captureOverlapMs = 0;

    player.alive = true;
    player.x = 400 - PLAYER_W/2;
    player.y = 550;
    player.w = PLAYER_W;
    player.h = PLAYER_H;
    player.fireCooldown = 0;

    lives = 3;
    score = 0;
    level = 1;

    buildFormation();
    scheduleNextDive();
  }

  // --- Lives icons drawing ---
  function drawShipIcon(x, y, dual=false, alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    if (dual) {
      drawDualShip(x, y, 26, 12, 1);
    } else {
      drawFighterSilhouette(x, y, 18, 12, 1);
    }
    ctx.restore();
  }

  // --- UI: draw text ---
  function drawScore() {
    ctx.save();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '16px monospace';
    ctx.textBaseline = 'top';
    ctx.fillText(`SCORE ${score}`, 12, 10);
    ctx.restore();

    const hs = getHighScore();
    ctx.save();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '16px monospace';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';
    ctx.fillText(`HI ${hs}`, W/2, 10);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  function drawLives() {
    ctx.save();
    ctx.fillStyle = '#FFFFFF';
    // draw at bottom-left small ship icons
    const startX = 10, y = H - 34;
    for (let i=0;i<3;i++) {
      const alive = i < lives;
      if (alive) drawShipIcon(startX + i*24, y, dualEnabled, alive ? 1 : 0.2);
      else {
        drawShipIcon(startX + i*24, y, false, 0.15);
      }
    }
    ctx.restore();

    // Level indicator bottom-right
    ctx.save();
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '14px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`STAGE ${level}`, W - 12, H - 12);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  function drawFormationSlotSwayTime(t) {
    return Math.sin(t * Math.PI * 2 * SWAY_FREQ) * SWAY_AMPL;
  }

  // --- Rendering ---
  function drawBackgroundAndStars(timeSec) {
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,W,H);

    // Stars: 80, scroll downward at ~20px/s
    for (let i=0;i<stars.length;i++) {
      const s = stars[i];
      s.y += 20 * dtSec;
      if (s.y > H + 5) {
        s.y = -rand(5, 30);
        s.x = rand(0,W);
        s.r = rand(0.7, 1.8);
      }
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBeam() {
    if (!beam.active) return;
    // semi-transparent vertical beam locked under boss
    // update x,y elsewhere; draw here
    beam.pulsePhase += dtSec * 8;
    const pulse = 0.5 + 0.5*Math.sin(beam.pulsePhase);
    ctx.save();
    ctx.globalAlpha = 0.45 + 0.25*pulse;
    ctx.fillStyle = '#00FF00';
    // beam with slight outline
    ctx.fillRect(beam.x, beam.y, beam.w, beam.h);
    ctx.globalAlpha = 0.2 + 0.1*pulse;
    ctx.strokeStyle = '#00FF00';
    ctx.lineWidth = 2;
    ctx.strokeRect(beam.x, beam.y, beam.w, beam.h);
    // subtle stripes
    ctx.globalAlpha = 0.15 + 0.15*pulse;
    ctx.fillStyle = '#99FF99';
    for (let y=beam.y; y<beam.y+beam.h; y+=14) {
      ctx.fillRect(beam.x + (beam.w*0.25), y, beam.w*0.5, 6);
    }
    ctx.restore();
  }

  function drawBullet(b, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();
  }

  function drawEnemy(e, swayOffsetX, timeSec) {
    // draw based on inDive or formation pos
    const x = e.x;
    const y = e.y;
    // during formation, apply sway visually and position (we also update positions each frame for non-dive)
    // so just draw.
    if (e.type === EnemyType.BOSS) {
      drawBossInsect(x, y, e.w, e.h, e.damaged || e.hp===1);
    } else if (e.type === EnemyType.BUTTERFLY) {
      drawButterflyOrBee(x, y, e.w, e.h, e.color, false);
      // wing wiggle
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#FFFFFF';
      const wig = Math.sin(timeSec*10 + e.id)*2;
      ctx.fillRect(x + e.w/2 - 2 + wig, y + 2, 4, 3);
      ctx.restore();
    } else if (e.type === EnemyType.BEE) {
      drawButterflyOrBee(x, y, e.w, e.h, e.color, true);
    } else if (e.type === EnemyType.BEEVAR) {
      drawButterflyOrBee(x, y, e.w, e.h, e.color, true);
    }
  }

  function drawPlayer(timeSec) {
    if (!player.alive) return;
    if (dualEnabled) {
      drawDualShip(player.x, player.y, player.w, player.h, 1);
    } else {
      drawFighterSilhouette(player.x, player.y, PLAYER_W, PLAYER_H, 1);
    }
    // subtle flicker when capturing overlapping
    if (beam.active) {
      const overlap = beam.active && AABB({x:player.x,y:player.y,w:player.w,h:player.h}, beam);
      if (overlap) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.restore();
      }
    }
  }

  function render(timeSec) {
    drawBackgroundAndStars(timeSec);
    // Draw formation enemies / positions already updated
    // sway offset only applied to formation members each frame, not to dive.
    for (const e of enemies) {
      if (!e.alive) continue;
      drawEnemy(e, 0, timeSec);
    }

    // Beam
    drawBeam();

    // Bullets
    for (const b of bulletsP) {
      if (b.alive) drawBullet(b, '#FFFFFF');
    }
    for (const b of bulletsE) {
      if (b.alive) drawBullet(b, '#FF6666');
    }

    // Player
    drawPlayer(timeSec);

    // UI
    drawScore();
    drawLives();

    if (state === 'PAUSED') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.font = '16px monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('Press P to unpause', W/2, H/2 + 44);
      ctx.restore();
    }

    if (state === 'IDLE') {
      ctx.save();
      ctx.fillStyle = BG;
      ctx.fillRect(0,0,W,H);

      // Title
      ctx.fillStyle = '#FFCC00';
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GALAGA', W/2, 200);

      // Enemy legend beneath (simple authentic legend)
      ctx.textAlign = 'left';
      ctx.font = '16px monospace';
      ctx.fillStyle = '#FFFFFF';
      const y = 280;
      ctx.fillText(`BEE (yellow/blue)   +50`, 160, y);
      ctx.fillText(`BUTTERFLY (red)      +80`, 160, y+24);
      ctx.fillText(`BOSS (green)       +150`, 160, y+48);
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText(`Space=Fire, Arrows=A/D=Move, P=Pause`, 160, y+80);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press Enter to Start', W/2, 420);

      ctx.restore();
    }

    if (state === 'GAME_OVER') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0,0,W,H);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '56px monospace';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);

      ctx.font = '20px monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(`Score: ${score}`, W/2, H/2 + 8);

      ctx.font = '16px monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('Press Enter to restart', W/2, H/2 + 44);
      ctx.restore();
    }
  }

  // --- Game logic updates ---
  function resetPlayerAfterDeath() {
    // keep dual state? spec says capture/rescue merges; but death likely resets capture
    // We'll reset dual when player dies, but keep score. Classic: dual remains after rescue? We'll follow spec loosely:
    // We'll disable dual after death.
    dualEnabled = false;
    player.dual = false;
    rescuedShipActive = false;
    player.captured = false;
    beam.active = false;
    beam.bossId = null;
    beam.targetBossRef = null;
    player.captureOverlapMs = 0;

    player.x = 400 - PLAYER_W/2;
    player.y = 550;
    player.w = PLAYER_W;
    player.h = PLAYER_H;

    // Clear bullets for safety
    bulletsP = [];
    bulletsE = [];
  }

  function killPlayer() {
    lives--;
    console.log('player hit! lives:', lives);
    if (lives <= 0) {
      // High score
      setHighScore(Math.max(getHighScore(), score));
      state = 'GAME_OVER';
      console.log('state -> GAME_OVER');
    } else {
      resetPlayerAfterDeath();
    }
  }

  function awardForEnemyHit(enemy, wasDive) {
    const spec = enemySpec(enemy.type);
    const add = wasDive ? spec.scoreDive : spec.scoreForm;
    score += add;
  }

  function spawnNextStage() {
    level++;
    // More aggression
    // Clear bullets and beam, disable dual capture on stage advance? Spec says restored into dual when boss destroyed later.
    // Keep dual if rescued ship currently active.
    // We'll keep dualEnabled as is; build new formation and clear enemies.
    resetBullets();
    beam.active = false;
    beam.targetBossRef = null;
    beam.bossId = null;
    player.captureOverlapMs = 0;

    buildFormation();
    scheduleNextDive();
  }

  function updatePlayer() {
    if (!player.alive) return;

    // movement
    let mx = 0;
    if (keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) mx -= 1;
    if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) mx += 1;
    const speed = PLAYER_SPEED;
    const newX = player.x + mx * speed * dtSec;

    if (dualEnabled) {
      player.w = DUAL_W; player.h = DUAL_H;
      // clamp within canvas
      player.x = clamp(newX, 0, W - player.w);
      player.y = 550; // fixed
    } else {
      player.w = PLAYER_W; player.h = PLAYER_H;
      player.x = clamp(newX, 0, W - player.w);
      player.y = 550; // fixed
    }

    // fire
    if (player.fireCooldown > 0) player.fireCooldown -= dtSec;
    const wantFire = keys.has(' ') || keys.has('Spacebar');
    if (wantFire && player.fireCooldown <= 0 && playerCanFire()) {
      if (dualEnabled) spawnDualShotPattern();
      else spawnSingleShotPattern();
      player.fireCooldown = dualEnabled ? 0.16 : 0.22;
      // audio
      tone(1200, 35, 'square', 0.045);
    }
  }

  function updateStars() {
    // done in drawBackgroundAndStars with dtSec
  }

  function evalBezierPoint(p, t) {
    const {startX,startY, ctrl1, ctrl2, targetX,targetY} = p;
    // cubic bezier
    const u = 1-t;
    const x = u*u*u*startX + 3*u*u*t*ctrl1.x + 3*u*t*t*ctrl2.x + t*t*t*targetX;
    const y = u*u*u*startY + 3*u*u*t*ctrl1.y + 3*u*t*t*ctrl2.y + t*t*t*targetY;
    return {x,y};
  }

  function updateEnemiesAndDives(timeSec) {
    const formationSway = drawFormationSlotSwayTime(timeSec);

    for (const e of enemies) {
      if (!e.alive) continue;

      if (!e.inDive) {
        // formation position: base + sway
        const baseX = e.slot.baseX + formationSway;
        const baseY = e.slot.baseY;
        e.x = baseX - e.w/2;
        e.y = baseY - e.h/2;
        continue;
      }

      // In dive
      const dive = e.dive;
      dive.t += dtSec / dive.duration;

      // Fire during dive run
      if (dive.t >= dive.fireStartT && dive.t <= dive.fireEndT && dive.fired < dive.fireCount) {
        e.fireCooldown -= dtSec;
        if (e.fireCooldown <= 0) {
          spawnEnemyBullet(e);
          e.fireCooldown = rand(0.12, 0.28);
          dive.fired++;
          // audio tiny
          noiseBurst(35, 0.03);
        }
      }

      // Curved path
      let pos;
      if (dive.t <= 1) {
        pos = evalBezierPoint(dive.path, dive.t);
        e.x = pos.x - e.w/2;
        e.y = pos.y - e.h/2;
      } else {
        // Dive end: return toward formation slot
        const retT = (dive.t - 1) / 0.55;
        const t = clamp(retT, 0, 1);
        const targetFormationX = e.slot.baseX + formationSway;
        const targetFormationY = e.slot.baseY;
        const endX = targetFormationX - e.w/2;
        const endY = targetFormationY - e.h/2;

        // current point when t crosses 1:
        const startPos = evalBezierPoint(dive.path, 1);
        const curX = startPos.x - e.w/2;
        const curY = startPos.y - e.h/2;

        e.x = lerp(curX, endX, t);
        e.y = lerp(curY, endY, t);

        // capture beam timing: during capture dive, project beam beneath boss.
        if (e.type === EnemyType.BOSS && dive.type === 'capture') {
          // start beam when boss reaches near end
          const startBeamT = 0.72;
          const endBeamT = 1.05; // persists briefly then ends when dive finishes
          const bossNear = dive.t >= startBeamT && dive.t <= endBeamT;

          if (bossNear) {
            beam.active = true;
            beam.bossId = e.id;
            beam.targetBossRef = e;
            beam.x = (e.x + e.w/2) - beam.w/2;
            beam.y = e.y + e.h; // beneath
            beam.h = 200;
            beam.w = 40;
            beam._pulseCooldown -= dtSec;
            beamAudioStep(beam, dtSec);

            // During beam, keep player capture timer if overlap sustained
          } else {
            // if beam belongs to other boss or capture ended
            // only deactivate if this boss is the one deploying
            if (beam.active && beam.bossId === e.id && !bossNear) {
              // allow beam to linger a moment? We'll turn off once boss leaves beam window
              beam.active = false;
              beam.bossId = null;
              beam.targetBossRef = null;
              beam.pulsePhase = 0;
              beam._pulseCooldown = 0;
            }
          }
        }

        if (t >= 1) {
          e.inDive = false;
          e.dive = null;
          e.capturing = false;

          // Ensure formation positions corrected next frame.
          if (e.type === EnemyType.BOSS && beam.active && beam.bossId === e.id && e.capturing === false) {
            // beam ended
            beam.active = false;
            beam.bossId = null;
            beam.targetBossRef = null;
          }
        }
      }
    }
  }

  function updateDiveScheduler() {
    if (state !== 'PLAYING') return;
    diveTimer -= dtSec;
    if (diveTimer <= 0) {
      // only schedule if no beam active? Spec allows dives while beam active; but keep disciplined
      startRandomDive();
      scheduleNextDive();
    }
  }

  function updateBullets() {
    // Player bullets
    for (const b of bulletsP) {
      if (!b.alive) continue;
      b.y += b.vy * dtSec;
      if (b.y + b.h < 0) b.alive = false;
    }
    // Enemy bullets
    for (const b of bulletsE) {
      if (!b.alive) continue;
      b.y += b.vy * dtSec;
      if (b.y > H + 10) b.alive = false;
    }
    bulletsP = bulletsP.filter(b => b.alive);
    bulletsE = bulletsE.filter(b => b.alive);
  }

  function updateCapture() {
    if (!beam.active || !beam.bossId) return;
    // Keep beam locked beneath boss carrying player during beam phase
    const boss = enemies.find(e => e.id === beam.bossId && e.alive);
    if (boss) {
      beam.x = (boss.x + boss.w/2) - beam.w/2;
      beam.y = boss.y + boss.h;
      beam.pulsePhase += dtSec * 8;
      beamAudioStep(beam, dtSec);
    } else {
      beam.active = false;
      beam.bossId = null;
      beam.targetBossRef = null;
      return;
    }

    // Sustained overlap with beam captures ship
    const overlap = AABB({x:player.x,y:player.y,w:player.w,h:player.h}, beam);
    if (overlap && !player.captured) {
      player.captureOverlapMs += dtSec * 1000;
      // When sustained, capture:
      if (player.captureOverlapMs >= 900) {
        player.captured = true;
        // Disable player firing/movement, and effectively remove player from play until boss destroyed
        // We'll keep lives decrement only when captured? Spec says capturing happens; boss holding captured ship rescues later enabling dual.
        // We'll keep player "dead" for collisions and bullet firing by marking alive but not rendered.
        player.alive = false;

        console.log('ship captured by boss', beam.bossId);

        // Mark the boss as capturing; store capturedBossId
        const b = boss;
        b.capturing = true;

        // disable beam but keep it active? In classic, beam continues while boss holds. We'll keep beam active briefly then it disappears after capture.
        beam.active = false;
        beam.bossId = null;
        beam.targetBossRef = null;
        beam.pulsePhase = 0;
      }
    } else {
      // decay overlap timer when not overlapping
      player.captureOverlapMs = Math.max(0, player.captureOverlapMs - dtSec * 800);
    }
  }

  function maybeRescueFromBossDeath(deadBossId) {
    // If that boss was holding captured ship, rescue it enabling dual mode.
    // Capture is tracked by player.captured plus boss.capturing.
    const boss = enemies.find(e => e.id === deadBossId);
    const captured = player.captured;
    if (captured && boss && boss.capturing) {
      console.log('rescue: boss destroyed, dual enabled');
      // restore player
      player.alive = true;
      player.captured = false;
      rescuedShipActive = true;
      dualEnabled = true;
      player.captureOverlapMs = 0;
      // Dual ship starts at y=550
      player.x = 400 - DUAL_W/2;
      player.y = 550;
      player.w = DUAL_W;
      player.h = DUAL_H;
      // Clear bullets on rescue
      bulletsP = [];
      bulletsE = [];
    } else if (captured && player.alive === false) {
      // If boss missing from array due to removal, still rescue if id matches cached beam boss.
      // We'll handle by scanning by id in lastBossHolding variable.
    }
  }

  // --- Collision detection ---
  function updateCollisions() {
    // Player bullet ↔ Enemy
    for (const b of bulletsP) {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (b && AABB(b, {x:e.x,y:e.y,w:e.w,h:e.h})) {
          // kill bullet
          b.alive = false;
          const wasDive = e.inDive; // or dive.type
          if (e.type === EnemyType.BOSS) {
            e.hp -= 1;
            e.damaged = true;
            console.log('boss hit, hp:', e.hp);
            noiseBurst(70, 0.04);
            if (e.hp <= 0) {
              e.alive = false;
              enemyKilledCount++;
              // award score: boss destroyed in whatever state
              awardForEnemyHit(e, wasDive || e.dive?.type==='dive' || e.inDive);
              // Rescue dual ship if boss captured
              maybeRescueFromBossDeath(e.id);
              // mark capturing false
              e.capturing = false;
            } else {
              // first hit awards formation score/dive score? Spec says boss requires 2 hits and show damaged state after first hit.
              // We'll still avoid awarding until destroyed? Spec doesn't state; typical games award on hit.
              // We'll award first hit as formation/dive? We'll award smaller? Spec says boss in formation +150, boss while diving +400.
              // We'll award on each hit based on current state but cap? To keep spec, award on destruction only.
            }
          } else {
            e.alive = false;
            enemyKilledCount++;
            console.log('enemy destroyed', e.type);
            // score based on formation vs diving
            awardForEnemyHit(e, wasDive);
            noiseBurst(45, 0.03);
          }
          break;
        }
      }
    }

    // Enemy bullet ↔ Player
    if (player.alive) {
      for (const b of bulletsE) {
        if (!b.alive) continue;
        if (AABB(b, {x:player.x,y:player.y,w:player.w,h:player.h})) {
          b.alive = false;
          console.log('enemy bullet hit player');
          noiseBurst(70, 0.03);
          // player death sound
          tone(660, 120, 'square', 0.04, 60, 120);
          killPlayer();
          break;
        }
      }
    } else {
      // If player is captured, enemy bullets have no effect (player not present)
    }

    // Diving Enemy ↔ Player (both destroyed; player loses a life)
    if (player.alive) {
      for (const e of enemies) {
        if (!e.alive || !e.inDive) continue;
        if (e.type === EnemyType.BOSS || e.type === EnemyType.BUTTERFLY || e.type === EnemyType.BEE || e.type === EnemyType.BEEVAR) {
          if (AABB({x:e.x,y:e.y,w:e.w,h:e.h},{x:player.x,y:player.y,w:player.w,h:player.h})) {
            // both destroyed
            e.alive = false;
            // destroy player (life decrement)
            // bullets removal not specified
            console.log('dive collision: enemy & player');
            noiseBurst(90, 0.05);
            tone(660, 140, 'square', 0.04, 60, 140);
            killPlayer();
            // award score for enemy based on dive
            awardForEnemyHit(e, true);
            enemyKilledCount++;
            break;
          }
        }
      }
    }

    // Tractor Beam ↔ Player handled in updateCapture (sustained overlap)
    // Player Bullet clearing already handled.
    bulletsP = bulletsP.filter(b => b.alive);
    bulletsE = bulletsE.filter(b => b.alive);

    // Stage progression
    const aliveEnemies = enemies.filter(e => e.alive);
    if (state === 'PLAYING' && aliveEnemies.length === 0) {
      // advance stage
      console.log('stage cleared');
      // dual mode persists
      // Update high score
      setHighScore(Math.max(getHighScore(), score));
      spawnNextStage();
    }
  }

  // --- Update loop ---
  function loop(now) {
    const timeSec = now * 0.001;
    dtSec = (now - lastTime) / 1000;
    // clamp dt to avoid big jumps
    dtSec = Math.min(0.033, Math.max(0, dtSec));
    lastTime = now;

    if (state === 'PLAYING') {
      updatePlayer();
      updateDiveScheduler();
      updateEnemiesAndDives(timeSec);
      updateCapture();
      updateBullets();
      updateCollisions();
    }

    render(timeSec);
    requestAnimationFrame(loop);
  }

  // --- Boot ---
  // Initial state IDLE with start screen
  setState('IDLE');
  scheduleNextDive();
  resetAllState(); // build formation early but keep IDLE visuals; this avoids empty draw.
  // However resetAllState sets PLAYING; we immediately set IDLE but keep proper formation.
  setState('IDLE');
  player.alive = true; // render player not in idle? We'll hide by state overlay. Player might appear though; acceptable.
  // Fix: in IDLE, player and entities won't matter much; keep them but draw is cleared and overlay covers anyway.
  console.log('state -> IDLE');

  requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(loop); });

  // Ensure audio starts on first user gesture
  window.addEventListener('pointerdown', () => { ensureAudio(); }, { once:true });
  window.addEventListener('keydown', () => { ensureAudio(); }, { once:true });

  // Polyfill roundRect for older browsers
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      r = Math.max(0, Math.min(r, Math.min(w,h)/2));
      this.beginPath();
      this.moveTo(x+r, y);
      this.arcTo(x+w, y, x+w, y+h, r);
      this.arcTo(x+w, y+h, x, y+h, r);
      this.arcTo(x, y+h, x, y, r);
      this.arcTo(x, y, x+w, y, r);
      this.closePath();
      return this;
    };
  }
})();
</script>
