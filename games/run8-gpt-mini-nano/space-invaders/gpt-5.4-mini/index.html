<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 800, H = 600;
  const STORAGE_KEY = 'space-invaders-highscore';

  const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER' };
  let state = State.IDLE;

  const keys = new Set();
  let lastTime = 0;
  let score = 0;
  let highScore = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10) || 0;
  let wave = 1;
  let lives = 3;
  let gameOverReason = '';
  let player = null;
  let playerBullet = null;
  let alienBullets = [];
  let aliens = [];
  let shields = [];
  let mysteryShip = null;
  let mysteryTimer = 0;
  let nextMysteryAt = rand(20, 30);
  let alienDir = 1;
  let alienDrop = 0;
  let alienBaseSpeed = 30;
  let alienMoveAccum = 0;
  let alienShootAccum = 0;
  let marchPhase = 0;

  function rand(a, b) { return a + Math.random() * (b - a); }
  function irand(a, b) { return Math.floor(rand(a, b + 1)); }

  function saveHighScore() {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem(STORAGE_KEY, String(highScore));
    }
  }

  function resetGame() {
    score = 0;
    wave = 1;
    lives = 3;
    gameOverReason = '';
    player = { x: 380, y: 550, w: 40, h: 32, speed: 300, alive: true, invuln: 0 };
    playerBullet = null;
    alienBullets = [];
    mysteryShip = null;
    alienDir = 1;
    alienDrop = 0;
    alienBaseSpeed = 30;
    alienMoveAccum = 0;
    alienShootAccum = 0;
    marchPhase = 0;
    nextMysteryAt = rand(20, 30);
    mysteryTimer = 0;
    buildAliens();
    buildShields();
    state = State.PLAYING;
    console.log('State: PLAYING');
  }

  function buildAliens() {
    aliens = [];
    const rows = 5, cols = 11;
    const rowSpecs = [
      { w: 24, h: 16, color: '#FF0000', score: 30, yOff: 0 },
      { w: 28, h: 20, color: '#FFCC00', score: 20, yOff: 40 },
      { w: 28, h: 20, color: '#FFCC00', score: 20, yOff: 80 },
      { w: 32, h: 20, color: '#00CCFF', score: 10, yOff: 120 },
      { w: 32, h: 20, color: '#00CCFF', score: 10, yOff: 160 },
    ];
    const startCenterX = 120;
    const startY = 80;
    const spacingX = 50;
    for (let r = 0; r < rows; r++) {
      const spec = rowSpecs[r];
      const rowWidth = (cols - 1) * spacingX;
      for (let c = 0; c < cols; c++) {
        const cx = startCenterX + c * spacingX;
        aliens.push({
          x: cx - spec.w / 2,
          y: startY + spec.yOff,
          w: spec.w,
          h: spec.h,
          color: spec.color,
          score: spec.score,
          row: r,
          col: c,
          alive: true,
          baseX: cx - spec.w / 2,
          baseY: startY + spec.yOff
        });
      }
    }
  }

  function shieldMask() {
    const mask = [];
    const rows = 16, cols = 20;
    for (let y = 0; y < rows; y++) {
      mask[y] = [];
      for (let x = 0; x < cols; x++) mask[y][x] = false;
    }
    for (let y = 0; y < 16; y++) {
      for (let x = 0; x < 20; x++) {
        const arch = (y < 4 && x >= 4 && x <= 15) ||
                     (y >= 4 && y < 8 && x >= 2 && x <= 17) ||
                     (y >= 8 && y < 12 && x >= 0 && x <= 19) ||
                     (y >= 12 && x >= 0 && x <= 19 && !(x >= 7 && x <= 12 && y >= 12));
        if (arch) mask[y][x] = true;
      }
    }
    return mask;
  }

  function buildShields() {
    shields = [];
    const origins = [140, 300, 460, 620];
    for (const ox of origins) {
      shields.push({ x: ox, y: 480, cell: 4, cols: 20, rows: 16, mask: shieldMask() });
    }
  }

  function alienBounds() {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const a of aliens) if (a.alive) {
      minX = Math.min(minX, a.x);
      minY = Math.min(minY, a.y);
      maxX = Math.max(maxX, a.x + a.w);
      maxY = Math.max(maxY, a.y + a.h);
    }
    return { minX, minY, maxX, maxY };
  }

  function currentAlienSpeed() {
    const alive = aliens.filter(a => a.alive).length;
    const total = aliens.length || 1;
    return alienBaseSpeed * (1 + (1 - alive / total) * 1.8) + (wave - 1) * 6;
  }

  function firePlayerBullet() {
    if (playerBullet || state !== State.PLAYING) return;
    playerBullet = {
      x: player.x + player.w / 2 - 1.5,
      y: player.y - 12,
      w: 3, h: 12,
      vy: -500
    };
    beep(900, 0.05, 'square', 0.03);
  }

  function fireAlienBullet() {
    const aliveCols = [];
    for (let c = 0; c < 11; c++) {
      let bottom = null;
      for (let r = 4; r >= 0; r--) {
        const a = aliens.find(v => v.alive && v.col === c && v.row === r);
        if (a) { bottom = a; break; }
      }
      if (bottom) aliveCols.push(bottom);
    }
    if (!aliveCols.length) return;
    if (alienBullets.length >= 3) return;
    const a = aliveCols[irand(0, aliveCols.length - 1)];
    alienBullets.push({
      x: a.x + a.w / 2 - 1.5,
      y: a.y + a.h,
      w: 3, h: 12,
      vy: 250
    });
  }

  function spawnMystery() {
    const fromLeft = Math.random() < 0.5;
    mysteryShip = {
      x: fromLeft ? -48 : 800,
      y: 35,
      w: 48,
      h: 16,
      vx: fromLeft ? 150 : -150
    };
    mysteryTimer = 0;
    nextMysteryAt = rand(20, 30);
  }

  function endGame(reason) {
    state = State.GAME_OVER;
    gameOverReason = reason || '';
    saveHighScore();
    console.log('State: GAME_OVER');
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function damageShields(rect) {
    for (const s of shields) {
      for (let y = 0; y < s.rows; y++) {
        for (let x = 0; x < s.cols; x++) {
          if (!s.mask[y][x]) continue;
          const cell = { x: s.x + x * s.cell, y: s.y + y * s.cell, w: s.cell, h: s.cell };
          if (rectsOverlap(rect, cell)) s.mask[y][x] = false;
        }
      }
    }
  }

  function hitAlienBullet(b) {
    damageShields(b);
    if (player && rectsOverlap(b, player)) {
      b.dead = true;
      player.invuln = 0;
      lives--;
      beepDeath();
      if (lives <= 0) endGame('lives');
      return true;
    }
    return false;
  }

  function update(dt) {
    if (state !== State.PLAYING) return;
    if (player.invuln > 0) player.invuln -= dt;
    if (keys.has('ArrowLeft') || keys.has('KeyA')) player.x -= player.speed * dt;
    if (keys.has('ArrowRight') || keys.has('KeyD')) player.x += player.speed * dt;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    if (playerBullet) {
      playerBullet.y += playerBullet.vy * dt;
      if (playerBullet.y + playerBullet.h < 0) playerBullet = null;
    }

    alienBullets = alienBullets.filter(b => !b.dead);
    for (const b of alienBullets) {
      b.y += b.vy * dt;
      if (b.y > H) b.dead = true;
      damageShields(b);
      if (b.dead) continue;
      if (player && player.invuln <= 0 && rectsOverlap(b, player)) {
        b.dead = true;
        lives--;
        player.invuln = 0.8;
        beepDeath();
        if (lives <= 0) endGame('lives');
      }
    }
    alienBullets = alienBullets.filter(b => !b.dead);

    if (mysteryShip) {
      mysteryShip.x += mysteryShip.vx * dt;
      if (mysteryShip.x < -60 || mysteryShip.x > 860) mysteryShip = null;
    } else {
      mysteryTimer += dt;
      if (mysteryTimer >= nextMysteryAt) spawnMystery();
    }

    alienShootAccum += dt;
    if (alienShootAccum >= Math.max(0.45, 1.0 - (wave - 1) * 0.05)) {
      alienShootAccum = 0;
      fireAlienBullet();
    }

    const speed = currentAlienSpeed();
    alienMoveAccum += dt * speed;
    const step = alienMoveAccum;
    if (step >= 1) {
      const move = Math.floor(step);
      alienMoveAccum -= move;
      const bounds = alienBounds();
      let minX = bounds.minX, maxX = bounds.maxX;
      const nextMin = minX + alienDir * move;
      const nextMax = maxX + alienDir * move;
      if (nextMin <= 10 || nextMax >= W - 10) {
        alienDir *= -1;
        alienDrop += 20;
        for (const a of aliens) if (a.alive) a.y += 20;
        if (alienBounds().maxY >= 540) endGame('descended');
      } else {
        for (const a of aliens) if (a.alive) a.x += alienDir * move;
      }
    }

    marchPhase += dt;

    if (playerBullet) {
      for (const s of shields) {
        for (let y = 0; y < s.rows; y++) {
          for (let x = 0; x < s.cols; x++) {
            if (!s.mask[y][x]) continue;
            const cell = { x: s.x + x * s.cell, y: s.y + y * s.cell, w: s.cell, h: s.cell };
            if (rectsOverlap(playerBullet, cell)) {
              s.mask[y][x] = false;
              playerBullet = null;
              break;
            }
          }
          if (!playerBullet) break;
        }
        if (!playerBullet) break;
      }
    }

    if (playerBullet) {
      for (const a of aliens) {
        if (!a.alive) continue;
        if (rectsOverlap(playerBullet, a)) {
          a.alive = false;
          score += a.score;
          saveHighScore();
          playerBullet = null;
          beepHit();
          break;
        }
      }
      if (playerBullet && mysteryShip && rectsOverlap(playerBullet, mysteryShip)) {
        score += [50,100,150,300][irand(0,3)];
        saveHighScore();
        playerBullet = null;
        mysteryShip = null;
        beepHit(true);
      }
    }

    for (const b of alienBullets) {
      if (!b.dead) {
        for (const s of shields) {
          for (let y = 0; y < s.rows; y++) {
            for (let x = 0; x < s.cols; x++) {
              if (!s.mask[y][x]) continue;
              const cell = { x: s.x + x * s.cell, y: s.y + y * s.cell, w: s.cell, h: s.cell };
              if (rectsOverlap(b, cell)) {
                s.mask[y][x] = false;
                b.dead = true;
                break;
              }
            }
            if (b.dead) break;
          }
          if (b.dead) break;
        }
      }
    }

    if (aliens.every(a => !a.alive)) {
      wave++;
      alienBaseSpeed += 3;
      buildAliens();
      buildShields();
      alienBullets = [];
      playerBullet = null;
      alienDir = 1;
      alienDrop = 0;
      alienMoveAccum = 0;
      alienShootAccum = 0;
      mysteryShip = null;
      mysteryTimer = 0;
      nextMysteryAt = rand(20, 30);
    }
  }

  function drawPixelShip(x, y) {
    ctx.fillStyle = '#00FF00';
    const p = [
      [18,0,4,4],[22,0,4,4],[14,4,20,4],[10,8,28,4],[6,12,36,4],[0,16,40,4],
      [4,20,10,4],[14,20,4,4],[22,20,4,4],[30,20,10,4],[12,24,6,4],[26,24,6,4]
    ];
    for (const [px,py,pw,ph] of p) ctx.fillRect(x + px, y + py, pw, ph);
  }

  function drawAlien(a) {
    ctx.fillStyle = a.color;
    const t = Math.floor((Math.sin(marchPhase * 8) + 1) * 0.5);
    if (a.row === 0) {
      const s = t ? 1 : 0;
      ctx.fillRect(a.x + 4, a.y + 2, 16, 4);
      ctx.fillRect(a.x + 2, a.y + 6, 20, 4);
      ctx.fillRect(a.x + 0, a.y + 10, 24, 4);
      ctx.fillRect(a.x + 6, a.y + 10, 4, 6);
      ctx.fillRect(a.x + 14, a.y + 10, 4, 6);
      ctx.fillRect(a.x + 4 + s, a.y + 14, 4, 2);
      ctx.fillRect(a.x + 16 - s, a.y + 14, 4, 2);
    } else if (a.row < 3) {
      ctx.fillRect(a.x + 5, a.y + 3, 18, 4);
      ctx.fillRect(a.x + 3, a.y + 7, 22, 4);
      ctx.fillRect(a.x + 1, a.y + 11, 26, 4);
      ctx.fillRect(a.x + 8, a.y + 13, 4, 7);
      ctx.fillRect(a.x + 16, a.y + 13, 4, 7);
    } else {
      ctx.fillRect(a.x + 6, a.y + 3, 20, 4);
      ctx.fillRect(a.x + 2, a.y + 7, 28, 4);
      ctx.fillRect(a.x + 0, a.y + 11, 32, 4);
      ctx.fillRect(a.x + 8, a.y + 13, 4, 7);
      ctx.fillRect(a.x + 20, a.y + 13, 4, 7);
    }
  }

  function drawShields() {
    ctx.fillStyle = '#00FF00';
    for (const s of shields) {
      for (let y = 0; y < s.rows; y++) {
        for (let x = 0; x < s.cols; x++) {
          if (s.mask[y][x]) ctx.fillRect(s.x + x * s.cell, s.y + y * s.cell, s.cell, s.cell);
        }
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    if (state !== State.IDLE) {
      drawShields();
      for (const a of aliens) if (a.alive) drawAlien(a);
      if (mysteryShip) {
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(mysteryShip.x, mysteryShip.y + 4, mysteryShip.w, 8);
        ctx.fillRect(mysteryShip.x + 6, mysteryShip.y, mysteryShip.w - 12, 4);
        ctx.fillRect(mysteryShip.x + 12, mysteryShip.y + 12, mysteryShip.w - 24, 4);
      }
      if (playerBullet) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h);
      }
      ctx.fillStyle = '#FF4444';
      for (const b of alienBullets) ctx.fillRect(b.x, b.y, b.w, b.h);
      if (player) {
        if (player.invuln <= 0 || Math.floor(performance.now() / 100) % 2 === 0) drawPixelShip(player.x, player.y);
      }
    }

    ctx.fillStyle = '#FFFFFF';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE ' + score, 16, 24);
    ctx.textAlign = 'right';
    ctx.fillText('HI ' + highScore, W - 16, 24);

    ctx.textAlign = 'left';
    ctx.fillText('LIVES ' + lives, 16, H - 16);
    ctx.textAlign = 'right';
    ctx.fillText('WAVE ' + wave, W - 16, H - 16);

    if (state === State.IDLE) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#00FF00';
      ctx.font = '48px monospace';
      ctx.fillText('SPACE INVADERS', W / 2, 220);
      ctx.font = '16px monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText('Top row: 30  Middle rows: 20  Bottom rows: 10', W / 2, 280);
      ctx.fillText('Move: A / D or Arrow Keys   Fire: Space   Pause: P', W / 2, 306);
      ctx.fillText('Press Enter to Start', W / 2, 350);
    }

    if (state === State.PAUSED) {
      overlayText('PAUSED');
    }

    if (state === State.GAME_OVER) {
      overlayText('GAME OVER', true);
    }
  }

  function overlayText(title, showScore) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '48px monospace';
    ctx.fillText(title, W / 2, 260);
    ctx.font = '20px monospace';
    if (showScore) {
      ctx.fillText('SCORE ' + score, W / 2, 310);
      ctx.fillText('HIGH ' + highScore, W / 2, 340);
      ctx.fillText('Press Enter to restart', W / 2, 380);
    } else {
      ctx.fillText('Press P to resume', W / 2, 320);
    }
    ctx.restore();
  }

  function beep(freq, duration, type='square', gain=0.04) {
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      if (!beep.ctx) beep.ctx = new AC();
      const ac = beep.ctx;
      if (ac.state === 'suspended') ac.resume();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = gain;
      o.connect(g);
      g.connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + duration);
    } catch (e) {}
  }

  function beepHit(noise) { beep(noise ? 1200 : 700, 0.04, noise ? 'triangle' : 'square', 0.03); }
  function beepDeath() { beep(220, 0.12, 'sawtooth', 0.05); setTimeout(() => beep(110, 0.18, 'sine', 0.05), 80); }

  document.addEventListener('keydown', (e) => {
    keys.add(e.code);
    if (e.code === 'Enter') {
      if (state === State.IDLE || state === State.GAME_OVER) resetGame();
    }
    if (e.code === 'KeyP' && state === State.PLAYING) { state = State.PAUSED; console.log('State: PAUSED'); }
    else if (e.code === 'KeyP' && state === State.PAUSED) { state = State.PLAYING; console.log('State: PLAYING'); }
    if (e.code === 'Space') {
      e.preventDefault();
      if (state === State.PLAYING) firePlayerBullet();
    }
  });
  document.addEventListener('keyup', (e) => keys.delete(e.code));

  function loop(t) {
    const dt = Math.min(0.033, (t - lastTime) / 1000 || 0);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  console.log('State: IDLE');
  requestAnimationFrame(loop);
})();
</script>
