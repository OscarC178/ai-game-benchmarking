<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111111;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
  }
  canvas {
    width: 600px;
    height: 600px;
    image-rendering: pixelated;
    background: #111111;
    display: block;
  }
</style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const GRID = 20;
  const CELL = 30;
  const HEAD_INSET = 1;
  const BODY_INSET = 1;
  const FOOD_INSET = 1;

  const COLORS = {
    bg: '#111111',
    grid: '#1A1A1A',
    head: '#4CAF50',
    body: '#2E7D32',
    food: '#F44336',
    text: '#FFFFFF',
    title: '#4CAF50',
    overlay: 'rgba(0,0,0,0.65)'
  };

  const State = {
    IDLE: 'IDLE',
    PLAYING: 'PLAYING',
    PAUSED: 'PAUSED',
    GAME_OVER: 'GAME_OVER',
    COMPLETE: 'COMPLETE'
  };

  let state = State.IDLE;
  let snake = [];
  let dir = { x: 1, y: 0 };
  let queuedDir = null;
  let canQueue = true;
  let food = { x: 0, y: 0 };
  let score = 0;
  let highScore = Number(localStorage.getItem('snake_high_score') || 0);
  let speed = 8;
  let tickInterval = 1 / speed;
  let accumulator = 0;
  let lastTime = 0;
  let pendingGrow = 0;
  let lives = 1;
  let gameOverReason = '';
  let audioCtx = null;

  function resetGame() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    queuedDir = null;
    canQueue = true;
    score = 0;
    speed = 8;
    tickInterval = 1 / speed;
    accumulator = 0;
    pendingGrow = 0;
    lives = 1;
    gameOverReason = '';
    spawnFood();
  }

  function startGame() {
    resetGame();
    state = State.PLAYING;
    console.log('State:', state);
  }

  function setGameOver(reason) {
    if (state === State.GAME_OVER || state === State.COMPLETE) return;
    gameOverReason = reason || '';
    state = State.GAME_OVER;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_high_score', String(highScore));
    }
    playDeath();
    console.log('State:', state, reason || '');
  }

  function setComplete() {
    state = State.COMPLETE;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_high_score', String(highScore));
    }
    console.log('State:', state);
  }

  function randInt(max) {
    return Math.floor(Math.random() * max);
  }

  function occupied(x, y) {
    return snake.some(s => s.x === x && s.y === y);
  }

  function spawnFood() {
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!occupied(x, y)) free.push({ x, y });
      }
    }
    if (free.length === 0) {
      food = null;
      setComplete();
      return;
    }
    food = free[randInt(free.length)];
  }

  function queueDirection(nx, ny) {
    if (state !== State.PLAYING) return;
    if (!canQueue) return;
    if (nx === -dir.x && ny === -dir.y) return;
    queuedDir = { x: nx, y: ny };
    canQueue = false;
  }

  function playBeep(freq, duration, type = 'sine', endFreq = null) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (endFreq !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t0 + duration);
      gain.gain.setValueAtTime(0.06, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    } catch (e) {}
  }

  function playEat() { playBeep(900, 0.04, 'sine'); }
  function playDeath() { playBeep(440, 0.28, 'sawtooth', 120); }

  function step() {
    if (state !== State.PLAYING) return;
    if (queuedDir) {
      dir = queuedDir;
      queuedDir = null;
    }
    canQueue = true;

    const head = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };

    if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
      setGameOver('wall');
      return;
    }

    const willGrow = food && newHead.x === food.x && newHead.y === food.y;
    const bodyToCheck = willGrow ? snake : snake.slice(0, -1);
    if (bodyToCheck.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
      setGameOver('self');
      return;
    }

    snake.unshift(newHead);

    if (willGrow) {
      pendingGrow++;
      score += 10;
      speed = Math.min(15, speed + 0.5);
      tickInterval = 1 / speed;
      playEat();
      spawnFood();
    }

    if (pendingGrow > 0) {
      pendingGrow--;
    } else {
      snake.pop();
    }

    if (snake.length >= GRID * GRID) {
      setComplete();
    }
  }

  function drawRectCell(x, y, inset, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * CELL + inset, y * CELL + inset, CELL - inset * 2, CELL - inset * 2);
  }

  function drawGrid() {
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= GRID; i++) {
      const p = i * CELL + 0.5;
      ctx.moveTo(p, 0);
      ctx.lineTo(p, canvas.height);
      ctx.moveTo(0, p);
      ctx.lineTo(canvas.width, p);
    }
    ctx.stroke();
  }

  function drawHUD() {
    ctx.fillStyle = COLORS.text;
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`Score: ${score}`, 10, 10);
    ctx.textAlign = 'right';
    ctx.fillText(`High: ${highScore}`, canvas.width - 10, 10);
    ctx.textAlign = 'left';
    ctx.fillText(`Lives: ${lives}`, canvas.width - 92, 10);
  }

  function drawSnake() {
    for (let i = snake.length - 1; i >= 1; i--) {
      drawRectCell(snake[i].x, snake[i].y, BODY_INSET, COLORS.body);
    }
    if (snake.length) drawRectCell(snake[0].x, snake[0].y, HEAD_INSET, COLORS.head);
  }

  function drawFood() {
    if (!food) return;
    drawRectCell(food.x, food.y, FOOD_INSET, COLORS.food);
  }

  function drawOverlayText(lines, colors) {
    ctx.fillStyle = COLORS.overlay;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const line of lines) {
      ctx.fillStyle = line.color || COLORS.text;
      ctx.font = line.font || '24px monospace';
      ctx.fillText(line.text, canvas.width / 2, line.y);
    }
  }

  function render() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawHUD();
    if (food) drawFood();
    if (snake.length) drawSnake();

    if (state === State.IDLE) {
      drawOverlayText([
        { text: 'SNAKE', y: 236, font: '56px monospace', color: COLORS.title },
        { text: 'Press Enter to Start', y: 320, font: '24px monospace', color: COLORS.text }
      ]);
    } else if (state === State.PAUSED) {
      drawOverlayText([
        { text: 'PAUSED', y: 280, font: '48px monospace', color: COLORS.text },
        { text: 'Press P to Resume', y: 332, font: '22px monospace', color: COLORS.text }
      ]);
    } else if (state === State.GAME_OVER) {
      drawOverlayText([
        { text: 'GAME OVER', y: 270, font: '48px monospace', color: COLORS.text },
        { text: `Score: ${score}`, y: 320, font: '24px monospace', color: COLORS.text },
        { text: 'Press Enter to restart', y: 360, font: '22px monospace', color: COLORS.text }
      ]);
    } else if (state === State.COMPLETE) {
      drawOverlayText([
        { text: 'COMPLETE', y: 270, font: '48px monospace', color: COLORS.text },
        { text: `Score: ${score}`, y: 320, font: '24px monospace', color: COLORS.text },
        { text: 'Press Enter to restart', y: 360, font: '22px monospace', color: COLORS.text }
      ]);
    }
  }

  function loop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.05, (ts - lastTime) / 1000);
    lastTime = ts;

    if (state === State.PLAYING) {
      accumulator += dt;
      while (accumulator >= tickInterval) {
        step();
        accumulator -= tickInterval;
        if (state !== State.PLAYING) break;
      }
    }

    render();
    requestAnimationFrame(loop);
  }

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'enter') {
      if (state === State.IDLE || state === State.GAME_OVER || state === State.COMPLETE) {
        startGame();
      }
      return;
    }

    if (key === 'p') {
      if (state === State.PLAYING) {
        state = State.PAUSED;
        console.log('State:', state);
      } else if (state === State.PAUSED) {
        state = State.PLAYING;
        console.log('State:', state);
      }
      return;
    }

    if (state !== State.PLAYING) return;

    if (key === 'arrowup' || key === 'w') queueDirection(0, -1);
    else if (key === 'arrowdown' || key === 's') queueDirection(0, 1);
    else if (key === 'arrowleft' || key === 'a') queueDirection(-1, 0);
    else if (key === 'arrowright' || key === 'd') queueDirection(1, 0);
  });

  resetGame();
  state = State.IDLE;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
