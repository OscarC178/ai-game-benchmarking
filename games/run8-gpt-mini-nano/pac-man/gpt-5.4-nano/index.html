      const PAC_R = 10;

      function playWaka(){
        // alternating waka tones
        wakaToggle = !wakaToggle;

        const freqs = [660, 880, 1040, 1240];
        beep('eat', 140, freqs[Math.min(scoreStage,freqs.length-1)], 0, 0.05);
      }
      function playDeathJingle(){
        // descending arcade jingle
        const freqs = [740, 620, 520, 420, 320];
        freqs.forEach((f,i)=>{
          setTimeout(()=>beep('death', 120, f, 0, 0.035), i*95);
        });
      }

      // ===== Maze Layout =====
      // Legend:
      // # wall
      // . pellet corridor
      // o power pellet corridor (will also place power pellet)
      // ' ' empty corridor without pellet (e.g., center home)
      // g ghost gate opening cell (walkable)
      //
      // We will craft a classic-like maze that fits 28x31.
      // For fidelity to spec: power pellets at tiles (1,3),(26,3),(1,23),(26,23).
      // Tunnel row: 14 (wrap).
      //
      // We'll use a deterministic layout that is symmetric and walkable on corridors.
      // Any unrecognized char will be treated as wall.
      const raw = [
        "############################",
        "############################",
        "############################",
        "#o..........##..........o###",
        "#.####.##### ## #####.####.#",
        "#.####.##### ## #####.####.#",
        "#.####.##### ## #####.####.#",
        "#..........................#",
        "#.####.###.######.###.####.#",
        "#.####.###.######.###.####.#",
        "#.####.###.######.###.####.#",
        "#.####.##### ## #####.####.#",
        "#......##### ## #####......#",
        "######.##### ## #####.######",
        "######.##          ##.######",
        "######.## ##..##..##.######",
        "######.## ##..##..##.######",
        "######.## ######## ##.######",
        "######.## ######## ##.######",
        "######.## ##      ##.######",
        "######.## ######## ##.######",
        "######.## ######## ##.######",
        "#......##### ## #####......#",
        "#.####.##### ## #####.####.#",
        "#.####.##### ## #####.####.#",
        "#.####.###......###.####.#",
        "#o............##............o#",
        "#.####.##### ## #####.####.#",
        "#.####.##### ## #####.####.#",
        "#..........................#",
        "############################",
      ];
      // raw strings must be length 28; adjust if needed
      function normalizeRaw(lines){
        return lines.map((s,i)=>{
          let t=s;
          // ensure length 28:
          if(t.length<28) t = t + "#".repeat(28-t.length);
          if(t.length>28) t = t.slice(0,28);
          return t;
        });
      }
      let lines = normalizeRaw(raw);
      if(lines.length!==31){
        // pad to 31 rows if needed (shouldn't)
        while(lines.length<31) lines.push("############################");
        if(lines.length>31) lines = lines.slice(0,31);
      }

      // Ghost house area + gate:
      // We'll carve a house roughly around row 13-17 cols 10-17.
      // Ensure gate at center of opening below house.
      // We'll modify grid after parsing.
      const grid = Array.from({length:ROWS}, ()=>Array(COLS).fill('#'));
      for(let r=0;r<ROWS;r++){
        const s=lines[r];
        for(let c=0;c<COLS;c++){
          const ch=s[c];
          if(ch==='#') grid[r][c] = '#';
          else if(ch==='.') grid[r][c] = '.';
          else if(ch==='o') grid[r][c] = 'o';
          else if(ch==='g') grid[r][c] = 'g';
          else if(ch===' ') grid[r][c] = ' ';
          else if(ch==='.') grid[r][c]='.';
          else grid[r][c] = '#';
        }
      }

      // Build richer, safer maze: replace known # at boundaries already.
      // Ensure tunnel row 14 has open corridors at both ends.
      function isWall(r,c){
        if(r<0||c<0||r>=ROWS||c>=COLS) return true;
        return grid[r][c]==='#';
      }

      // Carve ghost house / corridors to ensure walkable paths.
      function carve(r,c,ch){
        if(r<0||c<0||r>=ROWS||c>=COLS) return;
        grid[r][c]=ch;
      }

      // Carve corridors to create more consistent playfield:
      // We'll override a house region and gate.
      // House interior (walkable but without pellets):
      const house = { top:12, bottom:18, left:10, right:17 };
      for(let r=house.top;r<=house.bottom;r++){
        for(let c=house.left;c<=house.right;c++){
          carve(r,c,' ');
        }
      }
      // Gate opening bar: at row 15 (around center), across cols 13..14? We'll block Pac-Man but allow ghosts to use.
      // We'll implement gate logic by treating specific cells as wall for Pac-Man only; ghosts can pass.
      // Choose opening centered: row 15, cols 13-14 (24x4 approx => 2 tiles = 48px, but gate is bar across opening).
      const gateRow = 15;
      const gateCols = [13,14];
      for(const gc of gateCols){
        carve(gateRow,gc,'g'); // special
      }
      // Surround house with walls to look like enclosure:
      for(let r=house.top-1;r<=house.bottom+1;r++){
        for(let c=house.left-1;c<=house.right+1;c++){
          if(r<0||c<0||r>=ROWS||c>=COLS) continue;
          const inHouse = (r>=house.top&&r<=house.bottom&&c>=house.left&&c<=house.right);
          if(!inHouse){
            // ensure walls around house except gate opening region
            if(r===gateRow && gateCols.includes(c)) continue;
            // keep existing corridors open
            if(grid[r][c]==='#') continue;
          }
        }
      }

      // Ensure tunnel row 14 has corridors; open edges by carving at c=0 and c=27
      const tunnelR = 14;
      for(let c=0;c<COLS;c++){
        // create long tunnel with walls in middle to resemble.
        if(c===0||c===1||c===26||c===27){
          carve(tunnelR,c,'.');
        }else if(c>=3 && c<=24){
          // keep open
          carve(tunnelR,c,'.');
        }else{
          carve(tunnelR,c,'#');
        }
      }

      // Ensure power pellet tiles exactly:
      const powerTiles = [
        {c:1,r:3},{c:26,r:3},{c:1,r:23},{c:26,r:23}
      ];
      for(const p of powerTiles){
        carve(p.r,p.c,'o');
      }

      // Place remaining pellets in walkable corridor cells that are '.' or 'o'/' '??:
      // Any non-wall cell that isn't inside house interior will get pellets (unless already 'o').
      const pellets = new Map(); // key "c,r" -> {power:boolean}
      let pelletCount = 0;
      function inHouseInterior(r,c){
        return (r>=house.top && r<=house.bottom && c>=house.left && c<=house.right);
      }
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          const ch=grid[r][c];
          if(isWall(r,c)) continue;
          if(inHouseInterior(r,c)){
            // no pellets in house interior except maybe corners? We'll keep none for house.
            continue;
          }
          if(ch==='o'){
            pellets.set(`${c},${r}`, { power:true });
            pelletCount++;
          }else if(ch==='.'){
            pellets.set(`${c},${r}`, { power:false });
            pelletCount++;
          }else{
            // empty walkables: add pellet for corridors unless special 'g'
            if(ch==='g'){
              // gate opening: no pellets
              continue;
            }
            // For spaces or carved corridors, set pellets except around ghost gate row within house area.
            pellets.set(`${c},${r}`, { power:false });
            pelletCount++;
          }
        }
      }

      // Override to ensure there are exactly 4 power pellets; if extra 'o' accidentally appear, remove.
      let powerKeys = [];
      for(const [k,v] of pellets.entries()){ if(v.power) powerKeys.push(k); }
      if(powerKeys.length>4){
        // keep only those at specified tiles
        const allowed = new Set(powerTiles.map(p=>`${p.c},${p.r}`));
        for(const k of powerKeys){
          if(!allowed.has(k)) pellets.delete(k), pelletCount--;
        }
      }

      // Fruit
      const fruitTile = {c:14,r:17};
      let fruit = { active:false, despawnT:0, bonus:100 };

      // ===== Entities / State =====
      const STATES = { IDLE:0, PLAYING:1, PAUSED:2, GAME_OVER:3 };
      let gameState = STATES.IDLE;

      let level = 1;
      let score = 0;
      let highScore = 0;

      const queue = {left:false,right:false,up:false,down:false};
      let queuedDir = {dx:0,dy:0}; // desired direction at next turn
      let currentDir = {dx:0,dy:0};

      // Speed
      const PAC_SPEED = 120; // px/s
      const GHOST_SPEED_NORMAL = 110;
      const GHOST_SPEED_FRIGHT = 60;
      const EYES_SPEED = 200;

      // Modes
      const GHOST_MODES = { SCATTER:0, CHASE:1, FRIGHTENED:2, EYES:3 };
      let ghostMode = GHOST_MODES.SCATTER;

      // Scatter/Chase cycle (arcade-ish)
      const modeTimeline = [
        {mode:GHOST_MODES.SCATTER, t: 7000},
        {mode:GHOST_MODES.CHASE, t: 20000},
        {mode:GHOST_MODES.SCATTER, t: 7000},
        {mode:GHOST_MODES.CHASE, t: 20000},
        {mode:GHOST_MODES.SCATTER, t: 5000},
        {mode:GHOST_MODES.CHASE, t: 20000},
        {mode:GHOST_MODES.SCATTER, t: 4000},
        {mode:GHOST_MODES.CHASE, t: 20000},
      ];

      let modeTimeLeft = modeTimeline.length ? modeTimeline[0].t : 7000;
      let globalFrightenedTime = 0;

      // Eaten queue per frightened cycle
      let frightenedCycleId = 0;
      let ghostEatStages = new Map(); // id -> stage (0..3)
      let frightenedConsumedGhostIds = new Set();

      // Lives
      let lives = 3;

      // ===== Maze helpers =====
      function wrapC(c){
        if(c<0) return c+COLS;
        if(c>=COLS) return c-COLS;
        return c;
      }
      function tileCenter(c,r){
        return {
          x: mazeOffsetX + c*CELL + CELL/2,
          y: mazeOffsetY + r*CELL + CELL/2
        };
      }
      function posToTile(x,y){
        const c = Math.floor((x - mazeOffsetX) / CELL);
        const r = Math.floor((y - mazeOffsetY) / CELL);
        return {c,r};
      }
      function dirToName(dx,dy){
        if(dx===1) return 'right';
        if(dx===-1) return 'left';
        if(dy===1) return 'down';
        if(dy===-1) return 'up';
        return 'none';
      }
      function atTileCenter(ent){
        const tc = tileCenter(ent.tileC, ent.tileR);
        return Math.hypot(ent.x - tc.x, ent.y - tc.y) <= 2.2; // forgiving
      }

      function isTunnelTile(r){
        return r===tunnelR;
      }
      function speedForEntity(entity){
        if(entity.mode===GHOST_MODES.FRIGHTENED) return GHOST_SPEED_FRIGHT;
        if(entity.mode===GHOST_MODES.EYES) return EYES_SPEED;
        return GHOST_SPEED_NORMAL;
      }
      function isGateCell(r,c){
        return r===gateRow && gateCols.includes(c);
      }

      function canMoveTo(entity, nr,nc){
        nc = wrapC(nc);
        if(nr<0||nr>=ROWS) return false;
        if(isWall(nr,nc)) return false;
        // Ghost house gate: Pac-Man blocked, ghosts allowed (but only when in/approaching house)
        if(entity.type==='pac' && isGateCell(nr,nc)) return false;
        // Additionally, restrict leaving house? We'll allow ghosts to move through gate only to open corridors as walls exist.
        return true;

      function neighborsForAI(entity, r,c){
        const dirs = [
          {dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}
        ];
        const out=[];
        for(const d of dirs){
          const nr=r+d.dy, nc=c+d.dx;
          if(nr<0||nr>=ROWS) continue;
          if(canMoveTo(entity,nr,nc)){
            out.push({dx:d.dx,dy:d.dy,nr,nc:wrapC(nc)});
          }
        }
        return out;
      }

      function approxAABBIntersect(x1,y1,r1,x2,y2,r2){
        // AABB with radii:
        // Convert to square extents: use radius as half-size.
        const ax1=x1-r1, ay1=y1-r1, ax2=x1+r1, ay2=y1+r1;
        const bx1=x2-r2, by1=y2-r2, bx2=x2+r2, by2=y2+r2;
        return ax1<=bx2 && ax2>=bx1 && ay1<=by2 && ay2>=by1;
      }

      // ===== Player =====
      const pac = {
        type:'pac',
        x:0,y:0,
        tileC:14,tileR:23,
        dir:{dx:0,dy:0},
        nextDir:{dx:0,dy:0},
        cornerAssist:4
      };

      function resetPac(){
        pac.tileC = 14; pac.tileR = 23;
        const p=tileCenter(pac.tileC,pac.tileR);
        pac.x=p.x; pac.y=p.y;
        pac.dir={dx:0,dy:0};
        pac.nextDir={dx:0,dy:0};
        queuedDir={dx:0,dy:0};
        currentDir={dx:0,dy:0};
      }

      // ===== Ghosts =====
      function ghostFactory(name, color, start){
        return {
          type:'ghost',
          id:name,
          color,
          mode:GHOST_MODES.SCATTER,
          x:0,y:0,
          tileC:start.c, tileR:start.r,
          dir:{dx:0,dy:0},
          modeTimer:0,
          homeTarget:{c:14,r:14},
          scatterTarget:{c:0,r:0},
          eyesHome:{c:13,r:14},
          personality: name,
          lastDecisionT:0,
          justEaten:false
        };
      }

      // Place ghost house starts "near column 14, row 11–14 area"
      const ghosts = [
        ghostFactory('Blinky', '#FF0000', {c:14,r:14}),
        ghostFactory('Pinky',  '#FFB8FF', {c:13,r:14}),
        ghostFactory('Inky',   '#00FFFF', {c:15,r:14}),
        ghostFactory('Clyde',  '#FFB852', {c:14,r:13})
      ];
      // Personality targets:
      ghosts[0].scatterTarget={c:27,r:0}; // Blinky top-right
      ghosts[1].scatterTarget={c:0,r:0};  // Pinky top-left
      ghosts[2].scatterTarget={c:27,r:30}; // Inky bottom-right
      ghosts[3].scatterTarget={c:0,r:30}; // Clyde bottom-left

      function resetGhost(g, toHome=true){
        const p=tileCenter(g.tileC,g.tileR);
        g.x=p.x; g.y=p.y;
        g.dir={dx:0,dy:0};
        g.mode = GHOST_MODES.SCATTER;
        g.justEaten=false;
        g.modeTimer=0;
        g.lastDecisionT=0;
      }

      function resetGhosts(){
        ghosts.forEach(g=>{
          // reset to initial house positions
          if(g.id==='Blinky'){ g.tileC=14; g.tileR=14; }
          if(g.id==='Pinky'){ g.tileC=13; g.tileR=14; }
          if(g.id==='Inky'){ g.tileC=15; g.tileR=14; }
          if(g.id==='Clyde'){ g.tileC=14; g.tileR=13; }
          resetGhost(g);
        });
      }

      // release behavior: after power eaten etc, ghosts should be active immediately.
      // We'll treat them as active when PLAYING starts: they already exist outside; allow AI to move.
      // But the spec asks "release behavior". We'll keep a subtle home gate constraint for ghosts until mode not EYES.
      let ghostsReleased = false;
      function setGhostsReleased(v){
        ghostsReleased=v;
      }

      // ===== AI: Decision at intersections =====
      function chooseDirectionForGhost(g, dt){
        // If close to tile center, allow direction change.
        const tc = tileCenter(g.tileC,g.tileR);
        const nearCenter = Math.hypot(g.x-tc.x,g.y-tc.y) <= 2.3;

        // Determine immediate reversal for frightened:
        const possible = neighborsForAI(g,g.tileR,g.tileC);

        if(possible.length===0) return;

        // At intersections, choose; for smoother play, also allow when near center and multiple options.
        const speed = speedForEntity(g);
        const isTurnNode = nearCenter && possible.length>=3;

        if(!isTurnNode && possible.length<3){
          // But still allow turning when next tile is blocked.
          const aheadC = wrapC(g.tileC + g.dir.dx);
          const aheadR = g.tileR + g.dir.dy;
          if(g.dir.dx!==0 || g.dir.dy!==0){
            if(!canMoveTo(g, aheadR, aheadC)){
              // must choose
            }else{
              return;
            }
          }
        }

        // Build targets per mode
        const pacTile = {c:pac.tileC, r:pac.tileR};

        function chooseBestByTarget(target){
          // Do not allow reversal unless forced
          const rev = {dx:-g.dir.dx, dy:-g.dir.dy};
          let candidates = possible.slice();
          // If not frightened, avoid reversing if possible.
          if(g.dir.dx!==0 || g.dir.dy!==0){
            const canAvoid = candidates.filter(d => !(d.dx===rev.dx && d.dy===rev.dy));
            if(canAvoid.length>0) candidates = canAvoid;
          }
          let best=null;
          let bestDist=Infinity;
          for(const d of candidates){
            // prefer direction with minimal distance to target from next tile center
            const nc = d.nc, nr = d.nr;
            const p = tileCenter(nc,nr);
            const dist = Math.hypot(p.x - tileCenter(target.c,target.r).x, p.y - tileCenter(target.c,target.r).y);
            // slight bias to continue direction for stability
            const contBias = (d.dx===g.dir.dx && d.dy===g.dir.dy) ? -3 : 0;
            const value = dist + contBias;
            if(value < bestDist){
              bestDist=value; best=d;
            }
          }
          return best || candidates[0];
        }

        let desired=null;

        if(g.mode===GHOST_MODES.FRIGHTENED){
          // pick direction farthest from Pac, but with immediate reversal.
          // immediate reverse:
          desired = possible.find(d => d.dx===-g.dir.dx && d.dy===-g.dir.dy);
          if(!desired){
            desired = possible[0];
          }
          // after reversal, add randomness to appear less deterministic
          // also try maximize distance from pac:
          const pacCenter = tileCenter(pacTile.c,pacTile.r);
          let best=desired, bestD=-Infinity;
          for(const d of possible){
            const p = tileCenter(d.nc,d.nr);
            const dist = Math.hypot(p.x-pacCenter.x,p.y-pacCenter.y);
            const jitter = (Math.random()*10-5);
            const reversedBonus = (d.dx===-g.dir.dx && d.dy===-g.dir.dy) ? 25 : 0;
            const val = dist + jitter + reversedBonus;
            if(val>bestD){bestD=val; best=d;}
          }
          desired=best;
        } else if(g.mode===GHOST_MODES.EYES){
          // eyes return home at 200px/s, head to home tile.
          desired = chooseBestByTarget(g.eyesHome || {c:13,r:14});
        } else {
          // SCATTER/CHASE
          if(g.mode===GHOST_MODES.SCATTER){
            desired = chooseBestByTarget(g.scatterTarget);
          } else if(g.mode===GHOST_MODES.CHASE){
            // Per-ghost distinct targeting logic
            let target = {c:0,r:0};
            if(g.id==='Blinky'){
              target = {c: pacTile.c, r: pacTile.r};
            } else if(g.id==='Pinky'){
              // four tiles ahead of pac in current dir; if pac dir unknown, use facing or current movement dir
              const pd = pac.dir.dx===0 && pac.dir.dy===0 ? currentDir : pac.dir;
              const steps = 4;
              let tc = pacTile.c + pd.dx*steps;
              let tr = pacTile.r + pd.dy*steps;
              tc = wrapC(tc);
              target = {c:tc, r:tr};
              // clamp
              tr = Math.max(0, Math.min(ROWS-1, tr));
              target.r = tr;
              // classic Pinky bug in original isn't spec; keep straightforward.
            } else if(g.id==='Inky'){
              // Use vector from Blinky doubled; classic: Inky uses Blinky position as reference and pac two ahead.
              const bl = ghosts[0];
              const pd = pac.dir.dx===0 && pac.dir.dy===0 ? currentDir : pac.dir;
              let p2c = pacTile.c + pd.dx*2;
              let p2r = pacTile.r + pd.dy*2;
              p2c = wrapC(p2c);
              p2r = Math.max(0, Math.min(ROWS-1, p2r));
              // vector from Blinky to that point, doubled
              let vc = p2c - bl.tileC;
              let vr = p2r - bl.tileR;
              let tc = bl.tileC + vc*2;
              let tr = bl.tileR + vr*2;
              tc = wrapC(tc);
              tr = Math.max(0, Math.min(ROWS-1, tr));
              target = {c:tc, r:tr};
            } else if(g.id==='Clyde'){
              // chase pac unless within distance threshold => scatter
              const dist = Math.hypot(tileCenter(g.tileC,g.tileR).x - tileCenter(pacTile.c,pacTile.r).x,
                                        tileCenter(g.tileC,g.tileR).y - tileCenter(pacTile.c,pacTile.r).y);
              if(dist < 180){
                target = g.scatterTarget;
              }else{
                target = {c: pacTile.c, r: pacTile.r};
              }
            }
            desired = chooseBestByTarget(target);
          }
        }

        if(!desired) return;
        // Set direction immediately; but only if move valid.
        g.dir = {dx: desired.dx, dy: desired.dy};
      }

      function updateGhost(g, dt){
        // Determine tile under entity for AI decision and movement
        const tc = tileCenter(g.tileC,g.tileR);
        const dirLen = Math.hypot(g.dir.dx,g.dir.dy);
        const speed = speedForEntity(g);
        if(dirLen===0){
          // initial: choose any valid direction (prefer out of house)
          const possible = neighborsForAI(g,g.tileR,g.tileC);
          if(possible.length){
            // pick direction that increases distance from house center? or just first.
            const out = possible[0];
            g.dir = {dx:out.dx, dy:out.dy};
          }
        }

        // If at/near center, possibly change by AI.
        chooseDirectionForGhost(g, dt);

        // Move
        let step = speed * dt;

        // Tunnel speed reduced to 60% for all entities per spec.
        const willTunnel = isTunnelTile(g.tileR) || isTunnelTile(g.tileR + g.dir.dy);
        if(willTunnel && g.dir.dy===0){
          step *= 0.6;
        } else if(willTunnel && g.dir.dy!==0){
          // tunnel row is horizontal wrap only; dy!=0 likely shouldn't happen; still apply factor if r==14.
          if(isTunnelTile(g.tileR)) step *= 0.6;
        }

        // Smooth movement
        g.x += g.dir.dx * step;
        g.y += g.dir.dy * step;

        // When crossing a tile boundary, update tile coords if close to next center.
        // Use correction if leaving due to dt.
        // Compute projected tile
        const nt = posToTile(g.x,g.y);
        // If wrap through tunnel edges, adjust
        if(nt.c<0 || nt.c>=COLS){
          g.x = mazeOffsetX + wrapC(nt.c)*CELL + CELL/2;
        }
        // update tile coords
        g.tileC = wrapC(nt.c);
        g.tileR = nt.r;

        // Wall blocking: if next cell in direction is wall, clamp to center
        if(g.tileR<0||g.tileR>=ROWS) {
          // revert
        }
        const aheadR = g.tileR + g.dir.dy;
        const aheadC = wrapC(g.tileC + g.dir.dx);
        if(g.dir.dx!==0 || g.dir.dy!==0){
          if(!canMoveTo(g, aheadR, aheadC)){
            // snap to center and stop/choose next
            const center = tileCenter(g.tileC,g.tileR);
            g.x = center.x; g.y = center.y;
          }
        }

        // When near target home in EYES: switch mode back to global ghostMode after reaching.
        if(g.mode===GHOST_MODES.EYES){
          const target = g.eyesHome || {c:13,r:14};
          if(Math.hypot(g.x-tileCenter(target.c,target.r).x, g.y-tileCenter(target.c,target.r).y) < 3){
            g.mode = ghostMode===GHOST_MODES.SCATTER ? GHOST_MODES.SCATTER : (ghostMode===GHOST_MODES.CHASE ? GHOST_MODES.CHASE : ghostMode);
            // after eyes returned, restore direction slightly
            g.dir={dx:0,dy:0};
          }
        }
      }

      // ===== Pac movement =====
      function resetBoard(){
        // Clear pellets map and repopulate while keeping same maze layout for now.
        // We'll rebuild pellet set from grid again using same logic, but keep progress for level.
        pellets.clear();
        pelletCount=0;
        for(let r=0;r<ROWS;r++){
          for(let c=0;c<COLS;c++){
            if(isWall(r,c)) continue;
            if(inHouseInterior(r,c)) continue;
            const ch=grid[r][c];
            if(ch==='o'){
              pellets.set(`${c},${r}`, {power:true});
              pelletCount++;
            } else if(ch==='.'){
              pellets.set(`${c},${r}`, {power:false});
              pelletCount++;
            } else {
              if(ch==='g') continue;
              // add pellet on other walkables except those in fruit path? keep pellet
              pellets.set(`${c},${r}`, {power:false});
              pelletCount++;
            }
          }
        }
        // remove pellets at specified power tiles if not in map? Ensure exactly 4 power pellets
        const allowed = new Set(powerTiles.map(p=>`${p.c},${p.r}`));
        // ensure all allowed are power:
        for(const p of powerTiles){
          const k=`${p.c},${p.r}`;
          if(pellets.has(k)){
            pellets.set(k, {power:true});
          }else{
            pellets.set(k,{power:true});
            pelletCount++;
          }
        }
        // ensure non-allowed power removed:
        for(const [k,v] of pellets.entries()){
          if(v.power && !allowed.has(k)){
            pellets.delete(k); pelletCount--;
          }
        }

        fruit.active=false;
        fruit.despawnT=0;

        // Reset mode timeline and frightened
        ghostMode = GHOST_MODES.SCATTER;
        timelineIndex = 0;
        modeTimeLeft = modeTimeline.length ? modeTimeline[0].t : 7000;
        globalFrightenedTime = 0;
        frightenedCycleId++;
        ghostEatStages.clear();
        frightenedConsumedGhostIds.clear();
        ghostsReleased=false;

        // Reset entities
        resetPac();
        resetGhosts();

        // give starting direction to pac: left or right? We'll start moving right if possible near tile.
        // Determine legal directions from start
        const startNeighbors = neighborsForPac();
        if(startNeighbors){
          pac.dir = startNeighbors;
        }
        setGhostsReleased(true);
      }

      function neighborsForPac(){
        // choose starting direction right if open else left else down/up
        const candidates = [
          {dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}
        ];
        for(const d of candidates){
          const nr = pac.tileR + d.dy;
          const nc = wrapC(pac.tileC + d.dx);
          if(canMoveTo(pac,nr,nc)) return d;
        }
        return {dx:0,dy:0};
      }

      function handlePacTurning(){
        // Apply queued direction at next legal tile center with corner assist
        const tc = tileCenter(pac.tileC,pac.tileR);
        const canTurnNow = Math.hypot(pac.x-tc.x,pac.y-tc.y) <= (PAC_R + pac.cornerAssist);
        if(!canTurnNow) return;
        const nd = pac.nextDir;
        if(nd.dx===0 && nd.dy===0) return;
        const nr = pac.tileR + nd.dy;
        const nc = wrapC(pac.tileC + nd.dx);
        if(canMoveTo(pac,nr,nc)){
          pac.dir = {dx:nd.dx,dy:nd.dy};
        }
      }

      function updatePac(dt){
        // If paused or over, no move
        handlePacTurning();

        const tunnel = isTunnelTile(pac.tileR);
        let step = PAC_SPEED * dt;
        if(tunnel) step *= 0.6;

        // Tentative move
        const nx = pac.x + pac.dir.dx*step;
        const ny = pac.y + pac.dir.dy*step;

        // Determine target tile
        const nt = posToTile(nx,ny);
        let tileC = wrapC(nt.c);
        let tileR = nt.r;

        // Clamp wall collision: check if next tile in direction from current tile is wall
        const aheadR = pac.tileR + pac.dir.dy;
        const aheadC = wrapC(pac.tileC + pac.dir.dx);
        if(pac.dir.dx!==0 || pac.dir.dy!==0){
          if(!canMoveTo(pac,aheadR,aheadC)){
            // snap to center
            const c = tileCenter(pac.tileC,pac.tileR);
            pac.x=c.x; pac.y=c.y;
            // stop moving until legal turn
            return;
          }
        }

        pac.x = nx; pac.y = ny;
        pac.tileC = tileC;
        pac.tileR = tileR;
        // Handle tunnel wrap explicitly in x position
        if(pac.tileC<0||pac.tileC>=COLS){
          pac.x = mazeOffsetX + wrapC(pac.tileC)*CELL + CELL/2;
          pac.tileC = wrapC(pac.tileC);
        }
      }

      // ===== Consumption / Collisions =====
      let pelletsEatenThisLevel = 0;

      function award(points){
        score += points;
      }

      let powerActive = false;
      let powerRemaining = 0; // seconds
      function triggerFrightened(){
        powerActive=true;
        globalFrightenedTime = 10000; // ms
        powerRemaining = globalFrightenedTime/1000;
        frightenedCycleId++;
        ghostEatStages.clear();
        frightenedConsumedGhostIds.clear();
        // Set ghost modes to frightened immediately (except eyes)
        ghosts.forEach(g=>{
          if(g.mode!==GHOST_MODES.EYES){
            g.mode = GHOST_MODES.FRIGHTENED;
            g.dir = {dx:-g.dir.dx, dy:-g.dir.dy}; // reverse immediately
            g.justEaten=false;
          }
        });
      }

      function updateFrightened(dt){
        if(!powerActive) return;
        globalFrightenedTime -= dt*1000;
        powerRemaining = Math.max(0, globalFrightenedTime/1000);
        // low pulsing tone during frightened mode
        if(Math.floor((powerRemaining)*10) !== Math.floor((powerRemaining+dt)*10)){
          playPowerPulse();
        }
        if(globalFrightenedTime<=0){
          powerActive=false;
          // restore ghost modes to chase/scatter unless eyes
          ghosts.forEach(g=>{
            if(g.mode===GHOST_MODES.FRIGHTENED){
              g.mode = ghostMode;
              g.dir = {dx:0,dy:0};
            }
          });
        }
      }

      function eatPellets(){
        // Pac contact with pellet/power/fruit
        const key = `${pac.tileC},${pac.tileR}`;
        if(pellets.has(key)){
          const p = pellets.get(key);
          pellets.delete(key);
          pelletCount--;
          pelletsEatenThisLevel++;
          if(p.power){
            award(50);
            triggerFrightened();
          }else{
            award(10);
            playWaka();
          }
          updateHUDScore();
          // Fruit after 70 and 170 pellets eaten (global level progression)
          if(!fruit.active && (pelletsEatenThisLevel===70 || pelletsEatenThisLevel===170)){
            fruit.active=true;
            fruit.despawnT = performance.now() + 10000;
          }
        }

        // Fruit collision at center tile: if fruit active and pac on tile
        if(fruit.active){
          const fc = `${fruitTile.c},${fruitTile.r}`;
          const pc = `${pac.tileC},${pac.tileR}`;
          if(fc===pc){
            fruit.active=false;
            award(100);
            updateHUDScore();
            // play eat ghost-like short
            beep('fruit', 160, 740, 50, 0.05);
          } else {
            if(performance.now() > fruit.despawnT) fruit.active=false;
          }
        }
      }

      function handleGhostCollisions(){
        for(const g of ghosts){
          if(approxAABBIntersect(pac.x,pac.y,PAC_R, g.x,g.y,GHOST_R)){
            if(g.mode===GHOST_MODES.FRIGHTENED){
              // eat ghost
              const stage = ghostEatStages.get(g.id) || 0;
              const stagesByCount = [200,400,800,1600];
              const points = stagesByCount[Math.min(stage,3)];
              award(points);
              updateHUDScore();
              ghostEatStages.set(g.id, stage+1);
              frightenedConsumedGhostIds.add(g.id);
              playEatGhost(Math.min(stage,3));

              g.mode = GHOST_MODES.EYES;
              g.dir = {dx:0,dy:0};
              // give eyes home speed set via EYES mode
              // ensure reverse even when frightened
              g.justEaten=true;
              // Immediately attempt direction towards home on next update.
              return 'EAT';
            } else if(g.mode!==GHOST_MODES.EYES){
              // lose life
              lives--;
              console.log("Collision: Pac-Man hit ghost. Lives left:", lives);
              if(lives<=0){
                score = Math.max(0, score);
                highScore = Math.max(highScore, score);
                localStorage.setItem('pacman_highscore', String(highScore));
                updateHUDHigh();
                gameState = STATES.GAME_OVER;
                document.getElementById('gameOverOverlay').style.display='flex';
                document.getElementById('startOverlay').style.display='none';
                updateFinalScore();
              } else {
                // death flow: pause briefly, reset entities
                playDeathJingle();
                gameState = STATES.PAUSED; // temporary freeze, then resume
                const savedState = 'DEATH';
                const tStart = performance.now();
                setTimeout(()=>{
                  // restore play
                  resetPac();
                  // set ghosts back to house, keep frightened? cancel
                  powerActive=false; globalFrightenedTime=0;
                  ghosts.forEach(gg=>{
                    gg.mode = ghostMode; gg.dir={dx:0,dy:0}; gg.justEaten=false;
                    // put to home positions:
                    if(gg.id==='Blinky'){ gg.tileC=14; gg.tileR=14; }
                    if(gg.id==='Pinky'){ gg.tileC=13; gg.tileR=14; }
                    if(gg.id==='Inky'){ gg.tileC=15; gg.tileR=14; }
                    if(gg.id==='Clyde'){ gg.tileC=14; gg.tileR=13; }
                    const p=tileCenter(gg.tileC,gg.tileR);
                    gg.x=p.x; gg.y=p.y;
                  });
                  pac.dir = neighborsForPac();
                  gameState = STATES.PLAYING;
                }, 850);
              }
              updateHUDLives();
              return 'HIT';
            }
          }
        }
        return null;
      }

      function updateHUDScore(){
        const el = document.getElementById('hudScore');
        el.textContent = "SCORE " + String(score).padStart(5,'0');
      }
      function updateHUDHigh(){
        const el = document.getElementById('hudHi');
        el.textContent = "HIGH " + String(highScore).padStart(5,'0');
      }
      function updateHUDLives(){
        const el = document.getElementById('hudLives');
        el.innerHTML='';
        for(let i=0;i<lives;i++){
          const ic=document.createElement('span');
          ic.className='lifeIcon';
          el.appendChild(ic);
        }
      }
      function updateHUDLevel(){
        document.getElementById('hudLevel').textContent = "LEVEL " + level;
      }
      function updateFinalScore(){
        document.getElementById('finalScore').textContent = "Score " + score;
      }

      // ===== Maze Drawing =====
      function drawMaze(){
        // walls and corridors
        ctx.save();
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);

        // walls: draw rectangles for wall cells
        ctx.fillStyle = '#001aff00'; // nearly transparent? We'll draw in blue-ish for visibility
        // Better: use blue lines
        const wallCol = 'rgb(0,70,255)';
        const wallSoft = 'rgba(0,80,255,0.8)';
        // Build outline:
        for(let r=0;r<ROWS;r++){
          for(let c=0;c<COLS;c++){
            if(!isWall(r,c)){
              // corridor background
              ctx.fillStyle = 'rgba(0,0,0,1)';
              continue;
            }
          }
        }

        // Draw walls as blue blocks
        ctx.fillStyle = wallSoft;
        for(let r=0;r<ROWS;r++){
          for(let c=0;c<COLS;c++){
            if(isWall(r,c)){
              ctx.fillRect(mazeOffsetX + c*CELL, mazeOffsetY + r*CELL, CELL, CELL);
            }
          }
        }

        // Gate bar: horizontal bar centered above doorway
        const gateX = mazeOffsetX + gateCols[0]*CELL + CELL/2;
        const gateY = mazeOffsetY + gateRow*CELL + (CELL/2 - GATE_H/2);
        ctx.fillStyle = '#FFB8FF';
        ctx.fillRect(gateX - GATE_W/2, gateY, GATE_W, GATE_H);

        // Tunnel edges: subtle guide
        // pellets: draw after walls
        ctx.restore();
      }

      function drawPellets(){
        ctx.save();
        for(const [k,v] of pellets.entries()){
          const [cS,rS]=k.split(',');
          const c=+cS, r=+rS;
          const center = tileCenter(c,r);
          if(v.power){
            const t = performance.now()/100;
            const blink = (Math.sin(t)>0)?1:0;
            const rad = 5 + (blink?0.8:0);
            ctx.fillStyle = '#FFCC99';
            ctx.beginPath();
            ctx.arc(center.x, center.y, rad, 0, Math.PI*2);
            ctx.fill();
          }else{
            ctx.fillStyle = '#FFCC99';
            ctx.beginPath();
            ctx.arc(center.x, center.y, 2, 0, Math.PI*2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawFruit(){
        if(!fruit.active) return;
        const p = tileCenter(fruitTile.c, fruitTile.r);
        const t = performance.now()/1000;
        const bob = Math.sin(t*10)*2;
        ctx.save();
        ctx.translate(p.x, p.y + bob);
        // simple cherry icon
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(0,-2,7,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(-2,-4,3,0,Math.PI*2);
        ctx.stroke();
        // stem
        ctx.strokeStyle = '#7b2a2a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0,-10);
        ctx.quadraticCurveTo(6,-20, 10,-18);
        ctx.stroke();
        ctx.restore();
      }

      // ===== Draw Entities =====
      function drawPac(time){
        // Pac mouth wedge
        const angle = (time*0.02) % (Math.PI*2);
        let mouth = 0.25 + 0.18*(0.5+0.5*Math.sin(time*0.25));
        ctx.save();
        ctx.translate(pac.x,pac.y);

        // direction rotation
        let rot=0;
        if(pac.dir.dx===1) rot=0;
        else if(pac.dir.dx===-1) rot=Math.PI;
        else if(pac.dir.dy===1) rot=Math.PI/2;
        else if(pac.dir.dy===-1) rot=-Math.PI/2;
        else rot=0;

        ctx.rotate(rot);

        // body
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath();
        // mouth open wedge centered on +x direction
        ctx.moveTo(0,0);
        ctx.arc(0,0,PAC_R, mouth, 2*Math.PI - mouth);
        ctx.closePath();
        ctx.fill();

        // corner assist highlight
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.arc(-3,-4,5,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      function drawGhost(g, time){
        const t = time/1000;
        const x=g.x, y=g.y;

        // body squircle
        let mode = g.mode;
        const isFright = mode===GHOST_MODES.FRIGHTENED;
        const isEyes = mode===GHOST_MODES.EYES;

        let bodyCol = g.color;
        if(isFright) bodyCol = '#2a4cff';
        if(isEyes) bodyCol = '#FFFFFF';

        ctx.save();
        ctx.translate(x,y);

        if(isEyes){
          // eyes only
          const wobble = Math.sin(t*8)*0.5;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(0, -1, 10, 0, Math.PI*2);
          ctx.fill();

          // eye sclera
          ctx.fillStyle = '#fff';
          // pupils reflect direction
          let pd = g.dir;
          if(pd.dx===0 && pd.dy===0){
            // estimate from movement: use last tile direction approx
            pd = {dx:0,dy:-1};
          }
          // pupil offset
          const px = pd.dx*3;
          const py = pd.dy*3;
          ctx.fillStyle = '#222';
          // two eyes
          ctx.beginPath();
          ctx.arc(-4 + px*0.6, -1 + py*0.6 + wobble, 3.2, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(4 + px*0.6, -1 + py*0.6 - wobble, 3.2, 0, Math.PI*2);
          ctx.fill();
          // lid/ghost outline light
          ctx.strokeStyle = 'rgba(0,0,0,0.25)';
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.arc(0,0,10,0,Math.PI*2);
          ctx.stroke();
          ctx.restore();
          return;
        }

        // ghost body: rounded top + wavy bottom
        ctx.fillStyle = bodyCol;
        ctx.beginPath();
        ctx.moveTo(-10, 0);
        ctx.quadraticCurveTo(-10,-8, 0,-8);
        ctx.quadraticCurveTo(10,-8, 10, 0);

        // wavy bottom
        ctx.quadraticCurveTo(10, 0, 10, 6);
        ctx.quadraticCurveTo(6, 8, 4, 6);
        ctx.quadraticCurveTo(2, 4, 0, 6);
        ctx.quadraticCurveTo(-2, 8, -4, 6);
        ctx.quadraticCurveTo(-6, 4, -10, 6);
        ctx.quadraticCurveTo(-10, 0, -10, 0);
        ctx.closePath();
        ctx.fill();

        // frightened stripes
        if(isFright){
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.9)';
          ctx.lineWidth = 2;
          for(let i=-6;i<=6;i+=6){
            ctx.beginPath();
            ctx.moveTo(i-2, -4);
            ctx.quadraticCurveTo(i, -1, i+2, 3);
            ctx.stroke();
          }
          // blink/alternating intensity
          if(((time/100)%2|0)===0){
            ctx.fillStyle='rgba(255,255,255,0.12)';
            ctx.beginPath();
            ctx.arc(-4,-5,8,0,Math.PI*2);
            ctx.fill();
          }
          ctx.restore();
        }

        // Eyes
        const eyeCenterY = -2;
        let pd = g.dir;
        if(pd.dx===0 && pd.dy===0){
          // infer from last movement by tile delta not stored; approximate with vector to pac for chase modes:
          const dx = pac.tileC - g.tileC;
          const dy = pac.tileR - g.tileR;
          pd = {dx: Math.sign(dx), dy: Math.sign(dy)};
          if(pd.dx===0 && pd.dy===0) pd = {dx:1,dy:0};
        }
        const px = pd.dx*3;
        const py = pd.dy*3;

        // eyes base
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-4 + px*0.6, eyeCenterY + py*0.6, 4.3, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4 + px*0.6, eyeCenterY + py*0.6, 4.3, 0, Math.PI*2);
        ctx.fill();

        // pupils
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(-4 + px*0.9, eyeCenterY + py*0.9, 2.6, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4 + px*0.9, eyeCenterY + py*0.9, 2.6, 0, Math.PI*2);
        ctx.fill();

        // top highlight
        ctx.fillStyle='rgba(255,255,255,0.10)';
        ctx.beginPath();
        ctx.arc(0,-6,8,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
      }

      // ===== Tunnel wrap =====
      function applyTunnelWrapEntity(ent){
        // wrap when leaving edges on x direction (tile row 14)
        const nt = posToTile(ent.x, ent.y);
        if(nt.r===tunnelR){
          if(nt.c<0){
            ent.x = mazeOffsetX + wrapC(nt.c)*CELL + CELL/2;
            ent.tileC = wrapC(nt.c);
          }else if(nt.c>=COLS){
            ent.x = mazeOffsetX + wrapC(nt.c)*CELL + CELL/2;
            ent.tileC = wrapC(nt.c);
          }
        }
      }

      // ===== Level completion =====
      function checkLevelClear(){
        if(pellets.size===0){
          level++;
          updateHUDLevel();
          // Advance board faster at higher levels? We'll keep same but slightly increase ghost speed.
          // Modify global speeds by level scaling in updateGhost speedForEntity
          // We'll implement minor scaling.
          // Reset for new level:
          // Reset pellet map with same layout
          // Provide a brief pause and then start playing.
          gameState = STATES.PAUSED;
          setTimeout(()=>{
            resetBoard();
            ghostMode = GHOST_MODES.SCATTER;
            // small ramp
            gameState = STATES.PLAYING;
          }, 650);
        }
      }

      // ===== Game Loop / Time =====
      let lastT = performance.now();
      let accLog=0;

      function setState(s){
        gameState = s;
        console.log("State:", Object.keys(STATES).find(k=>STATES[k]===s));
      }

      function updateGhostModeCycle(dt){
        if(powerActive) return; // frightened overrides
        modeTimeLeft -= dt*1000;
        if(modeTimeLeft<=0){
          timelineIndex = (timelineIndex+1) % modeTimeline.length;
          ghostMode = modeTimeline[timelineIndex].mode;
          modeTimeLeft = modeTimeline[timelineIndex].t;
          // update ghosts modes if not frightened/eyes
          ghosts.forEach(g=>{
            if(g.mode!==GHOST_MODES.FRIGHTENED && g.mode!==GHOST_MODES.EYES){
              g.mode = ghostMode;
              g.dir={dx:0,dy:0};
            }
          });
          // Also ensure scatter at start
        }
      }

      function drawBackground(){
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);
      }

      function draw(){
        const time = performance.now();
        drawBackground();
        drawMaze();
        // Draw pellets & fruit
        drawPellets();
        drawFruit();

        // Draw entities
        // Pac
        drawPac(time);
        // Ghosts
        ghosts.forEach(g=>drawGhost(g,time));

        // subtle vignette
        ctx.save();
        const grad = ctx.createRadialGradient(W/2,H/2, 100, W/2,H/2, 520);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle=grad;
        ctx.fillRect(0,0,W,H);
        ctx.restore();
      }

      function update(dt){
        if(gameState===STATES.PLAYING){
          // Update global modes
          updateFrightened(dt);
          updateGhostModeCycle(dt);

          // update pac turning queue
          // Apply queued direction immediately when at center
          if(pac.nextDir.dx!==0 || pac.nextDir.dy!==0){
            handlePacTurning();
          }

          updatePac(dt);

          // Wrap for tunnel
          applyTunnelWrapEntity(pac);

          // Ghost updates
          // If level increases speed slightly
          const speedScale = 1 + Math.min(0.35,(level-1)*0.04);
          ghosts.forEach(g=>{
            // Temporarily modify speed by scaling in speedForEntity via multiplier
            // We'll apply via temporary properties:
            g._speedScale = speedScale;
          });

          function speedForEntityScaled(entity){
            let base = 0;
            if(entity.mode===GHOST_MODES.FRIGHTENED) base = GHOST_SPEED_FRIGHT;
            else if(entity.mode===GHOST_MODES.EYES) base = EYES_SPEED;
            else base = GHOST_SPEED_NORMAL;
            const sc = entity._speedScale || 1;
            return base*sc;
          }
          // patch speedForEntity to use scaled
          const _speedForEntity = speedForEntity;
          // but avoid rewire; just compute in updateGhost by overriding global speedForEntity usage
          // We'll override locally by altering entity.mode handling via property:
          for(const g of ghosts){
            // updateGhost uses speedForEntity; so temporarily set using property:
            g._speedScale = speedScale;
          }
          // Monkey patch by shadowing speedForEntity:
          const __orig = speedForEntity;
          // Not possible safely here; instead incorporate scaling in speedForEntity via closure? We'll do minimal:
          // We'll just scale by manipulating global constants not allowed.
          // We'll instead apply scaling in updateGhost movement by copying and using computed speed:
          // -> redo ghost update with scaled logic:
          for(const g of ghosts){
            // Decide and then move with scaled speed
            // replicate updateGhost but with scaled speed
            const tc = tileCenter(g.tileC,g.tileR);
            const nearCenter = Math.hypot(g.x-tc.x,g.y-tc.y) <= 2.3;

            if(g.dir.dx===0 && g.dir.dy===0){
              const possible = neighborsForAI(g,g.tileR,g.tileC);
              if(possible.length) g.dir={dx:possible[0].dx,dy:possible[0].dy};
            }
            chooseDirectionForGhost(g, dt);

            let step = speedForEntity(g) * (g._speedScale||1);
            const willTunnel = isTunnelTile(g.tileR) || isTunnelTile(g.tileR + g.dir.dy);
            if(willTunnel && g.dir.dy===0) step *= 0.6;
            else if(willTunnel && g.dir.dy!==0 && isTunnelTile(g.tileR)) step *= 0.6;

            g.x += g.dir.dx * step;
            g.y += g.dir.dy * step;

            const nt = posToTile(g.x,g.y);
            if(nt.c<0 || nt.c>=COLS){
              g.x = mazeOffsetX + wrapC(nt.c)*CELL + CELL/2;
              g.tileC = wrapC(nt.c);
            } else {
              g.tileC = wrapC(nt.c);
            }
            g.tileR = nt.r;

            const aheadR = g.tileR + g.dir.dy;
            const aheadC = wrapC(g.tileC + g.dir.dx);
            if(g.dir.dx!==0 || g.dir.dy!==0){
              if(!canMoveTo(g, aheadR, aheadC)){
                const center = tileCenter(g.tileC,g.tileR);
                g.x=center.x; g.y=center.y;
              }
            }

            if(g.mode===GHOST_MODES.EYES){
              const target = g.eyesHome || {c:13,r:14};
              if(Math.hypot(g.x-tileCenter(target.c,target.r).x, g.y-tileCenter(target.c,target.r).y) < 3){
                g.mode = ghostMode;
                g.dir={dx:0,dy:0};
              }
            }

            applyTunnelWrapEntity(g);
          }

          // Eat pellets and fruit
          eatPellets();

          // Collision
          const collision = handleGhostCollisions();

          // Level progression
          checkLevelClear();
        }
      }

      function togglePause(){
        if(gameState===STATES.PLAYING){
          setState(STATES.PAUSED);
          document.getElementById('pauseOverlay').style.display='flex';
        } else if(gameState===STATES.PAUSED){
          setState(STATES.PLAYING);
          document.getElementById('pauseOverlay').style.display='none';
          // reset time to avoid dt jumps
          lastT = performance.now();
        }
      }

      // ===== Input =====
      function setQueuedFromKey(key){
        if(key==='ArrowLeft' || key==='a' || key==='A'){
          pac.nextDir = {dx:-1,dy:0}; queuedDir = pac.nextDir;
        } else if(key==='ArrowRight' || key==='d' || key==='D'){
          pac.nextDir = {dx:1,dy:0}; queuedDir = pac.nextDir;
        } else if(key==='ArrowUp' || key==='w' || key==='W'){
          pac.nextDir = {dx:0,dy:-1}; queuedDir = pac.nextDir;
        } else if(key==='ArrowDown' || key==='s' || key==='S'){
          pac.nextDir = {dx:0,dy:1}; queuedDir = pac.nextDir;
        }
      }

      window.addEventListener('keydown', (e)=>{
        const k = e.key;
        if(k==='Enter'){
          // Start / Restart
          if(gameState===STATES.IDLE){
            // start
            document.getElementById('startOverlay').style.display='none';
            document.getElementById('gameOverOverlay').style.display='none';
            document.getElementById('pauseOverlay').style.display='none';
            score=0; level=1; lives=3;
            pelletsEatenThisLevel=0;
            updateHUDScore();
            updateHUDLives();
            updateHUDLevel();
            // reset state & board
            resetBoard();
            ghosts.forEach(g=>g.mode=ghostMode);
            setState(STATES.PLAYING);
          } else if(gameState===STATES.GAME_OVER){
            document.getElementById('gameOverOverlay').style.display='none';
            document.getElementById('pauseOverlay').style.display='none';
            score=0; level=1; lives=3;
            pelletsEatenThisLevel=0;
            updateHUDScore();
            updateHUDLives();
            updateHUDLevel();
            resetBoard();
            ghosts.forEach(g=>g.mode=ghostMode);
            setState(STATES.PLAYING);
          } else if(gameState===STATES.PAUSED){
            // ignore Enter while paused except maybe unpause
          }
        } else if(k==='p' || k==='P'){
          if(gameState===STATES.PLAYING || gameState===STATES.PAUSED){
            togglePause();
          }
        } else if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','d','D','w','W','s','S'].includes(k)){
          setQueuedFromKey(k);
        }
      });

      // ===== Pause overlay state resume draw =====

      // ===== Main loop =====
      function loop(now){
        const dt = Math.min(0.033, (now - lastT)/1000);
        lastT = now;

        update(dt);
        draw();

        requestAnimationFrame(loop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)
  try { window.__qa = {
    stateNum:  typeof state !== 'undefined' ? state : (typeof gameState !== 'undefined' ? gameState : null),

    pacY:      typeof pac   !== 'undefined' ? (pac.y  != null ? pac.y  : null) : null,
    pacDx:     typeof pac   !== 'undefined' ? (pac.dx != null ? pac.dx : null) : null,
    pacDy:     typeof pac   !== 'undefined' ? (pac.dy != null ? pac.dy : null) : null,
    pacNextDx: typeof pac   !== 'undefined' ? (pac.nextDx != null ? pac.nextDx : (pac.requestedDx != null ? pac.requestedDx : null)) : null,
    pacNextDy: typeof pac   !== 'undefined' ? (pac.nextDy != null ? pac.nextDy : (pac.requestedDy != null ? pac.requestedDy : null)) : null,
    score:     typeof score !== 'undefined' ? score : null,

      }

      // ===== Initialize / Start Screen =====
      highScore = Number(localStorage.getItem('pacman_highscore') || 0);
      updateHUDHigh();
      updateHUDScore();
      updateHUDLives();
      updateHUDLevel();

      // Ensure pellets count and board initial
      resetBoard();

      // Start in IDLE with overlays
      setState(STATES.IDLE);
      document.getElementById('startOverlay').style.display='flex';
      document.getElementById('gameOverOverlay').style.display='none';
      document.getElementById('pauseOverlay').style.display='none';
      // Keep ghosts stationary in idle frame by setting their dir=0
      ghosts.forEach(g=>{g.dir={dx:0,dy:0};});

      requestAnimationFrame((t)=>{ lastT=t; loop(t); });

      // ===== Corner assist / queued turning polish =====
      // Ensure queued turns even if pac is close.
      setInterval(()=>{ if(gameState===STATES.PLAYING){ /* no-op */ } }, 250);

      // ===== Comment "builder tasks results.json schema" not applicable; but we fulfill spec comment header. =====
    })();
  </script>
