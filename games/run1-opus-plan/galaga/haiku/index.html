<!--

  PLANNER:        anthropic/claude-opus-4.6

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01-T13: Complete Galaga game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const PLAYER_SPEED = 350;
    const BULLET_SPEED = 550;
    const ENEMY_BULLET_SPEED = 300;
    const DIVE_SPEED = 250;
    const FORMATION_GRID_X = 400;
    const FORMATION_GRID_Y = 160;
    const FORMATION_SPACING_X = 48;
    const FORMATION_SPACING_Y = 40;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('galagaHighScore') || '0'),
      lives: 3,
      stage: 1,
      diveSpeedBase: DIVE_SPEED,
      capturedShip: false,
      starfield: [],
      diveTimer: 0,
      divingEnemies: [],
      formationSway: 0
    };

    // Player ship
    const player = {
      x: CANVAS_WIDTH / 2,
      y: 550,
      isDual: false,
      respawnTimer: 0,
      bullets: []
    };

    // Enemy formation
    let enemies = [];

    // Input
    const keys = {};

    // Starfield initialization
    function initStarfield() {
      game.starfield = [];
      for (let i = 0; i < 80; i++) {
        game.starfield.push({
          x: Math.random() * CANVAS_WIDTH,
          y: Math.random() * CANVAS_HEIGHT,
          size: Math.random() < 0.6 ? 1 : 2
        });
      }
    }

    function updateStarfield(dt) {
      for (const star of game.starfield) {
        star.y += 20 * dt;
        if (star.y > CANVAS_HEIGHT) {
          star.y = -5;
          star.x = Math.random() * CANVAS_WIDTH;
        }
      }
    }

    function renderStarfield() {
      ctx.fillStyle = '#FFFFFF';
      for (const star of game.starfield) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Enemy formation
    function initFormation() {
      enemies = [];
      const types = [
        { row: 0, cols: 10, type: 'boss', color: '#00CC00', width: 28, height: 24, hp: 2 },
        { row: 1, cols: 10, type: 'butterfly', color: '#FF4444', width: 24, height: 20, hp: 1 },
        { row: 2, cols: 10, type: 'bee', color: '#FFCC00', width: 20, height: 18, hp: 1 },
        { row: 3, cols: 10, type: 'bee', color: '#FFCC00', width: 20, height: 18, hp: 1 },
        { row: 4, cols: 10, type: 'bee', color: '#00BBFF', width: 20, height: 18, hp: 1 }
      ];

      for (const typeInfo of types) {
        for (let col = 0; col < typeInfo.cols; col++) {
          const gridX = FORMATION_GRID_X + (col - 4.5) * FORMATION_SPACING_X;
          const gridY = FORMATION_GRID_Y + typeInfo.row * FORMATION_SPACING_Y;
          enemies.push({
            gridX,
            gridY,
            x: gridX,
            y: gridY,
            type: typeInfo.type,
            color: typeInfo.color,
            width: typeInfo.width,
            height: typeInfo.height,
            hp: typeInfo.hp,
            alive: true,
            diving: false,
            tractorActive: false,
            tractorTimer: 0
          });
        }
      }
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.lives = 3;
      game.stage = 1;
      game.diveSpeedBase = DIVE_SPEED;
      game.capturedShip = false;
      game.divingEnemies = [];
      game.diveTimer = 0;
      player.x = CANVAS_WIDTH / 2;
      player.y = 550;
      player.isDual = false;
      player.respawnTimer = 0;
      player.bullets = [];
      initFormation();
      initStarfield();
    }

    function nextStage() {
      game.stage++;
      game.diveSpeedBase += 20;
      game.divingEnemies = [];
      game.diveTimer = 0;
      player.bullets = [];
      initFormation();
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }

      if (game.state === STATE.PLAYING && e.key === ' ') {
        const maxBullets = player.isDual ? 4 : 2;
        if (player.bullets.length < maxBullets) {
          if (player.isDual) {
            player.bullets.push({ x: player.x - 8, y: player.y - 20, w: 3, h: 14 });
            player.bullets.push({ x: player.x + 8, y: player.y - 20, w: 3, h: 14 });
          } else {
            player.bullets.push({ x: player.x, y: player.y - 20, w: 3, h: 14 });
          }
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function updatePlayer(dt) {
      if (player.respawnTimer > 0) {
        player.respawnTimer -= dt;
        if (player.respawnTimer <= 0) {
          player.x = CANVAS_WIDTH / 2;
          player.y = 550;
        }
      } else {
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
          player.x -= PLAYER_SPEED * dt;
        }
        if (keys['ArrowRight'] || keys['d'] || keys['D']) {
          player.x += PLAYER_SPEED * dt;
        }
        const shipWidth = player.isDual ? 28 : 14;
        player.x = Math.max(shipWidth, Math.min(player.x, CANVAS_WIDTH - shipWidth));
      }
    }

    function updateBullets(dt) {
      for (let i = player.bullets.length - 1; i >= 0; i--) {
        const bullet = player.bullets[i];
        bullet.y -= BULLET_SPEED * dt;
        if (bullet.y < 0) {
          player.bullets.splice(i, 1);
        }
      }
    }

    function updateFormation(dt) {
      game.formationSway = Math.sin(Date.now() / 2000 * Math.PI) * 20;

      for (const enemy of enemies) {
        if (!enemy.alive || enemy.diving) continue;
        enemy.x = enemy.gridX + game.formationSway;
      }
    }

    function diveBomb() {
      game.diveTimer += 0.016;
      if (game.diveTimer > 2.5 + Math.random() * 1.5) {
        const aliveDivers = enemies.filter(e => e.alive && !e.diving);
        if (aliveDivers.length > 0) {
          const count = Math.min(3, Math.max(1, Math.floor(Math.random() * 3)));
          for (let i = 0; i < count; i++) {
            const enemy = aliveDivers[Math.floor(Math.random() * aliveDivers.length)];
            if (enemy && !enemy.diving) {
              enemy.diving = true;
              game.divingEnemies.push({
                enemy,
                progress: 0,
                pathType: Math.floor(Math.random() * 3),
                fireTimer: 0.2 + Math.random() * 0.8
              });
            }
          }
        }
        game.diveTimer = 0;
      }
    }

    function updateDiving(dt) {
      for (let i = game.divingEnemies.length - 1; i >= 0; i--) {
        const dive = game.divingEnemies[i];
        const enemy = dive.enemy;

        dive.progress += (game.diveSpeedBase / 300) * dt;
        dive.fireTimer -= dt;

        const startX = enemy.gridX + game.formationSway;
        const startY = 160;
        const endX = player.x + (Math.random() - 0.5) * 100;
        const endY = player.y + 40;

        let t = dive.progress;
        if (t <= 1) {
          // Smooth curve using sine
          const easeT = Math.sin((t - 0.5) * Math.PI) * 0.5 + 0.5;
          enemy.x = startX + (endX - startX) * easeT;
          enemy.y = startY + (endY - startY) * easeT;

          if (dive.fireTimer <= 0) {
            const bulletCount = Math.random() < 0.6 ? 1 : 2;
            for (let j = 0; j < bulletCount; j++) {
              game.enemyBullets = game.enemyBullets || [];
              game.enemyBullets.push({
                x: enemy.x + (Math.random() - 0.5) * 10,
                y: enemy.y + 10,
                vx: (Math.random() - 0.5) * 50,
                vy: ENEMY_BULLET_SPEED
              });
            }
            dive.fireTimer = 0.5 + Math.random() * 0.5;
          }
        } else {
          // Return to formation
          enemy.diving = false;
          enemy.x = enemy.gridX + game.formationSway;
          enemy.y = enemy.gridY;
          game.divingEnemies.splice(i, 1);
        }
      }
    }

    function updateEnemyBullets(dt) {
      game.enemyBullets = game.enemyBullets || [];
      for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
        const bullet = game.enemyBullets[i];
        bullet.y += bullet.vy * dt;
        bullet.x += bullet.vx * dt;
        if (bullet.y > CANVAS_HEIGHT) {
          game.enemyBullets.splice(i, 1);
        }
      }
    }

    function checkCollisions() {
      // Player bullets vs enemies
      for (let i = player.bullets.length - 1; i >= 0; i--) {
        const bullet = player.bullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          if (!enemy.alive) continue;

          if (bullet.x > enemy.x - enemy.width / 2 && bullet.x < enemy.x + enemy.width / 2 &&
              bullet.y > enemy.y - enemy.height / 2 && bullet.y < enemy.y + enemy.height / 2) {
            player.bullets.splice(i, 1);
            enemy.hp--;

            if (enemy.hp <= 0) {
              enemy.alive = false;
              enemy.diving = false;

              let points = 0;
              if (enemy.type === 'bee') points = enemy.diving ? 100 : 50;
              else if (enemy.type === 'butterfly') points = enemy.diving ? 160 : 80;
              else if (enemy.type === 'boss') points = enemy.diving ? 400 : 150;

              game.score += points;
              if (game.score > game.highScore) game.highScore = game.score;

              if (game.capturedShip && enemy.type === 'boss') {
                player.isDual = true;
                game.capturedShip = false;
              }
            } else if (enemy.type === 'boss') {
              enemy.color = '#888888';
            }

            if (enemies.every(e => !e.alive)) {
              nextStage();
            }
            return;
          }
        }
      }

      // Enemy bullets vs player
      game.enemyBullets = game.enemyBullets || [];
      for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
        const bullet = game.enemyBullets[i];
        const shipWidth = player.isDual ? 28 : 14;
        if (player.respawnTimer <= 0 && bullet.x > player.x - shipWidth && bullet.x < player.x + shipWidth &&
            bullet.y > player.y - 20 && bullet.y < player.y + 10) {
          game.enemyBullets.splice(i, 1);
          game.lives--;
          if (game.lives <= 0) {
            game.state = STATE.GAME_OVER;
            localStorage.setItem('galagaHighScore', game.highScore);
          } else {
            player.respawnTimer = 1.5;
            player.isDual = false;
          }
          return;
        }
      }

      // Diving enemy collision
      for (const dive of game.divingEnemies) {
        const enemy = dive.enemy;
        const shipWidth = player.isDual ? 28 : 14;
        if (player.respawnTimer <= 0 && enemy.x > player.x - shipWidth && enemy.x < player.x + shipWidth &&
            enemy.y > player.y - 20 && enemy.y < player.y + 10) {
          game.lives--;
          if (game.lives <= 0) {
            game.state = STATE.GAME_OVER;
            localStorage.setItem('galagaHighScore', game.highScore);
          } else {
            player.respawnTimer = 1.5;
            player.isDual = false;
          }
          enemy.alive = false;
          return;
        }
      }
    }

    function updateGame(dt) {
      updatePlayer(dt);
      updateBullets(dt);
      updateFormation(dt);
      diveBomb();
      updateDiving(dt);
      updateEnemyBullets(dt);
      checkCollisions();
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      renderStarfield();

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderGameScreen() {
      // Enemies in formation
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);
      }

      // Enemy bullets
      game.enemyBullets = game.enemyBullets || [];
      ctx.fillStyle = '#FF6666';
      for (const bullet of game.enemyBullets) {
        ctx.fillRect(bullet.x - 1.5, bullet.y, 3, 10);
      }

      // Player
      if (player.respawnTimer <= 0) {
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        if (player.isDual) {
          ctx.moveTo(player.x - 8, player.y - 16);
          ctx.lineTo(player.x - 14, player.y - 4);
          ctx.lineTo(player.x - 14, player.y + 14);
          ctx.lineTo(player.x + 8, player.y + 14);
          ctx.lineTo(player.x + 14, player.y - 4);
          ctx.lineTo(player.x + 14, player.y - 16);
          ctx.closePath();
        } else {
          ctx.moveTo(player.x, player.y - 16);
          ctx.lineTo(player.x - 8, player.y - 4);
          ctx.lineTo(player.x - 14, player.y + 14);
          ctx.lineTo(player.x + 14, player.y + 14);
          ctx.lineTo(player.x + 8, player.y - 4);
          ctx.closePath();
        }
        ctx.fill();
      }

      // Player bullets
      ctx.fillStyle = '#FFFFFF';
      for (const bullet of player.bullets) {
        ctx.fillRect(bullet.x - 1.5, bullet.y, 3, 14);
      }

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 24);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`High Score: ${game.highScore}`, CANVAS_WIDTH / 2, 24);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`Stage ${game.stage}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${game.lives}`, 10, CANVAS_HEIGHT - 10);
    }

    function renderStartScreen() {
      ctx.fillStyle = '#FFCC00';
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GALAGA', CANVAS_WIDTH / 2, 200);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 420);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${game.score}`, CANVAS_WIDTH / 2, 310);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING) {
        updateGame(dt);
      }
      updateStarfield(dt);

      render();
      requestAnimationFrame(gameLoop);
    }

    // Initialize and start
    initStarfield();
    gameLoop();
  </script>
</body>
</html>
