<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; background: #000; margin: 0 auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // Galaga game implementation in a single HTML file
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game state variables
    let lastTime = 0;
    let enemyTimer = 0;
    let enemyInterval = 2000;
    let score = 0;
    let gameOver = false;

    // Player spaceship
    const player = {
      x: canvas.width / 2,
      y: canvas.height - 50,
      width: 40,
      height: 30,
      speed: 5,
      dx: 0
    };

    // Bullets
    const bullets = [];
    // Enemies array
    const enemies = [];

    // Handle key events
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if(e.key === ' '){
        shootBullet();
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function shootBullet(){
      // Create a bullet from player's current position
      bullets.push({
        x: player.x + player.width/2 - 2,
        y: player.y,
        width: 4,
        height: 10,
        speed: 7
      });
    }

    function spawnEnemy(){
      // Spawn an enemy at a random x position at the top of the screen
      const enemyWidth = 30;
      const enemyHeight = 30;
      const x = Math.random() * (canvas.width - enemyWidth);
      enemies.push({
        x: x,
        y: -enemyHeight,
        width: enemyWidth,
        height: enemyHeight,
        speed: 2
      });
    }

    function update(deltaTime){
      // Update player movement
      if(keys['ArrowLeft'] && player.x > 0) {
        player.dx = -player.speed;
      } else if(keys['ArrowRight'] && player.x + player.width < canvas.width) {
        player.dx = player.speed;
      } else {
        player.dx = 0;
      }
      player.x += player.dx;

      // Update bullets
      for(let i = 0; i < bullets.length; i++){
        bullets[i].y -= bullets[i].speed;
      }
      // Remove bullets that leave screen
      while(bullets.length && bullets[0].y < 0){
        bullets.shift();
      }

      // Update enemies
      enemyTimer += deltaTime;
      if(enemyTimer > enemyInterval){
        spawnEnemy();
        enemyTimer = 0;
      }
      enemies.forEach((enemy, index) => {
        enemy.y += enemy.speed;
        // Remove enemy if it goes off screen
        if(enemy.y > canvas.height){
          enemies.splice(index, 1);
        }
      });

      // Check for collisions between bullets and enemies
      for(let i = enemies.length - 1; i >= 0; i--){
        for(let j = bullets.length - 1; j >= 0; j--){
          if(rectIntersect(enemies[i], bullets[j])){
            enemies.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            break;
          }
        }
      }

      // Check for collisions between player and enemies
      enemies.forEach((enemy) => {
        if(rectIntersect(player, enemy)){
          gameOver = true;
        }
      });
    }

    function rectIntersect(r1, r2){
      return !(r2.x > r1.x + r1.width ||
               r2.x + r2.width < r1.x ||
               r2.y > r1.y + r1.height ||
               r2.y + r2.height < r1.y);
    }

    function draw(){
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw player
      ctx.fillStyle = '#0F0';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw bullets
      ctx.fillStyle = '#FF0';
      bullets.forEach(bullet => {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      });

      // Draw enemies
      ctx.fillStyle = '#F00';
      enemies.forEach(enemy => {
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
      });

      // Draw Score
      ctx.fillStyle = '#FFF';
      ctx.font = '20px Arial';
      ctx.fillText('Score: ' + score, 10, 25);

      if(gameOver){
        ctx.fillStyle = '#FFF';
        ctx.font = '40px Arial';
        ctx.fillText('GAME OVER', canvas.width/2 - 120, canvas.height/2);
      }
    }

    function gameLoop(timestamp){
      if(!lastTime) lastTime = timestamp;
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;
      if(!gameOver){
        update(deltaTime);
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
