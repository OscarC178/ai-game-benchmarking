<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; background: #000000; }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
(function() {
  'use strict';

  // === T01: Canvas & context ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 600;

  // === T03: Game state machine ===
  const STATE = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
  let gameState = STATE.IDLE;
  let gameOverMessage = '';

  // === T04/T05: Paddles ===
  const PADDLE_W = 12, PADDLE_H = 80;
  const PLAYER_SPEED = 400;
  const CPU_SPEED = 300;
  const CPU_EASE = 0.08;

  const player = { x: 30, y: 260, w: PADDLE_W, h: PADDLE_H };
  const cpu    = { x: 758, y: 260, w: PADDLE_W, h: PADDLE_H };

  // === T06: Ball ===
  const BALL_SIZE = 12;
  const BALL_INIT_SPEED = 350;
  const BALL_SPEED_INC = 25;
  const BALL_MAX_SPEED = 600;

  const ball = { x: 394, y: 294, w: BALL_SIZE, h: BALL_SIZE, vx: 0, vy: 0, speed: BALL_INIT_SPEED };

  // === T08: Scoring ===
  let playerScore = 0;
  let cpuScore = 0;
  let scoreDelay = 0; // seconds remaining before ball relaunch
  const WIN_SCORE = 7;

  // === T09: High score ===
  let highScore = parseInt(localStorage.getItem('pong_high_score') || '0', 10);

  // === Input tracking ===
  const keys = {};
  document.addEventListener('keydown', function(e) {
    keys[e.key] = true;

    if (e.key === 'Enter') {
      if (gameState === STATE.IDLE) {
        startGame();
      } else if (gameState === STATE.GAME_OVER) {
        gameState = STATE.IDLE;
      }
    }
    if (e.key === 'p' || e.key === 'P') {
      if (gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED;
      } else if (gameState === STATE.PAUSED) {
        gameState = STATE.PLAYING;
      }
    }
    // Prevent scrolling
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', function(e) {
    keys[e.key] = false;
  });

  // === Audio (Web Audio API) ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playTone(freq, duration, type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      gain.gain.value = 0.08;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + duration);
    } catch(_) {}
  }

  function playPaddleHit()  { playTone(440, 0.05, 'square'); }
  function playWallBounce() { playTone(220, 0.05, 'square'); }
  function playScoreSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(660, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(330, ac.currentTime + 0.2);
      gain.gain.value = 0.08;
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.2);
    } catch(_) {}
  }

  // === Game logic helpers ===
  function startGame() {
    playerScore = 0;
    cpuScore = 0;
    player.y = 260;
    cpu.y = 260;
    gameState = STATE.PLAYING;
    launchBall(Math.random() < 0.5 ? 1 : -1);
  }

  function launchBall(directionX) {
    ball.x = 394;
    ball.y = 294;
    ball.speed = BALL_INIT_SPEED;
    // Random angle ±30° from horizontal
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    ball.vx = Math.cos(angle) * ball.speed * directionX;
    ball.vy = Math.sin(angle) * ball.speed;
    scoreDelay = 0;
  }

  function resetBallWithDelay(directionX) {
    ball.x = 394;
    ball.y = 294;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = BALL_INIT_SPEED;
    scoreDelay = 1.0;
    ball._launchDir = directionX;
  }

  // === AABB collision ===
  function aabbCollision(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  // === T02: Game loop ===
  let lastTime = 0;

  function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap delta
    lastTime = timestamp;

    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  function update(dt) {
    if (gameState !== STATE.PLAYING) return;

    // === Score delay ===
    if (scoreDelay > 0) {
      scoreDelay -= dt;
      if (scoreDelay <= 0) {
        launchBall(ball._launchDir || 1);
      }
      return;
    }

    // === T04: Player paddle movement ===
    if (keys['ArrowUp'] || keys['w'] || keys['W']) {
      player.y -= PLAYER_SPEED * dt;
    }
    if (keys['ArrowDown'] || keys['s'] || keys['S']) {
      player.y += PLAYER_SPEED * dt;
    }
    player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

    // === T05: CPU paddle AI ===
    const cpuCenterY = cpu.y + PADDLE_H / 2;
    const ballCenterY = ball.y + BALL_SIZE / 2;
    const diff = ballCenterY - cpuCenterY;
    const maxMove = CPU_SPEED * dt;
    const move = diff * CPU_EASE;
    const clampedMove = Math.max(-maxMove, Math.min(maxMove, move));
    // Only track when ball is heading toward CPU
    if (ball.vx > 0) {
      cpu.y += clampedMove;
    } else {
      // Drift toward center when ball heading away
      const centerDiff = (H / 2 - PADDLE_H / 2) - cpu.y;
      const centerMove = centerDiff * 0.02;
      cpu.y += Math.max(-maxMove * 0.5, Math.min(maxMove * 0.5, centerMove));
    }
    cpu.y = Math.max(0, Math.min(H - PADDLE_H, cpu.y));

    // === T06: Ball movement ===
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Top/bottom wall bounce
    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy = Math.abs(ball.vy);
      playWallBounce();
    }
    if (ball.y + BALL_SIZE >= H) {
      ball.y = H - BALL_SIZE;
      ball.vy = -Math.abs(ball.vy);
      playWallBounce();
    }

    // === T07: Paddle collision ===
    // Player paddle
    if (aabbCollision(ball, player) && ball.vx < 0) {
      ball.x = player.x + player.w;
      const paddleCenterY = player.y + PADDLE_H / 2;
      const ballCenter = ball.y + BALL_SIZE / 2;
      const offset = (ballCenter - paddleCenterY) / (PADDLE_H / 2);
      const angle = offset * 60 * Math.PI / 180;
      ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_MAX_SPEED);
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      playPaddleHit();
    }

    // CPU paddle
    if (aabbCollision(ball, cpu) && ball.vx > 0) {
      ball.x = cpu.x - BALL_SIZE;
      const paddleCenterY = cpu.y + PADDLE_H / 2;
      const ballCenter = ball.y + BALL_SIZE / 2;
      const offset = (ballCenter - paddleCenterY) / (PADDLE_H / 2);
      const angle = offset * 60 * Math.PI / 180;
      ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_MAX_SPEED);
      ball.vx = -Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      playPaddleHit();
    }

    // === T08: Scoring — ball past edges ===
    if (ball.x + BALL_SIZE < 0) {
      // CPU scores
      cpuScore++;
      playScoreSound();
      if (cpuScore >= WIN_SCORE) {
        endGame('GAME OVER');
      } else {
        resetBallWithDelay(-1); // launch toward player (scored upon)
      }
    }
    if (ball.x > W) {
      // Player scores
      playerScore++;
      playScoreSound();
      if (playerScore >= WIN_SCORE) {
        endGame('YOU WIN');
      } else {
        resetBallWithDelay(1); // launch toward CPU (scored upon)
      }
    }
  }

  function endGame(message) {
    gameOverMessage = message;
    gameState = STATE.GAME_OVER;
    // Update high score (track player wins count)
    if (message === 'YOU WIN') {
      highScore++;
      localStorage.setItem('pong_high_score', highScore.toString());
    }
  }

  // === Rendering ===
  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    if (gameState === STATE.IDLE) {
      renderStartScreen();
      return;
    }

    // === T09: Center line ===
    ctx.strokeStyle = '#444444';
    ctx.lineWidth = 4;
    ctx.setLineDash([15, 10]);
    ctx.beginPath();
    ctx.moveTo(400, 0);
    ctx.lineTo(400, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // === High score ===
    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORE: ' + highScore + ' wins', W / 2, 16);

    // === T08: Scores ===
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(playerScore.toString(), 300, 50);
    ctx.fillText(cpuScore.toString(), 500, 50);

    // === T04: Player paddle ===
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(player.x, player.y, PADDLE_W, PADDLE_H);

    // === T05: CPU paddle ===
    ctx.fillRect(cpu.x, cpu.y, PADDLE_W, PADDLE_H);

    // === T06: Ball ===
    if (scoreDelay <= 0 || Math.floor(scoreDelay * 4) % 2 === 0) {
      ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
    }

    // === T02/T03: Pause overlay ===
    if (gameState === STATE.PAUSED) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2);
    }

    // === T10: Game over screen ===
    if (gameState === STATE.GAME_OVER) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(gameOverMessage, W / 2, H / 2 - 40);
      ctx.font = '24px monospace';
      ctx.fillText(playerScore + ' — ' + cpuScore, W / 2, H / 2 + 10);
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 60);
    }
  }

  // === T11: Start screen ===
  function renderStartScreen() {
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '64px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PONG', W / 2, 200);

    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px monospace';
    ctx.fillText('Press Enter to Start', W / 2, 350);
  }

  // === Start the loop ===
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
