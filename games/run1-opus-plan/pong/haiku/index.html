<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #444;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01: HTML5 scaffold ✓
    // T02: Game loop ✓
    // T03-T12: Game logic ✓

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 80;
    const BALL_SIZE = 12;
    const PLAYER_PADDLE_X = 30;
    const CPU_PADDLE_X = 758;
    const PADDLE_Y_START = (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2;
    const BALL_X_START = CANVAS_WIDTH / 2 - BALL_SIZE / 2;
    const BALL_Y_START = CANVAS_HEIGHT / 2 - BALL_SIZE / 2;
    const PLAYER_SPEED = 400;
    const CPU_SPEED = 300;
    const CPU_EASING = 0.08;
    const BALL_BASE_SPEED = 350;
    const BALL_MAX_SPEED = 600;
    const BALL_SPEED_INCREMENT = 25;
    const LAUNCH_ANGLE = 30 * Math.PI / 180;
    const ANGLE_RANGE = 60;
    const WIN_SCORE = 7;
    const RESET_DELAY = 1000;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: { player: 0, cpu: 0 },
      highScore: parseInt(localStorage.getItem('pongHighScore') || '0'),
      resetTimer: 0,
      paused: false
    };

    // Player paddle
    const playerPaddle = {
      x: PLAYER_PADDLE_X,
      y: PADDLE_Y_START,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0
    };

    // CPU paddle
    const cpuPaddle = {
      x: CPU_PADDLE_X,
      y: PADDLE_Y_START,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0
    };

    // Ball
    const ball = {
      x: BALL_X_START,
      y: BALL_Y_START,
      size: BALL_SIZE,
      vx: 0,
      vy: 0,
      speed: BALL_BASE_SPEED
    };

    // Keyboard state
    const keys = {};

    // Input handlers
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      
      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }
      
      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // Game functions
    function startGame() {
      game.state = STATE.PLAYING;
      game.score = { player: 0, cpu: 0 };
      ball.speed = BALL_BASE_SPEED;
      launchBall();
    }

    function launchBall(fromWho = null) {
      ball.x = BALL_X_START;
      ball.y = BALL_Y_START;
      ball.speed = BALL_BASE_SPEED;

      let angle;
      if (fromWho === 'player') {
        angle = (Math.random() - 0.5) * 2 * LAUNCH_ANGLE;
      } else if (fromWho === 'cpu') {
        angle = Math.PI + (Math.random() - 0.5) * 2 * LAUNCH_ANGLE;
      } else {
        angle = (Math.random() > 0.5 ? 1 : -1) * ((Math.random() - 0.5) * 2 * LAUNCH_ANGLE);
        if (Math.random() > 0.5) {
          angle += Math.PI;
        }
      }

      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
    }

    function resetBallAfterScore(scoredBy) {
      game.resetTimer = RESET_DELAY;
      game.state = STATE.PAUSED;
      setTimeout(() => {
        if (game.score.player < WIN_SCORE && game.score.cpu < WIN_SCORE) {
          launchBall(scoredBy === 'cpu' ? 'cpu' : 'player');
          game.state = STATE.PLAYING;
        }
      }, RESET_DELAY);
    }

    function updatePlayerPaddle(dt) {
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        playerPaddle.dy = -PLAYER_SPEED;
      } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        playerPaddle.dy = PLAYER_SPEED;
      } else {
        playerPaddle.dy = 0;
      }

      playerPaddle.y += playerPaddle.dy * dt;
      playerPaddle.y = Math.max(0, Math.min(playerPaddle.y, CANVAS_HEIGHT - playerPaddle.height));
    }

    function updateCPUPaddle(dt) {
      const ballCenterY = ball.y + ball.size / 2;
      const paddleCenterY = cpuPaddle.y + cpuPaddle.height / 2;
      const distance = ballCenterY - paddleCenterY;
      const maxMove = CPU_SPEED * dt;

      cpuPaddle.dy = distance > 0 ? CPU_SPEED : (distance < 0 ? -CPU_SPEED : 0);
      cpuPaddle.dy *= CPU_EASING;

      cpuPaddle.y += cpuPaddle.dy * dt;
      cpuPaddle.y = Math.max(0, Math.min(cpuPaddle.y, CANVAS_HEIGHT - cpuPaddle.height));
    }

    function updateBall(dt) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Top/bottom wall collision
      if (ball.y < 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
      }
      if (ball.y + ball.size > CANVAS_HEIGHT) {
        ball.y = CANVAS_HEIGHT - ball.size;
        ball.vy = -ball.vy;
      }

      // Paddle collision (AABB)
      if (aabbCollision(ball, playerPaddle)) {
        const paddleCenter = playerPaddle.y + playerPaddle.height / 2;
        const ballCenter = ball.y + ball.size / 2;
        const offset = (ballCenter - paddleCenter) / (playerPaddle.height / 2);
        const angle = offset * (ANGLE_RANGE * Math.PI / 180);

        ball.x = playerPaddle.x + playerPaddle.width;
        ball.vx = Math.abs(ball.vx);
        ball.speed = Math.min(ball.speed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      }

      if (aabbCollision(ball, cpuPaddle)) {
        const paddleCenter = cpuPaddle.y + cpuPaddle.height / 2;
        const ballCenter = ball.y + ball.size / 2;
        const offset = (ballCenter - paddleCenter) / (cpuPaddle.height / 2);
        const angle = Math.PI - offset * (ANGLE_RANGE * Math.PI / 180);

        ball.x = cpuPaddle.x - ball.size;
        ball.vx = -Math.abs(ball.vx);
        ball.speed = Math.min(ball.speed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      }

      // Scoring
      if (ball.x < 0) {
        game.score.cpu++;
        if (game.score.cpu >= WIN_SCORE) {
          game.state = STATE.GAME_OVER;
        } else {
          resetBallAfterScore('cpu');
        }
      }

      if (ball.x + ball.size > CANVAS_WIDTH) {
        game.score.player++;
        if (game.score.player >= WIN_SCORE) {
          game.highScore = Math.max(game.highScore, game.score.player);
          localStorage.setItem('pongHighScore', game.highScore);
          game.state = STATE.GAME_OVER;
        } else {
          resetBallAfterScore('player');
        }
      }
    }

    function aabbCollision(rect1, rect2) {
      return (
        rect1.x < rect2.x + rect2.width &&
        rect1.x + rect1.size > rect2.x &&
        rect1.y < rect2.y + rect2.height &&
        rect1.y + rect1.size > rect2.y
      );
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGame();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGame();
        renderGameOverScreen();
      }
    }

    function renderStartScreen() {
      // Title
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 64px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PONG', CANVAS_WIDTH / 2, 200);

      // Start prompt
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 350);

      // High score
      if (game.highScore > 0) {
        ctx.fillStyle = '#888888';
        ctx.font = '12px monospace';
        ctx.fillText(`High Score: ${game.highScore}`, CANVAS_WIDTH / 2, 16);
      }
    }

    function renderGame() {
      // Center line
      ctx.strokeStyle = '#444444';
      ctx.lineWidth = 4;
      ctx.setLineDash([15, 10]);
      ctx.beginPath();
      ctx.moveTo(CANVAS_WIDTH / 2, 0);
      ctx.lineTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
      ctx.fillRect(cpuPaddle.x, cpuPaddle.y, cpuPaddle.width, cpuPaddle.height);

      // Ball
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

      // Scores
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(game.score.player, 300, 50);
      ctx.fillText(game.score.cpu, 500, 50);

      // High score
      if (game.highScore > 0) {
        ctx.fillStyle = '#888888';
        ctx.font = '12px monospace';
        ctx.fillText(`High Score: ${game.highScore}`, CANVAS_WIDTH / 2, 16);
      }
    }

    function renderPauseOverlay() {
      // Semi-transparent background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Pause text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    function renderGameOverScreen() {
      // Semi-transparent background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Result
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      const result = game.score.player >= WIN_SCORE ? 'YOU WIN' : 'GAME OVER';
      ctx.fillText(result, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 80);

      // Final score
      ctx.font = '24px monospace';
      ctx.fillText(`${game.score.player} - ${game.score.cpu}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);

      // Restart prompt
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
    }

    // Game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING) {
        updatePlayerPaddle(dt);
        updateCPUPaddle(dt);
        updateBall(dt);
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    gameLoop();
  </script>
</body>
</html>
