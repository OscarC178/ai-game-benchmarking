<!-- Pong | spec:run1-opus-plan | built-by:anthropic/claude-sonnet-4-6 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    // ============================================================
    // T01: HTML5 scaffold - complete
    // T02: Game loop with delta-time - complete
    // T03: State machine - complete
    // T04: Player paddle - complete
    // T05: CPU paddle - complete
    // T06: Ball & physics - complete
    // T07: Paddle collision - complete
    // T08: Scoring - complete
    // T09: Center line & HUD - complete
    // T10: Win/Lose condition - complete
    // T11: Start screen - complete
    // T12: Polish & debug - complete
    // ============================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ============================================================
    // T03: State machine
    // ============================================================
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };
    let gameState = STATE.IDLE;

    // ============================================================
    // T04: Player paddle
    // ============================================================
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 80;
    const PADDLE_SPEED = 400; // px/s

    const player = {
      x: 30,
      y: 260,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0
    };

    // ============================================================
    // T05: CPU paddle
    // ============================================================
    const cpu = {
      x: 758,
      y: 260,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      speed: 300, // px/s max
      easing: 0.08
    };

    // ============================================================
    // T06: Ball
    // ============================================================
    const BALL_SIZE = 12;
    const BALL_INITIAL_SPEED = 350;
    const BALL_SPEED_CAP = 600;
    const BALL_SPEED_INC = 25;

    const ball = {
      x: 394,
      y: 294,
      width: BALL_SIZE,
      height: BALL_SIZE,
      vx: 0,
      vy: 0,
      speed: BALL_INITIAL_SPEED,
      active: false
    };

    // ============================================================
    // Scoring
    // ============================================================
    let playerScore = 0;
    let cpuScore = 0;
    const WIN_SCORE = 7;
    let highScore = parseInt(localStorage.getItem('pong_highscore') || '0', 10);
    let winMessage = '';
    let scoreResetTimer = 0;
    let awaitingLaunch = false;
    let launchTowardRight = true; // which side to launch toward

    // ============================================================
    // Input tracking
    // ============================================================
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;

      // State transitions
      if (e.code === 'Enter' || e.key === 'Enter') {
        if (gameState === STATE.IDLE) {
          startGame();
        } else if (gameState === STATE.GAME_OVER) {
          gameState = STATE.IDLE;
        }
      }
      if ((e.code === 'KeyP' || e.key === 'p' || e.key === 'P') && gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED;
      } else if ((e.code === 'KeyP' || e.key === 'p' || e.key === 'P') && gameState === STATE.PAUSED) {
        gameState = STATE.PLAYING;
      }

      // Prevent page scroll for arrow keys
      if (['ArrowUp', 'ArrowDown'].includes(e.key)) {
        e.preventDefault();
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });

    // ============================================================
    // Audio (T09 bonus)
    // ============================================================
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playBeep(freq, duration, type = 'square') {
      try {
        const ctx2 = getAudioCtx();
        const oscillator = ctx2.createOscillator();
        const gainNode = ctx2.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx2.destination);
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(freq, ctx2.currentTime);
        gainNode.gain.setValueAtTime(0.15, ctx2.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + duration);
        oscillator.start(ctx2.currentTime);
        oscillator.stop(ctx2.currentTime + duration);
      } catch (e) {
        // Audio not available, ignore
      }
    }

    function playPaddleHit() {
      playBeep(440, 0.05);
    }

    function playWallBounce() {
      playBeep(220, 0.05);
    }

    function playScore() {
      try {
        const ctx2 = getAudioCtx();
        const oscillator = ctx2.createOscillator();
        const gainNode = ctx2.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(ctx2.destination);
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(660, ctx2.currentTime);
        oscillator.frequency.linearRampToValueAtTime(330, ctx2.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.15, ctx2.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.2);
        oscillator.start(ctx2.currentTime);
        oscillator.stop(ctx2.currentTime + 0.2);
      } catch (e) {
        // Audio not available
      }
    }

    // ============================================================
    // Game init helpers
    // ============================================================
    function resetPositions() {
      player.x = 30;
      player.y = 260;
      cpu.x = 758;
      cpu.y = 260;
      ball.x = 394;
      ball.y = 294;
      ball.vx = 0;
      ball.vy = 0;
      ball.active = false;
      ball.speed = BALL_INITIAL_SPEED;
    }

    function launchBall(towardRight) {
      // Random angle ±30° from horizontal
      const maxAngle = 30 * (Math.PI / 180);
      const angle = (Math.random() * 2 - 1) * maxAngle;
      const dirX = towardRight ? 1 : -1;
      ball.vx = dirX * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
      ball.active = true;
    }

    function startGame() {
      playerScore = 0;
      cpuScore = 0;
      winMessage = '';
      resetPositions();
      gameState = STATE.PLAYING;
      awaitingLaunch = true;
      scoreResetTimer = 1.0; // 1-second delay before first launch
      launchTowardRight = Math.random() < 0.5;
    }

    function resetAfterPoint(towardScored) {
      // 'towardScored' = which side was scored upon (launch toward that side)
      resetPositions();
      awaitingLaunch = true;
      scoreResetTimer = 1.0;
      launchTowardRight = towardScored === 'right'; // launch toward player who was scored upon
    }

    // ============================================================
    // T02: Game loop
    // ============================================================
    let lastTimestamp = null;

    function update(dt) {
      if (gameState !== STATE.PLAYING) return;

      // Handle launch delay
      if (awaitingLaunch) {
        scoreResetTimer -= dt;
        if (scoreResetTimer <= 0) {
          awaitingLaunch = false;
          launchBall(launchTowardRight);
        }
        // Still update paddles while waiting
        updatePlayer(dt);
        updateCPU(dt);
        return;
      }

      // Update player paddle
      updatePlayer(dt);

      // Update CPU paddle
      updateCPU(dt);

      // Update ball
      if (ball.active) {
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall bounces (top/bottom)
        if (ball.y <= 0) {
          ball.y = 0;
          ball.vy = Math.abs(ball.vy);
          playWallBounce();
        }
        if (ball.y + ball.height >= canvas.height) {
          ball.y = canvas.height - ball.height;
          ball.vy = -Math.abs(ball.vy);
          playWallBounce();
        }

        // Paddle collisions (AABB)
        if (checkPaddleCollision(ball, player)) {
          resolvePaddleCollision(ball, player, true);
        } else if (checkPaddleCollision(ball, cpu)) {
          resolvePaddleCollision(ball, cpu, false);
        }

        // Scoring: ball passes left edge (CPU scores)
        if (ball.x + ball.width < 0) {
          cpuScore++;
          playScore();
          checkGameOver();
          if (gameState === STATE.PLAYING) {
            resetAfterPoint('left'); // launch toward left (player was scored upon = left)
          }
          return;
        }

        // Scoring: ball passes right edge (Player scores)
        if (ball.x > canvas.width) {
          playerScore++;
          playScore();
          // Update high score
          if (playerScore > highScore) {
            highScore = playerScore;
            localStorage.setItem('pong_highscore', highScore.toString());
          }
          checkGameOver();
          if (gameState === STATE.PLAYING) {
            resetAfterPoint('right'); // launch toward right (CPU was scored upon = right)
          }
          return;
        }
      }
    }

    function checkGameOver() {
      if (playerScore >= WIN_SCORE) {
        winMessage = 'YOU WIN';
        // Update high score for wins
        const wins = parseInt(localStorage.getItem('pong_wins') || '0', 10) + 1;
        localStorage.setItem('pong_wins', wins.toString());
        // Store player score as highscore (wins context)
        if (playerScore > highScore) {
          highScore = playerScore;
          localStorage.setItem('pong_highscore', highScore.toString());
        }
        gameState = STATE.GAME_OVER;
      } else if (cpuScore >= WIN_SCORE) {
        winMessage = 'GAME OVER';
        gameState = STATE.GAME_OVER;
      }
    }

    function updatePlayer(dt) {
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        player.y -= PADDLE_SPEED * dt;
      }
      if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        player.y += PADDLE_SPEED * dt;
      }
      // Clamp
      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
    }

    function updateCPU(dt) {
      // Eased tracking with speed cap
      const cpuCenter = cpu.y + cpu.height / 2;
      const ballCenter = ball.active ? ball.y + ball.height / 2 : canvas.height / 2;
      const diff = ballCenter - cpuCenter;

      // Apply easing factor
      const desiredMove = diff * cpu.easing;

      // Clamp to max speed
      const maxMove = cpu.speed * dt;
      const actualMove = Math.max(-maxMove, Math.min(maxMove, desiredMove));

      cpu.y += actualMove;
      // Clamp
      cpu.y = Math.max(0, Math.min(canvas.height - cpu.height, cpu.y));
    }

    function checkPaddleCollision(ball, paddle) {
      return (
        ball.x < paddle.x + paddle.width &&
        ball.x + ball.width > paddle.x &&
        ball.y < paddle.y + paddle.height &&
        ball.y + ball.height > paddle.y
      );
    }

    function resolvePaddleCollision(ball, paddle, isPlayerPaddle) {
      // Calculate hit offset: -1 (top edge) to +1 (bottom edge)
      const ballCenterY = ball.y + ball.height / 2;
      const paddleCenterY = paddle.y + paddle.height / 2;
      const offset = (ballCenterY - paddleCenterY) / (paddle.height / 2);

      // Angle = offset × 60°
      const maxAngle = 60 * (Math.PI / 180);
      const angle = offset * maxAngle;

      // Increase speed
      ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_SPEED_CAP);

      // Direction: if player paddle, ball goes right; if CPU paddle, ball goes left
      const dirX = isPlayerPaddle ? 1 : -1;
      ball.vx = dirX * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);

      // Push ball out of paddle to prevent sticking
      if (isPlayerPaddle) {
        ball.x = paddle.x + paddle.width;
      } else {
        ball.x = paddle.x - ball.width;
      }

      playPaddleHit();
    }

    // ============================================================
    // Rendering
    // ============================================================
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // T09: Center dashed line
      drawCenterLine();

      // Draw scores (always visible during play and game over)
      if (gameState === STATE.PLAYING || gameState === STATE.PAUSED || gameState === STATE.GAME_OVER) {
        drawScores();
      }

      // T09: High score
      drawHighScore();

      if (gameState === STATE.IDLE) {
        // T11: Start screen
        drawStartScreen();
      } else if (gameState === STATE.PLAYING || gameState === STATE.PAUSED) {
        // Draw paddles
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);

        // Draw ball
        if (ball.active || awaitingLaunch) {
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(ball.x, ball.y, ball.width, ball.height);
        }

        if (gameState === STATE.PAUSED) {
          drawPauseOverlay();
        }
      } else if (gameState === STATE.GAME_OVER) {
        // Draw paddles and ball in final positions
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillRect(cpu.x, cpu.y, cpu.width, cpu.height);

        // T10: Game over screen
        drawGameOverScreen();
      }
    }

    function drawCenterLine() {
      ctx.strokeStyle = '#444444';
      ctx.lineWidth = 4;
      ctx.setLineDash([15, 10]);
      ctx.beginPath();
      ctx.moveTo(400, 0);
      ctx.lineTo(400, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawScores() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(playerScore.toString(), 300, 50);
      ctx.fillText(cpuScore.toString(), 500, 50);
    }

    function drawHighScore() {
      ctx.fillStyle = '#888888';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('BEST: ' + highScore, 400, 16);
    }

    function drawStartScreen() {
      // T11: Start screen
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '64px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PONG', canvas.width / 2, 200);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', canvas.width / 2, 350);
    }

    function drawPauseOverlay() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
    }

    function drawGameOverScreen() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Win/Lose message
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(winMessage, canvas.width / 2, canvas.height / 2 - 60);

      // Final score
      ctx.font = '32px monospace';
      ctx.fillText(playerScore + ' - ' + cpuScore, canvas.width / 2, canvas.height / 2);

      // Restart prompt
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', canvas.width / 2, canvas.height / 2 + 60);
    }

    // ============================================================
    // T02: Main game loop
    // ============================================================
    function gameLoop(timestamp) {
      if (lastTimestamp === null) {
        lastTimestamp = timestamp;
      }
      // Delta time in seconds, capped at 100ms to prevent spiral of death
      const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
      lastTimestamp = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }

    // Start the loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
