<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01: HTML5 scaffold
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CELL = 28;
    const COLS = 10;
    const ROWS = 20;
    const PF_X = 240;
    const PF_Y = 10;
    const PF_W = COLS * CELL; // 280
    const PF_H = ROWS * CELL; // 560

    // T03: State machine
    const STATE = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', GAME_OVER: 'GAME_OVER' };
    let gameState = STATE.IDLE;

    // T05: Tetromino definitions — all 4 rotation states as arrays of [col, row] offsets
    const PIECES = {
      I: {
        color: '#00FFFF',
        rotations: [
          [[0,1],[1,1],[2,1],[3,1]],
          [[2,0],[2,1],[2,2],[2,3]],
          [[0,2],[1,2],[2,2],[3,2]],
          [[1,0],[1,1],[1,2],[1,3]]
        ]
      },
      O: {
        color: '#FFFF00',
        rotations: [
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]]
        ]
      },
      T: {
        color: '#AA00FF',
        rotations: [
          [[1,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[2,1],[1,2]],
          [[1,0],[0,1],[1,1],[1,2]]
        ]
      },
      S: {
        color: '#00FF00',
        rotations: [
          [[1,0],[2,0],[0,1],[1,1]],
          [[1,0],[1,1],[2,1],[2,2]],
          [[1,1],[2,1],[0,2],[1,2]],
          [[0,0],[0,1],[1,1],[1,2]]
        ]
      },
      Z: {
        color: '#FF0000',
        rotations: [
          [[0,0],[1,0],[1,1],[2,1]],
          [[2,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[1,2],[2,2]],
          [[1,0],[0,1],[1,1],[0,2]]
        ]
      },
      J: {
        color: '#0000FF',
        rotations: [
          [[0,0],[0,1],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[1,2]],
          [[0,1],[1,1],[2,1],[2,2]],
          [[1,0],[1,1],[0,2],[1,2]]
        ]
      },
      L: {
        color: '#FF8800',
        rotations: [
          [[2,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[1,2],[2,2]],
          [[0,1],[1,1],[2,1],[0,2]],
          [[0,0],[1,0],[1,1],[1,2]]
        ]
      }
    };

    const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

    // T06: 7-bag randomizer
    let bag = [];
    function shuffleBag() {
      bag = [...PIECE_TYPES];
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
    }
    function nextFromBag() {
      if (bag.length === 0) shuffleBag();
      return bag.pop();
    }

    // Game state variables
    let playfield = [];
    let currentPiece = null;
    let nextPieceType = null;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('tetris_highscore') || '0');
    let level = 1;
    let linesCleared = 0;

    // T02: Gravity & timing
    let gravityInterval = 1000;
    let gravityAccum = 0;
    let softDropping = false;
    let lastTime = 0;

    // T09: Lock delay
    let lockTimer = 0;
    let lockActive = false;
    let lockResets = 0;
    const LOCK_DELAY = 500;
    const MAX_LOCK_RESETS = 3;

    // Line clear flash state
    let flashLines = [];
    let flashTimer = 0;
    const FLASH_DURATION = 100;
    let pendingLineClear = false;

    // T07: Wall-kick tables
    // Standard pieces kick offsets: [dx, dy]
    const KICKS_STANDARD = [[0,0],[-1,0],[1,0],[0,-1]];
    // I-piece kick offsets
    const KICKS_I = [[0,0],[-1,0],[1,0],[0,-1],[-2,0],[2,0]];

    // Input state
    const keys = {};
    const justPressed = {};

    window.addEventListener('keydown', (e) => {
      if (!keys[e.code]) {
        justPressed[e.code] = true;
      }
      keys[e.code] = true;
      // Prevent page scroll
      if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp','Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // DAS (Delayed Auto Shift) for smoother movement
    let dasTimer = 0;
    let dasDirection = 0;
    const DAS_DELAY = 150;
    const DAS_REPEAT = 50;
    let dasRepeatTimer = 0;

    // Audio
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
    }
    function playTone(freq, duration, type = 'sine', gain = 0.3) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(gain, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration / 1000);
      } catch(e) {}
    }
    function playLineClear(count) {
      if (!audioCtx) return;
      try {
        if (count === 4) {
          // Tetris chord
          [261, 329, 392, 523].forEach((f, i) => {
            setTimeout(() => playTone(f, 200, 'sine', 0.3), i * 20);
          });
        } else {
          // Ascending tone
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
          g.gain.setValueAtTime(0.3, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
          osc.connect(g);
          g.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
        }
      } catch(e) {}
    }

    // Initialize playfield
    function initPlayfield() {
      playfield = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    }

    // Piece class
    function createPiece(type, col, row, rotation) {
      return {
        type,
        col: col !== undefined ? col : 3,
        row: row !== undefined ? row : 0,
        rotation: rotation || 0
      };
    }

    function getPieceCells(piece) {
      const def = PIECES[piece.type];
      const offsets = def.rotations[piece.rotation];
      return offsets.map(([dc, dr]) => [piece.col + dc, piece.row + dr]);
    }

    function isValidPosition(piece, col, row, rotation) {
      const def = PIECES[piece.type];
      const rot = rotation !== undefined ? rotation : piece.rotation;
      const c = col !== undefined ? col : piece.col;
      const r = row !== undefined ? row : piece.row;
      const offsets = def.rotations[rot];
      for (const [dc, dr] of offsets) {
        const pc = c + dc;
        const pr = r + dr;
        if (pc < 0 || pc >= COLS) return false;
        if (pr >= ROWS) return false;
        if (pr >= 0 && playfield[pr][pc] !== null) return false;
      }
      return true;
    }

    function getGhostRow(piece) {
      let row = piece.row;
      while (isValidPosition(piece, piece.col, row + 1, piece.rotation)) {
        row++;
      }
      return row;
    }

    function spawnPiece() {
      const type = nextPieceType;
      nextPieceType = nextFromBag();
      currentPiece = createPiece(type, 3, 0, 0);
      lockTimer = 0;
      lockActive = false;
      lockResets = 0;
      softDropping = false;
      gravityAccum = 0;

      // Check game over
      if (!isValidPosition(currentPiece, currentPiece.col, currentPiece.row, currentPiece.rotation)) {
        gameState = STATE.GAME_OVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('tetris_highscore', highScore);
        }
        ensureAudio();
        // Game over sound: descending
        try {
          if (audioCtx) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
          }
        } catch(e) {}
        currentPiece = null;
      }
    }

    function lockPiece() {
      if (!currentPiece) return;
      const cells = getPieceCells(currentPiece);
      const color = PIECES[currentPiece.type].color;
      for (const [pc, pr] of cells) {
        if (pr >= 0 && pr < ROWS && pc >= 0 && pc < COLS) {
          playfield[pr][pc] = color;
        }
      }
      checkLines();
    }

    function checkLines() {
      flashLines = [];
      for (let r = 0; r < ROWS; r++) {
        if (playfield[r].every(cell => cell !== null)) {
          flashLines.push(r);
        }
      }
      if (flashLines.length > 0) {
        flashTimer = FLASH_DURATION;
        pendingLineClear = true;
        ensureAudio();
        playLineClear(flashLines.length);
      } else {
        spawnPiece();
      }
    }

    function clearLines() {
      const count = flashLines.length;
      // Remove flash lines
      for (const r of [...flashLines].reverse()) {
        playfield.splice(r, 1);
        playfield.unshift(Array(COLS).fill(null));
      }
      // Score
      const lineScores = [0, 100, 300, 500, 800];
      score += (lineScores[count] || 0) * level;
      linesCleared += count;
      // Level up every 10 lines
      const newLevel = Math.floor(linesCleared / 10) + 1;
      if (newLevel > level) {
        level = newLevel;
        gravityInterval = Math.max(100, 1000 - 75 * (level - 1));
      }
      flashLines = [];
      pendingLineClear = false;
      spawnPiece();
    }

    function startGame() {
      ensureAudio();
      initPlayfield();
      score = 0;
      level = 1;
      linesCleared = 0;
      gravityInterval = 1000;
      gravityAccum = 0;
      lockTimer = 0;
      lockActive = false;
      lockResets = 0;
      softDropping = false;
      flashLines = [];
      flashTimer = 0;
      pendingLineClear = false;
      bag = [];
      shuffleBag();
      nextPieceType = nextFromBag();
      dasTimer = 0;
      dasDirection = 0;
      dasRepeatTimer = 0;
      gameState = STATE.PLAYING;
      spawnPiece();
    }

    // T07: Rotation with wall-kick
    function rotatePiece(dir) {
      if (!currentPiece || gameState !== STATE.PLAYING) return;
      const def = PIECES[currentPiece.type];
      const newRot = (currentPiece.rotation + (dir > 0 ? 1 : 3)) % 4;
      const kicks = currentPiece.type === 'I' ? KICKS_I : KICKS_STANDARD;
      for (const [dx, dy] of kicks) {
        const newCol = currentPiece.col + dx;
        const newRow = currentPiece.row + dy;
        if (isValidPosition(currentPiece, newCol, newRow, newRot)) {
          currentPiece.rotation = newRot;
          currentPiece.col = newCol;
          currentPiece.row = newRow;
          // If in lock state, handle reset
          if (lockActive) {
            if (lockResets < MAX_LOCK_RESETS) {
              lockTimer = 0;
              lockResets++;
            }
          }
          ensureAudio();
          playTone(220, 20, 'square', 0.1);
          return;
        }
      }
    }

    function movePiece(dx) {
      if (!currentPiece || gameState !== STATE.PLAYING) return;
      if (isValidPosition(currentPiece, currentPiece.col + dx, currentPiece.row, currentPiece.rotation)) {
        currentPiece.col += dx;
        if (lockActive) {
          if (lockResets < MAX_LOCK_RESETS) {
            lockTimer = 0;
            lockResets++;
          }
        }
        ensureAudio();
        playTone(220, 20, 'square', 0.1);
      }
    }

    function hardDrop() {
      if (!currentPiece || gameState !== STATE.PLAYING) return;
      const ghostRow = getGhostRow(currentPiece);
      const dropped = ghostRow - currentPiece.row;
      currentPiece.row = ghostRow;
      score += dropped * 2;
      ensureAudio();
      playTone(110, 60, 'sawtooth', 0.3);
      lockPiece();
      currentPiece = null;
      lockActive = false;
      lockTimer = 0;
    }

    // T02: Game loop
    function update(dt) {
      if (gameState !== STATE.PLAYING) return;

      // Flash line animation
      if (pendingLineClear) {
        flashTimer -= dt * 1000;
        if (flashTimer <= 0) {
          clearLines();
        }
        return; // Don't update piece while flashing
      }

      if (!currentPiece) return;

      // Handle input
      // Rotation
      if (justPressed['ArrowUp'] || justPressed['KeyW']) rotatePiece(1);
      if (justPressed['KeyZ']) rotatePiece(-1);

      // Hard drop
      if (justPressed['Space']) {
        hardDrop();
        return;
      }

      // DAS movement
      const leftDown = keys['ArrowLeft'] || keys['KeyA'];
      const rightDown = keys['ArrowRight'] || keys['KeyD'];

      if (leftDown && !rightDown) {
        if (dasDirection !== -1) {
          dasDirection = -1;
          dasTimer = 0;
          dasRepeatTimer = 0;
          movePiece(-1);
        } else {
          dasTimer += dt * 1000;
          if (dasTimer >= DAS_DELAY) {
            dasRepeatTimer += dt * 1000;
            if (dasRepeatTimer >= DAS_REPEAT) {
              dasRepeatTimer = 0;
              movePiece(-1);
            }
          }
        }
      } else if (rightDown && !leftDown) {
        if (dasDirection !== 1) {
          dasDirection = 1;
          dasTimer = 0;
          dasRepeatTimer = 0;
          movePiece(1);
        } else {
          dasTimer += dt * 1000;
          if (dasTimer >= DAS_DELAY) {
            dasRepeatTimer += dt * 1000;
            if (dasRepeatTimer >= DAS_REPEAT) {
              dasRepeatTimer = 0;
              movePiece(1);
            }
          }
        }
      } else {
        dasDirection = 0;
        dasTimer = 0;
        dasRepeatTimer = 0;
      }

      // Soft drop
      softDropping = (keys['ArrowDown'] || keys['KeyS']);

      // Gravity
      const effectiveInterval = softDropping ? 50 : gravityInterval;
      gravityAccum += dt * 1000;

      while (gravityAccum >= effectiveInterval) {
        gravityAccum -= effectiveInterval;
        const canFall = isValidPosition(currentPiece, currentPiece.col, currentPiece.row + 1, currentPiece.rotation);
        if (canFall) {
          currentPiece.row++;
          if (softDropping) score += 1;
          lockActive = false;
          lockTimer = 0;
        } else {
          // Can't fall — activate lock delay
          lockActive = true;
        }
      }

      // Lock delay
      if (lockActive) {
        lockTimer += dt * 1000;
        if (lockTimer >= LOCK_DELAY) {
          lockPiece();
          currentPiece = null;
          lockActive = false;
          lockTimer = 0;
        }
      }
    }

    // Drawing helpers
    function drawCell(x, y, color, alpha) {
      const cx = PF_X + x * CELL;
      const cy = PF_Y + y * CELL;
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.fillStyle = color;
      ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      // 3D border effect: lighter top/left, darker bottom/right
      ctx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.6;
      ctx.fillStyle = '#000';
      ctx.fillRect(cx + CELL - 3, cy + 1, 2, CELL - 2); // right
      ctx.fillRect(cx + 1, cy + CELL - 3, CELL - 2, 2); // bottom
      ctx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.5;
      ctx.fillStyle = '#fff';
      ctx.fillRect(cx + 1, cy + 1, CELL - 2, 2); // top
      ctx.fillRect(cx + 1, cy + 1, 2, CELL - 2); // left
      ctx.globalAlpha = 1;
    }

    function drawCellAt(px, py, color, alpha) {
      ctx.globalAlpha = alpha !== undefined ? alpha : 1;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
      ctx.globalAlpha = 1;
    }

    // T04: Draw playfield
    function drawPlayfield() {
      // Background
      ctx.fillStyle = '#000000';
      ctx.fillRect(PF_X, PF_Y, PF_W, PF_H);

      // Grid lines
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 1;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(PF_X + c * CELL, PF_Y);
        ctx.lineTo(PF_X + c * CELL, PF_Y + PF_H);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(PF_X, PF_Y + r * CELL);
        ctx.lineTo(PF_X + PF_W, PF_Y + r * CELL);
        ctx.stroke();
      }

      // Border
      ctx.strokeStyle = '#555555';
      ctx.lineWidth = 2;
      ctx.strokeRect(PF_X - 1, PF_Y - 1, PF_W + 2, PF_H + 2);

      // Placed cells
      for (let r = 0; r < ROWS; r++) {
        // Flash effect
        if (flashLines.includes(r) && flashTimer > 0) {
          ctx.fillStyle = '#FFFFFF';
          ctx.globalAlpha = flashTimer / FLASH_DURATION;
          ctx.fillRect(PF_X, PF_Y + r * CELL, PF_W, CELL);
          ctx.globalAlpha = 1;
          continue;
        }
        for (let c = 0; c < COLS; c++) {
          if (playfield[r][c]) {
            drawCell(c, r, playfield[r][c]);
          }
        }
      }
    }

    // T10: Draw ghost piece
    function drawGhostPiece() {
      if (!currentPiece) return;
      const ghostRow = getGhostRow(currentPiece);
      if (ghostRow === currentPiece.row) return; // same row, don't draw ghost
      const color = PIECES[currentPiece.type].color;
      const offsets = PIECES[currentPiece.type].rotations[currentPiece.rotation];
      for (const [dc, dr] of offsets) {
        const gc = currentPiece.col + dc;
        const gr = ghostRow + dr;
        if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
          const cx = PF_X + gc * CELL;
          const cy = PF_Y + gr * CELL;
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = color;
          ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
          ctx.globalAlpha = 1;
        }
      }
    }

    // Draw current piece
    function drawCurrentPiece() {
      if (!currentPiece) return;
      const color = PIECES[currentPiece.type].color;
      const offsets = PIECES[currentPiece.type].rotations[currentPiece.rotation];
      for (const [dc, dr] of offsets) {
        const pc = currentPiece.col + dc;
        const pr = currentPiece.row + dr;
        if (pr >= 0 && pr < ROWS && pc >= 0 && pc < COLS) {
          drawCell(pc, pr, color);
        }
      }
    }

    // T12: Draw next piece preview
    function drawNextPiece() {
      const panelX = 560;
      const panelY = 60;

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('NEXT', panelX, panelY - 8);

      // 4×4 preview box
      const boxSize = 4 * CELL; // 112px
      ctx.fillStyle = '#000000';
      ctx.fillRect(panelX, panelY, boxSize, boxSize);
      ctx.strokeStyle = '#555555';
      ctx.lineWidth = 1;
      ctx.strokeRect(panelX, panelY, boxSize, boxSize);

      if (!nextPieceType) return;
      const def = PIECES[nextPieceType];
      const offsets = def.rotations[0];
      const color = def.color;
      for (const [dc, dr] of offsets) {
        const px = panelX + dc * CELL;
        const py = panelY + dr * CELL;
        ctx.fillStyle = color;
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
        // Simple 3D border
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(px + CELL - 3, py + 1, 2, CELL - 2);
        ctx.fillRect(px + 1, py + CELL - 3, CELL - 2, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(px + 1, py + 1, CELL - 2, 2);
        ctx.fillRect(px + 1, py + 1, 2, CELL - 2);
      }
    }

    // T13: Draw HUD
    function drawHUD() {
      const panelX = 560;

      // SCORE
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE', panelX, 200);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.fillText(score.toString(), panelX, 222);

      // LEVEL
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.fillText('LEVEL', panelX, 280);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.fillText(level.toString(), panelX, 302);

      // LINES
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.fillText('LINES', panelX, 340);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.fillText(linesCleared.toString(), panelX, 362);

      // HIGH SCORE
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.fillText('BEST', panelX, 420);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px monospace';
      ctx.fillText(highScore.toString(), panelX, 442);

      // Controls hint
      ctx.fillStyle = '#555555';
      ctx.font = '11px monospace';
      ctx.fillText('←→ Move', panelX, 500);
      ctx.fillText('↑/Z Rotate', panelX, 516);
      ctx.fillText('↓ Soft drop', panelX, 532);
      ctx.fillText('SPC Hard drop', panelX, 548);
      ctx.fillText('P Pause', panelX, 564);
    }

    // T14: Draw start screen
    function drawStartScreen() {
      // Title
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TETRIS', PF_X + PF_W / 2, PF_Y + 200);

      // Show all 7 piece shapes
      const pieceY = PF_Y + 280;
      const pieceOrder = ['I','O','T','S','Z','J','L'];
      const cellSmall = 10;
      let startX = PF_X + 10;

      for (const type of pieceOrder) {
        const def = PIECES[type];
        const offsets = def.rotations[0];
        ctx.fillStyle = def.color;
        for (const [dc, dr] of offsets) {
          ctx.fillRect(startX + dc * cellSmall, pieceY + dr * cellSmall, cellSmall - 1, cellSmall - 1);
        }
        startX += 4 * cellSmall + 5;
      }

      // Press Enter prompt
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press Enter to Start', PF_X + PF_W / 2, PF_Y + 420);
    }

    // T14: Draw game over
    function drawGameOver() {
      // Overlay
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(PF_X, PF_Y, PF_W, PF_H);

      // Game Over text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', PF_X + PF_W / 2, PF_Y + PF_H / 2 - 40);

      // Final score
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Score: ' + score, PF_X + PF_W / 2, PF_Y + PF_H / 2);

      // Restart prompt
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '16px monospace';
      ctx.fillText('Press Enter to Restart', PF_X + PF_W / 2, PF_Y + PF_H / 2 + 40);
    }

    // Draw paused overlay
    function drawPaused() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(PF_X, PF_Y, PF_W, PF_H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', PF_X + PF_W / 2, PF_Y + PF_H / 2);
    }

    // Handle global key inputs (state transitions)
    function handleGlobalInput() {
      if (justPressed['Enter']) {
        if (gameState === STATE.IDLE || gameState === STATE.GAME_OVER) {
          startGame();
        }
      }
      if (justPressed['KeyP']) {
        if (gameState === STATE.PLAYING) {
          gameState = STATE.PAUSED;
        } else if (gameState === STATE.PAUSED) {
          gameState = STATE.PLAYING;
          gravityAccum = 0; // prevent time skip on unpause
        }
      }
    }

    // T02: Main game loop
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
      lastTime = timestamp;

      // Clear
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, 800, 600);

      // Handle input
      handleGlobalInput();

      // Update
      update(dt);

      // Draw
      drawPlayfield();

      if (gameState === STATE.PLAYING || gameState === STATE.PAUSED) {
        drawGhostPiece();
        drawCurrentPiece();
        drawNextPiece();
        drawHUD();
      }

      if (gameState === STATE.IDLE) {
        drawPlayfield();
        drawStartScreen();
        drawHUD(); // Still show HUD with high score
      }

      if (gameState === STATE.PAUSED) {
        drawPaused();
      }

      if (gameState === STATE.GAME_OVER) {
        drawGhostPiece();
        drawCurrentPiece();
        drawNextPiece();
        drawHUD();
        drawGameOver();
      }

      // Clear justPressed
      for (const key in justPressed) delete justPressed[key];

      requestAnimationFrame(gameLoop);
    }

    // Start
    requestAnimationFrame((t) => {
      lastTime = t;
      requestAnimationFrame(gameLoop);
    });
  </script>
