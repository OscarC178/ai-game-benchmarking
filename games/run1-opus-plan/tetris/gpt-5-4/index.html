<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 800px;
      height: 600px;
      background: #111111;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600" aria-label="Tetris game canvas"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 800;
      const HEIGHT = 600;
      const FIELD_X = 240;
      const FIELD_Y = 10;
      const COLS = 10;
      const ROWS = 20;
      const CELL = 28;

      const STATES = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      const COLORS = {
        I: '#00FFFF',
        O: '#FFFF00',
        T: '#AA00FF',
        S: '#00FF00',
        Z: '#FF0000',
        J: '#0000FF',
        L: '#FF8800'
      };

      const PIECES = {
        I: [
          [[0,1],[1,1],[2,1],[3,1]],
          [[2,0],[2,1],[2,2],[2,3]],
          [[0,2],[1,2],[2,2],[3,2]],
          [[1,0],[1,1],[1,2],[1,3]]
        ],
        O: [
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[2,1]]
        ],
        T: [
          [[1,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[2,1],[1,2]],
          [[1,0],[0,1],[1,1],[1,2]]
        ],
        S: [
          [[1,0],[2,0],[0,1],[1,1]],
          [[1,0],[1,1],[2,1],[2,2]],
          [[1,1],[2,1],[0,2],[1,2]],
          [[0,0],[0,1],[1,1],[1,2]]
        ],
        Z: [
          [[0,0],[1,0],[1,1],[2,1]],
          [[2,0],[1,1],[2,1],[1,2]],
          [[0,1],[1,1],[1,2],[2,2]],
          [[1,0],[0,1],[1,1],[0,2]]
        ],
        J: [
          [[0,0],[0,1],[1,1],[2,1]],
          [[1,0],[2,0],[1,1],[1,2]],
          [[0,1],[1,1],[2,1],[2,2]],
          [[1,0],[1,1],[0,2],[1,2]]
        ],
        L: [
          [[2,0],[0,1],[1,1],[2,1]],
          [[1,0],[1,1],[1,2],[2,2]],
          [[0,1],[1,1],[2,1],[0,2]],
          [[0,0],[1,0],[1,1],[1,2]]
        ]
      };

      let state = STATES.IDLE;
      let board = createBoard();
      let bag = [];
      let currentPiece = null;
      let nextType = null;
      let score = 0;
      let level = 1;
      let lines = 0;
      let highScore = loadHighScore();
      let gravityTimer = 0;
      let softDropTimer = 0;
      let lockTimer = 0;
      let lockResets = 0;
      let lastTime = 0;
      let flashRows = null;
      let flashTimer = 0;
      let audioCtx = null;

      function createBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      }

      function loadHighScore() {
        try {
          const value = localStorage.getItem('tetrisHighScore');
          return value ? Number(value) || 0 : 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore() {
        try {
          localStorage.setItem('tetrisHighScore', String(highScore));
        } catch (_) {}
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          saveHighScore();
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) audioCtx = new AudioContextClass();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume().catch(() => {});
        }
      }

      function playTone(type, frequency, duration, rampTo, gainValue = 0.04) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (typeof rampTo === 'number') {
          osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        }
        gain.gain.setValueAtTime(gainValue, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playMoveSound() { playTone('square', 220, 0.02); }
      function playLineClearSound(linesCleared) {
        if (linesCleared === 4) {
          playTone('square', 440, 0.2, 880, 0.06);
          return;
        }
        playTone('square', 440, 0.15, 880, 0.05);
      }
      function playHardDropSound() { playTone('square', 110, 0.06, undefined, 0.06); }
      function playGameOverSound() { playTone('sawtooth', 440, 0.5, 55, 0.06); }

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function refillBagIfNeeded() {
        if (bag.length === 0) {
          bag = shuffle(['I','O','T','S','Z','J','L']);
        }
      }

      function pullType() {
        refillBagIfNeeded();
        return bag.shift();
      }

      function getGravityInterval() {
        return Math.max(100, 1000 - 75 * (level - 1));
      }

      function spawnPiece() {
        const type = nextType || pullType();
        nextType = pullType();
        currentPiece = {
          type,
          rotation: 0,
          x: 3,
          y: 0
        };
        gravityTimer = 0;
        softDropTimer = 0;
        lockTimer = 0;
        lockResets = 0;
        if (collides(currentPiece.x, currentPiece.y, currentPiece.rotation, currentPiece.type)) {
          state = STATES.GAME_OVER;
          updateHighScore();
          playGameOverSound();
        }
      }

      function startGame() {
        ensureAudio();
        board = createBoard();
        bag = [];
        score = 0;
        level = 1;
        lines = 0;
        flashRows = null;
        flashTimer = 0;
        nextType = pullType();
        spawnPiece();
        state = STATES.PLAYING;
      }

      function getCells(type, rotation, offsetX = 0, offsetY = 0) {
        return PIECES[type][rotation].map(([x, y]) => ({ x: x + offsetX, y: y + offsetY }));
      }

      function collides(x, y, rotation, type) {
        const cells = getCells(type, rotation, x, y);
        for (const cell of cells) {
          if (cell.x < 0 || cell.x >= COLS || cell.y >= ROWS) return true;
          if (cell.y >= 0 && board[cell.y][cell.x]) return true;
        }
        return false;
      }

      function tryMove(dx, dy) {
        if (!currentPiece) return false;
        const nx = currentPiece.x + dx;
        const ny = currentPiece.y + dy;
        if (collides(nx, ny, currentPiece.rotation, currentPiece.type)) {
          return false;
        }
        currentPiece.x = nx;
        currentPiece.y = ny;
        if (dy > 0) {
          lockTimer = 0;
          if (lockResets < 3) lockResets += 1;
        }
        return true;
      }

      function tryRotate(direction) {
        if (!currentPiece) return;
        const nextRotation = (currentPiece.rotation + direction + 4) % 4;
        const kicks = currentPiece.type === 'I'
          ? [[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]]
          : [[0,0],[-1,0],[1,0],[0,-1]];
        for (const [kx, ky] of kicks) {
          const nx = currentPiece.x + kx;
          const ny = currentPiece.y + ky;
          if (!collides(nx, ny, nextRotation, currentPiece.type)) {
            currentPiece.x = nx;
            currentPiece.y = ny;
            currentPiece.rotation = nextRotation;
            if (lockTimer > 0 && lockResets < 3) {
              lockTimer = 0;
              lockResets += 1;
            }
            playMoveSound();
            return;
          }
        }
      }

      function getGhostY() {
        if (!currentPiece) return 0;
        let ghostY = currentPiece.y;
        while (!collides(currentPiece.x, ghostY + 1, currentPiece.rotation, currentPiece.type)) {
          ghostY += 1;
        }
        return ghostY;
      }

      function lockPiece() {
        const cells = getCells(currentPiece.type, currentPiece.rotation, currentPiece.x, currentPiece.y);
        for (const cell of cells) {
          if (cell.y >= 0 && cell.y < ROWS && cell.x >= 0 && cell.x < COLS) {
            board[cell.y][cell.x] = currentPiece.type;
          }
        }
        const completed = [];
        for (let y = 0; y < ROWS; y++) {
          if (board[y].every(Boolean)) completed.push(y);
        }
        if (completed.length) {
          flashRows = completed;
          flashTimer = 100;
          playLineClearSound(completed.length);
        } else {
          spawnPiece();
        }
      }

      function resolveLineClear() {
        if (!flashRows || !flashRows.length) return;
        const count = flashRows.length;
        const scoreMap = { 1: 100, 2: 300, 3: 500, 4: 800 };
        board = board.filter((_, rowIndex) => !flashRows.includes(rowIndex));
        while (board.length < ROWS) {
          board.unshift(Array(COLS).fill(null));
        }
        score += (scoreMap[count] || 0) * level;
        lines += count;
        level = Math.floor(lines / 10) + 1;
        updateHighScore();
        flashRows = null;
        flashTimer = 0;
        spawnPiece();
      }

      function hardDrop() {
        if (!currentPiece || state !== STATES.PLAYING || flashRows) return;
        let dropped = 0;
        while (!collides(currentPiece.x, currentPiece.y + 1, currentPiece.rotation, currentPiece.type)) {
          currentPiece.y += 1;
          dropped += 1;
        }
        if (dropped > 0) {
          score += dropped * 2;
          updateHighScore();
        }
        playHardDropSound();
        lockPiece();
      }

      function updatePlaying(dt) {
        if (flashRows) {
          flashTimer -= dt * 1000;
          if (flashTimer <= 0) resolveLineClear();
          return;
        }

        const gravityInterval = getGravityInterval();
        gravityTimer += dt * 1000;
        if (keys.softDrop) {
          softDropTimer += dt * 1000;
          while (softDropTimer >= 50) {
            softDropTimer -= 50;
            if (tryMove(0, 1)) {
              score += 1;
              updateHighScore();
            } else {
              break;
            }
          }
        } else {
          softDropTimer = 0;
        }

        while (gravityTimer >= gravityInterval) {
          gravityTimer -= gravityInterval;
          if (!tryMove(0, 1)) {
            gravityTimer = 0;
            break;
          }
        }

        if (collides(currentPiece.x, currentPiece.y + 1, currentPiece.rotation, currentPiece.type)) {
          lockTimer += dt * 1000;
          if (lockTimer >= 500) {
            lockPiece();
          }
        } else {
          lockTimer = 0;
        }
      }

      function shadeColor(hex, factor) {
        const r = Math.max(0, Math.min(255, Math.round(parseInt(hex.slice(1, 3), 16) * factor)));
        const g = Math.max(0, Math.min(255, Math.round(parseInt(hex.slice(3, 5), 16) * factor)));
        const b = Math.max(0, Math.min(255, Math.round(parseInt(hex.slice(5, 7), 16) * factor)));
        return `rgb(${r}, ${g}, ${b})`;
      }

      function drawCell(gridX, gridY, color, alpha = 1) {
        const px = FIELD_X + gridX * CELL;
        const py = FIELD_Y + gridY * CELL;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
        ctx.strokeStyle = shadeColor(color, 0.65);
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 1.5, py + 1.5, CELL - 3, CELL - 3);
        ctx.restore();
      }

      function drawPiece(piece, alpha = 1, yOverride = null) {
        if (!piece) return;
        const y = yOverride == null ? piece.y : yOverride;
        const cells = getCells(piece.type, piece.rotation, piece.x, y);
        for (const cell of cells) {
          if (cell.y >= 0) drawCell(cell.x, cell.y, COLORS[piece.type], alpha);
        }
      }

      function drawPlayfield() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(FIELD_X, FIELD_Y, COLS * CELL, ROWS * CELL);
        ctx.strokeStyle = '#555555';
        ctx.lineWidth = 2;
        ctx.strokeRect(FIELD_X - 1, FIELD_Y - 1, COLS * CELL + 2, ROWS * CELL + 2);
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 1;
        for (let x = 0; x <= COLS; x++) {
          const px = FIELD_X + x * CELL + 0.5;
          ctx.beginPath();
          ctx.moveTo(px, FIELD_Y);
          ctx.lineTo(px, FIELD_Y + ROWS * CELL);
          ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
          const py = FIELD_Y + y * CELL + 0.5;
          ctx.beginPath();
          ctx.moveTo(FIELD_X, py);
          ctx.lineTo(FIELD_X + COLS * CELL, py);
          ctx.stroke();
        }
      }

      function drawBoard() {
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const type = board[y][x];
            if (!type) continue;
            if (flashRows && flashRows.includes(y)) {
              drawCell(x, y, '#FFFFFF');
            } else {
              drawCell(x, y, COLORS[type]);
            }
          }
        }
      }

      function drawGhost() {
        if (!currentPiece || flashRows) return;
        drawPiece(currentPiece, 0.3, getGhostY());
      }

      function drawNextPreview() {
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('NEXT', 560, 52);
        ctx.strokeStyle = '#555555';
        ctx.lineWidth = 2;
        ctx.strokeRect(560, 60, 112, 112);
        ctx.fillStyle = '#000000';
        ctx.fillRect(560, 60, 112, 112);
        if (!nextType) return;
        const cells = PIECES[nextType][0];
        for (const [x, y] of cells) {
          const px = 560 + x * 28 + 1;
          const py = 60 + y * 28 + 1;
          ctx.fillStyle = COLORS[nextType];
          ctx.fillRect(px, py, 26, 26);
          ctx.strokeStyle = shadeColor(COLORS[nextType], 0.65);
          ctx.strokeRect(px + 0.5, py + 0.5, 25, 25);
        }
      }

      function drawHud() {
        drawNextPreview();
        const items = [
          ['SCORE', String(score), 200],
          ['LEVEL', String(level), 280],
          ['LINES', String(lines), 340],
          ['HIGH SCORE', String(highScore), 420]
        ];
        for (const [label, value, y] of items) {
          ctx.fillStyle = '#AAAAAA';
          ctx.font = '14px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(label, 560, y);
          ctx.fillStyle = '#FFFFFF';
          ctx.font = '20px monospace';
          ctx.fillText(value, 560, y + 28);
        }
      }

      function drawStartScreen() {
        drawPlayfield();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('TETRIS', FIELD_X + COLS * CELL / 2, 200);

        const types = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];
        types.forEach((type, index) => {
          const baseX = FIELD_X + 22 + (index % 4) * 62;
          const baseY = 255 + Math.floor(index / 4) * 70;
          for (const [x, y] of PIECES[type][0]) {
            ctx.fillStyle = COLORS[type];
            ctx.fillRect(baseX + x * 14, baseY + y * 14, 12, 12);
          }
        });

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Start', FIELD_X + COLS * CELL / 2, 420);
      }

      function drawOverlay(title, subline, prompt, size = 36) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(FIELD_X, FIELD_Y, COLS * CELL, ROWS * CELL);
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${size}px monospace`;
        ctx.fillText(title, FIELD_X + COLS * CELL / 2, FIELD_Y + 230);
        if (subline) {
          ctx.font = '22px monospace';
          ctx.fillText(subline, FIELD_X + COLS * CELL / 2, FIELD_Y + 280);
        }
        if (prompt) {
          ctx.fillStyle = '#AAAAAA';
          ctx.font = '18px monospace';
          ctx.fillText(prompt, FIELD_X + COLS * CELL / 2, FIELD_Y + 325);
        }
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#111111';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        if (state === STATES.IDLE) {
          drawStartScreen();
          drawHud();
          return;
        }

        drawPlayfield();
        drawBoard();
        drawGhost();
        drawPiece(currentPiece);
        drawHud();

        if (state === STATES.PAUSED) {
          drawOverlay('PAUSED', '', '', 36);
        } else if (state === STATES.GAME_OVER) {
          drawOverlay('GAME OVER', 'Score: ' + score, 'Press Enter to Restart', 36);
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        if (state === STATES.PLAYING) updatePlaying(dt);
        render();
        requestAnimationFrame(loop);
      }

      const keys = { softDrop: false };

      window.addEventListener('keydown', (event) => {
        if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp','KeyA','KeyD','KeyS','KeyW','KeyZ','Space','Enter','KeyP'].includes(event.code)) {
          event.preventDefault();
        }
        if (event.code === 'Enter') {
          ensureAudio();
          if (state === STATES.IDLE || state === STATES.GAME_OVER) startGame();
          return;
        }
        if (event.code === 'KeyP') {
          if (state === STATES.PLAYING) state = STATES.PAUSED;
          else if (state === STATES.PAUSED) state = STATES.PLAYING;
          return;
        }
        if (state !== STATES.PLAYING || flashRows) return;

        if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
          if (tryMove(-1, 0)) {
            lockTimer = 0;
            if (lockResets < 3 && collides(currentPiece.x, currentPiece.y + 1, currentPiece.rotation, currentPiece.type)) lockResets += 1;
            playMoveSound();
          }
        } else if (event.code === 'ArrowRight' || event.code === 'KeyD') {
          if (tryMove(1, 0)) {
            lockTimer = 0;
            if (lockResets < 3 && collides(currentPiece.x, currentPiece.y + 1, currentPiece.rotation, currentPiece.type)) lockResets += 1;
            playMoveSound();
          }
        } else if (event.code === 'ArrowDown' || event.code === 'KeyS') {
          keys.softDrop = true;
        } else if (event.code === 'ArrowUp' || event.code === 'KeyW') {
          tryRotate(1);
        } else if (event.code === 'KeyZ') {
          tryRotate(-1);
        } else if (event.code === 'Space') {
          hardDrop();
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.code === 'ArrowDown' || event.code === 'KeyS') {
          keys.softDrop = false;
        }
      });

      requestAnimationFrame(loop);
    })();
  </script>
</body>
