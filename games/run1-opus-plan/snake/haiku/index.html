<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #111111;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <script>
    // T01-T12: Complete Snake game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 600;
    const CANVAS_HEIGHT = 600;
    const GRID_SIZE = 20;
    const CELL_SIZE = 30;
    const SNAKE_SIZE = 28;
    const SNAKE_OFFSET = 1;

    // Colors
    const COLOR_BG = '#111111';
    const COLOR_GRID = '#1A1A1A';
    const COLOR_SNAKE_HEAD = '#4CAF50';
    const COLOR_SNAKE_BODY = '#388E3C';
    const COLOR_FOOD = '#F44336';
    const COLOR_WHITE = '#FFFFFF';
    const COLOR_OVERLAY = '#000000CC';
    const COLOR_DIM = '#AAAAAA';

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('snakeHighScore') || '0'),
      tickRate: 8,
      tickTimer: 0
    };

    // Snake
    const snake = {
      body: [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ],
      direction: { x: 1, y: 0 },
      nextDirection: { x: 1, y: 0 },
      directionChanged: false
    };

    // Food
    let food = null;

    // Input buffer
    const inputBuffer = [];

    // Keyboard input
    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
        return;
      }

      if (key === 'p') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
        return;
      }

      if (['arrowup', 'w'].includes(key) && !isOppositeDirection(0, -1)) {
        inputBuffer.push({ x: 0, y: -1 });
      } else if (['arrowdown', 's'].includes(key) && !isOppositeDirection(0, 1)) {
        inputBuffer.push({ x: 0, y: 1 });
      } else if (['arrowleft', 'a'].includes(key) && !isOppositeDirection(-1, 0)) {
        inputBuffer.push({ x: -1, y: 0 });
      } else if (['arrowright', 'd'].includes(key) && !isOppositeDirection(1, 0)) {
        inputBuffer.push({ x: 1, y: 0 });
      }
    });

    function isOppositeDirection(newX, newY) {
      return (
        (snake.direction.x === -newX && newX !== 0) ||
        (snake.direction.y === -newY && newY !== 0)
      );
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.tickRate = 8;
      game.tickTimer = 0;
      snake.body = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      snake.direction = { x: 1, y: 0 };
      snake.nextDirection = { x: 1, y: 0 };
      snake.directionChanged = false;
      inputBuffer.length = 0;
      spawnFood();
    }

    function spawnFood() {
      const occupiedCells = new Set();
      snake.body.forEach(segment => {
        occupiedCells.add(`${segment.x},${segment.y}`);
      });

      let attempts = 0;
      while (attempts < 100) {
        const x = Math.floor(Math.random() * GRID_SIZE);
        const y = Math.floor(Math.random() * GRID_SIZE);
        if (!occupiedCells.has(`${x},${y}`)) {
          food = { x, y };
          return;
        }
        attempts++;
      }

      // Grid full (extremely unlikely)
      food = null;
    }

    function updateGame() {
      // Process one direction input per tick
      if (inputBuffer.length > 0 && !snake.directionChanged) {
        snake.nextDirection = inputBuffer.shift();
        snake.directionChanged = true;
      }

      snake.direction = snake.nextDirection;

      // Move snake
      const head = snake.body[0];
      const newHead = {
        x: head.x + snake.direction.x,
        y: head.y + snake.direction.y
      };

      // Check wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        game.state = STATE.GAME_OVER;
        game.highScore = Math.max(game.highScore, game.score);
        localStorage.setItem('snakeHighScore', game.highScore);
        return;
      }

      // Check self collision
      for (let i = 0; i < snake.body.length; i++) {
        if (snake.body[i].x === newHead.x && snake.body[i].y === newHead.y) {
          game.state = STATE.GAME_OVER;
          game.highScore = Math.max(game.highScore, game.score);
          localStorage.setItem('snakeHighScore', game.highScore);
          return;
        }
      }

      // Move head
      snake.body.unshift(newHead);

      // Check food
      if (food && newHead.x === food.x && newHead.y === food.y) {
        game.score += 10;
        game.tickRate = Math.min(game.tickRate + 0.5, 15);
        spawnFood();
      } else {
        // Remove tail
        snake.body.pop();
      }

      snake.directionChanged = false;
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw grid
      ctx.strokeStyle = COLOR_GRID;
      ctx.lineWidth = 1;
      for (let i = 1; i < GRID_SIZE; i++) {
        const pos = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, CANVAS_HEIGHT);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(CANVAS_WIDTH, pos);
        ctx.stroke();
      }

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderStartScreen() {
      ctx.fillStyle = COLOR_SNAKE_HEAD;
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', CANVAS_WIDTH / 2, 240);

      ctx.fillStyle = COLOR_DIM;
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 320);
    }

    function renderGameScreen() {
      // Draw food
      if (food) {
        ctx.fillStyle = COLOR_FOOD;
        ctx.fillRect(
          food.x * CELL_SIZE + SNAKE_OFFSET,
          food.y * CELL_SIZE + SNAKE_OFFSET,
          SNAKE_SIZE,
          SNAKE_SIZE
        );
      }

      // Draw snake
      ctx.fillStyle = COLOR_SNAKE_HEAD;
      const head = snake.body[0];
      ctx.fillRect(
        head.x * CELL_SIZE + SNAKE_OFFSET,
        head.y * CELL_SIZE + SNAKE_OFFSET,
        SNAKE_SIZE,
        SNAKE_SIZE
      );

      ctx.fillStyle = COLOR_SNAKE_BODY;
      for (let i = 1; i < snake.body.length; i++) {
        const segment = snake.body[i];
        ctx.fillRect(
          segment.x * CELL_SIZE + SNAKE_OFFSET,
          segment.y * CELL_SIZE + SNAKE_OFFSET,
          SNAKE_SIZE,
          SNAKE_SIZE
        );
      }

      // Draw score
      ctx.fillStyle = COLOR_WHITE;
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 24);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 24);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = COLOR_OVERLAY;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = COLOR_WHITE;
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = COLOR_OVERLAY;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = COLOR_WHITE;
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText(`Score: ${game.score}`, CANVAS_WIDTH / 2, 310);

      ctx.fillStyle = COLOR_DIM;
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      // Update tick timer
      if (game.state === STATE.PLAYING) {
        game.tickTimer += deltaTime;
        const tickDuration = 1 / game.tickRate;

        while (game.tickTimer >= tickDuration) {
          game.tickTimer -= tickDuration;
          updateGame();
        }
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the loop
    gameLoop();
  </script>
</body>
</html>
