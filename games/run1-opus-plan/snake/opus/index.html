<!-- Snake | spec:run1-opus-plan | built-by:anthropic/claude-opus-4-6 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; background: #111111; }
</style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
(function() {
  'use strict';

  // === T01: Canvas setup ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 600;
  const COLS = 20, ROWS = 20, CELL = 30;
  const INSET = 1; // 2px inset → 28×28 squares (1px each side)

  // === T03: State machine ===
  const STATE = { IDLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };
  let gameState = STATE.IDLE;

  // === T04: Snake state ===
  let snake = [];
  let direction = { x: 1, y: 0 };    // current movement
  let nextDirection = { x: 1, y: 0 }; // buffered input
  let inputConsumed = true;            // one input per tick

  // === T06: Food ===
  let food = { x: 0, y: 0 };

  // === T02: Tick rate ===
  const TICK_RATE_INIT = 8;
  const TICK_RATE_MAX = 15;
  const TICK_RATE_INC = 0.5;
  let tickRate = TICK_RATE_INIT;
  let tickAccumulator = 0;

  // === T08: Scoring ===
  let score = 0;
  let highScore = parseInt(localStorage.getItem('snake_high_score') || '0', 10);

  // === Audio ===
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playEat() {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.value = 0.08;
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.04);
    } catch(_){}
  }
  function playDie() {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(110, ac.currentTime + 0.3);
      gain.gain.value = 0.08;
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.3);
    } catch(_){}
  }

  // === Input ===
  document.addEventListener('keydown', function(e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();

    if (e.key === 'Enter') {
      if (gameState === STATE.IDLE || gameState === STATE.GAME_OVER) {
        startGame();
      }
    }
    if (e.key === 'p' || e.key === 'P') {
      if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
      else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
    }

    if (gameState !== STATE.PLAYING || !inputConsumed) return;

    let nx = direction.x, ny = direction.y;
    if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') { nx = 0;  ny = -1; }
    if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') { nx = 0;  ny = 1;  }
    if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { nx = -1; ny = 0;  }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { nx = 1;  ny = 0;  }

    // Prevent 180° reversal
    if (nx !== -direction.x || ny !== -direction.y) {
      if (nx !== direction.x || ny !== direction.y) {
        nextDirection = { x: nx, y: ny };
        inputConsumed = false;
      }
    }
  });

  // === Game setup ===
  function startGame() {
    snake = [
      { x: 10, y: 10 }, // head
      { x: 9,  y: 10 }, // body
      { x: 8,  y: 10 }  // body
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    inputConsumed = true;
    score = 0;
    tickRate = TICK_RATE_INIT;
    tickAccumulator = 0;
    spawnFood();
    gameState = STATE.PLAYING;
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    const free = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!occupied.has(x + ',' + y)) free.push({ x, y });
      }
    }
    if (free.length === 0) {
      // Grid full — player wins (extremely unlikely)
      gameState = STATE.GAME_OVER;
      return;
    }
    const chosen = free[Math.floor(Math.random() * free.length)];
    food.x = chosen.x;
    food.y = chosen.y;
  }

  // === T04/T06/T07: Game tick ===
  function tick() {
    // Apply buffered direction
    direction = { x: nextDirection.x, y: nextDirection.y };
    inputConsumed = true;

    // New head position
    const head = snake[0];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };

    // T07: Wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      playDie();
      gameState = STATE.GAME_OVER;
      saveHighScore();
      return;
    }

    // T07: Self collision (check against current body — tail hasn't moved yet but will unless eating)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
        playDie();
        gameState = STATE.GAME_OVER;
        saveHighScore();
        return;
      }
    }

    // Insert new head
    snake.unshift(newHead);

    // T06: Food check
    if (newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      tickRate = Math.min(tickRate + TICK_RATE_INC, TICK_RATE_MAX);
      playEat();
      spawnFood();
      // Don't pop tail — snake grows
    } else {
      snake.pop(); // remove tail
    }
  }

  function saveHighScore() {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_high_score', highScore.toString());
    }
  }

  // === T02: Main loop ===
  let lastTime = 0;

  function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;

    if (gameState === STATE.PLAYING) {
      tickAccumulator += dt;
      const tickInterval = 1 / tickRate;
      while (tickAccumulator >= tickInterval) {
        tickAccumulator -= tickInterval;
        tick();
        if (gameState !== STATE.PLAYING) break;
      }
    }

    render();
    requestAnimationFrame(gameLoop);
  }

  // === Rendering ===
  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, W, H);

    if (gameState === STATE.IDLE) {
      renderStartScreen();
      return;
    }

    // T05: Grid lines
    ctx.strokeStyle = '#1A1A1A';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, H);
      ctx.stroke();
    }
    for (let i = 1; i < ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(W, i * CELL);
      ctx.stroke();
    }

    // Food
    ctx.fillStyle = '#F44336';
    ctx.fillRect(food.x * CELL + INSET, food.y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);

    // Snake body (draw body first, head on top)
    for (let i = snake.length - 1; i >= 1; i--) {
      ctx.fillStyle = '#388E3C';
      ctx.fillRect(snake[i].x * CELL + INSET, snake[i].y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);
    }

    // Snake head
    if (snake.length > 0) {
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(snake[0].x * CELL + INSET, snake[0].y * CELL + INSET, CELL - INSET * 2, CELL - INSET * 2);
    }

    // T08: Score HUD
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 10, 24);
    ctx.textAlign = 'right';
    ctx.fillText('Best: ' + highScore, 590, 24);
    ctx.textAlign = 'left';

    // T11: Pause overlay
    if (gameState === STATE.PAUSED) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.textAlign = 'left';
    }

    // T09: Game over overlay
    if (gameState === STATE.GAME_OVER) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, 260);
      ctx.font = '24px monospace';
      ctx.fillText('Score: ' + score, W / 2, 310);
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', W / 2, 360);
      ctx.textAlign = 'left';
    }
  }

  // T10: Start screen
  function renderStartScreen() {
    ctx.fillStyle = '#4CAF50';
    ctx.font = '56px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SNAKE', W / 2, 240);

    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px monospace';
    ctx.fillText('Press Enter to Start', W / 2, 320);
    ctx.textAlign = 'left';
  }

  // === Start ===
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
