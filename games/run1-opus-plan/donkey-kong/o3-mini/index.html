  <script>
    // Simplified Donkey Kong implementation
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game state
    let lastTime = 0;
    let gameOver = false;
    let score = 0;

    // Player (Mario)
    const player = {
      x: 50,
      y: canvas.height - 60,
      width: 20,
      height: 30,
      dx: 0,
      dy: 0,
      speed: 3
    };

    // Donkey Kong
    const kong = {
      x: canvas.width - 100,
      y: 50,
      width: 40,
      height: 40
    };

    // Barrels
    let barrels = [];
    let barrelTimer = 0;
    const barrelInterval = 3000;

    // Platforms
    const platforms = [
      { x: 0, y: canvas.height - 20, width: canvas.width, height: 20 },
      { x: 50, y: canvas.height - 120, width: 200, height: 10 },
      { x: 300, y: canvas.height - 220, width: 200, height: 10 },
      { x: 100, y: canvas.height - 320, width: 200, height: 10 }
    ];

    // Input handling
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function update(deltaTime) {
      // Player movement: left/right and jump
      if (keys['ArrowLeft']) {
        player.dx = -player.speed;
      } else if (keys['ArrowRight']) {
        player.dx = player.speed;
      } else {
        player.dx = 0;
      }

      // Simple jump mechanism
      if (keys['ArrowUp'] && onPlatform(player)) {
        player.dy = -7;
      }

      // Gravity
      player.dy += 0.3;

      player.x += player.dx;
      player.y += player.dy;

      // Collision with platforms
      platforms.forEach(plat => {
        if (rectIntersect(player, plat) && player.dy >= 0) {
          player.y = plat.y - player.height;
          player.dy = 0;
        }
      });

      // Keep player within canvas
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
        player.dy = 0;
      }

      // Update barrels
      barrelTimer += deltaTime;
      if (barrelTimer > barrelInterval) {
        spawnBarrel();
        barrelTimer = 0;
      }
      barrels.forEach((barrel, index) => {
        barrel.x += barrel.dx;
        barrel.y += barrel.dy;
        barrel.dy += 0.2; // gravity effect
        // Collision with platforms
        platforms.forEach(plat => {
          if(rectIntersect(barrel, plat) && barrel.dy > 0) {
            barrel.y = plat.y - barrel.height;
            barrel.dy = 0;
            barrel.dx = 2; // roll
          }
        });
        // Remove barrel if off screen
        if (barrel.x > canvas.width || barrel.y > canvas.height) {
          barrels.splice(index, 1);
          score += 10;
        }
      });

      // Check collision between player and barrels
      barrels.forEach(barrel => {
        if(rectIntersect(player, barrel)) {
          gameOver = true;
        }
      });
    }

    function spawnBarrel() {
      // Spawn barrel near kong's position
      barrels.push({
        x: kong.x,
        y: kong.y + kong.height,
        width: 15,
        height: 15,
        dx: -2,
        dy: 0
      });
    }

    function onPlatform(entity) {
      return platforms.some(plat => Math.abs((entity.y + entity.height) - plat.y) < 5 && entity.x + entity.width > plat.x && entity.x < plat.x + plat.width);
    }

    function rectIntersect(a, b) {
      return !(a.x > b.x + b.width || a.x + a.width < b.x || a.y > b.y + b.height || a.y + a.height < b.y);
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw platforms
      ctx.fillStyle = '#555';
      platforms.forEach(plat => {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
      });

      // Draw kong
      ctx.fillStyle = '#A52A2A';
      ctx.fillRect(kong.x, kong.y, kong.width, kong.height);

      // Draw player (Mario)
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw barrels
      ctx.fillStyle = '#FFA500';
      barrels.forEach(barrel => {
        ctx.fillRect(barrel.x, barrel.y, barrel.width, barrel.height);
      });

      // Draw score
      ctx.fillStyle = '#FFF';
      ctx.font = '16px Arial';
      ctx.fillText('Score: ' + score, 10, 20);

      if(gameOver){
        ctx.fillStyle = '#F00';
        ctx.font = '40px Arial';
        ctx.fillText('GAME OVER', canvas.width / 2 - 120, canvas.height / 2);
      }
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      if(!gameOver) {
        update(deltaTime);
      }
      draw();
      requestAnimationFrame(gameLoop);
