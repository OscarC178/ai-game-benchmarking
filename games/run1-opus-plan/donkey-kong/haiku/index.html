<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="700" height="800"></canvas>
  <script>
    // T01-T15: Complete Donkey Kong game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = 700;
    const CANVAS_HEIGHT = 800;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      DYING: 'DYING',
      LEVEL_COMPLETE: 'LEVEL_COMPLETE',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('donkeyKongHighScore') || '0'),
      lives: 3,
      level: 1,
      barrelInterval: 2500,
      barrelSpeed: 120,
      bonusTimer: 5000,
      maxBonusTimer: 5000,
      levelCompleteTimer: 2,
      deathTimer: 0
    };

    // Platforms: [leftX, rightX, leftY, rightY]
    const platforms = [
      { x1: 30, x2: 670, y1: 710, y2: 670, color: '#FF4444' },   // Platform 1 (slopes right-down)
      { x1: 30, x2: 670, y1: 570, y2: 610, color: '#FF6666' },   // Platform 2 (slopes left-down)
      { x1: 30, x2: 670, y1: 510, y2: 470, color: '#FF4444' },   // Platform 3 (slopes right-down)
      { x1: 30, x2: 670, y1: 370, y2: 410, color: '#FF6666' },   // Platform 4 (slopes left-down)
      { x1: 30, x2: 670, y1: 310, y2: 270, color: '#FF4444' },   // Platform 5 (slopes right-down)
      { x1: 100, x2: 500, y1: 100, y2: 100, color: '#FF8888' }   // Platform 6 (flat, DK platform)
    ];

    // Ladders: [x, topY, bottomY]
    const ladders = [
      { x: 600, topY: 100, bottomY: 710, broken: false },  // L1
      { x: 100, topY: 470, bottomY: 570, broken: false },  // L2
      { x: 500, topY: 370, bottomY: 510, broken: false },  // L3
      { x: 150, topY: 270, bottomY: 370, broken: false },  // L4
      { x: 400, topY: 100, bottomY: 310, broken: false }   // L5
    ];

    // Mario
    const mario = {
      x: 80,
      y: 710,
      width: 24,
      height: 32,
      velX: 0,
      velY: 0,
      isJumping: false,
      isClimbing: false,
      onPlatform: 0,
      dead: false,
      deathAnim: 0,
      hammerActive: false,
      hammerTimer: 0,
      direction: 1 // 1 = right, -1 = left
    };

    // Donkey Kong
    const dk = {
      x: 100,
      y: 80,
      width: 64,
      height: 56,
      nextBarrelTime: 2500,
      armAngle: 0,
      tossing: false
    };

    // Pauline
    const pauline = {
      x: 310,
      y: 38,
      width: 16,
      height: 28
    };

    // Barrels array
    let barrels = [];

    // Hammers: [x, y, active, platformIndex]
    const hammers = [
      { x: 200, y: 570, active: true, platformIdx: 1 },
      { x: 400, y: 370, active: true, platformIdx: 3 }
    ];

    // Oil drum
    const oilDrum = {
      x: 60,
      y: 680,
      width: 28,
      height: 32,
      flameAnim: 0
    };

    // Helper functions
    function getYOnPlatform(platformIdx, x) {
      const p = platforms[platformIdx];
      const t = (x - p.x1) / (p.x2 - p.x1);
      return p.y1 + t * (p.y2 - p.y1);
    }

    function getPlatformAtPos(x, y) {
      for (let i = 0; i < platforms.length; i++) {
        const p = platforms[i];
        const platformY = getYOnPlatform(i, x);
        if (x >= p.x1 && x <= p.x2 && y >= platformY - 2 && y <= platformY + 8) {
          return i;
        }
      }
      return -1;
    }

    function getNearestLadder(x) {
      for (let i = 0; i < ladders.length; i++) {
        if (Math.abs(x - ladders[i].x) < 8) {
          return i;
        }
      }
      return -1;
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.lives = 3;
      game.level = 1;
      game.barrelInterval = 2500;
      game.barrelSpeed = 120;
      game.bonusTimer = 5000;
      game.maxBonusTimer = 5000;
      mario.x = 80;
      mario.y = 710;
      mario.velX = 0;
      mario.velY = 0;
      mario.isJumping = false;
      mario.isClimbing = false;
      mario.dead = false;
      mario.hammerActive = false;
      mario.hammerTimer = 0;
      mario.onPlatform = 0;
      barrels = [];
      dk.nextBarrelTime = game.barrelInterval;
      hammers.forEach(h => { h.active = true; });
    }

    function nextLevel() {
      game.state = STATE.LEVEL_COMPLETE;
      game.levelCompleteTimer = 2;
      game.score += 500 + Math.max(0, Math.floor(game.bonusTimer / 100));
      game.level++;
      game.barrelInterval = Math.max(1000, game.barrelInterval - 500);
      game.barrelSpeed += 20;
      game.bonusTimer = 5000;
      game.maxBonusTimer = 5000;
      mario.x = 80;
      mario.y = 710;
      mario.velX = 0;
      mario.velY = 0;
      mario.isJumping = false;
      mario.isClimbing = false;
      mario.dead = false;
      mario.hammerActive = false;
      mario.hammerTimer = 0;
      mario.onPlatform = 0;
      barrels = [];
      dk.nextBarrelTime = game.barrelInterval;
      hammers.forEach(h => { h.active = true; });
    }

    function marioDeaths() {
      game.lives--;
      if (game.lives <= 0) {
        game.state = STATE.GAME_OVER;
        game.highScore = Math.max(game.highScore, game.score);
        localStorage.setItem('donkeyKongHighScore', game.highScore);
      } else {
        game.state = STATE.PLAYING;
        mario.x = 80;
        mario.y = 710;
        mario.velX = 0;
        mario.velY = 0;
        mario.isJumping = false;
        mario.isClimbing = false;
        mario.dead = false;
        mario.hammerActive = false;
        mario.hammerTimer = 0;
        mario.onPlatform = 0;
        barrels = [];
        dk.nextBarrelTime = game.barrelInterval;
      }
    }

    // Input handling
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        } else if (game.state === STATE.LEVEL_COMPLETE) {
          game.state = STATE.PLAYING;
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // Update function
    function updateGame(dt) {
      if (game.state !== STATE.PLAYING) return;

      // Bonus timer
      game.bonusTimer -= dt * 1000;
      if (game.bonusTimer <= 0) {
        marioDeaths();
        return;
      }

      // Mario movement
      if (!mario.isClimbing) {
        mario.velX = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) mario.velX = -150;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) mario.velX = 150;
      }

      // Climbing
      if (getNearestLadder(mario.x) >= 0 && (keys['ArrowUp'] || keys['w'] || keys['W'] || keys['ArrowDown'] || keys['s'] || keys['S'])) {
        mario.isClimbing = true;
        const ladderIdx = getNearestLadder(mario.x);
        mario.x = ladders[ladderIdx].x;
        if (keys['ArrowUp'] || keys['w'] || keys['W']) mario.y -= 100 * dt;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) mario.y += 100 * dt;
      } else {
        mario.isClimbing = false;
      }

      // Jump
      if ((keys[' '] || keys['Space']) && !mario.isJumping && !mario.isClimbing) {
        mario.isJumping = true;
        mario.velY = -340;
      }

      // Jumping physics
      if (mario.isJumping) {
        mario.velY += 900 * dt;
        mario.y += mario.velY * dt;
        mario.x += mario.velX * dt;

        // Check landing on platform
        const platformIdx = getPlatformAtPos(mario.x, mario.y + mario.height);
        if (platformIdx >= 0) {
          mario.isJumping = false;
          mario.velY = 0;
          mario.y = getYOnPlatform(platformIdx, mario.x) - mario.height;
          mario.onPlatform = platformIdx;
        }
      } else if (!mario.isClimbing) {
        // Walking on platform
        mario.x += mario.velX * dt;
        const platformIdx = mario.onPlatform;
        if (platformIdx >= 0) {
          const p = platforms[platformIdx];
          mario.x = Math.max(p.x1, Math.min(p.x2 - mario.width, mario.x));
          mario.y = getYOnPlatform(platformIdx, mario.x + mario.width / 2) - mario.height;
        }
      }

      // Hammer physics
      if (mario.hammerActive) {
        mario.hammerTimer -= dt;
        if (mario.hammerTimer <= 0) {
          mario.hammerActive = false;
        }
      }

      // Barrel spawning
      dk.nextBarrelTime -= dt * 1000;
      if (dk.nextBarrelTime <= 0) {
        barrels.push({
          x: dk.x + dk.width / 2,
          y: dk.y + dk.height,
          velX: (game.level % 2 === 1 ? 1 : -1) * game.barrelSpeed,
          velY: 0,
          platformIdx: 5,
          direction: game.level % 2 === 1 ? 1 : -1,
          hitMario: false
        });
        dk.nextBarrelTime = game.barrelInterval;
      }

      // Update barrels
      for (let i = barrels.length - 1; i >= 0; i--) {
        const barrel = barrels[i];
        const p = platforms[barrel.platformIdx];

        // Roll on platform
        barrel.x += barrel.velX * dt;

        // Check platform edge
        if (barrel.x < p.x1 || barrel.x > p.x2) {
          // Barrel falls to next platform or takes ladder
          if (barrel.platformIdx < platforms.length - 1) {
            const nextPlatformIdx = barrel.platformIdx + 1;
            const chance = Math.random();
            if (chance < 0.2) {
              // Take ladder down (simple implementation)
              barrel.platformIdx = nextPlatformIdx;
              barrel.y = platforms[nextPlatformIdx].y1 + 40;
              barrel.velX *= 0.5;
            } else {
              // Fall
              barrel.platformIdx = nextPlatformIdx;
              barrel.velY = 0;
              barrel.y = p.y2;
            }
          } else {
            barrels.splice(i, 1);
            continue;
          }
        }

        // Oil drum collision
        if (barrel.x > oilDrum.x && barrel.x < oilDrum.x + oilDrum.width &&
            barrel.y > oilDrum.y && barrel.y < oilDrum.y + oilDrum.height) {
          barrels.splice(i, 1);
          oilDrum.flameAnim = 1.0;
          continue;
        }

        // Mario collision
        if (barrel.x < mario.x + mario.width && barrel.x + 20 > mario.x &&
            barrel.y < mario.y + mario.height && barrel.y + 16 > mario.y) {
          if (mario.hammerActive) {
            barrels.splice(i, 1);
            game.score += 300;
          } else if (!mario.isJumping) {
            marioDeaths();
            return;
          } else if (barrel.y > mario.y + mario.height && !barrel.hitMario) {
            barrel.hitMario = true;
            game.score += 100;
          }
        }
      }

      // Hammer collection
      for (let i = 0; i < hammers.length; i++) {
        if (hammers[i].active && mario.x < hammers[i].x + 20 && mario.x + mario.width > hammers[i].x &&
            mario.y < hammers[i].y + 20 && mario.y + mario.height > hammers[i].y) {
          mario.hammerActive = true;
          mario.hammerTimer = 8;
          hammers[i].active = false;
        }
      }

      // Pauline collision
      if (mario.x < pauline.x + pauline.width && mario.x + mario.width > pauline.x &&
          mario.y < pauline.y + pauline.height && mario.y + mario.height > pauline.y) {
        nextLevel();
      }
    }

    // Render function
    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw platforms
      for (let i = 0; i < platforms.length; i++) {
        const p = platforms[i];
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y1);
        ctx.lineTo(p.x2, p.y2);
        ctx.lineTo(p.x2, p.y2 + 8);
        ctx.lineTo(p.x1, p.y1 + 8);
        ctx.closePath();
        ctx.fill();
      }

      // Draw ladders
      for (let i = 0; i < ladders.length; i++) {
        const l = ladders[i];
        ctx.strokeStyle = '#00CCFF';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(l.x - 10, l.topY);
        ctx.lineTo(l.x - 10, l.bottomY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(l.x + 10, l.topY);
        ctx.lineTo(l.x + 10, l.bottomY);
        ctx.stroke();

        // Rungs
        for (let y = l.topY; y <= l.bottomY; y += 16) {
          ctx.strokeStyle = '#00CCFF';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(l.x - 10, y);
          ctx.lineTo(l.x + 10, y);
          ctx.stroke();
        }
      }

      // Draw oil drum
      ctx.fillStyle = '#4444FF';
      ctx.fillRect(oilDrum.x, oilDrum.y, oilDrum.width, oilDrum.height);
      if (oilDrum.flameAnim > 0) {
        ctx.fillStyle = '#FF6600';
        ctx.fillRect(oilDrum.x + 4, oilDrum.y - 8, 20, 8);
        oilDrum.flameAnim -= 0.05;
      }

      // Draw Donkey Kong
      ctx.fillStyle = '#885522';
      ctx.fillRect(dk.x, dk.y, dk.width, dk.height);
      ctx.fillStyle = '#FFAA77';
      ctx.fillRect(dk.x + 20, dk.y + 10, 20, 16);

      // Draw Pauline
      ctx.fillStyle = '#FF66AA';
      ctx.fillRect(pauline.x, pauline.y, pauline.width, pauline.height);
      ctx.fillStyle = '#FFAA77';
      ctx.fillRect(pauline.x + 2, pauline.y + 2, 4, 6);
      if (Math.floor(Date.now() / 250) % 4 < 2) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('HELP!', pauline.x + pauline.width / 2, pauline.y - 10);
      }

      // Draw hammers
      for (let i = 0; i < hammers.length; i++) {
        if (hammers[i].active) {
          if (mario.hammerTimer > 2 && Math.floor(Date.now() / 100) % 2 === 0) continue;
          ctx.fillStyle = '#FFCC00';
          ctx.fillRect(hammers[i].x - 4, hammers[i].y - 8, 8, 12);
          ctx.fillStyle = '#885522';
          ctx.fillRect(hammers[i].x - 6, hammers[i].y + 4, 12, 4);
        }
      }

      // Draw barrels
      for (let i = 0; i < barrels.length; i++) {
        const barrel = barrels[i];
        ctx.fillStyle = '#CC6600';
        ctx.beginPath();
        ctx.ellipse(barrel.x + 10, barrel.y + 8, 10, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#884400';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(barrel.x + 2, barrel.y + 8);
        ctx.lineTo(barrel.x + 18, barrel.y + 8);
        ctx.stroke();
      }

      // Draw Mario
      if (game.state === STATE.DYING || !mario.dead || Math.floor(Date.now() / 100) % 2 === 0) {
        ctx.fillStyle = '#CC0000';
        ctx.fillRect(mario.x, mario.y + 8, mario.width, mario.height - 8);
        ctx.fillStyle = '#FFAA77';
        ctx.fillRect(mario.x, mario.y, mario.width, 8);

        if (mario.hammerActive && Math.floor(Date.now() / 100) % 2 === 0) {
          ctx.fillStyle = '#FFCC00';
          ctx.fillRect(mario.x + mario.width - 6, mario.y + 4, 8, 12);
        }
      }

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 24);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 24);

      ctx.textAlign = 'left';
      ctx.fillText(`Lives: ${game.lives}`, 10, 44);

      ctx.textAlign = 'right';
      ctx.fillText(`L=${game.level}`, CANVAS_WIDTH - 10, 44);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFFF00';
      ctx.fillText(`BONUS: ${Math.max(0, Math.floor(game.bonusTimer / 100))}`, CANVAS_WIDTH / 2, 24);

      // Bonus bar
      const barWidth = (game.bonusTimer / game.maxBonusTimer) * 200;
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(CANVAS_WIDTH / 2 - 100, 30, barWidth, 6);
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1;
      ctx.strokeRect(CANVAS_WIDTH / 2 - 100, 30, 200, 6);

      // Start screen
      if (game.state === STATE.IDLE) {
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('DONKEY KONG', CANVAS_WIDTH / 2, 320);

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 440);
      }

      // Pause screen
      if (game.state === STATE.PAUSED) {
        ctx.fillStyle = '#000000AA';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      }

      // Level complete screen
      if (game.state === STATE.LEVEL_COMPLETE) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE CLEAR!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      }

      // Game over screen
      if (game.state === STATE.GAME_OVER) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 40px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px monospace';
        ctx.fillText(`Score: ${game.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '16px monospace';
        ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
      }
    }

    // Game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING || game.state === STATE.LEVEL_COMPLETE) {
        updateGame(dt);
      }

      if (game.state === STATE.LEVEL_COMPLETE) {
        game.levelCompleteTimer -= dt;
        if (game.levelCompleteTimer <= 0) {
          game.state = STATE.PLAYING;
        }
      }

      render();
      requestAnimationFrame(gameLoop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)
