<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01-T13: Complete Asteroids game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const ASTEROID_LARGE_RADIUS = 40;
    const ASTEROID_MEDIUM_RADIUS = 20;
    const ASTEROID_SMALL_RADIUS = 10;
    const LARGE_SPEED_MIN = 50;
    const LARGE_SPEED_MAX = 80;
    const MEDIUM_SPEED_MIN = 80;
    const MEDIUM_SPEED_MAX = 120;
    const SMALL_SPEED_MIN = 120;
    const SMALL_SPEED_MAX = 180;
    const SHIP_TURN_SPEED = 270;
    const SHIP_ACCELERATION = 200;
    const SHIP_MAX_SPEED = 350;
    const SHIP_FRICTION = 0.99;
    const BULLET_SPEED = 500;
    const BULLET_LIFETIME = 0.8;
    const UFO_SPEED = 120;
    const UFO_FIRE_INTERVAL = 1.5;
    const UFO_SPAWN_INTERVAL = 25;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('asteroidsHighScore') || '0'),
      lives: 3,
      wave: 1,
      ufoSpawnTimer: 0
    };

    // Player ship
    const ship = {
      x: CANVAS_WIDTH / 2,
      y: CANVAS_HEIGHT / 2,
      angle: 0,
      vx: 0,
      vy: 0,
      isThrusting: false,
      invulnerable: false,
      invulnerableTimer: 0,
      blinkTimer: 0
    };

    // Arrays
    let asteroids = [];
    let bullets = [];
    let ufoBullets = [];
    let ufo = null;
    let respawnTimer = 0;

    // Input
    const keys = {};

    function generateAsteroidShape(radius) {
      const vertices = [];
      const vertexCount = 7 + Math.floor(Math.random() * 4);
      for (let i = 0; i < vertexCount; i++) {
        const angle = (i / vertexCount) * Math.PI * 2;
        const radiusVariation = radius * (0.7 + Math.random() * 0.6);
        vertices.push({
          x: Math.cos(angle) * radiusVariation,
          y: Math.sin(angle) * radiusVariation
        });
      }
      return vertices;
    }

    function spawnAsteroids() {
      asteroids = [];
      const count = 4 + game.wave - 1;
      for (let i = 0; i < count; i++) {
        let x, y, dist;
        do {
          x = Math.random() * CANVAS_WIDTH;
          y = Math.random() * CANVAS_HEIGHT;
          dist = Math.hypot(x - ship.x, y - ship.y);
        } while (dist < 150);

        asteroids.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 2 * LARGE_SPEED_MAX,
          vy: (Math.random() - 0.5) * 2 * LARGE_SPEED_MAX,
          radius: ASTEROID_LARGE_RADIUS,
          shape: generateAsteroidShape(ASTEROID_LARGE_RADIUS),
          size: 'large'
        });
      }
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.lives = 3;
      game.wave = 1;
      game.ufoSpawnTimer = 0;
      ship.x = CANVAS_WIDTH / 2;
      ship.y = CANVAS_HEIGHT / 2;
      ship.angle = 0;
      ship.vx = 0;
      ship.vy = 0;
      ship.invulnerable = false;
      asteroids = [];
      bullets = [];
      ufoBullets = [];
      ufo = null;
      respawnTimer = 0;
      spawnAsteroids();
    }

    function nextWave() {
      game.wave++;
      spawnAsteroids();
    }

    function respawnShip() {
      let canRespawn = true;
      for (const asteroid of asteroids) {
        const dist = Math.hypot(asteroid.x - ship.x, asteroid.y - ship.y);
        if (dist < 100 + asteroid.radius) {
          canRespawn = false;
          break;
        }
      }

      if (canRespawn) {
        ship.x = CANVAS_WIDTH / 2;
        ship.y = CANVAS_HEIGHT / 2;
        ship.angle = 0;
        ship.vx = 0;
        ship.vy = 0;
        ship.invulnerable = true;
        ship.invulnerableTimer = 2;
        ship.blinkTimer = 0;
        respawnTimer = 0;
      }
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }

      if (game.state === STATE.PLAYING) {
        if (e.key === ' ') {
          if (bullets.length < 4) {
            const angle = ship.angle;
            bullets.push({
              x: ship.x + Math.cos(angle) * 15,
              y: ship.y + Math.sin(angle) * 15,
              vx: Math.cos(angle) * BULLET_SPEED + ship.vx,
              vy: Math.sin(angle) * BULLET_SPEED + ship.vy,
              lifetime: BULLET_LIFETIME
            });
          }
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function updateShip(dt) {
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        ship.angle -= SHIP_TURN_SPEED * dt * Math.PI / 180;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        ship.angle += SHIP_TURN_SPEED * dt * Math.PI / 180;
      }

      ship.isThrusting = keys['ArrowUp'] || keys['w'] || keys['W'];
      if (ship.isThrusting) {
        ship.vx += Math.cos(ship.angle) * SHIP_ACCELERATION * dt;
        ship.vy += Math.sin(ship.angle) * SHIP_ACCELERATION * dt;
      }

      const speed = Math.hypot(ship.vx, ship.vy);
      if (speed > SHIP_MAX_SPEED) {
        ship.vx = (ship.vx / speed) * SHIP_MAX_SPEED;
        ship.vy = (ship.vy / speed) * SHIP_MAX_SPEED;
      }

      ship.vx *= SHIP_FRICTION;
      ship.vy *= SHIP_FRICTION;

      ship.x += ship.vx * dt;
      ship.y += ship.vy * dt;

      // Screen wrap
      if (ship.x < 0) ship.x = CANVAS_WIDTH;
      if (ship.x > CANVAS_WIDTH) ship.x = 0;
      if (ship.y < 0) ship.y = CANVAS_HEIGHT;
      if (ship.y > CANVAS_HEIGHT) ship.y = 0;

      if (ship.invulnerable) {
        ship.invulnerableTimer -= dt;
        if (ship.invulnerableTimer <= 0) {
          ship.invulnerable = false;
        }
        ship.blinkTimer += dt;
      }
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.lifetime -= dt;
        if (bullet.lifetime <= 0) {
          bullets.splice(i, 1);
          continue;
        }

        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;

        // Screen wrap
        if (bullet.x < 0) bullet.x = CANVAS_WIDTH;
        if (bullet.x > CANVAS_WIDTH) bullet.x = 0;
        if (bullet.y < 0) bullet.y = CANVAS_HEIGHT;
        if (bullet.y > CANVAS_HEIGHT) bullet.y = 0;
      }
    }

    function updateAsteroids(dt) {
      for (const asteroid of asteroids) {
        asteroid.x += asteroid.vx * dt;
        asteroid.y += asteroid.vy * dt;

        // Screen wrap
        if (asteroid.x < -asteroid.radius) asteroid.x = CANVAS_WIDTH + asteroid.radius;
        if (asteroid.x > CANVAS_WIDTH + asteroid.radius) asteroid.x = -asteroid.radius;
        if (asteroid.y < -asteroid.radius) asteroid.y = CANVAS_HEIGHT + asteroid.radius;
        if (asteroid.y > CANVAS_HEIGHT + asteroid.radius) asteroid.y = -asteroid.radius;
      }
    }

    function updateUFO(dt) {
      if (ufo) {
        ufo.x += ufo.vx * dt;
        ufo.fireTimer -= dt;

        if (ufo.fireTimer <= 0) {
          const dx = ship.x - ufo.x;
          const dy = ship.y - ufo.y;
          const dist = Math.hypot(dx, dy);
          ufoBullets.push({
            x: ufo.x,
            y: ufo.y,
            vx: (dx / dist) * 350,
            vy: (dy / dist) * 350,
            lifetime: 5
          });
          ufo.fireTimer = UFO_FIRE_INTERVAL;
        }

        // Screen wrap (horizontal only)
        if (ufo.x < -16) ufo.x = CANVAS_WIDTH + 16;
        if (ufo.x > CANVAS_WIDTH + 16) ufo.x = -16;

        // Random despawn after 15-30 seconds
        ufo.lifetime -= dt;
        if (ufo.lifetime <= 0) {
          ufo = null;
        }
      }

      game.ufoSpawnTimer += dt;
      if (!ufo && game.ufoSpawnTimer > UFO_SPAWN_INTERVAL) {
        game.ufoSpawnTimer = 0;
        ufo = {
          x: Math.random() < 0.5 ? -16 : CANVAS_WIDTH + 16,
          y: Math.random() * CANVAS_HEIGHT,
          vx: UFO_SPEED * (Math.random() < 0.5 ? -1 : 1),
          fireTimer: UFO_FIRE_INTERVAL,
          lifetime: 15 + Math.random() * 15
        };
      }
    }

    function updateUFOBullets(dt) {
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        const bullet = ufoBullets[i];
        bullet.lifetime -= dt;
        if (bullet.lifetime <= 0) {
          ufoBullets.splice(i, 1);
          continue;
        }

        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
      }
    }

    function checkCollisions() {
      // Bullet ↔ Asteroid
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const asteroid = asteroids[j];
          const dist = Math.hypot(bullet.x - asteroid.x, bullet.y - asteroid.y);
          if (dist < bullet.vx > 0 ? 5 + asteroid.radius : asteroid.radius) {
            // Hit
            bullets.splice(i, 1);
            asteroids.splice(j, 1);

            if (asteroid.size === 'large') {
              game.score += 20;
              const angle = Math.atan2(bullet.vy, bullet.vx);
              for (let k = 0; k < 2; k++) {
                const childAngle = angle + (k === 0 ? -Math.PI / 6 : Math.PI / 6);
                const speed = MEDIUM_SPEED_MIN + Math.random() * (MEDIUM_SPEED_MAX - MEDIUM_SPEED_MIN);
                asteroids.push({
                  x: asteroid.x,
                  y: asteroid.y,
                  vx: Math.cos(childAngle) * speed,
                  vy: Math.sin(childAngle) * speed,
                  radius: ASTEROID_MEDIUM_RADIUS,
                  shape: generateAsteroidShape(ASTEROID_MEDIUM_RADIUS),
                  size: 'medium'
                });
              }
            } else if (asteroid.size === 'medium') {
              game.score += 50;
              const angle = Math.atan2(bullet.vy, bullet.vx);
              for (let k = 0; k < 2; k++) {
                const childAngle = angle + (k === 0 ? -Math.PI / 6 : Math.PI / 6);
                const speed = SMALL_SPEED_MIN + Math.random() * (SMALL_SPEED_MAX - SMALL_SPEED_MIN);
                asteroids.push({
                  x: asteroid.x,
                  y: asteroid.y,
                  vx: Math.cos(childAngle) * speed,
                  vy: Math.sin(childAngle) * speed,
                  radius: ASTEROID_SMALL_RADIUS,
                  shape: generateAsteroidShape(ASTEROID_SMALL_RADIUS),
                  size: 'small'
                });
              }
            } else {
              game.score += 100;
            }

            if (game.score % 10000 >= (game.score - 100) % 10000) {
              game.lives++;
            }

            if (asteroids.length === 0) {
              nextWave();
            }
            return;
          }
        }
      }

      // Bullet ↔ UFO
      if (ufo) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          const dist = Math.hypot(bullet.x - ufo.x, bullet.y - ufo.y);
          if (dist < 5 + 16) {
            bullets.splice(i, 1);
            game.score += 200;
            ufo = null;
            game.ufoSpawnTimer = 0;
            return;
          }
        }
      }

      // Ship ↔ Asteroid
      if (!ship.invulnerable) {
        for (const asteroid of asteroids) {
          const dist = Math.hypot(ship.x - asteroid.x, ship.y - asteroid.y);
          if (dist < 15 + asteroid.radius) {
            game.lives--;
            if (game.lives <= 0) {
              game.state = STATE.GAME_OVER;
              game.highScore = Math.max(game.highScore, game.score);
              localStorage.setItem('asteroidsHighScore', game.highScore);
            } else {
              respawnTimer = 2;
              bullets = [];
              ufoBullets = [];
            }
            return;
          }
        }
      }

      // Ship ↔ UFO Bullet
      if (!ship.invulnerable) {
        for (let i = ufoBullets.length - 1; i >= 0; i--) {
          const bullet = ufoBullets[i];
          const dist = Math.hypot(ship.x - bullet.x, ship.y - bullet.y);
          if (dist < 15 + 2) {
            ufoBullets.splice(i, 1);
            game.lives--;
            if (game.lives <= 0) {
              game.state = STATE.GAME_OVER;
              game.highScore = Math.max(game.highScore, game.score);
              localStorage.setItem('asteroidsHighScore', game.highScore);
            } else {
              respawnTimer = 2;
              bullets = [];
            }
            return;
          }
        }
      }
    }

    function updateGame(dt) {
      if (respawnTimer > 0) {
        respawnTimer -= dt;
        if (respawnTimer <= 0) {
          respawnShip();
        }
      } else {
        updateShip(dt);
      }

      updateBullets(dt);
      updateAsteroids(dt);
      updateUFO(dt);
      updateUFOBullets(dt);
      checkCollisions();
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderGameScreen() {
      // Asteroids
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1.5;
      for (const asteroid of asteroids) {
        ctx.beginPath();
        for (let i = 0; i < asteroid.shape.length; i++) {
          const vertex = asteroid.shape[i];
          const x = asteroid.x + vertex.x;
          const y = asteroid.y + vertex.y;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      // UFO
      if (ufo) {
        ctx.strokeStyle = '#FF4444';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(ufo.x, ufo.y + 2, 16, 6, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(ufo.x, ufo.y - 3, 10, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Bullets
      ctx.fillStyle = '#FFFFFF';
      for (const bullet of bullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // UFO Bullets
      ctx.fillStyle = '#FF4444';
      for (const bullet of ufoBullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ship
      if (respawnTimer <= 0 && (!ship.invulnerable || Math.floor(ship.blinkTimer * 8) % 2 === 0)) {
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const angle = ship.angle;
        const nosex = ship.x + Math.cos(angle) * 18;
        const nosey = ship.y + Math.sin(angle) * 18;
        const leftx = ship.x + Math.cos(angle + 2.46) * 12;
        const lefty = ship.y + Math.sin(angle + 2.46) * 12;
        const rightx = ship.x + Math.cos(angle - 2.46) * 12;
        const righty = ship.y + Math.sin(angle - 2.46) * 12;
        ctx.moveTo(nosex, nosey);
        ctx.lineTo(leftx, lefty);
        ctx.lineTo(rightx, righty);
        ctx.closePath();
        ctx.stroke();

        // Exhaust
        if (ship.isThrusting) {
          ctx.strokeStyle = '#FF8800';
          ctx.lineWidth = 1;
          ctx.beginPath();
          const exhaustx1 = ship.x + Math.cos(angle + Math.PI) * 10;
          const exhausty1 = ship.y + Math.sin(angle + Math.PI) * 10;
          const exhaustx2 = ship.x + Math.cos(angle + Math.PI + 0.3) * 15;
          const exhausty2 = ship.y + Math.sin(angle + Math.PI + 0.3) * 15;
          const exhaustx3 = ship.x + Math.cos(angle + Math.PI - 0.3) * 15;
          const exhausty3 = ship.y + Math.sin(angle + Math.PI - 0.3) * 15;
          ctx.moveTo(exhaustx1, exhausty1);
          ctx.lineTo(exhaustx2, exhausty2);
          ctx.lineTo(exhaustx3, exhausty3);
          ctx.closePath();
          ctx.stroke();
        }
      }

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 30);

      ctx.font = '14px monospace';
      ctx.fillText(`Lives: ${game.lives}`, 10, 55);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 30);
    }

    function renderStartScreen() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 52px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ASTEROIDS', CANVAS_WIDTH / 2, 220);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 360);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${game.score}`, CANVAS_WIDTH / 2, 310);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING) {
        updateGame(dt);
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start
    gameLoop();
  </script>
</body>
</html>
