<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #000; display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // Asteroids game variables
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Player spaceship
    const ship = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angle: 0,
      radius: 15,
      thrust: 0,
      velocity: { x: 0, y: 0 }
    };

    // Input
    let keys = {};
    document.addEventListener('keydown', (e) => { keys[e.key] = true; });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // Asteroids
    const asteroids = [];
    const asteroidNum = 5;
    for (let i = 0; i < asteroidNum; i++) {
      asteroids.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 20 + Math.random() * 30,
        angle: Math.random() * Math.PI * 2,
        velocity: {
          x: (Math.random() - 0.5) * 2,
          y: (Math.random() - 0.5) * 2
        }
      });
    }

    // Bullets
    let bullets = [];

    // Game loop timing
    let lastTime = 0;

    function update(dt) {
      // Rotate and thrust ship
      if (keys['ArrowLeft']) {
        ship.angle -= 0.05;
      }
      if (keys['ArrowRight']) {
        ship.angle += 0.05;
      }
      if (keys['ArrowUp']) {
        ship.thrust = 0.1;
      } else {
        ship.thrust = 0;
      }
      // Shoot bullet on space press (one bullet per keydown event)
      if (keys[' ']) {
        if (!ship.canShoot) {
          // already shot this keydown
        } else {
          const bulletSpeed = 5;
          bullets.push({
            x: ship.x + Math.cos(ship.angle) * ship.radius,
            y: ship.y + Math.sin(ship.angle) * ship.radius,
            velocity: {
              x: Math.cos(ship.angle) * bulletSpeed + ship.velocity.x,
              y: Math.sin(ship.angle) * bulletSpeed + ship.velocity.y
            },
            radius: 2,
            life: 60
          });
          ship.canShoot = false;
        }
      } else {
        ship.canShoot = true;
      }
      
      // Update ship velocity & position
      ship.velocity.x += Math.cos(ship.angle) * ship.thrust;
      ship.velocity.y += Math.sin(ship.angle) * ship.thrust;
      ship.x += ship.velocity.x;
      ship.y += ship.velocity.y;
      
      // Screen wrapping for ship
      if (ship.x < 0) ship.x = canvas.width;
      if (ship.x > canvas.width) ship.x = 0;
      if (ship.y < 0) ship.y = canvas.height;
      if (ship.y > canvas.height) ship.y = 0;

      // Update asteroids
      asteroids.forEach(ast => {
        ast.x += ast.velocity.x;
        ast.y += ast.velocity.y;
        if (ast.x < 0) ast.x = canvas.width;
        if (ast.x > canvas.width) ast.x = 0;
        if (ast.y < 0) ast.y = canvas.height;
        if (ast.y > canvas.height) ast.y = 0;
      });

      // Update bullets
      bullets.forEach((b, i) => {
        b.x += b.velocity.x;
        b.y += b.velocity.y;
        b.life--;
      });
      bullets = bullets.filter(b => b.life > 0);

      // Collision detection: bullets and asteroids
      bullets.forEach((b, bi) => {
        asteroids.forEach((ast, ai) => {
          const dx = b.x - ast.x;
          const dy = b.y - ast.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < b.radius + ast.radius) {
            // Remove asteroid and bullet
            asteroids.splice(ai, 1);
            bullets.splice(bi, 1);
          }
        });
      });
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      ctx.beginPath();
      ctx.moveTo(15, 0);
      ctx.lineTo(-10, 10);
      ctx.lineTo(-10, -10);
      ctx.closePath();
      ctx.strokeStyle = '#FFF';
      ctx.stroke();
      ctx.restore();
    }

    function drawAsteroids() {
      asteroids.forEach(ast => {
        ctx.beginPath();
        ctx.arc(ast.x, ast.y, ast.radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFF';
        ctx.stroke();
      });
    }

    function drawBullets() {
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#F00';
        ctx.fill();
      });
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawShip();
      drawAsteroids();
      drawBullets();
    }

    function gameLoop(timestamp) {
      let dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
