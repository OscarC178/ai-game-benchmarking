<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;

<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01: HTML5 scaffold — canvas 800×600, black bg, cursor:none

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // T02: Game loop constants
    const WIDTH = 800;
    const HEIGHT = 600;

    // T03: State machine
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // T05: Brick layout constants
    const BRICK_COLS = 10;
    const BRICK_ROWS = 6;
    const BRICK_W = 70;
    const BRICK_H = 20;
    const BRICK_GAP_X = 6;
    const BRICK_GAP_Y = 4;
    const BRICK_OFFSET_X = 19;
    const BRICK_OFFSET_Y = 50;

    const BRICK_COLORS = ['#FF0000', '#FF6600', '#FFCC00', '#00CC00', '#0088FF', '#8800FF'];
    const BRICK_POINTS = [7, 5, 4, 3, 2, 1];

    // T04: Paddle constants
    const PADDLE_W = 100;
    const PADDLE_H = 14;
    const PADDLE_SPEED = 500; // px/s
    const PADDLE_START_X = 350;
    const PADDLE_START_Y = 560;

    // T06: Ball constants
    const BALL_RADIUS = 8;
    const BALL_START_X = 400;
    const BALL_START_Y = 550;
    const BALL_BASE_SPEED = 350;
    const BALL_SPEED_INC = 20;
    const BALL_SPEED_CAP = 500;

    // Game state
    let gameState = STATE.IDLE;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let level = 1;
    let ballAttached = true; // sub-state: ball on paddle before launch

    // Load high score
    try {
      const stored = localStorage.getItem('breakoutHighScore');
      if (stored) highScore = parseInt(stored, 10) || 0;
    } catch (_) {}

    // Paddle
    const paddle = {
      x: PADDLE_START_X,
      y: PADDLE_START_Y,
      w: PADDLE_W,
      h: PADDLE_H
    };

    // Ball
    const ball = {
      x: BALL_START_X,
      y: BALL_START_Y,
      r: BALL_RADIUS,
      vx: 0,
      vy: 0,
      speed: BALL_BASE_SPEED
    };

    // T05: Brick grid
    let bricks = [];

    function initBricks() {
      bricks = [];
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          bricks.push({
            x: BRICK_OFFSET_X + col * (BRICK_W + BRICK_GAP_X),
            y: BRICK_OFFSET_Y + row * (BRICK_H + BRICK_GAP_Y),
            w: BRICK_W,
            h: BRICK_H,
            color: BRICK_COLORS[row],
            points: BRICK_POINTS[row],
            alive: true
          });
        }
      }
    }

    // Input tracking
    const keys = {};
    let mouseX = -1;

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;

      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        if (gameState === STATE.PLAYING && ballAttached) {
          launchBall();
        }
      }

      if (e.code === 'Enter' || e.key === 'Enter') {
        if (gameState === STATE.IDLE || gameState === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.code === 'KeyP' || e.key === 'p' || e.key === 'P') {
        if (gameState === STATE.PLAYING) {
          gameState = STATE.PAUSED;
        } else if (gameState === STATE.PAUSED) {
          gameState = STATE.PLAYING;
          lastTimestamp = null; // prevent dt spike on resume
        }
      }

      // Prevent arrow key scrolling
      if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = WIDTH / rect.width;
      mouseX = (e.clientX - rect.left) * scaleX;
    });

    // T06: Launch ball
    function launchBall() {
      ballAttached = false;
      // Random angle 225°–315° (pointing upward)
      // 225° = left-up, 315° = right-up (measuring from positive-x, counter-clockwise)
      // In canvas coords: 225° = (-cos45, -sin45), 315° = (cos45, -sin45)
      // Angles in range produce upward direction
      const angleRange = 90; // degrees
      const minAngle = 225;
      const angleDeg = minAngle + Math.random() * angleRange;
      const angleRad = (angleDeg * Math.PI) / 180;
      ball.vx = Math.cos(angleRad) * ball.speed;
      ball.vy = Math.sin(angleRad) * ball.speed;
    }

    // Start / restart game
    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      ball.speed = BALL_BASE_SPEED;
      initBricks();
      resetBall();
      gameState = STATE.PLAYING;
    }

    function resetBall() {
      ballAttached = true;
      paddle.x = PADDLE_START_X;
      ball.vx = 0;
      ball.vy = 0;
      ball.x = paddle.x + PADDLE_W / 2;
      ball.y = PADDLE_START_Y - BALL_RADIUS;
    }

    function attachBallToPaddle() {
      ball.x = paddle.x + PADDLE_W / 2;
      ball.y = paddle.y - BALL_RADIUS;
    }

    // T10: Level advance
    function advanceLevel() {
      level++;
      ball.speed = Math.min(BALL_BASE_SPEED + (level - 1) * BALL_SPEED_INC, BALL_SPEED_CAP);
      initBricks();
      resetBall();
    }

    // T09: Audio
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          try { audioCtx = new AudioContextClass(); } catch (_) {}
        }
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
    }

    function playTone(type, freq, duration, freqEnd) {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (freqEnd !== undefined) {
          osc.frequency.linearRampToValueAtTime(freqEnd, now + duration);
        }
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (_) {}
    }

    function playPaddleHit() { playTone('square', 440, 0.03); }
    function playBrickHit()  { playTone('square', 660, 0.03); }
    function playLoseLife()  { playTone('sawtooth', 440, 0.3, 110); }
    function playLevelClear() {
      // Ascending arpeggio 440→880Hz over 400ms
      if (!audioCtx) return;
      const freqs = [440, 554, 659, 880];
      freqs.forEach((f, i) => {
        setTimeout(() => playTone('square', f, 0.1), i * 100);
      });
    }

    // T08: Brick collision — determine face hit
    function ballBrickCollision(brick) {
      // Expand brick by ball radius for circle-AABB overlap check
      const bx = brick.x - ball.r;
      const by = brick.y - ball.r;
      const bw = brick.w + ball.r * 2;
      const bh = brick.h + ball.r * 2;

      if (ball.x < bx || ball.x > bx + bw || ball.y < by || ball.y > by + bh) {
        return false;
      }

      // Determine which face was hit by checking overlap depth on each axis
      const overlapLeft   = (ball.x) - brick.x;
      const overlapRight  = (brick.x + brick.w) - ball.x;
      const overlapTop    = (ball.y) - brick.y;
      const overlapBottom = (brick.y + brick.h) - ball.y;

      const minX = Math.min(overlapLeft, overlapRight);
      const minY = Math.min(overlapTop, overlapBottom);

      if (minX < minY) {
        // Hit left or right face — reflect x
        ball.vx = -ball.vx;
      } else {
        // Hit top or bottom face — reflect y
        ball.vy = -ball.vy;
      }

      return true;
    }

    // T07: Paddle collision (circle-rect)
    function ballPaddleCollision() {
      // Find closest point on paddle rect to ball center
      const closestX = Math.max(paddle.x, Math.min(ball.x, paddle.x + paddle.w));
      const closestY = Math.max(paddle.y, Math.min(ball.y, paddle.y + paddle.h));
      const dx = ball.x - closestX;
      const dy = ball.y - closestY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > ball.r) return false;
      if (ball.vy < 0) return false; // ball moving up, skip

      // Reflect based on hit offset from paddle center
      const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2); // -1 to 1
      const maxAngle = 60 * (Math.PI / 180);
      const angle = offset * maxAngle;

      // Maintain current speed, set direction
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      ball.vx = Math.sin(angle) * speed;
      ball.vy = -Math.abs(Math.cos(angle) * speed);

      // Push ball above paddle to prevent sticking
      ball.y = paddle.y - ball.r - 1;

      return true;
    }

    // T02: Main game loop
    let lastTimestamp = null;

    function gameLoop(timestamp) {
      if (!lastTimestamp) lastTimestamp = timestamp;
      let dt = (timestamp - lastTimestamp) / 1000;
      lastTimestamp = timestamp;

      // Cap dt to prevent tunneling at low frame rates
      if (dt > 0.05) dt = 0.05;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      if (gameState !== STATE.PLAYING) return;

      // T04: Move paddle
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        paddle.x -= PADDLE_SPEED * dt;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        paddle.x += PADDLE_SPEED * dt;
      }

      // Mouse tracking
      if (mouseX >= 0) {
        paddle.x = mouseX - paddle.w / 2;
      }

      // Clamp paddle to canvas
      paddle.x = Math.max(0, Math.min(WIDTH - paddle.w, paddle.x));

      // T06: Ball attached to paddle
      if (ballAttached) {
        attachBallToPaddle();
        return;
      }

      // Move ball
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // T06: Wall bounces
      // Top wall
      if (ball.y - ball.r <= 0) {
        ball.y = ball.r + 1;
        ball.vy = Math.abs(ball.vy);
      }
      // Left wall
      if (ball.x - ball.r <= 0) {
        ball.x = ball.r + 1;
        ball.vx = Math.abs(ball.vx);
      }
      // Right wall
      if (ball.x + ball.r >= WIDTH) {
        ball.x = WIDTH - ball.r - 1;
        ball.vx = -Math.abs(ball.vx);
      }

      // T07: Paddle collision
      ballPaddleCollision() && playPaddleHit();

      // T08: Brick collision — only first brick per frame
      let brickHit = false;
      for (let i = 0; i < bricks.length; i++) {
        const brick = bricks[i];
        if (!brick.alive) continue;
        if (brickHit) break;

        if (ballBrickCollision(brick)) {
          brick.alive = false;
          score += brick.points;
          if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('breakoutHighScore', highScore); } catch (_) {}
          }
          playBrickHit();
          brickHit = true;
        }
      }

      // T10: Check level clear
      const remaining = bricks.filter(b => b.alive).length;
      if (remaining === 0) {
        playLevelClear();
        advanceLevel();
        return;
      }

      // T10: Ball falls below paddle — lose life
      if (ball.y - ball.r > HEIGHT) {
        lives--;
        playLoseLife();
        if (lives <= 0) {
          lives = 0;
          if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('breakoutHighScore', highScore); } catch (_) {}
          }
          gameState = STATE.GAME_OVER;
        } else {
          resetBall();
        }
      }
    }

    // ---- Render ----
    function render() {
      // T02: Clear canvas
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (gameState === STATE.IDLE) {
        renderStartScreen();
        return;
      }

      // T05: Draw bricks
      for (const brick of bricks) {
        if (!brick.alive) continue;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
      }

      // T04: Draw paddle
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

      // T06: Draw ball
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      // T09/T10: Draw HUD
      renderHUD();

      // Overlay states
      if (gameState === STATE.PAUSED) {
        renderPauseOverlay();
      } else if (gameState === STATE.GAME_OVER) {
        renderGameOverScreen();
      }
    }

    function renderHUD() {
      // Score: top-left
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('Score: ' + score, 10, 24);

      // High score: top-right (just to the left of lives)
      ctx.textAlign = 'right';
      ctx.fillText('Best: ' + highScore, WIDTH - 10 - 80, 24);

      // Level: top-center
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level, WIDTH / 2, 24);

      // Lives: top-right
      ctx.fillStyle = '#FF0000';
      ctx.font = '18px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('♥'.repeat(lives), WIDTH - 10, 24);
    }

    function renderStartScreen() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '56px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('BREAKOUT', WIDTH / 2, 250);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', WIDTH / 2, 330);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 + 12);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '40px monospace';
      ctx.fillText('GAME OVER', WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText('Score: ' + score, WIDTH / 2, 310);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', WIDTH / 2, 360);
    }

    // T03: Initialize and start loop
    initBricks();
    resetBall();

    // Ensure audio context on first user interaction
    document.addEventListener('keydown', ensureAudio, { once: false });
    canvas.addEventListener('click', ensureAudio, { once: true });

    requestAnimationFrame(gameLoop);
  </script>
