<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #444;
      background: #000000;
      cursor: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01-T12: Complete Breakout game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const PADDLE_WIDTH = 100;
    const PADDLE_HEIGHT = 14;
    const PADDLE_Y = 560;
    const PADDLE_SPEED = 500;
    const BALL_RADIUS = 8;
    const BALL_BASE_SPEED = 350;
    const BALL_MAX_SPEED = 500;
    const BALL_SPEED_INCREMENT = 20;
    const BRICK_WIDTH = 70;
    const BRICK_HEIGHT = 20;
    const BRICK_SPACING_H = 6;
    const BRICK_SPACING_V = 4;
    const BRICK_COLS = 10;
    const BRICK_ROWS = 6;
    const BRICK_OFFSET_X = 19;
    const BRICK_OFFSET_Y = 50;

    // Colors
    const COLOR_BG = '#000000';
    const COLOR_PADDLE = '#FFFFFF';
    const COLOR_BALL = '#FFFFFF';
    const COLOR_OVERLAY = '#000000CC';
    const BRICK_COLORS = ['#FF0000', '#FF6600', '#FFCC00', '#00CC00', '#0088FF', '#8800FF'];
    const BRICK_POINTS = [7, 5, 4, 3, 2, 1];

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      BALL_ATTACHED: 'BALL_ATTACHED',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('breakoutHighScore') || '0'),
      lives: 3,
      level: 1,
      ballSpeed: BALL_BASE_SPEED
    };

    // Paddle
    const paddle = {
      x: (CANVAS_WIDTH - PADDLE_WIDTH) / 2,
      y: PADDLE_Y,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dx: 0
    };

    // Ball
    const ball = {
      x: paddle.x + paddle.width / 2,
      y: paddle.y - BALL_RADIUS - 5,
      vx: 0,
      vy: 0,
      radius: BALL_RADIUS,
      speed: game.ballSpeed
    };

    // Bricks
    let bricks = [];

    // Input
    const keys = {};
    let mouseX = CANVAS_WIDTH / 2;

    // Initialize bricks
    function initBricks() {
      bricks = [];
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          bricks.push({
            x: BRICK_OFFSET_X + col * (BRICK_WIDTH + BRICK_SPACING_H),
            y: BRICK_OFFSET_Y + row * (BRICK_HEIGHT + BRICK_SPACING_V),
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            color: BRICK_COLORS[row],
            points: BRICK_POINTS[row],
            alive: true
          });
        }
      }
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }

      if (e.key === ' ' && game.state === STATE.BALL_ATTACHED) {
        launchBall();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    window.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
    });

    function startGame() {
      game.state = STATE.BALL_ATTACHED;
      game.score = 0;
      game.lives = 3;
      game.level = 1;
      game.ballSpeed = BALL_BASE_SPEED;
      initBricks();
      resetBall();
    }

    function resetBall() {
      game.state = STATE.BALL_ATTACHED;
      ball.x = paddle.x + paddle.width / 2;
      ball.y = paddle.y - BALL_RADIUS - 5;
      ball.vx = 0;
      ball.vy = 0;
    }

    function launchBall() {
      game.state = STATE.PLAYING;
      const angle = 225 + Math.random() * 90;
      const radians = angle * Math.PI / 180;
      ball.vx = Math.cos(radians) * game.ballSpeed;
      ball.vy = Math.sin(radians) * game.ballSpeed;
    }

    function nextLevel() {
      game.level++;
      game.ballSpeed = Math.min(game.ballSpeed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);
      initBricks();
      resetBall();
    }

    function updatePaddle(dt) {
      paddle.dx = 0;

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        paddle.dx = -PADDLE_SPEED;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        paddle.dx = PADDLE_SPEED;
      }

      // Mouse tracking
      paddle.x = Math.max(0, Math.min(mouseX - paddle.width / 2, CANVAS_WIDTH - paddle.width));

      // Keyboard movement (additive)
      const newX = paddle.x + paddle.dx * dt;
      paddle.x = Math.max(0, Math.min(newX, CANVAS_WIDTH - paddle.width));
    }

    function updateBall(dt) {
      // Update position
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Top wall collision
      if (ball.y - ball.radius <= 0) {
        ball.y = ball.radius;
        ball.vy = -ball.vy;
      }

      // Left/right wall collision
      if (ball.x - ball.radius <= 0) {
        ball.x = ball.radius;
        ball.vx = -ball.vx;
      }
      if (ball.x + ball.radius >= CANVAS_WIDTH) {
        ball.x = CANVAS_WIDTH - ball.radius;
        ball.vx = -ball.vx;
      }

      // Paddle collision
      if (
        ball.x + ball.radius >= paddle.x &&
        ball.x - ball.radius <= paddle.x + paddle.width &&
        ball.y + ball.radius >= paddle.y &&
        ball.y - ball.radius <= paddle.y + paddle.height
      ) {
        ball.y = paddle.y - ball.radius;
        const offset = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        const angle = offset * (60 * Math.PI / 180);
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.abs(Math.cos(angle)) * speed;
      }

      // Brick collision
      for (let i = 0; i < bricks.length; i++) {
        const brick = bricks[i];
        if (!brick.alive) continue;

        if (
          ball.x + ball.radius >= brick.x &&
          ball.x - ball.radius <= brick.x + brick.width &&
          ball.y + ball.radius >= brick.y &&
          ball.y - ball.radius <= brick.y + brick.height
        ) {
          brick.alive = false;
          game.score += brick.points;

          // Determine hit face
          const overlapLeft = ball.x + ball.radius - brick.x;
          const overlapRight = brick.x + brick.width - (ball.x - ball.radius);
          const overlapTop = ball.y + ball.radius - brick.y;
          const overlapBottom = brick.y + brick.height - (ball.y - ball.radius);

          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapLeft || minOverlap === overlapRight) {
            ball.vx = -ball.vx;
          } else {
            ball.vy = -ball.vy;
          }

          // Check level clear
          const aliveBricks = bricks.filter(b => b.alive).length;
          if (aliveBricks === 0) {
            nextLevel();
          }

          break; // Only one brick per frame
        }
      }

      // Bottom collision (lose life)
      if (ball.y > CANVAS_HEIGHT) {
        game.lives--;
        if (game.lives <= 0) {
          game.state = STATE.GAME_OVER;
          game.highScore = Math.max(game.highScore, game.score);
          localStorage.setItem('breakoutHighScore', game.highScore);
        } else {
          resetBall();
        }
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.BALL_ATTACHED || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderStartScreen() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BREAKOUT', CANVAS_WIDTH / 2, 250);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 330);
    }

    function renderGameScreen() {
      // Bricks
      for (const brick of bricks) {
        if (brick.alive) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        }
      }

      // Paddle
      ctx.fillStyle = COLOR_PADDLE;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

      // Ball
      ctx.fillStyle = COLOR_BALL;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 24);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText(`Level: ${game.level}`, CANVAS_WIDTH / 2, 24);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#FF0000';
      ctx.font = '18px monospace';
      ctx.fillText('♥'.repeat(game.lives), CANVAS_WIDTH - 10, 24);

      // High score
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 50);

      // Launch prompt
      if (game.state === STATE.BALL_ATTACHED) {
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Press SPACE to launch', CANVAS_WIDTH / 2, 100);
      }
    }

    function renderPauseOverlay() {
      ctx.fillStyle = COLOR_OVERLAY;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = COLOR_OVERLAY;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${game.score}`, CANVAS_WIDTH / 2, 310);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING || game.state === STATE.BALL_ATTACHED) {
        updatePaddle(dt);
      }

      if (game.state === STATE.PLAYING) {
        updateBall(dt);
      } else if (game.state === STATE.BALL_ATTACHED) {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - BALL_RADIUS - 5;
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Initialize and start
    initBricks();
    gameLoop();
  </script>
</body>
</html>
