  <script>
    // Simple Pac-Man implementation
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game configuration
    const gridSize = 20;
    const rows = 31;
    const cols = 28;
    
    // Create a simple maze layout (0 = empty, 1 = wall, 2 = pellet)
    // For demonstration, we create a very simplified maze
    let maze = [];
    for (let r = 0; r < rows; r++) {
      maze[r] = [];
      for (let c = 0; c < cols; c++) {
        // border walls
        if(r === 0 || r === rows-1 || c === 0 || c === cols-1) {
          maze[r][c] = 1;
        } else {
          maze[r][c] = 2; // pellet
        }
      }
    }
    // Create some inner walls
    for (let r = 5; r < 26; r++) {
      maze[r][13] = 1;
      maze[r][14] = 1;
    }

    // Player (Pac-Man) object
    const pacman = {
      x: 14 * gridSize,
      y: 23 * gridSize,
      dx: 0,
      dy: 0,
      radius: gridSize/2 - 2
    };

    // Ghosts array
    const ghosts = [
      { x: 13 * gridSize, y: 11 * gridSize, color: 'red', dx: 1, dy: 0 },
      { x: 14 * gridSize, y: 11 * gridSize, color: 'pink', dx: -1, dy: 0 }
    ];

    let score = 0;
    let gameOver = false;

    // Input handling
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function update() {
      // Move pacman based on arrow keys
      if (keys['ArrowLeft']) {
        pacman.dx = -2;
        pacman.dy = 0;
      } else if (keys['ArrowRight']) {
        pacman.dx = 2;
        pacman.dy = 0;
      } else if (keys['ArrowUp']) {
        pacman.dx = 0;
        pacman.dy = -2;
      } else if (keys['ArrowDown']) {
        pacman.dx = 0;
        pacman.dy = 2;
      }

      // Compute next position
      let nextX = pacman.x + pacman.dx;
      let nextY = pacman.y + pacman.dy;
      let gridCol = Math.floor((nextX + gridSize/2) / gridSize);
      let gridRow = Math.floor((nextY + gridSize/2) / gridSize);

      // Check collision with walls for pacman
      if (maze[gridRow] && maze[gridRow][gridCol] !== 1) {
        pacman.x = nextX;
        pacman.y = nextY;
      } else {
        pacman.dx = 0;
        pacman.dy = 0;
      }

      // Eat pellet
      gridCol = Math.floor((pacman.x + gridSize/2) / gridSize);
      gridRow = Math.floor((pacman.y + gridSize/2) / gridSize);
      if (maze[gridRow] && maze[gridRow][gridCol] === 2) {
        maze[gridRow][gridCol] = 0;
        score += 10;
      }

      // Update ghosts movement
      ghosts.forEach(ghost => {
        // Simple random movement
        if (Math.random() < 0.02) {
          const dirs = [ {dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1} ];
          const choice = dirs[Math.floor(Math.random() * dirs.length)];
          ghost.dx = choice.dx;
          ghost.dy = choice.dy;
        }
        let nextGX = ghost.x + ghost.dx * 2;
        let nextGY = ghost.y + ghost.dy * 2;
        let gCol = Math.floor((nextGX + gridSize/2) / gridSize);
        let gRow = Math.floor((nextGY + gridSize/2) / gridSize);
        if (maze[gRow] && maze[gRow][gCol] !== 1) {
          ghost.x = nextGX;
          ghost.y = nextGY;
        } else {
          ghost.dx = -ghost.dx;
          ghost.dy = -ghost.dy;
        }
      });

      // Check collision between Pac-Man and ghosts
      ghosts.forEach(ghost => {
        let dist = Math.hypot(pacman.x - ghost.x, pacman.y - ghost.y);
        if (dist < pacman.radius + gridSize/2) {
          gameOver = true;
        }
      });
    }

    function draw() {
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw maze
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (maze[r][c] === 1) {
            ctx.fillStyle = '#0000FF'; // wall color
            ctx.fillRect(c * gridSize, r * gridSize, gridSize, gridSize);
          } else if (maze[r][c] === 2) {
            ctx.fillStyle = '#FFFF00'; // pellet color
            ctx.beginPath();
            ctx.arc(c * gridSize + gridSize/2, r * gridSize + gridSize/2, 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // Draw Pac-Man
      ctx.fillStyle = '#FF0';
      ctx.beginPath();
      ctx.arc(pacman.x + gridSize/2, pacman.y + gridSize/2, pacman.radius, 0.25 * Math.PI, 1.75 * Math.PI);
      ctx.lineTo(pacman.x + gridSize/2, pacman.y + gridSize/2);
      ctx.fill();

      // Draw ghosts
      ghosts.forEach(ghost => {
        ctx.fillStyle = ghost.color;
        ctx.beginPath();
        ctx.arc(ghost.x + gridSize/2, ghost.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw score
      ctx.fillStyle = '#FFF';
      ctx.font = '16px Arial';
      ctx.fillText('Score: ' + score, 10, canvas.height - 10);

      if (gameOver) {
        ctx.fillStyle = '#F00';
        ctx.font = '40px Arial';
        ctx.fillText('GAME OVER', canvas.width/2 - 120, canvas.height/2);
      }
    }

    function gameLoop() {
      if (!gameOver) {
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
