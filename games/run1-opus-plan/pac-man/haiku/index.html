<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="700" height="780"></canvas>
  <script>
    // T01-T14: Complete Pac-Man game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = 700;
    const CANVAS_HEIGHT = 780;
    const MAZE_COLS = 28;
    const MAZE_ROWS = 31;
    const CELL_SIZE = 24;
    const MAZE_X = 14;
    const MAZE_Y = 30;

    // States
    const STATE = {
      IDLE: 'IDLE',
      READY: 'READY',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      DYING: 'DYING',
      GAME_OVER: 'GAME_OVER'
    };

    // Maze definition (28x31)
    const mazeDef = [
      "1111111111111111111111111111",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222244444222122222222222221",
      "1222244444222122222222222221",
      "0222244444222122222222222220",
      "1222244444222122222222222221",
      "1222244442222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1222222222222122222222222221",
      "1111111111111111111111111111"
    ];

    const maze = mazeDef.map(row => row.split('').map(Number));

    // Place power pellets at corners
    maze[3][1] = 3;
    maze[3][26] = 3;
    maze[23][1] = 3;
    maze[23][26] = 3;

    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('pacmanHighScore') || '0'),
      lives: 3,
      level: 1,
      dotsEaten: 0,
      totalDots: 244,
      speedMult: 1.0,
      readyTimer: 0,
      deathTimer: 0,
      modeTimer: 0,
      mode: 'scatter',
      modeSchedule: [7, 20, 7, 20, 5, 20, 5, Infinity],
      modeIdx: 0,
      frightenedTimer: 0,
      frightenedMode: false,
      ghostsEatenThisFright: 0,
      fruitTimer: 0,
      fruitActive: false
    };

    const pacman = {
      col: 14,
      row: 23,
      direction: 0, // 0=right, 1=down, 2=left, 3=up
      nextDirection: 0,
      mouthOpen: 0,
      speed: 120
    };

    const ghosts = [
      { col: 14, row: 12, color: '#FF0000', name: 'Blinky', startCol: 14, startRow: 12, speed: 110, mode: 'chase', eaten: false, exitDelay: 0 },
      { col: 13, row: 14, color: '#FFB8FF', name: 'Pinky', startCol: 13, startRow: 14, speed: 110, mode: 'scatter', eaten: false, exitDelay: 0 },
      { col: 14, row: 14, color: '#00FFFF', name: 'Inky', startCol: 14, startRow: 14, speed: 110, mode: 'scatter', eaten: false, exitDelay: 30 },
      { col: 15, row: 14, color: '#FFB852', name: 'Clyde', startCol: 15, startRow: 14, speed: 110, mode: 'scatter', eaten: false, exitDelay: 60 }
    ];

    const keys = {};

    // Initialize maze with dots
    function initMaze() {
      for (let r = 0; r < MAZE_ROWS; r++) {
        for (let c = 0; c < MAZE_COLS; c++) {
          if (maze[r][c] === 2) {
            // Already dot
          } else if (maze[r][c] !== 1 && maze[r][c] !== 4 && maze[r][c] !== 5) {
            maze[r][c] = 2;
          }
        }
      }
    }

    function startGame() {
      game.state = STATE.READY;
      game.score = 0;
      game.lives = 3;
      game.level = 1;
      game.dotsEaten = 0;
      game.speedMult = 1.0;
      game.modeIdx = 0;
      game.mode = 'scatter';
      game.modeTimer = 0;
      game.frightenedMode = false;
      game.frightenedTimer = 0;
      game.readyTimer = 2;
      pacman.col = 14;
      pacman.row = 23;
      pacman.direction = 0;
      pacman.nextDirection = 0;
      ghosts.forEach(g => {
        g.col = g.startCol;
        g.row = g.startRow;
        g.eaten = false;
        g.mode = g.name === 'Blinky' ? 'chase' : 'scatter';
      });
      initMaze();
    }

    function nextLevel() {
      game.level++;
      game.speedMult *= 1.05;
      game.dotsEaten = 0;
      game.readyTimer = 2;
      game.state = STATE.READY;
      game.mode = 'scatter';
      game.modeIdx = 0;
      game.modeTimer = 0;
      game.frightenedMode = false;
      game.frightenedTimer = 0;
      pacman.col = 14;
      pacman.row = 23;
      ghosts.forEach(g => {
        g.col = g.startCol;
        g.row = g.startRow;
        g.eaten = false;
        g.mode = g.name === 'Blinky' ? 'chase' : 'scatter';
      });
      initMaze();
    }

    function respawnAfterDeath() {
      game.lives--;
      if (game.lives <= 0) {
        game.state = STATE.GAME_OVER;
        game.highScore = Math.max(game.highScore, game.score);
        localStorage.setItem('pacmanHighScore', game.highScore);
      } else {
        game.state = STATE.READY;
        game.readyTimer = 2;
        pacman.col = 14;
        pacman.row = 23;
        ghosts.forEach(g => {
          g.col = g.startCol;
          g.row = g.startRow;
          g.eaten = false;
        });
      }
    }

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function updatePacman(dt) {
      if (keys['ArrowUp'] || keys['w'] || keys['W']) pacman.nextDirection = 3;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) pacman.nextDirection = 1;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) pacman.nextDirection = 2;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) pacman.nextDirection = 0;

      const speed = pacman.speed * game.speedMult;
      const px = MAZE_X + pacman.col * CELL_SIZE + CELL_SIZE / 2;
      const py = MAZE_Y + pacman.row * CELL_SIZE + CELL_SIZE / 2;

      // Check tunnel wrap
      if (pacman.col === 0 && pacman.direction === 2) {
        pacman.col = 27;
      } else if (pacman.col === 27 && pacman.direction === 0) {
        pacman.col = 0;
      }

      // Try next direction
      const nextDir = pacman.nextDirection;
      const dirs = [[1, 0], [0, 1], [-1, 0], [0, -1]];
      const [ndx, ndy] = dirs[nextDir];
      const nnc = pacman.col + ndx;
      const nnr = pacman.row + ndy;
      if (nnc >= 0 && nnc < MAZE_COLS && nnr >= 0 && nnr < MAZE_ROWS && maze[nnr][nnc] !== 1) {
        pacman.direction = nextDir;
      }

      // Move in current direction
      const [dx, dy] = dirs[pacman.direction];
      const nc = pacman.col + dx;
      const nr = pacman.row + dy;

      if (nc >= 0 && nc < MAZE_COLS && nr >= 0 && nr < MAZE_ROWS && maze[nr][nc] !== 1) {
        pacman.col = nc;
        pacman.row = nr;
      }

      // Eat dot
      if (maze[pacman.row][pacman.col] === 2) {
        game.score += 10;
        game.dotsEaten++;
        maze[pacman.row][pacman.col] = 0;

        if (game.dotsEaten === 70 || game.dotsEaten === 170) {
          game.fruitActive = true;
          game.fruitTimer = 10;
        }
      }

      // Eat power pellet
      if (maze[pacman.row][pacman.col] === 3) {
        game.score += 50;
        game.dotsEaten++;
        maze[pacman.row][pacman.col] = 0;
        game.frightenedMode = true;
        const fTime = game.level === 1 ? 8 : game.level === 2 ? 6 : 4;
        game.frightenedTimer = fTime;
        game.ghostsEatenThisFright = 0;
        ghosts.forEach(g => g.direction = 1 - g.direction);
      }

      // Eat fruit
      if (game.fruitActive && Math.abs(pacman.col - 14) < 0.5 && Math.abs(pacman.row - 17) < 0.5) {
        game.score += 100;
        game.fruitActive = false;
      }

      // Check win
      if (game.dotsEaten === 244) {
        nextLevel();
      }

      pacman.mouthOpen = (pacman.mouthOpen + dt * 10) % 1;
    }

    function updateGhosts(dt) {
      // Mode cycling
      if (!game.frightenedMode) {
        game.modeTimer += dt;
        const targetTime = game.modeSchedule[game.modeIdx];
        if (game.modeTimer >= targetTime) {
          game.modeTimer = 0;
          game.modeIdx++;
          game.mode = game.modeIdx % 2 === 0 ? 'scatter' : 'chase';
          if (game.modeIdx >= game.modeSchedule.length) game.modeIdx = game.modeSchedule.length - 1;
          ghosts.forEach(g => { if (!g.eaten) g.direction = 1 - g.direction; });
        }
      }

      // Frightened timer
      if (game.frightenedMode) {
        game.frightenedTimer -= dt;
        if (game.frightenedTimer <= 0) {
          game.frightenedMode = false;
          game.modeTimer = 0;
        }
      }

      // Update ghosts
      for (const ghost of ghosts) {
        if (ghost.eaten) {
          const speed = 200 * game.speedMult;
          const gx = MAZE_X + ghost.col * CELL_SIZE + CELL_SIZE / 2;
          const gy = MAZE_Y + ghost.row * CELL_SIZE + CELL_SIZE / 2;

          const homeX = MAZE_X + 14 * CELL_SIZE + CELL_SIZE / 2;
          const homeY = MAZE_Y + 14 * CELL_SIZE + CELL_SIZE / 2;

          const dx = homeX - gx;
          const dy = homeY - gy;
          const dist = Math.hypot(dx, dy);

          if (dist > 10) {
            ghost.col += (dx / dist) * speed * dt / CELL_SIZE;
            ghost.row += (dy / dist) * speed * dt / CELL_SIZE;
          } else {
            ghost.eaten = false;
            ghost.col = 14;
            ghost.row = 14;
          }
          continue;
        }

        // Ghost AI at intersections
        const speed = ghost.frightenedMode ? 60 : ghost.speed;
        const gx = MAZE_X + ghost.col * CELL_SIZE + CELL_SIZE / 2;
        const gy = MAZE_Y + ghost.row * CELL_SIZE + CELL_SIZE / 2;

        if (Math.abs(gx % CELL_SIZE - CELL_SIZE / 2) < 2 && Math.abs(gy % CELL_SIZE - CELL_SIZE / 2) < 2) {
          const dirs = [[1, 0], [0, 1], [-1, 0], [0, -1]];
          let bestDir = 0;
          let bestDist = Infinity;

          let targetCol = 27, targetRow = 0; // Scatter default
          if (ghost.name === 'Pinky') targetCol = 0;
          if (ghost.name === 'Inky') targetCol = 27; targetRow = 27;
          if (ghost.name === 'Clyde') targetCol = 0; targetRow = 27;

          if (game.mode === 'chase' || game.frightenedMode) {
            if (ghost.name === 'Blinky') {
              targetCol = pacman.col;
              targetRow = pacman.row;
            } else if (ghost.name === 'Pinky') {
              const [pdx, pdy] = [[1, 0], [0, 1], [-1, 0], [0, -1]][pacman.direction];
              targetCol = Math.max(0, Math.min(27, pacman.col + pdx * 4));
              targetRow = Math.max(0, Math.min(30, pacman.row + pdy * 4));
            } else if (ghost.name === 'Inky') {
              const blinky = ghosts[0];
              const [pdx, pdy] = [[1, 0], [0, 1], [-1, 0], [0, -1]][pacman.direction];
              const tx = pacman.col + pdx * 2;
              const ty = pacman.row + pdy * 2;
              targetCol = Math.max(0, Math.min(27, tx + (tx - blinky.col)));
              targetRow = Math.max(0, Math.min(30, ty + (ty - blinky.row)));
            } else if (ghost.name === 'Clyde') {
              const dist = Math.hypot(pacman.col - ghost.col, pacman.row - ghost.row);
              if (dist > 8) {
                targetCol = pacman.col;
                targetRow = pacman.row;
              }
            }
          }

          if (game.frightenedMode) {
            bestDir = Math.floor(Math.random() * 4);
          } else {
            for (let i = 0; i < 4; i++) {
              if (i === (3 - ghost.direction)) continue; // No reversing
              const [ddx, ddy] = dirs[i];
              const nc = ghost.col + ddx;
              const nr = ghost.row + ddy;
              if (nc >= 0 && nc < MAZE_COLS && nr >= 0 && nr < MAZE_ROWS && maze[nr][nc] !== 1) {
                const d = Math.hypot(nc - targetCol, nr - targetRow);
                if (d < bestDist) {
                  bestDist = d;
                  bestDir = i;
                }
              }
            }
          }
          ghost.direction = bestDir;
        }

        const [dx, dy] = [[1, 0], [0, 1], [-1, 0], [0, -1]][ghost.direction];
        const moveSpeed = (game.frightenedMode ? 60 : ghost.speed) * game.speedMult * dt;
        ghost.col += dx * moveSpeed / CELL_SIZE;
        ghost.row += dy * moveSpeed / CELL_SIZE;

        // Tunnel wrap
        if (ghost.col < 0) ghost.col = 27;
        if (ghost.col > 27) ghost.col = 0;
      }
    }

    function checkCollisions() {
      for (const ghost of ghosts) {
        if (Math.abs(ghost.col - pacman.col) < 0.5 && Math.abs(ghost.row - pacman.row) < 0.5) {
          if (game.frightenedMode) {
            ghost.eaten = true;
            game.ghostsEatenThisFright++;
            const points = [200, 400, 800, 1600][Math.min(game.ghostsEatenThisFright - 1, 3)];
            game.score += points;
          } else {
            game.state = STATE.DYING;
            game.deathTimer = 1.5;
          }
        }
      }
    }

    function updateGame(dt) {
      if (game.state === STATE.READY) {
        game.readyTimer -= dt;
        if (game.readyTimer <= 0) {
          game.state = STATE.PLAYING;
          game.modeTimer = 0;
        }
      } else if (game.state === STATE.PLAYING) {
        updatePacman(dt);
        updateGhosts(dt);
        checkCollisions();

        if (game.fruitActive) {
          game.fruitTimer -= dt;
          if (game.fruitTimer <= 0) game.fruitActive = false;
        }

        if (game.score >= 10000) {
          game.lives++;
          game.score = game.score % 10000;
        }
      } else if (game.state === STATE.DYING) {
        game.deathTimer -= dt;
        if (game.deathTimer <= 0) {
          respawnAfterDeath();
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Maze
      for (let r = 0; r < MAZE_ROWS; r++) {
        for (let c = 0; c < MAZE_COLS; c++) {
          const x = MAZE_X + c * CELL_SIZE;
          const y = MAZE_Y + r * CELL_SIZE;

          if (maze[r][c] === 1) {
            ctx.fillStyle = '#2121DE';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
          } else if (maze[r][c] === 2) {
            ctx.fillStyle = '#FFCC99';
            ctx.beginPath();
            ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, 2, 0, Math.PI * 2);
            ctx.fill();
          } else if (maze[r][c] === 3) {
            if (Math.floor(Date.now() / 250) % 2 === 0) {
              ctx.fillStyle = '#FFCC99';
              ctx.beginPath();
              ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, 5, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      // Fruit
      if (game.fruitActive) {
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(MAZE_X + 14 * CELL_SIZE + CELL_SIZE / 2, MAZE_Y + 17 * CELL_SIZE + CELL_SIZE / 2, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ghosts
      for (const ghost of ghosts) {
        const x = MAZE_X + ghost.col * CELL_SIZE;
        const y = MAZE_Y + ghost.row * CELL_SIZE;

        if (ghost.eaten) {
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(x + 6, y + 6, 4, 4);
          ctx.fillStyle = '#0000FF';
          ctx.fillRect(x + 10, y + 6, 4, 4);
        } else {
          ctx.fillStyle = game.frightenedMode && game.frightenedTimer > 2 ? '#2121FF' : 
                          game.frightenedMode && Math.floor(Date.now() / 250) % 2 === 0 ? '#FFFFFF' : ghost.color;
          ctx.fillRect(x + 2, y + 2, 20, 20);
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(x + 6, y + 6, 4, 4);
          ctx.fillRect(x + 14, y + 6, 4, 4);
          ctx.fillStyle = '#0000FF';
          ctx.fillRect(x + 7, y + 7, 2, 2);
          ctx.fillRect(x + 15, y + 7, 2, 2);
        }
      }

      // Pac-Man
      if (game.state !== STATE.DYING || Math.floor(game.deathTimer * 2) % 2 === 0) {
        const x = MAZE_X + pacman.col * CELL_SIZE + CELL_SIZE / 2;
        const y = MAZE_Y + pacman.row * CELL_SIZE + CELL_SIZE / 2;
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath();
        const mouthAngle = pacman.mouthOpen < 0.5 ? pacman.mouthOpen * 2 : (1 - pacman.mouthOpen) * 2;
        const startAngle = pacman.direction * Math.PI / 2 - Math.PI / 12 * mouthAngle;
        ctx.arc(x, y, 10, startAngle, startAngle + Math.PI * 1.5, false);
        ctx.lineTo(x, y);
        ctx.fill();
      }

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 14, 22);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 14, 22);

      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Level: ${game.level}`, 14, CANVAS_HEIGHT - 10);

      ctx.fillStyle = '#FFFF00';
      for (let i = 0; i < game.lives; i++) {
        ctx.fillRect(14 + i * 20, CANVAS_HEIGHT - 35, 14, 14);
      }

      // READY text
      if (game.state === STATE.READY && game.readyTimer > 0.5) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('READY!', CANVAS_WIDTH / 2, MAZE_Y + 17 * CELL_SIZE);
      }

      if (game.state === STATE.IDLE) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 52px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAC-MAN', CANVAS_WIDTH / 2, 300);

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '16px monospace';
        ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 500);
      }

      if (game.state === STATE.PAUSED) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      }

      if (game.state === STATE.GAME_OVER) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px monospace';
        ctx.fillText(`Score: ${game.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '16px monospace';
        ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
      }
    }

    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING || game.state === STATE.READY || game.state === STATE.DYING) {
        updateGame(dt);
      }

      render();
      requestAnimationFrame(gameLoop);
  // QA state bridge (auto-injected by patch_qa_bridge.py)
  try { window.__qa = {
    stateNum:  typeof state !== 'undefined' ? state : (typeof gameState !== 'undefined' ? gameState : null),
    pacX:      typeof pac   !== 'undefined' ? (pac.x  != null ? pac.x  : null) : null,
    pacY:      typeof pac   !== 'undefined' ? (pac.y  != null ? pac.y  : null) : null,
    pacDx:     typeof pac   !== 'undefined' ? (pac.dx != null ? pac.dx : null) : null,
    pacDy:     typeof pac   !== 'undefined' ? (pac.dy != null ? pac.dy : null) : null,
    pacNextDx: typeof pac   !== 'undefined' ? (pac.nextDx != null ? pac.nextDx : (pac.requestedDx != null ? pac.requestedDx : null)) : null,
    pacNextDy: typeof pac   !== 'undefined' ? (pac.nextDy != null ? pac.nextDy : (pac.requestedDy != null ? pac.requestedDy : null)) : null,
    score:     typeof score !== 'undefined' ? score : null,
    lives:     typeof lives !== 'undefined' ? lives : null,
    ts: Date.now(),
  }; } catch(e) { window.__qaErr = String(e); }

    }

    initMaze();
    gameLoop();
  </script>
