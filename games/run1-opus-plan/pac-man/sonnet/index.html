// Gate row
MAZE_TEMPLATE[12][13] = 5;
MAZE_TEMPLATE[12][14] = 5;

let grid = []; // live game grid (copy of MAZE_TEMPLATE, dots removed on eat)
let totalDots = 0;
let dotsEaten = 0;

function initGrid() {
  grid = MAZE_TEMPLATE.map(row => [...row]);
  totalDots = 0;
  dotsEaten = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === 2 || grid[r][c] === 3) totalDots++;
}

function cellType(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 1;
  return grid[r][c];
}

function isWalkable(r, c, forGhost) {
  const t = cellType(r, c);
  if (t === 1) return false;
  if (forGhost && t === 5) return false; // ghosts can't pass gate normally
  return true;
}

// ─── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAC() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, type, dur, vol, startTime) {
  const ac = getAC(); if (!ac) return;
  try {
    const t = startTime || ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
let wakaToggle = false, wakaTimer = 0;
function sfxWaka() {
  wakaTimer -= 1/60;
  if (wakaTimer > 0) return;
  wakaTimer = 0.08;
  tone(wakaToggle ? 440 : 330, 'square', 0.04, 0.08);
  wakaToggle = !wakaToggle;
}
function sfxPowerPellet() { tone(110, 'square', 0.15, 0.08); }
function sfxEatGhost()    { tone(440, 'sine', 0.05, 0.15); setTimeout(() => tone(880, 'sine', 0.05, 0.1), 50); setTimeout(() => tone(1320, 'sine', 0.05, 0.08), 100); }
function sfxDeath()       { [800,600,400,200,100].forEach((f,i) => tone(f,'sawtooth',0.1,0.15,getAC()&&getAC().currentTime+i*0.1)); }
function sfxLevelStart()  { [300,400,500,600,700,800].forEach((f,i) => tone(f,'square',0.06,0.12,getAC()&&getAC().currentTime+i*0.05)); }

// ─── State machine ───────────────────────────────────────────────────────────
const ST = { IDLE: 0, READY: 1, PLAYING: 2, DYING: 3, PAUSED: 4, GAME_OVER: 5 };
let state = ST.IDLE;
let prevState = ST.IDLE;
let readyTimer = 0;
let dyingTimer = 0;

// ─── Scores ──────────────────────────────────────────────────────────────────
let score = 0;
let highScore = 0;
try { highScore = parseInt(localStorage.getItem('pacman_hs') || '0'); } catch(e) {}
let lives = 3;
let level = 1;
let ghostEatSeq = 0;      // how many ghosts eaten this pellet (for score cascade)
let extraLifeGiven = false;
let ateDotsThisLevel = 0; // for fruit spawn

// ─── Pac-Man ─────────────────────────────────────────────────────────────────
let pac = {};
function resetPac() {
  pac = {
    x: MX + 13.5 * CELL, // col 13.5 → col 14 center x = 14*24+14+12 = ...
    y: MY + 23 * CELL + CELL / 2,
    dx: 0, dy: 0,
    nextDx: 0, nextDy: 0,
    speed: 120,
    mouthAngle: 0.25, // fraction of PI
    mouthDir: 1,
    mouthTimer: 0,
  };
  pac.x = MX + 14 * CELL - CELL / 2; // center of col 13 → start col 13 (0-indexed)
  pac.x = MX + 13 * CELL + CELL / 2; // col 13 center
  // Actually spec says col 14, row 23:
  pac.x = MX + 14 * CELL - CELL / 2; // half cell left of col 14 right edge? 
  // col 14 center: MX + 14*CELL + CELL/2 = 14 + 14*24 + 12 = 14 + 336 + 12 = 362
  pac.x = MX + 14 * CELL + CELL / 2; // 362
  pac.y = MY + 23 * CELL + CELL / 2; // 30 + 23*24 + 12 = 30 + 552 + 12 = 594
  // Spec: x=350, y=582
  pac.x = 350;
  pac.y = 582;
  pac.dx = -1; pac.dy = 0; // face left initially
  pac.nextDx = -1; pac.nextDy = 0;
}

function pacCol() { return Math.floor((pac.x - MX) / CELL); }
function pacRow() { return Math.floor((pac.y - MY) / CELL); }
function cellCenterX(c) { return MX + c * CELL + CELL / 2; }
function cellCenterY(r) { return MY + r * CELL + CELL / 2; }

// ─── Ghost Mode cycling ───────────────────────────────────────────────────────
// Scatter(7)→Chase(20)→Scatter(7)→Chase(20)→Scatter(5)→Chase(20)→Scatter(5)→Chase(∞)
const MODE_SEQ = [
  { mode: 'scatter', dur: 7 },
  { mode: 'chase',   dur: 20 },
  { mode: 'scatter', dur: 7 },
  { mode: 'chase',   dur: 20 },
  { mode: 'scatter', dur: 5 },
  { mode: 'chase',   dur: 20 },
  { mode: 'scatter', dur: 5 },
  { mode: 'chase',   dur: Infinity },
];
let modeIdx = 0;
let modeTimer = 0;
let currentMode = 'scatter';

let frightenedTimer = 0;
const FRIGHTEN_DUR = [8, 6, 4]; // by level index (level 1,2,3+)

// ─── Ghosts ───────────────────────────────────────────────────────────────────
const GHOST_DEFS = [
  { name: 'Blinky', color: '#FF0000', startCol: 14, startRow: 11, startX: MX+14*CELL+CELL/2, startY: MY+11*CELL+CELL/2, outside: true,  releaseDots: 0,  corner: {r:0,c:27}, scatter: {r:0,c:27} },
  { name: 'Pinky',  color: '#FFB8FF', startCol: 13, startRow: 13, startX: MX+13*CELL+CELL/2, startY: MY+13*CELL+CELL/2, outside: false, releaseDots: 0,  corner: {r:0,c:0},  scatter: {r:0,c:0}  },
  { name: 'Inky',   color: '#00FFFF', startCol: 11, startRow: 13, startX: MX+11*CELL+CELL/2, startY: MY+13*CELL+CELL/2, outside: false, releaseDots: 30, corner: {r:30,c:27},scatter: {r:30,c:27}},
  { name: 'Clyde',  color: '#FFB852', startCol: 16, startRow: 13, startX: MX+16*CELL+CELL/2, startY: MY+13*CELL+CELL/2, outside: false, releaseDots: 60, corner: {r:30,c:0}, scatter: {r:30,c:0} },
];

let ghosts = [];

function resetGhosts() {
  ghosts = GHOST_DEFS.map((def, i) => ({
    ...def,
    x: def.startX, y: def.startY,
    dx: 0, dy: i === 0 ? -1 : 0,
    speed: 110,
    mode: def.outside ? currentMode : 'house',
    prevMode: 'scatter',
    frightened: false,
    eaten: false,
    released: def.outside,
    exitingHouse: false,
    exitTarget: { x: MX + 13 * CELL + CELL / 2, y: MY + 11 * CELL + CELL / 2 },
  }));
}

// ─── Fruit ───────────────────────────────────────────────────────────────────
let fruit = null;

// ─── Init game ───────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1; extraLifeGiven = false;
  ateDotsThisLevel = 0;
  startLevel();
}

function startLevel() {
  initGrid();
  resetPac();
  modeIdx = 0; modeTimer = 0; currentMode = 'scatter';
  frightenedTimer = 0;
  ghostEatSeq = 0;
  fruit = null;
  ateDotsThisLevel = 0;
  resetGhosts();
  state = ST.READY;
  readyTimer = 2.0;
  sfxLevelStart();
}

function nextLevel() {
  level++;
  // Ghost speed +5% per level
  startLevel();
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const prev = keys[e.code];
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if (!prev) {
    if (e.code === 'Enter') {
      if (state === ST.IDLE || state === ST.GAME_OVER) startGame();
    }
    if (e.code === 'KeyP') {
      if (state === ST.PLAYING) { prevState = state; state = ST.PAUSED; }
      else if (state === ST.PAUSED) state = ST.PLAYING;
    }
    if (state === ST.PLAYING) {
      if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { pac.nextDx = -1; pac.nextDy = 0; }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') { pac.nextDx =  1; pac.nextDy = 0; }
      if (e.code === 'ArrowUp'    || e.code === 'KeyW') { pac.nextDx = 0;  pac.nextDy = -1; }
      if (e.code === 'ArrowDown'  || e.code === 'KeyS') { pac.nextDx = 0;  pac.nextDy =  1; }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (state === ST.PAUSED || state === ST.IDLE) return;

  if (state === ST.READY) {
    readyTimer -= dt;
    if (readyTimer <= 0) state = ST.PLAYING;
    return;
  }

  if (state === ST.DYING) {
    dyingTimer -= dt;
    if (dyingTimer <= 0) {
      lives--;
      if (lives <= 0) {
        state = ST.GAME_OVER;
        try { if (score > highScore) { highScore = score; localStorage.setItem('pacman_hs', highScore); } } catch(e) {}
      } else {
        resetPac();
        resetGhosts();
        modeIdx = 0; modeTimer = 0; currentMode = 'scatter';
        frightenedTimer = 0;
        state = ST.READY;
        readyTimer = 1.5;
      }
    }
    return;
  }

  if (state === ST.GAME_OVER) return;

  // Mode cycling
  if (frightenedTimer > 0) {
    frightenedTimer -= dt;
    if (frightenedTimer <= 0) {
      frightenedTimer = 0;
      ghostEatSeq = 0;
      for (const g of ghosts) {
        if (g.frightened && !g.eaten) { g.frightened = false; g.mode = currentMode; }
      }
    }
  } else {
    modeTimer += dt;
    const seg = MODE_SEQ[modeIdx];
    if (seg.dur !== Infinity && modeTimer >= seg.dur) {
      modeTimer = 0;
      modeIdx = Math.min(modeIdx + 1, MODE_SEQ.length - 1);
      const newMode = MODE_SEQ[modeIdx].mode;
      if (newMode !== currentMode) {
        currentMode = newMode;
        // Ghosts reverse on mode change
        for (const g of ghosts) {
          if (!g.frightened && !g.eaten && g.mode !== 'house' && !g.exitingHouse) {
            g.dx = -g.dx; g.dy = -g.dy;
            g.mode = currentMode;
          }
        }
      }
    }
  }

  // Update Pac-Man
  updatePac(dt);

  // Check dot eating
  checkDotEat();

  // Update ghosts
  for (const g of ghosts) updateGhost(g, dt);

  // Collision pac vs ghosts
  checkPacGhostCollision();

  // Fruit timer
  if (fruit) {
    fruit.timer -= dt;
    if (fruit.timer <= 0) fruit = null;
  }
}

function updatePac(dt) {
  const speed = pac.speed;
  const cx = cellCenterX(pacCol());
  const cy = cellCenterY(pacRow());

  // Try to turn: if within 4px of cell center and next direction is valid
  const distToCenter = Math.abs(pac.x - cx) + Math.abs(pac.y - cy);
  if (distToCenter <= 4) {
    const nr = pacRow() + pac.nextDy;
    const nc = pacCol() + pac.nextDx;
    if (isWalkable(nr, nc, false)) {
      pac.dx = pac.nextDx; pac.dy = pac.nextDy;
      // Snap to center when turning
      if (pac.nextDy !== 0) pac.x = cx;
      if (pac.nextDx !== 0) pac.y = cy;
    }
  }

  // Move
  let nx = pac.x + pac.dx * speed * dt;
  let ny = pac.y + pac.dy * speed * dt;

  // Wall collision
  const nr = Math.floor((ny - MY) / CELL);
  const nc = Math.floor((nx - MX) / CELL);
  if (!isWalkable(nr, nc, false)) {
    nx = pac.x; ny = pac.y;
    pac.dx = 0; pac.dy = 0;
  }

  // Tunnel wrap (row 14)
  const tunnelR = 14;
  if (Math.floor((pac.y - MY) / CELL) === tunnelR) {
    if (nx < MX - CELL) nx = MX + COLS * CELL - CELL / 2;
    if (nx > MX + COLS * CELL) nx = MX + CELL / 2;
  }

  pac.x = nx; pac.y = ny;

  // Mouth animation at 10Hz
  pac.mouthTimer += dt;
  if (pac.mouthTimer >= 0.05) {
    pac.mouthTimer = 0;
    pac.mouthAngle += pac.mouthDir * 0.15;
    if (pac.mouthAngle >= 0.3) { pac.mouthAngle = 0.3; pac.mouthDir = -1; }
    if (pac.mouthAngle <= 0)   { pac.mouthAngle = 0;   pac.mouthDir =  1; }
  }

  if (pac.dx !== 0 || pac.dy !== 0) sfxWaka();
}

function checkDotEat() {
  const r = pacRow(), c = pacCol();
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  const t = grid[r][c];
  if (t === 2) {
    grid[r][c] = 0;
    score += 10; dotsEaten++; ateDotsThisLevel++;
    checkExtraLife();
    checkFruitSpawn();
    checkLevelComplete();
  } else if (t === 3) {
    grid[r][c] = 0;
    score += 50; dotsEaten++; ateDotsThisLevel++;
    triggerFrightened();
    checkExtraLife();
    checkFruitSpawn();
    checkLevelComplete();
  }

  // Check fruit
  if (fruit && Math.abs(pac.x - fruit.x) < CELL && Math.abs(pac.y - fruit.y) < CELL) {
    score += 100;
    checkExtraLife();
    fruit = null;
  }
}

function checkExtraLife() {
  if (!extraLifeGiven && score >= 10000) { extraLifeGiven = true; lives++; }
}

function checkFruitSpawn() {
  if (!fruit && (ateDotsThisLevel === 70 || ateDotsThisLevel === 170)) {
    fruit = { x: MX + 14 * CELL - CELL / 2, y: MY + 17 * CELL + CELL / 2, timer: 10 };
    // spec says col 14, row 17
    fruit.x = MX + 14 * CELL + CELL / 2 - CELL; // center of col 13? Let's use: x=350,y≈438
    fruit.x = 350;
    fruit.y = MY + 17 * CELL + CELL / 2;
  }
}

function checkLevelComplete() {
  if (dotsEaten >= totalDots) {
    setTimeout(() => nextLevel(), 800);
  }
}

function triggerFrightened() {
  const dur = FRIGHTEN_DUR[Math.min(level - 1, 2)];
  frightenedTimer = dur;
  ghostEatSeq = 0;
  for (const g of ghosts) {
    if (!g.eaten && g.mode !== 'house' && !g.exitingHouse) {
      if (!g.frightened) { g.dx = -g.dx; g.dy = -g.dy; }
      g.frightened = true;
    }
  }
  sfxPowerPellet();
}

function checkPacGhostCollision() {
  for (const g of ghosts) {
    if (g.eaten) continue;
    const dist = Math.hypot(pac.x - g.x, pac.y - g.y);
    if (dist < 18) {
      if (g.frightened) {
        // Eat ghost
        g.eaten = true;
        g.frightened = false;
        ghostEatSeq++;
        const pts = [200, 400, 800, 1600][Math.min(ghostEatSeq - 1, 3)];
        score += pts;
        checkExtraLife();
        sfxEatGhost();
      } else {
        // Death
        state = ST.DYING;
        dyingTimer = 1.5;
        sfxDeath();
        return;
      }
    }
  }
}

// ─── Ghost movement ───────────────────────────────────────────────────────────
const DIRS = [
  { dx: 0, dy: -1 }, // up
  { dx: -1, dy: 0 }, // left
  { dx: 0, dy: 1 },  // down
  { dx: 1, dy: 0 },  // right
];

function ghostTargetTile(g) {
  if (g.mode === 'scatter') return g.scatter;
  // Chase mode targets
  const pr = pacRow(), pc = pacCol();

    case 'Blinky':
      return { r: pr, c: pc };

      let tr = pr + pac.dy * 4, tc = pc + pac.dx * 4;
      // Original buggy behavior: up adds -4 cols too. Let's approximate
      if (pac.dy === -1) tc -= 4;
      return { r: tr, c: tc };
    }
    case 'Inky': {
      // 2 tiles ahead of pac
      let tr2 = pr + pac.dy * 2, tc2 = pc + pac.dx * 2;
      if (pac.dy === -1) tc2 -= 2;
      const blinky = ghosts[0];
      const br = Math.floor((blinky.y - MY) / CELL), bc = Math.floor((blinky.x - MX) / CELL);
      return { r: tr2 + (tr2 - br), c: tc2 + (tc2 - bc) };
    }
    case 'Clyde': {
      const gr = Math.floor((g.y - MY) / CELL), gc = Math.floor((g.x - MX) / CELL);
      const dist = Math.hypot(pr - gr, pc - gc);
      if (dist > 8) return { r: pr, c: pc };
      else return g.scatter;
    }
    default: return g.scatter;
  }
}

function updateGhost(g, dt) {
  // Release ghosts from house
  if (!g.released) {
    if (dotsEaten >= g.releaseDots) {
      g.released = true;
      g.exitingHouse = true;
    } else return;
  }

  // Exiting house: move to gate then out
  if (g.exitingHouse) {
    const gateX = MX + 13 * CELL + CELL; // col 13.5 → ~x=338+12=350? 
    // Gate is at col 13-14, row 12. Center: x=MX+13*CELL+CELL=...
    // Let's target: x=350 (between col13 and col14 = MX+13.5*CELL = 14+324 = 338? Hmm)
    // Gate center: MX + 13*CELL + CELL = 14 + 312 + 24 = 350. y = MY + 11*CELL + CELL/2 = 30+264+12 = 306
    const tx = 350, ty = MY + 11 * CELL + CELL / 2;
    const dx = tx - g.x, dy = ty - g.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 3) {
      g.x = tx; g.y = ty;
      g.exitingHouse = false;
      g.mode = currentMode;
      g.dx = 0; g.dy = -1;
    } else {
      const spd = 80;
      g.x += (dx / dist) * spd * dt;
      g.y += (dy / dist) * spd * dt;
    }
    return;
  }

  // Eaten ghost returns to house
  if (g.eaten) {
    const tx = g.startX, ty = g.startY;
    const dx = tx - g.x, dy = ty - g.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 4) {
      g.x = tx; g.y = ty;
      g.eaten = false;
      g.frightened = false;
      g.released = true;
      g.exitingHouse = true;
      g.mode = currentMode;
      g.dx = 0; g.dy = 1;
    } else {
      const spd = 200;
      g.x += (dx / dist) * spd * dt;
      g.y += (dy / dist) * spd * dt;
    }
    return;
  }

  const spd = g.frightened ? 60 : 110;
  const ghostSpeedMul = 1 + (level - 1) * 0.05;
  const speed = spd * ghostSpeedMul;

  // Move ghost using grid-based approach
  const gr = Math.floor((g.y - MY) / CELL);
  const gc = Math.floor((g.x - MX) / CELL);
  const centerX = MX + gc * CELL + CELL / 2;
  const centerY = MY + gr * CELL + CELL / 2;
  const distCenter = Math.hypot(g.x - centerX, g.y - centerY);

  // Only pick new direction at intersection (within 2px of cell center)
  if (distCenter < 2.5) {
    g.x = centerX; g.y = centerY;
    let bestDir = { dx: g.dx, dy: g.dy };

    if (g.frightened) {
      // Random direction, no reversal
      const valid = DIRS.filter(d => d.dx !== -g.dx || d.dy !== -g.dy)
        .filter(d => {
          const nr = gr + d.dy, nc = gc + d.dx;
          return isWalkable(nr, nc, true) || (grid[nr] && grid[nr][nc] === 5 && g.exitingHouse);
        });
      if (valid.length > 0) bestDir = valid[Math.floor(Math.random() * valid.length)];
    } else {
      // AI pathfinding: choose direction minimizing distance to target
      const target = ghostTargetTile(g);
      let minDist = Infinity;

      for (const d of DIRS) {
        if (d.dx === -g.dx && d.dy === -g.dy) continue; // no reversal
        const nr = gr + d.dy, nc = gc + d.dx;
        // Ghosts cannot pass gate (row 12, cols 13-14) unless exiting
        let walkable = true;
        if (!isWalkable(nr, nc, false)) walkable = false;
        if (grid[nr] !== undefined && grid[nr][nc] === 5) walkable = false; // gate blocked
        if (!walkable) continue;

        // Tunnel: allow
        const dist = Math.hypot((nr - target.r), (nc - target.c));
        if (dist < minDist) { minDist = dist; bestDir = d; }
      }
    }

    g.dx = bestDir.dx; g.dy = bestDir.dy;
  }

  // Move
  let nx = g.x + g.dx * speed * dt;
  let ny = g.y + g.dy * speed * dt;

  // Tunnel wrap
  if (gr === 14) {
    if (nx < MX - CELL) nx = MX + COLS * CELL - CELL / 2;
    if (nx > MX + COLS * CELL) nx = MX + CELL / 2;
  }

  // Wall check
  const nr2 = Math.floor((ny - MY) / CELL);
  const nc2 = Math.floor((nx - MX) / CELL);
  if (!isWalkable(nr2, nc2, true) && !(grid[nr2] !== undefined && grid[nr2][nc2] === 4)) {
    nx = g.x; ny = g.y;
    g.dx = 0; g.dy = 0;
  }

  g.x = nx; g.y = ny;
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function drawMaze() {
  // Draw maze walls by checking cell adjacency
  ctx.strokeStyle = '#2121DE';
  ctx.lineWidth = 2;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = MAZE_TEMPLATE[r][c];
      if (t !== 1) continue;
      const x = MX + c * CELL, y = MY + r * CELL;
      // Draw borders between wall and non-wall
      // Top
      if (r > 0 && MAZE_TEMPLATE[r-1][c] !== 1) {
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + CELL, y); ctx.stroke();
      }
      // Bottom
      if (r < ROWS-1 && MAZE_TEMPLATE[r+1][c] !== 1) {
        ctx.beginPath(); ctx.moveTo(x, y + CELL); ctx.lineTo(x + CELL, y + CELL); ctx.stroke();
      }
      // Left
      if (c > 0 && MAZE_TEMPLATE[r][c-1] !== 1) {
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + CELL); ctx.stroke();
      }
      // Right
      if (c < COLS-1 && MAZE_TEMPLATE[r][c+1] !== 1) {
        ctx.beginPath(); ctx.moveTo(x + CELL, y); ctx.lineTo(x + CELL, y + CELL); ctx.stroke();
      }
    }
  }

  // Fill wall cells
  ctx.fillStyle = '#0000AA';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (MAZE_TEMPLATE[r][c] === 1) {
        const x = MX + c * CELL, y = MY + r * CELL;
        ctx.fillRect(x, y, CELL, CELL);
      }
    }
  }

  // Re-draw borders on top of fill
  ctx.strokeStyle = '#2121DE';
  ctx.lineWidth = 2;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = MAZE_TEMPLATE[r][c];
      if (t !== 1) continue;
      const x = MX + c * CELL, y = MY + r * CELL;
      if (r > 0 && MAZE_TEMPLATE[r-1][c] !== 1) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+CELL,y); ctx.stroke(); }
      if (r < ROWS-1 && MAZE_TEMPLATE[r+1][c] !== 1) { ctx.beginPath(); ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
      if (c > 0 && MAZE_TEMPLATE[r][c-1] !== 1) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+CELL); ctx.stroke(); }
      if (c < COLS-1 && MAZE_TEMPLATE[r][c+1] !== 1) { ctx.beginPath(); ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
    }
  }

  // Ghost house gate
  ctx.fillStyle = '#FFB8FF';
  ctx.fillRect(MX + 13 * CELL, MY + 12 * CELL + CELL / 2 - 2, 2 * CELL, 4);

  // Dots
  const now = Date.now();
  ctx.fillStyle = '#FFCC99';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = grid[r][c];
      const cx = MX + c * CELL + CELL / 2;
      const cy = MY + r * CELL + CELL / 2;
      if (t === 2) {
        ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
      } else if (t === 3) {
        // Blink at 4Hz
        if (Math.floor(now / 125) % 2 === 0) {
          ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }

  // Fruit
  if (fruit) {
    ctx.fillStyle = '#FF0000';
    ctx.beginPath(); ctx.arc(fruit.x, fruit.y, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00AA00';
    ctx.fillRect(fruit.x - 2, fruit.y - 14, 4, 10);
    ctx.beginPath(); ctx.arc(fruit.x - 5, fruit.y - 14, 5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPac() {
  const x = pac.x, y = pac.y;

  // Face direction angle
  let angle = 0;
  if (pac.dx === 1)  angle = 0;
  if (pac.dx === -1) angle = Math.PI;
  if (pac.dy === -1) angle = -Math.PI / 2;
  if (pac.dy === 1)  angle = Math.PI / 2;

  const mouth = pac.mouthAngle * Math.PI;

  ctx.fillStyle = '#FFFF00';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, 10, angle + mouth, angle + Math.PI * 2 - mouth);
  ctx.closePath();
  ctx.fill();
}

function drawPacDying(t) {
  // t goes 0→1 over 1.5s
  const progress = 1 - Math.max(0, 1 - t / 1.2); // 0→1
  const mouthOpen = progress * Math.PI * 0.9;
  ctx.fillStyle = `rgba(255, 255, 0, ${1 - progress * 0.5})`;
  ctx.beginPath();
  ctx.moveTo(pac.x, pac.y);
  ctx.arc(pac.x, pac.y, 10 * (1 - progress * 0.5), mouthOpen, Math.PI * 2 - mouthOpen);
  ctx.closePath();
  ctx.fill();
}

function drawGhost(g, now) {
  const x = g.x, y = g.y;

  let bodyColor = g.color;
  if (g.eaten) {
    // Eyes only
    drawGhostEyes(x, y, g.dx, g.dy);
    return;
  }
  if (g.frightened) {
    // Last 2s: flash white/blue at 4Hz
    if (frightenedTimer < 2 && Math.floor(now / 125) % 2 === 0) {
      bodyColor = '#FFFFFF';
    } else {
      bodyColor = '#2121FF';
    }
  }

  // Ghost body: semicircle top + wavy bottom
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  // Top semicircle
  ctx.arc(x, y - 2, 10, Math.PI, 0);
  // Right side
  ctx.lineTo(x + 10, y + 8);
  // Wavy bottom (3 bumps)
  const bw = 20 / 3;
  ctx.quadraticCurveTo(x + 10 - bw * 0.25, y + 12, x + 10 - bw * 0.5, y + 8);
  ctx.quadraticCurveTo(x + 10 - bw * 0.75, y + 4,  x + 10 - bw, y + 8);
  ctx.quadraticCurveTo(x + 10 - bw * 1.25, y + 12, x + 10 - bw * 1.5, y + 8);
  ctx.quadraticCurveTo(x + 10 - bw * 1.75, y + 4,  x + 10 - bw * 2, y + 8);
  ctx.quadraticCurveTo(x + 10 - bw * 2.25, y + 12, x + 10 - bw * 2.5, y + 8);
  ctx.quadraticCurveTo(x + 10 - bw * 2.75, y + 4,  x - 10, y + 8);
  ctx.lineTo(x - 10, y - 2);
  ctx.closePath();
  ctx.fill();

  if (!g.frightened) {
    drawGhostEyes(x, y, g.dx, g.dy);
  } else {
    // Frightened face
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath(); ctx.arc(x - 4, y - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 4, y - 2, 2, 0, Math.PI * 2); ctx.fill();
    // Squiggly mouth
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x - 5, y + 4); ctx.quadraticCurveTo(x - 2, y + 2, x, y + 4); ctx.quadraticCurveTo(x + 2, y + 6, x + 5, y + 4); ctx.stroke();
  }
}

function drawGhostEyes(x, y, dx, dy) {
  // White sclera
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(x - 3, y - 2, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3, y - 2, 4, 0, Math.PI * 2); ctx.fill();

  // Blue pupils pointing in movement direction
  const pdx = dx || 0, pdy = dy || 0;
  ctx.fillStyle = '#0000AA';
  ctx.beginPath(); ctx.arc(x - 3 + pdx * 2, y - 2 + pdy * 2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3 + pdx * 2, y - 2 + pdy * 2, 2, 0, Math.PI * 2); ctx.fill();
}

function drawHUD() {
  ctx.font = '16px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 14, 22);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Best: ' + highScore, W - 14, 22);

  // Lives (bottom-left)
  const lifeY = MY + ROWS * CELL + 20;
  ctx.fillStyle = '#FFFF00';
  for (let i = 0; i < lives; i++) {
    ctx.beginPath(); ctx.arc(20 + i * 22, lifeY, 7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.font = '14px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.textAlign = 'left';
  ctx.fillText('×' + lives, 20 + lives * 22, lifeY + 5);

  // Level (bottom-right)
  ctx.textAlign = 'right';
  ctx.fillText('Level: ' + level, W - 14, lifeY + 5);

  // READY!
  if (state === ST.READY) {
    ctx.font = '20px monospace';
    ctx.fillStyle = '#FFFF00';
    ctx.textAlign = 'center';
    ctx.fillText('READY!', W / 2, MY + 18 * CELL);
  }
}

function drawStartScreen() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFFF00';
  ctx.font = '52px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAC-MAN', W / 2, 300);

  // Ghost display
  const ghostInfo = [
    { name: 'BLINKY', color: '#FF0000', nick: 'SHADOW' },
    { name: 'PINKY',  color: '#FFB8FF', nick: 'SPEEDY' },
    { name: 'INKY',   color: '#00FFFF', nick: 'BASHFUL' },
    { name: 'CLYDE',  color: '#FFB852', nick: 'POKEY' },
  ];
  ctx.font = '14px monospace';
  ghostInfo.forEach((g, i) => {
    const gx = W / 2 - 90 + i * 45, gy = 370;
    // Draw mini ghost
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.arc(gx, gy - 8, 10, Math.PI, 0);
    ctx.lineTo(gx + 10, gy + 5);
    ctx.lineTo(gx - 10, gy + 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '10px monospace';
    ctx.fillText(g.name, gx, gy + 22);
  });

  ctx.fillStyle = '#AAAAAA';
  ctx.font = '20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Press Enter to Start', W / 2, 500);

  ctx.font = '13px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('Arrow Keys to Move  ·  P to Pause', W / 2, 535);
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastTime = null;

function loop(ts) {
  requestAnimationFrame(loop);
  // QA bridge: expose game state to Playwright via window.__qa (runs in same scope as let vars)
  try { window.__qa = { stateNum: state, pacX: pac.x, pacY: pac.y, pacDx: pac.dx, pacDy: pac.dy, pacNextDx: pac.nextDx, pacNextDy: pac.nextDy, score: score, lives: lives, ts: Date.now() }; } catch(e) { window.__qaErr = String(e); }
  const dt = lastTime === null ? 0 : Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  const now = Date.now();

  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  if (state === ST.IDLE) {
    drawStartScreen();
    return;
  }

  drawMaze();

  // Pac-Man (or dying animation)
  if (state === ST.DYING) {
    const t = 1.5 - dyingTimer;
    drawPacDying(t);
  } else {
    drawPac();
  }

  // Ghosts
  for (const g of ghosts) drawGhost(g, now);

  drawHUD();

  update(dt);

  if (state === ST.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Press P to Resume', W / 2, H / 2 + 40);
  }

  if (state === ST.GAME_OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF0000';
    ctx.font = '32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '20px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 40);
  }
}

requestAnimationFrame(loop);
})();
</script>
</body>
