<!-- Space Invaders | spec:run1-opus-plan | built-by:anthropic/claude-opus-4-6 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
  canvas{display:block;background:#000}
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=800,H=600;

// T03: State
const S={IDLE:0,PLAYING:1,PAUSED:2,GAME_OVER:3};
let state=S.IDLE;

// Player
const PLAYER_W=40,PLAYER_H=32,PLAYER_SPEED=300;
let playerX=380,playerY=550;

// Aliens
const ACOLS=11,AROWS=5;
const ASPX=50,ASPY=40;
const ASTART_X=120,ASTART_Y=80;
const ATYPES=[
  {w:24,h:16,color:'#FF0000',pts:30},
  {w:28,h:20,color:'#FFCC00',pts:20},
  {w:28,h:20,color:'#FFCC00',pts:20},
  {w:32,h:20,color:'#00CCFF',pts:10},
  {w:32,h:20,color:'#00CCFF',pts:10}
];
let aliens=[];
let alienDir=1,alienBaseSpeed=30,alienSpeed=30,aliensAlive=0;
let alienOffX=0,alienOffY=0;

// Bullets
let playerBullet=null; // {x,y}
const PBULLET_W=3,PBULLET_H=12,PBULLET_SPEED=500;
let alienBullets=[];
const ABULLET_W=3,ABULLET_H=12,ABULLET_SPEED=250,ABULLET_MAX=3;
let alienFireTimer=0,alienFireInterval=1.0;

// Shields
const SHIELD_POSITIONS=[140,300,460,620];
const SHIELD_Y=480;
const SCELL=4,SCOLS=20,SROWS=16;
let shields=[];

// Mystery ship
let ufo=null; // {x,y,pts}
let ufoTimer=0,ufoInterval=20;
const UFO_W=48,UFO_H=16,UFO_SPEED=150;
const UFO_PTS=[50,100,150,300];
let ufoScoreDisplay=null; // {x,y,pts,timer}

// Score/Lives/Level
let score=0,lives=3,wave=1;
let highScore=parseInt(localStorage.getItem('si_high')||'0',10);

// Input
const keys={};
document.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  if(e.key==='Enter'){
    if(state===S.IDLE||state===S.GAME_OVER)startGame();
  }
  if(e.key==='p'||e.key==='P'){
    if(state===S.PLAYING)state=S.PAUSED;
    else if(state===S.PAUSED)state=S.PLAYING;
  }
  if(e.key===' '&&state===S.PLAYING&&!playerBullet){
    playerBullet={x:playerX+PLAYER_W/2-PBULLET_W/2,y:playerY-PBULLET_H};
    playShoot();
  }
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

// Audio
let ac=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function playShoot(){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=880;g.gain.value=0.05;o.connect(g);g.connect(a.destination);o.start(a.currentTime);o.stop(a.currentTime+0.05);}catch(e){}}
function playAlienDie(){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=200;o.frequency.linearRampToValueAtTime(800,a.currentTime+0.08);g.gain.value=0.06;o.connect(g);g.connect(a.destination);o.start(a.currentTime);o.stop(a.currentTime+0.08);}catch(e){}}
function playPlayerHit(){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(440,a.currentTime);o.frequency.linearRampToValueAtTime(55,a.currentTime+0.4);g.gain.value=0.06;o.connect(g);g.connect(a.destination);o.start(a.currentTime);o.stop(a.currentTime+0.4);}catch(e){}}

// Shields init
function initShields(){
  shields=[];
  for(let s=0;s<4;s++){
    const sx=SHIELD_POSITIONS[s]-SCOLS*SCELL/2;
    const grid=[];
    for(let r=0;r<SROWS;r++){
      grid[r]=[];
      for(let c=0;c<SCOLS;c++){
        // Arch shape: top rounded, bottom has legs
        let alive=true;
        // Top corners: remove for rounding
        if(r<3&&(c<3-r||c>SCOLS-4+r))alive=false;
        // Bottom arch cutout (middle gap)
        if(r>=SROWS-5&&c>=6&&c<=13)alive=false;
        grid[r][c]=alive;
      }
    }
    shields.push({x:sx,y:SHIELD_Y,grid:grid});
  }
}

// Aliens init
function initAliens(){
  aliens=[];
  aliensAlive=0;
  for(let r=0;r<AROWS;r++){
    for(let c=0;c<ACOLS;c++){
      aliens.push({
        col:c,row:r,
        alive:true,
        type:ATYPES[r]
      });
      aliensAlive++;
    }
  }
  alienDir=1;
  alienOffX=0;
  alienOffY=0;
  alienSpeed=alienBaseSpeed;
}

function alienPos(a){
  return{
    x:ASTART_X+a.col*ASPX+alienOffX-a.type.w/2,
    y:ASTART_Y+a.row*ASPY+alienOffY-a.type.h/2,
    cx:ASTART_X+a.col*ASPX+alienOffX,
    cy:ASTART_Y+a.row*ASPY+alienOffY
  };
}

function startGame(){
  score=0;lives=3;wave=1;
  playerX=380;
  alienBaseSpeed=30;
  playerBullet=null;
  alienBullets=[];
  ufo=null;ufoTimer=0;
  ufoInterval=20+Math.random()*10;
  ufoScoreDisplay=null;
  alienFireTimer=0;
  initAliens();
  initShields();
  state=S.PLAYING;
}

function nextWave(){
  wave++;
  alienBaseSpeed=30+10*(wave-1);
  playerBullet=null;
  alienBullets=[];
  ufo=null;ufoTimer=0;
  ufoInterval=20+Math.random()*10;
  alienFireTimer=0;
  initAliens();
}

function saveHS(){if(score>highScore){highScore=score;localStorage.setItem('si_high',highScore.toString());}}

// Get bottom-row aliens (per column)
function getBottomAliens(){
  const bottom=[];
  for(let c=0;c<ACOLS;c++){
    for(let r=AROWS-1;r>=0;r--){
      const idx=r*ACOLS+c;
      if(aliens[idx].alive){bottom.push(aliens[idx]);break;}
    }
  }
  return bottom;
}

// AABB
function aabb(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// Update
function update(dt){
  if(state!==S.PLAYING)return;

  // Player movement
  if(keys['ArrowLeft']||keys['a']||keys['A'])playerX-=PLAYER_SPEED*dt;
  if(keys['ArrowRight']||keys['d']||keys['D'])playerX+=PLAYER_SPEED*dt;
  playerX=Math.max(0,Math.min(W-PLAYER_W,playerX));

  // Alien movement
  alienOffX+=alienSpeed*alienDir*dt;

  // Check boundaries
  let needReverse=false;
  for(let i=0;i<aliens.length;i++){
    if(!aliens[i].alive)continue;
    const p=alienPos(aliens[i]);
    if(p.x+aliens[i].type.w>=760&&alienDir>0){needReverse=true;break;}
    if(p.x<=40&&alienDir<0){needReverse=true;break;}
  }
  if(needReverse){
    alienDir*=-1;
    alienOffY+=20;
  }

  // Check aliens reaching bottom
  for(let i=0;i<aliens.length;i++){
    if(!aliens[i].alive)continue;
    const p=alienPos(aliens[i]);
    if(p.y+aliens[i].type.h>=540){
      state=S.GAME_OVER;saveHS();return;
    }
  }

  // Alien fire
  alienFireTimer-=dt;
  if(alienFireTimer<=0&&alienBullets.length<ABULLET_MAX){
    const bottom=getBottomAliens();
    if(bottom.length>0){
      const shooter=bottom[Math.floor(Math.random()*bottom.length)];
      const p=alienPos(shooter);
      alienBullets.push({x:p.cx-ABULLET_W/2,y:p.y+shooter.type.h});
    }
    alienFireTimer=1.0+(Math.random()*0.6-0.3);
  }

  // Player bullet
  if(playerBullet){
    playerBullet.y-=PBULLET_SPEED*dt;
    if(playerBullet.y+PBULLET_H<0)playerBullet=null;
  }

  // Alien bullets
  for(let i=alienBullets.length-1;i>=0;i--){
    alienBullets[i].y+=ABULLET_SPEED*dt;
    if(alienBullets[i].y>H){alienBullets.splice(i,1);}
  }

  // UFO
  ufoTimer+=dt;
  if(!ufo&&ufoTimer>=ufoInterval){
    ufo={x:-UFO_W,y:35,pts:UFO_PTS[Math.floor(Math.random()*UFO_PTS.length)]};
    ufoTimer=0;
    ufoInterval=20+Math.random()*10;
  }
  if(ufo){
    ufo.x+=UFO_SPEED*dt;
    if(ufo.x>W+UFO_W){ufo=null;}
  }

  // UFO score display
  if(ufoScoreDisplay){
    ufoScoreDisplay.timer-=dt;
    if(ufoScoreDisplay.timer<=0)ufoScoreDisplay=null;
  }

  // === T10: Collisions ===
  // Player bullet vs aliens
  if(playerBullet){
    for(let i=0;i<aliens.length;i++){
      if(!aliens[i].alive)continue;
      const p=alienPos(aliens[i]);
      if(aabb(playerBullet.x,playerBullet.y,PBULLET_W,PBULLET_H,p.x,p.y,aliens[i].type.w,aliens[i].type.h)){
        aliens[i].alive=false;
        aliensAlive--;
        score+=aliens[i].type.pts;
        playerBullet=null;
        playAlienDie();
        // Update speed
        alienSpeed=alienBaseSpeed+Math.floor((55-aliensAlive)/5)*5;
        if(aliensAlive<=0){nextWave();return;}
        break;
      }
    }
  }

  // Player bullet vs shields
  if(playerBullet){
    for(let s=0;s<shields.length;s++){
      const sh=shields[s];
      let hit=false;
      for(let r=0;r<SROWS&&!hit;r++){
        for(let c=0;c<SCOLS&&!hit;c++){
          if(!sh.grid[r][c])continue;
          const cx=sh.x+c*SCELL,cy=sh.y+r*SCELL;
          if(aabb(playerBullet.x,playerBullet.y,PBULLET_W,PBULLET_H,cx,cy,SCELL,SCELL)){
            sh.grid[r][c]=false;
            playerBullet=null;
            hit=true;
          }
        }
      }
      if(hit)break;
    }
  }

  // Player bullet vs UFO
  if(playerBullet&&ufo){
    if(aabb(playerBullet.x,playerBullet.y,PBULLET_W,PBULLET_H,ufo.x,ufo.y,UFO_W,UFO_H)){
      score+=ufo.pts;
      ufoScoreDisplay={x:ufo.x,y:ufo.y,pts:ufo.pts,timer:1.0};
      playerBullet=null;
      ufo=null;
    }
  }

  // Alien bullets vs player
  for(let i=alienBullets.length-1;i>=0;i--){
    const b=alienBullets[i];
    if(aabb(b.x,b.y,ABULLET_W,ABULLET_H,playerX,playerY,PLAYER_W,PLAYER_H)){
      alienBullets.splice(i,1);
      lives--;
      playPlayerHit();
      if(lives<=0){state=S.GAME_OVER;saveHS();return;}
      continue;
    }
    // vs shields
    for(let s=0;s<shields.length;s++){
      const sh=shields[s];
      let hit=false;
      for(let r=0;r<SROWS&&!hit;r++){
        for(let c=0;c<SCOLS&&!hit;c++){
          if(!sh.grid[r][c])continue;
          const cx=sh.x+c*SCELL,cy=sh.y+r*SCELL;
          if(aabb(b.x,b.y,ABULLET_W,ABULLET_H,cx,cy,SCELL,SCELL)){
            sh.grid[r][c]=false;
            alienBullets.splice(i,1);
            hit=true;
          }
        }
      }
      if(hit)break;
    }
  }

  // Aliens vs shields (formation pushing through)
  for(let i=0;i<aliens.length;i++){
    if(!aliens[i].alive)continue;
    const p=alienPos(aliens[i]);
    for(let s=0;s<shields.length;s++){
      const sh=shields[s];
      for(let r=0;r<SROWS;r++){
        for(let c=0;c<SCOLS;c++){
          if(!sh.grid[r][c])continue;
          const cx=sh.x+c*SCELL,cy=sh.y+r*SCELL;
          if(aabb(p.x,p.y,aliens[i].type.w,aliens[i].type.h,cx,cy,SCELL,SCELL)){
            sh.grid[r][c]=false;
          }
        }
      }
    }
  }
}

// Render
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  if(state===S.IDLE){renderStart();return;}

  // Aliens
  for(let i=0;i<aliens.length;i++){
    if(!aliens[i].alive)continue;
    const a=aliens[i],p=alienPos(a);
    ctx.fillStyle=a.type.color;
    ctx.fillRect(p.x,p.y,a.type.w,a.type.h);
    // Simple eyes (2 dots)
    ctx.fillStyle='#000';
    const ew=Math.floor(a.type.w*0.2);
    ctx.fillRect(p.x+Math.floor(a.type.w*0.25),p.y+Math.floor(a.type.h*0.3),ew,ew);
    ctx.fillRect(p.x+Math.floor(a.type.w*0.6),p.y+Math.floor(a.type.h*0.3),ew,ew);
  }

  // Player
  ctx.fillStyle='#00FF00';
  ctx.fillRect(playerX,playerY+8,PLAYER_W,PLAYER_H-8);
  // Turret
  ctx.fillRect(playerX+PLAYER_W/2-5,playerY,10,8);

  // Player bullet
  if(playerBullet){
    ctx.fillStyle='#FFF';
    ctx.fillRect(playerBullet.x,playerBullet.y,PBULLET_W,PBULLET_H);
  }

  // Alien bullets
  ctx.fillStyle='#FF4444';
  for(let i=0;i<alienBullets.length;i++){
    ctx.fillRect(alienBullets[i].x,alienBullets[i].y,ABULLET_W,ABULLET_H);
  }

  // Shields
  ctx.fillStyle='#00FF00';
  for(let s=0;s<shields.length;s++){
    const sh=shields[s];
    for(let r=0;r<SROWS;r++){
      for(let c=0;c<SCOLS;c++){
        if(sh.grid[r][c]){
          ctx.fillRect(sh.x+c*SCELL,sh.y+r*SCELL,SCELL,SCELL);
        }
      }
    }
  }

  // UFO
  if(ufo){
    ctx.fillStyle='#FF0000';
    ctx.beginPath();
    ctx.ellipse(ufo.x+UFO_W/2,ufo.y+UFO_H/2,UFO_W/2,UFO_H/2,0,0,Math.PI*2);
    ctx.fill();
  }
  // UFO score popup
  if(ufoScoreDisplay){
    ctx.fillStyle='#FF0000';ctx.font='16px monospace';ctx.textAlign='center';
    ctx.fillText('+'+ufoScoreDisplay.pts,ufoScoreDisplay.x+UFO_W/2,ufoScoreDisplay.y-4);
    ctx.textAlign='left';
  }

  // Ground line
  ctx.strokeStyle='#00FF00';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,580);ctx.lineTo(W,580);ctx.stroke();

  // HUD
  ctx.fillStyle='#FFF';ctx.font='16px monospace';ctx.textAlign='left';
  ctx.fillText('Score: '+score,10,24);
  ctx.textAlign='right';
  ctx.fillText('Best: '+highScore,W-10,24);

  // Lives (bottom-left)
  ctx.fillStyle='#00FF00';ctx.font='14px monospace';ctx.textAlign='left';
  for(let i=0;i<lives-1;i++){
    const lx=10+i*28;
    ctx.fillRect(lx,585,20,10);
    ctx.fillRect(lx+8,582,4,3);
  }
  ctx.fillStyle='#FFF';ctx.font='14px monospace';
  ctx.fillText('\u00d7'+lives,10+(lives>1?(lives-1)*28:0),596);

  // Wave (bottom-right)
  ctx.fillStyle='#AAA';ctx.font='14px monospace';ctx.textAlign='right';
  ctx.fillText('Wave: '+wave,W-10,596);
  ctx.textAlign='left';

  // Pause
  if(state===S.PAUSED){
    ctx.fillStyle='#000000CC';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFF';ctx.font='36px monospace';ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);ctx.textAlign='left';
  }

  // Game Over
  if(state===S.GAME_OVER){
    ctx.fillStyle='#000000CC';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFF';ctx.font='40px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-30);
    ctx.font='24px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    ctx.fillStyle='#AAA';ctx.font='18px monospace';
    ctx.fillText('Press Enter to Restart',W/2,H/2+50);
    ctx.textAlign='left';
  }
}

function renderStart(){
  ctx.fillStyle='#00FF00';ctx.font='48px monospace';ctx.textAlign='center';
  ctx.fillText('SPACE INVADERS',W/2,220);

  // Legend
  const legendY=280;
  ctx.font='16px monospace';
  ctx.fillStyle='#FF0000';ctx.fillRect(W/2-80,legendY,24,16);
  ctx.fillStyle='#FFF';ctx.fillText('= 30 pts',W/2-40,legendY+13);
  ctx.fillStyle='#FFCC00';ctx.fillRect(W/2-80,legendY+30,28,20);
  ctx.fillStyle='#FFF';ctx.fillText('= 20 pts',W/2-40,legendY+46);
  ctx.fillStyle='#00CCFF';ctx.fillRect(W/2-80,legendY+64,32,20);
  ctx.fillStyle='#FFF';ctx.fillText('= 10 pts',W/2-40,legendY+80);
  ctx.fillStyle='#FF0000';
  ctx.beginPath();ctx.ellipse(W/2-66,legendY+106,24,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF';ctx.fillText('= ??? pts',W/2-40,legendY+111);

  ctx.fillStyle='#AAA';ctx.font='20px monospace';
  ctx.fillText('Press Enter to Start',W/2,400);
  ctx.textAlign='left';
}

// Loop
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
