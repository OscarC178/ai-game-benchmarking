<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #000; display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="400"></canvas>
  <script>
    // Set up canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game state
    let player = { x: canvas.width/2 - 20, y: canvas.height - 40, width: 40, height: 20, speed: 5 };
    let bullets = [];
    let aliens = [];
    let alienRows = 4;
    let alienColumns = 10;
    let alienWidth = 30;
    let alienHeight = 20;
    let alienPadding = 10;
    let alienOffsetTop = 30;
    let alienOffsetLeft = 30;
    let alienDirection = 1; // 1 right, -1 left
    let alienSpeed = 0.5;
    let score = 0;
    let gameOver = false;

    // Create aliens grid
    function createAliens() {
      aliens = [];
      for(let r = 0; r < alienRows; r++) {
        for(let c = 0; c < alienColumns; c++) {
          let x = alienOffsetLeft + c * (alienWidth + alienPadding);
          let y = alienOffsetTop + r * (alienHeight + alienPadding);
          aliens.push({ x: x, y: y, width: alienWidth, height: alienHeight, status: 1 });
        }
      }
    }
    createAliens();

    // Player movement
    let rightPressed = false;
    let leftPressed = false;

    document.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowRight') rightPressed = true;
      else if(e.key === 'ArrowLeft') leftPressed = true;
      else if(e.key === ' ') { // shoot bullet
        bullets.push({ x: player.x + player.width/2 - 2, y: player.y, width: 4, height: 10, speed: 7 });
      }
    });
    document.addEventListener('keyup', (e) => {
      if(e.key === 'ArrowRight') rightPressed = false;
      else if(e.key === 'ArrowLeft') leftPressed = false;
    });

    // Update game state
    function update() {
      // Move player
      if(rightPressed && player.x + player.width < canvas.width) {
        player.x += player.speed;
      } else if(leftPressed && player.x > 0) {
        player.x -= player.speed;
      }

      // Update bullets
      for(let i = 0; i < bullets.length; i++) {
        bullets[i].y -= bullets[i].speed;
      }
      bullets = bullets.filter(b => b.y + b.height > 0);

      // Update aliens
      let hitEdge = false;
      aliens.forEach(alien => {
        if(alien.status === 1) {
          alien.x += alienSpeed * alienDirection;
          if(alien.x + alien.width > canvas.width || alien.x < 0) hitEdge = true;
        }
      });
      if(hitEdge) {
        alienDirection *= -1;
        aliens.forEach(alien => {
          alien.y += 10;
        });
      }

      // Collision detection for bullets and aliens
      bullets.forEach(bullet => {
        aliens.forEach(alien => {
          if(alien.status === 1 && bullet.x < alien.x + alien.width && bullet.x + bullet.width > alien.x && bullet.y < alien.y + alien.height && bullet.y + bullet.height > alien.y) {
            alien.status = 0;
            score += 10;
            bullet.y = -10; // remove bullet
          }
        });
      });

      // Check if aliens reached player
      aliens.forEach(alien => {
        if(alien.status === 1 && alien.y + alien.height >= player.y) {
          gameOver = true;
        }
      });
    }

    // Draw game state
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw player
      ctx.fillStyle = '#00F';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw bullets
      ctx.fillStyle = '#FF0';
      bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

      // Draw aliens
      ctx.fillStyle = '#0F0';
      aliens.forEach(alien => {
        if(alien.status === 1) {
          ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
        }
      });

      // Draw score
      ctx.fillStyle = '#FFF';
      ctx.font = '16px Arial';
      ctx.fillText('Score: ' + score, 8, 20);

      if(gameOver) {
        ctx.fillStyle = '#F00';
        ctx.font = '40px Arial';
        ctx.fillText('GAME OVER', canvas.width/2 - 120, canvas.height/2);
      }
    }

    function gameLoop() {
      if(!gameOver) {
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
