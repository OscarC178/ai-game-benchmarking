<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 800px;
      height: 600px;
      background: #000000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600" aria-label="Space Invaders game canvas"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 800;
      const HEIGHT = 600;
      const STATES = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      const player = {
        x: 380,
        y: 550,
        width: 40,
        height: 32,
        speed: 300,
        moveLeft: false,
        moveRight: false
      };

      let state = STATES.IDLE;
      let score = 0;
      let highScore = loadHighScore();
      let lives = 3;
      let wave = 1;
      let lastTime = 0;
      let playerBullet = null;
      let alienBullets = [];
      let aliens = [];
      let shields = [];
      let mysteryShip = null;
      let mysteryTimer = randomMysteryDelay();
      let alienFireTimer = randomAlienFireDelay();
      let formationDirection = 1;
      let formationBaseSpeed = 30;
      let audioCtx = null;

      function loadHighScore() {
        try {
          const value = localStorage.getItem('spaceInvadersHighScore');
          return value ? Number(value) || 0 : 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore() {
        try {
          localStorage.setItem('spaceInvadersHighScore', String(highScore));
        } catch (_) {}
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          saveHighScore();
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) audioCtx = new AudioContextClass();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume().catch(() => {});
        }
      }

      function playTone(type, frequency, duration, rampTo) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (typeof rampTo === 'number') {
          osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        }
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playShootSound() { playTone('square', 880, 0.05); }
      function playAlienHitSound() { playTone('square', 220, 0.08, 440); }
      function playPlayerHitSound() { playTone('sawtooth', 440, 0.4, 55); }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomAlienFireDelay() {
        return 0.7 + Math.random() * 0.6;
      }

      function randomMysteryDelay() {
        return 20 + Math.random() * 10;
      }

      function resetPlayerPosition() {
        player.x = 380;
        player.moveLeft = false;
        player.moveRight = false;
      }

      function createAliens() {
        aliens = [];
        const rows = [
          { color: '#FF0000', width: 24, height: 16, score: 30 },
          { color: '#FFCC00', width: 28, height: 20, score: 20 },
          { color: '#FFCC00', width: 28, height: 20, score: 20 },
          { color: '#00CCFF', width: 32, height: 20, score: 10 },
          { color: '#00CCFF', width: 32, height: 20, score: 10 }
        ];

        for (let row = 0; row < 5; row++) {
          for (let col = 0; col < 11; col++) {
            const centerX = 120 + col * 50;
            const centerY = 80 + row * 40;
            const def = rows[row];
            aliens.push({
              row,
              col,
              centerX,
              centerY,
              x: centerX - def.width / 2,
              y: centerY - def.height / 2,
              width: def.width,
              height: def.height,
              color: def.color,
              score: def.score,
              alive: true
            });
          }
        }
        formationDirection = 1;
      }

      function createShieldAt(baseX, baseY) {
        const cells = [];
        const cols = 20;
        const rows = 16;
        const cellSize = 4;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const inTopArch = row < 3 && (col < 2 || col > 17);
            const cornerCut = row > 11 && ((col < 3 && row > 12 + (2 - col)) || (col > 16 && row > 12 + (col - 17)));
            const notch = row > 11 && col >= 8 && col <= 11;
            if (inTopArch || cornerCut || notch) continue;
            cells.push({
              x: baseX + col * cellSize,
              y: baseY + row * cellSize,
              size: cellSize,
              alive: true
            });
          }
        }
        return { cells };
      }

      function createShields() {
        shields = [140, 300, 460, 620].map(x => createShieldAt(x, 480));
      }

      function resetWaveObjects() {
        createAliens();
        createShields();
        playerBullet = null;
        alienBullets = [];
        mysteryShip = null;
        mysteryTimer = randomMysteryDelay();
        alienFireTimer = randomAlienFireDelay();
      }

      function startGame() {
        ensureAudio();
        score = 0;
        lives = 3;
        wave = 1;
        formationBaseSpeed = 30;
        resetPlayerPosition();
        resetWaveObjects();
        state = STATES.PLAYING;
      }

      function getAliveAliens() {
        return aliens.filter(alien => alien.alive);
      }

      function getFormationSpeed() {
        const destroyed = 55 - getAliveAliens().length;
        return formationBaseSpeed + Math.floor(destroyed / 5) * 5;
      }

      function getFormationBounds() {
        const alive = getAliveAliens();
        if (!alive.length) return null;
        let minX = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        for (const alien of alive) {
          minX = Math.min(minX, alien.x);
          maxX = Math.max(maxX, alien.x + alien.width);
          maxY = Math.max(maxY, alien.y + alien.height);
        }
        return { minX, maxX, maxY };
      }

      function moveAliens(dt) {
        const speed = getFormationSpeed();
        const dx = formationDirection * speed * dt;
        for (const alien of aliens) {
          if (alien.alive) alien.x += dx;
        }

        const bounds = getFormationBounds();
        if (!bounds) return;

        if ((formationDirection > 0 && bounds.maxX >= 760) || (formationDirection < 0 && bounds.minX <= 40)) {
          const correction = formationDirection > 0 ? 760 - bounds.maxX : 40 - bounds.minX;
          for (const alien of aliens) {
            if (!alien.alive) continue;
            alien.x += correction;
            alien.y += 20;
          }
          formationDirection *= -1;
          destroyShieldCellsByAliens();
        }

        destroyShieldCellsByAliens();

        const afterBounds = getFormationBounds();
        if (afterBounds && afterBounds.maxY >= 540) {
          setGameOver();
        }
      }

      function destroyShieldCellsByAliens() {
        for (const alien of aliens) {
          if (!alien.alive) continue;
          const rect = { x: alien.x, y: alien.y, width: alien.width, height: alien.height };
          for (const shield of shields) {
            for (const cell of shield.cells) {
              if (!cell.alive) continue;
              if (rectsOverlap(rect, { x: cell.x, y: cell.y, width: cell.size, height: cell.size })) {
                cell.alive = false;
              }
            }
          }
        }
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
      }

      function firePlayerBullet() {
        if (state !== STATES.PLAYING || playerBullet) return;
        playerBullet = {
          x: player.x + player.width / 2 - 1.5,
          y: player.y,
          width: 3,
          height: 12,
          speed: 500
        };
        playShootSound();
      }

      function getBottomAliensByColumn() {
        const result = [];
        for (let col = 0; col < 11; col++) {
          let bottom = null;
          for (const alien of aliens) {
            if (!alien.alive || alien.col !== col) continue;
            if (!bottom || alien.y > bottom.y) bottom = alien;
          }
          if (bottom) result.push(bottom);
        }
        return result;
      }

      function fireAlienBullet() {
        if (alienBullets.length >= 3) return;
        const shooters = getBottomAliensByColumn();
        if (!shooters.length) return;
        const shooter = shooters[Math.floor(Math.random() * shooters.length)];
        alienBullets.push({
          x: shooter.x + shooter.width / 2 - 1.5,
          y: shooter.y + shooter.height,
          width: 3,
          height: 12,
          speed: 250
        });
      }

      function updatePlayer(dt) {
        let dx = 0;
        if (player.moveLeft) dx -= player.speed * dt;
        if (player.moveRight) dx += player.speed * dt;
        player.x = clamp(player.x + dx, 0, WIDTH - player.width);
      }

      function updatePlayerBullet(dt) {
        if (!playerBullet) return;
        playerBullet.y -= playerBullet.speed * dt;
        if (playerBullet.y + playerBullet.height < 0) {
          playerBullet = null;
          return;
        }

        if (hitShieldWithBullet(playerBullet, true)) {
          playerBullet = null;
          return;
        }

        if (mysteryShip && rectsOverlap(playerBullet, mysteryShip)) {
          score += mysteryShip.points;
          updateHighScore();
          mysteryShip = null;
          mysteryTimer = randomMysteryDelay();
          playerBullet = null;
          playAlienHitSound();
          return;
        }

        for (const alien of aliens) {
          if (!alien.alive) continue;
          if (rectsOverlap(playerBullet, alien)) {
            alien.alive = false;
            score += alien.score;
            updateHighScore();
            playerBullet = null;
            playAlienHitSound();
            if (getAliveAliens().length === 0) {
              advanceWave();
            }
            return;
          }
        }
      }

      function hitShieldWithBullet(bullet, fromPlayer) {
        for (const shield of shields) {
          for (const cell of shield.cells) {
            if (!cell.alive) continue;
            if (rectsOverlap(bullet, { x: cell.x, y: cell.y, width: cell.size, height: cell.size })) {
              cell.alive = false;
              return true;
            }
          }
        }
        return false;
      }

      function updateAlienBullets(dt) {
        for (let i = alienBullets.length - 1; i >= 0; i--) {
          const bullet = alienBullets[i];
          bullet.y += bullet.speed * dt;

          if (bullet.y > HEIGHT) {
            alienBullets.splice(i, 1);
            continue;
          }

          if (hitShieldWithBullet(bullet, false)) {
            alienBullets.splice(i, 1);
            continue;
          }

          if (rectsOverlap(bullet, player)) {
            alienBullets.splice(i, 1);
            lives -= 1;
            playPlayerHitSound();
            if (lives <= 0) {
              setGameOver();
            }
            continue;
          }
        }
      }

      function updateAlienFire(dt) {
        alienFireTimer -= dt;
        if (alienFireTimer <= 0) {
          fireAlienBullet();
          alienFireTimer = randomAlienFireDelay();
        }
      }

      function updateMysteryShip(dt) {
        mysteryTimer -= dt;
        if (!mysteryShip && mysteryTimer <= 0) {
          mysteryShip = {
            x: -48,
            y: 35,
            width: 48,
            height: 16,
            speed: 150,
            points: [50, 100, 150, 300][Math.floor(Math.random() * 4)]
          };
        }

        if (mysteryShip) {
          mysteryShip.x += mysteryShip.speed * dt;
          if (mysteryShip.x > WIDTH) {
            mysteryShip = null;
            mysteryTimer = randomMysteryDelay();
          }
        }
      }

      function advanceWave() {
        wave += 1;
        formationBaseSpeed = 30 + (wave - 1) * 10;
        resetWaveObjects();
      }

      function setGameOver() {
        state = STATES.GAME_OVER;
        updateHighScore();
      }

      function update(dt) {
        if (state !== STATES.PLAYING) return;
        updatePlayer(dt);
        moveAliens(dt);
        updatePlayerBullet(dt);
        updateAlienBullets(dt);
        updateAlienFire(dt);
        updateMysteryShip(dt);
      }

      function drawPlayer(x, y, scale = 1) {
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(x, y + 8 * scale, 40 * scale, 24 * scale);
        ctx.fillRect(x + 15 * scale, y, 10 * scale, 8 * scale);
      }

      function drawAlien(alien) {
        ctx.fillStyle = alien.color;
        ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
        if (alien.width >= 28) {
          ctx.clearRect(alien.x + 4, alien.y + 4, 4, 4);
          ctx.clearRect(alien.x + alien.width - 8, alien.y + 4, 4, 4);
        }
      }

      function drawShields() {
        ctx.fillStyle = '#00FF00';
        for (const shield of shields) {
          for (const cell of shield.cells) {
            if (!cell.alive) continue;
            ctx.fillRect(cell.x, cell.y, cell.size, cell.size);
          }
        }
      }

      function drawPlayerBullet() {
        if (!playerBullet) return;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.width, playerBullet.height);
      }

      function drawAlienBullets() {
        ctx.fillStyle = '#FF4444';
        for (const bullet of alienBullets) {
          ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        }
      }

      function drawMysteryShip() {
        if (!mysteryShip) return;
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.roundRect(mysteryShip.x, mysteryShip.y, mysteryShip.width, mysteryShip.height, 8);
        ctx.fill();
      }

      function drawHud() {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('Score: ' + score, 10, 24);
        ctx.textAlign = 'right';
        ctx.fillText('Best: ' + highScore, WIDTH - 10, 24);

        for (let i = 0; i < lives; i++) {
          drawPlayer(10 + i * 26, 568, 0.5);
        }
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'left';
        ctx.fillText('×' + lives, 10 + Math.max(0, lives) * 26, 592);

        ctx.fillStyle = '#AAAAAA';
        ctx.textAlign = 'right';
        ctx.font = '14px monospace';
        ctx.fillText('Wave: ' + wave, WIDTH - 10, 592);
      }

      function drawStartScreen() {
        ctx.fillStyle = '#00FF00';
        ctx.font = '48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SPACE INVADERS', WIDTH / 2, 220);

        const legendY = 285;
        const legend = [
          { color: '#FF0000', text: '= 30' },
          { color: '#FFCC00', text: '= 20' },
          { color: '#00CCFF', text: '= 10' }
        ];

        ctx.font = '20px monospace';
        for (let i = 0; i < legend.length; i++) {
          const item = legend[i];
          const y = legendY + i * 34;
          ctx.fillStyle = item.color;
          ctx.fillRect(290, y - 10, 32, 18);
          ctx.fillStyle = '#FFFFFF';
          ctx.textAlign = 'left';
          ctx.fillText(item.text, 340, y + 2);
        }

        ctx.fillStyle = '#AAAAAA';
        ctx.textAlign = 'center';
        ctx.fillText('Press Enter to Start', WIDTH / 2, 400);
      }

      function drawOverlay(title) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '40px monospace';
        ctx.fillText(title, WIDTH / 2, 260);
      }

      function drawPauseOverlay() {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '36px monospace';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
      }

      function drawGameOverOverlay() {
        drawOverlay('GAME OVER');
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '24px monospace';
        ctx.fillText('Score: ' + score, WIDTH / 2, 315);
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', WIDTH / 2, 360);
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        if (state === STATES.IDLE) {
          drawStartScreen();
          return;
        }

        drawShields();
        for (const alien of aliens) {
          if (alien.alive) drawAlien(alien);
        }
        drawMysteryShip();
        drawPlayer(player.x, player.y, 1);
        drawPlayerBullet();
        drawAlienBullets();
        drawHud();

        if (state === STATES.PAUSED) {
          drawPauseOverlay();
        } else if (state === STATES.GAME_OVER) {
          drawGameOverOverlay();
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        dt = Math.min(dt, 0.05);
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', (event) => {
        if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'Space', 'Enter', 'KeyP'].includes(event.code)) {
          event.preventDefault();
        }

        if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
          player.moveLeft = true;
        } else if (event.code === 'ArrowRight' || event.code === 'KeyD') {
          player.moveRight = true;
        } else if (event.code === 'Space') {
          ensureAudio();
          firePlayerBullet();
        } else if (event.code === 'Enter') {
          ensureAudio();
          if (state === STATES.IDLE || state === STATES.GAME_OVER) {
            startGame();
          }
        } else if (event.code === 'KeyP') {
          if (state === STATES.PLAYING) state = STATES.PAUSED;
          else if (state === STATES.PAUSED) state = STATES.PLAYING;
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
          player.moveLeft = false;
        } else if (event.code === 'ArrowRight' || event.code === 'KeyD') {
          player.moveRight = false;
        }
      });

      requestAnimationFrame(loop);
    })();
  </script>
</body>
