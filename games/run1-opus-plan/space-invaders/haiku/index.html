<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script>
    // T01-T15: Complete Space Invaders game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const PLAYER_WIDTH = 40;
    const PLAYER_HEIGHT = 32;
    const PLAYER_Y = 550;
    const PLAYER_SPEED = 300;
    const BULLET_WIDTH = 3;
    const BULLET_HEIGHT = 12;
    const BULLET_SPEED = 500;
    const ALIEN_BULLET_SPEED = 250;
    const ALIEN_SPACING_H = 50;
    const ALIEN_SPACING_V = 40;
    const ALIEN_COLS = 11;
    const ALIEN_ROWS = 5;
    const ALIEN_START_X = 120;
    const ALIEN_START_Y = 80;
    const ALIEN_SPEED_BASE = 30;
    const ALIEN_SPEED_INCREMENT = 5;
    const SHIELD_COUNT = 4;
    const SHIELD_Y = 480;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('spaceInvadersHighScore') || '0'),
      lives: 3,
      wave: 1,
      alienSpeed: ALIEN_SPEED_BASE,
      alienCount: 0,
      mysterySpawnTimer: 0,
      mysterySpawnInterval: 25
    };

    // Player
    const player = {
      x: (CANVAS_WIDTH - PLAYER_WIDTH) / 2,
      y: PLAYER_Y,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      dx: 0
    };

    // Bullets
    let playerBullet = null;
    let alienBullets = [];

    // Aliens
    let aliens = [];
    let alienFormation = {
      x: 0,
      y: 0,
      dx: ALIEN_SPEED_BASE,
      direction: 1
    };

    // Shields
    let shields = [];

    // Mystery ship
    let mysteryShip = null;

    // Input
    const keys = {};

    // Alien configuration
    const ALIEN_TYPES = [
      { rows: [0], width: 24, height: 16, color: '#FF0000', points: 30 },
      { rows: [1, 2], width: 28, height: 20, color: '#FFCC00', points: 20 },
      { rows: [3, 4], width: 32, height: 20, color: '#00CCFF', points: 10 }
    ];

    function getAlienType(row) {
      for (const type of ALIEN_TYPES) {
        if (type.rows.includes(row)) return type;
      }
      return ALIEN_TYPES[2];
    }

    function initShields() {
      shields = [];
      const shieldPositions = [140, 300, 460, 620];
      for (const shieldX of shieldPositions) {
        const shield = { x: shieldX, y: SHIELD_Y, cells: [] };
        // Arch shape: 20×16 grid with corners cut
        for (let row = 0; row < 4; row++) {
          for (let col = 0; col < 5; col++) {
            // Arch: cut bottom corners
            if ((row === 3 && col === 0) || (row === 3 && col === 4)) continue;
            shield.cells.push({ x: col, y: row, alive: true });
          }
        }
        shields.push(shield);
      }
    }

    function initAliens() {
      aliens = [];
      alienFormation.x = 0;
      alienFormation.y = 0;
      alienFormation.direction = 1;
      alienFormation.dx = game.alienSpeed;

      for (let row = 0; row < ALIEN_ROWS; row++) {
        for (let col = 0; col < ALIEN_COLS; col++) {
          const type = getAlienType(row);
          aliens.push({
            col,
            row,
            alive: true,
            type: type,
            x: ALIEN_START_X + col * ALIEN_SPACING_H,
            y: ALIEN_START_Y + row * ALIEN_SPACING_V
          });
        }
      }
      game.alienCount = aliens.filter(a => a.alive).length;
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.lives = 3;
      game.wave = 1;
      game.alienSpeed = ALIEN_SPEED_BASE;
      game.mysterySpawnTimer = 0;
      initAliens();
      initShields();
      playerBullet = null;
      alienBullets = [];
      mysteryShip = null;
    }

    function nextWave() {
      game.wave++;
      game.alienSpeed += 10;
      alienFormation.dx = game.alienSpeed;
      game.mysterySpawnTimer = 0;
      initAliens();
      initShields();
      playerBullet = null;
      alienBullets = [];
      mysteryShip = null;
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }

      if ((e.key === ' ') && game.state === STATE.PLAYING && !playerBullet) {
        playerBullet = {
          x: player.x + player.width / 2 - BULLET_WIDTH / 2,
          y: player.y,
          width: BULLET_WIDTH,
          height: BULLET_HEIGHT
        };
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function updatePlayer(dt) {
      player.dx = 0;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.dx = -PLAYER_SPEED;
      } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.dx = PLAYER_SPEED;
      }

      player.x += player.dx * dt;
      player.x = Math.max(0, Math.min(player.x, CANVAS_WIDTH - PLAYER_WIDTH));
    }

    function updatePlayerBullet(dt) {
      if (!playerBullet) return;

      playerBullet.y -= BULLET_SPEED * dt;

      if (playerBullet.y < 0) {
        playerBullet = null;
        return;
      }

      // Check alien collisions
      for (let i = 0; i < aliens.length; i++) {
        const alien = aliens[i];
        if (!alien.alive) continue;

        if (
          playerBullet.x < alien.x + alien.type.width &&
          playerBullet.x + playerBullet.width > alien.x &&
          playerBullet.y < alien.y + alien.type.height &&
          playerBullet.y + playerBullet.height > alien.y
        ) {
          alien.alive = false;
          playerBullet = null;
          game.score += alien.type.points;
          game.alienCount--;

          // Recalculate speed
          if (game.alienCount % 5 === 0 && game.alienCount > 0) {
            alienFormation.dx = game.alienSpeed + (ALIEN_SPEED_INCREMENT * Math.floor((55 - game.alienCount) / 5));
          }

          if (game.alienCount === 0) {
            nextWave();
          }
          return;
        }
      }

      // Check mystery ship collision
      if (mysteryShip && playerBullet.x < mysteryShip.x + 48 &&
          playerBullet.x + playerBullet.width > mysteryShip.x &&
          playerBullet.y < mysteryShip.y + 16 &&
          playerBullet.y + playerBullet.height > mysteryShip.y) {
        const points = [50, 100, 150, 300][Math.floor(Math.random() * 4)];
        game.score += points;
        mysteryShip = null;
        playerBullet = null;
        game.mysterySpawnTimer = 0;
        return;
      }

      // Check shield collisions
      for (const shield of shields) {
        for (let i = shield.cells.length - 1; i >= 0; i--) {
          const cell = shield.cells[i];
          if (!cell.alive) continue;
          const cellX = shield.x + cell.x * 4;
          const cellY = shield.y + cell.y * 4;
          if (
            playerBullet.x < cellX + 4 &&
            playerBullet.x + playerBullet.width > cellX &&
            playerBullet.y < cellY + 4 &&
            playerBullet.y + playerBullet.height > cellY
          ) {
            cell.alive = false;
            playerBullet = null;
            return;
          }
        }
      }
    }

    function updateAliens(dt) {
      alienFormation.x += alienFormation.dx * alienFormation.direction * dt;

      // Check boundaries and reverse
      let shouldReverse = false;
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const alienScreenX = ALIEN_START_X + alienFormation.x + alien.col * ALIEN_SPACING_H;
        if (alienScreenX >= 760 || alienScreenX <= 40) {
          shouldReverse = true;
          break;
        }
      }

      if (shouldReverse) {
        alienFormation.direction *= -1;
        alienFormation.y += 20;
      }

      // Check if aliens reached bottom
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const alienScreenY = ALIEN_START_Y + alienFormation.y + alien.row * ALIEN_SPACING_V;
        if (alienScreenY >= 540) {
          game.state = STATE.GAME_OVER;
          game.highScore = Math.max(game.highScore, game.score);
          localStorage.setItem('spaceInvadersHighScore', game.highScore);
          return;
        }
      }
    }

    function updateAlienBullets(dt) {
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const bullet = alienBullets[i];
        bullet.y += ALIEN_BULLET_SPEED * dt;

        if (bullet.y > CANVAS_HEIGHT) {
          alienBullets.splice(i, 1);
          continue;
        }

        // Check player collision
        if (bullet.x < player.x + player.width &&
            bullet.x + bullet.width > player.x &&
            bullet.y < player.y + player.height &&
            bullet.y + bullet.height > player.y) {
          game.lives--;
          alienBullets.splice(i, 1);
          if (game.lives <= 0) {
            game.state = STATE.GAME_OVER;
            game.highScore = Math.max(game.highScore, game.score);
            localStorage.setItem('spaceInvadersHighScore', game.highScore);
          }
          continue;
        }

        // Check shield collisions
        for (const shield of shields) {
          for (let j = shield.cells.length - 1; j >= 0; j--) {
            const cell = shield.cells[j];
            if (!cell.alive) continue;
            const cellX = shield.x + cell.x * 4;
            const cellY = shield.y + cell.y * 4;
            if (
              bullet.x < cellX + 4 &&
              bullet.x + bullet.width > cellX &&
              bullet.y < cellY + 4 &&
              bullet.y + bullet.height > cellY
            ) {
              cell.alive = false;
              alienBullets.splice(i, 1);
              return;
            }
          }
        }
      }
    }

    function fireAlienBullet() {
      if (alienBullets.length >= 3 || game.alienCount === 0) return;

      const bottomAliens = [];
      for (let col = 0; col < ALIEN_COLS; col++) {
        for (let row = ALIEN_ROWS - 1; row >= 0; row--) {
          const alien = aliens.find(a => a.col === col && a.row === row && a.alive);
          if (alien) {
            bottomAliens.push(alien);
            break;
          }
        }
      }

      if (bottomAliens.length === 0) return;

      const alien = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];
      const alienScreenX = ALIEN_START_X + alienFormation.x + alien.col * ALIEN_SPACING_H;
      const alienScreenY = ALIEN_START_Y + alienFormation.y + alien.row * ALIEN_SPACING_V;

      alienBullets.push({
        x: alienScreenX + alien.type.width / 2 - BULLET_WIDTH / 2,
        y: alienScreenY + alien.type.height,
        width: BULLET_WIDTH,
        height: BULLET_HEIGHT
      });
    }

    function updateMysteryShip(dt) {
      game.mysterySpawnTimer += dt;

      if (mysteryShip) {
        mysteryShip.x += 150 * dt;
        if (mysteryShip.x > CANVAS_WIDTH) {
          mysteryShip = null;
          game.mysterySpawnTimer = 0;
        }
      } else if (game.mysterySpawnTimer > game.mysterySpawnInterval) {
        game.mysterySpawnInterval = 20 + Math.random() * 10;
        mysteryShip = { x: -50, y: 35 };
        game.mysterySpawnTimer = 0;
      }
    }

    let alienFireTimer = 0;
    function updateGame(dt) {
      updatePlayer(dt);
      updatePlayerBullet(dt);
      updateAliens(dt);
      updateAlienBullets(dt);
      updateMysteryShip(dt);

      alienFireTimer += dt;
      if (alienFireTimer > 1.0) {
        fireAlienBullet();
        alienFireTimer = (Math.random() - 0.5) * 0.6;
      }
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderStartScreen() {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE INVADERS', CANVAS_WIDTH / 2, 220);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🢁 30 pts | 🢁 20 pts | 🢁 10 pts | UFO 50-300 pts', CANVAS_WIDTH / 2, 280);

      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 400);
    }

    function renderGameScreen() {
      // Aliens
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const screenX = ALIEN_START_X + alienFormation.x + alien.col * ALIEN_SPACING_H;
        const screenY = ALIEN_START_Y + alienFormation.y + alien.row * ALIEN_SPACING_V;
        ctx.fillStyle = alien.type.color;
        ctx.fillRect(screenX - alien.type.width / 2, screenY - alien.type.height / 2, alien.type.width, alien.type.height);
      }

      // Mystery ship
      if (mysteryShip) {
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(mysteryShip.x, mysteryShip.y, 48, 16);
      }

      // Shields
      for (const shield of shields) {
        for (const cell of shield.cells) {
          if (cell.alive) {
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(shield.x + cell.x * 4, shield.y + cell.y * 4, 4, 4);
          }
        }
      }

      // Player
      ctx.fillStyle = '#00FF00';
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillRect(player.x + player.width / 2 - 5, player.y - 8, 10, 8);

      // Bullets
      if (playerBullet) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.width, playerBullet.height);
      }

      for (const bullet of alienBullets) {
        ctx.fillStyle = '#FF4444';
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      }

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 24);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 24);

      ctx.textAlign = 'left';
      ctx.fillText(`♥ ×${game.lives}`, 10, CANVAS_HEIGHT - 10);

      ctx.textAlign = 'right';
      ctx.font = '14px monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText(`Wave: ${game.wave}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 10);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 260);

      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${game.score}`, CANVAS_WIDTH / 2, 310);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 360);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING) {
        updateGame(dt);
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start
    gameLoop();
  </script>
</body>
</html>
