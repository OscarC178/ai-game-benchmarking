<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frogger</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="600" height="700"></canvas>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 700;
  const CELL = 40, COLS = 15, ROWS = 13;
  const PLAYFIELD_TOP = 40;

  // --- T03: Game State ---
  const IDLE = 0, PLAYING = 1, PAUSED = 2, GAME_OVER = 3;
  let state = IDLE;
  let score = 0, highScore = 0, lives = 3, level = 1;
  let timer = 30, maxTimer = 30;
  let maxRowReached = 12; // bottom row (row 12 = safe start)
  try { highScore = parseInt(localStorage.getItem('frogger_high')) || 0; } catch(e) {}

  // --- T04: Frog ---
  const FROG_SIZE = 32;
  let frog = { col: 7, row: 12, x: 0, y: 0, hopAnim: 0, hopDX: 0, hopDY: 0, dead: false, deathTimer: 0, deathType: '' };

  function frogGridPos(col, row) {
    return { x: col * CELL + (CELL - FROG_SIZE) / 2, y: PLAYFIELD_TOP + row * CELL + (CELL - FROG_SIZE) / 2 };
  }
  function resetFrog() {
    frog.col = 7; frog.row = 12;
    const p = frogGridPos(7, 12);
    frog.x = p.x; frog.y = p.y;
    frog.hopAnim = 0; frog.hopDX = 0; frog.hopDY = 0;
    frog.dead = false; frog.deathTimer = 0;
    frog.ridingVx = 0;
    maxRowReached = 12;
    timer = maxTimer;
  }

  function drawFrog(x, y, size) {
    // Body
    ctx.fillStyle = '#22CC22';
    const r = size * 0.2;
    const bx = x, by = y, bw = size, bh = size;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
    ctx.lineTo(bx + bw, by + bh - r);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh);
    ctx.lineTo(bx + r, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.fill();
    // Eyes
    const eyeR = size * 0.12;
    const eyeY = y + size * 0.2;
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(x + size * 0.3, eyeY, eyeR, 0, Math.PI * 2);
    ctx.arc(x + size * 0.7, eyeY, eyeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(x + size * 0.3 + 1, eyeY - 1, eyeR * 0.5, 0, Math.PI * 2);
    ctx.arc(x + size * 0.7 + 1, eyeY - 1, eyeR * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- T05 & T07: Lanes ---
  const ROAD_LANES = [
    { row: 11, y: PLAYFIELD_TOP + 11 * CELL, dir: 1,  speed: 80,  vw: 64,  vh: 32, color: '#CCCC00', spacing: 200, type: 'car' },
    { row: 10, y: PLAYFIELD_TOP + 10 * CELL, dir: -1, speed: 60,  vw: 96,  vh: 32, color: '#3344AA', spacing: 250, type: 'truck' },
    { row: 9,  y: PLAYFIELD_TOP + 9 * CELL,  dir: 1,  speed: 140, vw: 48,  vh: 32, color: '#DD2222', spacing: 180, type: 'car' },
    { row: 8,  y: PLAYFIELD_TOP + 8 * CELL,  dir: -1, speed: 70,  vw: 96,  vh: 32, color: '#CCCCCC', spacing: 220, type: 'truck' },
    { row: 7,  y: PLAYFIELD_TOP + 7 * CELL,  dir: 1,  speed: 160, vw: 48,  vh: 32, color: '#FF66AA', spacing: 240, type: 'car' },
  ];

  const RIVER_LANES = [
    { row: 5, y: PLAYFIELD_TOP + 5 * CELL, dir: 1,  speed: 60,  pw: 120, ph: 32, color: '#885522', spacing: 200, type: 'log', diveCycle: false },
    { row: 4, y: PLAYFIELD_TOP + 4 * CELL, dir: -1, speed: 50,  pw: 120, ph: 32, color: '#448844', spacing: 180, type: 'turtle', diveCycle: true, diveEvery: 3 },
    { row: 3, y: PLAYFIELD_TOP + 3 * CELL, dir: 1,  speed: 40,  pw: 200, ph: 32, color: '#774411', spacing: 300, type: 'log', diveCycle: false },
    { row: 2, y: PLAYFIELD_TOP + 2 * CELL, dir: -1, speed: 70,  pw: 80,  ph: 32, color: '#448844', spacing: 160, type: 'turtle', diveCycle: true, diveEvery: 2 },
    { row: 1, y: PLAYFIELD_TOP + 1 * CELL, dir: 1,  speed: 80,  pw: 160, ph: 32, color: '#885522', spacing: 250, type: 'log', diveCycle: false },
  ];

  let vehicles = [];
  let platforms = [];

  function createVehicles() {
    vehicles = [];
    for (const lane of ROAD_LANES) {
      const sp = lane.spacing;
      const count = Math.ceil((W + sp) / sp) + 1;
      const laneSpeed = lane.speed * Math.pow(1.15, level - 1);
      for (let i = 0; i < count; i++) {
        vehicles.push({
          x: i * sp * (lane.dir === 1 ? 1 : -1) + (lane.dir === -1 ? W : 0),
          y: lane.y + (CELL - lane.vh) / 2,
          w: lane.vw, h: lane.vh,
          vx: lane.dir * laneSpeed,
          color: lane.color, type: lane.type,
          lane
        });
      }
    }
  }

  function createPlatforms() {
    platforms = [];
    for (const lane of RIVER_LANES) {
      const sp = lane.spacing;
      const count = Math.ceil((W + sp) / sp) + 1;
      const laneSpeed = lane.speed * Math.pow(1.15, level - 1);
      for (let i = 0; i < count; i++) {
        const isDiver = lane.diveCycle && (i % lane.diveEvery === 0);
        platforms.push({
          x: i * sp * (lane.dir === 1 ? 1 : -1) + (lane.dir === -1 ? W : 0),
          y: lane.y + (CELL - lane.ph) / 2,
          w: lane.pw, h: lane.ph,
          vx: lane.dir * laneSpeed,
          color: lane.color, type: lane.type,
          diver: isDiver,
          divePhase: 0, // 0–7s cycle: 0–3 visible, 3–4 sinking, 4–6 submerged, 6–7 rising
          lane
        });
      }
    }
  }

  // --- T10: Home Bays ---
  const BAY_X = [20, 140, 260, 380, 500];
  const BAY_W = 48, BAY_H = 36;
  let baysFilled = [false, false, false, false, false];

  function drawBays() {
    for (let i = 0; i < 5; i++) {
      const bx = BAY_X[i], by = PLAYFIELD_TOP;
      if (baysFilled[i]) {
        ctx.fillStyle = '#22CC22';
        ctx.fillRect(bx, by, BAY_W, BAY_H);
        // Mini frog
        drawFrog(bx + 8, by + 4, 20);
      } else {
        ctx.fillStyle = '#000066';
        ctx.fillRect(bx, by, BAY_W, BAY_H);
      }
    }
  }

  // --- Audio ---
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  function playSound(type) {
    ensureAudio();
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      if (type === 'hop') {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 600;
        g.gain.setValueAtTime(0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.03);
      } else if (type === 'splash') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * 0.8;
        const s = audioCtx.createBufferSource();
        const g = audioCtx.createGain();
        s.buffer = buf; g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        s.connect(g); g.connect(audioCtx.destination); s.start(t);
      } else if (type === 'squash') {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 110;
        g.gain.setValueAtTime(0.15, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.1);
      } else if (type === 'fillBay') {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(440, t); o.frequency.exponentialRampToValueAtTime(880, t + 0.1);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.12);
      } else if (type === 'levelComplete') {
        [440, 554, 659, 880].forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'square'; o.frequency.value = f;
          g.gain.setValueAtTime(0.08, t + i * 0.07);
          g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.08);
          o.connect(g); g.connect(audioCtx.destination);
          o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.1);
        });
      }
    } catch(e) {}
  }

  // --- Input ---
  const justPressed = {};
  const keys = {};
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
    if (!keys[e.code]) justPressed[e.code] = true;
    keys[e.code] = true;
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // --- Game Init ---
  function startGame() {
    score = 0; lives = 3; level = 1;
    baysFilled = [false, false, false, false, false];
    createVehicles();
    createPlatforms();
    resetFrog();
    state = PLAYING;
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function killFrog(type) {
    if (frog.dead) return;
    frog.dead = true;
    frog.deathTimer = 0.5;
    frog.deathType = type;
    if (type === 'squash') playSound('squash');
    else playSound('splash');
  }

  function frogDied() {
    lives--;
    if (lives <= 0) {
      state = GAME_OVER;
      if (score > highScore) { highScore = score; try { localStorage.setItem('frogger_high', highScore); } catch(e) {} }
    } else {
      resetFrog();
    }
  }

  function nextLevel() {
    playSound('levelComplete');
    level++;
    baysFilled = [false, false, false, false, false];
    createVehicles();
    createPlatforms();
    resetFrog();
  }

  // --- UPDATE ---
  function update(dt) {
    if (justPressed['Enter']) {
      if (state === IDLE || state === GAME_OVER) startGame();
    }
    if (justPressed['KeyP'] && (state === PLAYING || state === PAUSED)) {
      state = state === PLAYING ? PAUSED : PLAYING;
    }

    if (state !== PLAYING) return;

    // --- Frog death animation ---
    if (frog.dead) {
      frog.deathTimer -= dt;
      if (frog.deathTimer <= 0) frogDied();
      return;
    }

    // --- Frog hop animation ---
    if (frog.hopAnim > 0) {
      frog.hopAnim -= dt;
      const progress = 1 - Math.max(0, frog.hopAnim) / 0.08;
      const target = frogGridPos(frog.col, frog.row);
      const startX = target.x - frog.hopDX * CELL;
      const startY = target.y - frog.hopDY * CELL;
      frog.x = startX + (target.x - startX) * progress;
      frog.y = startY + (target.y - startY) * progress;
      if (frog.hopAnim <= 0) {
        frog.x = target.x;
        frog.y = target.y;
        frog.hopAnim = 0;
      }
      // Still carry frog on platform during hop completion
      frog.x += frog.ridingVx * dt;
    } else {
      // Input — grid hop
      let dx = 0, dy = 0;
      if (justPressed['ArrowUp'] || justPressed['KeyW']) dy = -1;
      else if (justPressed['ArrowDown'] || justPressed['KeyS']) dy = 1;
      else if (justPressed['ArrowLeft'] || justPressed['KeyA']) dx = -1;
      else if (justPressed['ArrowRight'] || justPressed['KeyD']) dx = 1;

      if (dx !== 0 || dy !== 0) {
        const newCol = frog.col + dx;
        const newRow = frog.row + dy;
        if (newCol >= 0 && newCol < COLS && newRow >= 0 && newRow <= 12) {
          frog.col = newCol;
          frog.row = newRow;
          frog.hopAnim = 0.08;
          frog.hopDX = dx;
          frog.hopDY = dy;
          playSound('hop');

          // Forward scoring
          if (newRow < maxRowReached) {
            score += 10;
            maxRowReached = newRow;
          }
        }
      }

      // Platform riding (when not hopping)
      frog.x += frog.ridingVx * dt;
    }

    // --- Timer ---
    timer -= dt;
    if (timer <= 0) {
      timer = 0;
      killFrog('splash');
      return;
    }

    // --- Update vehicles ---
    for (const v of vehicles) {
      v.x += v.vx * dt;
      // Wrap
      if (v.vx > 0 && v.x > W + 10) v.x = -v.w - 10;
      if (v.vx < 0 && v.x + v.w < -10) v.x = W + 10;
    }

    // --- Update platforms ---
    for (const p of platforms) {
      p.x += p.vx * dt;
      // Wrap
      if (p.vx > 0 && p.x > W + 10) p.x = -p.w - 10;
      if (p.vx < 0 && p.x + p.w < -10) p.x = W + 10;
      // Dive cycle for divers
      if (p.diver) {
        p.divePhase = (p.divePhase + dt) % 7;
      }
    }

    // --- Check frog position ---
    const frogCX = frog.x + FROG_SIZE / 2;
    const frogCY = frog.y + FROG_SIZE / 2;
    frog.ridingVx = 0;

    // Row 0 = home bays row
    if (frog.row === 0) {
      // Check home bays
      let landedBay = -1;
      for (let i = 0; i < 5; i++) {
        if (frogCX >= BAY_X[i] && frogCX <= BAY_X[i] + BAY_W) {
          landedBay = i;
          break;
        }
      }
      if (landedBay >= 0 && !baysFilled[landedBay]) {
        baysFilled[landedBay] = true;
        score += 50 + Math.floor(timer) * 2;
        playSound('fillBay');
        // Check all filled
        if (baysFilled.every(b => b)) {
          score += 1000;
          nextLevel();
        } else {
          resetFrog();
        }
      } else {
        // Gap or filled bay
        killFrog('splash');
      }
      return;
    }

    // Road zone: rows 7–11
    if (frog.row >= 7 && frog.row <= 11) {
      for (const v of vehicles) {
        if (aabb(frogCX, frogCY, FROG_SIZE, FROG_SIZE, v.x, v.y, v.w, v.h)) {
          killFrog('squash');
          return;
        }
      }
    }

    // River zone: rows 1–5
    if (frog.row >= 1 && frog.row <= 5) {
      let onPlatform = false;
      for (const p of platforms) {
        // Check row match
        if (p.lane.row !== frog.row) continue;
        // Submerged turtles can't be stood on
        if (p.diver && p.divePhase >= 4 && p.divePhase < 6) continue;
        // AABB check with frog center
        if (frogCX >= p.x && frogCX <= p.x + p.w &&
            frogCY >= p.y && frogCY <= p.y + p.h) {
          onPlatform = true;
          frog.ridingVx = p.vx;
          break;
        }
      }
      if (!onPlatform) {
        killFrog('splash');
        return;
      }
      // Check carried off screen
      if (frog.x + FROG_SIZE < 0 || frog.x > W) {
        killFrog('splash');
        return;
      }
    }
  }

  function aabb(cx, cy, cw, ch, rx, ry, rw, rh) {
    return cx - cw / 2 < rx + rw && cx + cw / 2 > rx &&
           cy - ch / 2 < ry + rh && cy + ch / 2 > ry;
  }

  // --- DRAW ---
  function draw() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    if (state === IDLE) {
      drawStartScreen();
      return;
    }

    drawBackground();
    drawBays();

    // Platforms
    for (const p of platforms) {
      if (p.diver) {
        if (p.divePhase >= 4 && p.divePhase < 6) continue; // submerged
        if ((p.divePhase >= 3 && p.divePhase < 4) || (p.divePhase >= 6)) {
          // Sinking or rising — blink at 8Hz
          if (Math.floor(p.divePhase * 8) % 2 === 0) continue;
        }
      }
      ctx.fillStyle = p.color;
      if (p.type === 'log') {
        // Rounded rectangle
        const r = 6;
        ctx.beginPath();
        ctx.moveTo(p.x + r, p.y);
        ctx.lineTo(p.x + p.w - r, p.y);
        ctx.quadraticCurveTo(p.x + p.w, p.y, p.x + p.w, p.y + r);
        ctx.lineTo(p.x + p.w, p.y + p.h - r);
        ctx.quadraticCurveTo(p.x + p.w, p.y + p.h, p.x + p.w - r, p.y + p.h);
        ctx.lineTo(p.x + r, p.y + p.h);
        ctx.quadraticCurveTo(p.x, p.y + p.h, p.x, p.y + p.h - r);
        ctx.lineTo(p.x, p.y + r);
        ctx.quadraticCurveTo(p.x, p.y, p.x + r, p.y);
        ctx.fill();
        // Log texture lines
        ctx.strokeStyle = '#664411';
        ctx.lineWidth = 1;
        for (let lx = p.x + 20; lx < p.x + p.w - 10; lx += 30) {
          ctx.beginPath();
          ctx.moveTo(lx, p.y + 4);
          ctx.lineTo(lx, p.y + p.h - 4);
          ctx.stroke();
        }
      } else {
        // Turtle: draw as ovals in group
        const turtleW = p.w / (p.w / 40);
        const count = Math.round(p.w / 40);
        for (let ti = 0; ti < count; ti++) {
          const tx = p.x + ti * 40 + 4;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.ellipse(tx + 16, p.y + p.h / 2, 15, 13, 0, 0, Math.PI * 2);
          ctx.fill();
          // Shell pattern
          ctx.strokeStyle = '#336633';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(tx + 16, p.y + p.h / 2, 10, 8, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    // Vehicles
    for (const v of vehicles) {
      ctx.fillStyle = v.color;
      if (v.type === 'truck') {
        ctx.fillRect(v.x, v.y, v.w, v.h);
        // Cab
        ctx.fillStyle = '#222222';
        const cabX = v.lane.dir === 1 ? v.x + v.w - 20 : v.x;
        ctx.fillRect(cabX, v.y + 2, 18, v.h - 4);
      } else {
        // Car: rounded rect
        const r = 4;
        ctx.beginPath();
        ctx.moveTo(v.x + r, v.y);
        ctx.lineTo(v.x + v.w - r, v.y);
        ctx.quadraticCurveTo(v.x + v.w, v.y, v.x + v.w, v.y + r);
        ctx.lineTo(v.x + v.w, v.y + v.h - r);
        ctx.quadraticCurveTo(v.x + v.w, v.y + v.h, v.x + v.w - r, v.y + v.h);
        ctx.lineTo(v.x + r, v.y + v.h);
        ctx.quadraticCurveTo(v.x, v.y + v.h, v.x, v.y + v.h - r);
        ctx.lineTo(v.x, v.y + r);
        ctx.quadraticCurveTo(v.x, v.y, v.x + r, v.y);
        ctx.fill();
        // Windshield
        ctx.fillStyle = '#88BBFF';
        const wsX = v.lane.dir === 1 ? v.x + v.w - 14 : v.x + 4;
        ctx.fillRect(wsX, v.y + 4, 10, v.h - 8);
      }
    }

    // Frog
    if (frog.dead) {
      // Death animation: flash red
      if (Math.floor(frog.deathTimer * 6) % 2 === 0) {
        ctx.fillStyle = '#DD2222';
        ctx.fillRect(frog.x, frog.y, FROG_SIZE, FROG_SIZE);
      }
    } else {
      drawFrog(frog.x, frog.y, FROG_SIZE);
    }

    // HUD
    drawHUD();

    // Overlays
    if (state === PAUSED) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.textAlign = 'start';
    }

    if (state === GAME_OVER) {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
      ctx.font = '20px monospace';
      ctx.fillText('Score: ' + score, W / 2, H / 2 + 10);
      ctx.font = '16px monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 50);
      ctx.textAlign = 'start';
    }
  }

  function drawBackground() {
    // Home bay area water
    ctx.fillStyle = '#0044AA';
    ctx.fillRect(0, PLAYFIELD_TOP, W, CELL);

    // River (rows 1–5)
    ctx.fillStyle = '#0044AA';
    ctx.fillRect(0, PLAYFIELD_TOP + 1 * CELL, W, 5 * CELL);

    // Median (row 6)
    ctx.fillStyle = '#224422';
    ctx.fillRect(0, PLAYFIELD_TOP + 6 * CELL, W, CELL);

    // Road (rows 7–11)
    ctx.fillStyle = '#333333';
    ctx.fillRect(0, PLAYFIELD_TOP + 7 * CELL, W, 5 * CELL);

    // Safe start strip (row 12)
    ctx.fillStyle = '#222244';
    ctx.fillRect(0, PLAYFIELD_TOP + 12 * CELL, W, CELL);

    // Lane markings (dashed lines on road)
    ctx.strokeStyle = '#555555';
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 15]);
    for (let r = 8; r <= 11; r++) {
      const ly = PLAYFIELD_TOP + r * CELL;
      ctx.beginPath();
      ctx.moveTo(0, ly);
      ctx.lineTo(W, ly);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawHUD() {
    // Score
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('Score: ' + score, 10, 28);

    // High score
    ctx.textAlign = 'right';
    ctx.fillText('Best: ' + highScore, W - 10, 28);

    // Lives (bottom left)
    ctx.textAlign = 'left';
    for (let i = 0; i < Math.max(0, lives - 1); i++) {
      ctx.fillStyle = '#22CC22';
      ctx.fillRect(10 + i * 26, H - 34, 20, 20);
    }

    // Timer bar
    const timerFrac = Math.max(0, timer / maxTimer);
    const barW = 580 * timerFrac;
    let barColor;
    if (timerFrac > 0.5) barColor = '#22CC22';
    else if (timerFrac > 0.25) barColor = '#CCCC00';
    else barColor = '#DD2222';
    ctx.fillStyle = barColor;
    ctx.fillRect(10, H - 12, barW, 10);
    ctx.strokeStyle = '#444444';
    ctx.strokeRect(10, H - 12, 580, 10);

    // Level
    ctx.font = '14px monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Level: ' + level, W - 10, H - 20);
    ctx.textAlign = 'start';
  }

  function drawStartScreen() {
    // Background zones
    drawBackground();

    ctx.fillStyle = '#000000AA';
    ctx.fillRect(0, 0, W, H);

    ctx.font = '52px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#22CC22';
    ctx.fillText('FROGGER', W / 2, 280);

    // Frog icon
    drawFrog(W / 2 - 24, 300, 48);

    ctx.font = '20px monospace';
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Press Enter to Start', W / 2, 380);
    ctx.textAlign = 'start';
  }

  // --- Main Loop ---
  let lastTime = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    if (!lastTime) { lastTime = ts; return; }
    let dt = (ts - lastTime) / 1000;
    lastTime = ts;
    if (dt > 0.05) dt = 0.05;

    update(dt);
    draw();

    for (const k in justPressed) delete justPressed[k];
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
