<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 600px;
      height: 700px;
      background: #000000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="700" aria-label="Frogger game canvas"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const WIDTH = 600;
      const HEIGHT = 700;
      const CELL = 40;
      const COLS = 15;
      const UI_TOP = 40;
      const UI_BOTTOM = 40;
      const PLAY_Y = 40;
      const FROG_SIZE = 32;

      const STATES = {
        IDLE: 'IDLE',
        PLAYING: 'PLAYING',
        PAUSED: 'PAUSED',
        GAME_OVER: 'GAME_OVER'
      };

      const keys = { queued: null };
      let state = STATES.IDLE;
      let lastTime = 0;
      let score = 0;
      let highScore = loadHighScore();
      let lives = 3;
      let level = 1;
      let timer = 30;
      let roadLanes = [];
      let riverLanes = [];
      let homeBays = [];
      let frog = null;
      let audioCtx = null;

      function loadHighScore() {
        try {
          const value = localStorage.getItem('froggerHighScore');
          return value ? Number(value) || 0 : 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore() {
        try {
          localStorage.setItem('froggerHighScore', String(highScore));
        } catch (_) {}
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          saveHighScore();
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume().catch(() => {});
        }
      }

      function playTone(type, frequency, duration, rampTo, gainValue = 0.04) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        if (typeof rampTo === 'number') osc.frequency.linearRampToValueAtTime(rampTo, now + duration);
        gain.gain.setValueAtTime(gainValue, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playHopSound() { playTone('square', 600, 0.03, undefined, 0.05); }
      function playSplashSound() { playTone('triangle', 500, 0.15, 120, 0.05); }
      function playSquashSound() { playTone('square', 110, 0.1, 60, 0.05); }
      function playBaySound() { playTone('square', 440, 0.1, 880, 0.05); }
      function playLevelSound() { playTone('triangle', 440, 0.1, 660, 0.04); setTimeout(() => playTone('triangle', 660, 0.12, 880, 0.04), 80); }

      function speedScale() {
        return Math.pow(1.15, level - 1);
      }

      function laneY(rowIndex) {
        return PLAY_Y + rowIndex * CELL;
      }

      function makeFrog() {
        frog = {
          col: 7,
          row: 12,
          x: 7 * CELL + 4,
          y: laneY(12) + 4,
          startX: 7 * CELL + 4,
          startY: laneY(12) + 4,
          targetX: 7 * CELL + 4,
          targetY: laneY(12) + 4,
          hopElapsed: 0,
          hopDuration: 0.08,
          isHopping: false,
          alive: true,
          deathTimer: 0,
          deathKind: 'road',
          flashCount: 0,
          visible: true,
          maxProgressRow: 12
        };
      }

      function createMoverLane(config) {
        const items = [];
        const scale = speedScale();
        for (let i = 0; i < config.count; i++) {
          items.push({
            x: config.direction > 0 ? -config.offset - i * config.spacing : WIDTH + config.offset + i * config.spacing,
            y: config.y + 4,
            width: config.width,
            height: 32,
            color: config.color,
            speed: config.speed * scale * config.direction,
            type: config.type,
            diver: config.diver || false,
            cycleOffset: config.diver ? i * 0.8 : 0,
            visible: true,
            active: true
          });
        }
        return { y: config.y, kind: config.kind, direction: config.direction, items };
      }

      function initLanes() {
        roadLanes = [
          createMoverLane({ y: 480, kind: 'road', type: 'car', width: 64, color: '#CCCC00', speed: 80, direction: 1, spacing: 200, count: 4, offset: 40 }),
          createMoverLane({ y: 440, kind: 'road', type: 'truck', width: 96, color: '#3344AA', speed: 60, direction: -1, spacing: 250, count: 3, offset: 30 }),
          createMoverLane({ y: 400, kind: 'road', type: 'fast', width: 48, color: '#DD2222', speed: 140, direction: 1, spacing: 180, count: 4, offset: 60 }),
          createMoverLane({ y: 360, kind: 'road', type: 'truck', width: 96, color: '#CCCCCC', speed: 70, direction: -1, spacing: 220, count: 4, offset: 40 }),
          createMoverLane({ y: 320, kind: 'road', type: 'race', width: 48, color: '#FF66AA', speed: 160, direction: 1, spacing: 240, count: 3, offset: 80 })
        ];

        riverLanes = [
          createMoverLane({ y: 240, kind: 'river', type: 'log', width: 120, color: '#885522', speed: 60, direction: 1, spacing: 200, count: 4, offset: 50 }),
          createMoverLane({ y: 200, kind: 'river', type: 'turtle', width: 120, color: '#448844', speed: 50, direction: -1, spacing: 180, count: 4, offset: 30, diver: true }),
          createMoverLane({ y: 160, kind: 'river', type: 'log', width: 200, color: '#774411', speed: 40, direction: 1, spacing: 300, count: 3, offset: 70 }),
          createMoverLane({ y: 120, kind: 'river', type: 'turtle', width: 80, color: '#448844', speed: 70, direction: -1, spacing: 160, count: 4, offset: 20, diver: true }),
          createMoverLane({ y: 80, kind: 'river', type: 'log', width: 160, color: '#885522', speed: 80, direction: 1, spacing: 250, count: 3, offset: 40 })
        ];
      }

      function initHomeBays() {
        homeBays = [20, 140, 260, 380, 500].map(x => ({ x, y: 42, width: 48, height: 36, filled: false }));
      }

      function startGame() {
        ensureAudio();
        score = 0;
        lives = 3;
        level = 1;
        timer = 30;
        initLanes();
        initHomeBays();
        makeFrog();
        state = STATES.PLAYING;
      }

      function respawnFrog() {
        timer = 30;
        makeFrog();
      }

      function nextLevel() {
        score += 1000;
        updateHighScore();
        level += 1;
        initLanes();
        initHomeBays();
        respawnFrog();
        playLevelSound();
      }

      function moveItems(dt, lanes) {
        for (const lane of lanes) {
          for (const item of lane.items) {
            item.x += item.speed * dt;
            if (item.speed > 0 && item.x > WIDTH + 10) item.x = -item.width - 10;
            if (item.speed < 0 && item.x + item.width < -10) item.x = WIDTH + 10;
          }
        }
      }

      function updateDivingTurtles(time) {
        for (let laneIndex = 0; laneIndex < riverLanes.length; laneIndex++) {
          const lane = riverLanes[laneIndex];
          if (lane.type !== 'turtle') continue;
          for (let itemIndex = 0; itemIndex < lane.items.length; itemIndex++) {
            const item = lane.items[itemIndex];
            const shouldDive = (laneIndex === 1 && (itemIndex + 1) % 3 === 0) || (laneIndex === 3 && (itemIndex + 1) % 2 === 0);
            if (!shouldDive) {
              item.visible = true;
              item.active = true;
              continue;
            }
            const cycle = (time + item.cycleOffset) % 7;
            if (cycle < 3) {
              item.visible = true;
              item.active = true;
            } else if (cycle < 4) {
              item.visible = Math.floor((cycle - 3) * 8 * 2) % 2 === 0;
              item.active = true;
            } else if (cycle < 6) {
              item.visible = false;
              item.active = false;
            } else {
              item.visible = Math.floor((cycle - 6) * 8 * 2) % 2 === 0;
              item.active = true;
            }
          }
        }
      }

      function queueMove(dx, dy) {
        if (state !== STATES.PLAYING || !frog.alive || frog.isHopping || frog.deathTimer > 0) return;
        const newCol = Math.max(0, Math.min(COLS - 1, frog.col + dx));
        const newRow = Math.max(0, Math.min(12, frog.row + dy));
        if (newCol === frog.col && newRow === frog.row) return;
        frog.col = newCol;
        frog.row = newRow;
        frog.startX = frog.x;
        frog.startY = frog.y;
        frog.targetX = newCol * CELL + 4;
        frog.targetY = laneY(newRow) + 4;
        frog.hopElapsed = 0;
        frog.isHopping = true;
        if (newRow < frog.maxProgressRow) {
          frog.maxProgressRow = newRow;
          score += 10;
          updateHighScore();
        }
        playHopSound();
      }

      function frogBox() {
        return { x: frog.x, y: frog.y, width: FROG_SIZE, height: FROG_SIZE };
      }

      function frogCenter() {
        return { x: frog.x + FROG_SIZE / 2, y: frog.y + FROG_SIZE / 2 };
      }

      function killFrog(kind) {
        if (!frog.alive || frog.deathTimer > 0) return;
        frog.deathKind = kind;
        frog.deathTimer = 0.5;
        frog.flashCount = 0;
        frog.visible = true;
        frog.isHopping = false;
        if (kind === 'water') playSplashSound();
        else playSquashSound();
      }

      function finishDeath() {
        lives -= 1;
        if (lives <= 0) {
          state = STATES.GAME_OVER;
          updateHighScore();
          return;
        }
        respawnFrog();
      }

      function handleDeathAnimation(dt) {
        if (frog.deathTimer <= 0) return;
        frog.deathTimer -= dt;
        frog.flashCount += dt * 6;
        frog.visible = Math.floor(frog.flashCount * 2) % 2 === 0;
        if (frog.deathTimer <= 0) finishDeath();
      }

      function updateHop(dt) {
        if (!frog.isHopping) return;
        frog.hopElapsed += dt;
        const t = Math.min(1, frog.hopElapsed / frog.hopDuration);
        frog.x = frog.startX + (frog.targetX - frog.startX) * t;
        frog.y = frog.startY + (frog.targetY - frog.startY) * t;
        if (t >= 1) {
          frog.isHopping = false;
          evaluateLanding();
        }
      }

      function getLaneByY(y, lanes) {
        return lanes.find(lane => lane.y === y) || null;
      }

      function overlapCenterWithItem(center, item) {
        return center.x >= item.x && center.x <= item.x + item.width && center.y >= item.y && center.y <= item.y + item.height;
      }

      function evaluateLanding() {
        if (frog.row >= 11 || frog.row === 6) return;
        if (frog.row >= 7 && frog.row <= 10) return;

        if (frog.row >= 1 && frog.row <= 5) {
          checkRiverState(true);
        } else if (frog.row === 0) {
          handleHomeBay();
        }
      }

      function handleHomeBay() {
        const center = frogCenter();
        const bay = homeBays.find(b => center.x >= b.x && center.x <= b.x + b.width && center.y >= b.y && center.y <= b.y + b.height);
        if (!bay || bay.filled) {
          killFrog('water');
          return;
        }
        bay.filled = true;
        const timeBonus = Math.floor(timer) * 2;
        score += 50 + timeBonus;
        updateHighScore();
        playBaySound();
        if (homeBays.every(b => b.filled)) {
          nextLevel();
        } else {
          respawnFrog();
        }
      }

      function roadCollisionCheck() {
        const y = laneY(frog.row);
        const lane = getLaneByY(y, roadLanes);
        if (!lane) return;
        const box = frogBox();
        for (const item of lane.items) {
          if (box.x < item.x + item.width && box.x + box.width > item.x && box.y < item.y + item.height && box.y + box.height > item.y) {
            killFrog('road');
            return;
          }
        }
      }

      function checkRiverState(onLanding = false, dt = 0) {
        const y = laneY(frog.row);
        const lane = getLaneByY(y, riverLanes);
        if (!lane) return;
        const center = frogCenter();
        let platform = null;
        for (const item of lane.items) {
          if (!item.active) continue;
          if (overlapCenterWithItem(center, item)) {
            platform = item;
            break;
          }
        }
        if (!platform) {
          killFrog('water');
          return;
        }
        if (!onLanding) {
          frog.x += platform.speed * dt;
          if (frog.x < -FROG_SIZE || frog.x > WIDTH) {
            killFrog('water');
          }
        }
      }

      function updateTimer(dt) {
        timer = Math.max(0, timer - dt);
        if (timer <= 0) killFrog('water');
      }

      function update(dt, time) {
        if (state !== STATES.PLAYING) return;
        moveItems(dt, roadLanes);
        moveItems(dt, riverLanes);
        updateDivingTurtles(time);

        if (frog.deathTimer > 0) {
          handleDeathAnimation(dt);
          return;
        }

        updateTimer(dt);
        updateHop(dt);
        if (frog.deathTimer > 0 || frog.isHopping) return;

        if (frog.row >= 7 && frog.row <= 11) {
          roadCollisionCheck();
        } else if (frog.row >= 1 && frog.row <= 5) {
          checkRiverState(false, dt);
        }

        if (frog.row === 0) {
          handleHomeBay();
        }
      }

      function drawBackgrounds() {
        ctx.fillStyle = '#0044AA';
        ctx.fillRect(0, 40, WIDTH, 240);
        ctx.fillStyle = '#224422';
        ctx.fillRect(0, 280, WIDTH, 40);
        ctx.fillStyle = '#333333';
        ctx.fillRect(0, 320, WIDTH, 200);
        ctx.fillStyle = '#222244';
        ctx.fillRect(0, 520, WIDTH, 40);
      }

      function drawHomeBays() {
        ctx.fillStyle = '#0044AA';
        ctx.fillRect(0, 40, WIDTH, 40);
        for (const bay of homeBays) {
          ctx.fillStyle = bay.filled ? '#22CC22' : '#000066';
          ctx.fillRect(bay.x, bay.y, bay.width, bay.height);
          ctx.strokeStyle = '#223388';
          ctx.strokeRect(bay.x + 0.5, bay.y + 0.5, bay.width - 1, bay.height - 1);
          if (bay.filled) {
            drawFrogIcon(bay.x + bay.width / 2, bay.y + bay.height / 2, 0.55, true);
          }
        }
      }

      function drawVehicle(item) {
        ctx.fillStyle = item.color;
        ctx.fillRect(item.x, item.y, item.width, item.height);
        ctx.fillStyle = '#111111';
        const wheelY = item.y + item.height - 6;
        ctx.fillRect(item.x + 8, wheelY, 12, 4);
        ctx.fillRect(item.x + item.width - 20, wheelY, 12, 4);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(item.x + 8, item.y + 6, Math.max(10, item.width * 0.35), 10);
      }

      function drawPlatform(item) {
        if (!item.visible) return;
        ctx.fillStyle = item.color;
        if (item.type === 'log') {
          ctx.fillRect(item.x, item.y, item.width, item.height);
          ctx.fillStyle = 'rgba(0,0,0,0.12)';
          for (let i = 10; i < item.width; i += 28) ctx.fillRect(item.x + i, item.y + 2, 4, item.height - 4);
        } else {
          const count = item.width === 120 ? 3 : 2;
          const turtleWidth = item.width / count - 4;
          for (let i = 0; i < count; i++) {
            const x = item.x + i * (item.width / count);
            ctx.beginPath();
            ctx.fillStyle = '#448844';
            ctx.ellipse(x + turtleWidth / 2, item.y + 16, turtleWidth / 2, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#335533';
            ctx.fillRect(x + 8, item.y + 10, turtleWidth - 16, 12);
          }
        }
      }

      function drawFrogBody(x, y, scale = 1, dead = false) {
        const size = 32 * scale;
        const bodyColor = dead ? '#DD2222' : '#22CC22';
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(x - size / 2, y - size / 2, size, size, 8 * scale);
        } else {
          ctx.rect(x - size / 2, y - size / 2, size, size);
        }
        ctx.fill();
        ctx.fillStyle = '#22AA22';
        ctx.fillRect(x - 10 * scale, y + 2 * scale, 20 * scale, 8 * scale);
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(x - 7 * scale, y - 10 * scale, 4 * scale, 0, Math.PI * 2);
        ctx.arc(x + 7 * scale, y - 10 * scale, 4 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(x - 7 * scale, y - 10 * scale, 2 * scale, 0, Math.PI * 2);
        ctx.arc(x + 7 * scale, y - 10 * scale, 2 * scale, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawFrog() {
        if (!frog.visible) return;
        const hopArc = frog.isHopping ? Math.sin((frog.hopElapsed / frog.hopDuration) * Math.PI) * 6 : 0;
        drawFrogBody(frog.x + 16, frog.y + 16 - hopArc, 1, frog.deathTimer > 0);
      }

      function drawFrogIcon(x, y, scale = 0.6, filled = false) {
        drawFrogBody(x, y, scale, false);
        if (filled) {
          ctx.strokeStyle = '#114411';
          ctx.lineWidth = 1;
          ctx.strokeRect(x - 12 * scale, y - 12 * scale, 24 * scale, 24 * scale);
        }
      }

      function drawHud() {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('Score: ' + score, 10, 20);
        ctx.textAlign = 'right';
        ctx.fillText('Best: ' + highScore, WIDTH - 10, 20);

        ctx.textAlign = 'left';
        for (let i = 0; i < Math.max(0, lives); i++) {
          drawFrogIcon(16 + i * 24, 646, 0.42, false);
        }
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText('×' + lives, 14 + Math.max(0, lives) * 24, 646);

        const ratio = timer / 30;
        const width = 580 * ratio;
        let color = '#22CC22';
        if (ratio < 0.66) color = '#CCCC00';
        if (ratio < 0.33) color = '#DD2222';
        ctx.fillStyle = '#222222';
        ctx.fillRect(10, 680, 580, 12);
        ctx.fillStyle = color;
        ctx.fillRect(590 - width, 680, width, 12);
        ctx.strokeStyle = '#555555';
        ctx.strokeRect(10.5, 680.5, 579, 11);

        ctx.fillStyle = '#AAAAAA';
        ctx.font = '14px monospace';
        ctx.textAlign = 'right';
        ctx.fillText('Level: ' + level, WIDTH - 10, 646);
      }

      function drawStartScreen() {
        ctx.fillStyle = '#22CC22';
        ctx.font = '52px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('FROGGER', WIDTH / 2, 280);
        drawFrogIcon(WIDTH / 2, 332, 0.95, false);
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Start', WIDTH / 2, 380);
      }

      function drawOverlay(title, subtitle, prompt) {
        ctx.fillStyle = '#000000CC';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '40px monospace';
        ctx.fillText(title, WIDTH / 2, HEIGHT / 2 - 30);
        if (subtitle) {
          ctx.font = '22px monospace';
          ctx.fillText(subtitle, WIDTH / 2, HEIGHT / 2 + 18);
        }
        if (prompt) {
          ctx.fillStyle = '#AAAAAA';
          ctx.font = '18px monospace';
          ctx.fillText(prompt, WIDTH / 2, HEIGHT / 2 + 58);
        }
      }

      function renderScene() {
        drawBackgrounds();
        drawHomeBays();
        for (const lane of roadLanes) for (const item of lane.items) drawVehicle(item);
        for (const lane of riverLanes) for (const item of lane.items) drawPlatform(item);
        if (frog) drawFrog();
        drawHud();
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        renderScene();

        if (state === STATES.IDLE) {
          drawStartScreen();
        } else if (state === STATES.PAUSED) {
          drawOverlay('PAUSED', '', '');
        } else if (state === STATES.GAME_OVER) {
          drawOverlay('GAME OVER', 'Score: ' + score, 'Press Enter to Restart');
        }
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        if (state === STATES.PLAYING) update(dt, timestamp / 1000);
        else if (state === STATES.IDLE) updateDivingTurtles(timestamp / 1000);
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', (event) => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Enter','KeyP'].includes(event.code)) {
          event.preventDefault();
        }
        if (event.code === 'Enter') {
          ensureAudio();
          if (state === STATES.IDLE || state === STATES.GAME_OVER) startGame();
          return;
        }
        if (event.code === 'KeyP') {
          if (state === STATES.PLAYING) state = STATES.PAUSED;
          else if (state === STATES.PAUSED) state = STATES.PLAYING;
          return;
        }
        if (state !== STATES.PLAYING) return;
        if (event.repeat) return;

        if (event.code === 'ArrowUp' || event.code === 'KeyW') queueMove(0, -1);
        else if (event.code === 'ArrowDown' || event.code === 'KeyS') queueMove(0, 1);
        else if (event.code === 'ArrowLeft' || event.code === 'KeyA') queueMove(-1, 0);
        else if (event.code === 'ArrowRight' || event.code === 'KeyD') queueMove(1, 0);
      });

      initLanes();
      initHomeBays();
      makeFrog();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
