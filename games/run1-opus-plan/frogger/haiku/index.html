<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #333;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="700"></canvas>
  <script>
    // T01-T14: Complete Frogger game implementation

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const CANVAS_WIDTH = 600;
    const CANVAS_HEIGHT = 700;
    const CELL_SIZE = 40;
    const GRID_COLS = 15;
    const GRID_ROWS = 13;
    const PLAYFIELD_START_Y = 40;
    const PLAYFIELD_HEIGHT = 520;

    // Game states
    const STATE = {
      IDLE: 'IDLE',
      PLAYING: 'PLAYING',
      PAUSED: 'PAUSED',
      GAME_OVER: 'GAME_OVER'
    };

    // Game object
    const game = {
      state: STATE.IDLE,
      score: 0,
      highScore: parseInt(localStorage.getItem('froggerHighScore') || '0'),
      lives: 3,
      level: 1,
      speedMultiplier: 1.0,
      timer: 30,
      baysComplete: 0,
      frogDeathTimer: 0,
      isFrogDying: false
    };

    // Frog
    const frog = {
      col: 7,
      row: 12,
      animTimer: 0,
      isMoving: false,
      onPlatform: null,
      maxRowReached: 12
    };

    // Input debounce
    let lastMoveTime = 0;
    const MOVE_COOLDOWN = 80;

    // Road lanes configuration
    const roadLanes = [
      { y: 480, width: 64, height: 32, color: '#CCCC00', speed: 80, direction: 1 }, // Lane 1: yellow cars right
      { y: 440, width: 96, height: 32, color: '#3344AA', speed: 60, direction: -1 }, // Lane 2: blue trucks left
      { y: 400, width: 48, height: 32, color: '#DD2222', speed: 140, direction: 1 }, // Lane 3: red cars right
      { y: 360, width: 96, height: 32, color: '#CCCCCC', speed: 70, direction: -1 }, // Lane 4: white trucks left
      { y: 320, width: 48, height: 32, color: '#FF66AA', speed: 160, direction: 1 }  // Lane 5: pink cars right
    ];

    // River platforms configuration
    const riverLanes = [
      { y: 240, width: 120, height: 32, color: '#885522', speed: 60, direction: 1, type: 'log' },  // Lane 6: logs right
      { y: 200, width: 120, height: 32, color: '#448844', speed: 50, direction: -1, type: 'turtle' }, // Lane 7: turtles left
      { y: 160, width: 200, height: 32, color: '#774411', speed: 40, direction: 1, type: 'log' },  // Lane 8: long logs right
      { y: 120, width: 80, height: 32, color: '#448844', speed: 70, direction: -1, type: 'turtle' }, // Lane 9: turtles left
      { y: 80, width: 160, height: 32, color: '#885522', speed: 80, direction: 1, type: 'log' }    // Lane 10: medium logs right
    ];

    // Home bays
    const homeBays = [
      { x: 20, filled: false },
      { x: 140, filled: false },
      { x: 260, filled: false },
      { x: 380, filled: false },
      { x: 500, filled: false }
    ];

    // Vehicles and platforms arrays
    let vehicles = [];
    let platforms = [];

    function createVehicles() {
      vehicles = [];
      for (let laneIdx = 0; laneIdx < roadLanes.length; laneIdx++) {
        const lane = roadLanes[laneIdx];
        const spacing = lane.speed === 80 ? 200 : lane.speed === 60 ? 250 : lane.speed === 140 ? 180 : lane.speed === 70 ? 220 : 240;
        for (let i = 0; i < 6; i++) {
          vehicles.push({
            x: i * spacing,
            laneIdx,
            y: lane.y
          });
        }
      }
    }

    function createPlatforms() {
      platforms = [];
      for (let laneIdx = 0; laneIdx < riverLanes.length; laneIdx++) {
        const lane = riverLanes[laneIdx];
        const spacing = lane.width + (laneIdx === 1 || laneIdx === 3 ? 60 : 80);
        const count = Math.ceil(CANVAS_WIDTH / spacing) + 2;

        // For diving turtles
        const isDiver = (laneIdx === 1 && Math.floor(i / 3) % 2 === 0) || (laneIdx === 3 && i % 2 === 0);
        
        for (let i = 0; i < count; i++) {
          platforms.push({
            x: i * spacing - spacing / 2,
            laneIdx,
            y: lane.y,
            diving: laneIdx === 1 ? i % 3 === 0 : laneIdx === 3 ? i % 2 === 0 : false,
            diveTimer: laneIdx === 1 ? (i % 3) * 3 : laneIdx === 3 ? (i % 2) * 2.5 : 0,
            divePhase: 'visible' // visible, sinking, submerged, rising
          });
        }
      }
    }

    function startGame() {
      game.state = STATE.PLAYING;
      game.score = 0;
      game.lives = 3;
      game.level = 1;
      game.speedMultiplier = 1.0;
      game.timer = 30;
      game.baysComplete = 0;
      frog.col = 7;
      frog.row = 12;
      frog.maxRowReached = 12;
      frog.onPlatform = null;
      frog.isMoving = false;
      homeBays.forEach(bay => bay.filled = false);
      createVehicles();
      createPlatforms();
    }

    function nextLevel() {
      game.level++;
      game.speedMultiplier *= 1.15;
      game.baysComplete = 0;
      game.timer = 30;
      frog.col = 7;
      frog.row = 12;
      frog.maxRowReached = 12;
      homeBays.forEach(bay => bay.filled = false);
      createVehicles();
      createPlatforms();
    }

    function respawnFrog() {
      game.lives--;
      if (game.lives <= 0) {
        game.state = STATE.GAME_OVER;
        game.highScore = Math.max(game.highScore, game.score);
        localStorage.setItem('froggerHighScore', game.highScore);
      } else {
        frog.col = 7;
        frog.row = 12;
        frog.onPlatform = null;
        frog.isMoving = false;
        game.timer = 30;
        game.isFrogDying = false;
      }
    }

    // Input handlers
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === 'Enter') {
        if (game.state === STATE.IDLE || game.state === STATE.GAME_OVER) {
          startGame();
        }
      }

      if (e.key === 'p' || e.key === 'P') {
        if (game.state === STATE.PLAYING) {
          game.state = STATE.PAUSED;
        } else if (game.state === STATE.PAUSED) {
          game.state = STATE.PLAYING;
        }
      }

      const now = Date.now();
      if (game.state === STATE.PLAYING && now - lastMoveTime > MOVE_COOLDOWN && !frog.isMoving) {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          if (frog.row > 0) {
            frog.row--;
            if (frog.row < frog.maxRowReached) {
              frog.maxRowReached = frog.row;
              game.score += 10;
            }
            frog.isMoving = true;
            lastMoveTime = now;
          }
        }
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
          if (frog.row < 12) {
            frog.row++;
            frog.isMoving = true;
            lastMoveTime = now;
          }
        }
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          if (frog.col > 0) {
            frog.col--;
            frog.isMoving = true;
            lastMoveTime = now;
          }
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          if (frog.col < 14) {
            frog.col++;
            frog.isMoving = true;
            lastMoveTime = now;
          }
        }
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function updateVehicles(dt) {
      for (const vehicle of vehicles) {
        const lane = roadLanes[vehicle.laneIdx];
        vehicle.x += lane.speed * lane.direction * game.speedMultiplier * dt;
        if (vehicle.x > CANVAS_WIDTH + 100) vehicle.x = -100;
        if (vehicle.x < -100) vehicle.x = CANVAS_WIDTH + 100;
      }
    }

    function updatePlatforms(dt) {
      for (const platform of platforms) {
        const lane = riverLanes[platform.laneIdx];
        platform.x += lane.speed * lane.direction * game.speedMultiplier * dt;
        
        if (platform.x > CANVAS_WIDTH + 200) platform.x = -200;
        if (platform.x < -200) platform.x = CANVAS_WIDTH + 200;

        // Diving logic
        if (platform.diving) {
          platform.diveTimer += dt;
          const cycleDuration = 7; // 3s visible + 1s sinking + 2s submerged + 1s rising
          const cyclePos = platform.diveTimer % cycleDuration;

          if (cyclePos < 3) {
            platform.divePhase = 'visible';
          } else if (cyclePos < 4) {
            platform.divePhase = 'sinking';
          } else if (cyclePos < 6) {
            platform.divePhase = 'submerged';
          } else {
            platform.divePhase = 'rising';
          }
        }
      }
    }

    function getFrogY() {
      return PLAYFIELD_START_Y + frog.row * CELL_SIZE + CELL_SIZE / 2;
    }

    function getFrogX() {
      return frog.col * CELL_SIZE + CELL_SIZE / 2;
    }

    function checkCollisions(dt) {
      const frogX = getFrogX();
      const frogY = getFrogY();

      // Road zones (rows 8-12)
      if (frog.row >= 8 && frog.row <= 12) {
        for (const vehicle of vehicles) {
          const lane = roadLanes[vehicle.laneIdx];
          const roadRow = 5 - (lane.y - 320) / 40;
          if (Math.abs(frog.row - roadRow) < 0.5) {
            const vx1 = vehicle.x;
            const vx2 = vehicle.x + lane.width;
            if (frogX > vx1 && frogX < vx2) {
              game.isFrogDying = true;
              game.frogDeathTimer = 0.5;
            }
          }
        }
      }

      // River zones (rows 2-7)
      if (frog.row >= 2 && frog.row <= 7) {
        frog.onPlatform = null;
        for (const platform of platforms) {
          const lane = riverLanes[platform.laneIdx];
          const riverRow = 10 - (lane.y - 80) / 40;
          if (Math.abs(frog.row - riverRow) < 0.1) {
            if (platform.divePhase !== 'submerged') {
              const px1 = platform.x;
              const px2 = platform.x + lane.width;
              if (frogX > px1 && frogX < px2) {
                frog.onPlatform = platform;
                break;
              }
            }
          }
        }

        if (!frog.onPlatform && !game.isFrogDying) {
          game.isFrogDying = true;
          game.frogDeathTimer = 0.5;
        }
      }

      // Home bays (row 1)
      if (frog.row === 1) {
        let hitBay = false;
        for (const bay of homeBays) {
          if (Math.abs(frogX - (bay.x + 24)) < 24) {
            hitBay = true;
            if (!bay.filled) {
              bay.filled = true;
              game.baysComplete++;
              game.score += 50 + Math.max(0, Math.floor(game.timer)) * 2;
              if (game.baysComplete === 5) {
                game.score += 1000;
                nextLevel();
              } else {
                respawnFrog();
              }
            } else {
              game.isFrogDying = true;
              game.frogDeathTimer = 0.5;
            }
            break;
          }
        }
        if (!hitBay && !game.isFrogDying) {
          game.isFrogDying = true;
          game.frogDeathTimer = 0.5;
        }
      }

      // Check if carried off-screen
      if (frog.onPlatform) {
        const lane = riverLanes[frog.onPlatform.laneIdx];
        frog.col = Math.round(frogX / CELL_SIZE);
        if (frog.col < 0 || frog.col >= GRID_COLS) {
          game.isFrogDying = true;
          game.frogDeathTimer = 0.5;
        }
      }
    }

    function updateGame(dt) {
      if (game.isFrogDying) {
        game.frogDeathTimer -= dt;
        if (game.frogDeathTimer <= 0) {
          respawnFrog();
        }
        return;
      }

      game.timer -= dt;
      if (game.timer <= 0) {
        game.isFrogDying = true;
        game.frogDeathTimer = 0.5;
        return;
      }

      updateVehicles(dt);
      updatePlatforms(dt);

      // Move frog with platform
      if (frog.onPlatform) {
        const lane = riverLanes[frog.onPlatform.laneIdx];
        frog.col += lane.speed * lane.direction * game.speedMultiplier * dt / CELL_SIZE;
        frog.col = Math.max(0, Math.min(frog.col, GRID_COLS - 1));
      }

      checkCollisions(dt);
      frog.animTimer -= dt;
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Zone backgrounds
      ctx.fillStyle = '#222244';
      ctx.fillRect(0, 520, CANVAS_WIDTH, 40);

      ctx.fillStyle = '#333333';
      ctx.fillRect(0, 320, CANVAS_WIDTH, 200);

      ctx.fillStyle = '#224422';
      ctx.fillRect(0, 280, CANVAS_WIDTH, 40);

      ctx.fillStyle = '#0044AA';
      ctx.fillRect(0, 40, CANVAS_WIDTH, 240);

      if (game.state === STATE.IDLE) {
        renderStartScreen();
      } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
        renderGameScreen();
        if (game.state === STATE.PAUSED) {
          renderPauseOverlay();
        }
      } else if (game.state === STATE.GAME_OVER) {
        renderGameScreen();
        renderGameOverScreen();
      }
    }

    function renderGameScreen() {
      // Vehicles
      for (const vehicle of vehicles) {
        const lane = roadLanes[vehicle.laneIdx];
        ctx.fillStyle = lane.color;
        ctx.fillRect(vehicle.x, vehicle.y, lane.width, lane.height);
      }

      // Platforms
      for (const platform of platforms) {
        const lane = riverLanes[platform.laneIdx];
        if (platform.divePhase === 'submerged') continue;
        ctx.fillStyle = lane.color;
        if (platform.divePhase === 'sinking' || platform.divePhase === 'rising') {
          if (Math.floor(Date.now() / 80) % 2 === 0) ctx.globalAlpha = 0.3;
        }
        ctx.fillRect(platform.x, platform.y, lane.width, lane.height);
        ctx.globalAlpha = 1;
      }

      // Home bays
      ctx.fillStyle = '#000066';
      for (const bay of homeBays) {
        ctx.fillRect(bay.x, 40, 48, 36);
        if (bay.filled) {
          ctx.fillStyle = '#22CC22';
          ctx.fillRect(bay.x + 8, 48, 10, 10);
          ctx.fillStyle = '#000066';
        }
      }

      // Frog
      ctx.fillStyle = '#22CC22';
      if (game.isFrogDying) {
        if (Math.floor(Date.now() / 80) % 2 === 0) {
          ctx.fillStyle = '#FF4444';
        }
      }
      const frogScreenX = frog.col * CELL_SIZE + CELL_SIZE / 2 - 16;
      const frogScreenY = getFrogY() - 16;
      ctx.fillRect(frogScreenX, frogScreenY, 32, 32);

      // Frog eyes
      ctx.fillStyle = '#000000';
      ctx.fillRect(frogScreenX + 8, frogScreenY + 6, 4, 4);
      ctx.fillRect(frogScreenX + 20, frogScreenY + 6, 4, 4);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(frogScreenX + 9, frogScreenY + 7, 2, 2);
      ctx.fillRect(frogScreenX + 21, frogScreenY + 7, 2, 2);

      // HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${game.score}`, 10, 28);

      ctx.textAlign = 'right';
      ctx.fillText(`Best: ${game.highScore}`, CANVAS_WIDTH - 10, 28);

      // Lives
      ctx.fillStyle = '#22CC22';
      ctx.font = '14px monospace';
      ctx.textAlign = 'left';
      for (let i = 0; i < game.lives; i++) {
        ctx.fillRect(10 + i * 25, CANVAS_HEIGHT - 30, 20, 20);
      }

      // Level
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '14px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`Level: ${game.level}`, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 15);

      // Timer bar
      ctx.fillStyle = game.timer > 10 ? '#22CC22' : game.timer > 5 ? '#CCCC00' : '#DD2222';
      const timerWidth = Math.max(0, (game.timer / 30) * 580);
      ctx.fillRect(10, CANVAS_HEIGHT - 12, timerWidth, 10);
      ctx.strokeStyle = '#CCCCCC';
      ctx.lineWidth = 1;
      ctx.strokeRect(10, CANVAS_HEIGHT - 12, 580, 10);
    }

    function renderStartScreen() {
      ctx.fillStyle = '#22CC22';
      ctx.font = 'bold 52px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FROGGER', CANVAS_WIDTH / 2, 280);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '20px monospace';
      ctx.fillText('Press Enter to Start', CANVAS_WIDTH / 2, 380);
    }

    function renderGameOverScreen() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 40px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 300);

      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${game.score}`, CANVAS_WIDTH / 2, 350);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px monospace';
      ctx.fillText('Press Enter to Restart', CANVAS_WIDTH / 2, 400);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = '#000000CC';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
    }

    // Main game loop
    let lastTime = Date.now();
    function gameLoop() {
      const currentTime = Date.now();
      const dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      if (game.state === STATE.PLAYING) {
        updateGame(dt);
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start
    createVehicles();
    createPlatforms();
    gameLoop();
  </script>
</body>
</html>
