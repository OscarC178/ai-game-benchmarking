<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Review Dashboard</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #252535;
    --border: #333345; --text: #e8e8f0; --text-dim: #8888aa;
    --accent: #6366f1; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden;
  }
  button, select, input, textarea {
    font-family: inherit; color: var(--text);
  }
  button, select {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 0.4rem 0.75rem; border-radius: 4px;
    font-size: 0.85rem; cursor: pointer;
  }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.15); }
  button[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }

  header {
    padding: 0.6rem 1rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem; flex-wrap: wrap;
  }
  .progress { font-size: 0.9rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .progress strong { color: var(--text); }
  .progress #progress-pct { margin-left: 0.4rem; color: var(--accent); font-weight: 600; }
  .nav { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
  #game-select { min-width: 340px; max-width: 50vw; }

  main {
    flex: 1; display: grid;
    grid-template-columns: 1fr 400px;
    overflow: hidden; min-height: 0;
  }
  .game-pane {
    display: flex; flex-direction: column; background: #000;
    border-right: 1px solid var(--border); min-width: 0;
  }
  .game-meta {
    padding: 0.5rem 1rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem; color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center;
    gap: 0.5rem;
  }
  .tag {
    display: inline-block; padding: 0.15rem 0.5rem; margin-right: 0.3rem;
    background: var(--surface2); border-radius: 3px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.72rem; color: var(--text);
  }
  .rated-badge {
    display: inline-block; padding: 0.15rem 0.5rem;
    background: var(--green); color: #000; border-radius: 3px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em;
  }
  iframe { flex: 1; width: 100%; border: none; background: #000; }

  .form-pane {
    overflow-y: auto; padding: 0.75rem; background: var(--surface);
  }
  fieldset {
    border: 1px solid var(--border); border-radius: 5px;
    padding: 0.6rem 0.75rem; margin-bottom: 0.6rem;
  }
  legend {
    padding: 0 0.4rem; font-size: 0.7rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
  }
  legend .hint { text-transform: none; letter-spacing: 0; color: var(--text-dim); font-weight: 400; font-size: 0.75rem; }
  .rating-row, .yn-row { display: flex; gap: 0.3rem; }
  .rating-row button { flex: 1; padding: 0.45rem; font-variant-numeric: tabular-nums; font-weight: 600; }
  .yn-row button { flex: 1; padding: 0.5rem; font-weight: 600; }
  .yn-row button.yes[aria-pressed="true"] { background: var(--green); border-color: var(--green); color: #000; }
  .yn-row button.no[aria-pressed="true"] { background: var(--red); border-color: var(--red); color: #fff; }

  .flags { display: grid; grid-template-columns: 1fr 1fr; gap: 0.2rem; }
  .flags label {
    font-size: 0.8rem; display: flex; align-items: center;
    gap: 0.35rem; cursor: pointer;
    padding: 0.3rem 0.4rem; border-radius: 3px;
  }
  .flags label:hover { background: var(--surface2); }
  .flags input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }

  textarea {
    width: 100%; min-height: 90px; resize: vertical;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 0.5rem; border-radius: 4px;
    font-size: 0.85rem; line-height: 1.4;
  }
  textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

  .submit-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .submit-row button { flex: 1; padding: 0.65rem; font-weight: 600; }
  .clear-row { margin-top: 0.4rem; }
  .clear-row button { width: 100%; font-size: 0.75rem; padding: 0.35rem; color: var(--text-dim); }

  .hint-line {
    font-size: 0.7rem; color: var(--text-dim);
    text-align: center; padding: 0.5rem 0 0.25rem;
    line-height: 1.6;
  }
  .hint-line kbd {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 3px; font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .empty-state {
    padding: 2rem; text-align: center; color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <div class="progress">
    <span id="progress-rated"><strong>0</strong></span> / <span id="progress-total">0</span> rated
    <span id="progress-pct">0%</span>
  </div>
  <div class="nav">
    <label class="filter-label">
      <input type="checkbox" id="filter-unrated"> Unrated only
    </label>
    <select id="version-filter">
      <option value="">All versions</option>
      <option value="v1">V1 only</option>
      <option value="v2">V2 only</option>
    </select>
    <select id="game-filter">
      <option value="">All games</option>
    </select>
    <select id="game-select"></select>
    <button id="prev-btn" title="Previous (←)">← Prev</button>
    <button id="next-btn" title="Next (→)">Next →</button>
  </div>
</header>

<main>
  <div class="game-pane">
    <div class="game-meta">
      <div>
        <span class="tag" id="meta-version">—</span>
        <span class="tag" id="meta-run">—</span>
        <span class="tag" id="meta-game">—</span>
        <span class="tag" id="meta-builder">—</span>
      </div>
      <div>
        <span id="rated-status"></span>
        <button id="reload-btn" title="Reload game (R)">↻ Reload</button>
      </div>
    </div>
    <iframe id="game-frame" src="about:blank"></iframe>
  </div>

  <div class="form-pane" id="form-pane">
    <fieldset>
      <legend>Runs? <span class="hint">— loads without crashing</span></legend>
      <div class="yn-row" data-field="runs">
        <button class="yes" data-value="yes">Yes</button>
        <button class="no" data-value="no">No</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Mechanics <span class="hint">— core gameplay logic works</span></legend>
      <div class="rating-row" data-field="mechanics">
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Completable <span class="hint">— can you progress / win</span></legend>
      <div class="rating-row" data-field="completable">
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Fun <span class="hint">— would you play again</span></legend>
      <div class="rating-row" data-field="fun">
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Visual fidelity <span class="hint">— resembles the original</span></legend>
      <div class="rating-row" data-field="visual">
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Flags</legend>
      <div class="flags" id="flags">
        <label><input type="checkbox" value="crashes"> crashes</label>
        <label><input type="checkbox" value="unwinnable"> unwinnable</label>
        <label><input type="checkbox" value="controls-broken"> controls broken</label>
        <label><input type="checkbox" value="collision-broken"> collision broken</label>
        <label><input type="checkbox" value="no-score"> no score</label>
        <label><input type="checkbox" value="ugly-but-works"> ugly but works</label>
        <label><input type="checkbox" value="surprisingly-good"> surprisingly good</label>
        <label><input type="checkbox" value="incomplete"> incomplete</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Notes</legend>
      <textarea id="notes" placeholder="What worked, what didn't, what was surprising..."></textarea>
    </fieldset>

    <div class="submit-row">
      <button id="save-next-btn" class="primary">Save &amp; Next</button>
      <button id="save-btn">Save</button>
    </div>
    <div class="clear-row">
      <button id="clear-btn">Clear rating for this game</button>
    </div>
    <div class="hint-line">
      <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp;·&nbsp;
      <kbd>Enter</kbd> save &amp; next &nbsp;·&nbsp;
      <kbd>R</kbd> reload game
    </div>
  </div>
</main>

<script>
  const state = {
    games: [],
    filtered: [],
    currentIdx: 0,
  };

  async function fetchGames() {
    const res = await fetch('/api/games');
    state.games = await res.json();
    populateGameFilter();
    applyFilters();
    updateProgress();
  }

  function populateGameFilter() {
    const names = [...new Set(state.games.map(g => g.game))].sort();
    const sel = document.getElementById('game-filter');
    names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
  }

  function applyFilters() {
    const unratedOnly = document.getElementById('filter-unrated').checked;
    const versionOnly = document.getElementById('version-filter').value;
    const gameOnly = document.getElementById('game-filter').value;
    state.filtered = state.games.filter(g => {
      if (unratedOnly && g.rated) return false;
      if (versionOnly && g.version !== versionOnly) return false;
      if (gameOnly && g.game !== gameOnly) return false;
      return true;
    });
    rebuildSelect();
    if (state.filtered.length === 0) {
      document.getElementById('game-frame').src = 'about:blank';
      return;
    }
    // Keep current game if still in filtered, else jump to first
    const currentId = state.games[state.currentIdx]?.id;
    const stillPresent = state.filtered.findIndex(g => g.id === currentId);
    if (stillPresent >= 0) {
      loadGame(state.games.indexOf(state.filtered[stillPresent]));
    } else {
      loadGame(state.games.indexOf(state.filtered[0]));
    }
  }

  function rebuildSelect() {
    const sel = document.getElementById('game-select');
    sel.innerHTML = '';
    state.filtered.forEach(g => {
      const opt = document.createElement('option');
      opt.value = state.games.indexOf(g);
      opt.textContent = `${g.rated ? '✓ ' : '  '}${g.id}`;
      sel.appendChild(opt);
    });
  }

  function updateProgress() {
    const rated = state.games.filter(g => g.rated).length;
    const total = state.games.length;
    document.getElementById('progress-rated').innerHTML = `<strong>${rated}</strong>`;
    document.getElementById('progress-total').textContent = total;
    document.getElementById('progress-pct').textContent =
      total ? Math.round(rated / total * 100) + '%' : '0%';
  }

  function loadGame(idx) {
    state.currentIdx = idx;
    const g = state.games[idx];
    if (!g) return;
    document.getElementById('game-frame').src = '/game/' + g.id + '/';
    document.getElementById('meta-version').textContent = g.version;
    document.getElementById('meta-run').textContent = g.run;
    document.getElementById('meta-game').textContent = g.game;
    document.getElementById('meta-builder').textContent = g.builder;
    document.getElementById('rated-status').innerHTML =
      g.rated ? '<span class="rated-badge">RATED</span>' : '';
    document.getElementById('game-select').value = idx;
    applyRatingToUI(g.rating || {});
  }

  function applyRatingToUI(r) {
    document.querySelectorAll('[aria-pressed]').forEach(b => b.setAttribute('aria-pressed', 'false'));
    document.querySelectorAll('#flags input[type="checkbox"]').forEach(c => c.checked = false);
    document.getElementById('notes').value = '';

    if (!r) return;
    ['mechanics', 'completable', 'fun', 'visual'].forEach(field => {
      if (r[field] == null) return;
      const row = document.querySelector(`.rating-row[data-field="${field}"]`);
      row?.querySelectorAll('button').forEach(btn => {
        if (String(btn.dataset.value) === String(r[field])) {
          btn.setAttribute('aria-pressed', 'true');
        }
      });
    });
    if (r.runs) {
      document.querySelectorAll('.yn-row[data-field="runs"] button').forEach(btn => {
        if (btn.dataset.value === r.runs) btn.setAttribute('aria-pressed', 'true');
      });
    }
    if (Array.isArray(r.flags)) {
      document.querySelectorAll('#flags input[type="checkbox"]').forEach(c => {
        c.checked = r.flags.includes(c.value);
      });
    }
    document.getElementById('notes').value = r.notes || '';
  }

  function collectRating() {
    const getRow = (field) => {
      const row = document.querySelector(`.rating-row[data-field="${field}"]`);
      const pressed = row?.querySelector('[aria-pressed="true"]');
      return pressed ? parseInt(pressed.dataset.value) : null;
    };
    const runsBtn = document.querySelector('.yn-row[data-field="runs"] [aria-pressed="true"]');
    return {
      runs: runsBtn ? runsBtn.dataset.value : null,
      mechanics: getRow('mechanics'),
      completable: getRow('completable'),
      fun: getRow('fun'),
      visual: getRow('visual'),
      flags: [...document.querySelectorAll('#flags input:checked')].map(c => c.value),
      notes: document.getElementById('notes').value.trim(),
      timestamp: new Date().toISOString(),
    };
  }

  async function saveRating(advance) {
    const g = state.games[state.currentIdx];
    if (!g) return;
    const rating = collectRating();
    const res = await fetch('/api/rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game_id: g.id, ...rating }),
    });
    if (!res.ok) { alert('Save failed: ' + res.status); return; }
    g.rated = true;
    g.rating = rating;
    updateProgress();
    rebuildSelect();
    document.getElementById('rated-status').innerHTML = '<span class="rated-badge">RATED</span>';
    if (advance) next();
  }

  async function clearRating() {
    const g = state.games[state.currentIdx];
    if (!g || !g.rated) return;
    if (!confirm('Clear rating for ' + g.id + '?')) return;
    const res = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game_id: g.id }),
    });
    if (!res.ok) { alert('Delete failed'); return; }
    g.rated = false;
    g.rating = null;
    updateProgress();
    rebuildSelect();
    document.getElementById('rated-status').innerHTML = '';
    applyRatingToUI({});
  }

  function next() {
    if (state.filtered.length === 0) return;
    const currentId = state.games[state.currentIdx]?.id;
    const currentFilteredIdx = state.filtered.findIndex(g => g.id === currentId);
    const nextFiltered = state.filtered[(currentFilteredIdx + 1) % state.filtered.length];
    loadGame(state.games.indexOf(nextFiltered));
  }

  function prev() {
    if (state.filtered.length === 0) return;
    const currentId = state.games[state.currentIdx]?.id;
    const currentFilteredIdx = state.filtered.findIndex(g => g.id === currentId);
    const prevIdx = (currentFilteredIdx - 1 + state.filtered.length) % state.filtered.length;
    loadGame(state.games.indexOf(state.filtered[prevIdx]));
  }

  // Rating/flag button clicks
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const row = btn.closest('.rating-row, .yn-row');
    if (row) {
      row.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
    }
  });

  document.getElementById('save-next-btn').addEventListener('click', () => saveRating(true));
  document.getElementById('save-btn').addEventListener('click', () => saveRating(false));
  document.getElementById('clear-btn').addEventListener('click', clearRating);
  document.getElementById('next-btn').addEventListener('click', next);
  document.getElementById('prev-btn').addEventListener('click', prev);
  document.getElementById('reload-btn').addEventListener('click', () => {
    const iframe = document.getElementById('game-frame');
    iframe.src = iframe.src;
  });
  document.getElementById('game-select').addEventListener('change', (e) => {
    loadGame(parseInt(e.target.value));
  });
  document.getElementById('filter-unrated').addEventListener('change', applyFilters);
  document.getElementById('version-filter').addEventListener('change', applyFilters);
  document.getElementById('game-filter').addEventListener('change', applyFilters);

  document.addEventListener('keydown', (e) => {
    // Don't intercept when typing in text fields
    if (e.target.matches('textarea, input[type="text"]')) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveRating(true); }
    else if (e.key === 'r' || e.key === 'R') { document.getElementById('reload-btn').click(); }
  });

  fetchGames();
</script>

</body>
</html>
