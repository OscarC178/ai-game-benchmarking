  GAME:      Tetris
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-opus-4.6

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="500" height="660"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const CW=500,CH=660,CS=30,COLS=10,ROWS=22,VROWS=20;
const MX=20,MY=30; // matrix origin
const PX=340; // panel x

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.05;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndMove(){tone(1000,0.01,0.04);}
function sndRotate(){tone(600,0.03,0.06);}
function sndDrop(){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(200,ac.currentTime);o.frequency.linearRampToValueAtTime(50,ac.currentTime+0.08);g.gain.value=0.15;g.gain.linearRampToValueAtTime(0,ac.currentTime+0.08);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.08);}catch(e){}}
function sndClear(n){
  if(n>=4){[600,800,1000,1200].forEach((f,i)=>setTimeout(()=>tone(f,0.08,0.2,'sine'),i*60));return;}
  tone(600+(n-1)*200,0.1+n*0.03,0.15,'sine');
}
function sndOver(){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.linearRampToValueAtTime(60,ac.currentTime+0.8);g.gain.value=0.2;g.gain.linearRampToValueAtTime(0,ac.currentTime+0.8);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.8);}catch(e){}}

// Pieces: each is array of rotation states, each state is array of [row,col]
const PIECES=[
  // I - cyan
  {color:'#00FFFF',states:[
    [[0,0],[0,1],[0,2],[0,3]],
    [[0,2],[1,2],[2,2],[3,2]],
    [[2,0],[2,1],[2,2],[2,3]],
    [[0,1],[1,1],[2,1],[3,1]]
  ],size:4},
  // J - blue
  {color:'#0000FF',states:[
    [[0,0],[1,0],[1,1],[1,2]],
    [[0,1],[0,2],[1,1],[2,1]],
    [[1,0],[1,1],[1,2],[2,2]],
    [[0,1],[1,1],[2,0],[2,1]]
  ],size:3},
  // L - orange
  {color:'#FFA500',states:[
    [[0,2],[1,0],[1,1],[1,2]],
    [[0,1],[1,1],[2,1],[2,2]],
    [[1,0],[1,1],[1,2],[2,0]],
    [[0,0],[0,1],[1,1],[2,1]]
  ],size:3},
  // O - yellow
  {color:'#FFFF00',states:[
    [[0,0],[0,1],[1,0],[1,1]]
  ],size:2},
  // S - green
  {color:'#00FF00',states:[
    [[0,1],[0,2],[1,0],[1,1]],
    [[0,1],[1,1],[1,2],[2,2]],
    [[1,1],[1,2],[2,0],[2,1]],
    [[0,0],[1,0],[1,1],[2,1]]
  ],size:3},
  // T - purple
  {color:'#800080',states:[
    [[0,1],[1,0],[1,1],[1,2]],
    [[0,1],[1,1],[1,2],[2,1]],
    [[1,0],[1,1],[1,2],[2,1]],
    [[0,1],[1,0],[1,1],[2,1]]
  ],size:3},
  // Z - red
  {color:'#FF0000',states:[
    [[0,0],[0,1],[1,1],[1,2]],
    [[0,2],[1,1],[1,2],[2,1]],
    [[1,0],[1,1],[2,1],[2,2]],
    [[0,1],[1,0],[1,1],[2,0]]
  ],size:3}
];

const KICKS_NORMAL=[[0,0],[-1,0],[1,0],[0,-1],[-1,-1],[1,-1]];
const KICKS_I=[[0,0],[-2,0],[1,0],[-2,1],[1,-2],[2,0],[-1,0]];

const ST_TITLE=0,ST_PLAY=1,ST_OVER=2;
let state=ST_TITLE;

let grid,piece,pieceIdx,pieceRot,pieceX,pieceY;
let nextIdx,bag,bagPos;
let score,lines,level;
let gravTimer,gravInterval,lockTimer,lockDelay;
let dasTimer,dasDir,dasPhase,arrTimer;
let softDropping;

function newGrid(){
  grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=null;}
}

function shuffle(){
  const a=[0,1,2,3,4,5,6];
  for(let i=6;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function nextPiece(){
  if(bagPos>=bag.length){bag=shuffle();bagPos=0;}
  return bag[bagPos++];
}

function getCells(idx,rot,px,py){
  const p=PIECES[idx];
  const st=p.states[rot%p.states.length];
  return st.map(([r,c])=>({r:py+r,c:px+c}));
}

function isValid(idx,rot,px,py){
  const cells=getCells(idx,rot,px,py);
  for(const{r,c}of cells){
    if(c<0||c>=COLS||r>=ROWS)return false;
    if(r<0)continue;
    if(grid[r][c]!==null)return false;
  }
  return true;
}

function spawnPiece(){
  pieceIdx=nextIdx;
  nextIdx=nextPiece();
  pieceRot=0;
  const sz=PIECES[pieceIdx].size;
  pieceX=Math.floor((COLS-sz)/2);
  pieceY=sz===4?-1:0;
  gravTimer=0;lockTimer=-1;
  if(!isValid(pieceIdx,pieceRot,pieceX,pieceY)){
    state=ST_OVER;sndOver();
  }
}

function lockPiece(){
  const cells=getCells(pieceIdx,pieceRot,pieceX,pieceY);
  const color=PIECES[pieceIdx].color;
  for(const{r,c}of cells){
    if(r>=0&&r<ROWS)grid[r][c]=color;
  }
  sndDrop();
  // Line clears
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c!==null)){
      grid.splice(r,1);
      const nr=[];for(let c=0;c<COLS;c++)nr.push(null);
      grid.unshift(nr);
      cleared++;r++;// recheck this row
    }
  }
  if(cleared>0){
    const pts=[0,100,300,500,800];
    score+=pts[cleared]*level;
    lines+=cleared;
    const nl=Math.floor(lines/10)+1;
    if(nl>level)level=nl;
    updateGravity();
    sndClear(cleared);
  }
  spawnPiece();
}

function updateGravity(){
  const speeds=[1000,800,650,500,400,300,220,150,100,80,60,50];
  gravInterval=level<=speeds.length?speeds[level-1]:50;
}

function ghostY(){
  let gy=pieceY;
  while(isValid(pieceIdx,pieceRot,pieceX,gy+1))gy++;
  return gy;
}

function tryMove(dx,dy){
  if(isValid(pieceIdx,pieceRot,pieceX+dx,pieceY+dy)){
    pieceX+=dx;pieceY+=dy;
    if(dx!==0)sndMove();
    if(lockTimer>=0)lockTimer=0;// reset lock delay on move
    return true;
  }
  return false;
}

function tryRotate(dir){
  const p=PIECES[pieceIdx];
  if(p.states.length<=1)return false;
  const newRot=(pieceRot+dir+p.states.length)%p.states.length;
  const kicks=pieceIdx===0?KICKS_I:KICKS_NORMAL;
  for(const[dx,dy]of kicks){
    if(isValid(pieceIdx,newRot,pieceX+dx,pieceY+dy)){
      pieceX+=dx;pieceY+=dy;pieceRot=newRot;
      sndRotate();
      if(lockTimer>=0)lockTimer=0;
      return true;
    }
  }
  return false;
}

function hardDrop(){
  const gy=ghostY();
  score+=(gy-pieceY)*2;
  pieceY=gy;
  lockPiece();
}

function startGame(){
  newGrid();score=0;lines=0;level=1;
  bag=shuffle();bagPos=0;
  nextIdx=nextPiece();
  updateGravity();
  dasTimer=0;dasDir=0;dasPhase=null;arrTimer=0;
  softDropping=false;lockDelay=500;
  spawnPiece();
  state=ST_PLAY;
}

// Input
const keys={},prevKeys={};
addEventListener('keydown',e=>{keys[e.code]=true;ia();e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
function edge(c){return keys[c]&&!prevKeys[c];}

function update(dt){
  if(state===ST_TITLE){
    if(edge('Enter'))startGame();
    Object.assign(prevKeys,keys);return;
  }
  if(state===ST_OVER){
    if(edge('Enter')){state=ST_TITLE;}
    Object.assign(prevKeys,keys);return;
  }

  // Rotation
  if(edge('ArrowUp')||edge('KeyW'))tryRotate(1);
  if(edge('KeyZ'))tryRotate(-1);

  // Hard drop
  if(edge('Space'))hardDrop();

  // DAS left/right
  const left=keys['ArrowLeft']||keys['KeyA'];
  const right=keys['ArrowRight']||keys['KeyD'];
  if(left&&!right){
    if(!(prevKeys['ArrowLeft']||prevKeys['KeyA'])){
      tryMove(-1,0);dasTimer=0;dasPhase='delay';dasDir=-1;
    }else if(dasDir===-1){
      dasTimer+=dt*1000;
      if(dasPhase==='delay'&&dasTimer>=150){dasPhase='repeat';arrTimer=0;}
      if(dasPhase==='repeat'){arrTimer+=dt*1000;while(arrTimer>=50){tryMove(-1,0);arrTimer-=50;}}
    }
  }else if(right&&!left){
    if(!(prevKeys['ArrowRight']||prevKeys['KeyD'])){
      tryMove(1,0);dasTimer=0;dasPhase='delay';dasDir=1;
    }else if(dasDir===1){
      dasTimer+=dt*1000;
      if(dasPhase==='delay'&&dasTimer>=150){dasPhase='repeat';arrTimer=0;}
      if(dasPhase==='repeat'){arrTimer+=dt*1000;while(arrTimer>=50){tryMove(1,0);arrTimer-=50;}}
    }
  }else{
    dasDir=0;dasPhase=null;dasTimer=0;arrTimer=0;
  }

  // Soft drop
  softDropping=keys['ArrowDown']||keys['KeyS'];
  const interval=softDropping?Math.min(50,gravInterval/20):gravInterval;

  // Gravity
  gravTimer+=dt*1000;
  let iters=0;
  while(gravTimer>=interval&&iters<3){
    gravTimer-=interval;iters++;
    if(isValid(pieceIdx,pieceRot,pieceX,pieceY+1)){
      pieceY++;
      if(softDropping){score++;} 
      lockTimer=-1;
    }else{
      if(lockTimer<0)lockTimer=0;
    }
  }

  // Lock delay
  if(lockTimer>=0){
    if(isValid(pieceIdx,pieceRot,pieceX,pieceY+1)){
      lockTimer=-1;
    }else{
      lockTimer+=dt*1000;
      if(lockTimer>=lockDelay)lockPiece();
    }
  }

  Object.assign(prevKeys,keys);
}

function lighter(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.floor(r+(255-r)*pct));g=Math.min(255,Math.floor(g+(255-g)*pct));b=Math.min(255,Math.floor(b+(255-b)*pct));
  return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darker(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.floor(r*pct);g=Math.floor(g*pct);b=Math.floor(b*pct);
  return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawBlock(x,y,color,alpha){
  cx.globalAlpha=alpha||1;
  cx.fillStyle=color;cx.fillRect(x+1,y+1,CS-2,CS-2);
  cx.fillStyle=lighter(color,0.4);cx.fillRect(x+1,y+1,CS-2,2);cx.fillRect(x+1,y+1,2,CS-2);
  cx.fillStyle=darker(color,0.6);cx.fillRect(x+CS-3,y+1,2,CS-2);cx.fillRect(x+1,y+CS-3,CS-2,2);
  cx.globalAlpha=1;
}

function drawPreview(idx,ox,oy){
  const p=PIECES[idx];
  const st=p.states[0];
  let minR=9,maxR=0,minC=9,maxC=0;
  for(const[r,c]of st){if(r<minR)minR=r;if(r>maxR)maxR=r;if(c<minC)minC=c;if(c>maxC)maxC=c;}
  const pw=(maxC-minC+1)*20,ph=(maxR-minR+1)*20;
  const bx=ox-pw/2,by=oy-ph/2;
  for(const[r,c]of st){
    const px=bx+(c-minC)*20,py=by+(r-minR)*20;
    cx.fillStyle=p.color;cx.fillRect(px,py,18,18);
    cx.fillStyle=lighter(p.color,0.3);cx.fillRect(px,py,18,2);cx.fillRect(px,py,2,18);
    cx.fillStyle=darker(p.color,0.6);cx.fillRect(px+16,py,2,18);cx.fillRect(px,py+16,18,2);
  }
}

function render(){
  cx.fillStyle='#0a0a0a';cx.fillRect(0,0,CW,CH);

  if(state===ST_TITLE){
    cx.fillStyle='#fff';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('TETRIS',CW/2,240);
    cx.font='18px monospace';cx.fillStyle='#aaa';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',CW/2,340);
    cx.font='12px monospace';cx.fillStyle='#666';
    cx.fillText('← → Move  ↑ Rotate  ↓ Soft Drop',CW/2,440);
    cx.fillText('Space Hard Drop  Z Rotate CCW',CW/2,465);
    return;
  }

  // Matrix border
  cx.strokeStyle='#333';cx.lineWidth=2;
  cx.strokeRect(MX-1,MY-1,COLS*CS+2,VROWS*CS+2);

  // Matrix background + grid
  for(let r=0;r<VROWS;r++){
    cx.fillStyle=r%2===0?'#111':'#131313';
    cx.fillRect(MX,MY+r*CS,COLS*CS,CS);
  }
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(let r=0;r<=VROWS;r++){cx.beginPath();cx.moveTo(MX,MY+r*CS);cx.lineTo(MX+COLS*CS,MY+r*CS);cx.stroke();}
  for(let c=0;c<=COLS;c++){cx.beginPath();cx.moveTo(MX+c*CS,MY);cx.lineTo(MX+c*CS,MY+VROWS*CS);cx.stroke();}

  // Locked blocks
  for(let r=2;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c])drawBlock(MX+c*CS,MY+(r-2)*CS,grid[r][c]);
    }
  }

  if(state===ST_PLAY){
    // Ghost
    const gy=ghostY();
    const gc=getCells(pieceIdx,pieceRot,pieceX,gy);
    for(const{r,c}of gc){
      const vr=r-2;
      if(vr>=0&&vr<VROWS){
        cx.strokeStyle=PIECES[pieceIdx].color;cx.globalAlpha=0.25;cx.lineWidth=2;
        cx.strokeRect(MX+c*CS+2,MY+vr*CS+2,CS-4,CS-4);
        cx.globalAlpha=1;
      }
    }

    // Active piece
    const cells=getCells(pieceIdx,pieceRot,pieceX,pieceY);
    for(const{r,c}of cells){
      const vr=r-2;
      if(vr>=0&&vr<VROWS)drawBlock(MX+c*CS,MY+vr*CS,PIECES[pieceIdx].color);
    }
  }

  // Panel
  cx.fillStyle='#888';cx.font='13px monospace';cx.textAlign='left';
  cx.fillText('NEXT',PX,MY);
  cx.strokeStyle='#333';cx.lineWidth=1;
  cx.strokeRect(PX,MY+6,120,80);
  if(state!==ST_TITLE)drawPreview(nextIdx,PX+60,MY+46);

  cx.fillStyle='#888';cx.font='12px monospace';
  cx.fillText('SCORE',PX,MY+110);
  cx.fillStyle='#fff';cx.font='18px monospace';
  cx.fillText(String(score),PX,MY+130);

  cx.fillStyle='#888';cx.font='12px monospace';
  cx.fillText('LINES',PX,MY+165);
  cx.fillStyle='#fff';cx.font='18px monospace';
  cx.fillText(String(lines),PX,MY+185);

  cx.fillStyle='#888';cx.font='12px monospace';
  cx.fillText('LEVEL',PX,MY+220);
  cx.fillStyle='#fff';cx.font='18px monospace';
  cx.fillText(String(level),PX,MY+240);

  // Game over
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(MX,MY,COLS*CS,VROWS*CS);
    cx.fillStyle='#f44';cx.font='bold 30px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',MX+COLS*CS/2,MY+VROWS*CS/2-30);
    cx.fillStyle='#fff';cx.font='20px monospace';
    cx.fillText('Score: '+score,MX+COLS*CS/2,MY+VROWS*CS/2+10);
    cx.fillStyle='#aaa';cx.font='14px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Enter to continue',MX+COLS*CS/2,MY+VROWS*CS/2+50);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.1)dt=0.1;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
