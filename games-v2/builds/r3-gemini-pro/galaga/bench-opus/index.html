<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaga</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="800"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=600,H=800,TAU=Math.PI*2;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.05;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndFire(){tone(880,0.05,0.06,'sine');}
function sndHit(){tone(200,0.1,0.08);}
function sndDie(){tone(150,0.4,0.1,'sawtooth');}
function sndCapture(){tone(220,0.6,0.06,'sine');}
function sndRescue(){tone(660,0.08,0.1,'sine');setTimeout(()=>tone(880,0.1,0.1,'sine'),100);}

// Stars
const stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*60+20});

const ST_TITLE=0,ST_PLAY=1,ST_OVER=2,ST_STAGE=3,ST_RESPAWN=4,ST_CAPTURE=5;
let state=ST_TITLE,stateTimer=0;

// Enemy types: 0=boss, 1=red, 2=blue
const E_BOSS=0,E_RED=1,E_BLUE=2;
const E_COLORS=[['#e22','#ff0'],['#f44','#faa'],['#44f','#aaf']];
const E_SIZES=[{w:28,h:24},{w:22,h:20},{w:20,h:18}];
const E_PTS_GRID=[150,80,50];
const E_PTS_DIVE=[400,160,100];

// Formation grid: 5 rows
// Row 0: 4 bosses (cols 3-6)
// Row 1-2: 8 reds each (cols 1-8)
// Row 3-4: 10 blues each (cols 0-9)
const GRID_CX=W/2,GRID_TOP=100,GRID_SX=46,GRID_SY=38;
const FORM_DEF=[];
// Row 0: bosses
for(let c=0;c<4;c++)FORM_DEF.push({type:E_BOSS,row:0,col:c+3,hp:2});
// Row 1-2: reds
for(let r=1;r<=2;r++)for(let c=0;c<8;c++)FORM_DEF.push({type:E_RED,row:r,col:c+1,hp:1});
// Row 3-4: blues
for(let r=3;r<=4;r++)for(let c=0;c<10;c++)FORM_DEF.push({type:E_BLUE,row:r,col:c,hp:1});

let player,pBullets,enemies,eBullets,particles;
let score,hiScore,lives,stage,dualShip;
let formOX,formDir,diveTimer,enterTimer,enterQueue,enterIdx;
let capturedBoss,captureBeam,globalTime;

hiScore=0;
try{const v=localStorage.getItem('gal3_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('gal3_best',String(hiScore));}catch(e){}}}

function gridPos(row,col){
  const totalCols=10;
  const ox=GRID_CX-((totalCols-1)*GRID_SX)/2+formOX;
  return{x:ox+col*GRID_SX,y:GRID_TOP+row*GRID_SY};
}

function makeEnemy(def,delay){
  return{
    type:def.type,row:def.row,col:def.col,
    hp:def.hp,x:-50,y:-50,
    w:E_SIZES[def.type].w,h:E_SIZES[def.type].h,
    state:'entering',alive:true,
    enterDelay:delay,enterT:0,enterPhase:0,
    diveT:0,divePath:null,
    hasCaptured:false,fireTimer:Math.random()*3+1,
    enterStartX:0,enterStartY:0,animFrame:0
  };
}

function createWave(){
  enemies=[];enterQueue=[];enterIdx=0;
  let delay=0;
  // Bottom rows first (blues), then reds, then bosses
  for(let r=4;r>=0;r--){
    const rowEnemies=FORM_DEF.filter(d=>d.row===r);
    for(const d of rowEnemies){
      const e=makeEnemy(d,delay);
      // Set entry position
      const side=Math.random()<0.5?-1:1;
      e.enterStartX=W/2+side*(200+Math.random()*100);
      e.enterStartY=-30-Math.random()*40;
      e.x=e.enterStartX;e.y=e.enterStartY;
      enemies.push(e);
      delay+=0.06;
    }
    delay+=0.4;
  }
}

function resetPlayer(){
  player={x:W/2,y:740,w:30,h:28,alive:true,invuln:0};
}

function startGame(){
  score=0;lives=3;stage=1;dualShip=false;
  pBullets=[];eBullets=[];particles=[];
  capturedBoss=null;captureBeam=null;
  formOX=0;formDir=1;diveTimer=3;
  globalTime=0;
  resetPlayer();createWave();
  state=ST_STAGE;stateTimer=2;
}

function nextStage(){
  stage++;
  pBullets=[];eBullets=[];
  captureBeam=null;
  formOX=0;formDir=1;diveTimer=2.5;
  createWave();
  state=ST_STAGE;stateTimer=2;
}

function killPlayer(){
  if(!player.alive)return;
  player.alive=false;sndDie();
  if(dualShip)dualShip=false;
  for(let i=0;i<10;i++){
    const a=Math.random()*TAU,sp=40+Math.random()*120;
    particles.push({x:player.x,y:player.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6,maxLife:0.6,color:'#fff'});
  }
  lives--;
  if(lives<=0){state=ST_OVER;saveHi();return;}
  state=ST_RESPAWN;stateTimer=2;
}

function makeDivePath(e,targetX){
  const fp=gridPos(e.row,e.col);
  const side=fp.x<W/2?-1:1;
  return[
    {x:fp.x,y:fp.y},
    {x:fp.x+side*80,y:fp.y-30},
    {x:fp.x+side*100,y:fp.y+40},
    {x:targetX+side*50,y:400},
    {x:targetX,y:600},
    {x:targetX-side*60,y:H+40},
    {x:fp.x+side*40,y:-40},
    {x:fp.x,y:fp.y}
  ];
}

function lerpPath(pts,t){
  const n=pts.length-1;
  const seg=Math.min(Math.floor(t*n),n-1);
  const lt=t*n-seg;
  const a=pts[seg],b=pts[seg+1];
  return{x:a.x+(b.x-a.x)*lt,y:a.y+(b.y-a.y)*lt};
}

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;ia();e.preventDefault();
  if(e.code==='Enter'){
    if(state===ST_TITLE||state===ST_OVER)startGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  globalTime+=dt;

  // Stars
  for(const s of stars){s.y+=s.sp*dt;if(s.y>H){s.y=0;s.x=Math.random()*W;}}

  if(state===ST_STAGE){stateTimer-=dt;if(stateTimer<=0)state=ST_PLAY;
    updateEnemyEntrance(dt);return;}
  if(state===ST_RESPAWN){stateTimer-=dt;updateEnemies(dt);updateEBullets(dt);updateParticles(dt);
    if(stateTimer<=0){resetPlayer();player.invuln=1.5;state=ST_PLAY;}return;}
  if(state===ST_CAPTURE){
    stateTimer-=dt;updateParticles(dt);
    if(stateTimer<=0){
      if(capturedBoss){capturedBoss.hasCaptured=true;capturedBoss.state='returning';capturedBoss.diveT=0.6;
        capturedBoss.divePath=makeDivePath(capturedBoss,W/2);capturedBoss=null;}
      captureBeam=null;lives--;
      if(lives<=0){state=ST_OVER;saveHi();return;}
      state=ST_RESPAWN;stateTimer=1.5;
    }return;
  }
  if(state!==ST_PLAY)return;

  // Player
  if(player.alive){
    let dx=0;
    if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
    if(keys['ArrowRight']||keys['KeyD'])dx=1;
    player.x+=dx*300*dt;
    const hw=dualShip?30:15;
    player.x=Math.max(hw,Math.min(W-hw,player.x));
    if(player.invuln>0)player.invuln-=dt;

    // Fire
    const maxBullets=dualShip?4:2;
    if(keys['Space']&&pBullets.length<maxBullets){
      if(!player.lastFire||globalTime-player.lastFire>0.12){
        player.lastFire=globalTime;
        if(dualShip){
          pBullets.push({x:player.x-12,y:player.y-16,vy:-800});
          pBullets.push({x:player.x+12,y:player.y-16,vy:-800});
        }else{
          pBullets.push({x:player.x,y:player.y-16,vy:-800});
        }
        sndFire();
      }
    }
  }

  // Player bullets
  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];b.y+=b.vy*dt;
    if(b.y<-10){pBullets.splice(i,1);continue;}
    let hit=false;
    for(const e of enemies){
      if(!e.alive||e.state==='entering')continue;
      if(Math.abs(b.x-e.x)<e.w/2+2&&Math.abs(b.y-e.y)<e.h/2+6){
        hit=true;pBullets.splice(i,1);
        e.hp--;
        if(e.hp<=0){
          e.alive=false;
          const diving=e.state==='diving'||e.state==='returning';
          score+=diving?E_PTS_DIVE[e.type]:E_PTS_GRID[e.type];saveHi();sndHit();
          if(e.hasCaptured){
            e.hasCaptured=false;sndRescue();dualShip=true;score+=500;saveHi();
            for(let k=0;k<8;k++){const a=Math.random()*TAU;
              particles.push({x:e.x,y:e.y,vx:Math.cos(a)*80,vy:Math.sin(a)*80,life:0.5,maxLife:0.5,color:'#0ff'});}
          }
          for(let k=0;k<5;k++){const a=Math.random()*TAU,sp=30+Math.random()*80;
            particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4,maxLife:0.4,color:E_COLORS[e.type][0]});}
        }else{sndHit();}
        break;
      }
    }
  }

  updateEnemies(dt);
  updateEBullets(dt);
  updateParticles(dt);

  // Player hit by enemy bullets
  if(player.alive&&player.invuln<=0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      if(Math.abs(b.x-player.x)<16&&Math.abs(b.y-player.y)<14){
        eBullets.splice(i,1);killPlayer();return;
      }
    }
    for(const e of enemies){
      if(!e.alive||e.state==='formation'||e.state==='entering')continue;
      if(Math.abs(e.x-player.x)<(e.w+player.w)/2-4&&Math.abs(e.y-player.y)<(e.h+player.h)/2-4){
        killPlayer();return;
      }
    }
  }

  // Capture beam
  if(captureBeam&&player.alive&&player.invuln<=0){
    if(Math.abs(player.x-captureBeam.x)<35&&player.y<captureBeam.y+captureBeam.h&&player.y>captureBeam.y-20){
      player.alive=false;sndCapture();
      state=ST_CAPTURE;stateTimer=1.8;
    }
  }

  // Wave clear
  if(enemies.every(e=>!e.alive))nextStage();

  // Formation sway
  formOX+=formDir*20*dt;
  if(Math.abs(formOX)>30)formDir*=-1;
}

function updateEnemyEntrance(dt){
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.state==='entering'){
      e.enterT+=dt;
      if(e.enterT<e.enterDelay)continue;
      const t=Math.min(1,(e.enterT-e.enterDelay)/0.8);
      const fp=gridPos(e.row,e.col);
      const midX=(e.enterStartX+fp.x)/2+(e.enterStartX<W/2?60:-60);
      const midY=fp.y-50;
      const it=1-t,it2=it*it,t2=t*t;
      e.x=it2*e.enterStartX+2*it*t*midX+t2*fp.x;
      e.y=it2*e.enterStartY+2*it*t*midY+t2*fp.y;
      if(t>=1)e.state='formation';
    }else if(e.state==='formation'){
      const fp=gridPos(e.row,e.col);
      e.x+=(fp.x-e.x)*5*dt;e.y+=(fp.y-e.y)*5*dt;
    }
  }
}

function updateEnemies(dt){
  // Animate
  for(const e of enemies){
    if(!e.alive)continue;
    e.animFrame=(Math.floor(globalTime*4)%2);
  }

  // Dive timer
  diveTimer-=dt;
  if(diveTimer<=0){
    diveTimer=Math.max(0.8,2.5-stage*0.1)+Math.random()*1;
    const eligible=enemies.filter(e=>e.alive&&e.state==='formation');
    if(eligible.length>0){
      const e=eligible[Math.floor(Math.random()*eligible.length)];
      if(e.type===E_BOSS&&!e.hasCaptured&&Math.random()<0.2&&player.alive&&!captureBeam&&!dualShip){
        e.state='diving';e.divePath=[
          gridPos(e.row,e.col),
          {x:gridPos(e.row,e.col).x+40,y:gridPos(e.row,e.col).y-30},
          {x:gridPos(e.row,e.col).x-40,y:gridPos(e.row,e.col).y+40},
          {x:player.x,y:350}
        ];
        e.diveT=0;e.divePhase=0;
        capturedBoss=e;
      }else{
        e.state='diving';
        e.divePath=makeDivePath(e,player.alive?player.x:W/2);
        e.diveT=0;
      }
    }
  }

  for(const e of enemies){
    if(!e.alive)continue;

    if(e.state==='formation'){
      const fp=gridPos(e.row,e.col);
      e.x+=(fp.x-e.x)*5*dt;e.y+=(fp.y-e.y)*5*dt;
    }else if(e.state==='entering'){
      e.enterT+=dt;
      if(e.enterT<e.enterDelay)continue;
      const t=Math.min(1,(e.enterT-e.enterDelay)/0.8);
      const fp=gridPos(e.row,e.col);
      const midX=(e.enterStartX+fp.x)/2+(e.enterStartX<W/2?60:-60);
      const midY=fp.y-50;
      const it=1-t,it2=it*it,t2=t*t;
      e.x=it2*e.enterStartX+2*it*t*midX+t2*fp.y;
      e.y=it2*e.enterStartY+2*it*t*midY+t2*fp.y;
      if(t>=1)e.state='formation';
    }else if(e.state==='diving'){
      if(e===capturedBoss&&e.divePhase!==undefined&&e.divePhase<2){
        if(e.divePhase===0){
          e.diveT+=dt*0.4;
          if(e.diveT>=1){e.divePhase=1;e.diveT=0;
            captureBeam={x:e.x,y:e.y+e.h/2,h:220,timer:2.5};}
          else{const p=lerpPath(e.divePath,Math.min(e.diveT,0.99));e.x=p.x;e.y=p.y;}
        }else if(e.divePhase===1){
          e.diveT+=dt;
          if(captureBeam)captureBeam.timer-=dt;
          if(e.diveT>2.5||(captureBeam&&captureBeam.timer<=0)){
            captureBeam=null;capturedBoss=null;
            e.state='returning';e.diveT=0;
            e.divePath=makeDivePath(e,e.x);
          }
        }
      }else{
        e.diveT+=dt*0.22;
        if(e.diveT>=1){e.state='formation';e.diveT=0;}
        else{const p=lerpPath(e.divePath,Math.min(e.diveT,0.99));e.x=p.x;e.y=p.y;}
        e.fireTimer-=dt;
        if(e.fireTimer<=0&&player.alive){
          e.fireTimer=0.8+Math.random()*1.2;
          if(eBullets.length<5){
            const a=Math.atan2(player.y-e.y,player.x-e.x)+(Math.random()-0.5)*0.3;
            eBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(a)*250,vy:Math.sin(a)*250});
          }
        }
      }
    }else if(e.state==='returning'){
      e.diveT+=dt*0.3;
      const fp=gridPos(e.row,e.col);
      e.x+=(fp.x-e.x)*3*dt;e.y+=(fp.y-e.y)*3*dt;
      if(Math.abs(e.x-fp.x)<3&&Math.abs(e.y-fp.y)<3){e.state='formation';e.diveT=0;}
    }
  }
}

function updateEBullets(dt){
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.y>H+10||b.y<-10||b.x<-10||b.x>W+10)eBullets.splice(i,1);
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    cx.fillStyle='rgba(255,255,255,'+(0.3+s.s*0.25)+')';
    cx.fillRect(s.x,s.y,s.s,s.s);
  }

  if(state===ST_TITLE){
    cx.fillStyle='#f00';cx.font='bold 52px monospace';cx.textAlign='center';
    cx.fillText('GALAGA',W/2,280);
    cx.fillStyle='#ccc';cx.font='16px monospace';
    cx.fillText('Enemies fly in and form up, then dive!',W/2,370);
    cx.fillText('Shoot them down. Bosses can capture your ship.',W/2,396);
    cx.fillText('Rescue it for dual firepower!',W/2,422);
    cx.fillText('← → Move   Space Fire',W/2,470);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',W/2,550);
    if(hiScore>0){cx.fillStyle='#666';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,620);}
    return;
  }

  // Enemies
  for(const e of enemies){
    if(!e.alive)continue;
    drawEnemy(e);
    if(e.hasCaptured){
      cx.fillStyle='#0ff';cx.globalAlpha=0.6;
      cx.fillRect(e.x-8,e.y+e.h/2+2,16,10);
      cx.globalAlpha=1;
    }
  }

  // Capture beam
  if(captureBeam){
    const bw=40+Math.sin(globalTime*12)*8;
    cx.fillStyle='rgba(80,180,255,0.2)';
    cx.fillRect(captureBeam.x-bw/2,captureBeam.y,bw,captureBeam.h);
    cx.strokeStyle='rgba(100,200,255,0.5)';cx.lineWidth=1;
    cx.strokeRect(captureBeam.x-bw/2,captureBeam.y,bw,captureBeam.h);
  }

  // Enemy bullets
  cx.fillStyle='#f88';
  for(const b of eBullets)cx.fillRect(b.x-1.5,b.y-5,3,10);

  // Player bullets
  cx.fillStyle='#ffc';
  for(const b of pBullets)cx.fillRect(b.x-1,b.y-6,2,12);

  // Player
  if(player.alive){
    const blink=player.invuln>0&&Math.floor(player.invuln*8)%2;
    if(!blink){
      if(dualShip){drawShip(player.x-12,player.y);drawShip(player.x+12,player.y);}
      else drawShip(player.x,player.y);
    }
  }

  // Particles
  for(const p of particles){
    const a=Math.max(0,p.life/p.maxLife);
    cx.globalAlpha=a;cx.fillStyle=p.color||'#fff';
    cx.beginPath();cx.arc(p.x,p.y,2,0,TAU);cx.fill();
    cx.globalAlpha=1;
  }

  // HUD
  cx.fillStyle='#fff';cx.font='18px monospace';cx.textAlign='left';
  cx.fillText('SCORE: '+score,10,28);
  cx.textAlign='right';
  cx.fillText('BEST: '+hiScore,W-10,28);
  cx.textAlign='center';
  cx.fillText('STAGE '+stage,W/2,28);
  // Lives
  for(let i=0;i<lives;i++){
    drawMiniShip(20+i*24,H-16);
  }
  if(dualShip){cx.fillStyle='#0ff';cx.font='12px monospace';cx.textAlign='left';cx.fillText('DUAL',20,H-28);}

  // Overlays
  if(state===ST_STAGE){
    cx.fillStyle='#ff0';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('STAGE '+stage,W/2,H/2);
  }
  if(state===ST_CAPTURE){
    cx.fillStyle='rgba(80,180,255,0.3)';cx.font='bold 24px monospace';cx.textAlign='center';
    cx.fillText('FIGHTER CAPTURED!',W/2,H/2+60);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+40);}
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+80);
  }
}

function drawEnemy(e){
  const c=E_COLORS[e.type];
  const f=e.animFrame;
  cx.save();cx.translate(e.x,e.y);

  if(e.type===E_BOSS){
    // Boss: larger, distinct
    const dmg=e.hp<2;
    cx.fillStyle=dmg?'#a40':c[0];
    cx.fillRect(-12,-10,24,20);
    cx.fillRect(-16,-4,32,8);
    cx.fillStyle=dmg?'#ff0':c[1];
    cx.fillRect(-8,-12,16,4);
    cx.fillRect(-4,-4,3,3);cx.fillRect(1,-4,3,3);
    if(f===0){cx.fillStyle=c[0];cx.fillRect(-10,8,4,4);cx.fillRect(6,8,4,4);}
  }else if(e.type===E_RED){
    cx.fillStyle=c[0];
    cx.fillRect(-8,-8,16,16);
    cx.fillStyle=c[1];
    if(f===0){cx.fillRect(-12,-4,4,8);cx.fillRect(8,-4,4,8);}
    else{cx.fillRect(-10,-8,4,6);cx.fillRect(6,-8,4,6);}
    cx.fillStyle='#000';cx.fillRect(-4,-3,3,2);cx.fillRect(1,-3,3,2);
  }else{
    cx.fillStyle=c[0];
    cx.fillRect(-7,-7,14,14);
    cx.fillStyle=c[1];
    if(f===0){cx.fillRect(-11,-3,4,6);cx.fillRect(7,-3,4,6);}
    else{cx.fillRect(-9,-7,3,5);cx.fillRect(6,-7,3,5);}
    cx.fillStyle='#fff';cx.fillRect(-3,-4,2,2);cx.fillRect(1,-4,2,2);
  }
  cx.restore();
}

function drawShip(sx,sy){
  cx.fillStyle='#0cf';
  cx.beginPath();
  cx.moveTo(sx,sy-14);
  cx.lineTo(sx-12,sy+10);
  cx.lineTo(sx-4,sy+6);
  cx.lineTo(sx+4,sy+6);
  cx.lineTo(sx+12,sy+10);
  cx.closePath();cx.fill();
  cx.fillStyle='#fff';cx.fillRect(sx-2,sy-12,4,10);
}

function drawMiniShip(sx,sy){
  cx.fillStyle='#0cf';
  cx.beginPath();
  cx.moveTo(sx,sy-7);cx.lineTo(sx-6,sy+5);cx.lineTo(sx+6,sy+5);cx.closePath();cx.fill();
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
