<!--
  GAME:      Galaga
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
    canvas { background: #000; display: block; border: 2px solid #333; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="galagaCanvas" width="600" height="800"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('galagaCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 600, HEIGHT = 800;

    const STATES = { START: 0, PLAYING: 1, LEVEL_CLEAR: 2, GAME_OVER: 3 };
    let gameState = STATES.START;
    let score = 0, bestScore = parseInt(localStorage.getItem('galaga_best') || '0');
    let lives = 3, level = 1, gameTime = 0;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    function playSound(f, d, t = 'square') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = f;
        osc.type = t;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + d);
      } catch (e) {}
    }

    // Player
    let player = { x: 280, y: 720, w: 30, h: 30, vx: 0, dual: false, captured: false, alive: true };

    // Projectiles
    let playerProjectiles = [];
    let enemyProjectiles = [];

    // Enemies
    let enemies = [];
    function createEnemies() {
      enemies = [];
      let idx = 0;
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 8; col++) {
          let type = row === 0 ? 'boss' : row < 3 ? 'red' : 'blue';
          let color = type === 'boss' ? '#FF0000' : type === 'red' ? '#FF6666' : '#6666FF';
          enemies.push({
            type: type, col: col, row: row, color: color,
            x: 70 + col * 60, y: 50 + row * 50,
            gridX: 70 + col * 60, gridY: 50 + row * 50,
            vx: 0, vy: 0, state: 'entering', health: type === 'boss' ? 2 : 1,
            diveTimer: 0, divePath: 0, shootTimer: Math.random() * 2
          });
        }
      }
    }

    let diveTimer = 0, diveCooldown = 3;

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if (key === 'enter') {
        initAudio();
        if (gameState === STATES.START || gameState === STATES.GAME_OVER) {
          score = 0; lives = 3; level = 1;
          player = { x: 280, y: 720, w: 30, h: 30, vx: 0, dual: false, captured: false, alive: true };
          playerProjectiles = [];
          enemyProjectiles = [];
          createEnemies();
          gameState = STATES.PLAYING;
        }
      }
      if (key === 'arrowleft') player.vx = -300;
      if (key === 'arrowright') player.vx = 300;
      if (key === ' ' && playerProjectiles.length < (player.dual ? 4 : 2)) {
        if (player.dual) {
          playerProjectiles.push({ x: player.x - 10, y: player.y - 15, vy: -800 });
          playerProjectiles.push({ x: player.x + 10, y: player.y - 15, vy: -800 });
        } else {
          playerProjectiles.push({ x: player.x, y: player.y - 15, vy: -800 });
        }
        playSound(800, 0.05);
      }
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.vx = 0;
    });

    function update(dt) {
      if (gameState !== STATES.PLAYING) return;

      gameTime += dt;

      // Player movement
      player.x += player.vx * dt;
      player.x = Math.max(0, Math.min(WIDTH - player.w, player.x));

      // Update player projectiles
      for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        playerProjectiles[i].y += playerProjectiles[i].vy * dt;
        if (playerProjectiles[i].y < 0) playerProjectiles.splice(i, 1);
      }

      // Update enemy projectiles
      for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        enemyProjectiles[i].y += enemyProjectiles[i].vy * dt;
        if (enemyProjectiles[i].y > HEIGHT) enemyProjectiles.splice(i, 1);
        else if (Math.abs(enemyProjectiles[i].x - player.x) < 30 && Math.abs(enemyProjectiles[i].y - player.y) < 30) {
          if (!player.captured) {
            lives--;
            if (lives <= 0) gameState = STATES.GAME_OVER;
            else {
              player.alive = false;
              setTimeout(() => {
                player = { x: 280, y: 720, w: 30, h: 30, vx: 0, dual: false, captured: false, alive: true };
              }, 1500);
            }
          }
          enemyProjectiles.splice(i, 1);
        }
      }

      // Update enemies
      diveTimer += dt;
      for (let e of enemies) {
        if (e.state === 'entering') {
          const progress = (gameTime * 0.5) % 1;
          e.x = 100 + Math.sin(progress * Math.PI * 2) * 150;
          e.y = -50 + progress * 150;
          if (e.y > e.gridY - 20) e.state = 'idle';
        } else if (e.state === 'idle') {
          e.x = e.gridX + Math.sin(gameTime) * 10;
          e.y = e.gridY;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            enemyProjectiles.push({ x: e.x, y: e.y + 15, vy: 250 });
            e.shootTimer = 2 + Math.random() * 2;
          }
        } else if (e.state === 'diving') {
          e.diveTimer += dt;
          const progress = Math.min(e.diveTimer / 4, 1);
          const startY = e.gridY;
          const peakY = HEIGHT / 2 + Math.random() * 100;
          if (progress < 0.5) {
            e.y = startY + (peakY - startY) * (progress * 2);
            e.x = e.gridX + Math.sin(progress * Math.PI * 4) * 80;
          } else {
            e.y = peakY + (HEIGHT + 50 - peakY) * ((progress - 0.5) * 2);
            e.x = e.gridX + Math.cos(progress * Math.PI) * 60;
          }
          if (progress >= 1) {
            e.state = 'idle';
            e.y = e.gridY;
            e.x = e.gridX;
          }
        }
      }

      // Random dive trigger
      if (diveTimer > diveCooldown) {
        diveTimer = 0;
        diveCooldown = 2 + Math.random() * 3;
        const idleEnemies = enemies.filter(e => e.state === 'idle');
        if (idleEnemies.length > 0) {
          idleEnemies[Math.floor(Math.random() * idleEnemies.length)].state = 'diving';
        }
      }

      // Collisions
      for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (Math.abs(playerProjectiles[i].x - e.x) < 25 && Math.abs(playerProjectiles[i].y - e.y) < 25) {
            e.health--;
            if (e.health <= 0) {
              const pts = e.state === 'idle' ? (e.type === 'boss' ? 150 : e.type === 'red' ? 50 : 30) : (e.type === 'boss' ? 400 : e.type === 'red' ? 100 : 80);
              score += pts;
              if (score > bestScore) { bestScore = score; localStorage.setItem('galaga_best', bestScore); }
              enemies.splice(j, 1);
            } else {
              e.color = '#FFFF00';
            }
            playerProjectiles.splice(i, 1);
            playSound(600, 0.1);
            break;
          }
        }
      }

      if (enemies.length === 0) {
        gameState = STATES.LEVEL_CLEAR;
        level++;
        setTimeout(() => {
          createEnemies();
          gameState = STATES.PLAYING;
        }, 2000);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Starfield
      ctx.fillStyle = '#FFF';
      for (let i = 0; i < 30; i++) {
        const x = (i * 97 + gameTime * 50) % WIDTH;
        const y = (i * 71 + gameTime * 30) % HEIGHT;
        ctx.fillRect(x, y, 1, 1);
      }

      // HUD
      ctx.fillStyle = '#FF0';
      ctx.font = '14px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 20);
      ctx.textAlign = 'center';
      ctx.fillText('Best: ' + bestScore, WIDTH / 2, 20);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 20);

      if (gameState === STATES.START) {
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GALAGA', WIDTH / 2, 200);
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Arrow Keys to Move, Space to Fire', WIDTH / 2, 350);
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
      } else {
        // Enemies
        for (let e of enemies) {
          ctx.fillStyle = e.color;
          ctx.fillRect(e.x - 12, e.y - 12, 24, 24);
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.strokeRect(e.x - 12, e.y - 12, 24, 24);
        }

        // Player
        if (player.alive) {
          ctx.fillStyle = '#00FF00';
          ctx.fillRect(player.x - 15, player.y - 15, 30, 30);
          if (player.dual) {
            ctx.fillRect(player.x - 45, player.y - 15, 30, 30);
            ctx.fillRect(player.x + 15, player.y - 15, 30, 30);
          }
        }

        // Player projectiles
        ctx.fillStyle = '#FFFF00';
        for (let p of playerProjectiles) {
          ctx.fillRect(p.x - 2, p.y - 5, 4, 10);
        }

        // Enemy projectiles
        ctx.fillStyle = '#FF0000';
        for (let p of enemyProjectiles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fill();
        }

        if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FF0000';
          ctx.font = 'bold 40px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', WIDTH / 2, 300);
          ctx.fillStyle = '#FFF';
          ctx.font = '16px "Courier New"';
          ctx.fillText('Final Score: ' + score, WIDTH / 2, 380);
          ctx.fillText('Press ENTER to Restart', WIDTH / 2, 440);
        } else if (gameState === STATES.LEVEL_CLEAR) {
          ctx.fillStyle = '#FFFF00';
          ctx.font = 'bold 32px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('STAGE ' + level, WIDTH / 2, 400);
        }
      }
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    createEnemies();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
