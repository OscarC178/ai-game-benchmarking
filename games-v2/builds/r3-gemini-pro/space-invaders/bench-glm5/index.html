  RUN:       r3-gemini-pro

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_STARTUP = 0;
    const STATE_PLAYING = 1;
    const STATE_WAVE_CLEAR = 2;
    const STATE_GAMEOVER = 3;
    
    // Player
    const PLAYER_W = 40;
    const PLAYER_H = 20;
    const PLAYER_Y = 550;
    const PLAYER_SPEED = 300;
    
    // Aliens
    const ALIEN_ROWS = 5;
    const ALIEN_COLS = 11;
    const ALIEN_SPACING_X = 45;
    const ALIEN_SPACING_Y = 40;
    const ALIEN_STEP_X = 10;
    const ALIEN_STEP_Y = 20;
    
    // Projectiles
    const PLAYER_BULLET_SPEED = 600;
    const ALIEN_BULLET_SPEED = 200;
    const MAX_ALIEN_BULLETS = 3;
    
    // Shield
    const SHIELD_COUNT = 4;
    const SHIELD_W = 80;
    const SHIELD_H = 60;
    const SHIELD_Y = 450;
    const CHUNK_SIZE = 4;
    
    // UFO
    const UFO_SPEED = 150;
    const UFO_POINTS = [50, 100, 150, 300];
    
    // Colors
    const COLORS = {
      player: '#00FF00',
      alienA: '#FFFF00',
      alienB: '#00FFFF',
      alienC: '#FF00FF',
      bullet: '#00FF00',
      alienBullet: '#FFFFFF',
      shield: '#00FF00',
      ufo: '#FF0000',
      text: '#FFFFFF',
      green: '#00FF00'
    };
    
    // ==================== GAME STATE ====================
    let state = STATE_STARTUP;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('spaceinvaders_highscore') || '0');
    let lives = 3;
    let wave = 1;
    let waveDropBonus = 0;
    
    let player = {
      x: W / 2 - PLAYER_W / 2,
      y: PLAYER_Y,
      w: PLAYER_W,
      h: PLAYER_H
    };
    
    let playerBullet = null;
    
    let aliens = [];
    let alienGridX = 0;
    let alienGridY = 80;
    let alienDir = 1;
    let alienTickTimer = 0;
    let alienTickInterval = 1000;
    let alienAnimFrame = 0;
    let marchToneIndex = 0;
    
    let alienBullets = [];
    let alienShootTimer = 0;
    
    let shields = [];
    
    let ufo = null;
    let ufoTimer = 0;
    let ufoPointsDisplay = null;
    
    let explosions = [];
    let deathPauseTimer = 0;
    let waveClearTimer = 0;
    
    // Audio
    let audioCtx = null;
    
    // Input
    const keys = {};
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.08) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playPlayerFire() {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } catch (e) {}
    }
    
    function playAlienHit() {
      if (!audioCtx) return;
      try {
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        noise.buffer = buffer;
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        noise.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
      } catch (e) {}
    }
    
    function playPlayerHit() {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      } catch (e) {}
    }
    
    function playMarch() {
      const tones = [120, 110, 100, 90];
      playTone(tones[marchToneIndex % 4], 0.05, 'square', 0.06);
      marchToneIndex++;
    }
    
    function playUFO() {
      playTone(600, 0.1, 'square', 0.04);
    }
    
    // ==================== INITIALIZATION ====================
    function createAliens() {
      aliens = [];
      const startX = W / 2 - (ALIEN_COLS * ALIEN_SPACING_X) / 2;
      const startY = alienGridY;
      
      for (let row = 0; row < ALIEN_ROWS; row++) {
        for (let col = 0; col < ALIEN_COLS; col++) {
          let type, points, color;
          if (row === 0) {
            type = 'C'; points = 30; color = COLORS.alienC;
          } else if (row <= 2) {
            type = 'B'; points = 20; color = COLORS.alienB;
          } else {
            type = 'A'; points = 10; color = COLORS.alienA;
          }
          
          aliens.push({
            x: startX + col * ALIEN_SPACING_X,
            y: startY + row * ALIEN_SPACING_Y,
            type: type,
            points: points,
            color: color,
            alive: true
          });
        }
      }
      
      // Reset grid position
      alienGridX = 0;
      alienGridY = 80 + waveDropBonus;
      alienDir = 1;
      alienTickInterval = 1000;
      alienAnimFrame = 0;
      marchToneIndex = 0;
    }
    
    function createShields() {
      shields = [];
      const spacing = W / (SHIELD_COUNT + 1);
      
      for (let i = 0; i < SHIELD_COUNT; i++) {
        const shieldX = spacing * (i + 1) - SHIELD_W / 2;
        const chunks = [];
        
        for (let cy = 0; cy < SHIELD_H / CHUNK_SIZE; cy++) {
          for (let cx = 0; cx < SHIELD_W / CHUNK_SIZE; cx++) {
            // Create arch shape
            const localX = cx * CHUNK_SIZE;
            const localY = cy * CHUNK_SIZE;
            const relX = localX - SHIELD_W / 2;
            const relY = localY - SHIELD_H / 2;
            
            // Skip corners to create arch
            const cornerDist = Math.max(Math.abs(relX) - 20, Math.abs(relY) - 15);
            
            // Top arch cutout
            if (localY < SHIELD_H * 0.4 && localX > SHIELD_W * 0.25 && localX < SHIELD_W * 0.75) continue;
            
            // Corner rounding
            if (localY < 8) {
              if (localX < 8 || localX >= SHIELD_W - 8) continue;
            }
            
            chunks.push({
              x: shieldX + localX,
              y: SHIELD_Y + localY,
              active: true
            });
          }
        }
        
        shields.push({ chunks: chunks });
      }
    }
    
    function startGame() {
      score = 0;
      lives = 3;
      wave = 1;
      waveDropBonus = 0;
      player.x = W / 2 - PLAYER_W / 2;
      playerBullet = null;
      alienBullets = [];
      ufo = null;
      ufoTimer = 15000;
      explosions = [];
      createAliens();
      createShields();
      state = STATE_PLAYING;
    }
    
    function nextWave() {
      wave++;
      waveDropBonus = Math.min(100, waveDropBonus + 20);
      player.x = W / 2 - PLAYER_W / 2;
      playerBullet = null;
      alienBullets = [];
      ufo = null;
      createAliens();
      state = STATE_PLAYING;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_STARTUP) {
        if (keys['Enter']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      if (state === STATE_WAVE_CLEAR) {
        waveClearTimer -= dtMs;
        if (waveClearTimer <= 0) {
          nextWave();
        }
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter']) {
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      // Death pause
      if (deathPauseTimer > 0) {
        deathPauseTimer -= dtMs;
        if (deathPauseTimer <= 0) {
          player.x = W / 2 - PLAYER_W / 2;
          alienBullets = [];
          playerBullet = null;
        }
        return;
      }
      
      // Player movement
      if (keys['ArrowLeft'] || keys['KeyA']) {
        player.x -= PLAYER_SPEED * dt;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.x += PLAYER_SPEED * dt;
      }
      player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));
      
      // Fire
      if (keys['Space'] && !playerBullet) {
        playerBullet = {
          x: player.x + PLAYER_W / 2 - 1,
          y: player.y - 10,
          w: 2,
          h: 10
        };
        playPlayerFire();
      }
      
      // Update player bullet
      if (playerBullet) {
        playerBullet.y -= PLAYER_BULLET_SPEED * dt;
        if (playerBullet.y < 0) {
          playerBullet = null;
        }
      }
      
      // Alien grid movement (discrete ticks)
      alienTickTimer += dtMs;
      const aliveCount = aliens.filter(a => a.alive).length;
      const tickInterval = Math.max(50, 1000 * (aliveCount / 55));
      
      if (alienTickTimer >= tickInterval) {
        alienTickTimer = 0;
        moveAlienGrid();
        playMarch();
        alienAnimFrame = 1 - alienAnimFrame;
      }
      
      // Alien shooting
      alienShootTimer += dtMs;
      if (alienShootTimer >= 1000) {
        alienShootTimer = 0;
        tryAlienShoot();
      }
      
      // Update alien bullets
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        alienBullets[i].y += ALIEN_BULLET_SPEED * dt;
        if (alienBullets[i].y > H) {
          alienBullets.splice(i, 1);
        }
      }
      
      // UFO logic
      ufoTimer -= dtMs;
      if (!ufo && ufoTimer <= 0 && Math.random() < 0.01) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        ufo = {
          x: dir > 0 ? -60 : W + 60,
          y: 50,
          w: 60,
          h: 20,
          dir: dir,
          wobble: 0
        };
        ufoTimer = 20000 + Math.random() * 20000;
      }
      
      if (ufo) {
        ufo.x += ufo.dir * UFO_SPEED * dt;
        ufo.wobble += dt * 10;
        if (Math.sin(ufo.wobble) > 0) playUFO();
        if ((ufo.dir > 0 && ufo.x > W + 60) || (ufo.dir < 0 && ufo.x < -60)) {
          ufo = null;
        }
      }
      
      if (ufoPointsDisplay) {
        ufoPointsDisplay.timer -= dtMs;
        if (ufoPointsDisplay.timer <= 0) ufoPointsDisplay = null;
      }
      
      // Update explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].life -= dtMs;
        if (explosions[i].life <= 0) {
          explosions.splice(i, 1);
        }
      }
      
      // Collision detection
      checkCollisions();
      
      // Check win condition
      if (aliens.filter(a => a.alive).length === 0) {
        state = STATE_WAVE_CLEAR;
        waveClearTimer = 2000;
      }
    }
    
    function moveAlienGrid() {
      let moveDown = false;
      
      // Calculate bounds
      const aliveAliens = aliens.filter(a => a.alive);
      if (aliveAliens.length === 0) return;
      
      const minX = Math.min(...aliveAliens.map(a => a.x));
      const maxX = Math.max(...aliveAliens.map(a => a.x)) + 24;
      
      // Check if need to reverse
      if ((alienDir > 0 && maxX >= W - 20) || (alienDir < 0 && minX <= 20)) {
        moveDown = true;
        alienDir = -alienDir;
      }
      
      // Move aliens
      for (const alien of aliens) {
        if (moveDown) {
          alien.y += ALIEN_STEP_Y;
        }
        alien.x += alienDir * ALIEN_STEP_X;
      }
      
      // Check if aliens reached bottom
      const maxY = Math.max(...aliveAliens.map(a => a.y)) + 16;
      if (maxY >= player.y) {
        state = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('spaceinvaders_highscore', highScore);
        }
      }
    }
    
    function tryAlienShoot() {
      if (alienBullets.length >= MAX_ALIEN_BULLETS) return;
      
      // Find bottom aliens in each column
      const columns = {};
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const col = Math.round(alien.x / ALIEN_SPACING_X);
        if (!columns[col] || alien.y > columns[col].y) {
          columns[col] = alien;
        }
      }
      
      const shooters = Object.values(columns);
      if (shooters.length === 0) return;
      
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      
      // Check if another bullet is too close
      const tooClose = alienBullets.some(b => 
        Math.abs(b.x - shooter.x) < 30
      );
      if (tooClose) return;
      
      alienBullets.push({
        x: shooter.x + 12,
        y: shooter.y + 16,
        w: 3,
        h: 10
      });
    }
    
    function checkCollisions() {
      // Player bullet vs aliens
      if (playerBullet) {
        for (const alien of aliens) {
          if (!alien.alive) continue;
          if (rectCollision(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h,
              alien.x - 12, alien.y - 8, 24, 16)) {
            alien.alive = false;
            score += alien.points;
            playerBullet = null;
            explosions.push({ x: alien.x, y: alien.y, life: 200 });
            playAlienHit();
            break;
          }
        }
        if (playerBullet === null) return;
      }
      
      // Player bullet vs UFO
      if (playerBullet && ufo) {
        if (rectCollision(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h,
            ufo.x - ufo.w/2, ufo.y - ufo.h/2, ufo.w, ufo.h)) {
          const points = UFO_POINTS[Math.floor(Math.random() * UFO_POINTS.length)];
          score += points;
          ufoPointsDisplay = { x: ufo.x, y: ufo.y, points: points, timer: 1000 };
          explosions.push({ x: ufo.x, y: ufo.y, life: 300 });
          playerBullet = null;
          ufo = null;
          playAlienHit();
          return;
        }
      }
      
      // Player bullet vs shields
      if (playerBullet) {
        for (const shield of shields) {
          for (const chunk of shield.chunks) {
            if (!chunk.active) continue;
            if (rectCollision(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h,
                chunk.x, chunk.y, CHUNK_SIZE, CHUNK_SIZE)) {
              chunk.active = false;
              playerBullet = null;
              return;
            }
          }
        }
      }
      
      // Alien bullets vs player
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const bullet = alienBullets[i];
        if (rectCollision(bullet.x, bullet.y, bullet.w, bullet.h,
            player.x, player.y, PLAYER_W, PLAYER_H)) {
          alienBullets.splice(i, 1);
          lives--;
          playPlayerHit();
          if (lives <= 0) {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('spaceinvaders_highscore', highScore);
            }
          } else {
            deathPauseTimer = 1500;
          }
          return;
        }
      }
      
      // Alien bullets vs shields
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const bullet = alienBullets[i];
        let hit = false;
        for (const shield of shields) {
          for (const chunk of shield.chunks) {
            if (!chunk.active) continue;
            if (rectCollision(bullet.x, bullet.y, bullet.w, bullet.h,
                chunk.x, chunk.y, CHUNK_SIZE, CHUNK_SIZE)) {
              chunk.active = false;
              hit = true;
              break;
            }
          }
          if (hit) break;
        }
        if (hit) {
          alienBullets.splice(i, 1);
        }
      }
      
      // Aliens vs shields
      for (const alien of aliens) {
        if (!alien.alive) continue;
        for (const shield of shields) {
          for (const chunk of shield.chunks) {
            if (!chunk.active) continue;
            if (rectCollision(alien.x - 12, alien.y - 8, 24, 16,
                chunk.x, chunk.y, CHUNK_SIZE, CHUNK_SIZE)) {
              chunk.active = false;
            }
          }
        }
      }
    }
    
    function rectCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_STARTUP) {
        drawStartup();
        return;
      }
      
      // Draw HUD
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 25);
      
      ctx.textAlign = 'center';
      ctx.fillText(`HIGH: ${highScore}`, W / 2, 25);
      
      ctx.textAlign = 'right';
      ctx.fillText(`LIVES: ${'♥'.repeat(lives)}`, W - 10, 25);
      
      // Draw shields
      ctx.fillStyle = COLORS.shield;
      for (const shield of shields) {
        for (const chunk of shield.chunks) {
          if (chunk.active) {
            ctx.fillRect(chunk.x, chunk.y, CHUNK_SIZE, CHUNK_SIZE);
          }
        }
      }
      
      // Draw aliens
      for (const alien of aliens) {
        if (!alien.alive) continue;
        drawAlien(alien);
      }
      
      // Draw UFO
      if (ufo) {
        drawUFO(ufo);
      }
      
      // Draw UFO points
      if (ufoPointsDisplay) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 16px Courier New, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(ufoPointsDisplay.points.toString(), ufoPointsDisplay.x, ufoPointsDisplay.y);
      }
      
      // Draw player
      if (deathPauseTimer <= 0) {
        drawPlayer(player.x, player.y);
      }
      
      // Draw player bullet
      if (playerBullet) {
        ctx.fillStyle = COLORS.bullet;
        ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h);
      }
      
      // Draw alien bullets
      ctx.fillStyle = COLORS.alienBullet;
      for (const bullet of alienBullets) {
        ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
      }
      
      // Draw explosions
      for (const exp of explosions) {
        ctx.fillStyle = `rgba(255, 255, 255, ${exp.life / 200})`;
        ctx.fillRect(exp.x - 10, exp.y - 8, 20, 16);
      }
      
      if (state === STATE_WAVE_CLEAR) {
        ctx.fillStyle = COLORS.green;
        ctx.font = 'bold 36px Courier New, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`WAVE ${wave} CLEAR!`, W / 2, H / 2);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 56px Courier New, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
        
        ctx.fillStyle = COLORS.text;
        ctx.font = '24px Courier New, monospace';
        ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 20);
        
        if (Math.floor(Date.now() / 500) % 2 === 0) {
          ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 80);
        }
      }
    }
    
    function drawPlayer(x, y) {
      ctx.fillStyle = COLORS.player;
      // Base
      ctx.fillRect(x, y + 12, PLAYER_W, 8);
      // Middle
      ctx.fillRect(x + 8, y + 6, PLAYER_W - 16, 10);
      // Cannon
      ctx.fillRect(x + PLAYER_W / 2 - 3, y, 6, 10);
    }
    
    function drawAlien(alien) {
      ctx.fillStyle = alien.color;
      const frame = alienAnimFrame;
      
      if (alien.type === 'A') {
        // Octopus - large
        ctx.fillRect(alien.x - 10, alien.y - 8, 20, 8);
        ctx.fillRect(alien.x - 14, alien.y, 28, 4);
        if (frame === 0) {
          ctx.fillRect(alien.x - 14, alien.y + 4, 6, 4);
          ctx.fillRect(alien.x + 8, alien.y + 4, 6, 4);
        } else {
          ctx.fillRect(alien.x - 10, alien.y + 4, 6, 4);
          ctx.fillRect(alien.x + 4, alien.y + 4, 6, 4);
        }
      } else if (alien.type === 'B') {
        // Crab - medium
        ctx.fillRect(alien.x - 8, alien.y - 8, 16, 4);
        ctx.fillRect(alien.x - 12, alien.y - 4, 24, 6);
        ctx.fillRect(alien.x - 8, alien.y + 2, 16, 4);
        if (frame === 0) {
          ctx.fillRect(alien.x - 14, alien.y - 2, 4, 6);
          ctx.fillRect(alien.x + 10, alien.y - 2, 4, 6);
        } else {
          ctx.fillRect(alien.x - 14, alien.y + 2, 4, 6);
          ctx.fillRect(alien.x + 10, alien.y + 2, 4, 6);
        }
      } else {
        // Squid - small
        ctx.fillRect(alien.x - 6, alien.y - 8, 12, 4);
        ctx.fillRect(alien.x - 10, alien.y - 4, 20, 4);
        ctx.fillRect(alien.x - 6, alien.y, 12, 4);
        if (frame === 0) {
          ctx.fillRect(alien.x - 10, alien.y - 4, 4, 4);
          ctx.fillRect(alien.x + 6, alien.y - 4, 4, 4);
        } else {
          ctx.fillRect(alien.x - 10, alien.y + 2, 4, 4);
          ctx.fillRect(alien.x + 6, alien.y + 2, 4, 4);
        }
      }
    }
    
    function drawUFO(ufo) {
      ctx.fillStyle = COLORS.ufo;
      // Body
      ctx.beginPath();
      ctx.ellipse(ufo.x, ufo.y, 30, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      // Dome
      ctx.beginPath();
      ctx.ellipse(ufo.x, ufo.y - 6, 15, 8, 0, Math.PI, 0);
      ctx.fill();
    }
    
    function drawStartup() {
      ctx.fillStyle = COLORS.green;
      ctx.font = 'bold 56px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE INVADERS', W / 2, H / 2 - 120);
      
      ctx.font = '18px Courier New, monospace';
      
      // Draw alien legend
      ctx.fillStyle = COLORS.alienC;
      ctx.fillText('= 30 POINTS', W / 2 + 50, H / 2 - 40);
      
      ctx.fillStyle = COLORS.alienB;
      ctx.fillText('= 20 POINTS', W / 2 + 50, H / 2);
      
      ctx.fillStyle = COLORS.alienA;
      ctx.fillText('= 10 POINTS', W / 2 + 50, H / 2 + 40);
      
      // Draw sample aliens
      drawAlien({ x: W / 2 - 60, y: H / 2 - 48, type: 'C', color: COLORS.alienC });
      drawAlien({ x: W / 2 - 60, y: H / 2 - 8, type: 'B', color: COLORS.alienB });
      drawAlien({ x: W / 2 - 60, y: H / 2 + 32, type: 'A', color: COLORS.alienA });
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = COLORS.text;
        ctx.font = '24px Courier New, monospace';
        ctx.fillText('Press Enter to Start', W / 2, H / 2 + 140);
      }
      
      ctx.font = '14px Courier New, monospace';
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys or A/D to move, Space to fire', W / 2, H / 2 + 200);
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
