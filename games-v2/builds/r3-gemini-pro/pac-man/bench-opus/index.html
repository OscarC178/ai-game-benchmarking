<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pac-Man</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';
const T=20,COLS=28,ROWS=31;
const cv=document.getElementById('c');
cv.width=COLS*T;cv.height=ROWS*T+60;
const W=cv.width,H=cv.height,cx=cv.getContext('2d');

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndWaka(n){tone(n%2?262:294,0.08,0.04);}
function sndPower(){tone(100,0.3,0.05,'sine');}
function sndEatGhost(){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.linearRampToValueAtTime(1200,ac.currentTime+0.15);g.gain.value=0.06;g.gain.linearRampToValueAtTime(0,ac.currentTime+0.15);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.15);}catch(e){}}
function sndDie(){for(let i=0;i<6;i++)setTimeout(()=>tone(400-i*50,0.12,0.04,'sawtooth'),i*120);}

// Maze: 0=wall, 1=path, 2=pellet, 3=power, 4=ghost-house, 5=gate, 6=empty-path
const MAZE_STR=[
'0000000000000000000000000000',
'0222222222222002222222222220',
'0200002000020020200002000020',
'0300002000020020200002000030',
'0200002000020020200002000020',
'0222222222222222222222222220',
'0200002020000000000020200020',
'0200002020000000000020200020',
'0222222020022002200020222220',
'0000002000020020200002000000',
'0000002000020020200002000000',
'0000002020000000000020200000',
'0000002020044444400020200000',
'0000002000045555400002000000',
'1111112000044444400002111111',
'0000002000044444400002000000',
'0000002020000000000020200000',
'0000002020000000000020200000',
'0000002020000000000020200000',
'0000002000022002200002000000',
'0222222222222222222222222220',
'0200002000020020200002000020',
'0200002000020020200002000020',
'0322002222222112222222002230',
'0020002020000000000020200200',
'0020002020000000000020200200',
'0222222020022002200020222220',
'0200000000020020200000000020',
'0200000000020020200000000020',
'0222222222222222222222222220',
'0000000000000000000000000000'
];

let maze=[];
function initMaze(){
  maze=[];
  for(let r=0;r<ROWS;r++){
    maze[r]=[];
    for(let c=0;c<COLS;c++){
      maze[r][c]=parseInt(MAZE_STR[r][c]);
    }
  }
}

function isWalkable(r,c){
  if(c<0||c>=COLS){if(r===14)return true;return false;}
  if(r<0||r>=ROWS)return false;
  const v=maze[r][c];
  return v!==0;
}
function isWalkablePlayer(r,c){
  if(c<0||c>=COLS){if(r===14)return true;return false;}
  if(r<0||r>=ROWS)return false;
  const v=maze[r][c];
  return v!==0&&v!==4&&v!==5;
}

const DIR={0:{dx:0,dy:0},1:{dx:-1,dy:0},2:{dx:1,dy:0},3:{dx:0,dy:-1},4:{dx:0,dy:1}};
const NONE=0,LEFT=1,RIGHT=2,UP=3,DOWN=4;
const OPP={0:0,1:2,2:1,3:4,4:3};

const ST_TITLE=0,ST_PLAY=1,ST_DEAD=2,ST_OVER=3,ST_LEVEL=4,ST_READY=5;
let state=ST_TITLE,stateTimer=0;

let pac,ghosts,score,hiScore,lives,level,pelletsLeft;
let modeTimer,modeIdx,frightTimer,wakaCount;
let ghostEatCombo;

const SCATTER_CHASE=[[7,20],[7,20],[5,20],[5,1000]];
hiScore=0;
try{const v=localStorage.getItem('pm3_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('pm3_best',String(hiScore));}catch(e){}}}

function resetPositions(){
  pac={col:14,row:23,px:14*T+T/2,py:23*T+T/2,dir:LEFT,nextDir:LEFT,speed:100+level*5,mouth:0,mouthDir:1,alive:true};
  ghosts=[
    {name:'blinky',col:14,row:11,px:14*T+T/2,py:11*T+T/2,dir:UP,color:'#ff0000',scatter:{c:25,r:0},mode:'scatter',homeR:11,homeC:14,inHouse:false,exitDelay:0},
    {name:'pinky',col:14,row:14,px:14*T+T/2,py:14*T+T/2,dir:DOWN,color:'#ffb8ff',scatter:{c:2,r:0},mode:'scatter',homeR:14,homeC:14,inHouse:true,exitDelay:0},
    {name:'inky',col:12,row:14,px:12*T+T/2,py:14*T+T/2,dir:UP,color:'#00ffff',scatter:{c:27,r:30},mode:'scatter',homeR:14,homeC:12,inHouse:true,exitDelay:3},
    {name:'clyde',col:16,row:14,px:16*T+T/2,py:14*T+T/2,dir:UP,color:'#ffb852',scatter:{c:0,r:30},mode:'scatter',homeR:14,homeC:16,inHouse:true,exitDelay:5}
  ];
  frightTimer=0;modeIdx=0;modeTimer=SCATTER_CHASE[0][0];
  ghostEatCombo=0;
}

function startGame(){
  score=0;lives=3;level=1;initMaze();wakaCount=0;
  pelletsLeft=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(maze[r][c]===2||maze[r][c]===3)pelletsLeft++;}
  resetPositions();
  state=ST_READY;stateTimer=2;
}

function nextLevel(){
  level++;initMaze();
  pelletsLeft=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(maze[r][c]===2||maze[r][c]===3)pelletsLeft++;}
  resetPositions();
  state=ST_READY;stateTimer=2;
}

function killPac(){
  pac.alive=false;sndDie();
  state=ST_DEAD;stateTimer=1.5;
}

function tileCenter(col,row){return{x:col*T+T/2,y:row*T+T/2};}

function ghostTarget(g,idx){
  if(g.mode==='frightened')return{c:Math.floor(Math.random()*COLS),r:Math.floor(Math.random()*ROWS)};
  if(g.mode==='scatter')return g.scatter;
  if(g.mode==='eaten')return{c:14,r:14};
  // Chase
  const pc=pac.col,pr=pac.row,pd=pac.dir;
  const dd=DIR[pd];
  if(idx===0)return{c:pc,r:pr}; // Blinky
  if(idx===1)return{c:pc+dd.dx*4,r:pr+dd.dy*4}; // Pinky
  if(idx===2){ // Inky
    const ax=pc+dd.dx*2,ay=pr+dd.dy*2;
    const bx=ghosts[0].col,by=ghosts[0].row;
    return{c:ax+(ax-bx),r:ay+(ay-by)};
  }
  // Clyde
  const d=Math.hypot(pc-g.col,pr-g.row);
  if(d>8)return{c:pc,r:pr};
  return g.scatter;
}

function chooseDir(g,idx){
  const tc=Math.round((g.px-T/2)/T),tr=Math.round((g.py-T/2)/T);
  const target=ghostTarget(g,idx);
  let best=null,bestDist=Infinity;
  const dirs=[UP,LEFT,DOWN,RIGHT]; // priority order
  for(const d of dirs){
    if(d===OPP[g.dir])continue;
    const dd=DIR[d];
    const nc=tc+dd.dx,nr=tr+dd.dy;
    if(!isWalkable(nr,nc))continue;
    // Ghost house gate: only eaten ghosts or house-exiting ghosts can pass
    if(nr>=12&&nr<=16&&nc>=10&&nc<=17){/* ok for ghosts */}
    const dist=Math.hypot(nc-target.c,nr-target.r);
    if(dist<bestDist){bestDist=dist;best=d;}
  }
  return best||g.dir;
}

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;ia();e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  if(state===ST_TITLE){if(keys['Enter']||keys['Space'])startGame();return;}
  if(state===ST_OVER){if(keys['Enter']||keys['Space']){state=ST_TITLE;}return;}
  if(state===ST_READY){stateTimer-=dt;if(stateTimer<=0)state=ST_PLAY;return;}
  if(state===ST_DEAD){
    stateTimer-=dt;
    if(stateTimer<=0){lives--;if(lives<=0){state=ST_OVER;saveHi();return;}resetPositions();state=ST_READY;stateTimer=1.5;}
    return;
  }
  if(state===ST_LEVEL){stateTimer-=dt;if(stateTimer<=0)nextLevel();return;}

  // Direction input
  if(keys['ArrowLeft']||keys['KeyA'])pac.nextDir=LEFT;
  if(keys['ArrowRight']||keys['KeyD'])pac.nextDir=RIGHT;
  if(keys['ArrowUp']||keys['KeyW'])pac.nextDir=UP;
  if(keys['ArrowDown']||keys['KeyS'])pac.nextDir=DOWN;

  // Mode timer
  if(frightTimer>0){
    frightTimer-=dt;
    if(frightTimer<=0){
      for(const g of ghosts){if(g.mode==='frightened'){g.mode=modeIdx%2===0?'scatter':'chase';}}
    }
  }else{
    modeTimer-=dt;
    if(modeTimer<=0){
      modeIdx++;
      if(modeIdx>=SCATTER_CHASE.length*2)modeIdx=SCATTER_CHASE.length*2-1;
      const phase=Math.floor(modeIdx/2);
      const sub=modeIdx%2;
      modeTimer=SCATTER_CHASE[Math.min(phase,SCATTER_CHASE.length-1)][sub];
      const newMode=sub===0?'scatter':'chase';
      for(const g of ghosts){
        if(g.mode!=='eaten'&&g.mode!=='frightened'&&!g.inHouse){
          g.dir=OPP[g.dir];g.mode=newMode;
        }
      }
    }
  }

  // Move Pac-Man
  if(pac.alive){
    pac.mouth+=pac.mouthDir*dt*15;
    if(pac.mouth>0.35){pac.mouth=0.35;pac.mouthDir=-1;}
    if(pac.mouth<0.02){pac.mouth=0.02;pac.mouthDir=1;}

    const speed=pac.speed;
    const step=speed*dt;

    // Check alignment
    const cx0=pac.col*T+T/2,cy0=pac.row*T+T/2;
    const atCenter=Math.abs(pac.px-cx0)<2&&Math.abs(pac.py-cy0)<2;

    if(atCenter){
      pac.px=cx0;pac.py=cy0;
      // Try queued direction
      const nd=pac.nextDir,ndd=DIR[nd];
      const nc=pac.col+ndd.dx,nr=pac.row+ndd.dy;
      if(isWalkablePlayer(nr,nc)){pac.dir=nd;}
      // Try current direction
      const cd=pac.dir,cdd=DIR[cd];
      const cc=pac.col+cdd.dx,cr=pac.row+cdd.dy;
      if(!isWalkablePlayer(cr,cc)){/* stop */}
      else{
        pac.px+=cdd.dx*step;pac.py+=cdd.dy*step;
      }
    }else{
      const cdd=DIR[pac.dir];
      pac.px+=cdd.dx*step;pac.py+=cdd.dy*step;
    }

    // Snap to grid
    pac.col=Math.round((pac.px-T/2)/T);
    pac.row=Math.round((pac.py-T/2)/T);

    // Tunnel wrap
    if(pac.px<-T/2){pac.px=W+T/2;pac.col=COLS-1;}
    if(pac.px>W+T/2){pac.px=-T/2;pac.col=0;}

    // Eat pellets
    const pr=pac.row,pc=pac.col;
    if(pr>=0&&pr<ROWS&&pc>=0&&pc<COLS){
      if(maze[pr][pc]===2){
        maze[pr][pc]=6;score+=10;saveHi();pelletsLeft--;
        sndWaka(wakaCount++);
      }else if(maze[pr][pc]===3){
        maze[pr][pc]=6;score+=50;saveHi();pelletsLeft--;
        sndPower();frightTimer=6-level*0.5;if(frightTimer<2)frightTimer=2;
        ghostEatCombo=0;
        for(const g of ghosts){
          if(g.mode!=='eaten'&&!g.inHouse){g.mode='frightened';g.dir=OPP[g.dir];}
        }
      }
    }

    if(pelletsLeft<=0){state=ST_LEVEL;stateTimer=2;return;}
  }

  // Move ghosts
  for(let i=0;i<ghosts.length;i++){
    const g=ghosts[i];

    // Exit house
    if(g.inHouse){
      g.exitDelay-=dt;
      if(g.exitDelay<=0){
        // Move to exit
        const tx=14*T+T/2,ty=11*T+T/2;
        const dx=tx-g.px,dy=ty-g.py;
        const d=Math.hypot(dx,dy);
        const sp=80;
        if(d<sp*dt){g.px=tx;g.py=ty;g.col=14;g.row=11;g.inHouse=false;g.dir=LEFT;
          g.mode=modeIdx%2===0?'scatter':'chase';
        }else{
          g.px+=dx/d*sp*dt;g.py+=dy/d*sp*dt;
          g.col=Math.round((g.px-T/2)/T);g.row=Math.round((g.py-T/2)/T);
        }
      }
      continue;
    }

    let speed=90+level*3;
    if(g.mode==='frightened')speed*=0.5;
    if(g.mode==='eaten')speed*=1.8;
    // Tunnel slow
    if(g.row===14&&(g.col<5||g.col>22))speed*=0.6;

    const step=speed*dt;
    const gc=g.col*T+T/2,gr2=g.row*T+T/2;
    const atC=Math.abs(g.px-gc)<2&&Math.abs(g.py-gr2)<2;

    if(atC){
      g.px=gc;g.py=gr2;

      // Eaten reaching house
      if(g.mode==='eaten'&&g.row>=12&&g.row<=15&&g.col>=12&&g.col<=16){
        g.inHouse=true;g.exitDelay=0.5;g.mode='scatter';continue;
      }

      g.dir=chooseDir(g,i);
    }

    const dd=DIR[g.dir];
    g.px+=dd.dx*step;g.py+=dd.dy*step;
    g.col=Math.round((g.px-T/2)/T);
    g.row=Math.round((g.py-T/2)/T);

    // Tunnel wrap
    if(g.px<-T/2){g.px=W+T/2;g.col=COLS-1;}
    if(g.px>W+T/2){g.px=-T/2;g.col=0;}

    // Collision with pac
    if(pac.alive){
      const d=Math.hypot(pac.px-g.px,pac.py-g.py);
      if(d<14){
        if(g.mode==='frightened'){
          g.mode='eaten';ghostEatCombo++;
          const pts=[200,400,800,1600];
          score+=pts[Math.min(ghostEatCombo-1,3)];saveHi();sndEatGhost();
        }else if(g.mode!=='eaten'){
          killPac();return;
        }
      }
    }
  }
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#ff0';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('PAC-MAN',W/2,250);
    cx.fillStyle='#fff';cx.font='16px monospace';
    cx.fillText('Arrow keys to move. Eat all dots!',W/2,320);
    cx.fillText('Power pellets let you eat ghosts!',W/2,350);
    cx.font='20px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter / Space',W/2,430);
    if(hiScore>0){cx.fillStyle='#666';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,490);}
    return;
  }

  // Draw maze
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const v=maze[r][c];
      const x=c*T,y=r*T;
      if(v===0){
        // Wall - check neighbors to draw lines
        cx.fillStyle='#1919a6';
        // Simple: fill wall cells
        let adj=false;
        for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&maze[nr][nc]!==0)adj=true;
        }
        if(adj){
          cx.fillStyle='#1919a6';
          cx.fillRect(x+2,y+2,T-4,T-4);
          cx.fillStyle='#000';cx.fillRect(x+4,y+4,T-8,T-8);
        }else{
          cx.fillStyle='#0d0d5e';cx.fillRect(x,y,T,T);
        }
      }else if(v===2){
        cx.fillStyle='#ffb8ae';
        cx.beginPath();cx.arc(x+T/2,y+T/2,2.5,0,Math.PI*2);cx.fill();
      }else if(v===3){
        const pulse=0.6+0.4*Math.sin(Date.now()*0.008);
        cx.fillStyle=`rgba(255,184,174,${pulse})`;
        cx.beginPath();cx.arc(x+T/2,y+T/2,6,0,Math.PI*2);cx.fill();
      }else if(v===5){
        cx.fillStyle='#ffaacc';cx.fillRect(x,y+T/2-2,T,4);
      }
    }
  }

  // Pac-Man
  if(pac.alive||(state===ST_DEAD&&stateTimer>0.5)){
    const da=state===ST_DEAD?Math.max(0.02,(stateTimer-0.5)/1*0.35):pac.mouth;
    const angles={1:Math.PI,2:0,3:-Math.PI/2,4:Math.PI/2,0:0};
    const base=angles[pac.dir]||0;
    cx.fillStyle='#ffff00';cx.beginPath();
    cx.arc(pac.px,pac.py,T/2-2,base+da*Math.PI,base+(2-da)*Math.PI);
    cx.lineTo(pac.px,pac.py);cx.closePath();cx.fill();
  }

  // Ghosts
  for(const g of ghosts){
    if(g.mode==='eaten'){
      // Eyes only
      drawEyes(g.px,g.py,g.dir);
      continue;
    }
    let color=g.color;
    if(g.mode==='frightened'){
      color=(frightTimer<2&&Math.floor(frightTimer*6)%2)?'#fff':'#2121de';
    }
    // Body
    cx.fillStyle=color;
    cx.beginPath();
    cx.arc(g.px,g.py-2,T/2-2,Math.PI,0);
    cx.lineTo(g.px+T/2-2,g.py+T/2-3);
    // Wavy bottom
    const w=T/2-2,n=3,sw=w*2/n;
    for(let i=0;i<n;i++){
      const bx=g.px-w+i*sw;
      const wave=Math.sin(Date.now()*0.008+i)*2;
      cx.lineTo(bx+sw/2,g.py+T/2-5+wave);
      cx.lineTo(bx+sw,g.py+T/2-3);
    }
    cx.lineTo(g.px-w,g.py+T/2-3);
    cx.closePath();cx.fill();
    // Eyes
    if(g.mode!=='frightened')drawEyes(g.px,g.py-2,g.dir);
    else{
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(g.px-4,g.py-4,2.5,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(g.px+4,g.py-4,2.5,0,Math.PI*2);cx.fill();
    }
  }

  // HUD
  const hudY=ROWS*T+5;
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('SCORE: '+score,10,hudY+18);
  cx.textAlign='center';cx.fillText('LEVEL '+level,W/2,hudY+18);
  cx.textAlign='right';cx.fillText('BEST: '+hiScore,W-10,hudY+18);
  // Lives
  for(let i=0;i<lives;i++){
    cx.fillStyle='#ff0';cx.beginPath();
    cx.arc(20+i*25,hudY+42,8,0.2*Math.PI,1.8*Math.PI);
    cx.lineTo(20+i*25,hudY+42);cx.closePath();cx.fill();
  }

  // Overlays
  if(state===ST_READY){
    cx.fillStyle='#ff0';cx.font='bold 24px monospace';cx.textAlign='center';
    cx.fillText('READY!',W/2,ROWS*T/2+20);
  }
  if(state===ST_LEVEL){
    cx.fillStyle='#0ff';cx.font='bold 28px monospace';cx.textAlign='center';
    cx.fillText('LEVEL COMPLETE!',W/2,ROWS*T/2);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,ROWS*T/2-20);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,ROWS*T/2+20);
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter',W/2,ROWS*T/2+60);
  }
}

function drawEyes(ex,ey,dir){
  const dd=DIR[dir]||DIR[0];
  cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(ex-4,ey-2,3.5,4.5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(ex+4,ey-2,3.5,4.5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#00f';
  cx.beginPath();cx.arc(ex-4+dd.dx*2,ey-2+dd.dy*2,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+4+dd.dx*2,ey-2+dd.dy*2,2,0,Math.PI*2);cx.fill();
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
