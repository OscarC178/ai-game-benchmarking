<!--
  GAME:      Frogger
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="600" height="650"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const DT_CAP = 0.05;
  const ROW_H = 40;
  const HUD_H = 50;
  const PLAY_Y = HUD_H;
  const TOTAL_ROWS = 13;
  const PLAY_H = TOTAL_ROWS * ROW_H;
  const FROG_SIZE = 30;
  const START_TIME = 35;

  const STATES = {
    START: 'start',
    PLAY: 'play',
    DEAD: 'dead',
    GAME_OVER: 'game_over'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.START;
  let lastTime = 0;
  let score = 0;
  let lives = 3;
  let level = 1;
  let timeLeft = START_TIME;
  let deathTimer = 0;
  let highScore = loadHighScore();
  let timeTickCooldown = 0;
  let vehicles = [];
  let riverObjects = [];
  let homes = [];
  let particles = [];
  let audioCtx = null;

  const frog = {
    x: 0,
    y: 0,
    row: 12,
    facing: 'up',
    riding: null,
    maxRowReached: 12,
    deathKind: 'splash'
  };

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('frogger_best_r3_gemini_pro') || '0', 10) || 0; } catch { return 0; }
  }
  function saveHighScore() {
    try { localStorage.setItem('frogger_best_r3_gemini_pro', String(highScore)); } catch {}
  }
  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        try { audioCtx = new AC(); } catch {}
      }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  }

  function tone(freq, duration, type = 'square', volume = 0.03, endFreq = null, delay = 0) {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (endFreq !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + duration);
      gain.gain.setValueAtTime(volume, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration);
    } catch {}
  }

  function noiseBurst(duration = 0.18, volume = 0.045) {
    if (!audioCtx) return;
    try {
      const length = Math.floor(audioCtx.sampleRate * duration);
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      source.buffer = buffer;
      gain.gain.value = volume;
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    } catch {}
  }

  function soundHop() { tone(420, 0.08, 'triangle', 0.03, 620); }
  function soundDeath() { tone(320, 0.12, 'sawtooth', 0.04, 100); noiseBurst(0.18, 0.04); }
  function soundHome() { tone(700, 0.08, 'triangle', 0.03); tone(980, 0.12, 'triangle', 0.03, null, 0.08); }
  function soundTick() { tone(1400, 0.03, 'square', 0.02); }

  function rowY(row) { return PLAY_Y + row * ROW_H; }
  function frogStartX() { return W / 2; }
  function frogStartY() { return rowY(12) + ROW_H / 2; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function justPressed(code) { return !!keys[code] && !prevKeys[code]; }

  function resetFrog() {
    frog.x = frogStartX();
    frog.y = frogStartY();
    frog.row = 12;
    frog.facing = 'up';
    frog.riding = null;
    frog.maxRowReached = 12;
  }

  function makeVehicle(row, x, w, speed, dir, color, type) {
    return { kind: 'vehicle', row, x, y: rowY(row) + 4, w, h: 32, speed, dir, color, type };
  }

  function makeRiver(row, x, w, speed, dir, type, diving = false) {
    return {
      kind: 'river', row, x, y: rowY(row) + 6, w, h: 28, speed, dir, type,
      diving,
      divePhase: Math.random() * Math.PI * 2,
      submerged: false,
      state: 'surface'
    };
  }

  function buildHomes() {
    homes = [];
    const slots = [60, 180, 300, 420, 540];
    for (const x of slots) homes.push({ x, y: rowY(0) + ROW_H / 2, filled: false });
  }

  function buildLevel() {
    vehicles = [];
    riverObjects = [];
    buildHomes();

    const speedMul = 1 + (level - 1) * 0.12;
    const riverMul = 1 + (level - 1) * 0.09;

    vehicles.push(makeVehicle(11, 40, 58, 90 * speedMul, 1, '#ffee55', 'car'));
    vehicles.push(makeVehicle(11, 260, 58, 90 * speedMul, 1, '#ffee55', 'car'));
    vehicles.push(makeVehicle(11, 480, 58, 90 * speedMul, 1, '#ffee55', 'car'));

    vehicles.push(makeVehicle(10, 560, 92, 130 * speedMul, -1, '#ff4444', 'truck'));
    vehicles.push(makeVehicle(10, 300, 92, 130 * speedMul, -1, '#ff4444', 'truck'));
    vehicles.push(makeVehicle(10, 40, 92, 130 * speedMul, -1, '#ff4444', 'truck'));

    vehicles.push(makeVehicle(9, 20, 50, 170 * speedMul, 1, '#ffffff', 'racer'));
    vehicles.push(makeVehicle(9, 180, 50, 170 * speedMul, 1, '#ffffff', 'racer'));
    vehicles.push(makeVehicle(9, 340, 50, 170 * speedMul, 1, '#ffffff', 'racer'));
    vehicles.push(makeVehicle(9, 500, 50, 170 * speedMul, 1, '#ffffff', 'racer'));

    vehicles.push(makeVehicle(8, 560, 64, 150 * speedMul, -1, '#aa44ff', 'bulldozer'));
    vehicles.push(makeVehicle(8, 360, 64, 150 * speedMul, -1, '#aa44ff', 'bulldozer'));
    vehicles.push(makeVehicle(8, 160, 64, 150 * speedMul, -1, '#aa44ff', 'bulldozer'));

    vehicles.push(makeVehicle(7, 30, 110, 110 * speedMul, 1, '#ff8844', 'truck'));
    vehicles.push(makeVehicle(7, 280, 110, 110 * speedMul, 1, '#ff8844', 'truck'));
    vehicles.push(makeVehicle(7, 530, 110, 110 * speedMul, 1, '#ff8844', 'truck'));

    riverObjects.push(makeRiver(1, 40, 120, 80 * riverMul, 1, 'log'));
    riverObjects.push(makeRiver(1, 260, 120, 80 * riverMul, 1, 'log'));
    riverObjects.push(makeRiver(1, 480, 120, 80 * riverMul, 1, 'log'));

    riverObjects.push(makeRiver(2, 580, 90, 120 * riverMul, -1, 'turtles', level > 1));
    riverObjects.push(makeRiver(2, 340, 90, 120 * riverMul, -1, 'turtles', level > 1));
    riverObjects.push(makeRiver(2, 100, 90, 120 * riverMul, -1, 'turtles', level > 1));

    riverObjects.push(makeRiver(3, 20, Math.max(140, 180 - level * 8), 95 * riverMul, 1, 'log'));
    riverObjects.push(makeRiver(3, 260, Math.max(140, 180 - level * 8), 95 * riverMul, 1, 'log'));
    riverObjects.push(makeRiver(3, 500, Math.max(140, 180 - level * 8), 95 * riverMul, 1, 'log'));

    riverObjects.push(makeRiver(4, 580, 130, 145 * riverMul, -1, 'log'));
    riverObjects.push(makeRiver(4, 300, 130, 145 * riverMul, -1, 'log'));
    riverObjects.push(makeRiver(4, 20, 130, 145 * riverMul, -1, 'log'));

    riverObjects.push(makeRiver(5, 40, 90, 105 * riverMul, 1, 'turtles', true));
    riverObjects.push(makeRiver(5, 240, 90, 105 * riverMul, 1, 'turtles', true));
    riverObjects.push(makeRiver(5, 440, 90, 105 * riverMul, 1, 'turtles', true));

    resetFrog();
    timeLeft = START_TIME;
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    buildLevel();
    state = STATES.PLAY;
  }

  function advanceLevel() {
    score += 1000;
    updateHighScore();
    level += 1;
    buildLevel();
  }

  function updateObjects(list, dt) {
    for (const o of list) {
      o.x += o.speed * o.dir * dt;
      if (o.dir > 0 && o.x > W + o.w + 30) o.x = -o.w - 30;
      else if (o.dir < 0 && o.x + o.w < -30) o.x = W + 30;

      if (o.kind === 'river' && o.diving) {
        o.divePhase += dt * (1.5 + level * 0.08);
        const s = Math.sin(o.divePhase);
        if (s > 0.35) o.state = 'surface';
        else if (s > -0.3) o.state = 'submerging';
        else o.state = 'submerged';
        o.submerged = o.state === 'submerged';
      }
    }
  }

  function frogBox() {
    return { x: frog.x - 12, y: frog.y - 12, w: 24, h: 24 };
  }

  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function killFrog(kind) {
    if (state !== STATES.PLAY) return;
    frog.deathKind = kind;
    lives -= 1;
    deathTimer = 1.0;
    createDeathParticles();
    ensureAudio();
    soundDeath();
    state = STATES.DEAD;
    updateHighScore();
  }

  function createDeathParticles() {
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 40 + Math.random() * 90;
      particles.push({ x: frog.x, y: frog.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.8 });
    }
  }

  function handleHomeRow() {
    if (frog.row !== 0) return;
    for (const home of homes) {
      if (Math.abs(frog.x - home.x) < 22) {
        if (home.filled) {
          killFrog('home');
          return;
        }
        home.filled = true;
        score += 50 + Math.floor(timeLeft * 5);
        updateHighScore();
        ensureAudio();
        soundHome();
        if (homes.every(h => h.filled)) advanceLevel();
        else resetFrog();
        return;
      }
    }
    killFrog('bank');
  }

  function hop(dx, dy, facing) {
    if (state !== STATES.PLAY) return;
    frog.x = clamp(frog.x + dx * 40, 20, W - 20);
    const newRow = clamp(frog.row + dy, 0, 12);
    if (newRow !== frog.row) frog.y = rowY(newRow) + ROW_H / 2;
    frog.row = newRow;
    frog.facing = facing;
    frog.riding = null;
    ensureAudio();
    soundHop();

    if (frog.row < frog.maxRowReached) {
      frog.maxRowReached = frog.row;
      score += 10;
      updateHighScore();
    }

    if (frog.row === 0) handleHomeRow();
  }

  function updateFrogRide(dt) {
    frog.riding = null;
    if (frog.row >= 1 && frog.row <= 5) {
      const box = frogBox();
      for (const obj of riverObjects) {
        if (obj.row !== frog.row) continue;
        if (obj.type === 'turtles' && obj.submerged) continue;
        const hit = { x: obj.x, y: obj.y, w: obj.w, h: obj.h };
        if (aabb(box, hit)) {
          frog.riding = obj;
          break;
        }
      }
      if (frog.riding) {
        frog.x += frog.riding.speed * frog.riding.dir * dt;
        if (frog.x < -15 || frog.x > W + 15) {
          killFrog('ride-off');
          return;
        }
        if (frog.riding.type === 'turtles' && frog.riding.submerged) killFrog('drown');
      } else killFrog('drown');
    }
  }

  function checkRoadCollisions() {
    if (frog.row < 7 || frog.row > 11) return;
    const box = frogBox();
    for (const v of vehicles) {
      if (v.row !== frog.row) continue;
      const hit = { x: v.x + 3, y: v.y + 4, w: v.w - 6, h: v.h - 8 };
      if (aabb(box, hit)) {
        killFrog('road');
        return;
      }
    }
  }

  function updateTimer(dt) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      killFrog('time');
      return;
    }
    if (timeLeft <= 5) {
      timeTickCooldown -= dt;
      if (timeTickCooldown <= 0) {
        ensureAudio();
        soundTick();
        timeTickCooldown = 0.35;
      }
    } else timeTickCooldown = 0;
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt) {
    updateParticles(dt);

    if (state === STATES.START || state === STATES.GAME_OVER) return;

    if (state === STATES.DEAD) {
      deathTimer -= dt;
      updateObjects(vehicles, dt);
      updateObjects(riverObjects, dt);
      if (deathTimer <= 0) {
        if (lives <= 0) state = STATES.GAME_OVER;
        else {
          resetFrog();
          timeLeft = START_TIME;
          state = STATES.PLAY;
        }
      }
      return;
    }

    updateObjects(vehicles, dt);
    updateObjects(riverObjects, dt);
    updateTimer(dt);
    if (state !== STATES.PLAY) return;
    updateFrogRide(dt);
    if (state !== STATES.PLAY) return;
    checkRoadCollisions();
  }

  function drawBackground() {
    ctx.fillStyle = '#001133';
    ctx.fillRect(0, PLAY_Y, W, PLAY_H);

    ctx.fillStyle = '#0d4d0d';
    ctx.fillRect(0, rowY(0), W, ROW_H);
    ctx.fillRect(0, rowY(6), W, ROW_H);
    ctx.fillStyle = '#220022';
    ctx.fillRect(0, rowY(12), W, ROW_H);

    ctx.fillStyle = '#0000aa';
    ctx.fillRect(0, rowY(1), W, ROW_H * 5);

    ctx.fillStyle = '#222222';
    ctx.fillRect(0, rowY(7), W, ROW_H * 5);

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    for (let i = 0; i <= TOTAL_ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, PLAY_Y + i * ROW_H + 0.5);
      ctx.lineTo(W, PLAY_Y + i * ROW_H + 0.5);
      ctx.stroke();
    }

    for (const home of homes) {
      ctx.fillStyle = '#001133';
      ctx.fillRect(home.x - 28, rowY(0) + 4, 56, 32);
      ctx.strokeStyle = '#00aa00';
      ctx.strokeRect(home.x - 28, rowY(0) + 4, 56, 32);
    }
  }

  function drawVehicle(v) {
    ctx.fillStyle = v.color;
    ctx.fillRect(v.x, v.y + 6, v.w, v.h - 10);
    ctx.fillStyle = '#111';
    ctx.fillRect(v.x + 8, v.y + 2, v.w - 16, 8);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(v.x + 12, v.y + v.h - 2, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(v.x + v.w - 12, v.y + v.h - 2, 5, 0, Math.PI * 2); ctx.fill();
  }

  function drawRiverObject(o) {
    if (o.type === 'log') {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(o.x, o.y + 4, o.w, 20);
      ctx.fillStyle = '#a5622f';
      ctx.fillRect(o.x + 6, o.y + 8, o.w - 12, 4);
    } else {
      const turtleCount = o.w >= 90 ? 3 : 2;
      const spacing = o.w / turtleCount;
      for (let i = 0; i < turtleCount; i++) {
        const tx = o.x + i * spacing + spacing / 2;
        if (o.state === 'submerged') continue;
        ctx.fillStyle = o.state === 'submerging' ? '#aa3355' : '#ff4444';
        ctx.beginPath();
        ctx.arc(tx, o.y + 14, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff99aa';
        ctx.beginPath();
        ctx.arc(tx - 5, o.y + 8, 4, 0, Math.PI * 2);
        ctx.arc(tx + 5, o.y + 8, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawFrog(x, y, facing, permanent = false) {
    ctx.save();
    ctx.translate(x, y);
    let rot = 0;
    if (facing === 'left') rot = -Math.PI / 2;
    else if (facing === 'right') rot = Math.PI / 2;
    else if (facing === 'down') rot = Math.PI;
    ctx.rotate(rot);
    ctx.fillStyle = permanent ? '#55ff55' : '#00ff00';
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-8, -9, 5, 0, Math.PI * 2);
    ctx.arc(8, -9, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-7, -10, 1.5, 0, Math.PI * 2);
    ctx.arc(7, -10, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHomes() {
    for (const home of homes) {
      if (home.filled) drawFrog(home.x, home.y + 2, 'up', true);
    }
  }

  function drawParticles() {
    ctx.fillStyle = '#ffffff';
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.font = '20px monospace';
    ctx.fillText(`SCORE ${score}`, 12, 10);
    ctx.textAlign = 'center';
    ctx.fillText(`HIGH ${highScore}`, W / 2, 10);
    ctx.textAlign = 'right';
    ctx.fillText(`LIVES ${lives}`, W - 12, 10);

    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffff00';
    ctx.fillText(`LEVEL ${level}`, 12, 28);

    const barW = 180;
    const ratio = timeLeft / START_TIME;
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(W - 220, 24, barW, 16);
    ctx.fillStyle = ratio > 0.25 ? '#00ff00' : '#ff3333';
    ctx.fillRect(W - 220 + 2, 26, (barW - 4) * ratio, 12);
  }

  function drawOverlay(title, subtitle) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 44px monospace';
    ctx.fillText(title, W / 2, H / 2 - 30);
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px monospace';
    ctx.fillText(subtitle, W / 2, H / 2 + 20);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    for (const o of riverObjects) drawRiverObject(o);
    for (const v of vehicles) drawVehicle(v);
    drawHomes();
    if (state !== STATES.DEAD || deathTimer > 0.5) drawFrog(frog.x, frog.y, frog.facing, false);
    drawParticles();
    drawHUD();

    if (state === STATES.START) {
      drawOverlay('FROGGER', 'Press Enter or Space to Start');
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', 'Press Enter or Space to Restart');
    } else if (state === STATES.DEAD) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.font = '22px monospace';
      ctx.fillText(frog.deathKind.toUpperCase(), W / 2, H / 2 + 80);
    }
  }

  function handleInput() {
    if (justPressed('Enter') || justPressed('Space')) {
      ensureAudio();
      if (state === STATES.START || state === STATES.GAME_OVER) {
        startGame();
        return;
      }
    }
    if (state !== STATES.PLAY) return;

    if (justPressed('ArrowUp')) hop(0, -1, 'up');
    else if (justPressed('ArrowDown')) hop(0, 1, 'down');
    else if (justPressed('ArrowLeft')) hop(-1, 0, 'left');
    else if (justPressed('ArrowRight')) hop(1, 0, 'right');
  }

  function syncPrev() {
    const watched = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Space'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Space'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
    if (handled.includes(e.code)) ensureAudio();
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
  });

  buildHomes();
  resetFrog();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
