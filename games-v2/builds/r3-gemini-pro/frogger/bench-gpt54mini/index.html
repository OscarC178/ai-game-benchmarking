<!--
  GAME:      Frogger
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Frogger - Mini</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:600px;height:650px;position:relative}
  canvas{display:block;background:#0b0b1a}
  #hud{position:absolute;left:8px;top:4px;color:#fff;font-family:monospace;font-size:14px}
  #hud .right{position:absolute;right:8px;top:4px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;text-align:center;white-space:pre-wrap}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="650"></canvas>
  <div id="hud"><div id="score">SCORE: 0</div><div id="meta" class="right">HI: 0  LIVES: 3  LV:1</div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); const W=canvas.width, H=canvas.height;
  const overlay=document.getElementById('overlay'), scoreEl=document.getElementById('score'), metaEl=document.getElementById('meta');
  // grid
  const ROW_H = 40; const ROWS = 13; const GRID_W = 12; const CELL_W = Math.floor(W/GRID_W);
  // rows mapping
  const HUD_ROW=0; const HOME_ROW=1; const RIVER_ROWS=[2,3,4,5,6]; const SAFE_ROW=7; const ROAD_ROWS=[8,9,10,11,12]; const START_ROW=12;

  // state
  let state='title'; let score=0,high=0,lives=3,level=1; try{ const h=localStorage.getItem('frogger_high'); if(h) high=parseInt(h,10)||0; }catch(e){high=0}

  // timer
  let timeLeft=40; const TIME_PER=40;

  // frog
  const frogSz=30; let frog={col:Math.floor(GRID_W/2),row:START_ROW,x:0,y:0,alive:true,hopLock:0,furthest:0};

  // homes
  const HOME_SLOTS=5; const homes=new Array(HOME_SLOTS).fill(false);

  // lanes
  const roadLanes=[]; const riverLanes=[];

  // particles
  const parts=[];

  // input
  const keys={}; window.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=true; if(e.key==='ArrowRight'||e.key==='d') keys.right=true; if(e.key==='ArrowUp'||e.key==='w') keys.up=true; if(e.key==='ArrowDown'||e.key==='s') keys.down=true; if(e.key==='Enter'||e.key===' ') { if(state==='title'||state==='gameover') startGame(); } if(e.key==='p'||e.key==='P') togglePause(); });
  window.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=false; if(e.key==='ArrowRight'||e.key==='d') keys.right=false; if(e.key==='ArrowUp'||e.key==='w') keys.up=false; if(e.key==='ArrowDown'||e.key==='s') keys.down=false; });

  // audio
  let audioCtx=null,aok=false; function ensureAudio(){ if(aok) return; try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); aok=true;}catch(e){aok=false;} }
  window.addEventListener('pointerdown',()=>ensureAudio(),{once:true});
  function playTone(freq,dur=0.06,type='sine'){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }

  // helpers
  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function colToX(col){ return Math.floor(col*CELL_W + CELL_W/2); }
  function rowToY(row){ const topOffset=20; return topOffset + (row-1)*ROW_H + ROW_H/2; }
  function aabb(ax,ay,aw,ah,bx,by,bw,bh){ return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 && ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2; }

  // spawn lanes
  function spawnRoad(){ roadLanes.length=0; const speeds=[120,90,160,110,140]; for(let i=0;i<ROAD_ROWS.length;i++){ const row=ROAD_ROWS[i]; const dir = (i%2===0)?1:-1; const speed = speeds[i]*(1+(level-1)*0.06); const list=[]; let x=rand(0,W); const spacing = 180 - i*10; while(x < W+400){ const type = Math.random()<0.18?'truck':'car'; const w = (type==='truck')?90:50; list.push({x:x,y:rowToY(row),w:w,h:34,vx:dir*speed,color: type==='truck'? '#cc3333':'#ffd24d'}); x += spacing + rand(-40,40); } roadLanes.push({row,dir,speed,list}); } }
  function spawnRiver(){ riverLanes.length=0; const speeds=[80,140,90,130,100]; for(let i=0;i<RIVER_ROWS.length;i++){ const row=RIVER_ROWS[i]; const dir=(i%2? -1:1); const speed=speeds[i]*(1+(level-1)*0.05); const plats=[]; let x=rand(0,W); while(x < W+400){ const t=rand(0,1); if(t<0.2){ plats.push({x:x,y:rowToY(row),w:160,h:34,vx:dir*speed,type:'log',color:'#7a4f28'}); x+=220+rand(-40,40);} else if(t<0.6){ plats.push({x:x,y:rowToY(row),w:110,h:34,vx:dir*speed,type:'log',color:'#bf7f3f'}); x+=160+rand(-30,30);} else { plats.push({x:x,y:rowToY(row),w:80,h:34,vx:dir*speed,type:'turtle',color:'#2ea86e',diveState:0,diveT:rand(2,6)}); x+=130+rand(-20,20);} } riverLanes.push({row,dir,speed,plats}); } }

  // init level
  function setupLevel(){ spawnRoad(); spawnRiver(); for(let i=0;i<homes.length;i++) homes[i]=false; frog.col=Math.floor(GRID_W/2); frog.row=START_ROW; frog.alive=true; frog.hopLock=0; frog.furthest=0; timeLeft = TIME_PER; }

  // input hop
  function handleInput(dt){ if(frog.hopLock>0) frog.hopLock = Math.max(0, frog.hopLock - dt); if(frog.hopLock>0) return; if(keys.up){ hop(0,-1); frog.hopLock=0.12; } else if(keys.down){ hop(0,1); frog.hopLock=0.12; } else if(keys.left){ hop(-1,0); frog.hopLock=0.12; } else if(keys.right){ hop(1,0); frog.hopLock=0.12; } }
  function hop(dx,dy){ if(state!=='playing') return; const nc=frog.col+dx, nr=frog.row+dy; if(nc<0||nc>=GRID_W) return; if(nr<1) return; // above home handled
    if(nr>frog.furthest) { score += 10; frog.furthest = nr; }
    frog.col=nc; frog.row=nr; playTone(900,0.06); }
  function playTone(freq,dur){ playToneInner(freq,dur); }
  function playToneInner(f,d){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='square'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d+0.02); }

  // main loop
  let last=performance.now(); function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; if(state==='paused' || state==='title' || state==='gameover'){ render(); requestAnimationFrame(loop); return; }
    handleInput(dt);
    // move vehicles
    for(const lane of roadLanes){ for(const v of lane.list){ v.x += v.vx*dt; if(v.vx>0 && v.x - v.w/2 > W + 80) v.x = -v.w/2 - rand(20,120); if(v.vx<0 && v.x + v.w/2 < -80) v.x = W + v.w/2 + rand(20,120); } }
    // move platforms
    for(const rl of riverLanes){ for(const p of rl.plats){ p.x += p.vx*dt; if(p.vx>0 && p.x - p.w/2 > W + 160) p.x = -p.w/2 - rand(60,200); if(p.vx<0 && p.x + p.w/2 < -160) p.x = W + p.w/2 + rand(60,200); if(p.type==='turtle'){ p.diveT -= dt; if(p.diveT<=0){ p.diveT = rand(3,6); p.diveState = (p.diveState+1)%4; } } } }
    // frog position
    frog.x = colToX(frog.col); frog.y = rowToY(frog.row);
    // if frog in road check collision
    if(ROAD_ROWS.includes(frog.row)){ const lane = roadLanes.find(l=>l.row===frog.row); if(lane){ for(const v of lane.list){ if(aabb(frog.x,frog.y,frogSz,frogSz,v.x,v.y,v.w,v.h)){ die('hit'); break; } } } }
    // river logic
    let onPlat=null;
    if(RIVER_ROWS.includes(frog.row)){ const rl = riverLanes.find(r=>r.row===frog.row); if(rl){ for(const p of rl.plats){ if(Math.abs(frog.x - p.x) < p.w/2 + frogSz/4 && Math.abs(frog.y - p.y) < p.h/2 + frogSz/4){ // check turtle submerged
                if(p.type==='turtle' && (p.diveState===2 || p.diveState===3)){ die('drown'); onPlat=null; break; } onPlat = p; break; } } } if(!onPlat){ die('drown'); } else { // carry frog
        frog.x = onPlat.x; // pixel carry
        // if carried off screen
        if(frog.x < -20 || frog.x > W+20) die('off'); } }
    // home row
    if(frog.row===HOME_ROW){ // determine slot
      const margin=40; const available=W - margin*2; const slotW = available/HOME_SLOTS; const idx = Math.floor((frog.x - margin)/slotW); if(idx>=0 && idx<HOME_SLOTS && !homes[idx]){ homes[idx]=true; score += 50 + Math.floor(timeLeft*2); sfxHome(); resetFrog(); checkClear(); } else { die('invalid'); } }
    // timer
    timeLeft -= dt; if(timeLeft<=0) die('time');
    // particles
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; p.vx *= 0.995; p.vy *= 0.995; if(p.life<=0) parts.splice(i,1); }
    scoreEl.textContent='SCORE: '+score; metaEl.textContent='HI: '+high+'  LIVES: '+lives+'  LV:'+level;
    requestAnimationFrame(loop); render(); }

  function die(kind){ if(state!=='playing') return; frog.alive=false; playToneDeath(); spawnParticles(frog.x,frog.y,'#fff',18); lives--; if(lives<=0){ state='gameover'; overlay.textContent='GAME OVER\nPress Enter to Restart'; if(score>high){ high=score; try{ localStorage.setItem('frogger_high',String(high)); }catch(e){} } } else { state='respawn'; setTimeout(()=>{ resetFrog(); state='playing'; },800); } }
  function spawnParticles(x,y,col,n=12){ for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2), s=rand(60,220); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.4,1.0),col}); } }
  function playToneDeath(){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.value=200; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.01,audioCtx.currentTime); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.6); o.stop(audioCtx.currentTime+0.62); }
  function sfxHome(){ playToneInner(1200,0.08); }
  function playToneInner(f,d){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d+0.02); }

  function resetFrog(){ frog.col=Math.floor(GRID_W/2); frog.row=START_ROW; frog.alive=true; frog.hopLock=0; frog.furthest=0; timeLeft=TIME_PER; frog.x=colToX(frog.col); frog.y=rowToY(frog.row); }
  function checkClear(){ if(homes.every(h=>h)){ score += 1000; level++; state='levelClear'; overlay.textContent='LEVEL '+level; setTimeout(()=>{ for(let i=0;i<homes.length;i++) homes[i]=false; setupLevel(); state='playing'; overlay.textContent=''; },1200); } }

  function setupLevel(){ spawnRoad(); spawnRiver(); for(let i=0;i<homes.length;i++) homes[i]=false; resetFrog(); }
  function startGame(){ score=0; lives=3; level=1; setupLevel(); state='playing'; overlay.textContent=''; }
  function togglePause(){ if(state==='playing'){ state='paused'; overlay.textContent='PAUSED'; } else if(state==='paused'){ state='playing'; overlay.textContent=''; } }

  // render
  function render(){ ctx.clearRect(0,0,W,H);
    // HUD top bar
    ctx.fillStyle='#002200'; ctx.fillRect(0,0,W,ROW_H);
    ctx.fillStyle='#003366'; ctx.fillRect(0,ROW_H, W, ROW_H*5); // river
    ctx.fillStyle='#114411'; ctx.fillRect(0, ROW_H*6, W, ROW_H); // safe strip
    ctx.fillStyle='#333333'; ctx.fillRect(0, ROW_H*7, W, ROW_H*5); // road

    // home slots
    const margin=30; const avail=W - margin*2; const slotW = avail / HOME_SLOTS; for(let i=0;i<HOME_SLOTS;i++){ const bx = margin + i*slotW + slotW/2; ctx.strokeStyle='#66ff66'; ctx.lineWidth=2; ctx.beginPath(); ctx.rect(bx - slotW/2 + 6, 8, slotW - 12, ROW_H - 12); ctx.stroke(); if(homes[i]){ ctx.fillStyle='#66ff66'; ctx.beginPath(); ctx.arc(bx, ROW_H/2, 10,0,Math.PI*2); ctx.fill(); } }

    // draw road vehicles
    for(const lane of roadLanes){ for(const v of lane.list){ ctx.fillStyle=v.color; ctx.fillRect(v.x - v.w/2, v.y - v.h/2, v.w, v.h); ctx.strokeStyle='#000'; ctx.strokeRect(v.x - v.w/2, v.y - v.h/2, v.w, v.h); } }
    // draw river platforms
    for(const rl of riverLanes){ for(const p of rl.plats){ if(p.type==='log'){ ctx.fillStyle=p.color; ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); ctx.strokeStyle='#3b220f'; ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); } else { // turtle
          if(p.diveState===0) ctx.fillStyle=p.color; else if(p.diveState===1) ctx.fillStyle='#2e8b57'; else ctx.fillStyle='rgba(46,139,87,0.25)'; ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); ctx.strokeStyle='#0b3b2a'; ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); } } }

    // frog
    if(frog.alive){ ctx.save(); ctx.translate(frog.x||colToX(frog.col), frog.y||rowToY(frog.row)); ctx.fillStyle='#00ff00'; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(12,8); ctx.lineTo(6,6); ctx.lineTo(0,2); ctx.lineTo(-6,6); ctx.lineTo(-12,8); ctx.closePath(); ctx.fill(); ctx.restore(); }

    // particles
    for(const p of parts){ ctx.fillStyle=p.col; ctx.fillRect(p.x,p.y,2,2); }

    // timer bar
    const barW=220; const bx=W/2 - barW/2; ctx.strokeStyle='#fff'; ctx.strokeRect(bx, H-28, barW, 12); ctx.fillStyle='#88ff88'; ctx.fillRect(bx, H-28, Math.max(0, barW * (timeLeft/TIME_PER)), 12);

    // overlay text
    if(state==='title'){ overlay.style.display='flex'; overlay.textContent='FROGGER-LITE\n\nCross the road, ride logs to the homes at top.\nArrow keys/WASD to hop. Press Enter to start.'; } else if(state==='paused'){ overlay.style.display='flex'; overlay.textContent='PAUSED'; } else if(state==='gameover'){ overlay.style.display='flex'; } else { overlay.style.display='none'; }
  }

  // start
  function init(){ overlay.textContent='FROGGER-LITE\n\nPress Enter to Start'; setupLevel(); requestAnimationFrame(loop); }
  init();
})();
</script>
</body>
</html>
