<!--
  GAME:      Frogger
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
    canvas { background: #000; display: block; border: 2px solid #333; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="froggerCanvas" width="600" height="650"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('froggerCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 600, HEIGHT = 650;
    const LANE_HEIGHT = 50;

    const STATES = { START: 0, PLAYING: 1, DEAD: 2, GAME_OVER: 3 };
    let gameState = STATES.START;
    let score = 0, lives = 3, level = 1, gameTime = 0;
    let frogRow = 12, frogCol = 6, frogMaxRow = 12;
    let timer = 40, maxTimer = 40;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    function playSound(f, d, t = 'square') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = f;
        osc.type = t;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + d);
      } catch (e) {}
    }

    let homes = [false, false, false, false, false];

    // Vehicles
    let vehicles = [];
    function createVehicles() {
      vehicles = [];
      const roadRows = [8, 9, 10, 11, 12];
      const configs = [
        { speed: 80, dir: 1, width: 60, color: '#FF0000' },
        { speed: 120, dir: -1, width: 40, color: '#FFFF00' },
        { speed: 100, dir: 1, width: 50, color: '#0000FF' },
        { speed: 140, dir: -1, width: 35, color: '#FF00FF' },
        { speed: 90, dir: 1, width: 70, color: '#00FFFF' }
      ];
      for (let i = 0; i < 5; i++) {
        const row = roadRows[i];
        const config = configs[i];
        for (let j = 0; j < 3; j++) {
          vehicles.push({
            x: j * (WIDTH / 3) + 50,
            y: row * LANE_HEIGHT + LANE_HEIGHT / 2 - 15,
            width: config.width,
            height: 30,
            vx: config.speed * config.dir,
            color: config.color
          });
        }
      }
    }

    // River objects
    let riverObjects = [];
    function createRiver() {
      riverObjects = [];
      const riverRows = [2, 3, 4, 5, 6];
      const configs = [
        { speed: 60, dir: 1, type: 'log', length: 100 },
        { speed: 80, dir: -1, type: 'turtle', length: 70, dive: true },
        { speed: 70, dir: 1, type: 'log', length: 80 },
        { speed: 90, dir: -1, type: 'turtle', length: 60, dive: true },
        { speed: 75, dir: 1, type: 'log', length: 90 }
      ];
      for (let i = 0; i < 5; i++) {
        const row = riverRows[i];
        const config = configs[i];
        for (let j = 0; j < 2; j++) {
          riverObjects.push({
            x: j * (WIDTH + config.length),
            y: row * LANE_HEIGHT + LANE_HEIGHT / 2 - 12,
            width: config.length,
            height: 24,
            vx: config.speed * config.dir,
            type: config.type,
            color: config.type === 'log' ? '#8B4513' : '#FF4444',
            diveTimer: Math.random() * 3,
            diveCycle: 4 + Math.random() * 2,
            submerged: false
          });
        }
      }
    }

    let deathTimer = 0, hopCooldown = 0;
    let keys = {};

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === 'enter' || key === ' ') {
        initAudio();
        if (gameState === STATES.START || gameState === STATES.GAME_OVER) {
          score = 0; lives = 3; level = 1;
          frogRow = 12; frogCol = 6; frogMaxRow = 12;
          timer = 40; maxTimer = 40;
          homes = [false, false, false, false, false];
          createVehicles();
          createRiver();
          gameState = STATES.PLAYING;
        }
      }

      if (gameState === STATES.PLAYING && hopCooldown <= 0) {
        if (key === 'arrowup' || key === 'w') {
          if (frogRow > 0) {
            frogRow--;
            if (frogRow < frogMaxRow) {
              frogMaxRow = frogRow;
              score += 10;
            }
            hopCooldown = 0.15;
            playSound(600, 0.1);
          }
        }
        if (key === 'arrowdown' || key === 's') {
          if (frogRow < 12) {
            frogRow++;
            hopCooldown = 0.15;
            playSound(600, 0.1);
          }
        }
        if (key === 'arrowleft' || key === 'a') {
          if (frogCol > 0) {
            frogCol--;
            hopCooldown = 0.15;
            playSound(600, 0.1);
          }
        }
        if (key === 'arrowright' || key === 'd') {
          if (frogCol < 11) {
            frogCol++;
            hopCooldown = 0.15;
            playSound(600, 0.1);
          }
        }
      }
    });

    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update(dt) {
      if (gameState !== STATES.PLAYING) return;

      gameTime += dt;
      hopCooldown -= dt;
      timer -= dt;

      const frogX = frogCol * 50 + 25;
      const frogY = frogRow * LANE_HEIGHT + LANE_HEIGHT / 2;

      // Update vehicles
      for (let v of vehicles) {
        v.x += v.vx * dt;
        if (v.vx > 0 && v.x > WIDTH + 50) v.x = -50;
        if (v.vx < 0 && v.x < -50) v.x = WIDTH + 50;
      }

      // Check road collisions
      if (frogRow >= 8 && frogRow <= 12) {
        for (let v of vehicles) {
          if (Math.abs(v.x - frogX) < 40 && Math.abs(v.y - frogY) < 35) {
            lives--;
            if (lives <= 0) gameState = STATES.GAME_OVER;
            else {
              gameState = STATES.DEAD;
              deathTimer = 1;
            }
            playSound(200, 0.3);
            return;
          }
        }
      }

      // Update river objects
      let onPlatform = false;
      let platformVx = 0;
      for (let r of riverObjects) {
        r.x += r.vx * dt;
        if (r.vx > 0 && r.x > WIDTH + 100) r.x = -100;
        if (r.vx < 0 && r.x < -100) r.x = WIDTH + 100;

        if (r.type === 'turtle') {
          r.diveTimer += dt;
          if (r.diveTimer > r.diveCycle) r.diveTimer -= r.diveCycle;
          r.submerged = r.diveTimer > r.diveCycle * 0.5;
        }

        // Frog on platform logic
        if (frogRow * LANE_HEIGHT === r.y - LANE_HEIGHT / 2 + 12) {
          if (Math.abs(r.x - frogX) < r.width / 2 + 25) {
            if (!r.submerged) {
              onPlatform = true;
              platformVx = r.vx;
            } else {
              lives--;
              if (lives <= 0) gameState = STATES.GAME_OVER;
              else {
                gameState = STATES.DEAD;
                deathTimer = 1;
              }
              playSound(150, 0.3);
              return;
            }
          }
        }
      }

      // Apply river carrying
      if (frogRow >= 2 && frogRow <= 6) {
        if (!onPlatform) {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            gameState = STATES.DEAD;
            deathTimer = 1;
          }
          playSound(200, 0.3);
          return;
        }
        // Carry frog
        frogCol += platformVx * dt / 50;
        if (frogCol < 0 || frogCol > 11) {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            gameState = STATES.DEAD;
            deathTimer = 1;
          }
          playSound(150, 0.3);
          return;
        }
      }

      // Goal check
      if (frogRow === 0) {
        const goalIndex = Math.floor(frogCol / 2.4);
        if (goalIndex >= 0 && goalIndex < 5) {
          if (!homes[goalIndex]) {
            homes[goalIndex] = true;
            score += 50 + Math.max(0, Math.floor(timer * 10));
            playSound(800, 0.2);
            frogRow = 12;
            frogCol = 6;
            if (homes.every(h => h)) {
              level++;
              homes = [false, false, false, false, false];
              maxTimer = Math.max(20, maxTimer - 5);
              timer = maxTimer;
              createVehicles();
              createRiver();
            }
          } else {
            lives--;
            if (lives <= 0) gameState = STATES.GAME_OVER;
            else {
              gameState = STATES.DEAD;
              deathTimer = 1;
            }
            playSound(100, 0.3);
          }
        } else {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            gameState = STATES.DEAD;
            deathTimer = 1;
          }
          playSound(100, 0.3);
        }
      }

      // Timer death
      if (timer <= 0) {
        lives--;
        if (lives <= 0) gameState = STATES.GAME_OVER;
        else {
          gameState = STATES.DEAD;
          deathTimer = 1;
        }
        playSound(100, 0.5);
      }

      if (gameState === STATES.DEAD) {
        deathTimer -= dt;
        if (deathTimer <= 0) {
          frogRow = 12;
          frogCol = 6;
          frogMaxRow = 12;
          timer = maxTimer;
          gameState = STATES.PLAYING;
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // UI
      ctx.fillStyle = '#FF00FF';
      ctx.fillRect(0, 0, WIDTH, LANE_HEIGHT / 2);
      ctx.fillStyle = '#FFF';
      ctx.font = '12px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 15);
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level, WIDTH / 2, 15);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 15);

      // Goal row
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(0, LANE_HEIGHT / 2, WIDTH, LANE_HEIGHT / 2);
      for (let i = 0; i < 5; i++) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        ctx.strokeRect(i * 120 + 10, LANE_HEIGHT / 2 + 5, 100, 40);
        if (homes[i]) {
          ctx.fillStyle = '#00FF00';
          ctx.fillRect(i * 120 + 35, LANE_HEIGHT / 2 + 10, 30, 30);
        }
      }

      // Road
      ctx.fillStyle = '#333';
      ctx.fillRect(0, LANE_HEIGHT * 8, WIDTH, LANE_HEIGHT * 5);

      // Vehicles
      for (let v of vehicles) {
        ctx.fillStyle = v.color;
        ctx.fillRect(v.x - v.width / 2, v.y - 15, v.width, 30);
      }

      // Median
      ctx.fillStyle = '#00AA00';
      ctx.fillRect(0, LANE_HEIGHT * 7, WIDTH, LANE_HEIGHT);

      // River
      ctx.fillStyle = '#0000AA';
      ctx.fillRect(0, LANE_HEIGHT * 2, WIDTH, LANE_HEIGHT * 5);

      // River objects
      for (let r of riverObjects) {
        if (!r.submerged) {
          ctx.fillStyle = r.color;
          ctx.fillRect(r.x - r.width / 2, r.y - 12, r.width, 24);
        }
      }

      // Frog
      ctx.fillStyle = '#00FF00';
      ctx.fillRect(frogCol * 50, frogRow * LANE_HEIGHT + LANE_HEIGHT / 2 - 15, 50, 30);

      // Timer bar
      ctx.fillStyle = timer > 10 ? '#00FF00' : '#FF0000';
      ctx.fillRect(0, HEIGHT - 10, (timer / maxTimer) * WIDTH, 10);

      if (gameState === STATES.START) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('FROGGER', WIDTH / 2, 200);
        ctx.font = '16px "Courier New"';
        ctx.fillText('Arrow Keys to Move', WIDTH / 2, 300);
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 360);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 250);
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Final Score: ' + score, WIDTH / 2, 320);
        ctx.fillText('Press ENTER to Restart', WIDTH / 2, 380);
      }
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    createVehicles();
    createRiver();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
