<!--
  GAME:      Asteroids
  RUN:       r3-gemini-pro
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Arcade Classic</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; display: block; border: 1px solid #333; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800, HEIGHT = 600;

        // --- Game State ---
        let gameState = 'START'; // START, PLAYING, DEATH, GAMEOVER
        let score = 0, lives = 3, level = 1;
        let lastTime = 0, dt = 0;
        let highscore = localStorage.getItem('asteroids_highscore') || 0;

        // --- Entities ---
        let ship = { x: WIDTH/2, y: HEIGHT/2, r: 10, vX: 0, vY: 0, rot: -Math.PI/2, thrust: false, invuln: 0 };
        let asteroids = [], bullets = [], ufo = null, debris = [], particles = [];
        let keys = {};

        // --- Audio Context ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, dur, type = 'square', ramp = null) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, audioCtx.currentTime + dur);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // --- Math Helpers ---
        const wrap = (obj) => {
            if (obj.x < 0) obj.x += WIDTH; if (obj.x > WIDTH) obj.x -= WIDTH;
            if (obj.y < 0) obj.y += HEIGHT; if (obj.y > HEIGHT) obj.y -= HEIGHT;
        };

        // --- Factories ---
        function createAsteroid(x, y, radius, generation) {
            const vertices = 8 + Math.floor(Math.random() * 5);
            const offsets = [];
            for (let i = 0; i < vertices; i++) offsets.push(0.8 + Math.random() * 0.4);
            const angle = Math.random() * Math.PI * 2;
            const speed = (Math.random() * 50 + 20) * (1 + (3 - generation) * 0.5);
            asteroids.push({
                x, y, radius, generation, offsets, vertices,
                vX: Math.cos(angle) * speed, vY: Math.sin(angle) * speed,
                rot: (Math.random() - 0.5) * 2, heading: 0
            });
        }

        function initLevel() {
            asteroids = []; bullets = []; ufo = null;
            const count = 4 + level;
            for (let i = 0; i < count; i++) {
                let ax, ay;
                do { ax = Math.random() * WIDTH; ay = Math.random() * HEIGHT; }
                while (Math.hypot(ax - ship.x, ay - ship.y) < 150);
                createAsteroid(ax, ay, 40, 3);
            }
        }

        function explode(x, y, count = 10) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({ x, y, vX: Math.cos(angle) * 100, vY: Math.sin(angle) * 100, life: 1.0 });
            }
        }

        // --- Logic ---
        function handleInput() {
            if (gameState !== 'PLAYING') return;
            if (keys['ArrowLeft']) ship.rot -= 5 * dt;
            if (keys['ArrowRight']) ship.rot += 5 * dt;
            ship.thrust = keys['ArrowUp'];
            if (ship.thrust) {
                ship.vX += Math.cos(ship.rot) * 200 * dt;
                ship.vY += Math.sin(ship.rot) * 200 * dt;
                if (Math.random() < 0.3) playSound(100 + Math.random() * 20, 0.05, 'sawtooth');
            }
            ship.vX *= 0.99; ship.vY *= 0.99; // Drag
        }

        function update() {
            if (gameState === 'PLAYING') {
                ship.x += ship.vX * dt; ship.y += ship.vY * dt;
                wrap(ship);
                if (ship.invuln > 0) ship.invuln -= dt;

                // Collisions
                asteroids.forEach((a, aIdx) => {
                    const dist = Math.hypot(ship.x - a.x, ship.y - a.y);
                    if (dist < a.radius + ship.r && ship.invuln <= 0) die();
                });
            }

            bullets.forEach((b, bIdx) => {
                b.x += b.vX * dt; b.y += b.vY * dt;
                b.dist += Math.hypot(b.vX * dt, b.vY * dt);
                if (b.dist > 600) b.dead = true;
                wrap(b);

                asteroids.forEach((a, aIdx) => {
                    if (!b.dead && Math.hypot(b.x - a.x, b.y - a.y) < a.radius) {
                        b.dead = true;
                        score += (a.generation === 3 ? 20 : a.generation === 2 ? 50 : 100);
                        explode(a.x, a.y, 5);
                        playSound(100 + a.generation * 100, 0.1, 'square');
                        if (a.generation > 1) {
                            createAsteroid(a.x, a.y, a.radius / 2, a.generation - 1);
                            createAsteroid(a.x, a.y, a.radius / 2, a.generation - 1);
                        }
                        asteroids.splice(aIdx, 1);
                    }
                });
            });
            bullets = bullets.filter(b => !b.dead);

            asteroids.forEach(a => {
                a.x += a.vX * dt; a.y += a.vY * dt;
                a.heading += a.rot * dt;
                wrap(a);
            });

            particles.forEach(p => { p.x += p.vX * dt; p.y += p.vY * dt; p.life -= dt; });
            particles = particles.filter(p => p.life > 0);

            if (gameState === 'PLAYING' && asteroids.length === 0) {
                level++;
                initLevel();
            }
        }

        function die() {
            lives--;
            explode(ship.x, ship.y, 20);
            playSound(50, 0.5, 'sawtooth');
            if (lives <= 0) gameState = 'GAMEOVER';
            else {
                gameState = 'DEATH';
                setTimeout(() => {
                    ship.x = WIDTH/2; ship.y = HEIGHT/2;
                    ship.vX = 0; ship.vY = 0; ship.rot = -Math.PI/2;
                    ship.invuln = 2;
                    gameState = 'PLAYING';
                }, 2000);
            }
        }

        // --- Rendering ---
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;

            if (gameState === 'PLAYING' || gameState === 'DEATH') {
                if (!(ship.invuln > 0 && Math.floor(Date.now() / 100) % 2 === 0) && gameState === 'PLAYING') {
                    ctx.save();
                    ctx.translate(ship.x, ship.y);
                    ctx.rotate(ship.rot);
                    ctx.beginPath();
                    ctx.moveTo(10, 0); ctx.lineTo(-7, 7); ctx.lineTo(-7, -7); ctx.closePath();
                    ctx.stroke();
                    if (ship.thrust) {
                        ctx.beginPath();
                        ctx.moveTo(-7, 0); ctx.lineTo(-12, -3 + Math.random() * 6); ctx.lineTo(-12, 3 - Math.random() * 6);
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                bullets.forEach(b => {
                    ctx.beginPath(); ctx.arc(b.x, b.y, 1, 0, 7); ctx.fill();
                });
            }

            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y); ctx.rotate(a.heading);
                ctx.beginPath();
                for (let i = 0; i < a.vertices; i++) {
                    const ang = (i / a.vertices) * Math.PI * 2;
                    const r = a.radius * a.offsets[i];
                    ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(ang) * r, Math.sin(ang) * r);
                }
                ctx.closePath(); ctx.stroke();
                ctx.restore();
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vX * 0.05, p.y - p.vY * 0.05); ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // HUD
            ctx.fillStyle = '#fff'; ctx.font = '18px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`Lives: ${lives}`, WIDTH - 20, 30);
            ctx.textAlign = 'center';
            ctx.fillText(`Level: ${level}`, WIDTH/2, 30);

            if (gameState === 'START') {
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#fff'; ctx.font = '40px monospace'; ctx.textAlign = 'center';
                ctx.fillText('ASTEROIDS', WIDTH/2, 250);
                ctx.font = '18px monospace';
                ctx.fillText('ARROW KEYS: THRUST & ROTATE', WIDTH/2, 320);
                ctx.fillText('SPACE: FIRE PROJECTILES', WIDTH/2, 350);
                ctx.fillText('PRESS ENTER TO START', WIDTH/2, 420);
            }
            if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#fff'; ctx.font = '40px monospace'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', WIDTH/2, 300);
                ctx.font = '20px monospace';
                ctx.fillText(`Final Score: ${score}`, WIDTH/2, 350);
                ctx.fillText('PRESS ENTER TO RESTART', WIDTH/2, 420);
            }
        }

        function loop(timestamp) {
            dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            handleInput();
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // --- Event Listeners ---
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') {
                initAudio();
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    score = 0; lives = 3; level = 1; gameState = 'PLAYING';
                    ship.x = WIDTH/2; ship.y = HEIGHT/2; ship.vX = 0; ship.vY = 0; ship.invuln = 2;
                    initLevel();
                }
            }
            if (e.code === 'Space' && gameState === 'PLAYING') {
                if (bullets.length < 5) {
                    playSound(800, 0.1, 'square', 200);
                    bullets.push({
                        x: ship.x + Math.cos(ship.rot) * 10,
                        y: ship.y + Math.sin(ship.rot) * 10,
                        vX: Math.cos(ship.rot) * 600,
                        vY: Math.sin(ship.rot) * 600,
                        dist: 0
                    });
                }
            }
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
