<!--
  GAME:      Asteroids
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
    canvas { background: #000; display: block; border: 2px solid #333; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="asteroidsCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('asteroidsCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 800, HEIGHT = 600;

    const STATES = { START: 0, PLAYING: 1, WAVE_CLEAR: 2, GAME_OVER: 3 };
    let gameState = STATES.START;
    let score = 0, lives = 3, level = 1, gameTime = 0;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    function playSound(f, d, t = 'square', ramp = false) {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = t;
        if (ramp) {
          osc.frequency.setValueAtTime(f[0], now);
          osc.frequency.exponentialRampToValueAtTime(f[1], now + d);
        } else osc.frequency.value = f;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + d);
      } catch (e) {}
    }

    // Player
    let player = { x: 400, y: 300, vx: 0, vy: 0, angle: 0, radius: 10, alive: true, respawnTimer: 0, invulnerable: 0 };

    // Projectiles
    let playerProjectiles = [];
    let ufoProjectiles = [];

    // Asteroids
    let asteroids = [];
    function createAsteroid(x, y, size, vx, vy) {
      const radius = [40, 20, 10][size];
      const points = [];
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const r = radius * (0.8 + Math.random() * 0.4);
        points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
      }
      asteroids.push({
        x: x, y: y, vx: vx || (Math.random() - 0.5) * 150, vy: vy || (Math.random() - 0.5) * 150,
        size: size, radius: radius, points: points, angle: Math.random() * Math.PI * 2, alive: true
      });
    }

    function spawnWave() {
      asteroids = [];
      const count = 4 + level - 1;
      for (let i = 0; i < count; i++) {
        const side = Math.random() < 0.5 ? 0 : 1;
        let x = side === 0 ? Math.random() * 200 : WIDTH - Math.random() * 200;
        let y = Math.random() * HEIGHT;
        createAsteroid(x, y, 0);
      }
    }

    // UFO
    let ufo = null;
    let ufoSpawnTimer = 5;

    // Input
    let keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === 'Enter') {
        initAudio();
        if (gameState === STATES.START || gameState === STATES.GAME_OVER) {
          score = 0; lives = 3; level = 1;
          player = { x: 400, y: 300, vx: 0, vy: 0, angle: 0, radius: 10, alive: true, respawnTimer: 0, invulnerable: 0 };
          playerProjectiles = [];
          ufoProjectiles = [];
          spawnWave();
          gameState = STATES.PLAYING;
        }
      }
      if (e.key === ' ' && playerProjectiles.length < 5 && gameState === STATES.PLAYING) {
        playerProjectiles.push({
          x: player.x + Math.cos(player.angle) * 20,
          y: player.y + Math.sin(player.angle) * 20,
          vx: Math.cos(player.angle) * 600,
          vy: Math.sin(player.angle) * 600,
          life: 1.5
        });
        playSound([800, 200], 0.05, 'square', true);
      }
      if ((e.key === 'Shift') && gameState === STATES.PLAYING && player.alive) {
        player.x = Math.random() * WIDTH;
        player.y = Math.random() * HEIGHT;
        if (Math.random() < 1/6) player.alive = false;
      }
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update(dt) {
      if (gameState !== STATES.PLAYING) return;

      gameTime += dt;

      // Player rotation and thrust
      if (keys['arrowleft']) player.angle -= 5 * dt;
      if (keys['arrowright']) player.angle += 5 * dt;
      if (keys['arrowup']) {
        player.vx += Math.cos(player.angle) * 400 * dt;
        player.vy += Math.sin(player.angle) * 400 * dt;
        playSound(80, 0.05);
      }

      // Friction
      player.vx *= 0.99;
      player.vy *= 0.99;

      // Cap speed
      const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
      if (speed > 500) {
        player.vx = (player.vx / speed) * 500;
        player.vy = (player.vy / speed) * 500;
      }

      // Player movement and wrap
      if (player.alive) {
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        if (player.x < 0) player.x = WIDTH;
        if (player.x > WIDTH) player.x = 0;
        if (player.y < 0) player.y = HEIGHT;
        if (player.y > HEIGHT) player.y = 0;
        if (player.invulnerable > 0) player.invulnerable -= dt;
      } else {
        player.respawnTimer -= dt;
        if (player.respawnTimer <= 0 && asteroids.every(a => Math.hypot(a.x - 400, a.y - 300) > 60)) {
          player.alive = true;
          player.invulnerable = 3;
          player.vx = 0;
          player.vy = 0;
        }
      }

      // Update projectiles
      for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        playerProjectiles[i].x += playerProjectiles[i].vx * dt;
        playerProjectiles[i].y += playerProjectiles[i].vy * dt;
        playerProjectiles[i].life -= dt;
        if (playerProjectiles[i].x < 0) playerProjectiles[i].x = WIDTH;
        if (playerProjectiles[i].x > WIDTH) playerProjectiles[i].x = 0;
        if (playerProjectiles[i].y < 0) playerProjectiles[i].y = HEIGHT;
        if (playerProjectiles[i].y > HEIGHT) playerProjectiles[i].y = 0;
        if (playerProjectiles[i].life <= 0) playerProjectiles.splice(i, 1);
      }

      // Update asteroids
      for (let a of asteroids) {
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        a.angle += dt;
        if (a.x < 0) a.x = WIDTH;
        if (a.x > WIDTH) a.x = 0;
        if (a.y < 0) a.y = HEIGHT;
        if (a.y > HEIGHT) a.y = 0;
      }

      // UFO logic
      ufoSpawnTimer -= dt;
      if (!ufo && ufoSpawnTimer <= 0 && asteroids.length > 0) {
        ufo = { x: Math.random() < 0.5 ? 0 : WIDTH, y: Math.random() * HEIGHT, vx: Math.random() < 0.5 ? 150 : -150, vy: (Math.random() - 0.5) * 50, type: Math.random() < 0.3 ? 1 : 0, radius: 15, shootTimer: 0 };
        ufoSpawnTimer = 8;
      }

      if (ufo) {
        ufo.x += ufo.vx * dt;
        ufo.y += ufo.vy * dt;
        if (ufo.x < -50 || ufo.x > WIDTH + 50) ufo = null;
        else {
          ufo.shootTimer += dt;
          if (ufo.shootTimer > (ufo.type === 0 ? 2 : 1.5)) {
            ufo.shootTimer = 0;
            if (ufo.type === 0) {
              const angle = Math.random() * Math.PI * 2;
              ufoProjectiles.push({ x: ufo.x, y: ufo.y, vx: Math.cos(angle) * 200, vy: Math.sin(angle) * 200, life: 2 });
            } else {
              const angle = Math.atan2(player.y - ufo.y, player.x - ufo.x);
              ufoProjectiles.push({ x: ufo.x, y: ufo.y, vx: Math.cos(angle) * 250, vy: Math.sin(angle) * 250, life: 2 });
            }
          }
        }
      }

      // Update UFO projectiles
      for (let i = ufoProjectiles.length - 1; i >= 0; i--) {
        ufoProjectiles[i].x += ufoProjectiles[i].vx * dt;
        ufoProjectiles[i].y += ufoProjectiles[i].vy * dt;
        ufoProjectiles[i].life -= dt;
        if (ufoProjectiles[i].life <= 0) ufoProjectiles.splice(i, 1);
      }

      // Collisions: player projectile vs asteroids
      for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const dist = Math.hypot(playerProjectiles[i].x - asteroids[j].x, playerProjectiles[i].y - asteroids[j].y);
          if (dist < asteroids[j].radius + 3) {
            const pts = [20, 50, 100][asteroids[j].size];
            score += pts;
            if (asteroids[j].size < 2) {
              createAsteroid(asteroids[j].x, asteroids[j].y, asteroids[j].size + 1, asteroids[j].vx + (Math.random() - 0.5) * 100, asteroids[j].vy + (Math.random() - 0.5) * 100);
              createAsteroid(asteroids[j].x, asteroids[j].y, asteroids[j].size + 1, asteroids[j].vx + (Math.random() - 0.5) * 100, asteroids[j].vy + (Math.random() - 0.5) * 100);
            }
            asteroids.splice(j, 1);
            playerProjectiles.splice(i, 1);
            playSound(400 + asteroids.length * 50, 0.1);
            break;
          }
        }
      }

      // Collisions: player projectile vs UFO
      if (ufo) {
        for (let i = playerProjectiles.length - 1; i >= 0; i--) {
          if (Math.hypot(playerProjectiles[i].x - ufo.x, playerProjectiles[i].y - ufo.y) < 20) {
            score += ufo.type === 0 ? 200 : 1000;
            ufo = null;
            playerProjectiles.splice(i, 1);
            playSound(600, 0.2);
            break;
          }
        }
      }

      // Collisions: UFO projectile vs player
      if (player.alive && player.invulnerable <= 0) {
        for (let i = ufoProjectiles.length - 1; i >= 0; i--) {
          if (Math.hypot(ufoProjectiles[i].x - player.x, ufoProjectiles[i].y - player.y) < 15) {
            lives--;
            player.alive = false;
            player.respawnTimer = 2;
            ufoProjectiles.splice(i, 1);
            playSound(200, 0.5);
            if (lives <= 0) gameState = STATES.GAME_OVER;
            break;
          }
        }
      }

      // Collisions: asteroid vs player
      if (player.alive && player.invulnerable <= 0) {
        for (let a of asteroids) {
          if (Math.hypot(a.x - player.x, a.y - player.y) < a.radius + 10) {
            lives--;
            player.alive = false;
            player.respawnTimer = 2;
            playSound(100, 0.5);
            if (lives <= 0) gameState = STATES.GAME_OVER;
            break;
          }
        }
      }

      // Wave clear check
      if (asteroids.length === 0 && !ufo) {
        gameState = STATES.WAVE_CLEAR;
        level++;
        setTimeout(() => {
          spawnWave();
          gameState = STATES.PLAYING;
        }, 1500);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 1;

      // HUD
      ctx.fillStyle = '#FFF';
      ctx.font = '14px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 20);
      ctx.fillText('Level: ' + level, 10, 40);
      ctx.fillText('Lives: ' + lives, 10, 60);

      if (gameState === STATES.START) {
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('ASTEROIDS', WIDTH / 2, 150);
        ctx.font = '16px "Courier New"';
        ctx.fillText('Arrow Keys to Rotate & Thrust', WIDTH / 2, 250);
        ctx.fillText('Space to Fire', WIDTH / 2, 280);
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 350);
      } else {
        // Player
        if (player.alive && (player.invulnerable <= 0 || Math.sin(gameTime * 10) > 0)) {
          const px = player.x, py = player.y;
          const angle = player.angle;
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.moveTo(15, 0);
          ctx.lineTo(-10, -10);
          ctx.lineTo(-5, 0);
          ctx.lineTo(-10, 10);
          ctx.closePath();
          ctx.stroke();
          if (keys['arrowup']) {
            ctx.beginPath();
            ctx.moveTo(-5, -3 - Math.random() * 5);
            ctx.lineTo(-10 - Math.random() * 5, Math.random() * 6 - 3);
            ctx.stroke();
          }
          ctx.restore();
        }

        // Projectiles
        for (let p of playerProjectiles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Asteroids
        for (let a of asteroids) {
          ctx.save();
          ctx.translate(a.x, a.y);
          ctx.rotate(a.angle);
          ctx.beginPath();
          ctx.moveTo(a.points[0].x, a.points[0].y);
          for (let i = 1; i < a.points.length; i++) {
            ctx.lineTo(a.points[i].x, a.points[i].y);
          }
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }

        // UFO
        if (ufo) {
          ctx.beginPath();
          ctx.arc(ufo.x, ufo.y - 5, 20, 0, Math.PI);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(ufo.x, ufo.y + 5, 25, Math.PI, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(ufo.x - 25, ufo.y + 5);
          ctx.lineTo(ufo.x + 25, ufo.y + 5);
          ctx.stroke();
        }

        // UFO projectiles
        for (let p of ufoProjectiles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 40px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', WIDTH / 2, 250);
          ctx.font = '16px "Courier New"';
          ctx.fillText('Final Score: ' + score, WIDTH / 2, 320);
          ctx.fillText('Press ENTER to Restart', WIDTH / 2, 380);
        }
      }
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
