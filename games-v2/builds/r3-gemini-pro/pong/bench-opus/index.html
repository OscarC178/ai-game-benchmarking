  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600,PI=Math.PI;

// Audio
let ac=null;
function initAudio(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beepSnd(freq,dur,type){
  if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.value=0.08;g.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sndPaddle(){beepSnd(600,0.1,'square');}
function sndWall(){beepSnd(300,0.1,'square');}
function sndScore(){beepSnd(150,0.5,'sawtooth');}

// States
const ST_TITLE=0,ST_SERVE=1,ST_PLAY=2,ST_OVER=3;
let state=ST_TITLE;

// Game objects
const PADDLE_W=15,PADDLE_H=100,PADDLE_SPEED=400;
const AI_SPEED=350;
const BALL_SIZE=15,BASE_SPEED=400,MAX_SPEED=1000;
const MAX_ANGLE=PI/4;
const WIN_SCORE=10;

let playerY,aiY,ballX,ballY,ballVX,ballVY,ballSpeed;
let playerScore,aiScore,serveDir,winner;

function resetPositions(){
  playerY=H/2-PADDLE_H/2;
  aiY=H/2-PADDLE_H/2;
  ballX=W/2-BALL_SIZE/2;
  ballY=H/2-BALL_SIZE/2;
  ballVX=0;ballVY=0;
  ballSpeed=BASE_SPEED;
}

function startGame(){
  playerScore=0;aiScore=0;winner='';
  serveDir=Math.random()<0.5?1:-1;
  resetPositions();
  state=ST_SERVE;
}

function serve(){
  const angle=(Math.random()*0.8-0.4); // random angle ±~23°
  ballVX=Math.cos(angle)*ballSpeed*serveDir;
  ballVY=-Math.sin(angle)*ballSpeed;
  state=ST_PLAY;
}

function scorePoint(scorer){
  if(scorer==='ai')aiScore++;
  else playerScore++;
  sndScore();
  if(playerScore>=WIN_SCORE){winner='PLAYER WINS!';state=ST_OVER;return;}
  if(aiScore>=WIN_SCORE){winner='COMPUTER WINS!';state=ST_OVER;return;}
  serveDir=scorer==='ai'?-1:1; // ball goes toward conceder
  resetPositions();
  state=ST_SERVE;
}

// Input
const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;initAudio();
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault();
    if(state===ST_TITLE)startGame();
    else if(state===ST_SERVE)serve();
    else if(state===ST_OVER)startGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  if(state!==ST_PLAY&&state!==ST_SERVE)return;

  // Player paddle
  let pDir=0;
  if(keys['KeyW']||keys['ArrowUp'])pDir=-1;
  if(keys['KeyS']||keys['ArrowDown'])pDir=1;
  playerY+=pDir*PADDLE_SPEED*dt;
  playerY=Math.max(0,Math.min(H-PADDLE_H,playerY));

  // AI paddle
  if(state===ST_PLAY){
    const aiCenter=aiY+PADDLE_H/2;
    const ballCenter=ballY+BALL_SIZE/2;
    if(ballVX>0){
      // Track ball
      const diff=ballCenter-aiCenter;
      const move=Math.min(Math.abs(diff),AI_SPEED*dt);
      aiY+=Math.sign(diff)*move;
    }else{
      // Drift toward center
      const diff=H/2-aiCenter;
      const move=Math.min(Math.abs(diff),AI_SPEED*0.4*dt);
      aiY+=Math.sign(diff)*move;
    }
    aiY=Math.max(0,Math.min(H-PADDLE_H,aiY));
  }

  if(state!==ST_PLAY)return;

  // Ball movement
  ballX+=ballVX*dt;
  ballY+=ballVY*dt;

  // Wall collisions (top/bottom)
  if(ballY<=0){ballY=0;ballVY=-ballVY;sndWall();}
  if(ballY+BALL_SIZE>=H){ballY=H-BALL_SIZE;ballVY=-ballVY;sndWall();}

  // Paddle collision - left (player)
  if(ballVX<0&&ballX<=30+PADDLE_W&&ballX+BALL_SIZE>=30&&
     ballY+BALL_SIZE>=playerY&&ballY<=playerY+PADDLE_H){
    const intersectY=(playerY+PADDLE_H/2)-(ballY+BALL_SIZE/2);
    const normalized=intersectY/(PADDLE_H/2);
    const clamped=Math.max(-1,Math.min(1,normalized));
    const angle=clamped*MAX_ANGLE;
    ballSpeed=Math.min(MAX_SPEED,ballSpeed*1.05);
    ballVX=Math.cos(angle)*ballSpeed;
    ballVY=-Math.sin(angle)*ballSpeed;
    ballX=30+PADDLE_W;
    sndPaddle();
  }

  // Paddle collision - right (AI)
  if(ballVX>0&&ballX+BALL_SIZE>=755&&ballX<=755+PADDLE_W&&
     ballY+BALL_SIZE>=aiY&&ballY<=aiY+PADDLE_H){
    const intersectY=(aiY+PADDLE_H/2)-(ballY+BALL_SIZE/2);
    const normalized=intersectY/(PADDLE_H/2);
    const clamped=Math.max(-1,Math.min(1,normalized));
    const angle=clamped*MAX_ANGLE;
    ballSpeed=Math.min(MAX_SPEED,ballSpeed*1.05);
    ballVX=-Math.cos(angle)*ballSpeed;
    ballVY=-Math.sin(angle)*ballSpeed;
    ballX=755-BALL_SIZE;
    sndPaddle();
  }

  // Score
  if(ballX+BALL_SIZE<0)scorePoint('ai');
  if(ballX>W)scorePoint('player');
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#fff';cx.font="bold 72px 'Courier New',monospace";cx.textAlign='center';
    cx.fillText('PONG',W/2,240);
    cx.font="20px 'Courier New',monospace";
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Start',W/2,340);
    return;
  }

  // Net
  cx.setLineDash([10,10]);cx.strokeStyle='#fff';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
  cx.setLineDash([]);

  // Scores
  cx.fillStyle='#fff';cx.font="48px 'Courier New',monospace";cx.textAlign='center';
  cx.fillText(String(playerScore),W/4,70);
  cx.fillText(String(aiScore),3*W/4,70);

  // Paddles
  cx.fillStyle='#fff';
  cx.fillRect(30,playerY,PADDLE_W,PADDLE_H);
  cx.fillRect(755,aiY,PADDLE_W,PADDLE_H);

  // Ball
  cx.fillRect(ballX,ballY,BALL_SIZE,BALL_SIZE);

  // Serve prompt
  if(state===ST_SERVE){
    cx.font="18px 'Courier New',monospace";
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Serve',W/2,H-40);
  }

  // Game over
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font="bold 48px 'Courier New',monospace";cx.textAlign='center';
    cx.fillText(winner,W/2,H/2-20);
    cx.font="20px 'Courier New',monospace";
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Restart',W/2,H/2+30);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
