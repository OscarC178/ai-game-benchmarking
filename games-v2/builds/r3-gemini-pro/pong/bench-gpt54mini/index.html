  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4-mini

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PONG</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #container{width:80vmin;height:60vmin;max-width:800px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#000}
  .overlay{position:absolute;left:0;top:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Courier New',monospace;white-space:pre-wrap;text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="overlay" class="overlay"></div>
</div>
<script>
(() => {
  // Spec constants
  const WIDTH = 800, HEIGHT = 600;
  const PADDLE_W = 15, PADDLE_H = 100;
  const PLAYER_X = 30, CPU_X = 755; // 800 - 30 - 15
  const BALL_SIZE = 15;
  const PLAYER_SPEED = 400; // px/s
  const CPU_SPEED = 350; // px/s
  const INIT_BALL_SPEED = 400; // px/s
  const MAX_BALL_SPEED = 1000; // px/s
  const WIN_SCORE = 10;
  const MAX_BOUNCE_ANGLE = Math.PI/4; // 45deg
  const SERVE_MSG = 'Press Space (or Enter) to Serve';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const overlay = document.getElementById('overlay');

  // Entities
  const player = { x: PLAYER_X, y: (HEIGHT - PADDLE_H)/2, w: PADDLE_W, h: PADDLE_H, vy:0 };
  const cpu = { x: CPU_X, y: (HEIGHT - PADDLE_H)/2, w: PADDLE_W, h: PADDLE_H, vy:0 };
  const ball = { x: 392.5, y: 292.5, w: BALL_SIZE, h: BALL_SIZE, vx:0, vy:0, speed: INIT_BALL_SPEED };

  const score = { player:0, cpu:0 };

  let state = 'title'; // title, serve, play, gameover
  let lastWinner = null; // who conceded last point: 'player' or 'cpu'

  // Input
  const input = { up:false, down:false };
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowUp' || e.key==='w' || e.key==='W'){ input.up = true; e.preventDefault(); }
    if(e.key==='ArrowDown' || e.key==='s' || e.key==='S'){ input.down = true; e.preventDefault(); }
    if(e.key===' ' || e.key==='Enter'){ if(state==='title'){ startMatch(); } else if(state==='serve'){ serveBall(); } else if(state==='gameover'){ resetMatch(); startMatch(); } }
  });
  window.addEventListener('keyup', e=>{
    if(e.key==='ArrowUp' || e.key==='w' || e.key==='W'){ input.up = false; }
    if(e.key==='ArrowDown' || e.key==='s' || e.key==='S'){ input.down = false; }
  });

  // Audio
  let audioAllowed = false, audioCtx = null;
  function ensureAudio(){ if(!audioAllowed) return; if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } }
  function unlockAudio(){ audioAllowed = true; ensureAudio(); }
  window.addEventListener('pointerdown', unlockAudio, {once:true});
  window.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter') unlockAudio(); }, {once:true});

  function generateBeep(freq=440, duration=0.1, type='square'){ if(!audioAllowed) return; ensureAudio(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = type; o.frequency.value = freq; g.gain.setValueAtTime(0.0001, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
    o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration); o.stop(audioCtx.currentTime + duration + 0.02);
  }

  function paddleHitSound(){ generateBeep(600,0.1,'square'); }
  function wallHitSound(){ generateBeep(300,0.1,'square'); }
  function scoreSound(){ generateBeep(150,0.5,'sawtooth'); }

  // Helpers
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function aabb(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

  // Game control
  function startMatch(){ score.player=0; score.cpu=0; resetPositions(); state='serve'; overlayMessage('PONG\n'+SERVE_MSG); }
  function resetMatch(){ score.player=0; score.cpu=0; lastWinner=null; resetPositions(); state='title'; overlayMessage('PONG\nPress Space to Start'); }
  function resetPositions(){ player.y = (HEIGHT - PADDLE_H)/2; cpu.y = (HEIGHT - PADDLE_H)/2; player.vy=0; cpu.vy=0; ball.x = 392.5; ball.y = 292.5; ball.vx = 0; ball.vy = 0; ball.speed = INIT_BALL_SPEED; }

  function overlayMessage(text){ overlay.textContent = text || ''; }

  // Serve mechanic: waits in 'serve' state until player presses Space/Enter
  function serveBall(){ // direction: toward who conceded last point
    // If first serve, random direction
    let dir = (Math.random()<0.5)?-1:1;
    if(lastWinner==='player') dir = -1; // player scored last, serve toward cpu (right) so dir=1? Wait: spec: serve ball toward player who conceded point. lastWinner stored as who conceded? Let's define lastWinner as who scored the last point. We want to serve toward the side that conceded the point.
    // To avoid confusion, if lastWinner==='player' then cpu conceded, so serve toward cpu (right)
    if(lastWinner==='player') dir = 1; else if(lastWinner==='cpu') dir = -1;
    // If still undefined, keep random
    // pick bounce angle between -MAX_BOUNCE_ANGLE..MAX_BOUNCE_ANGLE
    const angle = (Math.random()*2 -1) * MAX_BOUNCE_ANGLE;
    ball.speed = INIT_BALL_SPEED;
    ball.vx = Math.cos(angle) * ball.speed * dir;
    ball.vy = -Math.sin(angle) * ball.speed;
    state = 'play'; overlayMessage('');
  }

  // Update loop
  let lastTime = performance.now();
  function loop(t){ const dt = Math.min(0.05, (t - lastTime)/1000); lastTime = t; update(dt); render(); requestAnimationFrame(loop); }

  // Player update
  function updatePlayer(dt){ let vy = 0; if(input.up && !input.down) vy = -PLAYER_SPEED; else if(input.down && !input.up) vy = PLAYER_SPEED; else vy = 0; player.vy = vy; player.y += player.vy * dt; player.y = clamp(player.y, 0, HEIGHT - player.h); }

  // CPU AI: track ball only when ball moving right
  function updateCPU(dt){ // simple proportional following with max speed
    const ballMovingRight = ball.vx > 0;
    const targetCenter = (HEIGHT - cpu.h)/2;
    let targetY = targetCenter;
    if(ballMovingRight && state==='play'){
      // aim for ball center, with slight prediction and error
      const predictTime = 0.2; // seconds ahead
      let predictedY = ball.y + ball.vy * predictTime;
      // reflect off top/bottom virtually
      const H = HEIGHT - ball.h;
      while(predictedY < 0 || predictedY > H){ if(predictedY < 0) predictedY = -predictedY; if(predictedY > H) predictedY = 2*H - predictedY; }
      const error = (Math.random()-0.5) * 30 * (ball.speed/INIT_BALL_SPEED);
      targetY = clamp(predictedY + error, 0, HEIGHT - cpu.h);
    } else {
      // drift to center
      targetY = (HEIGHT - cpu.h)/2;
    }
    // move toward target limited by CPU_SPEED
    const diff = targetY - cpu.y;
    if(Math.abs(diff) < 1){ cpu.vy = 0; cpu.y = targetY; }
    else{ const dir = diff>0?1:-1; cpu.vy = dir * CPU_SPEED; cpu.y += cpu.vy * dt; }
    cpu.y = clamp(cpu.y, 0, HEIGHT - cpu.h);
  }

  function checkPaddleCollision(paddle, isLeft){
    if(!aabb(ball, paddle)) return false;
    // ensure ball is moving toward paddle
    if(isLeft && ball.vx >= 0) return false;
    if(!isLeft && ball.vx <= 0) return false;
    // compute intersection as spec
    const intersectY = (paddle.y + paddle.h/2) - (ball.y + ball.h/2);
    const normalized = intersectY / (paddle.h/2);
    const clamped = clamp(normalized, -1, 1);
    const bounceAngle = clamped * MAX_BOUNCE_ANGLE;
    const direction = isLeft ? 1 : -1; // left paddle sends right (1), right sends left (-1)
    // increase speed by 5%, cap
    ball.speed = Math.min(MAX_BALL_SPEED, ball.speed * 1.05);
    ball.vx = Math.cos(bounceAngle) * ball.speed * direction;
    ball.vy = -Math.sin(bounceAngle) * ball.speed;
    // reposition ball just outside paddle to prevent sticking
    if(isLeft) ball.x = paddle.x + paddle.w + 0.5; else ball.x = paddle.x - ball.w - 0.5;
    paddleHitSound();
    return true;
  }

  function update(dt){ if(state==='title' || state==='gameover') return; updatePlayer(dt); updateCPU(dt);
    if(state==='play'){
      // move ball
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      // wall collisions
      if(ball.y <= 0){ ball.y = 0; ball.vy = -ball.vy; wallHitSound(); }
      if(ball.y + ball.h >= HEIGHT){ ball.y = HEIGHT - ball.h; ball.vy = -ball.vy; wallHitSound(); }
      // paddle collisions
      checkPaddleCollision(player, true);
      checkPaddleCollision(cpu, false);
      // scoring
      if(ball.x + ball.w < 0){ // AI scores
        score.cpu += 1; lastWinner = 'cpu'; scoreSound(); if(score.cpu>=WIN_SCORE){ state='gameover'; overlayMessage('COMPUTER WINS!\nPress Space to Restart'); } else { state='serve'; resetPositions(); overlayMessage(SERVE_MSG); }
      } else if(ball.x > WIDTH){ score.player += 1; lastWinner='player'; scoreSound(); if(score.player>=WIN_SCORE){ state='gameover'; overlayMessage('PLAYER WINS!\nPress Space to Restart'); } else { state='serve'; resetPositions(); overlayMessage(SERVE_MSG); } }
    }
  }

  // Render
  function render(){ // clear
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,WIDTH,HEIGHT);
    // center dashed net
    ctx.fillStyle = '#fff'; const dash=16, gap=10; const midX = WIDTH/2 - 2;
    for(let y=20;y<HEIGHT-20;y+=dash+gap){ ctx.fillRect(midX, y, 4, dash); }
    // paddles
    ctx.fillStyle = '#fff'; ctx.fillRect(Math.round(player.x), Math.round(player.y), player.w, player.h); ctx.fillRect(Math.round(cpu.x), Math.round(cpu.y), cpu.w, cpu.h);
    // ball
    ctx.fillRect(Math.round(ball.x), Math.round(ball.y), ball.w, ball.h);
    // scores
    ctx.fillStyle = '#fff'; ctx.font = '48px "Courier New", monospace'; ctx.textAlign = 'left'; ctx.fillText(String(score.player), 40, 16);
    ctx.textAlign = 'right'; ctx.fillText(String(score.cpu), WIDTH - 40, 16);

    if(state==='title'){
      ctx.fillStyle = '#fff'; ctx.font='84px "Courier New", monospace'; ctx.textAlign='center'; ctx.fillText('PONG', WIDTH/2, HEIGHT/2 - 60);
      ctx.font='18px "Courier New", monospace'; ctx.fillText('W / Up  - Move Up', WIDTH/2, HEIGHT/2 + 10);
      ctx.fillText('S / Down - Move Down', WIDTH/2, HEIGHT/2 + 36);
      ctx.fillText('Press Space to Start', WIDTH/2, HEIGHT/2 + 80);
    }
    if(state==='gameover'){
      // overlay handled by overlay element
    }
  }

  // Init
  function init(){ resetMatch(); overlayMessage('PONG\nPress Space to Start'); state='title'; requestAnimationFrame(loop); }
  init();

  // expose for debugging
  window.__pong = { player, cpu, ball, score, state };

})();
</script>
</body>
</html>
