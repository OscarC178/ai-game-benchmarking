  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800;
        const HEIGHT = 600;
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 15;
        const PADDLE_SPEED = 400;
        const AI_SPEED = 350;
        const INITIAL_BALL_SPEED = 400;
        const MAX_BALL_SPEED = 1000;
        const MAX_BOUNCE_ANGLE = Math.PI / 4; // 45 degrees
        const WINNING_SCORE = 10;

        // Game State
        let playerY = (HEIGHT - PADDLE_HEIGHT) / 2;
        let aiY = (HEIGHT - PADDLE_HEIGHT) / 2;
        let ball = { x: 0, y: 0, vx: 0, vy: 0, speed: 0 };
        let playerScore = 0;
        let aiScore = 0;
        let gameState = 'START'; // 'START', 'SERVE', 'PLAYING', 'GAMEOVER'
        let lastTime = 0;
        let keys = {};
        let lastWinner = null; // null means random, 0 means player, 1 means AI

        // Audio Setup
        let audioCtx = null;
        function generateBeep(freq, dur, type = 'square') {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Input Handling
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.code === 'Space' || e.code === 'Enter') {
                initAudio();
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    playerScore = 0;
                    aiScore = 0;
                    resetRound();
                } else if (gameState === 'SERVE') {
                    serveBall();
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function resetRound() {
            playerY = (HEIGHT - PADDLE_HEIGHT) / 2;
            aiY = (HEIGHT - PADDLE_HEIGHT) / 2;
            ball.x = (WIDTH - BALL_SIZE) / 2;
            ball.y = (HEIGHT - BALL_SIZE) / 2;
            ball.vx = 0;
            ball.vy = 0;
            ball.speed = INITIAL_BALL_SPEED;
            gameState = 'SERVE';
        }

        function serveBall() {
            const direction = (lastWinner === 0) ? 1 : (lastWinner === 1 ? -1 : (Math.random() > 0.5 ? 1 : -1));
            // Random initial angle ±30 degrees
            const angle = (Math.random() * 60 - 30) * Math.PI / 180;
            ball.vx = ball.speed * Math.cos(angle) * direction;
            ball.vy = ball.speed * Math.sin(angle);
            gameState = 'PLAYING';
        }

        function update(dt) {
            if (gameState === 'PLAYING') {
                // Player Movement
                if (keys['w'] || keys['W'] || keys['ArrowUp']) {
                    playerY -= PADDLE_SPEED * dt;
                }
                if (keys['s'] || keys['S'] || keys['ArrowDown']) {
                    playerY += PADDLE_SPEED * dt;
                }
                playerY = Math.max(0, Math.min(HEIGHT - PADDLE_HEIGHT, playerY));

                // AI Movement
                const aiCenter = aiY + PADDLE_HEIGHT / 2;
                const ballCenter = ball.y + BALL_SIZE / 2;
                
                // Only track if ball is moving right or strictly returning to center
                let aiTargetY = HEIGHT / 2;
                if (ball.vx > 0) {
                    aiTargetY = ballCenter;
                }

                if (Math.abs(aiCenter - aiTargetY) > 10) {
                    if (aiCenter < aiTargetY) aiY += AI_SPEED * dt;
                    else aiY -= AI_SPEED * dt;
                }
                aiY = Math.max(0, Math.min(HEIGHT - PADDLE_HEIGHT, aiY));

                // Ball Movement
                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Wall Collisions
                if (ball.y <= 0) {
                    ball.y = 0;
                    ball.vy = -ball.vy;
                    generateBeep(300, 0.1);
                } else if (ball.y >= HEIGHT - BALL_SIZE) {
                    ball.y = HEIGHT - BALL_SIZE;
                    ball.vy = -ball.vy;
                    generateBeep(300, 0.1);
                }

                // Paddle Collisions (AABB)
                // Left Paddle
                if (ball.vx < 0 && 
                    ball.x <= 30 + PADDLE_WIDTH && ball.x >= 30 &&
                    ball.y + BALL_SIZE >= playerY && ball.y <= playerY + PADDLE_HEIGHT) {
                    handlePaddleCollision(playerY, 1);
                }
                // Right Paddle
                if (ball.vx > 0 &&
                    ball.x + BALL_SIZE >= WIDTH - 30 - PADDLE_WIDTH && ball.x + BALL_SIZE <= WIDTH - 30 &&
                    ball.y + BALL_SIZE >= aiY && ball.y <= aiY + PADDLE_HEIGHT) {
                    handlePaddleCollision(aiY, -1);
                }

                // Scoring
                if (ball.x < 0) {
                    aiScore++;
                    lastWinner = 1; // AI won point, serves next
                    generateBeep(150, 0.5, 'sawtooth');
                    checkGameOver();
                } else if (ball.x > WIDTH) {
                    playerScore++;
                    lastWinner = 0; // Player won point, serves next
                    generateBeep(150, 0.5, 'sawtooth');
                    checkGameOver();
                }
            }
        }

        function handlePaddleCollision(paddleY, direction) {
            const ballCenterY = ball.y + BALL_SIZE / 2;
            const paddleCenterY = paddleY + PADDLE_HEIGHT / 2;
            const intersectY = paddleCenterY - ballCenterY;
            const normalizedIntersectY = intersectY / (PADDLE_HEIGHT / 2);
            const bounceAngle = normalizedIntersectY * MAX_BOUNCE_ANGLE;

            ball.speed = Math.min(MAX_BALL_SPEED, ball.speed * 1.05);
            ball.vx = ball.speed * Math.cos(bounceAngle) * direction;
            ball.vy = ball.speed * -Math.sin(bounceAngle);

            // Reposition ball outside paddle
            if (direction === 1) ball.x = 30 + PADDLE_WIDTH + 1;
            else ball.x = WIDTH - 30 - PADDLE_WIDTH - BALL_SIZE - 1;

            generateBeep(600, 0.1);
        }

        function checkGameOver() {
            if (playerScore >= WINNING_SCORE || aiScore >= WINNING_SCORE) {
                gameState = 'GAMEOVER';
            } else {
                resetRound();
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Net
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(WIDTH / 2, 0);
            ctx.lineTo(WIDTH / 2, HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);

            // Scores
            ctx.fillStyle = '#FFF';
            ctx.font = '48px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText(playerScore, WIDTH / 4, 60);
            ctx.fillText(aiScore, 3 * WIDTH / 4, 60);

            // Paddles
            ctx.fillRect(30, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(WIDTH - 30 - PADDLE_WIDTH, aiY, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Ball
            ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

            // Overlays
            if (gameState === 'START') {
                drawOverlay("PONG", "Press Space to Start");
            } else if (gameState === 'SERVE') {
                drawOverlay("READY?", "Press Space to Serve");
            } else if (gameState === 'GAMEOVER') {
                const winText = playerScore >= WINNING_SCORE ? "PLAYER WINS!" : "COMPUTER WINS!";
                drawOverlay(winText, "Press Space to Restart");
            }
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 72px "Courier New"';
            ctx.fillText(title, WIDTH / 2, HEIGHT / 2 - 20);
            ctx.font = '24px "Courier New"';
            ctx.fillText(subtitle, WIDTH / 2, HEIGHT / 2 + 40);
        }

        function gameLoop(time) {
            if (!lastTime) lastTime = time;
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
