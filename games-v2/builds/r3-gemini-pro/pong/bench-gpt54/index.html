<!--
  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 30px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 800;
  const H = 600;
  const PADDLE_W = 15;
  const PADDLE_H = 100;
  const PLAYER_X = 30;
  const AI_X = 755;
  const PADDLE_SPEED = 400;
  const AI_SPEED = 350;
  const BALL_SIZE = 15;
  const BALL_BASE_SPEED = 400;
  const BALL_MAX_SPEED = 1000;
  const MAX_BOUNCE_ANGLE = Math.PI / 4;
  const WIN_SCORE = 10;
  const DT_CAP = 0.05;

  const STATES = {
    START: 'START',
    SERVE: 'SERVE',
    PLAYING: 'PLAYING',
    GAME_OVER: 'GAME_OVER'
  };

  let audioCtx = null;
  let state = STATES.START;
  let lastTime = 0;
  let winner = '';
  let firstServe = true;
  let serveDirection = 1;

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  const player = {
    x: PLAYER_X,
    y: (H - PADDLE_H) / 2,
    w: PADDLE_W,
    h: PADDLE_H,
    speed: PADDLE_SPEED,
    score: 0
  };

  const ai = {
    x: AI_X,
    y: (H - PADDLE_H) / 2,
    w: PADDLE_W,
    h: PADDLE_H,
    speed: AI_SPEED,
    score: 0
  };

  const ball = {
    x: 392.5,
    y: 292.5,
    size: BALL_SIZE,
    vx: 0,
    vy: 0,
    speed: BALL_BASE_SPEED
  };

  function resize() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = `${Math.floor(W * scale)}px`;
    canvas.style.height = `${Math.floor(H * scale)}px`;
  }

  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        try { audioCtx = new AC(); } catch {}
      }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  }

  function generateBeep(frequency, duration, type = 'square', volume = 0.03) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    } catch {}
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function resetBall() {
    ball.x = 392.5;
    ball.y = 292.5;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = BALL_BASE_SPEED;
  }

  function resetMatch() {
    player.score = 0;
    ai.score = 0;
    player.y = (H - PADDLE_H) / 2;
    ai.y = (H - PADDLE_H) / 2;
    winner = '';
    firstServe = true;
    serveDirection = Math.random() < 0.5 ? -1 : 1;
    resetBall();
    state = STATES.START;
  }

  function startServe() {
    resetBall();
    state = STATES.SERVE;
  }

  function serveBall() {
    ensureAudio();
    if (firstServe) {
      serveDirection = Math.random() < 0.5 ? -1 : 1;
      firstServe = false;
    }
    const angle = (Math.random() * 0.9 - 0.45);
    ball.vx = Math.cos(angle) * ball.speed * serveDirection;
    ball.vy = Math.sin(angle) * ball.speed;
    state = STATES.PLAYING;
  }

  function scorePoint(side) {
    if (side === 'player') {
      player.score += 1;
      serveDirection = 1;
    } else {
      ai.score += 1;
      serveDirection = -1;
    }
    generateBeep(150, 0.5, 'sawtooth', 0.04);

    if (player.score >= WIN_SCORE || ai.score >= WIN_SCORE) {
      winner = player.score >= WIN_SCORE ? 'PLAYER WINS!' : 'COMPUTER WINS!';
      state = STATES.GAME_OVER;
      resetBall();
    } else {
      startServe();
    }
  }

  function updatePlayer(dt) {
    const moveUp = keys.KeyW || keys.ArrowUp;
    const moveDown = keys.KeyS || keys.ArrowDown;
    if (moveUp) player.y -= player.speed * dt;
    if (moveDown) player.y += player.speed * dt;
    player.y = clamp(player.y, 0, H - player.h);
  }

  function updateAI(dt) {
    const aiCenter = ai.y + ai.h / 2;
    let targetY = H / 2;
    if (ball.vx > 0) targetY = ball.y + ball.size / 2;
    const diff = targetY - aiCenter;
    const step = clamp(diff, -ai.speed * dt, ai.speed * dt);
    ai.y += step;
    ai.y = clamp(ai.y, 0, H - ai.h);
  }

  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.size > b.x && a.y < b.y + b.h && a.y + a.size > b.y;
  }

  function collidePaddle(paddle, direction) {
    const intersectY = (paddle.y + (paddle.h / 2)) - (ball.y + (ball.size / 2));
    const normalizedIntersectY = intersectY / (paddle.h / 2);
    const bounceAngle = normalizedIntersectY * MAX_BOUNCE_ANGLE;
    ball.speed = Math.min(BALL_MAX_SPEED, ball.speed * 1.05);
    ball.vx = ball.speed * Math.cos(bounceAngle) * direction;
    ball.vy = ball.speed * -Math.sin(bounceAngle);
    if (direction === 1) ball.x = paddle.x + paddle.w;
    else ball.x = paddle.x - ball.size;
    generateBeep(600, 0.1, 'square', 0.035);
  }

  function updateBall(dt) {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy *= -1;
      generateBeep(300, 0.1, 'square', 0.03);
    } else if (ball.y + ball.size >= H) {
      ball.y = H - ball.size;
      ball.vy *= -1;
      generateBeep(300, 0.1, 'square', 0.03);
    }

    if (ball.vx < 0 && aabb(ball, player)) collidePaddle(player, 1);
    else if (ball.vx > 0 && aabb(ball, ai)) collidePaddle(ai, -1);

    if (ball.x + ball.size < 0) scorePoint('ai');
    else if (ball.x > W) scorePoint('player');
  }

  function update(dt) {
    updatePlayer(dt);
    if (state === STATES.PLAYING) {
      updateAI(dt);
      updateBall(dt);
    } else if (state === STATES.SERVE) {
      updateAI(dt);
    }
  }

  function drawNet() {
    ctx.fillStyle = '#fff';
    for (let y = 0; y < H; y += 24) {
      ctx.fillRect(W / 2 - 2, y + 4, 4, 14);
    }
  }

  function drawPaddle(p) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  function drawBall() {
    ctx.fillStyle = '#fff';
    ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
  }

  function drawScores() {
    ctx.fillStyle = '#fff';
    ctx.font = '48px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(String(player.score), W / 2 - 80, 36);
    ctx.fillText(String(ai.score), W / 2 + 80, 36);
  }

  function drawCenterText(title, subtitle, extra = '') {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = '64px "Courier New", monospace';
    ctx.fillText(title, W / 2, 180);
    ctx.font = '28px "Courier New", monospace';
    ctx.fillText(subtitle, W / 2, 300);
    if (extra) {
      ctx.font = '20px "Courier New", monospace';
      ctx.fillText(extra, W / 2, 348);
    }
  }

  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    drawNet();
    drawScores();
    drawPaddle(player);
    drawPaddle(ai);
    drawBall();

    if (state === STATES.START) {
      drawCenterText('PONG', 'Press Space or Enter to Start', 'W/S or Arrow Keys move');
    } else if (state === STATES.SERVE) {
      drawCenterText('SERVE', 'Press Space or Enter', serveDirection > 0 ? 'Ball will serve to the right' : 'Ball will serve to the left');
    } else if (state === STATES.GAME_OVER) {
      drawCenterText(winner, 'Press Space or Enter to Restart');
    }
  }

  function handleActions() {
    const servePressed = justPressed('Space') || justPressed('Enter');
    if (servePressed) ensureAudio();

    if (state === STATES.START && servePressed) {
      startServe();
      serveBall();
    } else if (state === STATES.SERVE && servePressed) {
      serveBall();
    } else if (state === STATES.GAME_OVER && servePressed) {
      resetMatch();
      startServe();
      serveBall();
    }
  }

  function syncPrev() {
    const watched = ['KeyW','KeyS','ArrowUp','ArrowDown','Space','Enter'];
    for (const k of watched) prevKeys[k] = !!keys[k];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleActions();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['KeyW','KeyS','ArrowUp','ArrowDown','Space','Enter'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
    if (handled.includes(e.code)) ensureAudio();
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
  });

  window.addEventListener('resize', resize);
  resize();
  resetMatch();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
