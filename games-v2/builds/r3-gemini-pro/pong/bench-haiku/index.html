  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;

    // Game states
    const STATES = { START: 'start', SERVE: 'serve', PLAYING: 'playing', GAME_OVER: 'over' };

    // Audio context (initialized on first user interaction)
    let audioCtx = null;

    function initAudioContext() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
      }
    }

    function generateBeep(frequency, duration, waveType = 'square') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = frequency;
        osc.type = waveType;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    // Game objects
    const paddle = {
      left: { x: 30, y: 250, width: 15, height: 100, speed: 400, vy: 0 },
      right: { x: 755, y: 250, width: 15, height: 100, speed: 350, vy: 0 }
    };

    const ball = {
      x: 392.5,
      y: 292.5,
      width: 15,
      height: 15,
      vx: 0,
      vy: 0,
      speed: 400,
      maxSpeed: 1000
    };

    let gameState = STATES.START;
    let score = { left: 0, right: 0 };
    let keys = {};

    // Input handling
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if ((e.key === ' ' || e.key === 'Enter') && (gameState === STATES.START || gameState === STATES.GAME_OVER)) {
        initAudioContext();
        score = { left: 0, right: 0 };
        gameState = STATES.SERVE;
        resetServe();
      } else if ((e.key === ' ' || e.key === 'Enter') && gameState === STATES.SERVE) {
        initAudioContext();
        serveStart();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Game functions
    function resetServe() {
      ball.x = 392.5;
      ball.y = 292.5;
      ball.vx = 0;
      ball.vy = 0;
      ball.speed = 400;
      paddle.left.y = 250;
      paddle.right.y = 250;
    }

    function serveStart() {
      // Random initial direction
      const angle = (Math.random() - 0.5) * 0.4; // ±22.5 degrees
      const direction = Math.random() < 0.5 ? -1 : 1;
      ball.vx = direction * ball.speed * Math.cos(angle);
      ball.vy = -ball.speed * Math.sin(angle);
      gameState = STATES.PLAYING;
    }

    function clampPaddle(paddle) {
      paddle.y = Math.max(0, Math.min(HEIGHT - paddle.height, paddle.y));
    }

    function checkPaddleCollision(paddle, ballObj) {
      // AABB collision
      if (ballObj.x < paddle.x + paddle.width &&
          ballObj.x + ballObj.width > paddle.x &&
          ballObj.y < paddle.y + paddle.height &&
          ballObj.y + ballObj.height > paddle.y) {

        // Calculate relative intersection point
        const paddleCenterY = paddle.y + paddle.height / 2;
        const ballCenterY = ballObj.y + ballObj.height / 2;
        const intersectY = paddleCenterY - ballCenterY;

        // Normalize to -1 to 1
        const normalizedIntersectY = intersectY / (paddle.height / 2);

        // Calculate bounce angle (max 45 degrees = PI/4)
        const MAX_BOUNCE_ANGLE = Math.PI / 4;
        const bounceAngle = normalizedIntersectY * MAX_BOUNCE_ANGLE;

        // Determine direction (1 for left paddle, -1 for right paddle)
        const direction = paddle === paddle.left ? 1 : -1;

        // Apply new velocity
        ballObj.vx = direction * ballObj.speed * Math.cos(bounceAngle);
        ballObj.vy = -ballObj.speed * Math.sin(bounceAngle);

        // Increase speed by 5% (up to max)
        ballObj.speed = Math.min(ballObj.speed * 1.05, ballObj.maxSpeed);

        generateBeep(600, 0.1);

        return true;
      }
      return false;
    }

    function update(dt) {
      if (gameState === STATES.START || gameState === STATES.GAME_OVER) return;

      // Player paddle input
      if (keys['w'] || keys['W'] || keys['ArrowUp']) {
        paddle.left.y -= paddle.left.speed * dt;
      }
      if (keys['s'] || keys['S'] || keys['ArrowDown']) {
        paddle.left.y += paddle.left.speed * dt;
      }

      clampPaddle(paddle.left);

      // AI paddle logic
      const ballCenterY = ball.y + ball.height / 2;
      const paddleCenterY = paddle.right.y + paddle.right.height / 2;

      if (ball.vx > 0) {
        // Ball moving toward AI, track it
        if (paddleCenterY < ballCenterY) {
          paddle.right.y += paddle.right.speed * dt;
        } else if (paddleCenterY > ballCenterY) {
          paddle.right.y -= paddle.right.speed * dt;
        }
      } else {
        // Ball moving away, return to center slowly
        if (paddleCenterY < HEIGHT / 2) {
          paddle.right.y += paddle.right.speed * 0.5 * dt;
        } else {
          paddle.right.y -= paddle.right.speed * 0.5 * dt;
        }
      }

      clampPaddle(paddle.right);

      // Update ball position
      if (gameState === STATES.PLAYING) {
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall collisions (top and bottom)
        if (ball.y <= 0 || ball.y + ball.height >= HEIGHT) {
          ball.vy = -ball.vy;
          ball.y = Math.max(0, Math.min(HEIGHT - ball.height, ball.y));
          generateBeep(300, 0.1);
        }

        // Paddle collisions
        checkPaddleCollision(paddle.left, ball);
        checkPaddleCollision(paddle.right, ball);

        // Scoring
        if (ball.x < 0) {
          score.right++;
          generateBeep(150, 0.5, 'sawtooth');
          gameState = score.right >= 10 ? STATES.GAME_OVER : STATES.SERVE;
          resetServe();
        } else if (ball.x > WIDTH) {
          score.left++;
          generateBeep(150, 0.5, 'sawtooth');
          gameState = score.left >= 10 ? STATES.GAME_OVER : STATES.SERVE;
          resetServe();
        }
      }
    }

    function render() {
      // Black background
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw center dashed line
      ctx.strokeStyle = '#FFFFFF';
      ctx.setLineDash([10, 10]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(WIDTH / 2, 0);
      ctx.lineTo(WIDTH / 2, HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(paddle.left.x, paddle.left.y, paddle.left.width, paddle.left.height);
      ctx.fillRect(paddle.right.x, paddle.right.y, paddle.right.width, paddle.right.height);

      // Draw ball
      ctx.fillRect(ball.x, ball.y, ball.width, ball.height);

      // Draw scores
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '32px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(score.left, WIDTH / 4, 50);
      ctx.fillText(score.right, (3 * WIDTH) / 4, 50);

      // Draw game state text
      if (gameState === STATES.START) {
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PONG', WIDTH / 2, HEIGHT / 2 - 40);
        ctx.font = '20px "Courier New"';
        ctx.fillText('Press Space to Start', WIDTH / 2, HEIGHT / 2 + 60);
      } else if (gameState === STATES.SERVE) {
        ctx.font = '20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('Press Space to Serve', WIDTH / 2, HEIGHT - 30);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        const winner = score.left >= 10 ? 'PLAYER WINS!' : 'COMPUTER WINS!';
        ctx.fillText(winner, WIDTH / 2, HEIGHT / 2 - 40);
        ctx.font = '20px "Courier New"';
        ctx.fillText('Press Space to Restart', WIDTH / 2, HEIGHT / 2 + 60);
      }
    }

    // Game loop
    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
