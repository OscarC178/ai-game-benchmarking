<!--
  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const W=800, H=600;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,gain,type){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.setValueAtTime(gain||0.2,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}

// ---- Input ----
const keys={},prev={};
window.addEventListener('keydown',e=>{ keys[e.code]=true; if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- Constants ----
const PAD_W=15, PAD_H=100;
const BALL_S=15;
const PAD_SPD=400, AI_SPD=350;
const BALL_BASE_SPD=400, BALL_MAX_SPD=1000;
const WIN_SCORE=10;
const MAX_BOUNCE=Math.PI/4;

const ST={START:0,SERVE:1,PLAYING:2,GAMEOVER:3};

// ---- State ----
let state=ST.START;
let playerScore=0, aiScore=0;
let winner='';
let totalTime=0;

let player={x:30, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H};
let ai={x:755, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H};
let ball={x:W/2-BALL_S/2, y:H/2-BALL_S/2, w:BALL_S, h:BALL_S, vx:0, vy:0, speed:BALL_BASE_SPD};

let serveDir=1; // 1=right, -1=left

function resetBall(dir){
  ball.x=W/2-BALL_S/2; ball.y=H/2-BALL_S/2;
  ball.vx=0; ball.vy=0; ball.speed=BALL_BASE_SPD;
  serveDir=dir;
}

function serveBall(){
  const angle=(Math.random()-0.5)*(Math.PI/4);
  ball.vx=ball.speed*Math.cos(angle)*serveDir;
  ball.vy=ball.speed*Math.sin(angle);
}

function startGame(){
  playerScore=0; aiScore=0; winner='';
  player.y=H/2-PAD_H/2;
  ai.y=H/2-PAD_H/2;
  const dir=Math.random()<0.5?1:-1;
  resetBall(dir);
  state=ST.SERVE;
}

// ---- Update ----
let lastTime=0;

function update(dt){
  totalTime+=dt;
  if(state===ST.START||state===ST.GAMEOVER) return;

  // Player movement
  if(keys['KeyW']||keys['ArrowUp']) player.y-=PAD_SPD*dt;
  if(keys['KeyS']||keys['ArrowDown']) player.y+=PAD_SPD*dt;
  player.y=Math.max(0,Math.min(H-PAD_H,player.y));

  if(state===ST.SERVE){
    ball.x=W/2-BALL_S/2; ball.y=H/2-BALL_S/2;
    return;
  }

  // AI movement
  const aiCenter=ai.y+PAD_H/2;
  const ballCenter=ball.y+BALL_S/2;
  if(ball.vx>0){
    if(ballCenter<aiCenter-5) ai.y-=AI_SPD*dt;
    else if(ballCenter>aiCenter+5) ai.y+=AI_SPD*dt;
  } else {
    // Return toward center slowly
    const center=H/2-PAD_H/2;
    if(ai.y<center-5) ai.y+=AI_SPD*0.4*dt;
    else if(ai.y>center+5) ai.y-=AI_SPD*0.4*dt;
  }
  ai.y=Math.max(0,Math.min(H-PAD_H,ai.y));

  // Move ball
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;

  // Wall collisions
  if(ball.y<=0){ ball.y=0; ball.vy=Math.abs(ball.vy); beep(300,0.1,0.15); }
  if(ball.y+BALL_S>=H){ ball.y=H-BALL_S; ball.vy=-Math.abs(ball.vy); beep(300,0.1,0.15); }

  // Paddle collisions
  function handlePaddleHit(pad, dir){
    const intersectY=(pad.y+pad.h/2)-(ball.y+BALL_S/2);
    const norm=intersectY/(pad.h/2);
    const angle=norm*MAX_BOUNCE;
    ball.speed=Math.min(BALL_MAX_SPD, ball.speed*1.05);
    ball.vx=ball.speed*Math.cos(angle)*dir;
    ball.vy=ball.speed*-Math.sin(angle);
    beep(600,0.1,0.2);
  }

  // Left paddle (player)
  if(ball.vx<0&&ball.x<=player.x+PAD_W&&ball.x>=player.x&&ball.y+BALL_S>=player.y&&ball.y<=player.y+PAD_H){
    ball.x=player.x+PAD_W;
    handlePaddleHit(player,1);
  }
  // Right paddle (AI)
  if(ball.vx>0&&ball.x+BALL_S>=ai.x&&ball.x+BALL_S<=ai.x+PAD_W+10&&ball.y+BALL_S>=ai.y&&ball.y<=ai.y+PAD_H){
    ball.x=ai.x-BALL_S;
    handlePaddleHit(ai,-1);
  }

  // Scoring
  if(ball.x+BALL_S<0){
    aiScore++;
    beep(150,0.5,0.3,'sawtooth');
    if(aiScore>=WIN_SCORE){ winner='COMPUTER WINS!'; state=ST.GAMEOVER; return; }
    resetBall(-1); state=ST.SERVE;
  }
  if(ball.x>W){
    playerScore++;
    beep(150,0.5,0.3,'sawtooth');
    if(playerScore>=WIN_SCORE){ winner='PLAYER WINS!'; state=ST.GAMEOVER; return; }
    resetBall(1); state=ST.SERVE;
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // Net
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.setLineDash([16,10]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  if(state===ST.START){
    ctx.fillStyle='#fff';
    ctx.font='bold 80px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('PONG',W/2,220);
    ctx.font='24px "Courier New",monospace';
    ctx.fillText('Press Space to Start',W/2,320);
    return;
  }

  // Scores
  ctx.fillStyle='#fff';
  ctx.font='bold 48px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText(playerScore,W/2-80,70);
  ctx.fillText(aiScore,W/2+80,70);

  // Paddles
  ctx.fillStyle='#fff';
  ctx.fillRect(player.x,player.y,player.w,player.h);
  ctx.fillRect(ai.x,ai.y,ai.w,ai.h);

  // Ball
  ctx.fillRect(ball.x,ball.y,ball.w,ball.h);

  if(state===ST.SERVE){
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='22px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText('Press Space to Serve',W/2,H-40);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold 52px "Courier New",monospace'; ctx.textAlign='center';
    ctx.fillText(winner,W/2,H/2-30);
    ctx.font='22px "Courier New",monospace';
    ctx.fillText('Press Space to Restart',W/2,H/2+40);
  }
}

// ---- Main Loop ----
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  const spaceDown=(keys['Space']||keys['Enter'])&&!(prev['Space']||prev['Enter']);
  Object.assign(prev,keys);

  if(spaceDown){
    initAC();
    if(state===ST.START||state===ST.GAMEOVER) startGame();
    else if(state===ST.SERVE){ state=ST.PLAYING; serveBall(); }
  }

  update(dt);
  render();
}

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
