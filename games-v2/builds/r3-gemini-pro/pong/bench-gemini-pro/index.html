  GAME:      Pong
  RUN:       r3-gemini-pro
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
  body {
    background-color: #000;
    color: #FFF;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }
  canvas {
    background-color: #000;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
// --- Constants & Config ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const STATE_START = 0;
const STATE_SERVE = 1;
const STATE_PLAYING = 2;
const STATE_GAMEOVER = 3;

const PADDLE_W = 15;
const PADDLE_H = 100;
const BALL_SIZE = 15;

const PLAYER_SPEED = 400;
const AI_SPEED = 350;
const BALL_BASE_SPEED = 400;
const BALL_MAX_SPEED = 1000;
const MAX_BOUNCE_ANGLE = Math.PI / 4; // 45 degrees
const WIN_SCORE = 10;

// --- State ---
let state = STATE_START;
let lastTime = 0;
let keys = { ArrowUp: false, ArrowDown: false, KeyW: false, KeyS: false };
let serveDirection = 1; // 1 for right, -1 for left

let player = { x: 30, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0 };
let ai = { x: W - 30 - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0 };
let ball = { x: W/2 - BALL_SIZE/2, y: H/2 - BALL_SIZE/2, w: BALL_SIZE, h: BALL_SIZE, vx: 0, vy: 0, speed: BALL_BASE_SPEED };

// --- Audio ---
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function generateBeep(frequency, duration, type='square') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const sfx = {
    paddleHit: () => generateBeep(600, 0.1, 'square'),
    wallHit: () => generateBeep(300, 0.1, 'square'),
    score: () => generateBeep(150, 0.5, 'sawtooth'),
    win: () => {
        [440, 554, 659, 880].forEach((f, i) => setTimeout(() => generateBeep(f, 0.15, 'square'), i * 150));
    }
};

// --- Input ---
window.addEventListener('keydown', e => {
    if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
    keys[e.code] = true;
    
    if (e.code === 'Space' || e.code === 'Enter') {
        initAudio();
        
        if (state === STATE_START) {
            player.score = 0; ai.score = 0;
            serveDirection = Math.random() > 0.5 ? 1 : -1;
            resetPositions();
            state = STATE_SERVE;
        } else if (state === STATE_SERVE) {
            launchBall();
            state = STATE_PLAYING;
        } else if (state === STATE_GAMEOVER) {
            player.score = 0; ai.score = 0;
            serveDirection = Math.random() > 0.5 ? 1 : -1;
            resetPositions();
            state = STATE_SERVE;
        }
    }
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

// --- Logic ---
function resetPositions() {
    player.y = H/2 - PADDLE_H/2;
    ai.y = H/2 - PADDLE_H/2;
    ball.x = W/2 - BALL_SIZE/2;
    ball.y = H/2 - BALL_SIZE/2;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = BALL_BASE_SPEED;
}

function launchBall() {
    // Randomize initial vertical angle a bit
    const angle = (Math.random() * 0.5 - 0.25) * Math.PI; 
    ball.vx = ball.speed * Math.cos(angle) * serveDirection;
    ball.vy = ball.speed * Math.sin(angle);
}

function checkAABB(r1, r2) {
    return r1.x < r2.x + r2.w &&
           r1.x + r1.w > r2.x &&
           r1.y < r2.y + r2.h &&
           r1.y + r1.h > r2.y;
}

function handlePaddleCollision(paddle, isLeft) {
    sfx.paddleHit();
    
    // Reposition ball to avoid double-collision trapping
    ball.x = isLeft ? paddle.x + paddle.w : paddle.x - ball.w;
    
    let ballCenterY = ball.y + ball.h/2;
    let paddleCenterY = paddle.y + paddle.h/2;
    let intersectY = paddleCenterY - ballCenterY;
    let normalizedIntersectY = intersectY / (paddle.h / 2);
    
    // Clamp just in case
    normalizedIntersectY = Math.max(-1, Math.min(1, normalizedIntersectY));
    
    let bounceAngle = normalizedIntersectY * MAX_BOUNCE_ANGLE;
    
    ball.speed = Math.min(BALL_MAX_SPEED, ball.speed * 1.05);
    
    let dir = isLeft ? 1 : -1;
    ball.vx = ball.speed * Math.cos(bounceAngle) * dir;
    ball.vy = ball.speed * -Math.sin(bounceAngle);
}

function update(dt) {
    if (state !== STATE_PLAYING) return;

    // --- Player Movement ---
    if (keys.ArrowUp || keys.KeyW) player.y -= PLAYER_SPEED * dt;
    if (keys.ArrowDown || keys.KeyS) player.y += PLAYER_SPEED * dt;
    
    if (player.y < 0) player.y = 0;
    if (player.y + player.h > H) player.y = H - player.h;

    // --- AI Movement ---
    let aiCenterY = ai.y + ai.h/2;
    if (ball.vx > 0) {
        // Ball approaching AI
        let targetY = ball.y + ball.h/2;
        if (aiCenterY < targetY - 10) ai.y += AI_SPEED * dt;
        else if (aiCenterY > targetY + 10) ai.y -= AI_SPEED * dt;
    } else {
        // Ball moving away, return to center
        let targetY = H/2;
        if (aiCenterY < targetY - 5) ai.y += (AI_SPEED * 0.5) * dt;
        else if (aiCenterY > targetY + 5) ai.y -= (AI_SPEED * 0.5) * dt;
    }
    
    if (ai.y < 0) ai.y = 0;
    if (ai.y + ai.h > H) ai.y = H - ai.h;

    // --- Ball Movement ---
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Wall Top/Bottom collisions
    if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
        sfx.wallHit();
    } else if (ball.y + ball.h >= H) {
        ball.y = H - ball.h;
        ball.vy = -ball.vy;
        sfx.wallHit();
    }

    // Paddle collisions
    if (ball.vx < 0 && checkAABB(ball, player)) {
        handlePaddleCollision(player, true);
    } else if (ball.vx > 0 && checkAABB(ball, ai)) {
        handlePaddleCollision(ai, false);
    }

    // Scoring
    if (ball.x < 0) {
        ai.score++;
        serveDirection = -1; // Serve to loser
        sfx.score();
        checkWin();
    } else if (ball.x > W) {
        player.score++;
        serveDirection = 1;
        sfx.score();
        checkWin();
    }
}

function checkWin() {
    if (player.score >= WIN_SCORE || ai.score >= WIN_SCORE) {
        state = STATE_GAMEOVER;
        sfx.win();
    } else {
        resetPositions();
        state = STATE_SERVE;
    }
}

// --- Render ---
function drawRect(r) { ctx.fillRect(Math.floor(r.x), Math.floor(r.y), r.w, r.h); }

function drawText(text, x, y, size, align='center') {
    ctx.font = `${size}px 'Courier New', Courier, monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    
    ctx.fillStyle = '#FFF';

    if (state === STATE_START) {
        drawText("PONG", W/2, H/2 - 50, 80);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press Space to Start", W/2, H/2 + 50, 24);
        return;
    }

    // Center line
    ctx.beginPath();
    ctx.setLineDash([15, 15]);
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.setLineDash([]);

    // Scores
    drawText(player.score, W/4, 80, 80);
    drawText(ai.score, W*3/4, 80, 80);

    // Objects
    drawRect(player);
    drawRect(ai);
    drawRect(ball);

    if (state === STATE_SERVE) {
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press Space to Serve", W/2, H/2 + 100, 20);
    } else if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#FFF';
        
        let msg = player.score >= WIN_SCORE ? "PLAYER WINS!" : "COMPUTER WINS!";
        drawText(msg, W/2, H/2 - 40, 50);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press Space to Restart", W/2, H/2 + 40, 24);
    }
}

// --- Main Loop ---
function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    
    if (dt > 0.1) dt = 0.1; // clamp delta
    
    update(dt);
    render();
    
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
