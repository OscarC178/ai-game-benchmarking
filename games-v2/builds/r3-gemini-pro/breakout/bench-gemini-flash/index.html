  RUN:       r3-gemini-pro

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BREAKOUT - Arcade Classic </title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 15;
        const PADDLE_SPEED = 500;
        const BALL_RADIUS = 8;
        const BALL_BASE_SPEED = 400;
        const BRICK_ROWS = 8;
        const BRICK_COLS = 14;
        const BRICK_WIDTH = 50;
        const BRICK_HEIGHT = 20;
        const BRICK_PADDING = 5;
        const BRICK_OFFSET_TOP = 50;
        const BRICK_OFFSET_LEFT = (CANVAS_WIDTH - (BRICK_COLS * (BRICK_WIDTH + BRICK_PADDING))) / 2 + BRICK_PADDING/2;
        const MAX_BOUNCE_ANGLE = Math.PI / 3; // 60 degrees

        // Game State Variables
        let gameState = 'START'; // START, PLAYING, SERVE, GAMEOVER, VICTORY
        let score = 0;
        let lives = 3;
        let lastTime = 0;
        let keys = {};

        const paddle = {
            x: 350,
            y: 550,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT
        };

        const ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: BALL_RADIUS,
            speed: BALL_BASE_SPEED,
            prevX: 0,
            prevY: 0
        };

        let bricks = [];

        // Audio Setup
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, duration, type = 'square', ramp = false) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (ramp) {
                osc.frequency.linearRampToValueAtTime(ramp, audioCtx.currentTime + duration);
            }
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Initialization
        function initBricks() {
            bricks = [];
            const colors = ['#FF0000', '#FF0000', '#FFA500', '#FFA500', '#FFFF00', '#FFFF00', '#00FF00', '#00FF00'];
            const points = [7, 7, 5, 5, 3, 3, 1, 1];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + BRICK_PADDING),
                        y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + BRICK_PADDING),
                        status: 1,
                        color: colors[r],
                        points: points[r]
                    });
                }
            }
        }

        function resetBall() {
            ball.speed = BALL_BASE_SPEED;
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius;
            ball.vx = 0;
            ball.vy = 0;
        }

        // Input Handling
        window.addEventListener('keydown', e => keys[e.code || e.key] = true);
        window.addEventListener('keyup', e => keys[e.code || e.key] = false);
        window.addEventListener('mousemove', e => {
            if (gameState === 'PLAYING' || gameState === 'SERVE' || gameState === 'START') {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - paddle.width, mouseX - paddle.width / 2));
            }
        });
        window.addEventListener('mousedown', handleClick);
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.key === ' ') {
                handleClick();
            }
        });

        function handleClick() {
            initAudio();
            if (gameState === 'START' || gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                score = 0;
                lives = 3;
                initBricks();
                gameState = 'SERVE';
                resetBall();
            } else if (gameState === 'SERVE') {
                const angle = (Math.random() * 0.4 - 0.2) * Math.PI; // random start angle
                ball.vx = ball.speed * Math.sin(angle);
                ball.vy = -ball.speed * Math.cos(angle);
                gameState = 'PLAYING';
            }
        }

        // Logic & Physics
        function update(dt) {
            if (gameState === 'START' || gameState === 'GAMEOVER' || gameState === 'VICTORY') return;

            // Paddle move
            if (keys['ArrowLeft'] || keys['KeyA']) {
                paddle.x -= PADDLE_SPEED * dt;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                paddle.x += PADDLE_SPEED * dt;
            }
            paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - paddle.width, paddle.x));

            if (gameState === 'SERVE') {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
                return;
            }

            // Ball physics
            ball.prevX = ball.x;
            ball.prevY = ball.y;
            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;

            // Wall collision
            if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= CANVAS_WIDTH) {
                ball.vx = -ball.vx;
                ball.x = ball.x <= ball.radius ? ball.radius : CANVAS_WIDTH - ball.radius;
                playSound(300, 0.05);
            }
            if (ball.y - ball.radius <= 0) {
                ball.vy = -ball.vy;
                ball.y = ball.radius;
                playSound(300, 0.05);
            }

            // Paddle collision
            if (ball.vy > 0 && 
                ball.y + ball.radius >= paddle.y && 
                ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x >= paddle.x && 
                ball.x <= paddle.x + paddle.width) {
                
                const hitPoint = ball.x - (paddle.x + paddle.width / 2);
                const hitPointNormalized = hitPoint / (paddle.width / 2);
                const angle = hitPointNormalized * MAX_BOUNCE_ANGLE;
                
                ball.vx = ball.speed * Math.sin(angle);
                ball.vy = -ball.speed * Math.cos(angle);
                ball.y = paddle.y - ball.radius;
                
                playSound(400, 0.05);
            }

            // Brick collision
            let hitAnyBrick = false;
            for (let i = 0; i < bricks.length; i++) {
                const b = bricks[i];
                if (b.status === 1) {
                    if (ball.x + ball.radius >= b.x && ball.x - ball.radius <= b.x + BRICK_WIDTH &&
                        ball.y + ball.radius >= b.y && ball.y - ball.radius <= b.y + BRICK_HEIGHT) {
                        
                        b.status = 0;
                        score += b.points;
                        ball.speed *= 1.02; // Increase speed slightly
                        hitAnyBrick = true;

                        // Resolve side
                        if (ball.prevY + ball.radius <= b.y || ball.prevY - ball.radius >= b.y + BRICK_HEIGHT) {
                            ball.vy = -ball.vy;
                        } else {
                            ball.vx = -ball.vx;
                        }

                        playSound(800, 0.05);
                        break; // Only one brick per frame
                    }
                }
            }

            // Death/Win Check
            if (ball.y > CANVAS_HEIGHT) {
                lives--;
                playSound(150, 0.5, 'sawtooth', 50);
                if (lives <= 0) {
                    gameState = 'GAMEOVER';
                } else {
                    gameState = 'SERVE';
                    resetBall();
                }
            }

            if (bricks.every(b => b.status === 0)) {
                gameState = 'VICTORY';
            }
        }

        // Draw
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // UI
            ctx.fillStyle = '#FFF';
            ctx.font = '20px "Courier New"';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`Lives: ${lives}`, CANVAS_WIDTH - 20, 30);

            // Bricks
            bricks.forEach(b => {
                if (b.status === 1) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, BRICK_WIDTH, BRICK_HEIGHT);
                }
            });

            // Paddle
            ctx.fillStyle = '#FFF';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            // Ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Overlay Text
            ctx.textAlign = 'center';
            if (gameState === 'START') {
                ctx.font = 'bold 60px "Courier New"';
                ctx.fillText('BREAKOUT', CANVAS_WIDTH/2, 300);
                ctx.font = '20px "Courier New"';
                ctx.fillText('Press Space to Start', CANVAS_WIDTH/2, 350);
            } else if (gameState === 'SERVE') {
                ctx.font = '20px "Courier New"';
                ctx.fillText('Press Space to Serve', CANVAS_WIDTH/2, 400);
            } else if (gameState === 'GAMEOVER') {
                ctx.font = 'bold 60px "Courier New"';
                ctx.fillText('GAME OVER', CANVAS_WIDTH/2, 300);
                ctx.font = '20px "Courier New"';
                ctx.fillText(`Final Score: ${score}`, CANVAS_WIDTH/2, 350);
                ctx.fillText('Press Space to Play Again', CANVAS_WIDTH/2, 400);
            } else if (gameState === 'VICTORY') {
                ctx.font = 'bold 60px "Courier New"';
                ctx.fillStyle = '#0F0';
                ctx.fillText('YOU WIN!', CANVAS_WIDTH/2, 300);
                ctx.fillStyle = '#FFF';
                ctx.font = '20px "Courier New"';
                ctx.fillText('Press Space to Play Again', CANVAS_WIDTH/2, 350);
            }
        }

        function loop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        initBricks();
        resetBall();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
