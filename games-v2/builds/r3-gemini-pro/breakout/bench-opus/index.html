<!--
  GAME:      Breakout
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600,PI=Math.PI;

// Audio
let ac=null;
function initAudio(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.06;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndPaddle(){beep(400,0.05,0.07);}
function sndBrick(row){beep(600+row*50,0.05,0.08);}
function sndWall(){beep(300,0.05,0.05);}
function sndLose(){beep(150,0.5,0.1,'sawtooth');}

// States
const ST_TITLE=0,ST_SERVE=1,ST_PLAY=2,ST_OVER=3,ST_WIN=4;
let state=ST_TITLE;

// Paddle
const PW=100,PH=15,P_SPEED=500,P_Y=550;
let padX;

// Ball
const BR=8,BASE_SPEED=400;
let ballX,ballY,ballVX,ballVY,ballSpeed;

// Bricks
const B_ROWS=8,B_COLS=14,BW=50,BH=20,B_PAD=5,B_TOP=50;
const B_OFFSET_X=(W-(B_COLS*BW+(B_COLS-1)*B_PAD))/2;
const ROW_COLORS=['#FF0000','#FF0000','#FFA500','#FFA500','#FFFF00','#FFFF00','#00FF00','#00FF00'];
const ROW_POINTS=[7,7,5,5,3,3,1,1];
let bricks,bricksAlive;

let score,lives;

function createBricks(){
  bricks=[];bricksAlive=0;
  for(let r=0;r<B_ROWS;r++){
    bricks[r]=[];
    for(let c=0;c<B_COLS;c++){
      bricks[r][c]={
        x:B_OFFSET_X+c*(BW+B_PAD),
        y:B_TOP+r*(BH+B_PAD),
        w:BW,h:BH,
        color:ROW_COLORS[r],
        points:ROW_POINTS[r],
        alive:true
      };
      bricksAlive++;
    }
  }
}

function resetBall(){
  ballX=padX+PW/2;
  ballY=P_Y-BR;
  ballVX=0;ballVY=0;
  ballSpeed=BASE_SPEED;
}

function launchBall(){
  const angle=(Math.random()-0.5)*PI/3; // random ±30°
  ballVX=ballSpeed*Math.sin(angle);
  ballVY=-ballSpeed*Math.cos(angle);
}

function startGame(){
  score=0;lives=3;
  padX=350;
  createBricks();
  resetBall();
  state=ST_SERVE;
}

// Input
const keys={};
let mouseX=-1;
addEventListener('keydown',e=>{keys[e.code]=true;initAudio();
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault();
    if(state===ST_TITLE||state===ST_OVER||state===ST_WIN)startGame();
    else if(state===ST_SERVE){launchBall();state=ST_PLAY;}
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
});
cv.addEventListener('click',e=>{
  initAudio();
  if(state===ST_SERVE){launchBall();state=ST_PLAY;}
});

function update(dt){
  if(state!==ST_PLAY&&state!==ST_SERVE)return;

  // Paddle movement
  if(mouseX>=0){
    padX=mouseX-PW/2;
  }else{
    if(keys['ArrowLeft']||keys['KeyA'])padX-=P_SPEED*dt;
    if(keys['ArrowRight']||keys['KeyD'])padX+=P_SPEED*dt;
  }
  // Also allow keyboard override when mouse present
  if(keys['ArrowLeft']||keys['KeyA'])padX-=P_SPEED*dt;
  if(keys['ArrowRight']||keys['KeyD'])padX+=P_SPEED*dt;
  padX=Math.max(0,Math.min(W-PW,padX));

  if(state===ST_SERVE){
    ballX=padX+PW/2;ballY=P_Y-BR;
    return;
  }

  // Ball movement
  ballX+=ballVX*dt;
  ballY+=ballVY*dt;

  // Wall collisions
  if(ballX-BR<=0){ballX=BR;ballVX=Math.abs(ballVX);sndWall();}
  if(ballX+BR>=W){ballX=W-BR;ballVX=-Math.abs(ballVX);sndWall();}
  if(ballY-BR<=0){ballY=BR;ballVY=Math.abs(ballVY);sndWall();}

  // Bottom death
  if(ballY+BR>=H){
    lives--;sndLose();
    if(lives<=0){state=ST_OVER;return;}
    resetBall();state=ST_SERVE;return;
  }

  // Paddle collision
  if(ballVY>0&&ballY+BR>=P_Y&&ballY+BR<=P_Y+PH+10&&
     ballX>=padX-BR&&ballX<=padX+PW+BR){
    const hitNorm=((ballX-(padX+PW/2))/(PW/2));
    const clamped=Math.max(-1,Math.min(1,hitNorm));
    const maxAngle=PI/3;
    const angle=clamped*maxAngle;
    ballVX=ballSpeed*Math.sin(angle);
    ballVY=-ballSpeed*Math.cos(angle);
    ballY=P_Y-BR;
    sndPaddle();
  }

  // Brick collisions
  for(let r=0;r<B_ROWS;r++){
    for(let c=0;c<B_COLS;c++){
      const b=bricks[r][c];
      if(!b.alive)continue;
      // AABB circle-rect overlap
      const cx2=Math.max(b.x,Math.min(ballX,b.x+b.w));
      const cy2=Math.max(b.y,Math.min(ballY,b.y+b.h));
      const dx=ballX-cx2,dy=ballY-cy2;
      if(dx*dx+dy*dy<BR*BR){
        b.alive=false;bricksAlive--;
        score+=b.points;
        ballSpeed*=1.02;
        sndBrick(r);
        // Determine reflection side
        const overlapL=ballX+BR-b.x;
        const overlapR=(b.x+b.w)-(ballX-BR);
        const overlapT=ballY+BR-b.y;
        const overlapB=(b.y+b.h)-(ballY-BR);
        const minX=Math.min(overlapL,overlapR);
        const minY=Math.min(overlapT,overlapB);
        if(minX<minY)ballVX=-ballVX;
        else ballVY=-ballVY;
        if(bricksAlive<=0){state=ST_WIN;}
        return; // one brick per frame
      }
    }
  }
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#0ff';cx.font='bold 56px monospace';cx.textAlign='center';
    cx.fillText('BREAKOUT',W/2,240);
    cx.fillStyle='#fff';cx.font='20px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Start',W/2,330);
    return;
  }

  // Bricks
  for(let r=0;r<B_ROWS;r++){
    for(let c=0;c<B_COLS;c++){
      const b=bricks[r][c];
      if(!b.alive)continue;
      cx.fillStyle=b.color;
      cx.fillRect(b.x,b.y,b.w,b.h);
      // Subtle highlight
      cx.fillStyle='rgba(255,255,255,0.15)';
      cx.fillRect(b.x,b.y,b.w,3);
    }
  }

  // Paddle
  cx.fillStyle='#0ff';
  cx.fillRect(padX,P_Y,PW,PH);

  // Ball
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(ballX,ballY,BR,0,PI*2);cx.fill();

  // HUD
  cx.fillStyle='#fff';cx.font='18px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,15,30);
  cx.textAlign='right';
  cx.fillText('Lives: '+lives,W-15,30);

  // Serve prompt
  if(state===ST_SERVE){
    cx.fillStyle='rgba(255,255,255,0.6)';cx.font='18px monospace';cx.textAlign='center';
    cx.fillText('Press Space to Launch',W/2,H/2+60);
  }

  // Game over
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-30);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+20);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Restart',W/2,H/2+60);
  }

  // Victory
  if(state===ST_WIN){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#0f0';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('YOU WIN!',W/2,H/2-30);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+20);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Restart',W/2,H/2+60);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
