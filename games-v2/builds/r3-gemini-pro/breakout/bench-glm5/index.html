<!--
  GAME:      Breakout
  RUN:       r3-gemini-pro
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; cursor: none; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_START = 0;
    const STATE_SERVE = 1;
    const STATE_PLAYING = 2;
    const STATE_GAMEOVER = 3;
    const STATE_VICTORY = 4;
    
    // Paddle
    const PADDLE_W = 100;
    const PADDLE_H = 15;
    const PADDLE_Y = 550;
    const PADDLE_SPEED = 500;
    
    // Ball
    const BALL_RADIUS = 8;
    const BALL_SPEED = 400;
    
    // Bricks
    const BRICK_ROWS = 8;
    const BRICK_COLS = 14;
    const BRICK_W = 50;
    const BRICK_H = 20;
    const BRICK_PAD = 5;
    const BRICK_OFFSET_X = Math.floor((W - (BRICK_COLS * BRICK_W + (BRICK_COLS - 1) * BRICK_PAD)) / 2);
    const BRICK_OFFSET_Y = 50;
    
    // Colors by row
    const BRICK_COLORS = [
      '#FF0000', '#FF0000',  // Red - 7 pts
      '#FFA500', '#FFA500',  // Orange - 5 pts
      '#FFFF00', '#FFFF00',  // Yellow - 3 pts
      '#00FF00', '#00FF00'   // Green - 1 pt
    ];
    
    const BRICK_POINTS = [7, 7, 5, 5, 3, 3, 1, 1];
    
    // ==================== GAME STATE ====================
    let state = STATE_START;
    let score = 0;
    let lives = 3;
    let bricks = [];
    
    let paddle = {
      x: W / 2 - PADDLE_W / 2,
      y: PADDLE_Y,
      w: PADDLE_W,
      h: PADDLE_H
    };
    
    let ball = {
      x: W / 2,
      y: PADDLE_Y - BALL_RADIUS,
      vx: 0,
      vy: 0,
      radius: BALL_RADIUS,
      speed: BALL_SPEED
    };
    
    // Input
    const keys = {};
    let mouseX = W / 2;
    
    // Audio
    let audioCtx = null;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }
    
    function playTone(freq, duration, type = 'square') {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playPaddleHit() { playTone(400, 0.05, 'square'); }
    function playBrickHit(row) { playTone(600 + row * 50, 0.05, 'square'); }
    function playWallHit() { playTone(300, 0.05, 'square'); }
    function playLifeLost() {
      playTone(150, 0.2, 'sawtooth');
      setTimeout(() => playTone(100, 0.2, 'sawtooth'), 200);
      setTimeout(() => playTone(50, 0.3, 'sawtooth'), 400);
    }
    
    // ==================== INITIALIZATION ====================
    function initBricks() {
      bricks = [];
      for (let row = 0; row < BRICK_ROWS; row++) {
        bricks[row] = [];
        for (let col = 0; col < BRICK_COLS; col++) {
          const x = BRICK_OFFSET_X + col * (BRICK_W + BRICK_PAD);
          const y = BRICK_OFFSET_Y + row * (BRICK_H + BRICK_PAD);
          bricks[row][col] = {
            x: x,
            y: y,
            status: 1,
            color: BRICK_COLORS[row],
            points: BRICK_POINTS[row]
          };
        }
      }
    }
    
    function resetBall() {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.radius - 1;
      ball.vx = 0;
      ball.vy = 0;
      ball.speed = BALL_SPEED;
    }
    
    function serveBall() {
      const angle = (Math.random() - 0.5) * Math.PI / 3;
      ball.vx = ball.speed * Math.sin(angle);
      ball.vy = -ball.speed * Math.cos(angle);
    }
    
    function startGame() {
      score = 0;
      lives = 3;
      paddle.x = W / 2 - PADDLE_W / 2;
      initBricks();
      resetBall();
      state = STATE_SERVE;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      if (state === STATE_START) {
        if (keys['Space'] || keys['Enter']) {
          initAudio();
          startGame();
          keys['Space'] = false;
          keys['Enter'] = false;
        }
        return;
      }
      
      if (state === STATE_SERVE) {
        updatePaddle(dt);
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.radius - 1;
        
        if (keys['Space'] || keys['Enter']) {
          serveBall();
          state = STATE_PLAYING;
          keys['Space'] = false;
          keys['Enter'] = false;
        }
        return;
      }
      
      if (state === STATE_GAMEOVER || state === STATE_VICTORY) {
        if (keys['Space'] || keys['Enter']) {
          startGame();
          keys['Space'] = false;
          keys['Enter'] = false;
        }
        return;
      }
      
      // Playing state
      updatePaddle(dt);
      updateBall(dt);
      checkCollisions();
      checkWinCondition();
    }
    
    function updatePaddle(dt) {
      // Keyboard input
      if (keys['ArrowLeft'] || keys['KeyA']) {
        paddle.x -= PADDLE_SPEED * dt;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        paddle.x += PADDLE_SPEED * dt;
      }
      
      // Mouse input (takes priority if mouse moved)
      paddle.x = mouseX - paddle.w / 2;
      
      // Clamp to screen
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    }
    
    function updateBall(dt) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
    }
    
    function checkCollisions() {
      // Wall collisions
      if (ball.x - ball.radius <= 0) {
        ball.x = ball.radius;
        ball.vx = Math.abs(ball.vx);
        playWallHit();
      }
      if (ball.x + ball.radius >= W) {
        ball.x = W - ball.radius;
        ball.vx = -Math.abs(ball.vx);
        playWallHit();
      }
      if (ball.y - ball.radius <= 0) {
        ball.y = ball.radius;
        ball.vy = Math.abs(ball.vy);
        playWallHit();
      }
      
      // Bottom - lose life
      if (ball.y + ball.radius >= H) {
        lives--;
        playLifeLost();
        if (lives <= 0) {
          state = STATE_GAMEOVER;
        } else {
          resetBall();
          state = STATE_SERVE;
        }
        return;
      }
      
      // Paddle collision
      if (ball.vy > 0 && 
          ball.y + ball.radius >= paddle.y &&
          ball.y - ball.radius <= paddle.y + paddle.h &&
          ball.x >= paddle.x &&
          ball.x <= paddle.x + paddle.w) {
        
        // Calculate hit position (-1 to 1)
        const hitPoint = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const normalizedHit = Math.max(-1, Math.min(1, hitPoint));
        
        // Calculate bounce angle (max 60 degrees = PI/3)
        const maxAngle = Math.PI / 3;
        const angle = normalizedHit * maxAngle;
        
        // Apply new velocity
        ball.vx = ball.speed * Math.sin(angle);
        ball.vy = -ball.speed * Math.cos(angle);
        
        // Move ball above paddle
        ball.y = paddle.y - ball.radius - 1;
        
        playPaddleHit();
      }
      
      // Brick collisions
      let brickHit = false;
      const prevX = ball.x - ball.vx / 60;
      const prevY = ball.y - ball.vy / 60;
      
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          const brick = bricks[row][col];
          if (brick.status !== 1) continue;
          
          // AABB collision
          if (ball.x + ball.radius > brick.x &&
              ball.x - ball.radius < brick.x + BRICK_W &&
              ball.y + ball.radius > brick.y &&
              ball.y - ball.radius < brick.y + BRICK_H) {
            
            brick.status = 0;
            score += brick.points;
            
            // Determine collision side
            const overlapLeft = (ball.x + ball.radius) - brick.x;
            const overlapRight = (brick.x + BRICK_W) - (ball.x - ball.radius);
            const overlapTop = (ball.y + ball.radius) - brick.y;
            const overlapBottom = (brick.y + BRICK_H) - (ball.y - ball.radius);
            
            const minOverlapX = Math.min(overlapLeft, overlapRight);
            const minOverlapY = Math.min(overlapTop, overlapBottom);
            
            if (!brickHit) {
              if (minOverlapX < minOverlapY) {
                ball.vx = -ball.vx;
              } else {
                ball.vy = -ball.vy;
              }
              brickHit = true;
            }
            
            // Increase speed
            ball.speed = Math.min(ball.speed * 1.02, 800);
            
            playBrickHit(row);
          }
        }
      }
    }
    
    function checkWinCondition() {
      let bricksRemaining = 0;
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          if (bricks[row][col].status === 1) bricksRemaining++;
        }
      }
      
      if (bricksRemaining === 0) {
        state = STATE_VICTORY;
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      // Clear
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_START) {
        drawStartScreen();
        return;
      }
      
      // Draw bricks
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          const brick = bricks[row][col];
          if (brick.status === 1) {
            ctx.fillStyle = brick.color;
            ctx.fillRect(brick.x, brick.y, BRICK_W, BRICK_H);
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(brick.x, brick.y, BRICK_W, 3);
          }
        }
      }
      
      // Draw paddle
      ctx.fillStyle = '#00FFFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      
      // Draw ball
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw HUD
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 15, 30);
      
      ctx.textAlign = 'right';
      ctx.fillText(`Lives: ${lives}`, W - 15, 30);
      
      if (state === STATE_SERVE) {
        drawServePrompt();
      } else if (state === STATE_GAMEOVER) {
        drawGameOver();
      } else if (state === STATE_VICTORY) {
        drawVictory();
      }
    }
    
    function drawStartScreen() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 72px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BREAKOUT', W / 2, H / 2 - 80);
      
      ctx.font = '24px Courier New, monospace';
      ctx.fillText('Destroy all bricks to win', W / 2, H / 2);
      ctx.fillText('Use paddle to bounce the ball', W / 2, H / 2 + 35);
      ctx.fillText('Don\'t let the ball fall', W / 2, H / 2 + 70);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillText('Press Space to Start', W / 2, H / 2 + 140);
      }
      
      ctx.font = '16px Courier New, monospace';
      ctx.fillText('Arrow Keys or Mouse to move', W / 2, H / 2 + 200);
    }
    
    function drawServePrompt() {
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Courier New, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Press Space to Serve', W / 2, H / 2 + 150);
      }
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#F00';
      ctx.font = 'bold 64px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '32px Courier New, monospace';
      ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 30);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = '24px Courier New, monospace';
        ctx.fillText('Press Space to Restart', W / 2, H / 2 + 100);
      }
    }
    
    function drawVictory() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#0F0';
      ctx.font = 'bold 64px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', W / 2, H / 2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '32px Courier New, monospace';
      ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 30);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = '24px Courier New, monospace';
        ctx.fillText('Press Space to Play Again', W / 2, H / 2 + 100);
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (W / rect.width);
    });
    
    canvas.addEventListener('click', () => {
      if (state === STATE_START) {
        initAudio();
        startGame();
      } else if (state === STATE_SERVE) {
        serveBall();
        state = STATE_PLAYING;
      } else if (state === STATE_GAMEOVER || state === STATE_VICTORY) {
        startGame();
      }
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
