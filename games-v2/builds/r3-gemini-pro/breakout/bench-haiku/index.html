<!--
  GAME:      Breakout
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="breakoutCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('breakoutCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;

    // Game states
    const STATES = { START: 'start', PLAYING: 'playing', WAITING: 'waiting', GAME_OVER: 'over', VICTORY: 'victory' };

    // Audio context
    let audioCtx = null;

    function initAudioContext() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
      }
    }

    function playSound(frequency, duration, waveType = 'square') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = frequency;
        osc.type = waveType;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {}
    }

    // Game objects
    const paddle = {
      x: 350,
      y: 550,
      width: 100,
      height: 15,
      speed: 500
    };

    const ball = {
      x: 400,
      y: 535,
      radius: 8,
      vx: 0,
      vy: 0,
      speed: 400,
      maxSpeed: 600
    };

    // Bricks setup
    const BRICK_WIDTH = 50;
    const BRICK_HEIGHT = 20;
    const BRICK_COLS = 14;
    const BRICK_ROWS = 8;
    const BRICK_SPACING = 5;
    const BRICK_TOP = 50;
    const BRICK_COLORS = [
      '#FF0000', '#FF0000', // Red - 7 pts
      '#FFA500', '#FFA500', // Orange - 5 pts
      '#FFFF00', '#FFFF00', // Yellow - 3 pts
      '#00FF00', '#00FF00'  // Green - 1 pt
    ];
    const BRICK_POINTS = [7, 7, 5, 5, 3, 3, 1, 1];

    let bricks = [];
    let gameState = STATES.START;
    let score = 0;
    let lives = 3;
    let keys = {};
    let mouseX = WIDTH / 2;
    let ballOnPaddle = true;
    let ballPrevX = ball.x;
    let ballPrevY = ball.y;

    function initBricks() {
      bricks = [];
      let brickIndex = 0;
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          const x = BRICK_SPACING + col * (BRICK_WIDTH + BRICK_SPACING);
          const y = BRICK_TOP + row * (BRICK_HEIGHT + BRICK_SPACING);
          bricks.push({
            x: x,
            y: y,
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            status: 1,
            color: BRICK_COLORS[row],
            points: BRICK_POINTS[row]
          });
          brickIndex++;
        }
      }
    }

    function resetBall() {
      ball.x = paddle.x + paddle.width / 2;
      ball.y = paddle.y - ball.radius - 10;
      ball.vx = 0;
      ball.vy = 0;
      ballOnPaddle = true;
      ballPrevX = ball.x;
      ballPrevY = ball.y;
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if ((e.key === ' ') && (gameState === STATES.START || gameState === STATES.WAITING || gameState === STATES.GAME_OVER || gameState === STATES.VICTORY)) {
        initAudioContext();
        if (gameState === STATES.START) {
          gameState = STATES.PLAYING;
          score = 0;
          lives = 3;
          ball.speed = 400;
          initBricks();
          resetBall();
        } else if (gameState === STATES.WAITING) {
          gameState = STATES.PLAYING;
          ball.vx = Math.random() < 0.5 ? 1 : -1;
          ball.vy = -1;
          const norm = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          ball.vx = (ball.vx / norm) * ball.speed;
          ball.vy = (ball.vy / norm) * ball.speed;
          ballOnPaddle = false;
        } else if (gameState === STATES.GAME_OVER || gameState === STATES.VICTORY) {
          gameState = STATES.START;
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    document.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
    });

    document.addEventListener('click', () => {
      if (gameState === STATES.WAITING) {
        gameState = STATES.PLAYING;
        ball.vx = Math.random() < 0.5 ? 1 : -1;
        ball.vy = -1;
        const norm = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = (ball.vx / norm) * ball.speed;
        ball.vy = (ball.vy / norm) * ball.speed;
        ballOnPaddle = false;
      }
    });

    function update(dt) {
      if (gameState !== STATES.PLAYING) return;

      // Paddle movement
      if (keys['arrowleft'] || keys['a']) {
        paddle.x -= paddle.speed * dt;
      }
      if (keys['arrowright'] || keys['d']) {
        paddle.x += paddle.speed * dt;
      }

      // Mouse control (optional)
      paddle.x = Math.max(0, Math.min(WIDTH - paddle.width, mouseX - paddle.width / 2));

      // Ball on paddle
      if (ballOnPaddle) {
        ball.x = paddle.x + paddle.width / 2;
        ball.y = paddle.y - ball.radius - 10;
      } else {
        // Update ball position
        ballPrevX = ball.x;
        ballPrevY = ball.y;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall collisions
        if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= WIDTH) {
          ball.vx = -ball.vx;
          ball.x = Math.max(ball.radius, Math.min(WIDTH - ball.radius, ball.x));
          playSound(300, 0.05);
        }
        if (ball.y - ball.radius <= 0) {
          ball.vy = -ball.vy;
          ball.y = ball.radius;
          playSound(300, 0.05);
        }

        // Bottom (lose life)
        if (ball.y + ball.radius >= HEIGHT) {
          lives--;
          playSound(150, 0.5);
          if (lives > 0) {
            gameState = STATES.WAITING;
            resetBall();
          } else {
            gameState = STATES.GAME_OVER;
          }
          return;
        }

        // Paddle collision
        if (ball.x + ball.radius > paddle.x &&
            ball.x - ball.radius < paddle.x + paddle.width &&
            ball.y + ball.radius > paddle.y &&
            ball.y - ball.radius < paddle.y + paddle.height) {
          
          const hitPoint = ball.x - (paddle.x + paddle.width / 2);
          const normalizedHit = hitPoint / (paddle.width / 2);
          const MAX_ANGLE = Math.PI / 3; // 60 degrees
          const angle = normalizedHit * MAX_ANGLE;
          
          ball.vx = ball.speed * Math.sin(angle);
          ball.vy = -ball.speed * Math.cos(angle);
          ball.y = paddle.y - ball.radius - 2;
          playSound(400, 0.05);
        }

        // Brick collisions
        for (let brick of bricks) {
          if (brick.status === 0) continue;

          if (ball.x + ball.radius > brick.x &&
              ball.x - ball.radius < brick.x + brick.width &&
              ball.y + ball.radius > brick.y &&
              ball.y - ball.radius < brick.y + brick.height) {
            
            brick.status = 0;
            score += brick.points;
            ball.speed = Math.min(ball.speed * 1.02, ball.maxSpeed);
            playSound(800, 0.05);

            // Determine collision side
            const overlapLeft = (ball.x + ball.radius) - brick.x;
            const overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
            const overlapTop = (ball.y + ball.radius) - brick.y;
            const overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapLeft || minOverlap === overlapRight) {
              ball.vx = -ball.vx;
            } else {
              ball.vy = -ball.vy;
            }
            break;
          }
        }

        // Check victory
        const activeBricks = bricks.filter(b => b.status === 1);
        if (activeBricks.length === 0) {
          gameState = STATES.VICTORY;
        }
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw paddle
      ctx.fillStyle = '#00FFFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

      // Draw ball
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Draw bricks
      for (let brick of bricks) {
        if (brick.status === 1) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        }
      }

      // Draw HUD
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw state messages
      if (gameState === STATES.START) {
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('BREAKOUT', WIDTH / 2, HEIGHT / 2 - 40);
        ctx.font = '20px "Courier New"';
        ctx.fillText('Press Space to Start', WIDTH / 2, HEIGHT / 2 + 60);
      } else if (gameState === STATES.WAITING) {
        ctx.font = '20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('Press Space to Serve', WIDTH / 2, HEIGHT - 30);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, HEIGHT / 2 - 40);
        ctx.font = '20px "Courier New"';
        ctx.fillText('Final Score: ' + score, WIDTH / 2, HEIGHT / 2 + 20);
        ctx.fillText('Press Space to Restart', WIDTH / 2, HEIGHT / 2 + 70);
      } else if (gameState === STATES.VICTORY) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('YOU WIN!', WIDTH / 2, HEIGHT / 2 - 40);
        ctx.font = '20px "Courier New"';
        ctx.fillText('Final Score: ' + score, WIDTH / 2, HEIGHT / 2 + 20);
        ctx.fillText('Press Space to Restart', WIDTH / 2, HEIGHT / 2 + 70);
      }
    }

    // Game loop
    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
