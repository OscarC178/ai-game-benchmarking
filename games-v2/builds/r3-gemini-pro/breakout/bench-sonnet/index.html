<!--
  GAME:      Breakout
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const W=800, H=600;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,type,fe){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.value=freq;
    if(fe) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(0.2,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}

// ---- Input ----
const keys={},prev={};
window.addEventListener('keydown',e=>{ keys[e.code]=true; if(['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.code]=false; });
let mouseX=W/2;
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  mouseX=(e.clientX-rect.left)*scaleX;
});
canvas.addEventListener('click',()=>{ if(AC&&AC.state==='suspended') AC.resume(); serve(); });

// ---- Constants ----
const PAD_W=100, PAD_H=15, PAD_Y=550;
const BALL_R=8;
const BRICK_ROWS=8, BRICK_COLS=14;
const BRICK_W=50, BRICK_H=20, BRICK_GAP=5;
const BRICK_TOP=50;
const MAX_ANGLE=Math.PI/3;
const BRICK_TOTAL_W=BRICK_COLS*(BRICK_W+BRICK_GAP)-BRICK_GAP;
const BRICK_OFF_X=(W-BRICK_TOTAL_W)/2;
const BRICK_COLORS=['#FF0000','#FF0000','#FFA500','#FFA500','#FFFF00','#FFFF00','#00FF00','#00FF00'];
const BRICK_PTS=[7,7,5,5,3,3,1,1];

const ST={START:0,PLAYING:1,SERVE:2,GAMEOVER:3,VICTORY:4};

let state=ST.START;
let lives,score,hiScore,bricks,paddle,ball,totalTime;
hiScore=parseInt(localStorage.getItem('breakout3_best')||'0');

function makeBricks(){
  const arr=[];
  for(let r=0;r<BRICK_ROWS;r++){
    for(let c=0;c<BRICK_COLS;c++){
      arr.push({
        x:BRICK_OFF_X+c*(BRICK_W+BRICK_GAP),
        y:BRICK_TOP+r*(BRICK_H+BRICK_GAP),
        status:1,
        color:BRICK_COLORS[r],
        pts:BRICK_PTS[r],
        freq:800+r*60
      });
    }
  }
  return arr;
}

function makePaddle(){ return {x:W/2-PAD_W/2,y:PAD_Y,w:PAD_W,h:PAD_H,usingMouse:false}; }
function makeBall(px){
  return {x:px+PAD_W/2,y:PAD_Y-BALL_R-1,vx:0,vy:0,speed:400,onPaddle:true};
}

function startGame(){
  initAC();
  lives=3; score=0;
  bricks=makeBricks();
  paddle=makePaddle();
  ball=makeBall(paddle.x);
  state=ST.START;
  totalTime=0;
}

function resetBall(){
  ball=makeBall(paddle.x);
}

function serve(){
  if(state===ST.START||state===ST.SERVE){
    initAC();
    const angle=(Math.random()-0.5)*MAX_ANGLE*0.5;
    ball.vx=ball.speed*Math.sin(angle);
    ball.vy=-ball.speed*Math.cos(angle);
    ball.onPaddle=false;
    state=ST.PLAYING;
  }
}

startGame();

// ---- Collision helpers ----
function ballHitsBrick(b,ball){
  return ball.x+BALL_R>b.x&&ball.x-BALL_R<b.x+BRICK_W&&ball.y+BALL_R>b.y&&ball.y-BALL_R<b.y+BRICK_H;
}
function ballHitsPaddle(pad,ball){
  return ball.x+BALL_R>pad.x&&ball.x-BALL_R<pad.x+pad.w&&ball.y+BALL_R>pad.y&&ball.y-BALL_R<pad.y+pad.h;
}

// ---- Update ----
let lastTime=0;

function update(dt){
  totalTime+=dt;
  if(state===ST.START||state===ST.GAMEOVER||state===ST.VICTORY) return;

  // Paddle movement
  const prevMouseX=paddle.x+PAD_W/2;
  let mx=mouseX;
  let kbUsed=false;
  if(keys['ArrowLeft']||keys['KeyA']){ paddle.x-=500*dt; kbUsed=true; }
  if(keys['ArrowRight']||keys['KeyD']){ paddle.x+=500*dt; kbUsed=true; }
  if(!kbUsed){ paddle.x=mx-PAD_W/2; }
  paddle.x=Math.max(0,Math.min(W-PAD_W,paddle.x));

  if(ball.onPaddle){
    ball.x=paddle.x+PAD_W/2;
    ball.y=PAD_Y-BALL_R-1;
    return;
  }

  const prevX=ball.x, prevY=ball.y;
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;

  // Wall collisions
  if(ball.x-BALL_R<=0){ ball.x=BALL_R; ball.vx=Math.abs(ball.vx); beep(300,0.05); }
  if(ball.x+BALL_R>=W){ ball.x=W-BALL_R; ball.vx=-Math.abs(ball.vx); beep(300,0.05); }
  if(ball.y-BALL_R<=0){ ball.y=BALL_R; ball.vy=Math.abs(ball.vy); beep(300,0.05); }

  // Bottom — life lost
  if(ball.y-BALL_R>H){
    lives--;
    beep(150,0.5,'sawtooth',50);
    if(score>hiScore){ hiScore=score; localStorage.setItem('breakout3_best',hiScore); }
    if(lives<=0){ state=ST.GAMEOVER; return; }
    resetBall(); state=ST.SERVE; return;
  }

  // Paddle collision
  if(ball.vy>0&&ballHitsPaddle(paddle,ball)){
    const hit=(ball.x-(paddle.x+PAD_W/2))/(PAD_W/2);
    const angle=hit*MAX_ANGLE;
    ball.vx=ball.speed*Math.sin(angle);
    ball.vy=-ball.speed*Math.cos(angle);
    ball.y=PAD_Y-BALL_R-1;
    beep(400,0.05);
  }

  // Brick collisions (one per frame)
  let hit=false;
  for(let i=0;i<bricks.length&&!hit;i++){
    const b=bricks[i];
    if(b.status===0) continue;
    if(ballHitsBrick(b,ball)){
      b.status=0; hit=true;
      score+=b.pts;
      if(score>hiScore){ hiScore=score; localStorage.setItem('breakout3_best',hiScore); }
      ball.speed*=1.02;
      beep(b.freq,0.05);

      // Which side?
      const overlapL=ball.x+BALL_R-b.x;
      const overlapR=b.x+BRICK_W-(ball.x-BALL_R);
      const overlapT=ball.y+BALL_R-b.y;
      const overlapB=b.y+BRICK_H-(ball.y-BALL_R);
      const minH=Math.min(overlapL,overlapR);
      const minV=Math.min(overlapT,overlapB);
      if(minH<minV) ball.vx=-ball.vx;
      else ball.vy=-ball.vy;
    }
  }

  // Check victory
  if(bricks.every(b=>b.status===0)){
    if(score>hiScore){ hiScore=score; localStorage.setItem('breakout3_best',hiScore); }
    beep(880,0.3,'sine'); state=ST.VICTORY;
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // HUD
  ctx.fillStyle='#fff'; ctx.font='18px monospace'; ctx.textAlign='left';
  ctx.fillText('Score: '+score,10,28);
  ctx.textAlign='right';
  ctx.fillText('Best: '+hiScore,W-10,28);
  ctx.textAlign='center';
  ctx.fillText('Lives: '+'♥'.repeat(lives),W/2,28);

  // Bricks
  for(const b of bricks){
    if(b.status===0) continue;
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,BRICK_W,BRICK_H);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(b.x+0.5,b.y+0.5,BRICK_W-1,BRICK_H-1);
  }

  // Paddle
  ctx.fillStyle='#00FFFF';
  ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(paddle.x,paddle.y,paddle.w,4);

  // Ball
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2); ctx.fill();

  // Overlays
  if(state===ST.START){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 72px monospace'; ctx.textAlign='center';
    ctx.fillText('BREAKOUT',W/2,220);
    ctx.font='24px monospace';
    ctx.fillText('Press Space or Click to Start',W/2,300);
  }
  if(state===ST.SERVE){
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='20px monospace'; ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-180,H-80,360,32);
    ctx.fillStyle='#fff';
    ctx.fillText('Press Space or Click to Serve',W/2,H-58);
  }
  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444'; ctx.font='bold 60px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,230);
    ctx.fillStyle='#fff'; ctx.font='24px monospace';
    ctx.fillText('Score: '+score,W/2,300);
    const blink=Math.floor(totalTime*2)%2===0;
    ctx.fillStyle=blink?'#fff':'#555';
    ctx.fillText('Press Space to Restart',W/2,360);
  }
  if(state===ST.VICTORY){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700'; ctx.font='bold 60px monospace'; ctx.textAlign='center';
    ctx.fillText('YOU WIN!',W/2,230);
    ctx.fillStyle='#fff'; ctx.font='24px monospace';
    ctx.fillText('Score: '+score,W/2,300);
    const blink=Math.floor(totalTime*2)%2===0;
    ctx.fillStyle=blink?'#fff':'#555';
    ctx.fillText('Press Space to Play Again',W/2,360);
  }
}

// ---- Main Loop ----
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  const spaceDown=keys['Space']&&!prev['Space'];
  Object.assign(prev,keys);

  if(spaceDown){
    initAC();
    if(state===ST.START||state===ST.SERVE) serve();
    else if(state===ST.GAMEOVER||state===ST.VICTORY){ startGame(); }
  }

  update(dt);
  render();
}

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
