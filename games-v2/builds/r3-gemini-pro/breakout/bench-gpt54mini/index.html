<!--
  GAME:      Breakout
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Breakout</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:100vmin;height:75vmin;max-width:800px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#000}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;white-space:pre-wrap;text-align:center}
  #hud{position:absolute;left:12px;top:8px;color:#fff;font-family:monospace;pointer-events:none}
  #hud .right{position:absolute;right:12px;top:8px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="hud"><div id="score"></div><div id="meta" class="right"></div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const metaEl = document.getElementById('meta');

  const W = 800, H = 600;
  const P_W = 100, P_H = 15;
  const P_START_X = 350, P_START_Y = 550;
  const P_SPEED = 500; // px/s

  const BALL_R = 8;
  const BALL_START_X = 400, BALL_START_Y = 548;
  const BALL_BASE = 400; // px/s
  const BALL_MAX = 520;

  const BR_ROWS = 8, BR_COLS = 14;
  const BR_W = 50, BR_H = 20;
  const GAP = 5; // spacing
  const TOP_OFFSET = 50; // from spec
  // compute left offset to center grid
  const totalWidth = BR_COLS * BR_W + (BR_COLS-1)*GAP;
  const LEFT_OFFSET = Math.round((W - totalWidth)/2);

  const ROW_COLOR = [ '#FF0000','#FF0000','#FFA500','#FFA500','#FFFF00','#FFFF00','#00FF00','#00FF00' ];
  const ROW_VALUE = [7,7,5,5,3,3,1,1];

  let state = 'title'; // title, playing, paused, serve, gameover, victory
  let paddle = { x: P_START_X, y: P_START_Y, w: P_W, h: P_H };
  let ball = { x: BALL_START_X, y: BALL_START_Y, vx:0, vy:0, speed: BALL_BASE, attached:true };
  let bricks = [];
  let score = 0, high = 0, lives = 3, level = 1;

  // input
  const keys = {left:false,right:false};
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') keys.left=true;
    if(e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right=true;
    if(e.key===' '){ if(state==='playing' && ball.attached) launch(); else if(state==='title') startGame(); else if(state==='gameover') startGame(); e.preventDefault(); }
    if(e.key==='Enter'){ if(state==='title' || state==='gameover') startGame(); }
    if(e.key==='p' || e.key==='P'){ togglePause(); }
  });
  window.addEventListener('keyup', e=>{ if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') keys.left=false; if(e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right=false; });
  // mouse control optional
  window.addEventListener('mousemove', e=>{ const rect = canvas.getBoundingClientRect(); const mx = (e.clientX - rect.left) * (canvas.width/rect.width); paddle.x = mx - paddle.w/2; clampPaddle(); if(ball.attached) ball.x = paddle.x + paddle.w/2; });

  // audio
  let audioCtx=null, audioOk=false;
  function ensureAudio(){ if(audioOk) return; audioOk=true; audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', ensureAudio, {once:true});
  function sfx(freq,dur=0.06,type='square'){ if(!audioOk) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }
  function sfxLife(){ if(!audioOk) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(150,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(50,audioCtx.currentTime+0.5); o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.14,audioCtx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.5); o.start(); o.stop(audioCtx.currentTime+0.52); }

  try{ const h = localStorage.getItem('breakout_high_v3'); if(h) high = parseInt(h,10)||0; }catch(e){ high=0; }
  function saveHigh(){ try{ localStorage.setItem('breakout_high_v3', String(high)); }catch(e){} }

  function makeBricks(){ bricks = []; for(let r=0;r<BR_ROWS;r++){ for(let c=0;c<BR_COLS;c++){ const x = LEFT_OFFSET + c*(BR_W+GAP); const y = TOP_OFFSET + r*(BR_H+GAP); bricks.push({x,y,w:BR_W,h:BR_H,row:r,col:c,alive:true,color:ROW_COLOR[r],value:ROW_VALUE[r]}); } } }

  function resetPositions(){ paddle.x = P_START_X; clampPaddle(); ball.x = paddle.x + paddle.w/2; ball.y = BALL_START_Y; ball.attached = true; ball.speed = Math.min(BALL_BASE + (level-1)*20, BALL_MAX); ball.vx = 0; ball.vy = 0; }

  function startGame(){ score=0; lives=3; level=1; makeBricks(); resetPositions(); state='playing'; overlayText(''); }

  function launch(){ if(!ball.attached) return; ensureAudio(); // random angle between 240 and 300 degrees
    const deg = 240 + Math.random()*60; const rad = deg * Math.PI/180; ball.vx = Math.cos(rad)*ball.speed; ball.vy = Math.sin(rad)*ball.speed; ball.attached=false; }

  function togglePause(){ if(state==='playing'){ state='paused'; overlayText('PAUSED'); } else if(state==='paused'){ state='playing'; overlayText(''); } }

  function clampPaddle(){ paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x)); if(ball.attached) ball.x = paddle.x + paddle.w/2; }

  function rectCircle(cx,cy,r,rx,ry,rw,rh){ const closestX = Math.max(rx, Math.min(cx, rx+rw)); const closestY = Math.max(ry, Math.min(cy, ry+rh)); const dx = cx - closestX; const dy = cy - closestY; return (dx*dx + dy*dy) <= r*r; }

  let lastTime = performance.now(); function loop(now){ const dt = Math.min(0.033, (now - lastTime)/1000); lastTime = now; if(state==='playing'){ // input
      let mv = 0; if(keys.left) mv -= 1; if(keys.right) mv +=1; paddle.x += mv * P_SPEED * dt; clampPaddle(); // ball attached follows
      if(!ball.attached){ // move ball
        const prevX = ball.x, prevY = ball.y;
        ball.x += ball.vx * dt; ball.y += ball.vy * dt;
        // walls
        if(ball.x - BALL_R <= 0){ ball.x = BALL_R; ball.vx = -ball.vx; sfx(300); }
        if(ball.x + BALL_R >= W){ ball.x = W - BALL_R; ball.vx = -ball.vx; sfx(300); }
        if(ball.y - BALL_R <= 0){ ball.y = BALL_R; ball.vy = -ball.vy; sfx(300); }
        // paddle collision
        if(ball.vy > 0 && rectCircle(ball.x,ball.y,BALL_R,paddle.x,paddle.y,paddle.w,paddle.h)){
          // compute hit offset
          const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); const maxA = Math.PI/3; const angle = hit * maxA; const vx = Math.sin(angle); const vy = -Math.cos(angle); const mag = Math.hypot(vx,vy); ball.vx = (vx/mag) * ball.speed; ball.vy = (vy/mag) * ball.speed; ball.y = paddle.y - BALL_R - 0.5; sfx(500,0.06); }
        // bricks: check one collision
        for(let i=0;i<bricks.length;i++){ const b = bricks[i]; if(!b.alive) continue; if(rectCircle(ball.x,ball.y,BALL_R,b.x,b.y,b.w,b.h)){
            // determine collision side via previous position
            const prevLeft = prevX + BALL_R <= b.x; const prevRight = prevX - BALL_R >= b.x + b.w;
            const prevTop = prevY + BALL_R <= b.y; const prevBottom = prevY - BALL_R >= b.y + b.h;
            if(prevLeft || prevRight) ball.vx = -ball.vx; else if(prevTop || prevBottom) ball.vy = -ball.vy; else ball.vy = -ball.vy; b.alive = false; score += (b.value||10); // speed up slightly
            ball.speed = Math.min(BALL_MAX, ball.speed * 1.02); // +2%
            sfx(900 + (b.row*20), 0.06, 'square'); break; }
        }
        // bottom out
        if(ball.y - BALL_R > H){ // lost
          lives--; sfxLife(); if(lives<=0){ state='gameover'; overlayText('GAME OVER\nScore: '+score+'\nPress Enter to Restart'); if(score>high){ high=score; saveHigh(); } } else { resetPositions(); overlayText('Life lost - Press Space to Launch'); state='playing'; }
        }
      }
      // check level clear
      if(bricks.every(b=>!b.alive)){ level++; makeBricks(); resetPositions(); ball.speed = Math.min(BALL_MAX, BALL_BASE + (level-1)*20); overlayText('Level '+level+' - Press Space to Launch'); sfx(1100,0.18); }
    }
    // render
    render(); requestAnimationFrame(loop);
  }

  function render(){ ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // bricks
    for(const b of bricks){ if(!b.alive) continue; ctx.fillStyle = b.color; ctx.fillRect(Math.round(b.x)+1, Math.round(b.y)+1, b.w-2, b.h-2); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.strokeRect(Math.round(b.x)+1, Math.round(b.y)+1, b.w-2, b.h-2); }
    // paddle
    ctx.fillStyle='#FFFFFF'; roundRect(ctx, Math.round(paddle.x), Math.round(paddle.y), paddle.w, paddle.h, 6); ctx.fill();
    // ball
    ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
    // HUD
    scoreEl.innerText = 'Score: '+score + '   Lives: ' + lives + '   Level: ' + level;
    metaEl.innerText = 'High: ' + high;
  }

  function overlayText(t){ overlay.textContent = t || ''; }
  function titleText(){ return 'BREAKOUT\n\nBounce the ball with the paddle.\nBreak all bricks to clear the level.\nDon\'t let the ball fall.\n\nControls: ←/A, →/D, Mouse to move, Space to Launch\n\nPress Enter to Start'; }

  function roundRect(c,x,y,w,h,r){ const m=Math.min(w,h)/2; if(r>m) r=m; c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

  // init
  function init(){ makeBricks(); resetPositions(); overlayText(titleText()); requestAnimationFrame(loop); }
  init();
})();
</script>
</body>
</html>
