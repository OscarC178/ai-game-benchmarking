<!--
  GAME:      Snake
  RUN:       r3-gemini-pro
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #0a140a;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            border: 2px solid #333;
        }
        #ui {
            position: absolute;
            text-align: center;
            width: 600px;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">Score: 0</div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div id="ui">
        <h1 id="title">SNAKE</h1>
        <p id="msg">Press Space to Start</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const uiTitle = document.getElementById('title');
        const uiMsg = document.getElementById('msg');

        // Constants
        const CELL_SIZE = 20;
        const GRID_SIZE = 30;
        const INITIAL_TICK = 100;
        const MIN_TICK = 50;

        // Game State
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let snake = [];
        let food = {x: 0, y: 0};
        let direction = {dx: 1, dy: 0};
        let lastProcessedDirection = {dx: 1, dy: 0};
        let inputQueue = [];
        let score = 0;
        let tickRate = INITIAL_TICK;
        let lastTickTime = 0;

        // Audio
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playEatSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playCrashSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Logic
        function resetGame() {
            score = 0;
            tickRate = INITIAL_TICK;
            direction = {dx: 1, dy: 0};
            lastProcessedDirection = {dx: 1, dy: 0};
            inputQueue = [];
            snake = [
                {x: 15, y: 15},
                {x: 14, y: 15},
                {x: 13, y: 15},
                {x: 12, y: 15}
            ];
            spawnFood();
            updateHUD();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function updateHUD() {
            hud.textContent = `Score: ${score}`;
        }

        function handleInput() {
            if (inputQueue.length === 0) return;
            const nextDir = inputQueue.shift();
            // Reversal prevention: check if orthogonal to last PROCESSED direction
            if (nextDir.dx !== -lastProcessedDirection.dx) {
                direction = nextDir;
            } else if (nextDir.dy !== -lastProcessedDirection.dy) {
                direction = nextDir;
            }
        }

        function tick() {
            handleInput();
            lastProcessedDirection = { ...direction };

            const head = snake[0];
            const newHead = {
                x: head.x + direction.dx,
                y: head.y + direction.dy
            };

            // Wall Collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Self Collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            snake.unshift(newHead);

            // Food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                tickRate = Math.max(MIN_TICK, INITIAL_TICK - Math.floor(score / 50) * 5);
                playEatSound();
                spawnFood();
                updateHUD();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            playCrashSound();
            uiTitle.textContent = "GAME OVER";
            uiMsg.textContent = `Final Score: ${score} - Press Space to Restart`;
            uiTitle.style.display = 'block';
            uiMsg.style.display = 'block';
        }

        // Render
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);

            // Draw Snake
            snake.forEach((segment, i) => {
                ctx.fillStyle = (i === 0) ? '#FFFF00' : '#00CC00';
                ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            });
        }

        function loop(timestamp) {
            if (gameState === 'PLAYING') {
                const elapsed = timestamp - lastTickTime;
                if (elapsed > tickRate) {
                    tick();
                    lastTickTime = timestamp;
                }
            }
            draw();
            requestAnimationFrame(loop);
        }

        // Interaction
        window.addEventListener('keydown', e => {
            const keys = {
                'ArrowUp': {dx: 0, dy: -1}, 'w': {dx: 0, dy: -1}, 'W': {dx: 0, dy: -1},
                'ArrowDown': {dx: 0, dy: 1}, 's': {dx: 0, dy: 1}, 'S': {dx: 0, dy: 1},
                'ArrowLeft': {dx: -1, dy: 0}, 'a': {dx: -1, dy: 0}, 'A': {dx: -1, dy: 0},
                'ArrowRight': {dx: 1, dy: 0}, 'd': {dx: 1, dy: 0}, 'D': {dx: 1, dy: 0}
            };

            if (e.code === 'Space') {
                initAudio();
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    resetGame();
                    gameState = 'PLAYING';
                    uiTitle.style.display = 'none';
                    uiMsg.style.display = 'none';
                }
            }

            if (gameState === 'PLAYING' && keys[e.key]) {
                const requestedDir = keys[e.key];
                // Only queue if not directly opposite to the last queued or current direction
                const lastInQueue = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : direction;
                if (requestedDir.dx !== -lastInQueue.dx || requestedDir.dy !== -lastInQueue.dy) {
                    if (inputQueue.length < 3) {
                        inputQueue.push(requestedDir);
                    }
                }
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
