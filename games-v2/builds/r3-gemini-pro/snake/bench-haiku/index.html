<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #0a140a;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas" width="600" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    const GRID_SIZE = 30;
    const CELL_SIZE = 20;
    const GRID_WIDTH = 600;
    const GRID_HEIGHT = 600;

    // Game states
    const STATES = { START: 'start', PLAYING: 'playing', GAME_OVER: 'over' };

    // Audio context
    let audioCtx = null;

    function initAudioContext() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
      }
    }

    function playEatSound() {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        osc.type = 'square';
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.1);
      } catch (e) {}
    }

    function playCrashSound() {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        osc.type = 'square';
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      } catch (e) {}
    }

    // Game variables
    let gameState = STATES.START;
    let snake = [
      { x: 15, y: 15 },
      { x: 14, y: 15 },
      { x: 13, y: 15 }
    ];
    let direction = { dx: 1, dy: 0 };
    let lastProcessedDirection = { dx: 1, dy: 0 };
    let inputQueue = [];
    let food = { x: 20, y: 10 };
    let score = 0;
    let tickSpeed = 100; // milliseconds
    let tickTimer = 0;
    let keys = {};

    // Input handling
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if ((e.key === ' ') && (gameState === STATES.START || gameState === STATES.GAME_OVER)) {
        initAudioContext();
        if (gameState === STATES.START) {
          gameState = STATES.PLAYING;
          score = 0;
          tickSpeed = 100;
          snake = [
            { x: 15, y: 15 },
            { x: 14, y: 15 },
            { x: 13, y: 15 }
          ];
          direction = { dx: 1, dy: 0 };
          lastProcessedDirection = { dx: 1, dy: 0 };
          inputQueue = [];
          generateFood();
        } else {
          gameState = STATES.START;
        }
      }

      // Queue directional input
      if (gameState === STATES.PLAYING) {
        let newDir = null;
        if (key === 'arrowup' || key === 'w') newDir = { dx: 0, dy: -1 };
        if (key === 'arrowdown' || key === 's') newDir = { dx: 0, dy: 1 };
        if (key === 'arrowleft' || key === 'a') newDir = { dx: -1, dy: 0 };
        if (key === 'arrowright' || key === 'd') newDir = { dx: 1, dy: 0 };

        if (newDir && (newDir.dx !== -lastProcessedDirection.dx || newDir.dy !== -lastProcessedDirection.dy)) {
          inputQueue.push(newDir);
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Game functions
    function generateFood() {
      let validPosition = false;
      let newFood = {};

      while (!validPosition) {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };

        validPosition = !snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
      }

      food = newFood;
    }

    function gameOver() {
      gameState = STATES.GAME_OVER;
      playCrashSound();
    }

    function updateGame() {
      // Process one input from queue if available
      if (inputQueue.length > 0) {
        direction = inputQueue.shift();
      }

      // Calculate new head position
      const head = snake[0];
      const newHead = {
        x: head.x + direction.dx,
        y: head.y + direction.dy
      };

      // Check wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameOver();
        return;
      }

      // Check self collision
      if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
        gameOver();
        return;
      }

      // Add new head
      snake.unshift(newHead);

      // Check if eating food
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        playEatSound();
        generateFood();
        // Increase speed slightly (but cap it)
        tickSpeed = Math.max(50, tickSpeed - 2);
      } else {
        // Remove tail (standard movement)
        snake.pop();
      }

      lastProcessedDirection = direction;
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#0a140a';
      ctx.fillRect(0, 0, GRID_WIDTH, GRID_HEIGHT);

      if (gameState === STATES.START) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('SNAKE', GRID_WIDTH / 2, GRID_HEIGHT / 2 - 40);
        ctx.font = '16px "Courier New"';
        ctx.fillText('Press Space to Start', GRID_WIDTH / 2, GRID_HEIGHT / 2 + 60);
      } else if (gameState === STATES.PLAYING || gameState === STATES.GAME_OVER) {
        // Draw food
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

        // Draw snake
        for (let i = 0; i < snake.length; i++) {
          if (i === 0) {
            ctx.fillStyle = '#FFFF00'; // Head
          } else {
            ctx.fillStyle = '#00CC00'; // Body
          }
          ctx.fillRect(snake[i].x * CELL_SIZE, snake[i].y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        // Draw score
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 10, 20);

        if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
          ctx.fillRect(0, 0, GRID_WIDTH, GRID_HEIGHT);
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 40px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', GRID_WIDTH / 2, GRID_HEIGHT / 2 - 30);
          ctx.font = '20px "Courier New"';
          ctx.fillText('Final Score: ' + score, GRID_WIDTH / 2, GRID_HEIGHT / 2 + 20);
          ctx.font = '16px "Courier New"';
          ctx.fillText('Press Space to Restart', GRID_WIDTH / 2, GRID_HEIGHT / 2 + 70);
        }
      }
    }

    // Game loop
    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const dt = currentTime - lastTime;
      lastTime = currentTime;

      if (gameState === STATES.PLAYING) {
        tickTimer += dt;
        if (tickTimer >= tickSpeed) {
          tickTimer -= tickSpeed;
          updateGame();
        }
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
