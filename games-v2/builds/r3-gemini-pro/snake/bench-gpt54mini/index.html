  GAME:      Snake
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Snake</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:90vmin;height:90vmin;max-width:600px;max-height:600px;position:relative}
  canvas{display:block;width:100%;height:100%;background:#0a140a}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Courier,monospace;white-space:pre-wrap;text-align:center;pointer-events:none}
  #hud{position:absolute;left:8px;top:8px;color:#fff;font-family:Courier,monospace;font-size:14px;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="hud"></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  // Grid: 30x30, cell 20px => 600x600 canvas
  const COLS = 30, ROWS = 30, CELL = 20;
  const CANVAS = document.getElementById('c');
  const ctx = CANVAS.getContext('2d'); ctx.imageSmoothingEnabled = false;
  const overlay = document.getElementById('overlay');
  const hud = document.getElementById('hud');

  // Game constants
  const START_LEN = 4; // 3-4 segments
  const START_POS = {x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}; // center
  const START_DIR = {x:1,y:0}; // right
  const START_TICK = 1/8; // 8 ticks/sec => seconds per tick
  const SPEED_INC = 0.5; // ticks/sec increase per food (converted later)
  const MAX_TPS = 15; // ticks per second cap
  const SCORE_PER_FOOD = 10;

  // State
  let gameState = 'title'; // title, playing, paused, gameover, win
  let snake = []; // array of {x,y} head at index 0
  let dir = {...START_DIR};
  let inputQueue = []; // queued directions
  let queuedThisTick = false;
  let food = null;
  let score = 0;
  let high = 0;
  let ticksPerSecond = 8; // starts at 8
  let secondsPerTick = 1 / ticksPerSecond;
  let tickAccumulator = 0;
  let lastTime = performance.now();

  // Audio
  let audioCtx = null; let audioUnlocked = false;
  function unlockAudio(){ if(audioUnlocked) return; audioUnlocked=true; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', unlockAudio, {once:true});
  window.addEventListener('keydown', e=>{ if(e.key==='Enter') unlockAudio(); }, {once:true});
  function eatSound(){ if(!audioUnlocked) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(420, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(840, audioCtx.currentTime+0.12); g.gain.setValueAtTime(0.0001, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime+0.01); o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.18); o.stop(audioCtx.currentTime+0.2); }
  function dieSound(){ if(!audioUnlocked) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(220, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime+0.45); g.gain.setValueAtTime(0.0001, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.14, audioCtx.currentTime+0.01); o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.5); o.stop(audioCtx.currentTime+0.52); }

  // Load high score
  try{ const v = localStorage.getItem('snake_high_v3'); if(v) high = parseInt(v,10) || 0; }catch(e){ high = 0; }
  function saveHigh(){ try{ localStorage.setItem('snake_high_v3', String(high)); }catch(e){} }

  // Utilities
  function clone(v){ return {x:v.x,y:v.y}; }
  function eq(a,b){ return a.x===b.x && a.y===b.y; }
  function withinGrid(p){ return p.x>=0 && p.x<COLS && p.y>=0 && p.y<ROWS; }

  // Initialization and reset
  function resetAll(){ snake = []; dir = {...START_DIR}; inputQueue = []; queuedThisTick = false; food = null; score = 0; ticksPerSecond = 8; secondsPerTick = 1/ticksPerSecond; tickAccumulator = 0; gameState = 'title'; overlayText(titleText()); }
  function startNewGame(){ // create starting snake
    snake = []; for(let i=0;i<START_LEN;i++){ snake.push({x: START_POS.x - i, y: START_POS.y}); }
    dir = {...START_DIR}; inputQueue=[]; queuedThisTick=false; score=0; ticksPerSecond = 8; secondsPerTick = 1/ticksPerSecond; placeFood(); gameState='playing'; overlayText(''); lastTime = performance.now(); }

  function titleText(){ return 'SNAKE\n\nArrow keys or WASD to steer\nPress Enter to Start\nP to Pause'; }

  // Food spawn ensuring not on snake
  function placeFood(){ const occupied = new Set(snake.map(s=>s.x+','+s.y)); if(occupied.size >= COLS*ROWS){ // win
      food = null; gameState='win'; overlayText(winText()); if(score>high){ high=score; saveHigh(); } eatSound(); return; }
    let tries = 0; while(true){ const x = Math.floor(Math.random()*COLS); const y = Math.floor(Math.random()*ROWS); if(!occupied.has(x+','+y)){ food = {x,y}; break; } if(++tries > 10000) break; }
  }

  // Input queueing and key handling
  const keyMap = {
    'ArrowUp': {x:0,y:-1}, 'w': {x:0,y:-1}, 'W':{x:0,y:-1},
    'ArrowDown': {x:0,y:1}, 's': {x:0,y:1}, 'S':{x:0,y:1},
    'ArrowLeft': {x:-1,y:0}, 'a': {x:-1,y:0}, 'A':{x:-1,y:0},
    'ArrowRight': {x:1,y:0}, 'd': {x:1,y:0}, 'D':{x:1,y:0}
  };
  window.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      if(gameState==='title'){ startNewGame(); }
      else if(gameState==='gameover' || gameState==='win'){ startNewGame(); }
      e.preventDefault();
    }
    if(e.key==='p' || e.key==='P'){
      if(gameState==='playing'){ gameState='paused'; overlayText('PAUSED\nPress P to Resume'); }
      else if(gameState==='paused'){ gameState='playing'; overlayText(''); lastTime = performance.now(); }
    }
    // allow Space as alternative
    if(e.key===' '){ if(gameState==='title'){ startNewGame(); } else if(gameState==='gameover' || gameState==='win'){ startNewGame(); } else if(gameState==='playing'){ gameState='paused'; overlayText('PAUSED\nPress P to Resume'); } e.preventDefault(); }

    // queue directions only when playing
    if(gameState==='playing'){
      const d = keyMap[e.key]; if(d){ // only one queued input per tick
        // ignore direct reverse of current effective direction (not the queued one)
        const effectiveDir = inputQueue.length>0 ? inputQueue[inputQueue.length-1] : dir;
        if(d.x === -effectiveDir.x && d.y === -effectiveDir.y) return; // forbid reversal
        if(!queuedThisTick){ inputQueue.push(d); queuedThisTick = true; }
      }
    }
  });
  window.addEventListener('blur', ()=>{ inputQueue = []; queuedThisTick = false; });

  // Tick update
  function tick(){ // apply at most one queued direction
    if(inputQueue.length>0){ const nd = inputQueue.shift(); // ensure not reversing against dir
      if(!(nd.x === -dir.x && nd.y === -dir.y)) dir = nd; }
    queuedThisTick = false;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    // wall collision
    if(!withinGrid(head)){ // game over
      gameOver(); return; }
    // eating?
    const willEat = food && head.x === food.x && head.y === food.y;
    // self collision: allow moving into tail if tail will move (i.e., not growing)
    const tail = snake[snake.length-1];
    for(let i=0;i<snake.length;i++){
      const seg = snake[i];
      if(seg.x === head.x && seg.y === head.y){ // if it's tail and not growing -> allowed
        if(i === snake.length-1 && !willEat) break; gameOver(); return; }
    }
    // add head
    snake.unshift(head);
    if(willEat){ score += SCORE_PER_FOOD; eatSound(); // increase speed by 0.5 tps
      ticksPerSecond = Math.min(MAX_TPS, ticksPerSecond + SPEED_INC); secondsPerTick = 1 / ticksPerSecond; placeFood(); }
    else { snake.pop(); }
    // win check
    if(snake.length >= COLS*ROWS){ // full board
      gameWin(); }
  }

  function gameOver(){ gameState='gameover'; overlayText('GAME OVER\nScore: '+score+'\nPress Enter to Restart'); dieSound(); if(score>high){ high = score; saveHigh(); } }
  function gameWin(){ gameState='win'; overlayText('YOU WIN!\nScore: '+score+'\nPress Enter to Play Again'); if(score>high){ high = score; saveHigh(); } eatSound(); }

  // rendering
  function render(){ // clear
    ctx.fillStyle = '#0a140a'; ctx.fillRect(0,0,CELL*COLS,CELL*ROWS);
    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1; for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,CELL*ROWS); ctx.stroke(); } for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(CELL*COLS,y*CELL); ctx.stroke(); }
    // draw food
    if(food){ const fx = food.x*CELL, fy = food.y*CELL; ctx.fillStyle = '#ff0000'; const s = CELL*0.6; const ox = (CELL-s)/2; const oy = (CELL-s)/2; ctx.beginPath(); ctx.fillRect(fx+ox, fy+oy, s, s); }
    // draw snake body
    for(let i=snake.length-1;i>=0;i--){ const s = snake[i]; const px = s.x*CELL, py = s.y*CELL; if(i===0){ // head
        ctx.fillStyle = '#ffff00'; ctx.fillRect(px+2, py+2, CELL-4, CELL-4);
        // draw eyes relative to dir
        ctx.fillStyle = '#003300'; const esz=3; let ex=px+6, ey=py+6; if(dir.x>0){ ex = px + CELL - 8; ey = py + 6; } else if(dir.x<0){ ex = px + 6; ey = py + 6; } else if(dir.y>0){ ex = px + CELL - 8; ey = py + CELL - 8; } else { ex = px + 6; ey = py + 8; } ctx.fillRect(ex, ey, esz, esz);
      } else { ctx.fillStyle = '#00cc00'; ctx.fillRect(px+3, py+3, CELL-6, CELL-6); } }
    // hud
    hud.innerText = 'Score: '+score + '\nBest: '+high + '\nSpeed: '+ticksPerSecond.toFixed(1)+' tps';
  }

  function overlayText(t){ overlay.textContent = t || ''; }
  function titleText(){ return 'SNAKE\n\nArrow keys or WASD to move\nPress Enter to Start\nP to Pause'; }
  function winText(){ return 'YOU WIN!\nAll cells filled.\nScore: '+score+'\nPress Enter to Play Again'; }

  // main loop
  function loop(now){ const dt = Math.min(0.1, (now - lastTime)/1000); lastTime = now; if(gameState==='playing'){ tickAccumulator += 0; } // keep var alive
    // accumulate ticks
    if(gameState==='playing'){
      tickAccumulator += dt;
      while(tickAccumulator >= secondsPerTick){ tickAccumulator -= secondsPerTick; tick(); }
    }
    render(); requestAnimationFrame(loop);
  }

  // small helpers
  let tickAccumulator = 0;

  // start
  resetAll(); requestAnimationFrame((t)=>{ lastTime = t; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
