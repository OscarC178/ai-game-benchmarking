  GAME:      Snake
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const W=600, H=600, CELL=20, COLS=30, ROWS=30;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function sndEat(){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type='sine'; o.frequency.setValueAtTime(400,AC.currentTime);
    o.frequency.linearRampToValueAtTime(800,AC.currentTime+0.1);
    g.gain.setValueAtTime(0.2,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.12);
    o.start(); o.stop(AC.currentTime+0.13);
  }catch(e){}
}
function sndDeath(){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type='sawtooth'; o.frequency.setValueAtTime(200,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(50,AC.currentTime+0.4);
    g.gain.setValueAtTime(0.3,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.42);
    o.start(); o.stop(AC.currentTime+0.43);
  }catch(e){}
}

// ---- Input ----
const dirMap={
  ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0},
  KeyW:{dx:0,dy:-1},KeyS:{dx:0,dy:1},KeyA:{dx:-1,dy:0},KeyD:{dx:1,dy:0}
};
let inputQueue=[];
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter') e.preventDefault();
  if(dirMap[e.code]) inputQueue.push(dirMap[e.code]);
});

// ---- State ----
const ST={START:0,PLAYING:1,GAMEOVER:2};
let state=ST.START;
let snake,dir,lastDir,food,score,tickMs,tickTimer,hiScore;
hiScore=parseInt(localStorage.getItem('snake3_best')||'0');
let totalTime=0;

function spawnFood(){
  const occupied=new Set(snake.map(s=>s.x+','+s.y));
  let fx,fy;
  do { fx=Math.floor(Math.random()*COLS); fy=Math.floor(Math.random()*ROWS); }
  while(occupied.has(fx+','+fy));
  food={x:fx,y:fy};
}

function startGame(){
  initAC();
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy},{x:cx-3,y:cy}];
  dir={dx:1,dy:0}; lastDir={dx:1,dy:0};
  inputQueue=[];
  score=0; tickMs=100; tickTimer=0;
  spawnFood();
  state=ST.PLAYING;
}

// ---- Tick Logic ----
function tick(){
  // Apply next valid direction from queue
  while(inputQueue.length>0){
    const d=inputQueue.shift();
    // Only allow orthogonal to last processed direction
    if(d.dx!==0&&lastDir.dx!==0) continue;
    if(d.dy!==0&&lastDir.dy!==0) continue;
    dir=d; break;
  }
  lastDir=dir;

  const head=snake[0];
  const nx=head.x+dir.dx, ny=head.y+dir.dy;

  // Wall collision
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS){
    sndDeath(); state=ST.GAMEOVER;
    if(score>hiScore){ hiScore=score; localStorage.setItem('snake3_best',hiScore); }
    return;
  }
  // Self collision
  for(const s of snake){
    if(s.x===nx&&s.y===ny){ sndDeath(); state=ST.GAMEOVER;
      if(score>hiScore){ hiScore=score; localStorage.setItem('snake3_best',hiScore); }
      return; }
  }

  snake.unshift({x:nx,y:ny});
  if(nx===food.x&&ny===food.y){
    score+=10;
    if(score>hiScore){ hiScore=score; localStorage.setItem('snake3_best',hiScore); }
    tickMs=Math.max(60,tickMs-1);
    sndEat();
    spawnFood();
  } else {
    snake.pop();
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle='#0a140a';
  ctx.fillRect(0,0,W,H);

  if(state===ST.START){
    ctx.fillStyle='#00FF00'; ctx.font='bold 72px monospace'; ctx.textAlign='center';
    ctx.fillText('SNAKE',W/2,200);
    ctx.fillStyle='#fff'; ctx.font='24px monospace';
    ctx.fillText('Press Space to Start',W/2,300);
    ctx.fillStyle='#888'; ctx.font='16px monospace';
    ctx.fillText('Best: '+hiScore,W/2,370);
    return;
  }

  // Score
  ctx.fillStyle='#fff'; ctx.font='18px monospace'; ctx.textAlign='left';
  ctx.fillText('Score: '+score,8,22);
  ctx.fillStyle='#666'; ctx.textAlign='right';
  ctx.fillText('Best: '+hiScore,W-8,22);

  // Food
  ctx.fillStyle='#FF0000';
  ctx.fillRect(food.x*CELL+2,food.y*CELL+2,CELL-4,CELL-4);

  // Snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    ctx.fillStyle=i===0?'#FFFF00':'#00CC00';
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
    if(i===0){
      // Eyes on head
      ctx.fillStyle='#000';
      const ex=s.x*CELL+CELL/2, ey=s.y*CELL+CELL/2;
      ctx.fillRect(ex-6,ey-4,3,3);
      ctx.fillRect(ex+3,ey-4,3,3);
    }
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF0000'; ctx.font='bold 52px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,230);
    ctx.fillStyle='#fff'; ctx.font='24px monospace';
    ctx.fillText('Score: '+score,W/2,295);
    const blink=Math.floor(totalTime*2)%2===0;
    ctx.fillStyle=blink?'#fff':'#555'; ctx.font='20px monospace';
    ctx.fillText('Press Space to Restart',W/2,360);
  }
}

// ---- Main Loop ----
let lastTime=0;

function loop(now){
  requestAnimationFrame(loop);
  const dt=(now-lastTime)/1000;
  lastTime=now; totalTime+=dt;

  const spacePress=!!(window._spaceDown);

  if(state===ST.START||state===ST.GAMEOVER){
    render(); return;
  }

  // Tick accumulator
  tickTimer+=dt*1000;
  while(tickTimer>=tickMs){
    tickTimer-=tickMs;
    tick();
  }
  render();
}

// Space/Enter detection
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){
    if(state===ST.START||state===ST.GAMEOVER) startGame();
  }
});

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
