<!--
  GAME:      Snake
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=600,H=600,GRID=30,CS=20;

// Audio
let ac=null;
function initAudio(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function sndEat(){
  if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(400,ac.currentTime);
    o.frequency.linearRampToValueAtTime(800,ac.currentTime+0.1);
    g.gain.setValueAtTime(0.08,ac.currentTime);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+0.12);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.12);
  }catch(e){}
}
function sndDie(){
  if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(200,ac.currentTime);
    o.frequency.linearRampToValueAtTime(50,ac.currentTime+0.4);
    g.gain.setValueAtTime(0.1,ac.currentTime);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+0.4);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.4);
  }catch(e){}
}

// States
const ST_TITLE=0,ST_PLAY=1,ST_OVER=2;
let state=ST_TITLE;

// Game vars
let snake,dir,lastDir,inputQueue,food,score,tickInterval,tickTimer;

const DIRS={UP:{dx:0,dy:-1},DOWN:{dx:0,dy:1},LEFT:{dx:-1,dy:0},RIGHT:{dx:1,dy:0}};

function spawnFood(){
  const occupied=new Set();
  for(const s of snake)occupied.add(s.x+','+s.y);
  const free=[];
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    if(!occupied.has(x+','+y))free.push({x,y});
  }
  if(free.length===0)return; // snake fills board
  food=free[Math.floor(Math.random()*free.length)];
}

function startGame(){
  const mid=Math.floor(GRID/2);
  snake=[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  dir=DIRS.RIGHT;lastDir=DIRS.RIGHT;
  inputQueue=[];score=0;
  tickInterval=100;tickTimer=0;
  spawnFood();
  state=ST_PLAY;
}

function tick(){
  // Process one input from queue
  if(inputQueue.length>0){
    const next=inputQueue.shift();
    // Only allow orthogonal to lastDir
    if(next.dx+lastDir.dx!==0||next.dy+lastDir.dy!==0){
      dir=next;
    }
  }
  lastDir=dir;

  // New head
  const head=snake[0];
  const nx=head.x+dir.dx,ny=head.y+dir.dy;

  // Wall collision
  if(nx<0||nx>=GRID||ny<0||ny>=GRID){
    sndDie();state=ST_OVER;return;
  }

  // Self collision
  for(const s of snake){
    if(s.x===nx&&s.y===ny){
      sndDie();state=ST_OVER;return;
    }
  }

  // Move
  snake.unshift({x:nx,y:ny});

  // Eat check
  if(food&&nx===food.x&&ny===food.y){
    score+=10;sndEat();
    tickInterval=Math.max(50,tickInterval-2);
    spawnFood();
  }else{
    snake.pop();
  }
}

function queueDir(d){
  if(state!==ST_PLAY)return;
  // Check against last queued or current dir
  const ref=inputQueue.length>0?inputQueue[inputQueue.length-1]:lastDir;
  if(d.dx+ref.dx===0&&d.dy+ref.dy===0)return; // reverse
  if(d.dx===ref.dx&&d.dy===ref.dy)return; // same
  if(inputQueue.length<2)inputQueue.push(d);
}

// Input
addEventListener('keydown',e=>{
  initAudio();
  const c=e.code;
  if(c==='ArrowUp'||c==='KeyW'){queueDir(DIRS.UP);e.preventDefault();}
  if(c==='ArrowDown'||c==='KeyS'){queueDir(DIRS.DOWN);e.preventDefault();}
  if(c==='ArrowLeft'||c==='KeyA'){queueDir(DIRS.LEFT);e.preventDefault();}
  if(c==='ArrowRight'||c==='KeyD'){queueDir(DIRS.RIGHT);e.preventDefault();}
  if(c==='Space'){
    e.preventDefault();
    if(state===ST_TITLE||state===ST_OVER)startGame();
  }
});

function render(){
  // Background
  cx.fillStyle='#0a140a';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#0f0';cx.font='bold 64px monospace';cx.textAlign='center';
    cx.fillText('SNAKE',W/2,240);
    cx.fillStyle='#fff';cx.font='20px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Start',W/2,340);
    return;
  }

  // Grid lines (subtle)
  cx.strokeStyle='rgba(255,255,255,0.03)';cx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){
    cx.beginPath();cx.moveTo(i*CS,0);cx.lineTo(i*CS,H);cx.stroke();
    cx.beginPath();cx.moveTo(0,i*CS);cx.lineTo(W,i*CS);cx.stroke();
  }

  // Food
  if(food){
    cx.fillStyle='#f00';
    cx.fillRect(food.x*CS+2,food.y*CS+2,CS-4,CS-4);
    // Shine
    cx.fillStyle='rgba(255,100,100,0.4)';
    cx.fillRect(food.x*CS+4,food.y*CS+4,6,6);
  }

  // Snake
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i];
    if(i===0){
      cx.fillStyle='#ff0';
      cx.fillRect(s.x*CS+1,s.y*CS+1,CS-2,CS-2);
      // Eyes
      cx.fillStyle='#000';
      const ex=dir.dx,ey=dir.dy;
      cx.fillRect(s.x*CS+7+ex*4,s.y*CS+6+ey*4,3,3);
      cx.fillRect(s.x*CS+12+ex*4,s.y*CS+6+ey*4,3,3);
    }else{
      const t=i/snake.length;
      const g=Math.floor(200-t*80);
      cx.fillStyle=`rgb(0,${g},0)`;
      cx.fillRect(s.x*CS+1,s.y*CS+1,CS-2,CS-2);
    }
  }

  // Score
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,10,22);
  cx.textAlign='right';
  cx.fillText('Length: '+snake.length,W-10,22);

  // Game over overlay
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Space to Restart',W/2,H/2+60);
  }
}

// Main loop
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  const dt=(now-lastTime);lastTime=now;

  if(state===ST_PLAY){
    tickTimer+=dt;
    while(tickTimer>=tickInterval){
      tickTimer-=tickInterval;
      tick();
      if(state!==ST_PLAY)break;
    }
  }

  render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
