  RUN:       r3-gemini-pro

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
    body {
        background-color: #0a140a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #FFF;
        font-family: monospace;
        overflow: hidden;
    }
    #gameContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    canvas {
        background-color: #000;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        image-rendering: crisp-edges;
    }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="600"></canvas>
</div>

<script>
// --- Constants & Config ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const CELL_SIZE = 20;
const COLS = W / CELL_SIZE; // 30
const ROWS = H / CELL_SIZE; // 30

const STATE_START = 0;
const STATE_PLAYING = 1;
const STATE_GAMEOVER = 2;

const INITIAL_TICK_MS = 120;
const MIN_TICK_MS = 50;

// --- Game State ---
let state = STATE_START;
let lastTime = 0;
let tickAccumulator = 0;
let currentTickMs = INITIAL_TICK_MS;

let snake = [];
let food = { x: 0, y: 0 };
let score = 0;

let currentDir = { x: 1, y: 0 };
let lastProcessedDir = { x: 1, y: 0 };
let currentInputQueue = [];

// --- Audio ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

const sfx = {
    eat: () => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    },
    die: () => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }
};

// --- Input Handling ---
window.addEventListener('keydown', e => {
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
    }
    
    if (e.code === 'Space') {
        initAudio();
        if (state === STATE_START || state === STATE_GAMEOVER) {
            startGame();
        }
        return;
    }

    if (state !== STATE_PLAYING) return;

    let newDir = null;
    if (e.code === 'ArrowUp' || e.code === 'KeyW') newDir = { x: 0, y: -1 };
    else if (e.code === 'ArrowDown' || e.code === 'KeyS') newDir = { x: 0, y: 1 };
    else if (e.code === 'ArrowLeft' || e.code === 'KeyA') newDir = { x: -1, y: 0 };
    else if (e.code === 'ArrowRight' || e.code === 'KeyD') newDir = { x: 1, y: 0 };

    if (newDir) {
        // Prevent buffering too many moves
        if (currentInputQueue.length < 3) {
            // Check opposite of last queued dir, or lastProcessed if queue is empty
            let refDir = currentInputQueue.length > 0 
                ? currentInputQueue[currentInputQueue.length - 1] 
                : lastProcessedDir;
                
            // Ensure orthogonal
            if (newDir.x !== -refDir.x && newDir.y !== -refDir.y) {
                currentInputQueue.push(newDir);
            }
        }
    }
});

// --- Game Logic ---
function startGame() {
    snake = [
        { x: 15, y: 15 },
        { x: 14, y: 15 },
        { x: 13, y: 15 }
    ];
    currentDir = { x: 1, y: 0 };
    lastProcessedDir = { x: 1, y: 0 };
    currentInputQueue = [];
    score = 0;
    currentTickMs = INITIAL_TICK_MS;
    tickAccumulator = 0;
    spawnFood();
    state = STATE_PLAYING;
}

function spawnFood() {
    let valid = false;
    let rx, ry;
    while (!valid) {
        rx = Math.floor(Math.random() * COLS);
        ry = Math.floor(Math.random() * ROWS);
        valid = true;
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === rx && snake[i].y === ry) {
                valid = false;
                break;
            }
        }
    }
    food = { x: rx, y: ry };
}

function updateLogic() {
    // Process input queue
    if (currentInputQueue.length > 0) {
        currentDir = currentInputQueue.shift();
    }
    lastProcessedDir = { x: currentDir.x, y: currentDir.y };

    const head = snake[0];
    const newHead = {
        x: head.x + currentDir.x,
        y: head.y + currentDir.y
    };

    // Walls
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        gameOver();
        return;
    }

    // Body
    for (let i = 0; i < snake.length; i++) {
        // Safe to move into tail if not eating
        if (i === snake.length - 1 && (newHead.x !== food.x || newHead.y !== food.y)) {
            continue; 
        }
        if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
            gameOver();
            return;
        }
    }

    snake.unshift(newHead);

    // Eat
    if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        sfx.eat();
        spawnFood();
        // Speed up slightly
        currentTickMs = Math.max(MIN_TICK_MS, currentTickMs - 2);
    } else {
        snake.pop(); // Remove tail
    }
}

function gameOver() {
    state = STATE_GAMEOVER;
    sfx.die();
}

// --- Render ---
function drawRectSquare(x, y, color) {
    ctx.fillStyle = color;
    // Slight inset for grid look
    ctx.fillRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
}

function renderText(text, x, y, size, align='center', color='#FFF') {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

function render() {
    // Bg
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (state === STATE_START) {
        renderText("SNAKE", W/2, H/2 - 40, 60, 'center', '#00FF00');
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) renderText("Press Space to Start", W/2, H/2 + 40, 20);
        return;
    }

    // Food
    drawRectSquare(food.x, food.y, '#FF0000');

    // Snake
    for (let i = 0; i < snake.length; i++) {
        let color = i === 0 ? '#FFFF00' : '#00CC00';
        drawRectSquare(snake[i].x, snake[i].y, color);
    }

    // HUD
    renderText(`SCORE: ${score}`, 10, 20, 20, 'left');

    if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, W, H);
        
        renderText("GAME OVER", W/2, H/2 - 40, 50, 'center', '#FF0000');
        renderText(`Final Score: ${score}`, W/2, H/2 + 10, 24);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) renderText("Press Space to Restart", W/2, H/2 + 60, 18);
    }
}

// --- Game Loop ---
function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    
    // Clamp to prevent massive catchups
    if (dt > 200) dt = 200;

    if (state === STATE_PLAYING) {
        tickAccumulator += dt;
        while (tickAccumulator >= currentTickMs) {
            updateLogic();
            tickAccumulator -= currentTickMs;
            if (state !== STATE_PLAYING) break; // Don't keep ticking if dead inside loop
        }
    }

    render();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
