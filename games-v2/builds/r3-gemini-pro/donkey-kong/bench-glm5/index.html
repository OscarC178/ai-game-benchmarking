<!--
  GAME:      Donkey Kong
  RUN:       r3-gemini-pro
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 600;
    const H = 750;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_START = 0;
    const STATE_PLAYING = 1;
    const STATE_DEAD = 2;
    const STATE_LEVEL_CLEAR = 3;
    const STATE_GAMEOVER = 4;
    
    // Colors
    const COLORS = {
      background: '#000000',
      girder: '#FF6B35',
      girderDark: '#CC4422',
      ladder: '#00FFFF',
      ladderBroken: '#006666',
      mario: '#FF0000',
      marioOveralls: '#0000FF',
      marioSkin: '#FFCC99',
      dk: '#8B4513',
      dkDark: '#654321',
      barrel: '#8B4513',
      barrelLight: '#A0522D',
      pauline: '#FF69B4',
      paulineDress: '#FF1493',
      hammer: '#888888',
      hammerHandle: '#8B4513',
      oilDrum: '#4444FF',
      fire: '#FF4500',
      text: '#FFFFFF',
      red: '#FF0000',
      yellow: '#FFFF00'
    };
    
    // Physics
    const GRAVITY = 1200;
    const RUN_SPEED = 150;
    const JUMP_VELOCITY = -400;
    const CLIMB_SPEED = 100;
    const BARREL_SPEED = 80;
    
    // Level layout
    const GIRDER_Y = [620, 520, 420, 320, 220, 130];
    const GIRDER_HEIGHT = 12;
    
    // ==================== GAME STATE ====================
    let state = STATE_START;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('donkeykong_highscore') || '0');
    let lives = 3;
    let level = 1;
    let bonusTimer = 5000;
    let maxBonus = 5000;
    
    let mario = null;
    let barrels = [];
    let ladders = [];
    let hammers = [];
    let barrelSpawnTimer = 0;
    let barrelSpawnInterval = 2500;
    
    let deadTimer = 0;
    let levelClearTimer = 0;
    
    // Audio
    let audioCtx = null;
    
    // Input
    const keys = {};
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.06, slide = 0) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide !== 0) {
          osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), audioCtx.currentTime + duration);
        }
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playJump() {
      playTone(200, 0.15, 'square', 0.08, 400);
    }
    
    function playWalk() {
      playTone(400, 0.05, 'square', 0.03);
    }
    
    function playBarrelSmash() {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => playTone(200 + i * 100, 0.05, 'sawtooth', 0.08), i * 30);
      }
    }
    
    function playDeath() {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => playTone(400 - i * 100, 0.3, 'square', 0.06), i * 300);
      }
    }
    
    function playLevelClear() {
      const notes = [523, 659, 784, 1047];
      for (let i = 0; i < notes.length; i++) {
        setTimeout(() => playTone(notes[i], 0.15, 'square', 0.05), i * 100);
      }
    }
    
    function playHammer() {
      playTone(300, 0.08, 'square', 0.03);
      setTimeout(() => playTone(350, 0.08, 'square', 0.03), 100);
    }
    
    // ==================== LEVEL SETUP ====================
    function initLevel() {
      ladders = [];
      barrels = [];
      barrelSpawnTimer = 2000;
      
      // Create ladders for each girder level
      // Ladders connecting girders (x, topGirder, broken)
      // Girder 0 is bottom, girder 5 is top platform
      
      // Ladders from girder 0 to 1 (bottom)
      ladders.push({ x: 100, gy: 0, broken: false, length: 1 });
      ladders.push({ x: 450, gy: 0, broken: false, length: 1 });
      ladders.push({ x: 280, gy: 0, broken: true, length: 1 });
      
      // Ladders from girder 1 to 2
      ladders.push({ x: 200, gy: 1, broken: false, length: 1 });
      ladders.push({ x: 500, gy: 1, broken: false, length: 1 });
      
      // Ladders from girder 2 to 3
      ladders.push({ x: 120, gy: 2, broken: false, length: 1 });
      ladders.push({ x: 350, gy: 2, broken: false, length: 1 });
      ladders.push({ x: 480, gy: 2, broken: true, length: 1 });
      
      // Ladders from girder 3 to 4
      ladders.push({ x: 250, gy: 3, broken: false, length: 1 });
      ladders.push({ x: 500, gy: 3, broken: false, length: 1 });
      
      // Ladders from girder 4 to 5 (top)
      ladders.push({ x: 150, gy: 4, broken: false, length: 1 });
      ladders.push({ x: 350, gy: 4, broken: false, length: 1 });
      
      // Ladders on top platform to Pauline
      ladders.push({ x: 300, gy: 5, broken: false, length: 0.5, toTop: true });
      
      // Hammers
      hammers = [
        { x: 80, gy: 2, active: true, collected: false },
        { x: 500, gy: 3, active: true, collected: false }
      ];
    }
    
    // ==================== MARIO ====================
    function createMario() {
      return {
        x: 80,
        y: GIRDER_Y[0] - 30,
        vx: 0,
        vy: 0,
        w: 20,
        h: 28,
        onGround: false,
        onLadder: false,
        climbing: false,
        facing: 1,
        jumping: false,
        jumpOverBarrels: [],
        hammer: null,
        hammerTimer: 0,
        hammerSwing: 0,
        animFrame: 0,
        animTimer: 0,
        dead: false
      };
    }
    
    function updateMario(dt) {
      if (mario.dead) return;
      
      // Hammer timer
      if (mario.hammer) {
        mario.hammerTimer -= dt * 1000;
        mario.hammerSwing = (mario.hammerSwing + dt * 15) % (Math.PI * 2);
        
        if (mario.hammerTimer <= 0) {
          mario.hammer = null;
        }
      }
      
      // Check if on ladder
      const onLadder = checkOnLadder();
      
      if (mario.climbing) {
        // Climbing controls
        mario.vy = 0;
        mario.vx = 0;
        
        if (keys['ArrowUp'] || keys['KeyW']) {
          mario.y -= CLIMB_SPEED * dt;
          mario.animTimer += dt * 1000;
        }
        if (keys['ArrowDown'] || keys['KeyS']) {
          mario.y += CLIMB_SPEED * dt;
        }
        
        // Exit climbing at girder levels
        const girderY = getGirderY(mario.x);
        if (!onLadder || Math.abs(mario.y + mario.h - girderY) < 5) {
          if (!keys['ArrowUp'] && !keys['ArrowDown']) {
            mario.climbing = false;
            mario.y = girderY - mario.h;
          }
        }
        
        // Exit at bottom
        if (mario.y > GIRDER_Y[0] - mario.h) {
          mario.y = GIRDER_Y[0] - mario.h;
          mario.climbing = false;
        }
        
      } else if (!mario.jumping || mario.onGround) {
        // Walking controls (not during jump or if on ground)
        if (!mario.hammer) {
          if (keys['ArrowLeft'] || keys['KeyA']) {
            mario.vx = -RUN_SPEED;
            mario.facing = -1;
            mario.animTimer += dt * 1000;
          } else if (keys['ArrowRight'] || keys['KeyD']) {
            mario.vx = RUN_SPEED;
            mario.facing = 1;
            mario.animTimer += dt * 1000;
          } else {
            mario.vx = 0;
          }
        } else {
          // Hammer mode - can only walk
          if (keys['ArrowLeft'] || keys['KeyA']) {
            mario.vx = -RUN_SPEED * 0.7;
            mario.facing = -1;
          } else if (keys['ArrowRight'] || keys['KeyD']) {
            mario.vx = RUN_SPEED * 0.7;
            mario.facing = 1;
          } else {
            mario.vx = 0;
          }
        }
        
        // Start climbing
        if ((keys['ArrowUp'] || keys['KeyW']) && onLadder && !mario.hammer) {
          mario.climbing = true;
          mario.jumping = false;
          mario.vy = 0;
          mario.vx = 0;
          // Snap to ladder
          const ladder = getLadderAt(mario.x, mario.y);
          if (ladder) {
            mario.x = ladder.x - mario.w / 2;
          }
        }
        
        // Jump
        if ((keys['Space'] || keys['ArrowUp']) && mario.onGround && !mario.hammer && !mario.climbing) {
          if (!keys['ArrowUp'] || !onLadder) {
            mario.vy = JUMP_VELOCITY;
            mario.jumping = true;
            mario.onGround = false;
            playJump();
          }
        }
      }
      
      // Apply gravity if not climbing
      if (!mario.climbing) {
        mario.vy += GRAVITY * dt;
        
        // Apply velocity
        mario.x += mario.vx * dt;
        mario.y += mario.vy * dt;
        
        // Check girder collision
        const groundY = getGirderY(mario.x);
        if (mario.y + mario.h > groundY && mario.vy > 0) {
          mario.y = groundY - mario.h;
          mario.vy = 0;
          mario.onGround = true;
          mario.jumping = false;
        }
        
        // Screen bounds
        mario.x = Math.max(0, Math.min(W - mario.w, mario.x));
      }
      
      // Check hammer pickup
      for (const hammer of hammers) {
        if (!hammer.collected && hammer.active) {
          const hy = GIRDER_Y[hammer.gy] - 20;
          if (mario.x < hammer.x + 15 && mario.x + mario.w > hammer.x - 15 &&
              Math.abs(mario.y + mario.h - hy) < 30) {
            hammer.collected = true;
            mario.hammer = hammer;
            mario.hammerTimer = 8000;
            mario.jumping = false;
            mario.climbing = false;
          }
        }
      }
      
      // Check reached Pauline (top)
      if (mario.y < GIRDER_Y[5] - 30 && mario.x > 250 && mario.x < 350) {
        clearLevel();
      }
      
      // Animation
      if (mario.animTimer > 100) {
        mario.animFrame = (mario.animFrame + 1) % 2;
        mario.animTimer = 0;
        if (Math.abs(mario.vx) > 0) playWalk();
      }
    }
    
    function checkOnLadder() {
      for (const ladder of ladders) {
        if (ladder.broken) continue;
        
        const ladderTop = GIRDER_Y[ladder.gy + ladder.length] - (ladder.toTop ? 50 : 0);
        const ladderBottom = GIRDER_Y[ladder.gy];
        
        if (mario.x + mario.w > ladder.x - 10 && mario.x < ladder.x + 10 &&
            mario.y + mario.h > ladderTop && mario.y < ladderBottom) {
          return true;
        }
      }
      return false;
    }
    
    function getLadderAt(x, y) {
      for (const ladder of ladders) {
        if (ladder.broken) continue;
        
        const ladderTop = GIRDER_Y[ladder.gy + ladder.length] - (ladder.toTop ? 50 : 0);
        const ladderBottom = GIRDER_Y[ladder.gy];
        
        if (x > ladder.x - 15 && x < ladder.x + 15 &&
            y > ladderTop && y < ladderBottom) {
          return ladder;
        }
      }
      return null;
    }
    
    function getGirderY(x) {
      // Determine which girder level based on Y position
      for (let i = 0; i < GIRDER_Y.length - 1; i++) {
        const topY = i < GIRDER_Y.length - 1 ? GIRDER_Y[i + 1] : 0;
        const bottomY = GIRDER_Y[i];
        
        if (mario && mario.y + mario.h > topY && mario.y < bottomY + 50) {
          // On this girder level - calculate slope
          const slope = (i % 2 === 0) ? 0.05 : -0.05;
          const baseY = GIRDER_Y[i];
          const girderLeft = (i % 2 === 0) ? 0 : W * 0.1;
          const girderRight = (i % 2 === 0) ? W * 0.9 : W;
          
          if (x >= girderLeft && x <= girderRight) {
            const relX = x - girderLeft;
            const width = girderRight - girderLeft;
            return baseY - relX * slope;
          }
        }
      }
      
      // Default to bottom girder
      const i = 0;
      const slope = 0.05;
      return GIRDER_Y[i] - x * slope;
    }
    
    // ==================== BARRELS ====================
    function spawnBarrel() {
      barrels.push({
        x: 150,
        y: GIRDER_Y[5] + 20,
        vx: BARREL_SPEED,
        vy: 0,
        gy: 5,
        falling: false,
        fallTimer: 0,
        rotation: 0
      });
    }
    
    function updateBarrels(dt) {
      // Spawn barrels
      barrelSpawnTimer -= dt * 1000;
      if (barrelSpawnTimer <= 0) {
        barrelSpawnTimer = Math.max(1500, barrelSpawnInterval - level * 200);
        spawnBarrel();
      }
      
      for (let i = barrels.length - 1; i >= 0; i--) {
        const barrel = barrels[i];
        
        barrel.rotation += barrel.vx * dt * 0.1;
        
        if (barrel.falling) {
          barrel.vy += GRAVITY * dt;
          barrel.y += barrel.vy * dt;
          barrel.x += barrel.vx * dt * 0.3;
          
          // Check if landed on girder
          for (let g = 0; g < GIRDER_Y.length; g++) {
            const gy = GIRDER_Y[g];
            if (Math.abs(barrel.y + 10 - gy) < 15 && barrel.vy > 0) {
              barrel.y = gy - 10;
              barrel.vy = 0;
              barrel.falling = false;
              barrel.gy = g;
              barrel.vx *= -1; // Reverse direction
              break;
            }
          }
        } else {
          // Rolling on girder
          const slope = (barrel.gy % 2 === 0) ? 1 : -1;
          barrel.x += barrel.vx * dt;
          
          // Girder slope effect
          const girderLeft = (barrel.gy % 2 === 0) ? 0 : W * 0.1;
          const girderRight = (barrel.gy % 2 === 0) ? W * 0.9 : W;
          
          // Fall off edge
          if (barrel.x < girderLeft - 20 || barrel.x > girderRight + 20) {
            barrel.falling = true;
            barrel.vy = 0;
            barrel.vx = slope * 50;
          }
          
          // Check for ladder drop
          if (!barrel.falling && Math.random() < 0.002) {
            const ladder = ladders.find(l => 
              !l.broken && l.gy === barrel.gy && 
              Math.abs(l.x - barrel.x) < 20
            );
            if (ladder) {
              barrel.falling = true;
              barrel.vy = 0;
              barrel.vx = 0;
            }
          }
        }
        
        // Remove if off screen
        if (barrel.y > H || barrel.x < -50 || barrel.x > W + 50) {
          barrels.splice(i, 1);
          continue;
        }
        
        // Check collision with Mario
        if (mario && !mario.dead) {
          const dist = Math.sqrt((barrel.x - (mario.x + mario.w/2)) ** 2 + 
                                  (barrel.y - (mario.y + mario.h/2)) ** 2);
          
          if (dist < 20) {
            // Check hammer
            if (mario.hammer && Math.sin(mario.hammerSwing) > 0) {
              // Smash barrel
              score += 300;
              barrels.splice(i, 1);
              playBarrelSmash();
              continue;
            }
            
            // Check if jumping over
            if (mario.jumping && mario.vy > 0) {
              // Check if barrel passed under
              const passed = mario.jumpOverBarrels.indexOf(barrel) === -1;
              if (passed && barrel.y > mario.y + mario.h) {
                mario.jumpOverBarrels.push(barrel);
                score += 100;
              }
              continue;
            }
            
            // Death
            killMario();
            return;
          }
        }
      }
    }
    
    // ==================== COLLISIONS ====================
    function getGirderAt(x, y) {
      for (let i = 0; i < GIRDER_Y.length; i++) {
        const gy = GIRDER_Y[i];
        if (Math.abs(y - gy) < 50) {
          return i;
        }
      }
      return 0;
    }
    
    // ==================== GAME FLOW ====================
    function killMario() {
      if (mario.dead) return;
      
      mario.dead = true;
      state = STATE_DEAD;
      deadTimer = 1500;
      lives--;
      
      playDeath();
      
      if (lives <= 0) {
        state = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('donkeykong_highscore', highScore);
        }
      }
    }
    
    function clearLevel() {
      state = STATE_LEVEL_CLEAR;
      levelClearTimer = 2000;
      score += 1000 + Math.floor(bonusTimer);
      playLevelClear();
    }
    
    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      maxBonus = 5000;
      bonusTimer = maxBonus;
      
      initLevel();
      mario = createMario();
      
      state = STATE_PLAYING;
    }
    
    function nextLevel() {
      level++;
      maxBonus = Math.max(2000, 5000 - level * 500);
      bonusTimer = maxBonus;
      barrelSpawnInterval = Math.max(1500, 2500 - level * 200);
      
      initLevel();
      mario = createMario();
      
      state = STATE_PLAYING;
    }
    
    function resetLevel() {
      barrels = [];
      mario = createMario();
      bonusTimer = maxBonus;
      
      // Reset hammers
      for (const h of hammers) {
        h.collected = false;
      }
      
      state = STATE_PLAYING;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_START) {
        if (keys['Enter'] || keys['Space']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        }
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter'] || keys['Space']) {
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        }
        return;
      }
      
      if (state === STATE_DEAD) {
        deadTimer -= dtMs;
        if (deadTimer <= 0 && lives > 0) {
          resetLevel();
        }
        return;
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dtMs;
        if (levelClearTimer <= 0) {
          nextLevel();
        }
        return;
      }
      
      // Update bonus timer
      bonusTimer -= dt * 10;
      if (bonusTimer <= 0) {
        bonusTimer = 0;
        killMario();
        return;
      }
      
      // Update game
      updateMario(dt);
      updateBarrels(dt);
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_START) {
        drawStartScreen();
        return;
      }
      
      drawGirders();
      drawLadders();
      drawOilDrum();
      drawHammers();
      drawDK();
      drawPauline();
      drawBarrels();
      drawMario();
      drawHUD();
      
      if (state === STATE_DEAD) {
        drawDeathOverlay();
      }
      
      if (state === STATE_GAMEOVER) {
        drawGameOver();
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        drawLevelClear();
      }
    }
    
    function drawGirders() {
      ctx.fillStyle = COLORS.girder;
      
      for (let i = 0; i < GIRDER_Y.length - 1; i++) {
        const y = GIRDER_Y[i];
        const slope = (i % 2 === 0) ? 0.05 : -0.05;
        const leftX = (i % 2 === 0) ? 0 : W * 0.1;
        const rightX = (i % 2 === 0) ? W * 0.9 : W;
        
        ctx.beginPath();
        ctx.moveTo(leftX, y);
        ctx.lineTo(rightX, y - (rightX - leftX) * slope);
        ctx.lineTo(rightX, y - (rightX - leftX) * slope + GIRDER_HEIGHT);
        ctx.lineTo(leftX, y + GIRDER_HEIGHT);
        ctx.closePath();
        ctx.fill();
        
        // Draw rivets
        ctx.fillStyle = COLORS.girderDark;
        for (let x = leftX + 20; x < rightX; x += 40) {
          const rivetY = y + GIRDER_HEIGHT / 2 - (x - leftX) * slope;
          ctx.fillRect(x - 3, rivetY - 3, 6, 6);
        }
        ctx.fillStyle = COLORS.girder;
      }
      
      // Top platform (DK area)
      ctx.fillStyle = COLORS.girder;
      ctx.fillRect(100, GIRDER_Y[5] - 40, 400, GIRDER_HEIGHT + 40);
    }
    
    function drawLadders() {
      for (const ladder of ladders) {
        const topY = GIRDER_Y[ladder.gy + ladder.length] - (ladder.toTop ? 50 : 0);
        const bottomY = GIRDER_Y[ladder.gy];
        
        ctx.strokeStyle = ladder.broken ? COLORS.ladderBroken : COLORS.ladder;
        ctx.lineWidth = 3;
        
        // Side rails
        ctx.beginPath();
        ctx.moveTo(ladder.x - 8, bottomY);
        ctx.lineTo(ladder.x - 8, topY);
        ctx.moveTo(ladder.x + 8, bottomY);
        ctx.lineTo(ladder.x + 8, topY);
        ctx.stroke();
        
        // Rungs
        const rungSpacing = 15;
        const rungCount = Math.floor((bottomY - topY) / rungSpacing);
        
        for (let i = 0; i <= rungCount; i++) {
          if (ladder.broken && i > rungCount / 3 && i < rungCount * 2 / 3) continue;
          
          const rungY = bottomY - i * rungSpacing;
          ctx.beginPath();
          ctx.moveTo(ladder.x - 8, rungY);
          ctx.lineTo(ladder.x + 8, rungY);
          ctx.stroke();
        }
      }
    }
    
    function drawOilDrum() {
      // Oil drum
      ctx.fillStyle = COLORS.oilDrum;
      ctx.fillRect(40, GIRDER_Y[0] - 30, 30, 30);
      
      // Fire
      ctx.fillStyle = COLORS.fire;
      const flicker = Math.sin(Date.now() / 100) * 3;
      ctx.beginPath();
      ctx.moveTo(45, GIRDER_Y[0] - 30);
      ctx.lineTo(55, GIRDER_Y[0] - 50 + flicker);
      ctx.lineTo(65, GIRDER_Y[0] - 30);
      ctx.fill();
    }
    
    function drawHammers() {
      for (const hammer of hammers) {
        if (hammer.collected) continue;
        
        const y = GIRDER_Y[hammer.gy] - 15;
        const bobbing = Math.sin(Date.now() / 200) * 3;
        
        // Handle
        ctx.fillStyle = COLORS.hammerHandle;
        ctx.fillRect(hammer.x - 3, y + bobbing - 10, 6, 20);
        
        // Head
        ctx.fillStyle = COLORS.hammer;
        ctx.fillRect(hammer.x - 10, y + bobbing - 15, 20, 10);
      }
    }
    
    function drawDK() {
      const x = 150;
      const y = GIRDER_Y[5] - 35;
      
      // Body
      ctx.fillStyle = COLORS.dk;
      ctx.fillRect(x - 25, y - 40, 50, 45);
      
      // Head
      ctx.fillStyle = COLORS.dkDark;
      ctx.beginPath();
      ctx.arc(x, y - 50, 20, 0, Math.PI * 2);
      ctx.fill();
      
      // Face
      ctx.fillStyle = COLORS.marioSkin;
      ctx.beginPath();
      ctx.arc(x, y - 45, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(x - 8, y - 50, 5, 5);
      ctx.fillRect(x + 3, y - 50, 5, 5);
      
      // Arms (animated)
      const armAnim = Math.sin(Date.now() / 300) * 10;
      ctx.fillStyle = COLORS.dk;
      ctx.fillRect(x - 35, y - 30 + armAnim, 15, 8);
      ctx.fillRect(x + 20, y - 30 - armAnim, 15, 8);
    }
    
    function drawPauline() {
      const x = 300;
      const y = GIRDER_Y[5] - 70;
      
      // Dress
      ctx.fillStyle = COLORS.paulineDress;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - 15, y + 35);
      ctx.lineTo(x + 15, y + 35);
      ctx.closePath();
      ctx.fill();
      
      // Head
      ctx.fillStyle = COLORS.marioSkin;
      ctx.beginPath();
      ctx.arc(x, y - 8, 10, 0, Math.PI * 2);
      ctx.fill();
      
      // Hair
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(x, y - 12, 10, Math.PI, 0);
      ctx.fill();
      
      // Help text
      ctx.fillStyle = COLORS.text;
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('HELP!', x, y - 25);
    }
    
    function drawMario() {
      if (!mario) return;
      
      ctx.save();
      ctx.translate(mario.x + mario.w / 2, mario.y + mario.h / 2);
      ctx.scale(mario.facing, 1);
      
      if (mario.dead) {
        // Death animation
        ctx.rotate(Date.now() / 100);
        ctx.scale(0.8, 0.8);
      }
      
      // Body (overalls)
      ctx.fillStyle = COLORS.marioOveralls;
      ctx.fillRect(-8, -5, 16, 15);
      
      // Shirt
      ctx.fillStyle = COLORS.mario;
      ctx.fillRect(-7, -12, 14, 10);
      
      // Head
      ctx.fillStyle = COLORS.marioSkin;
      ctx.beginPath();
      ctx.arc(0, -14, 7, 0, Math.PI * 2);
      ctx.fill();
      
      // Hat
      ctx.fillStyle = COLORS.mario;
      ctx.fillRect(-7, -20, 14, 6);
      ctx.fillRect(-5, -23, 10, 4);
      
      // Legs
      ctx.fillStyle = COLORS.marioOveralls;
      const legOffset = mario.animFrame * 3;
      ctx.fillRect(-6, 7 + legOffset, 5, 8);
      ctx.fillRect(1, 7 - legOffset, 5, 8);
      
      // Hammer
      if (mario.hammer) {
        ctx.fillStyle = COLORS.hammerHandle;
        const swingAngle = Math.sin(mario.hammerSwing) * 0.5;
        ctx.save();
        ctx.translate(10, -5);
        ctx.rotate(swingAngle - 0.5);
        ctx.fillRect(-2, 0, 4, 20);
        ctx.fillStyle = COLORS.hammer;
        ctx.fillRect(-8, -8, 16, 10);
        ctx.restore();
      }
      
      ctx.restore();
    }
    
    function drawBarrels() {
      for (const barrel of barrels) {
        ctx.save();
        ctx.translate(barrel.x, barrel.y);
        ctx.rotate(barrel.rotation);
        
        // Barrel body
        ctx.fillStyle = COLORS.barrel;
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.fill();
        
        // Barrel bands
        ctx.strokeStyle = COLORS.barrelLight;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.stroke();
        
        // Inner circle
        ctx.fillStyle = COLORS.barrelLight;
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
    }
    
    function drawHUD() {
      // Score
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 18px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 30);
      
      // High score
      ctx.textAlign = 'center';
      ctx.fillStyle = COLORS.yellow;
      ctx.fillText(`TOP: ${highScore}`, W / 2, 30);
      
      // Lives
      ctx.textAlign = 'right';
      ctx.fillStyle = COLORS.mario;
      for (let i = 0; i < lives; i++) {
        ctx.fillRect(W - 30 - i * 25, 15, 15, 20);
      }
      
      // Level
      ctx.textAlign = 'left';
      ctx.fillStyle = COLORS.text;
      ctx.fillText(`L=${String(level).padStart(2, '0')}`, 10, 55);
      
      // Bonus timer
      ctx.fillStyle = bonusTimer < 1000 ? COLORS.red : COLORS.text;
      ctx.fillText(`BONUS: ${Math.floor(bonusTimer)}`, W - 150, 55);
    }
    
    function drawStartScreen() {
      ctx.fillStyle = COLORS.red;
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DONKEY KONG', W / 2, H / 2 - 100);
      
      // Draw DK sprite
      ctx.fillStyle = COLORS.dk;
      ctx.fillRect(W / 2 - 40, H / 2 - 40, 80, 60);
      ctx.fillStyle = COLORS.dkDark;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2 - 50, 30, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Climb to the top and save Pauline!', W / 2, H / 2 + 60);
      ctx.fillText('Avoid the barrels!', W / 2, H / 2 + 90);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = 'bold 24px Arial, sans-serif';
        ctx.fillText('Press Enter or Space to Start', W / 2, H / 2 + 160);
      }
      
      ctx.fillStyle = '#888';
      ctx.font = '14px Arial, sans-serif';
      ctx.fillText('Arrow Keys to move, Space to jump', W / 2, H / 2 + 220);
    }
    
    function drawDeathOverlay() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(0, 0, W, H);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.red;
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 40);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = '20px Arial, sans-serif';
        ctx.fillText('Press Enter or Space to Restart', W / 2, H / 2 + 100);
      }
    }
    
    function drawLevelClear() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.yellow;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL CLEAR!', W / 2, H / 2 - 20);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText(`Bonus: ${Math.floor(bonusTimer)}`, W / 2, H / 2 + 40);
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
