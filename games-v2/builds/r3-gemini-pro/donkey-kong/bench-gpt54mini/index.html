<!--
  GAME:      Donkey Kong
  RUN:       r3-gemini-pro
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Donkey Kong - Mini</title>
<style>
  html,body{height:100%;margin:0;background:#000;font-family:monospace}
  .wrap{width:600px;height:750px;margin:12px auto;position:relative}
  canvas{display:block;background:#000;border:4px solid #111}
  #hud{position:absolute;left:8px;top:8px;color:#fff}
  #hud .right{position:absolute;right:8px;top:8px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;pointer-events:none;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="600" height="750"></canvas>
  <div id="hud">SCORE: <span id="score">0</span> &nbsp; HI: <span id="hi">0</span> &nbsp; LIVES: <span id="lives">3</span> &nbsp; STAGE: <span id="stage">1</span></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); const W=canvas.width,H=canvas.height;
  const overlay=document.getElementById('overlay'); const scoreEl=document.getElementById('score'); const hiEl=document.getElementById('hi'); const livesEl=document.getElementById('lives'); const stageEl=document.getElementById('stage');

  let state='title'; let score=0,high=0,lives=3,stage=1; try{ const h=localStorage.getItem('dk_high'); if(h) high=parseInt(h,10)||0; }catch(e){high=0}

  let bonusStart=5000, bonus=bonusStart;

  // level geometry: platforms (girders) array top-down
  const platforms=[];
  function makePlatforms(){ platforms.length=0; platforms.push({x1:40,x2:560,y:690,th:12,slope:0}); platforms.push({x1:60,x2:540,y:610,th:12,slope:-1}); platforms.push({x1:20,x2:520,y:530,th:12,slope:1}); platforms.push({x1:80,x2:500,y:450,th:12,slope:-1}); platforms.push({x1:40,x2:480,y:370,th:12,slope:1}); platforms.push({x1:100,x2:420,y:290,th:12,slope:0}); }

  const ladders=[]; function makeLadders(){ ladders.length=0; ladders.push({x:120,y1:370,y2:690,broken:false}); ladders.push({x:260,y1:450,y2:690,broken:false}); ladders.push({x:420,y1:530,y2:690,broken:false}); ladders.push({x:320,y1:290,y2:530,broken:true,gapY:390}); }

  const hammers=[]; function makeHammers(){ hammers.length=0; hammers.push({x:200,y:510,w:18,h:12,used:false}); hammers.push({x:360,y:350,w:18,h:12,used:false}); }

  const barrels=[];
  function spawnBarrel(){ const dkX=100, dkY=60; const b={x:dkX+40,y:dkY+40,w:18,h:18,vx: (Math.random()<0.5?120:-120),vy:0,state:'rolling',plat:platforms.length-1,scored:false}; const pl=platforms[b.plat]; b.y=pl.y - b.h -2; b.x=dkX+40; barrels.push(b); }

  makePlatforms(); makeLadders(); makeHammers(); barrels.length=0;

  // characters
  const player={w:24,h:30,x:80,y:660,vx:0,vy:0,onGround:false,climbing:false,canJump:true,hammer:0,facing:1};
  const dk={x:80,y:40,w:64,h:56,throwTimer:2}; const pauline={x:320,y:200,w:20,h:32};

  const GRAV=900; const PLAYER_SPEED=150; const JUMP_V=-340; const CLIMB_SPEED=120; const BARREL_SPEED=120;

  const keys={}; window.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key==='Enter'){ if(state==='title' || state==='gameover') startGame(); } if(e.key==='p'||e.key==='P') togglePause(); }); window.addEventListener('keyup',e=>{ keys[e.key]=false; });

  function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

  function updatePlayer(dt){ if(state!=='playing') return; bonus = Math.max(0, bonus - Math.floor(60*dt)); player.hammer = Math.max(0, player.hammer - dt);
    // ladder detection
    let nearL=null; for(const L of ladders){ if(player.x+player.w/2 > L.x-12 && player.x+player.w/2 < L.x+12 && player.y+player.h> L.y1-8 && player.y < L.y2+8){ nearL=L; break; } }
    if(nearL && (keys['ArrowUp']||keys['w']||keys['ArrowDown']||keys['s'])){ player.climbing=true; player.vx=0; player.vy=0; player.x = nearL.x - player.w/2 + 6; if(keys['ArrowUp']||keys['w']) player.y -= CLIMB_SPEED*dt; if(keys['ArrowDown']||keys['s']) player.y += CLIMB_SPEED*dt; if(nearL.broken && player.y<nearL.gapY) player.y = Math.max(player.y, nearL.gapY+8); } else { player.climbing=false; if(keys['ArrowLeft']||keys['a']){ player.vx = -PLAYER_SPEED; player.facing=-1; } else if(keys['ArrowRight']||keys['d']){ player.vx = PLAYER_SPEED; player.facing=1; } else player.vx=0; if((keys[' ']||keys['Spacebar']||keys['Space']) && player.onGround && player.canJump && player.hammer<=0){ player.vy = JUMP_V; player.onGround=false; player.canJump=false; } player.vy += GRAV*dt; player.x += player.vx*dt; player.y += player.vy*dt; player.x = Math.max(0, Math.min(W-player.w, player.x)); }
    // grounding on platforms
    player.onGround=false; for(const pl of platforms){ const fx = player.x + player.w/2; if(fx >= pl.x1 && fx <= pl.x2){ const t=(fx-pl.x1)/(pl.x2-pl.x1); const rise = (pl.x2-pl.x1)*0.02*pl.slope; const surfY = pl.y - rise*(t-0.5)*2; const footY = surfY - player.h; if(player.y > footY-4 && player.y < footY+20 && player.vy>=-200){ player.onGround=true; player.vy=0; player.y=footY; break; } } }
    // hammers
    for(const h of hammers) if(!h.used && rectsOverlap(player,{x:h.x,y:h.y,w:h.w,h:h.h})){ h.used=true; player.hammer=8; score+=300; }
    // reach pauline
    if(player.x + player.w > pauline.x - 10 && player.x < pauline.x + pauline.w + 10 && player.y < pauline.y + pauline.h + 10){ score += 1000 + bonus; nextStage(); }
  }

  function updateBarrels(dt){ if(state!=='playing') return; dk.throwTimer -= dt; if(dk.throwTimer<=0){ spawnBarrel(); dk.throwTimer = Math.max(0.5, 2 - stage*0.08) + Math.random()*1.5; }
    for(let i=barrels.length-1;i>=0;i--){ const b=barrels[i]; if(b.state==='rolling'){ const pl=platforms[b.plat]; if(!pl){ barrels.splice(i,1); continue; } // move along
        const dir = pl.slope===0? (b.vx>0?1:-1) : (pl.slope>0?1:-1); b.x += b.vx*dt; const t=(b.x - pl.x1)/(pl.x2 - pl.x1); const rise=(pl.x2-pl.x1)*0.02*pl.slope; const surfY = pl.y - rise*(t-0.5)*2; b.y = surfY - b.h -2; if(b.x < pl.x1 || b.x > pl.x2){ b.state='falling'; b.vy=0; } // ladder chance
        for(const L of ladders){ if(Math.abs(b.x - L.x) < 10 && b.y < L.y2 && b.y > L.y1){ if(Math.random()<0.08){ b.state='falling'; b.vy=0; } } }
      } else if(b.state==='falling'){ b.vy += GRAV*dt*0.9; b.y += b.vy*dt; const cx = b.x + b.w/2; let landed=false; for(let pi=0;pi<platforms.length;pi++){ const pl=platforms[pi]; if(cx >= pl.x1-6 && cx <= pl.x2+6 && b.y + b.h >= pl.y - 12 && b.y + b.h <= pl.y + 40){ b.plat=pi; b.state='rolling'; b.vx = (pl.slope===0? (Math.random()<0.5?BARREL_SPEED:-BARREL_SPEED) : (pl.slope>0?BARREL_SPEED:-BARREL_SPEED)); b.y = pl.y - b.h -2; landed=true; break; } } if(!landed && b.y > H+50){ barrels.splice(i,1); continue; } }
      // player collision
      if(rectsOverlap(player,{x:b.x,y:b.y,w:b.w,h:b.h})){ if(player.hammer>0){ score+=300; barrels.splice(i,1); } else { loseLife(); barrels.splice(i,1); } }
    }
  }

  function loseLife(){ if(state!=='playing') return; lives--; if(lives<=0){ state='gameover'; overlay.style.display='flex'; overlay.textContent='GAME OVER\nPress Enter to Restart'; if(score>high){ high=score; try{ localStorage.setItem('dk_high',String(high)); }catch(e){} } } else { player.x=80; player.y=660; player.vx=0; player.vy=0; barrels.length=0; player.hammer=0; state='ready'; setTimeout(()=>state='playing',1000); } }

  function nextStage(){ state='stageclear'; setTimeout(()=>{ stage++; stageEl.textContent=stage; bonusStart = Math.max(1000, bonusStart - 400); bonus = bonusStart; barrels.length=0; makeHammers(); player.x=80; player.y=660; state='playing'; },1000); }

  function startGame(){ score=0; lives=3; stage=1; bonusStart=5000; bonus=bonusStart; makePlatforms(); makeLadders(); makeHammers(); barrels.length=0; player.x=80; player.y=660; state='ready'; overlay.style.display='none'; setTimeout(()=>state='playing',800); }

  function togglePause(){ if(state==='playing'){ state='paused'; overlay.style.display='flex'; overlay.textContent='PAUSED'; } else if(state==='paused'){ state='playing'; overlay.style.display='none'; } }

  function draw(){ ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // draw platforms
    for(const pl of platforms){ ctx.save(); ctx.fillStyle='#FF4477'; const w=pl.x2-pl.x1; if(pl.slope===0){ ctx.fillRect(pl.x1,pl.y-pl.th,w,pl.th); } else { const slopePx=pl.slope*0.02*w; ctx.beginPath(); ctx.moveTo(pl.x1, pl.y - pl.th/2 - slopePx/2); ctx.lineTo(pl.x2, pl.y - pl.th/2 + slopePx/2); ctx.lineTo(pl.x2, pl.y + pl.th/2 + slopePx/2); ctx.lineTo(pl.x1, pl.y + pl.th/2 - slopePx/2); ctx.closePath(); ctx.fill(); } ctx.restore(); ctx.fillStyle='#AA3355'; for(let rx=pl.x1+10; rx<pl.x2; rx+=40) ctx.fillRect(rx, pl.y-pl.th+4, 6,6); }
    // ladders
    for(const L of ladders){ ctx.fillStyle='#36E0FF'; ctx.fillRect(L.x-8,L.y1,4,L.y2-L.y1); ctx.fillRect(L.x+6,L.y1,4,L.y2-L.y1); for(let ry=L.y1; ry<L.y2; ry+=24) ctx.fillRect(L.x-8,ry,14,4); if(L.broken) ctx.clearRect(L.x-9, L.gapY-4, 18,24); }
    // oil drum
    ctx.fillStyle='#0033AA'; ctx.fillRect(30,726,40,24); ctx.fillStyle='#FF6600'; ctx.fillRect(34,730,32,6);
    // hammers
    for(const h of hammers) if(!h.used){ ctx.fillStyle='#FFD633'; ctx.fillRect(h.x,h.y,h.w,h.h); ctx.fillStyle='#AA8833'; ctx.fillRect(h.x+6,h.y+2,4,8); }
    // barrels
    for(const b of barrels){ ctx.fillStyle='#8B4513'; ctx.beginPath(); ctx.ellipse(b.x+b.w/2, b.y+b.h/2, b.w/2, b.h/2, 0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#4B2A08'; ctx.fillRect(b.x+2,b.y+b.h/2-1,b.w-4,2); }
    // player
    ctx.save(); ctx.translate(player.x,player.y); ctx.fillStyle='#FF0000'; ctx.fillRect(4,0,16,10); ctx.fillStyle='#2244FF'; ctx.fillRect(2,10,20,18); ctx.fillStyle='#F5CBA7'; ctx.fillRect(6,-8,12,8); if(player.hammer>0){ ctx.fillStyle='#FFD633'; ctx.fillRect(18,10,12,6); } ctx.restore();
    // DK
    ctx.fillStyle='#663322'; ctx.fillRect(dk.x,dk.y,dk.w,dk.h); ctx.fillStyle='#000'; ctx.fillRect(dk.x+8,dk.y+18,24,8);
    // Pauline
    ctx.fillStyle='#FF88FF'; ctx.fillRect(pauline.x,pauline.y,pauline.w,pauline.h); ctx.fillStyle='#FFF'; ctx.fillText('HELP!', pauline.x-10, pauline.y-6);
    // HUD
    scoreEl.textContent = score; hiEl.textContent = high; livesEl.textContent = lives; stageEl.textContent = stage; ctx.fillStyle='#FFF'; ctx.fillText('BONUS: '+bonus, W/2 - 40, 20);
  }

  let last = performance.now(); function loop(now){ const dt=Math.min(0.06,(now-last)/1000); last=now; if(state==='playing'){ updatePlayer(dt); updateBarrels(dt); } draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  overlay.style.display='flex'; overlay.textContent = 'DONKEY KONG\n\nClimb girders, avoid barrels, collect hammers to smash them.\nControls: Arrow keys/WASD to move, Space to jump, P to pause.\nPress Enter to start.';

})();
</script>
</body>
</html>
