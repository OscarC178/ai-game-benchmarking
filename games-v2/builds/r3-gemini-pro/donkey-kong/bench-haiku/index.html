<!--
  GAME:      Donkey Kong
  RUN:       r3-gemini-pro
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
    canvas { background: #000; display: block; border: 2px solid #333; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="dkCanvas" width="600" height="750"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('dkCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 600, HEIGHT = 750;

    const STATES = { START: 0, PLAYING: 1, DEAD: 2, LEVEL_CLEAR: 3, GAME_OVER: 4 };
    let gameState = STATES.START;
    let score = 0, lives = 3, level = 1, gameTime = 0;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    function playSound(f, d, t = 'square') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = f;
        osc.type = t;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + d);
      } catch (e) {}
    }

    // Platforms (girders) - y positions from top, with slopes
    const platforms = [
      { y: 100, x1: 50, x2: 550, slope: 0.15 },  // L6 (top)
      { y: 200, x1: 50, x2: 550, slope: -0.1 },
      { y: 300, x1: 50, x2: 550, slope: 0.15 },
      { y: 400, x1: 50, x2: 550, slope: -0.1 },
      { y: 500, x1: 50, x2: 550, slope: 0.15 },
      { y: 600, x1: 50, x2: 550, slope: -0.1 }
    ];

    // Ladders
    const ladders = [
      { x: 120, y1: 200, y2: 300, broken: false },
      { x: 350, y1: 200, y2: 300, broken: false },
      { x: 100, y1: 300, y2: 400, broken: false },
      { x: 400, y1: 300, y2: 400, broken: false },
      { x: 150, y1: 400, y2: 500, broken: false },
      { x: 380, y1: 400, y2: 500, broken: false },
      { x: 100, y1: 500, y2: 600, broken: false },
      { x: 450, y1: 500, y2: 600, broken: false }
    ];

    let mario = { x: 100, y: 600, vx: 0, vy: 0, w: 24, h: 30, jumping: false, onGround: false, climbing: false, platformIdx: 5, facing: 1, hammerTime: 0 };
    let barrels = [];
    let hammers = [
      { x: 150, y: 320, active: true },
      { x: 450, y: 320, active: true }
    ];

    let barrelSpawnTimer = 0, barrelSpawnInterval = 3;
    let deathTimer = 0, levelClearTimer = 0;
    let bonus = 5000, maxBonus = 5000;
    let keys = {};

    function getPlatformY(platformIdx, x) {
      const p = platforms[platformIdx];
      return p.y + (x - p.x1) * p.slope;
    }

    function getGroundPlatform(x, y) {
      for (let i = 0; i < platforms.length; i++) {
        const groundY = getPlatformY(i, x);
        if (y >= groundY - 5 && y <= groundY + 20 && x > 30 && x < WIDTH - 30) {
          return i;
        }
      }
      return -1;
    }

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === 'enter') {
        initAudio();
        if (gameState === STATES.START || gameState === STATES.GAME_OVER) {
          score = 0; lives = 3; level = 1;
          mario = { x: 100, y: 600, vx: 0, vy: 0, w: 24, h: 30, jumping: false, onGround: false, climbing: false, platformIdx: 5, facing: 1, hammerTime: 0 };
          barrels = [];
          bonus = 5000;
          maxBonus = 5000;
          barrelSpawnTimer = 0;
          barrelSpawnInterval = 3;
          hammers = [
            { x: 150, y: 320, active: true },
            { x: 450, y: 320, active: true }
          ];
          gameState = STATES.PLAYING;
        }
      }

      if (gameState === STATES.PLAYING && mario.hammerTime <= 0) {
        if ((key === 'arrowup' || key === 'w') && mario.onGround && !mario.climbing) {
          mario.vy = -400;
          mario.jumping = true;
          mario.onGround = false;
          playSound(600, 0.1);
        }
      }

      if ((key === ' ') && gameState === STATES.PLAYING && mario.hammerTime <= 0) {
        if (mario.onGround && !mario.climbing) {
          mario.vy = -400;
          mario.jumping = true;
          mario.onGround = false;
          playSound(600, 0.1);
        }
      }
    });

    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update(dt) {
      if (gameState !== STATES.PLAYING) return;

      gameTime += dt;
      bonus -= dt * 500;
      if (bonus < 0) {
        lives--;
        if (lives <= 0) gameState = STATES.GAME_OVER;
        else {
          gameState = STATES.DEAD;
          deathTimer = 1;
        }
      }

      // Mario controls
      mario.climbing = false;
      if (keys['arrowleft'] || keys['a']) {
        mario.vx = -200;
        mario.facing = -1;
      } else if (keys['arrowright'] || keys['d']) {
        mario.vx = 200;
        mario.facing = 1;
      } else {
        mario.vx = 0;
      }

      if ((keys['arrowup'] || keys['w']) && mario.onGround) {
        for (let l of ladders) {
          if (Math.abs(mario.x - l.x) < 15 && !l.broken) {
            mario.climbing = true;
            mario.vy = -150;
            mario.x = l.x;
            break;
          }
        }
      }
      if ((keys['arrowdown'] || keys['s']) && mario.onGround) {
        for (let l of ladders) {
          if (Math.abs(mario.x - l.x) < 15 && !l.broken) {
            mario.climbing = true;
            mario.vy = 150;
            mario.x = l.x;
            break;
          }
        }
      }

      if (!mario.climbing) {
        mario.vy += 900 * dt;
        mario.vy = Math.min(mario.vy, 500);
      }

      mario.x += mario.vx * dt;
      mario.y += mario.vy * dt;

      mario.x = Math.max(30, Math.min(WIDTH - 30, mario.x));

      // Ground detection
      const groundPlat = getGroundPlatform(mario.x, mario.y + mario.h);
      if (groundPlat >= 0 && mario.vy >= 0) {
        mario.y = getPlatformY(groundPlat, mario.x) - mario.h;
        mario.vy = 0;
        mario.jumping = false;
        mario.onGround = true;
        mario.platformIdx = groundPlat;
      } else if (mario.y > HEIGHT) {
        lives--;
        if (lives <= 0) gameState = STATES.GAME_OVER;
        else {
          gameState = STATES.DEAD;
          deathTimer = 1;
        }
      } else {
        mario.onGround = false;
      }

      // Hammer logic
      if (mario.hammerTime > 0) {
        mario.hammerTime -= dt;
        mario.jumping = false;
        mario.onGround = false;
      } else {
        // Check hammer pickups
        for (let h of hammers) {
          if (h.active && Math.abs(mario.x - h.x) < 25 && Math.abs(mario.y - h.y) < 25) {
            mario.hammerTime = 8;
            h.active = false;
            playSound(700, 0.3);
          }
        }
      }

      // Barrel spawning
      barrelSpawnTimer += dt;
      if (barrelSpawnTimer > barrelSpawnInterval) {
        barrelSpawnTimer = 0;
        barrels.push({ x: 100, y: 100, vx: 150, vy: 0, w: 18, h: 18 });
        barrelSpawnInterval = Math.max(1.5, 3 - level * 0.3);
      }

      // Update barrels
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        b.vy += 900 * dt;
        b.vy = Math.min(b.vy, 400);

        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // Ground detection
        const barrelGroundPlat = getGroundPlatform(b.x, b.y + b.h);
        if (barrelGroundPlat >= 0 && b.vy >= 0) {
          b.y = getPlatformY(barrelGroundPlat, b.x) - b.h;
          b.vy = 0;
          const p = platforms[barrelGroundPlat];
          b.vx = b.vx > 0 ? 150 : -150;
        }

        if (b.y > HEIGHT + 50) barrels.splice(i, 1);

        // Barrel-Mario collision
        if (mario.hammerTime > 0) {
          if (Math.abs(b.x - mario.x) < 30 && Math.abs(b.y - mario.y) < 30) {
            score += 300;
            barrels.splice(i, 1);
            playSound(400, 0.2);
          }
        } else {
          if (Math.abs(b.x - mario.x) < 22 && Math.abs(b.y - mario.y) < 27) {
            lives--;
            if (lives <= 0) gameState = STATES.GAME_OVER;
            else {
              gameState = STATES.DEAD;
              deathTimer = 1;
            }
            playSound(100, 0.5);
          }
        }
      }

      // Pauline check
      if (mario.x > 250 && mario.x < 350 && mario.y < 120) {
        gameState = STATES.LEVEL_CLEAR;
        score += 1000 + Math.floor(bonus);
        bonus = Math.max(1000, bonus - 500);
        maxBonus = bonus;
        level++;
        levelClearTimer = 2;
      }

      if (gameState === STATES.DEAD) {
        deathTimer -= dt;
        if (deathTimer <= 0) {
          mario = { x: 100, y: 600, vx: 0, vy: 0, w: 24, h: 30, jumping: false, onGround: false, climbing: false, platformIdx: 5, facing: 1, hammerTime: 0 };
          barrels = [];
          gameState = STATES.PLAYING;
        }
      }

      if (gameState === STATES.LEVEL_CLEAR) {
        levelClearTimer -= dt;
        if (levelClearTimer <= 0) {
          mario = { x: 100, y: 600, vx: 0, vy: 0, w: 24, h: 30, jumping: false, onGround: false, climbing: false, platformIdx: 5, facing: 1, hammerTime: 0 };
          barrels = [];
          bonus = maxBonus;
          barrelSpawnTimer = 0;
          hammers = [
            { x: 150, y: 320, active: true },
            { x: 450, y: 320, active: true }
          ];
          gameState = STATES.PLAYING;
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Platforms
      ctx.strokeStyle = '#FF3333';
      ctx.lineWidth = 8;
      for (let p of platforms) {
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y);
        ctx.lineTo(p.x2, p.y + (p.x2 - p.x1) * p.slope);
        ctx.stroke();
      }

      // Ladders
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 2;
      for (let l of ladders) {
        ctx.beginPath();
        ctx.moveTo(l.x, l.y1);
        ctx.lineTo(l.x, l.y2);
        ctx.stroke();
        for (let y = l.y1; y < l.y2; y += 15) {
          ctx.beginPath();
          ctx.moveTo(l.x - 8, y);
          ctx.lineTo(l.x + 8, y);
          ctx.stroke();
        }
      }

      // Hammers
      ctx.fillStyle = '#FFFF00';
      for (let h of hammers) {
        if (h.active) {
          ctx.fillRect(h.x - 8, h.y - 8, 16, 16);
        }
      }

      // Barrels
      ctx.fillStyle = '#8B4513';
      for (let b of barrels) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Mario
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(mario.x - 12, mario.y, 24, 15);
      ctx.fillStyle = '#0000FF';
      ctx.fillRect(mario.x - 12, mario.y - 15, 24, 15);
      ctx.fillStyle = '#FFCC99';
      ctx.fillRect(mario.x - 6, mario.y - 30, 12, 15);

      // Donkey Kong
      ctx.fillStyle = '#8B4500';
      ctx.fillRect(50, 70, 60, 60);
      ctx.fillStyle = '#000';
      ctx.fillRect(60, 85, 8, 8);
      ctx.fillRect(72, 85, 8, 8);

      // Pauline
      ctx.fillStyle = '#FF1493';
      ctx.fillRect(280, 80, 20, 30);
      ctx.fillStyle = '#FFCC99';
      ctx.fillRect(285, 60, 10, 20);

      // HUD
      ctx.fillStyle = '#FFF';
      ctx.font = '14px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, HEIGHT - 10);
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level + '  Lives: ' + lives, WIDTH / 2, HEIGHT - 10);
      ctx.textAlign = 'right';
      ctx.fillText('Bonus: ' + Math.floor(bonus), WIDTH - 10, HEIGHT - 10);

      if (gameState === STATES.START) {
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('DONKEY KONG', WIDTH / 2, 100);
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('HOW HIGH CAN YOU GET?', WIDTH / 2, 200);
        ctx.fillText('Level ' + level, WIDTH / 2, 250);
        ctx.fillText('Arrow Keys to Move, Space to Jump', WIDTH / 2, 350);
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 300);
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Final Score: ' + score, WIDTH / 2, 380);
        ctx.fillText('Press ENTER to Restart', WIDTH / 2, 440);
      }
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
