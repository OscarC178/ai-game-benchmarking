<!--
  GAME:      Asteroids
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    const STATE_RESPAWN = 4;
    
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('asteroids_highscore') || '0');
    let lives = 3;
    let wave = 1;
    
    let ship = null;
    let bullets = [];
    let asteroids = [];
    let particles = [];
    let ufo = null;
    let ufoBullets = [];
    let ufoTimer = 0;
    let invincibleTimer = 0;
    
    const keys = {};
    
    // Audio context
    let audioCtx = null;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playSound(freq, duration, type = 'square') {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    function initGame() {
      ship = {
        x: W / 2,
        y: H / 2,
        vx: 0,
        vy: 0,
        angle: -Math.PI / 2,
        radius: 15,
        thrusting: false
      };
      bullets = [];
      asteroids = [];
      particles = [];
      ufo = null;
      ufoBullets = [];
      ufoTimer = 0;
      invincibleTimer = 3000;
      score = 0;
      lives = 3;
      wave = 1;
      spawnAsteroids(4);
    }
    
    function spawnAsteroids(count) {
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * W;
          y = Math.random() * H;
        } while (distance(x, y, ship.x, ship.y) < 150);
        
        asteroids.push(createAsteroid(x, y, 3));
      }
    }
    
    function createAsteroid(x, y, size) {
      const speed = 1 + Math.random() * 2;
      const angle = Math.random() * Math.PI * 2;
      
      // Create irregular shape
      const vertices = [];
      const numVertices = 8 + Math.floor(Math.random() * 5);
      const baseRadius = size === 3 ? 40 : size === 2 ? 20 : 10;
      
      for (let i = 0; i < numVertices; i++) {
        const a = (i / numVertices) * Math.PI * 2;
        const r = baseRadius * (0.7 + Math.random() * 0.6);
        vertices.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
      }
      
      return {
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: size,
        radius: baseRadius,
        vertices: vertices,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 0.02
      };
    }
    
    function distance(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }
    
    function shoot() {
      if (bullets.length < 8) {
        bullets.push({
          x: ship.x + Math.cos(ship.angle) * 20,
          y: ship.y + Math.sin(ship.angle) * 20,
          vx: Math.cos(ship.angle) * 10,
          vy: Math.sin(ship.angle) * 10,
          life: 60
        });
        playSound(800, 0.1, 'square');
      }
    }
    
    function spawnUFO() {
      if (!ufo && Math.random() < 0.3) {
        const small = Math.random() < 0.3;
        ufo = {
          x: Math.random() < 0.5 ? -30 : W + 30,
          y: Math.random() * H,
          vx: (Math.random() < 0.5 ? 1 : -1) * 2,
          vy: 0,
          small: small,
          radius: small ? 15 : 25,
          shootTimer: 0
        };
        playSound(200, 0.3, 'sawtooth');
      }
    }
    
    function createExplosion(x, y, count, speed = 2) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const vel = Math.random() * speed + speed;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel,
          life: 30 + Math.random() * 30
        });
      }
    }
    
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_RESPAWN) {
        invincibleTimer -= dtMs;
        if (invincibleTimer <= 0) {
          invincibleTimer = 3000;
          ship.x = W / 2;
          ship.y = H / 2;
          ship.vx = 0;
          ship.vy = 0;
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Invincibility timer
      if (invincibleTimer > 0) {
        invincibleTimer -= dtMs;
      }
      
      // Ship controls
      if (keys.left) ship.angle -= 0.1;
      if (keys.right) ship.angle += 0.1;
      
      if (keys.thrust) {
        ship.vx += Math.cos(ship.angle) * 0.15;
        ship.vy += Math.sin(ship.angle) * 0.15;
        ship.thrusting = true;
      } else {
        ship.thrusting = false;
      }
      
      // Friction
      ship.vx *= 0.99;
      ship.vy *= 0.99;
      
      // Max speed
      const speed = Math.sqrt(ship.vx ** 2 + ship.vy ** 2);
      if (speed > 8) {
        ship.vx = (ship.vx / speed) * 8;
        ship.vy = (ship.vy / speed) * 8;
      }
      
      // Move ship
      ship.x += ship.vx;
      ship.y += ship.vy;
      
      // Wrap ship
      if (ship.x < 0) ship.x = W;
      if (ship.x > W) ship.x = 0;
      if (ship.y < 0) ship.y = H;
      if (ship.y > H) ship.y = 0;
      
      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].vx;
        bullets[i].y += bullets[i].vy;
        bullets[i].life--;
        
        // Wrap
        if (bullets[i].x < 0) bullets[i].x = W;
        if (bullets[i].x > W) bullets[i].x = 0;
        if (bullets[i].y < 0) bullets[i].y = H;
        if (bullets[i].y > H) bullets[i].y = 0;
        
        if (bullets[i].life <= 0) bullets.splice(i, 1);
      }
      
      // Update asteroids
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.x += a.vx;
        a.y += a.vy;
        a.rotation += a.rotationSpeed;
        
        // Wrap
        if (a.x < -a.radius) a.x = W + a.radius;
        if (a.x > W + a.radius) a.x = -a.radius;
        if (a.y < -a.radius) a.y = H + a.radius;
        if (a.y > H + a.radius) a.y = -a.radius;
      }
      
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        particles[i].life--;
        if (particles[i].life <= 0) particles.splice(i, 1);
      }
      
      // UFO logic
      ufoTimer += dtMs;
      if (ufoTimer > 15000) {
        spawnUFO();
        ufoTimer = 0;
      }
      
      if (ufo) {
        ufo.x += ufo.vx;
        ufo.y += ufo.vy;
        
        // Random direction change
        if (Math.random() < 0.02) {
          ufo.vy = (Math.random() - 0.5) * 3;
        }
        
        // Wrap y
        if (ufo.y < 0) ufo.y = H;
        if (ufo.y > H) ufo.y = 0;
        
        // Shoot
        ufo.shootTimer += dtMs;
        if (ufo.shootTimer > (ufo.small ? 1500 : 2500)) {
          ufo.shootTimer = 0;
          let targetAngle;
          if (ufo.small) {
            // Accurate shot
            targetAngle = Math.atan2(ship.y - ufo.y, ship.x - ufo.x);
          } else {
            // Random shot
            targetAngle = Math.random() * Math.PI * 2;
          }
          ufoBullets.push({
            x: ufo.x,
            y: ufo.y,
            vx: Math.cos(targetAngle) * 5,
            vy: Math.sin(targetAngle) * 5,
            life: 80
          });
          playSound(400, 0.1, 'square');
        }
        
        // Remove if off screen
        if (ufo.x < -50 || ufo.x > W + 50) {
          ufo = null;
        }
      }
      
      // Update UFO bullets
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        ufoBullets[i].x += ufoBullets[i].vx;
        ufoBullets[i].y += ufoBullets[i].vy;
        ufoBullets[i].life--;
        
        if (ufoBullets[i].x < 0 || ufoBullets[i].x > W ||
            ufoBullets[i].y < 0 || ufoBullets[i].y > H ||
            ufoBullets[i].life <= 0) {
          ufoBullets.splice(i, 1);
        }
      }
      
      // Collision: bullets vs asteroids
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          if (distance(bullets[i].x, bullets[i].y, asteroids[j].x, asteroids[j].y) < asteroids[j].radius) {
            const a = asteroids[j];
            
            // Create smaller asteroids
            if (a.size > 1) {
              for (let k = 0; k < 2; k++) {
                asteroids.push(createAsteroid(a.x, a.y, a.size - 1));
              }
            }
            
            createExplosion(a.x, a.y, 15);
            playSound(100 + a.size * 50, 0.2, 'sawtooth');
            
            // Score
            score += a.size === 3 ? 20 : a.size === 2 ? 50 : 100;
            
            bullets.splice(i, 1);
            asteroids.splice(j, 1);
            break;
          }
        }
      }
      
      // Collision: bullets vs UFO
      if (ufo) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          if (distance(bullets[i].x, bullets[i].y, ufo.x, ufo.y) < ufo.radius) {
            createExplosion(ufo.x, ufo.y, 25, 3);
            score += ufo.small ? 1000 : 200;
            playSound(150, 0.5, 'sawtooth');
            bullets.splice(i, 1);
            ufo = null;
            break;
          }
        }
      }
      
      // Collision: ship vs asteroids
      if (invincibleTimer <= 0) {
        for (const a of asteroids) {
          if (distance(ship.x, ship.y, a.x, a.y) < a.radius + ship.radius - 5) {
            killShip();
            return;
          }
        }
        
        // Ship vs UFO bullets
        for (let i = ufoBullets.length - 1; i >= 0; i--) {
          if (distance(ship.x, ship.y, ufoBullets[i].x, ufoBullets[i].y) < ship.radius) {
            killShip();
            return;
          }
        }
        
        // Ship vs UFO
        if (ufo && distance(ship.x, ship.y, ufo.x, ufo.y) < ufo.radius + ship.radius) {
          killShip();
          return;
        }
      }
      
      // Next wave
      if (asteroids.length === 0) {
        wave++;
        spawnAsteroids(4 + wave);
        playSound(600, 0.3, 'sine');
      }
    }
    
    function killShip() {
      createExplosion(ship.x, ship.y, 30, 4);
      playSound(50, 0.5, 'sawtooth');
      lives--;
      
      if (lives <= 0) {
        state = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('asteroids_highscore', highScore);
        }
      } else {
        state = STATE_RESPAWN;
        invincibleTimer = 2000;
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        // Title asteroids
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        drawAsteroidShape(200, 150, 40, 0);
        drawAsteroidShape(600, 120, 30, 0);
        drawAsteroidShape(150, 450, 25, 0);
        drawAsteroidShape(650, 480, 35, 0);
        
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ASTEROIDS', W / 2, 280);
        
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 360);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Arrow Keys to rotate, UP to thrust', W / 2, 430);
        ctx.fillText('SPACE to shoot', W / 2, 460);
        ctx.fillText('P to pause', W / 2, 490);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 550);
        return;
      }
      
      // Draw particles
      ctx.fillStyle = '#FFF';
      for (const p of particles) {
        ctx.globalAlpha = p.life / 60;
        ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
      }
      ctx.globalAlpha = 1;
      
      // Draw asteroids
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      for (const a of asteroids) {
        ctx.save();
        ctx.translate(a.x, a.y);
        ctx.rotate(a.rotation);
        ctx.beginPath();
        ctx.moveTo(a.vertices[0].x, a.vertices[0].y);
        for (let i = 1; i < a.vertices.length; i++) {
          ctx.lineTo(a.vertices[i].x, a.vertices[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
      
      // Draw UFO
      if (ufo) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const r = ufo.radius;
        // Body
        ctx.ellipse(ufo.x, ufo.y, r, r * 0.4, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Dome
        ctx.beginPath();
        ctx.ellipse(ufo.x, ufo.y - r * 0.2, r * 0.5, r * 0.4, 0, Math.PI, 0);
        ctx.stroke();
        // Bottom
        ctx.beginPath();
        ctx.moveTo(ufo.x - r * 0.6, ufo.y + r * 0.2);
        ctx.lineTo(ufo.x + r * 0.6, ufo.y + r * 0.2);
        ctx.stroke();
      }
      
      // Draw ship
      if (state !== STATE_RESPAWN && (invincibleTimer <= 0 || Math.floor(invincibleTimer / 100) % 2 === 0)) {
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle);
        
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-15, -12);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-15, 12);
        ctx.closePath();
        ctx.stroke();
        
        // Thrust flame
        if (ship.thrusting) {
          ctx.strokeStyle = '#FF0';
          ctx.beginPath();
          ctx.moveTo(-10, -5);
          ctx.lineTo(-20 - Math.random() * 10, 0);
          ctx.lineTo(-10, 5);
          ctx.stroke();
        }
        
        ctx.restore();
      }
      
      // Draw bullets
      ctx.fillStyle = '#FFF';
      for (const b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Draw UFO bullets
      ctx.fillStyle = '#F00';
      for (const b of ufoBullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // HUD
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 30);
      
      ctx.textAlign = 'center';
      ctx.fillText('Wave: ' + wave, W / 2, 30);
      
      // Lives
      ctx.textAlign = 'right';
      for (let i = 0; i < lives; i++) {
        ctx.save();
        ctx.translate(W - 30 - i * 30, 25);
        ctx.rotate(-Math.PI / 2);
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-8, -6);
        ctx.lineTo(-5, 0);
        ctx.lineTo(-8, 6);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        
        if (score >= highScore && score > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 28px Arial';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
        }
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 130);
      }
      
      if (state === STATE_RESPAWN) {
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LIVES: ' + lives, W / 2, H / 2);
      }
    }
    
    function drawAsteroidShape(x, y, size, rotation) {
      const numVertices = 8;
      ctx.beginPath();
      for (let i = 0; i < numVertices; i++) {
        const a = (i / numVertices) * Math.PI * 2 + rotation;
        const r = size * (0.7 + Math.sin(a * 3) * 0.3);
        if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
        else ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.stroke();
    }
    
    let shootCooldown = 0;
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initAudio();
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      if (state === STATE_PLAYING && e.code === 'Space' && shootCooldown <= 0) {
        shoot();
        shootCooldown = 150;
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE && state !== STATE_GAMEOVER && state !== STATE_RESPAWN) {
        state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && (state === STATE_PLAYING || state === STATE_PAUSED || state === STATE_GAMEOVER)) {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    Object.defineProperty(keys, 'left', { get() { return this['ArrowLeft'] || this['KeyA']; } });
    Object.defineProperty(keys, 'right', { get() { return this['ArrowRight'] || this['KeyD']; } });
    Object.defineProperty(keys, 'thrust', { get() { return this['ArrowUp'] || this['KeyW']; } });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      
      if (shootCooldown > 0) shootCooldown -= dt * 1000;
      
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
