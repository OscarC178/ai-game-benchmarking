<!--
  GAME:      Asteroids
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Asteroids</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:100vmin;height:75vmin;max-width:800px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#000}
  #hud{position:absolute;left:8px;top:8px;color:#fff;font-family:monospace}
  #hud .right{position:absolute;right:8px;top:8px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="hud"><div id="score">Score: 0</div><div id="meta" class="right">HI: 0  Lives: 3  Wave: 1</div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const scoreEl=document.getElementById('score'), metaEl=document.getElementById('meta'), overlay=document.getElementById('overlay');
  const W=800,H=600,CX=W/2,CY=H/2;
  let state='title', score=0, high=0, lives=3, wave=1;
  try{ const h=localStorage.getItem('ast_high'); if(h) high=parseInt(h,10)||0; }catch(e){high=0}

  // Ship
  const SHIP_R=14, ROT_SPEED=5, THRUST=220, MAX_SPEED=320, DRAG=0.999;
  let ship={x:CX,y:CY,angle:-Math.PI/2,vx:0,vy:0,thrust:false,alive:true,invul:0};

  // Bullets
  const BUL_SPEED=600, BUL_LIFE=1.4, BUL_MAX=4; let bullets=[]; let fireCd=0, FIRE_RATE=0.22;

  // Asteroids
  let asteroids=[]; const AST={L:40,M:24,S:12};

  // UFO
  let ufo=null, ufoTimer=18+Math.random()*12, ufoBullets=[];

  // Particles
  let particles=[];

  // Timers
  let respawnTimer=0, waveTimer=0;

  // Input
  const keys={left:false,right:false,up:false,fire:false};
  window.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=true; if(e.key==='ArrowRight'||e.key==='d') keys.right=true; if(e.key==='ArrowUp'||e.key==='w') keys.up=true; if(e.key===' ') keys.fire=true; if(e.key==='Enter'){ if(state==='title'||state==='gameover') startGame(); } if(e.key==='p'||e.key==='P') togglePause(); if(e.key==='r'||e.key==='R') startGame(); });
  window.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=false; if(e.key==='ArrowRight'||e.key==='d') keys.right=false; if(e.key==='ArrowUp'||e.key==='w') keys.up=false; if(e.key===' ') keys.fire=false; });

  // Audio
  let audioCtx=null,aok=false; function ensureAudio(){ if(aok) return; aok=true; audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown',()=>ensureAudio(),{once:true});
  function tone(freq,dur=0.06,type='sine'){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }

  // Utils
  function rand(min,max){ return min + Math.random()*(max-min); }
  function wrap(obj){ if(obj.x<0) obj.x+=W; if(obj.x>W) obj.x-=W; if(obj.y<0) obj.y+=H; if(obj.y>H) obj.y-=H; }
  function dist(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }

  // Asteroids
  function makeAst(x,y,size){ const pts=Math.floor(rand(8,12)); const verts=[]; for(let i=0;i<pts;i++){ const ang=i*(Math.PI*2/pts); const r=size*(0.7+Math.random()*0.6); verts.push({x:Math.cos(ang)*r,y:Math.sin(ang)*r}); } return {x,y,vx:rand(-60,60),vy:rand(-60,60),ang:rand(0,Math.PI*2),spin:rand(-1.5,1.5),verts,size}; }
  function spawnWave(n){ asteroids=[]; let attempts=0; while(asteroids.length<n && attempts<300){ attempts++; const side=Math.floor(Math.random()*4); let x=0,y=0; if(side===0){ x=rand(0,W); y=-60 } else if(side===1){ x=rand(0,W); y=H+60 } else if(side===2){ x=-60; y=rand(0,H) } else { x=W+60; y=rand(0,H) } if(dist(x,y,CX,CY)>140) asteroids.push(makeAst(x,y,AST.L)); } }
  function splitAst(a){ if(a.size>AST.M+1){ for(let i=0;i<2;i++){ const c=makeAst(a.x+rand(-6,6),a.y+rand(-6,6),AST.M); c.vx+=(i?1:-1)*rand(20,80); c.vy+=rand(-30,30); asteroids.push(c); } } else if(a.size>AST.S+1){ for(let i=0;i<2;i++){ const c=makeAst(a.x+rand(-4,4),a.y+rand(-4,4),AST.S); c.vx+=(i?1:-1)*rand(30,120); c.vy+=rand(-40,40); asteroids.push(c); } } }

  // Bullets
  function fire(){ if(bullets.length>=BUL_MAX||fireCd>0) return; const ang=ship.angle; const bx=ship.x+Math.cos(ang)*SHIP_R; const by=ship.y+Math.sin(ang)*SHIP_R; bullets.push({x:bx,y:by,vx:ship.vx+Math.cos(ang)*BUL_SPEED,vy:ship.vy+Math.sin(ang)*BUL_SPEED,life:BUL_LIFE,owner:'player'}); fireCd=FIRE_RATE; tone(1200,0.03,'square'); }
  const BUL_MAX=4; const BUL_LIFE=1.4; const BUL_SPEED=600;

  // UFO
  function spawnUFO(){ const fromLeft=Math.random()<0.5; const y=rand(60,H-60); const x=fromLeft?-80:W+80; const vx=fromLeft?rand(90,140):-rand(90,140); ufo={x,y,vx,vy:rand(-8,8),size:26,fire:rand(1.0,2.0),type:Math.random()<0.8?'small':'large'}; }

  // Particles
  function makeExplosion(x,y,col,count=12){ for(let i=0;i<count;i++){ const ang=rand(0,Math.PI*2); const sp=rand(40,220); particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:rand(0.4,0.9),col}); } }

  // Update
  let last=performance.now(); function update(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; if(state==='paused'||state==='title'||state==='gameover'){ render(); requestAnimationFrame(update); return; }
    if(keys.left) ship.angle -= ROT_SPEED*dt; if(keys.right) ship.angle += ROT_SPEED*dt; ship.angle=(ship.angle+Math.PI*4)%(Math.PI*2); ship.thrust=keys.up; if(keys.fire) fire(); fireCd=Math.max(0,fireCd-dt);
    if(ship.thrust&&ship.alive){ ship.vx+=Math.cos(ship.angle)*THRUST*dt; ship.vy+=Math.sin(ship.angle)*THRUST*dt; const sp=Math.hypot(ship.vx,ship.vy); if(sp>MAX_SPEED){ ship.vx*=MAX_SPEED/sp; ship.vy*=MAX_SPEED/sp; } }
    ship.vx*=DRAG; ship.vy*=DRAG; ship.x+=ship.vx*dt; ship.y+=ship.vy*dt; wrap(ship);
    for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; wrap(b); if(b.life<=0) bullets.splice(i,1); }
    for(const a of asteroids){ a.x+=a.vx*dt; a.y+=a.vy*dt; a.ang+=a.spin*dt; wrap(a); }
    ufoTimer-=dt; if(!ufo&&ufoTimer<=0){ spawnUFO(); ufoTimer=25+Math.random()*20; }
    if(ufo){ ufo.x+=ufo.vx*dt; ufo.y+=ufo.vy*dt; if(ufo.x<-120||ufo.x>W+120) ufo=null; else { ufo.fire-=dt; if(ufo.fire<=0){ ufo.fire=ufo.type==='small'?rand(0.6,1.2):rand(1.0,2.0); const ang=Math.atan2(ship.y-ufo.y,ship.x-ufo.x)+(ufo.type==='large'?rand(-0.6,0.6):rand(-0.15,0.15)); ufoBullets.push({x:ufo.x,y:ufo.y,vx:Math.cos(ang)*rand(220,300),vy:Math.sin(ang)*rand(220,300),life:2}); tone(600,0.03,'sine'); } } }
    for(let i=ufoBullets.length-1;i>=0;i--){ const b=ufoBullets[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; wrap(b); if(b.life<=0) ufoBullets.splice(i,1); }
    for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; if(b.owner==='player'){ let hit=false; for(let j=asteroids.length-1;j>=0;j--){ const a=asteroids[j]; if(dist(b.x,b.y,a.x,a.y)<a.size*0.7){ bullets.splice(i,1); makeExplosion(a.x,a.y,'#fff',8); const asz=a.size; asteroids.splice(j,1); if(asz>AST.M+1){ splitAst(a); score+=20; } else if(asz>AST.S+1){ splitAst(a); score+=50; } else { score+=100; } hit=true; break; } } if(hit) continue; if(ufo&&dist(b.x,b.y,ufo.x,ufo.y)<ufo.size*0.6){ bullets.splice(i,1); makeExplosion(ufo.x,ufo.y,'#fff',12); score += ufo.type==='small'?1000:200; ufo=null; continue; } } }
    if(ship.alive&&ship.invul<=0){ for(let i=ufoBullets.length-1;i>=0;i--){ const b=ufoBullets[i]; if(dist(b.x,b.y,ship.x,ship.y)<12){ ufoBullets.splice(i,1); explodeShip(); break; } } }
    if(ship.alive&&ship.invul<=0){ for(const a of asteroids){ if(dist(ship.x,ship.y,a.x,a.y)<a.size*0.8){ explodeShip(); break; } } if(ufo&&dist(ship.x,ship.y,ufo.x,ufo.y)<ufo.size*0.8) explodeShip(); }
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.vx*=0.995; p.vy*=0.995; if(p.life<=0) particles.splice(i,1); }
    if(!ship.alive){ respawnTimer-=dt; if(respawnTimer<=0){ if(lives>0){ let safe=true; for(const a of asteroids){ if(dist(CX,CY,a.x,a.y)<140){ safe=false; break; } } if(safe){ ship={x:CX,y:CY,angle:-Math.PI/2,vx:0,vy:0,thrust:false,alive:true,invul:2}; } else respawnTimer=1.0; } else { state='gameover'; overlay.textContent='GAME OVER\nPress Enter to Restart'; if(score>high){ high=score; try{ localStorage.setItem('ast_high',String(high)); }catch(e){} } } } }
    if(asteroids.length===0&&state==='playing'){ wave++; waveTimer=1.2; state='wave'; overlay.textContent='WAVE '+wave; }
    if(state==='wave'){ waveTimer-=dt; if(waveTimer<=0){ state='playing'; overlay.textContent=''; spawnWave(4+Math.min(8,wave)); } }
    scoreEl.textContent='Score: '+score; metaEl.textContent='HI: '+high+'  Lives: '+lives+'  Wave: '+wave; requestAnimationFrame(update); render(); }
  function explodeShip(){ makeExplosion(ship.x,ship.y,'#fff',20); ship.alive=false; lives--; respawnTimer=1.6; ship.invul=0; tone(80,0.6,'sawtooth'); }
  function startGame(){ score=0; lives=3; wave=1; ship={x:CX,y:CY,angle:-Math.PI/2,vx:0,vy:0,thrust:false,alive:true,invul:2}; bullets=[]; asteroids=[]; particles=[]; ufo=null; ufoTimer=12; spawnWave(4); state='playing'; overlay.textContent=''; }
  function togglePause(){ if(state==='playing'){ state='paused'; overlay.textContent='PAUSED'; } else if(state==='paused'){ state='playing'; overlay.textContent=''; } }
  function render(){ ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); ctx.strokeStyle='#fff'; ctx.lineWidth=2; for(const a of asteroids){ ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.ang); ctx.beginPath(); const v=a.verts; ctx.moveTo(v[0].x,v[0].y); for(let i=1;i<v.length;i++) ctx.lineTo(v[i].x,v[i].y); ctx.closePath(); ctx.stroke(); ctx.restore(); }
    ctx.fillStyle='#fff'; for(const b of bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,2,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#f88'; for(const b of ufoBullets){ ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill(); }
    if(ufo){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(ufo.x,ufo.y,ufo.size,ufo.size*0.4,0,0,Math.PI*2); ctx.moveTo(ufo.x-ufo.size*0.6,ufo.y); ctx.lineTo(ufo.x+ufo.size*0.6,ufo.y); ctx.stroke(); }
    if(ship.alive){ ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle); if(ship.invul>0&&Math.floor(ship.invul*10)%2===0){} else drawShip(); ctx.restore(); }
    if(ship.thrust&&ship.alive){ ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle); ctx.strokeStyle='orange'; ctx.beginPath(); ctx.moveTo(-SHIP_R*0.6,0); ctx.lineTo(-SHIP_R-rand(2,6),rand(-6,6)); ctx.stroke(); ctx.restore(); }
    for(const p of particles){ ctx.fillStyle=p.col; ctx.globalAlpha=Math.max(0,p.life/1.0); ctx.fillRect(p.x,p.y,2,2); ctx.globalAlpha=1; } }
  function drawShip(){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(SHIP_R,0); ctx.lineTo(-SHIP_R*0.6,SHIP_R*0.6); ctx.lineTo(-SHIP_R*0.2,0); ctx.lineTo(-SHIP_R*0.6,-SHIP_R*0.6); ctx.closePath(); ctx.stroke(); }
  function init(){ overlay.textContent='ASTEROIDS\n\nTurn: ←/A  Thrust: ↑/W  Fire: Space\nPress Enter to Start'; last=performance.now(); requestAnimationFrame(update); }
  init();
})();
</script>
</body>
</html>
