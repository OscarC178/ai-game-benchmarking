<!--
  GAME:      Asteroids
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="asteroidsCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('asteroidsCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, WAVE_COMPLETE: 4 };

    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('asteroidsHighScore') || '0', 10);
    let lives = 3;
    let wave = 1;
    let waveTimer = 0;

    // Ship
    const ship = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      angle: 0,
      vx: 0,
      vy: 0,
      radius: 12,
      rotSpeed: 0.1,
      thrustPower: 0.3,
      maxSpeed: 8
    };

    // Bullets
    let bullets = [];

    // Asteroids
    let asteroids = [];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          fireBullet();
        }
      }

      if (key === 'p') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState === STATES.GAME_OVER) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      wave = 1;
      ship.x = WIDTH / 2;
      ship.y = HEIGHT / 2;
      ship.vx = 0;
      ship.vy = 0;
      ship.angle = 0;
      bullets = [];
      spawnWave();
    }

    function spawnWave() {
      asteroids = [];
      const count = 3 + wave;
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * WIDTH;
          y = Math.random() * HEIGHT;
        } while (Math.hypot(x - ship.x, y - ship.y) < 100);

        asteroids.push(createAsteroid(x, y, 40));
      }
      gameState = STATES.PLAYING;
    }

    function createAsteroid(x, y, size) {
      const vertices = [];
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const r = size * (0.7 + Math.random() * 0.3);
        vertices.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r
        });
      }

      let points = 20;
      if (size < 25) points = 100;
      else if (size < 35) points = 50;

      return {
        x, y,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        size,
        vertices,
        points,
        alive: true
      };
    }

    function fireBullet() {
      if (gameState !== STATES.PLAYING || bullets.length >= 5) return;

      bullets.push({
        x: ship.x + Math.cos(ship.angle) * 15,
        y: ship.y + Math.sin(ship.angle) * 15,
        vx: ship.vx + Math.cos(ship.angle) * 10,
        vy: ship.vy + Math.sin(ship.angle) * 10,
        age: 0
      });
    }

    function wrapPosition(obj) {
      if (obj.x < -50) obj.x = WIDTH + 50;
      if (obj.x > WIDTH + 50) obj.x = -50;
      if (obj.y < -50) obj.y = HEIGHT + 50;
      if (obj.y > HEIGHT + 50) obj.y = -50;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Ship rotation
      if (keys['arrowleft'] || keys['a']) ship.angle -= ship.rotSpeed;
      if (keys['arrowright'] || keys['d']) ship.angle += ship.rotSpeed;

      // Ship thrust
      if (keys['arrowup'] || keys['w']) {
        ship.vx += Math.cos(ship.angle) * ship.thrustPower;
        ship.vy += Math.sin(ship.angle) * ship.thrustPower;
      }

      // Cap ship speed
      const speed = Math.hypot(ship.vx, ship.vy);
      if (speed > ship.maxSpeed) {
        ship.vx = (ship.vx / speed) * ship.maxSpeed;
        ship.vy = (ship.vy / speed) * ship.maxSpeed;
      }

      // Ship movement
      ship.x += ship.vx;
      ship.y += ship.vy;
      wrapPosition(ship);

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].vx;
        bullets[i].y += bullets[i].vy;
        bullets[i].age++;

        wrapPosition(bullets[i]);

        if (bullets[i].age > 60) {
          bullets.splice(i, 1);
        }
      }

      // Update asteroids
      for (let ast of asteroids) {
        if (!ast.alive) continue;
        ast.x += ast.vx;
        ast.y += ast.vy;
        wrapPosition(ast);
      }

      // Bullet-asteroid collision
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const ast = asteroids[j];
          if (!ast.alive) continue;

          const dist = Math.hypot(bullets[i].x - ast.x, bullets[i].y - ast.y);
          if (dist < ast.size / 2 + 3) {
            score += ast.points;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('asteroidsHighScore', highScore);
            }

            // Split asteroid
            if (ast.size > 25) {
              for (let k = 0; k < 2; k++) {
                asteroids.push(createAsteroid(
                  ast.x + (Math.random() - 0.5) * 20,
                  ast.y + (Math.random() - 0.5) * 20,
                  ast.size / 1.5
                ));
              }
            }

            ast.alive = false;
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Ship-asteroid collision
      for (let ast of asteroids) {
        if (!ast.alive) continue;
        const dist = Math.hypot(ship.x - ast.x, ship.y - ast.y);
        if (dist < ast.size / 2 + ship.radius) {
          lives--;
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          } else {
            ship.x = WIDTH / 2;
            ship.y = HEIGHT / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = 0;
          }
          return;
        }
      }

      // Check wave complete
      if (asteroids.every(a => !a.alive)) {
        wave++;
        score += 500;
        gameState = STATES.WAVE_COMPLETE;
        waveTimer = 120;
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw ship
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      ctx.beginPath();
      ctx.moveTo(15, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-5, 0);
      ctx.lineTo(-10, 10);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      // Draw bullets
      ctx.fillStyle = '#FFF';
      for (let bullet of bullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw asteroids
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      for (let ast of asteroids) {
        if (!ast.alive) continue;
        ctx.save();
        ctx.translate(ast.x, ast.y);
        ctx.beginPath();
        ctx.moveTo(ast.vertices[0].x, ast.vertices[0].y);
        for (let i = 1; i < ast.vertices.length; i++) {
          ctx.lineTo(ast.vertices[i].x, ast.vertices[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      // Draw score
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('Wave: ' + wave, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('ASTEROIDS', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('← → to rotate, ↑ to thrust, SPACE to fire', WIDTH / 2, 360);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '28px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 260);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 310);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      } else if (gameState === STATES.WAVE_COMPLETE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('Wave ' + (wave - 1) + ' Complete', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 320);

        waveTimer--;
        if (waveTimer <= 0) {
          spawnWave();
        }
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
