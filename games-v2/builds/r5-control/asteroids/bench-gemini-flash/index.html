<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #333;
            background-color: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        #overlay {
            position: absolute;
            text-align: center;
            pointer-events: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>
    <div id="overlay">
        <h1 id="title">ASTEROIDS</h1>
        <p id="msg">Press SPACE to Start</p>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('title');
        const msg = document.getElementById('msg');

        const WIDTH = 800;
        const HEIGHT = 600;
        const FPS = 60;
        const FRICTION = 0.99;
        const SHIP_SIZE = 20;
        const SHIP_THRUST = 0.15;
        const SHIP_TURN_SPD = 0.1;
        const BULLET_SPD = 7;
        const BULLET_DIST = 0.6; // Max distance as fraction of screen width
        const ASTEROIDS_NUM = 5; // Starting number
        const ASTEROIDS_SIZE = 100;
        const ASTEROIDS_SPD = 50; // Max speed in px per sec
        const ASTEROIDS_VERT = 10; // Avg vertices

        // Game State
        let score, lives, level, gameActive, ship, asteroids, bullets, particles;
        let keys = {};

        function init() {
            score = 0;
            lives = 3;
            level = 0;
            gameActive = false;
            bullets = [];
            particles = [];
            asteroids = [];
            resetShip();
            updateUI();
        }

        function resetShip() {
            ship = {
                x: WIDTH / 2,
                y: HEIGHT / 2,
                r: SHIP_SIZE / 2,
                a: -Math.PI / 2,
                rot: 0,
                thrusting: false,
                thrust: { x: 0, y: 0 },
                blinkTime: 30, // Invulnerability frames
                dead: false
            };
        }

        function createAsteroid(x, y, r) {
            let lvl = r === ASTEROIDS_SIZE / 2 ? 0 : (r === ASTEROIDS_SIZE / 4 ? 1 : 2);
            let ast = {
                x: x,
                y: y,
                xv: Math.random() * ASTEROIDS_SPD / FPS * (Math.random() < 0.5 ? 1 : -1),
                yv: Math.random() * ASTEROIDS_SPD / FPS * (Math.random() < 0.5 ? 1 : -1),
                r: r,
                a: Math.random() * Math.PI * 2,
                vert: Math.floor(Math.random() * (ASTEROIDS_VERT + 1) + ASTEROIDS_VERT / 2),
                offs: [],
                lvl: lvl
            };
            for (let i = 0; i < ast.vert; i++) {
                ast.offs.push(Math.random() * 0.4 + 0.8); // 80% to 120% of radius
            }
            return ast;
        }

        function spawnLevel() {
            asteroids = [];
            level++;
            let count = ASTEROIDS_NUM + (level * 2);
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * WIDTH;
                    y = Math.random() * HEIGHT;
                } while (distBetween(ship.x, ship.y, x, y) < ASTEROIDS_SIZE * 2);
                asteroids.push(createAsteroid(x, y, ASTEROIDS_SIZE / 2));
            }
        }

        function distBetween(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (!gameActive) {
                if (keys['Space']) {
                    init();
                    spawnLevel();
                    gameActive = true;
                    overlay.classList.add('hidden');
                }
                return;
            }

            // Ship Movement
            if (!ship.dead) {
                if (keys['ArrowLeft'] || keys['KeyA']) ship.a -= SHIP_TURN_SPD;
                if (keys['ArrowRight'] || keys['KeyD']) ship.a += SHIP_TURN_SPD;
                
                ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
                if (ship.thrusting) {
                    ship.thrust.x += SHIP_THRUST * Math.cos(ship.a);
                    ship.thrust.y += SHIP_THRUST * Math.sin(ship.a);
                } else {
                    ship.thrust.x *= FRICTION;
                    ship.thrust.y *= FRICTION;
                }

                ship.x += ship.thrust.x;
                ship.y += ship.thrust.y;

                // Wrap Ship
                if (ship.x < 0 - ship.r) ship.x = WIDTH + ship.r;
                else if (ship.x > WIDTH + ship.r) ship.x = 0 - ship.r;
                if (ship.y < 0 - ship.r) ship.y = HEIGHT + ship.r;
                else if (ship.y > HEIGHT + ship.r) ship.y = 0 - ship.r;

                if (ship.blinkTime > 0) ship.blinkTime--;

                // Shooting
                if (keys['Space']) {
                    if (bullets.length < 5 && !keys.fired) {
                        bullets.push({
                            x: ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
                            y: ship.y + 4 / 3 * ship.r * Math.sin(ship.a),
                            xv: BULLET_SPD * Math.cos(ship.a),
                            yv: BULLET_SPD * Math.sin(ship.a),
                            dist: 0
                        });
                        keys.fired = true;
                    }
                } else {
                    keys.fired = false;
                }
            } else {
                ship.deadTime--;
                if (ship.deadTime <= 0) {
                    if (lives > 0) {
                        resetShip();
                    } else {
                        gameActive = false;
                        title.innerText = "GAME OVER";
                        msg.innerText = "Final Score: " + score + "\nPress SPACE to Retry";
                        overlay.classList.remove('hidden');
                    }
                }
            }

            // Move Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.xv;
                b.y += b.yv;
                b.dist += Math.sqrt(b.xv * b.xv + b.yv * b.yv);

                if (b.x < 0) b.x = WIDTH; else if (b.x > WIDTH) b.x = 0;
                if (b.y < 0) b.y = HEIGHT; else if (b.y > HEIGHT) b.y = 0;

                if (b.dist > BULLET_DIST * WIDTH) {
                    bullets.splice(i, 1);
                }
            }

            // Move Asteroids
            for (let ast of asteroids) {
                ast.x += ast.xv;
                ast.y += ast.yv;
                if (ast.x < 0 - ast.r) ast.x = WIDTH + ast.r;
                else if (ast.x > WIDTH + ast.r) ast.x = 0 - ast.r;
                if (ast.y < 0 - ast.r) ast.y = HEIGHT + ast.r;
                else if (ast.y > HEIGHT + ast.r) ast.y = 0 - ast.r;
            }

            // Collisions: Bullet vs Asteroid
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let ast = asteroids[i];
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let bul = bullets[j];
                    if (distBetween(ast.x, ast.y, bul.x, bul.y) < ast.r) {
                        destroyAsteroid(i);
                        bullets.splice(j, 1);
                        break;
                    }
                }
            }

            // Collisions: Ship vs Asteroid
            if (!ship.dead && ship.blinkTime === 0) {
                for (let ast of asteroids) {
                    if (distBetween(ship.x, ship.y, ast.x, ast.y) < ship.r + ast.r) {
                        explodeShip();
                        break;
                    }
                }
            }

            // Move Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.xv;
                p.y += p.yv;
                p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            }

            if(gameActive && asteroids.length === 0) spawnLevel();
        }

        function destroyAsteroid(idx) {
            let ast = asteroids[idx];
            score += (ast.lvl === 0 ? 20 : ast.lvl === 1 ? 50 : 100);
            updateUI();

            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: ast.x, y: ast.y,
                    xv: (Math.random() - 0.5) * 4,
                    yv: (Math.random() - 0.5) * 4,
                    life: 20
                });
            }

            if (ast.r > ASTEROIDS_SIZE / 8) {
                asteroids.push(createAsteroid(ast.x, ast.y, ast.r / 2));
                asteroids.push(createAsteroid(ast.x, ast.y, ast.r / 2));
            }
            asteroids.splice(idx, 1);
        }

        function explodeShip() {
            ship.dead = true;
            ship.deadTime = 60;
            lives--;
            updateUI();
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: ship.x, y: ship.y,
                    xv: (Math.random() - 0.5) * 10,
                    yv: (Math.random() - 0.5) * 10,
                    life: 40
                });
            }
        }

        function updateUI() {
            scoreEl.innerText = score;
            livesEl.innerText = lives;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Draw Asteroids
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            for (let ast of asteroids) {
                ctx.beginPath();
                ctx.moveTo(
                    ast.x + ast.r * ast.offs[0] * Math.cos(ast.a),
                    ast.y + ast.r * ast.offs[0] * Math.sin(ast.a)
                );
                for (let i = 1; i < ast.vert; i++) {
                    ctx.lineTo(
                        ast.x + ast.r * ast.offs[i] * Math.cos(ast.a + i * Math.PI * 2 / ast.vert),
                        ast.y + ast.r * ast.offs[i] * Math.sin(ast.a + i * Math.PI * 2 / ast.vert)
                    );
                }
                ctx.closePath();
                ctx.stroke();
            }

            // Draw Ship
            if (!ship.dead) {
                if (ship.blinkTime === 0 || Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.save();
                    ctx.translate(ship.x, ship.y);
                    ctx.rotate(ship.a);
                    ctx.beginPath();
                    ctx.moveTo(ship.r, 0);
                    ctx.lineTo(-ship.r, -ship.r / 1.5);
                    ctx.lineTo(-ship.r * 0.5, 0);
                    ctx.lineTo(-ship.r, ship.r / 1.5);
                    ctx.closePath();
                    ctx.stroke();

                    if (ship.thrusting) {
                        ctx.beginPath();
                        ctx.moveTo(-ship.r * 0.6, -ship.r / 3);
                        ctx.lineTo(-ship.r * 1.2, 0);
                        ctx.lineTo(-ship.r * 0.6, ship.r / 3);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            // Draw Bullets
            ctx.fillStyle = '#fff';
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw Particles
            for(let p of particles) {
                ctx.globalAlpha = p.life / 40;
                ctx.fillRect(p.x, p.y, 2, 2);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
        gameLoop();
    </script>
</body>
</html>
