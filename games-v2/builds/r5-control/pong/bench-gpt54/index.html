<!--
  GAME:      Pong
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const STATES = {
    TITLE: 'title',
    SERVE: 'serve',
    PLAYING: 'playing',
    PAUSED: 'paused',
    GAME_OVER: 'game_over'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let winner = '';
  let scoreFlash = 0;
  let particles = [];
  let ballTrail = [];

  const player = {
    x: 36,
    y: H / 2 - 56,
    w: 16,
    h: 112,
    speed: 520,
    color: '#ffffff'
  };

  const cpu = {
    x: W - 52,
    y: H / 2 - 56,
    w: 16,
    h: 112,
    speed: 470,
    color: '#ffffff'
  };

  const ball = {
    x: W / 2,
    y: H / 2,
    r: 10,
    vx: 0,
    vy: 0,
    speed: 420,
    maxSpeed: 980
  };

  const score = { left: 0, right: 0 };
  const WIN_SCORE = 11;

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function resetPaddles() {
    player.y = H / 2 - player.h / 2;
    cpu.y = H / 2 - cpu.h / 2;
  }

  function resetBall(dir = 1) {
    ball.x = W / 2;
    ball.y = H / 2;
    ball.speed = 420;
    ball.vx = dir * 0;
    ball.vy = 0;
    ballTrail.length = 0;
  }

  function startServe(dir) {
    resetBall(dir);
    state = STATES.SERVE;
  }

  function startMatch() {
    score.left = 0;
    score.right = 0;
    winner = '';
    scoreFlash = 0;
    resetPaddles();
    startServe(Math.random() < 0.5 ? -1 : 1);
  }

  function launchBall(dir) {
    const angle = (Math.random() * 0.9 - 0.45);
    const speed = ball.speed;
    ball.vx = Math.cos(angle) * speed * dir;
    ball.vy = Math.sin(angle) * speed;
    state = STATES.PLAYING;
  }

  function scorePoint(side) {
    score[side] += 1;
    scoreFlash = 0.6;
    spawnBurst(W / 2, H / 2, side === 'left' ? '#66ff66' : '#ff6666', 24);

    if (score.left >= WIN_SCORE || score.right >= WIN_SCORE) {
      state = STATES.GAME_OVER;
      winner = score.left > score.right ? 'PLAYER' : 'CPU';
    } else {
      startServe(side === 'left' ? 1 : -1);
    }
  }

  function spawnBurst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 70 + Math.random() * 180;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.55, maxLife: 0.55, color });
    }
  }

  function predictedBallY() {
    if (ball.vx <= 0) return H / 2;
    let simX = ball.x;
    let simY = ball.y;
    let vx = ball.vx;
    let vy = ball.vy;
    while (simX < cpu.x - 16) {
      simX += vx * 0.016;
      simY += vy * 0.016;
      if (simY < ball.r) {
        simY = ball.r + (ball.r - simY);
        vy *= -1;
      } else if (simY > H - ball.r) {
        simY = (H - ball.r) - (simY - (H - ball.r));
        vy *= -1;
      }
    }
    return simY;
  }

  function updatePlayer(dt) {
    let move = 0;
    if (keys.ArrowUp || keys.KeyW) move -= 1;
    if (keys.ArrowDown || keys.KeyS) move += 1;
    player.y += move * player.speed * dt;
    player.y = clamp(player.y, 0, H - player.h);
  }

  function updateCPU(dt) {
    const target = ball.vx > 0 ? predictedBallY() - cpu.h / 2 : H / 2 - cpu.h / 2;
    const diff = target - cpu.y;
    const move = clamp(diff, -cpu.speed * dt, cpu.speed * dt);
    cpu.y += move;
    cpu.y = clamp(cpu.y, 0, H - cpu.h);
  }

  function pushTrail() {
    ballTrail.push({ x: ball.x, y: ball.y, life: 0.3 });
    if (ballTrail.length > 16) ballTrail.shift();
  }

  function updateTrail(dt) {
    for (let i = ballTrail.length - 1; i >= 0; i--) {
      ballTrail[i].life -= dt;
      if (ballTrail[i].life <= 0) ballTrail.splice(i, 1);
    }
  }

  function collidePaddle(paddle, leftSide) {
    const withinY = ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h;
    if (!withinY) return false;

    if (leftSide) {
      if (ball.x - ball.r > paddle.x + paddle.w || ball.x > paddle.x + paddle.w + 10) return false;
      if (ball.vx >= 0) return false;
      ball.x = paddle.x + paddle.w + ball.r;
    } else {
      if (ball.x + ball.r < paddle.x || ball.x < paddle.x - 10) return false;
      if (ball.vx <= 0) return false;
      ball.x = paddle.x - ball.r;
    }

    const hit = ((ball.y - paddle.y) / paddle.h) - 0.5;
    const angle = hit * 1.2;
    ball.speed = Math.min(ball.maxSpeed, ball.speed + 22);
    const dir = leftSide ? 1 : -1;
    ball.vx = Math.cos(angle) * ball.speed * dir;
    ball.vy = Math.sin(angle) * ball.speed + ((leftSide ? (keys.ArrowDown || keys.KeyS) : false) ? 22 : 0) - ((leftSide ? (keys.ArrowUp || keys.KeyW) : false) ? 22 : 0);
    spawnBurst(ball.x, ball.y, '#ffffff', 8);
    return true;
  }

  function updateBall(dt) {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    pushTrail();

    if (ball.y - ball.r <= 0) {
      ball.y = ball.r;
      ball.vy *= -1;
      spawnBurst(ball.x, ball.y, '#66ccff', 6);
    } else if (ball.y + ball.r >= H) {
      ball.y = H - ball.r;
      ball.vy *= -1;
      spawnBurst(ball.x, ball.y, '#66ccff', 6);
    }

    collidePaddle(player, true);
    collidePaddle(cpu, false);

    if (ball.x < -40) scorePoint('right');
    if (ball.x > W + 40) scorePoint('left');
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt) {
    scoreFlash = Math.max(0, scoreFlash - dt);
    updateParticles(dt);
    updateTrail(dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER) return;

    updatePlayer(dt);
    updateCPU(dt);

    if (state === STATES.PLAYING) {
      updateBall(dt);
    }
  }

  function drawCenterLine() {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let y = 16; y < H; y += 28) {
      ctx.fillRect(W / 2 - 2, y, 4, 16);
    }
  }

  function drawPaddle(p) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  function drawBall() {
    for (let i = 0; i < ballTrail.length; i++) {
      const t = ballTrail[i];
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0, t.life / 0.3) * 0.3})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = p.color.replace(')', `, ${p.life / p.maxLife})`).replace('rgb', 'rgba');
      if (!p.color.startsWith('rgb')) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / p.maxLife;
      }
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    });
  }

  function drawScore() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${scoreFlash > 0 ? 96 : 88}px Arial`;
    ctx.fillStyle = scoreFlash > 0 ? '#ffee88' : '#ffffff';
    ctx.fillText(score.left, W * 0.25, 76);
    ctx.fillText(score.right, W * 0.75, 76);
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 62px Arial';
    ctx.fillText(title, W / 2, H / 2 - 100);
    ctx.font = '28px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 38));
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawCenterLine();
    drawScore();
    drawPaddle(player);
    drawPaddle(cpu);
    if (state !== STATES.TITLE) drawBall();
    drawParticles();

    if (state === STATES.TITLE) {
      drawOverlay('PONG', [
        'Press SPACE to start',
        'W / S or ↑ / ↓ to move',
        'First to 11 wins',
        'P pause • R restart'
      ], true);
    } else if (state === STATES.SERVE) {
      drawOverlay('SERVE', ['Press SPACE to launch', 'Use paddle angle to curve the ball'], false);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay(`${winner} WINS`, ['Press R to play again', 'Press Escape for title'], true);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) startMatch();
      else if (state === STATES.SERVE) launchBall(score.left <= score.right ? 1 : -1);
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING || state === STATES.SERVE) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) startMatch();
    }
  }

  function syncPrev() {
    const watched = ['ArrowUp','ArrowDown','KeyW','KeyS','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowUp','ArrowDown','KeyW','KeyS','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
