<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
        }
        canvas {
            background-color: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="controls">
        Player 1 (Left): W / S<br>
        Player 2 (Right): UP / DOWN<br>
        Press SPACE to start/pause.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 15;
        const PADDLE_SPEED = 8;
        const BALL_BASE_SPEED = 6;
        const WINNING_SCORE = 10;

        // Key states
        const keys = {
            w: false,
            s: false,
            ArrowUp: false,
            ArrowDown: false
        };

        // Game State
        let gameState = 'START'; // START, PLAYING, PAUSED, GAMEOVER
        
        let p1Score = 0;
        let p2Score = 0;

        // Entities
        const p1 = {
            x: 30,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            dy: 0
        };

        const p2 = {
            x: canvas.width - 30 - PADDLE_WIDTH,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            dy: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: BALL_BASE_SPEED,
            dy: BALL_BASE_SPEED,
            speed: BALL_BASE_SPEED
        };

        // Input handling
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'ArrowUp') { keys.ArrowUp = true; e.preventDefault(); }
            if (e.key === 'ArrowDown') { keys.ArrowDown = true; e.preventDefault(); }
            
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'START' || gameState === 'GAMEOVER') {
                    resetGame();
                    gameState = 'PLAYING';
                } else if (gameState === 'PLAYING') {
                    gameState = 'PAUSED';
                } else if (gameState === 'PAUSED') {
                    gameState = 'PLAYING';
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'ArrowUp') keys.ArrowUp = false;
            if (e.key === 'ArrowDown') keys.ArrowDown = false;
        });

        function resetBall(scorer) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = BALL_BASE_SPEED;
            
            // Serve to the player who just got scored on
            let dirX = scorer === 1 ? -1 : 1;
            
            // Random Y angle between -0.5 and +0.5 multiplier of speed
            let angle = (Math.random() * Math.PI/4) - (Math.PI/8); 
            
            ball.dx = dirX * ball.speed * Math.cos(angle);
            ball.dy = ball.speed * Math.sin(angle);
        }

        function resetGame() {
            p1Score = 0;
            p2Score = 0;
            p1.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            p2.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            resetBall(1);
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Player 1 Movement
            if (keys.w && p1.y > 0) p1.y -= PADDLE_SPEED;
            if (keys.s && p1.y < canvas.height - PADDLE_HEIGHT) p1.y += PADDLE_SPEED;

            // Player 2 Movement
            if (keys.ArrowUp && p2.y > 0) p2.y -= PADDLE_SPEED;
            if (keys.ArrowDown && p2.y < canvas.height - PADDLE_HEIGHT) p2.y += PADDLE_SPEED;

            // Ball Movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and Bottom Wall Collision
            if (ball.y <= 0) {
                ball.y = 0;
                ball.dy *= -1;
            } else if (ball.y + BALL_SIZE >= canvas.height) {
                ball.y = canvas.height - BALL_SIZE;
                ball.dy *= -1;
            }

            // Paddle Collision Logic
            function checkPaddleCollision(paddle, isLeft) {
                // Determine bounding box for ball
                let bCenX = ball.x + BALL_SIZE/2;
                let bCenY = ball.y + BALL_SIZE/2;
                
                // Paddle AABB
                if (ball.x < paddle.x + PADDLE_WIDTH &&
                    ball.x + BALL_SIZE > paddle.x &&
                    ball.y < paddle.y + PADDLE_HEIGHT &&
                    ball.y + BALL_SIZE > paddle.y) {
                    
                    // Hit!
                    // Calculate bounce angle based on where it hit the paddle
                    let hitPoint = (bCenY - (paddle.y + PADDLE_HEIGHT/2)) / (PADDLE_HEIGHT/2);
                    // clamp -1 to 1 just in case
                    hitPoint = Math.max(-1, Math.min(1, hitPoint));
                    
                    // Max bounce angle 45 degrees (PI/4)
                    let angle = hitPoint * (Math.PI / 4);
                    
                    // Increase speed slightly
                    ball.speed += 0.5;
                    // Cap max speed
                    if (ball.speed > 15) ball.speed = 15;
                    
                    let dirX = isLeft ? 1 : -1;
                    
                    ball.dx = dirX * ball.speed * Math.cos(angle);
                    ball.dy = ball.speed * Math.sin(angle);
                    
                    // Nudge out to prevent sticking
                    if (isLeft) {
                        ball.x = paddle.x + PADDLE_WIDTH;
                    } else {
                        ball.x = paddle.x - BALL_SIZE;
                    }
                }
            }

            checkPaddleCollision(p1, true);
            checkPaddleCollision(p2, false);

            // Scoring
            if (ball.x < 0) {
                p2Score++;
                checkWin();
                if (gameState === 'PLAYING') resetBall(2);
            } else if (ball.x > canvas.width) {
                p1Score++;
                checkWin();
                if (gameState === 'PLAYING') resetBall(1);
            }
        }

        function checkWin() {
            if (p1Score >= WINNING_SCORE || p2Score >= WINNING_SCORE) {
                gameState = 'GAMEOVER';
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Center dotted line
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Reset line dash

            // Scores
            ctx.fillStyle = '#FFF';
            ctx.font = '60px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(p1Score, canvas.width / 4, 80);
            ctx.fillText(p2Score, (canvas.width / 4) * 3, 80);

            // Paddles
            ctx.fillStyle = '#FFF';
            ctx.fillRect(p1.x, p1.y, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(p2.x, p2.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Ball
            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
            }

            // Overlays
            if (gameState === 'START') {
                drawOverlay('PONG', 'Press SPACE to Start');
            } else if (gameState === 'PAUSED') {
                drawOverlay('PAUSED', 'Press SPACE to Resume');
            } else if (gameState === 'GAMEOVER') {
                let winner = p1Score >= WINNING_SCORE ? 'Player 1' : 'Player 2';
                drawOverlay(`${winner} Wins!`, 'Press SPACE to Play Again');
            }
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 50px monospace';
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = '24px monospace';
            ctx.fillStyle = '#AAA';
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize ball to safe position before loop starts
        resetBall(1);
        gameLoop();
    </script>
</body>
</html>
