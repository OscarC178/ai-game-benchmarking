<!--
  GAME:      Pong
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    
    let state = STATE_TITLE;
    let scores = [0, 0];
    const WIN_SCORE = 11;
    let highScore = parseInt(localStorage.getItem('pong_highscore') || '0');
    
    const paddleW = 15;
    const paddleH = 100;
    const ballSize = 12;
    
    let paddle1 = { x: 30, y: H / 2 - paddleH / 2, speed: 8 };
    let paddle2 = { x: W - 30 - paddleW, y: H / 2 - paddleH / 2, speed: 5 };
    let ball = { x: W / 2, y: H / 2, vx: 5, vy: 3, speed: 5 };
    
    const keys = {};
    let aiMode = true;
    
    function resetBall(dir) {
      ball.x = W / 2;
      ball.y = H / 2;
      ball.speed = 5;
      const angle = (Math.random() - 0.5) * Math.PI / 3;
      ball.vx = Math.cos(angle) * ball.speed * dir;
      ball.vy = Math.sin(angle) * ball.speed;
    }
    
    function update() {
      if (state !== STATE_PLAYING) return;
      
      // Paddle 1 controls (W/S or Up/Down)
      if (keys.up) paddle1.y -= paddle1.speed;
      if (keys.down) paddle1.y += paddle1.speed;
      paddle1.y = Math.max(0, Math.min(H - paddleH, paddle1.y));
      
      // Paddle 2 (AI or Player 2)
      if (aiMode) {
        const target = ball.y - paddleH / 2;
        const diff = target - paddle2.y;
        paddle2.y += Math.sign(diff) * Math.min(Math.abs(diff), paddle2.speed);
      } else {
        if (keys['ArrowUp']) paddle2.y -= paddle1.speed;
        if (keys['ArrowDown']) paddle2.y += paddle1.speed;
      }
      paddle2.y = Math.max(0, Math.min(H - paddleH, paddle2.y));
      
      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;
      
      // Top/bottom bounce
      if (ball.y <= ballSize / 2 || ball.y >= H - ballSize / 2) {
        ball.vy *= -1;
        ball.y = Math.max(ballSize / 2, Math.min(H - ballSize / 2, ball.y));
      }
      
      // Paddle collision
      if (ball.x - ballSize / 2 <= paddle1.x + paddleW &&
          ball.x + ballSize / 2 >= paddle1.x &&
          ball.y >= paddle1.y && ball.y <= paddle1.y + paddleH &&
          ball.vx < 0) {
        const hit = (ball.y - paddle1.y) / paddleH;
        const angle = (hit - 0.5) * Math.PI / 2;
        ball.speed = Math.min(ball.speed + 0.3, 15);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.x = paddle1.x + paddleW + ballSize / 2;
      }
      
      if (ball.x + ballSize / 2 >= paddle2.x &&
          ball.x - ballSize / 2 <= paddle2.x + paddleW &&
          ball.y >= paddle2.y && ball.y <= paddle2.y + paddleH &&
          ball.vx > 0) {
        const hit = (ball.y - paddle2.y) / paddleH;
        const angle = (hit - 0.5) * Math.PI / 2;
        ball.speed = Math.min(ball.speed + 0.3, 15);
        ball.vx = -Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.x = paddle2.x - ballSize / 2;
      }
      
      // Score
      if (ball.x < 0) {
        scores[1]++;
        resetBall(1);
      }
      if (ball.x > W) {
        scores[0]++;
        resetBall(-1);
      }
      
      // Win check
      if (scores[0] >= WIN_SCORE || scores[1] >= WIN_SCORE) {
        state = STATE_GAMEOVER;
        const max = Math.max(scores[0], scores[1]);
        if (max > highScore) {
          highScore = max;
          localStorage.setItem('pong_highscore', highScore);
        }
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      // Center line
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);
      
      if (state === STATE_TITLE) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PONG', W / 2, 180);
        
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 300);
        ctx.fillText('Press A for AI / 2 Player', W / 2, 340);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Player 1: W/S or Up/Down', W / 2, 420);
        ctx.fillText('Player 2: Arrow Keys (2P mode)', W / 2, 450);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 520);
        return;
      }
      
      // Paddles
      ctx.fillStyle = '#FFF';
      ctx.fillRect(paddle1.x, paddle1.y, paddleW, paddleH);
      ctx.fillRect(paddle2.x, paddle2.y, paddleW, paddleH);
      
      // Ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ballSize / 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Scores
      ctx.font = 'bold 64px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(scores[0], W / 4, 80);
      ctx.fillText(scores[1], 3 * W / 4, 80);
      
      // Mode indicator
      ctx.font = '16px Arial';
      ctx.fillStyle = '#666';
      ctx.fillText(aiMode ? 'AI Mode' : '2 Player', W / 2, H - 20);
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px Arial';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = scores[0] > scores[1] ? '#0F0' : '#F00';
        ctx.font = 'bold 48px Arial';
        ctx.fillText(scores[0] > scores[1] ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!', W / 2, H / 2 - 60);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.fillText(`${scores[0]} - ${scores[1]}`, W / 2, H / 2);
        
        ctx.font = '24px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 60);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 100);
      }
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        scores = [0, 0];
        paddle1.y = H / 2 - paddleH / 2;
        paddle2.y = H / 2 - paddleH / 2;
        resetBall(Math.random() > 0.5 ? 1 : -1);
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_TITLE && e.code === 'KeyA') {
        aiMode = !aiMode;
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE) {
        state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        scores = [0, 0];
        paddle1.y = H / 2 - paddleH / 2;
        paddle2.y = H / 2 - paddleH / 2;
        resetBall(Math.random() > 0.5 ? 1 : -1);
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    Object.defineProperty(keys, 'up', { get() { return this['KeyW'] || this['w'] || this['ArrowUp']; } });
    Object.defineProperty(keys, 'down', { get() { return this['KeyS'] || this['s'] || this['ArrowDown']; } });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      update();
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
