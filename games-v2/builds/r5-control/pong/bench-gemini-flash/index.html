  GAME:      Pong
  RUN:       r5-control
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - OpenClaw Benchmark</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Paddle constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 100;
        const PLAYER_SPEED = 7;
        const BALL_SIZE = 10;
        const INITIAL_BALL_SPEED = 5;

        // Game state
        const player1 = { x: 20, y: 250, score: 0 };
        const player2 = { x: 770, y: 250, score: 0 };
        const ball = { x: 400, y: 300, vx: INITIAL_BALL_SPEED, vy: INITIAL_BALL_SPEED };
        
        let keys = {};
        let gameRunning = false;

        // Input listeners
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * INITIAL_BALL_SPEED;
            ball.vy = (Math.random() > 0.5 ? 1 : -1) * INITIAL_BALL_SPEED;
        }

        function update() {
            if (!gameRunning) {
                if (keys[' ']) gameRunning = true;
                return;
            }

            // Player 1 controls (W/S)
            if (keys['w'] && player1.y > 0) player1.y -= PLAYER_SPEED;
            if (keys['s'] && player1.y < canvas.height - PADDLE_HEIGHT) player1.y += PLAYER_SPEED;

            // Player 2 controls (Up/Down)
            if (keys['ArrowUp'] && player2.y > 0) player2.y -= PLAYER_SPEED;
            if (keys['ArrowDown'] && player2.y < canvas.height - PADDLE_HEIGHT) player2.y += PLAYER_SPEED;

            // Ball movement
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Top/Bottom wall bounce
            if (ball.y <= 0 || ball.y >= canvas.height - BALL_SIZE) {
                ball.vy = -ball.vy;
            }

            // Paddle collisions
            // Left paddle
            if (ball.x <= player1.x + PADDLE_WIDTH && 
                ball.y + BALL_SIZE >= player1.y && 
                ball.y <= player1.y + PADDLE_HEIGHT && 
                ball.vx < 0) {
                ball.vx = -ball.vx * 1.1; // Speed up slightly
            }

            // Right paddle
            if (ball.x + BALL_SIZE >= player2.x && 
                ball.y + BALL_SIZE >= player2.y && 
                ball.y <= player2.y + PADDLE_HEIGHT && 
                ball.vx > 0) {
                ball.vx = -ball.vx * 1.1;
            }

            // Scoring
            if (ball.x < 0) {
                player2.score++;
                resetBall();
            } else if (ball.x > canvas.width) {
                player1.score++;
                resetBall();
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Center line
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(player1.x, player1.y, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(player2.x, player2.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Ball
            ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

            // Scores
            ctx.font = '48px Courier New';
            ctx.fillText(player1.score, canvas.width / 4, 50);
            ctx.fillText(player2.score, 3 * canvas.width / 4, 50);

            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px Courier New';
                ctx.fillText('PRESS SPACE TO START', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Courier New';
                ctx.fillText('P1: W/S | P2: UP/DOWN', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetBall();
        gameLoop();
    </script>
</body>
</html>
