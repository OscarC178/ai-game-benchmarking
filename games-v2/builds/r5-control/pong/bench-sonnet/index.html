<!--
  GAME:      Pong
  RUN:       r5-control
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
}
window.addEventListener('resize', resize); resize();

// ---- Constants ----
const PAD_W = 12, PAD_H = 90, PAD_SPEED = 7, BALL_SIZE = 12;
const WIN_SCORE = 11, MAX_BALL_SPEED = 14;

// ---- State ----
const ST = { TITLE:0, PLAYING:1, PAUSED:2, GAMEOVER:3 };
let state = ST.TITLE;
let score1 = 0, score2 = 0;
let serveTimer = 0, serveTo = 0;

const p1 = { x:30, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H, score:0, flash:0 };
const p2 = { x:W-30-PAD_W, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H, score:0, flash:0 };
const ball = { x:W/2, y:H/2, vx:0, vy:0, size:BALL_SIZE };
let trail = [];

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key;
  if([' ','ArrowUp','ArrowDown'].includes(k)) e.preventDefault();
  if(!keys[k]){
    if(k === ' '){
      if(state === ST.TITLE){ beginGame(); }
      else if(state === ST.PLAYING){ state = ST.PAUSED; }
      else if(state === ST.PAUSED){ state = ST.PLAYING; }
    }
    if((k==='r'||k==='R') && state !== ST.TITLE){ beginGame(); }
    if(k==='Escape') state = ST.TITLE;
  }
  keys[k] = true;
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('blur', () => { for(const k in keys) keys[k]=false; });

// ---- Game ----
function beginGame(){
  score1 = 0; score2 = 0;
  p1.y = H/2-PAD_H/2; p2.y = H/2-PAD_H/2;
  serveBall(0);
  state = ST.PLAYING;
}

function serveBall(to){
  ball.x = W/2; ball.y = H/2; trail = [];
  const angle = (25 + Math.random()*30) * Math.PI/180;
  const spd = 6;
  const dir = (to === 0) ? (Math.random()<0.5?1:-1) : (to===1?-1:1);
  ball.vx = Math.cos(angle)*spd*dir;
  ball.vy = Math.sin(angle)*spd*(Math.random()<0.5?1:-1);
  serveTimer = 0; serveTo = 0;
}

function queueServe(to){
  ball.vx = 0; ball.vy = 0;
  ball.x = W/2; ball.y = H/2; trail = [];
  serveTo = to; serveTimer = 60;
}

// ---- Update ----
function update(){
  if(state !== ST.PLAYING) return;

  if(serveTimer > 0){
    serveTimer--;
    if(serveTimer === 0) serveBall(serveTo);
    return;
  }

  // Paddles
  if(keys['w']||keys['W']) p1.y = Math.max(0, p1.y - PAD_SPEED);
  if(keys['s']||keys['S']) p1.y = Math.min(H-PAD_H, p1.y + PAD_SPEED);
  if(keys['ArrowUp']) p2.y = Math.max(0, p2.y - PAD_SPEED);
  if(keys['ArrowDown']) p2.y = Math.min(H-PAD_H, p2.y + PAD_SPEED);
  if(p1.flash > 0) p1.flash--;
  if(p2.flash > 0) p2.flash--;

  // Trail
  trail.push({x:ball.x, y:ball.y});
  if(trail.length > 6) trail.shift();

  // Move ball
  ball.x += ball.vx; ball.y += ball.vy;

  // Wall bounce
  if(ball.y - ball.size/2 <= 0){ ball.y = ball.size/2; ball.vy = Math.abs(ball.vy); }
  if(ball.y + ball.size/2 >= H){ ball.y = H-ball.size/2; ball.vy = -Math.abs(ball.vy); }

  // Paddle collision
  function padCollide(pad, isLeft){
    if(ball.x - ball.size/2 < pad.x + pad.w &&
       ball.x + ball.size/2 > pad.x &&
       ball.y - ball.size/2 < pad.y + pad.h &&
       ball.y + ball.size/2 > pad.y){
      if(isLeft) ball.x = pad.x + pad.w + ball.size/2;
      else ball.x = pad.x - ball.size/2;
      const hit = (ball.y - (pad.y + pad.h/2)) / (pad.h/2);
      const angle = hit * (Math.PI/3);
      const spd = Math.min(Math.sqrt(ball.vx**2+ball.vy**2)*1.04, MAX_BALL_SPEED);
      ball.vx = Math.cos(angle)*spd*(isLeft?1:-1);
      ball.vy = Math.sin(angle)*spd;
      pad.flash = 6;
    }
  }
  padCollide(p1, true);
  padCollide(p2, false);

  // Scoring
  if(ball.x < -20){
    score2++;
    if(score2 >= WIN_SCORE){ state = ST.GAMEOVER; return; }
    queueServe(1);
  }
  if(ball.x > W+20){
    score1++;
    if(score1 >= WIN_SCORE){ state = ST.GAMEOVER; return; }
    queueServe(2);
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // Center line
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.setLineDash([20,12]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  if(state === ST.TITLE){
    ctx.fillStyle = '#fff'; ctx.font = 'bold 80px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PONG', W/2, H/2-50);
    ctx.font = '22px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('Press SPACE to start', W/2, H/2+20);
    ctx.font = '16px monospace'; ctx.fillStyle = '#666';
    ctx.fillText('W/S — Player 1    ↑/↓ — Player 2', W/2, H/2+60);
    return;
  }

  // Scores
  ctx.fillStyle = '#fff'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
  ctx.fillText(score1, W/2-80, 70);
  ctx.fillText(score2, W/2+80, 70);

  // Trail
  for(let i=0;i<trail.length;i++){
    const a = (i+1)/trail.length * 0.35;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.fillRect(trail[i].x-ball.size/2, trail[i].y-ball.size/2, ball.size, ball.size);
  }
  ctx.globalAlpha = 1;

  // Ball
  if(serveTimer <= 0 || Math.floor(serveTimer/8)%2===0){
    ctx.fillStyle = '#fff';
    ctx.fillRect(ball.x-ball.size/2, ball.y-ball.size/2, ball.size, ball.size);
  }

  // Paddles
  ctx.fillStyle = p1.flash > 0 ? '#FFD700' : '#fff';
  ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = p2.flash > 0 ? '#FFD700' : '#fff';
  ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

  // Paused
  if(state === ST.PAUSED){
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2-10);
    ctx.font = '18px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('SPACE to resume  |  R to restart', W/2, H/2+40);
  }

  // Game Over
  if(state === ST.GAMEOVER){
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
    ctx.fillText(score1>=WIN_SCORE?'PLAYER 1 WINS':'PLAYER 2 WINS', W/2, H/2-30);
    ctx.fillStyle = '#fff'; ctx.font = '22px monospace';
    ctx.fillText(`${score1} — ${score2}`, W/2, H/2+25);
    ctx.fillStyle = '#aaa'; ctx.font = '18px monospace';
    ctx.fillText('R to play again  |  ESC for title', W/2, H/2+75);
  }
}

// ---- Loop ----
function loop(){
  requestAnimationFrame(loop);
  update();
  render();
}
loop();

})();
</script>
</body>
</html>
