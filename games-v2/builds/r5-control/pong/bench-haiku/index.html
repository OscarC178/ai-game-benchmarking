<!--
  GAME:      Pong
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = STATES.TITLE;
    let score1 = 0;
    let score2 = 0;

    // Paddles
    const paddle1 = { x: 10, y: 250, width: 15, height: 100, speed: 6 };
    const paddle2 = { x: 775, y: 250, width: 15, height: 100, speed: 6 };

    // Ball
    let ball = { x: 400, y: 300, size: 10, vx: 5, vy: 5 };

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (e.key.toLowerCase() === 'r') {
        if (gameState === STATES.GAME_OVER) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score1 = 0;
      score2 = 0;
      ball.x = WIDTH / 2;
      ball.y = HEIGHT / 2;
      ball.vx = 5;
      ball.vy = 5;
      paddle1.y = 250;
      paddle2.y = 250;
      gameState = STATES.PLAYING;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Paddle 1 control (left)
      if (keys['w'] || keys['arrowup']) {
        paddle1.y = Math.max(0, paddle1.y - paddle1.speed);
      }
      if (keys['s'] || keys['arrowdown']) {
        paddle1.y = Math.min(HEIGHT - paddle1.height, paddle1.y + paddle1.speed);
      }

      // Paddle 2 control (right)
      if (keys['i']) {
        paddle2.y = Math.max(0, paddle2.y - paddle2.speed);
      }
      if (keys['k']) {
        paddle2.y = Math.min(HEIGHT - paddle2.height, paddle2.y + paddle2.speed);
      }

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall collisions (top/bottom)
      if (ball.y <= 0 || ball.y + ball.size >= HEIGHT) {
        ball.vy *= -1;
        ball.y = Math.max(0, Math.min(HEIGHT - ball.size, ball.y));
      }

      // Paddle 1 collision (left)
      if (
        ball.x <= paddle1.x + paddle1.width &&
        ball.x + ball.size >= paddle1.x &&
        ball.y + ball.size >= paddle1.y &&
        ball.y <= paddle1.y + paddle1.height &&
        ball.vx < 0
      ) {
        ball.vx = -ball.vx * 1.02;
        ball.x = paddle1.x + paddle1.width;

        // Add angle based on paddle hit position
        const hitPos = (ball.y - paddle1.y) / paddle1.height;
        ball.vy += (hitPos - 0.5) * 3;
      }

      // Paddle 2 collision (right)
      if (
        ball.x + ball.size >= paddle2.x &&
        ball.x <= paddle2.x + paddle2.width &&
        ball.y + ball.size >= paddle2.y &&
        ball.y <= paddle2.y + paddle2.height &&
        ball.vx > 0
      ) {
        ball.vx = -ball.vx * 1.02;
        ball.x = paddle2.x - ball.size;

        // Add angle based on paddle hit position
        const hitPos = (ball.y - paddle2.y) / paddle2.height;
        ball.vy += (hitPos - 0.5) * 3;
      }

      // Scoring
      if (ball.x < 0) {
        score2++;
        if (score2 >= 11) {
          gameState = STATES.GAME_OVER;
        } else {
          ball.x = WIDTH / 2;
          ball.y = HEIGHT / 2;
          ball.vx = 5;
          ball.vy = 5;
        }
      }

      if (ball.x > WIDTH) {
        score1++;
        if (score1 >= 11) {
          gameState = STATES.GAME_OVER;
        } else {
          ball.x = WIDTH / 2;
          ball.y = HEIGHT / 2;
          ball.vx = -5;
          ball.vy = 5;
        }
      }

      // Cap ball speed
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      if (speed > 12) {
        ball.vx = (ball.vx / speed) * 12;
        ball.vy = (ball.vy / speed) * 12;
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw center line
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(WIDTH / 2, 0);
      ctx.lineTo(WIDTH / 2, HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles
      ctx.fillStyle = '#FFF';
      ctx.fillRect(paddle1.x, paddle1.y, paddle1.width, paddle1.height);
      ctx.fillRect(paddle2.x, paddle2.y, paddle2.width, paddle2.height);

      // Draw ball
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

      // Draw score
      ctx.font = 'bold 48px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(score1 + '   ' + score2, WIDTH / 2, 60);

      // Draw game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PONG', WIDTH / 2, 200);

        ctx.font = '24px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 320);
        ctx.font = '18px "Courier New"';
        ctx.fillText('Player 1: W/S or ↑/↓', WIDTH / 2, 370);
        ctx.fillText('Player 2: I/K', WIDTH / 2, 410);
        ctx.fillText('First to 11 wins', WIDTH / 2, 460);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '24px "Courier New"';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        const winner = score1 >= 11 ? 'PLAYER 1 WINS' : 'PLAYER 2 WINS';
        ctx.fillText(winner, WIDTH / 2, 200);

        ctx.font = '32px "Courier New"';
        ctx.fillText('Score: ' + score1 + ' - ' + score2, WIDTH / 2, 280);

        ctx.font = '24px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 380);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
