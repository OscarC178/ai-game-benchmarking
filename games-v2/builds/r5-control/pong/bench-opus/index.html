<!--
  GAME:      Pong
  RUN:       r5-control
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=500;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=f;g.gain.value=0.04;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}

const PAD_W=12,PAD_H=80,BALL_R=8,PAD_SPD=360,WIN_SCORE=11;

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_POINT=3,ST_OVER=4;
let state=ST_TITLE,stateTimer=0;

let p1,p2,ball,score1,score2,rally,aiDiff;

function resetBall(dir){
  const angle=(Math.random()*0.8-0.4);
  const spd=300;
  ball={x:W/2,y:H/2,vx:Math.cos(angle)*spd*dir,vy:Math.sin(angle)*spd,r:BALL_R};
}

function resetGame(){
  p1={x:20,y:H/2-PAD_H/2,w:PAD_W,h:PAD_H};
  p2={x:W-20-PAD_W,y:H/2-PAD_H/2,w:PAD_W,h:PAD_H};
  score1=0;score2=0;rally=0;aiDiff=0.7;
  resetBall(1);
}

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(state===ST_TITLE&&(e.code==='Space'||e.code==='Enter')){resetGame();state=ST_PLAY;}
  if(state===ST_OVER&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyR')){state=ST_TITLE;}
  if(state===ST_PLAY&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PAUSE;
  else if(state===ST_PAUSE&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PLAY;
  if(e.code==='KeyR'&&state!==ST_TITLE){resetGame();state=ST_PLAY;}
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  if(state===ST_POINT){stateTimer-=dt;if(stateTimer<=0)state=ST_PLAY;return;}
  if(state!==ST_PLAY)return;

  // Player 1 (W/S or Up/Down)
  if(keys['KeyW']||keys['ArrowUp'])p1.y-=PAD_SPD*dt;
  if(keys['KeyS']||keys['ArrowDown'])p1.y+=PAD_SPD*dt;
  p1.y=Math.max(0,Math.min(H-p1.h,p1.y));

  // AI for player 2
  const target=ball.y-p2.h/2;
  const diff=target-p2.y;
  const aiSpd=PAD_SPD*(aiDiff+rally*0.005);
  if(Math.abs(diff)>4){
    p2.y+=Math.sign(diff)*Math.min(aiSpd*dt,Math.abs(diff));
  }
  p2.y=Math.max(0,Math.min(H-p2.h,p2.y));

  // Ball
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;

  // Top/bottom bounce
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);beep(300,0.02);}
  if(ball.y+ball.r>H){ball.y=H-ball.r;ball.vy=-Math.abs(ball.vy);beep(300,0.02);}

  // Paddle collision
  // P1
  if(ball.vx<0&&ball.x-ball.r<p1.x+p1.w&&ball.x+ball.r>p1.x&&ball.y>p1.y&&ball.y<p1.y+p1.h){
    ball.x=p1.x+p1.w+ball.r;
    const hit=(ball.y-(p1.y+p1.h/2))/(p1.h/2);
    const angle=hit*Math.PI/3;
    const spd=Math.hypot(ball.vx,ball.vy)*1.03;
    ball.vx=Math.cos(angle)*spd;ball.vy=Math.sin(angle)*spd;
    rally++;beep(500,0.03);
  }
  // P2
  if(ball.vx>0&&ball.x+ball.r>p2.x&&ball.x-ball.r<p2.x+p2.w&&ball.y>p2.y&&ball.y<p2.y+p2.h){
    ball.x=p2.x-ball.r;
    const hit=(ball.y-(p2.y+p2.h/2))/(p2.h/2);
    const angle=Math.PI-hit*Math.PI/3;
    const spd=Math.hypot(ball.vx,ball.vy)*1.03;
    ball.vx=Math.cos(angle)*spd;ball.vy=Math.sin(angle)*spd;
    rally++;beep(500,0.03);
  }

  // Score
  if(ball.x<-ball.r){
    score2++;rally=0;beep(150,0.15);
    if(score2>=WIN_SCORE){state=ST_OVER;return;}
    resetBall(-1);state=ST_POINT;stateTimer=0.8;
  }
  if(ball.x>W+ball.r){
    score1++;rally=0;beep(150,0.15);
    if(score1>=WIN_SCORE){state=ST_OVER;return;}
    resetBall(1);state=ST_POINT;stateTimer=0.8;
  }
}

function render(now){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#fff';cx.font='bold 56px monospace';cx.textAlign='center';
    cx.fillText('PONG',W/2,180);
    cx.font='18px monospace';cx.fillStyle='#aaa';
    cx.fillText('W / S or ↑ / ↓ to move',W/2,260);
    cx.fillText('First to 11 wins!',W/2,290);
    cx.fillText('P to pause   R to restart',W/2,320);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to Start',W/2,400);
    return;
  }

  // Center line
  cx.setLineDash([8,8]);cx.strokeStyle='#333';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
  cx.setLineDash([]);

  // Paddles
  cx.fillStyle='#fff';
  cx.fillRect(p1.x,p1.y,p1.w,p1.h);
  cx.fillRect(p2.x,p2.y,p2.w,p2.h);

  // Ball
  cx.beginPath();cx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);cx.fill();

  // Scores
  cx.font='bold 48px monospace';cx.textAlign='center';cx.fillStyle='#fff';
  cx.fillText(String(score1),W/2-60,55);
  cx.fillText(String(score2),W/2+60,55);

  // Labels
  cx.font='12px monospace';cx.fillStyle='#666';
  cx.fillText('YOU',W/2-60,75);cx.fillText('CPU',W/2+60,75);

  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillText('P to resume   R to restart',W/2,H/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    const winner=score1>=WIN_SCORE?'YOU WIN!':'CPU WINS';
    cx.fillStyle=score1>=WIN_SCORE?'#0f0':'#f44';
    cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText(winner,W/2,H/2-20);
    cx.fillStyle='#fff';cx.font='20px monospace';
    cx.fillText(score1+' - '+score2,W/2,H/2+20);
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',W/2,H/2+60);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
