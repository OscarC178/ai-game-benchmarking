<!--
  GAME:      Galaga
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="galagaCanvas" width="480" height="640"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('galagaCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 480;
    const HEIGHT = 640;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, WAVE_COMPLETE: 4 };

    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('galagaHighScore') || '0', 10);
    let lives = 3;
    let wave = 1;
    let waveTimer = 0;

    // Player
    const player = { x: 220, y: 580, width: 32, height: 32, speed: 4 };

    // Lasers
    let lasers = [];

    // Enemies
    let enemies = [];
    let formationOffsetX = 0;
    let formationDirection = 1;
    let formationMoveTimer = 0;

    // Bombs
    let bombs = [];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          fireLaser();
        }
      }

      if (key === 'p') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState === STATES.GAME_OVER) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      wave = 1;
      lasers = [];
      bombs = [];
      initWave();
    }

    function initWave() {
      enemies = [];
      formationOffsetX = 0;
      formationDirection = 1;
      formationMoveTimer = 0;
      bombs = [];

      const colors = ['#FF00FF', '#00FFFF', '#00FF00', '#FFFF00'];
      let idx = 0;

      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 5; col++) {
          enemies.push({
            x: 50 + col * 80,
            y: 40 + row * 60,
            formX: 50 + col * 80,
            formY: 40 + row * 60,
            width: 28,
            height: 24,
            color: colors[row],
            points: (4 - row) * 10,
            alive: true,
            diving: false,
            diveTime: 0
          });
          idx++;
        }
      }
      gameState = STATES.PLAYING;
    }

    function fireLaser() {
      if (gameState !== STATES.PLAYING || lasers.length >= 2) return;
      lasers.push({
        x: player.x + player.width / 2 - 1.5,
        y: player.y,
        width: 3,
        height: 12,
        vy: -7
      });
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Player movement
      if (keys['arrowleft'] || keys['a']) {
        player.x = Math.max(0, player.x - player.speed);
      }
      if (keys['arrowright'] || keys['d']) {
        player.x = Math.min(WIDTH - player.width, player.x + player.speed);
      }

      // Update lasers
      for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].y += lasers[i].vy;
        if (lasers[i].y < 0) {
          lasers.splice(i, 1);
        }
      }

      // Update bombs
      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += 3;
        if (bombs[i].y > HEIGHT) {
          bombs.splice(i, 1);
        }
      }

      // Formation movement
      formationMoveTimer++;
      if (formationMoveTimer > 30 - wave) {
        formationMoveTimer = 0;
        formationOffsetX += formationDirection * 15;

        if (Math.abs(formationOffsetX) > 80) {
          formationDirection *= -1;
        }
      }

      // Update enemies
      for (let enemy of enemies) {
        if (!enemy.alive) continue;

        if (!enemy.diving) {
          enemy.x = enemy.formX + formationOffsetX;
          enemy.y = enemy.formY;

          // Random dive
          if (Math.random() < 0.005) {
            enemy.diving = true;
            enemy.diveTime = 0;
          }
        } else {
          enemy.diveTime++;
          const dx = player.x - enemy.x;
          const dy = player.y - enemy.y;
          const dist = Math.hypot(dx, dy);
          enemy.x += (dx / dist) * 2;
          enemy.y += (dy / dist) * 2;

          if (Math.random() < 0.02) {
            bombs.push({
              x: enemy.x + enemy.width / 2 - 2,
              y: enemy.y + enemy.height,
              width: 4,
              height: 6
            });
          }

          if (enemy.diveTime > 120 || enemy.y > HEIGHT) {
            enemy.diving = false;
            enemy.diveTime = 0;
          }
        }
      }

      // Laser-enemy collision
      for (let i = lasers.length - 1; i >= 0; i--) {
        for (let j = enemies.length - 1; j >= 0; j--) {
          const enemy = enemies[j];
          if (!enemy.alive) continue;

          if (
            lasers[i].x < enemy.x + enemy.width &&
            lasers[i].x + lasers[i].width > enemy.x &&
            lasers[i].y < enemy.y + enemy.height &&
            lasers[i].y + lasers[i].height > enemy.y
          ) {
            enemy.alive = false;
            score += enemy.points;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('galagaHighScore', highScore);
            }
            lasers.splice(i, 1);
            break;
          }
        }
      }

      // Bomb-player collision
      for (let i = bombs.length - 1; i >= 0; i--) {
        if (
          bombs[i].x < player.x + player.width &&
          bombs[i].x + bombs[i].width > player.x &&
          bombs[i].y < player.y + player.height &&
          bombs[i].y + bombs[i].height > player.y
        ) {
          lives--;
          bombs.splice(i, 1);
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          }
        }
      }

      // Check wave complete
      if (enemies.every(e => !e.alive)) {
        wave++;
        score += 500;
        gameState = STATES.WAVE_COMPLETE;
        waveTimer = 120;
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw enemies
      for (let enemy of enemies) {
        if (enemy.alive) {
          ctx.fillStyle = enemy.color;
          ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        }
      }

      // Draw lasers
      ctx.fillStyle = '#FFFF00';
      for (let laser of lasers) {
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
      }

      // Draw bombs
      ctx.fillStyle = '#FFF';
      for (let bomb of bombs) {
        ctx.fillRect(bomb.x, bomb.y, bomb.width, bomb.height);
      }

      // Draw player
      ctx.fillStyle = '#00FFFF';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw score and lives
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('Wave: ' + wave, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GALAGA', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);
        ctx.fillText('← → or A D to move', WIDTH / 2, 320);
        ctx.fillText('SPACE to fire', WIDTH / 2, 360);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 28px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 240);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 290);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 380);
      } else if (gameState === STATES.WAVE_COMPLETE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 24px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('Wave ' + (wave - 1) + ' Complete', WIDTH / 2, 250);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 320);

        waveTimer--;
        if (waveTimer <= 0) {
          initWave();
        }
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
