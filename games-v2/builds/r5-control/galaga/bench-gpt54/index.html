<!--
  GAME:      Galaga
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaga</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #03050a;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="800" height="960"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const DT_CAP = 1 / 30;

  const STATES = {
    TITLE: 'title',
    START: 'start',
    PLAYING: 'playing',
    PAUSED: 'paused',
    PLAYER_HIT: 'player_hit',
    STAGE_CLEAR: 'stage_clear',
    GAME_OVER: 'game_over',
    WIN: 'win'
  };

  const TYPE_INFO = {
    boss: { color: '#ff6666', points: 150, size: 22 },
    escort: { color: '#7c7cff', points: 80, size: 18 },
    grunt: { color: '#66ff99', points: 50, size: 16 }
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let score = 0;
  let highScore = loadHighScore();
  let lives = 3;
  let stage = 1;
  let stateTimer = 0;
  let message = '';

  const player = {
    x: W / 2,
    y: H - 90,
    w: 32,
    h: 24,
    speed: 360,
    cooldown: 0,
    flash: 0
  };

  let enemies = [];
  let playerBullets = [];
  let enemyBullets = [];
  let particles = [];
  let stars = createStars();
  let formationPhase = 0;
  let diveTimer = 2;

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('galaga_best_r5_control') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('galaga_best_r5_control', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function createStars() {
    return Array.from({ length: 90 }, () => ({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 1, spd: rand(12, 40) }));
  }

  function resetPlayer() {
    player.x = W / 2;
    player.y = H - 90;
    player.cooldown = 0;
    player.flash = 0;
  }

  function buildStage() {
    enemies = [];
    formationPhase = 0;
    diveTimer = Math.max(0.8, 2.2 - stage * 0.12);

    const rows = [
      { type: 'boss', count: 4, y: 120, offset: 180 },
      { type: 'escort', count: 8, y: 175, offset: 110 },
      { type: 'grunt', count: 10, y: 230, offset: 70 },
      { type: 'grunt', count: 10, y: 285, offset: 70 }
    ];

    rows.forEach((row, rowIndex) => {
      for (let i = 0; i < row.count; i++) {
        const tx = row.offset + i * ((W - row.offset * 2) / Math.max(1, row.count - 1));
        const startLeft = i < row.count / 2;
        enemies.push({
          type: row.type,
          x: startLeft ? -60 - i * 26 : W + 60 + i * 26,
          y: 80 + rowIndex * 26,
          tx,
          ty: row.y,
          mode: 'entry',
          entryTime: i * 0.12 + rowIndex * 0.28,
          diveT: 0,
          diveDuration: 2.8,
          fireTimer: rand(1.2, 3.2),
          phase: Math.random() * Math.PI * 2,
          hp: row.type === 'boss' ? 2 : 1
        });
      }
    });
  }

  function startGame() {
    score = 0;
    lives = 3;
    stage = 1;
    message = '';
    playerBullets = [];
    enemyBullets = [];
    particles = [];
    buildStage();
    resetPlayer();
    state = STATES.START;
    stateTimer = 1.7;
  }

  function nextStage() {
    stage += 1;
    if (stage > 6) {
      state = STATES.WIN;
      message = 'The swarm is broken.';
      return;
    }
    playerBullets = [];
    enemyBullets = [];
    particles = [];
    buildStage();
    resetPlayer();
    state = STATES.START;
    stateTimer = 1.5;
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(50, 180);
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.3, 0.8), maxLife: 0.8, color });
    }
  }

  function firePlayer() {
    if (state !== STATES.PLAYING || player.cooldown > 0) return;
    playerBullets.push({ x: player.x, y: player.y - 14, vy: -520, r: 3 });
    player.cooldown = 0.18;
  }

  function enemyRect(e) {
    const size = TYPE_INFO[e.type].size;
    return { x: e.x - size, y: e.y - size, w: size * 2, h: size * 2 };
  }

  function playerRect() {
    return { x: player.x - player.w / 2, y: player.y - player.h / 2, w: player.w, h: player.h };
  }

  function rectCircle(rect, circle) {
    const cx = clamp(circle.x, rect.x, rect.x + rect.w);
    const cy = clamp(circle.y, rect.y, rect.y + rect.h);
    const dx = circle.x - cx;
    const dy = circle.y - cy;
    return dx * dx + dy * dy <= circle.r * circle.r;
  }

  function beginDive(enemy) {
    enemy.mode = 'dive';
    enemy.diveT = 0;
    enemy.diveDuration = rand(2.1, 3.0);
    enemy.startX = enemy.x;
    enemy.startY = enemy.y;
    enemy.curve = rand(-180, 180);
  }

  function hitEnemy(enemy, bulletIndex) {
    if (bulletIndex >= 0) playerBullets.splice(bulletIndex, 1);
    enemy.hp -= 1;
    spawnParticles(enemy.x, enemy.y, TYPE_INFO[enemy.type].color, 14);
    if (enemy.hp <= 0) {
      score += TYPE_INFO[enemy.type].points;
      updateHighScore();
      enemies.splice(enemies.indexOf(enemy), 1);
      if (!enemies.length) {
        state = STATES.STAGE_CLEAR;
        stateTimer = 1.4;
      }
    }
  }

  function hitPlayer() {
    if (state !== STATES.PLAYING || player.flash > 0) return;
    lives -= 1;
    player.flash = 1.1;
    spawnParticles(player.x, player.y, '#ffffff', 20);
    playerBullets = [];
    enemyBullets = [];
    if (lives <= 0) {
      state = STATES.GAME_OVER;
      message = 'Your fighter was destroyed.';
      updateHighScore();
    } else {
      state = STATES.PLAYER_HIT;
      stateTimer = 1.2;
    }
  }

  function updateStars(dt) {
    stars.forEach(s => {
      s.y += s.spd * dt;
      if (s.y > H) {
        s.y = -4;
        s.x = Math.random() * W;
      }
    });
  }

  function updatePlayer(dt) {
    player.cooldown = Math.max(0, player.cooldown - dt);
    player.flash = Math.max(0, player.flash - dt);
    let move = 0;
    if (keys.ArrowLeft || keys.KeyA) move -= 1;
    if (keys.ArrowRight || keys.KeyD) move += 1;
    player.x += move * player.speed * dt;
    player.x = clamp(player.x, 28, W - 28);
  }

  function updateEnemies(dt) {
    formationPhase += dt * 2;
    diveTimer -= dt;

    const formationEnemies = enemies.filter(e => e.mode === 'formation');
    if (formationEnemies.length && diveTimer <= 0) {
      const candidate = formationEnemies[Math.floor(Math.random() * formationEnemies.length)];
      if (candidate) beginDive(candidate);
      diveTimer = Math.max(0.65, 2.1 - stage * 0.12);
    }

    enemies.forEach(enemy => {
      if (enemy.mode === 'entry') {
        enemy.entryTime -= dt;
        if (enemy.entryTime <= 0) {
          const dx = enemy.tx - enemy.x;
          const dy = enemy.ty - enemy.y;
          const d = Math.hypot(dx, dy);
          if (d < 8) {
            enemy.x = enemy.tx;
            enemy.y = enemy.ty;
            enemy.mode = 'formation';
          } else {
            enemy.x += dx * 2.4 * dt;
            enemy.y += dy * 2.4 * dt;
          }
        }
      } else if (enemy.mode === 'formation') {
        enemy.x = enemy.tx + Math.sin(formationPhase + enemy.phase) * 18;
        enemy.y = enemy.ty + Math.cos(formationPhase * 0.8 + enemy.phase) * 6;
        enemy.fireTimer -= dt;
        if (enemy.fireTimer <= 0) {
          enemy.fireTimer = rand(1.2, 3.5);
          if (Math.random() < 0.3 + stage * 0.04) {
            enemyBullets.push({ x: enemy.x, y: enemy.y + 10, vy: 260 + stage * 14, r: 3.5 });
          }
        }
      } else if (enemy.mode === 'dive') {
        enemy.diveT += dt / enemy.diveDuration;
        const t = enemy.diveT;
        if (t >= 1) {
          enemy.mode = 'entry';
          enemy.entryTime = 0;
          enemy.x = enemy.x;
          enemy.y = enemy.y;
        } else {
          const px = enemy.startX + Math.sin(t * Math.PI * 2) * enemy.curve + (player.x - enemy.startX) * t * 0.6;
          const py = enemy.startY + t * (H - enemy.startY + 120) - Math.sin(t * Math.PI) * 160;
          enemy.x = px;
          enemy.y = py;
          if (Math.random() < 0.012 + stage * 0.001) {
            enemyBullets.push({ x: enemy.x, y: enemy.y + 10, vy: 320, r: 3.5 });
          }
          if (enemy.y > H + 40) {
            enemy.mode = 'entry';
            enemy.entryTime = 0;
            enemy.x = enemy.tx;
            enemy.y = -30;
          }
        }
      }
    });
  }

  function updateBullets(dt) {
    playerBullets.forEach(b => b.y += b.vy * dt);
    enemyBullets.forEach(b => b.y += b.vy * dt);
    playerBullets = playerBullets.filter(b => b.y > -20);
    enemyBullets = enemyBullets.filter(b => b.y < H + 20);

    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const bullet = playerBullets[i];
      for (const enemy of [...enemies]) {
        if (rectCircle(enemyRect(enemy), bullet)) {
          hitEnemy(enemy, i);
          break;
        }
      }
    }

    const pRect = playerRect();
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const bullet = enemyBullets[i];
      if (rectCircle(pRect, bullet)) {
        enemyBullets.splice(i, 1);
        hitPlayer();
      }
    }

    if (state === STATES.PLAYING) {
      enemies.forEach(enemy => {
        const eRect = enemyRect(enemy);
        if (pRect.x < eRect.x + eRect.w && pRect.x + pRect.w > eRect.x && pRect.y < eRect.y + eRect.h && pRect.y + pRect.h > eRect.y) {
          hitPlayer();
        }
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt) {
    updateStars(dt);
    updateParticles(dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER || state === STATES.WIN) return;

    if (state === STATES.START) {
      stateTimer -= dt;
      if (stateTimer <= 0) state = STATES.PLAYING;
      return;
    }

    if (state === STATES.PLAYER_HIT) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        resetPlayer();
        state = STATES.PLAYING;
      }
      return;
    }

    if (state === STATES.STAGE_CLEAR) {
      stateTimer -= dt;
      if (stateTimer <= 0) nextStage();
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
  }

  function drawShip(x, y, flash = false) {
    if (flash && Math.floor(player.flash * 12) % 2 === 0) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(12, 10);
    ctx.lineTo(4, 6);
    ctx.lineTo(0, 10);
    ctx.lineTo(-4, 6);
    ctx.lineTo(-12, 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#4DDBFF';
    ctx.fillRect(-3, -4, 6, 8);
    ctx.restore();
  }

  function drawEnemy(enemy) {
    const info = TYPE_INFO[enemy.type];
    ctx.save();
    ctx.translate(enemy.x, enemy.y);
    ctx.fillStyle = info.color;
    if (enemy.type === 'boss') {
      ctx.fillRect(-18, -8, 36, 10);
      ctx.fillRect(-10, -14, 20, 8);
      ctx.fillRect(-16, 2, 8, 10);
      ctx.fillRect(8, 2, 8, 10);
    } else if (enemy.type === 'escort') {
      ctx.fillRect(-14, -8, 28, 8);
      ctx.fillRect(-18, 0, 36, 8);
      ctx.fillRect(-10, 8, 8, 8);
      ctx.fillRect(2, 8, 8, 8);
    } else {
      ctx.fillRect(-12, -8, 24, 8);
      ctx.fillRect(-16, 0, 32, 8);
      ctx.fillRect(-8, 8, 6, 8);
      ctx.fillRect(2, 8, 6, 8);
    }
    ctx.restore();
  }

  function drawStars() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
  }

  function drawBullets() {
    ctx.fillStyle = '#ffffaa';
    playerBullets.forEach(b => ctx.fillRect(b.x - 1.5, b.y - 10, 3, 12));
    ctx.fillStyle = '#ff6666';
    enemyBullets.forEach(b => ctx.beginPath(), 0);
    enemyBullets.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    });
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE ${score}`, 18, 30);
    ctx.textAlign = 'center';
    ctx.fillText(`HI ${highScore}`, W / 2, 30);
    ctx.textAlign = 'right';
    ctx.fillText(`STAGE ${stage}`, W - 18, 30);

    for (let i = 0; i < lives; i++) drawShip(32 + i * 28, H - 28, false);
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 48px Arial';
    ctx.fillText(title, W / 2, H / 2 - 100);
    ctx.font = '24px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 34));
  }

  function render() {
    drawStars();
    enemies.forEach(drawEnemy);
    drawBullets();
    if (state !== STATES.PLAYER_HIT || player.flash > 0) drawShip(player.x, player.y, true);
    drawParticles();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('GALAGA', [
        'Press SPACE to start',
        'Arrow keys / A D to move',
        'Space fires • survive 6 stages'
      ], true);
    } else if (state === STATES.START) {
      drawOverlay(`STAGE ${stage}`, ['Enemy formation incoming...'], false);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', [message || 'The swarm got through.', 'Press R to play again', 'Press Escape for title'], true);
    } else if (state === STATES.WIN) {
      drawOverlay('VICTORY!', [message || 'You broke the fleet.', 'Press R to play again'], true);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) startGame();
      else if (state === STATES.PLAYING) firePlayer();
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING || state === STATES.START) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER || state === STATES.WIN) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) startGame();
    }
  }

  function syncPrev() {
    const watched = ['ArrowLeft','ArrowRight','KeyA','KeyD','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowLeft','ArrowRight','KeyA','KeyD','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  buildStage();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
