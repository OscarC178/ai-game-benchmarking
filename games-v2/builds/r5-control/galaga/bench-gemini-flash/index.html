<!--
  GAME:      Galaga
  RUN:       r5-control
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga Retro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; background: #000; display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; width: 448px; display: flex; justify-content: space-between; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">00</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas" width="448" height="512"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        const WIDTH = 448;
        const HEIGHT = 512;

        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let keys = {};

        // Starfield
        const stars = Array.from({length: 100}, () => ({
            x: Math.random() * WIDTH,
            y: Math.random() * HEIGHT,
            speed: 0.5 + Math.random() * 2,
            size: Math.random() * 2
        }));

        let player = { x: WIDTH / 2 - 15, y: HEIGHT - 60, w: 30, h: 30, speed: 5, lastShot: 0 };
        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let formations = [];

        function spawnWave() {
            const rows = 4;
            const cols = 8;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: 60 + c * 45,
                        y: -50 - r * 40,
                        targetX: 60 + c * 45,
                        targetY: 80 + r * 40,
                        w: 24, h: 24,
                        hp: r === 0 ? 2 : 1,
                        state: 'ENTERING',
                        angle: 0,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetGame() {
            score = 0; lives = 3; enemies = []; bullets = []; enemyBullets = [];
            scoreEl.innerText = score; livesEl.innerText = lives;
            gameRunning = true;
            spawnWave();
        }

        function update() {
            if (!gameRunning) {
                if (keys['Space']) resetGame();
                return;
            }

            // Move Stars
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > HEIGHT) s.y = 0;
            });

            // Player logic
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < WIDTH - player.w) player.x += player.speed;
            if (keys['Space'] && Date.now() - player.lastShot > 250) {
                bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
                player.lastShot = Date.now();
            }

            // Bullets
            bullets.forEach((b, i) => {
                b.y -= 8;
                if (b.y < 0) bullets.splice(i, 1);
            });

            enemyBullets.forEach((b, i) => {
                b.y += 4;
                if (b.y > HEIGHT) enemyBullets.splice(i, 1);
                if (b.x < player.x + player.w && b.x + b.w > player.x && b.y < player.y + player.h && b.y + b.h > player.y) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    livesEl.innerText = lives;
                    if (lives <= 0) gameRunning = false;
                }
            });

            // Enemies logic
            enemies.forEach((e, i) => {
                if (e.state === 'ENTERING') {
                    e.y += 3;
                    if (e.y >= e.targetY) e.state = 'STATIONARY';
                } else if (e.state === 'STATIONARY') {
                    e.x = e.targetX + Math.sin(Date.now() / 500 + e.phase) * 10;
                    if (Math.random() < 0.002) e.state = 'DIVING';
                } else if (e.state === 'DIVING') {
                    e.y += 5;
                    e.x += Math.sin(e.y / 30) * 5;
                    if (Math.random() < 0.02) enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, w: 4, h: 8 });
                    if (e.y > HEIGHT) {
                        e.y = -30;
                        e.state = 'ENTERING';
                    }
                }

                // Bullet collision
                bullets.forEach((b, bi) => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if (e.hp <= 0) {
                            enemies.splice(i, 1);
                            score += 100;
                            scoreEl.innerText = score;
                        }
                    }
                });

                // Player collision
                if (e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
                    enemies.splice(i, 1);
                    lives--;
                    livesEl.innerText = lives;
                    if (lives <= 0) gameRunning = false;
                }
            });

            if (enemies.length === 0 && gameRunning) spawnWave();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Stars
            ctx.fillStyle = '#fff';
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

            // Player (Fighter)
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y + 10, player.w, 20);
            ctx.fillStyle = '#f00';
            ctx.fillRect(player.x + 10, player.y, 10, 10);
            ctx.fillRect(player.x, player.y + 25, 5, 5);
            ctx.fillRect(player.x + 25, player.y + 25, 5, 5);

            // Bullets
            ctx.fillStyle = '#f0f';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
            ctx.fillStyle = '#ff0';
            enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = e.hp > 1 ? '#0ff' : (e.state === 'DIVING' ? '#f00' : '#ff0');
                ctx.beginPath();
                ctx.moveTo(e.x + e.w / 2, e.y);
                ctx.lineTo(e.x + e.w, e.y + e.h);
                ctx.lineTo(e.x + e.w / 2, e.y + e.h * 0.8);
                ctx.lineTo(e.x, e.y + e.h);
                ctx.closePath();
                ctx.fill();
            });

            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0, WIDTH, HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '30px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText(lives <= 0 ? 'GAME OVER' : 'GALAGA', WIDTH/2, HEIGHT/2 - 20);
                ctx.font = '20px "Courier New"';
                ctx.fillText('PRESS SPACE TO ATTACK', WIDTH/2, HEIGHT/2 + 30);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
