<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong Classic</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { background: #000; border: 2px solid #333; image-rendering: pixelated; }
        #ui { width: 448px; display: flex; justify-content: space-between; padding: 10px; font-size: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui">
        <span>Score: <span id="score">0</span></span>
        <span>Bonus: <span id="bonus">5000</span></span>
    </div>
    <canvas id="gameCanvas" width="448" height="512"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bonusEl = document.getElementById('bonus');

        const TILE = 16;
        const GRAVITY = 0.25;
        const JUMP_FORCE = -4.5;
        const WALK_SPEED = 2;

        let score = 0;
        let bonus = 5000;
        let gameActive = false;
        let lastTime = 0;

        const player = {
            x: 50, y: 448, w: 14, h: 20,
            vx: 0, vy: 0,
            dir: 1, jumping: false, climbing: false, onGround: true,
            anim: 0
        };

        const platforms = [
            { x: 0, y: 480, w: 448, h: 16, angle: 0 },
            { x: 0, y: 416, w: 400, h: 12, angle: -0.03 },
            { x: 48, y: 352, w: 400, h: 12, angle: 0.03 },
            { x: 0, y: 288, w: 400, h: 12, angle: -0.03 },
            { x: 48, y: 224, w: 400, h: 12, angle: 0.03 },
            { x: 0, y: 160, w: 400, h: 12, angle: -0.03 },
            { x: 160, y: 96, w: 128, h: 12, angle: 0 }
        ];

        const ladders = [
            { x: 380, top: 416, bot: 480 },
            { x: 64, top: 352, bot: 416 },
            { x: 380, top: 288, bot: 352 },
            { x: 64, top: 224, bot: 288 },
            { x: 380, top: 160, bot: 224 },
            { x: 224, top: 96, bot: 160 }
        ];

        let barrels = [];
        let spawnTimer = 0;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function getPlatformAt(x, y) {
            const px = x + player.w / 2;
            for (let p of platforms) {
                if (px >= p.x && px <= p.x + p.w) {
                    const groundY = p.y + (px - p.x) * Math.tan(p.angle);
                    if (y + player.h >= groundY - 5 && y + player.h <= groundY + 10) return groundY;
                }
            }
            return null;
        }

        function getLadderAt(x, y) {
            const px = x + player.w / 2;
            for (let l of ladders) {
                if (Math.abs(px - l.x) < 10 && y + player.h >= l.top && y <= l.bot) return l;
            }
            return null;
        }

        function update(dt) {
            if (!gameActive) {
                if (keys['Space']) { gameActive = true; resetGame(); }
                return;
            }

            bonus = Math.max(0, bonus - 0.5);
            bonusEl.innerText = Math.floor(bonus);

            // Player logic
            const ladder = getLadderAt(player.x, player.y);
            
            if (player.climbing) {
                player.vx = 0;
                player.vy = 0;
                if (keys['ArrowUp']) player.y -= 1.5;
                else if (keys['ArrowDown']) player.y += 1.5;
                
                if (!ladder || (player.onGround && !keys['ArrowUp'] && !keys['ArrowDown'])) player.climbing = false;
                
                const gy = getPlatformAt(player.x, player.y);
                if (gy && !keys['ArrowUp'] && !keys['ArrowDown']) {
                    player.y = gy - player.h;
                    player.climbing = false;
                }
            } else {
                if (keys['ArrowLeft']) { player.vx = -WALK_SPEED; player.dir = -1; player.anim += 0.2; }
                else if (keys['ArrowRight']) { player.vx = WALK_SPEED; player.dir = 1; player.anim += 0.2; }
                else { player.vx = 0; }

                if (keys['ArrowUp'] && ladder) {
                    player.climbing = true;
                    player.x = ladder.x - player.w / 2;
                }

                if (keys['Space'] && player.onGround) {
                    player.vy = JUMP_FORCE;
                    player.onGround = false;
                }

                player.vy += GRAVITY;
                player.x += player.vx;
                player.y += player.vy;

                const gy = getPlatformAt(player.x, player.y);
                if (gy && player.vy >= 0) {
                    player.y = gy - player.h;
                    player.vy = 0;
                    player.onGround = true;
                } else {
                    player.onGround = false;
                }
            }

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

            // Barrels
            spawnTimer--;
            if (spawnTimer <= 0) {
                barrels.push({ x: 80, y: 140, vx: 2, vy: 0 });
                spawnTimer = 120 + Math.random() * 100;
            }

            for (let i = barrels.length - 1; i >= 0; i--) {
                let b = barrels[i];
                const bg = getPlatformAt(b.x + 8, b.y + 8);
                if (bg) {
                    b.y = bg - 16;
                    b.vy = 0;
                    // Determine direction from platform slant
                    for (let p of platforms) {
                        if (b.x + 8 >= p.x && b.x + 8 <= p.x + p.w) {
                            if (p.angle > 0) b.vx = 2.5;
                            else if (p.angle < 0) b.vx = -2.5;
                            else b.vx = -2.5; // Floor
                        }
                    }
                } else {
                    b.vy += GRAVITY;
                }
                b.x += b.vx;
                b.y += b.vy;

                // Collision
                const dx = (player.x + player.w/2) - (b.x + 8);
                const dy = (player.y + player.h/2) - (b.y + 8);
                if (Math.sqrt(dx*dx + dy*dy) < 18) resetGame(); // Die

                if (b.y > canvas.height) barrels.splice(i, 1);
            }

            // Win condition
            if (player.y < 100 && player.x > 180 && player.x < 280) {
                score += Math.floor(bonus);
                scoreEl.innerHTML = score;
                gameActive = false;
                alert("You Rescued Pauline!");
            }
        }

        function resetGame() {
            player.x = 40; player.y = 448;
            player.vx = 0; player.vy = 0;
            player.climbing = false;
            barrels = [];
            bonus = 5000;
            spawnTimer = 60;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Platforms
            ctx.fillStyle = '#f0f';
            platforms.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillRect(0, 0, p.w, p.h);
                // Girders
                ctx.strokeStyle = '#000';
                for(let gx=0; gx<p.w; gx+=16) ctx.strokeRect(gx, 0, 16, p.h);
                ctx.restore();
            });

            // Ladders
            ctx.fillStyle = '#0ff';
            ladders.forEach(l => {
                ctx.fillRect(l.x - 6, l.top, 2, l.bot - l.top);
                ctx.fillRect(l.x + 4, l.top, 2, l.bot - l.top);
                for (let ry = l.top; ry < l.bot; ry += 8) ctx.fillRect(l.x - 6, ry, 12, 2);
            });

            // Pauline
            ctx.fillStyle = '#FF69B4'; ctx.fillRect(220, 72, 16, 24);

            // Kong
            ctx.fillStyle = '#8B4513'; ctx.fillRect(40, 100, 48, 48);

            // Barrels
            ctx.fillStyle = '#D2691E';
            barrels.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x + 8, b.y + 8, 8, 0, 7); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.stroke();
            });

            // Player
            ctx.fillStyle = '#f00';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#fff'; // Face
            ctx.fillRect(player.x + (player.dir > 0 ? 8 : 2), player.y + 2, 4, 4);

            if (!gameActive) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px Courier';
                ctx.fillText("DONKEY KONG", canvas.width/2, 200);
                ctx.fillText("PRESS SPACE TO START", canvas.width/2, 300);
            }
        }

        function loop(t) {
            update(t);
            draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
