<!--
  GAME:      Donkey Kong
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 448;
    const H = 512;
    canvas.width = W;
    canvas.height = H;
    
    const STATE_TITLE = 0;
    const STATE_READY = 1;
    const STATE_PLAYING = 2;
    const STATE_PAUSED = 3;
    const STATE_GAMEOVER = 4;
    const STATE_LEVEL_CLEAR = 5;
    
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('dkong_highscore') || '0');
    let lives = 3;
    let level = 1;
    
    const TILE = 16;
    const GRAVITY = 0.4;
    
    let mario = null;
    let dk = null;
    let pauline = null;
    let barrels = [];
    let platforms = [];
    let ladders = [];
    let hammers = [];
    
    let barrelTimer = 0;
    let hammerTimer = 0;
    let levelClearTimer = 0;
    
    const keys = {};
    
    function initGame() {
      score = 0;
      lives = 3;
      level = 1;
      initLevel();
    }
    
    function initLevel() {
      initMario();
      initDK();
      initPauline();
      initPlatforms();
      initLadders();
      initHammers();
      barrels = [];
      barrelTimer = 0;
    }
    
    function initMario() {
      mario = {
        x: 60,
        y: H - 80,
        vx: 0,
        vy: 0,
        width: 14,
        height: 20,
        grounded: false,
        jumping: false,
        climbing: false,
        facing: 1,
        hasHammer: false,
        hammerTime: 0,
        alive: true,
        onLadder: null
      };
    }
    
    function initDK() {
      dk = {
        x: 30,
        y: 70,
        width: 48,
        height: 48,
        throwing: false,
        throwTimer: 0,
        frame: 0
      };
    }
    
    function initPauline() {
      pauline = {
        x: W - 90,
        y: 55,
        width: 20,
        height: 30
      };
    }
    
    function initPlatforms() {
      platforms = [];
      // Diagonal platforms
      const platformData = [
        { y: H - 55, x1: 15, x2: W - 30 },
        { y: H - 125, x1: 30, x2: W - 15 },
        { y: H - 195, x1: 15, x2: W - 30 },
        { y: H - 265, x1: 30, x2: W - 15 },
        { y: H - 335, x1: 15, x2: W - 30 },
        { y: H - 405, x1: 30, x2: W - 15 },
        { y: 105, x1: 15, x2: 160 },
        { y: 105, x1: W - 160, x2: W - 15 }
      ];
      
      platformData.forEach(p => {
        platforms.push({
          x: p.x1,
          y: p.y,
          width: p.x2 - p.x1,
          height: 8
        });
      });
    }
    
    function initLadders() {
      ladders = [];
      const ladderData = [
        { x: 70, y1: H - 55, y2: H - 125 },
        { x: W - 90, y1: H - 55, y2: H - 125 },
        { x: 140, y1: H - 125, y2: H - 195 },
        { x: W - 160, y1: H - 125, y2: H - 195 },
        { x: 70, y1: H - 195, y2: H - 265 },
        { x: W - 90, y1: H - 195, y2: H - 265 },
        { x: 140, y1: H - 265, y2: H - 335 },
        { x: W - 160, y1: H - 265, y2: H - 335 },
        { x: 70, y1: H - 335, y2: H - 405 },
        { x: W - 90, y1: H - 335, y2: H - 405 },
        { x: 160, y1: H - 405, y2: 105 },
        { x: W - 180, y1: H - 405, y2: 105 }
      ];
      
      ladderData.forEach(l => {
        ladders.push({
          x: l.x,
          y: l.y2,
          width: 12,
          height: l.y1 - l.y2
        });
      });
    }
    
    function initHammers() {
      hammers = [
        { x: 100, y: H - 135, active: true },
        { x: W - 130, y: H - 275, active: true }
      ];
    }
    
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dtMs;
        if (levelClearTimer <= 0) {
          level++;
          initLevel();
          state = STATE_READY;
          setTimeout(() => { state = STATE_PLAYING; }, 2000);
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Update DK
      dk.throwTimer += dtMs;
      if (dk.throwTimer > 2500) {
        dk.throwTimer = 0;
        dk.throwing = true;
        setTimeout(() => { dk.throwing = false; }, 400);
        throwBarrel();
      }
      
      // Update Mario
      updateMario(dtMs);
      
      // Update barrels
      updateBarrels(dtMs);
      
      // Check collisions
      checkCollisions();
      
      // Hammer timer
      if (mario.hasHammer) {
        mario.hammerTime -= dtMs;
        if (mario.hammerTime <= 0) {
          mario.hasHammer = false;
        }
      }
      
      // Check win
      if (mario.y < 120 && mario.x > pauline.x - 20 && mario.x < pauline.x + pauline.width + 20) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
        score += 1000;
      }
    }
    
    function updateMario(dtMs) {
      // Check if on ladder
      mario.onLadder = null;
      for (const ladder of ladders) {
        if (mario.x + mario.width > ladder.x && 
            mario.x < ladder.x + ladder.width &&
            mario.y + mario.height > ladder.y && 
            mario.y < ladder.y + ladder.height) {
          mario.onLadder = ladder;
          break;
        }
      }
      
      if (!mario.climbing) {
        // Horizontal movement
        if (keys.left && !mario.hasHammer) {
          mario.vx = -2;
          mario.facing = -1;
        } else if (keys.right && !mario.hasHammer) {
          mario.vx = 2;
          mario.facing = 1;
        } else {
          mario.vx = 0;
        }
        
        // Jump
        if (keys.jump && mario.grounded && !mario.jumping) {
          mario.vy = -8;
          mario.jumping = true;
          mario.grounded = false;
        }
        
        // Start climbing
        if (mario.onLadder && (keys.up || keys.down)) {
          mario.climbing = true;
          mario.vx = 0;
          mario.vy = 0;
          mario.x = mario.onLadder.x + mario.onLadder.width / 2 - mario.width / 2;
        }
      } else {
        // Climbing
        mario.vx = 0;
        if (keys.up) {
          mario.y -= 1.5;
        } else if (keys.down) {
          mario.y += 1.5;
        }
        
        // Stop climbing
        if (!mario.onLadder || keys.left || keys.right) {
          mario.climbing = false;
        }
        
        // Jump off ladder
        if (keys.jump) {
          mario.climbing = false;
          mario.vy = -8;
          mario.jumping = true;
        }
      }
      
      // Apply gravity
      if (!mario.climbing) {
        mario.vy += GRAVITY;
      }
      
      // Move
      mario.x += mario.vx;
      mario.y += mario.vy;
      
      // Platform collision
      mario.grounded = false;
      for (const p of platforms) {
        if (mario.vy >= 0 &&
            mario.x + mario.width > p.x &&
            mario.x < p.x + p.width &&
            mario.y + mario.height >= p.y &&
            mario.y + mario.height <= p.y + p.height + mario.vy + 1) {
          mario.y = p.y - mario.height;
          mario.vy = 0;
          mario.grounded = true;
          mario.jumping = false;
        }
      }
      
      // Screen bounds
      mario.x = Math.max(0, Math.min(W - mario.width, mario.x));
      
      // Fall off screen
      if (mario.y > H) {
        killMario();
      }
    }
    
    function throwBarrel() {
      barrels.push({
        x: dk.x + dk.width / 2,
        y: dk.y + dk.height,
        vx: 1.5,
        vy: 0,
        width: 16,
        height: 16
      });
    }
    
    function updateBarrels(dtMs) {
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        
        b.x += b.vx;
        b.y += b.vy;
        b.vy += GRAVITY * 0.5;
        
        // Platform collision
        for (const p of platforms) {
          if (b.vy >= 0 &&
              b.x + b.width > p.x &&
              b.x < p.x + p.width &&
              b.y + b.height >= p.y &&
              b.y + b.height <= p.y + p.height + 5) {
            b.y = p.y - b.height;
            b.vy = 0;
          }
        }
        
        // Bounce off walls
        if (b.x <= 0 || b.x + b.width >= W) {
          b.vx *= -1;
        }
        
        // Remove if off screen
        if (b.y > H + 50) {
          barrels.splice(i, 1);
        }
      }
    }
    
    function checkCollisions() {
      // Mario vs barrels
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        if (collides(mario, b)) {
          if (mario.hasHammer) {
            barrels.splice(i, 1);
            score += 500;
          } else if (mario.jumping && mario.vy > 0 && mario.y + mario.height < b.y + 10) {
            // Jumping over barrel
            score += 100;
          } else {
            killMario();
            return;
          }
        }
      }
      
      // Mario vs hammers
      if (!mario.hasHammer) {
        for (const h of hammers) {
          if (h.active && collides(mario, { x: h.x, y: h.y, width: 24, height: 16 })) {
            h.active = false;
            mario.hasHammer = true;
            mario.hammerTime = 5000;
          }
        }
      }
    }
    
    function collides(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function killMario() {
      lives--;
      if (lives <= 0) {
        state = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('dkong_highscore', highScore);
        }
      } else {
        initLevel();
        state = STATE_READY;
        setTimeout(() => { state = STATE_PLAYING; }, 2000);
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        ctx.fillStyle = '#FF6600';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('DONKEY KONG', W / 2, 180);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 300);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Arrow Keys to move, SPACE to jump', W / 2, 380);
        ctx.fillText('Climb ladders to reach Pauline!', W / 2, 410);
        ctx.fillText('P to pause', W / 2, 440);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 500);
        return;
      }
      
      drawPlatforms();
      drawLadders();
      drawHammers();
      drawDK();
      drawPauline();
      drawBarrels();
      drawMario();
      drawHUD();
      
      if (state === STATE_READY) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('READY!', W / 2, H / 2);
      }
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '20px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '28px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        
        if (score >= highScore && score > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 24px Arial';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
        }
        
        ctx.fillStyle = '#FFF';
        ctx.font = '20px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 120);
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL CLEAR!', W / 2, H / 2);
      }
    }
    
    function drawPlatforms() {
      ctx.fillStyle = '#4444FF';
      for (const p of platforms) {
        ctx.fillRect(p.x, p.y, p.width, p.height);
        // Girder pattern
        ctx.fillStyle = '#6666FF';
        for (let i = 0; i < p.width; i += TILE) {
          ctx.fillRect(p.x + i, p.y, TILE - 2, p.height);
        }
        ctx.fillStyle = '#4444FF';
      }
    }
    
    function drawLadders() {
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 2;
      for (const l of ladders) {
        // Rails
        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.height);
        ctx.moveTo(l.x + l.width, l.y);
        ctx.lineTo(l.x + l.width, l.y + l.height);
        ctx.stroke();
        // Rungs
        for (let y = l.y; y < l.y + l.height; y += 8) {
          ctx.beginPath();
          ctx.moveTo(l.x, y);
          ctx.lineTo(l.x + l.width, y);
          ctx.stroke();
        }
      }
    }
    
    function drawHammers() {
      for (const h of hammers) {
        if (h.active) {
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(h.x + 8, h.y + 6, 4, 12);
          ctx.fillStyle = '#888';
          ctx.fillRect(h.x, h.y, 20, 8);
        }
      }
    }
    
    function drawDK() {
      ctx.fillStyle = '#8B4513';
      // Body
      ctx.beginPath();
      ctx.ellipse(dk.x + dk.width / 2, dk.y + dk.height / 2, dk.width / 2, dk.height / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Face
      ctx.fillStyle = '#DEB887';
      ctx.beginPath();
      ctx.ellipse(dk.x + dk.width / 2, dk.y + 20, 15, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(dk.x + 18, dk.y + 15, 6, 6);
      ctx.fillRect(dk.x + 30, dk.y + 15, 6, 6);
      
      // Throwing arm
      if (dk.throwing) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(dk.x + dk.width, dk.y + 30, 20, 6);
      }
    }
    
    function drawPauline() {
      ctx.fillStyle = '#FF88FF';
      // Head
      ctx.beginPath();
      ctx.arc(pauline.x + 10, pauline.y + 8, 8, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillRect(pauline.x + 2, pauline.y + 14, 16, 16);
      // Help text
      ctx.fillStyle = '#FFF';
      ctx.font = '10px Arial';
      ctx.fillText('HELP!', pauline.x - 5, pauline.y - 5);
    }
    
    function drawMario() {
      ctx.save();
      ctx.translate(mario.x + mario.width / 2, mario.y + mario.height / 2);
      ctx.scale(mario.facing, 1);
      
      // Body
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(-5, -8, 10, 12);
      // Head
      ctx.beginPath();
      ctx.arc(0, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      // Overalls
      ctx.fillStyle = '#0000FF';
      ctx.fillRect(-5, -4, 10, 8);
      
      // Hammer
      if (mario.hasHammer) {
        ctx.fillStyle = '#8B4513';
        const swing = Math.sin(Date.now() / 100) * 0.5;
        ctx.rotate(swing);
        ctx.fillRect(5, -15, 4, 14);
        ctx.fillStyle = '#888';
        ctx.fillRect(-2, -15, 18, 8);
      }
      
      ctx.restore();
    }
    
    function drawBarrels() {
      for (const b of barrels) {
        ctx.fillStyle = '#FF6600';
        ctx.beginPath();
        ctx.ellipse(b.x + b.width / 2, b.y + b.height / 2, b.width / 2, b.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Bands
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 4);
        ctx.lineTo(b.x + b.width, b.y + 4);
        ctx.moveTo(b.x, b.y + b.height - 4);
        ctx.lineTo(b.x + b.width, b.y + b.height - 4);
        ctx.stroke();
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + score, 10, 25);
      
      ctx.textAlign = 'center';
      ctx.fillText('HI: ' + highScore, W / 2, 25);
      
      ctx.textAlign = 'right';
      ctx.fillText('L: ' + level, W - 10, 25);
      
      // Lives
      ctx.fillStyle = '#FF0000';
      for (let i = 0; i < lives; i++) {
        ctx.fillRect(15 + i * 16, H - 18, 10, 14);
      }
      
      // Hammer timer
      if (mario.hasHammer) {
        ctx.fillStyle = '#FFAA00';
        ctx.fillRect(W - 50, 10, 35, 6);
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(W - 50, 10, (mario.hammerTime / 5000) * 35, 6);
      }
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_READY;
        setTimeout(() => { state = STATE_PLAYING; }, 2000);
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE && state !== STATE_GAMEOVER) {
        state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_READY;
        setTimeout(() => { state = STATE_PLAYING; }, 2000);
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    Object.defineProperty(keys, 'left', { get() { return this['ArrowLeft'] || this['a'] || this['A']; } });
    Object.defineProperty(keys, 'right', { get() { return this['ArrowRight'] || this['d'] || this['D']; } });
    Object.defineProperty(keys, 'up', { get() { return this['ArrowUp'] || this['w'] || this['W']; } });
    Object.defineProperty(keys, 'down', { get() { return this['ArrowDown'] || this['s'] || this['S']; } });
    Object.defineProperty(keys, 'jump', { get() { return this['Space']; } });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
