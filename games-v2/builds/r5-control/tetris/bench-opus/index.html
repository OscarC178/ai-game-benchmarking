<!--
  GAME:      Tetris
  RUN:       r5-control
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="480" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const CW=480,CH=600;
const COLS=10,ROWS=20,CS=28;
const BX=(CW-COLS*CS)/2,BY=20;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d,v){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}

const PIECES=[
  {shape:[[1,1,1,1]],color:'#0ff'},           // I
  {shape:[[1,1],[1,1]],color:'#ff0'},           // O
  {shape:[[0,1,0],[1,1,1]],color:'#a0f'},       // T
  {shape:[[1,0],[1,0],[1,1]],color:'#f80'},      // L
  {shape:[[0,1],[0,1],[1,1]],color:'#00f'},      // J
  {shape:[[0,1,1],[1,1,0]],color:'#0f0'},        // S
  {shape:[[1,1,0],[0,1,1]],color:'#f00'}         // Z
];

function rotate(shape){
  const rows=shape.length,cols=shape[0].length;
  const out=[];
  for(let c=0;c<cols;c++){out[c]=[];for(let r=rows-1;r>=0;r--)out[c].push(shape[r][c]);}
  return out;
}

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3;
let state=ST_TITLE;

let board,current,nextPiece,pos,dropTimer,dropInterval,score,hiScore,lines,level;
let lockTimer,das,dasDir,softDrop;

hiScore=0;
try{const v=localStorage.getItem('te5_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('te5_best',String(hiScore));}catch(e){}}}

function newBoard(){
  board=[];
  for(let r=0;r<ROWS;r++){board[r]=[];for(let c=0;c<COLS;c++)board[r][c]=null;}
}

function randomPiece(){return PIECES[Math.floor(Math.random()*PIECES.length)];}

function spawn(piece){
  current={shape:piece.shape,color:piece.color};
  pos={x:Math.floor((COLS-piece.shape[0].length)/2),y:0};
  lockTimer=0;
  if(!fits(current.shape,pos.x,pos.y)){state=ST_OVER;saveHi();}
}

function fits(shape,px,py){
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[r].length;c++){
      if(!shape[r][c])continue;
      const bx=px+c,by=py+r;
      if(bx<0||bx>=COLS||by>=ROWS)return false;
      if(by>=0&&board[by][bx])return false;
    }
  }
  return true;
}

function lock(){
  for(let r=0;r<current.shape.length;r++){
    for(let c=0;c<current.shape[r].length;c++){
      if(!current.shape[r][c])continue;
      const by=pos.y+r,bx=pos.x+c;
      if(by>=0&&by<ROWS)board[by][bx]=current.color;
    }
  }
  clearLines();
  spawn(nextPiece);
  nextPiece=randomPiece();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c!==null)){
      board.splice(r,1);
      board.unshift(new Array(COLS).fill(null));
      cleared++;r++;
    }
  }
  if(cleared>0){
    const pts=[0,100,300,500,800];
    score+=pts[cleared]*(level+1);saveHi();
    lines+=cleared;level=Math.floor(lines/10);
    dropInterval=Math.max(0.05,0.8-level*0.07);
    beep(cleared===4?1000:600,0.08,0.05);
  }
}

function tryMove(dx,dy){
  if(fits(current.shape,pos.x+dx,pos.y+dy)){pos.x+=dx;pos.y+=dy;return true;}
  return false;
}

function tryRotate(){
  const rotated=rotate(current.shape);
  // Wall kicks: try 0, -1, +1, -2, +2
  for(const kick of [0,-1,1,-2,2]){
    if(fits(rotated,pos.x+kick,pos.y)){current.shape=rotated;pos.x+=kick;return true;}
  }
  return false;
}

function hardDrop(){
  while(fits(current.shape,pos.x,pos.y+1))pos.y++;
  lock();
}

function ghostY(){
  let gy=pos.y;
  while(fits(current.shape,pos.x,gy+1))gy++;
  return gy;
}

function startGame(){
  newBoard();score=0;lines=0;level=0;
  dropTimer=0;dropInterval=0.8;das=0;dasDir=0;softDrop=false;
  nextPiece=randomPiece();
  spawn(randomPiece());
  nextPiece=randomPiece();
  state=ST_PLAY;
}

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(state===ST_TITLE&&(e.code==='Space'||e.code==='Enter'))startGame();
  if((state===ST_OVER)&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyR'))state=ST_TITLE;
  if(state===ST_PLAY){
    if(e.code==='KeyP'||e.code==='Escape')state=ST_PAUSE;
    if(e.code==='KeyR')startGame();
    if(e.code==='ArrowLeft'||e.code==='KeyA'){tryMove(-1,0);das=0;dasDir=-1;}
    if(e.code==='ArrowRight'||e.code==='KeyD'){tryMove(1,0);das=0;dasDir=1;}
    if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='KeyX')tryRotate();
    if(e.code==='Space')hardDrop();
    if(e.code==='ArrowDown'||e.code==='KeyS')softDrop=true;
  }
  if(state===ST_PAUSE){
    if(e.code==='KeyP'||e.code==='Escape')state=ST_PLAY;
    if(e.code==='KeyR')startGame();
  }
});
addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='ArrowDown'||e.code==='KeyS')softDrop=false;
  if((e.code==='ArrowLeft'||e.code==='KeyA')&&dasDir===-1)dasDir=0;
  if((e.code==='ArrowRight'||e.code==='KeyD')&&dasDir===1)dasDir=0;
});

function update(dt){
  if(state!==ST_PLAY)return;

  // DAS (Delayed Auto Shift)
  if(dasDir!==0){
    das+=dt;
    if(das>0.15){das-=0.05;tryMove(dasDir,0);}
  }

  // Gravity
  const interval=softDrop?Math.min(dropInterval,0.05):dropInterval;
  dropTimer+=dt;
  if(dropTimer>=interval){
    dropTimer=0;
    if(!tryMove(0,1)){
      lockTimer+=interval;
      if(lockTimer>0.5)lock();
    }else{
      lockTimer=0;
      if(softDrop){score+=1;saveHi();}
    }
  }
}

function drawBlock(x,y,color,ghost){
  const px=BX+x*CS,py=BY+y*CS;
  if(ghost){
    cx.strokeStyle=color;cx.globalAlpha=0.3;cx.strokeRect(px+1,py+1,CS-2,CS-2);cx.globalAlpha=1;
  }else{
    cx.fillStyle=color;cx.fillRect(px+1,py+1,CS-2,CS-2);
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(px+1,py+1,CS-2,4);
    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(px+1,py+CS-5,CS-2,4);
  }
}

function drawShape(shape,px,py,color,ghost){
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[r].length;c++){
      if(shape[r][c])drawBlock(px+c,py+r,color,ghost);
    }
  }
}

function drawSmallShape(shape,sx,sy,color){
  const s=14;
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[r].length;c++){
      if(!shape[r][c])continue;
      cx.fillStyle=color;cx.fillRect(sx+c*s,sy+r*s,s-1,s-1);
    }
  }
}

function render(now){
  cx.fillStyle='#111';cx.fillRect(0,0,CW,CH);

  if(state===ST_TITLE){
    cx.fillStyle='#0ff';cx.font='bold 52px monospace';cx.textAlign='center';
    cx.fillText('TETRIS',CW/2,200);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    cx.fillText('← → Move   ↑ Rotate   ↓ Soft Drop',CW/2,280);
    cx.fillText('Space Hard Drop   P Pause   R Restart',CW/2,310);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to Start',CW/2,400);
    if(hiScore>0){cx.fillStyle='#555';cx.font='14px monospace';cx.fillText('Best: '+hiScore,CW/2,450);}
    return;
  }

  // Board outline
  cx.strokeStyle='#444';cx.lineWidth=2;
  cx.strokeRect(BX-1,BY-1,COLS*CS+2,ROWS*CS+2);

  // Grid
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){cx.beginPath();cx.moveTo(BX+x*CS,BY);cx.lineTo(BX+x*CS,BY+ROWS*CS);cx.stroke();}
  for(let y=0;y<=ROWS;y++){cx.beginPath();cx.moveTo(BX,BY+y*CS);cx.lineTo(BX+COLS*CS,BY+y*CS);cx.stroke();}

  // Board
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[r][c])drawBlock(c,r,board[r][c],false);
    }
  }

  // Ghost piece
  if(current){
    const gy=ghostY();
    drawShape(current.shape,pos.x,gy,current.color,true);
    // Current piece
    drawShape(current.shape,pos.x,pos.y,current.color,false);
  }

  // Side panel
  const sx=BX+COLS*CS+20;
  cx.fillStyle='#fff';cx.font='14px monospace';cx.textAlign='left';
  cx.fillText('SCORE',sx,60);
  cx.font='20px monospace';cx.fillText(String(score),sx,82);
  cx.font='14px monospace';cx.fillText('LINES',sx,120);
  cx.font='20px monospace';cx.fillText(String(lines),sx,142);
  cx.font='14px monospace';cx.fillText('LEVEL',sx,180);
  cx.font='20px monospace';cx.fillText(String(level),sx,202);
  cx.font='14px monospace';cx.fillText('BEST',sx,240);
  cx.font='20px monospace';cx.fillText(String(hiScore),sx,262);

  cx.font='14px monospace';cx.fillText('NEXT',sx,310);
  if(nextPiece)drawSmallShape(nextPiece.shape,sx,320,nextPiece.color);

  // Lives area — left panel
  const lx=10;
  cx.fillStyle='#fff';cx.font='14px monospace';cx.textAlign='left';

  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,CW,CH);
    cx.fillStyle='#fff';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',CW/2,CH/2-10);
    cx.font='16px monospace';cx.fillText('P to resume   R to restart',CW/2,CH/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,CW,CH);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',CW/2,CH/2-30);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score+'  Lines: '+lines,CW/2,CH/2+10);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='14px monospace';cx.fillText('NEW HIGH SCORE!',CW/2,CH/2+35);}
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',CW/2,CH/2+65);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.1)dt=0.1;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
