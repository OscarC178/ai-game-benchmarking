<!--
  GAME:      Tetris
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="tetrisCanvas" width="500" height="650"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');

    const COLS = 10;
    const ROWS = 20;
    const CELL_SIZE = 30;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    let gameState = STATES.TITLE;
    let score = 0;
    let lines = 0;
    let level = 1;
    let highScore = parseInt(localStorage.getItem('tetrisHighScore') || '0', 10);

    // Grid
    const grid = [];
    for (let y = 0; y < ROWS; y++) {
      grid[y] = new Array(COLS).fill(0);
    }

    // Tetromino definitions
    const pieces = {
      I: { shape: [[1,1,1,1]], color: '#00FFFF' },
      O: { shape: [[1,1],[1,1]], color: '#FFFF00' },
      T: { shape: [[0,1,0],[1,1,1]], color: '#FF00FF' },
      S: { shape: [[0,1,1],[1,1,0]], color: '#00FF00' },
      Z: { shape: [[1,1,0],[0,1,1]], color: '#FF0000' },
      J: { shape: [[1,0,0],[1,1,1]], color: '#0000FF' },
      L: { shape: [[0,0,1],[1,1,1]], color: '#FF8800' }
    };

    const pieceTypes = Object.keys(pieces);

    let currentPiece = null;
    let nextPiece = null;
    let dropTimer = 0;
    let dropInterval = 60;

    function newPiece() {
      const type = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
      const template = pieces[type];
      return {
        shape: template.shape.map(row => [...row]),
        color: template.color,
        x: Math.floor((COLS - template.shape[0].length) / 2),
        y: 0
      };
    }

    currentPiece = newPiece();
    nextPiece = newPiece();

    function canMove(piece, dx, dy) {
      for (let y = 0; y < piece.shape.length; y++) {
        for (let x = 0; x < piece.shape[y].length; x++) {
          if (piece.shape[y][x]) {
            const newX = piece.x + x + dx;
            const newY = piece.y + y + dy;

            if (newX < 0 || newX >= COLS || newY >= ROWS) {
              return false;
            }

            if (newY >= 0 && grid[newY][newX]) {
              return false;
            }
          }
        }
      }
      return true;
    }

    function rotate(piece) {
      const rotated = [];
      const n = piece.shape.length;
      const m = piece.shape[0].length;

      for (let x = 0; x < m; x++) {
        rotated[x] = [];
        for (let y = n - 1; y >= 0; y--) {
          rotated[x].push(piece.shape[y][x]);
        }
      }

      const oldShape = piece.shape;
      piece.shape = rotated;

      if (!canMove(piece, 0, 0)) {
        piece.shape = oldShape;
      }
    }

    function lockPiece() {
      for (let y = 0; y < currentPiece.shape.length; y++) {
        for (let x = 0; x < currentPiece.shape[y].length; x++) {
          if (currentPiece.shape[y][x]) {
            const gridY = currentPiece.y + y;
            const gridX = currentPiece.x + x;

            if (gridY >= 0) {
              grid[gridY][gridX] = currentPiece.color;
            }
          }
        }
      }

      clearLines();
      currentPiece = nextPiece;
      nextPiece = newPiece();

      if (!canMove(currentPiece, 0, 0)) {
        gameState = STATES.GAME_OVER;
      }
    }

    function clearLines() {
      let clearedLines = 0;

      for (let y = ROWS - 1; y >= 0; y--) {
        let full = true;
        for (let x = 0; x < COLS; x++) {
          if (!grid[y][x]) {
            full = false;
            break;
          }
        }

        if (full) {
          grid.splice(y, 1);
          grid.unshift(new Array(COLS).fill(0));
          clearedLines++;
          y++;
        }
      }

      if (clearedLines > 0) {
        lines += clearedLines;
        level = Math.floor(lines / 10) + 1;
        const points = [0, 100, 300, 500, 800];
        score += points[clearedLines] * level;

        if (score > highScore) {
          highScore = score;
          localStorage.setItem('tetrisHighScore', highScore);
        }

        dropInterval = Math.max(10, 60 - level * 3);
      }
    }

    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (gameState === STATES.TITLE && key === ' ') {
        e.preventDefault();
        score = 0;
        lines = 0;
        level = 1;
        dropInterval = 60;
        for (let y = 0; y < ROWS; y++) {
          grid[y] = new Array(COLS).fill(0);
        }
        currentPiece = newPiece();
        nextPiece = newPiece();
        gameState = STATES.PLAYING;
      }

      if (gameState === STATES.PLAYING) {
        if (key === 'arrowleft' || key === 'a') {
          e.preventDefault();
          if (canMove(currentPiece, -1, 0)) currentPiece.x--;
        }
        if (key === 'arrowright' || key === 'd') {
          e.preventDefault();
          if (canMove(currentPiece, 1, 0)) currentPiece.x++;
        }
        if (key === 'arrowdown' || key === 's') {
          e.preventDefault();
          if (canMove(currentPiece, 0, 1)) currentPiece.y++;
        }
        if (key === ' ') {
          e.preventDefault();
          rotate(currentPiece);
        }
      }

      if (key === 'p') {
        if (gameState === STATES.PLAYING) gameState = STATES.PAUSED;
        else if (gameState === STATES.PAUSED) gameState = STATES.PLAYING;
      }

      if (key === 'r') {
        if (gameState === STATES.GAME_OVER) {
          score = 0;
          lines = 0;
          level = 1;
          dropInterval = 60;
          for (let y = 0; y < ROWS; y++) {
            grid[y] = new Array(COLS).fill(0);
          }
          currentPiece = newPiece();
          nextPiece = newPiece();
          gameState = STATES.TITLE;
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function update() {
      if (gameState !== STATES.PLAYING) return;

      dropTimer++;
      if (dropTimer > dropInterval) {
        dropTimer = 0;

        if (canMove(currentPiece, 0, 1)) {
          currentPiece.y++;
        } else {
          lockPiece();
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 500, 650);

      // Draw grid background
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL_SIZE, 0);
        ctx.lineTo(x * CELL_SIZE, ROWS * CELL_SIZE);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL_SIZE);
        ctx.lineTo(COLS * CELL_SIZE, y * CELL_SIZE);
        ctx.stroke();
      }

      // Draw locked pieces
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (grid[y][x]) {
            ctx.fillStyle = grid[y][x];
            ctx.fillRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
          }
        }
      }

      // Draw current piece
      if (currentPiece) {
        ctx.fillStyle = currentPiece.color;
        for (let y = 0; y < currentPiece.shape.length; y++) {
          for (let x = 0; x < currentPiece.shape[y].length; x++) {
            if (currentPiece.shape[y][x]) {
              const px = (currentPiece.x + x) * CELL_SIZE;
              const py = (currentPiece.y + y) * CELL_SIZE;
              ctx.fillRect(px + 1, py + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            }
          }
        }
      }

      // Draw UI
      const uiX = COLS * CELL_SIZE + 10;
      ctx.fillStyle = '#0F0';
      ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, uiX, 50);
      ctx.fillText('Level: ' + level, uiX, 80);
      ctx.fillText('Lines: ' + lines, uiX, 110);
      ctx.fillText('High: ' + highScore, uiX, 140);

      ctx.fillText('Next:', uiX, 200);
      if (nextPiece) {
        ctx.fillStyle = nextPiece.color;
        for (let y = 0; y < nextPiece.shape.length; y++) {
          for (let x = 0; x < nextPiece.shape[y].length; x++) {
            if (nextPiece.shape[y][x]) {
              ctx.fillRect(uiX + x * 20, 220 + y * 20, 18, 18);
            }
          }
        }
      }

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, 500, 650);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('TETRIS', 150, 200);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press SPACE to start', 150, 320);
        ctx.fillText('← → to move, ↓ to drop', 150, 360);
        ctx.fillText('SPACE to rotate', 150, 390);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, 500, 650);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', 150, 300);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, 500, 650);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', 150, 200);

        ctx.fillStyle = '#FFF';
        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, 150, 280);
        ctx.fillText('Level: ' + level, 150, 320);
        ctx.fillText('Press R to return', 150, 380);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
