  GAME:      Space Invaders
  RUN:       r5-control

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            image-rendering: crisp-edges;
        }
        #ui {
            width: 600px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div>LIVES: <span id="livesVal">3</span></div>
        <div>WAVE: <span id="waveVal">1</span></div>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div style="margin-top: 15px; color: #888;">
        LEFT/RIGHT arrows to move. SPACE to fire.<br>
        Press ENTER to Start/Pause.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const livesEl = document.getElementById('livesVal');
        const waveEl = document.getElementById('waveVal');

        // Config
        const PLAYER_W = 40;
        const PLAYER_H = 20;
        const PLAYER_SPEED = 5;
        const BULLET_W = 4;
        const BULLET_H = 15;
        const ALIEN_ROWS = 5;
        const ALIEN_COLS = 11;
        const ALIEN_W = 30;
        const ALIEN_H = 20;
        const ALIEN_PAD = 10;

        // State
        let state = 'START'; // START, PLAY, PAUSE, OVER, CLEAR
        let score = 0;
        let lives = 3;
        let wave = 1;

        let player = {
            x: canvas.width / 2 - PLAYER_W / 2,
            y: canvas.height - 40,
            color: '#0F0'
        };

        let pBullet = null; // Only one player bullet at a time
        let eBullets = [];
        let aliens = [];
        let alienDir = 1; // 1 = right, -1 = left
        let alienSpeed = 1;
        let alienStepDown = false;
        let alienFrame = 0;
        let lastAlienMove = 0;

        // Input
        const keys = { ArrowLeft: false, ArrowRight: false, Space: false };
        let spacePressed = false;

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.key === 'ArrowRight') keys.ArrowRight = true;
            
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                keys.Space = true;
                if (!spacePressed && state === 'PLAY' && !pBullet) {
                    pBullet = { x: player.x + PLAYER_W/2 - BULLET_W/2, y: player.y };
                    spacePressed = true;
                }
            }

            if (e.key === 'Enter') {
                if (state === 'START' || state === 'OVER') {
                    resetGame();
                    state = 'PLAY';
                } else if (state === 'PLAY') {
                    state = 'PAUSE';
                } else if (state === 'PAUSE') {
                    state = 'PLAY';
                } else if (state === 'CLEAR') {
                    wave++;
                    waveEl.innerText = wave;
                    initAliens();
                    state = 'PLAY';
                }
            }
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.key === 'ArrowRight') keys.ArrowRight = false;
            if (e.key === ' ' || e.code === 'Space') { keys.Space = false; spacePressed = false; }
        });

        function getAlienColor(r) {
            if (r === 0) return '#F00';
            if (r === 1 || r === 2) return '#0FF';
            return '#F0F';
        }

        function getAlienPts(r) {
            if (r === 0) return 30;
            if (r === 1 || r === 2) return 20;
            return 10;
        }

        function initAliens() {
            aliens = [];
            alienDir = 1;
            alienSpeed = 1000 - Math.min((wave-1) * 100, 800); // ms per step
            
            let startX = 50;
            let startY = 80;
            
            for (let r = 0; r < ALIEN_ROWS; r++) {
                for (let c = 0; c < ALIEN_COLS; c++) {
                    aliens.push({
                        x: startX + c * (ALIEN_W + ALIEN_PAD),
                        y: startY + r * (ALIEN_H + ALIEN_PAD),
                        r: r, c: c,
                        alive: true,
                        color: getAlienColor(r),
                        pts: getAlienPts(r)
                    });
                }
            }
            pBullet = null;
            eBullets = [];
        }

        function resetGame() {
            score = 0;
            lives = 3;
            wave = 1;
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            waveEl.innerText = wave;
            
            player.x = canvas.width / 2 - PLAYER_W / 2;
            initAliens();
        }

        function update(dt) {
            if (state !== 'PLAY') return;

            // Player Move
            if (keys.ArrowLeft && player.x > 0) player.x -= PLAYER_SPEED;
            if (keys.ArrowRight && player.x < canvas.width - PLAYER_W) player.x += PLAYER_SPEED;

            // Player Bullet
            if (pBullet) {
                pBullet.y -= 10;
                if (pBullet.y < 0) pBullet = null;
            }

            // Enemy Bullets
            for (let i = eBullets.length - 1; i >= 0; i--) {
                let eb = eBullets[i];
                eb.y += 5;
                if (eb.y > canvas.height) {
                    eBullets.splice(i, 1);
                    continue;
                }
                
                // Hit Player?
                if (eb.y + BULLET_H > player.y && eb.y < player.y + PLAYER_H &&
                    eb.x + BULLET_W > player.x && eb.x < player.x + PLAYER_W) {
                    eBullets.splice(i, 1);
                    lives--;
                    livesEl.innerText = lives;
                    if (lives <= 0) {
                        state = 'OVER';
                    }
                }
            }

            // Alien Logic
            let now = performance.now();
            let aliveCount = aliens.filter(a => a.alive).length;
            
            if (aliveCount === 0) {
                state = 'CLEAR';
                return;
            }

            // Speed up as they die
            let currentSpeed = alienSpeed * (aliveCount / (ALIEN_ROWS * ALIEN_COLS));
            currentSpeed = Math.max(currentSpeed, 50); // min speed

            if (now - lastAlienMove > currentSpeed) {
                lastAlienMove = now;
                alienFrame = 1 - alienFrame;
                
                let lowestY = 0;
                
                if (alienStepDown) {
                    aliens.forEach(a => { if(a.alive) a.y += ALIEN_H; });
                    alienStepDown = false;
                    alienDir *= -1;
                } else {
                    let hitEdge = false;
                    aliens.forEach(a => {
                        if (a.alive) {
                            a.x += alienDir * ALIEN_W/2;
                            if (a.y > lowestY) lowestY = a.y;
                            if ((alienDir === 1 && a.x + ALIEN_W >= canvas.width - 20) ||
                                (alienDir === -1 && a.x <= 20)) {
                                hitEdge = true;
                            }
                        }
                    });
                    
                    if (hitEdge) alienStepDown = true;
                }
                
                // Alien hit ground?
                if (lowestY + ALIEN_H > player.y) {
                    state = 'OVER';
                }
                
                // Enemy Shoot
                if (Math.random() < 0.3 + (wave * 0.05)) {
                    let aliveBottomCols = [];
                    for(let c=0; c<ALIEN_COLS; c++) {
                        let bottom = null;
                        for(let r=ALIEN_ROWS-1; r>=0; r--) {
                            let idx = r * ALIEN_COLS + c;
                            if (aliens[idx].alive) {
                                bottom = aliens[idx];
                                break;
                            }
                        }
                        if (bottom) aliveBottomCols.push(bottom);
                    }
                    
                    if (aliveBottomCols.length > 0 && eBullets.length < 3 + wave) {
                        let shooter = aliveBottomCols[Math.floor(Math.random() * aliveBottomCols.length)];
                        eBullets.push({ x: shooter.x + ALIEN_W/2 - BULLET_W/2, y: shooter.y + ALIEN_H });
                    }
                }
            }

            // Collisions (Player Bullet vs Aliens)
            if (pBullet) {
                for (let a of aliens) {
                    if (a.alive && 
                        pBullet.x < a.x + ALIEN_W && pBullet.x + BULLET_W > a.x &&
                        pBullet.y < a.y + ALIEN_H && pBullet.y + BULLET_H > a.y) {
                        
                        a.alive = false;
                        pBullet = null;
                        score += a.pts;
                        scoreEl.innerText = score;
                        break; // Only hit one
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Player
            if (state !== 'OVER') {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y + 10, PLAYER_W, 10);
                ctx.fillRect(player.x + 10, player.y + 5, 20, 5);
                ctx.fillRect(player.x + 18, player.y, 4, 5);
            }

            // Aliens
            for (let a of aliens) {
                if (a.alive) {
                    ctx.fillStyle = a.color;
                    // Simple pixel art simulation
                    if (alienFrame === 0) {
                        ctx.fillRect(a.x + 5, a.y + 5, ALIEN_W - 10, ALIEN_H - 10);
                        ctx.fillRect(a.x, a.y + 10, ALIEN_W, 5);
                    } else {
                        ctx.fillRect(a.x + 5, a.y + 5, ALIEN_W - 10, ALIEN_H - 10);
                        ctx.fillRect(a.x + 10, a.y, ALIEN_W - 20, 5);
                    }
                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.fillRect(a.x + 8, a.y + 8, 4, 4);
                    ctx.fillRect(a.x + ALIEN_W - 12, a.y + 8, 4, 4);
                }
            }

            // Bullets
            if (pBullet) {
                ctx.fillStyle = '#FF0';
                ctx.fillRect(pBullet.x, pBullet.y, BULLET_W, BULLET_H);
            }
            
            ctx.fillStyle = '#FFF';
            for (let eb of eBullets) {
                ctx.fillRect(eb.x, eb.y, BULLET_W, BULLET_H);
            }

            // Overlays
            if (state === 'START') {
                drawOverlay('SPACE INVADERS', 'Press ENTER to Start');
            } else if (state === 'PAUSE') {
                drawOverlay('PAUSED', 'Press ENTER to Resume');
            } else if (state === 'CLEAR') {
                drawOverlay('WAVE CLEAR!', 'Press ENTER for Next Wave');
            } else if (state === 'OVER') {
                drawOverlay('GAME OVER', 'Press ENTER to Restart');
            }
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0FF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 40px monospace';
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = '#AAA';
            ctx.font = '20px monospace';
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
        }

        let lastTime = 0;
        function loop(timestamp) {
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        initAliens();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
