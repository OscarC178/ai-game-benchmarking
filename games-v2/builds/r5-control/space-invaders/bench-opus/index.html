<!--
  GAME:      Space Invaders
  RUN:       r5-control
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Invaders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="640" height="520"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=640,H=520;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndFire(){beep(880,0.05,0.04,'sine');}
function sndHit(){beep(200,0.08,0.05,'sawtooth');}
function sndDie(){beep(150,0.25,0.05,'sawtooth');}
function sndUfo(){beep(600,0.06,0.03,'sine');setTimeout(()=>beep(500,0.06,0.03,'sine'),70);}

const ICOLS=11,IROWS=5;
const IW=32,IH=24,IPAD_X=10,IPAD_Y=8;
const COLORS=['#0f0','#0f0','#0ff','#0ff','#ff0'];
const PTS=[30,30,20,20,10];
const SHIELD_W=44,SHIELD_H=32,SHIELD_COUNT=4;

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_WIN=4;
let state=ST_TITLE;

let player,bullet,invaders,invBullets,shields,ufo;
let score,hiScore,lives,level,moveTimer,moveInterval,moveDir,dropNext;
let invFrame,globalTime;

hiScore=0;
try{const v=localStorage.getItem('si5_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('si5_best',String(hiScore));}catch(e){}}}

function makeInvaders(){
  invaders=[];
  for(let r=0;r<IROWS;r++){
    for(let c=0;c<ICOLS;c++){
      invaders.push({
        x:80+c*(IW+IPAD_X),y:60+r*(IH+IPAD_Y),
        w:IW,h:IH,row:r,col:c,alive:true,
        color:COLORS[r],pts:PTS[r]
      });
    }
  }
}

function makeShields(){
  shields=[];
  const gap=(W-SHIELD_COUNT*SHIELD_W)/(SHIELD_COUNT+1);
  for(let i=0;i<SHIELD_COUNT;i++){
    const sx=gap+i*(SHIELD_W+gap);
    // Each shield is a grid of small blocks
    const blocks=[];
    for(let r=0;r<SHIELD_H;r+=4){
      for(let c=0;c<SHIELD_W;c+=4){
        // Arch shape — remove center bottom
        const cx2=c-SHIELD_W/2,cy2=r-SHIELD_H/2;
        if(r>SHIELD_H*0.6&&Math.abs(cx2)<SHIELD_W*0.25)continue;
        blocks.push({x:sx+c,y:H-120+r,w:4,h:4,alive:true});
      }
    }
    shields.push(...blocks);
  }
}

function resetGame(){
  player={x:W/2-16,y:H-40,w:32,h:16};
  bullet=null;invBullets=[];
  ufo={active:false,x:0,y:24,dir:1,timer:12+Math.random()*8};
  makeInvaders();makeShields();
  moveTimer=0;moveInterval=0.6;moveDir=1;dropNext=false;invFrame=0;
}

function startGame(){
  score=0;lives=3;level=1;
  resetGame();state=ST_PLAY;globalTime=0;
}

function nextLevel(){
  level++;
  bullet=null;invBullets=[];
  ufo={active:false,x:0,y:24,dir:1,timer:8+Math.random()*6};
  makeInvaders();
  moveTimer=0;moveInterval=Math.max(0.1,0.6-level*0.05);moveDir=1;dropNext=false;
  state=ST_PLAY;
}

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(state===ST_TITLE&&(e.code==='Space'||e.code==='Enter'))startGame();
  if((state===ST_OVER||state===ST_WIN)&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyR'))state=ST_TITLE;
  if(state===ST_PLAY&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PAUSE;
  else if(state===ST_PAUSE&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PLAY;
  if(e.code==='KeyR'&&state!==ST_TITLE)startGame();
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function aliveInvaders(){return invaders.filter(i=>i.alive);}

function update(dt){
  if(state!==ST_PLAY)return;
  globalTime+=dt;

  // Player movement
  if(keys['ArrowLeft']||keys['KeyA'])player.x-=250*dt;
  if(keys['ArrowRight']||keys['KeyD'])player.x+=250*dt;
  player.x=Math.max(0,Math.min(W-player.w,player.x));

  // Fire
  if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&!bullet){
    bullet={x:player.x+player.w/2-1.5,y:player.y-4,w:3,h:10};
    sndFire();
  }

  // Player bullet
  if(bullet){
    bullet.y-=400*dt;
    if(bullet.y<-10){bullet=null;}
    else{
      // Hit invader
      for(const inv of invaders){
        if(!inv.alive)continue;
        if(bullet.x+bullet.w>inv.x&&bullet.x<inv.x+inv.w&&bullet.y<inv.y+inv.h&&bullet.y+bullet.h>inv.y){
          inv.alive=false;score+=inv.pts;saveHi();bullet=null;sndHit();break;
        }
      }
      // Hit shield
      if(bullet){
        for(const s of shields){
          if(!s.alive)continue;
          if(bullet.x+bullet.w>s.x&&bullet.x<s.x+s.w&&bullet.y<s.y+s.h&&bullet.y+bullet.h>s.y){
            s.alive=false;bullet=null;break;
          }
        }
      }
      // Hit UFO
      if(bullet&&ufo.active){
        if(bullet.x+bullet.w>ufo.x&&bullet.x<ufo.x+40&&bullet.y<ufo.y+16&&bullet.y+bullet.h>ufo.y){
          score+=100+Math.floor(Math.random()*3)*50;saveHi();
          ufo.active=false;ufo.timer=10+Math.random()*10;
          bullet=null;sndUfo();
        }
      }
    }
  }

  // Invader movement
  const alive=aliveInvaders();
  if(alive.length===0){nextLevel();return;}

  moveTimer+=dt;
  const spd=Math.max(0.05,moveInterval-alive.length*0.002);
  if(moveTimer>=spd){
    moveTimer=0;invFrame=1-invFrame;

    if(dropNext){
      for(const inv of alive)inv.y+=IH/2;
      dropNext=false;moveDir*=-1;
    }else{
      let hitEdge=false;
      for(const inv of alive){
        inv.x+=moveDir*8;
        if(inv.x<4||inv.x+inv.w>W-4)hitEdge=true;
      }
      if(hitEdge)dropNext=true;
    }

    // Invader fire
    if(Math.random()<0.3+level*0.05&&invBullets.length<3+level){
      const shooter=alive[Math.floor(Math.random()*alive.length)];
      invBullets.push({x:shooter.x+shooter.w/2-1.5,y:shooter.y+shooter.h,w:3,h:10,vy:150+level*15+Math.random()*50});
    }
  }

  // Invader bullets
  for(let i=invBullets.length-1;i>=0;i--){
    const b=invBullets[i];
    b.y+=b.vy*dt;
    if(b.y>H+10){invBullets.splice(i,1);continue;}
    // Hit player
    if(b.x+b.w>player.x&&b.x<player.x+player.w&&b.y+b.h>player.y&&b.y<player.y+player.h){
      invBullets.splice(i,1);lives--;sndDie();
      if(lives<=0){state=ST_OVER;saveHi();}
      continue;
    }
    // Hit shield
    for(const s of shields){
      if(!s.alive)continue;
      if(b.x+b.w>s.x&&b.x<s.x+s.w&&b.y+b.h>s.y&&b.y<s.y+s.h){
        s.alive=false;invBullets.splice(i,1);break;
      }
    }
  }

  // Invaders reach bottom
  for(const inv of alive){
    if(inv.y+inv.h>=player.y){state=ST_OVER;saveHi();return;}
  }

  // UFO
  if(!ufo.active){
    ufo.timer-=dt;
    if(ufo.timer<=0){
      ufo.active=true;ufo.dir=Math.random()<0.5?1:-1;
      ufo.x=ufo.dir>0?-40:W+40;
    }
  }else{
    ufo.x+=ufo.dir*100*dt;
    if(ufo.x<-50||ufo.x>W+50){ufo.active=false;ufo.timer=8+Math.random()*10;}
  }
}

function drawInvader(inv){
  const f=invFrame;
  cx.fillStyle=inv.color;
  const mx=inv.x+inv.w/2,my=inv.y+inv.h/2;
  // Body
  cx.fillRect(inv.x+4,inv.y+4,inv.w-8,inv.h-8);
  // Top bumps
  cx.fillRect(inv.x+8,inv.y,inv.w-16,6);
  // Side wings
  if(f===0){
    cx.fillRect(inv.x,inv.y+8,6,8);
    cx.fillRect(inv.x+inv.w-6,inv.y+8,6,8);
  }else{
    cx.fillRect(inv.x+2,inv.y+4,4,6);
    cx.fillRect(inv.x+inv.w-6,inv.y+4,4,6);
  }
  // Eyes
  cx.fillStyle='#000';
  cx.fillRect(inv.x+10,inv.y+8,4,4);
  cx.fillRect(inv.x+inv.w-14,inv.y+8,4,4);
}

function render(now){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#0f0';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('SPACE INVADERS',W/2,180);
    // Draw sample invaders
    const cols=['#ff0','#0ff','#0f0'];
    for(let i=0;i<3;i++){
      cx.fillStyle=cols[i];
      cx.fillRect(W/2-60+i*40,240,24,18);
      cx.fillStyle='#000';cx.fillRect(W/2-54+i*40,246,4,4);cx.fillRect(W/2-46+i*40,246,4,4);
    }
    cx.fillStyle='#aaa';cx.font='18px monospace';
    cx.fillText('← → Move   Space Fire',W/2,310);
    cx.fillText('P Pause   R Restart',W/2,340);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to Start',W/2,420);
    if(hiScore>0){cx.fillStyle='#555';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,460);}
    return;
  }

  // Shields
  cx.fillStyle='#0a0';
  for(const s of shields){if(s.alive)cx.fillRect(s.x,s.y,s.w,s.h);}

  // Invaders
  for(const inv of invaders){if(inv.alive)drawInvader(inv);}

  // UFO
  if(ufo.active){
    cx.fillStyle='#f44';
    cx.beginPath();cx.ellipse(ufo.x+20,ufo.y+8,20,8,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#faa';
    cx.beginPath();cx.ellipse(ufo.x+20,ufo.y+4,10,5,0,Math.PI,0);cx.fill();
  }

  // Player
  cx.fillStyle='#0f0';
  cx.fillRect(player.x,player.y,player.w,player.h);
  cx.fillRect(player.x+player.w/2-2,player.y-6,4,6);
  cx.fillRect(player.x+4,player.y-2,player.w-8,4);

  // Player bullet
  if(bullet){cx.fillStyle='#fff';cx.fillRect(bullet.x,bullet.y,bullet.w,bullet.h);}

  // Invader bullets
  cx.fillStyle='#f88';
  for(const b of invBullets){
    cx.fillRect(b.x,b.y,b.w,b.h);
  }

  // HUD
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('SCORE: '+score,10,18);
  cx.textAlign='center';cx.fillText('LEVEL '+level,W/2,18);
  cx.textAlign='right';cx.fillText('HI: '+hiScore,W-10,18);

  // Lives
  for(let i=0;i<lives;i++){
    cx.fillStyle='#0f0';cx.fillRect(10+i*24,H-16,16,10);cx.fillRect(16+i*24,H-20,4,4);
  }

  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillText('P to resume   R to restart',W/2,H/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-30);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='14px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',W/2,H/2+65);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
