  GAME:      Space Invaders
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Space Invaders</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:100vmin;height:75vmin;max-width:800px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#000}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;white-space:pre-wrap;text-align:center}
  #hud{position:absolute;left:12px;top:8px;color:#0f0;font-family:monospace;pointer-events:none}
  #hud .right{position:absolute;right:12px;top:8px;color:#fff}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="hud"><div id="score"></div><div id="meta" class="right"></div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const overlay=document.getElementById('overlay'), scoreEl=document.getElementById('score'), metaEl=document.getElementById('meta');
  const W=800,H=600;
  // Player
  const P_W=48,P_H=24,P_Y=554,P_SPEED=300;
  const LASER_W=3,LASER_H=15,LASER_SPEED=600;
  // Aliens
  const COLS=11,ROWS=5,SPX=55,SPY=40,START_X=80,START_Y=80;
  const TYPE={A:{w:30,h:20,pts:30,color:'#FFFFFF'},B:{w:40,h:25,pts:20,color:'#FFFF00'},C:{w:50,h:30,pts:10,color:'#FF6666'}};
  // shields
  const SH_COUNT=4, SH_W=70, SH_H=50, SH_CELL=4, SH_Y=450; const SH_X=[100,260,420,580];
  // mystery
  const M_W=60,M_H=25;

  let state='title'; let last=performance.now();
  let player={x:(W-P_W)/2,y:P_Y,w:P_W,h:P_H,lives:3,invulnerable:0};
  let laser=null; let bombs=[]; let aliens=[]; let formation={offX:0,offY:0,dir:1}; let stepAcc=0; let bombAcc=0; let myst=null,mystT=10;
  let shields=[]; let score=0,high=0,wave=1;
  try{ const h=localStorage.getItem('si_high'); if(h) high=parseInt(h,10)||0; }catch(e){ high=0; }

  const keys={left:false,right:false,fire:false};
  window.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=true; if(e.key==='ArrowRight'||e.key==='d') keys.right=true; if(e.key===' ') keys.fire=true; if(e.key==='Enter'){ if(state==='title'||state==='gameover') startGame(); } if(e.key==='p') togglePause(); if(e.key==='r') startGame(); if(e.key==='Escape'){ state='title'; overlayText(titleText()); } });
  window.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a') keys.left=false; if(e.key==='ArrowRight'||e.key==='d') keys.right=false; if(e.key===' ') keys.fire=false; });
  window.addEventListener('pointerdown',()=>ensureAudio(),{once:true});

  // audio
  let audioCtx=null,audioOk=false; function ensureAudio(){ if(audioOk) return; audioOk=true; audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
  function tone(freq,dur=0.08,type='square'){ if(!audioOk) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type;o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(0.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01);o.start();g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur+0.02); }
  function boom(){ if(!audioOk) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(200,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+0.4); o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.14,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.5); o.stop(audioCtx.currentTime+0.52); }

  function saveHigh(){ try{ localStorage.setItem('si_high',String(high)); }catch(e){} }
  function rects(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

  function buildAliens(){ aliens=[]; let types=[ 'A','A','B','B','C' ]; for(let r=0;r<ROWS;r++){ for(let c=0;c<COLS;c++){ const type=types[r]; const t = TYPE[type]; const x = START_X + c*SPX; const y = START_Y + r*SPY; aliens.push({r,c,x,y,w:t.w,h:t.h,type,alive:true,anim:0,score:t.pts,color:t.color}); } } formation.offX=0; formation.offY=0; formation.dir=1; }

  function buildShields(){ shields=[]; for(const sx of SH_X){ const cols=Math.floor(SH_W/SH_CELL), rows=Math.floor(SH_H/SH_CELL); const grid=[]; for(let y=0;y<rows;y++){ grid[y]=[]; for(let x=0;x<cols;x++) grid[y][x]=1; } const mid=Math.floor(cols/2); for(let y=rows-3;y<rows;y++){ for(let x=mid-2;x<=mid+2;x++){ if(x>=0&&x<cols) grid[y][x]=0; } } shields.push({x:sx,y:SH_Y,cols:cols,rows:rows,grid:grid}); } }

  function resetAll(){ player.x=(W-P_W)/2; player.y=P_Y; player.lives=3; score=0; wave=1; buildAliens(); buildShields(); laser=null; bombs=[]; myst=null; mystT=8+Math.random()*12; state='title'; overlayText(titleText()); }
  function startGame(){ score=0; player.lives=3; wave=1; buildAliens(); buildShields(); laser=null; bombs=[]; myst=null; mystT=8+Math.random()*12; state='playing'; overlayText(''); }

  function fire(){ if(laser || state!=='playing') return; laser={x:player.x+player.w/2-LASER_W/2,y:player.y-LASER_H,w:LASER_W,h:LASER_H,vy:-LASER_SPEED}; tone(1200,0.06,'sine'); }

  function alienShoot(){ if(bombs.length>=BOMB_MAX) return; const cols=[]; for(let c=0;c<COLS;c++){ for(let r=ROWS-1;r>=0;r--){ const idx=r*COLS+c; if(aliens[idx]&&aliens[idx].alive){ cols.push(aliens[idx]); break; } } } if(cols.length===0) return; const s=cols[Math.floor(Math.random()*cols.length)]; const bx=s.x+formation.offX + s.w/2 - BOMB_W/2; const by=s.y+formation.offY + s.h; bombs.push({x:bx,y:by,w:BOMB_W,h:BOMB_H,vy:BOMB_SPEED}); tone(600,0.04,'square'); }

  function updateMyst(dt){ if(myst){ myst.x += myst.vx*dt; if(myst.vx>0 && myst.x>W+50) myst=null; if(myst.vx<0 && myst.x<-120) myst=null; } else { mystT -= dt; if(mystT<=0){ const dir=Math.random()<0.5?1:-1; myst={x:dir>0?-120:W+120,y:40,w:M_W,h:M_H,vx:dir*140,score:[50,100,150,300][Math.floor(Math.random()*4)]}; mystT=10+Math.random()*20; } } }

  // game loop
  let lastTime=performance.now(), stepAcc=0, bombAcc=0;
  function loop(now){ const dt=Math.min(0.05,(now-lastTime)/1000); lastTime=now; if(state==='paused'||state==='title'||state==='gameover'){ render(); requestAnimationFrame(loop); return; }
    // input
    if(keys.left) player.x -= P_SPEED*dt; if(keys.right) player.x += P_SPEED*dt; player.x = Math.max(0,Math.min(W-player.w,player.x)); if(keys.fire) fire();
    // alien step timing
    stepAcc += dt; const remaining = aliens.filter(a=>a.alive).length; let interval=0.8; if(remaining>44) interval=0.8; else if(remaining>34) interval=0.6; else if(remaining>24) interval=0.4; else if(remaining>14) interval=0.25; else if(remaining>4) interval=0.15; else interval=0.08;
    if(stepAcc >= interval){ stepAcc=0; const step=12*formation.dir; formation.offX += step; aliens.forEach(a=>{ if(a.alive) a.anim^=1; }); let left=Infinity,right=-Infinity; aliens.forEach(a=>{ if(!a.alive) return; const ax=a.x+formation.offX; left=Math.min(left,ax); right=Math.max(right,ax+a.w); }); if(left===Infinity){ // wave clear
        wave++; buildAliens(); laser=null; bombs=[]; myst=null; overlayText('WAVE '+wave); setTimeout(()=>overlayText(''),900); }
      else { if(formation.dir>0 && right>=W-20){ formation.dir=-1; formation.offY+=20; } else if(formation.dir<0 && left<=20){ formation.dir=1; formation.offY+=20; } }
      // marching sound
      tone(110 - Math.min(80,(COLS*ROWS-remaining)),0.06,'sine'); }
    // bombs cadence
    bombAcc += dt; if(bombAcc >= Math.max(0.4,1.6 - ((COLS*ROWS - remaining)/100))){ bombAcc=0; alienShoot(); }
    // update laser
    if(laser){ laser.y += laser.vy*dt; if(laser.y+laser.h<0) laser=null; }
    // update bombs
    for(let i=bombs.length-1;i>=0;i--){ bombs[i].y += bombs[i].vy*dt; if(bombs[i].y>H) bombs.splice(i,1); }
    // mystery
    updateMyst(dt);
    // collisions: laser vs myst
    if(laser){ if(myst && rects(laser,myst)){ score+=myst.score; tone(1400,0.08); myst=null; laser=null; } else {
        for(const a of aliens){ if(!a.alive) continue; const ax=a.x+formation.offX, ay=a.y+formation.offY; if(rects(laser,{x:ax,y:ay,w:a.w,h:a.h})){ a.alive=false; laser=null; score+=a.score; boom(); break; } }
      }
      if(laser){ for(const s of shields){ let hit=false; for(let ry=0;ry<s.rows;ry++){ for(let rx=0;rx<s.cols;rx++){ if(!s.grid[ry][rx]) continue; const cx=s.x+rx*SH_CELL, cy=s.y+ry*SH_CELL; if(rects(laser,{x:cx,y:cy,w:SH_CELL,h:SH_CELL})){ s.grid[ry][rx]=0; laser=null; hit=true; break; } } if(hit) break; } if(!laser) break; } }
    // bombs collisions
    for(let i=bombs.length-1;i>=0;i--){ const b=bombs[i]; if(rects(b,player)){ bombs.splice(i,1); player.lives--; boom(); if(player.lives<=0){ state='gameover'; overlayText('GAME OVER\nPress Enter to Restart'); if(score>high){ high=score; saveHigh(); } } else { player.x=(W-player.w)/2; laser=null; bombs=[]; overlayText('You were hit - Press Space'); } continue; }
      let removed=false; for(const s of shields){ for(let ry=0;ry<s.rows;ry++){ for(let rx=0;rx<s.cols;rx++){ if(!s.grid[ry][rx]) continue; const cx=s.x+rx*SH_CELL, cy=s.y+ry*SH_CELL; if(rects(b,{x:cx,y:cy,w:SH_CELL,h:SH_CELL})){ s.grid[ry][rx]=0; bombs.splice(i,1); removed=true; break; } } if(removed) break; } if(removed) continue; if(laser && rects(laser,b)){ laser=null; bombs.splice(i,1); tone(800,0.05); continue; } }
    // aliens reach player
    for(const a of aliens){ if(!a.alive) continue; const ay=a.y+formation.offY; if(ay + a.h >= player.y - 10){ state='gameover'; overlayText('GAME OVER - ALIENS LANDED\nPress Enter to Restart'); if(score>high){ high=score; saveHigh(); } } }
    // HUD
    scoreEl.innerText = 'Score: '+score; metaEl.innerText = 'HI-SCORE: '+high+'   Lives: '+player.lives+'   Wave: '+wave;
    requestAnimationFrame(loop); render(); }

  function render(){ ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // aliens
    for(const a of aliens){ if(!a.alive) continue; const ax=Math.round(a.x+formation.offX), ay=Math.round(a.y+formation.offY); ctx.fillStyle=a.color; ctx.fillRect(ax,ay,a.w,a.h); if(a.anim){ ctx.fillStyle='#000'; ctx.fillRect(ax+3,ay+3,6,6); } }
    // mystery
    if(myst){ ctx.fillStyle='#FF0000'; ctx.fillRect(Math.round(myst.x),Math.round(myst.y),myst.w,myst.h); }
    // shields
    for(const s of shields){ for(let ry=0;ry<s.rows;ry++){ for(let rx=0;rx<s.cols;rx++){ if(!s.grid[ry][rx]) continue; ctx.fillStyle='#0F0'; ctx.fillRect(s.x+rx*SH_CELL, s.y+ry*SH_CELL, SH_CELL, SH_CELL); } } }
    // player
    ctx.fillStyle='#00FFFF'; ctx.fillRect(Math.round(player.x),Math.round(player.y),player.w,player.h);
    // laser
    if(laser){ ctx.fillStyle='#FFFF00'; ctx.fillRect(Math.round(laser.x),Math.round(laser.y),laser.w,laser.h); }
    // bombs
    ctx.fillStyle='#FF4444'; for(const b of bombs) ctx.fillRect(Math.round(b.x),Math.round(b.y),b.w,b.h);
  }

  function overlayText(t){ overlay.textContent = t||''; }
  function titleText(){ return 'SPACE INVADERS\n\nMove: ←/→ or A/D   Fire: Space\nPress Enter to Start'; }

  function init(){ buildAliens(); buildShields(); player.x=(W-P_W)/2; player.y=P_Y; player.lives=3; laser=null; bombs=[]; myst=null; mystT=8+Math.random()*12; overlayText(titleText()); requestAnimationFrame(loop); }

  init();
})();
</script>
</body>
</html>
