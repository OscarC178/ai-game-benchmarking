<!--
  GAME:      Space Invaders
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="siCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('siCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, WAVE_COMPLETE: 4 };

    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('siHighScore') || '0', 10);
    let lives = 3;
    let wave = 1;
    let waveTimer = 0;

    // Player
    const player = { x: 380, y: 550, width: 40, height: 30, speed: 5 };

    // Lasers
    let lasers = [];

    // Aliens
    let aliens = [];
    let alienDirection = 1;
    let alienMoveTimer = 0;
    let alienMoveInterval = 60;

    // Bombs
    let bombs = [];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          fireLaser();
        }
      }

      if (key === 'p') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState === STATES.GAME_OVER || gameState === STATES.WAVE_COMPLETE) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      wave = 1;
      lasers = [];
      bombs = [];
      initWave();
    }

    function initWave() {
      aliens = [];
      alienDirection = 1;
      alienMoveTimer = 0;
      alienMoveInterval = Math.max(20, 60 - wave * 5);
      bombs = [];

      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 5; col++) {
          aliens.push({
            x: 100 + col * 120,
            y: 50 + row * 80,
            width: 40,
            height: 30,
            alive: true
          });
        }
      }
      gameState = STATES.PLAYING;
    }

    function fireLaser() {
      if (gameState !== STATES.PLAYING || lasers.length >= 5) return;
      lasers.push({
        x: player.x + player.width / 2 - 2,
        y: player.y,
        width: 4,
        height: 15,
        vy: -7
      });
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Player movement
      if (keys['arrowleft'] || keys['a']) {
        player.x = Math.max(0, player.x - player.speed);
      }
      if (keys['arrowright'] || keys['d']) {
        player.x = Math.min(WIDTH - player.width, player.x + player.speed);
      }

      // Update lasers
      for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].y += lasers[i].vy;
        if (lasers[i].y < 0) {
          lasers.splice(i, 1);
        }
      }

      // Update bombs
      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += 3;
        if (bombs[i].y > HEIGHT) {
          bombs.splice(i, 1);
        }
      }

      // Alien movement
      alienMoveTimer++;
      if (alienMoveTimer > alienMoveInterval) {
        alienMoveTimer = 0;
        let hitEdge = false;

        for (let alien of aliens) {
          if (!alien.alive) continue;
          alien.x += alienDirection * 20;

          if (alien.x <= 0 || alien.x + alien.width >= WIDTH) {
            hitEdge = true;
          }
        }

        if (hitEdge) {
          alienDirection *= -1;
          for (let alien of aliens) {
            if (alien.alive) {
              alien.y += 30;
            }
          }
        }
      }

      // Alien shooting
      if (Math.random() < 0.02) {
        const alive = aliens.filter(a => a.alive);
        if (alive.length > 0) {
          const shooter = alive[Math.floor(Math.random() * alive.length)];
          bombs.push({
            x: shooter.x + shooter.width / 2 - 2.5,
            y: shooter.y + shooter.height,
            width: 5,
            height: 10
          });
        }
      }

      // Laser-alien collision
      for (let i = lasers.length - 1; i >= 0; i--) {
        for (let j = aliens.length - 1; j >= 0; j--) {
          const alien = aliens[j];
          if (!alien.alive) continue;

          if (
            lasers[i].x < alien.x + alien.width &&
            lasers[i].x + lasers[i].width > alien.x &&
            lasers[i].y < alien.y + alien.height &&
            lasers[i].y + lasers[i].height > alien.y
          ) {
            alien.alive = false;
            score += 100;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('siHighScore', highScore);
            }
            lasers.splice(i, 1);
            break;
          }
        }
      }

      // Bomb-player collision
      for (let i = bombs.length - 1; i >= 0; i--) {
        if (
          bombs[i].x < player.x + player.width &&
          bombs[i].x + bombs[i].width > player.x &&
          bombs[i].y < player.y + player.height &&
          bombs[i].y + bombs[i].height > player.y
        ) {
          lives--;
          bombs.splice(i, 1);
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          }
        }
      }

      // Check if aliens reached bottom
      for (let alien of aliens) {
        if (alien.alive && alien.y + alien.height >= HEIGHT) {
          lives--;
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          }
          return;
        }
      }

      // Check wave complete
      if (aliens.every(a => !a.alive)) {
        wave++;
        score += 500;
        gameState = STATES.WAVE_COMPLETE;
        waveTimer = 120;
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw player
      ctx.fillStyle = '#FFF';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw lasers
      for (let laser of lasers) {
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
      }

      // Draw aliens
      for (let alien of aliens) {
        if (alien.alive) {
          ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
        }
      }

      // Draw bombs
      for (let bomb of bombs) {
        ctx.fillRect(bomb.x, bomb.y, bomb.width, bomb.height);
      }

      // Draw score and lives
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('Wave: ' + wave, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('← → or A D to move, SPACE to fire', WIDTH / 2, 360);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 410);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '28px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 260);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 310);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      } else if (gameState === STATES.WAVE_COMPLETE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('WAVE ' + (wave - 1) + ' COMPLETE', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 320);

        waveTimer--;
        if (waveTimer <= 0) {
          initWave();
        }
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
