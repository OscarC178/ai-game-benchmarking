<!--
  GAME:      Space Invaders
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    const STATE_LEVEL_CLEAR = 4;
    
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('spaceinvaders_highscore') || '0');
    let lives = 3;
    let level = 1;
    
    // Player
    const playerW = 50;
    const playerH = 30;
    let player = { x: W / 2 - playerW / 2, y: H - 60, speed: 6 };
    
    // Bullets
    let playerBullets = [];
    let enemyBullets = [];
    const bulletSpeed = 8;
    let canShoot = true;
    let shootCooldown = 250;
    
    // Invaders
    let invaders = [];
    const invaderW = 40;
    const invaderH = 30;
    const invaderRows = 5;
    const invaderCols = 11;
    let invaderDir = 1;
    let invaderSpeed = 1;
    let invaderDropAmount = 20;
    let moveTimer = 0;
    let moveInterval = 500;
    
    // Shields
    let shields = [];
    const shieldW = 80;
    const shieldH = 60;
    
    // UFO
    let ufo = null;
    let ufoTimer = 0;
    
    const keys = {};
    let levelClearTimer = 0;
    
    const invaderTypes = [
      { points: 30, color: '#FF0000' },
      { points: 20, color: '#00FF00' },
      { points: 20, color: '#00FF00' },
      { points: 10, color: '#0000FF' },
      { points: 10, color: '#0000FF' }
    ];
    
    function initGame() {
      score = 0;
      lives = 3;
      level = 1;
      initLevel();
    }
    
    function initLevel() {
      player.x = W / 2 - playerW / 2;
      playerBullets = [];
      enemyBullets = [];
      invaders = [];
      shields = [];
      ufo = null;
      ufoTimer = 0;
      
      invaderSpeed = 1 + (level - 1) * 0.3;
      moveInterval = Math.max(200, 500 - (level - 1) * 50);
      
      // Create invaders
      const startX = (W - invaderCols * invaderW) / 2;
      const startY = 80;
      
      for (let row = 0; row < invaderRows; row++) {
        for (let col = 0; col < invaderCols; col++) {
          invaders.push({
            x: startX + col * invaderW,
            y: startY + row * invaderH,
            type: row,
            alive: true,
            frame: 0
          });
        }
      }
      
      // Create shields
      const shieldY = H - 150;
      const shieldSpacing = (W - 4 * shieldW) / 5;
      for (let i = 0; i < 4; i++) {
        shields.push({
          x: shieldSpacing + i * (shieldW + shieldSpacing),
          y: shieldY,
          pixels: createShieldPixels()
        });
      }
    }
    
    function createShieldPixels() {
      const pixels = [];
      for (let y = 0; y < shieldH; y++) {
        pixels[y] = [];
        for (let x = 0; x < shieldW; x++) {
          // Create arch shape
          const centerX = shieldW / 2;
          const distFromCenter = Math.abs(x - centerX);
          
          // Top arch
          if (y < shieldH * 0.6 && distFromCenter > shieldW * 0.3 - y * 0.3) {
            pixels[y][x] = false;
          }
          // Bottom cutout
          else if (y > shieldH * 0.6 && distFromCenter < shieldW * 0.25) {
            pixels[y][x] = false;
          }
          else {
            pixels[y][x] = true;
          }
        }
      }
      return pixels;
    }
    
    function update(dt) {
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dt * 1000;
        if (levelClearTimer <= 0) {
          level++;
          initLevel();
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Player movement
      if (keys.left) player.x -= player.speed;
      if (keys.right) player.x += player.speed;
      player.x = Math.max(0, Math.min(W - playerW, player.x));
      
      // Shooting
      if (keys.space && canShoot) {
        playerBullets.push({
          x: player.x + playerW / 2,
          y: player.y,
          width: 4,
          height: 15
        });
        canShoot = false;
        setTimeout(() => canShoot = true, shootCooldown);
      }
      
      // Update player bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        playerBullets[i].y -= bulletSpeed;
        if (playerBullets[i].y < 0) {
          playerBullets.splice(i, 1);
        }
      }
      
      // Update enemy bullets
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].y += bulletSpeed * 0.6;
        if (enemyBullets[i].y > H) {
          enemyBullets.splice(i, 1);
        }
      }
      
      // Move invaders
      moveTimer += dt * 1000;
      if (moveTimer >= moveInterval) {
        moveTimer = 0;
        
        let shouldDrop = false;
        const aliveInvaders = invaders.filter(inv => inv.alive);
        
        for (const inv of aliveInvaders) {
          if ((invaderDir > 0 && inv.x + invaderW >= W - 20) ||
              (invaderDir < 0 && inv.x <= 20)) {
            shouldDrop = true;
            break;
          }
        }
        
        if (shouldDrop) {
          for (const inv of invaders) {
            inv.y += invaderDropAmount;
          }
          invaderDir *= -1;
        } else {
          for (const inv of invaders) {
            inv.x += invaderDir * 10 * invaderSpeed;
          }
        }
        
        // Toggle invader frame
        for (const inv of invaders) {
          inv.frame = 1 - inv.frame;
        }
        
        // Speed up as fewer invaders remain
        const remaining = aliveInvaders.length;
        if (remaining > 0) {
          moveInterval = Math.max(100, 500 - (55 - remaining) * 8);
        }
        
        // Enemy shooting
        if (Math.random() < 0.3 + level * 0.05) {
          const shooters = aliveInvaders.filter(inv => {
            return !aliveInvaders.some(other => 
              other.x === inv.x && other.y > inv.y && other.alive
            );
          });
          if (shooters.length > 0) {
            const shooter = shooters[Math.floor(Math.random() * shooters.length)];
            enemyBullets.push({
              x: shooter.x + invaderW / 2,
              y: shooter.y + invaderH,
              width: 4,
              height: 12
            });
          }
        }
      }
      
      // UFO
      ufoTimer += dt * 1000;
      if (!ufo && ufoTimer > 15000 && Math.random() < 0.01) {
        ufo = {
          x: -60,
          y: 40,
          width: 60,
          height: 25,
          dir: 1
        };
        ufoTimer = 0;
      }
      
      if (ufo) {
        ufo.x += 3 * ufo.dir;
        if (ufo.x > W + 60 || ufo.x < -60) {
          ufo = null;
        }
      }
      
      // Collision: player bullets vs invaders
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        
        for (const inv of invaders) {
          if (!inv.alive) continue;
          if (rectCollide(b, { x: inv.x, y: inv.y, width: invaderW, height: invaderH })) {
            inv.alive = false;
            playerBullets.splice(i, 1);
            score += invaderTypes[inv.type].points;
            break;
          }
        }
        
        // vs UFO
        if (ufo && rectCollide(b, ufo)) {
          playerBullets.splice(i, 1);
          score += Math.floor(Math.random() * 3 + 1) * 100;
          ufo = null;
        }
      }
      
      // Collision: bullets vs shields
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        if (checkShieldHit(playerBullets[i])) {
          playerBullets.splice(i, 1);
        }
      }
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        if (checkShieldHit(enemyBullets[i])) {
          enemyBullets.splice(i, 1);
        }
      }
      
      // Collision: enemy bullets vs player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        if (rectCollide(b, { x: player.x, y: player.y, width: playerW, height: playerH })) {
          enemyBullets.splice(i, 1);
          lives--;
          if (lives <= 0) {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('spaceinvaders_highscore', highScore);
            }
          }
        }
      }
      
      // Collision: invaders reach bottom
      for (const inv of invaders) {
        if (inv.alive && inv.y + invaderH >= player.y) {
          state = STATE_GAMEOVER;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('spaceinvaders_highscore', highScore);
          }
        }
      }
      
      // Level clear
      if (invaders.every(inv => !inv.alive)) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
      }
    }
    
    function checkShieldHit(bullet) {
      for (const shield of shields) {
        if (bullet.x >= shield.x && bullet.x < shield.x + shieldW &&
            bullet.y >= shield.y && bullet.y < shield.y + shieldH) {
          const px = Math.floor(bullet.x - shield.x);
          const py = Math.floor(bullet.y - shield.y);
          if (py >= 0 && py < shieldH && px >= 0 && px < shieldW) {
            if (shield.pixels[py] && shield.pixels[py][px]) {
              // Destroy nearby pixels
              for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++) {
                  const ny = py + dy;
                  const nx = px + dx;
                  if (ny >= 0 && ny < shieldH && nx >= 0 && nx < shieldW) {
                    if (shield.pixels[ny]) shield.pixels[ny][nx] = false;
                  }
                }
              }
              return true;
            }
          }
        }
      }
      return false;
    }
    
    function rectCollide(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 56px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', W / 2, 180);
        
        // Draw sample invaders
        drawInvaderIcon(W / 2 - 60, 230, 0, '#FF0000');
        drawInvaderIcon(W / 2, 230, 1, '#00FF00');
        drawInvaderIcon(W / 2 + 60, 230, 3, '#0000FF');
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 340);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Arrow Keys or A/D to move', W / 2, 420);
        ctx.fillText('SPACE to shoot', W / 2, 450);
        ctx.fillText('P to pause', W / 2, 480);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 550);
        return;
      }
      
      // Draw invaders
      for (const inv of invaders) {
        if (!inv.alive) continue;
        drawInvader(inv);
      }
      
      // Draw UFO
      if (ufo) {
        ctx.fillStyle = '#FF00FF';
        ctx.beginPath();
        ctx.ellipse(ufo.x + ufo.width / 2, ufo.y + ufo.height / 2, ufo.width / 2, ufo.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.fillRect(ufo.x + 10, ufo.y + 5, 8, 5);
        ctx.fillRect(ufo.x + 25, ufo.y + 3, 10, 7);
        ctx.fillRect(ufo.x + 42, ufo.y + 5, 8, 5);
      }
      
      // Draw shields
      for (const shield of shields) {
        ctx.fillStyle = '#0F0';
        for (let y = 0; y < shieldH; y++) {
          for (let x = 0; x < shieldW; x++) {
            if (shield.pixels[y] && shield.pixels[y][x]) {
              ctx.fillRect(shield.x + x, shield.y + y, 1, 1);
            }
          }
        }
      }
      
      // Draw player
      ctx.fillStyle = '#0FF';
      ctx.fillRect(player.x, player.y + 10, playerW, playerH - 10);
      ctx.fillRect(player.x + playerW / 2 - 5, player.y, 10, 15);
      
      // Draw player bullets
      ctx.fillStyle = '#FFF';
      for (const b of playerBullets) {
        ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);
      }
      
      // Draw enemy bullets
      ctx.fillStyle = '#F00';
      for (const b of enemyBullets) {
        ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);
      }
      
      // HUD
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 30);
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level, W / 2, 30);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, W - 10, 30);
      
      // Ground line
      ctx.strokeStyle = '#0F0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, H - 20);
      ctx.lineTo(W, H - 20);
      ctx.stroke();
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        
        if (score >= highScore && score > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 28px Arial';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
        }
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 130);
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + level + ' COMPLETE!', W / 2, H / 2);
      }
    }
    
    function drawInvader(inv) {
      const color = invaderTypes[inv.type].color;
      ctx.fillStyle = color;
      
      const x = inv.x;
      const y = inv.y;
      const f = inv.frame;
      
      // Different shapes based on type
      if (inv.type === 0) {
        // Top row - small
        ctx.fillRect(x + 12, y, 16, 8);
        ctx.fillRect(x + 4, y + 8, 32, 8);
        ctx.fillRect(x + 8, y + 16, 24, 8);
        if (f === 0) {
          ctx.fillRect(x + 4, y + 24, 8, 6);
          ctx.fillRect(x + 28, y + 24, 8, 6);
        } else {
          ctx.fillRect(x, y + 24, 8, 6);
          ctx.fillRect(x + 32, y + 24, 8, 6);
        }
      } else if (inv.type <= 2) {
        // Middle rows - medium
        ctx.fillRect(x + 8, y, 24, 8);
        ctx.fillRect(x, y + 8, 40, 8);
        ctx.fillRect(x + 4, y + 16, 32, 8);
        ctx.fillRect(x + 8, y + 24, 8, 6);
        ctx.fillRect(x + 24, y + 24, 8, 6);
      } else {
        // Bottom rows - large
        ctx.fillRect(x + 4, y, 32, 8);
        ctx.fillRect(x, y + 8, 40, 8);
        ctx.fillRect(x + 4, y + 16, 32, 8);
        if (f === 0) {
          ctx.fillRect(x, y + 24, 12, 6);
          ctx.fillRect(x + 28, y + 24, 12, 6);
        } else {
          ctx.fillRect(x + 8, y + 24, 8, 6);
          ctx.fillRect(x + 24, y + 24, 8, 6);
        }
      }
      
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 12, y + 8, 4, 4);
      ctx.fillRect(x + 24, y + 8, 4, 4);
    }
    
    function drawInvaderIcon(x, y, type, color) {
      ctx.fillStyle = color;
      if (type === 0) {
        ctx.fillRect(x - 8, y, 16, 8);
        ctx.fillRect(x - 16, y + 8, 32, 8);
        ctx.fillRect(x - 12, y + 16, 24, 8);
      } else if (type <= 2) {
        ctx.fillRect(x - 12, y, 24, 8);
        ctx.fillRect(x - 20, y + 8, 40, 8);
        ctx.fillRect(x - 16, y + 16, 32, 8);
      } else {
        ctx.fillRect(x - 16, y, 32, 8);
        ctx.fillRect(x - 20, y + 8, 40, 8);
        ctx.fillRect(x - 16, y + 16, 32, 8);
      }
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE) {
        if (state === STATE_PLAYING || state === STATE_PAUSED) {
          state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        }
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    Object.defineProperty(keys, 'left', { get() { return this['ArrowLeft'] || this['a'] || this['A']; } });
    Object.defineProperty(keys, 'right', { get() { return this['ArrowRight'] || this['d'] || this['D']; } });
    Object.defineProperty(keys, 'space', { get() { return this['Space']; } });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
