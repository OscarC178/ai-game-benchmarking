<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger Retro</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; }
        canvas { background: #000; border: 4px solid #333; image-rendering: pixelated; }
        .ui { margin-bottom: 10px; font-size: 24px; width: 448px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="ui">
        <span>SCORE: <span id="score">0</span></span>
        <span>LIVES: <span id="lives">3</span></span>
    </div>
    <canvas id="gameCanvas" width="448" height="512"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        const TILE = 32;
        const GRID_W = 14;
        const GRID_H = 16;
        
        let score = 0;
        let lives = 3;
        let gameActive = false;

        const frog = { x: 7 * TILE, y: 14 * TILE, w: TILE - 4, h: TILE - 4, dead: false };

        const rows = [
            // { y, type: 'road'|'water', speed, count, gap, color }
            { y: 13 * TILE, type: 'road', speed: -1.5, count: 3, gap: 120, color: '#f00', w: 40 }, // Fast cars
            { y: 12 * TILE, type: 'road', speed: 1.2, count: 3, gap: 150, color: '#ff0', w: 32 },
            { y: 11 * TILE, type: 'road', speed: -1.0, count: 2, gap: 200, color: '#fff', w: 60 }, // Trucks
            { y: 10 * TILE, type: 'road', speed: 2.5, count: 4, gap: 100, color: '#f0f', w: 32 }, // Fast taxis
            { y: 9 * TILE,  type: 'road', speed: -1.2, count: 3, gap: 140, color: '#0ff', w: 32 },
            
            // Safe zone (8)
            
            { y: 7 * TILE, type: 'water', speed: 1.5, count: 3, gap: 150, color: '#8B4513', w: 100 }, // Logs
            { y: 6 * TILE, type: 'water', speed: -1.0, count: 3, gap: 150, color: '#f80', w: 80 },  // Turtles (drawn as logs)
            { y: 5 * TILE, type: 'water', speed: 2.2, count: 2, gap: 220, color: '#8B4513', w: 160 }, // Long logs
            { y: 4 * TILE, type: 'water', speed: 1.2, count: 3, gap: 150, color: '#8B4513', w: 90 },
            { y: 3 * TILE, type: 'water', speed: -1.5, count: 4, gap: 100, color: '#f80', w: 60 }
        ];

        const obstacles = [];
        rows.forEach(row => {
            for(let i=0; i<row.count; i++) {
                obstacles.push({
                    x: i * row.gap,
                    y: row.y,
                    w: row.w,
                    h: TILE,
                    speed: row.speed,
                    type: row.type,
                    color: row.color
                });
            }
        });

        const targets = [
            { x: 32, y: 1 * TILE, occupied: false },
            { x: 128, y: 1 * TILE, occupied: false },
            { x: 224, y: 1 * TILE, occupied: false },
            { x: 320, y: 1 * TILE, occupied: false },
            { x: 416, y: 1 * TILE, occupied: false }
        ];

        window.addEventListener('keydown', e => {
            if(!gameActive) {
                if(e.code === 'Space') { gameActive = true; resetFrog(); }
                return;
            }
            if(frog.dead) return;

            switch(e.code) {
                case 'ArrowUp':    frog.y -= TILE; break;
                case 'ArrowDown':  if(frog.y < 14*TILE) frog.y += TILE; break;
                case 'ArrowLeft':  if(frog.x > 0) frog.x -= TILE; break;
                case 'ArrowRight': if(frog.x < canvas.width - TILE) frog.x += TILE; break;
            }
        });

        function resetFrog() {
            frog.x = 7 * TILE;
            frog.y = 14 * TILE;
            frog.dead = false;
        }

        function die() {
            lives--;
            livesEl.innerText = lives;
            frog.dead = true;
            if(lives <= 0) {
                gameActive = false;
                alert("GAME OVER! Score: " + score);
                location.reload();
            } else {
                setTimeout(resetFrog, 500);
            }
        }

        function update() {
            if(!gameActive || frog.dead) return;

            let onLog = false;

            obstacles.forEach(o => {
                o.x += o.speed;
                if(o.speed > 0 && o.x > canvas.width) o.x = -o.w;
                if(o.speed < 0 && o.x < -o.w) o.x = canvas.width;

                // Collision
                if(frog.x < o.x + o.w && frog.x + frog.w > o.x && frog.y < o.y + o.h && frog.y + frog.h > o.y) {
                    if(o.type === 'road') die();
                    else {
                        onLog = true;
                        frog.x += o.speed;
                    }
                }
            });

            // Water check
            if(!onLog && frog.y >= 3*TILE && frog.y <= 7*TILE) die();

            // Wall check for moving with logs
            if(frog.x < 0 || frog.x > canvas.width - frog.w) die();

            // Finish check
            if(frog.y === 1 * TILE) {
                let hitTarget = false;
                targets.forEach(t => {
                    if(Math.abs(frog.x - (t.x - TILE/2)) < TILE && !t.occupied) {
                        t.occupied = true;
                        score += 500;
                        hitTarget = true;
                        resetFrog();
                    }
                });
                if(!hitTarget) die(); // Missed the slots
                
                if(targets.every(t => t.occupied)) {
                    score += 2000;
                    targets.forEach(t => t.occupied = false);
                }
                scoreEl.innerText = score;
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Water
            ctx.fillStyle = '#000080';
            ctx.fillRect(0, 2*TILE, canvas.width, 6*TILE);

            // Banks
            ctx.fillStyle = '#444';
            ctx.fillRect(0, 8*TILE, canvas.width, TILE);
            ctx.fillRect(0, 14*TILE, canvas.width, TILE);

            // Finish
            ctx.fillStyle = '#0b0';
            ctx.fillRect(0, 1*TILE, canvas.width, TILE);
            targets.forEach(t => {
                ctx.fillStyle = t.occupied ? '#0f0' : '#000';
                ctx.fillRect(t.x - TILE, t.y, TILE*1.5, TILE);
            });

            // Obstacles
            obstacles.forEach(o => {
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y + 2, o.w, o.h - 4);
            });

            // Frog
            if(!frog.dead) {
                ctx.fillStyle = '#0f0';
                ctx.fillRect(frog.x + 4, frog.y + 4, frog.w, frog.h);
            }

            if(!gameActive) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px Courier';
                ctx.fillText("FROGGER", canvas.width/2, canvas.height/2 - 20);
                ctx.fillText("PRESS SPACE TO START", canvas.width/2, canvas.height/2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
