<!--
  GAME:      Frogger
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="froggerCanvas" width="560" height="640"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('froggerCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 560;
    const HEIGHT = 640;
    const CELL = 40;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, LEVEL_COMPLETE: 4 };

    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('froggerHighScore') || '0', 10);
    let lives = 3;
    let level = 1;
    let timeRemaining = 60;
    let timeTimer = 0;

    // Frog
    const frog = { x: 6, y: 15, gridX: 6, gridY: 15 };

    // Vehicles (road: rows 10-14)
    let vehicles = [];

    // River objects (river: rows 5-9)
    let riverObjects = [];

    // Home bays (row 0)
    let homeBays = [false, false, false, false, false];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (gameState === STATES.TITLE && key === ' ') {
        e.preventDefault();
        startGame();
      }

      if (gameState === STATES.PLAYING) {
        if (key === 'arrowup' || key === 'w') {
          e.preventDefault();
          if (frog.gridY > 0) {
            frog.gridY--;
            score += 10;
          }
        }
        if (key === 'arrowdown' || key === 's') {
          e.preventDefault();
          if (frog.gridY < 15) frog.gridY++;
        }
        if (key === 'arrowleft' || key === 'a') {
          e.preventDefault();
          if (frog.gridX > 0) frog.gridX--;
        }
        if (key === 'arrowright' || key === 'd') {
          e.preventDefault();
          if (frog.gridX < 13) frog.gridX++;
        }
      }

      if (key === ' ' && gameState === STATES.PLAYING) {
        gameState = STATES.PAUSED;
      } else if (key === ' ' && gameState === STATES.PAUSED) {
        gameState = STATES.PLAYING;
      }

      if (key === 'r' && gameState === STATES.GAME_OVER) {
        startGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      timeRemaining = 60;
      timeTimer = 0;
      homeBays = [false, false, false, false, false];
      frog.gridX = 6;
      frog.gridY = 15;
      initLevel();
    }

    function initLevel() {
      vehicles = [];
      riverObjects = [];

      // Road vehicles
      for (let row = 10; row <= 14; row++) {
        const speed = 1 + Math.random() * 1.5;
        const dir = row % 2 === 0 ? 1 : -1;
        for (let i = 0; i < 3; i++) {
          vehicles.push({
            x: i * 200,
            y: row * CELL,
            width: 80,
            height: CELL - 4,
            speed: speed * dir,
            row: row
          });
        }
      }

      // River objects
      const riverRows = [5, 6, 7, 8, 9];
      riverRows.forEach((row, idx) => {
        const speed = 1 + Math.random();
        const dir = idx % 2 === 0 ? 1 : -1;
        for (let i = 0; i < 2; i++) {
          riverObjects.push({
            x: i * 280,
            y: row * CELL,
            width: 120,
            height: CELL - 4,
            speed: speed * dir,
            row: row
          });
        }
      });

      gameState = STATES.PLAYING;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      frog.x = frog.gridX * CELL + CELL / 2;
      frog.y = frog.gridY * CELL + CELL / 2;

      timeTimer++;
      if (timeTimer > 60) {
        timeTimer = 0;
        timeRemaining--;
        if (timeRemaining <= 0) {
          lives--;
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          } else {
            frog.gridX = 6;
            frog.gridY = 15;
            timeRemaining = 60;
          }
        }
      }

      // Update vehicles
      for (let v of vehicles) {
        v.x += v.speed;
        if (v.x < -100) v.x = WIDTH;
        if (v.x > WIDTH + 100) v.x = -100;

        // Check collision
        if (
          frog.y > v.y &&
          frog.y < v.y + v.height &&
          frog.x > v.x &&
          frog.x < v.x + v.width
        ) {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            frog.gridX = 6;
            frog.gridY = 15;
            timeRemaining = 60;
          }
        }
      }

      // Update river
      let onRiverObject = false;
      for (let r of riverObjects) {
        r.x += r.speed;
        if (r.x < -150) r.x = WIDTH;
        if (r.x > WIDTH + 150) r.x = -150;

        // Carry frog with river object
        if (frog.gridY >= 5 && frog.gridY <= 9 && frog.gridY * CELL === r.y) {
          if (frog.x > r.x && frog.x < r.x + r.width) {
            frog.x += r.speed;
            onRiverObject = true;
          }
        }
      }

      // Check if in water without object
      if (frog.gridY >= 5 && frog.gridY <= 9 && !onRiverObject) {
        lives--;
        if (lives <= 0) gameState = STATES.GAME_OVER;
        else {
          frog.gridX = 6;
          frog.gridY = 15;
          timeRemaining = 60;
        }
      }

      // Check if off screen horizontally
      if (frog.x < 0 || frog.x > WIDTH) {
        lives--;
        if (lives <= 0) gameState = STATES.GAME_OVER;
        else {
          frog.gridX = 6;
          frog.gridY = 15;
          timeRemaining = 60;
        }
      }

      // Check home bays
      if (frog.gridY === 0) {
        const bayIndex = Math.floor(frog.gridX / 2);
        if (bayIndex >= 0 && bayIndex < 5) {
          if (!homeBays[bayIndex]) {
            homeBays[bayIndex] = true;
            score += 100 + timeRemaining * 10;
            frog.gridX = 6;
            frog.gridY = 15;
            timeRemaining = 60;

            if (homeBays.every(b => b)) {
              level++;
              score += 1000;
              gameState = STATES.LEVEL_COMPLETE;
              homeBays = [false, false, false, false, false];
              setTimeout(() => {
                initLevel();
                if (score > highScore) {
                  highScore = score;
                  localStorage.setItem('froggerHighScore', highScore);
                }
              }, 1000);
            }
          }
        }
      }

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('froggerHighScore', highScore);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw safe zone (top)
      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, 0, WIDTH, CELL);

      // Draw home bays
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < 5; i++) {
        if (homeBays[i]) {
          ctx.fillStyle = '#FFA500';
        } else {
          ctx.fillStyle = '#228B22';
        }
        ctx.fillRect(i * 2 * CELL + 10, 4, CELL - 8, CELL - 8);
      }

      // Draw road
      ctx.fillStyle = '#333';
      for (let row = 10; row <= 14; row++) {
        ctx.fillRect(0, row * CELL, WIDTH, CELL);
      }

      // Draw vehicles
      ctx.fillStyle = '#FF0000';
      for (let v of vehicles) {
        ctx.fillRect(v.x, v.y + 2, v.width, v.height);
      }

      // Draw river
      ctx.fillStyle = '#0066CC';
      for (let row = 5; row <= 9; row++) {
        ctx.fillRect(0, row * CELL, WIDTH, CELL);
      }

      // Draw river objects
      ctx.fillStyle = '#8B4513';
      for (let r of riverObjects) {
        ctx.fillRect(r.x, r.y + 2, r.width, r.height);
      }

      // Draw safe zone (bottom)
      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, 15 * CELL, WIDTH, HEIGHT - 15 * CELL);

      // Draw frog
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.arc(frog.x, frog.y, 12, 0, Math.PI * 2);
      ctx.fill();

      // Draw eyes
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(frog.x - 4, frog.y - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(frog.x + 4, frog.y - 3, 2, 0, Math.PI * 2);
      ctx.fill();

      // Draw UI
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, HEIGHT - 10);
      ctx.textAlign = 'center';
      ctx.fillText('Time: ' + timeRemaining, WIDTH / 2, HEIGHT - 10);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, HEIGHT - 10);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('FROGGER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '16px Arial';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);
        ctx.fillText('← → ↑ ↓ to move', WIDTH / 2, 320);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '16px Arial';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '18px Arial';
        ctx.fillText('Score: ' + score, WIDTH / 2, 240);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 290);

        ctx.font = '16px Arial';
        ctx.fillText('Press R to play again', WIDTH / 2, 360);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
