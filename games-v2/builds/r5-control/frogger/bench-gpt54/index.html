<!--
  GAME:      Frogger
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #07110a;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="832" height="832"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const CELL = 64;
  const COLS = 13;
  const ROWS = 13;
  const DT_CAP = 1 / 30;

  const STATES = {
    TITLE: 'title',
    START: 'start',
    PLAYING: 'playing',
    PAUSED: 'paused',
    DYING: 'dying',
    LEVEL_CLEAR: 'level_clear',
    GAME_OVER: 'game_over',
    WIN: 'win'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let score = 0;
  let highScore = loadHighScore();
  let lives = 3;
  let level = 1;
  let stateTimer = 0;
  let timer = 45;
  let message = '';

  let frog = { col: 6, row: 12, x: 6 * CELL, y: 12 * CELL, moving: false, sx: 0, sy: 0, tx: 0, ty: 0, t: 0, ride: null };
  let roadLanes = [];
  let riverLanes = [];
  let homes = [];
  let particles = [];

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('frogger_best_r5_control') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('frogger_best_r5_control', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function laneY(row) {
    return row * CELL;
  }

  function resetFrog() {
    frog.col = 6;
    frog.row = 12;
    frog.x = frog.col * CELL;
    frog.y = frog.row * CELL;
    frog.moving = false;
    frog.ride = null;
  }

  function buildHomes() {
    homes = [1, 3, 6, 9, 11].map(col => ({ col, filled: false }));
  }

  function makeLane(row, speed, entries) {
    return { row, speed, entries: entries.map(e => ({ ...e })) };
  }

  function buildLevel() {
    roadLanes = [
      makeLane(11, 160 + level * 8, [
        { x: 0, w: 90, type: 'truck', color: '#ff6b6b' },
        { x: 260, w: 70, type: 'car', color: '#ffe066' },
        { x: 500, w: 70, type: 'car', color: '#7c7cff' }
      ]),
      makeLane(10, -190 - level * 10, [
        { x: 120, w: 70, type: 'car', color: '#66ff99' },
        { x: 360, w: 90, type: 'truck', color: '#ff9f43' },
        { x: 650, w: 70, type: 'car', color: '#4ddbff' }
      ]),
      makeLane(9, 220 + level * 12, [
        { x: 60, w: 54, type: 'bike', color: '#ffffff' },
        { x: 280, w: 54, type: 'bike', color: '#ffffff' },
        { x: 540, w: 54, type: 'bike', color: '#ffffff' }
      ]),
      makeLane(8, -170 - level * 10, [
        { x: 30, w: 100, type: 'truck', color: '#d96bff' },
        { x: 340, w: 100, type: 'truck', color: '#ff6666' },
        { x: 640, w: 100, type: 'truck', color: '#ffd84d' }
      ])
    ];

    riverLanes = [
      makeLane(5, -80 - level * 6, [
        { x: 50, w: 180, type: 'log', color: '#8b5a2b' },
        { x: 420, w: 180, type: 'log', color: '#8b5a2b' }
      ]),
      makeLane(4, 120 + level * 8, [
        { x: 0, w: 120, type: 'turtle', color: '#6ed3cf' },
        { x: 260, w: 120, type: 'turtle', color: '#6ed3cf' },
        { x: 560, w: 120, type: 'turtle', color: '#6ed3cf' }
      ]),
      makeLane(3, -100 - level * 7, [
        { x: 100, w: 220, type: 'log', color: '#7a4c20' },
        { x: 520, w: 220, type: 'log', color: '#7a4c20' }
      ]),
      makeLane(2, 140 + level * 8, [
        { x: 40, w: 120, type: 'turtle', color: '#6ed3cf' },
        { x: 320, w: 120, type: 'turtle', color: '#6ed3cf' },
        { x: 620, w: 120, type: 'turtle', color: '#6ed3cf' }
      ]),
      makeLane(1, -90 - level * 6, [
        { x: 150, w: 170, type: 'log', color: '#8b5a2b' },
        { x: 540, w: 170, type: 'log', color: '#8b5a2b' }
      ])
    ];

    buildHomes();
    resetFrog();
    timer = Math.max(20, 45 - (level - 1) * 3);
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    message = '';
    particles = [];
    buildLevel();
    state = STATES.START;
    stateTimer = 1.2;
  }

  function nextLevel() {
    level += 1;
    if (level > 5) {
      state = STATES.WIN;
      message = 'Every crossing complete.';
      return;
    }
    buildLevel();
    state = STATES.START;
    stateTimer = 1.2;
  }

  function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 30 + Math.random() * 110;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.7, maxLife: 0.7, color });
    }
  }

  function frogRect() {
    return { x: frog.x + 10, y: frog.y + 10, w: CELL - 20, h: CELL - 20 };
  }

  function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function startMove(dc, dr) {
    if (frog.moving || state !== STATES.PLAYING) return;
    const nc = clamp(frog.col + dc, 0, COLS - 1);
    const nr = clamp(frog.row + dr, 0, ROWS - 1);
    if (nc === frog.col && nr === frog.row) return;
    frog.moving = true;
    frog.sx = frog.x;
    frog.sy = frog.y;
    frog.tx = nc * CELL;
    frog.ty = nr * CELL;
    frog.t = 0;
    frog.col = nc;
    frog.row = nr;
    frog.ride = null;
    if (dr < 0) {
      score += 10;
      updateHighScore();
    }
  }

  function killFrog(reason) {
    if (state !== STATES.PLAYING) return;
    lives -= 1;
    message = reason;
    spawnParticles(frog.x + CELL / 2, frog.y + CELL / 2, '#ffffff', 18);
    if (lives <= 0) {
      state = STATES.GAME_OVER;
      updateHighScore();
    } else {
      state = STATES.DYING;
      stateTimer = 1.0;
    }
  }

  function homeSuccess(home) {
    if (home.filled) {
      killFrog('Home already taken.');
      return;
    }
    home.filled = true;
    score += 50 + Math.floor(timer) * 2;
    updateHighScore();
    spawnParticles(home.col * CELL + CELL / 2, CELL / 2, '#7cff6b', 20);
    if (homes.every(h => h.filled)) {
      state = STATES.LEVEL_CLEAR;
      stateTimer = 1.4;
    } else {
      resetFrog();
      timer = Math.max(20, 45 - (level - 1) * 3);
    }
  }

  function updateLaneObjects(dt) {
    for (const lane of [...roadLanes, ...riverLanes]) {
      lane.entries.forEach(obj => {
        obj.x += lane.speed * dt;
        if (lane.speed > 0 && obj.x > W + 120) obj.x = -obj.w - 80;
        if (lane.speed < 0 && obj.x + obj.w < -120) obj.x = W + 80;
      });
    }
  }

  function updateFrog(dt) {
    if (frog.moving) {
      frog.t += dt * 6;
      const t = Math.min(1, frog.t);
      frog.x = frog.sx + (frog.tx - frog.sx) * t;
      frog.y = frog.sy + (frog.ty - frog.sy) * t;
      if (t >= 1) frog.moving = false;
    }

    if (frog.row >= 8 && frog.row <= 11) {
      const lane = roadLanes.find(l => l.row === frog.row);
      const rect = frogRect();
      if (lane && lane.entries.some(obj => rectOverlap(rect, { x: obj.x, y: laneY(lane.row) + 8, w: obj.w, h: CELL - 16 }))) {
        killFrog('Flattened by traffic.');
      }
    }

    if (frog.row >= 1 && frog.row <= 5) {
      const lane = riverLanes.find(l => l.row === frog.row);
      const rect = frogRect();
      let onRide = null;
      if (lane) {
        for (const obj of lane.entries) {
          if (rectOverlap(rect, { x: obj.x, y: laneY(lane.row) + 10, w: obj.w, h: CELL - 20 })) {
            onRide = obj;
            frog.ride = lane;
            break;
          }
        }
      }
      if (!onRide) {
        killFrog('Splashed into the river.');
      } else if (!frog.moving) {
        frog.x += lane.speed * dt;
        frog.col = Math.round(frog.x / CELL);
        if (frog.x < -CELL / 2 || frog.x > W - CELL / 2) killFrog('Drifted away on the current.');
      }
    }

    if (frog.row === 0 && !frog.moving) {
      const target = homes.find(h => Math.abs(h.col * CELL - frog.x) < CELL * 0.45);
      if (target) homeSuccess(target);
      else killFrog('Missed the home bay.');
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt) {
    updateParticles(dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER || state === STATES.WIN) return;

    if (state === STATES.START) {
      stateTimer -= dt;
      if (stateTimer <= 0) state = STATES.PLAYING;
      return;
    }

    if (state === STATES.DYING) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        resetFrog();
        timer = Math.max(20, 45 - (level - 1) * 3);
        state = STATES.PLAYING;
      }
      return;
    }

    if (state === STATES.LEVEL_CLEAR) {
      stateTimer -= dt;
      if (stateTimer <= 0) nextLevel();
      return;
    }

    timer -= dt;
    if (timer <= 0) {
      killFrog('Ran out of time.');
      return;
    }

    updateLaneObjects(dt);
    updateFrog(dt);
  }

  function drawBackground() {
    ctx.fillStyle = '#17351f';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#0f6b36';
    ctx.fillRect(0, 0, W, CELL);
    ctx.fillRect(0, CELL * 6, W, CELL);
    ctx.fillRect(0, CELL * 12, W, CELL);

    ctx.fillStyle = '#123e8a';
    ctx.fillRect(0, CELL, W, CELL * 5);

    ctx.fillStyle = '#2d2d2d';
    ctx.fillRect(0, CELL * 8, W, CELL * 4);

    ctx.fillStyle = '#f1e8b8';
    for (let i = 0; i < 18; i++) {
      ctx.fillRect(i * 48, CELL * 9 + CELL / 2 - 4, 28, 8);
      ctx.fillRect(i * 48 + 14, CELL * 10 + CELL / 2 - 4, 28, 8);
    }
  }

  function drawHomes() {
    homes.forEach(home => {
      const x = home.col * CELL;
      ctx.fillStyle = home.filled ? '#7cff6b' : '#0a2510';
      ctx.fillRect(x + 8, 8, CELL - 16, CELL - 16);
      if (home.filled) {
        ctx.fillStyle = '#0b1b12';
        drawFrogShape(x + CELL / 2, CELL / 2, 0.8);
      }
    });
  }

  function drawVehicle(obj, row) {
    const y = laneY(row) + 10;
    ctx.fillStyle = obj.color;
    ctx.fillRect(obj.x, y, obj.w, CELL - 20);
    ctx.fillStyle = '#111';
    ctx.fillRect(obj.x + 10, y + 10, obj.w - 20, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(obj.x + 6, y + CELL - 26, 12, 8);
    ctx.fillRect(obj.x + obj.w - 18, y + CELL - 26, 12, 8);
  }

  function drawRiverObj(obj, row) {
    const y = laneY(row) + 14;
    if (obj.type === 'log') {
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x, y, obj.w, CELL - 28);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(obj.x + 8, y + 6, obj.w - 16, 5);
    } else {
      ctx.fillStyle = '#6ed3cf';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(obj.x + 20 + i * 34, y + 18, 14, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#143b3c';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(obj.x + 20 + i * 34, y + 18, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawFrogShape(cx, cy, scale = 1) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#7cff6b';
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-10, -12, 6, 0, Math.PI * 2);
    ctx.arc(10, -12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#102d10';
    ctx.beginPath();
    ctx.arc(-10, -12, 2, 0, Math.PI * 2);
    ctx.arc(10, -12, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFrog() {
    if (state === STATES.DYING && Math.floor(stateTimer * 20) % 2 === 0) return;
    drawFrogShape(frog.x + CELL / 2, frog.y + CELL / 2, 1);
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, 4, 4);
      ctx.globalAlpha = 1;
    });
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE ${score}`, 18, H - 18);
    ctx.textAlign = 'center';
    ctx.fillText(`HI ${highScore}`, W / 2, H - 18);
    ctx.textAlign = 'right';
    ctx.fillText(`LEVEL ${level}  TIME ${Math.ceil(timer)}`, W - 18, H - 18);

    for (let i = 0; i < lives; i++) drawFrogShape(26 + i * 24, H - 52, 0.45);
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 48px Arial';
    ctx.fillText(title, W / 2, H / 2 - 90);
    ctx.font = '24px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 34));
  }

  function render() {
    drawBackground();
    drawHomes();
    roadLanes.forEach(lane => lane.entries.forEach(obj => drawVehicle(obj, lane.row)));
    riverLanes.forEach(lane => lane.entries.forEach(obj => drawRiverObj(obj, lane.row)));
    drawFrog();
    drawParticles();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('FROGGER', [
        'Press SPACE to start',
        'Arrow keys / WASD to hop',
        'Reach every home bay before time runs out'
      ], true);
    } else if (state === STATES.START) {
      drawOverlay(`LEVEL ${level}`, ['Ready...'], false);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', [message || 'The crossing failed.', 'Press R to play again', 'Press Escape for title'], true);
    } else if (state === STATES.WIN) {
      drawOverlay('YOU WIN!', [message || 'Every lane conquered.', 'Press R to play again'], true);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) startGame();
    }

    if (state === STATES.PLAYING) {
      if (justPressed('ArrowUp') || justPressed('KeyW')) startMove(0, -1);
      else if (justPressed('ArrowDown') || justPressed('KeyS')) startMove(0, 1);
      else if (justPressed('ArrowLeft') || justPressed('KeyA')) startMove(-1, 0);
      else if (justPressed('ArrowRight') || justPressed('KeyD')) startMove(1, 0);
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING || state === STATES.START) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER || state === STATES.WIN) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) startGame();
    }
  }

  function syncPrev() {
    const watched = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  buildLevel();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
