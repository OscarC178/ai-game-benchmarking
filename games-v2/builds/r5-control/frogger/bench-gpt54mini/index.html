<!--
  GAME:      Frogger
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Frogger - Mini</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:560px;height:650px;position:relative}
  canvas{display:block;background:#071119}
  #hud{position:absolute;left:8px;top:4px;color:#fff;font-family:monospace;font-size:14px}
  #hud .right{position:absolute;right:8px;top:4px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;text-align:center;white-space:pre-wrap}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="560" height="650"></canvas>
  <div id="hud"><div id="score">SCORE: 0</div><div id="meta" class="right">HI: 0  LIVES: 3  LV:1</div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); const W=canvas.width,H=canvas.height;
  const overlay=document.getElementById('overlay'), scoreEl=document.getElementById('score'), metaEl=document.getElementById('meta');
  const CELL=40, COLS=14, ROWS=16; const START_ROW=13; const ROAD_ROWS=[8,9,10,11,12]; const MID_ROW=7; const RIVER_ROWS=[2,3,4,5,6]; const HOME_ROW=1; const HUD_ROW=0;
  let state='title'; let score=0,high=0,lives=3,level=1; try{ const h=localStorage.getItem('frogger_high'); if(h) high=parseInt(h,10)||0; }catch(e){high=0}
  let timeLeft=60; const TIME_BASE=60;
  const FROG=36; let frog={col:Math.floor(COLS/2),row:START_ROW,x:0,y:0,alive:true,hopLock:0,furthest:0};
  const HOMES=5; const homes=new Array(HOMES).fill(false);
  const roadLanes=[]; const riverLanes=[]; const parts=[]; const keys={}; window.addEventListener('keydown',e=>{ if(['ArrowLeft','a'].includes(e.key)) keys.left=true; if(['ArrowRight','d'].includes(e.key)) keys.right=true; if(['ArrowUp','w'].includes(e.key)) keys.up=true; if(['ArrowDown','s'].includes(e.key)) keys.down=true; if(e.key==='Enter'||e.key===' ') { if(state==='title'||state==='gameover') startGame(); } if(e.key==='p'||e.key==='P') togglePause(); if(e.key==='r'||e.key==='R') startGame(); }); window.addEventListener('keyup',e=>{ if(['ArrowLeft','a'].includes(e.key)) keys.left=false; if(['ArrowRight','d'].includes(e.key)) keys.right=false; if(['ArrowUp','w'].includes(e.key)) keys.up=false; if(['ArrowDown','s'].includes(e.key)) keys.down=false; });
  let audioCtx=null,aok=false; function ensureAudio(){ if(aok) return; try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); aok=true;}catch(e){aok=false;} } window.addEventListener('pointerdown',()=>ensureAudio(),{once:true}); function tone(freq,dur=0.06,type='sine'){ if(!aok) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }
  function rand(a,b){ return a + Math.random()*(b-a); } function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); } function colX(c){ return Math.floor(c*CELL + CELL/2); } function rowY(r){ return Math.floor((r-1)*CELL + CELL/2 + 20); } function aabb(ax,ay,aw,ah,bx,by,bw,bh){ return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 && ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2; }
  function spawnRoad(){ roadLanes.length=0; const base=[90,130,100,140,110]; for(let i=0;i<ROAD_ROWS.length;i++){ const row=ROAD_ROWS[i]; const dir=(i%2? -1:1); const speed=base[i]*(1+(level-1)*0.08); const list=[]; let x=rand(0,W); const spacing=180 - i*10 + level*4; while(x < W+400){ const type = Math.random()<0.18?'truck':'car'; const w=(type==='truck')?100:50; list.push({x:x,y:rowY(row),w:w,h:36,vx:dir*speed,color:type==='truck'? '#b55':'#ffd24d'}); x+=spacing+rand(-40,40); } roadLanes.push({row,dir,speed,list}); } }
  function spawnRiver(){ riverLanes.length=0; const base=[100,70,120,80,90]; for(let i=0;i<RIVER_ROWS.length;i++){ const row=RIVER_ROWS[i]; const dir=(i%2? -1:1); const speed=base[i]*(1+(level-1)*0.06); const plats=[]; let x=rand(0,W); while(x < W+500){ const t=rand(0,1); if(t<0.25){ plats.push({x:x,y:rowY(row),w:160,h:34,vx:dir*speed,type:'log',color:'#7a4f28'}); x+=220+rand(-40,40);} else if(t<0.6){ plats.push({x:x,y:rowY(row),w:110,h:34,vx:dir*speed,type:'log',color:'#bf7f3f'}); x+=160+rand(-30,30);} else { plats.push({x:x,y:rowY(row),w:80,h:34,vx:dir*speed,type:'turtle',color:'#2ea86e',dive:0,dT:rand(2,5)}); x+=130+rand(-20,20);} } riverLanes.push({row,dir,speed,plats}); } }
  function setupLevel(){ spawnRoad(); spawnRiver(); for(let i=0;i<homes.length;i++) homes[i]=false; frog.col=Math.floor(COLS/2); frog.row=START_ROW; frog.alive=true; frog.hopLock=0; frog.furthest=0; timeLeft = Math.max(10, TIME_BASE - (level-1)*5); }
  function handleInput(dt){ if(frog.hopLock>0) frog.hopLock=Math.max(0,frog.hopLock-dt); if(frog.hopLock>0) return; if(keys.up){ hop(0,-1); frog.hopLock=0.12; } else if(keys.down){ hop(0,1); frog.hopLock=0.12; } else if(keys.left){ hop(-1,0); frog.hopLock=0.12; } else if(keys.right){ hop(1,0); frog.hopLock=0.12; } }
  function hop(dx,dy){ if(state!=='playing') return; const nc=frog.col+dx, nr=frog.row+dy; if(nc<0||nc>=COLS) return; if(nr<1) return; if(nr>frog.furthest){ score+=10; frog.furthest=nr; } frog.col=nc; frog.row=nr; tone(900,0.06); }
  let last=performance.now(); function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; if(state==='paused'||state==='title'||state==='gameover'){ render(); requestAnimationFrame(loop); return; } handleInput(dt); for(const lane of roadLanes){ for(const v of lane.list){ v.x += v.vx*dt; if(v.vx>0 && v.x - v.w/2 > W+80) v.x = -v.w/2 - rand(20,120); if(v.vx<0 && v.x + v.w/2 < -80) v.x = W + v.w/2 + rand(20,120); } } for(const rl of riverLanes){ for(const p of rl.plats){ p.x += p.vx*dt; if(p.vx>0 && p.x - p.w/2 > W+160) p.x = -p.w/2 - rand(60,200); if(p.vx<0 && p.x + p.w/2 < -160) p.x = W + p.w/2 + rand(60,200); if(p.type==='turtle'){ p.dT -= dt; if(p.dT<=0){ p.dT = rand(3,6); p.dive = (p.dive+1)|0; } } } } frog.x=colX(frog.col); frog.y=rowY(frog.row); if(ROAD_ROWS.includes(frog.row)){ const lane=roadLanes.find(l=>l.row===frog.row); if(lane){ for(const v of lane.list){ if(aabb(frog.x,frog.y,FROG,FROG,v.x,v.y,v.w,v.h)){ frogDie('hit'); break; } } } } let onPlat=null; if(RIVER_ROWS.includes(frog.row)){ const rl=riverLanes.find(r=>r.row===frog.row); if(rl){ for(const p of rl.plats){ if(Math.abs(frog.x - p.x) < p.w/2 + FROG/4 && Math.abs(frog.y - p.y) < p.h/2 + FROG/4){ if(p.type==='turtle' && (p.dive%3===2)) { frogDie('drown'); onPlat=null; break; } onPlat=p; break; } } } if(!onPlat){ frogDie('drown'); } else { frog.x = onPlat.x; if(frog.x < -20 || frog.x > W+20) frogDie('off'); } } if(frog.row===HOME_ROW){ const margin=30; const avail=W-margin*2; const slotW=avail/HOMES; const idx=Math.floor((frog.x - margin)/slotW); if(idx>=0 && idx<HOMES && !homes[idx]){ homes[idx]=true; score += 50 + Math.floor(timeLeft*2); tone(1200,0.08); resetFrog(); checkLevel(); } else { frogDie('invalid'); } } timeLeft -= dt; if(timeLeft<=0) frogDie('time'); for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.vx*=0.995; p.vy*=0.995; if(p.life<=0) parts.splice(i,1); } scoreEl.textContent='SCORE: '+score; metaEl.textContent='HI: '+high+'  LIVES: '+lives+'  LV:'+level; requestAnimationFrame(loop); render(); }
  function frogDie(kind){ if(state!=='playing') return; frog.alive=false; tone(120,0.6,'sawtooth'); spawnParticles(frog.x,frog.y,'#fff',18); lives--; if(lives<=0){ state='gameover'; overlay.textContent='GAME OVER\nPress Enter to Restart'; if(score>high){ high=score; try{ localStorage.setItem('frogger_high',String(high)); }catch(e){} } } else { state='respawn'; setTimeout(()=>{ resetFrog(); state='playing'; },900); } }
  function spawnParticles(x,y,col,n){ for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2), s=rand(60,220); parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.4,1.0),col}); } }
  function resetFrog(){ frog.col=Math.floor(COLS/2); frog.row=START_ROW; frog.alive=true; frog.hopLock=0; frog.furthest=0; timeLeft=Math.max(10, TIME_BASE - (level-1)*5); frog.x=colX(frog.col); frog.y=rowY(frog.row); }
  function checkLevel(){ if(homes.every(h=>h)){ score+=1000; level++; state='level'; overlay.textContent='LEVEL '+level; setTimeout(()=>{ for(let i=0;i<homes.length;i++) homes[i]=false; setupLevel(); state='playing'; overlay.textContent=''; },1200); } }
  function setupLevel(){ spawnRoad(); spawnRiver(); for(let i=0;i<homes.length;i++) homes[i]=false; resetFrog(); }
  function startGame(){ score=0; lives=3; level=1; setupLevel(); state='playing'; overlay.textContent=''; }
  function togglePause(){ if(state==='playing'){ state='paused'; overlay.textContent='PAUSED'; } else if(state==='paused'){ state='playing'; overlay.textContent=''; } }
  function render(){ ctx.clearRect(0,0,W,H); ctx.fillStyle='#002200'; ctx.fillRect(0,0,CELL*14,CELL); ctx.fillStyle='#114411'; ctx.fillRect(0,CELL, W, CELL); ctx.fillStyle='#0033aa'; ctx.fillRect(0,CELL*2, W, CELL*5); ctx.fillStyle='#114411'; ctx.fillRect(0,CELL*7, W, CELL); ctx.fillStyle='#333'; ctx.fillRect(0,CELL*8, W, CELL*5);
    const margin=30; const avail=W-margin*2; const slotW=avail/HOMES; for(let i=0;i<HOMES;i++){ const bx=margin + i*slotW + slotW/2; ctx.strokeStyle='#66ff66'; ctx.lineWidth=2; ctx.strokeRect(bx-slotW/2+6, 8, slotW-12, CELL-12); if(homes[i]){ ctx.fillStyle='#66ff66'; ctx.beginPath(); ctx.arc(bx, 8+CELL/2, 10,0,Math.PI*2); ctx.fill(); } }
    for(const lane of roadLanes){ for(const v of lane.list){ ctx.fillStyle=v.color; ctx.fillRect(v.x - v.w/2, v.y - v.h/2, v.w, v.h); ctx.strokeStyle='#000'; ctx.strokeRect(v.x - v.w/2, v.y - v.h/2, v.w, v.h); } }
    for(const rl of riverLanes){ for(const p of rl.plats){ if(p.type==='log'){ ctx.fillStyle=p.color; ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); ctx.strokeStyle='#3b220f'; ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); } else { if((p.dive%3)===0) ctx.fillStyle=p.color; else if((p.dive%3)===1) ctx.fillStyle='#2e8b57'; else ctx.fillStyle='rgba(46,139,87,0.25)'; ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); ctx.strokeStyle='#0b3b2a'; ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h); } } }
    if(frog.alive){ ctx.save(); ctx.translate(frog.x||colX(frog.col), frog.y||rowY(frog.row)); ctx.fillStyle='#00ff00'; ctx.beginPath(); ctx.ellipse(0,0,16,12,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.fillRect(-6,-8,4,4); ctx.fillRect(4,-8,4,4); ctx.restore(); }
    for(const p of parts){ ctx.fillStyle=p.col; ctx.fillRect(p.x,p.y,2,2); }
    const barW=200, bx=W/2 - barW/2; ctx.strokeStyle='#fff'; ctx.strokeRect(bx, H-28, barW, 12); ctx.fillStyle = timeLeft>10? '#88ff88':'#ff8888'; ctx.fillRect(bx, H-28, Math.max(0, barW*(timeLeft/TIME_BASE)), 12);
    if(state==='title'){ overlay.style.display='flex'; overlay.textContent='FROGGER-LITE\n\nCross the road, ride logs and turtles to reach the homes.\nArrow keys/WASD to hop. Press Enter to start.'; } else if(state==='paused'){ overlay.style.display='flex'; overlay.textContent='PAUSED'; } else if(state==='gameover'){ overlay.style.display='flex'; } else { overlay.style.display='none'; } }
  function init(){ overlay.textContent='FROGGER-LITE\n\nPress Enter to Start'; setupLevel(); requestAnimationFrame(loop); } init();
})();
</script>
</body>
</html>
