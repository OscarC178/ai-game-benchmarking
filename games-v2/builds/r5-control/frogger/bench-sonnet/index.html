<!--
  GAME:      Frogger
  RUN:       r5-control
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frogger</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=480,H=580;
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} }
function beep(freq,dur,type,gain,fe){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.setValueAtTime(freq,AC.currentTime);
    if(fe) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(gain||0.08,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}

// ---- Layout ----
// 13 rows of 40px each, plus 20px top HUD
const CELL=40,ROWS=13,COLS=12;
const HUD=20;
// Row assignments (from bottom=0 to top=12):
// 0: safe (start)
// 1-5: road (cars)
// 6: safe (median)
// 7-11: river (logs/turtles)
// 12: goal row (5 home bays)
const ROW_Y=(r)=>HUD+(ROWS-1-r)*CELL; // pixel y for row r

// ---- Row definitions ----
// type: 'safe','road','river','goal'
const ROW_DEFS=[
  {type:'safe'},             // 0 - start
  {type:'road',dir:1, spd:1.5, vehicles:[{len:1,gap:3},{len:2,gap:4},{len:1,gap:5}]},
  {type:'road',dir:-1,spd:2.2,vehicles:[{len:2,gap:3},{len:2,gap:5},{len:1,gap:4}]},
  {type:'road',dir:1, spd:1.8,vehicles:[{len:3,gap:5},{len:1,gap:6}]},
  {type:'road',dir:-1,spd:1.3,vehicles:[{len:1,gap:4},{len:1,gap:3},{len:2,gap:5}]},
  {type:'road',dir:1, spd:2.5,vehicles:[{len:2,gap:6},{len:1,gap:4}]},
  {type:'safe'},             // 6 - median
  {type:'river',dir:-1,spd:1.2,objs:[{len:3,gap:2},{len:2,gap:3},{len:2,gap:4}]},
  {type:'river',dir:1, spd:1.5,objs:[{len:2,gap:3},{len:1,gap:4},{len:3,gap:3}],turtle:true},
  {type:'river',dir:-1,spd:2.0,objs:[{len:4,gap:3},{len:3,gap:5}]},
  {type:'river',dir:1, spd:1.0,objs:[{len:2,gap:2},{len:3,gap:4},{len:2,gap:3}],turtle:true},
  {type:'river',dir:-1,spd:1.8,objs:[{len:3,gap:3},{len:2,gap:4}]},
  {type:'goal'},             // 12 - top
];

// Home bays at columns 1,3,5,7,9 (0-indexed in 12-column grid)
const HOME_COLS=[1,3,5,7,9];
let homes=[];

// ---- State ----
const ST={TITLE:0,PLAYING:1,PAUSED:2,DEAD:3,NEXTLEVEL:4,GAMEOVER:5};
let state=ST.TITLE;
let score,hiScore,lives,level;
hiScore=parseInt(localStorage.getItem('frg5_hi')||'0');
let frog,lanes,totalTime=0,deadTimer=0,levelTimer=0;
let particles=[];
let timeLeft,timeMax;

// Frog leap animation
let leapAnim={active:false,px:0,py:0,tx:0,ty:0,t:0};

function initGame(){
  score=0; lives=3; level=1;
  initLevel();
  state=ST.PLAYING;
}

function initLevel(){
  homes=HOME_COLS.map(c=>({c,filled:false}));
  resetFrog();
  buildLanes();
  timeLeft=timeMax=30+Math.max(0,(3-level)*5);
  particles=[];
}

function resetFrog(){
  frog={
    col:5.5,row:0, // center of start row
    alive:true,onLog:null,logVx:0
  };
  leapAnim.active=false;
}

function buildLanes(){
  lanes=[];
  for(let r=0;r<ROWS;r++){
    const def=ROW_DEFS[r];
    const objs=[];
    if(def.type==='road'){
      let x=Math.random()*COLS;
      for(const v of def.vehicles){
        for(let i=0;i<3;i++){ // repeat pattern
          objs.push({x,w:v.len,type:'car',len:v.len,col:['#FF4444','#FF8800','#FFFF44','#FF44FF'][r%4]});
          x+=v.len+v.gap;
        }
      }
    } else if(def.type==='river'){
      let x=Math.random()*COLS;
      for(const o of def.objs){
        for(let i=0;i<3;i++){
          objs.push({x,w:o.len,type:def.turtle?'turtle':'log',len:o.len,diveT:0,divePhase:0});
          x+=o.len+o.gap;
        }
      }
    }
    lanes.push({...def,row:r,objs});
  }
}

// ---- Input ----
const keys={};
const pressed={};
window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]){
    pressed[k]=true; initAC();
    if(k===' '){
      if(state===ST.TITLE){ initGame(); return; }
      if(state===ST.PAUSED){ state=ST.PLAYING; return; }
    }
    if(k==='p'||k==='P'){ if(state===ST.PLAYING)state=ST.PAUSED; else if(state===ST.PAUSED)state=ST.PLAYING; }
    if(k==='r'||k==='R'){ initGame(); }
    if(k==='Escape'){ state=state===ST.PAUSED?ST.PLAYING:ST.TITLE; }
    if(state===ST.PLAYING&&!leapAnim.active&&frog.alive){
      let dc=0,dr=0;
      if(k==='ArrowUp'||k==='w'||k==='W') dr=1;
      if(k==='ArrowDown'||k==='s'||k==='S') dr=-1;
      if(k==='ArrowLeft'||k==='a'||k==='A') dc=-1;
      if(k==='ArrowRight'||k==='d'||k==='D') dc=1;
      if(dc!==0||dr!==0) doLeap(dc,dr);
    }
  }
  keys[k]=true;
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });
window.addEventListener('blur',()=>{ for(const k in keys)keys[k]=false; });

function doLeap(dc,dr){
  const nc=frog.col+dc, nr=frog.row+dr;
  if(nc<0||nc>=COLS) return; // wall
  leapAnim={active:true,px:frog.col,py:frog.row,tx:nc,ty:nr,t:0,dc,dr};
  frog.col=nc; frog.row=nr;
  beep(600,0.06,'square',0.1);
  if(nr>frog.row) score+=10; // moving forward
  if(score>hiScore){hiScore=score;localStorage.setItem('frg5_hi',hiScore);}
}

// ---- Collision helpers ----
function frogPixelX(){ return (frog.col+0.5)*CELL; } // not used directly, use frog.col
function frogRect(){
  const px=(leapAnim.active?lerp(leapAnim.px,leapAnim.tx,leapAnim.t):frog.col)*CELL+4;
  const py=ROW_Y(leapAnim.active?lerp(leapAnim.py,leapAnim.ty,leapAnim.t):frog.row)+4;
  return{x:px,y:py,w:CELL-8,h:CELL-8};
}
function lerp(a,b,t){ return a+(b-a)*t; }

function objRect(obj,r){
  const x=((obj.x%COLS)+COLS)%COLS;
  const py=ROW_Y(r);
  return{x:x*CELL,y:py,w:obj.w*CELL,h:CELL};
}

// ---- Update ----
let lastTime=performance.now();
function update(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now; totalTime+=dt;

  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=dt; if(p.life<=0)particles.splice(i,1); }

  if(state===ST.PAUSED||state===ST.TITLE||state===ST.GAMEOVER) return;

  if(state===ST.DEAD){ deadTimer-=dt; if(deadTimer<=0){ if(lives<=0)state=ST.GAMEOVER; else { resetFrog(); state=ST.PLAYING; } } return; }
  if(state===ST.NEXTLEVEL){ levelTimer-=dt; if(levelTimer<=0){ level++; initLevel(); state=ST.PLAYING; } return; }

  // Move lanes
  for(const lane of lanes){
    if(lane.type!=='road'&&lane.type!=='river') continue;
    const spd=(lane.spd*(1+level*0.1))*dt;
    for(const obj of lane.objs){
      obj.x+=lane.dir*spd;
      // Wrap
      const span=COLS;
      if(obj.x>span) obj.x-=span*2;
      if(obj.x<-span) obj.x+=span*2;
      // Turtle dive cycle
      if(obj.type==='turtle'){
        obj.diveT=(obj.diveT||0)+dt;
        const period=4;
        obj.divePhase=Math.floor(obj.diveT/period)%4;
      }
    }
  }

  // Timer
  timeLeft=Math.max(0,timeLeft-dt);
  if(timeLeft<=0){ killFrog('time'); return; }

  // Leap animation
  if(leapAnim.active){
    leapAnim.t=Math.min(1,leapAnim.t+dt*8);
    if(leapAnim.t>=1){ leapAnim.active=false; checkRow(); }
    return;
  }

  // Check row
  checkRow();
}

function checkRow(){
  const r=frog.row;
  const lane=lanes[r];
  if(!lane) return;

  if(lane.type==='goal'){
    // Check if on a home bay
    const c=Math.round(frog.col);
    const home=homes.find(h=>h.c===c);
    if(home&&!home.filled){
      home.filled=true; score+=200; if(score>hiScore){hiScore=score;localStorage.setItem('frg5_hi',hiScore);}
      beep(880,0.1,'sine',0.12); setTimeout(()=>beep(1100,0.1,'sine',0.12),120);
      explode(frog.col*CELL+CELL/2,ROW_Y(r)+CELL/2,'#00ff88');
      if(homes.every(h=>h.filled)){ levelTimer=2; state=ST.NEXTLEVEL; return; }
      resetFrog();
    } else { killFrog('drown'); return; }
    return;
  }

  if(lane.type==='river'){
    // Must be on a log/turtle
    let onObj=null;
    for(const obj of lane.objs){
      if(obj.type==='turtle'&&obj.divePhase===3) continue; // submerged
      let ox=((obj.x%COLS)+COLS)%COLS;
      // Check wrapped
      for(const off of [0,COLS,-COLS]){
        const lx=(ox+off)*CELL;
        if(frog.col*CELL+CELL/2>lx&&frog.col*CELL+CELL/2<lx+obj.w*CELL){ onObj=obj; frog._logVx=lane.dir*(lane.spd*(1+level*0.1))/60; break; }
      }
      if(onObj) break;
    }
    if(!onObj){ killFrog('drown'); return; }
    // Carry frog
    frog.col+=lane.dir*(lane.spd*(1+level*0.1))/60;
    if(frog.col<0||frog.col>=COLS){ killFrog('drown'); return; }
    return;
  }

  if(lane.type==='road'){
    // Check car collision
    const fr=frogRect();
    for(const obj of lane.objs){
      for(const off of [0,COLS,-COLS]){
        const ox=((obj.x+off)%COLS+COLS)%COLS;
        const or={x:ox*CELL,y:ROW_Y(r),w:obj.w*CELL,h:CELL};
        if(fr.x<or.x+or.w&&fr.x+fr.w>or.x&&fr.y<or.y+or.h&&fr.y+fr.h>or.y){
          killFrog('car'); return;
        }
      }
    }
  }
}

function killFrog(cause){
  if(!frog.alive) return;
  frog.alive=false;
  explode((frog.col+0.5)*CELL,ROW_Y(frog.row)+CELL/2,'#00FF44',12);
  beep(200,0.4,'sawtooth',0.15,50);
  lives--;
  deadTimer=1.5; state=ST.DEAD;
}

function explode(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.7,col:col||'#fff'});
  }
}

// ---- Draw ----
function drawFrog(col,row,leaping,dc,dr,alive){
  if(!alive&&state!==ST.DEAD) return;
  let px,py;
  if(leapAnim.active){
    px=lerp(leapAnim.px,leapAnim.tx,easeInOut(leapAnim.t))*CELL;
    py=ROW_Y(lerp(leapAnim.py,leapAnim.ty,easeInOut(leapAnim.t)));
    // Bounce arc
    const arc=Math.sin(leapAnim.t*Math.PI)*8;
    py-=arc;
  } else {
    px=col*CELL; py=ROW_Y(row);
  }
  const flash=!alive&&Math.floor(totalTime*8)%2===0;
  ctx.fillStyle=flash?'#ff4444':'#00CC44';
  // Body
  ctx.fillRect(px+8,py+10,CELL-16,CELL-14);
  // Head
  ctx.fillRect(px+10,py+4,CELL-20,10);
  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(px+10,py+4,5,5); ctx.fillRect(px+25,py+4,5,5);
  ctx.fillStyle='#000';
  ctx.fillRect(px+12,py+6,3,3); ctx.fillRect(px+27,py+6,3,3);
  // Legs
  ctx.fillStyle='#00AA33';
  ctx.fillRect(px+4,py+14,6,8); ctx.fillRect(px+30,py+14,6,8);
  ctx.fillRect(px+6,py+24,8,6); ctx.fillRect(px+26,py+24,8,6);
}

function easeInOut(t){ return t<0.5?2*t*t:1-(-2*t+2)**2/2; }

function drawCar(x,y,w,col){
  ctx.fillStyle=col;
  ctx.fillRect(x+2,y+8,w-4,CELL-14);
  ctx.fillRect(x+8,y+4,w-16,10);
  ctx.fillStyle='#ffff88';
  if(w>CELL){ ctx.fillRect(x+2,y+10,6,8); ctx.fillRect(x+w-8,y+10,6,8); }
  ctx.fillStyle='#333';
  ctx.fillRect(x+4,y+CELL-10,8,6); ctx.fillRect(x+w-12,y+CELL-10,8,6);
}

function drawLog(x,y,w){
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(x+1,y+6,w-2,CELL-12);
  ctx.fillStyle='#A0704A';
  ctx.fillRect(x+1,y+6,w-2,5);
  ctx.fillStyle='#6B4423';
  for(let i=0;i<Math.floor(w/CELL);i++){
    ctx.fillRect(x+i*CELL+15,y+12,4,CELL-22);
  }
}

function drawTurtle(x,y,w,divePhase){
  if(divePhase===3){ // submerged
    ctx.fillStyle='rgba(0,120,200,0.4)';
    ctx.fillRect(x+2,y+8,w-4,CELL-14);
    return;
  }
  const sinkY=divePhase===2?4:0;
  const n=Math.floor(w/CELL);
  for(let i=0;i<n;i++){
    const tx=x+i*CELL;
    ctx.fillStyle=divePhase===2?'#1a8a3a':'#2ECC40';
    ctx.beginPath(); ctx.ellipse(tx+CELL/2,y+CELL/2+sinkY,14,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#27AE60';
    ctx.beginPath(); ctx.ellipse(tx+CELL/2,y+CELL/2+sinkY,8,6,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle='#2ECC40';
    ctx.fillRect(tx+CELL/2-4,y+4+sinkY,8,8);
    // Legs
    ctx.fillRect(tx+4,y+14+sinkY,6,8); ctx.fillRect(tx+CELL-10,y+14+sinkY,6,8);
  }
}

function drawRow(lane,r){
  const py=ROW_Y(r);
  if(lane.type==='safe'){
    ctx.fillStyle='#3a5a1a';
    ctx.fillRect(0,py,W,CELL);
  } else if(lane.type==='goal'){
    ctx.fillStyle='#001a44';
    ctx.fillRect(0,py,W,CELL);
    // Draw home bays
    for(const h of homes){
      const hx=h.c*CELL;
      if(h.filled){
        ctx.fillStyle='#00cc44';
        ctx.fillRect(hx+4,py+4,CELL-8,CELL-8);
        ctx.fillStyle='#00ff66'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
        ctx.fillText('🐸',hx+CELL/2,py+CELL/2+4);
      } else {
        ctx.fillStyle='#002288';
        ctx.fillRect(hx+4,py+4,CELL-8,CELL-8);
        ctx.strokeStyle='#0044ff'; ctx.lineWidth=1.5;
        ctx.strokeRect(hx+4,py+4,CELL-8,CELL-8);
      }
    }
    // Dividers
    ctx.fillStyle='#3a5a1a';
    for(let c=0;c<COLS;c++){
      if(!HOME_COLS.includes(c)){ ctx.fillRect(c*CELL,py,CELL,CELL); }
    }
  } else if(lane.type==='road'){
    ctx.fillStyle='#2a2a2a';
    ctx.fillRect(0,py,W,CELL);
    ctx.fillStyle='#555'; ctx.fillRect(0,py+CELL-3,W,3);
    // Lane markings
    if(r>1&&r<5){ ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(0,py,W,2); }
    // Cars
    for(const obj of lane.objs){
      for(const off of [0,COLS,-COLS]){
        const ox=((obj.x+off)%COLS+COLS)%COLS;
        if(ox*CELL>-obj.w*CELL&&ox*CELL<W+CELL){
          drawCar(ox*CELL,py,obj.w*CELL,obj.col);
        }
      }
    }
  } else if(lane.type==='river'){
    ctx.fillStyle='#003388';
    ctx.fillRect(0,py,W,CELL);
    // Water shimmer
    ctx.fillStyle='rgba(0,80,200,0.3)';
    for(let i=0;i<6;i++) ctx.fillRect(i*80+Math.sin(totalTime*2+i)*20,py+8,30,4);
    // Objects
    for(const obj of lane.objs){
      for(const off of [0,COLS,-COLS]){
        const ox=((obj.x+off)%COLS+COLS)%COLS;
        if(ox*CELL>-obj.w*CELL&&ox*CELL<W+CELL){
          if(obj.type==='log') drawLog(ox*CELL,py,obj.w*CELL);
          else drawTurtle(ox*CELL,py,obj.w*CELL,obj.divePhase||0);
        }
      }
    }
  }
}

function render(){
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);

  if(state===ST.TITLE){
    ctx.fillStyle='#00cc44'; ctx.font='bold 56px monospace'; ctx.textAlign='center';
    ctx.fillText('FROGGER',W/2,200);
    ctx.fillStyle='#fff'; ctx.font='20px monospace';
    ctx.fillText('Press SPACE to start',W/2,290);
    ctx.fillStyle='#888'; ctx.font='13px monospace';
    ctx.fillText('Arrow keys or WASD to move',W/2,335);
    ctx.fillStyle='#ffff44'; ctx.font='14px monospace';
    ctx.fillText('Best: '+hiScore,W/2,400);
    return;
  }

  // Draw rows
  for(let r=0;r<ROWS;r++) drawRow(lanes[r],r);

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  // Frog
  drawFrog(frog.col,frog.row,leapAnim.active,leapAnim.dc,leapAnim.dr,frog.alive);

  // HUD
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,HUD);
  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
  ctx.fillText(score,4,15);
  ctx.textAlign='center'; ctx.fillStyle='#888'; ctx.font='12px monospace';
  ctx.fillText('HI: '+hiScore,W/2,15);
  ctx.fillStyle='#00cc44'; ctx.textAlign='right'; ctx.font='bold 13px monospace';
  ctx.fillText('🐸'.repeat(Math.max(0,lives)),W-4,15);
  // Timer bar
  const tbw=(timeLeft/timeMax)*(W-8);
  ctx.fillStyle='#333'; ctx.fillRect(0,H-8,W,8);
  ctx.fillStyle=timeLeft>10?'#00ff44':timeLeft>5?'#ffaa00':'#ff2222';
  ctx.fillRect(0,H-8,tbw,8);

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font='16px monospace'; ctx.fillStyle='#aaa';
    ctx.fillText('SPACE or P to resume',W/2,H/2+35);
  }

  if(state===ST.NEXTLEVEL){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ff44'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('LEVEL '+(level+1)+'!',W/2,H/2-10);
    ctx.fillStyle='#fff'; ctx.font='18px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+35);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF4444'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-45);
    ctx.fillStyle='#fff'; ctx.font='20px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+15);
    ctx.fillStyle='#aaa'; ctx.font='15px monospace';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+60);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
