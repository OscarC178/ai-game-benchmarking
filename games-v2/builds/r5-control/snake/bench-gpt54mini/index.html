<!--
  GAME:      Snake
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Snake</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #container{width:90vmin;height:90vmin;max-width:600px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#080808}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;white-space:pre-wrap;text-align:center;pointer-events:none}
  #hud{position:absolute;left:8px;top:8px;color:#fff;font-family:monospace;font-size:14px;pointer-events:none}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="hud"></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const HUD = document.getElementById('hud'); const OVERLAY = document.getElementById('overlay');

  const COLS = 20, ROWS = 20, CELL = 30; const WIDTH = COLS*CELL, HEIGHT = ROWS*CELL;
  const START_LEN = 3; const START_POS = {x:10,y:10}; const START_DIR = {x:1,y:0};
  const START_TICK_MS = 150; const MIN_TICK_MS = 60; const TICK_DEC = 5; const SCORE_PER = 10;

  let gameState='title'; let snake=[]; let dir={...START_DIR}; let queued=null; let queuedThis=false; let food=null; let score=0; let high=0; let tickMs=START_TICK_MS; let last=performance.now(); let acc=0;

  // audio
  let audioCtx=null, audioOk=false; function unlock(){ if(audioOk) return; audioOk=true; audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', unlock, {once:true}); window.addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); }, {once:true});
  function beep(freq,dur=0.08,type='sine'){ if(!audioOk) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }

  try{ const s=localStorage.getItem('snake_r5'); if(s) high=parseInt(s,10)||0; }catch(e){ high=0; }
  function saveHigh(){ try{ localStorage.setItem('snake_r5',String(high)); }catch(e){} }

  function resetAll(){ snake=[]; dir={...START_DIR}; queued=null; queuedThis=false; food=null; score=0; tickMs=START_TICK_MS; gameState='title'; overlayText(title()); }
  function initSnake(){ snake=[]; for(let i=0;i<START_LEN;i++) snake.push({x:START_POS.x - i, y:START_POS.y}); dir={...START_DIR}; queued=null; queuedThis=false; }
  function startGame(){ initSnake(); placeFood(); score=0; tickMs=START_TICK_MS; gameState='playing'; overlayText(''); last=performance.now(); acc=0; }

  function title(){ return 'SNAKE\n\nArrow keys or WASD to move\nPress Enter to Start\nSpace to Pause'; }
  function gameOverText(){ return 'GAME OVER\nScore: '+score+'\nPress Enter to Restart'; }
  function winText(){ return 'YOU WIN!\nScore: '+score+'\nPress Enter to Play Again'; }

  function placeFood(){ const occupied=new Set(snake.map(s=>s.x+','+s.y)); if(occupied.size>=COLS*ROWS){ food=null; gameState='win'; overlayText(winText()); if(score>high){ high=score; saveHigh(); } beep(1000,0.2); return; } const empties=[]; for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){ const k=x+','+y; if(!occupied.has(k)) empties.push({x,y}); } if(empties.length===0){ food=null; gameState='win'; overlayText(winText()); if(score>high){ high=score; saveHigh(); } return; } food=empties[Math.floor(Math.random()*empties.length)]; }

  const keyMap={'ArrowUp':{x:0,y:-1},'w':{x:0,y:-1},'W':{x:0,y:-1},'ArrowDown':{x:0,y:1},'s':{x:0,y:1},'S':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'a':{x:-1,y:0},'A':{x:-1,y:0},'ArrowRight':{x:1,y:0},'d':{x:1,y:0},'D':{x:1,y:0}};
  window.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ if(gameState==='title') startGame(); else if(gameState==='gameover'||gameState==='win') startGame(); e.preventDefault(); return; }
    if(e.key===' '){ if(gameState==='playing'){ gameState='paused'; overlayText('PAUSED\nPress Space to Resume'); } else if(gameState==='paused'){ gameState='playing'; overlayText(''); last=performance.now(); } e.preventDefault(); return; }
    if(e.key==='r'||e.key==='R'){ startGame(); return; }
    if(e.key==='Escape'){ resetAll(); return; }
    if(e.key==='p'||e.key==='P'){ if(gameState==='playing'){ gameState='paused'; overlayText('PAUSED\nPress P to Resume'); } else if(gameState==='paused'){ gameState='playing'; overlayText(''); last=performance.now(); } return; }
    if(gameState!=='playing') return; const d=keyMap[e.key]; if(!d) return; const effective = queued||dir; if(d.x===-effective.x && d.y===-effective.y) return; if(!queuedThis){ queued=d; queuedThis=true; }
  });
  window.addEventListener('blur', ()=>{ queued=null; queuedThis=false; });

  function inBounds(p){ return p.x>=0 && p.x<COLS && p.y>=0 && p.y<ROWS; }
  function eq(a,b){ return a.x===b.x && a.y===b.y; }

  function tick(){ if(queued){ dir=queued; queued=null; } queuedThis=false; const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y}; if(!inBounds(head)){ gameState='gameover'; overlayText(gameOverText()); playDie(); if(score>high){ high=score; saveHigh(); } return; } const willEat = food && head.x===food.x && head.y===food.y; for(let i=0;i<snake.length;i++){ const s=snake[i]; if(s.x===head.x && s.y===head.y){ if(i===snake.length-1 && !willEat) break; gameState='gameover'; overlayText(gameOverText()); playDie(); if(score>high){ high=score; saveHigh(); } return; } } snake.unshift(head); if(willEat){ score+=SCORE_PER; playEat(); tickMs = Math.max(MIN_TICK_MS, tickMs - TICK_DEC); placeFood(); } else snake.pop(); if(snake.length>=COLS*ROWS){ gameState='win'; overlayText(winText()); if(score>high){ high=score; saveHigh(); } playEat(); }
  }

  function playEat(){ beep(800,0.12,'sine'); }
  function playDie(){ beep(160,0.5,'sawtooth'); }

  function render(){ ctx.fillStyle='#080808'; ctx.fillRect(0,0,WIDTH,HEIGHT); // grid
    ctx.strokeStyle='#151515'; ctx.lineWidth=1; for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,HEIGHT); ctx.stroke(); } for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(WIDTH,y*CELL); ctx.stroke(); }
    // food
    if(food){ const fx=food.x*CELL, fy=food.y*CELL, size= CELL*0.7, off=(CELL-size)/2; ctx.fillStyle='#ff0000'; roundRect(ctx,fx+off,fy+off,size,size,6); ctx.fill(); }
    // snake
    for(let i=snake.length-1;i>=0;i--){ const s=snake[i]; const px=s.x*CELL, py=s.y*CELL; if(i===0){ ctx.fillStyle='#00ff00'; roundRect(ctx,px+2,py+2,CELL-4,CELL-4,6); ctx.fill(); ctx.fillStyle='#002200'; const es=4; let ex=px+6,ey=py+6; if(dir.x>0){ ex=px+CELL-9; ey=py+8; } else if(dir.x<0){ ex=px+6; ey=py+8; } else if(dir.y>0){ ex=px+CELL-9; ey=py+CELL-9; } else { ex=px+6; ey=py+6; } ctx.fillRect(ex,ey,es,es); } else { const t=i/(snake.length-1||1); const g=Math.floor(200 - t*140); ctx.fillStyle='rgb(0,'+g+',0)'; roundRect(ctx,px+3,py+3,CELL-6,CELL-6,5); ctx.fill(); } }
    HUD.innerText = 'Score: '+score+'\nBest: '+high+'\nSpeed: '+Math.round(1000/tickMs)+' tps';
  }

  function overlayText(t){ OVERLAY.textContent = t || ''; }
  function title(){ return 'SNAKE\n\nUse Arrow keys or WASD\nPress Enter to Start'; }
  function roundRect(c,x,y,w,h,r){ const m=Math.min(w,h)/2; if(r>m) r=m; c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

  // main loop
  function loop(now){ const dt = Math.min(0.1,(now-last)/1000); last=now; if(gameState==='playing'){ acc += dt*1000; while(acc >= tickMs){ acc -= tickMs; tick(); queuedThis=false; } } render(); requestAnimationFrame(loop); }

  // init
  resetAll(); last = performance.now(); requestAnimationFrame(loop);

})();
</script>
</body>
</html>
