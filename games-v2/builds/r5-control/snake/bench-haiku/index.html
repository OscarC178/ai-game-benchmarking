<!--
  GAME:      Snake
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas" width="600" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    const GRID_SIZE = 20;
    const CELL_SIZE = 30;
    const WIDTH = 600;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
    let tickCount = 0;
    const tickInterval = 10; // 10 ticks per second

    // Snake
    let snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };

    // Food
    let food = { x: 15, y: 15 };

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState === STATES.GAME_OVER) {
          startGame();
        }
      }

      // Direction changes
      if (gameState === STATES.PLAYING || gameState === STATES.PAUSED) {
        if (key === 'arrowup' || key === 'w') {
          if (direction.y === 0) nextDirection = { x: 0, y: -1 };
        }
        if (key === 'arrowdown' || key === 's') {
          if (direction.y === 0) nextDirection = { x: 0, y: 1 };
        }
        if (key === 'arrowleft' || key === 'a') {
          if (direction.x === 0) nextDirection = { x: -1, y: 0 };
        }
        if (key === 'arrowright' || key === 'd') {
          if (direction.x === 0) nextDirection = { x: 1, y: 0 };
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      tickCount = 0;
      spawnFood();
      gameState = STATES.PLAYING;
    }

    function spawnFood() {
      let validCells = [];
      for (let x = 0; x < GRID_SIZE; x++) {
        for (let y = 0; y < GRID_SIZE; y++) {
          let occupied = false;
          for (let segment of snake) {
            if (segment.x === x && segment.y === y) {
              occupied = true;
              break;
            }
          }
          if (!occupied) {
            validCells.push({ x, y });
          }
        }
      }

      if (validCells.length === 0) {
        gameState = STATES.GAME_OVER;
        return;
      }

      food = validCells[Math.floor(Math.random() * validCells.length)];
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      tickCount++;
      if (tickCount < tickInterval) return;
      tickCount = 0;

      // Update direction
      direction = nextDirection;

      // Move snake
      const head = snake[0];
      const newHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      // Wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameState = STATES.GAME_OVER;
        return;
      }

      // Self collision
      for (let segment of snake) {
        if (newHead.x === segment.x && newHead.y === segment.y) {
          gameState = STATES.GAME_OVER;
          return;
        }
      }

      // Add new head
      snake.unshift(newHead);

      // Check food
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
        }
        spawnFood();
      } else {
        // Remove tail if no food eaten
        snake.pop();
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw grid
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, HEIGHT);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(WIDTH, pos);
        ctx.stroke();
      }

      // Draw snake
      ctx.fillStyle = '#00FF00';
      for (let i = 0; i < snake.length; i++) {
        const x = snake[i].x * CELL_SIZE;
        const y = snake[i].y * CELL_SIZE;
        ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);

        // Head eye
        if (i === 0) {
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#00FF00';
        }
      }

      // Draw food
      ctx.fillStyle = '#FF0000';
      const foodX = food.x * CELL_SIZE;
      const foodY = food.y * CELL_SIZE;
      ctx.fillRect(foodX + 3, foodY + 3, CELL_SIZE - 6, CELL_SIZE - 6);

      // Draw score
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'right';
      ctx.fillText('High: ' + highScore, WIDTH - 10, 25);

      // Draw game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SNAKE', WIDTH / 2, 150);

        ctx.font = '20px Arial';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);
        ctx.font = '16px Arial';
        ctx.fillText('Arrow keys or WASD to move', WIDTH / 2, 330);
        ctx.fillText('Space to pause', WIDTH / 2, 360);
        ctx.fillText('R to restart', WIDTH / 2, 390);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '20px Arial';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '28px Arial';
        ctx.fillText('Score: ' + score, WIDTH / 2, 240);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 290);

        ctx.font = '20px Arial';
        ctx.fillText('Press R to play again', WIDTH / 2, 380);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
