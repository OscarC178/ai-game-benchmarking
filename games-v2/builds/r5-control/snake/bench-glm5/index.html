<!--
  GAME:      Snake
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 600;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    const GRID = 20;
    const COLS = W / GRID;
    const ROWS = H / GRID;
    
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snake_highscore') || '0');
    let level = 1;
    
    let snake = [];
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let moveTimer = 0;
    let moveInterval = 100;
    
    const keys = {};
    
    function initGame() {
      snake = [
        { x: 5, y: Math.floor(ROWS / 2) },
        { x: 4, y: Math.floor(ROWS / 2) },
        { x: 3, y: Math.floor(ROWS / 2) }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      moveInterval = 100;
      spawnFood();
    }
    
    function spawnFood() {
      let valid = false;
      while (!valid) {
        food.x = Math.floor(Math.random() * COLS);
        food.y = Math.floor(Math.random() * ROWS);
        valid = !snake.some(s => s.x === food.x && s.y === food.y);
      }
    }
    
    function update(dt) {
      if (state !== STATE_PLAYING) return;
      
      // Input
      if ((keys.up || keys.w) && dir.y === 0) nextDir = { x: 0, y: -1 };
      if ((keys.down || keys.s) && dir.y === 0) nextDir = { x: 0, y: 1 };
      if ((keys.left || keys.a) && dir.x === 0) nextDir = { x: -1, y: 0 };
      if ((keys.right || keys.d) && dir.x === 0) nextDir = { x: 1, y: 0 };
      
      moveTimer += dt * 1000;
      
      if (moveTimer >= moveInterval) {
        moveTimer = 0;
        dir = nextDir;
        
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        
        // Wall collision
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
          gameOver();
          return;
        }
        
        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          gameOver();
          return;
        }
        
        snake.unshift(head);
        
        // Eat food
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          if (score % 50 === 0) {
            level++;
            moveInterval = Math.max(50, moveInterval - 10);
          }
          spawnFood();
        } else {
          snake.pop();
        }
      }
    }
    
    function gameOver() {
      state = STATE_GAMEOVER;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_highscore', highScore);
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      // Grid
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 1;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, H);
        ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * GRID);
        ctx.lineTo(W, i * GRID);
        ctx.stroke();
      }
      
      if (state === STATE_TITLE) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SNAKE', W / 2, 200);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 320);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Use Arrow Keys or WASD to move', W / 2, 400);
        ctx.fillText('P to pause', W / 2, 430);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 520);
        return;
      }
      
      // Snake
      snake.forEach((seg, i) => {
        const green = Math.max(100, 255 - i * 3);
        ctx.fillStyle = `rgb(0, ${green}, 0)`;
        ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
        
        if (i === 0) {
          // Eyes
          ctx.fillStyle = '#FFF';
          const eyeOffset = 4;
          const eyeSize = 4;
          if (dir.x === 1) {
            ctx.fillRect(seg.x * GRID + GRID - eyeOffset, seg.y * GRID + 4, eyeSize, eyeSize);
            ctx.fillRect(seg.x * GRID + GRID - eyeOffset, seg.y * GRID + GRID - 8, eyeSize, eyeSize);
          } else if (dir.x === -1) {
            ctx.fillRect(seg.x * GRID + eyeOffset - eyeSize, seg.y * GRID + 4, eyeSize, eyeSize);
            ctx.fillRect(seg.x * GRID + eyeOffset - eyeSize, seg.y * GRID + GRID - 8, eyeSize, eyeSize);
          } else if (dir.y === -1) {
            ctx.fillRect(seg.x * GRID + 4, seg.y * GRID + eyeOffset - eyeSize, eyeSize, eyeSize);
            ctx.fillRect(seg.x * GRID + GRID - 8, seg.y * GRID + eyeOffset - eyeSize, eyeSize, eyeSize);
          } else {
            ctx.fillRect(seg.x * GRID + 4, seg.y * GRID + GRID - eyeOffset, eyeSize, eyeSize);
            ctx.fillRect(seg.x * GRID + GRID - 8, seg.y * GRID + GRID - eyeOffset, eyeSize, eyeSize);
          }
        }
      });
      
      // Food
      ctx.fillStyle = '#F00';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Score
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 30);
      ctx.textAlign = 'right';
      ctx.fillText('Level: ' + level, W - 10, 30);
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        
        if (score >= highScore && score > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 28px Arial';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
        }
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 130);
      }
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key.toLowerCase()] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE) {
        state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key.toLowerCase()] = false;
    });
    
    Object.defineProperty(keys, 'up', { get() { return this['ArrowUp'] || this['w']; } });
    Object.defineProperty(keys, 'down', { get() { return this['ArrowDown'] || this['s']; } });
    Object.defineProperty(keys, 'left', { get() { return this['ArrowLeft'] || this['a']; } });
    Object.defineProperty(keys, 'right', { get() { return this['ArrowRight'] || this['d']; } });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
