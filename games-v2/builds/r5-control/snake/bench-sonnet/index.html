<!--
  GAME:      Snake
  RUN:       r5-control
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 620;
const CELL = 20, COLS = 30, ROWS = 30;
canvas.width = W; canvas.height = H;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
}
window.addEventListener('resize', resize); resize();

// ---- State ----
const ST = { TITLE:0, PLAYING:1, PAUSED:2, GAMEOVER:3 };
let state = ST.TITLE;
let snake, dir, nextDir, food, score, hiScore, tickMs, tickTimer, foodCount;
hiScore = parseInt(localStorage.getItem('snk5_hi')||'0');
let totalTime = 0;

function initGame(){
  snake = [{x:15,y:15},{x:14,y:15},{x:13,y:15}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; foodCount = 0; tickMs = 150; tickTimer = 0;
  placeFood();
  state = ST.PLAYING;
}

function placeFood(){
  let pos;
  do {
    pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
  } while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]){
    if(k===' '){
      if(state===ST.TITLE) initGame();
      else if(state===ST.PLAYING) state=ST.PAUSED;
      else if(state===ST.PAUSED) state=ST.PLAYING;
    }
    if((k==='r'||k==='R') && state!==ST.TITLE){ initGame(); }
    if(k==='Escape') state=ST.TITLE;
    // Direction
    if(state===ST.PLAYING){
      if((k==='ArrowUp'||k==='w'||k==='W')    && dir.y!==1)  nextDir={x:0,y:-1};
      if((k==='ArrowDown'||k==='s'||k==='S')  && dir.y!==-1) nextDir={x:0,y:1};
      if((k==='ArrowLeft'||k==='a'||k==='A')  && dir.x!==1)  nextDir={x:-1,y:0};
      if((k==='ArrowRight'||k==='d'||k==='D') && dir.x!==-1) nextDir={x:1,y:0};
    }
  }
  keys[k]=true;
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ---- Update ----
function tick(){
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // Wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ die(); return; }
  // Self collision (all but tail, which will move)
  for(let i=0;i<snake.length-1;i++){
    if(snake[i].x===head.x&&snake[i].y===head.y){ die(); return; }
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10; foodCount++;
    if(score>hiScore){ hiScore=score; localStorage.setItem('snk5_hi',hiScore); }
    tickMs=Math.max(70, 150-Math.floor(foodCount/5)*10);
    placeFood();
  } else {
    snake.pop();
  }
}

function die(){
  state=ST.GAMEOVER;
  if(score>hiScore){ hiScore=score; localStorage.setItem('snk5_hi',hiScore); }
}

let lastTime=0;
function update(now){
  const dt = now-lastTime; lastTime=now; totalTime+=dt/1000;
  if(state===ST.PLAYING){
    tickTimer+=dt;
    while(tickTimer>=tickMs){ tickTimer-=tickMs; tick(); if(state!==ST.PLAYING) break; }
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1;
  for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,ROWS*CELL); ctx.stroke(); }
  for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(COLS*CELL,y*CELL); ctx.stroke(); }

  if(state===ST.TITLE){
    ctx.fillStyle='#00ff00'; ctx.font='bold 64px monospace'; ctx.textAlign='center';
    ctx.fillText('SNAKE',W/2,200);
    ctx.fillStyle='#fff'; ctx.font='20px monospace';
    ctx.fillText('Press SPACE to start',W/2,290);
    ctx.fillStyle='#666'; ctx.font='14px monospace';
    ctx.fillText('Arrow keys or WASD to move',W/2,335);
    ctx.fillStyle='#888'; ctx.font='15px monospace';
    ctx.fillText('Best: '+hiScore,W/2,400);
    return;
  }

  // Food
  const pulse=0.85+Math.sin(totalTime*5)*0.15;
  const fr=CELL/2*pulse;
  ctx.fillStyle='#ff3333';
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, fr, 0, Math.PI*2); ctx.fill();

  // Snake
  for(let i=snake.length-1;i>=0;i--){
    const seg=snake[i];
    const t=i/snake.length;
    const g=i===0?255:Math.round(200-t*80);
    ctx.fillStyle=i===0?'#44ff44':`rgb(0,${g},0)`;
    const pad=2;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, 4);
    ctx.fill();
    // Eyes on head
    if(i===0){
      const cx=seg.x*CELL+CELL/2, cy=seg.y*CELL+CELL/2;
      const ex=dir.x*6, ey=dir.y*6;
      const px=dir.y!==0?5:0, py=dir.x!==0?5:0;
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(cx+ex+px,cy+ey+py,2.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex-px,cy+ey-py,2.5,0,Math.PI*2); ctx.fill();
    }
  }

  // HUD
  ctx.fillStyle='#000'; ctx.fillRect(0,ROWS*CELL,W,H-ROWS*CELL);
  ctx.fillStyle='#fff'; ctx.font='bold 18px monospace'; ctx.textAlign='left';
  ctx.fillText('Score: '+score, 8, ROWS*CELL+22);
  ctx.fillStyle='#555'; ctx.textAlign='right'; ctx.font='14px monospace';
  ctx.fillText('Best: '+hiScore, W-8, ROWS*CELL+22);

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,ROWS*CELL);
    ctx.fillStyle='#fff'; ctx.font='bold 44px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,ROWS*CELL/2-10);
    ctx.font='18px monospace'; ctx.fillStyle='#aaa';
    ctx.fillText('SPACE to resume  |  R to restart',W/2,ROWS*CELL/2+35);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,ROWS*CELL);
    ctx.fillStyle='#ff4444'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,ROWS*CELL/2-40);
    ctx.fillStyle='#fff'; ctx.font='22px monospace';
    ctx.fillText('Score: '+score,W/2,ROWS*CELL/2+10);
    if(score>=hiScore&&score>0){ ctx.fillStyle='#FFD700'; ctx.font='16px monospace'; ctx.fillText('New High Score!',W/2,ROWS*CELL/2+40); }
    ctx.fillStyle='#aaa'; ctx.font='16px monospace';
    ctx.fillText('R to play again  |  ESC for title',W/2,ROWS*CELL/2+80);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
