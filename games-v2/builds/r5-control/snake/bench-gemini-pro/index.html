<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background-color: #000;
            border: 2px solid #444;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            font-size: 20px;
        }
        #controls {
            margin-top: 15px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Score: <span id="scoreVal">0</span></div>
        <div>High Score: <span id="highVal">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="controls">
        Use ARROW KEYS or WASD to move.<br>
        Press SPACE to pause/resume.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const highEl = document.getElementById('highVal');

        // Game Constants
        const GRID_SIZE = 20; // 20x20 grid = 400px
        const TILE_SIZE = canvas.width / GRID_SIZE;

        // State variables
        let snake = [];
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHigh') || 0;
        let gameStatus = 'START'; // START, PLAYING, PAUSED, GAMEOVER
        let speed = 100; // ms per tick
        let lastTime = 0;

        highEl.innerText = highScore;

        function resetGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;
            score = 0;
            speed = 120; // reset to base speed
            scoreEl.innerText = score;
            spawnFood();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                valid = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === ' ') {
                if (gameStatus === 'START' || gameStatus === 'GAMEOVER') {
                    resetGame();
                    gameStatus = 'PLAYING';
                    lastTime = performance.now();
                } else if (gameStatus === 'PLAYING') {
                    gameStatus = 'PAUSED';
                } else if (gameStatus === 'PAUSED') {
                    gameStatus = 'PLAYING';
                    lastTime = performance.now(); // avoid big jump
                }
                return;
            }

            if (gameStatus !== 'PLAYING') return;

            // Prevent reversing
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                if (dy !== 1) { nextDx = 0; nextDy = -1; }
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                if (dy !== -1) { nextDx = 0; nextDy = 1; }
            } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                if (dx !== 1) { nextDx = -1; nextDy = 0; }
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                if (dx !== -1) { nextDx = 1; nextDy = 0; }
            }
        });

        function update() {
            if (gameStatus !== 'PLAYING') return;

            dx = nextDx;
            dy = nextDy;

            const head = { ...snake[0] };
            head.x += dx;
            head.y += dy;

            // Wrap around edges
            if (head.x < 0) head.x = GRID_SIZE - 1;
            if (head.x >= GRID_SIZE) head.x = 0;
            if (head.y < 0) head.y = GRID_SIZE - 1;
            if (head.y >= GRID_SIZE) head.y = 0;

            // Self collision check
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameStatus = 'GAMEOVER';
                    if (score > highScore) {
                        highScore = score;
                        highEl.innerText = highScore;
                        localStorage.setItem('snakeHigh', highScore);
                    }
                    return;
                }
            }

            snake.unshift(head);

            // Food check
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                // Increase speed slightly
                if (speed > 50) speed -= 2; 
                spawnFood();
            } else {
                snake.pop(); // Remove tail if not eating
            }
        }

        function draw() {
            // Bg
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameStatus === 'START') {
                drawOverlay("SNAKE", "Press SPACE to start", "#0F0");
                return;
            }

            // Food
            ctx.fillStyle = '#F00';
            ctx.fillRect(food.x * TILE_SIZE + 1, food.y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);

            // Snake
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                ctx.fillStyle = i === 0 ? '#0F0' : '#0A0'; // Head brighter
                ctx.fillRect(part.x * TILE_SIZE + 1, part.y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
            }

            if (gameStatus === 'PAUSED') {
                drawOverlay("PAUSED", "Press SPACE to resume", "#AAA");
            } else if (gameStatus === 'GAMEOVER') {
                drawOverlay("GAME OVER", "Press SPACE to restart", "#F00");
            }
        }

        function drawOverlay(title, subtitle, titleColor) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = titleColor;
            ctx.textAlign = 'center';
            ctx.font = 'bold 40px monospace';
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = '#FFF';
            ctx.font = '20px monospace';
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
        }

        function gameLoop(timestamp) {
            if (gameStatus === 'PLAYING') {
                if (timestamp - lastTime >= speed) {
                    update();
                    lastTime = timestamp;
                }
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Init
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
