<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .stats {
            margin-bottom: 10px;
            font-size: 24px;
            display: flex;
            gap: 20px;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .hidden { display: none; }
        h1 { font-size: 48px; color: #0f0; margin: 0; }
        p { font-size: 18px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highscore">0</span></div>
    </div>
    <div style="position: relative;">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="overlay">
            <h1 id="msg">SNAKE</h1>
            <p>Press <b>SPACE</b> to Start</p>
            <p>Use Arrows or WASD to move</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let highscore = localStorage.getItem('snake_highscore') || 0;
        let gameActive = false;
        let lastTime = 0;
        let moveTimer = 0;
        let gameSpeed = 100; // ms per move

        highscoreEl.innerText = highscore;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0; dy = -1;
            nextDx = 0; nextDy = -1;
            score = 0;
            scoreEl.innerText = score;
            gameSpeed = 100;
            spawnFood();
            gameActive = true;
            overlay.classList.add('hidden');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            // Ensure food doesn't spawn on snake
            if (snake.some(seg => seg.x === food.x && seg.y === food.y)) spawnFood();
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && !gameActive) init();
            
            const key = e.key.toLowerCase();
            if ((key === 'arrowup' || key === 'w') && dy === 0) { nextDx = 0; nextDy = -1; }
            if ((key === 'arrowdown' || key === 's') && dy === 0) { nextDx = 0; nextDy = 1; }
            if ((key === 'arrowleft' || key === 'a') && dx === 0) { nextDx = -1; nextDy = 0; }
            if ((key === 'arrowright' || key === 'd') && dx === 0) { nextDx = 1; nextDy = 0; }
        });

        function update() {
            // Apply buffered input
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) return endGame();

            // Self Collision
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) return endGame();

            snake.unshift(head);

            // Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                if (score > highscore) {
                    highscore = score;
                    highscoreEl.innerText = highscore;
                    localStorage.setItem('snake_highscore', highscore);
                }
                gameSpeed = Math.max(50, 100 - Math.floor(score / 50) * 5);
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#111';
            for(let i=0; i<TILE_COUNT; i++) {
                ctx.beginPath(); ctx.moveTo(i*GRID_SIZE, 0); ctx.lineTo(i*GRID_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*GRID_SIZE); ctx.lineTo(canvas.width, i*GRID_SIZE); ctx.stroke();
            }

            // Food
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();

            // Snake
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
                ctx.fillRect(seg.x * GRID_SIZE + 1, seg.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                if (i === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    if (dx !== 0) {
                        ctx.fillRect(seg.x*GRID_SIZE+TILE_COUNT, seg.y*GRID_SIZE+5, eyeSize, eyeSize);
                        ctx.fillRect(seg.x*GRID_SIZE+TILE_COUNT, seg.y*GRID_SIZE+12, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(seg.x*GRID_SIZE+5, seg.y*GRID_SIZE+5, eyeSize, eyeSize);
                        ctx.fillRect(seg.x*GRID_SIZE+12, seg.y*GRID_SIZE+5, eyeSize, eyeSize);
                    }
                }
            });
        }

        function endGame() {
            gameActive = false;
            msg.innerText = 'GAME OVER';
            overlay.classList.remove('hidden');
        }

        function gameLoop(now) {
            if (!gameActive) return;
            const delta = now - lastTime;
            lastTime = now;
            moveTimer += delta;

            if (moveTimer >= gameSpeed) {
                update();
                moveTimer = 0;
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        draw(); // Initial draw 
    </script>
</body>
</html>
