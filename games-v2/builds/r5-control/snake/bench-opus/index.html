<!--
  GAME:      Snake
  RUN:       r5-control
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=600,H=600,CS=20,COLS=W/CS,ROWS=H/CS;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0.04;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3;
let state=ST_TITLE;

let snake,dir,nextDir,food,score,hiScore,speed,moveTimer,growing;

hiScore=0;
try{const v=localStorage.getItem('sn5_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('sn5_best',String(hiScore));}catch(e){}}}

function placeFood(){
  let fx,fy;
  do{fx=Math.floor(Math.random()*COLS);fy=Math.floor(Math.random()*ROWS);}
  while(snake.some(s=>s.x===fx&&s.y===fy));
  food={x:fx,y:fy};
}

function startGame(){
  const cx0=Math.floor(COLS/2),cy0=Math.floor(ROWS/2);
  snake=[{x:cx0,y:cy0},{x:cx0-1,y:cy0},{x:cx0-2,y:cy0}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;speed=8;moveTimer=0;growing=0;
  placeFood();state=ST_PLAY;
}

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(state===ST_TITLE&&(e.code==='Space'||e.code==='Enter'))startGame();
  if(state===ST_OVER&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyR'))state=ST_TITLE;
  if(state===ST_PLAY){
    if(e.code==='KeyP'||e.code==='Escape')state=ST_PAUSE;
    if(e.code==='KeyR')startGame();
    // Direction — prevent 180° reversal
    if((e.code==='ArrowUp'||e.code==='KeyW')&&dir.y===0)nextDir={x:0,y:-1};
    if((e.code==='ArrowDown'||e.code==='KeyS')&&dir.y===0)nextDir={x:0,y:1};
    if((e.code==='ArrowLeft'||e.code==='KeyA')&&dir.x===0)nextDir={x:-1,y:0};
    if((e.code==='ArrowRight'||e.code==='KeyD')&&dir.x===0)nextDir={x:1,y:0};
  }
  if(state===ST_PAUSE){
    if(e.code==='KeyP'||e.code==='Escape')state=ST_PLAY;
    if(e.code==='KeyR')startGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  if(state!==ST_PLAY)return;

  moveTimer+=dt;
  const interval=1/speed;
  if(moveTimer<interval)return;
  moveTimer-=interval;

  dir=nextDir;
  const head=snake[0];
  const nx=head.x+dir.x,ny=head.y+dir.y;

  // Wall collision
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS){
    state=ST_OVER;saveHi();beep(100,0.2);return;
  }

  // Self collision
  if(snake.some(s=>s.x===nx&&s.y===ny)){
    state=ST_OVER;saveHi();beep(100,0.2);return;
  }

  snake.unshift({x:nx,y:ny});

  // Food
  if(nx===food.x&&ny===food.y){
    score+=10;saveHi();growing+=1;
    speed=Math.min(20,8+Math.floor(score/30));
    beep(600,0.04);
    placeFood();
  }

  if(growing>0)growing--;
  else snake.pop();
}

function render(now){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#0f0';cx.font='bold 56px monospace';cx.textAlign='center';
    cx.fillText('SNAKE',W/2,200);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    cx.fillText('Arrow keys or WASD to move',W/2,280);
    cx.fillText('Eat food to grow. Don\'t hit walls or yourself!',W/2,310);
    cx.fillText('P to pause   R to restart',W/2,340);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to Start',W/2,420);
    if(hiScore>0){cx.fillStyle='#555';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,470);}
    return;
  }

  // Grid lines (subtle)
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CS){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<=H;y+=CS){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

  // Food
  const pulse=0.8+Math.sin(now*0.006)*0.2;
  cx.fillStyle='#f44';
  cx.beginPath();cx.arc(food.x*CS+CS/2,food.y*CS+CS/2,CS/2*pulse,0,Math.PI*2);cx.fill();

  // Snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const bright=Math.max(80,255-i*4);
    cx.fillStyle=i===0?'#0f0':`rgb(0,${bright},0)`;
    cx.fillRect(s.x*CS+1,s.y*CS+1,CS-2,CS-2);
  }

  // Eyes on head
  const h=snake[0];
  cx.fillStyle='#000';
  const ex=h.x*CS+CS/2,ey=h.y*CS+CS/2;
  cx.beginPath();cx.arc(ex+dir.x*4-dir.y*3,ey+dir.y*4-dir.x*3,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+dir.x*4+dir.y*3,ey+dir.y*4+dir.x*3,2,0,Math.PI*2);cx.fill();

  // HUD
  cx.fillStyle='#fff';cx.font='18px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,10,24);
  cx.textAlign='right';cx.fillText('Best: '+hiScore,W-10,24);
  cx.textAlign='center';cx.fillText('Length: '+snake.length,W/2,24);

  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillText('P to resume   R to restart',W/2,H/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score+'   Length: '+snake.length,W/2,H/2+5);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',W/2,H/2+70);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.1)dt=0.1;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
