<!--
  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Layout ----
const COLS=10, ROWS=6, BRICK_W=72, BRICK_H=22, BRICK_PAD=4;
const BRICK_OFF_X=16, BRICK_OFF_Y=50;
const PAD_W=110, PAD_H=14, PAD_Y=H-40, PAD_SPD=7;
const BALL_R=8, BALL_SPD0=6, MAX_SPD=11;
const WIN=11;

const ROW_COLORS=['#FF2222','#FF8800','#FFFF00','#00FF44','#0088FF','#CC44FF'];
const ROW_PTS=[70,60,50,40,30,20];

// ---- State ----
const ST={TITLE:0,ONPAD:1,PLAYING:2,PAUSED:3,GAMEOVER:4,WIN:5};
let state=ST.TITLE;
let score,hiScore,lives,bricks,pad,ball;
hiScore=parseInt(localStorage.getItem('brk5_hi')||'0');
let totalTime=0;

function makeBricks(){
  const arr=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    arr.push({
      x:BRICK_OFF_X+c*(BRICK_W+BRICK_PAD),
      y:BRICK_OFF_Y+r*(BRICK_H+BRICK_PAD),
      w:BRICK_W,h:BRICK_H,
      color:ROW_COLORS[r],pts:ROW_PTS[r],alive:true
    });
  }
  return arr;
}

function startGame(){
  score=0; lives=3;
  bricks=makeBricks();
  pad={x:W/2-PAD_W/2,y:PAD_Y,w:PAD_W,h:PAD_H,flash:0};
  placeBallOnPad();
  state=ST.ONPAD;
}

function placeBallOnPad(){
  ball={x:pad.x+PAD_W/2, y:PAD_Y-BALL_R-1, vx:0, vy:0, r:BALL_R};
}

function launch(){
  const angle=(-70+Math.random()*40)*Math.PI/180;
  const dir=Math.random()<0.5?1:-1;
  ball.vx=Math.cos(angle)*BALL_SPD0*dir;
  ball.vy=-Math.abs(Math.sin(angle)*BALL_SPD0)-2;
  state=ST.PLAYING;
}

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} }
function beep(freq,dur,type,gain){
  if(!AC)return;
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type||'square';o.frequency.value=freq;g.gain.setValueAtTime(gain||0.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur+0.02);}catch(e){}
}

// ---- Input ----
const keys={};
window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]){
    initAC();
    if(k===' '){
      if(state===ST.TITLE){ startGame(); }
      else if(state===ST.ONPAD){ launch(); }
      else if(state===ST.PLAYING){ state=ST.PAUSED; }
      else if(state===ST.PAUSED){ state=ST.PLAYING; }
    }
    if((k==='r'||k==='R') && state!==ST.TITLE){ startGame(); }
    if(k==='Escape'){ state=ST.TITLE; }
  }
  keys[k]=true;
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });
window.addEventListener('blur',()=>{ for(const k in keys)keys[k]=false; });

// ---- Update ----
function update(){
  if(state!==ST.PLAYING&&state!==ST.ONPAD) return;

  // Paddle
  if(keys['ArrowLeft']||keys['a']||keys['A']) pad.x=Math.max(0,pad.x-PAD_SPD);
  if(keys['ArrowRight']||keys['d']||keys['D']) pad.x=Math.min(W-PAD_W,pad.x+PAD_SPD);
  if(pad.flash>0) pad.flash--;

  if(state===ST.ONPAD){
    ball.x=pad.x+PAD_W/2; ball.y=PAD_Y-BALL_R-1;
    return;
  }

  // Ball
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Walls
  if(ball.x-ball.r<0){ ball.x=ball.r; ball.vx=Math.abs(ball.vx); beep(300,0.04,'square',0.08); }
  if(ball.x+ball.r>W){ ball.x=W-ball.r; ball.vx=-Math.abs(ball.vx); beep(300,0.04,'square',0.08); }
  if(ball.y-ball.r<0){ ball.y=ball.r; ball.vy=Math.abs(ball.vy); beep(300,0.04,'square',0.08); }

  // Paddle
  if(ball.vy>0&&ball.y+ball.r>=pad.y&&ball.y+ball.r<=pad.y+pad.h&&
     ball.x+ball.r>=pad.x&&ball.x-ball.r<=pad.x+PAD_W){
    const hit=((ball.x-(pad.x+PAD_W/2))/(PAD_W/2));
    const maxA=Math.PI/3;
    const angle=hit*maxA;
    const spd=Math.min(Math.sqrt(ball.vx**2+ball.vy**2)*1.02,MAX_SPD);
    ball.vx=Math.sin(angle)*spd;
    ball.vy=-Math.abs(Math.cos(angle)*spd);
    ball.y=pad.y-ball.r;
    pad.flash=6; beep(440,0.05,'square',0.1);
  }

  // Ball lost
  if(ball.y>H+20){
    beep(180,0.3,'sawtooth',0.15);
    lives--;
    if(lives<=0){ state=ST.GAMEOVER; if(score>hiScore){hiScore=score;localStorage.setItem('brk5_hi',hiScore);} }
    else { placeBallOnPad(); state=ST.ONPAD; }
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive) continue;
    const olx=(ball.x+ball.r)-b.x;
    const orx=(b.x+b.w)-( ball.x-ball.r);
    const oty=(ball.y+ball.r)-b.y;
    const oby=(b.y+b.h)-(ball.y-ball.r);
    if(olx>0&&orx>0&&oty>0&&oby>0){
      b.alive=false; score+=b.pts;
      if(score>hiScore){hiScore=score;localStorage.setItem('brk5_hi',hiScore);}
      const minX=Math.min(olx,orx),minY=Math.min(oty,oby);
      if(minX<minY){ ball.vx=-ball.vx; ball.x+=olx<orx?-1:1; }
      else { ball.vy=-ball.vy; ball.y+=oty<oby?-1:1; }
      const spd=Math.sqrt(ball.vx**2+ball.vy**2);
      const ns=Math.min(spd*1.005,MAX_SPD);
      const r=ns/spd; ball.vx*=r; ball.vy*=r;
      beep(500+b.pts*3,0.06,'square',0.1);
      break;
    }
  }

  // Win check
  if(bricks.every(b=>!b.alive)){
    if(score>hiScore){hiScore=score;localStorage.setItem('brk5_hi',hiScore);}
    state=ST.WIN;
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'sine',0.12),i*100));
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(state===ST.TITLE){
    ctx.fillStyle='#fff'; ctx.font='bold 64px sans-serif'; ctx.textAlign='center';
    ctx.fillText('BREAKOUT',W/2,210);
    ctx.font='20px sans-serif'; ctx.fillStyle='#ccc';
    ctx.fillText('Press SPACE to start',W/2,295);
    ctx.fillStyle='#777'; ctx.font='15px sans-serif';
    ctx.fillText('← → or A D to move  |  SPACE to launch/pause',W/2,340);
    ctx.fillStyle='#555'; ctx.font='14px sans-serif';
    ctx.fillText('Best: '+hiScore,W/2,400);
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive) continue;
    ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(b.x,b.y,b.w,4);
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(b.x,b.y+b.h-4,b.w,4);
  }

  // Paddle
  ctx.fillStyle=pad.flash>0?'#FFD700':'#fff';
  ctx.fillRect(pad.x,pad.y,PAD_W,PAD_H);
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(pad.x,pad.y,PAD_W,4);

  // Ball
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();

  // HUD
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif'; ctx.textAlign='left';
  ctx.fillText('Score: '+score, 8, H-10);
  ctx.textAlign='right';
  ctx.fillText('Lives: '+'♥'.repeat(lives), W-8, H-10);

  if(state===ST.ONPAD){
    ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='17px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Press SPACE to launch',W/2,H-65);
  }

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 52px sans-serif'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-15);
    ctx.font='20px sans-serif'; ctx.fillStyle='#aaa';
    ctx.fillText('SPACE to resume  |  R to restart',W/2,H/2+35);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF4444'; ctx.font='bold 58px sans-serif'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-45);
    ctx.fillStyle='#fff'; ctx.font='24px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+15);
    ctx.fillStyle='#aaa'; ctx.font='17px sans-serif';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+65);
  }

  if(state===ST.WIN){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700'; ctx.font='bold 56px sans-serif'; ctx.textAlign='center';
    ctx.fillText('YOU WIN!',W/2,H/2-45);
    ctx.fillStyle='#fff'; ctx.font='24px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+15);
    ctx.fillStyle='#aaa'; ctx.font='17px sans-serif';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+65);
  }
}

// ---- Loop ----
function loop(){
  requestAnimationFrame(loop);
  update(); render();
}
loop();

})();
</script>
</body>
</html>
