<!--
  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="breakoutCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('breakoutCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, VICTORY: 4 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('breakoutHighScore') || '0', 10);
    let lives = 3;

    // Paddle
    const paddle = { x: 340, y: 555, width: 120, height: 15, speed: 6 };

    // Ball
    let ball = { x: 400, y: 540, width: 10, height: 10, vx: 5, vy: -5, maxSpeed: 10 };

    // Bricks
    let bricks = [];
    const brickColors = [
      { color: '#FF0000', points: 70 },
      { color: '#FF8800', points: 60 },
      { color: '#FFFF00', points: 50 },
      { color: '#00FF00', points: 40 },
      { color: '#0088FF', points: 30 },
      { color: '#8800FF', points: 20 }
    ];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (e.key.toLowerCase() === 'r') {
        if (gameState === STATES.GAME_OVER || gameState === STATES.VICTORY) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      ball.x = 400;
      ball.y = 540;
      ball.vx = 5;
      ball.vy = -5;
      paddle.x = 340;
      initBricks();
      gameState = STATES.PLAYING;
    }

    function initBricks() {
      bricks = [];
      for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 10; col++) {
          bricks.push({
            x: 25 + col * 77,
            y: 50 + row * 27,
            width: 75,
            height: 25,
            color: brickColors[row].color,
            points: brickColors[row].points,
            alive: true
          });
        }
      }
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Paddle control
      if (keys['arrowleft'] || keys['a']) {
        paddle.x = Math.max(0, paddle.x - paddle.speed);
      }
      if (keys['arrowright'] || keys['d']) {
        paddle.x = Math.min(WIDTH - paddle.width, paddle.x + paddle.speed);
      }

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall collisions
      if (ball.x <= 0 || ball.x + ball.width >= WIDTH) {
        ball.vx *= -1;
        ball.x = Math.max(0, Math.min(WIDTH - ball.width, ball.x));
      }
      if (ball.y <= 0) {
        ball.vy *= -1;
        ball.y = 0;
      }

      // Paddle collision
      if (
        ball.x + ball.width >= paddle.x &&
        ball.x <= paddle.x + paddle.width &&
        ball.y + ball.height >= paddle.y &&
        ball.y <= paddle.y + paddle.height
      ) {
        ball.vy = -Math.abs(ball.vy);
        ball.y = paddle.y - ball.height;

        // Add angle based on hit position
        const hitPos = (ball.x + ball.width / 2 - paddle.x) / paddle.width;
        ball.vx = (hitPos - 0.5) * 8;
      }

      // Ball lost
      if (ball.y > HEIGHT) {
        lives--;
        if (lives <= 0) {
          gameState = STATES.GAME_OVER;
        } else {
          ball.x = 400;
          ball.y = 540;
          ball.vx = 5;
          ball.vy = -5;
        }
        return;
      }

      // Brick collisions
      for (let i = bricks.length - 1; i >= 0; i--) {
        const brick = bricks[i];
        if (!brick.alive) continue;

        if (
          ball.x + ball.width >= brick.x &&
          ball.x <= brick.x + brick.width &&
          ball.y + ball.height >= brick.y &&
          ball.y <= brick.y + brick.height
        ) {
          brick.alive = false;
          score += brick.points;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('breakoutHighScore', highScore);
          }

          // Determine collision side and bounce
          const overlapLeft = (ball.x + ball.width) - brick.x;
          const overlapRight = (brick.x + brick.width) - ball.x;
          const overlapTop = (ball.y + ball.height) - brick.y;
          const overlapBottom = (brick.y + brick.height) - ball.y;

          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            ball.vx *= -1;
          } else {
            ball.vy *= -1;
          }

          // Speed increase
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          if (speed < ball.maxSpeed) {
            const newSpeed = Math.min(speed * 1.02, ball.maxSpeed);
            ball.vx = (ball.vx / speed) * newSpeed;
            ball.vy = (ball.vy / speed) * newSpeed;
          }

          break;
        }
      }

      // Check victory
      if (bricks.every(b => !b.alive)) {
        gameState = STATES.VICTORY;
        score += 1000;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('breakoutHighScore', highScore);
        }
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw paddle
      ctx.fillStyle = '#FFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

      // Draw ball
      ctx.fillRect(ball.x, ball.y, ball.width, ball.height);

      // Draw bricks
      for (let brick of bricks) {
        if (brick.alive) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        }
      }

      // Draw score and lives
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('High: ' + highScore, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('BREAKOUT', WIDTH / 2, 150);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('← → or A D to move paddle', WIDTH / 2, 350);
        ctx.fillText('Space to pause', WIDTH / 2, 380);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 36px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '28px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 260);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 310);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      } else if (gameState === STATES.VICTORY) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('YOU WIN!', WIDTH / 2, 150);

        ctx.fillStyle = '#FFF';
        ctx.font = '28px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 260);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 310);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
