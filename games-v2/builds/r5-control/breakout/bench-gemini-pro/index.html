  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: monospace;
            color: #eee;
        }
        canvas {
            background-color: #000;
            border: 2px solid #555;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            image-rendering: crisp-edges;
        }
        #ui {
            width: 600px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        #controls {
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div>LIVES: <span id="livesVal">3</span></div>
        <div>LEVEL: <span id="levelVal">1</span></div>
    </div>

    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <div id="controls">
        Use LEFT/RIGHT arrows or A/D to move.<br>
        Press SPACE to start/pause.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const livesEl = document.getElementById('livesVal');
        const levelEl = document.getElementById('levelVal');

        // Game Constants
        const PADDLE_W = 80;
        const PADDLE_H = 10;
        const PADDLE_SPEED = 7;
        const BALL_R = 6;
        const BALL_BASE_SPEED = 4;
        
        // Brick constants
        const BRICK_ROWS_START = 5;
        const BRICK_COLS = 10;
        const BRICK_W = 54;
        const BRICK_H = 20;
        const BRICK_PAD = 4;
        const BRICK_OFFSET_TOP = 50;
        const BRICK_OFFSET_LEFT = 12;

        const BRICK_COLORS = ['#FF3333', '#FF9933', '#FFFF33', '#33FF33', '#3333FF'];

        // State
        let state = 'START'; // START, PLAYING, PAUSED, GAMEOVER, LEVEL_CLEAR, LIFE_LOST
        let score = 0;
        let lives = 3;
        let level = 1;
        let bricks = [];
        let numBricks = 0;

        let paddle = {
            x: canvas.width / 2 - PADDLE_W / 2,
            y: canvas.height - PADDLE_H - 10,
            w: PADDLE_W,
            h: PADDLE_H,
            dx: 0
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height - 30,
            dx: BALL_BASE_SPEED,
            dy: -BALL_BASE_SPEED,
            r: BALL_R,
            speed: BALL_BASE_SPEED
        };

        // Input
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = true;
            
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (state === 'START' || state === 'GAMEOVER') {
                    if (state === 'GAMEOVER') resetGameFull();
                    else state = 'PLAYING';
                } else if (state === 'PLAYING') {
                    state = 'PAUSED';
                } else if (state === 'PAUSED') {
                    state = 'PLAYING';
                } else if (state === 'LIFE_LOST') {
                    resetBall();
                    state = 'PLAYING';
                } else if (state === 'LEVEL_CLEAR') {
                    level++;
                    levelEl.innerText = level;
                    initBricks();
                    resetBall();
                    state = 'PLAYING';
                }
            }
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = false;
        });

        function updateUI() {
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            levelEl.innerText = level;
        }

        function initBricks() {
            bricks = [];
            let rows = Math.min(BRICK_ROWS_START + Math.floor(level / 2), 8); // Max 8 rows
            numBricks = rows * BRICK_COLS;
            
            for (let c = 0; c < BRICK_COLS; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    let bX = (c * (BRICK_W + BRICK_PAD)) + BRICK_OFFSET_LEFT;
                    let bY = (r * (BRICK_H + BRICK_PAD)) + BRICK_OFFSET_TOP;
                    
                    bricks[c][r] = { 
                        x: bX, 
                        y: bY, 
                        status: 1, 
                        color: BRICK_COLORS[r % BRICK_COLORS.length],
                        pts: (rows - r) * 10 // Higher bricks worth more
                    };
                }
            }
        }

        function resetBall() {
            paddle.x = canvas.width / 2 - PADDLE_W / 2;
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 30;
            ball.speed = BALL_BASE_SPEED + (level - 1) * 0.5; // Slightly faster each level
            
            // Randomish start angle pointing up
            let angle = -Math.PI / 4 - (Math.random() * Math.PI / 4); // Between -45 and -90
            if (Math.random() > 0.5) angle = -Math.PI - angle; // Flip to other side sometimes
            
            ball.dx = ball.speed * Math.cos(angle);
            ball.dy = ball.speed * Math.sin(angle);
        }

        function resetGameFull() {
            score = 0;
            lives = 3;
            level = 1;
            updateUI();
            initBricks();
            resetBall();
            state = 'PLAYING';
        }

        function checkLevelClear() {
            let allClear = true;
            for (let c = 0; c < BRICK_COLS; c++) {
                for (let r = 0; r < bricks[c].length; r++) {
                    if (bricks[c][r].status === 1) {
                        allClear = false;
                        break;
                    }
                }
            }
            if (allClear) {
                state = 'LEVEL_CLEAR';
            }
        }

        function collisionDetection() {
            for (let c = 0; c < BRICK_COLS; c++) {
                for (let r = 0; r < bricks[c].length; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        // Simple Circle-Rect AABB approximation
                        let testX = ball.x;
                        let testY = ball.y;

                        if (ball.x < b.x) testX = b.x;      // left edge
                        else if (ball.x > b.x + BRICK_W) testX = b.x + BRICK_W;   // right edge
                        
                        if (ball.y < b.y) testY = b.y;      // top edge
                        else if (ball.y > b.y + BRICK_H) testY = b.y + BRICK_H;   // bottom edge

                        let distX = ball.x - testX;
                        let distY = ball.y - testY;
                        let distance = Math.sqrt((distX*distX) + (distY*distY));

                        if (distance <= ball.r) {
                            // Hit!
                            b.status = 0;
                            score += b.pts;
                            updateUI();
                            
                            // Determine bounce direction
                            // If hit top/bottom, reverse Y. If hit side, reverse X.
                            // Hacky robust way: check which overlapping dist is smaller
                            let overlapX = ball.r - Math.abs(distX);
                            let overlapY = ball.r - Math.abs(distY);
                            
                            if (overlapX < overlapY && Math.abs(distX) > 0) {
                                ball.dx = -ball.dx;
                            } else {
                                ball.dy = -ball.dy;
                            }
                            
                            checkLevelClear();
                            return; // Only hit one brick per frame roughly
                        }
                    }
                }
            }
        }

        function update() {
            if (state !== 'PLAYING') return;

            // Move Paddle
            if ((keys.ArrowLeft || keys.a) && paddle.x > 0) {
                paddle.x -= PADDLE_SPEED;
            }
            if ((keys.ArrowRight || keys.d) && paddle.x < canvas.width - PADDLE_W) {
                paddle.x += PADDLE_SPEED;
            }

            // Move Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall Collisions
            if (ball.x - ball.r <= 0) {
                ball.x = ball.r;
                ball.dx = -ball.dx;
            } else if (ball.x + ball.r >= canvas.width) {
                ball.x = canvas.width - ball.r;
                ball.dx = -ball.dx;
            }

            if (ball.y - ball.r <= 0) {
                ball.y = ball.r;
                ball.dy = -ball.dy;
            }

            // Paddle Collision
            // AABB with circle roughly
            if (ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h) {
                if (ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                    
                    // Prevent ball getting stuck inside paddle if it hits the side while falling
                    if (ball.dy > 0) {
                        ball.y = paddle.y - ball.r;
                        
                        // Bounce logic based on hit pos
                        let hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                        // clamp -1 to 1
                        hitPos = Math.max(-1, Math.min(1, hitPos));
                        
                        // Max angle 60 degrees (PI/3)
                        let angle = hitPos * (Math.PI / 3);
                        
                        // Convert to polar then back, keep speed constant (or increment slightly)
                        ball.speed = Math.min(ball.speed + 0.1, 10); // max speed 10
                        
                        ball.dx = ball.speed * Math.sin(angle);
                        ball.dy = -ball.speed * Math.cos(angle);
                    }
                }
            }

            // Bottom out (Life Lost)
            if (ball.y - ball.r > canvas.height) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    state = 'GAMEOVER';
                } else {
                    state = 'LIFE_LOST';
                }
            }

            // Brick Collisions
            collisionDetection();
        }

        function draw() {
            // Bg
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Bricks
            for (let c = 0; c < BRICK_COLS; c++) {
                if (bricks[c]) {
                    for (let r = 0; r < bricks[c].length; r++) {
                        let b = bricks[c][r];
                        if (b.status === 1) {
                            ctx.fillStyle = b.color;
                            ctx.fillRect(b.x, b.y, BRICK_W, BRICK_H);
                            
                            // Highlight edge for 3d ish look
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(b.x, b.y, BRICK_W, 2);
                            ctx.fillRect(b.x, b.y, 2, BRICK_H);
                            ctx.fillStyle = 'rgba(0,0,0,0.3)';
                            ctx.fillRect(b.x, b.y + BRICK_H - 2, BRICK_W, 2);
                            ctx.fillRect(b.x + BRICK_W - 2, b.y, 2, BRICK_H);
                        }
                    }
                }
            }

            // Paddle
            ctx.fillStyle = '#00FFFF';
            // ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            // Rounded paddle
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
            ctx.fill();

            // Ball
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            // Overlays
            if (state === 'START') {
                drawOverlay('BREAKOUT', 'Press SPACE to Start');
            } else if (state === 'PAUSED') {
                drawOverlay('PAUSED', 'Press SPACE to Resume');
            } else if (state === 'LIFE_LOST') {
                drawOverlay('OOPS!', 'Press SPACE to Continue');
            } else if (state === 'LEVEL_CLEAR') {
                drawOverlay('LEVEL CLEAR!', 'Press SPACE for Next Level');
            } else if (state === 'GAMEOVER') {
                drawOverlay('GAME OVER', 'Press SPACE to Restart');
            }
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 50px monospace';
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = '#AAA';
            ctx.font = '20px monospace';
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Init
        // Simple polyfill for roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x+r, y);
                this.arcTo(x+w, y,   x+w, y+h, r);
                this.arcTo(x+w, y+h, x,   y+h, r);
                this.arcTo(x,   y+h, x,   y,   r);
                this.arcTo(x,   y,   x+w, y,   r);
                this.closePath();
                return this;
            }
        }
        
        initBricks();
        resetBall();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
