<!--
  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #05070d;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: radial-gradient(circle at top, #13203a 0%, #05070d 65%);
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="900" height="600"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const DT_CAP = 1 / 30;

  const STATES = {
    TITLE: 'title',
    SERVE: 'serve',
    PLAYING: 'playing',
    PAUSED: 'paused',
    LIFE_LOST: 'life_lost',
    LEVEL_CLEAR: 'level_clear',
    GAME_OVER: 'game_over',
    WIN: 'win'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let score = 0;
  let highScore = loadHighScore();
  let lives = 3;
  let level = 1;
  let stateTimer = 0;
  let message = '';

  const paddle = {
    x: W / 2 - 70,
    y: H - 48,
    w: 140,
    h: 16,
    speed: 620
  };

  const ball = {
    x: W / 2,
    y: H - 64,
    r: 10,
    vx: 0,
    vy: 0,
    speed: 420,
    maxSpeed: 860,
    trail: []
  };

  let bricks = [];
  let particles = [];

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('breakout_best_r5_control') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('breakout_best_r5_control', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function createBricks() {
    bricks = [];
    const rows = 7;
    const cols = 12;
    const gap = 6;
    const marginX = 46;
    const top = 72;
    const brickW = (W - marginX * 2 - gap * (cols - 1)) / cols;
    const brickH = 24;
    const colors = ['#ff5b5b','#ff9f43','#ffe066','#7CFF6B','#4DDBFF','#7a7cff','#d96bff'];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const hp = level >= 3 && r < 2 ? 2 : 1;
        bricks.push({
          x: marginX + c * (brickW + gap),
          y: top + r * (brickH + gap),
          w: brickW,
          h: brickH,
          hp,
          color: colors[r % colors.length]
        });
      }
    }
  }

  function resetBallOnPaddle() {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 4;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = 420 + (level - 1) * 20;
    ball.trail.length = 0;
  }

  function resetPaddle() {
    paddle.w = Math.max(92, 140 - (level - 1) * 6);
    paddle.x = W / 2 - paddle.w / 2;
  }

  function resetLife() {
    resetPaddle();
    resetBallOnPaddle();
    state = STATES.SERVE;
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    createBricks();
    resetLife();
    message = '';
  }

  function launchBall() {
    const angle = -Math.PI / 2 + (Math.random() * 0.8 - 0.4);
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    state = STATES.PLAYING;
  }

  function pushTrail() {
    ball.trail.push({ x: ball.x, y: ball.y, life: 0.28 });
    if (ball.trail.length > 14) ball.trail.shift();
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 50 + Math.random() * 140;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.55, maxLife: 0.55, color });
    }
  }

  function award(points, x, y) {
    score += points;
    updateHighScore();
    spawnParticles(x, y, '#ffffff', 4);
  }

  function loseLife() {
    lives -= 1;
    if (lives <= 0) {
      state = STATES.GAME_OVER;
      message = 'Out of balls.';
    } else {
      state = STATES.LIFE_LOST;
      stateTimer = 1.0;
    }
  }

  function nextLevel() {
    level += 1;
    if (level > 5) {
      state = STATES.WIN;
      message = 'All five rounds cleared!';
      return;
    }
    createBricks();
    state = STATES.LEVEL_CLEAR;
    stateTimer = 1.4;
  }

  function updatePaddle(dt) {
    let move = 0;
    if (keys.ArrowLeft || keys.KeyA) move -= 1;
    if (keys.ArrowRight || keys.KeyD) move += 1;
    paddle.x += move * paddle.speed * dt;
    paddle.x = clamp(paddle.x, 18, W - paddle.w - 18);

    if (state === STATES.SERVE) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 4;
    }
  }

  function updateTrail(dt) {
    for (let i = ball.trail.length - 1; i >= 0; i--) {
      ball.trail[i].life -= dt;
      if (ball.trail[i].life <= 0) ball.trail.splice(i, 1);
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function collideWalls() {
    if (ball.x - ball.r <= 16) {
      ball.x = 16 + ball.r;
      ball.vx = Math.abs(ball.vx);
      spawnParticles(ball.x, ball.y, '#66ccff', 6);
    } else if (ball.x + ball.r >= W - 16) {
      ball.x = W - 16 - ball.r;
      ball.vx = -Math.abs(ball.vx);
      spawnParticles(ball.x, ball.y, '#66ccff', 6);
    }

    if (ball.y - ball.r <= 44) {
      ball.y = 44 + ball.r;
      ball.vy = Math.abs(ball.vy);
      spawnParticles(ball.x, ball.y, '#66ccff', 6);
    }
  }

  function collidePaddle() {
    if (ball.y + ball.r < paddle.y || ball.y - ball.r > paddle.y + paddle.h) return;
    if (ball.x + ball.r < paddle.x || ball.x - ball.r > paddle.x + paddle.w) return;
    if (ball.vy <= 0) return;

    const hit = ((ball.x - paddle.x) / paddle.w) - 0.5;
    const angle = hit * 1.25;
    ball.speed = Math.min(ball.maxSpeed, Math.hypot(ball.vx, ball.vy) + 14);
    ball.vx = Math.sin(angle) * ball.speed * 1.2;
    ball.vy = -Math.abs(Math.cos(angle) * ball.speed);
    ball.y = paddle.y - ball.r - 1;
    spawnParticles(ball.x, ball.y, '#ffffff', 8);
  }

  function circleRectOverlap(cx, cy, r, rect) {
    const closestX = clamp(cx, rect.x, rect.x + rect.w);
    const closestY = clamp(cy, rect.y, rect.y + rect.h);
    const dx = cx - closestX;
    const dy = cy - closestY;
    return dx * dx + dy * dy <= r * r;
  }

  function collideBricks() {
    for (let i = 0; i < bricks.length; i++) {
      const brick = bricks[i];
      if (!circleRectOverlap(ball.x, ball.y, ball.r, brick)) continue;

      brick.hp -= 1;
      award(brick.hp <= 0 ? 100 : 40, brick.x + brick.w / 2, brick.y + brick.h / 2);
      spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 12);

      const overlapLeft = Math.abs((ball.x + ball.r) - brick.x);
      const overlapRight = Math.abs((brick.x + brick.w) - (ball.x - ball.r));
      const overlapTop = Math.abs((ball.y + ball.r) - brick.y);
      const overlapBottom = Math.abs((brick.y + brick.h) - (ball.y - ball.r));
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (minOverlap === overlapLeft) ball.vx = -Math.abs(ball.vx);
      else if (minOverlap === overlapRight) ball.vx = Math.abs(ball.vx);
      else if (minOverlap === overlapTop) ball.vy = -Math.abs(ball.vy);
      else ball.vy = Math.abs(ball.vy);

      if (brick.hp <= 0) bricks.splice(i, 1);
      if (!bricks.length) nextLevel();
      return;
    }
  }

  function updateBall(dt) {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    pushTrail();
    collideWalls();
    collidePaddle();
    collideBricks();

    if (ball.y - ball.r > H + 20) loseLife();
  }

  function update(dt) {
    updateParticles(dt);
    updateTrail(dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER || state === STATES.WIN) return;

    if (state === STATES.LIFE_LOST || state === STATES.LEVEL_CLEAR) {
      stateTimer -= dt;
      if (stateTimer <= 0) resetLife();
      return;
    }

    updatePaddle(dt);
    if (state === STATES.PLAYING) updateBall(dt);
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#152647');
    grad.addColorStop(1, '#05070d');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for (let x = 16; x < W; x += 32) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
  }

  function drawBricks() {
    bricks.forEach(brick => {
      ctx.fillStyle = brick.hp === 2 ? '#ffffff' : brick.color;
      ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(brick.x + 3, brick.y + 3, brick.w - 6, 6);
      if (brick.hp === 2) {
        ctx.strokeStyle = brick.color;
        ctx.lineWidth = 3;
        ctx.strokeRect(brick.x + 2, brick.y + 2, brick.w - 4, brick.h - 4);
      }
    });
  }

  function drawPaddle() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    ctx.fillStyle = '#8bd3ff';
    ctx.fillRect(paddle.x + 10, paddle.y + 4, paddle.w - 20, 4);
  }

  function drawBall() {
    for (const t of ball.trail) {
      ctx.fillStyle = `rgba(255,255,255,${(t.life / 0.28) * 0.25})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, 3, 3);
      ctx.globalAlpha = 1;
    });
  }

  function drawHUD() {
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE ${score}`, 20, 28);
    ctx.textAlign = 'center';
    ctx.fillText(`HI ${highScore}`, W / 2, 28);
    ctx.textAlign = 'right';
    ctx.fillText(`LEVEL ${level}`, W - 20, 28);

    for (let i = 0; i < lives; i++) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(20 + i * 28, H - 20, 18, 8);
    }
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 52px Arial';
    ctx.fillText(title, W / 2, H / 2 - 100);
    ctx.font = '26px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 34));
  }

  function render() {
    drawBackground();
    drawBricks();
    drawPaddle();
    if (state !== STATES.TITLE) drawBall();
    drawParticles();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('BREAKOUT', [
        'Press SPACE to start',
        'Arrow keys / A D to move',
        'Break every brick. Clear five rounds to win.'
      ], true);
    } else if (state === STATES.SERVE) {
      drawOverlay('SERVE', ['Press SPACE to launch', 'Angle shots with the paddle edges'], false);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', [message || 'No lives left.', 'Press R to play again', 'Press Escape for title'], true);
    } else if (state === STATES.WIN) {
      drawOverlay('YOU WIN!', [message || 'Every round cleared.', 'Press R to play again'], true);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) startGame();
      else if (state === STATES.SERVE) launchBall();
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING || state === STATES.SERVE) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER || state === STATES.WIN) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) startGame();
    }
  }

  function syncPrev() {
    const watched = ['ArrowLeft','ArrowRight','KeyA','KeyD','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowLeft','ArrowRight','KeyA','KeyD','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  createBricks();
  resetLife();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
