<!--
  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    const STATE_LEVEL_CLEAR = 4;
    
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('breakout_highscore') || '0');
    let lives = 3;
    let level = 1;
    
    const paddleW = 120;
    const paddleH = 15;
    let paddle = { x: W / 2 - paddleW / 2, y: H - 40, speed: 8 };
    
    const ballSize = 10;
    let ball = { x: W / 2, y: H - 60, vx: 4, vy: -4, speed: 5, attached: true };
    
    const brickW = 75;
    const brickH = 25;
    const brickRows = 5;
    const brickCols = 10;
    const brickOffsetTop = 60;
    const brickOffsetLeft = (W - brickCols * brickW) / 2;
    
    let bricks = [];
    
    const brickColors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF'];
    const brickPoints = [50, 40, 30, 20, 10];
    
    const keys = {};
    let levelClearTimer = 0;
    
    function initGame() {
      score = 0;
      lives = 3;
      level = 1;
      initLevel();
    }
    
    function initLevel() {
      paddle.x = W / 2 - paddleW / 2;
      ball.x = W / 2;
      ball.y = H - 60;
      ball.vx = 4 * (Math.random() > 0.5 ? 1 : -1);
      ball.vy = -4 - level * 0.5;
      ball.speed = 5 + level * 0.5;
      ball.attached = true;
      
      bricks = [];
      for (let row = 0; row < brickRows; row++) {
        for (let col = 0; col < brickCols; col++) {
          bricks.push({
            x: brickOffsetLeft + col * brickW,
            y: brickOffsetTop + row * brickH,
            alive: true,
            color: brickColors[row],
            points: brickPoints[row]
          });
        }
      }
    }
    
    function update(dt) {
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dt * 1000;
        if (levelClearTimer <= 0) {
          level++;
          initLevel();
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Paddle movement
      if (keys.left) paddle.x -= paddle.speed;
      if (keys.right) paddle.x += paddle.speed;
      paddle.x = Math.max(0, Math.min(W - paddleW, paddle.x));
      
      // Ball attached to paddle
      if (ball.attached) {
        ball.x = paddle.x + paddleW / 2;
        ball.y = paddle.y - ballSize;
        return;
      }
      
      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;
      
      // Wall collision
      if (ball.x <= ballSize / 2 || ball.x >= W - ballSize / 2) {
        ball.vx *= -1;
        ball.x = Math.max(ballSize / 2, Math.min(W - ballSize / 2, ball.x));
      }
      if (ball.y <= ballSize / 2) {
        ball.vy *= -1;
        ball.y = ballSize / 2;
      }
      
      // Bottom - lose life
      if (ball.y >= H + ballSize) {
        lives--;
        if (lives <= 0) {
          state = STATE_GAMEOVER;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('breakout_highscore', highScore);
          }
        } else {
          ball.attached = true;
          ball.x = paddle.x + paddleW / 2;
          ball.y = paddle.y - ballSize;
        }
        return;
      }
      
      // Paddle collision
      if (ball.y + ballSize / 2 >= paddle.y &&
          ball.y - ballSize / 2 <= paddle.y + paddleH &&
          ball.x >= paddle.x &&
          ball.x <= paddle.x + paddleW) {
        const hit = (ball.x - paddle.x) / paddleW;
        const angle = (hit - 0.5) * Math.PI * 0.7;
        ball.vx = Math.sin(angle) * ball.speed;
        ball.vy = -Math.cos(angle) * ball.speed;
        ball.y = paddle.y - ballSize / 2;
      }
      
      // Brick collision
      for (const brick of bricks) {
        if (!brick.alive) continue;
        
        if (ball.x + ballSize / 2 >= brick.x &&
            ball.x - ballSize / 2 <= brick.x + brickW &&
            ball.y + ballSize / 2 >= brick.y &&
            ball.y - ballSize / 2 <= brick.y + brickH) {
          brick.alive = false;
          score += brick.points;
          
          // Determine bounce direction
          const overlapLeft = (ball.x + ballSize / 2) - brick.x;
          const overlapRight = (brick.x + brickW) - (ball.x - ballSize / 2);
          const overlapTop = (ball.y + ballSize / 2) - brick.y;
          const overlapBottom = (brick.y + brickH) - (ball.y - ballSize / 2);
          
          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);
          
          if (minOverlapX < minOverlapY) {
            ball.vx *= -1;
          } else {
            ball.vy *= -1;
          }
          
          break;
        }
      }
      
      // Level complete
      if (bricks.every(b => !b.alive)) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        ctx.fillStyle = '#FF0';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('BREAKOUT', W / 2, 200);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', W / 2, 320);
        
        ctx.font = '18px Arial';
        ctx.fillStyle = '#888';
        ctx.fillText('Use Arrow Keys or Mouse to move paddle', W / 2, 400);
        ctx.fillText('SPACE to launch ball', W / 2, 430);
        ctx.fillText('P to pause', W / 2, 460);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = '20px Arial';
        ctx.fillText('High Score: ' + highScore, W / 2, 540);
        return;
      }
      
      // Bricks
      for (const brick of bricks) {
        if (!brick.alive) continue;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x + 2, brick.y + 2, brickW - 4, brickH - 4);
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 1;
        ctx.strokeRect(brick.x, brick.y, brickW, brickH);
      }
      
      // Paddle
      ctx.fillStyle = '#0FF';
      ctx.fillRect(paddle.x, paddle.y, paddleW, paddleH);
      ctx.fillStyle = '#0AA';
      ctx.fillRect(paddle.x + 2, paddle.y + 2, paddleW - 4, paddleH / 2);
      
      // Ball
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ballSize, 0, Math.PI * 2);
      ctx.fill();
      
      // HUD
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 30);
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level, W / 2, 30);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, W - 10, 30);
      
      if (ball.attached && state === STATE_PLAYING) {
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Press SPACE to launch', W / 2, H - 80);
      }
      
      if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      }
      
      if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#F00';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '32px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        
        if (score >= highScore && score > 0) {
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 28px Arial';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
        }
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
        ctx.fillText('Press ESC for title', W / 2, H / 2 + 130);
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + level + ' COMPLETE!', W / 2, H / 2);
      }
    }
    
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (e.code === 'Space' && state === STATE_PLAYING && ball.attached) {
        ball.attached = false;
        e.preventDefault();
      }
      
      if ((e.code === 'KeyP' || e.code === 'Escape') && state !== STATE_TITLE) {
        if (state === STATE_PLAYING || state === STATE_PAUSED) {
          state = state === STATE_PAUSED ? STATE_PLAYING : STATE_PAUSED;
        }
        e.preventDefault();
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    Object.defineProperty(keys, 'left', { get() { return this['ArrowLeft'] || this['a'] || this['A']; } });
    Object.defineProperty(keys, 'right', { get() { return this['ArrowRight'] || this['d'] || this['D']; } });
    
    // Mouse control
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (W / rect.width);
      paddle.x = Math.max(0, Math.min(W - paddleW, x - paddleW / 2));
    });
    
    canvas.addEventListener('click', () => {
      if (state === STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
      } else if (state === STATE_PLAYING && ball.attached) {
        ball.attached = false;
      }
    });
    
    let lastTime = 0;
    function gameLoop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.1);
      lastTime = t;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
