<!--
  GAME:      Breakout
  RUN:       r5-control
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=640,H=480;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=f;g.gain.value=0.04;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}

const ROWS=8,BCOLS=10,BW=56,BH=16,BPAD=4,BOFF_X=24,BOFF_Y=50;
const PAD_W=80,PAD_H=12,BALL_R=6;
const ROW_COLORS=['#f44','#f44','#f80','#f80','#0c0','#0c0','#ee0','#ee0'];
const ROW_PTS=[7,7,5,5,3,3,1,1];

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_WIN=4,ST_LAUNCH=5;
let state=ST_TITLE;

let pad,ball,bricks,score,hiScore,lives,level,bricksLeft;

hiScore=0;
try{const v=localStorage.getItem('bo5_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('bo5_best',String(hiScore));}catch(e){}}}

function makeBricks(){
  bricks=[];bricksLeft=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<BCOLS;c++){
      bricks.push({x:BOFF_X+c*(BW+BPAD),y:BOFF_Y+r*(BH+BPAD),w:BW,h:BH,
        color:ROW_COLORS[r],pts:ROW_PTS[r],alive:true});
      bricksLeft++;
    }
  }
}

function resetBall(){
  ball={x:pad.x+PAD_W/2,y:pad.y-BALL_R-1,vx:0,vy:0,r:BALL_R,launched:false};
}

function launchBall(){
  const angle=-Math.PI/2+(Math.random()*0.8-0.4);
  const spd=280+level*20;
  ball.vx=Math.cos(angle)*spd;ball.vy=Math.sin(angle)*spd;
  ball.launched=true;state=ST_PLAY;
}

function startGame(){
  score=0;lives=3;level=1;
  pad={x:W/2-PAD_W/2,y:H-30,w:PAD_W,h:PAD_H};
  makeBricks();resetBall();state=ST_LAUNCH;
}

function nextLevel(){
  level++;makeBricks();resetBall();state=ST_LAUNCH;
}

let mouseX=W/2;
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouseX=e.clientX-r.left;});
cv.addEventListener('click',()=>{ia();if(state===ST_LAUNCH)launchBall();if(state===ST_TITLE)startGame();if(state===ST_OVER||state===ST_WIN)state=ST_TITLE;});

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(state===ST_TITLE&&(e.code==='Space'||e.code==='Enter'))startGame();
  if(state===ST_LAUNCH&&e.code==='Space')launchBall();
  if(state===ST_PLAY&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PAUSE;
  else if(state===ST_PAUSE&&(e.code==='KeyP'||e.code==='Escape'))state=ST_PLAY;
  if(e.code==='KeyR'&&state!==ST_TITLE)startGame();
  if((state===ST_OVER||state===ST_WIN)&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyR'))state=ST_TITLE;
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function update(dt){
  if(state===ST_LAUNCH||state===ST_PLAY){
    // Pad movement — mouse or keys
    if(keys['ArrowLeft']||keys['KeyA'])pad.x-=400*dt;
    if(keys['ArrowRight']||keys['KeyD'])pad.x+=400*dt;
    pad.x+=(mouseX-pad.x-pad.w/2)*0.15;
    pad.x=Math.max(0,Math.min(W-pad.w,pad.x));
  }

  if(state===ST_LAUNCH){
    ball.x=pad.x+pad.w/2;ball.y=pad.y-ball.r-1;
    return;
  }
  if(state!==ST_PLAY)return;

  ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;

  // Wall bounces
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);beep(300,0.02);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);beep(300,0.02);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);beep(300,0.02);}

  // Paddle
  if(ball.vy>0&&ball.y+ball.r>=pad.y&&ball.y+ball.r<=pad.y+pad.h+4&&
     ball.x>=pad.x-ball.r&&ball.x<=pad.x+pad.w+ball.r){
    ball.y=pad.y-ball.r;
    const hit=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
    const angle=hit*Math.PI/3;
    const spd=Math.hypot(ball.vx,ball.vy);
    ball.vx=Math.sin(angle)*spd;
    ball.vy=-Math.abs(Math.cos(angle)*spd);
    beep(500,0.03);
  }

  // Bottom — lose life
  if(ball.y-ball.r>H){
    lives--;beep(120,0.2);
    if(lives<=0){state=ST_OVER;saveHi();return;}
    resetBall();state=ST_LAUNCH;return;
  }

  // Brick collision
  for(const b of bricks){
    if(!b.alive)continue;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.alive=false;bricksLeft--;
      score+=b.pts;saveHi();
      beep(700+b.pts*60,0.04);

      // Determine side
      const ox1=ball.x+ball.r-b.x,ox2=b.x+b.w-(ball.x-ball.r);
      const oy1=ball.y+ball.r-b.y,oy2=b.y+b.h-(ball.y-ball.r);
      const minO=Math.min(ox1,ox2,oy1,oy2);
      if(minO===ox1||minO===ox2)ball.vx*=-1;
      else ball.vy*=-1;

      if(bricksLeft<=0){
        if(level>=3){state=ST_WIN;saveHi();}
        else nextLevel();
        return;
      }
      break;
    }
  }
}

function render(now){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#f80';cx.font='bold 52px monospace';cx.textAlign='center';
    cx.fillText('BREAKOUT',W/2,180);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    cx.fillText('Mouse or ← → to move paddle',W/2,260);
    cx.fillText('Click or Space to launch ball',W/2,290);
    cx.fillText('Break all bricks to advance!',W/2,320);
    cx.fillText('P Pause   R Restart',W/2,350);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / Click',W/2,420);
    if(hiScore>0){cx.fillStyle='#555';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,460);}
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive)continue;
    cx.fillStyle=b.color;cx.fillRect(b.x,b.y,b.w,b.h);
    cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(b.x,b.y,b.w,3);
  }

  // Paddle
  cx.fillStyle='#fff';
  cx.fillRect(pad.x,pad.y,pad.w,pad.h);
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(pad.x,pad.y,pad.w,3);

  // Ball
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);cx.fill();

  // HUD
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,10,20);
  cx.textAlign='center';cx.fillText('Level '+level,W/2,20);
  cx.textAlign='right';cx.fillText('Best: '+hiScore,W-10,20);

  // Lives
  for(let i=0;i<lives;i++){
    cx.beginPath();cx.arc(20+i*18,H-12,5,0,Math.PI*2);cx.fill();
  }

  if(state===ST_LAUNCH){
    cx.fillStyle='#ff0';cx.font='18px monospace';cx.textAlign='center';
    if(Math.floor(now/500)%2)cx.fillText('Click or SPACE to launch',W/2,H/2+40);
  }
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 36px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillText('P to resume   R to restart',W/2,H/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-30);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='14px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',W/2,H/2+65);
  }
  if(state===ST_WIN){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#0f0';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('YOU WIN!',W/2,H/2-30);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Final Score: '+score,W/2,H/2+10);
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE / R',W/2,H/2+50);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
