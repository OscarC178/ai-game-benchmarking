<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #000;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 15;
        const BALL_RADIUS = 8;
        const BRICK_ROWS = 6;
        const BRICK_COLS = 10;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 20;
        const BRICK_PADDING = 10;
        const BRICK_OFFSET_TOP = 60;
        const BRICK_OFFSET_LEFT = 35;

        // Colors
        const colors = ['#FF1E1E', '#FF7D1E', '#FFD21E', '#4BFF1E', '#1E96FF', '#9B1EFF'];

        // Game State
        let paddleX = (canvas.width - PADDLE_WIDTH) / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height - 50;
        let dx = 4;
        let dy = -4;
        let score = 0;
        let lives = 3;
        let gameStatus = 'START'; // START, PLAYING, GAMEOVER, WIN

        let bricks = [];
        for (let c = 0; c < BRICK_COLS; c++) {
            bricks[c] = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        // Input Handling
        let rightPressed = false;
        let leftPressed = false;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
            else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
            else if (e.key === ' ' && (gameStatus === 'START' || gameStatus === 'GAMEOVER' || gameStatus === 'WIN')) {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
            else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
        });

        function resetGame() {
            score = 0;
            lives = 3;
            ballX = canvas.width / 2;
            ballY = canvas.height - 50;
            dx = 4;
            dy = -4;
            paddleX = (canvas.width - PADDLE_WIDTH) / 2;
            for (let c = 0; c < BRICK_COLS; c++) {
                for (let r = 0; r < BRICK_ROWS; r++) {
                    bricks[c][r].status = 1;
                }
            }
            gameStatus = 'PLAYING';
        }

        function collisionDetection() {
            for (let c = 0; c < BRICK_COLS; c++) {
                for (let r = 0; r < BRICK_ROWS; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (ballX > b.x && ballX < b.x + BRICK_WIDTH && ballY > b.y && ballY < b.y + BRICK_HEIGHT) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            if (score === BRICK_ROWS * BRICK_COLS) {
                                gameStatus = 'WIN';
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - PADDLE_HEIGHT - 10, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < BRICK_COLS; c++) {
                for (let r = 0; r < BRICK_ROWS; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (BRICK_WIDTH + BRICK_PADDING)) + BRICK_OFFSET_LEFT;
                        let brickY = (r * (BRICK_HEIGHT + BRICK_PADDING)) + BRICK_OFFSET_TOP;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, BRICK_WIDTH, BRICK_HEIGHT);
                        ctx.fillStyle = colors[r];
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawScore() {
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.fillStyle = "#fff";
            ctx.textAlign = "left";
            ctx.fillText("Score: " + score, 35, 35);
        }

        function drawLives() {
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.fillStyle = "#fff";
            ctx.textAlign = "right";
            ctx.fillText("Lives: " + lives, canvas.width - 35, 35);
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.font = "bold 60px 'Segoe UI'";
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "20px 'Segoe UI'";
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 40);
        }

        function update() {
            if (gameStatus !== 'PLAYING') return;

            // Move Paddle
            if (rightPressed && paddleX < canvas.width - PADDLE_WIDTH) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            // Ball Physics
            if (ballX + dx > canvas.width - BALL_RADIUS || ballX + dx < BALL_RADIUS) {
                dx = -dx;
            }
            if (ballY + dy < BALL_RADIUS) {
                dy = -dy;
            } else if (ballY + dy > canvas.height - BALL_RADIUS - 10) {
                if (ballX > paddleX && ballX < paddleX + PADDLE_WIDTH) {
                    // Normalize bounce angle
                    let hitPos = (ballX - (paddleX + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2);
                    dx = hitPos * 6;
                    dy = -dy;
                } else if (ballY + dy > canvas.height) {
                    lives--;
                    if (!lives) {
                        gameStatus = 'GAMEOVER';
                    } else {
                        ballX = canvas.width / 2;
                        ballY = canvas.height - 50;
                        dx = 4;
                        dy = -4;
                        paddleX = (canvas.width - PADDLE_WIDTH) / 2;
                    }
                }
            }

            ballX += dx;
            ballY += dy;

            collisionDetection();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            drawLives();

            if (gameStatus === 'START') {
                drawOverlay("BREAKOUT", "PRESS SPACE TO START");
            } else if (gameStatus === 'GAMEOVER') {
                drawOverlay("GAME OVER", "FINAL SCORE: " + score + " | SPACE TO RETRY");
            } else if (gameStatus === 'WIN') {
                drawOverlay("YOU WIN!", "FINAL SCORE: " + score + " | SPACE TO PLAY AGAIN");
            }

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
