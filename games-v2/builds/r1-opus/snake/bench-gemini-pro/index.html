<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
    body {
        background-color: #0a0a0a;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    canvas {
        background-color: #0a0a0a;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
</style>
</head>
<body>
<canvas id="gameCanvas" width="660" height="700"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONSTANTS ---
const COLS = 20;
const ROWS = 20;
const CELL_SIZE = 31;
const X_OFF = 20;
const Y_OFF = 40;
const COLORS = {
    bgOut: '#0a0a0a',
    bgIn: '#111111',
    grid: '#1a1a1a',
    border: '#333333',
    head: '#4caf50',
    body1: '#388e3c',
    body2: '#2e7d32',
    food: '#f44336',
    bonus: '#ffd740',
    text: '#ffffff',
    textDim: '#888888',
    dead: '#444444'
};

const LEVELS = [
    { score: 0, ticks: 7, int: 143 },
    { score: 50, ticks: 8, int: 125 },
    { score: 100, ticks: 9, int: 111 },
    { score: 180, ticks: 10, int: 100 },
    { score: 280, ticks: 11, int: 91 },
    { score: 420, ticks: 12, int: 83 },
    { score: 600, ticks: 13, int: 77 },
    { score: 800, ticks: 14, int: 71 },
    { score: 1100, ticks: 15, int: 67 }
];

// --- STATE ---
let state = 'TITLE'; // TITLE, COUNTDOWN, PLAYING, PAUSED, DYING, GAME_OVER
let score = 0;
let highScore = parseInt(localStorage.getItem('snake_best')) || 0;
let newBest = false;
let level = 0;
let tickInterval = LEVELS[0].int;

let snake = []; // {x, y, px, py}
let headDir = {x: 1, y: 0};
let dirQueue = [];
let growthPending = 0;
let foodEaten = 0;
let food = null; // {x, y}

let bonus = null; // {x, y, timer}
let bonusRemaining = 0; // ms

let timeAccum = 0;
let lastFrame = 0;
let stateAge = 0; // For animations in states

let demoRespawnTimer = 0;

// --- AUDIO ---
let actx = null;
function initAudio() {
    if (!actx) {
        try { actx = new (window.AudioContext || window.webkitAudioContext)(); } 
        catch (e) {}
    }
    if (actx && actx.state === 'suspended') actx.resume();
}

function playTone(type) {
    if (!actx) return;
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);

    if (type === 'food') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, t);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.055);
        osc.start(t); osc.stop(t + 0.055);
    } else if (type === 'turn') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(140, t);
        gain.gain.setValueAtTime(0.06, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.012);
        osc.start(t); osc.stop(t + 0.012);
    } else if (type === 'bonus') {
        osc.type = 'square';
        gain.gain.setValueAtTime(0.2, t);
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.setValueAtTime(800, t + 0.05);
        osc.frequency.setValueAtTime(1050, t + 0.1);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.14);
        gain.gain.linearRampToValueAtTime(0, t + 0.145);
        osc.start(t); osc.stop(t + 0.145);
    } else if (type === 'levelup') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(350, t);
        osc.frequency.linearRampToValueAtTime(700, t + 0.2);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
    } else if (type === 'die') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(55, t + 0.45);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.45);
        osc.start(t); osc.stop(t + 0.45);
    } else if (type === 'highscore') {
        osc.type = 'square';
        gain.gain.setValueAtTime(0.2, t);
        [523, 659, 784, 1047].forEach((f, i) => {
            osc.frequency.setValueAtTime(f, t + i * 0.065);
        });
        gain.gain.setValueAtTime(0, t + 4 * 0.065);
        osc.start(t); osc.stop(t + 0.26);
    }
}

// --- UTILS ---
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
}

function getEmptyCell() {
    let occ = new Set();
    snake.forEach(s => occ.add(`${s.x},${s.y}`));
    if (food) occ.add(`${food.x},${food.y}`);
    if (bonus) occ.add(`${bonus.x},${bonus.y}`);
    
    let empty = [];
    for (let c=0; c<COLS; c++) {
        for (let r=0; r<ROWS; r++) {
            if (!occ.has(`${c},${r}`)) empty.push({x: c, y: r});
        }
    }
    if (empty.length === 0) return null;
    return empty[Math.floor(Math.random() * empty.length)];
}

function spawnFood() {
    food = getEmptyCell();
}

function spawnBonus() {
    if (foodEaten > 0 && foodEaten % 5 === 0) {
        bonus = getEmptyCell();
        bonusRemaining = 8000;
    }
}

function checkLevel() {
    let oldLvl = level;
    level = 0;
    for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (score >= LEVELS[i].score) {
            level = i;
            tickInterval = LEVELS[i].int;
            break;
        }
    }
    if (level > oldLvl && state === 'PLAYING') playTone('levelup');
}

function initGame(isDemo = false) {
    snake = [
        {x: 10, y: 10, px: 10, py: 10},
        {x: 9, y: 10, px: 9, py: 10},
        {x: 8, y: 10, px: 8, py: 10}
    ];
    headDir = {x: 1, y: 0};
    dirQueue = [];
    growthPending = 0;
    foodEaten = 0;
    bonus = null;
    bonusRemaining = 0;
    spawnFood();
    
    if (!isDemo) {
        score = 0;
        level = 0;
        tickInterval = LEVELS[0].int;
        newBest = false;
        state = 'COUNTDOWN';
        stateAge = 0;
        timeAccum = 0;
    }
}

// --- INPUT ---
window.addEventListener('keydown', e => {
    if (state === 'TITLE' && e.key === 'Enter') {
        initAudio();
        initGame(false);
    } else if ((state === 'PLAYING' || state === 'COUNTDOWN') && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        if (state === 'PLAYING') state = 'PAUSED';
    } else if (state === 'PAUSED' && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        state = 'PLAYING';
    } else if (state === 'GAME_OVER' && e.key === 'Enter') {
        state = 'TITLE';
        initGame(true); // demo
    } else if (state === 'PLAYING' || state === 'COUNTDOWN') {
        let nd = null;
        if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') nd = {x: 0, y: -1};
        else if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') nd = {x: 0, y: 1};
        else if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') nd = {x: -1, y: 0};
        else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') nd = {x: 1, y: 0};
        
        if (nd && dirQueue.length < 2) {
            let ref = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : headDir;
            if (!(nd.x === -ref.x && nd.y === -ref.y)) {
                dirQueue.push(nd);
            }
        }
    }
});

// --- LOGIC ---
function tickDemo() {
    // Dumb AI
    let h = snake[0];
    let target = food;
    if (!target) return;
    
    let preferred = [];
    if (target.x > h.x) preferred.push({x: 1, y: 0});
    else if (target.x < h.x) preferred.push({x: -1, y: 0});
    if (target.y > h.y) preferred.push({x: 0, y: 1});
    else if (target.y < h.y) preferred.push({x: 0, y: -1});
    
    let allDirs = [{x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}];
    
    function isSafe(d) {
        let nx = h.x + d.x, ny = h.y + d.y;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
        for (let i=0; i<snake.length - 1; i++) { // rough
            if (snake[i].x === nx && snake[i].y === ny) return false;
        }
        return true;
    }
    
    let chosen = null;
    for (let d of preferred) {
        if (isSafe(d) && !(d.x === -headDir.x && d.y === -headDir.y)) { chosen = d; break; }
    }
    if (!chosen) {
        for (let d of allDirs) {
            if (isSafe(d) && !(d.x === -headDir.x && d.y === -headDir.y)) { chosen = d; break; }
        }
    }
    
    if (chosen) headDir = chosen;
    else {
        // Die
        demoRespawnTimer = 1000;
        return;
    }
    
    let nx = h.x + headDir.x;
    let ny = h.y + headDir.y;
    
    snake.forEach(s => { s.px = s.x; s.py = s.y; });
    snake.unshift({x: nx, y: ny, px: h.x, py: h.y});
    
    if (nx === food.x && ny === food.y) spawnFood();
    else snake.pop();
}

function processTick() {
    if (dirQueue.length > 0) {
        let cand = dirQueue.shift();
        if (!(cand.x === -headDir.x && cand.y === -headDir.y)) {
            headDir = cand;
            if (state === 'PLAYING') playTone('turn');
        }
    }
    
    let h = snake[0];
    let nx = h.x + headDir.x;
    let ny = h.y + headDir.y;
    
    let dead = false;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) dead = true;
    
    if (!dead) {
        let exclude = growthPending === 0 ? snake.length - 1 : -1;
        for (let i = 0; i < snake.length; i++) {
            if (i !== exclude && snake[i].x === nx && snake[i].y === ny) {
                dead = true; break;
            }
        }
    }
    
    if (dead) {
        state = 'DYING';
        stateAge = 0;
        playTone('die');
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snake_best', highScore);
            newBest = true;
            setTimeout(() => { if (state === 'GAME_OVER' || state === 'DYING') playTone('highscore'); }, 500);
        }
        return;
    }
    
    snake.forEach(s => { s.px = s.x; s.py = s.y; });
    snake.unshift({x: nx, y: ny, px: h.x, py: h.y});
    
    if (nx === food.x && ny === food.y) {
        score += 10;
        foodEaten++;
        growthPending++;
        playTone('food');
        spawnFood();
        spawnBonus();
        checkLevel();
    } else if (bonus && nx === bonus.x && ny === bonus.y) {
        score += 50;
        bonus = null;
        playTone('bonus');
        checkLevel();
        // still pop since we didn't eat regular food
        snake.pop();
    } else {
        if (growthPending > 0) growthPending--;
        else snake.pop();
    }
}

function render(ctx, tp, dt) {
    ctx.fillStyle = COLORS.bgOut;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Play Area
    ctx.fillStyle = (state === 'TITLE') ? '#080808' : COLORS.bgIn;
    ctx.fillRect(X_OFF, Y_OFF, COLS*CELL_SIZE, ROWS*CELL_SIZE);
    
    // Grid
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<=COLS; i++) {
        ctx.moveTo(X_OFF + i*CELL_SIZE, Y_OFF);
        ctx.lineTo(X_OFF + i*CELL_SIZE, Y_OFF + ROWS*CELL_SIZE);
    }
    for(let i=0; i<=ROWS; i++) {
        ctx.moveTo(X_OFF, Y_OFF + i*CELL_SIZE);
        ctx.lineTo(X_OFF + COLS*CELL_SIZE, Y_OFF + i*CELL_SIZE);
    }
    ctx.stroke();
    
    ctx.strokeStyle = COLORS.border;
    ctx.lineWidth = 2;
    ctx.strokeRect(X_OFF-1, Y_OFF-1, COLS*CELL_SIZE+2, ROWS*CELL_SIZE+2);
    
    // HUD
    ctx.fillStyle = COLORS.text;
    ctx.font = '17px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 24, 27);
    
    ctx.fillStyle = COLORS.textDim;
    ctx.textAlign = 'right';
    ctx.fillText(`Best: ${highScore}`, 636, 27);
    
    // Level dots
    for(let i=0; i<9; i++) {
        ctx.fillStyle = i <= level ? COLORS.head : '#2a2a2a';
        ctx.beginPath();
        ctx.arc(330 - 48 + i*12, 22, 3, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 39, canvas.width, 1);

    let drawingDemo = state === 'TITLE';
    
    // Food
    if (food) {
        let fx = X_OFF + food.x * CELL_SIZE + CELL_SIZE/2;
        let fy = Y_OFF + food.y * CELL_SIZE + CELL_SIZE/2;
        ctx.fillStyle = '#f4433633';
        ctx.beginPath(); ctx.arc(fx, fy, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = COLORS.food;
        ctx.beginPath(); ctx.arc(fx, fy, 12, 0, Math.PI*2); ctx.fill();
    }
    
    // Bonus
    if (bonus) {
        let bx = X_OFF + bonus.x * CELL_SIZE + CELL_SIZE/2;
        let by = Y_OFF + bonus.y * CELL_SIZE + CELL_SIZE/2;
        
        let show = true;
        if (bonusRemaining < 2000) {
            show = Math.floor(stateAge / 166) % 2 === 0;
        }
        
        if (show) {
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(Math.PI/4);
            ctx.fillStyle = COLORS.bonus;
            ctx.fillRect(-5, -5, 10, 10);
            ctx.restore();
            
            let rad = 14 * (bonusRemaining / 8000);
            if (rad > 0) {
                ctx.strokeStyle = COLORS.bonus;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(bx, by, rad, 0, Math.PI*2); ctx.stroke();
            }
        }
    }
    
    // Snake
    for (let i = snake.length - 1; i >= 0; i--) {
        let seg = snake[i];
        let isHead = i === 0;
        
        let t = tp;
        if (state !== 'PLAYING' && state !== 'TITLE') t = 1;
        
        let rx = seg.px + (seg.x - seg.px) * t;
        let ry = seg.py + (seg.y - seg.py) * t;
        
        // Head snap
        if (isHead && (seg.x !== seg.px || seg.y !== seg.py) && 
            (seg.x !== seg.px + headDir.x || seg.y !== seg.py + headDir.y)) {
            // L turn happened
            rx = seg.x; ry = seg.y;
        }
        
        let px = X_OFF + rx * CELL_SIZE + 2;
        let py = Y_OFF + ry * CELL_SIZE + 2;
        
        let alpha = 1;
        if (i === snake.length - 1 && growthPending === 0 && (seg.x !== seg.px || seg.y !== seg.py)) {
            alpha = Math.max(0, 1 - t);
        }
        
        if (state === 'DYING') {
            if (stateAge < 500) {
                let thresh = (i / snake.length) * 500;
                let cTime = stateAge - thresh;
                if (cTime > 0) {
                    ctx.fillStyle = COLORS.food; // red
                } else {
                    ctx.fillStyle = isHead ? COLORS.head : (i % 2 === 0 ? COLORS.body1 : COLORS.body2);
                }
            } else if (stateAge < 600) {
                ctx.fillStyle = '#ffffff';
            } else {
                let prog = Math.min(1, (stateAge - 600) / 200);
                let r = Math.floor(255 - prog * (255 - 68));
                let g = Math.floor(255 - prog * (255 - 68));
                let b = Math.floor(255 - prog * (255 - 68));
                ctx.fillStyle = `rgb(${r},${g},${b})`;
            }
        } else if (state === 'GAME_OVER') {
            ctx.fillStyle = COLORS.dead;
        } else {
            ctx.fillStyle = isHead ? COLORS.head : (i % 2 === 0 ? COLORS.body1 : COLORS.body2);
            ctx.globalAlpha = alpha;
        }
        
        roundRect(ctx, px, py, 27, 27, 5);
        ctx.globalAlpha = 1;
        
        if (isHead && state !== 'GAME_OVER' && stateAge < 500) { // Keep eyes until dying fade
            ctx.fillStyle = '#fff';
            let ex1, ey1, ex2, ey2;
            let inset = 3;
            if (headDir.x === 1) { ex1 = px+27-5-inset; ey1 = py+inset; ex2 = px+27-5-inset; ey2 = py+27-5-inset; }
            else if (headDir.x === -1) { ex1 = px+inset; ey1 = py+inset; ex2 = px+inset; ey2 = py+27-5-inset; }
            else if (headDir.y === 1) { ex1 = px+inset; ey1 = py+27-5-inset; ex2 = px+27-5-inset; ey2 = py+27-5-inset; }
            else { ex1 = px+inset; ey1 = py+inset; ex2 = px+27-5-inset; ey2 = py+inset; }
            
            roundRect(ctx, ex1, ey1, 5, 5, 2);
            roundRect(ctx, ex2, ey2, 5, 5, 2);
            
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(ex1+1 + headDir.x, ey1+1 + headDir.y, 2, 2);
            ctx.fillRect(ex2+1 + headDir.x, ey2+1 + headDir.y, 2, 2);
        }
    }
    
    // Overlays
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    if (state === 'TITLE') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(X_OFF, Y_OFF, COLS*CELL_SIZE, ROWS*CELL_SIZE);
        
        ctx.fillStyle = COLORS.head;
        ctx.font = 'bold 48px monospace';
        ctx.fillText('SNAKE', canvas.width/2, 250);
        
        let op = 0.3 + 0.7 * (Math.sin(stateAge/1000 * Math.PI) + 1)/2;
        ctx.fillStyle = `rgba(136,136,136,${op})`;
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter', canvas.width/2, 400);
        
        ctx.fillStyle = COLORS.textDim;
        ctx.font = '15px monospace';
        ctx.fillText(`Best: ${highScore}`, canvas.width/2, 440);
    } else if (state === 'COUNTDOWN') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(X_OFF, Y_OFF, COLS*CELL_SIZE, ROWS*CELL_SIZE);
        
        let text = '';
        let phaseT = 0;
        if (stateAge < 650) { text = '3'; phaseT = stateAge/650; }
        else if (stateAge < 1300) { text = '2'; phaseT = (stateAge-650)/650; }
        else if (stateAge < 1950) { text = '1'; phaseT = (stateAge-1300)/650; }
        else { text = 'GO!'; phaseT = (stateAge-1950)/450; }
        
        let sc = 1.2 - 0.2 * phaseT;
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(sc, sc);
        ctx.fillStyle = text === 'GO!' ? COLORS.head : COLORS.text;
        ctx.font = '60px monospace';
        ctx.fillText(text, 0, 0);
        ctx.restore();
    } else if (state === 'PAUSED') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(X_OFF, Y_OFF, COLS*CELL_SIZE, ROWS*CELL_SIZE);
        
        ctx.fillStyle = COLORS.text;
        ctx.font = '36px monospace';
        ctx.fillText('PAUSED', canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = COLORS.textDim;
        ctx.font = '14px monospace';
        ctx.fillText('P to resume', canvas.width/2, canvas.height/2 + 20);
    } else if (state === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(X_OFF, Y_OFF, COLS*CELL_SIZE, ROWS*CELL_SIZE);
        
        ctx.fillStyle = COLORS.food;
        ctx.font = '38px monospace';
        ctx.fillText('GAME OVER', canvas.width/2, 270);
        
        ctx.fillStyle = COLORS.text;
        ctx.font = '22px monospace';
        ctx.fillText(`Score: ${score}`, canvas.width/2, 320);
        
        if (newBest) {
            let op = 0.5 + 0.5 * (Math.sin(stateAge/500 * Math.PI) + 1)/2;
            ctx.fillStyle = `rgba(255, 215, 64, ${op})`;
            ctx.font = '16px monospace';
            ctx.fillText('NEW BEST!', canvas.width/2, 350);
        }
        
        ctx.fillStyle = COLORS.textDim;
        ctx.font = '14px monospace';
        ctx.fillText(`Length: ${snake.length}`, canvas.width/2, 380);
        
        if (Math.floor(stateAge / 250) % 2 === 0) {
            ctx.fillStyle = '#666666';
            ctx.font = '14px monospace';
            ctx.fillText('Enter to play again', canvas.width/2, 430);
        }
    }
}

function loop(t) {
    if (!lastFrame) lastFrame = t;
    let dt = t - lastFrame;
    lastFrame = t;
    dt = Math.min(dt, 500); // Tab switch protection
    
    stateAge += dt;
    
    if (state === 'TITLE') {
        if (demoRespawnTimer > 0) {
            demoRespawnTimer -= dt;
            if (demoRespawnTimer <= 0) {
                initGame(true);
            }
        } else {
            timeAccum += dt;
            while(timeAccum >= 150) { // fixed demo speed
                tickDemo();
                timeAccum -= 150;
            }
        }
        render(ctx, timeAccum / 150, dt);
    } else if (state === 'COUNTDOWN') {
        if (stateAge >= 2400) {
            state = 'PLAYING';
            stateAge = 0;
            timeAccum = 0;
        }
        render(ctx, 1, dt);
    } else if (state === 'PLAYING') {
        if (bonus) {
            bonusRemaining -= dt;
            if (bonusRemaining <= 0) bonus = null;
        }
        
        timeAccum += dt;
        let pLimit = 0;
        while(timeAccum >= tickInterval && pLimit < 2) {
            processTick();
            timeAccum -= tickInterval;
            pLimit++;
        }
        if (timeAccum >= tickInterval) timeAccum = tickInterval - 1; // Hard cap
        
        render(ctx, timeAccum / tickInterval, dt);
    } else if (state === 'DYING') {
        if (stateAge >= 800) {
            state = 'GAME_OVER';
            stateAge = 0;
        }
        render(ctx, 1, dt);
    } else {
        render(ctx, 1, dt);
    }
    
    requestAnimationFrame(loop);
}

// Start
initGame(true); // Run demo
requestAnimationFrame(loop);

</script>
