<!--
  GAME:      Snake
  RUN:       r1-opus
  BUILDER:   openai/gpt-5.4-mini
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<style>
  html,body{margin:0;width:100%;height:100%;background:#0a0a0a;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;background:#0a0a0a;image-rendering:pixelated;}
</style>
</head>
<body>
<canvas id="game" width="660" height="700"></canvas>
<script>
(()=>{
const CW=660, CH=700, HUDH=40, ORGX=20, ORGY=40, CELL=31, GRID=20, PLAY=620;
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
const LSKEY='snake_best';
let keys=Object.create(null), dirQueue=[], state='TITLE', last=performance.now(), acc=0, tickInterval=1000/7;
let snake=[], prevSnake=[], dir={x:1,y:0}, nextDir={x:1,y:0}, growth=0, score=0, best=0, foodEaten=0, tickCount=0;
let food=null, bonus=null, bonusMs=0, pauseWas='PLAYING', countdown=0, countdownPhase=0, dyingMs=0, deathPhase=0, titleDemo=null, titleRespawn=0, titleFood=null, titleGrowth=0, demoDir={x:1,y:0}, demoDead=false, demoTick=0;
let audioCtx=null, tickSfxLock=0, levelIndex=0, flashBest=false, countdownInputBuffered=true, lastTickConsumed=false;
try{best=+localStorage.getItem(LSKEY)||0;}catch(e){best=0;}
const DIRS={ArrowUp:{x:0,y:-1},KeyW:{x:0,y:-1},ArrowDown:{x:0,y:1},KeyS:{x:0,y:1},ArrowLeft:{x:-1,y:0},KeyA:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyD:{x:1,y:0}};
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function opp(a,b){return a.x===-b.x&&a.y===-b.y;}
function same(a,b){return a&&b&&a.x===b.x&&a.y===b.y;}
function copySnake(s){return s.map(p=>({x:p.x,y:p.y,px:p.x,py:p.y}));}
function initGame(){snake=[{x:10,y:10,px:10,py:10},{x:9,y:10,px:9,py:10},{x:8,y:10,px:8,py:8}]; prevSnake=copySnake(snake); dir={x:1,y:0}; nextDir={x:1,y:0}; growth=0; score=0; foodEaten=0; tickCount=0; dirQueue=[]; bonus=null; bonusMs=0; flashBest=false; levelIndex=0; tickInterval=1000/7; spawnFood(); countdown=2.95; countdownPhase=0; state='COUNTDOWN'; acc=0; }
function spawnFood(){const occ=new Set(snake.map(p=>p.x+','+p.y)); if(bonus)occ.add(bonus.x+','+bonus.y); const empty=[]; for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++)if(!occ.has(x+','+y))empty.push({x,y}); food=empty[Math.floor(Math.random()*empty.length)]||null;}
function spawnBonus(){if(!food)return; const occ=new Set(snake.map(p=>p.x+','+p.y)); occ.add(food.x+','+food.y); const empty=[]; for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){const k=x+','+y; if(!occ.has(k))empty.push({x,y});} bonus=empty[Math.floor(Math.random()*empty.length)]||null; bonusMs=8000;}
function updateBest(){if(score>best){best=score; flashBest=true; try{localStorage.setItem(LSKEY,String(best));}catch(e){} playHighScore();}}
function setLevel(){const pts=[0,50,100,180,280,420,600,800,1100]; const rates=[7,8,9,10,11,12,13,14,15]; let idx=0; for(let i=0;i<pts.length;i++) if(score>=pts[i]) idx=i; if(idx!==levelIndex){levelIndex=idx; tickInterval=1000/rates[idx]; playLevelUp();}}
function enqueueDir(d){if(dirQueue.length>=2)return; const ref=dirQueue.length?dirQueue[dirQueue.length-1]:nextDir; if(opp(d,ref))return; dirQueue.push(d);}
function onKey(e){if(e.repeat)return; const d=DIRS[e.code]; if(d){keys[e.code]=true; if(state==='TITLE'){} else if(state==='COUNTDOWN'||state==='PLAYING'){enqueueDir(d); if(state==='PLAYING')playTick();} return;} if(e.code==='Enter'){acquireAudio(); if(state==='TITLE'){initGame();} else if(state==='GAME_OVER'){state='TITLE'; titleDemo=null; titleRespawn=0; titleFood=null; demoDead=false;} else if(state==='COUNTDOWN'){} } if(e.code==='KeyP'||e.code==='Escape'){if(state==='PLAYING'){pauseWas='PLAYING'; state='PAUSED';} else if(state==='PAUSED'){state=pauseWas||'PLAYING';} }}
function onUp(e){keys[e.code]=false;}
addEventListener('keydown',onKey); addEventListener('keyup',onUp);
function acquireAudio(){if(audioCtx)return; try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){audioCtx=null;}}
function tone(seq){if(!audioCtx)return; const t=audioCtx.currentTime; for(const s of seq){const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=s.type||'square'; o.frequency.setValueAtTime(s.f0,t+(s.delay||0)/1000); if(s.f1!=null) o.frequency.exponentialRampToValueAtTime(s.f1,t+(s.delay||0+s.dur)/1000); g.gain.setValueAtTime(s.g||0.2,t+(s.delay||0)/1000); g.gain.exponentialRampToValueAtTime(0.001,t+(s.delay||0+s.dur)/1000); o.connect(g).connect(audioCtx.destination); o.start(t+(s.delay||0)/1000); o.stop(t+(s.delay||0+s.dur)/1000+0.02); }}
const sfx={eat:()=>tone([{f0:600,dur:55,g:0.2,type:'square'}]),bonus:()=>tone([{f0:600,dur:45,g:0.2,type:'square'},{f0:800,dur:45,g:0.2,delay:50,type:'square'},{f0:1050,dur:45,g:0.2,delay:100,type:'square'}]),tick:()=>tone([{f0:140,dur:12,g:0.06,type:'triangle'}]),level:()=>tone([{f0:350,f1:700,dur:200,g:0.18,type:'sawtooth'}]),death:()=>tone([{f0:200,f1:55,dur:450,g:0.3,type:'square'}]),hs:()=>tone([{f0:523,dur:65,g:0.2,type:'square'},{f0:659,dur:65,g:0.2,delay:70,type:'square'},{f0:784,dur:65,g:0.2,delay:140,type:'square'},{f0:1047,dur:65,g:0.2,delay:210,type:'square'}])};
function playTick(){if(!tickSfxLock){sfx.tick(); tickSfxLock=1; setTimeout(()=>tickSfxLock=0,15);}}
function playLevelUp(){sfx.level();}
function playHighScore(){sfx.hs();}
function playEat(){sfx.eat();}
function playBonus(){sfx.bonus();}
function playDeath(){sfx.death();}
function currentLevelRate(){return 1000/tickInterval;}
function validMove(candidate, head){return !opp(candidate, head);} 
function gameTick(){if(state!=='PLAYING')return; lastTickConsumed=false; if(dirQueue.length){const c=dirQueue.shift(); if(validMove(c,dir)){dir=c; nextDir=c; playTick();}} const head=snake[0]; const nx=head.x+dir.x, ny=head.y+dir.y; if(nx<0||nx>=GRID||ny<0||ny>=GRID){die(); return;} const willGrow=growth>0; const bodyLimit=snake.length-(willGrow?0:1); for(let i=0;i<bodyLimit;i++){if(snake[i].x===nx&&snake[i].y===ny){die(); return;}} prevSnake=snake.map(p=>({x:p.x,y:p.y,px:p.x,py:p.y})); snake.unshift({x:nx,y:ny,px:head.x,py:head.y}); if(food && nx===food.x && ny===food.y){score+=10; growth++; foodEaten++; updateBest(); setLevel(); playEat(); spawnFood(); if(foodEaten%5===0) spawnBonus(); }
 if(bonus && nx===bonus.x && ny===bonus.y){score+=50; updateBest(); playBonus(); bonus=null; bonusMs=0;}
 if(!willGrow){snake.pop();} else growth--; if(score>=best){} }
function die(){if(state==='DYING'||state==='GAME_OVER')return; state='DYING'; dyingMs=800; deathPhase=0; playDeath();}
function titleInit(){if(!titleDemo){titleDemo={snake:[{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10},{x:6,y:10}],dir:{x:1,y:0},growth:1,food:randEmpty([],null),dead:false}; titleFood=titleDemo.food;}}
function randEmpty(sn,forbid){const occ=new Set(sn.map(p=>p.x+','+p.y)); if(forbid)occ.add(forbid.x+','+forbid.y); const em=[]; for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++) if(!occ.has(x+','+y)) em.push({x,y}); return em[Math.floor(Math.random()*em.length)]||{x:0,y:0};}
function demoTick(dt){if(!titleDemo){titleInit(); return;} titleRespawn-=dt; if(titleRespawn>0)return; demoTick+=dt; if(!titleFood||same(titleDemo.food,titleFood)===false) titleFood=titleDemo.food; const head=titleDemo.snake[0]; const opts=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}]; const prioritize=[...opts].sort((a,b)=>Math.abs((head.x+a.x)-(titleFood.x))+Math.abs((head.y+a.y)-(titleFood.y)) - (Math.abs((head.x+b.x)-(titleFood.x))+Math.abs((head.y+b.y)-(titleFood.y)))); let choice=null; for(const d of prioritize){const nx=head.x+d.x,ny=head.y+d.y; if(nx<0||nx>=GRID||ny<0||ny>=GRID) continue; let hit=false; for(let i=0;i<titleDemo.snake.length-(titleDemo.growth?0:1);i++) if(titleDemo.snake[i].x===nx&&titleDemo.snake[i].y===ny){hit=true;break;} if(!hit){choice=d;break;}} if(!choice){titleDemo.dead=true; titleRespawn=1000; return;} titleDemo.dir=choice; const nx=head.x+choice.x, ny=head.y+choice.y; titleDemo.snake.unshift({x:nx,y:ny}); if(nx===titleFood.x&&ny===titleFood.y){titleDemo.growth++; titleFood=randEmpty(titleDemo.snake,null);} if(!titleDemo.growth) titleDemo.snake.pop(); else titleDemo.growth--; }
function processCountdown(dt){countdown-=dt; if(countdown<=0){state='PLAYING'; acc=0;}}
function processDying(dt){dyingMs-=dt; if(dyingMs<=0){state='GAME_OVER';}}
function update(dt){if(state==='PAUSED') return; if(state==='TITLE'){titleInit(); demoTick(dt); return;} if(state==='COUNTDOWN'){processCountdown(dt); return;} if(state==='PLAYING'){bonusMs=Math.max(0,bonusMs-dt); if(bonusMs===0) bonus=null; while(acc>=tickInterval){if(++tickCount>99999)break; gameTick(); acc-=tickInterval; if(state!=='PLAYING') break; } } if(state==='DYING'){processDying(dt);} }
function gridToPx(x,y){return [ORGX+x*CELL, ORGY+y*CELL];}
function drawRound(x,y,w,h,r,c){ctx.fillStyle=c; ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x,y,w,h,r); ctx.fill();} else {ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill();} }
function drawGrid(alpha=1){ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle='#111'; ctx.fillRect(ORGX,ORGY,PLAY,PLAY); ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1; for(let i=0;i<=GRID;i++){const p=ORGX+i*CELL+0.5; ctx.beginPath(); ctx.moveTo(p,ORGY); ctx.lineTo(p,ORGY+PLAY); ctx.stroke(); const q=ORGY+i*CELL+0.5; ctx.beginPath(); ctx.moveTo(ORGX,q); ctx.lineTo(ORGX+PLAY,q); ctx.stroke(); } ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.strokeRect(ORGX+1,ORGY+1,PLAY-2,PLAY-2); ctx.restore(); }
function drawHUD(){ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,CW,HUDH); ctx.fillStyle='#fff'; ctx.font='17px monospace'; ctx.textBaseline='alphabetic'; ctx.textAlign='left'; ctx.fillText('Score: '+score,24,27); ctx.textAlign='right'; ctx.fillStyle='#555'; ctx.fillText('Best: '+best,636,27); ctx.textAlign='center'; for(let i=0;i<9;i++){ctx.beginPath(); ctx.fillStyle=i<levelIndex+1?'#4caf50':'#2a2a2a'; ctx.arc(CW/2-48+i*12,27,3,0,Math.PI*2); ctx.fill();} ctx.fillStyle='#222'; ctx.fillRect(0,39,CW,1); }
function renderSnake(arr,alpha=1,dead=false,interp=0){for(let i=arr.length-1;i>=0;i--){const s=arr[i], prev=prevSnake[i]||s; let x=s.x, y=s.y; if(state==='PLAYING'&&interp<1){x=prev.x+(s.x-prev.x)*interp; y=prev.y+(s.y-prev.y)*interp;} const [px,py]=gridToPx(x,y); let col=i===0?(dead?'#444444':'#4caf50'):(i%2? '#388e3c':'#2e7d32'); if(state==='DYING'){if(deathPhase===0){const per=500/Math.max(1,arr.length); const t=clamp(1-(dyingMs/800),0,1); const idx=Math.floor((500-(dyingMs>300?dyingMs:300))/per); if(i<=idx) col='#f44336';} if(dyingMs<300&&dyingMs>=200) col='#ffffff'; if(dyingMs<200) col='#444444';}
    ctx.save(); ctx.globalAlpha=alpha*(i===arr.length-1&&state==='PLAYING'&&!growth?1:1); drawRound(px+2,py+2,27,27,5,col); ctx.restore(); if(i===0){const eyeCol='#ffffff', pupil='#1a1a1a'; const ex1=px+17, ex2=px+17, ey1=py+8, ey2=py+19; if(dir.x===1){drawRound(px+20,py+7,5,5,1,eyeCol); drawRound(px+20,py+18,5,5,1,eyeCol); ctx.fillStyle=pupil; ctx.fillRect(px+21,py+8,2,2); ctx.fillRect(px+21,py+19,2,2);} else if(dir.x===-1){drawRound(px+2,py+7,5,5,1,eyeCol); drawRound(px+2,py+18,5,5,1,eyeCol); ctx.fillStyle=pupil; ctx.fillRect(px+3,py+8,2,2); ctx.fillRect(px+3,py+19,2,2);} else if(dir.y===-1){drawRound(px+7,py+2,5,5,1,eyeCol); drawRound(px+18,py+2,5,5,1,eyeCol); ctx.fillStyle=pupil; ctx.fillRect(px+8,py+3,2,2); ctx.fillRect(px+19,py+3,2,2);} else {drawRound(px+7,py+20,5,5,1,eyeCol); drawRound(px+18,py+20,5,5,1,eyeCol); ctx.fillStyle=pupil; ctx.fillRect(px+8,py+21,2,2); ctx.fillRect(px+19,py+21,2,2);} }} }
function drawFood(){if(food){const [px,py]=gridToPx(food.x,food.y); ctx.save(); ctx.fillStyle='#f4433633'; ctx.beginPath(); ctx.arc(px+15.5,py+15.5,20,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#f44336'; ctx.beginPath(); ctx.arc(px+15.5,py+15.5,12,0,Math.PI*2); ctx.fill(); ctx.restore(); } if(bonus && bonusMs>0){const [px,py]=gridToPx(bonus.x,bonus.y); const blink = bonusMs<=2000 ? (Math.sin((8000-bonusMs)/1000*Math.PI*6)>0) : true; if(blink){ctx.save(); ctx.translate(px+15.5,py+15.5); ctx.rotate(Math.PI/4); ctx.fillStyle='#ffd740'; ctx.fillRect(-5,-5,10,10); ctx.restore(); } const r=14*(bonusMs/8000); ctx.strokeStyle='#ffd740'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(px+15.5,py+15.5,Math.max(0,r),0,Math.PI*2); ctx.stroke(); } }
function drawOverlay(text,sub){ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(ORGX,ORGY,PLAY,PLAY); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='36px monospace'; ctx.fillText(text,CW/2,ORGY+PLAY/2); if(sub){ctx.font='14px monospace'; ctx.fillStyle='#888'; ctx.fillText(sub,CW/2,ORGY+PLAY/2+30);} }
function render(){ctx.clearRect(0,0,CW,CH); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,CW,CH); const alpha=state==='TITLE'?0.3:1; drawGrid(alpha); drawHUD(); const interp=state==='PLAYING'&&tickInterval?clamp(acc/tickInterval,0,1):1; if(state==='TITLE'){renderSnake(titleDemo?titleDemo.snake:[{x:10,y:10},{x:9,y:10},{x:8,y:10}],0.9,false,1); if(titleFood){const [px,py]=gridToPx(titleFood.x,titleFood.y); ctx.save(); ctx.globalAlpha=0.9; ctx.fillStyle='#f4433633'; ctx.beginPath(); ctx.arc(px+15.5,py+15.5,20,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#f44336'; ctx.beginPath(); ctx.arc(px+15.5,py+15.5,12,0,Math.PI*2); ctx.fill(); ctx.restore(); } ctx.save(); ctx.fillStyle='#4caf50'; ctx.textAlign='center'; ctx.font='48px monospace'; ctx.fillText('SNAKE',CW/2,250); const pulse=0.3+0.7*(0.5+0.5*Math.sin(performance.now()/1000*Math.PI)); ctx.globalAlpha=pulse; ctx.font='18px monospace'; ctx.fillStyle='#888'; ctx.fillText('Press Enter',CW/2,400); ctx.globalAlpha=1; ctx.font='15px monospace'; ctx.fillStyle='#555'; ctx.fillText('Best: '+best,CW/2,440); ctx.restore(); }
 else if(state==='COUNTDOWN'){drawFood(); renderSnake(snake,false,false,1); const seq=[['3',2.95],['2',2.30],['1',1.65],['GO!',1.00]]; let txt='3'; let color='#fff'; let scale=1.0; const t=2.95-countdown; if(t<0.65){txt='3'; scale=1.2-(t/0.65)*0.2;} else if(t<1.3){txt='2'; scale=1.2-((t-0.65)/0.65)*0.2;} else if(t<1.95){txt='1'; scale=1.2-((t-1.3)/0.65)*0.2;} else {txt='GO!'; color='#4caf50'; scale=1.2-((t-1.95)/0.45)*0.2;} ctx.fillStyle=color; ctx.font=`${Math.round(60*scale)}px monospace`; ctx.textAlign='center'; ctx.fillText(txt,CW/2,ORGY+PLAY/2+20); }
 else { const dead=state==='GAME_OVER'||state==='DYING'; renderSnake(snake,1,dead,interp); if(state!=='GAME_OVER') drawFood(); if(state==='PAUSED') drawOverlay('PAUSED','P to resume'); if(state==='GAME_OVER'){ctx.save(); ctx.textAlign='center'; ctx.font='38px monospace'; ctx.fillStyle='#f44336'; ctx.fillText('GAME OVER',CW/2,270); ctx.font='22px monospace'; ctx.fillStyle='#fff'; ctx.fillText('Score: '+score,CW/2,320); if(score>=best){ctx.font='16px monospace'; ctx.fillStyle='#ffd740'; ctx.globalAlpha=0.5+0.5*Math.sin(performance.now()/500*Math.PI); ctx.fillText('NEW BEST!',CW/2,350); ctx.globalAlpha=1;} ctx.font='14px monospace'; ctx.fillStyle='#888'; ctx.fillText('Length: '+snake.length,CW/2,380); if(Math.floor(performance.now()/250)%2===0){ctx.font='14px monospace'; ctx.fillStyle='#666'; ctx.fillText('Enter to play again',CW/2,430);} ctx.restore(); } if(state==='DYING'){ctx.save(); ctx.fillStyle='rgba(0,0,0,0.0)'; ctx.restore(); }} }
function loop(now){let dt=Math.min(500,now-last); last=now; if(state!=='PAUSED') acc+=dt; if(state==='PLAYING'){let iter=0; while(acc>=tickInterval&&iter<2){gameTick(); acc-=tickInterval; iter++; if(state!=='PLAYING') break;} } else if(state==='COUNTDOWN'){update(dt);} else if(state==='DYING'){update(dt);} else if(state==='TITLE'){update(dt);} if(state==='PAUSED'){/* freeze timers */} if(state==='GAME_OVER'){ } if(state==='TITLE'&& !titleDemo) titleInit(); if(state==='COUNTDOWN' && countdown===2.95 && acc===0){} render(); requestAnimationFrame(loop);}
initGame(); state='TITLE'; titleInit(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
