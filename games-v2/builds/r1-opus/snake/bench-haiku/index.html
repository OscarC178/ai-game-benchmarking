<!--
  GAME:      Snake
  RUN:       r1-opus
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #0a0a0a; display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="snake" width="660" height="700"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('snake');
    const ctx = canvas.getContext('2d');
    const WIDTH = 660, HEIGHT = 700;
    const GRID_WIDTH = 20, GRID_HEIGHT = 20;
    const CELL_SIZE = 31;
    const AREA_OFFSET_X = 20, AREA_OFFSET_Y = 40;
    const PLAY_WIDTH = GRID_WIDTH * CELL_SIZE, PLAY_HEIGHT = GRID_HEIGHT * CELL_SIZE;
    
    const STATES = { TITLE: 0, COUNTDOWN: 1, PLAYING: 2, PAUSED: 3, DYING: 4, GAME_OVER: 5 };
    const DIRS = { UP: [0, -1], DOWN: [0, 1], LEFT: [-1, 0], RIGHT: [1, 0] };
    const LEVELS = [[0, 7], [50, 8], [100, 9], [180, 10], [280, 11], [420, 12], [600, 13], [800, 14], [1100, 15]];
    
    let state = STATES.TITLE;
    let score = 0, bestScore = parseInt(localStorage.getItem('snake_best') || '0');
    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let dir = DIRS.RIGHT, nextDir = DIRS.RIGHT;
    let dirQueue = [];
    let food = null, bonus = null;
    let foodEaten = 0, growthPending = 0;
    let bonusTimer = 0;
    let accumulator = 0, tickInterval = 143;
    let lastTime = 0, frameCount = 0;
    let dyingPhase = 0, dyingDuration = 800;
    let countdownValue = 3, countdownTime = 0;
    let pausedFlag = false;
    let demoSnake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
    let demoDir = DIRS.RIGHT, demoFood = {x: 15, y: 10};
    let demoTime = 0;
    let audioCtx = null;
    let keys = {};
    
    ['w', 's', 'a', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'enter', 'p', 'escape'].forEach(k => keys[k] = false);
    
    document.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k in keys) keys[k] = true;
      
      if (state === STATES.TITLE && k === 'enter') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startCountdown();
      }
    });
    
    document.addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      if (k in keys) keys[k] = false;
    });
    
    function playSound(freq, duration, gain = 0.2, endFreq = null) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, now);
      if (endFreq) osc.frequency.linearRampToValueAtTime(endFreq, now + duration);
      gainNode.gain.setValueAtTime(gain, now);
      gainNode.gain.linearRampToValueAtTime(0, now + duration);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }
    
    function getEmptyCell() {
      const occupied = new Set();
      snake.forEach(s => occupied.add(s.x + ',' + s.y));
      if (food) occupied.add(food.x + ',' + food.y);
      if (bonus) occupied.add(bonus.x + ',' + bonus.y);
      const empty = [];
      for (let x = 0; x < GRID_WIDTH; x++) {
        for (let y = 0; y < GRID_HEIGHT; y++) {
          if (!occupied.has(x + ',' + y)) empty.push({x, y});
        }
      }
      return empty[Math.floor(Math.random() * empty.length)] || {x: 0, y: 0};
    }
    
    function spawnFood() {
      food = getEmptyCell();
      playSound(600, 0.055);
    }
    
    function spawnBonus() {
      bonus = getEmptyCell();
      bonusTimer = 8000;
      playSound(600, 0.045);
      playSound(800, 0.045);
      playSound(1050, 0.045);
    }
    
    function getTicks() {
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (score >= LEVELS[i][0]) return LEVELS[i][1];
      }
      return 7;
    }
    
    function updateTickInterval() {
      const ticks = getTicks();
      tickInterval = 1000 / ticks;
    }
    
    function startCountdown() {
      state = STATES.COUNTDOWN;
      countdownValue = 3;
      countdownTime = 0;
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      dir = DIRS.RIGHT;
      nextDir = DIRS.RIGHT;
      dirQueue = [];
      spawnFood();
      bonus = null;
      bonusTimer = 0;
      growthPending = 0;
      foodEaten = 0;
    }
    
    function startPlaying() {
      state = STATES.PLAYING;
      pausedFlag = false;
    }
    
    function gameTick() {
      if (dirQueue.length > 0) {
        const candidate = dirQueue.shift();
        if (!(candidate[0] === -dir[0] && candidate[1] === -dir[1])) {
          dir = candidate;
        }
      }
      
      const newHead = {x: snake[0].x + dir[0], y: snake[0].y + dir[1]};
      
      if (newHead.x < 0 || newHead.x >= GRID_WIDTH || newHead.y < 0 || newHead.y >= GRID_HEIGHT) {
        state = STATES.DYING;
        dyingPhase = 0;
        playSound(200, 0.45, 0.3, 55);
        return;
      }
      
      for (let i = 0; i < snake.length; i++) {
        if (i === snake.length - 1 && growthPending === 0) continue;
        if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
          state = STATES.DYING;
          dyingPhase = 0;
          playSound(200, 0.45, 0.3, 55);
          return;
        }
      }
      
      if (food && newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        foodEaten++;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('snake_best', bestScore);
          playSound(523, 0.065);
          playSound(659, 0.065);
          playSound(784, 0.065);
          playSound(1047, 0.065);
        } else {
          playSound(600, 0.055);
        }
        growthPending++;
        if (foodEaten % 5 === 0) spawnBonus();
        spawnFood();
        updateTickInterval();
      }
      
      if (bonus && newHead.x === bonus.x && newHead.y === bonus.y) {
        score += 50;
        bonus = null;
        bonusTimer = 0;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('snake_best', bestScore);
        }
        updateTickInterval();
        playSound(800, 0.045);
      }
      
      snake.unshift(newHead);
      if (growthPending > 0) {
        growthPending--;
      } else {
        snake.pop();
      }
    }
    
    function demoTick() {
      const h = demoSnake[0];
      let bestDir = demoDir;
      let minDist = Infinity;
      
      for (const d of Object.values(DIRS)) {
        if (d[0] === -demoDir[0] && d[1] === -demoDir[1]) continue;
        const nh = {x: h.x + d[0], y: h.y + d[1]};
        if (nh.x < 0 || nh.x >= GRID_WIDTH || nh.y < 0 || nh.y >= GRID_HEIGHT) continue;
        let hit = false;
        for (const s of demoSnake) {
          if (s.x === nh.x && s.y === nh.y) hit = true;
        }
        if (hit) continue;
        const dist = Math.abs(nh.x - demoFood.x) + Math.abs(nh.y - demoFood.y);
        if (dist < minDist) {
          minDist = dist;
          bestDir = d;
        }
      }
      
      demoDir = bestDir;
      const nh = {x: h.x + demoDir[0], y: h.y + demoDir[1]};
      
      if (nh.x < 0 || nh.x >= GRID_WIDTH || nh.y < 0 || nh.y >= GRID_HEIGHT) {
        demoSnake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
        demoDir = DIRS.RIGHT;
        demoTime = 0;
        return;
      }
      
      let selfHit = false;
      for (const s of demoSnake) {
        if (s.x === nh.x && s.y === nh.y) selfHit = true;
      }
      if (selfHit) {
        demoSnake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
        demoDir = DIRS.RIGHT;
        demoTime = 0;
        return;
      }
      
      demoSnake.unshift(nh);
      if (nh.x === demoFood.x && nh.y === demoFood.y) {
        demoFood = getEmptyCell();
      } else {
        demoSnake.pop();
      }
    }
    
    function renderSegment(x, y, color, isHead = false) {
      const px = x * CELL_SIZE + AREA_OFFSET_X + 2;
      const py = y * CELL_SIZE + AREA_OFFSET_Y + 2;
      const size = 27;
      const radius = 5;
      
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(px + radius, py);
      ctx.arcTo(px + size, py, px + size, py + size, radius);
      ctx.arcTo(px + size, py + size, px, py + size, radius);
      ctx.arcTo(px, py + size, px, py, radius);
      ctx.arcTo(px, py, px + size, py, radius);
      ctx.closePath();
      ctx.fill();
      
      if (isHead) {
        ctx.fillStyle = '#FFF';
        const eyeSize = 5;
        const eyeInset = 3;
        ctx.fillRect(px + 8, py + eyeInset, eyeSize, eyeSize);
        ctx.fillRect(px + size - 13, py + eyeInset, eyeSize, eyeSize);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(px + 9, py + eyeInset + 1, 2, 2);
        ctx.fillRect(px + size - 12, py + eyeInset + 1, 2, 2);
      }
    }
    
    function renderSnake(segments, showInterp = false, tickProgress = 0) {
      const colors = ['#4caf50', '#388e3c', '#2e7d32'];
      for (let i = 0; i < segments.length; i++) {
        const s = segments[i];
        let renderX = s.x, renderY = s.y;
        
        if (showInterp && i < segments.length - 1) {
          if (segments.length > 1) {
            const prev = segments[i];
            const curr = segments[i];
            renderX = prev.x + (curr.x - prev.x) * tickProgress;
            renderY = prev.y + (curr.y - prev.y) * tickProgress;
          }
        }
        
        renderSegment(renderX, renderY, i === 0 ? '#4caf50' : colors[i % colors.length], i === 0);
      }
    }
    
    function renderFood() {
      if (!food) return;
      const px = food.x * CELL_SIZE + AREA_OFFSET_X + CELL_SIZE / 2;
      const py = food.y * CELL_SIZE + AREA_OFFSET_Y + CELL_SIZE / 2;
      ctx.fillStyle = '#f4433633';
      ctx.beginPath();
      ctx.arc(px, py, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.arc(px, py, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function renderBonus() {
      if (!bonus) return;
      const px = bonus.x * CELL_SIZE + AREA_OFFSET_X + CELL_SIZE / 2;
      const py = bonus.y * CELL_SIZE + AREA_OFFSET_Y + CELL_SIZE / 2;
      
      const ringRadius = 14 * (1 - (8000 - bonusTimer) / 8000);
      ctx.strokeStyle = '#ffd740';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(px, py, Math.max(0, ringRadius), 0, Math.PI * 2);
      ctx.stroke();
      
      if (bonusTimer < 2000 && Math.floor((8000 - bonusTimer) / 167) % 2 === 0) return;
      
      ctx.fillStyle = '#ffd740';
      ctx.beginPath();
      ctx.moveTo(px + 10, py);
      ctx.lineTo(px, py + 10);
      ctx.lineTo(px - 10, py);
      ctx.lineTo(px, py - 10);
      ctx.closePath();
      ctx.fill();
    }
    
    function renderGrid() {
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      for (let x = 0; x <= GRID_WIDTH; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL_SIZE + AREA_OFFSET_X, AREA_OFFSET_Y);
        ctx.lineTo(x * CELL_SIZE + AREA_OFFSET_X, AREA_OFFSET_Y + PLAY_HEIGHT);
        ctx.stroke();
      }
      for (let y = 0; y <= GRID_HEIGHT; y++) {
        ctx.beginPath();
        ctx.moveTo(AREA_OFFSET_X, y * CELL_SIZE + AREA_OFFSET_Y);
        ctx.lineTo(AREA_OFFSET_X + PLAY_WIDTH, y * CELL_SIZE + AREA_OFFSET_Y);
        ctx.stroke();
      }
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 2;
      ctx.strokeRect(AREA_OFFSET_X, AREA_OFFSET_Y, PLAY_WIDTH, PLAY_HEIGHT);
    }
    
    function renderHUD() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, WIDTH, AREA_OFFSET_Y);
      ctx.fillStyle = '#222222';
      ctx.fillRect(0, AREA_OFFSET_Y - 1, WIDTH, 1);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '17px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 24, 27);
      ctx.textAlign = 'right';
      ctx.fillText('Best: ' + bestScore, WIDTH - 24, 27);
      
      const ticks = getTicks();
      ctx.fillStyle = '#2a2a2a';
      for (let i = 0; i < 9; i++) {
        ctx.beginPath();
        ctx.arc(WIDTH / 2 - 48 + i * 12, 27, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#4caf50';
      const levelIdx = LEVELS.findIndex(l => l[1] === ticks) || 0;
      for (let i = 0; i <= levelIdx; i++) {
        ctx.beginPath();
        ctx.arc(WIDTH / 2 - 48 + i * 12, 27, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function render(tickProgress = 0) {
      ctx.fillStyle = '#111111';
      ctx.fillRect(AREA_OFFSET_X, AREA_OFFSET_Y, PLAY_WIDTH, PLAY_HEIGHT);
      
      renderGrid();
      renderHUD();
      
      if (state === STATES.TITLE) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        renderGrid();
        renderSnake(demoSnake);
        ctx.globalAlpha = 1;
        ctx.restore();
        
        ctx.fillStyle = '#4caf50';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SNAKE', WIDTH / 2, 250);
        
        const pulseAlpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frameCount / 30 * Math.PI));
        ctx.fillStyle = 'rgba(136, 136, 136, ' + pulseAlpha + ')';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter', WIDTH / 2, 400);
        
        ctx.fillStyle = '#555555';
        ctx.font = '15px monospace';
        ctx.fillText('Best: ' + bestScore, WIDTH / 2, 440);
      }
      
      if (state === STATES.COUNTDOWN) {
        renderSnake(snake);
        renderFood();
        
        const msgIndex = Math.floor(countdownTime / 650);
        if (msgIndex < 3) {
          const messages = ['3', '2', '1'];
          const scale = 1 + 0.2 * (1 - (countdownTime % 650) / 650);
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 60px monospace';
          ctx.textAlign = 'center';
          ctx.save();
          ctx.scale(scale, scale);
          ctx.fillText(messages[msgIndex], WIDTH / 2 / scale, (HEIGHT / 2) / scale);
          ctx.restore();
        } else if (countdownTime >= 1950) {
          ctx.fillStyle = '#4caf50';
          ctx.font = 'bold 60px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('GO!', WIDTH / 2, HEIGHT / 2);
        }
      }
      
      if (state === STATES.PLAYING) {
        renderSnake(snake);
        renderFood();
        renderBonus();
      }
      
      if (state === STATES.PAUSED) {
        renderSnake(snake);
        renderFood();
        if (bonus) renderBonus();
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(AREA_OFFSET_X, AREA_OFFSET_Y, PLAY_WIDTH, PLAY_HEIGHT);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
        
        ctx.fillStyle = '#888888';
        ctx.font = '14px monospace';
        ctx.fillText('P to resume', WIDTH / 2, HEIGHT / 2 + 40);
      }
      
      if (state === STATES.DYING) {
        const segCount = snake.length;
        const colorPhase = dyingPhase / 500;
        
        for (let i = 0; i < snake.length; i++) {
          let color;
          const segPhase = (i / segCount);
          if (colorPhase < segPhase) {
            color = i === 0 ? '#4caf50' : ['#388e3c', '#2e7d32'][i % 2];
          } else {
            color = '#f44336';
          }
          renderSegment(snake[i].x, snake[i].y, color, i === 0);
        }
        
        if (dyingPhase >= 500 && dyingPhase < 600) {
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.fillRect(AREA_OFFSET_X, AREA_OFFSET_Y, PLAY_WIDTH, PLAY_HEIGHT);
        }
        
        if (dyingPhase >= 600) {
          const fadePhase = (dyingPhase - 600) / 200;
          const greyVal = Math.floor(68 + (fade Phase) * 20);
          for (let i = 0; i < snake.length; i++) {
            renderSegment(snake[i].x, snake[i].y, 'rgb(' + greyVal + ',' + greyVal + ',' + greyVal + ')', false);
          }
        }
      }
      
      if (state === STATES.GAME_OVER) {
        renderSnake(snake);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(AREA_OFFSET_X, AREA_OFFSET_Y, PLAY_WIDTH, PLAY_HEIGHT);
        
        ctx.fillStyle = '#f44336';
        ctx.font = '38px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 270);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '22px monospace';
        ctx.fillText('Score: ' + score, WIDTH / 2, 320);
        
        if (score === bestScore && score > 0) {
          const newBestAlpha = 0.5 + 0.5 * Math.sin(frameCount / 30 * Math.PI);
          ctx.fillStyle = 'rgba(255, 215, 64, ' + newBestAlpha + ')';
          ctx.font = '16px monospace';
          ctx.fillText('NEW BEST!', WIDTH / 2, 350);
        }
        
        ctx.fillStyle = '#888888';
        ctx.font = '14px monospace';
        ctx.fillText('Length: ' + snake.length, WIDTH / 2, 380);
        
        ctx.fillStyle = frameCount % 60 < 30 ? '#666666' : '#444444';
        ctx.font = '14px monospace';
        ctx.fillText('Enter to play again', WIDTH / 2, 430);
      }
    }
    
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.5) * 1000;
      lastTime = now;
      frameCount++;
      
      if (state === STATES.TITLE) {
        demoTime += dt;
        if (demoTime >= tickInterval) {
          demoTick();
          demoTime -= tickInterval;
        }
      }
      
      if (state === STATES.COUNTDOWN) {
        countdownTime += dt;
        
        const inputDirs = [];
        if (keys['w'] || keys['arrowup']) inputDirs.push(DIRS.UP);
        if (keys['s'] || keys['arrowdown']) inputDirs.push(DIRS.DOWN);
        if (keys['a'] || keys['arrowleft']) inputDirs.push(DIRS.LEFT);
        if (keys['d'] || keys['arrowright']) inputDirs.push(DIRS.RIGHT);
        
        inputDirs.forEach(d => {
          if (dirQueue.length < 2 && !(d[0] === -dir[0] && d[1] === -dir[1])) {
            if (dirQueue.length === 0 || !(d[0] === -dirQueue[dirQueue.length - 1][0] && d[1] === -dirQueue[dirQueue.length - 1][1])) {
              dirQueue.push(d);
            }
          }
        });
        
        if (countdownTime >= 2400) {
          startPlaying();
        }
        
        render();
      }
      
      if (state === STATES.PLAYING) {
        accumulator += dt;
        
        const inputDirs = [];
        if (keys['w'] || keys['arrowup']) inputDirs.push(DIRS.UP);
        if (keys['s'] || keys['arrowdown']) inputDirs.push(DIRS.DOWN);
        if (keys['a'] || keys['arrowleft']) inputDirs.push(DIRS.LEFT);
        if (keys['d'] || keys['arrowright']) inputDirs.push(DIRS.RIGHT);
        
        inputDirs.forEach(d => {
          if (dirQueue.length < 2 && !(d[0] === -dir[0] && d[1] === -dir[1])) {
            if (dirQueue.length === 0 || !(d[0] === -dirQueue[dirQueue.length - 1][0] && d[1] === -dirQueue[dirQueue.length - 1][1])) {
              dirQueue.push(d);
            }
          }
        });
        
        if (keys['p'] || keys['escape']) {
          pausedFlag = true;
          state = STATES.PAUSED;
          keys['p'] = false;
          keys['escape'] = false;
        }
        
        if (!pausedFlag) {
          if (bonusTimer > 0) bonusTimer -= dt;
          if (bonusTimer <= 0) bonus = null;
          
          let tickCount = 0;
          while (accumulator >= tickInterval && tickCount < 2) {
            gameTick();
            accumulator -= tickInterval;
            tickCount++;
          }
        }
        
        const tickProgress = accumulator / tickInterval;
        render(tickProgress);
      }
      
      if (state === STATES.PAUSED) {
        if (keys['p'] || keys['escape']) {
          state = STATES.PLAYING;
          keys['p'] = false;
          keys['escape'] = false;
        }
        render();
      }
      
      if (state === STATES.DYING) {
        dyingPhase += dt;
        if (dyingPhase >= dyingDuration) {
          state = STATES.GAME_OVER;
        }
        render();
      }
      
      if (state === STATES.GAME_OVER) {
        if (keys['enter']) {
          score = 0;
          snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
          state = STATES.TITLE;
          keys['enter'] = false;
        }
        render();
      }
      
      requestAnimationFrame(gameLoop);
    }
    
    spawnFood();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
