<!--
  GAME:      Breakout
  RUN:       r1-opus
  BUILDER:   openai/gpt-5.4-mini
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breakout</title>
<style>
  html,body{margin:0;height:100%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  canvas{display:block;background:#0d0d0d;cursor:none;}
</style>
</head>
<body>
<canvas id="c" width="780" height="600"></canvas>
<script>
(()=>{
const W=780,H=600,HUD=36,PLAYY=36,PLAYH=564;const CW=780,CH=600;
const P={y:564,h:12,baseW:104,minW:64,x:338,speed:500};
const B={r:7,base:320,inc:12,max:520};
const BR={w:64,h:18,gx:4,gy:4,cols:11,rows:8,x0:18,y0:62};
const ROWS=[['#e53935',7],['#f4511e',7],['#fb8c00',5],['#ffb300',5],['#fdd835',3],['#c0ca33',3],['#43a047',1],['#00897b',1]];
let canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let keys=Object.create(null),mouseX=null,last=performance.now(),acc=0,state='TITLE',dtCap=0.05;
let score=0,best=+localStorage.getItem('breakout_best')||0,lives=3,level=1,levelStartBonus=0,perfectTimer=0,flashTimer=0,gameOverBlink=0;
let paddle={x:P.x,w:P.baseW,flash:0,prevW:P.baseW,targetW:P.baseW};
let ball={x:0,y:0,vx:0,vy:0,speed:B.base,attached:true,launchBias:0,prevX:0,prevY:0};
let bricks=[],destroyable=0,cleared=0,lifeLostTimer=0,levelClearTimer=0,serveReady=1.2,serveFade=0,paused=false,pauseWas='PLAYING';
let particles=Array.from({length:80},()=>({a:false,x:0,y:0,vx:0,vy:0,c:'#fff',t:0,l:0}));
let audio=null;
function acq(){if(audio)return; try{audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){audio=null;}}
function tone(list){if(!audio)return; const t=audio.currentTime; list.forEach(s=>{const o=audio.createOscillator(),g=audio.createGain();o.type=s.type||'square';o.frequency.setValueAtTime(s.f0,t+(s.delay||0)/1000); if(s.f1!=null)o.frequency.exponentialRampToValueAtTime(s.f1,t+(s.delay||0+s.d)/1000); g.gain.setValueAtTime(s.g||0.2,t+(s.delay||0)/1000); g.gain.exponentialRampToValueAtTime(0.001,t+(s.delay||0+s.d)/1000); o.connect(g).connect(audio.destination); o.start(t+(s.delay||0)/1000); o.stop(t+(s.delay||0+s.d)/1000+0.03);});}
const S={paddle:()=>tone([{f0:440,d:40,g:0.25,type:'square'}]),wall:()=>tone([{f0:280,d:25,g:0.15,type:'square'}]),dmg:()=>tone([{f0:180,d:35,g:0.18,type:'triangle'}]),life:()=>tone([{f0:200,f1:80,d:350,g:0.3,type:'square'}]),clear:()=>tone([{f0:523,d:70,g:0.22,type:'square'},{f0:659,d:70,g:0.22,delay:70,type:'square'},{f0:784,d:70,g:0.22,delay:140,type:'square'},{f0:1047,d:70,g:0.22,delay:210,type:'square'}]),extra:()=>tone([{f0:880,d:80,g:0.2,type:'sine'},{f0:1100,d:80,g:0.2,delay:80,type:'sine'}]),brick:(row)=>tone([{f0:330+row*55,d:50,g:0.2,type:'square'}])};
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function rand(a,b){return a+Math.random()*(b-a);} 
function resetLevel(newLevel){level=newLevel; paddle.w=Math.max(P.minW,P.baseW-(level-1)*8); paddle.prevW=paddle.targetW=paddle.w; bricks=[]; destroyable=0; cleared=0; const reinf=level>=2?Math.min(3,level-1):0; const ind=level>=5? (level===5?3:5):0; const midInd=[]; for(let r=0;r<BR.rows;r++){for(let c=0;c<BR.cols;c++){const [col,pts]=ROWS[r]; const x=BR.x0+c*(BR.w+BR.gx), y=BR.y0+r*(BR.h+BR.gy); let hp=1, color=col, points=pts, destructible=true, special=''; if(r<reinf){hp=2;} if(level>=5 && r>=3 && r<=4 && midInd.length<ind && ((c===4)||(c===5)||(c===3)||(c===6)||(c===2))){ if(midInd.length<ind){hp=999; color='#616161'; points=0; destructible=false; special='ind'; midInd.push(1);} } if(hp!==999) destroyable++; bricks.push({alive:true,hp,color,points,x,y,w:BR.w,h:BR.h,destructible,special,baseColor:col,row:r,cracks:0}); }} attachBall(); serveReady=1.2; lifeLostTimer=0; levelClearTimer=0; flashTimer=0; perfectTimer=0;}
function attachBall(){ball.attached=true; ball.speed=B.base+(level-1)*20; ball.x=paddle.x+paddle.w/2; ball.y=paddle.y-ball.r; ball.vx=0; ball.vy=0; ball.launchBias=0;}
function launchBall(){if(!ball.attached)return; let ang=rand(65,115); if(keys['ArrowLeft']||keys['KeyA']) ang-=10; else if(keys['ArrowRight']||keys['KeyD']) ang+=10; else if(paddle.prevMove){ang += paddle.prevMove*10;} const rad=ang*Math.PI/180, s=ball.speed; ball.vx=Math.cos(rad)*s; ball.vy=-Math.sin(rad)*s; if(Math.abs(ball.vy)<s*0.25) ball.vy=-s*0.25; ball.attached=false;}
function startGame(){score=0;lives=3;level=1;levelStartBonus=0;gameOverBlink=0; resetLevel(1); state='SERVE'; paused=false;}
function spawnParticles(br){for(let i=0;i<8;i++){const p=particles.find(z=>!z.a); if(!p) return; p.a=true; p.x=br.x+br.w/2; p.y=br.y+br.h/2; p.vx=rand(-120,120); p.vy=rand(-180,-40); p.c=br.color; p.t=0; p.l=0.6; }}
function updateBest(){if(score>best){best=score; try{localStorage.setItem('breakout_best',best);}catch(e){} }}
function doPaddleHit(){paddle.flash=0.05; S.paddle(); ball.speed=Math.min(B.max,ball.speed+B.inc); const ratio=clamp((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2),-1,1); const ang=ratio*65*Math.PI/180; ball.vx=ball.speed*Math.sin(ang); ball.vy=-ball.speed*Math.cos(ang); if(Math.abs(ball.vy)<ball.speed*0.25) ball.vy=-ball.speed*0.25; ball.y=paddle.y-ball.r-0.1; ball.x=clamp(ball.x,paddle.x-ball.r,paddle.x+paddle.w+ball.r);} 
function loseLife(){state='LIFE_LOST'; lifeLostTimer=0.8; lives--; S.life(); if(lives<=0){state='GAME_OVER'; gameOverBlink=0; }}
function clearLevel(){state='LEVEL_CLEAR'; levelClearTimer=2.0; flashTimer=0.06; perfectTimer=1.5; S.clear(); if(lives===3 && score>=0){/*noop*/}} 
function buildBricksBackdrop(){const prev=ctx.globalAlpha; ctx.globalAlpha=0.4; drawBricks(); ctx.globalAlpha=prev; }
function drawBricks(){for(const b of bricks){if(!b.alive) continue; if(b.special==='ind'){ctx.fillStyle='#616161'; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill(); ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(b.x,b.y+b.h/2,b.w,1);} else {let col=b.color; if(b.hp>1){col=shade(col,b.hp===2?0.8:0.85);} ctx.fillStyle=col; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill(); if(b.hp>1){ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(b.x+8,b.y+8,b.w-16,b.h-16); ctx.strokeStyle='rgba(255,255,255,0.33)'; ctx.beginPath(); ctx.moveTo(b.x+ b.w*0.2,b.y); ctx.lineTo(b.x+b.w*0.8,b.y+b.h); ctx.stroke(); if(b.hp===3){ctx.beginPath(); ctx.moveTo(b.x,b.y+b.h*0.2); ctx.lineTo(b.x+b.w,b.y+b.h*0.8); ctx.stroke();}} }} }
function shade(hex,m){const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; const f=(x)=>Math.max(0,Math.min(255,Math.round(x*m))); return `rgb(${f(r)},${f(g)},${f(b)})`; }
function roundRect(x,y,w,h,r){ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();}
function ballRect(){return {x:ball.x-ball.r,y:ball.y-ball.r,w:ball.r*2,h:ball.r*2};}
function resolveBrickCollision(){let hits=[]; for(const b of bricks){if(!b.alive||!circleRectOverlap(ball,b)) continue; hits.push(b); if(hits.length>=3) break;} if(!hits.length) return false; let bouncedX=false,bouncedY=false; for(const b of hits){const bx=ball.x,by=ball.y; const nearestX=clamp(bx,b.x,b.x+b.w), nearestY=clamp(by,b.y,b.y+b.h); const dx=bx-nearestX, dy=by-nearestY; const ox=ball.r-Math.abs(dx), oy=ball.r-Math.abs(dy); if(ox<oy){ball.vx*=-1; bouncedX=true; ball.x += dx>0?ox:-ox; } else {ball.vy*=-1; bouncedY=true; ball.y += dy>0?oy:-oy; } if(b.hp===999) continue; b.hp--; if(b.hp<=0){b.alive=false; if(b.destructible){score+=b.points; cleared++; spawnParticles(b); updateBest(); S.brick(b.row); if(score>=200 && !extraGiven){extraGiven=true; lives=Math.min(5,lives+1); S.extra(); }} } else {S.dmg(); b.cracks=(b.cracks||0)+1; } }
 if(Math.abs(ball.vy)<ball.speed*0.2) ball.vy = -Math.sign(ball.vy||-1)*ball.speed*0.2; return true; }
function circleRectOverlap(ball,b){const nx=clamp(ball.x,b.x,b.x+b.w), ny=clamp(ball.y,b.y,b.y+b.h); const dx=ball.x-nx,dy=ball.y-ny; return dx*dx+dy*dy<=ball.r*ball.r; }
function resolvePaddle(){if(ball.vy<=0) return false; const prevBottom=ball.prevY+ball.r, curBottom=ball.y+ball.r; if(prevBottom<=paddle.y && curBottom>=paddle.y){ const t=(paddle.y-(ball.prevY+ball.r))/((ball.y-ball.prevY)||1); const cx=ball.prevX+(ball.x-ball.prevX)*t; if(cx+ball.r>=paddle.x && cx-ball.r<=paddle.x+paddle.w){ ball.x=cx; ball.y=paddle.y-ball.r; doPaddleHit(); return true; } } if(circleRectOverlap(ball,{x:paddle.x,y:paddle.y,w:paddle.w,h:paddle.h})){doPaddleHit(); return true;} return false; }
function updateParticles(dt){for(const p of particles){if(!p.a) continue; p.t+=dt; p.l-=dt; if(p.l<=0){p.a=false; continue;} p.vy+=400*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }}
function update(dt){if(state==='PAUSED') return; if(flashTimer>0) flashTimer-=dt; if(paddle.flash>0) paddle.flash-=dt; if(perfectTimer>0) perfectTimer-=dt; if(state==='TITLE'){titleUpdate(dt); return;} if(state==='SERVE'){serveReady-=dt; movePaddle(dt); attachBall(); if(keys['Space']){launchBall(); state='PLAYING';}} else if(state==='PLAYING'){movePaddle(dt); ball.prevX=ball.x; ball.prevY=ball.y; ball.x+=ball.vx*dt; ball.y+=ball.vy*dt; if(ball.x-ball.r<=0){ball.x=ball.r; ball.vx=Math.abs(ball.vx); S.wall();} if(ball.x+ball.r>=W){ball.x=W-ball.r; ball.vx=-Math.abs(ball.vx); S.wall();} if(ball.y-ball.r<=HUD){ball.y=HUD+ball.r; ball.vy=Math.abs(ball.vy); S.wall();} resolveBrickCollision(); resolvePaddle(); if(ball.y-ball.r>610){loseLife();} if(cleared>=destroyable && state==='PLAYING'){score+=100; perfectTimer=1.5; clearLevel(); updateBest();} if(levelClearTimer<=0 && state==='PLAYING'){ } } else if(state==='LIFE_LOST'){lifeLostTimer-=dt; movePaddle(dt); if(lifeLostTimer<=0){if(lives>0){state='SERVE'; attachBall(); ball.speed=B.base+(level-1)*20; serveReady=1.2;} else state='GAME_OVER'; }} else if(state==='LEVEL_CLEAR'){levelClearTimer-=dt; if(levelClearTimer<=0){level++; resetLevel(level); state='SERVE'; serveReady=1.2;}} else if(state==='GAME_OVER'){gameOverBlink+=dt; }
 updateParticles(dt);
 if(mouseX!=null && (state==='SERVE'||state==='PLAYING'||state==='TITLE')){paddle.x=clamp(mouseX-paddle.w/2,0,W-paddle.w);} }
function movePaddle(dt){let dx=0; if(keys['ArrowLeft']||keys['KeyA']) dx-=P.speed*dt; if(keys['ArrowRight']||keys['KeyD']) dx+=P.speed*dt; paddle.prevMove=dx<0?-1:dx>0?1:0; paddle.x=clamp(paddle.x+dx,0,W-paddle.w); if(mouseX!=null){paddle.x=clamp(mouseX-paddle.w/2,0,W-paddle.w);} }
function titleUpdate(dt){if(!titleBall){initTitle();} titleBounce(dt); }
let titleBall=null,titleBricks=[];
function initTitle(){titleBall={x:390,y:300,vx:180,vy:150}; titleBricks=bricksFromLevel(1); }
function bricksFromLevel(lv){const arr=[]; const reinf=lv>=2?Math.min(3,lv-1):0; for(let r=0;r<8;r++) for(let c=0;c<11;c++){const [col,pts]=ROWS[r]; arr.push({alive:true,hp:r<reinf?2:1,color:col,points:pts,x:BR.x0+c*68,y:BR.y0+r*22,w:64,h:18,row:r,destructible:true,special:''});} return arr; }
function titleBounce(dt){titleBall.x+=titleBall.vx*dt; titleBall.y+=titleBall.vy*dt; if(titleBall.x-titleBall.r<=0||titleBall.x+titleBall.r>=W) titleBall.vx*=-1; if(titleBall.y-titleBall.r<=HUD||titleBall.y+titleBall.r>=H) titleBall.vy*=-1; for(const b of titleBricks){if(!b.alive) continue; if(circleRectOverlap(titleBall,b)){b.alive=false; titleBall.vy*=-1; break;}} if(titleBricks.every(b=>!b.alive)){setTimeout(()=>{titleBricks=bricksFromLevel(1);},1000);} }
function render(){ctx.clearRect(0,0,W,H); ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,W,H); drawHUD(); if(state==='TITLE'){ctx.save(); ctx.globalAlpha=0.4; drawTitleField(); ctx.restore(); drawTitleText(); }
 else {drawField(); drawGame();}
 if(flashTimer>0){ctx.fillStyle='rgba(255,255,255,1)'; ctx.fillRect(0,0,W,H);} if(state==='PAUSED'){overlay('PAUSED','P to resume',0.6);} if(state==='GAME_OVER'){overlay('GAME OVER','',0.7); drawGameOver(); } if(state==='SERVE'&&serveReady>0){drawReady();} if(state==='LEVEL_CLEAR'){drawLevelClear();} if(perfectTimer>0&&state==='PLAYING'){ctx.save(); ctx.textAlign='center'; ctx.font='20px monospace'; ctx.fillStyle='#ffd740'; ctx.fillText('PERFECT!',W/2,200); ctx.restore();} }
function drawField(){ctx.fillStyle='#141414'; ctx.fillRect(0,HUD,W,PLAYH);}
function drawHUD(){ctx.fillStyle='#141414'; ctx.fillRect(0,0,W,HUD); ctx.fillStyle='#222'; ctx.fillRect(0,35,W,1); ctx.fillStyle='#fff'; ctx.font='17px monospace'; ctx.textAlign='left'; ctx.fillText('Score: '+score,16,24); ctx.fillStyle='#555'; ctx.fillText('Best: '+best,200,24); ctx.fillStyle='#aaa'; ctx.textAlign='right'; ctx.fillText('Lv '+level,750,24); ctx.fillStyle='#fff'; for(let i=0;i<Math.max(0,lives-1);i++){ctx.beginPath(); ctx.arc(500+i*16,14,5,0,Math.PI*2); ctx.fill();} }
function drawTitleField(){ctx.fillStyle='#141414'; ctx.fillRect(0,HUD,W,PLAYH); for(const b of titleBricks) if(b.alive){ctx.fillStyle=b.color; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill();} if(titleBall){ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(titleBall.x,titleBall.y,7,0,Math.PI*2); ctx.fill(); }}
function drawTitleText(){ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='52px monospace'; ctx.fillText('BREAKOUT',W/2,240); const pulse=0.3+0.7*(0.5+0.5*Math.sin(performance.now()/1000*Math.PI)); ctx.globalAlpha=pulse; ctx.font='20px monospace'; ctx.fillStyle='#888'; ctx.fillText('Press Enter',W/2,430); ctx.globalAlpha=1; ctx.font='15px monospace'; ctx.fillStyle='#555'; ctx.fillText('Best: '+best,W/2,470); ctx.font='13px monospace'; ctx.fillStyle='#333'; ctx.fillText('← → Move | Space Launch | P Pause',W/2,500); ctx.restore(); ctx.save(); const y=520; const items=[['#e53935',7],['#fb8c00',5],['#fdd835',3],['#43a047',1]]; let x=170; for(const [c,p] of items){ctx.fillStyle=c; ctx.fillRect(x,y,18,18); ctx.fillStyle='#aaa'; ctx.font='13px monospace'; ctx.textAlign='left'; ctx.fillText(String(p),x+26,y+14); x+=140;} ctx.restore(); }
function drawGame(){const balls=[]; if(ball.attached){balls.push({x:ball.x,y:ball.y,a:1,r:7});} else {balls.push({x:ball.x,y:ball.y,a:1,r:7}); for(let i=0;i<6;i++){balls.push({x:ball.x-ball.vx*(i+1)*0.016,y:ball.y-ball.vy*(i+1)*0.016,a:[0.4,0.3,0.22,0.15,0.1,0.05][i],r:[7,6.5,6,5.5,5,4.5][i]});}} for(let i=balls.length-1;i>=0;i--){const b=balls[i]; ctx.save(); ctx.globalAlpha=b.a; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); ctx.restore();}
 // particles
 for(const p of particles){if(!p.a) continue; ctx.save(); ctx.globalAlpha=clamp(p.l/0.6,0,1); ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,3,3); ctx.restore();}
 // paddle
 const flash=paddle.flash>0?'#4fc3f7':'#fff'; ctx.fillStyle=flash; roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6); ctx.fill(); if(state==='SERVE'&&serveReady<=0){ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.moveTo(ball.x,ball.y-16); ctx.lineTo(ball.x+Math.max(-12,Math.min(12,(keys['ArrowLeft']||keys['KeyA']?-8:(keys['ArrowRight']||keys['KeyD']?8:0)))),ball.y-24); ctx.stroke();}
 drawBricks(); if(state==='SERVE'){ctx.save(); ctx.globalAlpha=clamp(serveReady/1.2,0,1); ctx.textAlign='center'; ctx.font='36px monospace'; ctx.fillStyle='#fff'; ctx.fillText('READY',W/2,240); ctx.restore(); }
 if(state==='PAUSED'){ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,HUD,W,PLAYH); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='36px monospace'; ctx.fillText('PAUSED',W/2,290); ctx.font='14px monospace'; ctx.fillStyle='#888'; ctx.fillText('P to resume',W/2,318);} }
function overlay(title,sub,alpha){ctx.fillStyle=`rgba(0,0,0,${alpha})`; ctx.fillRect(0,HUD,W,PLAYH); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='44px monospace'; ctx.fillText(title,W/2,240);}
function drawReady(){ctx.save(); ctx.globalAlpha=clamp(serveReady/1.2,0,1); ctx.textAlign='center'; ctx.font='36px monospace'; ctx.fillStyle='#fff'; ctx.fillText('READY',W/2,240); ctx.restore(); }
function drawLevelClear(){ctx.save(); ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center'; ctx.font='32px monospace'; ctx.fillStyle='#fff'; ctx.fillText('LEVEL '+level+' CLEAR!',W/2,250); ctx.font='18px monospace'; ctx.fillText('Score: '+score,W/2,285); if(perfectTimer>0){ctx.fillStyle='#ffd740'; ctx.fillText('PERFECT!',W/2,315);} ctx.restore(); }
function drawGameOver(){ctx.save(); ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,HUD,W,PLAYH); ctx.textAlign='center'; ctx.font='44px monospace'; ctx.fillStyle='#e53935'; ctx.fillText('GAME OVER',W/2,240); ctx.font='26px monospace'; ctx.fillStyle='#fff'; ctx.fillText('Score: '+score,W/2,295); if(score>=best){ctx.font='18px monospace'; ctx.fillStyle='#ffb300'; ctx.globalAlpha=0.5+0.5*Math.sin(performance.now()/500*Math.PI); ctx.fillText('NEW HIGH SCORE!',W/2,330); ctx.globalAlpha=1;} ctx.font='16px monospace'; ctx.fillStyle='#888'; ctx.fillText('Level reached: '+level,W/2,360); if(Math.floor(performance.now()/250)%2===0){ctx.font='16px monospace'; ctx.fillStyle='#666'; ctx.fillText('Enter to play again',W/2,420);} ctx.restore(); }
addEventListener('keydown',e=>{keys[e.code]=true; if(['ArrowLeft','ArrowRight','KeyA','KeyD','Space','Enter','KeyP','Escape'].includes(e.code)) e.preventDefault(); acq(); if(state==='TITLE'&&e.code==='Enter') startGame(); if(state==='GAME_OVER'&&e.code==='Enter') {state='TITLE'; initTitle();} if((state==='PLAYING'||state==='SERVE')&&(e.code==='KeyP'||e.code==='Escape')){pauseWas=state; state='PAUSED';} else if(state==='PAUSED'&&(e.code==='KeyP'||e.code==='Escape')) state=pauseWas; if(state==='SERVE'&&e.code==='Space'&&ball.attached){launchBall(); state='PLAYING';}});
addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(); mouseX=(e.clientX-r.left)*(W/r.width); acq();});
canvas.addEventListener('mouseenter',acq);
function frame(now){let dt=Math.min(dtCap,(now-last)/1000); last=now; if(state!=='PAUSED') update(dt); render(); requestAnimationFrame(frame);} 
initTitle(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
