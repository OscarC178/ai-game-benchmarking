<!--
  GAME:      Breakout
  RUN:       r1-opus
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Vintage Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #0d0d0d;
            display: block;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="780" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 780, HEIGHT = 600, HUD_H = 36;
        const PADDLE_Y = 564, PADDLE_H = 12, PADDLE_SPEED = 500;
        const BALL_RAD = 7, START_SPEED = 320, MAX_SPEED = 520, SPEED_INC = 12;
        const BRICK_W = 64, BRICK_H = 18, BRICK_GAP = 4;

        // States
        const STATE_TITLE = 'TITLE', STATE_SERVE = 'SERVE', STATE_PLAYING = 'PLAYING';
        const STATE_PAUSED = 'PAUSED', STATE_LIFE_LOST = 'LIFE_LOST', STATE_LEVEL_CLEAR = 'LEVEL_CLEAR';
        const STATE_GAME_OVER = 'GAME_OVER';

        // Globals
        let currentState = STATE_TITLE;
        let score = 0, high_score = localStorage.getItem('breakout_best') || 0, lives = 3, level = 1;
        let lastTime = 0, dt = 0, speed = START_SPEED, bonusTimer = 0, attractTimer = 0;
        let extraLifeAwarded = false, bricksDestructible = 0, perfectAttempt = true;
        let audioCtx = null, flashFrames = 0, paddleFlash = 0, levelClearTimer = 0, lifeLostTimer = 0;

        const keys = {};
        let mouseX = WIDTH / 2;

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') handleStateInput('Enter');
            if (e.code === 'Space') handleStateInput('Space');
            if (e.code === 'KeyP' || e.code === 'Escape') handleStateInput('Pause');
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (WIDTH / rect.width);
        });

        // Objects
        const paddle = { x: 338, w: 104, targetW: 104 };
        const ball = { x: 0, y: 0, vx: 0, vy: 0, attached: true, trail: [] };
        let bricks = [];
        let particles = [];

        function initBricks() {
            bricks = [];
            bricksDestructible = 0;
            const colors = ["#e53935", "#e53935", "#f4511e", "#f4511e", "#fb8c00", "#ffb300", "#fdd835", "#c0ca33", "#43a047", "#00897b"];
            const pts = [7, 7, 7, 7, 5, 5, 3, 3, 1, 1];
            
            const rows = 8;
            const cols = 11;
            const startX = 18;
            const startY = 62;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const rowColor = colors[r];
                    const rowPoints = pts[r];
                    let hp = 1;
                    let type = 'normal';

                    // Reinforced (Lvl 2+)
                    if (level >= 2 && r === 0) hp = 2;
                    if (level >= 3 && r <= 1) hp = 2;
                    if (level >= 4 && r <= 2) hp = 2;

                    // Indestructible (Lvl 5+)
                    if (level >= 5 && (r === 3 || r === 4) && c >= 4 && c <= 6) {
                        if (level === 5 && c === 5) type = 'metal';
                        else if (level >= 6) type = 'metal';
                    }

                    if (type !== 'metal') bricksDestructible++;

                    bricks.push({
                        x: startX + c * (BRICK_W + BRICK_GAP),
                        y: startY + r * (BRICK_H + BRICK_GAP),
                        w: BRICK_W, h: BRICK_H,
                        color: rowColor, points: rowPoints,
                        hp: hp, maxHP: hp, type: type, alive: true
                    });
                }
            }
        }

        function playSound(freq, dur, vol, type = 'square', ramp = 0) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, audioCtx.currentTime + dur);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function handleStateInput(cmd) {
            if (currentState === STATE_TITLE && cmd === 'Enter') {
                score = 0; level = 1; lives = 3; extraLifeAwarded = false;
                startLevel();
            } else if (currentState === STATE_SERVE && cmd === 'Space') {
                launchBall();
            } else if (cmd === 'Pause') {
                if (currentState === STATE_PLAYING) currentState = STATE_PAUSED;
                else if (currentState === STATE_PAUSED) currentState = STATE_PLAYING;
            } else if (currentState === STATE_GAME_OVER && cmd === 'Enter') {
                currentState = STATE_TITLE;
            }
        }

        function startLevel() {
            initBricks();
            paddle.w = Math.max(64, 104 - (level - 1) * 8);
            paddle.targetW = paddle.w;
            speed = 320 + (level - 1) * 20;
            perfectAttempt = true;
            resetServe();
        }

        function resetServe() {
            ball.attached = true;
            ball.vx = 0; ball.vy = 0;
            ball.trail = [];
            currentState = STATE_SERVE;
            bonusTimer = 1.2;
        }

        function launchBall() {
            if (!ball.attached) return;
            ball.attached = false;
            currentState = STATE_PLAYING;
            const angle = (Math.random() * 50 - 25) * Math.PI / 180;
            ball.vx = speed * Math.sin(angle);
            ball.vy = -speed * Math.cos(angle);
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                if (particles.length >= 80) break;
                particles.push({
                    x, y, color,
                    vx: (Math.random() * 240 - 120),
                    vy: (Math.random() * -140 - 40),
                    life: 0.6
                });
            }
        }

        function update(timestamp) {
            dt = Math.min((timestamp - lastTime) / 1000, 0.05);
            lastTime = timestamp;

            if (currentState === STATE_TITLE) {
                updateAttract(dt);
            } else if (currentState === STATE_SERVE) {
                updatePaddle(dt);
                if (bonusTimer > 0) bonusTimer -= dt;
                ball.x = paddle.x + paddle.w / 2;
                ball.y = PADDLE_Y - BALL_RAD - 1;
            } else if (currentState === STATE_PLAYING) {
                updatePaddle(dt);
                updatePhysics(dt);
            } else if (currentState === STATE_LIFE_LOST) {
                lifeLostTimer -= dt;
                if (lifeLostTimer <= 0) {
                    lives--;
                    if (lives <= 0) currentState = STATE_GAME_OVER;
                    else resetServe();
                }
            } else if (currentState === STATE_LEVEL_CLEAR) {
                levelClearTimer -= dt;
                if (levelClearTimer <= 0) {
                    level++;
                    startLevel();
                }
            }

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx * dt; p.y += p.vy * dt;
                p.vy += 400 * dt; p.life -= dt;
                if (p.life <= 0) particles.splice(i, 1);
            });

            draw();
            requestAnimationFrame(update);
        }

        function updateAttract(dt) {
            ball.x += ball.vx * dt; ball.y += ball.vy * dt;
            if (ball.speed === 0) {
                ball.x = WIDTH/2; ball.y = HEIGHT/2;
                ball.vx = 200; ball.vy = -200; ball.speed = 280;
                initBricks();
            }
            if (ball.x <= BALL_RAD || ball.x >= WIDTH - BALL_RAD) { ball.vx = -ball.vx; playSound(280, 0.025, 0.15); }
            if (ball.y <= HUD_H + BALL_RAD || ball.y >= HEIGHT - BALL_RAD) { ball.vy = -ball.vy; playSound(280, 0.025, 0.15); }
            
            // Basic brick collision in attract
            bricks.forEach(b => {
                if (b.alive && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                    b.alive = false; ball.vy = -ball.vy;
                }
            });
            if (bricks.every(b => !b.alive)) initBricks();
        }

        function updatePaddle(dt) {
            let mv = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) mv = -PADDLE_SPEED;
            else if (keys['ArrowRight'] || keys['KeyD']) mv = PADDLE_SPEED;
            
            if (mv !== 0) paddle.x += mv * dt;
            else paddle.x = mouseX - paddle.w / 2;
            
            paddle.x = Math.max(0, Math.min(WIDTH - paddle.w, paddle.x));
        }

        function updatePhysics(dt) {
            const prevX = ball.x, prevY = ball.y;
            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;
            
            ball.trail.push({x: ball.x, y: ball.y});
            if (ball.trail.length > 6) ball.trail.shift();

            // Walls
            if (ball.x <= BALL_RAD || ball.x >= WIDTH - BALL_RAD) {
                ball.vx = -ball.vx;
                ball.x = ball.x <= BALL_RAD ? BALL_RAD : WIDTH - BALL_RAD;
                playSound(280, 0.025, 0.15);
            }
            if (ball.y <= HUD_H + BALL_RAD) {
                ball.vy = -ball.vy;
                ball.y = HUD_H + BALL_RAD;
                playSound(280, 0.025, 0.15);
            }

            // Floor
            if (ball.y > HEIGHT + BALL_RAD) {
                currentState = STATE_LIFE_LOST;
                lifeLostTimer = 0.8;
                perfectAttempt = false;
                playSound(200, 0.35, 0.3, 'square', 80);
                return;
            }

            // Brick Collisions
            let hits = 0;
            for (let b of bricks) {
                if (!b.alive) continue;
                if (ball.x + BALL_RAD > b.x && ball.x - BALL_RAD < b.x + b.w && 
                    ball.y + BALL_RAD > b.y && ball.y - BALL_RAD < b.y + b.h) {
                    
                    const dx = ball.x - (b.x + b.w/2);
                    const dy = ball.y - (b.y + b.h/2);
                    const overlapX = (b.w/2 + BALL_RAD) - Math.abs(dx);
                    const overlapY = (b.h/2 + BALL_RAD) - Math.abs(dy);

                    if (overlapX < overlapY) {
                        ball.vx = -ball.vx;
                        ball.x += Math.sign(ball.vx) * overlapX;
                    } else {
                        ball.vy = -ball.vy;
                        ball.y += Math.sign(ball.vy) * overlapY;
                    }

                    if (b.type !== 'metal') {
                        b.hp--;
                        if (b.hp <= 0) {
                            b.alive = false;
                            score += b.points;
                            bricksDestructible--;
                            spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                            playSound(330 + b.points * 40, 0.05, 0.2);
                            if (!extraLifeAwarded && score >= 200) { lives = Math.min(5, lives+1); extraLifeAwarded = true; playSound(880, 0.16, 0.2, 'sine', 1100); }
                            if (score > high_score) { high_score = score; localStorage.setItem('breakout_best', high_score); }
                        } else {
                            playSound(180, 0.035, 0.18, 'triangle');
                        }
                    } else {
                        playSound(280, 0.025, 0.15);
                    }

                    hits++;
                    if (hits >= 3) break;
                }
            }

            if (bricksDestructible <= 0) {
                currentState = STATE_LEVEL_CLEAR;
                levelClearTimer = 2.0;
                flashFrames = 4;
                if (perfectAttempt) score += 100;
                playSound(523, 0.28, 0.22, 'square', 1047);
            }

            // Paddle Collision
            if (ball.vy > 0 && ball.y + BALL_RAD >= PADDLE_Y && ball.y - BALL_RAD <= PADDLE_Y + PADDLE_H &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                
                const hitRatio = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w / 2);
                const angle = Math.max(-1, Math.min(1, hitRatio)) * 65 * Math.PI / 180;
                
                ball.speed = Math.min(MAX_SPEED, ball.speed + SPEED_INC);
                ball.vx = ball.speed * Math.sin(angle);
                ball.vy = -ball.speed * Math.cos(angle);
                
                // Keep vy meaningful
                if (Math.abs(ball.vy) < ball.speed * 0.25) ball.vy = -ball.speed * 0.25;

                ball.y = PADDLE_Y - BALL_RAD;
                paddleFlash = 3;
                playSound(440, 0.04, 0.25);
            }
        }

        function draw() {
            if (flashFrames > 0) { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,WIDTH,HEIGHT); flashFrames--; return; }
            ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,WIDTH,HEIGHT);
            
            // HUD
            ctx.fillStyle = '#141414'; ctx.fillRect(0, 0, WIDTH, HUD_H);
            ctx.fillStyle = '#222'; ctx.fillRect(0, HUD_H-1, WIDTH, 1);
            ctx.fillStyle = '#fff'; ctx.font = '17px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 16, 24);
            ctx.fillStyle = '#555'; ctx.fillText(`Best: ${high_score}`, 200, 24);
            ctx.fillStyle = '#aaa'; ctx.textAlign = 'right'; ctx.fillText(`Lv ${level}`, 764, 24);
            ctx.fillStyle = '#fff';
            for (let i = 0; i < lives - 1; i++) {
                ctx.beginPath(); ctx.arc(500 + i * 16, 20, 5, 0, Math.PI * 2); ctx.fill();
            }

            // Bricks
            bricks.forEach(b => {
                if (b.alive) {
                    ctx.fillStyle = b.color;
                    if (b.type === 'metal') {
                        ctx.fillStyle = '#616161';
                        ctx.fillRect(b.x, b.y, b.w, b.h);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(b.x, b.y + b.h/2 - 1, b.w, 2);
                    } else {
                        if (b.hp < b.maxHP) {
                            // Darken
                            ctx.globalAlpha = 0.7; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.globalAlpha = 1.0;
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.moveTo(b.x+b.w*0.2, b.y); ctx.lineTo(b.x+b.w*0.8, b.y+b.h); ctx.stroke();
                        } else {
                            ctx.fillRect(b.x, b.y, b.w, b.h);
                        }
                        if (b.hp > 1) {
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.fillRect(b.x+8, b.y+4, b.w-16, b.h-8);
                        }
                    }
                }
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 0.6;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1.0;

            // Paddle
            ctx.fillStyle = paddleFlash > 0 ? '#4fc3f7' : '#fff';
            if (paddleFlash > 0) paddleFlash--;
            roundRect(paddle.x, PADDLE_Y, paddle.w, PADDLE_H, 6);
            ctx.fill();

            // Ball & Trail
            if (currentState !== STATE_LIFE_LOST) {
                ball.trail.forEach((pos, i) => {
                    ctx.globalAlpha = (i + 1) * 0.08;
                    const r = BALL_RAD * (0.6 + i * 0.08);
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = (currentState === STATE_TITLE) ? 0.4 : 1.0;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RAD, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            // States
            if (currentState === STATE_TITLE) drawTitle();
            if (currentState === STATE_SERVE) {
                if (bonusTimer > 0) {
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '36px monospace'; ctx.fillText('READY', WIDTH/2, 350);
                } else {
                    ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(ball.x, ball.y-5); ctx.lineTo(ball.x, ball.y-25); ctx.stroke();
                }
            }
            if (currentState === STATE_PAUSED) drawOverlay('PAUSED', 'P to resume');
            if (currentState === STATE_LEVEL_CLEAR) {
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '32px monospace'; ctx.fillText(`LEVEL ${level} CLEAR!`, WIDTH/2, 300);
                if (perfectAttempt) { ctx.fillStyle='#ffb300'; ctx.fillText('PERFECT!', WIDTH/2, 350); }
            }
            if (currentState === STATE_GAME_OVER) {
                drawOverlay('GAME OVER', `Score: ${score}`);
                ctx.fillStyle='#666'; ctx.font='16px monospace'; ctx.fillText('Enter to Play Again', WIDTH/2, 420);
                if (score > 0 && score === high_score) {
                    const pulse = 0.5 + 0.5 * Math.sin(Date.now()/200);
                    ctx.fillStyle=`rgba(255,179,0,${pulse})`; ctx.fillText('NEW HIGH SCORE!', WIDTH/2, 330);
                }
            }
        }

        function drawTitle() {
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, HUD_H, WIDTH, HEIGHT-HUD_H);
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 52px monospace'; ctx.fillText('BREAKOUT', WIDTH/2, 240);
            const pulse = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(Date.now() / 320));
            ctx.fillStyle = `rgba(136,136,136,${pulse})`; ctx.font = '20px monospace'; ctx.fillText('Press Enter', WIDTH/2, 430);
        }

        function drawOverlay(t1, t2) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, HUD_H, WIDTH, HEIGHT-HUD_H);
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '40px monospace'; ctx.fillText(t1, WIDTH/2, 260);
            ctx.font = '18px monospace'; ctx.fillText(t2, WIDTH/2, 300);
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath(); ctx.moveTo(x+r, y);
            ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
            ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
            ctx.closePath();
        }

        initBricks();
        requestAnimationFrame(update);
    </script>
</body>
</html>
