<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    canvas {
        background: #0d0d0d;
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }
    .hud-text { font-family: monospace; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="780" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONSTANTS ---
const W = 780;
const H = 600;
const PADDLE_Y = 564;
const PADDLE_H = 12;
const BALL_R = 7;
const MAX_BALL_SPEED = 520;
const PADDLE_SPEED = 500;

const ROW_COLORS = [
    { c: '#e53935', p: 7 }, // Row 1
    { c: '#f4511e', p: 7 }, // 2
    { c: '#fb8c00', p: 5 }, // 3
    { c: '#ffb300', p: 5 }, // 4
    { c: '#fdd835', p: 3 }, // 5
    { c: '#c0ca33', p: 3 }, // 6
    { c: '#43a047', p: 1 }, // 7
    { c: '#00897b', p: 1 }  // 8
];

const INDESTRUCTIBLE_COLOR = '#616161';

// --- STATE ---
let state = 'TITLE'; // TITLE, SERVE, PLAYING, PAUSED, LIFE_LOST, LEVEL_CLEAR, GAME_OVER
let score = 0;
let highScore = parseInt(localStorage.getItem('breakout_best')) || 0;
let lives = 3;
let level = 1;
let extraLifeAwarded = false;

let bricks = [];
let destructibleCount = 0;
let targetDestructibleCount = 0;
let ballsLostThisLevel = 0;

let paddle = { x: 338, w: 104, hitTimer: 0 };
let ball = { x: 0, y: 0, vx: 0, vy: 0, speed: 0, attached: false, trail: [] };

let particles = [];
let maxParticles = 80;
for(let i=0; i<maxParticles; i++) particles.push({ active: false });

let keys = {};
let mouseX = -1;
let lastTime = 0;
let stateTimer = 0;
let screenFlash = 0;
let scorePop = 0;

// Attract mode ball
let attractBall = { x: W/2, y: H/2, vx: 200, vy: 250, r: 7 };

// --- AUDIO ---
let actx = null;
function initAudio() {
    if (!actx) {
        try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (actx && actx.state === 'suspended') actx.resume();
}

function playTone(type, rowIdx = 0) {
    if (!actx) return;
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);

    if (type === 'paddle') {
        osc.type = 'square'; osc.frequency.setValueAtTime(440, t);
        gain.gain.setValueAtTime(0.25, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.04);
        osc.start(t); osc.stop(t + 0.04);
    } else if (type === 'wall') {
        osc.type = 'square'; osc.frequency.setValueAtTime(280, t);
        gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.025);
        osc.start(t); osc.stop(t + 0.025);
    } else if (type === 'brick') {
        osc.type = 'square';
        let freq = 330; // base (green)
        if (rowIdx <= 1) freq = 660; // red
        else if (rowIdx <= 3) freq = 550; // orange
        else if (rowIdx <= 5) freq = 440; // yellow
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);
    } else if (type === 'damage') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(180, t);
        gain.gain.setValueAtTime(0.18, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.035);
        osc.start(t); osc.stop(t + 0.035);
    } else if (type === 'die') {
        osc.type = 'square'; osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.35);
        gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        osc.start(t); osc.stop(t + 0.35);
    } else if (type === 'clear') {
        osc.type = 'square'; gain.gain.setValueAtTime(0.22, t);
        [523, 659, 784, 1047].forEach((f, i) => {
            osc.frequency.setValueAtTime(f, t + i * 0.07);
        });
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.28);
        osc.start(t); osc.stop(t + 0.28);
    } else if (type === '1up') {
        osc.type = 'sine'; gain.gain.setValueAtTime(0.2, t);
        osc.frequency.setValueAtTime(880, t); osc.frequency.setValueAtTime(1100, t + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.16);
        osc.start(t); osc.stop(t + 0.16);
    }
}

// --- INPUT ---
window.addEventListener('keydown', e => {
    initAudio();
    keys[e.key] = true;
    
    if (state === 'TITLE' && e.key === 'Enter') {
        startGame();
    } else if (state === 'SERVE' && e.key === ' ') {
        launchBall();
    } else if ((state === 'PLAYING' || state === 'SERVE') && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        if (state === 'PLAYING' || state === 'SERVE') {
            stateTimer = state === 'SERVE' ? stateTimer : 0; // save timer
            state = 'PAUSED';
        }
    } else if (state === 'PAUSED' && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
        state = ball.attached ? 'SERVE' : 'PLAYING';
        lastTime = performance.now(); // Prevent dt spike
    } else if (state === 'GAME_OVER' && e.key === 'Enter') {
        state = 'TITLE';
    }
});

window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
});
canvas.addEventListener('mousedown', () => {
    initAudio();
    if (state === 'SERVE') launchBall();
});

// --- LOGIC ---
function buildLevel(lvl) {
    bricks = [];
    destructibleCount = 0;
    
    let reinforcedRows = 0;
    if (lvl === 2) reinforcedRows = 1;
    else if (lvl === 3) reinforcedRows = 2;
    else if (lvl >= 4) reinforcedRows = 3;
    
    let indestructibleCount = lvl >= 5 ? (lvl === 5 ? 3 : 5) : 0;
    
    let cols = 11, rows = 8;
    let bW = 64, bH = 18, gap = 4;
    let startX = 18, startY = 62;
    
    // Pick random indices for indestructibles in rows 4-5 (idx 3-4)
    let indestIndices = [];
    if (indestructibleCount > 0) {
        let candidates = [];
        for(let r=3; r<=4; r++) {
            for(let c=0; c<cols; c++) candidates.push({r, c});
        }
        for(let i=0; i<Math.min(indestructibleCount, candidates.length); i++) {
            let idx = Math.floor(Math.random() * candidates.length);
            indestIndices.push(candidates.splice(idx, 1)[0]);
        }
    }

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let isIndestructible = indestIndices.some(i => i.r === r && i.c === c);
            
            let hp = 1;
            if (isIndestructible) hp = 999;
            else if (r < reinforcedRows) hp = 2;
            
            bricks.push({
                alive: true,
                r: r, c: c,
                x: startX + c * (bW + gap),
                y: startY + r * (bH + gap),
                w: bW, h: bH,
                hp: hp,
                maxHp: hp,
                color: isIndestructible ? INDESTRUCTIBLE_COLOR : ROW_COLORS[r].c,
                points: isIndestructible ? 0 : ROW_COLORS[r].p,
                indestructible: isIndestructible
            });
            
            if (!isIndestructible) destructibleCount++;
        }
    }
    targetDestructibleCount = destructibleCount;
    ballsLostThisLevel = 0;
    
    paddle.w = Math.max(64, 104 - (lvl - 1) * 8);
    attachBall();
}

function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    extraLifeAwarded = false;
    ball.trail = [];
    buildLevel(1);
    state = 'SERVE';
    stateTimer = 1.2;
    canvas.style.cursor = 'none';
}

function attachBall() {
    ball.attached = true;
    ball.speed = 320 + (level - 1) * 20;
    ball.vx = 0; ball.vy = 0;
    ball.trail = [];
}

function launchBall() {
    ball.attached = false;
    state = 'PLAYING';
    
    let pDir = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) pDir = -1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) pDir = 1;
    
    let baseAngle = -Math.PI / 2; // straight up
    let angleRange = (25 * Math.PI) / 180;
    let angle = baseAngle + (Math.random() * angleRange * 2 - angleRange);
    
    if (pDir !== 0) angle += pDir * (10 * Math.PI / 180);
    
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
}

function spawnParticles(bx, by, color) {
    let spawned = 0;
    for (let i = 0; i < maxParticles && spawned < 8; i++) {
        if (!particles[i].active) {
            particles[i] = {
                active: true,
                x: bx, y: by,
                vx: (Math.random() * 240) - 120,
                vy: (Math.random() * -140) - 40,
                life: 0.6,
                maxLife: 0.6,
                color: color
            };
            spawned++;
        }
    }
}

function addScore(pts) {
    score += pts;
    scorePop = 4;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('breakout_best', highScore.toString());
    }
    if (score >= 200 && !extraLifeAwarded && lives < 5) {
        lives++;
        extraLifeAwarded = true;
        playTone('1up');
    }
}

function update(dt) {
    if (scorePop > 0) scorePop--;

    if (state === 'TITLE') {
        canvas.style.cursor = 'default';
        if (bricks.length === 0 || destructibleCount === 0) {
            paddle.w = 0; // invisible padding
            buildLevel(1);
        }
        
        // Attract physics
        attractBall.x += attractBall.vx * dt;
        attractBall.y += attractBall.vy * dt;
        if (attractBall.x - attractBall.r <= 0 || attractBall.x + attractBall.r >= W) attractBall.vx = -attractBall.vx;
        if (attractBall.y - attractBall.r <= 36) attractBall.vy = -attractBall.vy;
        if (attractBall.y > H + 20) { attractBall.x = W/2; attractBall.y = H/2; } // reset
        
        // Block collision
        for (let b of bricks) {
            if (!b.alive) continue;
            let testX = attractBall.x; let testY = attractBall.y;
            if (attractBall.x < b.x) testX = b.x; else if (attractBall.x > b.x + b.w) testX = b.x + b.w;
            if (attractBall.y < b.y) testY = b.y; else if (attractBall.y > b.y + b.h) testY = b.y + b.h;
            let distX = attractBall.x - testX; let distY = attractBall.y - testY;
            let distance = Math.sqrt((distX*distX) + (distY*distY));
            if (distance <= attractBall.r) {
                b.hp--;
                if (b.hp <= 0 && !b.indestructible) { b.alive = false; destructibleCount--; spawnParticles(b.x+b.w/2, b.y+b.h/2, b.color); }
                let pTol = b.w/2; let pToh = b.h/2; let cx = b.x+pTol; let cy = b.y+pToh;
                let dx = attractBall.x - cx; let dy = attractBall.y - cy;
                if (Math.abs(dx)/pTol > Math.abs(dy)/pToh) attractBall.vx = -attractBall.vx; else attractBall.vy = -attractBall.vy;
                break; // 1 per frame for attract
            }
        }
    } else if (state === 'SERVE') {
        canvas.style.cursor = 'none';
        if (stateTimer > 0) stateTimer -= dt;
    } else if (state === 'LIFE_LOST') {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            lives--;
            if (lives <= 0) { state = 'GAME_OVER'; canvas.style.cursor = 'default'; }
            else { attachBall(); state = 'SERVE'; stateTimer = 1.2; }
        }
    } else if (state === 'LEVEL_CLEAR') {
        if (screenFlash > 0) screenFlash -= dt;
        stateTimer -= dt;
        if (stateTimer <= 0) {
            level++;
            buildLevel(level);
            state = 'SERVE';
            stateTimer = 1.2;
        }
    }

    // Paddle Movement (Always active in SERVE/PLAYING)
    if (state === 'PLAYING' || state === 'SERVE') {
        if (paddle.hitTimer > 0) paddle.hitTimer -= dt;
        
        let pDir = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) pDir = -1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) pDir = 1;
        
        if (pDir !== 0) {
            paddle.x += pDir * PADDLE_SPEED * dt;
        } else if (mouseX !== -1) {
            paddle.x = mouseX - paddle.w / 2;
        }
        
        // Clamp
        paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        
        if (ball.attached) {
            ball.x = paddle.x + paddle.w / 2;
            ball.y = PADDLE_Y - BALL_R;
        }
    }

    if (state === 'PLAYING') {
        // Ball Trail
        ball.trail.unshift({x: ball.x, y: ball.y});
        if (ball.trail.length > 6) ball.trail.pop();

        let px = ball.x;
        let py = ball.y;

        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Walls
        if (ball.y - BALL_R <= 36) { ball.y = 36 + BALL_R; ball.vy = -ball.vy; playTone('wall'); }
        if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx = -ball.vx; playTone('wall'); }
        else if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx = -ball.vx; playTone('wall'); }

        // Floor
        if (ball.y > H + 10) {
            ballsLostThisLevel++;
            stateTimer = 0.8;
            state = 'LIFE_LOST';
            playTone('die');
        }

        // Paddle Collision (AABB + Sweep)
        if (ball.vy > 0) {
            let hit = false;
            // Sweep
            if (py + BALL_R <= PADDLE_Y && ball.y + BALL_R > PADDLE_Y) {
                let t = (PADDLE_Y - (py + BALL_R)) / ((ball.y + BALL_R) - (py + BALL_R));
                let ix = px + t * (ball.x - px);
                if (ix >= paddle.x - BALL_R && ix <= paddle.x + paddle.w + BALL_R) hit = true;
            }
            // Standard AABB fallback
            if (!hit && ball.y + BALL_R > PADDLE_Y && ball.y - BALL_R < PADDLE_Y + PADDLE_H) {
                if (ball.x + BALL_R > paddle.x && ball.x - BALL_R < paddle.x + paddle.w) hit = true;
            }

            if (hit) {
                let pcx = paddle.x + paddle.w / 2;
                let ratio = (ball.x - pcx) / (paddle.w / 2);
                ratio = Math.max(-1, Math.min(1, ratio));
                
                let angle = ratio * (65 * Math.PI / 180);
                
                // Nudge out
                ball.y = PADDLE_Y - BALL_R;
                
                // Speed up
                ball.speed = Math.min(MAX_BALL_SPEED, ball.speed + 12);
                
                ball.vx = Math.sin(angle) * ball.speed;
                ball.vy = -Math.cos(angle) * ball.speed;
                
                // Ensure |vy| isn't tiny
                if (Math.abs(ball.vy) < ball.speed * 0.25) {
                    ball.vy = -ball.speed * 0.25;
                    // renormalize vx
                    let sign = Math.sign(ball.vx) || 1;
                    ball.vx = sign * Math.sqrt(ball.speed*ball.speed - ball.vy*ball.vy);
                }
                
                paddle.hitTimer = 0.05;
                playTone('paddle');
            }
        }

        // Horizontal lock prevention
        if (Math.abs(ball.vy) < ball.speed * 0.15 && ball.y < PADDLE_Y - 20) {
           ball.vy = (ball.vy < 0 ? -1 : 1) * ball.speed * 0.2;
        }

        // Brick Collision
        let hitsThisFrame = 0;
        for (let i = 0; i < bricks.length; i++) {
            let b = bricks[i];
            if (!b.alive) continue;

            // Closest point on brick rect
            let testX = ball.x;
            let testY = ball.y;
            if (ball.x < b.x) testX = b.x; else if (ball.x > b.x + b.w) testX = b.x + b.w;
            if (ball.y < b.y) testY = b.y; else if (ball.y > b.y + b.h) testY = b.y + b.h;

            let distX = ball.x - testX;
            let distY = ball.y - testY;
            let distance = Math.sqrt((distX*distX) + (distY*distY));

            if (distance <= BALL_R) {
                hitsThisFrame++;
                b.hp--;
                
                if (b.hp <= 0 && !b.indestructible) {
                    b.alive = false;
                    destructibleCount--;
                    addScore(b.points);
                    spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                    playTone('brick', b.r);
                } else {
                    playTone('damage');
                }

                // Push out & Reflect
                // Calculate penetration depths
                let pLeft = (ball.x + BALL_R) - b.x;
                let pRight = (b.x + b.w) - (ball.x - BALL_R);
                let pTop = (ball.y + BALL_R) - b.y;
                let pBot = (b.y + b.h) - (ball.y - BALL_R);

                let minP = Math.min(pLeft, pRight, pTop, pBot);
                let absVx = Math.abs(ball.vx);
                let absVy = Math.abs(ball.vy);

                // Bias reflection by velocity major axis if ambiguous (corner fix)
                if (minP === pTop || minP === pBot) {
                    ball.vy = -ball.vy;
                    ball.y += minP === pTop ? -minP : minP;
                } else if (minP === pLeft || minP === pRight) {
                    ball.vx = -ball.vx;
                    ball.x += minP === pLeft ? -minP : minP;
                }

                if (hitsThisFrame >= 3) break; // Prevent infinite bounce in clusters
            }
        }

        // Level Clear Check
        if (destructibleCount <= 0) {
            state = 'LEVEL_CLEAR';
            screenFlash = 0.06;
            stateTimer = 2.0;
            playTone('clear');
            
            if (ballsLostThisLevel === 0) {
                addScore(100);
            }
        }
    }

    // Particles
    for (let p of particles) {
        if (p.active) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 400 * dt; // gravity
            p.life -= dt;
            if (p.life <= 0) p.active = false;
        }
    }
}

function render() {
    if (screenFlash > 0) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        return; // Skip rest of render to ensure true white flash
    }

    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, W, H);

    // Grid (Title Attract)
    if (state === 'TITLE') {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(attractBall.x, attractBall.y, attractBall.r, 0, Math.PI*2);
        ctx.fill();
    }

    // Bricks
    for (let b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);

        if (b.indestructible) {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(b.x, b.y + b.h/2 - 1, b.w, 2);
        } else if (b.maxHp > 1) {
            // Reinforced
            if (b.hp === b.maxHp) {
                // Undamaged
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(b.x + 8, b.y + 4, b.w - 16, b.h - 8);
            } else {
                // Damaged (darken + crack)
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(b.x + b.w * 0.2, b.y);
                ctx.lineTo(b.x + b.w * 0.8, b.y + b.h);
                ctx.stroke();
                
                if (b.maxHp === 3 && b.hp === 1) { // if maxHp=3 ever added
                    ctx.beginPath();
                    ctx.moveTo(b.x + b.w * 0.8, b.y);
                    ctx.lineTo(b.x + b.w * 0.2, b.y + b.h);
                    ctx.stroke();
                }
            }
        }
    }

    ctx.globalAlpha = 1.0;

    // Particles
    for (let p of particles) {
        if (p.active) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
            ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
        }
    }
    ctx.globalAlpha = 1.0;

    // Paddle & Ball
    if (state !== 'TITLE' && state !== 'GAME_OVER') {
        // Paddle
        ctx.fillStyle = paddle.hitTimer > 0 ? '#4fc3f7' : '#ffffff';
        ctx.beginPath();
        ctx.moveTo(paddle.x + 6, PADDLE_Y);
        ctx.lineTo(paddle.x + paddle.w - 6, PADDLE_Y);
        ctx.arcTo(paddle.x + paddle.w, PADDLE_Y, paddle.x + paddle.w, PADDLE_Y + PADDLE_H, 6);
        ctx.lineTo(paddle.x + paddle.w, PADDLE_Y + PADDLE_H);
        ctx.lineTo(paddle.x, PADDLE_Y + PADDLE_H);
        ctx.arcTo(paddle.x, PADDLE_Y, paddle.x + 6, PADDLE_Y, 6);
        ctx.fill();

        // Trail
        if (state === 'PLAYING' || state === 'PAUSED') {
            ball.trail.forEach((pos, i) => {
                let op = [0.4, 0.3, 0.22, 0.15, 0.1, 0.05][i];
                let r = [7, 6.5, 6, 5.5, 5, 4.5][i];
                ctx.fillStyle = `rgba(255,255,255,${op})`;
                ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI*2); ctx.fill();
            });
        }

        // Ball
        if (state !== 'LIFE_LOST') {
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
        }
    }

    // Aiming hint during serve
    if (state === 'SERVE' && stateTimer <= 0) {
        let pDir = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) pDir = -1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) pDir = 1;
        let baseAngle = -Math.PI / 2;
        let aimAngle = baseAngle + (pDir * 10 * Math.PI / 180);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y - BALL_R - 4);
        ctx.lineTo(ball.x + Math.cos(aimAngle) * 20, ball.y - BALL_R - 4 + Math.sin(aimAngle) * 20);
        ctx.stroke();
    }

    // HUD
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, W, 36);
    ctx.fillStyle = '#222222';
    ctx.fillRect(0, 35, W, 1);

    ctx.fillStyle = '#ffffff';
    ctx.font = '17px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    
    ctx.save();
    if (scorePop > 0) {
        ctx.translate(16, 18);
        ctx.scale(1.1, 1.1);
        ctx.fillText(`Score: ${score}`, 0, 0);
        ctx.translate(-16, -18);
    } else {
        ctx.fillText(`Score: ${score}`, 16, 18);
    }
    ctx.restore();
    
    ctx.fillStyle = '#555555';
    ctx.fillText(`Best: ${highScore}`, 200, 18);

    ctx.fillStyle = state === 'LIFE_LOST' && ((stateTimer * 10) % 2 | 0) ? '#ff0000' : '#ffffff';
    for (let i = 0; i < lives - 1; i++) {
        ctx.beginPath();
        ctx.arc(500 + i * 16, 18, 5, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.fillStyle = '#aaaaaa';
    ctx.textAlign = 'right';
    ctx.fillText(`Lv ${level}`, W - 16, 18);

    // Overlays
    ctx.textAlign = 'center';
    
    if (state === 'TITLE') {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 52px monospace';
        ctx.fillText('BREAKOUT', W/2, 220);
        
        // Legend
        ctx.font = '14px monospace';
        const lx = W/2 - 140;
        ctx.fillStyle = ROW_COLORS[6].c; ctx.fillRect(lx, 260, 12, 12); ctx.fillStyle='#fff'; ctx.fillText('= 1', lx+24, 267);
        ctx.fillStyle = ROW_COLORS[4].c; ctx.fillRect(lx+70, 260, 12, 12); ctx.fillStyle='#fff'; ctx.fillText('= 3', lx+94, 267);
        ctx.fillStyle = ROW_COLORS[2].c; ctx.fillRect(lx+140, 260, 12, 12); ctx.fillStyle='#fff'; ctx.fillText('= 5', lx+164, 267);
        ctx.fillStyle = ROW_COLORS[0].c; ctx.fillRect(lx+210, 260, 12, 12); ctx.fillStyle='#fff'; ctx.fillText('= 7', lx+234, 267);
        
        let pulse = 0.3 + 0.7 * (Math.sin(performance.now() / 1000 * Math.PI) + 1)/2;
        ctx.fillStyle = `rgba(136,136,136,${pulse})`;
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter', W/2, 430);
        
        ctx.fillStyle = '#555555';
        ctx.font = '15px monospace';
        ctx.fillText(`Best: ${highScore}`, W/2, 470);
        
        ctx.fillStyle = '#333333';
        ctx.font = '13px monospace';
        ctx.fillText('← → Move | Space Launch | P Pause', W/2, 500);
    } else if (state === 'SERVE') {
        if (stateTimer > 0 && stateTimer < 1.2) {
            let a = Math.min(1, stateTimer / 0.3);
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.font = 'bold 36px monospace';
            ctx.fillText('READY', W/2, H/2);
        }
    } else if (state === 'PAUSED') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 36, W, H-36);
        ctx.fillStyle = '#ffffff';
        ctx.font = '36px monospace';
        ctx.fillText('PAUSED', W/2, H/2 - 10);
        ctx.fillStyle = '#888888';
        ctx.font = '14px monospace';
        ctx.fillText('P to resume', W/2, H/2 + 25);
    } else if (state === 'LEVEL_CLEAR') {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 32px monospace';
        ctx.fillText(`LEVEL ${level} CLEAR!`, W/2, H/2);
        if (ballsLostThisLevel === 0) {
            ctx.fillStyle = '#ffb300';
            ctx.font = 'bold 24px monospace';
            ctx.fillText('PERFECT!', W/2, H/2 + 40);
        }
    } else if (state === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 36, W, H-36);
        
        ctx.fillStyle = '#e53935';
        ctx.font = 'bold 44px monospace';
        ctx.fillText('GAME OVER', W/2, 240);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = '26px monospace';
        ctx.fillText(`Score: ${score}`, W/2, 295);
        
        if (score === highScore && score > 0) {
            let pulse = 0.5 + 0.5 * (Math.sin(performance.now() / 500 * Math.PI) + 1)/2;
            ctx.fillStyle = `rgba(255,179,0,${pulse})`;
            ctx.font = '18px monospace';
            ctx.fillText('NEW HIGH SCORE!', W/2, 330);
        }
        
        ctx.fillStyle = '#888888';
        ctx.font = '16px monospace';
        ctx.fillText(`Level reached: ${level}`, W/2, 360);
        
        if (Math.floor(performance.now() / 250) % 2 === 0) {
            ctx.fillStyle = '#666666';
            ctx.fillText('Enter to play again', W/2, 420);
        }
    }
}

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    dt = Math.min(dt, 0.05);
    
    update(dt);
    render();
    
    requestAnimationFrame(gameLoop);
}

// Initial draw payload
buildLevel(1);
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
