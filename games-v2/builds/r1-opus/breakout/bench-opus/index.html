<!--
  GAME:      Breakout
  RUN:       r1-opus
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;cursor:none}
</style>
</head>
<body>
<canvas id="c" width="780" height="600"></canvas>
<script>
(function(){
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=780,H=600,HUD_H=36,PLAY_Y=36,PLAY_H=564;

// States
const TITLE=0,SERVE=1,PLAYING=2,PAUSED=3,LIFE_LOST=4,LEVEL_CLEAR=5,GAME_OVER=6;

// Row definitions
const ROW_COLORS=['#e53935','#f4511e','#fb8c00','#ffb300','#fdd835','#c0ca33','#43a047','#00897b'];
const ROW_POINTS=[7,7,5,5,3,3,1,1];
const ROW_TONES=[660,660,550,550,440,440,330,330];
const BRICK_W=64,BRICK_H=18,BRICK_GAP=4,COLS=11,ROWS=8;
const FIELD_X=18;
const FIELD_Y=62;

// Difficulty
const LEVEL_DATA=[
  {speed:320,pw:104,reinf:0,indestr:0},
  {speed:340,pw:96,reinf:1,indestr:0},
  {speed:360,pw:88,reinf:2,indestr:0},
  {speed:380,pw:80,reinf:3,indestr:0},
  {speed:400,pw:72,reinf:3,indestr:3},
  {speed:400,pw:64,reinf:3,indestr:5},
];
function getLevelData(lv){return LEVEL_DATA[Math.min(lv-1,LEVEL_DATA.length-1)];}

// Game state
let state,score,bestScore,lives,level,ballsLostThisLevel;
let paddle,ball,bricks,destructibleCount;
let extraLifeGiven;
let particles=[];
const MAX_PARTICLES=80;

// Timers
let lifeLostTimer,levelClearTimer,readyTimer,readyFadeTimer;
let perfectBonus;
let scorePopTimer=0,scorePopScale=1;
let paddleFlashTimer=0;
let hudLifeFlashTimer=0;

// Ball trail
const TRAIL_LEN=6;
let trail=[];

// Attract mode
let attractBall,attractBricks,attractRespawnTimer;

// Input
const keys={};
let mouseX=W/2;
let mouseActive=false;

// Audio
let audioCtx=null,audioReady=false;
function initAudio(){
  if(audioReady)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioReady=true;}catch(e){}
}
function playTone(freq,dur,gain,type,bendTo){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.value=gain||0.2;
    if(bendTo!=null){o.frequency.linearRampToValueAtTime(bendTo,audioCtx.currentTime+dur);}
    o.connect(g);g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sndPaddle(){playTone(440,0.04,0.25);}
function sndWall(){playTone(280,0.025,0.15);}
function sndBrickDestroy(row){playTone(ROW_TONES[row]||440,0.05,0.2);}
function sndBrickDamage(){playTone(180,0.035,0.18,'triangle');}
function sndLifeLost(){playTone(200,0.35,0.3,'square',80);}
function sndLevelClear(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.07,0.22),i*75));
}
function sndExtraLife(){
  playTone(880,0.08,0.2,'sine');
  setTimeout(()=>playTone(1100,0.08,0.2,'sine'),90);
}

// Events
window.addEventListener('keydown',e=>{
  keys[e.code]=true;e.preventDefault();
  handleKey(e.code);
  initAudio();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=((e.clientX-r.left)/r.width)*W;
  mouseActive=true;
  initAudio();
});

function handleKey(code){
  if(code==='Enter'||code==='NumpadEnter'){
    if(state===TITLE){startGame();return;}
    if(state===GAME_OVER){state=TITLE;initAttract();return;}
  }
  if(code==='Space'){
    if(state===SERVE&&readyTimer<=0){launchBall();return;}
    if(state===PLAYING&&ball.attached){launchBall();return;}
  }
  if(code==='KeyP'||code==='Escape'){
    if(state===PLAYING){state=PAUSED;canvas.style.cursor='default';return;}
    if(state===PAUSED){state=PLAYING;canvas.style.cursor='none';return;}
  }
}

// Best score
bestScore=0;
try{const v=localStorage.getItem('breakout_best');if(v)bestScore=parseInt(v)||0;}catch(e){}
function checkBest(){
  if(score>bestScore){bestScore=score;try{localStorage.setItem('breakout_best',String(bestScore));}catch(e){}}
}

// Paddle
function createPaddle(w){
  return{x:W/2-w/2,y:564,w:w,h:12,targetW:w,prevW:w,widthLerpT:1};
}

// Ball
function createBall(){
  return{x:0,y:0,vx:0,vy:0,speed:0,radius:7,attached:true,prevX:0,prevY:0};
}

function attachBall(){
  ball.attached=true;
  ball.x=paddle.x+paddle.w/2;
  ball.y=paddle.y-ball.radius;
  ball.vx=0;ball.vy=0;
  trail=[];
}

function launchBall(){
  if(!ball.attached)return;
  ball.attached=false;
  const ld=getLevelData(level);
  ball.speed=ld.speed+12*0; // start at level base
  // Angle between 65° and 115° from +x axis (so 65-115 deg = mostly upward)
  let angle=(65+Math.random()*50)*Math.PI/180;
  // If paddle moving via keyboard, bias slightly
  if(keys['ArrowLeft']||keys['KeyA'])angle+=10*Math.PI/180;
  if(keys['ArrowRight']||keys['KeyD'])angle-=10*Math.PI/180;
  angle=Math.max(65*Math.PI/180,Math.min(115*Math.PI/180,angle));
  ball.vx=ball.speed*Math.cos(angle);
  ball.vy=-ball.speed*Math.sin(angle);
  ball.prevX=ball.x;ball.prevY=ball.y;
}

// Bricks
function createBricks(lv){
  const ld=getLevelData(lv);
  const arr=[];
  let dCount=0;
  // Pick indestructible positions
  const indestrPositions=new Set();
  if(ld.indestr>0){
    const candidates=[];
    for(let c=0;c<COLS;c++){
      candidates.push({r:3,c});candidates.push({r:4,c});
    }
    while(indestrPositions.size<ld.indestr&&candidates.length>0){
      const idx=Math.floor(Math.random()*candidates.length);
      const p=candidates.splice(idx,1)[0];
      indestrPositions.add(p.r+','+p.c);
    }
  }
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const bx=FIELD_X+c*(BRICK_W+BRICK_GAP);
      const by=FIELD_Y+r*(BRICK_H+BRICK_GAP);
      const key=r+','+c;
      if(indestrPositions.has(key)){
        arr.push({alive:true,hp:-1,color:'#616161',points:0,x:bx,y:by,w:BRICK_W,h:BRICK_H,row:r,maxHp:-1,indestructible:true});
      }else{
        const hp=(r<ld.reinf)?2:1;
        arr.push({alive:true,hp,color:ROW_COLORS[r],points:ROW_POINTS[r],x:bx,y:by,w:BRICK_W,h:BRICK_H,row:r,maxHp:hp,indestructible:false});
        dCount++;
      }
    }
  }
  return{bricks:arr,destructibleCount:dCount};
}

// Particles
function spawnParticles(x,y,color){
  let spawned=0;
  for(let i=0;i<MAX_PARTICLES&&spawned<8;i++){
    if(!particles[i]||!particles[i].active){
      if(!particles[i])particles[i]={};
      const p=particles[i];
      p.active=true;p.x=x;p.y=y;p.color=color;
      p.vx=(Math.random()-0.5)*240;
      p.vy=-(Math.random()*140+40);
      p.life=0.6;p.maxLife=0.6;
      spawned++;
    }
  }
}

function updateParticles(dt){
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p||!p.active)continue;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=400*dt;
    p.life-=dt;
    if(p.life<=0)p.active=false;
  }
}

function drawParticles(){
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p||!p.active)continue;
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
  }
  ctx.globalAlpha=1;
}

// Drawing helpers
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawPaddle(){
  const color=paddleFlashTimer>0?'#4fc3f7':'#ffffff';
  ctx.fillStyle=color;
  roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);
  ctx.fill();
}

function drawBall(bx,by,alpha,radius){
  ctx.globalAlpha=alpha!=null?alpha:1;
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.arc(bx,by,radius||ball.radius,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}

function drawTrail(){
  const opacities=[0.05,0.1,0.15,0.22,0.3,0.4];
  const radii=[4.5,5,5.5,6,6.5,7];
  for(let i=0;i<trail.length;i++){
    drawBall(trail[i].x,trail[i].y,opacities[i],radii[i]);
  }
}

function drawBricks(brickArr,alpha){
  ctx.save();
  ctx.globalAlpha=alpha!=null?alpha:1;
  for(const b of brickArr){
    if(!b.alive)continue;
    ctx.fillStyle=b.color;
    // Darken if damaged
    if(!b.indestructible&&b.maxHp>1&&b.hp<b.maxHp){
      ctx.fillStyle=darkenColor(b.color,0.25);
    }
    roundRect(b.x,b.y,b.w,b.h,3);
    ctx.fill();
    // Reinforced inner highlight (undamaged)
    if(!b.indestructible&&b.maxHp>1&&b.hp===b.maxHp){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      roundRect(b.x+8,b.y+4,b.w-16,b.h-8,2);
      ctx.fill();
    }
    // Crack on damaged
    if(!b.indestructible&&b.maxHp>1&&b.hp<b.maxHp){
      ctx.strokeStyle='rgba(255,255,255,0.3)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(b.x+b.w*0.2,b.y);
      ctx.lineTo(b.x+b.w*0.8,b.y+b.h);
      ctx.stroke();
    }
    // Indestructible sheen
    if(b.indestructible){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(b.x+2,b.y+b.h/2-0.5,b.w-4,1);
    }
  }
  ctx.restore();
}

function darkenColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-amt));g=Math.round(g*(1-amt));b=Math.round(b*(1-amt));
  return`rgb(${r},${g},${b})`;
}

function drawHUD(){
  ctx.fillStyle='#141414';ctx.fillRect(0,0,W,HUD_H);
  ctx.fillStyle='#222222';ctx.fillRect(0,35,W,1);
  // Score
  const sc=scorePopTimer>0?1+0.1*(scorePopTimer/0.067):1;
  ctx.save();
  ctx.translate(16,24);ctx.scale(sc,sc);
  ctx.fillStyle='#ffffff';ctx.font='17px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Score: '+score,0,0);
  ctx.restore();
  // Best
  ctx.fillStyle='#555555';ctx.font='17px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Best: '+bestScore,200,24);
  // Lives
  const livesDots=Math.max(0,lives-1);
  for(let i=0;i<livesDots;i++){
    const lx=500+i*16,ly=24;
    ctx.fillStyle=hudLifeFlashTimer>0?'#e53935':'#ffffff';
    ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fill();
  }
  // Level
  ctx.fillStyle='#aaaaaa';ctx.font='16px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('Lv '+level,750,24);
}

function centerText(text,y,size,color,alpha){
  ctx.save();ctx.globalAlpha=alpha!=null?alpha:1;
  ctx.fillStyle=color||'#fff';ctx.font=size+'px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,W/2,y);
  ctx.restore();
}

// Ball-paddle collision
function ballPaddleCollision(dt){
  if(ball.attached||ball.vy<=0)return;
  // Circle vs rect
  const cx=ball.x,cy=ball.y,r=ball.radius;
  const px=paddle.x,py=paddle.y,pw=paddle.w,ph=paddle.h;
  // Sweep check: was ball above paddle last frame and now below?
  if(ball.prevY-r<py+ph&&cy+r>=py){
    const nearX=Math.max(px,Math.min(cx,px+pw));
    const nearY=Math.max(py,Math.min(cy,py+ph));
    const dx=cx-nearX,dy=cy-nearY;
    if(dx*dx+dy*dy<=r*r){
      // Hit
      const hitRatio=Math.max(-1,Math.min(1,(cx-(px+pw/2))/(pw/2)));
      const maxAngle=65*Math.PI/180;
      const angle=hitRatio*maxAngle;
      ball.speed=Math.min(ball.speed+12,520);
      ball.vx=ball.speed*Math.sin(angle);
      ball.vy=-ball.speed*Math.cos(angle);
      // Enforce minimum vy
      if(Math.abs(ball.vy)<ball.speed*0.25){
        ball.vy=-ball.speed*0.25;
        // Recalc vx to preserve speed
        ball.vx=Math.sign(ball.vx)*Math.sqrt(ball.speed*ball.speed-ball.vy*ball.vy);
      }
      ball.y=py-r;
      paddleFlashTimer=0.05;
      sndPaddle();
    }
  }
}

// Ball-brick collision
function ballBrickCollision(){
  let hits=0;
  for(let i=0;i<bricks.length&&hits<3;i++){
    const b=bricks[i];
    if(!b.alive)continue;
    const cx=ball.x,cy=ball.y,r=ball.radius;
    // Closest point on rect to ball center
    const nearX=Math.max(b.x,Math.min(cx,b.x+b.w));
    const nearY=Math.max(b.y,Math.min(cy,b.y+b.h));
    const dx=cx-nearX,dy=cy-nearY;
    if(dx*dx+dy*dy>r*r)continue;
    hits++;
    // Determine face
    const overlapLeft=cx+r-b.x;
    const overlapRight=(b.x+b.w)-(cx-r);
    const overlapTop=cy+r-b.y;
    const overlapBot=(b.y+b.h)-(cy-r);
    const minOverlapX=Math.min(overlapLeft,overlapRight);
    const minOverlapY=Math.min(overlapTop,overlapBot);
    if(minOverlapX<minOverlapY){
      ball.vx=-ball.vx;
      ball.x+=(overlapLeft<overlapRight?-minOverlapX:minOverlapX)*0.5;
    }else{
      ball.vy=-ball.vy;
      ball.y+=(overlapTop<overlapBot?-minOverlapY:minOverlapY)*0.5;
    }
    // Enforce min vy
    if(Math.abs(ball.vy)<ball.speed*0.2){
      ball.vy=ball.vy>=0?ball.speed*0.2:-ball.speed*0.2;
    }
    if(b.indestructible){
      sndWall();continue;
    }
    b.hp--;
    if(b.hp<=0){
      b.alive=false;
      score+=b.points;
      checkBest();
      scorePopTimer=0.067;
      destructibleCount--;
      spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color);
      sndBrickDestroy(b.row);
      // Extra life
      if(!extraLifeGiven&&score>=200&&lives<5){
        lives++;extraLifeGiven=true;sndExtraLife();
      }
    }else{
      sndBrickDamage();
    }
  }
}

// Start & reset
function startGame(){
  state=SERVE;level=1;score=0;lives=3;extraLifeGiven=false;
  ballsLostThisLevel=0;perfectBonus=false;
  const ld=getLevelData(level);
  paddle=createPaddle(ld.pw);
  ball=createBall();
  ball.speed=ld.speed;
  const r=createBricks(level);
  bricks=r.bricks;destructibleCount=r.destructibleCount;
  attachBall();
  readyTimer=1.2;readyFadeTimer=0;
  particles=[];trail=[];
  scorePopTimer=0;paddleFlashTimer=0;hudLifeFlashTimer=0;
  canvas.style.cursor='none';
}

function nextLevel(){
  level++;
  ballsLostThisLevel=0;perfectBonus=false;
  const ld=getLevelData(level);
  const oldW=paddle.w;
  paddle.prevW=oldW;paddle.targetW=ld.pw;paddle.widthLerpT=0;
  ball=createBall();
  ball.speed=ld.speed;
  const r=createBricks(level);
  bricks=r.bricks;destructibleCount=r.destructibleCount;
  attachBall();
  readyTimer=1.2;readyFadeTimer=0;
  particles=[];trail=[];
  state=SERVE;
}

function loseLife(){
  lives--;
  hudLifeFlashTimer=0.3;
  if(lives<=0){
    state=GAME_OVER;
    canvas.style.cursor='default';
    newHighScore=score>=bestScore&&score>0;
  }else{
    ballsLostThisLevel++;
    const ld=getLevelData(level);
    ball.speed=ld.speed;
    attachBall();
    readyTimer=0;readyFadeTimer=0;
    state=SERVE;
    trail=[];
  }
}

let newHighScore=false;

// Attract mode
function initAttract(){
  const r=createBricks(1);
  attractBricks=r.bricks;
  attractBall={x:W/2,y:300,vx:200,vy:-250,radius:7};
  attractRespawnTimer=0;
}
function updateAttract(dt){
  if(attractRespawnTimer>0){
    attractRespawnTimer-=dt;
    if(attractRespawnTimer<=0){
      const r=createBricks(1);attractBricks=r.bricks;
      attractBall.x=W/2;attractBall.y=300;
      attractBall.vx=(Math.random()-0.5)*300;
      attractBall.vy=-280;
    }
    return;
  }
  const b=attractBall;
  b.x+=b.vx*dt;b.y+=b.vy*dt;
  // Walls
  if(b.x-b.radius<0){b.x=b.radius;b.vx=Math.abs(b.vx);}
  if(b.x+b.radius>W){b.x=W-b.radius;b.vx=-Math.abs(b.vx);}
  if(b.y-b.radius<HUD_H){b.y=HUD_H+b.radius;b.vy=Math.abs(b.vy);}
  if(b.y+b.radius>H){b.y=H-b.radius;b.vy=-Math.abs(b.vy);}
  // Brick collisions
  for(const br of attractBricks){
    if(!br.alive)continue;
    const nearX=Math.max(br.x,Math.min(b.x,br.x+br.w));
    const nearY=Math.max(br.y,Math.min(b.y,br.y+br.h));
    const dx=b.x-nearX,dy=b.y-nearY;
    if(dx*dx+dy*dy<=b.radius*b.radius){
      br.alive=false;
      const olX=b.x+b.radius-br.x,orX=(br.x+br.w)-(b.x-b.radius);
      const otY=b.y+b.radius-br.y,obY=(br.y+br.h)-(b.y-b.radius);
      if(Math.min(olX,orX)<Math.min(otY,obY))b.vx=-b.vx;else b.vy=-b.vy;
      break;
    }
  }
  // Check if all dead
  if(attractBricks.every(br=>!br.alive))attractRespawnTimer=1;
}

// Main loop
let lastTime=0,globalTime=0;
let screenFlashTimer=0;

state=TITLE;initAttract();

function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.05)dt=0.05;
  globalTime+=dt;
  update(dt);
  render();
}

function update(dt){
  // Decay timers
  if(scorePopTimer>0)scorePopTimer=Math.max(0,scorePopTimer-dt);
  if(paddleFlashTimer>0)paddleFlashTimer=Math.max(0,paddleFlashTimer-dt);
  if(hudLifeFlashTimer>0)hudLifeFlashTimer=Math.max(0,hudLifeFlashTimer-dt);
  if(screenFlashTimer>0)screenFlashTimer=Math.max(0,screenFlashTimer-dt);

  switch(state){
    case TITLE:updateAttract(dt);break;
    case SERVE:updateServe(dt);break;
    case PLAYING:updatePlaying(dt);break;
    case PAUSED:break;
    case LIFE_LOST:updateLifeLost(dt);break;
    case LEVEL_CLEAR:updateLevelClear(dt);break;
    case GAME_OVER:break;
  }
}

function updateServe(dt){
  movePaddle(dt);
  // Width lerp
  if(paddle.widthLerpT<1){
    paddle.widthLerpT=Math.min(1,paddle.widthLerpT+dt/0.3);
    paddle.w=paddle.prevW+(paddle.targetW-paddle.prevW)*paddle.widthLerpT;
  }
  if(ball.attached){
    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-ball.radius;
  }
  if(readyTimer>0){
    readyTimer-=dt;
    if(readyTimer<=0)readyFadeTimer=0.3;
  }
  if(readyFadeTimer>0)readyFadeTimer=Math.max(0,readyFadeTimer-dt);
}

function updatePlaying(dt){
  movePaddle(dt);
  if(ball.attached){
    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-ball.radius;
    return;
  }
  // Move ball
  ball.prevX=ball.x;ball.prevY=ball.y;
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;
  // Trail
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>TRAIL_LEN)trail.shift();
  // Ceiling
  if(ball.y-ball.radius<HUD_H){
    ball.y=HUD_H+ball.radius;ball.vy=Math.abs(ball.vy);sndWall();
  }
  // Side walls
  if(ball.x-ball.radius<0){ball.x=ball.radius;ball.vx=Math.abs(ball.vx);sndWall();}
  if(ball.x+ball.radius>W){ball.x=W-ball.radius;ball.vx=-Math.abs(ball.vx);sndWall();}
  // Bricks
  ballBrickCollision();
  // Paddle
  ballPaddleCollision(dt);
  // Floor
  if(ball.y>610){
    sndLifeLost();
    state=LIFE_LOST;
    lifeLostTimer=0.8;
    return;
  }
  // Level clear
  if(destructibleCount<=0){
    state=LEVEL_CLEAR;
    levelClearTimer=2;
    screenFlashTimer=0.06;
    perfectBonus=ballsLostThisLevel===0;
    if(perfectBonus)score+=100;
    checkBest();
    sndLevelClear();
  }
  updateParticles(dt);
}

function updateLifeLost(dt){
  lifeLostTimer-=dt;
  if(lifeLostTimer<=0)loseLife();
}

function updateLevelClear(dt){
  levelClearTimer-=dt;
  updateParticles(dt);
  if(levelClearTimer<=0)nextLevel();
}

function movePaddle(dt){
  if(mouseActive){
    paddle.x=mouseX-paddle.w/2;
  }
  if(keys['ArrowLeft']||keys['KeyA'])paddle.x-=500*dt;
  if(keys['ArrowRight']||keys['KeyD'])paddle.x+=500*dt;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
}

function render(){
  // Screen flash
  if(screenFlashTimer>0){
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);return;
  }
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);

  switch(state){
    case TITLE:renderTitle();break;
    case SERVE:renderServe();break;
    case PLAYING:renderPlaying();break;
    case PAUSED:renderPlaying();renderPause();break;
    case LIFE_LOST:renderLifeLost();break;
    case LEVEL_CLEAR:renderLevelClear();break;
    case GAME_OVER:renderGameOver();break;
  }
}

function renderTitle(){
  drawBricks(attractBricks,0.4);
  // Attract ball
  if(attractRespawnTimer<=0){
    ctx.fillStyle='#fff';ctx.beginPath();
    ctx.arc(attractBall.x,attractBall.y,attractBall.radius,0,Math.PI*2);ctx.fill();
  }
  // Title
  ctx.fillStyle='#ffffff';ctx.font='bold 52px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BREAKOUT',W/2,240);
  // Color legend
  const legendColors=['#e53935','#fb8c00','#fdd835','#43a047'];
  const legendPts=[7,5,3,1];
  const startX=W/2-120;
  for(let i=0;i<4;i++){
    const lx=startX+i*70,ly=290;
    ctx.fillStyle=legendColors[i];
    ctx.fillRect(lx,ly,16,16);
    ctx.fillStyle='#aaa';ctx.font='13px monospace';ctx.textAlign='left';
    ctx.fillText('×'+legendPts[i],lx+20,ly+12);
  }
  // Press Enter
  const alpha=0.3+0.7*(0.5+0.5*Math.sin(globalTime*Math.PI));
  centerText('Press Enter',430,20,'#888888',alpha);
  centerText('Best: '+bestScore,470,15,'#555555',1);
  centerText('\u2190 \u2192 Move | Space Launch | P Pause',500,13,'#333333',1);
  drawHUD();
}

function renderServe(){
  drawBricks(bricks,1);
  drawPaddle();
  drawBall(ball.x,ball.y,1);
  if(readyTimer>0){
    centerText('READY',PLAY_Y+PLAY_H/2,36,'#ffffff',1);
  }else if(readyFadeTimer>0){
    centerText('READY',PLAY_Y+PLAY_H/2,36,'#ffffff',readyFadeTimer/0.3);
  }else if(ball.attached){
    // Aiming arrow
    const angle=(65+25)*Math.PI/180; // default roughly center
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(ball.x,ball.y-ball.radius);
    ctx.lineTo(ball.x,ball.y-ball.radius-20);
    ctx.stroke();
  }
  drawParticles();
  drawHUD();
}

function renderPlaying(){
  drawBricks(bricks,1);
  drawTrail();
  if(!ball.attached)drawBall(ball.x,ball.y,1);
  drawPaddle();
  drawParticles();
  drawHUD();
}

function renderPause(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,PLAY_Y,W,PLAY_H);
  centerText('PAUSED',PLAY_Y+PLAY_H/2-10,36,'#ffffff',1);
  centerText('P to resume',PLAY_Y+PLAY_H/2+30,14,'#888888',1);
}

function renderLifeLost(){
  drawBricks(bricks,1);
  drawPaddle();
  drawParticles();
  drawHUD();
}

function renderLevelClear(){
  drawBricks(bricks,1);
  drawPaddle();
  drawParticles();
  centerText('LEVEL '+level+' CLEAR!',PLAY_Y+PLAY_H/2-20,32,'#ffffff',1);
  if(perfectBonus)centerText('PERFECT! +100',PLAY_Y+PLAY_H/2+20,18,'#ffd740',1);
  drawHUD();
}

function renderGameOver(){
  drawBricks(bricks,0.3);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,PLAY_Y,W,PLAY_H);
  centerText('GAME OVER',240,44,'#e53935',1);
  centerText('Score: '+score,295,26,'#ffffff',1);
  if(newHighScore){
    const a=0.5+0.5*Math.sin(globalTime*4);
    centerText('NEW HIGH SCORE!',330,18,'#ffb300',a);
  }
  centerText('Level reached: '+level,360,16,'#888888',1);
  const blink=Math.floor(globalTime*2)%2===0;
  if(blink)centerText('Enter to play again',420,16,'#666666',1);
  drawHUD();
}

requestAnimationFrame(loop);
})();
</script>
</body>
</html>
