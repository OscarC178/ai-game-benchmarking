function updateMario(dt){if(mario.dead) return; if(mario.hammer>0){mario.hammerT-=dt; if(mario.hammerT<=0){mario.hammer=0; mario.hammerWarn=0;} else if(mario.hammerT<=2){if(!hammerExpireBeep||hammerExpireBeep<0.25){S.warn(); hammerExpireBeep=0;}}}
 if(mario.climb){const lad=mario.climbL; if(!lad){mario.climb=false; return;} if(keys['ArrowUp']||keys['KeyW']) {mario.y-=80*dt; S.climb();} else if(keys['ArrowDown']||keys['KeyS']) {mario.y+=80*dt; S.climb();} else {mario.vx=0; mario.vy=0;} const top=gy(lad.to,lad.x), bot=gy(lad.from,lad.x); if(mario.y<=top+6){mario.climb=false; mario.y=top; mario.y-=2; mario.onGirder=lad.to; mario.x=lad.x; } if(mario.y>=bot-6){mario.climb=false; mario.y=bot; mario.onGirder=lad.from; mario.x=lad.x;} return; }

 if(mario.air){ mario.vy+=700*dt; if(mario.vy>400) mario.vy=400; mario.y+=mario.vy*dt; if(keys['ArrowLeft']||keys['KeyA']) mario.x-=100*dt; if(keys['ArrowRight']||keys['KeyD']) mario.x+=100*dt; }
 // landing check

 // update jump scoring set

}

 const g=b.girder; const dir=(G[g].ry>G[g].ly)?1:-1; const sign=(G[g].rx>G[g].lx?1:-1);

 }

 }
}

function updateFireballs(dt){for(let i=fireballs.length-1;i>=0;i--){const f=fireballs[i]; f.t+=dt; f.anim+=dt*8; if(hammerZone() && rectsIntersect(hammerZone(),fireHitbox(f))){score+=500; scorePop(f.x,f.y-18,'500'); fireballs.splice(i,1); S.smash(); continue;} if(rectsIntersect(marioHitbox(),fireHitbox(f))){killMario('fire'); return;} const toward=Math.random()<0.6 ? (mario.x>f.x?1:-1) : (Math.random()<0.5?-1:1); if(Math.random()<dt*0.5){const lad=ladders.find(l=>lEnabled(l)&&Math.abs(l.x-f.x)<16); if(lad && Math.random()<0.4){f.state='ladder'; f.ladd=lad; f.x=lad.x; f.dir=mario.y<gAtX(lad.from,lad.x)?-1:1; }} if(f.state==='ladder'){f.y += currentFireSpeed()*dt; f.x=f.ladd.x; if(f.y>=Math.max(gAtX(f.ladd.from,f.x),gAtX(f.ladd.to,f.x))){f.state='rolling'; f.girder=f.ladd.from; f.y=gAtX(f.girder,f.x); f.dir=Math.random()<0.5?-1:1; }} else {f.dir=toward; f.x += f.dir*currentFireSpeed()*dt; if(f.x<56) f.dir=1; if(f.x>616) f.dir=-1; f.y=gAtX(f.girder,f.x);} }
}
function currentFireCap(){return level===1?2:level===2?3:4}
function levelSpeed(){return level===1?1:level===2?1.15:level===3?1.3:1.45}
function toBottom(){return}
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space','Enter','P','Escape'].includes(e.code)) e.preventDefault(); keys[e.code]=true; acq(); if(e.code==='Enter'&&state==='TITLE'){resetLevel(); state='INTRO'; introT=2.2;} if(e.code==='Enter'&&state==='GAME_OVER'){initGame();} if(e.code==='P'||e.code==='Escape'){if(state==='PLAYING') {paused=true; state='PAUSED';} else if(state==='PAUSED'){paused=false; state='PLAYING';}} if(e.code==='Space'&&!prev.Space){jump();} if(e.code==='Enter'&&state==='PLAYING'&&readyT<=0){} if(e.code==='ArrowLeft'||e.code==='KeyA'){startWalkDir('left');} if(e.code==='ArrowRight'||e.code==='KeyD'){startWalkDir('right');} if((e.code==='ArrowUp'||e.code==='KeyW')){if(!mario.climb) startClimb('up');} if((e.code==='ArrowDown'||e.code==='KeyS')){if(!mario.climb) startClimb('down');} });
addEventListener('keyup',e=>{keys[e.code]=false;});
function loop(now){const dt=Math.min(0.05,(now-last)/1000); last=now; update(dt); render(); prev={...keys}; requestAnimationFrame(loop)}
initGame(); requestAnimationFrame(loop);
