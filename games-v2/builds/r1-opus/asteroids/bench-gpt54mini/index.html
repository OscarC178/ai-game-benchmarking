<canvas id="c" width="800" height="600"></canvas>
<script>
(()=>{
const W=800,H=600;
const C=document.getElementById('c'),X=C.getContext('2d');
let keys=Object.create(null),prevKeys=Object.create(null),last=performance.now(),state='TITLE',paused=false;
let score=0,best=+localStorage.getItem('asteroids_best')||0,lives=3,wave=1,extraAt=10000,nextExtra=10000,heartbeatTimer=0,heartbeatFlip=0;
let ship=null,asteroids=[],playerBullets=[],ufoBullets=[],debris=[],ufo=null,ufoTimer=16,spawnTimer=0,deathTimer=0,respawnTimer=0,respawnWait=0,hyperspaceCd=0,hyperspaceState=null;
let titleJitter=0,titleAsteroids=[],titleShipAngle=-Math.PI/2,titleBlink=0; let audio=null,thrustOsc=null,thrustGain=null,thrustLfo=null,thrustLfoGain=null;
const radii={ship:12,bullet:2,large:40,medium:20,small:10,ufoL:15,ufoS:9};
const sizes=['large','medium','small'];
function acq(){if(audio)return; try{audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){audio=null;}}
function tone(seq){if(!audio)return; const t=audio.currentTime; for(const s of seq){const o=audio.createOscillator(),g=audio.createGain(); o.type=s.type||'sine'; o.frequency.setValueAtTime(s.f0,t+(s.dl||0)/1000); if(s.f1!=null)o.frequency.exponentialRampToValueAtTime(s.f1,t+(s.dl||0+s.du)/1000); g.gain.setValueAtTime(s.g||0.2,t+(s.dl||0)/1000); g.gain.exponentialRampToValueAtTime(0.001,t+(s.dl||0+s.du)/1000); o.connect(g).connect(audio.destination); o.start(t+(s.dl||0)/1000); o.stop(t+(s.dl||0+s.du)/1000+0.05);} }
const SFX={fire:()=>tone([{f0:900,f1:300,du:50,g:0.15,type:'square'}]),crunch:(s)=>tone([{f0:s==='large'?120:s==='medium'?180:260,du:s==='large'?150:s==='medium'?120:80,g:s==='large'?0.25:s==='medium'?0.22:0.2,type:'square'}]),ufo:()=>tone([{f0:200,du:500,g:0.15,type:'sine'}]),ufoHi:()=>tone([{f0:400,du:500,g:0.15,type:'sine'}]),ufoDie:()=>tone([{f0:600,f1:100,du:200,g:0.2,type:'sawtooth'}]),death:()=>{if(!audio)return; const t=audio.currentTime; const buf=audio.createBuffer(1,audio.sampleRate*0.3,audio.sampleRate),d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); const src=audio.createBufferSource(),g=audio.createGain(),o=audio.createOscillator(),og=audio.createGain(); src.buffer=buf; g.gain.value=0.22; o.type='sine'; o.frequency.value=100; og.gain.value=0.12; src.connect(g).connect(audio.destination); o.connect(og).connect(audio.destination); src.start(t); o.start(t); src.stop(t+0.3); o.stop(t+0.3);},extra:()=>tone([{f0:880,du:80,g:0.18,type:'sine'},{f0:1100,du:80,g:0.18,dl:80,type:'sine'}]),hypoOut:()=>tone([{f0:800,f1:200,du:200,g:0.15,type:'sine'}]),hypoIn:()=>tone([{f0:200,f1:800,du:200,g:0.15,type:'sine'}]),thrustOn:()=>{if(!audio||thrustOsc)return; thrustOsc=audio.createOscillator(); thrustGain=audio.createGain(); thrustLfo=audio.createOscillator(); thrustLfoGain=audio.createGain(); thrustOsc.type='sawtooth'; thrustOsc.frequency.value=60; thrustGain.gain.value=0.0; thrustLfo.type='sine'; thrustLfo.frequency.value=5; thrustLfoGain.gain.value=0.03; thrustLfo.connect(thrustLfoGain).connect(thrustGain.gain); thrustOsc.connect(thrustGain).connect(audio.destination); thrustOsc.start(); thrustLfo.start(); setTimeout(()=>{if(thrustGain) thrustGain.gain.exponentialRampToValueAtTime(0.12,audio.currentTime+0.03);},0);},thrustOff:()=>{if(!audio||!thrustOsc)return; const t=audio.currentTime; try{thrustGain.gain.exponentialRampToValueAtTime(0.001,t+0.05); thrustOsc.stop(t+0.06); thrustLfo.stop(t+0.06);}catch(e){} thrustOsc=thrustGain=thrustLfo=thrustLfoGain=null;}};
function rand(a,b){return a+Math.random()*(b-a);} function clamp(v,a,b){return v<a?a:v>b?b:v;}
function wrap(o){if(o.x<0)o.x+=W; if(o.x>W)o.x-=W; if(o.y<0)o.y+=H; if(o.y>H)o.y-=H;}
function torusDx(a,b){let dx=Math.abs(a.x-b.x); if(dx>W/2) dx=W-dx; return dx;} function torusDy(a,b){let dy=Math.abs(a.y-b.y); if(dy>H/2) dy=H-dy; return dy;} function dist(a,b){const dx=torusDx(a,b),dy=torusDy(a,b); return Math.hypot(dx,dy);} 
function wrapPos(x,y){let r=[]; r.push([x,y]); if(x<20) r.push([x+W,y]); if(x>W-20) r.push([x-W,y]); if(y<20) r.push([x,y+H]); if(y>H-20) r.push([x,y-H]); if(x<20&&y<20) r.push([x+W,y+H]); if(x<20&&y>H-20) r.push([x+W,y-H]); if(x>W-20&&y<20) r.push([x-W,y+H]); if(x>W-20&&y>H-20) r.push([x-W,y-H]); return r;}
function makeShip(){return {x:400,y:300,vx:0,vy:0,angle:-Math.PI/2,inv:3,alive:true,hidden:false,hideT:0,actionSeen:false,hypoCd:0};}
function shipVerts(s){return [[0,-18],[-12,12],[12,12]];}
function shipIconVerts(){return [[0,-7],[-5,6],[5,6]];}
function makeAsteroid(size,x,y,vx,vy){const r=radii[size],n=Math.floor(rand(9,15)),verts=[]; for(let i=0;i<n;i++){const a=i/n*Math.PI*2; const rr=r*(0.7+Math.random()*0.6); verts.push([Math.cos(a)*rr,Math.sin(a)*rr]);} return {x,y,vx,vy,angle:rand(0,Math.PI*2),spin:rand(-1.5,1.5),size,r,n,verts,alive:true};}
function asteroidCountForWave(w){return Math.min(8,3+w);}
function speedScale(){return Math.min(2,1+Math.max(0,wave-3)*0.1);} 
function spawnWave(){asteroids=[]; const count=asteroidCountForWave(wave); const scale=speedScale(); for(let i=0;i<count;i++) spawnAsteroidEdge('large',scale,true);} 
function spawnAsteroidEdge(size,scale,avoidPlayer){let tries=0; while(tries++<40){const edge=Math.floor(Math.random()*4); let x,y,ang; if(edge===0){x=Math.random()*W;y=-5;ang=rand(Math.PI*0.15,Math.PI*0.85);} else if(edge===1){x=W+5;y=Math.random()*H;ang=rand(Math.PI*1.15,Math.PI*1.85);} else if(edge===2){x=Math.random()*W;y=H+5;ang=rand(-Math.PI*0.85,-Math.PI*0.15);} else {x=-5;y=Math.random()*H;ang=rand(-Math.PI*0.35,Math.PI*0.35);} if(avoidPlayer && Math.hypot((x-400+W/2)%W-W/2,(y-300+H/2)%H-H/2)<150) continue; const sp=size==='large'?rand(30,80):size==='medium'?rand(50,120):rand(80,160); const vel=sp*scale; const vx=Math.cos(ang)*vel, vy=Math.sin(ang)*vel; asteroids.push(makeAsteroid(size,x,y,vx,vy)); return; }}
function titleSetup(){state='TITLE'; titleJitter=0; titleBlink=0; titleAsteroids=[]; for(let i=0;i<5;i++) titleAsteroids.push(makeAsteroid(['large','medium','small'][i%3],rand(0,W),rand(0,H),rand(-30,30),rand(-30,30))); ship=makeShip(); ship.inv=999; }
function startGame(){score=0; lives=3; wave=1; nextExtra=10000; playerBullets=[]; ufoBullets=[]; debris=[]; ufo=null; ufoTimer=rand(15,20); spawnTimer=0; deathTimer=0; respawnTimer=0; respawnWait=0; hyperspaceCd=0; hyperspaceState=null; ship=makeShip(); spawnWave(); state='PLAYING'; paused=false; }
function spawnDebris(kind,x,y){const c=kind==='ship'?[3,4]:kind==='ufo'?[8,12]:[6,10], n=Math.floor(rand(c[0],c[1]+1)); for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(kind==='ship'?30:40,kind==='ship'?80:120),len=rand(kind==='ufo'?4:4,kind==='ufo'?12:8); debris.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,ang:a,len,spin:rand(-2,2),t:0,life:kind==='ship'?1.5:0.8,kind}); }}
function renderShip(x,y,ang,blink=true,alpha=1){if(blink && ship && ship.inv>0 && Math.floor(performance.now()/83)%2===0) return; X.save(); X.translate(x,y); X.rotate(ang); X.globalAlpha=alpha; X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); const v=shipVerts(); X.moveTo(v[0][0],v[0][1]); X.lineTo(v[1][0],v[1][1]); X.lineTo(v[2][0],v[2][1]); X.closePath(); X.stroke(); X.restore();}
function renderShipIcon(x,y,scale=0.6){X.save(); X.translate(x,y); X.scale(scale,scale); X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(0,-18); X.lineTo(-12,12); X.lineTo(12,12); X.closePath(); X.stroke(); X.restore();}
function makeBullet(x,y,vx,vy,life,owner){return {x,y,vx,vy,life,owner,r:2,alive:true};}
function firePlayer(){if(!ship||ship.hidden||ship.dead)return; if(playerBullets.length>=4) return; if(performance.now()-lastFire<120) return; lastFire=performance.now(); const vx=Math.cos(ship.angle)*500,vy=Math.sin(ship.angle)*500; playerBullets.push(makeBullet(ship.x+Math.cos(ship.angle)*18,ship.y+Math.sin(ship.angle)*18,vx,vy,0.9,'player')); SFX.fire(); if(ship.inv>0) ship.inv=0.5; if(ship.hidden) return; if(ship.actionSeen===false) ship.actionSeen=true; SFX.thrustOff(); }
let lastFire=0,lastHypo=0;
function startThrust(){acq(); if(audio) SFX.thrustOn(); if(ship && ship.inv>0) ship.inv=Math.min(ship.inv,0.5); ship.actionSeen=true; }
function stopThrust(){SFX.thrustOff();}
function hyperspace(){if(!ship||ship.hidden||ship.hypoCd>0||ship.dead)return; ship.hidden=true; ship.hideT=0.5; ship.hypoCd=3; SFX.hypoOut(); ship.actionSeen=true; }
function safeRandomPos(){for(let i=0;i<100;i++){const x=Math.random()*W,y=Math.random()*H; let ok=true; for(const a of asteroids) if(a.alive && Math.hypot(((x-a.x+W/2+W)%W)-W/2,((y-a.y+H/2+H)%H)-H/2)<80){ok=false;break;} if(ok && ufo && ufo.alive && Math.hypot(((x-ufo.x+W/2+W)%W)-W/2,((y-ufo.y+H/2+H)%H)-H/2)<80) ok=false; if(ok) return {x,y};} return {x:Math.random()*W,y:Math.random()*H}; }
function killShip(){if(!ship||ship.dead)return; ship.alive=false; spawnDebris('ship',ship.x,ship.y); SFX.death(); lives--; if(score>=nextExtra){while(score>=nextExtra){lives++; nextExtra+=10000; SFX.extra();}} deathTimer=1.5; respawnWait=0; ship.dead=true; if(lives<=0){state='GAME_OVER'; if(score>best){best=score; localStorage.setItem('asteroids_best',best);}} }
function maybeSpawnUFO(dt){if(ufo&&ufo.alive) return; if(state!=='PLAYING') return; if(spawnTimer>0){spawnTimer-=dt; return;} if(ufoTimer>0){ufoTimer-=dt; return;} const type=score<10000?'large':'small'; const fromLeft=Math.random()<0.5; ufo={alive:true,type,x:fromLeft?-30:W+30,y:rand(40,560),vx:(fromLeft?1:-1)*(type==='large'?120:150),vy:0,ang:0,shootT:rand(type==='large'?1.5:1.0,type==='large'?2.5:1.5),moveT:rand(type==='large'?1.0:0.5,type==='large'?2.0:1.0),flick:0}; if(type==='large') SFX.ufo(); else SFX.ufoHi(); }
function torusVec(ax,ay,bx,by){let dx=bx-ax,dy=by-ay; if(dx>W/2) dx-=W; if(dx<-W/2) dx+=W; if(dy>H/2) dy-=H; if(dy<-H/2) dy+=H; return {dx,dy};}
function updateShip(dt){if(!ship) return; if(ship.hypoCd>0) ship.hypoCd-=dt; if(ship.hidden){ship.hideT-=dt; if(ship.hideT<=0){ship.hidden=false; const p=safeRandomPos(); ship.x=p.x; ship.y=p.y; ship.vx=0; ship.vy=0; ship.inv=1; ship.actionSeen=false; ship.hypoCd=3; SFX.hypoIn(); if(Math.random()<0.2) killShip();} return;} if(ship.dead) return; if(keys['ArrowLeft']||keys['KeyA']) ship.angle-=4.712*dt; if(keys['ArrowRight']||keys['KeyD']) ship.angle+=4.712*dt; const thrust=keys['ArrowUp']||keys['KeyW']; if(thrust){startThrust(); ship.vx+=Math.cos(ship.angle)*200*dt; ship.vy+=Math.sin(ship.angle)*200*dt; const sp=Math.hypot(ship.vx,ship.vy); if(sp>400){ship.vx=ship.vx/sp*400; ship.vy=ship.vy/sp*400;} } else stopThrust(); if(keys['Space']){} if(keys['ShiftLeft']||keys['ShiftRight']||keys['ArrowDown']||keys['KeyS']){} ship.x+=ship.vx*dt; ship.y+=ship.vy*dt; wrap(ship); if(ship.inv>0) ship.inv-=dt; }
function updateBullets(arr,dt){for(const b of arr){b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt; wrap(b);} return arr.filter(b=>b.life>0&&b.alive!==false);} 
function splitAsteroid(a){const idx=sizes.indexOf(a.size); if(idx<2){const childSize=sizes[idx+1]; const base=Math.atan2(a.vy,a.vx); for(let i=0;i<2;i++){const ang=base+rand(-1.2,1.2)+(i?Math.PI/4:-Math.PI/4); const sp=rand(childSize==='medium'?50:80,childSize==='medium'?120:160)*speedScale(); asteroids.push(makeAsteroid(childSize,a.x,a.y,Math.cos(ang)*sp,Math.sin(ang)*sp));}} spawnDebris('asteroid',a.x,a.y); SFX.crunch(a.size); }
function destroyUFO(){if(!ufo||!ufo.alive) return; spawnDebris('ufo',ufo.x,ufo.y); SFX.ufoDie(); ufo.alive=false; ufoTimer=rand(15,25); spawnTimer=0; }
function asteroidPoints(size){return size==='large'?20:size==='medium'?50:100;}
function updateAsteroids(dt){for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.angle+=a.spin*dt; wrap(a);} }
function updateUFO(dt){if(!ufo||!ufo.alive) return; ufo.x+=ufo.vx*dt; ufo.y+=ufo.vy*dt; wrap(ufo); ufo.moveT-=dt; ufo.shootT-=dt; if(ufo.moveT<=0){ufo.moveT=rand(ufo.type==='large'?1:0.4,ufo.type==='large'?2:1); ufo.vy+=rand(-30,30); if(ufo.type==='small' && Math.random()<0.3) ufo.vx*=-1;} if(ufo.type==='large' && ufo.shootT<=0){ufo.shootT=rand(1.5,2.5); fireUFOBullet(false);} if(ufo.type==='small' && ufo.shootT<=0){ufo.shootT=rand(1.0,1.5); fireUFOBullet(true);} }
function fireUFOBullet(aimed){if(ufoBullets.length>=2||!ufo||!ufo.alive)return; let vx,vy; if(aimed){const v=torusVec(ufo.x,ufo.y,ship.x,ship.y); const ang=Math.atan2(v.dy,v.dx)+rand(-5,5)*Math.PI/180; vx=Math.cos(ang)*300; vy=Math.sin(ang)*300;} else {const ang=rand(0,Math.PI*2); vx=Math.cos(ang)*250; vy=Math.sin(ang)*250;} ufoBullets.push(makeBullet(ufo.x,ufo.y,vx,vy,1.2,'ufo')); }
function spawnWaveIfNeeded(){if(state!=='PLAYING')return; if(asteroids.length===0 && !spawnTimer){spawnTimer=2.0;}}
function respawnCheck(dt){if(state!=='RESPAWN_WAIT') return; respawnWait+=dt; const clear=asteroids.every(a=>!a.alive||dist(a,{x:400,y:300})>120); if(clear || respawnWait>5){ship=makeShip(); ship.inv=respawnWait>5?5:3; ship.alive=true; ship.dead=false; ship.hidden=false; state='PLAYING'; respawnWait=0;}} 
function resetAfterDeath(){if(lives>0){state='RESPAWN_WAIT'; respawnTimer=0;} }
function asteroidCollision(a,b){return dist(a,b) < a.r+b.r;}
function processCollisions(){// player bullets
for(let i=playerBullets.length-1;i>=0;i--){const b=playerBullets[i]; let hit=false; for(let j=asteroids.length-1;j>=0;j--){const a=asteroids[j]; if(!a.alive) continue; if(asteroidCollision(b,a)){hit=true; b.alive=false; if(a.size==='large'){score+=20; splitAsteroid(a); a.alive=false;} else if(a.size==='medium'){score+=50; splitAsteroid(a); a.alive=false;} else {score+=100; spawnDebris('asteroid',a.x,a.y); SFX.crunch('small'); a.alive=false;} break;}} if(!hit && ufo&&ufo.alive && asteroidCollision(b,ufo)){hit=true; b.alive=false; score+=ufo.type==='large'?200:1000; destroyUFO();} if(hit) continue;}
// ufo bullets destroy asteroids
for(let i=ufoBullets.length-1;i>=0;i--){const b=ufoBullets[i]; for(let j=asteroids.length-1;j>=0;j--){const a=asteroids[j]; if(!a.alive) continue; if(asteroidCollision(b,a)){b.alive=false; if(a.size==='large'){splitAsteroid(a); a.alive=false;} else if(a.size==='medium'){splitAsteroid(a); a.alive=false;} else {spawnDebris('asteroid',a.x,a.y); SFX.crunch('small'); a.alive=false;} break;}}}
// ship collisions
if(ship && ship.alive && !ship.hidden && ship.inv<=0){for(const a of asteroids){if(a.alive && asteroidCollision(ship,{x:a.x,y:a.y,r:a.r})){killShip(); break;}} if(ship.alive && ufo&&ufo.alive && asteroidCollision(ship,{x:ufo.x,y:ufo.y,r:ufo.type==='large'?15:9})){destroyUFO(); killShip();} for(const b of ufoBullets){if(b.alive!==false && asteroidCollision(ship,b)){b.alive=false; killShip(); break;}} }
// asteroid-ufo collision
if(ufo&&ufo.alive){for(const a of asteroids){if(a.alive && asteroidCollision(ufo,{x:a.x,y:a.y,r:a.r})){destroyUFO(); break;}}}
// remove dead and split children already pushed
asteroids=asteroids.filter(a=>a.alive); playerBullets=playerBullets.filter(b=>b.alive!==false); ufoBullets=ufoBullets.filter(b=>b.alive!==false); if(asteroids.length===0 && state==='PLAYING' && !spawnTimer){spawnTimer=2;} }
function updateHeartbeat(dt){const count=asteroids.length + asteroids.filter(a=>a.size==='medium').length + asteroids.filter(a=>a.size==='small').length; const max=28; const interval=Math.max(180,200+(count/max)*600); heartbeatTimer-=dt*1000; if(heartbeatTimer<=0 && state==='PLAYING'){heartbeatTimer=interval; heartbeatFlip^=1; if(audio) tone([{f0:heartbeatFlip?80:60,du:120,g:0.3,type:'sine'}]); }}
function updateDebris(dt){debris=debris.filter(d=>{d.t+=dt; d.x+=d.vx*dt; d.y+=d.vy*dt; return d.t<d.life;});}
function update(dt){if(paused) return; if(state==='TITLE'){titleUpdate(dt); return;} if(state==='GAME_OVER'){updateGameOver(dt); return;} if(state==='RESPAWN_WAIT'){updateAsteroids(dt); updateUFO(dt); updateDebris(dt); maybeSpawnUFO(dt); respawnCheck(dt); return;} if(state==='PLAYING'){if(spawnTimer>0){spawnTimer-=dt; if(spawnTimer<=0 && asteroids.length===0) spawnWave();} updateShip(dt); updateAsteroids(dt); updateUFO(dt); updateBulletsUpdate(dt); updateDebris(dt); maybeSpawnUFO(dt); processCollisions(); if(score>=nextExtra){while(score>=nextExtra){lives++; nextExtra+=10000; SFX.extra();}} spawnWaveIfNeeded(); updateHeartbeat(dt); if(ufoTimer>0 && (!ufo||!ufo.alive)) ufoTimer-=dt; if(ufoTimer<=0 && (!ufo||!ufo.alive)){ufoTimer=rand(15,20); maybeSpawnUFO(0);} } }
function updateBulletsUpdate(dt){playerBullets=updateBullets(playerBullets,dt); ufoBullets=updateBullets(ufoBullets,dt); for(const b of [...playerBullets,...ufoBullets]) if(b.life<=0) b.alive=false;}
function titleUpdate(dt){titleBlink+=dt; titleJitter+=dt; titleAsteroids.forEach(a=>{a.x+=a.vx*dt;a.y+=a.vy*dt;a.angle+=a.spin*dt; wrap(a);}); ship.angle+=0.6*dt;}
function updateGameOver(dt){gameOverBlink+=dt; updateAsteroids(dt); updateUFO(dt); updateDebris(dt); maybeSpawnUFO(dt); }
function render(){X.fillStyle='rgba(0,0,0,0.92)'; X.fillRect(0,0,W,H); drawObjects(); drawHUD(); if(state==='TITLE') drawTitle(); if(state==='PLAYING'&&ship&&ship.hidden){} if(state==='PAUSED') drawPaused(); if(state==='GAME_OVER') drawGameOver(); }
function drawHUD(){X.fillStyle='#fff'; X.font='22px monospace'; X.textAlign='left'; X.fillText('SCORE '+score,20,28); X.fillStyle='#888'; X.font='18px monospace'; X.textAlign='center'; X.fillText('HI-SCORE '+best,400,28); X.textAlign='left'; for(let i=0;i<Math.max(0,lives-1);i++) renderShipIcon(26+i*18,56,0.35);} 
function renderWrapped(x,y,r,fn){fn(x,y); const xs=[x-W,x+W],ys=[y-H,y+H]; if(x-r<0) fn(x+W,y); if(x+r>W) fn(x-W,y); if(y-r<0) fn(x,y+H); if(y+r>H) fn(x,y-H); if(x-r<0&&y-r<0) fn(x+W,y+H); if(x-r<0&&y+r>H) fn(x+W,y-H); if(x+r>W&&y-r<0) fn(x-W,y+H); if(x+r>W&&y+r>H) fn(x-W,y-H); }
function strokePoly(points){X.beginPath(); X.moveTo(points[0][0],points[0][1]); for(let i=1;i<points.length;i++) X.lineTo(points[i][0],points[i][1]); X.closePath(); X.stroke();}
function drawAsteroid(a,alpha=1){X.save(); X.translate(a.x,a.y); X.rotate(a.angle); X.globalAlpha=alpha; X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(a.verts[0][0],a.verts[0][1]); for(let i=1;i<a.verts.length;i++) X.lineTo(a.verts[i][0],a.verts[i][1]); X.closePath(); X.stroke(); X.restore();}
function drawUFO(u,alpha=1){X.save(); X.translate(u.x,u.y); X.scale(u.type==='large'?1:0.6,u.type==='large'?1:0.6); X.globalAlpha=alpha; X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(-15,0); X.lineTo(-12,-4); X.lineTo(12,-4); X.lineTo(15,0); X.lineTo(12,4); X.lineTo(-12,4); X.closePath(); X.stroke(); X.beginPath(); X.arc(0,-4,6,Math.PI,0); X.stroke(); X.restore(); }
function drawBullet(b){X.beginPath(); X.fillStyle='#fff'; X.arc(b.x,b.y,2,0,Math.PI*2); X.fill(); }
function drawDebris(d){const a=1-d.t/d.life; X.save(); X.globalAlpha=a; X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(d.x,d.y); X.lineTo(d.x+Math.cos(d.ang)*d.len,d.y+Math.sin(d.ang)*d.len); X.stroke(); X.restore(); }
function drawObjects(){if(state!=='TITLE'){asteroids.forEach(a=>renderWrapped(a.x,a.y,a.r,drawAsteroid.bind(null,a,1))); if(ufo&&ufo.alive) renderWrapped(ufo.x,ufo.y,ufo.type==='large'?15:9,drawUFO.bind(null,ufo,1)); debris.forEach(drawDebris); playerBullets.forEach(drawBullet); ufoBullets.forEach(drawBullet); if(ship&&ship.alive&&!ship.hidden){renderShip(ship.x,ship.y,ship.angle,!ship.inv); if(keys['ArrowUp']||keys['KeyW']) drawFlame();}} else {titleAsteroids.forEach(a=>renderWrapped(a.x,a.y,a.r,drawAsteroid.bind(null,a,1))); drawTitleShip();} }
function drawFlame(){X.save(); X.translate(ship.x,ship.y); X.rotate(ship.angle); X.strokeStyle=(Math.floor(performance.now()/50)%2?'#FF8C00':'#FFD700'); X.lineWidth=1.5; X.beginPath(); X.moveTo(-6,14); X.lineTo(0,22+Math.random()*6); X.lineTo(6,14); X.stroke(); X.restore(); }
function drawTitleShip(){X.save(); X.translate(400,300); X.rotate(ship.angle); X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(0,-18); X.lineTo(-12,12); X.lineTo(12,12); X.closePath(); X.stroke(); X.restore(); }
function drawTitle(){const j=(Math.floor(titleJitter*2)%2)?1:0; X.textAlign='center'; X.font='48px monospace'; X.fillStyle='#fff'; const letters='ASTEROIDS'; const start=400-letters.length*14; for(let i=0;i<letters.length;i++) X.fillText(letters[i],start+i*28+rand(-1,1)*j,180+rand(-1,1)*j); X.font='18px monospace'; X.fillStyle='#888'; const items=[['Large asteroid shape .......... 20',220],['Medium asteroid shape ......... 50',252],['Small asteroid shape .......... 100',284],['Large UFO shape .............. 200',316],['Small UFO shape ............. 1000',348]]; X.textAlign='left'; for(const [txt,y] of items) X.fillText(txt,200,y); X.fillStyle='#fff'; X.strokeStyle='#fff'; X.lineWidth=1.5; drawScaledObj('large',150,216,0.45); drawScaledObj('medium',150,248,0.3); drawScaledObj('small',150,280,0.25); drawUFO({x:150,y:312,type:'large'},1); drawUFO({x:150,y:344,type:'small'},1); X.globalAlpha=0.5+0.5*Math.sin(titleBlink*Math.PI); X.fillStyle='#888'; X.textAlign='center'; X.fillText('Press Enter to Start',400,500); X.globalAlpha=1; X.fillStyle='#555'; X.fillText('Best: '+best,400,540); }
function drawScaledObj(size,x,y,scale){const a=makeAsteroid(size,0,0,0,0); X.save(); X.translate(x,y); X.scale(scale,scale); X.strokeStyle='#fff'; X.lineWidth=1.5; X.beginPath(); X.moveTo(a.verts[0][0],a.verts[0][1]); for(let i=1;i<a.verts.length;i++) X.lineTo(a.verts[i][0],a.verts[i][1]); X.closePath(); X.stroke(); X.restore(); }
function drawPaused(){X.fillStyle='rgba(0,0,0,0.6)'; X.fillRect(0,0,W,H); X.fillStyle='#fff'; X.textAlign='center'; X.font='36px monospace'; X.fillText('PAUSED',400,300); X.font='14px monospace'; X.fillStyle='#888'; X.fillText('P to resume',400,330);}
function drawGameOver(){X.fillStyle='rgba(0,0,0,0.6)'; X.fillRect(0,0,W,H); X.fillStyle='#fff'; X.textAlign='center'; X.font='40px monospace'; X.fillText('GAME OVER',400,250); X.font='24px monospace'; X.fillText('Score: '+score,400,300); if(score>=best){X.globalAlpha=0.5+0.5*Math.sin(gameOverBlink*Math.PI); X.fillText('HIGH SCORE!',400,335); X.globalAlpha=1;} X.font='16px monospace'; X.fillStyle='#888'; X.fillText('Wave reached: '+wave,400,365); if(Math.floor(performance.now()/250)%2===0){X.fillStyle='#666'; X.fillText('Enter to play again',400,420);} }
addEventListener('keydown',e=>{keys[e.code]=true; acq(); if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space','ShiftLeft','ShiftRight','Enter','KeyP','Escape'].includes(e.code)) e.preventDefault(); if(e.code==='Enter'){if(state==='TITLE'){startGame();} else if(state==='GAME_OVER'){titleSetup();}} if(e.code==='KeyP'||e.code==='Escape'){paused=!paused; if(state!=='TITLE'&&state!=='GAME_OVER') state=paused?'PAUSED':'PLAYING';} if(state==='PLAYING'&&!paused){if(e.code==='Space'&&!prevKeys['Space']) firePlayer(); if((e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='ArrowDown'||e.code==='KeyS')&&!prevKeys[e.code]) hyperspace(); }});
addEventListener('keyup',e=>{keys[e.code]=false; if(e.code==='ArrowUp'||e.code==='KeyW') SFX.thrustOff();});
function gameTick(now){let dt=Math.min(0.05,(now-last)/1000); last=now; if(!paused){if(state==='PLAYING') update(dt); else if(state==='TITLE') update(dt); else if(state==='RESPAWN_WAIT') update(dt); else if(state==='GAME_OVER') update(dt); if(state==='TITLE') titleBlink+=dt; if(state==='GAME_OVER') gameOverBlink+=dt;} render(); prevKeys={...keys}; requestAnimationFrame(gameTick);} 
function update(dt){if(state==='TITLE'){titleJitter+=dt; titleAsteroids.forEach(a=>{a.x+=a.vx*dt;a.y+=a.vy*dt;a.angle+=a.spin*dt; wrap(a);}); ship.angle+=0.6*dt; return;} if(state==='GAME_OVER'){updateAsteroids(dt); updateUFO(dt); updateDebris(dt); maybeSpawnUFO(dt); return;} if(state==='RESPAWN_WAIT'){updateAsteroids(dt); updateUFO(dt); updateDebris(dt); maybeSpawnUFO(dt); respawnWait+=dt; const clear=asteroids.every(a=>dist(a,{x:400,y:300})>120); if(clear || respawnWait>5){ship=makeShip(); ship.inv=respawnWait>5?5:3; ship.actionSeen=false; state='PLAYING'; respawnWait=0;} return;} if(state==='PLAYING'){updateShip(dt); updateAsteroids(dt); updateUFO(dt); playerBullets=updateBullets(playerBullets,dt); ufoBullets=updateBullets(ufoBullets,dt); updateDebris(dt); maybeSpawnUFO(dt); processCollisions(); if(asteroids.length===0 && spawnTimer<=0) spawnTimer=2; if(spawnTimer>0){spawnTimer-=dt; if(spawnTimer<=0) {wave++; spawnWave();}} if(score>=nextExtra){while(score>=nextExtra){lives++; nextExtra+=10000; SFX.extra();}} if(!ship.hidden && ship.inv>0 && ship.actionSeen && ship.inv>0.5) ship.inv=Math.min(ship.inv,0.5); if(ship && ship.inv>0 && (keys['ArrowUp']||keys['KeyW']||keys['Space'])) ship.actionSeen=true; if(!ship.hidden && ship.hypoCd<0) ship.hypoCd=0; if(ufoTimer<0) ufoTimer=0; if((keys['ArrowUp']||keys['KeyW'])&&ship && ship.inv>0) ship.inv=Math.min(ship.inv,0.5); if(ship && ship.hidden===false && ship.inv>0 && (keys['ArrowUp']||keys['KeyW']||keys['Space'])) ship.inv=Math.min(ship.inv,0.5); if(lives<=0){state='GAME_OVER'; if(score>best){best=score; localStorage.setItem('asteroids_best',best);}} }}
function processCollisions(){for(let i=0;i<playerBullets.length;i++){const b=playerBullets[i]; for(const a of asteroids){if(a.alive&&dist(b,a)<b.r+a.r){b.alive=false;a.alive=false; score+=asteroidPoints(a.size); splitAsteroid(a); break;}} if(b.alive&&ufo&&ufo.alive&&dist(b,ufo)<b.r+(ufo.type==='large'?15:9)){b.alive=false; score+=ufo.type==='large'?200:1000; destroyUFO();} }
 for(let i=0;i<ufoBullets.length;i++){const b=ufoBullets[i]; for(const a of asteroids){if(a.alive&&dist(b,a)<b.r+a.r){b.alive=false;a.alive=false; score+=asteroidPoints(a.size); splitAsteroid(a); break;}} if(ship&&ship.alive&&!ship.hidden&&ship.inv<=0&&dist(b,ship)<b.r+radii.ship){b.alive=false; killShip();} }
 if(ship&&ship.alive&&!ship.hidden&&ship.inv<=0){for(const a of asteroids){if(a.alive&&dist(ship,a)<radii.ship+a.r){killShip(); break;}} if(ufo&&ufo.alive&&dist(ship,ufo)<radii.ship+(ufo.type==='large'?15:9)){destroyUFO(); killShip();}} for(const a of asteroids){if(!a.alive) continue; if(ufo&&ufo.alive&&dist(a,ufo)<a.r+(ufo.type==='large'?15:9)){destroyUFO(); break;}} asteroids=asteroids.filter(a=>a.alive); playerBullets=playerBullets.filter(b=>b.alive!==false&&b.life>0); ufoBullets=ufoBullets.filter(b=>b.alive!==false&&b.life>0); }
function splitAsteroid(a){if(a.size==='large'){for(let i=0;i<2;i++){const ang=Math.atan2(a.vy,a.vx)+rand(-Math.PI/3,Math.PI/3)+(i?Math.PI/2:0); const sp=rand(50,120)*speedScale(); asteroids.push(makeAsteroid('medium',a.x,a.y,Math.cos(ang)*sp,Math.sin(ang)*sp));}} else if(a.size==='medium'){for(let i=0;i<2;i++){const ang=Math.atan2(a.vy,a.vx)+rand(-Math.PI/2,Math.PI/2)+(i?Math.PI/3:-Math.PI/3); const sp=rand(80,160)*speedScale(); asteroids.push(makeAsteroid('small',a.x,a.y,Math.cos(ang)*sp,Math.sin(ang)*sp));}} }
function killShip(){if(state==='GAME_OVER'||!ship||ship.dead)return; ship.dead=true; spawnDebris('ship',ship.x,ship.y); deathTimer=1.5; lives--; if(lives<=0){state='GAME_OVER';} else {state='RESPAWN_WAIT'; respawnWait=0;} }
function maybeSpawnUFO(dt){if(ufo&&ufo.alive) return; if(state!=='PLAYING'&&state!=='RESPAWN_WAIT'&&state!=='GAME_OVER') return; if(spawnTimer>0) return; if(ufoTimer>0){ufoTimer-=dt;} if(ufoTimer<=0 && (!ufo||!ufo.alive) && state==='PLAYING'){ufoTimer=rand(15,20); const type=score<10000?'large':'small'; const fromLeft=Math.random()<0.5; ufo={alive:true,type,x:fromLeft?-20:W+20,y:rand(40,560),vx:(fromLeft?1:-1)*(type==='large'?120:150),vy:0,shot:rand(type==='large'?1.5:1.0,type==='large'?2.5:1.5),jolt:rand(1,2),alive:true}; if(type==='large') SFX.ufo(); else SFX.ufoHi(); }}
function spawnDebris(kind,x,y){const n=kind==='ship'?4:kind==='ufo'?10:8; for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(kind==='ship'?30:40,kind==='ship'?80:120),len=rand(kind==='ship'?12:4,kind==='ship'?15:kind==='ufo'?12:8); debris.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,ang:a,len,t:0,life:kind==='ship'?1.5:0.8,kind});}}
function updateDebris(dt){debris=debris.filter(d=>{d.t+=dt; d.x+=d.vx*dt; d.y+=d.vy*dt; return d.t<d.life;});}
function screenWrapRender(obj,r,fn){fn(obj.x,obj.y); if(obj.x-r<0) fn(obj.x+W,obj.y); if(obj.x+r>W) fn(obj.x-W,obj.y); if(obj.y-r<0) fn(obj.x,obj.y+H); if(obj.y+r>H) fn(obj.x,obj.y-H); if(obj.x-r<0&&obj.y-r<0) fn(obj.x+W,obj.y+H); if(obj.x-r<0&&obj.y+r>H) fn(obj.x+W,obj.y-H); if(obj.x+r>W&&obj.y-r<0) fn(obj.x-W,obj.y+H); if(obj.x+r>W&&obj.y+r>H) fn(obj.x-W,obj.y-H); }
function drawAll(){X.fillStyle='#000'; X.fillRect(0,0,W,H); for(const d of debris){drawDeb(d);} if(state==='TITLE'){titleAsteroids.forEach(a=>screenWrapRender(a,a.r,()=>drawAsteroid(a,1))); renderShip(400,300,titleShipAngle,true,1); titleShipAngle+=0.6*(1/60); } else {asteroids.forEach(a=>screenWrapRender(a,a.r,()=>drawAsteroid(a,1))); if(ufo&&ufo.alive) screenWrapRender(ufo,ufo.type==='large'?15:9,()=>drawUFO(ufo,1)); playerBullets.forEach(drawBullet); ufoBullets.forEach(drawBullet); if(ship&&ship.alive&&!ship.hidden){if(ship.inv>0&&Math.floor(performance.now()/83)%2===0){} else renderShip(ship.x,ship.y,ship.angle,true,1); if(keys['ArrowUp']||keys['KeyW']) drawFlame();}} }
requestAnimationFrame(gameTick);
titleSetup();
})();
</script>
