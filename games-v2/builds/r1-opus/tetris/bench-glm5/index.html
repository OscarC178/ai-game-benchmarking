<!--
  GAME:      Tetris
  RUN:       r1-opus
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game" width="480" height="640"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 480;
    const H = 640;
    
    // Playfield
    const COLS = 10;
    const ROWS = 22; // 20 visible + 2 hidden
    const VISIBLE_ROWS = 20;
    const CELL = 28;
    const FIELD_X = 24;
    const FIELD_Y = 44;
    
    // Colors
    const COLORS = {
      I: '#00F0F0',
      O: '#F0F000',
      T: '#A000F0',
      S: '#00F000',
      Z: '#F00000',
      J: '#0000F0',
      L: '#F0A000'
    };
    
    // Piece shapes (rotation states as cell offsets from center)
    const PIECES = {
      I: [
        [{x:-2,y:0},{x:-1,y:0},{x:0,y:0},{x:1,y:0}],
        [{x:0,y:-2},{x:0,y:-1},{x:0,y:0},{x:0,y:1}],
        [{x:-2,y:0},{x:-1,y:0},{x:0,y:0},{x:1,y:0}],
        [{x:0,y:-2},{x:0,y:-1},{x:0,y:0},{x:0,y:1}]
      ],
      O: [
        [{x:-1,y:-1},{x:0,y:-1},{x:-1,y:0},{x:0,y:0}],
        [{x:-1,y:-1},{x:0,y:-1},{x:-1,y:0},{x:0,y:0}],
        [{x:-1,y:-1},{x:0,y:-1},{x:-1,y:0},{x:0,y:0}],
        [{x:-1,y:-1},{x:0,y:-1},{x:-1,y:0},{x:0,y:0}]
      ],
      T: [
        [{x:-1,y:0},{x:0,y:0},{x:1,y:0},{x:0,y:-1}],
        [{x:0,y:-1},{x:0,y:0},{x:0,y:1},{x:1,y:0}],
        [{x:-1,y:0},{x:0,y:0},{x:1,y:0},{x:0,y:1}],
        [{x:0,y:-1},{x:0,y:0},{x:0,y:1},{x:-1,y:0}]
      ],
      S: [
        [{x:0,y:-1},{x:1,y:-1},{x:-1,y:0},{x:0,y:0}],
        [{x:0,y:-1},{x:0,y:0},{x:1,y:0},{x:1,y:1}],
        [{x:0,y:0},{x:1,y:0},{x:-1,y:1},{x:0,y:1}],
        [{x:-1,y:-1},{x:-1,y:0},{x:0,y:0},{x:0,y:1}]
      ],
      Z: [
        [{x:-1,y:-1},{x:0,y:-1},{x:0,y:0},{x:1,y:0}],
        [{x:1,y:-1},{x:1,y:0},{x:0,y:0},{x:0,y:1}],
        [{x:-1,y:0},{x:0,y:0},{x:0,y:1},{x:1,y:1}],
        [{x:0,y:-1},{x:0,y:0},{x:-1,y:0},{x:-1,y:1}]
      ],
      J: [
        [{x:-1,y:-1},{x:-1,y:0},{x:0,y:0},{x:1,y:0}],
        [{x:1,y:-1},{x:0,y:-1},{x:0,y:0},{x:0,y:1}],
        [{x:-1,y:0},{x:0,y:0},{x:1,y:0},{x:1,y:1}],
        [{x:0,y:-1},{x:0,y:0},{x:0,y:1},{x:-1,y:1}]
      ],
      L: [
        [{x:1,y:-1},{x:-1,y:0},{x:0,y:0},{x:1,y:0}],
        [{x:0,y:-1},{x:0,y:0},{x:1,y:1},{x:0,y:1}],
        [{x:-1,y:0},{x:0,y:0},{x:1,y:0},{x:-1,y:1}],
        [{x:0,y:-1},{x:-1,y:-1},{x:0,y:0},{x:0,y:1}]
      ]
    };
    
    // Wall kick tables (SRS)
    const KICKS = {
      normal: {
        '0>1': [{x:0,y:0},{x:-1,y:0},{x:-1,y:1},{x:0,y:-2},{x:-1,y:-2}],
        '1>0': [{x:0,y:0},{x:1,y:0},{x:1,y:-1},{x:0,y:2},{x:1,y:2}],
        '1>2': [{x:0,y:0},{x:1,y:0},{x:1,y:-1},{x:0,y:2},{x:1,y:2}],
        '2>1': [{x:0,y:0},{x:-1,y:0},{x:-1,y:1},{x:0,y:-2},{x:-1,y:-2}],
        '2>3': [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:-2},{x:1,y:-2}],
        '3>2': [{x:0,y:0},{x:-1,y:0},{x:-1,y:-1},{x:0,y:2},{x:-1,y:2}],
        '3>0': [{x:0,y:0},{x:-1,y:0},{x:-1,y:-1},{x:0,y:2},{x:-1,y:2}],
        '0>3': [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:-2},{x:1,y:-2}]
      },
      I: {
        '0>1': [{x:0,y:0},{x:-2,y:0},{x:1,y:0},{x:-2,y:1},{x:1,y:-2}],
        '1>0': [{x:0,y:0},{x:2,y:0},{x:-1,y:0},{x:2,y:-1},{x:-1,y:2}],
        '1>2': [{x:0,y:0},{x:-1,y:0},{x:2,y:0},{x:-1,y:-2},{x:2,y:1}],
        '2>1': [{x:0,y:0},{x:1,y:0},{x:-2,y:0},{x:1,y:2},{x:-2,y:-1}],
        '2>3': [{x:0,y:0},{x:2,y:0},{x:-1,y:0},{x:2,y:-1},{x:-1,y:2}],
        '3>2': [{x:0,y:0},{x:-2,y:0},{x:1,y:0},{x:-2,y:1},{x:1,y:-2}],
        '3>0': [{x:0,y:0},{x:1,y:0},{x:-2,y:0},{x:1,y:2},{x:-2,y:-1}],
        '0>3': [{x:0,y:0},{x:-1,y:0},{x:2,y:0},{x:-1,y:-2},{x:2,y:1}]
      }
    };
    
    // Gravity frames per cell (at 60fps)
    const GRAVITY = [48,43,38,33,28,23,18,13,8,6,5,5,5,4,4,4,3,3,3,2,2,2,2,2,2,2,2,2,2,1];
    
    // ==================== GAME STATE ====================
    let state = 'TITLE';
    let grid = [];
    let score = 0;
    let highScore = parseInt(localStorage.getItem('tetris_best') || '0');
    let lines = 0;
    let level = 0;
    let startLevel = 0;
    
    // Active piece
    let piece = null;
    let pieceX = 0;
    let pieceY = 0;
    let pieceRot = 0;
    
    // Piece queue
    let queue = [];
    let held = null;
    let holdUsed = false;
    
    // Timers
    let gravityAccum = 0;
    let lockTimer = 0;
    let lockResets = 0;
    let lineClearTimer = 0;
    let clearingRows = [];
    
    // DAS
    let dasLeft = { timer: 0, phase: null, arrTimer: 0 };
    let dasRight = { timer: 0, phase: null, arrTimer: 0 };
    
    // Combo
    let combo = 0;
    let lastTetris = false;
    
    // Hard drop trail
    let dropTrail = null;
    
    // Input
    const keys = {};
    const keyWasDown = {};
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playSound(freq, duration, type = 'square', gain = 0.2, bend = null) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gainNode.gain.value = gain;
        
        if (bend) {
          osc.frequency.linearRampToValueAtTime(bend, audioCtx.currentTime + duration / 1000);
        }
        
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration / 1000);
      } catch (e) {}
    }
    
    function playMove() { playSound(200, 20, 'square', 0.08); }
    function playRotate() { playSound(400, 30, 'square', 0.12); }
    function playSoftDrop() { playSound(100, 15, 'triangle', 0.06); }
    function playHardDrop() { playSound(150, 80, 'square', 0.25, 80); }
    function playLock() { playSound(250, 40, 'square', 0.15); }
    function playClear(lines) {
      const freqs = [500, 600, 700, 523];
      if (lines === 4) {
        const notes = [523, 659, 784, 1047];
        notes.forEach((n, i) => setTimeout(() => playSound(n, 50, 'square', 0.28), i * 50));
      } else {
        playSound(freqs[lines - 1], 100 + lines * 20, 'square', 0.2 + lines * 0.02);
      }
    }
    function playLevelUp() { playSound(400, 250, 'sawtooth', 0.2, 800); }
    function playHold() { playSound(300, 40, 'square', 0.1); setTimeout(() => playSound(500, 40, 'square', 0.1), 40); }
    function playGameOver() { playSound(300, 800, 'square', 0.3, 60); }
    function playHighScore() {
      const notes = [523, 659, 784, 1047];
      notes.forEach((n, i) => setTimeout(() => playSound(n, 80, 'sine', 0.22), i * 80));
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      initAudio();
      
      if (state === 'TITLE' && e.code === 'Enter') {
        startGame();
      } else if (state === 'TITLE' && e.code === 'ArrowLeft') {
        startLevel = Math.max(0, startLevel - 1);
      } else if (state === 'TITLE' && e.code === 'ArrowRight') {
        startLevel = Math.min(19, startLevel + 1);
      } else if (state === 'GAME_OVER' && e.code === 'Enter') {
        state = 'TITLE';
      } else if (state === 'PLAYING' && (e.code === 'KeyP' || e.code === 'Escape')) {
        state = 'PAUSED';
      } else if (state === 'PAUSED' && (e.code === 'KeyP' || e.code === 'Escape')) {
        state = 'PLAYING';
      }
      
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // ==================== GAME LOGIC ====================
    function startGame() {
      grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
      score = 0;
      lines = 0;
      level = startLevel;
      queue = [];
      fillQueue();
      held = null;
      holdUsed = false;
      combo = 0;
      lastTetris = false;
      dropTrail = null;
      
      spawnPiece();
      state = 'PLAYING';
    }
    
    function fillQueue() {
      while (queue.length < 7) {
        const bag = Object.keys(PIECES);
        // Fisher-Yates shuffle
        for (let i = bag.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bag[i], bag[j]] = [bag[j], bag[i]];
        }
        queue.push(...bag);
      }
    }
    
    function spawnPiece() {
      fillQueue();
      const type = queue.shift();
      piece = type;
      pieceRot = 0;
      
      // Center horizontally
      const bounds = getBounds(type, 0);
      pieceX = Math.floor((COLS - bounds.maxX - bounds.minX - 1) / 2) - bounds.minX;
      pieceY = 0;
      
      // Check spawn collision
      if (!isValid(type, pieceRot, pieceX, pieceY)) {
        state = 'GAME_OVER';
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('tetris_best', highScore.toString());
          playHighScore();
        } else {
          playGameOver();
        }
        return;
      }
      
      holdUsed = false;
      gravityAccum = 0;
      lockTimer = 0;
      lockResets = 0;
    }
    
    function getBounds(type, rot) {
      const cells = PIECES[type][rot];
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const c of cells) {
        minX = Math.min(minX, c.x);
        maxX = Math.max(maxX, c.x);
        minY = Math.min(minY, c.y);
        maxY = Math.max(maxY, c.y);
      }
      return { minX, maxX, minY, maxY };
    }
    
    function getCells(type, rot, px, py) {
      return PIECES[type][rot].map(c => ({
        x: px + c.x,
        y: py + c.y
      }));
    }
    
    function isValid(type, rot, px, py) {
      const cells = getCells(type, rot, px, py);
      for (const c of cells) {
        if (c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS) return false;
        if (grid[c.y][c.x]) return false;
      }
      return true;
    }
    
    function getGhostY() {
      let ghostY = pieceY;
      while (isValid(piece, pieceRot, pieceX, ghostY + 1)) {
        ghostY++;
      }
      return ghostY;
    }
    
    function movePiece(dx, dy) {
      if (isValid(piece, pieceRot, pieceX + dx, pieceY + dy)) {
        pieceX += dx;
        pieceY += dy;
        return true;
      }
      return false;
    }
    
    function rotatePiece(dir) {
      const newRot = (pieceRot + dir + 4) % 4;
      const kickTable = piece === 'I' ? KICKS.I : KICKS.normal;
      const key = `${pieceRot}>${newRot}`;
      const kicks = kickTable[key] || [{x:0,y:0}];
      
      for (const kick of kicks) {
        const testX = pieceX + (dir > 0 ? kick.x : -kick.x);
        const testY = pieceY - kick.y;
        if (isValid(piece, newRot, testX, testY)) {
          pieceX = testX;
          pieceY = testY;
          pieceRot = newRot;
          return true;
        }
      }
      return false;
    }
    
    function lockPiece() {
      const cells = getCells(piece, pieceRot, pieceX, pieceY);
      for (const c of cells) {
        if (c.y >= 0 && c.y < ROWS && c.x >= 0 && c.x < COLS) {
          grid[c.y][c.x] = COLORS[piece];
        }
      }
      playLock();
      
      // Check line clears
      clearingRows = [];
      for (let y = 0; y < ROWS; y++) {
        if (grid[y].every(c => c !== null)) {
          clearingRows.push(y);
        }
      }
      
      if (clearingRows.length > 0) {
        state = 'LINE_CLEAR';
        lineClearTimer = 300;
        playClear(clearingRows.length);
      } else {
        combo = 0;
        spawnPiece();
      }
    }
    
    function processLineClear() {
      // Calculate score
      const cleared = clearingRows.length;
      const basePoints = [0, 100, 300, 500, 800][cleared];
      let points = basePoints * (level + 1);
      
      // Back-to-back Tetris
      if (cleared === 4 && lastTetris) {
        points = Math.floor(points * 1.5);
      }
      lastTetris = cleared === 4;
      
      // Combo
      if (cleared > 0) {
        combo++;
        points += 50 * combo * (level + 1);
      } else {
        combo = 0;
      }
      
      score += points;
      
      // Update lines and level
      lines += cleared;
      const newLevel = startLevel + Math.floor(lines / 10);
      if (newLevel > level) {
        level = newLevel;
        playLevelUp();
      }
      
      // Remove rows
      for (const y of clearingRows.sort((a, b) => b - a)) {
        grid.splice(y, 1);
        grid.unshift(Array(COLS).fill(null));
      }
      
      clearingRows = [];
      spawnPiece();
    }
    
    function holdPiece() {
      if (holdUsed) return;
      
      playHold();
      const current = piece;
      
      if (held) {
        piece = held;
        pieceRot = 0;
        const bounds = getBounds(piece, 0);
        pieceX = Math.floor((COLS - bounds.maxX - bounds.minX - 1) / 2) - bounds.minX;
        pieceY = 0;
      } else {
        spawnPiece();
      }
      
      held = current;
      holdUsed = true;
    }
    
    function hardDrop() {
      const startY = pieceY;
      const ghostY = getGhostY();
      const drop = ghostY - pieceY;
      
      pieceY = ghostY;
      score += drop * 2;
      
      dropTrail = { y1: startY, y2: ghostY, x: pieceX, color: COLORS[piece], timer: 100 };
      playHardDrop();
      lockPiece();
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      if (state !== 'PLAYING') return;
      
      // DAS Left
      if (keys['ArrowLeft'] || keys['KeyA']) {
        if (!keyWasDown['ArrowLeft'] && !keyWasDown['KeyA']) {
          if (movePiece(-1, 0)) playMove();
          dasLeft = { timer: 0, phase: 'delay', arrTimer: 0 };
        } else {
          dasLeft.timer += dt;
          if (dasLeft.phase === 'delay' && dasLeft.timer >= 170) {
            dasLeft.phase = 'repeat';
            dasLeft.arrTimer = 0;
          }
          if (dasLeft.phase === 'repeat') {
            dasLeft.arrTimer += dt;
            while (dasLeft.arrTimer >= 50) {
              if (movePiece(-1, 0)) playMove();
              dasLeft.arrTimer -= 50;
            }
          }
        }
      } else {
        dasLeft = { timer: 0, phase: null, arrTimer: 0 };
      }
      
      // DAS Right
      if (keys['ArrowRight'] || keys['KeyD']) {
        if (!keyWasDown['ArrowRight'] && !keyWasDown['KeyD']) {
          if (movePiece(1, 0)) playMove();
          dasRight = { timer: 0, phase: 'delay', arrTimer: 0 };
        } else {
          dasRight.timer += dt;
          if (dasRight.phase === 'delay' && dasRight.timer >= 170) {
            dasRight.phase = 'repeat';
            dasRight.arrTimer = 0;
          }
          if (dasRight.phase === 'repeat') {
            dasRight.arrTimer += dt;
            while (dasRight.arrTimer >= 50) {
              if (movePiece(1, 0)) playMove();
              dasRight.arrTimer -= 50;
            }
          }
        }
      } else {
        dasRight = { timer: 0, phase: null, arrTimer: 0 };
      }
      
      // Soft drop
      if (keys['ArrowDown'] || keys['KeyS']) {
        const softInterval = Math.min(50, getGravityInterval() / 20);
        gravityAccum += dt;
        while (gravityAccum >= softInterval) {
          if (movePiece(0, 1)) {
            score += 1;
            playSoftDrop();
          }
          gravityAccum -= softInterval;
        }
      }
      
      // Rotate CW
      if ((keys['ArrowUp'] || keys['KeyW']) && !keyWasDown['ArrowUp'] && !keyWasDown['KeyW']) {
        if (rotatePiece(1)) {
          playRotate();
          if (lockTimer > 0 && lockResets < 15) {
            lockTimer = 0;
            lockResets++;
          }
        }
      }
      
      // Rotate CCW
      if ((keys['KeyZ'] || keys['ControlLeft'] || keys['ControlRight']) && 
          !keyWasDown['KeyZ'] && !keyWasDown['ControlLeft'] && !keyWasDown['ControlRight']) {
        if (rotatePiece(-1)) {
          playRotate();
          if (lockTimer > 0 && lockResets < 15) {
            lockTimer = 0;
            lockResets++;
          }
        }
      }
      
      // Hard drop
      if (keys['Space'] && !keyWasDown['Space']) {
        hardDrop();
      }
      
      // Hold
      if ((keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyC']) &&
          !keyWasDown['ShiftLeft'] && !keyWasDown['ShiftRight'] && !keyWasDown['KeyC']) {
        holdPiece();
      }
      
      // Gravity
      const interval = getGravityInterval();
      gravityAccum += dt;
      let gravityTicks = 0;
      while (gravityAccum >= interval && gravityTicks < 3) {
        if (isValid(piece, pieceRot, pieceX, pieceY + 1)) {
          pieceY++;
          lockTimer = 0;
        } else {
          lockTimer += interval;
        }
        gravityAccum -= interval;
        gravityTicks++;
      }
      
      // Lock delay
      if (lockTimer > 0) {
        lockTimer += dt;
        if (lockTimer >= 500) {
          lockPiece();
        }
      }
      
      // Drop trail
      if (dropTrail) {
        dropTrail.timer -= dt;
        if (dropTrail.timer <= 0) dropTrail = null;
      }
      
      // Update key states
      keyWasDown['ArrowLeft'] = keys['ArrowLeft'];
      keyWasDown['ArrowRight'] = keys['ArrowRight'];
      keyWasDown['KeyA'] = keys['KeyA'];
      keyWasDown['KeyD'] = keys['KeyD'];
      keyWasDown['ArrowUp'] = keys['ArrowUp'];
      keyWasDown['KeyW'] = keys['KeyW'];
      keyWasDown['KeyZ'] = keys['KeyZ'];
      keyWasDown['ControlLeft'] = keys['ControlLeft'];
      keyWasDown['ControlRight'] = keys['ControlRight'];
      keyWasDown['Space'] = keys['Space'];
      keyWasDown['ShiftLeft'] = keys['ShiftLeft'];
      keyWasDown['ShiftRight'] = keys['ShiftRight'];
      keyWasDown['KeyC'] = keys['KeyC'];
      keyWasDown['ArrowDown'] = keys['ArrowDown'];
      keyWasDown['KeyS'] = keys['KeyS'];
    }
    
    function getGravityInterval() {
      const idx = Math.min(level, GRAVITY.length - 1);
      return (GRAVITY[idx] / 60) * 1000;
    }
    
    function updateLineClear(dt) {
      lineClearTimer -= dt;
      if (lineClearTimer <= 0) {
        processLineClear();
        state = 'PLAYING';
      }
    }
    
    // ==================== RENDERING ====================
    function drawBlock(x, y, color, alpha = 1) {
      ctx.globalAlpha = alpha;
      
      const bx = FIELD_X + x * CELL;
      const by = FIELD_Y + (ROWS - 1 - y) * CELL;
      
      // Base
      ctx.fillStyle = color;
      ctx.fillRect(bx + 1, by + 1, CELL - 2, CELL - 2);
      
      // Highlight (top-left)
      ctx.fillStyle = lightenColor(color, 0.4);
      ctx.fillRect(bx + 1, by + 1, CELL - 2, 2);
      ctx.fillRect(bx + 1, by + 1, 2, CELL - 2);
      
      // Shadow (bottom-right)
      ctx.fillStyle = darkenColor(color, 0.3);
      ctx.fillRect(bx + 1, by + CELL - 3, CELL - 2, 2);
      ctx.fillRect(bx + CELL - 3, by + 1, 2, CELL - 2);
      
      ctx.globalAlpha = 1;
    }
    
    function lightenColor(hex, percent) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.min(255, (num >> 16) + (255 - (num >> 16)) * percent);
      const g = Math.min(255, ((num >> 8) & 0xFF) + (255 - ((num >> 8) & 0xFF)) * percent);
      const b = Math.min(255, (num & 0xFF) + (255 - (num & 0xFF)) * percent);
      return `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
    }
    
    function darkenColor(hex, percent) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.floor((num >> 16) * (1 - percent));
      const g = Math.floor(((num >> 8) & 0xFF) * (1 - percent));
      const b = Math.floor((num & 0xFF) * (1 - percent));
      return `rgb(${r},${g},${b})`;
    }
    
    function drawPlayfield() {
      // Background
      ctx.fillStyle = '#111111';
      ctx.fillRect(FIELD_X, FIELD_Y, COLS * CELL, VISIBLE_ROWS * CELL);
      
      // Grid lines
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(FIELD_X + x * CELL + 0.5, FIELD_Y);
        ctx.lineTo(FIELD_X + x * CELL + 0.5, FIELD_Y + VISIBLE_ROWS * CELL);
        ctx.stroke();
      }
      for (let y = 0; y <= VISIBLE_ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(FIELD_X, FIELD_Y + y * CELL + 0.5);
        ctx.lineTo(FIELD_X + COLS * CELL, FIELD_Y + y * CELL + 0.5);
        ctx.stroke();
      }
      
      // Border
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 2;
      ctx.strokeRect(FIELD_X - 1, FIELD_Y - 1, COLS * CELL + 2, VISIBLE_ROWS * CELL + 2);
      
      // Locked blocks
      for (let y = 2; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (grid[y][x]) {
            // Flash during line clear
            if (state === 'LINE_CLEAR' && clearingRows.includes(y)) {
              drawBlock(x, y, '#FFFFFF');
            } else {
              drawBlock(x, y, grid[y][x]);
            }
          }
        }
      }
    }
    
    function drawPiece() {
      if (!piece || state !== 'PLAYING') return;
      
      const color = COLORS[piece];
      const cells = getCells(piece, pieceRot, pieceX, pieceY);
      
      for (const c of cells) {
        if (c.y >= 2) {
          drawBlock(c.x, c.y, color);
        }
      }
    }
    
    function drawGhost() {
      if (!piece || state !== 'PLAYING') return;
      
      const ghostY = getGhostY();
      if (ghostY === pieceY) return;
      
      const color = COLORS[piece];
      const cells = getCells(piece, pieceRot, pieceX, ghostY);
      
      for (const c of cells) {
        if (c.y >= 2) {
          drawBlock(c.x, c.y, color, 0.25);
        }
      }
    }
    
    function drawDropTrail() {
      if (!dropTrail) return;
      
      ctx.globalAlpha = dropTrail.timer / 100 * 0.15;
      ctx.fillStyle = dropTrail.color;
      ctx.fillRect(FIELD_X + dropTrail.x * CELL, FIELD_Y + (ROWS - 1 - dropTrail.y1) * CELL, CELL, (dropTrail.y1 - dropTrail.y2) * CELL);
      ctx.globalAlpha = 1;
    }
    
    function drawMiniPiece(type, x, y, scale = 0.7) {
      const cells = PIECES[type][0];
      const color = COLORS[type];
      const size = Math.floor(CELL * scale);
      
      ctx.fillStyle = color;
      for (const c of cells) {
        ctx.fillRect(
          x + (c.x + 1) * size,
          y + (c.y + 1) * size,
          size - 2,
          size - 2
        );
      }
    }
    
    function drawHold() {
      ctx.fillStyle = '#888888';
      ctx.font = '13px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('HOLD', 320, 40);
      
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 1;
      ctx.strokeRect(320, 44, 100, 66);
      
      if (held) {
        ctx.globalAlpha = holdUsed ? 0.3 : 1;
        drawMiniPiece(held, 330, 50, 0.7);
        ctx.globalAlpha = 1;
      }
    }
    
    function drawNext() {
      ctx.fillStyle = '#888888';
      ctx.font = '13px monospace';
      ctx.fillText('NEXT', 320, 130);
      
      ctx.strokeStyle = '#333333';
      for (let i = 0; i < 3; i++) {
        ctx.strokeRect(320, 134 + i * 60, 100, 56);
        if (queue[i]) {
          drawMiniPiece(queue[i], 330, 140 + i * 60, 0.65);
        }
      }
    }
    
    function drawStats() {
      const labels = ['SCORE', 'BEST', 'LINES', 'LEVEL'];
      const values = [score, highScore, lines, level];
      const colors = ['#888888', '#FFFFFF', '#888888', '#555555', '#888888', '#FFFFFF', '#888888', '#FFFFFF'];
      
      let y = 330;
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = colors[i * 2];
        ctx.font = '12px monospace';
        ctx.fillText(labels[i], 320, y);
        
        ctx.fillStyle = colors[i * 2 + 1];
        ctx.font = '18px monospace';
        ctx.fillText(values[i].toString(), 320, y + 18);
        
        y += 50;
      }
    }
    
    function drawTitle() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);
      
      // Title
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TETRIS', W / 2, 140);
      
      // Piece showcase
      const types = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];
      const startX = W / 2 - 100;
      for (let i = 0; i < 7; i++) {
        ctx.fillStyle = COLORS[types[i]];
        const x = startX + (i % 4) * 55;
        const y = 180 + Math.floor(i / 4) * 60;
        drawMiniPiece(types[i], x - 10, y, 0.6);
      }
      
      // Level select
      ctx.fillStyle = '#888888';
      ctx.font = '16px monospace';
      ctx.fillText('← Level ' + startLevel + ' →', W / 2, 320);
      
      // Start prompt
      const blink = Math.floor(Date.now() / 500) % 2 === 0;
      if (blink) {
        ctx.fillStyle = '#AAAAAA';
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Start', W / 2, 400);
      }
      
      // Best
      ctx.fillStyle = '#555555';
      ctx.font = '16px monospace';
      ctx.fillText('Best: ' + highScore, W / 2, 450);
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, 300);
      
      ctx.fillStyle = '#888888';
      ctx.font = '14px monospace';
      ctx.fillText('P to resume', W / 2, 340);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF0000';
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, 250);
      
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '22px monospace';
      ctx.fillText('Score: ' + score, W / 2, 300);
      
      if (score >= highScore && score > 0) {
        const pulse = 0.5 + 0.25 * Math.sin(Date.now() / 500 * Math.PI);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#FFD740';
        ctx.font = '18px monospace';
        ctx.fillText('NEW BEST!', W / 2, 340);
        ctx.globalAlpha = 1;
      }
      
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '16px monospace';
      ctx.fillText('Lines: ' + lines + '  Level: ' + level, W / 2, 380);
      
      const blink = Math.floor(Date.now() / 500) % 2 === 0;
      if (blink) {
        ctx.fillStyle = '#666666';
        ctx.fillText('Enter to restart', W / 2, 440);
      }
    }
    
    // ==================== MAIN LOOP ====================
    function render() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
      
      if (state === 'TITLE') {
        drawTitle();
      } else if (state === 'PLAYING' || state === 'LINE_CLEAR') {
        drawPlayfield();
        drawDropTrail();
        drawGhost();
        drawPiece();
        drawHold();
        drawNext();
        drawStats();
      } else if (state === 'PAUSED') {
        drawPlayfield();
        drawGhost();
        drawPiece();
        drawHold();
        drawNext();
        drawStats();
        drawPaused();
      } else if (state === 'GAME_OVER') {
        drawPlayfield();
        drawHold();
        drawNext();
        drawStats();
        drawGameOver();
      }
    }
    
    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = Math.min(timestamp - lastTime, 50);
      lastTime = timestamp;
      
      if (state === 'PLAYING') {
        update(dt);
      } else if (state === 'LINE_CLEAR') {
        updateLineClear(dt);
      }
      
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INIT ====================
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
