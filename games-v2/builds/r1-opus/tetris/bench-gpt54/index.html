<!--
  GAME:      Tetris
  RUN:       r1-opus
  BUILDER:   openai/gpt-5.4

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: min(100vw, 480px);
      height: auto;
      max-height: 100vh;
      background: #0a0a0a;
      box-shadow: 0 0 24px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
<canvas id="game" width="480" height="640" aria-label="Tetris game canvas"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = 480;
  const H = 640;
  const CELL = 28;
  const FIELD_X = 24;
  const FIELD_Y = 44;
  const COLS = 10;
  const ROWS = 22; // row 0 = top hidden row, row 21 = bottom visible row
  const VISIBLE_START = 2;
  const VISIBLE_ROWS = 20;
  const FIELD_W = COLS * CELL;
  const FIELD_H = VISIBLE_ROWS * CELL;
  const DAS_DELAY = 0.17;
  const ARR = 0.05;
  const LOCK_DELAY = 0.5;
  const LOCK_RESET_LIMIT = 15;
  const LINE_FLASH = 0.15;
  const LINE_COLLAPSE = 0.15;
  const DT_CAP = 0.05;

  const STATES = {
    TITLE: 'TITLE',
    PLAYING: 'PLAYING',
    PAUSED: 'PAUSED',
    LINE_CLEAR: 'LINE_CLEAR',
    GAME_OVER: 'GAME_OVER'
  };

  const COLORS = {
    I: '#00F0F0',
    O: '#F0F000',
    T: '#A000F0',
    S: '#00F000',
    Z: '#F00000',
    J: '#0000F0',
    L: '#F0A000'
  };

  const PIECES = {
    I: {
      size: 4,
      spawnX: 3,
      rotations: [
        [[0,1],[1,1],[2,1],[3,1]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[1,0],[1,1],[1,2],[1,3]]
      ]
    },
    O: {
      size: 4,
      spawnX: 3,
      rotations: [
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]]
      ]
    },
    T: {
      size: 3,
      spawnX: 3,
      rotations: [
        [[1,0],[0,1],[1,1],[2,1]],
        [[1,0],[1,1],[2,1],[1,2]],
        [[0,1],[1,1],[2,1],[1,2]],
        [[1,0],[0,1],[1,1],[1,2]]
      ]
    },
    S: {
      size: 3,
      spawnX: 3,
      rotations: [
        [[1,0],[2,0],[0,1],[1,1]],
        [[1,0],[1,1],[2,1],[2,2]],
        [[1,1],[2,1],[0,2],[1,2]],
        [[0,0],[0,1],[1,1],[1,2]]
      ]
    },
    Z: {
      size: 3,
      spawnX: 3,
      rotations: [
        [[0,0],[1,0],[1,1],[2,1]],
        [[2,0],[1,1],[2,1],[1,2]],
        [[0,1],[1,1],[1,2],[2,2]],
        [[1,0],[0,1],[1,1],[0,2]]
      ]
    },
    J: {
      size: 3,
      spawnX: 3,
      rotations: [
        [[0,0],[0,1],[1,1],[2,1]],
        [[1,0],[2,0],[1,1],[1,2]],
        [[0,1],[1,1],[2,1],[2,2]],
        [[1,0],[1,1],[0,2],[1,2]]
      ]
    },
    L: {
      size: 3,
      spawnX: 3,
      rotations: [
        [[2,0],[0,1],[1,1],[2,1]],
        [[1,0],[1,1],[1,2],[2,2]],
        [[0,1],[1,1],[2,1],[0,2]],
        [[0,0],[1,0],[1,1],[1,2]]
      ]
    }
  };

  const JLSTZ_KICKS = {
    '0>1': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
    '1>0': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
    '1>2': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
    '2>1': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
    '2>3': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
    '3>2': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
    '3>0': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
    '0>3': [[0,0],[1,0],[1,1],[0,-2],[1,-2]]
  };

  const I_KICKS = {
    '0>1': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
    '1>0': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
    '1>2': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
    '2>1': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
    '2>3': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
    '3>2': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
    '3>0': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
    '0>3': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]]
  };

  const BASE_LINE_POINTS = {1:100,2:300,3:500,4:800};
  const keyState = Object.create(null);
  const keyPrev = Object.create(null);
  const moveHold = {
    left: { active:false, timer:0, arr:0 },
    right: { active:false, timer:0, arr:0 }
  };

  let state = STATES.TITLE;
  let selectedStartLevel = 0;
  let startLevel = 0;
  let score = 0;
  let best = loadBest();
  let lines = 0;
  let level = 0;
  let combo = 0;
  let backToBack = false;
  let newBest = false;
  let lastTime = 0;
  let blink = 0;
  let titleSpin = 0;
  let grid = [];
  let queue = [];
  let active = null;
  let holdPiece = null;
  let holdUsedThisTurn = false;
  let gravityTimer = 0;
  let softDropTimer = 0;
  let lockTimer = 0;
  let lockResets = 0;
  let lineClearRows = [];
  let lineClearTimer = 0;
  let collapseRows = [];
  let hardDropTrail = null;
  let levelFlash = 0;
  let audioCtx = null;

  function loadBest() {
    try {
      const raw = localStorage.getItem('tetris_best');
      const n = raw ? parseInt(raw, 10) : 0;
      return Number.isFinite(n) ? n : 0;
    } catch {
      return 0;
    }
  }

  function saveBest() {
    try { localStorage.setItem('tetris_best', String(best)); } catch {}
  }

  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        try { audioCtx = new AC(); } catch {}
      }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  }

  function tone(freq, duration, gainValue, type='square', endFreq=null, delay=0) {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (endFreq !== null) osc.frequency.linearRampToValueAtTime(endFreq, t + duration);
      gain.gain.setValueAtTime(Math.max(0.0001, gainValue), t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration);
    } catch {}
  }

  const sfx = {
    move(){ tone(200,0.02,0.08,'square'); },
    rotate(){ tone(400,0.03,0.12,'square'); },
    soft(){ tone(100,0.015,0.06,'triangle'); },
    hard(){ tone(150,0.08,0.25,'square',80); },
    lock(){ tone(250,0.04,0.15,'square'); },
    clear(n){
      if (n === 1) tone(500,0.1,0.2,'square');
      else if (n === 2) tone(600,0.12,0.22,'square');
      else if (n === 3) tone(700,0.14,0.24,'square');
      else if (n === 4) [523,659,784,1047].forEach((f,i)=>tone(f,0.05,0.28,'square',null,i*0.05));
    },
    level(){ tone(400,0.25,0.2,'sawtooth',800); },
    hold(){ tone(300,0.04,0.1,'square',500); },
    gameOver(){ tone(300,0.8,0.3,'square',60); },
    best(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.08,0.22,'sine',null,i*0.08)); }
  };

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function emptyGrid() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function gravityIntervalMs(lv) {
    if (lv === 0) return 800;
    if (lv === 1) return 717;
    if (lv === 2) return 633;
    if (lv === 3) return 550;
    if (lv === 4) return 467;
    if (lv === 5) return 383;
    if (lv === 6) return 300;
    if (lv === 7) return 217;
    if (lv === 8) return 133;
    if (lv === 9) return 100;
    if (lv <= 12) return 83;
    if (lv <= 15) return 67;
    if (lv <= 18) return 50;
    if (lv <= 28) return 33;
    return 17;
  }

  function shuffleBag() {
    const bag = ['I','O','T','S','Z','J','L'];
    for (let i = bag.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
    return bag;
  }

  function ensureQueue() {
    while (queue.length < 7) queue.push(...shuffleBag());
  }

  function makePiece(type) {
    return { type, x: PIECES[type].spawnX, y: 0, rot: 0 };
  }

  function pieceCells(piece, dx=0, dy=0, rot=piece.rot) {
    return PIECES[piece.type].rotations[rot].map(([x, y]) => ({ x: piece.x + x + dx, y: piece.y + y + dy }));
  }

  function isValid(piece, dx=0, dy=0, rot=piece.rot) {
    for (const c of pieceCells(piece, dx, dy, rot)) {
      if (c.x < 0 || c.x >= COLS || c.y >= ROWS) return false;
      if (c.y >= 0 && grid[c.y][c.x]) return false;
    }
    return true;
  }

  function onSurface(piece=active) {
    return piece && !isValid(piece, 0, 1, piece.rot);
  }

  function resetLockDelay() {
    if (!active) return;
    if (onSurface()) {
      if (lockResets < LOCK_RESET_LIMIT) {
        lockTimer = LOCK_DELAY;
        lockResets++;
      }
    }
  }

  function updateBestMaybe() {
    if (score > best) {
      best = score;
      saveBest();
      newBest = true;
    }
  }

  function spawnNextPiece(typeOverride = null) {
    ensureQueue();
    active = makePiece(typeOverride || queue.shift());
    ensureQueue();
    holdUsedThisTurn = false;
    gravityTimer = 0;
    softDropTimer = 0;
    lockTimer = 0;
    lockResets = 0;
    hardDropTrail = null;
    if (!isValid(active)) {
      state = STATES.GAME_OVER;
      ensureAudio();
      sfx.gameOver();
      if (newBest) sfx.best();
    }
  }

  function startRun() {
    ensureAudio();
    state = STATES.PLAYING;
    startLevel = selectedStartLevel;
    score = 0;
    lines = 0;
    level = startLevel;
    combo = 0;
    backToBack = false;
    newBest = false;
    grid = emptyGrid();
    queue = [];
    holdPiece = null;
    holdUsedThisTurn = false;
    gravityTimer = 0;
    softDropTimer = 0;
    lockTimer = 0;
    lockResets = 0;
    lineClearRows = [];
    lineClearTimer = 0;
    collapseRows = [];
    hardDropTrail = null;
    levelFlash = 0;
    ensureQueue();
    spawnNextPiece();
    resetMovementHolds();
  }

  function toScreenX(col) { return FIELD_X + col * CELL; }
  function toScreenY(row) { return FIELD_Y + (row - VISIBLE_START) * CELL; }

  function brighten(hex, amount) {
    const n = hex.replace('#','');
    const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
    const f = (v) => Math.round(v + (255 - v) * amount).toString(16).padStart(2,'0');
    return `#${f(r)}${f(g)}${f(b)}`;
  }

  function darken(hex, amount) {
    const n = hex.replace('#','');
    const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
    const f = (v) => Math.round(v * (1 - amount)).toString(16).padStart(2,'0');
    return `#${f(r)}${f(g)}${f(b)}`;
  }

  function drawCell(x, y, color, alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 1, 26, 26);
    ctx.fillStyle = brighten(color, 0.4);
    ctx.fillRect(x + 1, y + 1, 26, 2);
    ctx.fillRect(x + 1, y + 1, 2, 26);
    ctx.fillStyle = darken(color, 0.3);
    ctx.fillRect(x + 1, y + 25, 26, 2);
    ctx.fillRect(x + 25, y + 1, 2, 26);
    ctx.restore();
  }

  function drawFieldBackground() {
    for (let r = 0; r < VISIBLE_ROWS; r++) {
      ctx.fillStyle = r % 2 === 0 ? '#111111' : '#131313';
      ctx.fillRect(FIELD_X, FIELD_Y + r * CELL, FIELD_W, CELL);
    }
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      const x = FIELD_X + c * CELL + 0.5;
      ctx.beginPath();
      ctx.moveTo(x, FIELD_Y);
      ctx.lineTo(x, FIELD_Y + FIELD_H);
      ctx.stroke();
    }
    for (let r = 0; r <= VISIBLE_ROWS; r++) {
      const y = FIELD_Y + r * CELL + 0.5;
      ctx.beginPath();
      ctx.moveTo(FIELD_X, y);
      ctx.lineTo(FIELD_X + FIELD_W, y);
      ctx.stroke();
    }
    const borderColor = levelFlash > 0 ? '#FFFFFF' : '#333333';
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    ctx.strokeRect(FIELD_X - 1, FIELD_Y - 1, FIELD_W + 2, FIELD_H + 2);
  }

  function ghostY() {
    if (!active) return 0;
    let y = active.y;
    while (isValid(active, 0, y - active.y + 1, active.rot)) y++;
    return y;
  }

  function drawPiece(piece, gridYOverride = null, alpha = 1, outlineOnly = false) {
    const color = COLORS[piece.type];
    const gy = gridYOverride !== null ? gridYOverride : piece.y;
    for (const [px, py] of PIECES[piece.type].rotations[piece.rot]) {
      const row = gy + py;
      if (row < VISIBLE_START) continue;
      const x = toScreenX(piece.x + px);
      const y = toScreenY(row);
      if (outlineOnly) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 4, y + 4, 20, 20);
        ctx.restore();
      } else {
        drawCell(x, y, color, alpha);
      }
    }
  }

  function drawGridBlocks() {
    for (let r = VISIBLE_START; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        if (cell) drawCell(toScreenX(c), toScreenY(r), cell);
      }
    }
  }

  function drawLineClearOverlay() {
    if (state !== STATES.LINE_CLEAR || !lineClearRows.length) return;
    if (lineClearTimer > LINE_COLLAPSE) {
      ctx.fillStyle = '#FFFFFF';
      for (const row of lineClearRows) {
        if (row < VISIBLE_START) continue;
        ctx.fillRect(FIELD_X, toScreenY(row), FIELD_W, CELL);
      }
    }
  }

  function drawHardDropTrail() {
    if (!hardDropTrail || hardDropTrail.t <= 0) return;
    const color = COLORS[hardDropTrail.type];
    ctx.save();
    ctx.globalAlpha = 0.15 * (hardDropTrail.t / 0.1);
    ctx.fillStyle = color;
    for (const [px, py] of PIECES[hardDropTrail.type].rotations[hardDropTrail.rot]) {
      const col = hardDropTrail.x + px;
      const fromRow = hardDropTrail.fromY + py;
      const toRow = hardDropTrail.toY + py;
      const top = Math.max(fromRow, VISIBLE_START);
      const bottom = Math.max(toRow, VISIBLE_START);
      const x = toScreenX(col) + 6;
      const y = toScreenY(top) + 4;
      const h = (bottom - top) * CELL + 20;
      if (h > 0) ctx.fillRect(x, y, 16, h);
    }
    ctx.restore();
  }

  function drawPanelBox(x, y, w, h, label) {
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#888888';
    ctx.font = '13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(label, x, y - 4);
  }

  function drawMiniPiece(type, x, y, w, h, alpha=1, rot=0) {
    const cells = PIECES[type].rotations[rot];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const [cx, cy] of cells) {
      minX = Math.min(minX, cx); minY = Math.min(minY, cy);
      maxX = Math.max(maxX, cx); maxY = Math.max(maxY, cy);
    }
    const bw = (maxX - minX + 1) * 18;
    const bh = (maxY - minY + 1) * 18;
    const ox = x + (w - bw) / 2 - minX * 18;
    const oy = y + (h - bh) / 2 - minY * 18;
    for (const [cx, cy] of cells) {
      ctx.save();
      ctx.globalAlpha = alpha;
      drawCell(ox + cx * 18 - 1, oy + cy * 18 - 1, COLORS[type], alpha);
      ctx.restore();
    }
  }

  function drawPanels() {
    drawPanelBox(320, 44, 100, 66, 'HOLD');
    if (holdPiece) drawMiniPiece(holdPiece, 320, 44, 100, 66, holdUsedThisTurn ? 0.3 : 1);

    ctx.fillStyle = '#888888';
    ctx.font = '13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('NEXT', 320, 126);
    for (let i = 0; i < 3; i++) {
      const y = 130 + i * 60;
      ctx.strokeStyle = '#333333';
      ctx.strokeRect(320, y, 100, 56);
      if (queue[i]) drawMiniPiece(queue[i], 320, y, 100, 56, 1);
    }

    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText('SCORE', 320, 330);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px monospace';
    ctx.fillText(String(score), 320, 348);

    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText('BEST', 320, 378);
    ctx.fillStyle = '#555555';
    ctx.font = '18px monospace';
    ctx.fillText(String(best), 320, 396);

    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText('LINES', 320, 426);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px monospace';
    ctx.fillText(String(lines), 320, 444);

    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText('LEVEL', 320, 474);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '18px monospace';
    ctx.fillText(String(level), 320, 492);
  }

  function drawTitle() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('TETRIS', W / 2, 180);
    const types = ['I','O','T','S','Z','J','L'];
    types.forEach((t, i) => {
      const row = i < 4 ? 0 : 1;
      const col = i < 4 ? i : i - 4;
      drawMiniPiece(t, 76 + col * 88, 220 + row * 70, 64, 52, 1, Math.floor(titleSpin + i) % 4);
    });
    ctx.fillStyle = Math.floor(blink * 2) % 2 === 0 ? '#AAAAAA' : '#666666';
    ctx.font = '20px monospace';
    ctx.fillText('Press Enter to Start', W / 2, 400);
    ctx.fillStyle = '#555555';
    ctx.font = '16px monospace';
    ctx.fillText(`Best: ${best}`, W / 2, 440);
    ctx.fillStyle = '#888888';
    ctx.fillText(`← Level ${selectedStartLevel} →`, W / 2, 470);
  }

  function drawPausedOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2 - 10);
    ctx.fillStyle = '#888888';
    ctx.font = '14px monospace';
    ctx.fillText('P to resume', FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2 + 20);
  }

  function drawGameOverOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FF0000';
    ctx.font = '36px monospace';
    ctx.fillText('GAME OVER', FIELD_X + FIELD_W / 2, FIELD_Y + 210);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '22px monospace';
    ctx.fillText(`Score: ${score}`, FIELD_X + FIELD_W / 2, FIELD_Y + 250);
    if (newBest) {
      const alpha = 0.65 + 0.35 * Math.sin(blink * Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,64,${alpha})`;
      ctx.font = '18px monospace';
      ctx.fillText('NEW BEST!', FIELD_X + FIELD_W / 2, FIELD_Y + 284);
    }
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '16px monospace';
    ctx.fillText(`Lines: ${lines}`, FIELD_X + FIELD_W / 2, FIELD_Y + 318);
    ctx.fillText(`Level: ${level}`, FIELD_X + FIELD_W / 2, FIELD_Y + 344);
    if (Math.floor(blink * 2) % 2 === 0) {
      ctx.fillStyle = '#666666';
      ctx.fillText('Enter to restart', FIELD_X + FIELD_W / 2, FIELD_Y + 392);
    }
  }

  function render() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    drawFieldBackground();
    drawGridBlocks();
    drawHardDropTrail();
    if (active && state !== STATES.TITLE && state !== STATES.GAME_OVER) {
      drawPiece(active, ghostY(), 0.3, true);
      drawPiece(active);
    }
    drawLineClearOverlay();
    drawPanels();
    if (state === STATES.TITLE) drawTitle();
    else if (state === STATES.PAUSED) drawPausedOverlay();
    else if (state === STATES.GAME_OVER) drawGameOverOverlay();
  }

  function movePiece(dx, dy) {
    if (!active) return false;
    if (isValid(active, dx, dy)) {
      active.x += dx;
      active.y += dy;
      if (dy === 0) resetLockDelay();
      return true;
    }
    return false;
  }

  function tryRotate(dir) {
    if (!active) return false;
    const from = active.rot;
    const to = (from + dir + 4) % 4;
    if (active.type === 'O') {
      if (isValid(active, 0, 0, to)) {
        active.rot = to;
        resetLockDelay();
        return true;
      }
      return false;
    }
    const table = active.type === 'I' ? I_KICKS : JLSTZ_KICKS;
    const kicks = table[`${from}>${to}`] || [[0,0]];
    for (const [kx, kyUp] of kicks) {
      const dy = -kyUp;
      if (isValid(active, kx, dy, to)) {
        active.x += kx;
        active.y += dy;
        active.rot = to;
        resetLockDelay();
        return true;
      }
    }
    return false;
  }

  function lockPiece() {
    for (const c of pieceCells(active)) {
      if (c.y >= 0 && c.y < ROWS && c.x >= 0 && c.x < COLS) grid[c.y][c.x] = COLORS[active.type];
    }
    ensureAudio();
    sfx.lock();
    const hiddenBlocked = pieceCells(active).some(c => c.y < VISIBLE_START);
    active = null;
    if (hiddenBlocked) {
      state = STATES.GAME_OVER;
      ensureAudio();
      sfx.gameOver();
      if (newBest) sfx.best();
      return;
    }
    const full = [];
    for (let r = 0; r < ROWS; r++) {
      if (grid[r].every(Boolean)) full.push(r);
    }
    if (full.length) {
      state = STATES.LINE_CLEAR;
      lineClearRows = full;
      collapseRows = full.slice();
      lineClearTimer = LINE_FLASH + LINE_COLLAPSE;
      awardLineScore(full.length);
    } else {
      combo = 0;
      spawnNextPiece();
    }
  }

  function awardLineScore(clears) {
    const prevLevel = level;
    const mul = level + 1;
    let base = BASE_LINE_POINTS[clears] * mul;
    if (clears === 4) {
      if (backToBack) base = Math.floor(base * 1.5);
      backToBack = true;
    } else {
      backToBack = false;
    }
    combo += 1;
    const comboBonus = 50 * combo * mul;
    score += base + comboBonus;
    lines += clears;
    level = startLevel + Math.floor(lines / 10);
    if (level > prevLevel) {
      levelFlash = 0.2;
      ensureAudio();
      sfx.level();
    }
    updateBestMaybe();
    ensureAudio();
    sfx.clear(clears);
  }

  function resolveLineClear(dt) {
    lineClearTimer -= dt;
    if (lineClearTimer <= LINE_COLLAPSE) {
      // collapse already represented at transition end; keep flash phase simple
    }
    if (lineClearTimer <= 0) {
      const keep = [];
      for (let r = 0; r < ROWS; r++) if (!collapseRows.includes(r)) keep.push(grid[r]);
      while (keep.length < ROWS) keep.unshift(Array(COLS).fill(null));
      grid = keep;
      state = STATES.PLAYING;
      lineClearRows = [];
      collapseRows = [];
      spawnNextPiece();
    }
  }

  function softDropInterval() {
    return Math.min(0.05, gravityIntervalMs(level) / 1000 / 20);
  }

  function stepGravityCell(awardSoft = false) {
    if (!active) return;
    if (movePiece(0, 1)) {
      if (awardSoft) {
        score += 1;
        updateBestMaybe();
        ensureAudio();
        sfx.soft();
      }
      if (!onSurface()) {
        lockTimer = 0;
        lockResets = 0;
      }
    } else {
      if (lockTimer <= 0) {
        lockTimer = LOCK_DELAY;
        lockResets = 0;
      }
    }
  }

  function hardDrop() {
    if (!active) return;
    const fromY = active.y;
    let dist = 0;
    while (isValid(active, 0, dist + 1)) dist++;
    if (dist > 0) active.y += dist;
    score += dist * 2;
    updateBestMaybe();
    hardDropTrail = { type: active.type, rot: active.rot, x: active.x, fromY, toY: active.y, t: 0.1 };
    ensureAudio();
    sfx.hard();
    lockPiece();
  }

  function useHold() {
    if (!active || holdUsedThisTurn) return;
    ensureAudio();
    sfx.hold();
    const currentType = active.type;
    if (holdPiece) {
      const swap = holdPiece;
      holdPiece = currentType;
      active = makePiece(swap);
      if (!isValid(active)) {
        state = STATES.GAME_OVER;
        sfx.gameOver();
        return;
      }
      holdUsedThisTurn = true;
      gravityTimer = 0;
      lockTimer = 0;
      lockResets = 0;
    } else {
      holdPiece = currentType;
      holdUsedThisTurn = true;
      spawnNextPiece();
      holdUsedThisTurn = true;
    }
  }

  function resetMovementHolds() {
    moveHold.left = { active:false, timer:0, arr:0 };
    moveHold.right = { active:false, timer:0, arr:0 };
  }

  function processHorizontal(dt) {
    const left = !!(keyState.ArrowLeft || keyState.KeyA);
    const right = !!(keyState.ArrowRight || keyState.KeyD);

    function doDir(name, pressed, dx) {
      const h = moveHold[name];
      const other = moveHold[name === 'left' ? 'right' : 'left'];
      if (!pressed) {
        h.active = false; h.timer = 0; h.arr = 0; return;
      }
      if (!h.active) {
        h.active = true; h.timer = 0; h.arr = 0;
        if (movePiece(dx, 0)) { ensureAudio(); sfx.move(); }
        other.active = false; other.timer = 0; other.arr = 0;
        return;
      }
      h.timer += dt;
      if (h.timer >= DAS_DELAY) {
        h.arr += dt;
        while (h.arr >= ARR) {
          h.arr -= ARR;
          if (movePiece(dx, 0)) { ensureAudio(); sfx.move(); }
          else break;
        }
      }
    }

    if (left && right) {
      // honor whichever became active last; simple neutral behavior when both held
      return;
    }
    doDir('left', left, -1);
    doDir('right', right, 1);
  }

  function keyEdge(code) {
    return !!keyState[code] && !keyPrev[code];
  }

  function updateKeyPrev() {
    const keys = ['ArrowLeft','ArrowRight','KeyA','KeyD','ArrowDown','KeyS','ArrowUp','KeyW','KeyZ','ControlLeft','ControlRight','Space','ShiftLeft','ShiftRight','KeyC','Enter','KeyP','Escape'];
    for (const k of keys) keyPrev[k] = !!keyState[k];
  }

  function updatePlaying(dt) {
    if (levelFlash > 0) levelFlash = Math.max(0, levelFlash - dt);
    if (hardDropTrail) {
      hardDropTrail.t -= dt;
      if (hardDropTrail.t <= 0) hardDropTrail = null;
    }

    processHorizontal(dt);

    if (keyEdge('ArrowUp') || keyEdge('KeyW')) {
      if (tryRotate(1)) { ensureAudio(); sfx.rotate(); }
    }
    if (keyEdge('KeyZ') || keyEdge('ControlLeft') || keyEdge('ControlRight')) {
      if (tryRotate(-1)) { ensureAudio(); sfx.rotate(); }
    }
    if (keyEdge('Space')) hardDrop();
    if (keyEdge('ShiftLeft') || keyEdge('ShiftRight') || keyEdge('KeyC')) useHold();

    const soft = !!(keyState.ArrowDown || keyState.KeyS);
    if (soft) {
      softDropTimer += dt;
      const interval = softDropInterval();
      while (softDropTimer >= interval) {
        softDropTimer -= interval;
        if (active) stepGravityCell(true);
        if (!active || state !== STATES.PLAYING) break;
      }
    } else {
      softDropTimer = 0;
    }

    gravityTimer += dt;
    const g = gravityIntervalMs(level) / 1000;
    let gravitySteps = 0;
    while (gravityTimer >= g && gravitySteps < 3 && active) {
      gravityTimer -= g;
      stepGravityCell(false);
      gravitySteps++;
    }

    if (active && onSurface()) {
      if (lockTimer <= 0) lockTimer = LOCK_DELAY;
      else {
        lockTimer -= dt;
        if (lockTimer <= 0 || lockResets >= LOCK_RESET_LIMIT) lockPiece();
      }
    } else if (active) {
      lockTimer = 0;
    }
  }

  function updateTitle(dt) {
    blink += dt;
    titleSpin += dt;
    if (keyEdge('ArrowLeft') || keyEdge('KeyA')) selectedStartLevel = clamp(selectedStartLevel - 1, 0, 19);
    if (keyEdge('ArrowRight') || keyEdge('KeyD')) selectedStartLevel = clamp(selectedStartLevel + 1, 0, 19);
    if (keyEdge('Enter')) startRun();
  }

  function update(dt) {
    blink += dt;
    if (state === STATES.TITLE) return updateTitle(dt);
    if (state === STATES.PAUSED || state === STATES.GAME_OVER) {
      if (hardDropTrail) {
        hardDropTrail.t -= dt;
        if (hardDropTrail.t <= 0) hardDropTrail = null;
      }
      return;
    }
    if (state === STATES.LINE_CLEAR) {
      if (levelFlash > 0) levelFlash = Math.max(0, levelFlash - dt);
      if (hardDropTrail) {
        hardDropTrail.t -= dt;
        if (hardDropTrail.t <= 0) hardDropTrail = null;
      }
      resolveLineClear(dt);
      return;
    }
    updatePlaying(dt);
  }

  window.addEventListener('keydown', (e) => {
    const codes = ['ArrowLeft','ArrowRight','ArrowDown','ArrowUp','KeyA','KeyD','KeyS','KeyW','KeyZ','Space','ShiftLeft','ShiftRight','KeyC','Enter','KeyP','Escape','ControlLeft','ControlRight'];
    if (codes.includes(e.code)) e.preventDefault();
    keyState[e.code] = true;
    if (e.code === 'Enter' && state === STATES.GAME_OVER) {
      state = STATES.TITLE;
      selectedStartLevel = startLevel;
    }
    if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATES.PLAYING) state = STATES.PAUSED;
    else if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATES.PAUSED) state = STATES.PLAYING;
  });

  window.addEventListener('keyup', (e) => {
    keyState[e.code] = false;
  });

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    render();
    updateKeyPrev();
    requestAnimationFrame(frame);
  }

  grid = emptyGrid();
  ensureQueue();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
