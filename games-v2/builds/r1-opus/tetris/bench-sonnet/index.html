<!--
  GAME:      Tetris
  RUN:       r1-opus
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="480" height="640"></canvas>
<script>
(function() {
'use strict';

// Coordinate convention: row 0 = top (hidden), row 21 = bottom visible row
// grid[row][col], row 0-1 = hidden spawn rows, row 2 = top visible, row 21 = bottom visible
// Total rows = 22 (0-21), visible rows = 2-21 (20 rows), hidden = 0-1

const COLS = 10;
const TOTAL_ROWS = 22;
const VISIBLE_ROWS = 20;
const CELL = 28;
const PF_X = 24; // playfield left
const PF_Y = 44; // playfield top (visible area)
const LS_KEY = 'tetris_r1opus_best';

// Gravity intervals in ms per level
function getLevelInterval(lv) {
  if (lv <= 0) return 800;
  if (lv === 1) return 717;
  if (lv === 2) return 633;
  if (lv === 3) return 550;
  if (lv === 4) return 467;
  if (lv === 5) return 383;
  if (lv === 6) return 300;
  if (lv === 7) return 217;
  if (lv === 8) return 133;
  if (lv === 9) return 100;
  if (lv <= 12) return 83;
  if (lv <= 15) return 67;
  if (lv <= 18) return 50;
  if (lv <= 28) return 33;
  return 17;
}

// Piece definitions: each piece has cells[] per rotation state
// Using [col, row] offsets relative to piece origin (top-left of bounding box)
const PIECES = {
  I: {
    color: '#00F0F0',
    rotations: [
      [[0,1],[1,1],[2,1],[3,1]],
      [[2,0],[2,1],[2,2],[2,3]],
      [[0,2],[1,2],[2,2],[3,2]],
      [[1,0],[1,1],[1,2],[1,3]]
    ],
    size: 4
  },
  O: {
    color: '#F0F000',
    rotations: [
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]]
    ],
    size: 4
  },
  T: {
    color: '#A000F0',
    rotations: [
      [[1,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[2,1],[1,2]],
      [[1,0],[0,1],[1,1],[1,2]]
    ],
    size: 3
  },
  S: {
    color: '#00F000',
    rotations: [
      [[1,0],[2,0],[0,1],[1,1]],
      [[1,0],[1,1],[2,1],[2,2]],
      [[1,1],[2,1],[0,2],[1,2]],
      [[0,0],[0,1],[1,1],[1,2]]
    ],
    size: 3
  },
  Z: {
    color: '#F00000',
    rotations: [
      [[0,0],[1,0],[1,1],[2,1]],
      [[2,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[1,2],[2,2]],
      [[1,0],[0,1],[1,1],[0,2]]
    ],
    size: 3
  },
  J: {
    color: '#0000F0',
    rotations: [
      [[0,0],[0,1],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[1,2]],
      [[0,1],[1,1],[2,1],[2,2]],
      [[1,0],[1,1],[0,2],[1,2]]
    ],
    size: 3
  },
  L: {
    color: '#F0A000',
    rotations: [
      [[2,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[1,2],[2,2]],
      [[0,1],[1,1],[2,1],[0,2]],
      [[0,0],[1,0],[1,1],[1,2]]
    ],
    size: 3
  }
};

const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

// SRS kick tables — offsets are (dx, dy) where dy positive = UP (subtract from row)
const KICKS_JLSTZ = {
  '0>1': [[-1,0],[-1,-1],[0,2],[-1,2]],
  '1>0': [[1,0],[1,1],[0,-2],[1,-2]],
  '1>2': [[1,0],[1,1],[0,-2],[1,-2]],
  '2>1': [[-1,0],[-1,-1],[0,2],[-1,2]],
  '2>3': [[1,0],[1,-1],[0,2],[1,2]],
  '3>2': [[-1,0],[-1,1],[0,-2],[-1,-2]],
  '3>0': [[-1,0],[-1,1],[0,-2],[-1,-2]],
  '0>3': [[1,0],[1,-1],[0,2],[1,2]]
};

const KICKS_I = {
  '0>1': [[-2,0],[1,0],[-2,1],[1,-2]],
  '1>0': [[2,0],[-1,0],[2,-1],[-1,2]],
  '1>2': [[-1,0],[2,0],[-1,-2],[2,1]],
  '2>1': [[1,0],[-2,0],[1,2],[-2,-1]],
  '2>3': [[2,0],[-1,0],[2,-1],[-1,2]],
  '3>2': [[-2,0],[1,0],[-2,1],[1,-2]],
  '3>0': [[1,0],[-2,0],[1,2],[-2,-1]],
  '0>3': [[-1,0],[2,0],[-1,-2],[2,1]]
};

// Canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Audio
let audioCtx = null;
function getAC() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  return audioCtx;
}
function playTone(freq, type, dur, gain, freqEnd) {
  try {
    const ac = getAC(); if (!ac) return;
    const osc = ac.createOscillator();
    const gn = ac.createGain();
    osc.connect(gn); gn.connect(ac.destination);
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1), ac.currentTime + dur);
    gn.gain.setValueAtTime(gain, ac.currentTime);
    gn.gain.linearRampToValueAtTime(0.0001, ac.currentTime + dur);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}
function playArpeggio(freqs, dur, type, gain) {
  freqs.forEach((f,i) => setTimeout(() => playTone(f, type||'square', dur, gain||0.2), i*dur*1000));
}

// Game state
const STATE = { TITLE:0, PLAYING:1, PAUSED:2, LINE_CLEAR:3, GAME_OVER:4 };
let state = STATE.TITLE;

let grid = [];
let activePiece = null; // {type, rot, x, y}
let holdPiece = null;
let holdUsed = false;
let pieceQueue = [];
let score = 0;
let highScore = parseInt(localStorage.getItem(LS_KEY)||'0');
let lines = 0;
let level = 0;
let startLevel = 0;
let combo = 0;
let backToBack = false;
let gravityTimer = 0;
let lockTimer = 0;
let lockActive = false;
let lockResets = 0;
let lineClearTimer = 0;
let lineClearRows = [];
let lineClearPhase = 0; // 0=flash, 1=collapse
let gameOverNewBest = false;

// Hard drop trail
let dropTrail = null; // {x, y, h, color, timer}

// Level up flash
let borderFlashTimer = 0;

// Keys
const keys = {};
const prevKeys = {};
// DAS
const das = {
  left: { phase: null, dasTimer: 0, arrTimer: 0 },
  right: { phase: null, dasTimer: 0, arrTimer: 0 }
};
// Soft drop
let softDropTimer = 0;
let softDropAccum = 0;

// Title
let titleRotTimer = 0;
let titleRots = [0,0,0,0,0,0,0];
let titleBlinkTimer = 0;
let titleBlink = true;

function initGrid() {
  grid = [];
  for (let r = 0; r < TOTAL_ROWS; r++) {
    grid[r] = new Array(COLS).fill(null);
  }
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function refillQueue() {
  while (pieceQueue.length < 14) {
    const bag = shuffle([...PIECE_TYPES]);
    pieceQueue.push(...bag);
  }
}

function nextFromQueue() {
  refillQueue();
  return pieceQueue.shift();
}

function getSpawnPos(type) {
  // Spawn: centered horizontally, at hidden rows (0-1)
  // For 4-wide pieces (I, O): startX = 3, y = 0 (so cells at y=0,1 = hidden rows)
  // For 3-wide: startX = 3
  const size = PIECES[type].size;
  const sx = size === 4 ? 3 : 3;
  return { x: sx, y: 0 };
}

function spawnPiece(type) {
  const pos = getSpawnPos(type);
  activePiece = { type, rot: 0, x: pos.x, y: pos.y };
  holdUsed = false;
  gravityTimer = 0;
  lockActive = false;
  lockTimer = 0;
  lockResets = 0;
  // Check game over
  if (!isValid(type, 0, pos.x, pos.y)) {
    state = STATE.GAME_OVER;
    gameOverNewBest = score > highScore;
    if (gameOverNewBest) { highScore = score; localStorage.setItem(LS_KEY, highScore); }
    playTone(300, 'square', 0.8, 0.3, 60);
  }
}

// getCells returns absolute grid positions for a piece
function getCells(type, rot, px, py) {
  return PIECES[type].rotations[rot].map(([cx, cy]) => [px + cx, py + cy]);
}

function isValid(type, rot, px, py) {
  for (const [c, r] of getCells(type, rot, px, py)) {
    if (c < 0 || c >= COLS) return false;
    if (r >= TOTAL_ROWS) return false;
    if (r >= 0 && grid[r][c]) return false;
  }
  return true;
}

function isOnSurface(type, rot, px, py) {
  return !isValid(type, rot, px, py + 1);
}

function calcGhost() {
  if (!activePiece) return null;
  let { type, rot, x } = activePiece;
  let gy = activePiece.y;
  while (isValid(type, rot, x, gy + 1)) gy++;
  return gy;
}

function lockPiece() {
  if (!activePiece) return;
  const { type, rot, x, y } = activePiece;
  for (const [c, r] of getCells(type, rot, x, y)) {
    if (r >= 0 && r < TOTAL_ROWS) grid[r][c] = PIECES[type].color;
  }
  playTone(250, 'square', 0.04, 0.15);
  // Check line clears
  const fullRows = [];
  for (let r = 0; r < TOTAL_ROWS; r++) {
    if (grid[r].every(c => c !== null)) fullRows.push(r);
  }
  if (fullRows.length > 0) {
    lineClearRows = fullRows;
    lineClearTimer = 0.15; // 150ms flash
    lineClearPhase = 0;
    state = STATE.LINE_CLEAR;
    // Award points
    const n = fullRows.length;
    const bases = [0, 100, 300, 500, 800];
    let pts = bases[n] * (level + 1);
    if (n === 4) {
      if (backToBack) pts = Math.floor(800 * 1.5) * (level + 1);
      backToBack = true;
    } else {
      backToBack = false;
    }
    combo++;
    pts += 50 * combo * (level + 1);
    score += pts;
    lines += n;
    const newLevel = startLevel + Math.floor(lines / 10);
    if (newLevel > level) {
      level = newLevel;
      borderFlashTimer = 0.2;
      playTone(400, 'sawtooth', 0.25, 0.2, 800);
    }
    if (score > highScore) { highScore = score; localStorage.setItem(LS_KEY, highScore); }
    // Play sound
    if (n === 4) playArpeggio([523,659,784,1047], 0.05, 'square', 0.28);
    else {
      const hz = [0, 500, 600, 700][n] || 500;
      playTone(hz, 'square', 0.04 + n * 0.02, 0.2 + n * 0.02);
    }
  } else {
    combo = 0;
    activePiece = null;
    spawnPiece(nextFromQueue());
  }
}

function doRotate(cw) {
  if (!activePiece) return;
  const { type, rot, x, y } = activePiece;
  const newRot = (rot + (cw ? 1 : 3)) % 4;
  const key = rot + '>' + newRot;
  const kicks = type === 'I' ? KICKS_I : KICKS_JLSTZ;
  const offsets = kicks[key] || [];

  // Try basic rotation first
  if (isValid(type, newRot, x, y)) {
    activePiece.rot = newRot;
    if (lockActive) { lockTimer = 0; if (lockResets < 15) lockResets++; }
    playTone(400, 'square', 0.03, 0.12);
    return;
  }
  // Try kick offsets
  for (const [dx, dy] of offsets) {
    // dy positive = up = subtract from row
    if (isValid(type, newRot, x + dx, y - dy)) {
      activePiece.x = x + dx;
      activePiece.y = y - dy;
      activePiece.rot = newRot;
      if (lockActive) { lockTimer = 0; if (lockResets < 15) lockResets++; }
      playTone(400, 'square', 0.03, 0.12);
      return;
    }
  }
}

function doMove(dx) {
  if (!activePiece) return false;
  const { type, rot, x, y } = activePiece;
  if (isValid(type, rot, x + dx, y)) {
    activePiece.x = x + dx;
    if (lockActive && lockResets < 15) { lockTimer = 0; lockResets++; }
    playTone(200, 'square', 0.02, 0.08);
    return true;
  }
  return false;
}

function doHardDrop() {
  if (!activePiece) return;
  const { type, rot, x, y } = activePiece;
  const gy = calcGhost();
  if (gy === null) return;
  const dropped = gy - y;
  score += dropped * 2;
  // Trail
  const px = PF_X + x * CELL;
  const visStartRow = Math.max(0, y - 2); // convert to visible
  const trailTop = PF_Y + Math.max(0, y - 2) * CELL;
  const trailH = (gy - y) * CELL;
  dropTrail = {
    x: px, y: PF_Y + (y - 2) * CELL,
    h: trailH + CELL,
    color: PIECES[type].color,
    timer: 0.1
  };
  activePiece.y = gy;
  lockPiece();
}

function doHold() {
  if (!activePiece || holdUsed) return;
  holdUsed = true;
  playTone(300, 'square', 0.04, 0.1, 500);
  const curType = activePiece.type;
  if (holdPiece === null) {
    holdPiece = curType;
    activePiece = null;
    spawnPiece(nextFromQueue());
  } else {
    const prev = holdPiece;
    holdPiece = curType;
    activePiece = null;
    spawnPiece(prev);
  }
}

function startGame() {
  initGrid();
  score = 0;
  lines = 0;
  level = startLevel;
  combo = 0;
  backToBack = false;
  holdPiece = null;
  holdUsed = false;
  pieceQueue = [];
  refillQueue();
  gravityTimer = 0;
  lockActive = false;
  softDropAccum = 0;
  softDropTimer = 0;
  gameOverNewBest = false;
  dropTrail = null;
  borderFlashTimer = 0;
  // DAS reset
  das.left.phase = null; das.right.phase = null;
  activePiece = null;
  spawnPiece(nextFromQueue());
  state = STATE.PLAYING;
}

// Input
document.addEventListener('keydown', e => {
  const was = keys[e.code];
  keys[e.code] = true;
  getAC();

  // Prevent scroll
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();

  if (state === STATE.TITLE) {
    if (e.code === 'Enter') startGame();
    if (e.code === 'ArrowLeft') startLevel = Math.max(0, startLevel - 1);
    if (e.code === 'ArrowRight') startLevel = Math.min(19, startLevel + 1);
    return;
  }
  if (state === STATE.GAME_OVER) {
    if (e.code === 'Enter') state = STATE.TITLE;
    return;
  }
  if (state === STATE.PAUSED) {
    if (e.code === 'KeyP' || e.code === 'Escape') state = STATE.PLAYING;
    return;
  }
  if (state === STATE.PLAYING) {
    if (e.code === 'KeyP' || e.code === 'Escape') { state = STATE.PAUSED; return; }

    // Edge-triggered actions
    if (!was) {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') doRotate(true);
      if (e.code === 'KeyZ' || e.code === 'ControlLeft' || e.code === 'ControlRight') doRotate(false);
      if (e.code === 'Space') doHardDrop();
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'KeyC') doHold();

      // DAS initial move
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        doMove(-1);
        das.left.phase = 'delay';
        das.left.dasTimer = 0;
      }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        doMove(1);
        das.right.phase = 'delay';
        das.right.dasTimer = 0;
      }
    }
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') { das.left.phase = null; das.left.dasTimer = 0; }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { das.right.phase = null; das.right.dasTimer = 0; }
});

// Drawing helpers
function lightenColor(hex, amount) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const nr = Math.min(255, Math.round(r + (255-r)*amount));
  const ng = Math.min(255, Math.round(g + (255-g)*amount));
  const nb = Math.min(255, Math.round(b + (255-b)*amount));
  return `rgb(${nr},${ng},${nb})`;
}
function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}

function drawBlock(x, y, color, alpha) {
  alpha = alpha !== undefined ? alpha : 1;
  ctx.globalAlpha = alpha;
  // Fill
  ctx.fillStyle = color;
  ctx.fillRect(x+1, y+1, 26, 26);
  // Highlight top/left
  ctx.fillStyle = lightenColor(color, 0.4);
  ctx.fillRect(x+1, y+1, 26, 2);
  ctx.fillRect(x+1, y+1, 2, 26);
  // Shadow bottom/right
  ctx.fillStyle = darkenColor(color, 0.7);
  ctx.fillRect(x+1, y+25, 26, 2);
  ctx.fillRect(x+25, y+1, 2, 26);
  ctx.globalAlpha = 1;
}

function drawGhostBlock(x, y, color) {
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x+2, y+2, 24, 24);
  ctx.globalAlpha = 1;
}

function cellToScreen(col, row) {
  // row 0-1 are hidden; row 2 = first visible row
  const sx = PF_X + col * CELL;
  const sy = PF_Y + (row - 2) * CELL;
  return [sx, sy];
}

function drawPlayfield() {
  // Background with alternating rows
  for (let r = 2; r < TOTAL_ROWS; r++) {
    const bg = (r % 2 === 0) ? '#111111' : '#131313';
    ctx.fillStyle = bg;
    ctx.fillRect(PF_X, PF_Y + (r-2)*CELL, COLS*CELL, CELL);
  }
  // Grid lines
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(PF_X + c*CELL, PF_Y);
    ctx.lineTo(PF_X + c*CELL, PF_Y + VISIBLE_ROWS*CELL);
    ctx.stroke();
  }
  for (let r = 1; r < VISIBLE_ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(PF_X, PF_Y + r*CELL);
    ctx.lineTo(PF_X + COLS*CELL, PF_Y + r*CELL);
    ctx.stroke();
  }
  // Border
  const borderColor = borderFlashTimer > 0 ? `rgba(255,255,255,${borderFlashTimer/0.2})` : '#333333';
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(PF_X, PF_Y, COLS*CELL, VISIBLE_ROWS*CELL);
}

function drawLockedBlocks() {
  for (let r = 2; r < TOTAL_ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (!cell) continue;
      // Check if this row is flashing
      let flashColor = null;
      if (state === STATE.LINE_CLEAR && lineClearPhase === 0 && lineClearRows.includes(r)) {
        flashColor = '#FFFFFF';
      }
      const [sx, sy] = cellToScreen(c, r);
      if (sy + CELL < PF_Y || sy > PF_Y + VISIBLE_ROWS*CELL) continue;
      drawBlock(sx, sy, flashColor || cell);
    }
  }
}

function drawActivePiece() {
  if (!activePiece) return;
  const { type, rot, x, y } = activePiece;
  const color = PIECES[type].color;
  // Ghost
  const gy = calcGhost();
  if (gy !== null && gy !== y) {
    for (const [c, r] of getCells(type, rot, x, gy)) {
      const [sx, sy] = cellToScreen(c, r);
      if (sy >= PF_Y - CELL && sy < PF_Y + VISIBLE_ROWS*CELL) {
        drawGhostBlock(sx, sy, color);
      }
    }
  }
  // Active piece
  for (const [c, r] of getCells(type, rot, x, y)) {
    const [sx, sy] = cellToScreen(c, r);
    if (sy >= PF_Y - CELL && sy < PF_Y + VISIBLE_ROWS*CELL) {
      drawBlock(sx, sy, color);
    }
  }
}

function drawDropTrail() {
  if (!dropTrail) return;
  ctx.globalAlpha = 0.15 * (dropTrail.timer / 0.1);
  ctx.fillStyle = dropTrail.color;
  ctx.fillRect(dropTrail.x, dropTrail.y, PIECES['I'] ? CELL : CELL*4, dropTrail.h);
  ctx.globalAlpha = 1;
}

function drawMiniPiece(type, rot, cx, cy, scale, alpha) {
  const cells = PIECES[type].rotations[rot];
  const color = PIECES[type].color;
  const size = PIECES[type].size;
  const cellSize = CELL * scale;
  const totalW = size * cellSize;
  const totalH = size * cellSize;
  const ox = cx - totalW / 2;
  const oy = cy - totalH / 2;
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;
  for (const [c, r] of cells) {
    const bx = ox + c * cellSize;
    const by = oy + r * cellSize;
    // Simplified block for preview
    ctx.fillStyle = color;
    ctx.fillRect(bx+1, by+1, cellSize-2, cellSize-2);
    ctx.fillStyle = lightenColor(color, 0.4);
    ctx.fillRect(bx+1, by+1, cellSize-2, 2);
    ctx.fillRect(bx+1, by+1, 2, cellSize-2);
  }
  ctx.globalAlpha = 1;
}

function drawRightPanel() {
  const rx = 320;

  // HOLD
  ctx.font = '13px monospace';
  ctx.fillStyle = '#888888';
  ctx.textAlign = 'left';
  ctx.fillText('HOLD', rx, 40);
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 1;
  ctx.strokeRect(rx, 44, 100, 66);
  ctx.fillStyle = '#111';
  ctx.fillRect(rx+1, 45, 99, 65);
  if (holdPiece) {
    const alpha = holdUsed ? 0.3 : 1;
    drawMiniPiece(holdPiece, 0, rx + 50, 77, 0.7, alpha);
  }

  // NEXT
  ctx.font = '13px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('NEXT', rx, 126);
  const nextPieces = pieceQueue.slice(0, 3);
  for (let i = 0; i < 3; i++) {
    const slotY = 130 + i * 60;
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 1;
    ctx.strokeRect(rx, slotY, 100, 56);
    ctx.fillStyle = '#111';
    ctx.fillRect(rx+1, slotY+1, 99, 55);
    if (nextPieces[i]) {
      drawMiniPiece(nextPieces[i], 0, rx + 50, slotY + 28, 0.7, 1);
    }
  }

  // Score area
  ctx.textAlign = 'left';
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('SCORE', rx, 330);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(score, rx, 348);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('BEST', rx, 378);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#555555';
  ctx.fillText(highScore, rx, 396);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('LINES', rx, 426);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(lines, rx, 444);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('LEVEL', rx, 474);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(level, rx, 492);
}

function drawTitleScreen(t) {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 480, 640);

  // Draw playfield outline dimmed
  ctx.globalAlpha = 0.3;
  drawPlayfield();
  ctx.globalAlpha = 1;

  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.fillText('TETRIS', 240, 100);

  // Piece showcase — 7 pieces in 2 rows
  const pieceOrder = PIECE_TYPES;
  for (let i = 0; i < 7; i++) {
    const col = i % 4;
    const row = Math.floor(i / 4);
    const px = 60 + col * 90;
    const py = 160 + row * 80;
    const rot = titleRots[i] % 4;
    drawMiniPiece(pieceOrder[i], rot, px, py, 0.65, 1);
  }

  // Press Enter
  const blink = Math.floor(t * 2) % 2 === 0;
  ctx.font = '20px monospace';
  ctx.fillStyle = blink ? '#AAAAAA' : '#333';
  ctx.textAlign = 'center';
  ctx.fillText('Press Enter to Start', 240, 400);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#555555';
  ctx.fillText('Best: ' + highScore, 240, 440);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('← Level ' + startLevel + ' →', 240, 470);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('↑/Z:Rotate  Space:HardDrop  Shift:Hold', 240, 510);
}

function drawGameOver(t) {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(PF_X, PF_Y, COLS*CELL, VISIBLE_ROWS*CELL);

  ctx.textAlign = 'center';
  ctx.font = '36px monospace';
  ctx.fillStyle = '#FF0000';
  ctx.fillText('GAME OVER', PF_X + COLS*CELL/2, 220);

  ctx.font = '22px monospace';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Score: ' + score, PF_X + COLS*CELL/2, 260);

  if (gameOverNewBest) {
    const pulse = 0.6 + 0.4*Math.sin(t*4);
    ctx.globalAlpha = pulse;
    ctx.font = '18px monospace';
    ctx.fillStyle = '#FFD740';
    ctx.fillText('NEW BEST!', PF_X + COLS*CELL/2, 290);
    ctx.globalAlpha = 1;
  }

  ctx.font = '16px monospace';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Lines: ' + lines + '  Level: ' + level, PF_X + COLS*CELL/2, 320);

  const blink = Math.floor(t * 2) % 2 === 0;
  ctx.font = '16px monospace';
  ctx.fillStyle = blink ? '#666666' : '#333';
  ctx.fillText('Enter to restart', PF_X + COLS*CELL/2, 370);
}

// Main loop
let lastTime = 0;
let totalTime = 0;

function update(dt) {
  if (state === STATE.TITLE) {
    titleBlinkTimer += dt;
    if (titleBlinkTimer > 0.5) { titleBlink = !titleBlink; titleBlinkTimer = 0; }
    titleRotTimer += dt;
    // One rotation per second per piece
    for (let i = 0; i < 7; i++) {
      titleRots[i] = Math.floor(totalTime * (0.8 + i * 0.1)) % 4;
    }
    return;
  }

  if (state === STATE.LINE_CLEAR) {
    lineClearTimer -= dt;
    if (lineClearTimer <= 0) {
      if (lineClearPhase === 0) {
        // Collapse rows
        for (const r of lineClearRows) {
          grid.splice(r, 1);
          grid.unshift(new Array(COLS).fill(null));
        }
        lineClearPhase = 1;
        lineClearTimer = 0.15;
      } else {
        // Done
        activePiece = null;
        spawnPiece(nextFromQueue());
        if (state === STATE.LINE_CLEAR) state = STATE.PLAYING;
      }
    }
    return; // freeze during line clear
  }

  if (state !== STATE.PLAYING) return;

  if (borderFlashTimer > 0) borderFlashTimer -= dt;

  // Drop trail
  if (dropTrail) {
    dropTrail.timer -= dt;
    if (dropTrail.timer <= 0) dropTrail = null;
  }

  // DAS
  for (const [dir, dx] of [['left',-1],['right',1]]) {
    const d = das[dir];
    const keyCode = dir === 'left' ? ['ArrowLeft','KeyA'] : ['ArrowRight','KeyD'];
    const held = keyCode.some(k => keys[k]);
    if (held && d.phase === 'delay') {
      d.dasTimer += dt * 1000;
      if (d.dasTimer >= 170) {
        d.phase = 'repeat';
        d.arrTimer = 0;
      }
    } else if (held && d.phase === 'repeat') {
      d.arrTimer += dt * 1000;
      while (d.arrTimer >= 50) {
        d.arrTimer -= 50;
        doMove(dx);
      }
    } else if (!held) {
      d.phase = null;
      d.dasTimer = 0;
    }
  }

  if (!activePiece) return;

  // Soft drop
  const softHeld = keys['ArrowDown'] || keys['KeyS'];
  if (softHeld) {
    const interval = Math.min(50, getLevelInterval(level) / 20);
    softDropAccum += dt * 1000;
    while (softDropAccum >= interval) {
      softDropAccum -= interval;
      if (isValid(activePiece.type, activePiece.rot, activePiece.x, activePiece.y + 1)) {
        activePiece.y++;
        score++;
        gravityTimer = 0;
      } else {
        softDropAccum = 0;
        break;
      }
    }
  } else {
    softDropAccum = 0;
  }

  // Gravity
  const interval = getLevelInterval(level) / 1000;
  gravityTimer += dt;
  let gravIter = 0;
  while (gravityTimer >= interval && gravIter < 3) {
    gravityTimer -= interval;
    gravIter++;
    if (isValid(activePiece.type, activePiece.rot, activePiece.x, activePiece.y + 1)) {
      activePiece.y++;
      if (lockActive) { lockActive = false; lockTimer = 0; }
    } else {
      // On surface
      if (!lockActive) {
        lockActive = true;
        lockTimer = 0;
      }
    }
  }

  // Lock delay
  if (lockActive && activePiece) {
    if (isValid(activePiece.type, activePiece.rot, activePiece.x, activePiece.y + 1)) {
      // No longer on surface
      lockActive = false;
      lockTimer = 0;
    } else {
      lockTimer += dt * 1000;
      if (lockTimer >= 500 || lockResets >= 15) {
        lockPiece();
        lockActive = false;
        lockTimer = 0;
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 480, 640);

  if (state === STATE.TITLE) {
    drawTitleScreen(totalTime);
    return;
  }

  drawPlayfield();
  drawLockedBlocks();

  if (state !== STATE.LINE_CLEAR) {
    drawActivePiece();
  }

  drawDropTrail();
  drawRightPanel();

  if (state === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(PF_X, PF_Y, COLS*CELL, VISIBLE_ROWS*CELL);
    ctx.font = '36px monospace';
    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', PF_X + COLS*CELL/2, 310);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#888888';
    ctx.fillText('P to resume', PF_X + COLS*CELL/2, 345);
  }

  if (state === STATE.GAME_OVER) {
    drawLockedBlocks();
    drawGameOver(totalTime);
    drawRightPanel();
  }
}

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  totalTime += dt;
  update(dt);
  draw();
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

})();
</script>
