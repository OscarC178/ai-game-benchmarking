<canvas id="c" width="480" height="640"></canvas>
<script>
(()=>{
const C=document.getElementById('c'),X=C.getContext('2d');
const CW=480,CH=640,CELL=28,PX=24,PY=44,W=10,H=22,V=20;
const COLORS={I:'#00F0F0',O:'#F0F000',T:'#A000F0',S:'#00F000',Z:'#F00000',J:'#0000F0',L:'#F0A000'};
const PIECES=['I','O','T','S','Z','J','L'];
const BASE=[100,300,500,800];
const KICKS={norm:{'0>1':[[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],'1>0':[[0,0],[1,0],[1,1],[0,-2],[1,-2]],'1>2':[[0,0],[1,0],[1,1],[0,-2],[1,-2]],'2>1':[[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],'2>3':[[0,0],[1,0],[1,-1],[0,2],[1,2]],'3>2':[[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],'3>0':[[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],'0>3':[[0,0],[1,0],[1,-1],[0,2],[1,2]]},I:{'0>1':[[0,0],[-2,0],[1,0],[-2,1],[1,-2]],'1>0':[[0,0],[2,0],[-1,0],[2,-1],[-1,2]],'1>2':[[0,0],[-1,0],[2,0],[-1,-2],[2,1]],'2>1':[[0,0],[1,0],[-2,0],[1,2],[-2,-1]],'2>3':[[0,0],[2,0],[-1,0],[2,-1],[-1,2]],'3>2':[[0,0],[-2,0],[1,0],[-2,1],[1,-2]],'3>0':[[0,0],[1,0],[-2,0],[1,2],[-2,-1]],'0>3':[[0,0],[-1,0],[2,0],[-1,-2],[2,1]]}};
const SHAPES={
I:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],
O:[[[1,1],[2,1],[1,2],[2,2]]],
T:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],
S:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]],
Z:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]],
J:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],
L:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]]
};
let keys=Object.create(null),prevKeys=Object.create(null),last=performance.now(),running=true,paused=false,state='TITLE';
let levelSel=0,best=+localStorage.getItem('tetris_best')||0,score=0,lines=0,level=0,combo=0,backToBack=false;
let queue=[],hold=null,holdUsed=false,gravityAcc=0,lockAcc=0,lockResets=0,lineClearT=0,lineClearRows=[],lineClearAnim=0,levelFlash=0,gameOverT=0;
let bag=[],active=null,ghost=null,hardDropTrail=0,softDropPts=0,gameOverBlink=0,titleBlink=0,titleSpin=0;
let das={L:{held:false,t:0,phase:null,arr:0,moved:false},R:{held:false,t:0,phase:null,arr:0,moved:false}};
let audio=null;
const grid=Array.from({length:H},()=>Array(W).fill(null));
function acq(){if(audio)return; try{audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){audio=null;}}
function tone(seq){if(!audio)return; const t=audio.currentTime; for(const s of seq){const o=audio.createOscillator(),g=audio.createGain(); o.type=s.type||'square'; o.frequency.setValueAtTime(s.f0,t+(s.dl||0)/1000); if(s.f1!=null)o.frequency.exponentialRampToValueAtTime(s.f1,t+(s.dl||0+s.du)/1000); g.gain.setValueAtTime(s.g||0.2,t+(s.dl||0)/1000); g.gain.exponentialRampToValueAtTime(0.001,t+(s.dl||0+s.du)/1000); o.connect(g).connect(audio.destination); o.start(t+(s.dl||0)/1000); o.stop(t+(s.dl||0+s.du)/1000+0.03);} }
const SFX={move:()=>tone([{f0:200,du:20,g:0.08,type:'square'}]),rot:()=>tone([{f0:400,du:30,g:0.12,type:'square'}]),soft:()=>tone([{f0:100,du:15,g:0.06,type:'triangle'}]),hard:()=>tone([{f0:150,f1:80,du:80,g:0.25,type:'square'}]),lock:()=>tone([{f0:250,du:40,g:0.15,type:'square'}]),single:()=>tone([{f0:500,du:100,g:0.2,type:'square'}]),double:()=>tone([{f0:600,du:120,g:0.22,type:'square'}]),triple:()=>tone([{f0:700,du:140,g:0.24,type:'square'}]),tetris:()=>tone([{f0:523,du:50,g:0.28,type:'square'},{f0:659,du:50,g:0.28,dl:50,type:'square'},{f0:784,du:50,g:0.28,dl:100,type:'square'},{f0:1047,du:50,g:0.28,dl:150,type:'square'}]),level:()=>tone([{f0:400,f1:800,du:250,g:0.2,type:'sawtooth'}]),hold:()=>tone([{f0:300,f1:500,du:40,g:0.1,type:'square'}]),gameover:()=>tone([{f0:300,f1:60,du:800,g:0.3,type:'square'}]),best:()=>tone([{f0:523,du:80,g:0.22,type:'sine'},{f0:659,du:80,g:0.22,dl:80,type:'sine'},{f0:784,du:80,g:0.22,dl:160,type:'sine'},{f0:1047,du:80,g:0.22,dl:240,type:'sine'}])};
function randInt(n){return Math.floor(Math.random()*n)}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=randInt(i+1); [a[i],a[j]]=[a[j],a[i]];} return a;}
function refillBag(){const b=shuffle(PIECES.slice()); bag.push(...b);}
function ensureQueue(){while(queue.length<7){if(bag.length===0)refillBag(); queue.push(bag.shift());}}
function cellCoords(type,rot){return SHAPES[type][type==='O'?0:rot%4];}
function pieceCells(type,rot,x,y){return cellCoords(type,rot).map(([cx,cy])=>[x+cx,y+cy]);}
function currentLevel(){return Math.min(29,levelSel + Math.floor(lines/10));}
function gravityMs(){const lv=currentLevel(); const table=[800,717,633,550,467,383,300,217,133,100,83,67,50,33,17]; if(lv>=29) return 17; if(lv<=0) return 800; if(lv<10) return table[lv]; if(lv<=12) return 83; if(lv<=15) return 67; if(lv<=18) return 50; if(lv<=28) return 33; return 17;}
function spawnPiece(){ensureQueue(); const type=queue.shift(); ensureQueue(); active={type,rot:0,x:type==='I'?3:3,y:20,spawnX:3,spawnY:20}; holdUsed=false; if(!isValid(active.type,active.rot,active.x,active.y)){state='GAME_OVER'; SFX.gameover(); if(score>best){best=score; localStorage.setItem('tetris_best',best); SFX.best();} } ghost=calcGhost(); gravityAcc=0; lockAcc=0; lockResets=0; }
function isValid(type,rot,x,y){for(const [cx,cy] of pieceCells(type,rot,x,y)){if(cx<0||cx>=W||cy<0||cy>=H) return false; if(grid[cy][cx]) return false;} return true;}
function calcGhost(){if(!active) return null; let y=active.y; while(isValid(active.type,active.rot,active.x,y-1)) y--; return {type:active.type,rot:active.rot,x:active.x,y};}
function move(dx,dy){if(!active||state!=='PLAYING') return false; const nx=active.x+dx, ny=active.y+dy; if(isValid(active.type,active.rot,nx,ny)){active.x=nx; active.y=ny; SFX.move(); ghost=calcGhost(); if(!isSupported()) lockAcc=500, lockResets=Math.min(15,lockResets+1); return true;} return false;}
function isSupported(){return !isValid(active.type,active.rot,active.x,active.y-1);}
function rotate(dir){if(!active||state!=='PLAYING') return false; const from=active.rot, to=(from+dir+4)%4; const table=active.type==='I'?KICKS.I:KICKS.norm; const key=from+'>'+to; const tests=table[key]||[[0,0]]; for(const [ox,oy] of tests){const ny=active.y-oy, nx=active.x+ox; if(isValid(active.type,to,nx,ny)){active.x=nx; active.y=ny; active.rot=to; SFX.rot(); ghost=calcGhost(); if(!isSupported()) lockAcc=500, lockResets=Math.min(15,lockResets+1); return true;}} return false;}
function lockPiece(){for(const [cx,cy] of pieceCells(active.type,active.rot,active.x,active.y)) grid[cy][cx]=COLORS[active.type]; SFX.lock(); const cleared=[]; for(let y=0;y<H;y++){if(grid[y].every(v=>v)) cleared.push(y);} if(cleared.length){lineClearRows=cleared; lineClearT=0.3; lineClearAnim=0.3; state='LINE_CLEAR';} else {combo=0; nextPiece();}}
function nextPiece(){updateBest(); active=null; spawnPiece(); gravityAcc=0; lockAcc=0; }
function updateBest(){if(score>best){best=score; localStorage.setItem('tetris_best',best);}}
function addScoreForClear(n){const mult=currentLevel()+1; let base=BASE[n-1]*mult; if(n===4&&backToBack) base=Math.floor(base*1.5); if(n===4) backToBack=true; else backToBack=false; combo = n?combo+1:0; score += base + (n?50*combo*mult:0); if(n===1) SFX.single(); else if(n===2) SFX.double(); else if(n===3) SFX.triple(); else if(n===4) SFX.tetris(); if(score>best){best=score; localStorage.setItem('tetris_best',best); SFX.best();} if(lines>=10*(currentLevel()+1)) {levelFlash=0.2; SFX.level();}}
function clearLines(){const rows=[...lineClearRows].sort((a,b)=>a-b); const count=rows.length; const newGrid=[]; for(let y=0;y<H;y++) if(!rows.includes(y)) newGrid.push(grid[y]); while(newGrid.length<H) newGrid.push(Array(W).fill(null)); for(let y=0;y<H;y++) grid[y]=newGrid[y]; lines+=count; addScoreForClear(count); if(lines>=10*(levelSel+Math.floor(lines/10))){/*noop*/} }
function hardDrop(){if(!active||state!=='PLAYING') return; const g=calcGhost(); const dist=active.y-g.y; if(dist>0){score += dist*2; hardDropTrail=0.1; active.y=g.y; SFX.hard(); if(score>best){best=score; localStorage.setItem('tetris_best',best); SFX.best();}} lockPiece();}
function holdPiece(){if(!active||state!=='PLAYING'||holdUsed) return; SFX.hold(); const cur=active.type; if(hold===null){hold=cur; spawnPiece();} else {const tmp=hold; hold=cur; active={type:tmp,rot:0,x:tmp==='I'?3:3,y:20,spawnX:3,spawnY:20}; if(!isValid(active.type,active.rot,active.x,active.y)){state='GAME_OVER'; SFX.gameover(); return;} ghost=calcGhost();} holdUsed=true;}
function startGame(){score=0; lines=0; combo=0; backToBack=false; levelSel=levelSel; hold=null; holdUsed=false; queue=[]; bag=[]; refillBag(); ensureQueue(); clearGrid(); for(let i=0;i<7;i++) ensureQueue(); spawnPiece(); state='PLAYING'; paused=false; gravityAcc=0; lockAcc=0; lockResets=0;}
function clearGrid(){for(let y=0;y<H;y++)grid[y].fill(null);}
function softDropStep(){if(move(0,-1)){score+=1; SFX.soft(); updateBest(); return true;} return false;}
function processDAS(dt){for(const side of ['L','R']){const code=side==='L'?['ArrowLeft','KeyA']:['ArrowRight','KeyD']; const down=code.some(k=>keys[k]); const obj=das[side]; if(down&&!obj.held){obj.held=true; obj.t=0; obj.phase='delay'; obj.arr=0; if(move(side==='L'?-1:1,0)){} } else if(down&&obj.held){obj.t+=dt*1000; if(obj.phase==='delay'&&obj.t>=170){obj.phase='repeat'; obj.arr=0;} if(obj.phase==='repeat'){obj.arr+=dt*1000; while(obj.arr>=50){if(!move(side==='L'?-1:1,0)) break; obj.arr-=50;}} } else {obj.held=false; obj.t=0; obj.phase=null; obj.arr=0;} }}
function lineClearUpdate(dt){lineClearT-=dt; if(lineClearT<=0){clearLines(); state='PLAYING'; spawnPiece();}}
function titleUpdate(dt){titleBlink+=dt; titleSpin+=dt;}
function gameOverUpdate(dt){gameOverBlink+=dt;}
function update(dt){if(paused) return; if(state==='TITLE'){titleUpdate(dt); return;} if(state==='LINE_CLEAR'){lineClearUpdate(dt); return;} if(state==='GAME_OVER'){gameOverUpdate(dt); return;} if(state!=='PLAYING'||!active) return;
 processDAS(dt);
 if(keys['ArrowDown']||keys['KeyS']){gravityAcc+=dt*20; while(gravityAcc>=gravityMs()/20){if(softDropStep()) gravityAcc-=gravityMs()/20; else break;}}
 gravityAcc+=dt*1000;
 const g=gravityMs(); let cap=0; while(gravityAcc>=g && cap<2){gravityAcc-=g; cap++; if(isValid(active.type,active.rot,active.x,active.y-1)){active.y--; lockAcc=0; } else {lockAcc+=g; if(lockAcc>=500 || lockResets>=15){lockPiece(); return;} }}
 if(!isSupported()) lockAcc+=dt*1000; else lockAcc=0;
 if(lockAcc>=500){lockPiece(); return;}
 if(hardDropTrail>0) hardDropTrail=Math.max(0,hardDropTrail-dt);
 if(levelFlash>0) levelFlash-=dt;
 if(active){ghost=calcGhost();}
 if(currentLevel()>level){level= currentLevel(); SFX.level();}
}
function keyEdge(code){return keys[code]&&!prevKeys[code];}
function frame(now){const dt=Math.min(0.05,(now-last)/1000); last=now; if(state==='TITLE'){if(keyEdge('Enter')){state='PLAYING'; startGame();} if(keyEdge('ArrowLeft')) levelSel=Math.max(0,levelSel-1); if(keyEdge('ArrowRight')) levelSel=Math.min(19,levelSel+1);} else if(state==='GAME_OVER'){if(keyEdge('Enter')){state='TITLE'; clearGrid(); score=0; lines=0; combo=0; backToBack=false; hold=null; queue=[]; bag=[]; refillBag(); ensureQueue(); levelSel=0;}} if(keyEdge('KeyP')||keyEdge('Escape')){if(state==='PLAYING'||state==='LINE_CLEAR') paused=true, state='PAUSED'; else if(state==='PAUSED') paused=false, state='PLAYING';}
 if(!paused){if(state==='PLAYING'||state==='LINE_CLEAR') update(dt);}
 render(); prevKeys={...keys}; requestAnimationFrame(frame); }
function render(){X.clearRect(0,0,CW,CH); X.fillStyle='#0a0a0a'; X.fillRect(0,0,CW,CH); drawPanels(); drawPlayfield(); if(state==='TITLE') drawTitle(); if(state==='PAUSED') drawPause(); if(state==='GAME_OVER') drawGameOver();}
function drawPanels(){X.fillStyle='#111'; X.fillRect(PX,PY,W*CELL,H*CELL); for(let y=0;y<H;y++){X.fillStyle=y%2?'#131313':'#111111'; X.fillRect(PX,PY+y*CELL,W*CELL,CELL);} X.strokeStyle=levelFlash>0?'#fff':'#333'; X.lineWidth=2; X.strokeRect(PX-1,PY-1,W*CELL+2,H*CELL+2); X.strokeStyle='#222'; X.lineWidth=1; for(let x=0;x<=W;x++){X.beginPath(); X.moveTo(PX+x*CELL+.5,PY); X.lineTo(PX+x*CELL+.5,PY+H*CELL); X.stroke();} for(let y=0;y<=H;y++){X.beginPath(); X.moveTo(PX,PY+y*CELL+.5); X.lineTo(PX+W*CELL,PY+y*CELL+.5); X.stroke();} drawUI(); }
function drawCell(cx,cy,col,alpha=1){const x=PX+cx*CELL+1,y=PY+cy*CELL+1,s=CELL-2; X.save(); X.globalAlpha=alpha; X.fillStyle=col; X.fillRect(x,y,s,s); const light=shade(col,1.4),dark=shade(col,0.7); X.fillStyle=light; X.fillRect(x,y,s,2); X.fillRect(x,y,2,s); X.fillStyle=dark; X.fillRect(x,y+s-2,s,2); X.fillRect(x+s-2,y,2,s); X.restore();}
function shade(hex,m){const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; const f=v=>Math.max(0,Math.min(255,Math.round(v*m))); return `rgb(${f(r)},${f(g)},${f(b)})`;}
function drawPiece(type,rot,x,y,scale=1,alpha=1,outline=false){const cells=pieceCells(type,rot,x,y); X.save(); X.globalAlpha=alpha; for(const [cx,cy] of cells){const px=PX+cx*CELL+1+(CELL-2)*(1-scale)/2, py=PY+cy*CELL+1+(CELL-2)*(1-scale)/2, s=(CELL-2)*scale; if(outline){X.strokeStyle=COLORS[type]; X.strokeRect(px,py,s,s);} else drawScaled(px,py,s,COLORS[type],1);} X.restore();}
function drawScaled(x,y,s,col,a){X.save(); X.globalAlpha=a; X.fillStyle=col; X.fillRect(x,y,s,s); const light=shade(col,1.4),dark=shade(col,0.7); X.fillStyle=light; X.fillRect(x,y,s,2); X.fillRect(x,y,2,s); X.fillStyle=dark; X.fillRect(x,y+s-2,s,2); X.fillRect(x+s-2,y,2,s); X.restore();}
function drawGhost(){if(!ghost) return; const cells=pieceCells(ghost.type,ghost.rot,ghost.x,ghost.y); for(const [cx,cy] of cells){const x=PX+cx*CELL+3,y=PY+cy*CELL+3,s=CELL-6; X.save(); X.globalAlpha=0.2; X.strokeStyle=COLORS[ghost.type]; X.lineWidth=2; X.strokeRect(x,y,s,s); X.restore();}}
function drawPlayfield(){if(state!=='TITLE') drawGhost(); if(hardDropTrail>0&&active){const gy=ghost?ghost.y:active.y; const cells=pieceCells(active.type,active.rot,active.x,active.y); for(const [cx,cy] of cells){const top=PY+Math.min(cy,gy)*CELL+1, bottom=PY+Math.max(cy,gy)*CELL+1; X.save(); X.globalAlpha=0.15; X.fillStyle=COLORS[active.type]; X.fillRect(PX+cx*CELL+1,top,CELL-2,bottom-top+CELL-2); X.restore();}} for(let y=0;y<H;y++)for(let x=0;x<W;x++) if(grid[y][x]) drawCell(x,y,grid[y][x]); if(active && state!=='GAME_OVER' && state!=='TITLE'){drawPiece(active.type,active.rot,active.x,active.y,1,1);} if(state==='LINE_CLEAR'){for(const r of lineClearRows){X.fillStyle='rgba(255,255,255,0.65)'; X.fillRect(PX,PY+r*CELL,W*CELL,CELL);}} }
function drawUI(){X.fillStyle='#888'; X.font='13px monospace'; X.textAlign='left'; X.fillText('HOLD',320,40); X.fillText('NEXT',320,126); X.fillText('SCORE',320,330); X.fillText('BEST',320,378); X.fillText('LINES',320,426); X.fillText('LEVEL',320,474); drawBox(320,44,100,66); drawBox(320,130,100,56); drawBox(320,190,100,56); drawBox(320,250,100,56); drawHold(); drawNext(); X.fillStyle='#fff'; X.font='18px monospace'; X.fillText(score,320,348); X.fillStyle='#555'; X.fillText(best,320,396); X.fillStyle='#fff'; X.fillText(lines,320,444); X.fillText(currentLevel(),320,492);}
function drawBox(x,y,w,h){X.strokeStyle='#333'; X.strokeRect(x,y,w,h);} 
function slotPiece(type,x,y,w,h,alpha=1){const cells=cellCoords(type,0); let minX=999,maxX=-999,minY=999,maxY=-999; cells.forEach(([cx,cy])=>{minX=Math.min(minX,cx);maxX=Math.max(maxX,cx);minY=Math.min(minY,cy);maxY=Math.max(maxY,cy);}); const pw=maxX-minX+1, ph=maxY-minY+1; const s=Math.min((w-10)/pw,(h-10)/ph)*0.7*CELL/28; const ox=x+(w-pw*CELL*0.7)/2, oy=y+(h-ph*CELL*0.7)/2; X.save(); X.globalAlpha=alpha; for(const [cx,cy] of cells){drawScaled(ox+(cx-minX)*CELL*0.7+1,oy+(cy-minY)*CELL*0.7+1,CELL*0.7-2,COLORS[type],alpha);} X.restore();}
function drawHold(){if(!hold) return; slotPiece(hold,320,44,100,66,holdUsed?0.3:1);} 
function drawNext(){ensureQueue(); for(let i=0;i<3;i++) slotPiece(queue[i],320,130+i*60,100,56,1);}
function drawTitle(){X.save(); X.textAlign='center'; X.fillStyle='#fff'; X.font='48px monospace'; X.fillText('TETRIS',CW/2,180); titleSpawnShowcase(); const pulse=0.3+0.7*(0.5+0.5*Math.sin(titleBlink*Math.PI)); X.globalAlpha=pulse; X.fillStyle='#aaa'; X.font='20px monospace'; X.fillText('Press Enter to Start',CW/2,400); X.globalAlpha=1; X.font='16px monospace'; X.fillStyle='#555'; X.fillText('Best: '+best,CW/2,440); X.fillStyle='#888'; X.fillText('← Level '+levelSel+' →',CW/2,470); X.restore(); }
function titleSpawnShowcase(){const xs=[110,180,250,320,390,140,320], ys=[240,240,240,240,240,300,300], types=['I','O','T','S','Z','J','L']; for(let i=0;i<7;i++){const rot=Math.floor(titleSpin)% (types[i]==='O'?1:4); const type=types[i]; const cells=pieceCells(type,rot,0,0); const minX=Math.min(...cells.map(c=>c[0])), minY=Math.min(...cells.map(c=>c[1])); const scale=0.75; const box=type==='I'?4:3; const sx=xs[i], sy=ys[i]; for(const [cx,cy] of cells){drawScaled(sx+(cx-minX)*CELL*0.6,sy+(cy-minY)*CELL*0.6,CELL*0.6-2,COLORS[type],1);} }}
function drawPause(){X.fillStyle='rgba(0,0,0,0.7)'; X.fillRect(PX,PY,W*CELL,H*CELL); X.fillStyle='#fff'; X.textAlign='center'; X.font='36px monospace'; X.fillText('PAUSED',PX+W*CELL/2,PY+H*CELL/2); X.font='14px monospace'; X.fillStyle='#888'; X.fillText('P to resume',PX+W*CELL/2,PY+H*CELL/2+30);} 
function drawGameOver(){X.save(); X.fillStyle='rgba(0,0,0,0.1)'; X.fillRect(PX,PY,W*CELL,H*CELL); X.textAlign='center'; X.fillStyle='#f00'; X.font='36px monospace'; X.fillText('GAME OVER',PX+W*CELL/2,PY+220); X.fillStyle='#fff'; X.font='22px monospace'; X.fillText('Score: '+score,PX+W*CELL/2,PY+260); if(score>=best){X.fillStyle='#ffd740'; X.globalAlpha=0.5+0.5*Math.sin(gameOverBlink*Math.PI); X.font='18px monospace'; X.fillText('NEW BEST!',PX+W*CELL/2,PY+290); X.globalAlpha=1;} X.fillStyle='#aaa'; X.font='16px monospace'; X.fillText('Lines: '+lines,PX+W*CELL/2,PY+320); X.fillText('Level: '+currentLevel(),PX+W*CELL/2,PY+345); if(Math.floor(performance.now()/250)%2===0){X.fillStyle='#666'; X.fillText('Enter to restart',PX+W*CELL/2,PY+390);} X.restore(); }
function hardDropToGhost(){if(!active) return; const g=calcGhost(); const dy=active.y-g.y; if(dy>0){score+=dy*2;} hardDropTrail=0.1; active.y=g.y; SFX.hard(); lockPiece(); }
addEventListener('keydown',e=>{keys[e.code]=true; acq(); if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','KeyZ','ControlLeft','ControlRight','Space','ShiftLeft','ShiftRight','KeyC','Enter','KeyP','Escape'].includes(e.code)) e.preventDefault(); if(e.code==='Enter'){if(state==='TITLE'){clearGrid(); score=0; lines=0; combo=0; backToBack=false; hold=null; queue=[]; bag=[]; refillBag(); ensureQueue(); state='PLAYING'; spawnPiece();} else if(state==='GAME_OVER'){state='TITLE'; clearGrid(); score=0; lines=0; combo=0; backToBack=false; hold=null; queue=[]; bag=[]; refillBag(); ensureQueue();} } if(state==='PLAYING'){if(e.code==='ArrowUp'||e.code==='KeyW'){rotate(1);} if(e.code==='KeyZ'||e.code==='ControlLeft'||e.code==='ControlRight'){rotate(3);} if(e.code==='Space'&& !prevKeys['Space']) hardDropToGhost(); if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyC'){if(!prevKeys[e.code]) holdPiece();} }});
addEventListener('keyup',e=>{keys[e.code]=false;});
ensureQueue(); spawnPiece(); state='TITLE';
requestAnimationFrame(function loop(now){let dt=Math.min(0.05,(now-last)/1000); last=now; update(dt); if(state==='PLAYING'&&active){if(keys['KeyP']||keys['Escape']){} } if(state==='TITLE') titleBlink+=dt; if(levelFlash>0) levelFlash-=dt; render(); prevKeys={...keys}; requestAnimationFrame(loop);});
})();
</script>
