<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pac-Man</title>
<style>
  body {
    background: #222;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: monospace;
  }
  canvas {
    background: #000;
    image-rendering: pixelated;
    box-shadow: 0 0 10px rgba(0,0,0,0.8);
  }
</style>

<body>
<canvas id="gameCanvas" width="448" height="576"></canvas>

<script>
// --- AUDIO SYSTEM ---
const Audio = (function() {
  let ctx = null;
  
  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }

  function playTone(freqStart, freqEnd, type, duration, vol=0.1) {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, ctx.currentTime);
    if (freqEnd) {
      osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + duration);
    }
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + duration);
  }

  let chompHigh = false;

  return {
    init,
    chomp: () => {
      playTone(chompHigh ? 250 : 200, null, 'square', 0.05, 0.05);
      chompHigh = !chompHigh;
    },
    power: () => playTone(100, 400, 'square', 0.2, 0.05),
    eatGhost: () => playTone(800, 200, 'sawtooth', 0.3, 0.1),
    fruit: () => {
      playTone(400, 800, 'square', 0.1, 0.05);
      setTimeout(()=>playTone(800, 1200, 'square', 0.1, 0.05), 100);
    },
    death: () => {
      let t = 0;
      for(let i=0; i<15; i++) {
        setTimeout(()=>playTone(300 - i*15, null, 'sawtooth', 0.1, 0.1), t);
        t += 100;
      }
    },
    extraLife: () => {
      [400, 500, 600, 800].forEach((f, i) => {
        setTimeout(()=>playTone(f, null, 'square', 0.1, 0.1), i*120);
      });
    }
  };
})();

// --- CONSTANTS & MAP ---
const canvas = document.getElementById('gameCanvas');
const context = canvas.getContext('2d');

const TILE = 16;
const COLS = 28;
const ROWS = 36;
const MAZE_ROW_OFFSET = 3;

// Directions
const NONE = -1; const UP = 0; const LEFT = 1; const DOWN = 2; const RIGHT = 3;
const DX = [0, -1, 0, 1];
const DY = [-1, 0, 1, 0];

const rawMap = [
  "1111111111111111111111111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1311112111112112111112111131",
  "1211112111112112111112111121",
  "1222222222222222222222222221",
  "1211112112111111112112111121",
  "1211112112111111112112111121",
  "1222222112222112222112222221",
  "1111112111110110111112111111",
  "1111112111110110111112111111",
  "1111112110000000000112111111",
  "1111112110111441110112111111",
  "1111112110100000010112111111",
  "5000002000100000010002000005",
  "1111112110100000010112111111",
  "1111112110111111110112111111",
  "1111112110000000000112111111",
  "1111112110111111110112111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1211112111112112111112111121",
  "1322112222222002222222112231",
  "1112112112111111112112112111",
  "1112112112111111112112112111",
  "1222222112222112222112222221",
  "1211111111112112111111111121",
  "1211111111112112111111111121",
  "1222222222222202222222222221",
  "1111111111111111111111111111",
  "1111111111111111111111111111"
];

let baseGrid = []; // holds 0:empty, 1:wall, 4:door, 5:tunnel
let dotGrid = [];  // holds 0:none, 2:dot, 3:power
let totalDots = 0;

function initMap() {
  baseGrid = [];
  dotGrid = [];
  totalDots = 0;
  for (let r = 0; r < rawMap.length; r++) {
    baseGrid[r] = [];
    dotGrid[r] = [];
    for (let c = 0; c < rawMap[r].length; c++) {
      let val = parseInt(rawMap[r][c], 10);
      if (val === 1) { baseGrid[r][c] = 1; dotGrid[r][c] = 0; }
      else if (val === 4) { baseGrid[r][c] = 4; dotGrid[r][c] = 0; }
      else if (val === 5) { baseGrid[r][c] = 5; dotGrid[r][c] = 0; }
      else if (val === 2) { baseGrid[r][c] = 0; dotGrid[r][c] = 2; totalDots++; }
      else if (val === 3) { baseGrid[r][c] = 0; dotGrid[r][c] = 3; totalDots++; }
      else { baseGrid[r][c] = 0; dotGrid[r][c] = 0; }
    }
  }
}

// "no-upward" zones for ghosts
function isNoUpZone(tx, ty) {
  return (ty === 11 && (tx === 12 || tx === 15));
}

// --- STATE ---
// ATTRACT, PLAYING, DYING, LEVEL_COMPLETE, GAME_OVER
let gameState = 'ATTRACT';
let playSubState = 'NORMAL'; // READY, NORMAL
let stateTimer = 0;
let level = 1;
let score = 0;
let highScore = parseInt(localStorage.getItem('pacmanHigh')) || 0;
let lives = 3;
let extraLifeAwarded = false;
let dotsEaten = 0;

let freezeFrames = 0;
let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false };

window.addEventListener('keydown', e => {
  Audio.init();
  if (e.code in keys) { keys[e.code] = true; e.preventDefault(); }
  if (e.code === 'Enter') keys.Space = true;
  if (e.code === 'KeyW') keys.ArrowUp = true;
  if (e.code === 'KeyS') keys.ArrowDown = true;
  if (e.code === 'KeyA') keys.ArrowLeft = true;
  if (e.code === 'KeyD') keys.ArrowRight = true;
  
  if (e.code === 'KeyP') paused = !paused;
});

window.addEventListener('keyup', e => {
  if (e.code in keys) keys[e.code] = false;
  if (e.code === 'Enter') keys.Space = false;
  if (e.code === 'KeyW') keys.ArrowUp = false;
  if (e.code === 'KeyS') keys.ArrowDown = false;
  if (e.code === 'KeyA') keys.ArrowLeft = false;
  if (e.code === 'KeyD') keys.ArrowRight = false;
});

// Level config
function getSpeedConfig() {
  let l = Math.min(level, 21);
  return {
    pac: l===1 ? 0.8 : (l<=4 ? 0.9 : 1.0),
    pacFright: l===1 ? 0.9 : (l<=4 ? 0.95 : 1.0),
    gh: l===1 ? 0.75 : (l<=4 ? 0.85 : 0.95),
    ghFright: l===1 ? 0.5 : (l<=4 ? 0.55 : 0.6),
    ghTunnel: l===1 ? 0.4 : (l<=4 ? 0.45 : 0.5),
    frightTime: l===1?6 : l===2?5 : l===3?4 : l===4?3 : (l===5||l===7||l===8)?2 : (l===6||l===10||l===11)?5 : (l===9||l===12||l===13||l===14||l>=15&&l<=18)?1 : 0
  };
}

let modeTimer = 0;
let modePhase = 0; 
let curMode = 'SCATTER'; // SCATTER, CHASE
let frightTimer = 0;
let ghostCombo = 0;
let globalDotCounter = 0;
let globalTimer = 0;
let useGlobalCounter = false;

// Actors
let pacman = {
  px: 0, py: 0, currTx: 0, currTy: 0, dir: LEFT, nextDir: LEFT, targetX: 0, targetY: 0, 
  mouthAngle: 0, mouthDir: 1
};

let ghosts = [];

function makeGhost(id, x, y, dx, dy, color, targetTileFn, scatterTile) {
  return {
    id, px: x * TILE + TILE/2, py: y * TILE + TILE/2, 
    currTx: x, currTy: y, targetX: x * TILE + TILE/2, targetY: y * TILE + TILE/2,
    dir: dx ? (dx>0 ? RIGHT : LEFT) : (dy>0 ? DOWN : UP), nextDir: NONE,
    color, targetTileFn, scatterTile,
    mode: 'IN_PEN', // IN_PEN, EXITING, NORMAL, FRIGHTENED, EYES
    bouncingDir: UP,
    dotCounter: 0,
    ptsFlash: 0
  };
}

function targetBlinky() { return [pacman.currTx, pacman.currTy]; }
function targetPinky() {
  let tx = pacman.currTx + DX[pacman.dir] * 4;
  let ty = pacman.currTy + DY[pacman.dir] * 4;
  if (pacman.dir === UP) tx -= 4; // Authentic bug
  return [tx, ty];
}
function targetInky() {
  let tx = pacman.currTx + DX[pacman.dir] * 2;
  let ty = pacman.currTy + DY[pacman.dir] * 2;
  if (pacman.dir === UP) tx -= 2;
  let bx = ghosts[0].currTx, by = ghosts[0].currTy; // Blinky
  return [tx + (tx - bx), ty + (ty - by)];
}
function targetClyde() {
  let tx = pacman.currTx, ty = pacman.currTy;
  let distSQ = Math.pow(ghosts[3].currTx - tx, 2) + Math.pow(ghosts[3].currTy - ty, 2);
  return distSQ > 64 ? [tx, ty] : ghosts[3].scatterTile;
}

function resetActors() {
  pacman.px = 13.5 * TILE + TILE/2;
  pacman.py = 23 * TILE + TILE/2;
  pacman.currTx = 13.5; pacman.currTy = 23;
  pacman.targetX = pacman.px; pacman.targetY = pacman.py;
  pacman.dir = LEFT; pacman.nextDir = LEFT;
  pacman.mouthAngle = 0;

  ghosts = [
    makeGhost(0, 13.5, 11, -1, 0, '#FF0000', targetBlinky, [25, 0]),
    makeGhost(1, 13.5, 14, 0, 1, '#FFB8FF', targetPinky, [2, 0]),
    makeGhost(2, 11.5, 14, 0, 1, '#00FFFF', targetInky, [27, 30]),
    makeGhost(3, 15.5, 14, 0, 1, '#FFB847', targetClyde, [0, 30])
  ];
  
  ghosts[0].mode = 'NORMAL';
  ghosts[0].currTx = 13; ghosts[0].currTy = 11;
}

function enterFrightened() {
  let cfg = getSpeedConfig();
  if (cfg.frightTime === 0) return; // level 19+
  frightTimer = cfg.frightTime * 60;
  ghostCombo = 0;
  for (let g of ghosts) {
    if (g.mode === 'NORMAL') {
      g.mode = 'FRIGHTENED';
      g.nextDir = getOpposite(g.dir);
      // force immediate reversal
      g.targetX = g.px; g.targetY = g.py; 
      g.dir = g.nextDir;
      applyDirection(g);
    }
  }
}

function getOpposite(d) {
  if (d === UP) return DOWN;
  if (d === DOWN) return UP;
  if (d === LEFT) return RIGHT;
  if (d === RIGHT) return LEFT;
  return NONE;
}

function getPhaseTimings() {
  let l = Math.min(level, 5);
  if (l === 1) return [420, 1200, 420, 1200, 300, 1200, 300, -1];
  if (l <= 4) return [420, 1200, 420, 1200, 300, 61980, 1, -1];
  return [300, 1200, 300, 1200, 300, 62220, 1, -1];
}

function checkGhostRelease() {
  if (globalTimer > (level===1?240:180)) {
    for (let g of ghosts) {
      if (g.mode === 'IN_PEN') {
        g.mode = 'EXITING';
        g.targetX = 13.5 * TILE + TILE/2;
        globalTimer = 0;
        return;
      }
    }
  }

  let limits = level===1 ? [0,0,30,60] : level===2 ? [0,0,0,50] : [0,0,0,0];
  
  for (let i=1; i<=3; i++) {
    let g = ghosts[i];
    if (g.mode === 'IN_PEN') {
      if (useGlobalCounter) {
         let gLim = i===1 ? 7 : i===2 ? 17 : 32;
         if (globalDotCounter >= gLim) { g.mode = 'EXITING'; g.targetX = 13.5*TILE+TILE/2; }
      } else {
         if (g.dotCounter >= limits[i]) { g.mode = 'EXITING'; g.targetX = 13.5*TILE+TILE/2; }
      }
      break; // check one at a time
    }
  }
}

let fruitTimer = 0;
let fruitActive = 0; 
function spawnFruit() {
  fruitActive = 540; // 9 seconds
}

// --- MOVEMENT & LOGIC ---

function isTileWalkable(tx, ty, isGhost) {
  if (tx < 0 || tx >= COLS) return true; // Tunnel
  if (ty < 0 || ty >= ROWS) return false;
  let val = baseGrid[ty][tx];
  if (val === 1) return false;
  if (val === 4) return isGhost;
  return true;
}

function applyDirection(ent) {
  ent.targetX = ent.px + DX[ent.dir] * TILE;
  ent.targetY = ent.py + DY[ent.dir] * TILE;
  ent.currTx = Math.floor(ent.px / TILE);
  ent.currTy = Math.floor(ent.py / TILE);
}

function moveEntity(ent, speedFrac) {
  let baseSpeed = 11.2; // approx 1 tile per 9 frames at 1.0
  let spd = baseSpeed * speedFrac;
  
  let dist = Math.abs(ent.px - ent.targetX) + Math.abs(ent.py - ent.targetY);
  
  if (dist <= spd) {
    ent.px = ent.targetX;
    ent.py = ent.targetY;
    
    // Tunnel wrap
    if (ent.px < -TILE) { ent.px = W + TILE/2; ent.targetX = ent.px; }
    if (ent.px > W + TILE) { ent.px = -TILE/2; ent.targetX = ent.px; }
    
    ent.currTx = Math.floor(ent.px / TILE);
    ent.currTy = Math.floor(ent.py / TILE);

    return true; // Reached center
  } else {
    ent.px += DX[ent.dir] * spd;
    ent.py += DY[ent.dir] * spd;
    return false;
  }
}

function updatePacman() {
  let tx = pacman.currTx; let ty = pacman.currTy;
  
  // Try turning if valid
  if (pacman.nextDir !== NONE && pacman.nextDir !== pacman.dir) {
    let nx = tx + DX[pacman.nextDir], ny = ty + DY[pacman.nextDir];
    if (isTileWalkable(nx, ty, false) && pacman.nextDir === getOpposite(pacman.dir)) {
      // Allow instant reverse
      pacman.dir = pacman.nextDir;
      applyDirection(pacman);
    }
  }

  let cfg = getSpeedConfig();
  let spd = frightTimer > 0 ? cfg.pacFright : cfg.pac;
  
  let atCenter = moveEntity(pacman, spd);
  
  if (atCenter) {
    tx = pacman.currTx; ty = pacman.currTy;
    
    // Eat dot
    if (tx >= 0 && tx < COLS && ty >= 0 && ty < rawMap.length) {
      if (dotGrid[ty][tx] === 2 || dotGrid[ty][tx] === 3) {
        let isPower = dotGrid[ty][tx] === 3;
        score += isPower ? 50 : 10;
        dotGrid[ty][tx] = 0;
        dotsEaten++;
        freezeFrames += isPower ? 3 : 1;
        Audio.chomp();
        
        if (isPower) {
          Audio.power();
          enterFrightened();
        }

        if (dotsEaten === 70 || dotsEaten === 170) spawnFruit();

        // Release counters
        if (useGlobalCounter) {
          globalDotCounter++;
        } else {
          for (let i=1; i<=3; i++) {
            if (ghosts[i].mode === 'IN_PEN') { ghosts[i].dotCounter++; break; }
          }
        }
        globalTimer = 0;
      }
      
      // Eat fruit
      if (fruitActive > 0 && tx === 13 && ty === 20) {
        fruitActive = 0;
        let p = [100,300,500,500,700,700,1000,1000,2000,2000,3000,3000][Math.min(level-1, 11)] || 5000;
        score += p;
        Audio.fruit();
      }
    }

    if (score >= 10000 && !extraLifeAwarded) {
      lives++; extraLifeAwarded = true; Audio.extraLife();
    }

    if (dotsEaten >= totalDots) {
      gameState = 'LEVEL_COMPLETE';
      stateTimer = 120;
    }

    // Try turn at center
    if (pacman.nextDir !== NONE) {
      let nx = tx + DX[pacman.nextDir], ny = ty + DY[pacman.nextDir];
      if (isTileWalkable(nx, ny, false)) {
        pacman.dir = pacman.nextDir;
      }
    }
    
    // Check blocked
    let bx = tx + DX[pacman.dir], by = ty + DY[pacman.dir];
    if (isTileWalkable(bx, by, false)) {
      applyDirection(pacman);
    } else {
      pacman.targetX = pacman.px; pacman.targetY = pacman.py; // stop
    }
  }

  // Anim
  if (pacman.px !== pacman.targetX || pacman.py !== pacman.targetY) {
    pacman.mouthAngle += 0.2 * pacman.mouthDir;
    if (pacman.mouthAngle > 0.8) pacman.mouthDir = -1;
    if (pacman.mouthAngle < 0) pacman.mouthDir = 1;
  } else {
    pacman.mouthAngle = 0.4;
  }
}

function updateGhost(g) {
  let cfg = getSpeedConfig();
  let spd = cfg.gh;
  
  if (g.mode === 'EYES') spd = 2.0;
  else if (baseGrid[g.currTy] && baseGrid[g.currTy][g.currTx] === 5) spd = cfg.ghTunnel;
  else if (g.mode === 'FRIGHTENED') spd = cfg.ghFright;
  else if (g.id === 0 && dotsEaten > totalDots - 20) spd = cfg.gh * 1.05; // Elroy approx
  
  if (g.mode === 'IN_PEN') {
    g.py += (g.bouncingDir === UP ? -1 : 1) * 0.5;
    if (g.py <= 14 * TILE) g.bouncingDir = DOWN;
    if (g.py >= 15 * TILE) g.bouncingDir = UP;
    return;
  }

  if (g.mode === 'EXITING') {
    if (Math.abs(g.px - g.targetX) > 1) {
      g.px += (g.targetX > g.px ? 1 : -1) * 1;
    } else {
      g.px = g.targetX;
      g.py -= 1;
      if (g.py <= 11 * TILE + TILE/2) {
        g.py = 11 * TILE + TILE/2;
        g.mode = 'NORMAL';
        g.dir = LEFT;
        applyDirection(g);
      }
    }
    return;
  }

  let atCenter = moveEntity(g, spd);
  
  if (atCenter) {
    if (g.mode === 'EYES' && g.currTx === 13 && g.currTy === 11) {
      g.mode = 'IN_PEN';
      g.py = 14 * TILE + TILE/2; // snap inside
      // Immediately exit if needed, simpler to just let checkGhostRelease handle it next frame
      g.dotCounter = 0; 
      checkGhostRelease(); // force back out
      return;
    }

    let tx = g.currTx, ty = g.currTy;
    let target = [0,0];
    
    if (g.mode === 'EYES') {
      target = [13, 11];
    } else if (g.mode === 'FRIGHTENED') {
      target = null; // random
    } else {
      let runScatter = curMode === 'SCATTER';
      if (g.id === 0 && dotsEaten > totalDots - 20) runScatter = false; // Elroy ignores scatter
      target = runScatter ? g.scatterTile : g.targetTileFn();
    }

    let bestDir = NONE;
    let bestDist = Infinity;
    
    // Choices: pref UP, LEFT, DOWN, RIGHT
    let dirs = [UP, LEFT, DOWN, RIGHT];
    let possibleDirs = [];

    for (let d of dirs) {
      if (d === getOpposite(g.dir)) continue; // no reverse
      if (d === UP && isNoUpZone(tx, ty) && g.mode !== 'EYES' && g.mode !== 'FRIGHTENED') continue;
      
      let nx = tx + DX[d], ny = ty + DY[d];
      if (isTileWalkable(nx, ny, g.mode === 'EYES')) { // Eyes can walk through door
        possibleDirs.push(d);
      }
    }

    if (possibleDirs.length === 0) {
      bestDir = getOpposite(g.dir); // trapped (shouldn't happen in map)
    } else if (target === null) {
      // random
      bestDir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
    } else {
      for (let d of possibleDirs) {
        let nx = tx + DX[d], ny = ty + DY[d];
        let dxv = nx - target[0], dyv = ny - target[1];
        let distSQ = dxv*dxv + dyv*dyv;
        if (distSQ < bestDist) {
          bestDist = distSQ;
          bestDir = d;
        }
      }
    }

    g.dir = bestDir !== NONE ? bestDir : g.dir;
    applyDirection(g);
  }
}

// --- RENDER ---

function drawMaze() {
  ctx.clearRect(0,0, canvas.width, canvas.height);
  
  for (let r=0; r<rawMap.length; r++) {
    for (let c=0; c<COLS; c++) {
      let x = c * TILE; let y = (r + MAZE_ROW_OFFSET) * TILE;
      if (baseGrid[r][c] === 1) {
        ctx.strokeStyle = (gameState === 'LEVEL_COMPLETE' && Math.floor(stateTimer/15)%2===0) ? '#FFF' : '#2121DE';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2); // stylized box
      }
      if (baseGrid[r][c] === 4) {
        ctx.fillStyle = '#FFB8FF';
        ctx.fillRect(x, y + TILE/2 - 1, TILE, 2);
      }
      if (dotGrid[r][c] === 2) {
        ctx.fillStyle = '#FFAA99';
        ctx.fillRect(x + TILE/2 - 1.5, y + TILE/2 - 1.5, 3, 3);
      }
      if (dotGrid[r][c] === 3) {
        if (Math.floor(Date.now() / 250) % 2 === 0) {
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, 6, 0, Math.PI*2);
          ctx.fillStyle = '#FFAA99';
          ctx.fill();
        }
      }
    }
  }

  // Fruit
  if (fruitActive > 0) {
    let px = 13.5 * TILE; let py = (20 + MAZE_ROW_OFFSET) * TILE + TILE/2;
    ctx.fillStyle = '#FF0000'; ctx.beginPath(); ctx.arc(px-3, py, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+3, py, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00FF00'; ctx.fillRect(px, py-6, 2, 4);
  }
}

function drawPacman() {
  if (!pacman) return;
  if (gameState === 'DYING') {
    let p = 1.0 - (stateTimer / 120); // 0 to 1
    if (p > 0.8) return;
    let ang = Math.PI * p; // opens fully to back
    ctx.save();
    ctx.translate(pacman.px, pacman.py + MAZE_ROW_OFFSET*TILE);
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.arc(0, 0, 7, ang, Math.PI*2 - ang);
    ctx.lineTo(0,0);
    ctx.fill();
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(pacman.px, pacman.py + MAZE_ROW_OFFSET * TILE);
  if (pacman.dir === UP) ctx.rotate(-Math.PI/2);
  if (pacman.dir === DOWN) ctx.rotate(Math.PI/2);
  if (pacman.dir === LEFT) ctx.rotate(Math.PI);
  
  ctx.fillStyle = '#FFFF00';
  ctx.beginPath();
  let ma = pacman.mouthAngle;
  ctx.arc(0, 0, 7, ma, Math.PI*2 - ma);
  ctx.lineTo(0,0);
  ctx.fill();
  ctx.restore();
}

function drawGhost(g) {
  let gy = g.py + MAZE_ROW_OFFSET * TILE;
  if (g.ptsFlash > 0) {
    ctx.fillStyle = '#0FF';
    ctx.font = '10px monospace'; ctx.textAlign='center';
    ctx.fillText([200,400,800,1600][ghostCombo-1]||200, g.px, gy+4);
    g.ptsFlash--;
    return;
  }

  ctx.save();
  ctx.translate(g.px, gy);
  
  let isFright = g.mode === 'FRIGHTENED';
  let isFlash = isFright && frightTimer < 120 && Math.floor(frightTimer/10)%2===0;
  
  if (g.mode !== 'EYES') {
    ctx.fillStyle = isFright ? (isFlash ? '#FFF' : '#2222FF') : g.color;
    ctx.beginPath();
    ctx.arc(0, -2, 7, Math.PI, 0);
    ctx.lineTo(7, 7);
    ctx.lineTo(4, 5); ctx.lineTo(0, 7); ctx.lineTo(-4, 5);
    ctx.lineTo(-7, 7);
    ctx.fill();
  }

  // Eyes
  let ex=0, ey=0;
  if (!isFright || g.mode === 'EYES') {
    if (g.dir === LEFT) ex = -2;
    if (g.dir === RIGHT) ex = 2;
    if (g.dir === UP) ey = -2;
    if (g.dir === DOWN) ey = 2;
  }

  if (g.mode === 'EYES' || !isFright) {
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(-3 + ex, -3 + ey, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3 + ex, -3 + ey, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#00F';
    ctx.beginPath(); ctx.arc(-3 + ex*1.5, -3 + ey*1.5, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3 + ex*1.5, -3 + ey*1.5, 1, 0, Math.PI*2); ctx.fill();
  } else {
    // Frightened eyes
    ctx.fillStyle = isFlash ? '#F00' : '#FFB8FF';
    ctx.fillRect(-4, -2, 2, 2);
    ctx.fillRect(2, -2, 2, 2);
    // Squiggly mouth
    ctx.strokeStyle = isFlash ? '#F00' : '#FFB8FF';
    ctx.beginPath(); ctx.moveTo(-5, 3); ctx.lineTo(-3, 1); ctx.lineTo(-1, 3); ctx.lineTo(1, 1); ctx.lineTo(3, 3); ctx.lineTo(5, 1); ctx.stroke();
  }
  
  ctx.restore();
}

function drawUI() {
  ctx.fillStyle = '#FFF'; ctx.font = '16px monospace'; ctx.textAlign='left';
  ctx.fillText("1UP", 20, 20);
  ctx.fillText(score, 20, 36);
  ctx.textAlign='center';
  ctx.fillText("HIGH SCORE", W/2, 20);
  ctx.fillText(highScore, W/2, 36);

  // Lives
  for (let i=0; i<lives-1; i++) {
    ctx.save();
    ctx.translate(24 + i*24, ROWS * TILE - 12);
    ctx.rotate(Math.PI);
    ctx.fillStyle = '#FFFF00'; ctx.beginPath(); ctx.arc(0,0, 7, 0.4, Math.PI*2-0.4); ctx.lineTo(0,0); ctx.fill();
    ctx.restore();
  }
}

// --- MAIN LOOP ---

let paused = false;

function loop() {
  requestAnimationFrame(loop);

  if (paused) {
    drawMaze(); drawUI();
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#FFF'; ctx.textAlign='center'; ctx.fillText("PAUSED", W/2, H/2);
    return;
  }

  if (gameState === 'ATTRACT') {
    drawMaze(); drawUI();
    ctx.fillStyle = '#FF0'; ctx.textAlign='center';
    ctx.fillText("PRESS ENTER TO START", W/2, H/2);
    
    if (keys.Space) {
      score = 0; lives = 3; level = 1; extraLifeAwarded = false;
      initMap();
      resetActors();
      gameState = 'PLAYING';
      playSubState = 'READY';
      stateTimer = 120;
    }
    return;
  }

  if (gameState === 'LEVEL_COMPLETE') {
    drawMaze(); drawUI(); drawPacman();
    stateTimer--;
    if (stateTimer <= 0) {
      level++; initMap(); resetActors();
      gameState = 'PLAYING'; playSubState = 'READY'; stateTimer = 120;
    }
    return;
  }

  if (gameState === 'GAME_OVER') {
    drawMaze(); drawUI();
    ctx.fillStyle = '#F00'; ctx.textAlign='center'; ctx.fillText("GAME OVER", W/2, H/2);
    stateTimer--;
    if (stateTimer <= 0) {
      if (score > highScore) { highScore = score; localStorage.setItem('pacmanHigh', score); }
      gameState = 'ATTRACT';
    }
    return;
  }

  if (gameState === 'DYING') {
    drawMaze(); drawUI(); drawPacman();
    stateTimer--;
    if (stateTimer <= 0) {
      lives--;
      if (lives > 0) {
        resetActors();
        gameState = 'PLAYING';
        playSubState = 'READY';
        stateTimer = 120;
      } else {
        gameState = 'GAME_OVER';
        stateTimer = 180;
      }
    }
    return;
  }

  // == PLAYING ==
  
  if (playSubState === 'READY') {
    drawMaze(); drawUI(); drawPacman();
    ghosts.forEach(drawGhost);
    ctx.fillStyle = '#FF0'; ctx.textAlign='center'; ctx.fillText("READY!", W/2, 23.5*TILE + MAZE_ROW_OFFSET*TILE);
    stateTimer--;
    if (stateTimer <= 0) playSubState = 'NORMAL';
    return;
  }

  if (freezeFrames > 0) {
    freezeFrames--;
    drawMaze(); drawUI(); drawPacman(); ghosts.forEach(drawGhost);
    return;
  }

  // Modes
  if (frightTimer > 0) {
    frightTimer--;
    if (frightTimer === 0) {
      for(let g of ghosts) if(g.mode === 'FRIGHTENED') g.mode = 'NORMAL';
    }
  } else {
    modeTimer++;
    let limits = getPhaseTimings();
    if (modePhase < limits.length && modeTimer >= limits[modePhase]) {
      modeTimer = 0; modePhase++;
      curMode = (modePhase % 2 === 0) ? 'SCATTER' : 'CHASE';
      for (let g of ghosts) { // Reverse on phase change
        if (g.mode === 'NORMAL') {
          g.nextDir = getOpposite(g.dir);
          g.targetX = g.px; g.targetY = g.py;
          g.dir = g.nextDir;
          applyDirection(g);
        }
      }
    }
  }

  globalTimer++;
  if (fruitActive>0) fruitActive--;

  // Input processing
  if (keys.ArrowUp) pacman.nextDir = UP;
  if (keys.ArrowDown) pacman.nextDir = DOWN;
  if (keys.ArrowLeft) pacman.nextDir = LEFT;
  if (keys.ArrowRight) pacman.nextDir = RIGHT;

  updatePacman();
  checkGhostRelease();
  for (let g of ghosts) updateGhost(g);

  // Collision
  for (let g of ghosts) {
    if (g.mode === 'EYES' || g.mode === 'IN_PEN' || g.mode === 'EXITING' || g.ptsFlash > 0) continue;
    let distSQ = Math.pow(pacman.px - g.px, 2) + Math.pow(pacman.py - g.py, 2);
    if (distSQ < 80) { // ~9px
      if (g.mode === 'FRIGHTENED') {
        g.mode = 'EYES';
        ghostCombo++;
        score += [200, 400, 800, 1600][ghostCombo-1] || 200;
        Audio.eatGhost();
        freezeFrames = 30;
        g.ptsFlash = 30;
      } else {
        gameState = 'DYING';
        stateTimer = 120;
        Audio.death();
        break;
      }
    }
  }

  drawMaze();
  drawPacman();
  ghosts.forEach(drawGhost);
  drawUI();
}

initMap();
resetActors();
loop();

</script>
