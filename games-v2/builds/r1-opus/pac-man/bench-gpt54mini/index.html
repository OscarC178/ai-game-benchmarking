function frightenedInit(){frightMode=true; frightT=frightDuration(); frightEatCount=0; if(level<19) ghosts.forEach(g=>{if(!g.eyes && g.state!=='pen') g.frightened=true;}); ghosts.forEach(g=>{if(!g.eyes && g.state!=='pen') g.dir={up:'down',down:'up',left:'right',right:'left'}[g.dir];}); modePaused=true; modePauseT=frightT;}
function powerPellet(){score+=50; if(score>best){best=score; sessionStorage.setItem('pacman_best',best);} SFX.pellet(); frightenedInit();}
function releaseGhosts(dt){globalReleaseTimer-=dt; if(globalReleaseTimer<=0){const order=['inky','clyde']; const next=ghosts.find(g=>g.state==='pen' && order.includes(g.name)); if(next){next.state='release'; next.dir='up'; globalReleaseTimer=level===1?4:3;}}}
function updateFruit(dt){if(fruitObj){fruitObj.t+=dt; if(fruitObj.t>fruitObj.life){fruitObj=null;} else if(pac && Math.round(pac.tileX)===fruitObj.x && Math.round(pac.tileY)===fruitObj.y){score+=fruitPoints(); if(score>best){best=score; sessionStorage.setItem('pacman_best',best);} SFX.fruit(); fruitHistory.unshift(fruitObj.kind); fruitHistory=fruitHistory.slice(0,7); fruitObj=null;}}}
function updateDying(dt){pac.deathT+=dt; if(pac.deathT>1.0){deathT+=dt; if(deathT>0.9){lives--; if(lives<=0){state='GAME_OVER'; gameOverT=3; return;} resetLife(); state='PLAYING'; readyT=2; deathT=0; pac.deathT=0;}}}
function updateGameplay(dt){if(readyT>0){readyT-=dt; if(readyT<=0){SFX.ready();}} if(freezeT>0){freezeT-=dt; return;} if(state!=='PLAYING') return; if(readyT<=0){movePac(dt); updateGhosts(dt); releaseGhosts(dt); updateFruit(dt); ghostCollide(); if(countDots()===0){state='LEVEL_COMPLETE'; levelCompleteT=2;}} updateGhostPoints(dt); if(pac && !pac.dead) {if(rowOfY(pac.y)>=1 && rowOfY(pac.y)<=5){const t=tileAt(pac.tileX,pac.tileY); if(t===0) killPac('water'); if(t===5){/* tunnel */} }
 if(rowOfY(pac.y)>=7 && rowOfY(pac.y)<=11){/* safe */}}
 if(fruitObj) fruitObj.t+=dt; if(fruitObj && fruitObj.t>fruitObj.life) fruitObj=null; if(level>=3){if(!snake && Math.random()<dt*0.07) spawnSnake();}
 if(level>=4){for(const g of ghosts){if(g.state==='pen') continue;}}
 if(score>=10000 && !extraGiven){lives=Math.min(6,lives+1); extraGiven=true; SFX.life();}}
function spawnSnake(){}
function drawMaze(){ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); // top HUD BG
 ctx.fillStyle='#000'; ctx.fillRect(0,0,W,48); // maze region
 for(let r=3;r<=33;r++){
   for(let c=0;c<28;c++){
     const t=tiles[r][c]; const x=c*T,y=r*T;
     if(t===1){ctx.fillStyle='#000'; ctx.fillRect(x,y,T,T); ctx.fillStyle=blue; ctx.fillRect(x+1,y+1,T-2,T-2);}
     else if(t===4){ctx.fillStyle='#fff'; ctx.fillRect(x,y+7,T,2);} // door
   }
 }
 // water / road / home / start base colors
 for(let r=3;r<=33;r++){ let col='#000'; if(r<=5) col='#003388'; else if(r===6) col='#332244'; else if(r>=7&&r<=11) col='#1a1a1a'; else if(r===12) col='#33AA33'; else col='#000'; if(r===0) col='#226622'; }
}
function drawDots(){for(let r=3;r<=33;r++) for(let c=0;c<28;c++){const t=tiles[r][c]; if(t===2){ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(gx(c),gy(r),2,0,Math.PI*2); ctx.fill();} if(t===3){if(Math.floor(performance.now()/150)%2===0){ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(gx(c),gy(r),5,0,Math.PI*2); ctx.fill();}} }}
function drawPac(){if(pac.dead){const a=Math.min(1,pac.deathT/1); const r=7*(1-a*1.1); ctx.save(); ctx.translate(pac.x,pac.y); ctx.rotate(pac.spin); ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(0,0,Math.max(0,r),0,Math.PI*2); ctx.fill(); ctx.restore(); return;} ctx.save(); ctx.translate(pac.x,pac.y); let ang=0; if(pac.dir==='left') ang=Math.PI; if(pac.dir==='up') ang=-Math.PI/2; if(pac.dir==='down') ang=Math.PI/2; ctx.rotate(ang); const m=(Math.sin(performance.now()/90)+1)/2; const mouth=0.15+m*0.35; ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,7,mouth,Math.PI*2-mouth); ctx.closePath(); ctx.fill(); ctx.restore();}
function drawGhost(g){if(g.eyes){ctx.save(); ctx.translate(g.x,g.y); ctx.strokeStyle='#fff'; ctx.fillStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(-3,-2,2,0,Math.PI*2); ctx.arc(3,-2,2,0,Math.PI*2); ctx.fill(); ctx.restore(); return;} let body=g.color; if(g.frightened){body=(level>=19?'#0000FF':'#0000AA'); if(frightT<2 && Math.floor(performance.now()/250)%2===0) body='#fff';} ctx.save(); ctx.translate(g.x,g.y); ctx.fillStyle=body; ctx.beginPath(); ctx.arc(0,-2,7,Math.PI,0); ctx.lineTo(7,6); ctx.lineTo(5,4); ctx.lineTo(3,6); ctx.lineTo(1,4); ctx.lineTo(-1,6); ctx.lineTo(-3,4); ctx.lineTo(-5,6); ctx.lineTo(-7,4); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.arc(-3,-3,2,0,Math.PI*2); ctx.arc(3,-3,2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); if(!g.frightened){ctx.fillStyle=g.name==='blinky'?'#f00':g.name==='pinky'?'#f8b':g.name==='inky'?'#0ff':'#fb8'; ctx.beginPath(); ctx.arc(-3,-3,1,0,Math.PI*2); ctx.arc(3,-3,1,0,Math.PI*2); ctx.fill();} ctx.restore(); }
function drawGhostHouse(){ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(10*T+2,11*T+2,8*T-4,4*T-4);} 
function drawFruit(){if(!fruitObj) return; const x=gx(fruitObj.x),y=gy(fruitObj.y); ctx.save(); ctx.translate(x,y); const pulse=1+0.1*Math.sin(performance.now()/53); ctx.scale(pulse,pulse); ctx.fillStyle=fruitObj.kind==='Cherry'?'#f33':fruitObj.kind==='Strawberry'?'#ff4':'#f80'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke(); ctx.restore(); }
function drawLives(){ctx.fillStyle='#888'; ctx.font='14px monospace'; ctx.textAlign='left'; ctx.fillText('1UP',16,20); ctx.textAlign='center'; ctx.fillText(String(score).padStart(5,'0'),112,20); ctx.fillText('HI-SCORE',224,20); ctx.fillText(String(best).padStart(5,'0'),320,20); ctx.textAlign='right'; ctx.fillText('2UP',432,20); for(let i=0;i<Math.max(0,lives-1);i++){ctx.save(); ctx.translate(20+i*20,547); ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill(); ctx.restore();}
 ctx.fillStyle='#888'; ctx.fillText('SCORE '+score,430,562); for(let i=0;i<fruitHistory.length;i++){ctx.fillStyle='#fff'; ctx.fillText(fruitHistory[i][0]||'',430-i*16,562);} }
function drawTextOverlay(){if(state==='ATTRACT'){ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='20px monospace'; ctx.globalAlpha=0.3+0.7*(0.5+0.5*Math.sin(blink*3)); ctx.fillText('PLAYER ONE READY!',W/2,160); ctx.globalAlpha=1; ctx.font='48px monospace'; ctx.fillStyle=(Math.floor(blink*2)%2===0?'#22CC22':'#FFFF44'); ctx.fillText('PAC-MAN',W/2,130); ctx.fillStyle='#aaa'; ctx.font='18px monospace'; if(Math.floor(performance.now()/250)%2===0) ctx.fillText('PRESS ENTER TO START',W/2,500); ctx.font='14px monospace'; ctx.fillStyle='#555'; ctx.fillText('BEST: '+best,W/2,540); }
 if(state==='PLAYING' && readyT>0){ctx.fillStyle='#ff0'; ctx.textAlign='center'; ctx.font='18px monospace'; ctx.fillText('READY!',gx(13),gy(23)-22);} if(state==='GAME_OVER'){ctx.textAlign='center'; ctx.fillStyle='#f44'; ctx.font='40px monospace'; ctx.fillText('GAME OVER',W/2,220); ctx.fillStyle='#fff'; ctx.font='20px monospace'; ctx.fillText('Score: '+score,W/2,260); if(score>=best){ctx.fillStyle='#ffd700'; ctx.globalAlpha=0.5+0.5*Math.sin(performance.now()/180); ctx.fillText('NEW BEST!',W/2,292); ctx.globalAlpha=1;} ctx.fillStyle='#aaa'; ctx.font='16px monospace'; ctx.fillText('Press Enter to restart',W/2,330);} if(state==='LEVEL_COMPLETE'){ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='24px monospace'; ctx.fillText('LEVEL CLEAR',W/2,220);} if(state==='ATTRACT'){ctx.fillStyle='#ff0'; ctx.font='16px monospace'; ctx.fillText('READY!',gx(13),gy(23)-22);} }
function drawOverlay(){if(state==='PAUSED'){ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,48,W,448); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='36px monospace'; ctx.fillText('PAUSED',W/2,270); ctx.font='14px monospace'; ctx.fillStyle='#aaa'; ctx.fillText('P to resume',W/2,295);} if(state==='GAME_OVER'){}} 
function render(){ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); drawMaze(); drawDots(); drawGhostHouse(); drawFruit(); ghosts.forEach(drawGhost); drawPac(); drawLives(); drawTextOverlay(); drawOverlay(); }
function update(dt){blink+=dt; powerPelletBlink+=dt; if(state==='ATTRACT'){updateAttract(dt); return;} if(state==='GAME_OVER'){gameOverT-=dt; if(gameOverT<=0 && keys['Enter']) {startAttract();} return;} if(state==='LEVEL_COMPLETE'){levelCompleteT-=dt; if(levelCompleteT<=0){levelChange();}} if(state!=='PLAYING') return; if(readyT>0){readyT-=dt; return;} if(freezeT>0){freezeT-=dt; return;} if(deathT>0){updateDeath(dt); return;}
 updateGameplay(dt);
}
function updateAttract(dt){updatePacAttract(dt); updateGhosts(dt); updateGhostPoints(dt); if(keys['Enter']){resetGame(); state='PLAYING'; readyT=2; SFX.ready();}}
function updatePacAttract(dt){pac.x=gx(13)+Math.sin(performance.now()/500)*6; pac.y=gy(23); pac.dir='left';}
function updateDeath(dt){pac.deathT+=dt; pac.spin+=dt*6; if(pac.deathT>=1.0 && !pac._lifeLost){pac._lifeLost=true; lives--; if(lives<=0){state='GAME_OVER'; gameOverT=3; return;} respawnT=1; state='RESPAWN';}} 
function roundRectPath(x,y,w,h,r){ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();}
function initAttract(){makeLevel(); state='ATTRACT';}
addEventListener('keydown',e=>{keys[e.code]=true; acq(); if(e.code==='Enter'){e.preventDefault(); if(state==='ATTRACT'){resetGame(); state='PLAYING'; readyT=2; SFX.ready();} else if(state==='GAME_OVER'){startAttract();}} if(e.code==='KeyP'){if(state==='PLAYING') state='PAUSED'; else if(state==='PAUSED') state='PLAYING';}});
addEventListener('keyup',e=>{keys[e.code]=false;});
function controlInput(){const dirOrder=['ArrowUp','KeyW','ArrowLeft','KeyA','ArrowDown','KeyS','ArrowRight','KeyD']; let pressed=dirOrder.filter(k=>keys[k]&&!prev[k]); if(state==='PLAYING' && readyT<=0 && !pac.dead){if(pressed.length){const k=pressed[0]; pac.nextDir=k==='ArrowUp'||k==='KeyW'?'up':k==='ArrowDown'||k==='KeyS'?'down':k==='ArrowLeft'||k==='KeyA'?'left':'right'; if(!hop.active){let d=dirVec(pac.nextDir); let tcx=pac.tileX+d.x, tcy=pac.tileY+d.y; if(tcx<0) tcx=27; if(tcx>27) tcx=0; if(walkable(tcx,tcy,false)) startHop(pac.nextDir);}} if((keys['Space']||keys['Enter'])&&!prev['Space']&&!prev['Enter']){if(state==='ATTRACT') {resetGame(); state='PLAYING'; readyT=2; SFX.ready();}} if(keys['Space']||keys['Enter']){} }
 if(state==='PLAYING' && !keys['Space'] && !keys['Enter']){} }
function startHop(dir){if(hop.active || state!=='PLAYING' || readyT>0 || pac.dead) return; let d=dirVec(dir); let nc=pac.tileX+d.x,nr=pac.tileY+d.y; if(nc<0) nc=27; if(nc>27) nc=0; if(nr<0||nr>35) return; if(!walkable(nc,nr,false)) return; hop.active=true; hop.t=0; hop.from={x:pac.x,y:pac.y}; hop.to={x:gx(nc),y:gy(nr)}; hop.dir=dir; pac.dir=dir; SFX.chomp();}
function drawMazeBackground(){ }
function gameLoop(now){const dt=Math.min(0.05,(now-last)/1000); last=now; controlInput(); update(dt); render(); prev={...keys}; requestAnimationFrame(gameLoop);} 
function makeLevel2(){makeLevel();}
function startAttract(){score=0;lives=3;level=1;extraGiven=false;makeLevel(); state='ATTRACT'; readyT=0; gameOverT=0;}
initAttract(); requestAnimationFrame(gameLoop);
})();
</script>
