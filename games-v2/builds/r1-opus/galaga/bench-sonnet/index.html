<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaga</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
'use strict';

const LW = 384, LH = 672;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth / LW, window.innerHeight / LH);
  canvas.style.width = (LW * s) + 'px';
  canvas.style.height = (LH * s) + 'px';
  canvas.width = LW; canvas.height = LH;
}
window.addEventListener('resize', resize);
resize();

// ---- Audio ----
let AC = null;
function getAC() {
  if (!AC) try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  return AC;
}
function playTone(freq, type, dur, gainVal, freqEnd) {
  try {
    const ac = getAC(); if (!ac) return;
    const osc = ac.createOscillator();
    const gn = ac.createGain();
    osc.connect(gn); gn.connect(ac.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1), ac.currentTime + dur);
    gn.gain.setValueAtTime(gainVal, ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}
function playNoise(dur, gainVal) {
  try {
    const ac = getAC(); if (!ac) return;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    const gn = ac.createGain();
    src.buffer = buf;
    src.connect(gn); gn.connect(ac.destination);
    gn.gain.setValueAtTime(gainVal, ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    src.start(ac.currentTime);
  } catch(e) {}
}

let beatPhase = 0, beatTimer = 0, beatInterval = 800;
const BEAT_FREQS = [55, 45, 50, 40];
function updateBeat(dt, enemyCount) {
  beatInterval = Math.max(300, 300 + (enemyCount / 44) * 500);
  beatTimer += dt * 1000;
  if (beatTimer >= beatInterval) {
    beatTimer = 0;
    playTone(BEAT_FREQS[beatPhase % 4], 'sine', 0.1, 0.15);
    beatPhase++;
  }
}

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- Stars ----
const STARS = [];
for (let i = 0; i < 80; i++) {
  STARS.push({
    x: Math.random() * LW,
    y: Math.random() * LH,
    spd: 0.3 + Math.random() * 0.7,
    b: 0.3 + Math.random() * 0.7
  });
}
function updateStars(dt) {
  for (const s of STARS) {
    s.y += s.spd;
    if (s.y > LH) { s.y = 0; s.x = Math.random() * LW; }
  }
}
function drawStars() {
  for (const s of STARS) {
    ctx.globalAlpha = s.b;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
}

// ---- Constants ----
const PLAYER_Y = 590;
const CELL_W = 32, CELL_H = 36;
const FORM_BASE_X = 32, FORM_BASE_Y = 90;
const COLS = 10;
const STATE = { TITLE: 0, STAGE_INTRO: 1, ENTRY: 2, BATTLE: 3, STAGE_CLEAR: 4, GAME_OVER: 5, CHALLENGING: 6, PAUSED: 7 };

// ---- Game state ----
let state = STATE.TITLE;
let prevState = STATE.TITLE;
let score = 0, hiScore = 0;
let lives = 3;
let stage = 1;
let stageTimer = 0;
let formationX = 0, formationDir = 1;
let diveTimer = 0, diveInterval = 3000;
let maxDivers = 1;
let extraLifeGiven = false;
let enemies = [], playerBullets = [], enemyBullets = [], explosions = [];
let player = null;
let capturedShip = null;
let tractorBeam = null;
let challengeEnemies = [], challengeTimer = 0, challengeHits = 0, challengeTotal = 0;
let challengeResultTimer = 0, challengeResultText = '';
let entryQueue = [], entryIndex = 0, entryTimer = 0;
let allEntered = false;
let titleBlink = 0;
let gameTotalTime = 0;
let pausedState = STATE.TITLE;

// ---- Formation slots ----
// Row 0: 4 boss galaga (cols 3,4,5,6 — spread)
// Row 1-2: Butterflies
// Row 3-4: Bees
function getFormationPos(col, row) {
  return {
    x: FORM_BASE_X + col * CELL_W + formationX,
    y: FORM_BASE_Y + row * CELL_H
  };
}

// ---- Enemy creation ----
function makeBoss(col, row) {
  return { type:'boss', col, row, x:0, y:0, alive:true, state:'entering', animFrame:0,
    entryPath:[], entryT:0, entryWp:0,
    diveT:0, divePath:null, divePhase:0,
    shootTimer: 1200 + Math.random()*800,
    hasCaptured:false, isEscort:false, capturedShipIcon:false };
}
function makeButterfly(col, row) {
  return { type:'butterfly', col, row, x:0, y:0, alive:true, state:'entering', animFrame:0,
    entryPath:[], entryT:0, entryWp:0,
    diveT:0, divePath:null, divePhase:0,
    shootTimer: 1500 + Math.random()*1000 };
}
function makeBee(col, row) {
  return { type:'bee', col, row, x:0, y:0, alive:true, state:'entering', animFrame:0,
    entryPath:[], entryT:0, entryWp:0,
    diveT:0, divePath:null, divePhase:0,
    shootTimer: 1000 + Math.random()*1200 };
}

function buildFormation() {
  enemies = [];
  // Row 0: 4 boss galaga at cols 2,4,5,7 (slightly spread)
  const bossC = [2,4,5,7];
  for (const c of bossC) enemies.push(makeBoss(c, 0));
  // Rows 1-2: butterflies
  for (let r = 1; r <= 2; r++) {
    for (let c = 1; c <= 8; c++) enemies.push(makeButterfly(c, r));
  }
  // Rows 3-4: bees
  for (let r = 3; r <= 4; r++) {
    for (let c = 0; c < COLS; c++) enemies.push(makeBee(c, r));
  }
}

// ---- Entry paths ----
function buildEntryPaths() {
  entryQueue = [];
  // Group 1: Bees row 4, right side (cols 5-9) — enter from top-right
  const beesR4R = enemies.filter(e => e.type==='bee' && e.row===4 && e.col>=5);
  entryQueue.push({ group: beesR4R, stagger: 12, pathFn: (col,row,i) => beeEntryRight(col,row,i) });
  // Group 2: Bees row 4, left side
  const beesR4L = enemies.filter(e => e.type==='bee' && e.row===4 && e.col<5);
  entryQueue.push({ group: beesR4L, stagger: 12, pathFn: (col,row,i) => beeEntryLeft(col,row,i) });
  // Group 3: Bees row 3 right
  const beesR3R = enemies.filter(e => e.type==='bee' && e.row===3 && e.col>=5);
  entryQueue.push({ group: beesR3R, stagger: 12, pathFn: (col,row,i) => beeEntryRight(col,row,i) });
  // Group 4: Bees row 3 left
  const beesR3L = enemies.filter(e => e.type==='bee' && e.row===3 && e.col<5);
  entryQueue.push({ group: beesR3L, stagger: 12, pathFn: (col,row,i) => beeEntryLeft(col,row,i) });
  // Group 5: Butterflies row 2
  const butt2 = enemies.filter(e => e.type==='butterfly' && e.row===2);
  entryQueue.push({ group: butt2, stagger: 10, pathFn: (col,row,i) => butterflyEntry(col,row,i) });
  // Group 6: Butterflies row 1
  const butt1 = enemies.filter(e => e.type==='butterfly' && e.row===1);
  entryQueue.push({ group: butt1, stagger: 10, pathFn: (col,row,i) => butterflyEntry(col,row,i) });
  // Group 7: Boss Galaga
  const bosses = enemies.filter(e => e.type==='boss');
  entryQueue.push({ group: bosses, stagger: 15, pathFn: (col,row,i) => bossEntry(col,row,i) });

  // Assign paths
  for (const grp of entryQueue) {
    grp.group.forEach((e, i) => {
      e.entryPath = grp.pathFn(e.col, e.row, i);
      e.entryWp = 0;
      e.entryDelay = i * grp.stagger;
      // start off-screen
      e.x = e.entryPath[0].x;
      e.y = e.entryPath[0].y;
    });
  }
}

function beeEntryRight(col, row, i) {
  const slot = { x: FORM_BASE_X + col*CELL_W, y: FORM_BASE_Y + row*CELL_H };
  return [
    { x: LW+20, y: 200 },
    { x: LW-60, y: 60 },
    { x: LW/2+80, y: 90 },
    { x: LW/2, y: 160 },
    { x: slot.x, y: slot.y }
  ];
}
function beeEntryLeft(col, row, i) {
  const slot = { x: FORM_BASE_X + col*CELL_W, y: FORM_BASE_Y + row*CELL_H };
  return [
    { x: -20, y: 200 },
    { x: 60, y: 60 },
    { x: LW/2-80, y: 90 },
    { x: LW/2, y: 160 },
    { x: slot.x, y: slot.y }
  ];
}
function butterflyEntry(col, row, i) {
  const slot = { x: FORM_BASE_X + col*CELL_W, y: FORM_BASE_Y + row*CELL_H };
  const fromRight = col >= 5;
  return [
    { x: fromRight ? LW+20 : -20, y: 100 },
    { x: fromRight ? LW*0.75 : LW*0.25, y: 50 },
    { x: LW/2, y: 130 },
    { x: slot.x, y: slot.y }
  ];
}
function bossEntry(col, row, i) {
  const slot = { x: FORM_BASE_X + col*CELL_W, y: FORM_BASE_Y + row*CELL_H };
  return [
    { x: LW/2, y: -30 },
    { x: LW*0.8, y: 80 },
    { x: LW*0.5, y: 40 },
    { x: LW*0.2, y: 80 },
    { x: slot.x, y: slot.y }
  ];
}

const ENTRY_SPD = 2.5;
function updateEntry(dt) {
  // Process groups sequentially
  const grp = entryQueue[entryIndex];
  if (!grp) { allEntered = true; return; }

  let allDone = true;
  for (const e of grp.group) {
    if (!e.alive) continue;
    if (e.state === 'inFormation') continue;
    allDone = false;
    if (e.entryDelay > 0) { e.entryDelay -= dt * 60; continue; }
    const wp = e.entryPath[e.entryWp];
    if (!wp) { e.state = 'inFormation'; continue; }
    const dx = wp.x - e.x, dy = wp.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 4) {
      e.entryWp++;
      if (e.entryWp >= e.entryPath.length) { e.state = 'inFormation'; }
    } else {
      e.x += (dx/d) * ENTRY_SPD;
      e.y += (dy/d) * ENTRY_SPD;
    }
  }
  if (allDone) entryIndex++;
  if (entryIndex >= entryQueue.length) allEntered = true;
}

// ---- Player ----
function createPlayer() {
  return { x: LW/2, y: PLAYER_Y, alive:true, invincible:false, invTimer:0, blinkTimer:0, blinkVis:true,
    dualMode:false, x2:0, fireCooldown:0, hasBullet:false };
}

function drawShip(x, y, small) {
  const s = small ? 0.5 : 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.strokeStyle = '#4af';
  ctx.fillStyle = '#4af';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-12, 8);
  ctx.lineTo(-6, 12);
  ctx.lineTo(0, 8);
  ctx.lineTo(6, 12);
  ctx.lineTo(12, 8);
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 0.4;
  ctx.fill();
  ctx.globalAlpha = 1;
  // Engine glow
  ctx.fillStyle = '#4ff';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(0, 10, 5, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const af = Math.floor(e.animFrame / 4) % 2;
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.type === 'bee') {
    ctx.fillStyle = '#ff0'; ctx.strokeStyle = '#f80';
    ctx.lineWidth = 1;
    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI*2);
    ctx.fill();
    // Wings
    const wOff = af ? 8 : 10;
    ctx.fillStyle = 'rgba(255,200,0,0.7)';
    ctx.beginPath();
    ctx.ellipse(-wOff, -2, 5, 4, af ? -0.3 : -0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(wOff, -2, 5, 4, af ? 0.3 : 0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.ellipse(0, -4, 4, 3, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (e.type === 'butterfly') {
    ctx.fillStyle = '#88f'; ctx.strokeStyle = '#4af';
    ctx.lineWidth = 1;
    // Body
    ctx.fillStyle = '#66f';
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI*2);
    ctx.fill();
    // Wings
    const ws = af ? 1.0 : 1.2;
    ctx.fillStyle = 'rgba(100,150,255,0.75)';
    ctx.beginPath();
    ctx.ellipse(-8*ws, -1, 7*ws, 5, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8*ws, -1, 7*ws, 5, 0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, -5, 3, 2, 0, 0, Math.PI*2);
    ctx.fill();
  } else { // boss
    ctx.fillStyle = '#f0a'; ctx.strokeStyle = '#f4f';
    ctx.lineWidth = 1;
    // Main body
    ctx.fillStyle = '#c0f';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI*2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#f0a';
    ctx.beginPath();
    ctx.ellipse(0, -7, 6, 5, 0, 0, Math.PI*2);
    ctx.fill();
    // Claws
    ctx.strokeStyle = '#f4f'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-8, 2); ctx.lineTo(-12, -3); ctx.moveTo(-8, 2); ctx.lineTo(-12, 6);
    ctx.moveTo(8, 2); ctx.lineTo(12, -3); ctx.moveTo(8, 2); ctx.lineTo(12, 6);
    ctx.stroke();
    // Wings
    const bws = af ? 1.0 : 1.15;
    ctx.fillStyle = 'rgba(200,0,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(-10*bws, 2, 6*bws, 4, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10*bws, 2, 6*bws, 4, 0.3, 0, Math.PI*2);
    ctx.fill();
    // Captured ship icon if dual
    if (e.capturedShipIcon) {
      ctx.save();
      ctx.translate(20, 4);
      drawShip(0, 0, true);
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawExplosion(ex) {
  ctx.save();
  ctx.translate(ex.x, ex.y);
  const p = 1 - ex.frame / ex.maxFrame;
  ctx.globalAlpha = p;
  const r = ex.radius * (1 - p * 0.5);
  for (let i = 0; i < ex.lines; i++) {
    const a = (i / ex.lines) * Math.PI * 2;
    const len = (6 + Math.random() * 4) * (1 + (1-p));
    ctx.strokeStyle = ex.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.3, Math.sin(a) * r * 0.3);
    ctx.lineTo(Math.cos(a) * (r * 0.3 + len), Math.sin(a) * (r * 0.3 + len));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function spawnExplosion(x, y, color, radius, lines, maxFrame) {
  explosions.push({ x, y, color: color||'#ff8', radius: radius||12, lines: lines||8, frame:0, maxFrame: maxFrame||20 });
}

// ---- Dive logic ----
function getFormSlot(e) {
  return { x: FORM_BASE_X + e.col*CELL_W + formationX, y: FORM_BASE_Y + e.row*CELL_H };
}

function bezierCubic(t, p0, p1, p2, p3) {
  const mt = 1-t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

function startDive(e) {
  if (e.state !== 'inFormation' || !e.alive) return;
  const px = player ? player.x : LW/2;
  const startX = e.x, startY = e.y;
  const goLeft = startX > LW/2;
  const cpX1 = startX + (goLeft ? -80 : 80);
  const cpY1 = startY + 150;
  const cpX2 = px + 40;
  const cpY2 = PLAYER_Y - 180;
  e.divePath = [
    { x: startX, y: startY },
    { x: cpX1, y: cpY1 },
    { x: cpX2, y: cpY2 },
    { x: px, y: LH + 40 }
  ];
  e.diveT = 0;
  e.divePhase = 0; // 0=diving, 1=return
  e.state = 'diving';
  e.hasFired = false;
  e.shootTimer = 800 + Math.random() * 600;
  // Boss tractor beam setup
  if (e.type === 'boss') {
    e.tractorActive = false;
    e.tractorTimer = 0;
    e.tractorCapturing = false;
  }
}

const DIVE_SPD = 3.0;

function updateDiving(e, dt) {
  const spd = (DIVE_SPD + (stage-1)*0.2) / 60; // per ms
  const dtMs = dt * 1000;
  e.diveT += spd * dtMs / 100;

  if (e.divePhase === 0) {
    if (e.diveT >= 1) {
      e.diveT = 0;
      e.divePhase = 1;
      // Return: come from top
      const slot = getFormSlot(e);
      e.x = slot.x + (Math.random()-0.5)*80;
      e.y = -30;
      e.divePath = [
        { x: e.x, y: e.y },
        { x: e.x + (Math.random()-0.5)*60, y: 60 },
        { x: slot.x + (Math.random()-0.5)*30, y: slot.y - 40 },
        { x: slot.x, y: slot.y }
      ];
    } else {
      const p = e.divePath;
      e.x = bezierCubic(e.diveT, p[0].x, p[1].x, p[2].x, p[3].x);
      e.y = bezierCubic(e.diveT, p[0].y, p[1].y, p[2].y, p[3].y);
    }
    // Shooting
    if (!e.hasFired && e.diveT > 0.4 && player && player.alive) {
      fireEnemyBullet(e);
      e.hasFired = true;
      if (e.type === 'boss') setTimeout(() => fireEnemyBullet(e), 300);
    }
    // Boss tractor beam
    if (e.type === 'boss' && e.y > 200 && e.y < 350 && player && player.alive && !e.hasCaptured) {
      const dx = Math.abs(e.x - player.x);
      if (dx < 60 && !e.tractorActive) {
        e.tractorActive = true;
        e.tractorTimer = 3000;
      }
    }
  } else {
    if (e.diveT >= 1) {
      e.state = 'inFormation';
      e.tractorActive = false;
      const slot = getFormSlot(e);
      e.x = slot.x; e.y = slot.y;
    } else {
      const p = e.divePath;
      e.x = bezierCubic(e.diveT, p[0].x, p[1].x, p[2].x, p[3].x);
      e.y = bezierCubic(e.diveT, p[0].y, p[1].y, p[2].y, p[3].y);
    }
  }
}

function fireEnemyBullet(e) {
  if (!player) return;
  const activeBullets = enemyBullets.filter(b => b.alive).length;
  if (activeBullets >= 6) return;
  const angle = Math.atan2(PLAYER_Y - e.y, player.x - e.x);
  const spd = 5 + (stage-1)*0.15;
  enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, alive:true });
}

// ---- Challenging Stage ----
function startChallengingStage() {
  challengeEnemies = [];
  challengeTimer = 0;
  challengeHits = 0;
  challengeTotal = 40;
  challengeResultTimer = 0;
  challengeResultText = '';
  // Build groups of enemies flying in waves
  let delay = 0;
  for (let g = 0; g < 8; g++) {
    const types = ['bee','butterfly'];
    const t = types[g%2];
    for (let i = 0; i < 5; i++) {
      const fromLeft = g % 2 === 0;
      const yStart = 100 + Math.random() * 200;
      const yEnd = yStart + (Math.random()-0.5)*100;
      challengeEnemies.push({
        type: t, alive: true,
        x: fromLeft ? -20 : LW+20,
        y: yStart,
        vx: fromLeft ? 3.5 : -3.5,
        vy: (yEnd - yStart) / 120,
        delay: delay + i * 15,
        started: false,
        animFrame: 0,
        hitFlash: 0
      });
    }
    delay += 80;
  }
}

function updateChallenge(dt) {
  challengeTimer += dt * 60;
  const dtF = dt * 60;
  let anyAlive = false;
  for (const e of challengeEnemies) {
    if (!e.alive) continue;
    if (challengeTimer < e.delay) continue;
    if (!e.started) { e.started = true; }
    anyAlive = true;
    e.x += e.vx * dtF / 60 * 60; // px/frame equiv
    e.y += e.vy * dtF / 60 * 60;
    e.animFrame = (e.animFrame + dtF) % 8;
    if (e.x < -40 || e.x > LW+40) e.alive = false;
  }
  // Player bullets (unlimited in challenge)
  if (player) {
    if ((keys['Space'] || keys['KeyZ']) && player.fireCooldown <= 0) {
      playerBullets.push({ x: player.x, y: player.y - 12, vy: -10, alive: true });
      playTone(880, 'sine', 0.08, 0.15, 220);
      player.fireCooldown = 6;
    }
    if (player.fireCooldown > 0) player.fireCooldown -= dtF;
  }
  // Bullet vs challenge enemy
  for (const b of playerBullets) {
    if (!b.alive) continue;
    b.y += b.vy * dtF / 60 * 60;
    for (const e of challengeEnemies) {
      if (!e.alive || !e.started) continue;
      if (Math.abs(b.x - e.x) < 12 && Math.abs(b.y - e.y) < 12) {
        b.alive = false;
        e.alive = false;
        challengeHits++;
        spawnExplosion(e.x, e.y, '#ff8', 10, 6, 15);
        score += 100;
        if (score > hiScore) hiScore = score;
      }
    }
    if (b.y < 40) b.alive = false;
  }
  playerBullets = playerBullets.filter(b => b.alive);

  if (!anyAlive && challengeTimer > 100) {
    // Stage done
    if (challengeResultTimer === 0) {
      challengeResultTimer = 180;
      const perfect = challengeHits === challengeTotal;
      if (perfect) { score += 10000; challengeResultText = 'PERFECT!! +10000'; }
      else challengeResultText = 'HIT = ' + challengeHits + ' / ' + challengeTotal;
      if (score > hiScore) hiScore = score;
    }
    challengeResultTimer--;
    if (challengeResultTimer <= 0) {
      stage++;
      startNewStage();
    }
  }
}

function drawChallenge() {
  drawStars();
  // Draw challenge enemies
  for (const e of challengeEnemies) {
    if (!e.alive || !e.started) continue;
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'bee') {
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.ellipse(0,0,6,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.ellipse(0,-5,4,3,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#66f';
      ctx.beginPath();
      ctx.ellipse(0,0,7,9,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  for (const ex of explosions) drawExplosion(ex);
  drawHUD();
  if (challengeResultText) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(challengeResultText, LW/2, LH/2);
  }
}

// ---- Main init ----
function startNewStage() {
  // Check for challenging stage
  if (stage % 3 === 0) {
    state = STATE.CHALLENGING;
    startChallengingStage();
    player = createPlayer();
    playerBullets = []; enemyBullets = []; explosions = [];
    return;
  }
  state = STATE.STAGE_INTRO;
  stageTimer = 120;
  player = createPlayer();
  buildFormation();
  buildEntryPaths();
  playerBullets = []; enemyBullets = []; explosions = [];
  allEntered = false;
  entryIndex = 0; entryTimer = 0;
  formationX = 0; formationDir = 1;
  diveTimer = 0;
  diveInterval = Math.max(1000, 3000 - (stage-1)*100);
  maxDivers = Math.min(3, 1 + Math.floor((stage-1)/2));
  tractorBeam = null;
  beatTimer = 0; beatPhase = 0;
}

function startGame() {
  score = 0;
  lives = 3;
  stage = 1;
  extraLifeGiven = false;
  startNewStage();
}

// ---- Tractor Beam ----
function updateTractorBeam(dt) {
  if (!tractorBeam) {
    // Check for any boss with tractorActive
    const boss = enemies.find(e => e.type==='boss' && e.alive && e.tractorActive && e.divePhase===0);
    if (boss && player && player.alive) {
      tractorBeam = { boss, timer: 2500, captureProgress: 0 };
    }
    return;
  }
  const boss = tractorBeam.boss;
  if (!boss.alive || boss.state !== 'diving' || !boss.tractorActive) {
    tractorBeam = null; return;
  }
  tractorBeam.timer -= dt * 1000;
  if (!player || !player.alive) { tractorBeam = null; return; }
  // Draw handled in render
  // Pull player up
  const dx = Math.abs(player.x - boss.x);
  if (dx < 50 && player.y > boss.y + 20) {
    player.y -= 2 * dt * 60;
    tractorBeam.captureProgress += dt;
    if (tractorBeam.captureProgress > 2.0) {
      // Captured!
      boss.hasCaptured = true;
      boss.capturedShipIcon = true;
      lives--;
      spawnExplosion(player.x, player.y, '#f84', 20, 10, 30);
      playNoise(0.5, 0.3);
      player = null;
      tractorBeam = null;
      boss.tractorActive = false;
      // Respawn if lives remain
      if (lives > 0) {
        setTimeout(() => {
          if (state === STATE.BATTLE) {
            player = createPlayer();
            player.invincible = true;
            player.invTimer = 2000;
          }
        }, 2000);
      } else {
        setTimeout(() => { state = STATE.GAME_OVER; stageTimer = 180; }, 1000);
      }
    }
  }
  if (tractorBeam && tractorBeam.timer <= 0) {
    tractorBeam = null;
    boss.tractorActive = false;
  }
}

function drawTractorBeam() {
  if (!tractorBeam) return;
  const boss = tractorBeam.boss;
  const bx = boss.x;
  const by = boss.y;
  const bw1 = 20, bw2 = 50, bh = 120;
  const pulse = 0.3 + 0.3 * Math.sin(Date.now() * 0.01);
  ctx.globalAlpha = 0.4 + pulse;
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(bx - bw1, by);
  ctx.lineTo(bx + bw1, by);
  ctx.lineTo(bx + bw2, by + bh);
  ctx.lineTo(bx - bw2, by + bh);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ---- Update ----
let lastTime = 0;
let frameTimer = 0;

function update(dt) {
  gameTotalTime += dt;

  if (state === STATE.TITLE) {
    titleBlink += dt;
    updateStars(dt);
    return;
  }

  if (state === STATE.STAGE_INTRO) {
    stageTimer -= dt * 60;
    updateStars(dt);
    if (stageTimer <= 0) state = STATE.ENTRY;
    return;
  }

  if (state === STATE.ENTRY) {
    updateStars(dt);
    updateEntry(dt);
    updatePlayerMove(dt);
    updateExplosions(dt);
    if (allEntered) state = STATE.BATTLE;
    return;
  }

  if (state === STATE.BATTLE) {
    updateStars(dt);
    updateFormation(dt);
    updateEnemies(dt);
    updatePlayerMove(dt);
    updateBullets(dt);
    updateTractorBeam(dt);
    checkCollisions();
    updateExplosions(dt);
    updateBeat(dt);
    // Check wave clear
    if (enemies.filter(e=>e.alive).length === 0) {
      state = STATE.STAGE_CLEAR;
      stageTimer = 90;
    }
    return;
  }

  if (state === STATE.STAGE_CLEAR) {
    updateStars(dt);
    stageTimer -= dt * 60;
    if (stageTimer <= 0) { stage++; startNewStage(); }
    return;
  }

  if (state === STATE.CHALLENGING) {
    updateStars(dt);
    updatePlayerMove(dt);
    updateChallenge(dt);
    updateExplosions(dt);
    return;
  }

  if (state === STATE.GAME_OVER) {
    updateStars(dt);
    updateStars(dt);
    stageTimer -= dt * 60;
    if (stageTimer <= 0 || keys['Enter']) { state = STATE.TITLE; }
    return;
  }
}

function updateBeat(dt) {
  const alive = enemies.filter(e=>e.alive).length;
  updateBeat2(dt, alive);
}
function updateBeat2(dt, cnt) {
  beatInterval = Math.max(250, 250 + (cnt / 44) * 550);
  beatTimer += dt * 1000;
  if (beatTimer >= beatInterval) {
    beatTimer -= beatInterval;
    playTone(BEAT_FREQS[beatPhase % 4], 'sine', 0.09, 0.12);
    beatPhase = (beatPhase + 1) % 4;
  }
}

function updateFormation(dt) {
  formationX += formationDir * 0.5 * dt * 60;
  if (Math.abs(formationX) > 40) formationDir *= -1;
  for (const e of enemies) {
    if (e.state !== 'inFormation' || !e.alive) continue;
    e.x = FORM_BASE_X + e.col * CELL_W + formationX;
    e.y = FORM_BASE_Y + e.row * CELL_H;
    e.animFrame = (e.animFrame + dt * 60) % 8;
  }
}

function updateEnemies(dt) {
  const alive = enemies.filter(e => e.alive);
  // Dive trigger
  if (allEntered) {
    diveTimer += dt * 1000;
    const curDivers = enemies.filter(e => e.state === 'diving').length;
    if (diveTimer >= diveInterval && curDivers < maxDivers) {
      diveTimer = 0;
      // Pick random formation enemy
      const cands = alive.filter(e => e.state === 'inFormation');
      if (cands.length > 0) {
        const e = cands[Math.floor(Math.random() * cands.length)];
        startDive(e);
        playTone(200, 'sawtooth', 0.12, 0.1, 80);
      }
    }
  }

  for (const e of enemies) {
    if (!e.alive) continue;
    e.animFrame = (e.animFrame + dt * 60) % 8;
    if (e.state === 'diving') {
      updateDiving(e, dt);
    }
  }
}

function updatePlayerMove(dt) {
  if (!player || !player.alive) return;
  const spd = 4 * dt * 60;
  if (keys['ArrowLeft'] || keys['KeyA']) player.x = Math.max(16, player.x - spd);
  if (keys['ArrowRight'] || keys['KeyD']) player.x = Math.min(LW-16, player.x + spd);

  if (player.invincible) {
    player.invTimer -= dt * 1000;
    player.blinkTimer += dt * 1000;
    if (player.blinkTimer > 100) { player.blinkTimer = 0; player.blinkVis = !player.blinkVis; }
    if (player.invTimer <= 0) { player.invincible = false; player.blinkVis = true; }
  }

  if (player.fireCooldown > 0) player.fireCooldown -= dt * 60;
  const canFire = playerBullets.filter(b=>b.alive).length < 1;
  if ((keys['Space'] || keys['KeyZ']) && canFire && player.fireCooldown <= 0) {
    playerBullets.push({ x:player.x, y:player.y-12, vy:-10, alive:true });
    playTone(880, 'sine', 0.08, 0.15, 220);
    player.fireCooldown = 8;
  }
}

function updateBullets(dt) {
  const spd = dt * 60;
  for (const b of playerBullets) {
    if (!b.alive) continue;
    b.y += b.vy * spd;
    if (b.y < 40) b.alive = false;
  }
  for (const b of enemyBullets) {
    if (!b.alive) continue;
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.y > LH + 10 || b.y < 30) b.alive = false;
  }
  playerBullets = playerBullets.filter(b => b.alive);
  enemyBullets = enemyBullets.filter(b => b.alive);
}

function checkCollisions() {
  // Player bullets vs enemies
  for (const b of playerBullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      const hw = e.type==='boss' ? 8 : e.type==='butterfly' ? 7 : 6;
      if (Math.abs(b.x-e.x)<hw && Math.abs(b.y-e.y)<hw) {
        b.alive = false;
        e.alive = false;
        const pts = { bee: e.state==='diving'?100:50, butterfly: e.state==='diving'?160:80, boss: e.state==='diving'?400:150 };
        // Boss with captured ship
        if (e.type==='boss' && e.capturedShipIcon) {
          score += 1000; // rescue
          e.capturedShipIcon = false;
          // Rescued ship merges
          if (player) { player.dualMode = true; player.x2 = player.x + 24; }
        } else {
          score += pts[e.type] || 50;
        }
        if (score > hiScore) hiScore = score;
        if (!extraLifeGiven && score >= 20000) { extraLifeGiven=true; lives++; playTone(880,'sine',0.08,0.18); }
        spawnExplosion(e.x, e.y, e.type==='boss'?'#f4f':e.type==='butterfly'?'#88f':'#ff0', e.type==='boss'?16:12, 8, 20);
        playNoise(e.type==='boss'?0.25:0.15, e.type==='boss'?0.2:0.15);
        if (e.type==='bee') playTone(260,'square',0.08,0.1);
        else if(e.type==='butterfly') playTone(200,'square',0.1,0.12);
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player && player.alive && !player.invincible) {
    for (const b of enemyBullets) {
      if (!b.alive) continue;
      if (Math.abs(b.x-player.x)<9 && Math.abs(b.y-player.y)<7) {
        b.alive = false;
        killPlayer();
        break;
      }
    }
  }

  // Diving enemy vs player (contact)
  if (player && player.alive && !player.invincible) {
    for (const e of enemies) {
      if (!e.alive || e.state!=='diving') continue;
      if (Math.abs(e.x-player.x)<14 && Math.abs(e.y-player.y)<14) {
        e.alive = false;
        spawnExplosion(e.x, e.y, '#f80', 10, 6, 15);
        killPlayer();
        break;
      }
    }
  }

  // Dual ship collision (secondary ship)
  if (player && player.dualMode && !player.invincible) {
    for (const b of enemyBullets) {
      if (!b.alive) continue;
      if (Math.abs(b.x-player.x2)<9 && Math.abs(b.y-player.y)<7) {
        b.alive = false;
        player.dualMode = false; // lose dual ship
        spawnExplosion(player.x2, player.y, '#f84', 14, 8, 20);
        break;
      }
    }
  }
}

function killPlayer() {
  if (!player) return;
  spawnExplosion(player.x, player.y, '#f84', 20, 10, 30);
  playNoise(0.5, 0.3);
  playTone(150,'sawtooth',0.5,0.25,40);
  player.alive = false;
  lives--;
  if (lives <= 0) {
    setTimeout(() => { state = STATE.GAME_OVER; stageTimer = 180; }, 1500);
  } else {
    setTimeout(() => {
      if (state === STATE.BATTLE) {
        player = createPlayer();
        player.invincible = true;
        player.invTimer = 2000;
      }
    }, 2000);
  }
}

function updateExplosions(dt) {
  for (const ex of explosions) ex.frame += dt * 60;
  explosions = explosions.filter(ex => ex.frame < ex.maxFrame);
}

// ---- Draw ----
function drawHUD() {
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText('1UP', 10, 14);
  ctx.fillText(String(score).padStart(6,'0'), 10, 28);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff0';
  ctx.fillText('HI-SCORE', LW/2, 14);
  ctx.fillStyle = '#fff';
  ctx.fillText(String(hiScore).padStart(6,'0'), LW/2, 28);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaf';
  ctx.fillText('STAGE ' + String(stage).padStart(2,'0'), LW-8, 14);
  // Lives
  ctx.fillStyle = '#4af';
  for (let i = 0; i < lives-1; i++) {
    drawShip(14 + i*18, LH-22, true);
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, LW, LH);
  drawStars();

  if (state === STATE.TITLE) {
    // Title screen
    ctx.textAlign = 'center';
    ctx.font = 'bold 42px monospace';
    ctx.fillStyle = '#ff0';
    ctx.fillText('GALAGA', LW/2, LH/3);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('HI-SCORE: ' + hiScore, LW/2, LH/3 + 40);
    const blink = Math.floor(gameTotalTime * 2) % 2 === 0;
    ctx.fillStyle = blink ? '#fff' : '#555';
    ctx.fillText('PRESS ENTER TO START', LW/2, LH/3 + 90);
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText('ARROWS/AD: MOVE   SPACE/Z: FIRE', LW/2, LH/3 + 120);
    // Draw score legend
    ctx.fillStyle = '#aaa';
    ctx.fillText('BEE: 50/100  BUTTERFLY: 80/160  BOSS: 150/400', LW/2, LH/3 + 150);
    return;
  }

  if (state === STATE.STAGE_INTRO) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('-- STAGE ' + stage + ' --', LW/2, LH/2);
    return;
  }

  if (state === STATE.CHALLENGING) {
    ctx.textAlign = 'center';
    ctx.font = '14px monospace';
    ctx.fillStyle = '#ff0';
    ctx.fillText('★ CHALLENGING STAGE ★', LW/2, 55);
    drawChallenge();
    if (player && player.alive && player.blinkVis) drawShip(player.x, player.y, false);
    return;
  }

  if (state === STATE.STAGE_CLEAR) {
    for (const e of enemies) drawEnemy(e);
    for (const ex of explosions) drawExplosion(ex);
    ctx.textAlign = 'center';
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#4f4';
    ctx.fillText('STAGE ' + stage + ' CLEAR!', LW/2, LH/2);
    drawHUD();
    return;
  }

  // BATTLE / ENTRY
  for (const e of enemies) drawEnemy(e);

  // Player bullets
  ctx.fillStyle = '#fff';
  for (const b of playerBullets) {
    if (!b.alive) continue;
    ctx.fillRect(b.x-1.5, b.y-6, 3, 12);
  }

  // Enemy bullets
  ctx.fillStyle = '#f80';
  for (const b of enemyBullets) {
    if (!b.alive) continue;
    ctx.fillRect(b.x-1.5, b.y-4, 3, 8);
  }

  // Tractor beam
  drawTractorBeam();

  // Player ship
  if (player && player.alive && player.blinkVis) {
    drawShip(player.x, player.y, false);
    if (player.dualMode) drawShip(player.x + 24, player.y, false);
  }

  // Explosions
  for (const ex of explosions) drawExplosion(ex);

  drawHUD();

  if (state === STATE.GAME_OVER) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px monospace';
    ctx.fillStyle = '#f44';
    ctx.fillText('GAME OVER', LW/2, LH/2-30);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('SCORE: ' + score, LW/2, LH/2+10);
    ctx.fillText('HI-SCORE: ' + hiScore, LW/2, LH/2+35);
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('WAVE REACHED: ' + stage, LW/2, LH/2+60);
    ctx.fillText('PRESS ENTER', LW/2, LH/2+90);
  }

  if (state === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, LW, LH);
    ctx.textAlign = 'center';
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', LW/2, LH/2);
  }
}

// ---- Main loop ----
let prevKeys = {};
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Edge triggers
  if (!prevKeys['Enter'] && keys['Enter']) {
    getAC();
    if (state === STATE.TITLE) startGame();
    if (state === STATE.GAME_OVER) state = STATE.TITLE;
  }
  if (!prevKeys['KeyP'] && keys['KeyP'] || !prevKeys['Escape'] && keys['Escape']) {
    if (state === STATE.BATTLE) { state = STATE.PAUSED; }
    else if (state === STATE.PAUSED) { state = STATE.BATTLE; }
  }
  Object.assign(prevKeys, keys);

  update(dt);
  draw();
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

})();
</script>
