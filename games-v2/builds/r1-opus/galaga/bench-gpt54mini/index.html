function torusTarget(ax,ay,bx,by){let dx=bx-ax,dy=by-ay; if(Math.abs(dx)>W/2) dx-=Math.sign(dx)*W; if(Math.abs(dy)>H/2) dy-=Math.sign(dy)*H; return {x:dx,y:dy};}

// correct AABB
function rectsIntersect(r1,r2){return r1.x<r2.x+r2.w && r1.x+r1.w>r2.x && r1.y<r2.y+r2.h && r1.y+r1.h>r2.y}
function hitEnemy(e){e.alive=false; score+=e.type==='bee'?50:e.type==='butterfly'?80:150; spawnExplosion('enemy',e.x,e.y); if(e.type==='boss'&&e.captured){duelPending=true}} 
function hitUFO(killPlayerAlso=false){if(!ufo||!ufo.alive)return; spawnExplosion('ufo',ufo.x,ufo.y); score+=ufo.type==='small'?1000:200; ufo.alive=false; ufoTimer=rand(15,25); SFX.ufoDie(); if(killPlayerAlso){} }
function rescueShip(){dualMode=true; if(player) {player.dual=true; player.inv=1.2;}}
function killPlayer(){if(!player||!player.alive) return; spawnExplosion('player',player.x,player.y); SFX.playerExp(); player.alive=false; lives--; if(lives<=0){state='GAME_OVER'; gameOverTimer=3; setBest(); return;} state='RESPAWN_WAIT'; respawnTimer=0; }
function spawnExplosion(kind,x,y){let n=kind==='player'?10:kind==='ufo'?12:8; for(let i=0;i<n;i++) explosions.push({kind,x,y,ang:rand(0,Math.PI*2),sp:kind==='player'?rand(20,70):rand(10,45),len:kind==='player'?rand(10,18):rand(4,10),t:0,d:kind==='player'?0.5:0.3,clr:kind==='player'?'#ff9933':'#fff'})}
function updateExplosions(dt){explosions=explosions.filter(ex=>{ex.t+=dt; ex.x+=Math.cos(ex.ang)*ex.sp*dt*60; ex.y+=Math.sin(ex.ang)*ex.sp*dt*60; return ex.t<ex.d});}
function renderEnemyShape(e,alpha=1){const f=((e.anim|0)%8)<4; ctx.save(); ctx.translate(e.x,e.y); ctx.globalAlpha=alpha; if(e.type==='bee'){ctx.fillStyle='#ff0'; ctx.strokeStyle='#f00'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(-6,-1); ctx.lineTo(-10,4); ctx.lineTo(-5,8); ctx.lineTo(0,4); ctx.lineTo(5,8); ctx.lineTo(10,4); ctx.lineTo(6,-1); ctx.closePath(); ctx.fill(); ctx.stroke(); if(f){ctx.fillStyle='#fff'; ctx.fillRect(-9,-2,4,2); ctx.fillRect(5,-2,4,2);} else {ctx.fillStyle='#fff'; ctx.fillRect(-8,-4,3,2); ctx.fillRect(5,-4,3,2);} }
 else if(e.type==='butterfly'){ctx.fillStyle='#0af'; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(-4,-2); ctx.lineTo(-10,-4); ctx.lineTo(-14,1); ctx.lineTo(-6,6); ctx.lineTo(-2,2); ctx.lineTo(0,8); ctx.lineTo(2,2); ctx.lineTo(6,6); ctx.lineTo(14,1); ctx.lineTo(10,-4); ctx.lineTo(4,-2); ctx.closePath(); ctx.fill(); ctx.stroke(); if(f){ctx.strokeStyle='#cff'; ctx.beginPath(); ctx.moveTo(-8,-1); ctx.lineTo(-12,3); ctx.moveTo(8,-1); ctx.lineTo(12,3); ctx.stroke();}}
 else {ctx.fillStyle='#f44'; ctx.strokeStyle='#f0f'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-8,-4); ctx.lineTo(-10,2); ctx.lineTo(-6,8); ctx.lineTo(0,10); ctx.lineTo(6,8); ctx.lineTo(10,2); ctx.lineTo(8,-4); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle='#fff'; ctx.fillRect(-3,-2,6,4); if(f){ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.moveTo(-12,2); ctx.lineTo(-16,6); ctx.moveTo(12,2); ctx.lineTo(16,6); ctx.stroke();}}
 ctx.restore(); }
function renderPlayerShip(x,y,dual=false,alpha=1){ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.fillStyle='#7cf'; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-12,8); ctx.lineTo(-6,12); ctx.lineTo(0,8); ctx.lineTo(6,12); ctx.lineTo(12,8); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle='rgba(120,220,255,0.65)'; ctx.beginPath(); ctx.ellipse(0,10,4,2,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
function renderUFO(u){ctx.save(); ctx.translate(u.x,u.y); ctx.strokeStyle='#f44'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-10,-6); ctx.lineTo(10,-6); ctx.lineTo(15,0); ctx.lineTo(10,5); ctx.lineTo(-10,5); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-11,-3); ctx.lineTo(11,-3); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-7,-6); ctx.lineTo(-3,-10); ctx.lineTo(3,-10); ctx.lineTo(7,-6); ctx.stroke(); ctx.restore(); }
function renderBeam(b){if(!beamOn||!b) return; ctx.save(); ctx.globalAlpha=0.45+0.25*Math.sin(performance.now()/80); ctx.strokeStyle='#59f'; ctx.fillStyle='rgba(80,140,255,0.2)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(b.x-8,b.y+12); ctx.lineTo(b.x-20,b.y+132); ctx.lineTo(b.x+20,b.y+132); ctx.lineTo(b.x+8,b.y+12); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();}
function drawStars(){for(const s of stars){ctx.fillStyle=s.s>0.6?'#fff':'#66a'; ctx.fillRect(s.x,s.y,1,1)}}
function updateStars(dt){for(const s of stars){s.y+=dt*(s.s*20); if(s.y>H) s.y-=H}}
function renderHUD(){ctx.fillStyle='#fff'; ctx.font='16px monospace'; ctx.fillText('1UP',12,14); ctx.fillText(String(score).padStart(5,'0'),12,30); ctx.textAlign='center'; ctx.fillText('HI-SCORE '+String(best).padStart(5,'0'),192,22); ctx.textAlign='left'; ctx.fillText('STAGE '+String(stage).padStart(2,'0'),286,22); ctx.textAlign='left'; let lx=10; for(let i=0;i<lives-1;i++){ctx.save(); ctx.translate(lx+i*18,652); ctx.scale(0.5,0.5); ctx.strokeStyle='#fff'; ctx.fillStyle='#7cf'; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-12,8); ctx.lineTo(-6,12); ctx.lineTo(0,8); ctx.lineTo(6,12); ctx.lineTo(12,8); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();} ctx.textAlign='left'}
function drawTexts(){if(state==='TITLE'){ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='34px monospace'; const letters='GALAGA'; let x=192-105; for(let i=0;i<letters.length;i++){ctx.fillText(letters[i],x+i*34+rand(-1,1)*(Math.sin(titleJitter*3)+1),180+rand(-1,1)*(Math.cos(titleJitter*5)+1));} ctx.font='16px monospace'; ctx.fillStyle='#888'; ctx.globalAlpha=0.4+0.6*(0.5+0.5*Math.sin(titleBlink*6)); ctx.fillText('PRESS ENTER TO START',192,500); ctx.globalAlpha=1; ctx.fillText('HI-SCORE '+String(best).padStart(5,'0'),192,540); ctx.restore(); }
if(state==='STAGE_INTRO'){ctx.save(); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='22px monospace'; ctx.fillText(stageLabel,192,320); ctx.restore();}
if(state==='STAGE_CLEAR'){ctx.save(); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='20px monospace'; ctx.fillText('STAGE CLEAR',192,320); ctx.restore();}
if(state==='GAME_OVER'){ctx.save(); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='24px monospace'; ctx.fillText('GAME OVER',192,250); ctx.font='16px monospace'; ctx.fillText('SCORE '+score,192,300); if(score>=best){ctx.globalAlpha=0.5+0.5*Math.sin(gameOverTimer*6); ctx.fillText('HIGH SCORE!',192,335); ctx.globalAlpha=1;} ctx.fillStyle='#888'; ctx.fillText('STAGE '+stage,192,365); if(Math.floor(performance.now()/250)%2===0) ctx.fillText('ENTER TO RESTART',192,420); ctx.restore(); }
if(state==='PAUSED'){ctx.save(); ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='22px monospace'; ctx.fillText('PAUSED',192,320); ctx.font='14px monospace'; ctx.fillStyle='#888'; ctx.fillText('P TO RESUME',192,348); ctx.restore();}}
function renderEntities(){drawStars(); if(state!=='TITLE'){if(player&&player.alive){if(player.inv<=0 || Math.floor(performance.now()/83)%2===0){if(player.dual){renderPlayerShip(player.x-12,player.y); renderPlayerShip(player.x+12,player.y);} else renderPlayerShip(player.x,player.y);}} renderBeam(ufo); if(ufo&&ufo.alive) renderUFO(ufo);} else {renderPlayerShip(192,590); }
for(const e of enemies){if(e.alive){ctx.save(); ctx.globalAlpha=(e.state==='entering'?0.9:1); renderEnemyShape(e); if(e.captured&&e.type==='boss'){ctx.fillStyle='#fff'; ctx.fillRect(e.x+10,e.y-2,8,12);} ctx.restore();}}
for(const b of bullets){ctx.fillStyle='#fff'; ctx.fillRect(b.x-1,b.y-5,3,10)} for(const b of eBullets){ctx.fillStyle='#f44'; ctx.fillRect(b.x-1.5,b.y-3,3,6)} for(const ex of explosions){ctx.save(); const a=1-ex.t/ex.d; ctx.globalAlpha=a; ctx.strokeStyle=ex.clr; ctx.lineWidth=1.5; const n=ex.kind==='player'?12:8; for(let i=0;i<n;i++){const ang=ex.ang+i*0.55; ctx.beginPath(); ctx.moveTo(ex.x,ex.y); ctx.lineTo(ex.x+Math.cos(ang)*ex.len,ex.y+Math.sin(ang)*ex.len); ctx.stroke();} ctx.restore()}}
function stepTitle(dt){titleBlink+=dt; titleJitter+=dt; updateStars(dt); titleShipAngle+=dt*0.8;}
function maybeSpawnChallenge(){if(!challengeActive) return; if(challengeSpawn>=challengeTotal) return; challengeTimer-=1/60; if(challengeTimer<=0){challengeTimer=rand(0.4,0.8); let n=rand(4,8)|0; for(let i=0;i<n && challengeSpawn<challengeTotal;i++){challengeSpawn++; let e={type:['bee','butterfly','boss'][challengeSpawn%3],alive:true,x:rand(30,354),y:-20,frame:0,anim:0,state:'diving',diving:true,diveT:0,shootAt:0.6,slotX:rand(50,334),slotY:rand(60,240),returned:false}; e.p0={x:e.x,y:e.y}; e.p1={x:e.x+rand(-40,40),y:120}; e.p2={x:rand(100,284),y:220}; e.p3={x:rand(20,364),y:720}; enemies.push(e)}} }
function updateChallenge(dt){updateStars(dt); if(challengeTimer<=0) challengeTimer=rand(0.4,0.8); challengeTimer-=dt; maybeSpawnChallenge(); bullets.forEach(b=>{b.x+=b.vx*dt*60;b.y+=b.vy*dt*60;b.life-=dt}); eBullets.forEach(b=>{b.x+=b.vx*dt*60;b.y+=b.vy*dt*60;b.life-=dt}); bullets=bullets.filter(b=>b.life>0); eBullets=eBullets.filter(b=>b.life>0); if(player){let dx=0;if(keys['ArrowLeft']||keys['KeyA'])dx-=4;if(keys['ArrowRight']||keys['KeyD'])dx+=4; player.x=clamp(player.x+dx,24,W-24); if((keys['Space']||keys['KeyZ'])&&!prev._shot && shotCooldown<=0){addBullet('player',player.x,player.y-16,0,-10); shotCooldown=0.08; SFX.shoot()} prev._shot=keys['Space']||keys['KeyZ'];} if(shotCooldown>0) shotCooldown-=dt; challengeTimer-=dt; if(challengeSpawn>=challengeTotal && bullets.length===0 && eBullets.length===0 && enemies.filter(e=>e.alive).length===0){state='STAGE_CLEAR'; clearTimer=1.5;}
}
function updateGameOver(dt){updateStars(dt); if(ufo&&ufo.alive) updateUFO(dt); updateDebris(dt); gameOverTimer-=dt; if(gameOverTimer<=0) titleBlink+=dt; }
function updateUFO(dt){if(!ufo||!ufo.alive) return; ufo.x+=ufo.vx*dt*60; ufo.y+=ufo.vy*dt*60; if(ufo.y<50||ufo.y>240) ufo.vy*=-1; if(ufo.x<-30||ufo.x>W+30) {ufo.alive=false; ufoTimer=rand(15,25); return;} ufo.turnT-=dt; ufo.shootT-=dt; if(ufo.turnT<=0){ufo.turnT=rand(ufo.type==='small'?0.3:0.6,ufo.type==='small'?1.0:1.8); ufo.vy+=rand(-30,30)/60; if(ufo.type==='small'&&Math.random()<0.5) ufo.vx*=-1;} if(ufo.shootT<=0){ufo.shootT=rand(ufo.type==='small'?1.0:1.5,ufo.type==='small'?1.5:2.5); let vx,vy; if(ufo.type==='small'){let v=torusTarget(ufo.x,ufo.y,player?player.x:192,player?player.y:590); const l=Math.hypot(v.x,v.y)||1; vx=v.x/l*300/60; vy=v.y/l*300/60;} else {const a=rand(0,Math.PI*2); vx=Math.cos(a)*250/60; vy=Math.sin(a)*250/60} addEnemyBullet(ufo.x,ufo.y+8,vx,vy); ufoPresentTimer=4; }}
function updateDebris(dt){for(const d of explosions){d.t+=dt; d.x+=Math.cos(d.ang)*d.sp*dt*60; d.y+=Math.sin(d.ang)*d.sp*dt*60} explosions=explosions.filter(e=>e.t<e.d)}
function updateCommon(dt){updateStars(dt); if(beatTimer>0) beatTimer-=dt; if(shotCooldown>0) shotCooldown-=dt; if(respawnTimer>0) respawnTimer-=dt; if(clearTimer>0) clearTimer-=dt; if(introTimer>0) introTimer-=dt; if(ufoPresentTimer>0) ufoPresentTimer-=dt; if(ufoTimer>0) ufoTimer-=dt; if(invTimer>0) invTimer-=dt; if(beamTimer>0) beamTimer-=dt; if(capture) capture.t+=dt}
function hitAndScore(e,fromBullet=true){if(!e.alive)return; const cfg=typeCfg[e.type]; e.alive=false; if(e.type==='boss'&&e.captured){score+=1000; duelPending=true; dualMode=true; player.dual=true; player.inv=1.2; return;} if(e.type==='boss' && !fromBullet && e.captured){score+=1000} else score+=cfg.pts; if(e.type==='bee') SFX.smallExp(); else if(e.type==='butterfly') SFX.largeExp(); else SFX.largeExp(); setBest(); spawnExplosion('enemy',e.x,e.y);}
function enemyPoint(e){if(e.type==='bee') return 50; if(e.type==='butterfly') return 80; return 150}
function updateFormationEnemy(e,dt){e.anim=(e.anim+dt*60)%8; e.x=e.slotX+formationX; e.y=e.slotY; }
function updateEnemyDive(e,dt){e.anim=(e.anim+dt*60)%8; const speed=(3+(stage-1)*0.2)*60; if(e.diveT===0) e.p0={x:e.x,y:e.y}; e.diveT+=dt*0.6*speed/60; const t=clamp(e.diveT,0,1); if(!e.returned){const p=bezier4(e.p0,e.p1,e.p2,e.p3,t); e.x=p.x; e.y=p.y; if(e.shootAt>0){e.shootAt-=dt; if(e.shootAt<=0){if(e.type==='boss' && Math.random()<0.35){addEnemyBullet(e.x,e.y+8,0,smallStageBulletSpeed()+1.2); addEnemyBullet(e.x+8,e.y+8,0,smallStageBulletSpeed()+1.2)} else {const vt=torusTarget(e.x,e.y,player?player.x:192,player?player.y:590); const l=Math.hypot(vt.x,vt.y)||1; addEnemyBullet(e.x,e.y+8,vt.x/l*smallStageBulletSpeed()*60,vt.y/l*smallStageBulletSpeed()*60)}}} if(e.y>H+20){e.returned=true; e.x=e.slotX+formationX; e.y=-20; e.state='formation'; e.diving=false; if(e.captured){e.captured=false; score+=1000; player.dual=true}}} }
function updateEnemies(dt){if(entryDone && !challengeActive){updateFormation(dt); for(const e of enemies) if(e.state==='entering'){} } enemies.forEach(e=>{if(e.state==='entering'){e.anim=(e.anim+dt*60)%8; e.entryT=(e.entryT||0)+dt*(0.18+stage*0.01); const pts=e.entry||entryPath(e); const p=followPath(pts,Math.min(1,e.entryT)); e.x=p.x; e.y=p.y; if(e.entryT>=1){e.state='formation'; e.x=e.slotX+formationX; e.y=e.slotY}} else if(e.state==='formation'){updateFormationEnemy(e,dt)} else if(e.state==='diving'){updateEnemyDive(e,dt)}})}
function followPath(path,t){const seg=(path.length-1)*t; const i=Math.min(path.length-2,Math.max(0,Math.floor(seg))); const lt=seg-i, a=path[i], b=path[i+1]; return {x:a.x+(b.x-a.x)*lt,y:a.y+(b.y-a.y)*lt}; }
function updateStageState(dt){updateCommon(dt); if(state==='TITLE'){stepTitle(dt); return;} if(state==='STAGE_INTRO'){if(introTimer<=0) state=challenge? 'CHALLENGING_STAGE':'ENTRY'; return;} if(state==='ENTRY'){updateEnemies(dt); if(enemies.every(e=>e.state==='formation')){entryDone=true; state='BATTLE'; diveTimer=1.5;}} if(state==='BATTLE'){updateEnemies(dt); updateBattle(dt); if(challengeActive){updateChallenge(dt)} else {if(ufoPresentTimer<=0 && !ufo && ufoTimer<=0) spawnUFO(); if(enemies.filter(e=>e.state==='formation').length>0){diveTimer-=dt; if(diveTimer<=0){let n=Math.min(maxDivers,enemies.filter(e=>e.state==='formation').length); for(let i=0;i<n;i++){const cand=enemies.filter(e=>e.state==='formation'); if(!cand.length) break; const pick=cand[(Math.random()*cand.length)|0]; startDive(pick);} diveTimer=rand(Math.max(1,2.4-(stage-1)*0.1),Math.max(1,4-(stage-1)*0.1)); }}} } if(state==='CHALLENGING_STAGE'){updateChallenge(dt)} if(state==='STAGE_CLEAR'){clearTimer-=dt; if(clearTimer<=0){stage++; initStage();}} if(state==='RESPAWN_WAIT'){updateEnemies(dt); updateUFO(dt); updateDebris(dt); respawnTimer+=dt; if(respawnTimer>0.1 && shipClear()) {resetPlayer(); state='BATTLE'; respawnTimer=0;} } if(state==='GAME_OVER'){updateGameOver(dt); if(keys['Enter'] && !prev.Enter){state='TITLE'; stage=1; score=0; lives=3; extraLifeGiven=false; dualMode=false; titleSetup();}} if(state==='PAUSED'){} }
function shipClear(){for(const e of enemies){if(e.alive && dist({x:400,y:300},e)<120) return false;} return true; }
function titleSetup(){makeStars(); stage=1; score=0; lives=3; extraLifeGiven=false; dualMode=false; player=null; bullets=[]; eBullets=[]; enemies=[]; explosions=[]; ufo=null; state='TITLE'; titleBlink=0; titleJitter=0; stageTimer=0; entryDone=false; introTimer=0; beatTimer=0; beatIdx=0; challenge=false; challengeActive=false; challengeSpawn=0; stageLabel=''; shipHold=false;}
function initNewStage(){challenge=stage%3===0; challengeActive=challenge; stageLabel=challenge?'CHALLENGING STAGE':'STAGE '+String(stage).padStart(2,'0'); entryDone=false; if(challenge){enemies=[]; for(let i=0;i<40;i++){enemies.push({type:i%3===0?'boss':i%2===0?'butterfly':'bee',alive:true,x:rand(20,364),y:-20-rand(0,500),vx:0,vy:0,state:'challenging',anim:0,diveT:0,entryT:0})} challengeSpawn=0; challengeTimer=0.5; state='CHALLENGING_STAGE'; introTimer=0; return;} makeFormationLayout(); spawnEnemies(); state='STAGE_INTRO'; introTimer=2; SFX.stage(); }
function spawnEnemies(){enemies.forEach(e=>{e.state='entering'; e.entryT=0; const pts=entryPath(e); e.entry=pts; e.x=pts[0].x; e.y=pts[0].y; e.alive=true; e.anim=0; e.diving=false; e.returned=false; e.captured=false; e.shootAt=0; e.slotX=slotPos(e.col,e.row).x; e.slotY=slotPos(e.col,e.row).y;})}
function spawnExplosion(kind,x,y){const n=kind==='player'?12:kind==='ufo'?12:8; for(let i=0;i<n;i++){explosions.push({kind,x,y,ang:rand(0,Math.PI*2),sp:kind==='player'?rand(20,70):rand(20,60),len:kind==='player'?rand(8,16):rand(4,10),t:0,d:kind==='player'?0.5:0.22,clr:kind==='player'?'#ff9933':'#fff'})}}
function render(){ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); drawStars(); if(state==='TITLE'){for(const e of enemies) if(e.alive) renderEnemyShape(e); renderPlayerShip(192,590,false,1); renderTexts(); renderHUD(); return;} renderEntities(); renderHUD(); renderTexts(); if(state==='PAUSED'){ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='22px monospace'; ctx.fillText('PAUSED',192,320); ctx.font='14px monospace'; ctx.fillStyle='#888'; ctx.fillText('P TO RESUME',192,348);} }
function mainLoop(now){let dt=Math.min(0.05,(now-last)/1000); last=now; if(state!=='PAUSED') updateStageState(dt); render(); prev={...keys}; requestAnimationFrame(mainLoop)}
addEventListener('keydown',e=>{keys[e.code]=true; acq(); if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyZ','Space','Enter','KeyP','Escape'].includes(e.code)) e.preventDefault(); if(state==='TITLE'&&e.code==='Enter'){score=0;lives=3;stage=1;extraLifeGiven=false; dualMode=false; player=null; bullets=[];eBullets=[];enemies=[];explosions=[];ufo=null; titleSetup(); initNewStage(); state='STAGE_INTRO'; introTimer=2; SFX.stage();} if((e.code==='KeyP'||e.code==='Escape') && state!=='TITLE' && state!=='GAME_OVER'){paused=!paused; state=paused?'PAUSED':(challengeActive?'CHALLENGING_STAGE':'BATTLE');} if(state==='BATTLE' && (e.code==='Space' || e.code==='KeyZ') && !prev[e.code]){if(!player) return; if(shotCooldown<=0) {const n=player.dual?2:1; for(let i=0;i<n;i++) addBullet('player',player.x+(player.dual?(i?12:-12):0),player.y-18,0,-10); shotCooldown=0.12; }} if(state==='BATTLE' && e.code==='KeyP'){} });
addEventListener('keyup',e=>{keys[e.code]=false;});
makeStars(); resetPlayer(); initNewStage(); state='TITLE'; titleSetup(); requestAnimationFrame(mainLoop);
})();
</script>
