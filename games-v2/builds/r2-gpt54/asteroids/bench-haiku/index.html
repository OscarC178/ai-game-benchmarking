<!--
  GAME:      Asteroids
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Courier New", monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="asteroidsCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('asteroidsCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;

    const STATES = { TITLE: 'title', PLAYING: 'playing', PAUSED: 'paused', RESPAWNING: 'respawning', WAVE_TRANSITION: 'wave', GAME_OVER: 'game_over' };

    // Ship
    let ship = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2,
      radius: 14,
      alive: true,
      invulnerableTime: 0
    };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('asteroids_best') || '0');
    let lives = 3;
    let wave = 1;
    let gameTime = 0;
    let transitionTime = 0;
    let respawnTime = 0;

    // Collections
    let asteroids = [];
    let bullets = [];
    let ufoBullets = [];
    let particles = [];
    let ufo = null;

    // Timers
    let fireTimer = 0;
    let ufoSpawnTimer = 20;

    // Input
    let keys = {};
    let audioCtx = null;

    function createAsteroid(x, y, size, vx, vy) {
      const sizes = { large: 40, medium: 24, small: 14 };
      const radius = sizes[size];
      const points = [];
      for (let i = 0; i < 8 + Math.random() * 4; i++) {
        const angle = (i / (8 + Math.random() * 4)) * Math.PI * 2;
        const r = radius * (0.7 + Math.random() * 0.3);
        points.push([Math.cos(angle) * r, Math.sin(angle) * r]);
      }
      asteroids.push({
        x: x, y: y, vx: vx || (Math.random() - 0.5) * 100, vy: vy || (Math.random() - 0.5) * 100,
        radius: radius, size: size, points: points, angle: 0, spin: (Math.random() - 0.5) * 2
      });
    }

    function spawnWave() {
      asteroids = [];
      const count = 4 + wave - 1;
      const positions = [[100, 100], [700, 100], [100, 500], [700, 500], [100, 300], [700, 300]];
      for (let i = 0; i < count; i++) {
        const pos = positions[i % positions.length];
        createAsteroid(pos[0] + Math.random() * 40 - 20, pos[1] + Math.random() * 40 - 20, 'large');
      }
      gameState = STATES.PLAYING;
      transitionTime = 0;
    }

    function fireShip() {
      if (fireTimer <= 0 && bullets.length < 4) {
        bullets.push({
          x: ship.x + Math.cos(ship.angle) * 20,
          y: ship.y + Math.sin(ship.angle) * 20,
          vx: Math.cos(ship.angle) * 420 + ship.vx * 0.5,
          vy: Math.sin(ship.angle) * 420 + ship.vy * 0.5,
          life: 1.5
        });
        fireTimer = 0.25;
        playSound(800, 0.05);
      }
    }

    function splitAsteroid(ast) {
      if (ast.size === 'large') {
        createAsteroid(ast.x, ast.y, 'medium', ast.vx + (Math.random() - 0.5) * 40, ast.vy + (Math.random() - 0.5) * 40);
        createAsteroid(ast.x, ast.y, 'medium', ast.vx + (Math.random() - 0.5) * 40, ast.vy + (Math.random() - 0.5) * 40);
        score += 20;
      } else if (ast.size === 'medium') {
        createAsteroid(ast.x, ast.y, 'small', ast.vx + (Math.random() - 0.5) * 60, ast.vy + (Math.random() - 0.5) * 60);
        createAsteroid(ast.x, ast.y, 'small', ast.vx + (Math.random() - 0.5) * 60, ast.vy + (Math.random() - 0.5) * 60);
        score += 50;
      } else {
        score += 100;
      }
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('asteroids_best', highScore);
      }
      playSound(600, 0.1);
    }

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Enter') {
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) {
          score = 0;
          lives = 3;
          wave = 1;
          ship = { x: WIDTH / 2, y: HEIGHT / 2, vx: 0, vy: 0, angle: -Math.PI / 2, radius: 14, alive: true, invulnerableTime: 0 };
          bullets = [];
          ufoBullets = [];
          asteroids = [];
          ufo = null;
          fireTimer = 0;
          ufoSpawnTimer = 20;
          spawnWave();
        }
      }
      if (e.code === 'KeyP') gameState = gameState === STATES.PLAYING ? STATES.PAUSED : STATES.PLAYING;
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    function update(dt) {
      if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) return;

      if (gameState === STATES.PAUSED) return;

      gameTime += dt;
      fireTimer -= dt;
      ufoSpawnTimer -= dt;

      // Ship control
      if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= 240 * Math.PI / 180 * dt;
      if (keys['ArrowRight'] || keys['KeyD']) ship.angle += 240 * Math.PI / 180 * dt;
      if (keys['ArrowUp'] || keys['KeyW']) {
        ship.vx += Math.cos(ship.angle) * 220 * dt;
        ship.vy += Math.sin(ship.angle) * 220 * dt;
        const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
        if (speed > 320) {
          ship.vx = (ship.vx / speed) * 320;
          ship.vy = (ship.vy / speed) * 320;
        }
      }
      if (keys['Space']) fireShip();

      // Ship respawn
      if (gameState === STATES.RESPAWNING) {
        respawnTime -= dt;
        if (respawnTime <= 0) {
          ship.alive = true;
          ship.invulnerableTime = 2;
          gameState = STATES.PLAYING;
        }
      }

      // Ship invulnerability
      if (ship.invulnerableTime > 0) ship.invulnerableTime -= dt;

      // Move ship
      if (ship.alive) {
        ship.x += ship.vx * dt;
        ship.y += ship.vy * dt;
        if (ship.x < 0) ship.x = WIDTH;
        if (ship.x > WIDTH) ship.x = 0;
        if (ship.y < 0) ship.y = HEIGHT;
        if (ship.y > HEIGHT) ship.y = 0;
      }

      // Move bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].vx * dt;
        bullets[i].y += bullets[i].vy * dt;
        bullets[i].life -= dt;
        if (bullets[i].x < 0) bullets[i].x = WIDTH;
        if (bullets[i].x > WIDTH) bullets[i].x = 0;
        if (bullets[i].y < 0) bullets[i].y = HEIGHT;
        if (bullets[i].y > HEIGHT) bullets[i].y = 0;
        if (bullets[i].life <= 0) bullets.splice(i, 1);
      }

      // Move asteroids
      for (let a of asteroids) {
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        a.angle += a.spin * dt;
        if (a.x < 0) a.x = WIDTH;
        if (a.x > WIDTH) a.x = 0;
        if (a.y < 0) a.y = HEIGHT;
        if (a.y > HEIGHT) a.y = 0;
      }

      // UFO
      if (!ufo && ufoSpawnTimer <= 0) {
        ufo = { x: Math.random() < 0.5 ? 0 : WIDTH, y: Math.random() * HEIGHT, vx: Math.random() < 0.5 ? 100 : -100, vy: (Math.random() - 0.5) * 50, shootTimer: 1 };
        ufoSpawnTimer = 20 + Math.random() * 15;
      }

      if (ufo) {
        ufo.x += ufo.vx * dt;
        ufo.y += ufo.vy * dt;
        ufo.shootTimer -= dt;
        if (ufo.shootTimer <= 0) {
          const dx = ship.x - ufo.x;
          const dy = ship.y - ufo.y;
          const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.3;
          ufoBullets.push({ x: ufo.x, y: ufo.y, vx: Math.cos(angle) * 250, vy: Math.sin(angle) * 250, life: 1.5 });
          ufo.shootTimer = 1 + Math.random() * 1;
        }
        if (ufo.x < -50 || ufo.x > WIDTH + 50) ufo = null;
      }

      // Move UFO bullets
      for (let i = ufoBullets.length - 1; i >= 0; i--) {
        ufoBullets[i].x += ufoBullets[i].vx * dt;
        ufoBullets[i].y += ufoBullets[i].vy * dt;
        ufoBullets[i].life -= dt;
        if (ufoBullets[i].life <= 0) ufoBullets.splice(i, 1);
      }

      // Collisions: bullet vs asteroid
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const dx = bullets[i].x - asteroids[j].x;
          const dy = bullets[i].y - asteroids[j].y;
          if (Math.sqrt(dx * dx + dy * dy) < asteroids[j].radius) {
            splitAsteroid(asteroids[j]);
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Collisions: bullet vs UFO
      if (ufo) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const dx = bullets[i].x - ufo.x;
          const dy = bullets[i].y - ufo.y;
          if (Math.sqrt(dx * dx + dy * dy) < 20) {
            score += 200;
            ufo = null;
            bullets.splice(i, 1);
            playSound(400, 0.15);
            break;
          }
        }
      }

      // Collisions: ship vs asteroid
      if (ship.alive && ship.invulnerableTime <= 0) {
        for (let a of asteroids) {
          const dx = ship.x - a.x;
          const dy = ship.y - a.y;
          if (Math.sqrt(dx * dx + dy * dy) < ship.radius + a.radius) {
            ship.alive = false;
            lives--;
            playSound(100, 0.3);
            if (lives > 0) {
              gameState = STATES.RESPAWNING;
              respawnTime = 1;
            } else {
              gameState = STATES.GAME_OVER;
            }
          }
        }
      }

      // Collisions: UFO bullet vs ship
      if (ship.alive && ship.invulnerableTime <= 0) {
        for (let i = ufoBullets.length - 1; i >= 0; i--) {
          const dx = ship.x - ufoBullets[i].x;
          const dy = ship.y - ufoBullets[i].y;
          if (Math.sqrt(dx * dx + dy * dy) < ship.radius + 3) {
            ship.alive = false;
            lives--;
            playSound(100, 0.3);
            if (lives > 0) {
              gameState = STATES.RESPAWNING;
              respawnTime = 1;
            } else {
              gameState = STATES.GAME_OVER;
            }
            ufoBullets.splice(i, 1);
            break;
          }
        }
      }

      // Wave clear
      if (asteroids.length === 0 && gameState === STATES.PLAYING) {
        wave++;
        gameState = STATES.WAVE_TRANSITION;
        transitionTime = 2;
      }

      if (gameState === STATES.WAVE_TRANSITION) {
        transitionTime -= dt;
        if (transitionTime <= 0) spawnWave();
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('ASTEROIDS', WIDTH / 2, 100);
        ctx.font = '16px "Courier New"';
        ctx.fillStyle = '#AAA';
        ctx.fillText('Rotate: Arrow Keys or A/D', WIDTH / 2, 200);
        ctx.fillText('Thrust: Arrow Up or W', WIDTH / 2, 230);
        ctx.fillText('Fire: Space', WIDTH / 2, 260);
        ctx.fillStyle = '#FF0';
        ctx.font = 'bold 24px "Courier New"';
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
      } else {
        // HUD
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 10, 20);
        ctx.textAlign = 'center';
        ctx.fillText('Wave: ' + wave, WIDTH / 2, 20);
        ctx.textAlign = 'right';
        ctx.fillText('Best: ' + highScore, WIDTH - 10, 20);
        ctx.textAlign = 'left';
        ctx.fillText('Lives: ' + lives, 10, 580);

        // Asteroids
        ctx.strokeStyle = '#AAA';
        ctx.lineWidth = 1;
        for (let a of asteroids) {
          ctx.save();
          ctx.translate(a.x, a.y);
          ctx.rotate(a.angle);
          ctx.beginPath();
          ctx.moveTo(a.points[0][0], a.points[0][1]);
          for (let i = 1; i < a.points.length; i++) {
            ctx.lineTo(a.points[i][0], a.points[i][1]);
          }
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }

        // Ship
        if (ship.alive && (ship.invulnerableTime <= 0 || Math.sin(gameTime * 10) > 0)) {
          ctx.strokeStyle = '#FFF';
          ctx.lineWidth = 2;
          ctx.save();
          ctx.translate(ship.x, ship.y);
          ctx.rotate(ship.angle);
          ctx.beginPath();
          ctx.moveTo(14, 0);
          ctx.lineTo(-10, -10);
          ctx.lineTo(-5, 0);
          ctx.lineTo(-10, 10);
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }

        // Bullets
        ctx.fillStyle = '#FFF';
        for (let b of bullets) {
          ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
        }

        // UFO
        if (ufo) {
          ctx.strokeStyle = '#FFF';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(ufo.x, ufo.y, 16, 8, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        // UFO bullets
        ctx.fillStyle = '#F44';
        for (let b of ufoBullets) {
          ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
        }

        if (gameState === STATES.PAUSED) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
        } else if (gameState === STATES.WAVE_TRANSITION) {
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('WAVE ' + wave, WIDTH / 2, HEIGHT / 2);
        } else if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0,0,0,0.8)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FF0';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', WIDTH / 2, 200);
          ctx.fillStyle = '#FFF';
          ctx.font = '32px "Courier New"';
          ctx.fillText('Score: ' + score, WIDTH / 2, 280);
          ctx.font = 'bold 20px "Courier New"';
          ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
        }
      }
    }

    function playSound(freq, dur) {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          return;
        }
      }
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      } catch (e) {}
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
