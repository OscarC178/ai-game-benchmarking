<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 'TITLE';
    const STATE_STAGE_INTRO = 'STAGE_INTRO';
    const STATE_PLAYING = 'PLAYING';
    const STATE_PAUSED = 'PAUSED';
    const STATE_RESPAWN = 'RESPAWN';
    const STATE_GAMEOVER = 'GAMEOVER';
    
    // Player
    const PLAYER_W = 32;
    const PLAYER_H = 24;
    const PLAYER_SPEED = 320;
    const PLAYER_START_X = W / 2;
    const PLAYER_START_Y = 540;
    const MAX_BULLETS = 2;
    const BULLET_SPEED = 500;
    const FIRE_COOLDOWN = 200;
    
    // Enemy types
    const ENEMY_BEE = 'bee';
    const ENEMY_BUTTERFLY = 'butterfly';
    const ENEMY_BOSS = 'boss';
    
    // Scores
    const SCORES = {
      bee: { formation: 50, diving: 100 },
      butterfly: { formation: 80, diving: 160 },
      boss: { formation: 150, diving: 400 }
    };
    
    // Enemy states
    const ENEMY_ENTERING = 'entering';
    const ENEMY_FORMATION = 'formation';
    const ENEMY_DIVING = 'diving';
    const ENEMY_RETURNING = 'returning';
    const ENEMY_CAPTURING = 'capturing';
    const ENEMY_DEAD = 'dead';
    
    // Formation
    const FORMATION_Y = 80;
    const FORMATION_SPACING_X = 48;
    const FORMATION_SPACING_Y = 40;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let stage = 1;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('galaga_highscore') || '0');
    let lives = 3;
    
    // Player
    let player = {
      x: PLAYER_START_X,
      y: PLAYER_START_Y,
      w: PLAYER_W,
      h: PLAYER_H,
      alive: true,
      dual: false,
      invulnerable: false,
      invulnTimer: 0
    };
    
    // Bullets
    let playerBullets = [];
    let enemyBullets = [];
    
    // Enemies
    let enemies = [];
    let formationAnchorX = W / 2;
    let formationOscillation = 0;
    
    // Timers
    let fireTimer = 0;
    let respawnTimer = 0;
    let stageTimer = 0;
    let diveTimer = 0;
    let capturedShip = null;
    
    // Particles
    let particles = [];
    
    // Stars
    let stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: Math.random() * 30 + 10,
        size: Math.random() * 2 + 0.5
      });
    }
    
    // Input
    const keys = {};
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.08) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playShoot() { playTone(880, 0.04, 'square', 0.06); }
    function playHit() { playTone(200, 0.1, 'square', 0.1); }
    function playDeath() { playTone(100, 0.3, 'sawtooth', 0.12); }
    function playDive() { playTone(150, 0.15, 'sine', 0.05); }
    function playCapture() { playTone(300, 0.3, 'sine', 0.08); }
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let stage = 1;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('galaga_highscore') || '0');
    let lives = 3;
    
    // Player
    let player = {
      x: PLAYER_START_X,
      y: PLAYER_START_Y,
      w: PLAYER_W,
      h: PLAYER_H,
      dual: false,
      alive: true,
      invulnerable: false,
      invulnTimer: 0
    };
    
    // Captured ship
    let capturedShip = null;
    
    // Bullets
    let playerBullets = [];
    let enemyBullets = [];
    let fireTimer = 0;
    
    // Enemies
    let enemies = [];
    let formationAnchor = { x: W/2, y: 100 };
    let formationDir = 1;
    let formationSpeed = 20;
    let diveTimer = 0;
    let diveInterval = 2000;
    
    // Particles
    let particles = [];
    
    // Stage intro
    let stageIntroTimer = 0;
    
    // Respawn
    let respawnTimer = 0;
    
    // ==================== ENEMY CREATION ====================
    function createEnemy(type, slotX, slotY, entryDelay) {
      return {
        type: type,
        slotX: slotX,
        slotY: slotY,
        x: W/2 + (Math.random() - 0.5) * 100,
        y: -50,
        w: type === ENEMY_BOSS ? 36 : type === ENEMY_BUTTERFLY ? 28 : 24,
        h: type === ENEMY_BOSS ? 28 : type === ENEMY_BUTTERFLY ? 24 : 20,
        state: ENEMY_ENTERING,
        entryDelay: entryDelay,
        entryProgress: 0,
        alive: true,
        diving: false,
        diveProgress: 0,
        divePath: null,
        fireTimer: 0,
        hasCaptured: false
      };
    }
    
    function createWave() {
      enemies = [];
      
      let delay = 0;
      const rowHeight = 36;
      const colWidth = 48;
      
      // Boss row (2 enemies)
      for (let col = 0; col < 2; col++) {
        const slotX = (col - 0.5) * colWidth;
        enemies.push(createEnemy(ENEMY_BOSS, slotX, -rowHeight * 0, delay));
        delay += 100;
      }
      
      // Butterfly rows (2 rows of 8)
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 8; col++) {
          const slotX = (col - 3.5) * colWidth;
          enemies.push(createEnemy(ENEMY_BUTTERFLY, slotX, rowHeight * (row + 1), delay));
          delay += 50;
        }
      }
      
      // Bee rows (2 rows of 10)
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 10; col++) {
          const slotX = (col - 4.5) * colWidth;
          enemies.push(createEnemy(ENEMY_BEE, slotX, rowHeight * (row + 3), delay));
          delay += 30;
        }
      }
    }
    
    // ==================== DIVE PATHS ====================
    function createDivePath(enemy, targetX) {
      const startX = enemy.x;
      const startY = enemy.y;
      const side = enemy.slotX < 0 ? -1 : 1;
      
      return {
        type: enemy.type === ENEMY_BOSS ? 'capture' : 'dive',
        points: [
          { x: startX, y: startY },
          { x: startX + side * 80, y: startY - 30 },
          { x: startX + side * 120, y: startY + 50 },
          { x: targetX, y: H + 50 }
        ],
        progress: 0,
        speed: enemy.type === ENEMY_BOSS ? 0.4 : 0.6
      };
    }
    
    function getDivePosition(path, progress) {
      const t = Math.min(progress, 1);
      const p0 = path.points[0];
      const p1 = path.points[1];
      const p2 = path.points[2];
      const p3 = path.points[3];
      
      // Cubic bezier
      const mt = 1 - t;
      const mt2 = mt * mt;
      const mt3 = mt2 * mt;
      const t2 = t * t;
      const t3 = t2 * t;
      
      return {
        x: mt3 * p0.x + 3 * mt2 * t * p1.x + 3 * mt * t2 * p2.x + t3 * p3.x,
        y: mt3 * p0.y + 3 * mt2 * t * p1.y + 3 * mt * t2 * p2.y + t3 * p3.y
      };
    }
    
    // ==================== GAME LOGIC ====================
    function startGame() {
      stage = 1;
      score = 0;
      lives = 3;
      capturedShip = null;
      diveInterval = 2000;
      
      resetPlayer();
      createWave();
      stageIntroTimer = 2000;
      state = STATE_STAGE_INTRO;
    }
    
    function resetPlayer() {
      player.x = PLAYER_START_X;
      player.y = PLAYER_START_Y;
      player.dual = false;
      player.alive = true;
      player.invulnerable = false;
      player.invulnTimer = 0;
      playerBullets = [];
      enemyBullets = [];
    }
    
    function startNextStage() {
      stage++;
      diveInterval = Math.max(1000, 2000 - stage * 100);
      createWave();
      stageIntroTimer = 2000;
      
      state = STATE_STAGE_INTRO;
      stageIntroTimer = 2000;
    }
    
    function resetPlayer() {
      player.x = PLAYER_START_X;
      player.y = PLAYER_START_Y;
      player.dual = false;
      player.alive = true;
      player.invulnerable = false;
      player.invulnTimer = 0;
      
      playerBullets = [];
      enemyBullets = [];
      fireTimer = 0;
    }
    
    function nextStage() {
      stage++;
      diveInterval = Math.max(1000, 2000 - stage * 100);
      createWave();
      stageIntroTimer = 2000;
      state = STATE_STAGE_INTRO;
    }
    
    function startDive(enemy) {
      if (enemy.state !== ENEMY_FORMATION || enemy.diving) return;
      
      enemy.diving = true;
      enemy.state = ENEMY_DIVING;
      enemy.divePath = createDivePath(enemy, player.x);
      enemy.diveProgress = 0;
      
      playDive();
    }
    
    function fireEnemyBullet(x, y, vx, vy) {
      enemyBullets.push({
        x: x,
        y: y,
        vx: vx,
        vy: vy,
        w: 4,
        h: 12
      });
    }
    
    function createExplosion(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 100 + 50;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          lifetime: 500,
          maxLifetime: 500,
          color: color
        });
      }
    }
    
    function playerDeath() {
      createExplosion(player.x, player.y, 15, '#FFF');
      playDeath();
      
      if (player.dual) {
        player.dual = false;
        player.alive = true;
        player.invulnerable = true;
        player.invulnTimer = 1500;
      } else {
        lives--;
        player.alive = false;
        
        if (lives <= 0) {
          state = STATE_GAMEOVER;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('galaga_highscore', highScore);
          }
        } else {
          respawnTimer = 1500;
          state = STATE_RESPAWN;
        }
      }
    }
    
    function rescueShip() {
      player.dual = true;
      capturedShip = null;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      // Update stars
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > H) {
          star.y = 0;
          star.x = Math.random() * W;
        }
      }
      
      if (state === STATE_TITLE) {
        if (keys['Enter'] || keys['Space']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        }
        return;
      }
      
      if (state === STATE_STAGE_INTRO) {
        stageIntroTimer -= dtMs;
        if (stageIntroTimer <= 0) {
          state = STATE_PLAYING;
        }
        updateEnemies(dt, dtMs);
        return;
      }
      
      if (state === STATE_PAUSED) {
        if (keys['KeyP']) {
          state = STATE_PLAYING;
          keys['KeyP'] = false;
        }
        return;
      }
      
      if (state === STATE_RESPAWN) {
        respawnTimer -= dtMs;
        if (respawnTimer <= 0) {
          resetPlayer();
          player.invulnerable = true;
          player.invulnTimer = 1500;
          state = STATE_PLAYING;
        }
        updateEnemies(dt, dtMs);
        updateBullets(dt);
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter'] || keys['Space']) {
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('galaga_highscore, highScore);
        }
      }
      
      if (state === STATE_RESPAWN) {
        respawnTimer -= dtMs;
        if (respawnTimer <= 0) {
          resetPlayer();
          state = STATE_PLAYING;
        }
        updateEnemies(dt, dtMs);
        return;
      }
      
      // Playing state
      if (keys['KeyP']) {
        state = STATE_PAUSED;
        keys['KeyP'] = false;
        return;
      }
      
      // Player movement
      if (player.alive) {
        if (keys['ArrowLeft'] || keys['KeyA']) {
          player.x -= PLAYER_SPEED * dt;
        }
        if (keys['ArrowRight'] || keys['KeyD']) {
          player.x += PLAYER_SPEED * dt;
        }
        
        const halfW = player.dual ? PLAYER_W : PLAYER_W / 2;
        player.x = Math.max(halfW, Math.min(W - halfW, player.x));
        
        // Fire
        fireTimer -= dtMs;
        if (keys['Space'] && fireTimer <= 0 && playerBullets.length < MAX_BULLETS) {
          if (player.dual) {
            playerBullets.push({ x: player.x - 12, y: player.y - 10, vy: -BULLET_SPEED });
            playerBullets.push({ x: player.x + 12, y: player.y - 10, vy: -BULLET_SPEED });
          } else {
            playerBullets.push({ x: player.x, y: player.y - 10, vy: -BULLET_SPEED });
          }
          fireTimer = FIRE_COOLDOWN;
          playShoot();
        }
        
        // Invulnerability
        if (player.invulnerable) {
          player.invulnTimer -= dtMs;
          if (player.invulnTimer <= 0) {
            player.invulnerable = false;
          }
        }
      }
      
      // Update bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.y += b.vy * dt;
        if (b.y < 0) {
          playerBullets.splice(i, 1);
        }
      }
      
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        if (b.y > H) {
          enemyBullets.splice(i, 1);
        }
      }
      
      // Update enemies
      updateEnemies(dt, dtMs);
      
      // Check collisions
      checkCollisions();
      
      // Check stage clear
      if (enemies.filter(e => e.alive).length === 0 && state === STATE_PLAYING) {
        nextStage();
      }
      
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.lifetime -= dtMs;
        if (p.lifetime <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function updateEnemies(dt, dtMs) {
      // Formation oscillation
      formationAnchor.x += formationDir * formationSpeed * dt;
      if (formationAnchor.x > W/2 + 50) formationDir = -1;
      if (formationAnchor.x < W/2 - 50) formationDir = 1;
      
      // Dive timer
      diveTimer -= dtMs;
      if (diveTimer <= 0 && state === STATE_PLAYING) {
        const available = enemies.filter(e => e.alive && e.state === ENEMY_FORMATION);
        if (available.length > 0) {
          const enemy = available[Math.floor(Math.random() * available.length)];
          startDive(enemy);
        }
        diveTimer = diveInterval + Math.random() * 1000;
      }
      
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        
        if (enemy.state === ENEMY_ENTERING) {
          enemy.entryDelay -= dtMs;
          if (enemy.entryDelay <= 0) {
            enemy.entryProgress += dt * 2;
            const targetX = formationAnchor.x + enemy.slotX;
            const targetY = formationAnchor.y + enemy.slotY;
            enemy.x += (targetX - enemy.x) * 0.05;
            enemy.y += (targetY - enemy.y) * 0.05;
            
            if (Math.abs(enemy.x - targetX) < 1 && Math.abs(enemy.y - targetY) < 1) {
              enemy.state = ENEMY_FORMATION;
            }
          }
        } else if (enemy.state === ENEMY_FORMATION) {
          enemy.x = formationAnchor.x + enemy.slotX;
          enemy.y = formationAnchor.y + enemy.slotY;
        } else if (enemy.state === ENEMY_DIVING) {
          enemy.diveProgress += enemy.divePath.speed * dt;
          const pos = getDivePosition(enemy.divePath, enemy.diveProgress);
          enemy.x = pos.x;
          enemy.y = pos.y;
          
          // Fire during dive
          if (Math.random() < 0.02) {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            fireEnemyBullet(enemy.x, enemy.y + 10, 0, 200);
          }
          
          // Boss capture behavior
          if (enemy.type === ENEMY_BOSS && !enemy.hasCaptured && enemy.diveProgress > 0.3 && enemy.diveProgress < 0.5) {
            if (Math.abs(player.x - enemy.x) < 30 && player.alive && !capturedShip) {
              // Capture!
              capturedShip = { boss: enemy };
              enemy.hasCaptured = true;
              playCapture();
              player.alive = false;
              lives--;
              
              if (lives <= 0) {
                state = STATE_GAMEOVER;
                if (score > highScore) {
                  highScore = score;
                  localStorage.setItem('galaga_highscore', highScore);
                }
              } else {
                respawnTimer = 1500;
                state = STATE_RESPAWN;
              }
            }
          }
          
          if (enemy.diveProgress >= 1) {
            enemy.diving = false;
            enemy.state = ENEMY_FORMATION;
            enemy.diveProgress = 0;
          }
        }
      }
    }
    
    function checkCollisions() {
      // Player bullets vs enemies
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          
          if (b.x > enemy.x - enemy.w/2 && b.x < enemy.x + enemy.w/2 &&
              b.y > enemy.y - enemy.h/2 && b.y < enemy.y + enemy.h/2) {
            playerBullets.splice(i, 1);
            
            const scoreType = enemy.diving ? 'diving' : 'formation';
            score += SCORES[enemy.type][scoreType];
            
            createExplosion(enemy.x, enemy.y, 10, '#FF0');
            playHit();
            
            // Rescue captured ship
            if (enemy.type === ENEMY_BOSS && capturedShip && capturedShip.boss === enemy) {
              rescueShip();
            }
            
            enemy.alive = false;
            
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('galaga_highscore', highScore);
            }
            break;
          }
        }
      }
      
      // Enemy bullets vs player
      if (player.alive && !player.invulnerable) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          
          if (b.x > player.x - player.w/2 && b.x < player.x + player.w/2 &&
              b.y > player.y - player.h/2 && b.y < player.y + player.h/2) {
            enemyBullets.splice(i, 1);
            playerDeath();
            return;
          }
        }
        
        // Diving enemy collision
        for (const enemy of enemies) {
          if (!enemy.alive || !enemy.diving) continue;
          
          const dx = player.x - enemy.x;
          const dy = player.y - enemy.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          if (dist < 20) {
            playerDeath();
            return;
          }
        }
      }
    }
    
    // ==================== RENDERING ====================
    function drawStars(dt) {
      ctx.fillStyle = '#FFF';
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > H) {
          star.y = 0;
          star.x = Math.random() * W;
        }
        ctx.globalAlpha = 0.5;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      }
      ctx.globalAlpha = 1;
    }
    
    function drawPlayer() {
      if (!player.alive) return;
      if (player.invulnerable && Math.floor(Date.now() / 80) % 2 === 0) return;
      
      ctx.fillStyle = '#0FF';
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      
      if (player.dual) {
        // Draw two ships side by side
        for (let offset of [-12, 12]) {
          ctx.beginPath();
          ctx.moveTo(player.x + offset, player.y - 12);
          ctx.lineTo(player.x + offset - 10, player.y + 10);
          ctx.lineTo(player.x + offset, player.y + 6);
          ctx.lineTo(player.x + offset + 10, player.y + 10);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      } else {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 12);
        ctx.lineTo(player.x - 12, player.y + 10);
        ctx.lineTo(player.x, player.y + 6);
        ctx.lineTo(player.x + 12, player.y + 10);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }
    
    function drawBullets() {
      ctx.fillStyle = '#FFF';
      for (const b of playerBullets) {
        ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
      }
      
      ctx.fillStyle = '#F44';
      for (const b of enemyBullets) {
        ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
      }
    }
    
    function drawEnemies() {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        
        if (enemy.type === ENEMY_BEE) {
          ctx.fillStyle = '#FF0';
          ctx.strokeStyle = '#F80';
          ctx.lineWidth = 2;
          
          // Body
          ctx.beginPath();
          ctx.ellipse(0, 0, 10, 8, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          
          // Wings
          ctx.fillStyle = '#8F0';
          ctx.fillRect(-14, -4, 8, 8);
          ctx.fillRect(6, -4, 8, 8);
          
        } else if (enemy.type === ENEMY_BUTTERFLY) {
          ctx.fillStyle = '#C4F';
          ctx.strokeStyle = '#90F';
          ctx.lineWidth = 2;
          
          // Wings
          ctx.beginPath();
          ctx.ellipse(-8, 0, 10, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          
          ctx.beginPath();
          ctx.ellipse(8, 0, 10, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          
          // Body
          ctx.fillStyle = '#FFF';
          ctx.fillRect(-3, -8, 6, 16);
          
        } else if (enemy.type === ENEMY_BOSS) {
          ctx.fillStyle = '#F44';
          ctx.strokeStyle = '#F88';
          ctx.lineWidth = 2;
          
          // Body
          ctx.beginPath();
          ctx.ellipse(0, 0, 16, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          
          // Claws
          ctx.fillStyle = '#0F0';
          ctx.fillRect(-20, -4, 8, 8);
          ctx.fillRect(12, -4, 8, 8);
          
          // Eyes
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.arc(-5, -2, 3, 0, Math.PI * 2);
          ctx.arc(5, -2, 3, 0, Math.PI * 2);
          ctx.fill();
          
          // Captured ship indicator
          if (capturedShip && capturedShip.boss === enemy) {
            ctx.fillStyle = '#0FF';
            ctx.fillRect(-4, 8, 8, 6);
          }
        }
        
        ctx.restore();
      }
    }
    
    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.lifetime / p.maxLifetime;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      }
      ctx.globalAlpha = 1;
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 20);
      
      ctx.textAlign = 'right';
      ctx.fillText(`HIGH: ${highScore}`, W - 10, 20);
      
      ctx.textAlign = 'center';
      ctx.fillText(`STAGE ${stage}`, W/2, 20);
      
      // Lives
      ctx.fillStyle = '#0FF';
      for (let i = 0; i < lives; i++) {
        ctx.beginPath();
        ctx.moveTo(20 + i * 25, H - 20);
        ctx.lineTo(12 + i * 25, H - 8);
        ctx.lineTo(28 + i * 25, H - 8);
        ctx.closePath();
        ctx.fill();
      }
    }
    
    function drawTitle() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      drawStars(0.016);
      
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 64px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GALAGA', W/2, H/2 - 120);
      
      ctx.font = '16px monospace';
      ctx.fillText('Enemies attack from formation in diving swoops', W/2, H/2 - 40);
      ctx.fillText('Shoot them down before they hit you', W/2, H/2 - 15);
      ctx.fillText('Boss enemies may capture your ship', W/2, H/2 + 10);
      ctx.fillText('Rescue it for double firepower!', W/2, H/2 + 35);
      
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys / A D to move', W/2, H/2 + 80);
      ctx.fillText('Space to fire', W/2, H/2 + 105);
      ctx.fillText('P to pause', W/2, H/2 + 130);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#0FF';
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Start', W/2, H/2 + 180);
      }
    }
    
    function drawStageIntro() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#4CAF50';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`STAGE ${stage}`, W/2, H/2);
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFC107';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      
      ctx.fillStyle = '#888';
      ctx.font = '18px monospace';
      ctx.fillText('Press P to Resume', W/2, H/2 + 50);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#F44336';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 20);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', W/2, H/2 + 80);
      }
    }
    
    function drawStageIntro() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`STAGE ${stage}`, W/2, H/2);
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawStars(0.016);
        
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 64px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GALAGA', W/2, H/2 - 100);
        
        ctx.font = '16px monospace';
        ctx.fillText('Enemies dive from formation to attack', W/2, H/2 - 30);
        ctx.fillText('Shoot them before they shoot you', W/2, H/2);
        ctx.fillText('Boss enemies may capture your ship', W/2, H/2 + 30);
        ctx.fillText('Clear all enemies to advance', W/2, H/2 + 60);
        
        ctx.fillStyle = '#888';
        ctx.fillText('Arrow Keys / WASD to move', W/2, H/2 + 110);
        ctx.fillText('Space to fire', W/2, H/2 + 135);
        ctx.fillText('P to pause', W/2, H/2 + 160);
        
        if (Math.floor(Date.now() / 500) % 2 === 0) {
          ctx.fillStyle = '#0FF';
          ctx.font = '22px monospace';
          ctx.fillText('Press Enter to Start', W/2, H/2 + 220);
        }
      } else {
        drawStars(0.016);
        drawEnemies();
        drawBullets();
        drawPlayer();
        drawParticles();
        drawHUD();
        
        if (state === STATE_PAUSED) {
          drawPaused();
        } else if (state === STATE_GAMEOVER) {
          drawGameOver();
        } else if (state === STATE_STAGE_INTRO) {
          drawStageIntro();
        }
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      initAudio();
      
      if (state === STATE_TITLE && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_GAMEOVER && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_STAGE_INTRO && (e.code === 'Enter' || e.code === 'Space')) {
        state = STATE_PLAYING;
      }
      
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
