  GAME:      Galaga
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Courier New", monospace; }
    canvas { background: #000; display: block; border: 2px solid #333; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; }
  </style>
</head>
<body>
  <canvas id="galagaCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';
    const canvas = document.getElementById('galagaCanvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 800, HEIGHT = 600;

    const STATES = { TITLE: 'title', STAGE_INTRO: 'intro', PLAYING: 'playing', PAUSED: 'paused', RESPAWNING: 'respawn', GAME_OVER: 'over' };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0, bestScore = parseInt(localStorage.getItem('galaga_best') || '0');
    let lives = 3, stage = 1, gameTime = 0;
    let stateTimer = 0, respawnTimer = 0, diveTimer = 0;

    // Player
    let player = { x: 400, y: 540, width: 30, height: 24, alive: true, dual: false, invulnerable: 0 };
    let playerBullets = [];
    let lastFireTime = 0;
    let capturedShip = null;

    // Enemies
    let enemies = [];
    let formationOffsetX = 0, formationOffsetY = 0;
    let enemyBullets = [];

    // Input
    let keys = {};
    let audioCtx = null;

    // Enemy definitions
    const ENEMY_TYPES = {
      bee: { width: 18, height: 14, color: '#FFAA00', formationPts: 50, divePts: 100 },
      butterfly: { width: 22, height: 16, color: '#00AAFF', formationPts: 80, divePts: 160 },
      boss: { width: 26, height: 20, color: '#FF0080', formationPts: 150, divePts: 400 }
    };

    function createFormation() {
      enemies = [];
      const types = [
        { type: 'boss', count: 4 },
        { type: 'butterfly', count: 16 },
        { type: 'bee', count: 20 }
      ];
      let idx = 0;
      let row = 0, col = 0;
      for (let typeInfo of types) {
        for (let i = 0; i < typeInfo.count; i++) {
          if (col > 9) { col = 0; row++; }
          const slotX = 100 + col * 48;
          const slotY = 80 + row * 40;
          enemies.push({
            type: typeInfo.type, slotX, slotY, x: slotX, y: slotY - 200, vx: 0, vy: 0,
            state: 'entering', enterTime: i * 0.05, alive: true, diveTime: 0, captured: false, angle: 0
          });
          col++;
          idx++;
        }
      }
      formationOffsetX = 0;
      formationOffsetY = 0;
    }

    function firePlayerBullet() {
      if (lastFireTime > 0) return;
      if (playerBullets.length >= (player.dual ? 4 : 2)) return;
      if (player.dual) {
        playerBullets.push({ x: player.x - 10, y: player.y - 12, vy: -500 });
        playerBullets.push({ x: player.x + 10, y: player.y - 12, vy: -500 });
      } else {
        playerBullets.push({ x: player.x, y: player.y - 12, vy: -500 });
      }
      lastFireTime = 0.25;
      playSound(800, 0.05);
    }

    function playSound(freq, dur) {
      if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      } catch (e) {}
    }

    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Enter') {
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) {
          score = 0; lives = 3; stage = 1;
          player = { x: 400, y: 540, width: 30, height: 24, alive: true, dual: false, invulnerable: 0 };
          playerBullets = [];
          createFormation();
          gameState = STATES.STAGE_INTRO;
          stateTimer = 2;
        }
      }
      if (e.code === 'KeyP') gameState = gameState === STATES.PLAYING ? STATES.PAUSED : STATES.PLAYING;
      if (e.code === 'Space') firePlayerBullet();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    function update(dt) {
      if (gameState === STATES.TITLE || gameState === STATES.PAUSED || gameState === STATES.GAME_OVER) return;

      gameTime += dt;
      lastFireTime -= dt;
      stateTimer -= dt;

      if (gameState === STATES.STAGE_INTRO) {
        if (stateTimer <= 0) gameState = STATES.PLAYING;
        return;
      }

      if (gameState === STATES.RESPAWNING) {
        respawnTimer -= dt;
        if (respawnTimer <= 0) {
          player = { x: 400, y: 540, width: 30, height: 24, alive: true, dual: capturedShip ? true : false, invulnerable: 2 };
          capturedShip = null;
          gameState = STATES.PLAYING;
        }
        return;
      }

      // Player movement
      if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 320 * dt;
      if (keys['ArrowRight'] || keys['KeyD']) player.x += 320 * dt;
      player.x = Math.max(0, Math.min(WIDTH - player.width, player.x));
      if (player.invulnerable > 0) player.invulnerable -= dt;

      // Update bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        playerBullets[i].y += playerBullets[i].vy * dt;
        if (playerBullets[i].y < -10) playerBullets.splice(i, 1);
      }

      // Update enemies
      formationOffsetX = Math.sin(gameTime) * 20;
      diveTimer -= dt;
      if (diveTimer <= 0) {
        const alive = enemies.filter(e => e.alive && e.state === 'formation');
        if (alive.length > 0) {
          alive[Math.floor(Math.random() * alive.length)].state = 'diving';
          alive[Math.floor(Math.random() * alive.length)].diveTime = 0;
        }
        diveTimer = 1.5 + (5 - Math.min(stage, 5)) * 0.3;
      }

      for (let e of enemies) {
        if (!e.alive) continue;
        if (e.state === 'entering') {
          e.enterTime -= dt;
          if (e.enterTime <= 0) e.state = 'formation';
          else e.y = e.slotY - 200 + 200 * (1 - e.enterTime / 0.05);
        } else if (e.state === 'formation') {
          e.x = e.slotX + formationOffsetX;
          e.y = e.slotY + formationOffsetY;
          e.angle = Math.sin(gameTime * 2) * 0.1;
        } else if (e.state === 'diving') {
          e.diveTime += dt;
          const progress = Math.min(e.diveTime / 3, 1);
          if (progress < 0.3) {
            e.y = e.slotY + formationOffsetY + progress / 0.3 * 100;
            e.x = e.slotX + formationOffsetX + Math.sin(progress * Math.PI * 2) * 60;
          } else if (progress < 0.7) {
            const t = (progress - 0.3) / 0.4;
            e.y = e.slotY + formationOffsetY + 100 + t * 300;
            e.x = player.x + Math.sin(t * Math.PI) * 80;
          } else {
            e.y = e.slotY + formationOffsetY + 400 + (progress - 0.7) * 400;
            e.x = player.x;
          }
          if (progress > 0.8) e.state = 'returning';
          if (Math.random() < 0.02) {
            enemyBullets.push({ x: e.x, y: e.y + 10, vy: 250 });
            playSound(400, 0.08);
          }
        } else if (e.state === 'returning') {
          const dx = e.slotX + formationOffsetX - e.x;
          const dy = e.slotY + formationOffsetY - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 10) e.state = 'formation';
          else {
            e.vx += dx / dist * 100 * dt;
            e.vy += dy / dist * 100 * dt;
            e.x += e.vx * dt;
            e.y += e.vy * dt;
          }
        }
      }

      // Enemy bullets
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].y += enemyBullets[i].vy * dt;
        if (enemyBullets[i].y > HEIGHT) enemyBullets.splice(i, 1);
        else if (player.alive && player.invulnerable <= 0) {
          const dx = player.x - enemyBullets[i].x;
          const dy = player.y - enemyBullets[i].y;
          if (Math.sqrt(dx * dx + dy * dy) < 15) {
            player.alive = false;
            lives--;
            enemyBullets.splice(i, 1);
            playSound(100, 0.3);
            if (lives > 0) { gameState = STATES.RESPAWNING; respawnTimer = 1; }
            else gameState = STATES.GAME_OVER;
          }
        }
      }

      // Collisions
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        for (let j = enemies.length - 1; j >= 0; j--) {
          if (!enemies[j].alive) continue;
          const dx = playerBullets[i].x - enemies[j].x;
          const dy = playerBullets[i].y - enemies[j].y;
          const def = ENEMY_TYPES[enemies[j].type];
          if (Math.sqrt(dx * dx + dy * dy) < 15) {
            const pts = enemies[j].state === 'formation' ? def.formationPts : def.divePts;
            score += pts;
            if (score > bestScore) { bestScore = score; localStorage.setItem('galaga_best', bestScore); }
            enemies[j].alive = false;
            playerBullets.splice(i, 1);
            playSound(600, 0.1);
            break;
          }
        }
      }

      // Check wave clear
      if (enemies.every(e => !e.alive)) {
        stage++;
        createFormation();
        gameState = STATES.STAGE_INTRO;
        stateTimer = 2;
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Starfield
      ctx.fillStyle = '#FFFFFF';
      for (let i = 0; i < 40; i++) {
        const x = (i * 137 + gameTime * 10) % WIDTH;
        const y = (i * 73) % HEIGHT;
        ctx.fillRect(x, y, 1, 1);
      }

      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GALAGA', WIDTH / 2, 100);
        ctx.font = '16px "Courier New"';
        ctx.fillStyle = '#AAA';
        ctx.fillText('Move: Arrow Keys or A/D', WIDTH / 2, 200);
        ctx.fillText('Fire: Space', WIDTH / 2, 230);
        ctx.fillText('Destroy all aliens to advance', WIDTH / 2, 260);
        ctx.fillStyle = '#FF0';
        ctx.font = 'bold 24px "Courier New"';
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
      } else if (gameState === STATES.STAGE_INTRO) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE ' + stage, WIDTH / 2, HEIGHT / 2);
      } else {
        // Enemies
        for (let e of enemies) {
          if (!e.alive) continue;
          const def = ENEMY_TYPES[e.type];
          ctx.save();
          ctx.translate(e.x, e.y);
          ctx.rotate(e.angle);
          ctx.fillStyle = def.color;
          ctx.fillRect(-def.width / 2, -def.height / 2, def.width, def.height);
          ctx.restore();
        }

        // Player
        if (player.alive && (player.invulnerable <= 0 || Math.sin(gameTime * 10) > 0)) {
          ctx.fillStyle = '#FFFFFF';
          ctx.beginPath();
          ctx.moveTo(player.x, player.y - 12);
          ctx.lineTo(player.x - 15, player.y + 12);
          ctx.lineTo(player.x + 15, player.y + 12);
          ctx.closePath();
          ctx.fill();
          if (player.dual) {
            ctx.beginPath();
            ctx.moveTo(player.x - 20, player.y - 12);
            ctx.lineTo(player.x - 35, player.y + 12);
            ctx.lineTo(player.x - 5, player.y + 12);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(player.x + 20, player.y - 12);
            ctx.lineTo(player.x + 5, player.y + 12);
            ctx.lineTo(player.x + 35, player.y + 12);
            ctx.closePath();
            ctx.fill();
          }
        }

        // Bullets
        ctx.fillStyle = '#FFF';
        for (let b of playerBullets) ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
        ctx.fillStyle = '#F44';
        for (let b of enemyBullets) ctx.fillRect(b.x - 2, b.y - 4, 4, 8);

        // HUD
        ctx.fillStyle = '#FFF';
        ctx.font = '14px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 10, 20);
        ctx.textAlign = 'right';
        ctx.fillText('Best: ' + bestScore, WIDTH - 10, 20);
        ctx.textAlign = 'center';
        ctx.fillText('Stage: ' + stage, WIDTH / 2, 20);
        ctx.textAlign = 'left';
        ctx.fillText('Lives: ' + lives, 10, HEIGHT - 10);

        if (gameState === STATES.PAUSED) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
        } else if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0,0,0,0.8)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FF0';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', WIDTH / 2, 200);
          ctx.fillStyle = '#FFF';
          ctx.font = '32px "Courier New"';
          ctx.fillText('Score: ' + score, WIDTH / 2, 280);
          ctx.font = 'bold 20px "Courier New"';
          ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
        }
      }
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    createFormation();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
