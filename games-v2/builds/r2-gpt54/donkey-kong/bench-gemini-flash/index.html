<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong - Classic Arcade</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { background: #000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); display: block; border: 2px solid #333; }
    </style>
</head>
<body>
    <canvas id="game" width="700" height="800"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const WIDTH = 700, HEIGHT = 800;
        const GRAVITY = 900, JUMP_VEL = -340, SPEED = 150, CLIMB_SPD = 120;

        // Stage definitions
        const platforms = [
            { x1: 50, x2: 650, y1: 750, y2: 730 }, // Floor
            { x1: 50, x2: 600, y1: 630, y2: 650 },
            { x1: 100, x2: 650, y1: 550, y2: 530 },
            { x1: 50, x2: 600, y1: 430, y2: 450 },
            { x1: 100, x2: 650, y1: 350, y2: 330 },
            { x1: 50, x2: 450, y1: 230, y2: 230 }, // DK level
            { x1: 250, x2: 450, y1: 100, y2: 100 } // Goal
        ];

        const ladders = [
            { x: 580, p1: 0, p2: 1 },
            { x: 120, p1: 1, p2: 2 },
            { x: 580, p1: 2, p2: 3 },
            { x: 120, p1: 3, p2: 4 },
            { x: 400, p1: 4, p2: 5 },
            { x: 300, p1: 5, p2: 6 }
        ];

        // Game state
        let score = 0, high = localStorage.getItem('dk_hi') || 0, lives = 3, level = 1, bonus = 5000;
        let gameState = 'TITLE', lastTime = 0, hammerTimer = 0;
        let player = { x: 80, y: 710, vx: 0, vy: 0, w: 24, h: 32, pIdx: 0, climbing: false, airborne: false, facing: 1 };
        let barrels = [], hammers = [], particles = [], spawnTimer = 0;

        function initLevel() {
            bonus = 5000 + (level * 1000);
            barrels = [];
            hammers = [
                { x: 550, y: 500, active: true },
                { x: 150, y: 300, active: true }
            ];
            resetPlayer();
        }

        function resetPlayer() {
            player.x = 80; player.y = 710; player.vx = 0; player.vy = 0;
            player.pIdx = 0; player.climbing = false; player.airborne = false; hammerTimer = 0;
        }

        function getPlatformY(pIdx, x) {
            const p = platforms[pIdx];
            if (x < p.x1 || x > p.x2) return null;
            const pct = (x - p.x1) / (p.x2 - p.x1);
            return p.y1 + pct * (p.y2 - p.y1);
        }

        function update(dt) {
            if (gameState !== 'PLAYING') return;

            bonus = Math.max(0, bonus - dt * 50);
            if (bonus <= 0) kill();

            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                barrels.push({ x: 120, y: 210, pIdx: 5, dir: 1, jumped: false, type: 'roll' });
                spawnTimer = Math.max(1.5, 3.5 - level * 0.3);
            }

            // Player Input
            if (!player.climbing) {
                if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -SPEED; player.facing = -1; }
                else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = SPEED; player.facing = 1; }
                else player.vx = 0;

                if (keys['Space'] && !player.airborne && hammerTimer <= 0) {
                    player.vy = JUMP_VEL; player.airborne = true;
                }
            }

            // Climbing check
            if (!player.airborne && hammerTimer <= 0) {
                ladders.forEach(l => {
                    if (Math.abs(player.x + 12 - l.x) < 15) {
                        const py1 = getPlatformY(l.p1, player.x + 12);
                        const py2 = getPlatformY(l.p2, player.x + 12);
                        if (keys['ArrowUp'] || keys['KeyW']) {
                            if (Math.abs(player.y + 32 - py1) < 10 || (player.climbing && player.y + 32 > py2)) {
                                player.climbing = true; player.vx = 0; player.vy = -CLIMB_SPD;
                            }
                        } else if (keys['ArrowDown'] || keys['KeyS']) {
                            if (Math.abs(player.y + 32 - py2) < 10 || (player.climbing && player.y + 32 < py1)) {
                                player.climbing = true; player.vx = 0; player.vy = CLIMB_SPD;
                            }
                        }
                    }
                });
            }

            // Movement Physics
            if (player.climbing) {
                player.y += player.vy * dt;
                if (!(keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'])) player.vy = 0;
                // Snap to platforms at ends
                let snapped = false;
                ladders.forEach(l => {
                    const py1 = getPlatformY(l.p1, player.x + 12);
                    const py2 = getPlatformY(l.p2, player.x + 12);
                    if (Math.abs(player.y + 32 - py1) < 5) { player.y = py1 - 32; player.climbing = false; player.pIdx = l.p1; snapped = true; }
                    else if (Math.abs(player.y + 32 - py2) < 5) { player.y = py2 - 32; player.climbing = false; player.pIdx = l.p2; snapped = true; }
                });
            } else {
                player.x += player.vx * dt;
                if (player.airborne) {
                    player.vy += GRAVITY * dt;
                    player.y += player.vy * dt;
                    // Landing check
                    for(let i=0; i<platforms.length; i++) {
                        const gy = getPlatformY(i, player.x + 12);
                        if (gy && player.y + 32 >= gy && player.y + 32 <= gy + 15 && player.vy >= 0) {
                            player.y = gy - 32; player.vy = 0; player.airborne = false; player.pIdx = i;
                            if (i === 6) win();
                            break;
                        }
                    }
                } else {
                    const gy = getPlatformY(player.pIdx, player.x + 12);
                    if (gy === null) player.airborne = true;
                    else player.y = gy - 32;
                }
            }

            // Hammer logic
            if (hammerTimer > 0) {
                hammerTimer -= dt;
                hammers.forEach(h => {
                    if (h.active && Math.abs(player.x - h.x) < 30 && Math.abs(player.y - h.y) < 40) {
                        h.active = false; hammerTimer = 8;
                    }
                });
            } else {
                hammers.forEach(h => {
                    if (h.active && Math.abs(player.x - h.x) < 20 && Math.abs(player.y - h.y) < 30) {
                        h.active = false; hammerTimer = 8;
                    }
                });
            }

            // Barrels logic
            barrels.forEach((b, idx) => {
                const py = getPlatformY(b.pIdx, b.x);
                if (b.type === 'fall') {
                    b.y += 300 * dt;
                    for (let i=0; i<platforms.length; i++) {
                        const gy = getPlatformY(i, b.x);
                        if (gy && b.y >= gy - 18 && b.y <= gy + 10) {
                            b.y = gy - 18; b.pIdx = i; b.type = 'roll';
                            const p = platforms[i];
                            b.dir = p.y1 > p.y2 ? -1 : 1;
                            break;
                        }
                    }
                } else {
                    b.x += b.dir * 120 * dt;
                    b.y = py - 18;
                    if (py === null) { b.type = 'fall'; }
                }

                // Collision
                const dx = (player.x + 12) - (b.x + 9);
                const dy = (player.y + 16) - (b.y + 9);
                if (Math.abs(dx) < 20 && Math.abs(dy) < 25) {
                    if (hammerTimer > 0) {
                        barrels.splice(idx, 1); score += 300;
                    } else kill();
                }

                // Jump score
                if (player.airborne && !b.jumped && Math.abs(dx) < 15 && player.y + 32 < b.y) {
                    b.jumped = true; score += 100;
                }
            });

            barrels = barrels.filter(b => b.y < 800);
            if (score > high) { high = score; localStorage.setItem('dk_hi', high); }
        }

        function kill() {
            lives--;
            if (lives <= 0) gameState = 'GAMEOVER';
            else { resetPlayer(); }
        }

        function win() {
            score += 1000 + Math.floor(bonus);
            gameState = 'CLEAR';
            setTimeout(() => { level++; initLevel(); gameState = 'PLAYING'; }, 2000);
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Girders
            platforms.forEach(p => {
                ctx.strokeStyle = '#f39'; ctx.lineWidth = 12;
                ctx.beginPath(); ctx.moveTo(p.x1, p.y1 + 6); ctx.lineTo(p.x2, p.y2 + 6); ctx.stroke();
            });

            // Ladders
            ladders.forEach(l => {
                ctx.strokeStyle = '#0cf'; ctx.lineWidth = 2;
                const py1 = getPlatformY(l.p1, l.x);
                const py2 = getPlatformY(l.p2, l.x);
                ctx.beginPath(); ctx.moveTo(l.x - 8, py1); ctx.lineTo(l.x - 8, py2); ctx.moveTo(l.x + 8, py1); ctx.lineTo(l.x + 8, py2); ctx.stroke();
                for (let y = Math.min(py1, py2); y <= Math.max(py1, py2); y += 10) {
                    ctx.beginPath(); ctx.moveTo(l.x - 8, y); ctx.lineTo(l.x + 8, y); ctx.stroke();
                }
            });

            // Hammers
            hammers.forEach(h => {
                if (h.active) { ctx.fillStyle = '#ff0'; ctx.fillRect(h.x, h.y, 15, 20); }
            });

            // Characters
            ctx.fillStyle = '#852'; ctx.fillRect(100, 170, 64, 56); // DK
            ctx.fillStyle = '#f0f'; ctx.fillRect(310, 68, 20, 32); // Pauline
            if (Math.floor(Date.now() / 500) % 2) { ctx.fillStyle = '#fff'; ctx.fillText('HELP!', 300, 60); }

            // Player
            ctx.fillStyle = hammerTimer > 0 ? (Math.floor(Date.now()/100)%2 ? '#fff' : '#f00') : '#00f';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#fa7'; ctx.fillRect(player.x + 4, player.y + 4, 16, 12);
            if (hammerTimer > 0) { ctx.fillStyle = '#ff0'; ctx.fillRect(player.x + (player.facing * 20), player.y - 10, 10, 30); }

            // Barrels
            ctx.fillStyle = '#d82';
            barrels.forEach(b => { 
                ctx.fillRect(b.x, b.y, 18, 18);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(b.x, b.y, 18, 18);
            });

            // HUD
            ctx.fillStyle = '#fff'; ctx.font = '20px Courier';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, 20, 30);
            ctx.fillText(`HIGH: ${high}`, 550, 30);
            ctx.fillText(`LIVES: ${lives}`, 20, 60);
            ctx.fillText(`BONUS: ${Math.floor(bonus)}`, 300, 30);

            if (gameState === 'TITLE') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#f00'; ctx.font = 'bold 60px Courier'; ctx.textAlign = 'center';
                ctx.fillText('DONKEY KONG', 350, 300);
                ctx.fillStyle = '#fff'; ctx.font = '20px Courier';
                ctx.fillText('CLIMB LADDERS, AVOID BARRELS', 350, 380);
                ctx.fillText('PRESS ENTER TO START', 350, 450);
                ctx.textAlign = 'left';
            } else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = '#f00'; ctx.font = 'bold 40px Courier'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 350, 400);
                ctx.textAlign = 'left';
            }
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') {
                if (gameState === 'TITLE' || gameState === 'GAMEOVER') {
                    score = 0; lives = 3; level = 1; gameState = 'PLAYING'; initLevel();
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function loop(t) {
            dt = Math.min((t - lastTime) / 1000, 0.05); lastTime = t;
            update(dt); draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
