<!--
  GAME:      Donkey Kong
  RUN:       r2-gpt54
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Donkey Kong - Mini</title>
<style>
  html,body{height:100%;margin:0;background:#000;font-family:monospace}
  .wrap{width:700px;height:800px;margin:12px auto;position:relative}
  canvas{display:block;background:#000;border:4px solid #111}
  #hud{position:absolute;left:8px;top:8px;color:#fff}
  #hud .right{position:absolute;right:8px;top:8px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;pointer-events:none;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="700" height="800"></canvas>
  <div id="hud">SCORE: <span id="score">0</span> &nbsp;&nbsp; HI: <span id="hi">0</span> &nbsp;&nbsp; LIVES: <span id="lives">3</span> &nbsp;&nbsp; STAGE: <span id="stage">1</span></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay'); const scoreEl = document.getElementById('score'); const hiEl = document.getElementById('hi'); const livesEl = document.getElementById('lives'); const stageEl = document.getElementById('stage');
  const W = canvas.width, H = canvas.height;

  // Game config
  let state = 'title'; let score = 0, high = 0, lives = 3, stage = 1;
  try{ const h = localStorage.getItem('dk_high'); if(h) high = parseInt(h,10)||0; }catch(e){high=0}

  // Bonus timer
  let bonus = 5000; const BONUS_START = 5000;

  // Player
  const player = {w:24,h:32,x:80,y:710,vx:0,vy:0,onGround:false,climbing:false,facing:1,hammerTime:0,canJump:true,jumpPoints:0};

  // DK and Pauline
  const dk = {x:100,y:80,w:64,h:56,throwTimer:0};
  const pauline = {x:310,y:38,w:20,h:32};

  // platforms: each is {x1,x2,y,thickness,slopeDir} slopeDir = -1 left-up, 1 right-up, 0 flat
  const platforms = [];
  function makePlatforms(){ platforms.length=0; // bottom to top
    platforms.push({x1:40,x2:660,y:760,th:12,slope:0});
    platforms.push({x1:60,x2:640,y:680,th:12,slope:-1});
    platforms.push({x1:40,x2:620,y:600,th:12,slope:1});
    platforms.push({x1:60,x2:600,y:520,th:12,slope:-1});
    platforms.push({x1:40,x2:580,y:440,th:12,slope:1});
    platforms.push({x1:60,x2:560,y:360,th:12,slope:-1});
    platforms.push({x1:40,x2:540,y:280,th:12,slope:0});
  }

  // ladders: {x,y1,y2,brokenTop?,brokenGap}
  const ladders = [];
  function makeLadders(){ ladders.length=0; ladders.push({x:140,y1:520,y2:760,broken:false}); ladders.push({x:260,y1:440,y2:680,broken:false}); ladders.push({x:380,y1:360,y2:600,broken:false}); ladders.push({x:500,y1:280,y2:520,broken:true,gapY:420}); }

  // hammer pickups
  let hammers = [];
  function makeHammers(){ hammers = [ {x:220,y:580,w:18,h:12,used:false}, {x:420,y:420,w:18,h:12,used:false} ]; }

  // barrels
  const barrels = [];
  function spawnBarrel(){ // spawn near DK hands
    const b = {x: dk.x + dk.w, y: dk.y + 30, w:18,h:18,vx: (Math.random()<0.5?120:-120), vy:0,state:'rolling',platformIndex:0,scoredJump:false};
    // place on top platform (index last)
    b.platformIndex = platforms.length-1; const p = platforms[b.platformIndex]; b.y = p.y - b.h - 2; b.x = dk.x + dk.w; barrels.push(b);
  }

  // initial stage build
  makePlatforms(); makeLadders(); makeHammers(); barrels.length=0;

  // physics
  const GRAV = 900; const PLAYER_SPEED = 150; const JUMP_V = -340; const CLIMB_SPEED = 120; const BARREL_SPEED = 120;

  // input
  const keys = {}; window.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key==='Enter'){ if(state==='title' || state==='gameover') startGame(); } if(e.key==='p' || e.key==='P'){ togglePause(); } }); window.addEventListener('keyup',e=>{ keys[e.key]=false; });

  // helpers
  function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

  function updatePlayer(dt){ if(state!=='playing') return;
    // bonus tick
    bonus = Math.max(0, bonus - Math.floor(60*dt));
    player.hammerTime = Math.max(0, player.hammerTime - dt);
    // climbing
    let nearLadder = null; for(const L of ladders){ if(player.x + player.w/2 > L.x-12 && player.x + player.w/2 < L.x+12 && player.y+player.h> L.y1-8 && player.y < L.y2+8){ nearLadder = L; break; } }
    if(nearLadder && (keys['ArrowUp']||keys['w']||keys['ArrowDown']||keys['s'])){
      player.climbing = true; player.vx = 0; player.vy = 0; player.canJump = true; // snap to ladder
      player.x = nearLadder.x - player.w/2 + 6;
      if(keys['ArrowUp']||keys['w']) player.y -= CLIMB_SPEED*dt;
      if(keys['ArrowDown']||keys['s']) player.y += CLIMB_SPEED*dt;
      // broken ladder handling
      if(nearLadder.broken){ if(player.y < nearLadder.gapY) player.y = Math.max(player.y, nearLadder.gapY+8); }
    } else {
      // walking / running
      player.climbing = false;
      if(keys['ArrowLeft']||keys['a']){ player.vx = -PLAYER_SPEED; player.facing = -1; }
      else if(keys['ArrowRight']||keys['d']){ player.vx = PLAYER_SPEED; player.facing = 1; }
      else player.vx = 0;
      // jump
      if((keys[' '] || keys['Spacebar']) && player.onGround && player.canJump && player.hammerTime<=0){ player.vy = JUMP_V; player.onGround=false; player.canJump=false; }
      // apply gravity
      player.vy += GRAV*dt;
      player.x += player.vx*dt; player.y += player.vy*dt;
      // stay within canvas
      player.x = Math.max(0, Math.min(W-player.w, player.x));
    }

    // platform grounding: compute top surface at player.x
    player.onGround = false; for(const pl of platforms){ // horizontal extents controlled by x1/x2
      // compute surface y at player center using linear interpolation if sloped
      const fx = player.x + player.w/2; if(fx >= pl.x1 && fx <= pl.x2){ const t = (fx - pl.x1) / (pl.x2 - pl.x1); let surfY = pl.y; if(pl.slope !== 0){ const rise = (pl.x2 - pl.x1) * 0.04 * pl.slope; // gentle slope
          surfY = pl.y - rise * (t - 0.5) * 2; }
        const footY = surfY - player.h; // player's y should be at footY when grounded
        if(player.y > footY - 4 && player.y < footY + 20 && player.vy >= -200){ // snap to surface
          player.onGround = true; player.vy = 0; player.y = footY; break; }
      }
    }

    // collect hammers
    for(const h of hammers){ if(!h.used){ if(rectsOverlap(player,{x:h.x,y:h.y,w:h.w,h:h.h})){ h.used = true; player.hammerTime = 8; score += 300; } } }

    // reach goal
    if(player.x + player.w > pauline.x - 10 && player.x < pauline.x + pauline.w + 10 && player.y < pauline.y + pauline.h + 10){ // stage clear
      score += 1000 + bonus; nextStage(); }
  }

  function updateBarrels(dt){ if(state!=='playing') return; // DK throw timer
    dk.throwTimer -= dt; if(dk.throwTimer <= 0){ spawnBarrel(); dk.throwTimer = 2 - Math.min(1.4, stage*0.05) + Math.random()*1.5; }
    // update barrels
    for(let i=barrels.length-1;i>=0;i--){ const b = barrels[i]; if(b.state==='rolling'){
        // align to platform
        const pl = platforms[b.platformIndex]; if(!pl) { barrels.splice(i,1); continue; }
        // move along slope direction
        const dir = pl.slope===0? (b.vx>0?1:-1) : (pl.slope>0?1:-1); // guess
        b.x += b.vx * dt;
        // align y to platform top
        const t = (b.x - pl.x1) / (pl.x2 - pl.x1); const rise = (pl.x2 - pl.x1) * 0.04 * pl.slope; const surfY = pl.y - rise * (t - 0.5) * 2;
        b.y = surfY - b.h - 2;
        // if out of platform bounds, fall
        if(b.x < pl.x1 || b.x > pl.x2){ b.state='falling'; b.vy = 0; }
        // random ladder descent chance
        for(const L of ladders){ if(Math.abs(b.x - L.x) < 10 && b.y < L.y2 && b.y > L.y1){ if(Math.random() < 0.05){ // descend
              b.state='falling'; b.vy = 0; } } }
      } else if(b.state==='falling'){
        b.vy += GRAV * dt * 0.6; b.y += b.vy * dt; // check landing on next platform
        // find platform directly below center
        const cx = b.x + b.w/2; let landed=false; for(let pi=0;pi<platforms.length;pi++){ const pl = platforms[pi]; if(cx >= pl.x1-6 && cx <= pl.x2+6 && b.y + b.h >= pl.y - 12 && b.y + b.h <= pl.y + 40){ b.platformIndex = pi; b.state='rolling'; b.vx = (pl.slope===0? (Math.random()<0.5?BARREL_SPEED:-BARREL_SPEED) : (pl.slope>0?BARREL_SPEED:-BARREL_SPEED)); b.y = pl.y - b.h - 2; landed = true; break; } }
        if(!landed && b.y > H + 50){ barrels.splice(i,1); continue; }
      }
      // collisions with player
      if(rectsOverlap(player,{x:b.x,y:b.y,w:b.w,h:b.h})){ if(player.hammerTime>0){ // smash
          score += 300; barrels.splice(i,1); } else { // hit
          loseLife(); barrels.splice(i,1); } }
    }
  }

  function loseLife(){ if(state!=='playing') return; lives--; if(lives<=0){ state='gameover'; overlay.style.display='flex'; overlay.textContent='GAME OVER\nPress Enter to Restart'; if(score>high){ high=score; try{ localStorage.setItem('dk_high',String(high)); }catch(e){} } } else { // reset player and barrels
      player.x = 80; player.y = 710; player.vx=0; player.vy=0; barrels.length=0; player.hammerTime=0; state='ready'; setTimeout(()=>state='playing',1000); } }

  function nextStage(){ state='stageclear'; setTimeout(()=>{ stage++; stageEl.textContent = stage; bonus = BONUS_START; barrels.length=0; makeHammers(); player.x=80; player.y=710; state='playing'; },1200); }

  function makeHammers(){ hammers = [ {x:220,y:580,w:18,h:12,used:false},{x:420,y:420,w:18,h:12,used:false} ]; }

  function startGame(){ score=0; lives=3; stage=1; bonus=BONUS_START; makePlatforms(); makeLadders(); makeHammers(); barrels.length=0; player.x=80; player.y=710; state='ready'; overlay.style.display='none'; setTimeout(()=>{ state='playing'; },800); }

  function togglePause(){ if(state==='playing'){ state='paused'; overlay.style.display='flex'; overlay.textContent='PAUSED'; } else if(state==='paused'){ state='playing'; overlay.style.display='none'; } }

  // drawing
  function draw(){ ctx.clearRect(0,0,W,H); // background
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    // draw girders
    for(const pl of platforms){ ctx.save(); ctx.fillStyle='#FF5577'; const w = pl.x2 - pl.x1; ctx.translate(pl.x1,pl.y); ctx.beginPath(); // draw sloped rectangle approximation
      if(pl.slope===0){ ctx.fillRect(0,-pl.th, w, pl.th); } else { const slopePx = pl.slope*0.04*w; ctx.moveTo(0,-pl.th/2 - slopePx/2); ctx.lineTo(w,-pl.th/2 + slopePx/2); ctx.lineTo(w, pl.th/2 + slopePx/2); ctx.lineTo(0,pl.th/2 - slopePx/2); ctx.closePath(); ctx.fill(); }
      ctx.restore(); // rivets
      ctx.fillStyle='#AA3355'; for(let rx=pl.x1+10; rx<pl.x2; rx+=40){ ctx.fillRect(rx, pl.y - pl.th + 4, 6, 6); }
    }
    // ladders
    for(const L of ladders){ ctx.fillStyle='#36E0FF'; ctx.fillRect(L.x-8, L.y1, 4, L.y2 - L.y1); ctx.fillRect(L.x+6, L.y1, 4, L.y2 - L.y1); for(let ry=L.y1; ry<L.y2; ry+=24) ctx.fillRect(L.x-8, ry, 14, 4); if(L.broken){ ctx.clearRect(L.x-9, L.gapY-4, 18, 24); } }
    // oil drum
    ctx.fillStyle='#553300'; ctx.fillRect(30,736,40,24); ctx.fillStyle='#FF6600'; ctx.fillRect(34,740,32,6);
    // hammers
    for(const h of hammers){ if(!h.used){ ctx.fillStyle='#FFDD33'; ctx.fillRect(h.x,h.y,h.w,h.h); ctx.fillStyle='#AA8833'; ctx.fillRect(h.x+6,h.y+2,4,8); } }
    // barrels
    for(const b of barrels){ ctx.fillStyle='#8B4513'; ctx.beginPath(); ctx.ellipse(b.x + b.w/2, b.y + b.h/2, b.w/2, b.h/2, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle='#4B2A08'; ctx.fillRect(b.x+2,b.y + b.h/2 -1, b.w-4,2); }
    // player
    // draw player with hammer if active
    ctx.save(); ctx.translate(player.x, player.y);
    // body
    ctx.fillStyle='#FF4444'; ctx.fillRect(4,0,16,12); ctx.fillStyle='#2244FF'; ctx.fillRect(2,12,20,18);
    // head
    ctx.fillStyle='#F5CBA7'; ctx.fillRect(6,-8,12,8);
    // hammer
    if(player.hammerTime>0){ ctx.fillStyle='#FFD633'; ctx.fillRect(18,10,12,6); ctx.fillStyle='#AA8833'; ctx.fillRect(16,14,4,4); }
    ctx.restore();
    // DK
    ctx.fillStyle='#663322'; ctx.fillRect(dk.x, dk.y, dk.w, dk.h); ctx.fillStyle='#000'; ctx.fillRect(dk.x+10, dk.y+8, 20,8);
    // Pauline
    ctx.fillStyle='#FF88FF'; ctx.fillRect(pauline.x, pauline.y, pauline.w, pauline.h); ctx.fillStyle='#FFF'; ctx.fillText('HELP!', pauline.x - 10, pauline.y - 6);
    // HUD
    scoreEl.textContent = score; hiEl.textContent = high; livesEl.textContent = lives; stageEl.textContent = stage;
    // bonus
    ctx.fillStyle='#FFFFFF'; ctx.fillText('BONUS: ' + bonus, W/2 - 40, 20);
  }

  // main loop
  let last = performance.now(); function loop(now){ const dt = Math.min(0.06,(now-last)/1000); last = now; if(state==='playing'){ updatePlayer(dt); updateBarrels(dt); } draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  // initial overlay
  overlay.style.display='flex'; overlay.textContent = 'DONKEY KONG\n\nClimb the girders, avoid barrels, pick up hammers to smash them.\nControls: Arrow keys / WASD to move, Space to jump, P to pause.\nPress Enter to start.';

})();
</script>
</body>
</html>
