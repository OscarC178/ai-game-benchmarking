<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 700;
    const H = 800;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_DEAD = 3;
    const STATE_STAGE_CLEAR = 4;
    const STATE_GAMEOVER = 5;
    
    // Physics
    const GRAVITY = 900;
    const JUMP_VEL = -340;
    const RUN_SPEED = 150;
    const CLIMB_SPEED = 120;
    const BARREL_SPEED = 120;
    const HAMMER_DURATION = 8000;
    
    // Colors
    const COLORS = {
      girder: '#FF6B6B',
      girderDark: '#CC4444',
      ladder: '#4FC3F7',
      ladderDark: '#0288D1',
      barrel: '#8B4513',
      barrelHoop: '#5D3A1A',
      player: '#E53935',
      playerOveralls: '#1E88E5',
      playerSkin: '#FFCC80',
      dk: '#8B4513',
      dkFace: '#5D3A1A',
      pauline: '#E91E63',
      paulineSkin: '#FFCC80',
      hammer: '#FFD700',
      oilDrum: '#444'
    };
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('dk_highscore') || '0');
    let lives = 3;
    let level = 1;
    let bonusTimer = 5000;
    let deadTimer = 0;
    let stageClearTimer = 0;
    
    // Player
    let player = {
      x: 80,
      y: 710,
      w: 24,
      h: 32,
      vx: 0,
      vy: 0,
      onGround: false,
      climbing: false,
      currentLadder: null,
      facing: 1,
      hammerTime: 0,
      hammerSwing: 0,
      jumpId: 0
    };
    
    // Platforms (girders) - each has x1, y1, x2, y2 for line segment
    let platforms = [];
    
    // Ladders
    let ladders = [];
    
    // Barrels
    let barrels = [];
    
    // Hammer pickups
    let hammers = [];
    
    // DK and Pauline positions
    const DK_POS = { x: 100, y: 90 };
    const PAULINE_POS = { x: 400, y: 55 };
    const OIL_DRUM_POS = { x: 50, y: 740 };
    
    // Barrel spawn
    let barrelTimer = 0;
    let barrelInterval = 2500;
    
    // Timers
    let deadTimer = 0;
    let stageClearTimer = 0;
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // Input
    const keys = {};
    
    // ==================== STAGE SETUP ====================
    function createStage() {
      platforms = [];
      ladders = [];
      barrels = [];
      hammers = [];
      
      // Platform 1 (bottom) - slopes up right
      platforms.push({ x1: 20, y1: 740, x2: 680, y2: 700, thick: 12 });
      
      // Platform 2 - slopes up left
      platforms.push({ x1: 20, y1: 600, x2: 680, y2: 640, thick: 12 });
      
      // Platform 3 - slopes up right
      platforms.push({ x1: 20, y1: 500, x2: 680, y2: 460, thick: 12 });
      
      // Platform 4 - slopes up left
      platforms.push({ x1: 20, y1: 360, x2: 680, y2: 400, thick: 12 });
      
      // Platform 5 - slopes up right
      platforms.push({ x1: 20, y1: 260, x2: 680, y2: 220, thick: 12 });
      
      // Platform 6 (top) - fairly flat with slight slope
      platforms.push({ x1: 20, y1: 120, x2: 680, y2: 130, thick: 12 });
      
      // Ladders (x, bottom y, top y, broken at top y or -1)
      // Ladders on platform 1 to 2
      ladders.push({ x: 150, y1: 700, y2: 640, broken: -1 });
      ladders.push({ x: 400, y1: 700, y2: 640, broken: -1 });
      ladders.push({ x: 600, y1: 700, y2: 640, broken: -1 });
      
      // Ladders on platform 2 to 3
      ladders.push({ x: 100, y1: 600, y2: 500, broken: -1 });
      ladders.push({ x: 350, y1: 600, y2: 500, broken: -1 });
      ladders.push({ x: 550, y1: 600, y2: 500, broken: -1 });
      
      // Ladders on platform 3 to 4
      ladders.push({ x: 180, y1: 460, y2: 400, broken: -1 });
      ladders.push({ x: 450, y1: 460, y2: 400, broken: -1 });
      ladders.push({ x: 620, y1: 460, y2: 400, broken: 500 }); // broken
      
      // Ladders on platform 4 to 5
      ladders.push({ x: 80, y1: 360, y2: 260, broken: -1 });
      ladders.push({ x: 300, y1: 360, y2: 260, broken: -1 });
      ladders.push({ x: 500, y1: 360, y2: 260, broken: -1 });
      
      // Ladders on platform 5 to 6
      ladders.push({ x: 150, y1: 220, y2: 130, broken: -1 });
      ladders.push({ x: 400, y1: 220, y2: 130, broken: -1 });
      ladders.push({ x: 580, y1: 220, y2: 130, broken: -1 });
      
      // Hammer pickups
      hammers.push({ x: 250, y: 620, active: true });
      hammers.push({ x: 500, y: 380, active: true });
      
      // Reset player
      player.x = 80;
      player.y = 710;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.climbing = false;
      player.hammerTime = 0;
      
      barrelTimer = 0;
      barrelInterval = Math.max(1500, 2500 - (level - 1) * 200);
      bonusTimer = 5000;
    }
    
    // ==================== UTILITIES ====================
    function getYOnPlatform(platform, x) {
      if (x < platform.x1) return platform.y1;
      if (x > platform.x2) return platform.y2;
      const t = (x - platform.x1) / (platform.x2 - platform.x1);
      return platform.y1 + t * (platform.y2 - platform.y1);
    }
    
    function isOnPlatform(px, py, ph) {
      for (const p of platforms) {
        const surfaceY = getYOnPlatform(p, px);
        if (px >= p.x1 - 10 && px <= p.x2 + 10) {
          if (Math.abs(py + ph/2 - surfaceY) < 8) {
            return p;
          }
        }
      }
      return null;
    }
    
    function getLadderAt(x, y) {
      for (const l of ladders) {
        const ladderTop = Math.min(l.y1, l.y2);
        const ladderBottom = Math.max(l.y1, l.y2);
        if (x >= l.x - 15 && x <= l.x + 15 && y >= ladderTop - 20 && y <= ladderBottom + 20) {
          // Check broken ladder
          if (l.broken > 0 && y < l.broken) continue;
          return l;
        }
      }
      return null;
    }
    
    function rectCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.06) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playJump() { playTone(300, 0.08, 'square', 0.05); }
    function playHammer() { playTone(150, 0.05, 'square', 0.04); }
    function playSmash() { playTone(100, 0.15, 'sawtooth', 0.08); }
    function playDeath() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => playTone(400 - i * 50, 0.1, 'square', 0.06), i * 100);
      }
    }
    function playStageClear() {
      playTone(523, 0.1, 'sine', 0.08);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.08), 100);
      setTimeout(() => playTone(784, 0.15, 'sine', 0.08), 200);
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_TITLE) {
        if (keys['Enter']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      if (state === STATE_PAUSED) {
        if (keys['KeyP']) {
          state = STATE_PLAYING;
          keys['KeyP'] = false;
        }
        return;
      }
      
      if (state === STATE_DEAD) {
        deadTimer -= dtMs;
        if (deadTimer <= 0) {
          if (lives > 0) {
            player.x = 80;
            player.y = 710;
            player.vx = 0;
            player.vy = 0;
            player.climbing = false;
            player.hammerTime = 0;
            barrels = [];
            barrelTimer = 0;
            state = STATE_PLAYING;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('dk_highscore', highScore);
            }
          }
        }
        return;
      }
      
      if (state === STATE_STAGE_CLEAR) {
        stageClearTimer -= dtMs;
        if (stageClearTimer <= 0) {
          nextLevel();
        }
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter']) {
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      // Playing state
      if (keys['KeyP']) {
        state = STATE_PAUSED;
        keys['KeyP'] = false;
        return;
      }
      
      // Update player
      updatePlayer(dt);
      
      // Update barrels
      updateBarrels(dt);
      
      // Spawn barrels
      barrelTimer += dtMs;
      if (barrelTimer >= barrelInterval) {
        barrelTimer = 0;
        spawnBarrel();
      }
      
      // Update bonus timer
      bonusTimer -= dtMs;
      if (bonusTimer < 0) bonusTimer = 0;
      
      // Update hammer time
      if (player.hammerTime > 0) {
        player.hammerTime -= dtMs;
        player.hammerSwing = (player.hammerSwing + dtMs / 100) % (Math.PI * 2);
      }
      
      // Check collisions
      checkCollisions();
    }
    
    function updatePlayer(dt) {
      // Handle input
      const leftKey = keys['ArrowLeft'] || keys['KeyA'];
      const rightKey = keys['ArrowRight'] || keys['KeyD'];
      const upKey = keys['ArrowUp'] || keys['KeyW'];
      const downKey = keys['ArrowDown'] || keys['KeyS'];
      const jumpKey = keys['Space'];
      
      if (player.climbing) {
        // Climbing mode
        player.vx = 0;
        
        if (upKey) {
          player.y -= CLIMB_SPEED * dt;
          player.vy = 0;
        }
        if (downKey) {
          player.y += CLIMB_SPEED * dt;
          player.vy = 0;
        }
        
        // Snap to ladder
        if (player.currentLadder) {
          player.x = player.currentLadder.x;
        }
        
        // Check if should exit ladder
        const ladder = getLadderAt(player.x, player.y);
        if (!ladder) {
          player.climbing = false;
          player.currentLadder = null;
        }
        
        // Check if reached platform
        const platform = isOnPlatform(player.x, player.y, player.h);
        if (platform && !upKey && !downKey) {
          player.climbing = false;
          player.currentLadder = null;
          player.y = getYOnPlatform(platform, player.x) - player.h/2;
          player.onGround = true;
        }
        
      } else {
        // Normal movement
        if (leftKey) {
          player.vx = -RUN_SPEED;
          player.facing = -1;
        } else if (rightKey) {
          player.vx = RUN_SPEED;
          player.facing = 1;
        } else {
          player.vx = 0;
        }
        
        // Jump
        if (jumpKey && player.onGround && player.hammerTime <= 0) {
          player.vy = JUMP_VEL;
          player.onGround = false;
          player.jumpId++;
          playJump();
        }
        
        // Climb ladder
        if ((upKey || downKey) && player.onGround) {
          const ladder = getLadderAt(player.x, player.y);
          if (ladder) {
            player.climbing = true;
            player.currentLadder = ladder;
            player.x = ladder.x;
            player.onGround = false;
            player.vy = 0;
          }
        }
        
        // Apply gravity
        if (!player.onGround) {
          player.vy += GRAVITY * dt;
        }
        
        // Apply movement
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        
        // Check ground collision
        const platform = isOnPlatform(player.x, player.y, player.h);
        if (platform && player.vy >= 0) {
          player.y = getYOnPlatform(platform, player.x) - player.h/2;
          player.vy = 0;
          player.onGround = true;
        } else if (!player.climbing) {
          player.onGround = false;
        }
        
        // Screen bounds
        player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
      }
    }
    
    function spawnBarrel() {
      barrels.push({
        x: DK_POS.x + 40,
        y: DK_POS.y + 30,
        vx: 0,
        vy: 0,
        w: 18,
        h: 18,
        platform: null,
        falling: true,
        jumpScored: {}
      });
    }
    
    function updateBarrels(dt) {
      for (let i = barrels.length - 1; i >= 0; i--) {
        const barrel = barrels[i];
        
        if (barrel.falling) {
          barrel.vy += GRAVITY * dt;
          barrel.y += barrel.vy * dt;
          
          // Check if landed on platform
          const platform = isOnPlatform(barrel.x, barrel.y, barrel.h);
          if (platform) {
            barrel.falling = false;
            barrel.vy = 0;
            barrel.platform = platform;
            barrel.y = getYOnPlatform(platform, barrel.x) - barrel.h/2;
            
            // Determine roll direction based on slope
            if (platform.y1 < platform.y2) {
              barrel.vx = -BARREL_SPEED; // Slopes down left
            } else {
              barrel.vx = BARREL_SPEED; // Slopes down right
            }
          }
          
          // Remove if fell off screen
          if (barrel.y > H + 50) {
            barrels.splice(i, 1);
            continue;
          }
        } else {
          // Rolling on platform
          barrel.x += barrel.vx * dt;
          
          // Check if at edge of platform
          if (barrel.platform) {
            if (barrel.x < barrel.platform.x1 - 10 || barrel.x > barrel.platform.x2 + 10) {
              barrel.falling = true;
              barrel.platform = null;
            } else {
              // Snap to platform surface
              barrel.y = getYOnPlatform(barrel.platform, barrel.x) - barrel.h/2;
              
              // Check ladder descent (occasionally)
              const ladder = getLadderAt(barrel.x, barrel.y);
              if (ladder && Math.random() < 0.002) {
                barrel.falling = true;
                barrel.platform = null;
              }
            }
          }
          
          // Check if reached oil drum area
          if (barrel.y > 700 && barrel.x < 120) {
            barrels.splice(i, 1);
            continue;
          }
        }
      }
    }
    
    function checkCollisions() {
      // Check hammer pickup
      for (const hammer of hammers) {
        if (hammer.active && rectCollision(
          player.x - player.w/2, player.y - player.h/2, player.w, player.h,
          hammer.x - 15, hammer.y - 15, 30, 30
        )) {
          hammer.active = false;
          player.hammerTime = HAMMER_DURATION;
        }
      }
      
      // Check barrel collision
      for (let i = barrels.length - 1; i >= 0; i--) {
        const barrel = barrels[i];
        
        if (rectCollision(
          player.x - player.w/2, player.y - player.h/2, player.w, player.h,
          barrel.x - barrel.w/2, barrel.y - barrel.h/2, barrel.w, barrel.h
        )) {
          if (player.hammerTime > 0) {
            // Smash barrel
            barrels.splice(i, 1);
            score += 300;
            playSmash();
          } else {
            // Player dies
            lives--;
            state = STATE_DEAD;
            deadTimer = 1500;
            playDeath();
            return;
          }
        }
        
        // Jump over scoring
        if (!player.onGround && player.vy > 0) {
          const dx = Math.abs(player.x - barrel.x);
          const dy = player.y - barrel.y;
          
          if (dx < 30 && dy > 0 && dy < 40) {
            if (!barrel.jumpScored[player.jumpId]) {
              barrel.jumpScored[player.jumpId] = true;
              score += 100;
            }
          }
        }
      }
      
      // Check Pauline (goal)
      if (rectCollision(
        player.x - player.w/2, player.y - player.h/2, player.w, player.h,
        PAULINE_POS.x - 20, PAULINE_POS.y - 20, 40, 40
      )) {
        score += 1000 + Math.floor(bonusTimer);
        playStageClear();
        state = STATE_STAGE_CLEAR;
        stageClearTimer = 2000;
      }
    }
    
    // ==================== GAME FLOW ====================
    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      createStage();
      state = STATE_PLAYING;
    }
    
    function nextLevel() {
      level++;
      createStage();
      state = STATE_PLAYING;
    }
    
    // ==================== RENDERING ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitle();
        return;
      }
      
      drawPlatforms();
      drawLadders();
      drawOilDrum();
      drawPauline();
      drawDK();
      drawHammers();
      drawBarrels();
      drawPlayer();
      drawHUD();
      
      if (state === STATE_PAUSED) {
        drawPaused();
      } else if (state === STATE_DEAD) {
        drawDead();
      } else if (state === STATE_STAGE_CLEAR) {
        drawStageClear();
      } else if (state === STATE_GAMEOVER) {
        drawGameOver();
      }
    }
    
    function drawPlatforms() {
      for (const p of platforms) {
        ctx.strokeStyle = COLORS.girder;
        ctx.lineWidth = p.thick;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y1);
        ctx.lineTo(p.x2, p.y2);
        ctx.stroke();
        
        // Draw edge
        ctx.strokeStyle = COLORS.girderDark;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y1 + p.thick/2);
        ctx.lineTo(p.x2, p.y2 + p.thick/2);
        ctx.stroke();
        
        // Rivets
        ctx.fillStyle = '#FFF';
        const steps = 8;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const x = p.x1 + t * (p.x2 - p.x1);
          const y = p.y1 + t * (p.y2 - p.y1);
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    
    function drawLadders() {
      for (const l of ladders) {
        const top = Math.min(l.y1, l.y2);
        const bottom = Math.max(l.y1, l.y2);
        const brokenY = l.broken;
        
        ctx.strokeStyle = COLORS.ladder;
        ctx.lineWidth = 4;
        
        // Left rail
        ctx.beginPath();
        ctx.moveTo(l.x - 8, bottom);
        if (brokenY > 0) {
          ctx.lineTo(l.x - 8, brokenY + 20);
        } else {
          ctx.lineTo(l.x - 8, top);
        }
        ctx.stroke();
        
        // Right rail
        ctx.beginPath();
        ctx.moveTo(l.x + 8, bottom);
        if (brokenY > 0) {
          ctx.lineTo(l.x + 8, brokenY + 20);
        } else {
          ctx.lineTo(l.x + 8, top);
        }
        ctx.stroke();
        
        // Rungs
        ctx.lineWidth = 2;
        const rungSpacing = 15;
        const startY = bottom - rungSpacing;
        const endY = brokenY > 0 ? brokenY + 10 : top;
        
        for (let y = startY; y >= endY; y -= rungSpacing) {
          ctx.beginPath();
          ctx.moveTo(l.x - 8, y);
          ctx.lineTo(l.x + 8, y);
          ctx.stroke();
        }
      }
    }
    
    function drawOilDrum() {
      ctx.fillStyle = COLORS.oilDrum;
      ctx.fillRect(OIL_DRUM_POS.x - 20, OIL_DRUM_POS.y - 25, 40, 50);
      
      // Flame
      if (Math.random() > 0.3) {
        ctx.fillStyle = '#FF6600';
        ctx.beginPath();
        ctx.moveTo(OIL_DRUM_POS.x - 10, OIL_DRUM_POS.y - 25);
        ctx.lineTo(OIL_DRUM_POS.x, OIL_DRUM_POS.y - 40);
        ctx.lineTo(OIL_DRUM_POS.x + 10, OIL_DRUM_POS.y - 25);
        ctx.fill();
        
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath();
        ctx.moveTo(OIL_DRUM_POS.x - 5, OIL_DRUM_POS.y - 25);
        ctx.lineTo(OIL_DRUM_POS.x, OIL_DRUM_POS.y - 35);
        ctx.lineTo(OIL_DRUM_POS.x + 5, OIL_DRUM_POS.y - 25);
        ctx.fill();
      }
    }
    
    function drawDK() {
      // Body
      ctx.fillStyle = COLORS.dk;
      ctx.fillRect(DK_POS.x - 30, DK_POS.y - 20, 60, 50);
      
      // Head
      ctx.beginPath();
      ctx.arc(DK_POS.x, DK_POS.y - 35, 25, 0, Math.PI * 2);
      ctx.fill();
      
      // Face
      ctx.fillStyle = COLORS.dkFace;
      ctx.beginPath();
      ctx.ellipse(DK_POS.x, DK_POS.y - 30, 15, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(DK_POS.x - 8, DK_POS.y - 38, 5, 0, Math.PI * 2);
      ctx.arc(DK_POS.x + 8, DK_POS.y - 38, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(DK_POS.x - 8, DK_POS.y - 38, 2, 0, Math.PI * 2);
      ctx.arc(DK_POS.x + 8, DK_POS.y - 38, 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Arms
      ctx.fillStyle = COLORS.dk;
      ctx.save();
      ctx.translate(DK_POS.x + 25, DK_POS.y);
      ctx.rotate(Math.sin(Date.now() / 200) * 0.3);
      ctx.fillRect(0, -10, 30, 15);
      ctx.restore();
    }
    
    function drawPauline() {
      // Body
      ctx.fillStyle = COLORS.pauline;
      ctx.fillRect(PAULINE_POS.x - 8, PAULINE_POS.y, 16, 25);
      
      // Head
      ctx.fillStyle = COLORS.paulineSkin;
      ctx.beginPath();
      ctx.arc(PAULINE_POS.x, PAULINE_POS.y - 8, 10, 0, Math.PI * 2);
      ctx.fill();
      
      // Hair
      ctx.fillStyle = '#4A2C2A';
      ctx.beginPath();
      ctx.arc(PAULINE_POS.x, PAULINE_POS.y - 12, 10, Math.PI, 0);
      ctx.fill();
      
      // HELP text
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('HELP!', PAULINE_POS.x, PAULINE_POS.y - 30);
      }
    }
    
    function drawHammers() {
      for (const hammer of hammers) {
        if (!hammer.active) continue;
        
        ctx.save();
        ctx.translate(hammer.x, hammer.y);
        
        // Handle
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-3, -15, 6, 25);
        
        // Head
        ctx.fillStyle = COLORS.hammer;
        ctx.fillRect(-12, -20, 24, 10);
        
        ctx.restore();
      }
    }
    
    function drawBarrels() {
      for (const barrel of barrels) {
        ctx.save();
        ctx.translate(barrel.x, barrel.y);
        
        // Body
        ctx.fillStyle = COLORS.barrel;
        ctx.beginPath();
        ctx.ellipse(0, 0, barrel.w/2, barrel.h/2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Hoops
        ctx.strokeStyle = COLORS.barrelHoop;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, -3, barrel.w/2 - 2, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(0, 3, barrel.w/2 - 2, 4, 0, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.restore();
      }
    }
    
    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.scale(player.facing, 1);
      
      if (player.hammerTime > 0) {
        // Hammer mode
        const swingAngle = Math.sin(player.hammerSwing * 2) * 0.5;
        
        // Body
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-10, -12, 20, 20);
        
        // Overalls
        ctx.fillStyle = COLORS.playerOveralls;
        ctx.fillRect(-8, 0, 16, 12);
        
        // Head
        ctx.fillStyle = COLORS.playerSkin;
        ctx.beginPath();
        ctx.arc(0, -16, 8, 0, Math.PI * 2);
        ctx.fill();
        
        // Hat
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-7, -24, 14, 6);
        
        // Hammer
        ctx.save();
        ctx.translate(12, -5);
        ctx.rotate(swingAngle);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-2, -15, 4, 18);
        ctx.fillStyle = COLORS.hammer;
        ctx.fillRect(-8, -20, 16, 8);
        ctx.restore();
        
        if (Math.sin(player.hammerSwing * 4) > 0) {
          playHammer();
        }
      } else if (player.climbing) {
        // Climbing
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-10, -12, 20, 20);
        
        ctx.fillStyle = COLORS.playerOveralls;
        ctx.fillRect(-8, 0, 16, 12);
        
        ctx.fillStyle = COLORS.playerSkin;
        ctx.beginPath();
        ctx.arc(0, -16, 8, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-7, -24, 14, 6);
      } else {
        // Normal
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-10, -12, 20, 20);
        
        ctx.fillStyle = COLORS.playerOveralls;
        ctx.fillRect(-8, 0, 16, 12);
        
        ctx.fillStyle = COLORS.playerSkin;
        ctx.beginPath();
        ctx.arc(0, -16, 8, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-7, -24, 14, 6);
      }
      
      ctx.restore();
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 25);
      
      ctx.textAlign = 'right';
      ctx.fillText(`HIGH: ${highScore}`, W - 10, 25);
      
      // Bonus
      ctx.textAlign = 'center';
      ctx.fillStyle = bonusTimer < 1000 ? '#F44' : '#FF0';
      ctx.font = 'bold 24px monospace';
      ctx.fillText(`BONUS: ${Math.floor(bonusTimer)}`, W/2, 55);
      
      // Lives
      for (let i = 0; i < lives; i++) {
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(10 + i * 20, H - 25, 12, 16);
      }
      
      // Level
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`LEVEL ${level}`, W - 10, H - 15);
    }
    
    function drawTitle() {
      ctx.fillStyle = '#FF6B6B';
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DONKEY KONG', W/2, H/2 - 150);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.fillText('Climb the construction site', W/2, H/2 - 70);
      ctx.fillText('Avoid the rolling barrels', W/2, H/2 - 45);
      ctx.fillText('Use hammers to smash barrels', W/2, H/2 - 20);
      ctx.fillText('Reach the captive at the top', W/2, H/2 + 5);
      ctx.fillText('Race against the bonus timer', W/2, H/2 + 30);
      
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys or WASD to move/climb', W/2, H/2 + 80);
      ctx.fillText('Space to jump', W/2, H/2 + 105);
      ctx.fillText('P to pause', W/2, H/2 + 130);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#FF0';
        ctx.font = '22px monospace';
        ctx.fillText('Press Enter to Start', W/2, H/2 + 200);
      }
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF0';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      
      ctx.fillStyle = '#888';
      ctx.font = '18px monospace';
      ctx.fillText('Press P to Resume', W/2, H/2 + 50);
    }
    
    function drawDead() {
      ctx.fillStyle = '#F00';
      ctx.font = 'bold 32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('OUCH!', W/2, H/2);
    }
    
    function drawStageClear() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#0F0';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('STAGE CLEAR!', W/2, H/2);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#F00';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '24px monospace';
      ctx.fillText(`Score: ${score}`, W/2, H/2 + 20);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', W/2, H/2 + 80);
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
