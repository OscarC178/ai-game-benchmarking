<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="pongCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 84;
        const BALL_SIZE = 12;
        const PLAYER_X = 32;
        const CPU_X = CANVAS_WIDTH - 32 - PADDLE_WIDTH;
        const PADDLE_SPEED = 420;
        const CPU_SPEED = 320;
        const INITIAL_BALL_SPEED = 340;
        const BALL_SPEED_INCREMENT = 22;
        const MAX_BALL_SPEED = 720;
        const MAX_BOUNCE_ANGLE = (60 * Math.PI) / 180;
        const WINNING_SCORE = 7;
        const SERVE_DELAY = 1.0; // seconds

        // Game State
        const STATES = { TITLE: 0, SERVE: 1, PLAYING: 2, PAUSED: 3, GAME_OVER: 4 };
        let currentState = STATES.TITLE;
        let lastTime = 0;
        let playerScore = 0;
        let cpuScore = 0;
        let serveTimer = 0;
        let winner = '';

        // Audio Context (Lazy Init)
        let audioCtx = null;
        function playSound(freq, type = 'square', duration = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const player = {
            x: PLAYER_X,
            y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2,
            score: 0
        };

        const cpu = {
            x: CPU_X,
            y: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2,
            score: 0,
            targetY: (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2,
            updateTimer: 0
        };

        const ball = {
            x: (CANVAS_WIDTH - BALL_SIZE) / 2,
            y: (CANVAS_HEIGHT - BALL_SIZE) / 2,
            vx: 0,
            vy: 0,
            speed: 0
        };

        const keys = {};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter') {
                if (currentState === STATES.TITLE || currentState === STATES.GAME_OVER) {
                    resetMatch();
                }
            }
            if (e.code === 'KeyP' && (currentState === STATES.PLAYING || currentState === STATES.PAUSED)) {
                currentState = currentState === STATES.PAUSED ? STATES.PLAYING : STATES.PAUSED;
            }
            // Trigger audio context on first interaction
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        function resetMatch() {
            playerScore = 0;
            cpuScore = 0;
            resetRound(true);
        }

        function resetRound(isPlayerServing) {
            player.y = (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2;
            cpu.y = (CANVAS_HEIGHT - PADDLE_HEIGHT) / 2;
            ball.x = (CANVAS_WIDTH - BALL_SIZE) / 2;
            ball.y = (CANVAS_HEIGHT - BALL_SIZE) / 2;
            ball.speed = INITIAL_BALL_SPEED;

            // Serve direction
            const dir = isPlayerServing ? -1 : 1;
            const angle = (Math.random() * 56 - 28) * Math.PI / 180;
            ball.vx = Math.cos(angle) * ball.speed * dir;
            ball.vy = Math.sin(angle) * ball.speed;

            serveTimer = SERVE_DELAY;
            currentState = STATES.SERVE;
        }

        function update(dt) {
            if (currentState === STATES.PAUSED || currentState === STATES.TITLE || currentState === STATES.GAME_OVER) return;

            // Player Movement
            if (keys['ArrowUp'] || keys['KeyW']) {
                player.y -= PADDLE_SPEED * dt;
            }
            if (keys['ArrowDown'] || keys['KeyS']) {
                player.y += PADDLE_SPEED * dt;
            }
            player.y = Math.max(0, Math.min(CANVAS_HEIGHT - PADDLE_HEIGHT, player.y));

            // Serve Countdown
            if (currentState === STATES.SERVE) {
                serveTimer -= dt;
                if (serveTimer <= 0) {
                    currentState = STATES.PLAYING;
                }
                return;
            }

            // CPU Logic
            cpu.updateTimer -= dt;
            if (cpu.updateTimer <= 0) {
                // Reaction delay simulation: target the ball's Y with some error
                if (ball.vx > 0) {
                    cpu.targetY = ball.y + (Math.random() * BALL_SIZE - BALL_SIZE / 2);
                } else {
                    // Drift to center when ball moves away
                    cpu.targetY = CANVAS_HEIGHT / 2;
                }
                cpu.updateTimer = 0.08; // 80ms reaction interval
            }

            const cpuCenter = cpu.y + PADDLE_HEIGHT / 2;
            if (cpuCenter < cpu.targetY - 10) {
                cpu.y += CPU_SPEED * dt;
            } else if (cpuCenter > cpu.targetY + 10) {
                cpu.y -= CPU_SPEED * dt;
            }
            cpu.y = Math.max(0, Math.min(CANVAS_HEIGHT - PADDLE_HEIGHT, cpu.y));

            // Ball Movement
            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;

            // Wall Collision
            if (ball.y <= 0) {
                ball.y = 0;
                ball.vy = -ball.vy;
                playSound(220, 'sine');
            } else if (ball.y >= CANVAS_HEIGHT - BALL_SIZE) {
                ball.y = CANVAS_HEIGHT - BALL_SIZE;
                ball.vy = -ball.vy;
                playSound(220, 'sine');
            }

            // Paddle Collision
            if (ball.vx < 0) {
                // Check Player Paddle
                if (ball.x <= player.x + PADDLE_WIDTH && ball.x >= player.x &&
                    ball.y + BALL_SIZE >= player.y && ball.y <= player.y + PADDLE_HEIGHT) {
                    handleCollision(player);
                }
            } else {
                // Check CPU Paddle
                if (ball.x + BALL_SIZE >= cpu.x && ball.x + BALL_SIZE <= cpu.x + PADDLE_WIDTH &&
                    ball.y + BALL_SIZE >= cpu.y && ball.y <= cpu.y + PADDLE_HEIGHT) {
                    handleCollision(cpu);
                }
            }

            // Scoring
            if (ball.x < 0) {
                cpuScore++;
                playSound(110, 'triangle', 0.3);
                checkWin();
            } else if (ball.x > CANVAS_WIDTH) {
                playerScore++;
                playSound(440, 'triangle', 0.3);
                checkWin();
            }
        }

        function handleCollision(paddle) {
            const isPlayer = paddle === player;
            
            // Reverse Horiz
            const dir = isPlayer ? 1 : -1;
            
            // Speed up
            ball.speed = Math.min(MAX_BALL_SPEED, ball.speed + BALL_SPEED_INCREMENT);
            
            // Calc Angle
            const relativeHit = ((ball.y + BALL_SIZE / 2) - (paddle.y + PADDLE_HEIGHT / 2)) / (PADDLE_HEIGHT / 2);
            const bounceAngle = relativeHit * MAX_BOUNCE_ANGLE;
            
            ball.vx = Math.cos(bounceAngle) * ball.speed * dir;
            ball.vy = Math.sin(bounceAngle) * ball.speed;
            
            // Reposition
            if (isPlayer) ball.x = player.x + PADDLE_WIDTH + 1;
            else ball.x = cpu.x - BALL_SIZE - 1;

            playSound(660);
        }

        function checkWin() {
            if (playerScore >= WINNING_SCORE) {
                winner = 'PLAYER';
                currentState = STATES.GAME_OVER;
            } else if (cpuScore >= WINNING_SCORE) {
                winner = 'CPU';
                currentState = STATES.GAME_OVER;
            } else {
                resetRound(ball.x > CANVAS_WIDTH);
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Divider
            ctx.fillStyle = '#fff';
            for (let i = 10; i < CANVAS_HEIGHT; i += 26) {
                ctx.fillRect(CANVAS_WIDTH / 2 - 2, i, 4, 16);
            }

            // HUD
            ctx.font = '64px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(playerScore, CANVAS_WIDTH * 0.25, 80);
            ctx.fillText(cpuScore, CANVAS_WIDTH * 0.75, 80);

            // Paddles
            ctx.fillRect(player.x, player.y, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(cpu.x, cpu.y, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Ball
            ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

            // Overlays
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            if (currentState === STATES.TITLE) {
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '80px "Courier New", monospace';
                ctx.fillText('PONG', CANVAS_WIDTH / 2, 240);
                ctx.font = '20px "Courier New", monospace';
                ctx.fillText('ARROW KEYS / WS TO MOVE  |  P TO PAUSE', CANVAS_WIDTH / 2, 340);
                ctx.fillText('PRESS ENTER TO START', CANVAS_WIDTH / 2, 400);
            } else if (currentState === STATES.PAUSED) {
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '40px "Courier New", monospace';
                ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            } else if (currentState === STATES.GAME_OVER) {
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '60px "Courier New", monospace';
                ctx.fillText(winner + ' WINS!', CANVAS_WIDTH / 2, 240);
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText('FINAL SCORE: ' + playerScore + ' - ' + cpuScore, CANVAS_WIDTH / 2, 320);
                ctx.fillText('PRESS ENTER TO RESTART', CANVAS_WIDTH / 2, 400);
            } else if (currentState === STATES.SERVE) {
                ctx.fillStyle = '#fff';
                ctx.font = '40px "Courier New", monospace';
                ctx.fillText('READY', CANVAS_WIDTH / 2, 200);
            }
        }

        function gameLoop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
