<!--
  GAME:      Pong
  RUN:       r2-gpt54
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game objects
    const PADDLE_W = 12;
    const PADDLE_H = 84;
    const BALL_SIZE = 12;
    
    const PLAYER_START_X = 32;
    const PLAYER_START_Y = 258;
    const CPU_START_X = 756;
    const CPU_START_Y = 258;
    const BALL_START_X = 394;
    const BALL_START_Y = 294;
    
    const PLAYER_SPEED = 420;
    const CPU_SPEED = 320;
    const BALL_START_SPEED = 340;
    const BALL_SPEED_INC = 22;
    const BALL_MAX_SPEED = 620;
    const MAX_ANGLE = 60 * Math.PI / 180;
    
    const WIN_SCORE = 7;
    const SERVE_DELAY = 900;
    
    // States
    const STATE_TITLE = 'TITLE';
    const STATE_SERVE = 'SERVE';
    const STATE_PLAYING = 'PLAYING';
    const STATE_PAUSED = 'PAUSED';
    const STATE_GAMEOVER = 'GAMEOVER';
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let playerScore = 0;
    let cpuScore = 0;
    let serveTimer = 0;
    let serveToward = 'player';
    let winner = '';
    
    // Player paddle
    let player = {
      x: PLAYER_START_X,
      y: PLAYER_START_Y,
      w: PADDLE_W,
      h: PADDLE_H,
      vy: 0
    };
    
    // CPU paddle
    let cpu = {
      x: CPU_START_X,
      y: CPU_START_Y,
      w: PADDLE_W,
      h: PADDLE_H,
      targetY: H / 2,
      reactTimer: 0
    };
    
    // Ball
    let ball = {
      x: BALL_START_X,
      y: BALL_START_Y,
      size: BALL_SIZE,
      vx: 0,
      vy: 0,
      speed: BALL_START_SPEED,
      lastHit: ''
    };
    
    // Input
    const keys = {};
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.15) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playPaddleHit() { playTone(440, 0.05, 'square', 0.12); }
    function playWallHit() { playTone(330, 0.05, 'square', 0.10); }
    function playScore() { playTone(220, 0.15, 'square', 0.15); }
    function playWin() { playTone(660, 0.1, 'sine', 0.2); setTimeout(() => playTone(880, 0.15, 'sine', 0.2), 100); }
    function playLose() { playTone(200, 0.2, 'sawtooth', 0.15); }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      initAudio();
      
      if (state === STATE_TITLE && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_GAMEOVER && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_PLAYING && e.code === 'KeyP') {
        state = STATE_PAUSED;
      } else if (state === STATE_PAUSED && e.code === 'KeyP') {
        state = STATE_PLAYING;
      }
      
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // ==================== GAME LOGIC ====================
    function startGame() {
      playerScore = 0;
      cpuScore = 0;
      winner = '';
      state = STATE_SERVE;
      serveToward = 'player';
      resetRound();
    }
    
    function resetRound() {
      player.x = PLAYER_START_X;
      player.y = PLAYER_START_Y;
      cpu.x = CPU_START_X;
      cpu.y = CPU_START_Y;
      ball.x = BALL_START_X;
      ball.y = BALL_START_Y;
      ball.speed = BALL_START_SPEED;
      ball.vx = 0;
      ball.vy = 0;
      ball.lastHit = '';
      serveTimer = SERVE_DELAY;
    }
    
    function serveBall() {
      const angle = (Math.random() * 56 - 28) * Math.PI / 180;
      const dir = serveToward === 'player' ? 1 : -1;
      ball.vx = Math.cos(angle) * ball.speed * dir;
      ball.vy = Math.sin(angle) * ball.speed;
    }
    
    function updatePlayer(dt) {
      player.vy = 0;
      if (keys['ArrowUp'] || keys['KeyW']) player.vy = -PLAYER_SPEED;
      if (keys['ArrowDown'] || keys['KeyS']) player.vy = PLAYER_SPEED;
      
      player.y += player.vy * dt;
      player.y = Math.max(0, Math.min(H - player.h, player.y));
    }
    
    function updateCPU(dt) {
      // Update reaction
      cpu.reactTimer -= dt * 1000;
      if (cpu.reactTimer <= 0) {
        cpu.reactTimer = 80;
        if (ball.vx > 0) {
          // Add imperfection
          cpu.targetY = ball.y + (Math.random() - 0.5) * 30;
        } else {
          // Return to center when ball moving away
          cpu.targetY = H / 2;
        }
      }
      
      // Move toward target
      const centerY = cpu.y + cpu.h / 2;
      const diff = cpu.targetY - centerY;
      
      if (Math.abs(diff) > 5) {
        const move = Math.sign(diff) * CPU_SPEED * dt;
        cpu.y += move;
      }
      
      cpu.y = Math.max(0, Math.min(H - cpu.h, cpu.y));
    }
    
    function updateBall(dt) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      
      // Wall collision
      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
        playWallHit();
      }
      if (ball.y + ball.size >= H) {
        ball.y = H - ball.size;
        ball.vy = -ball.vy;
        playWallHit();
      }
      
      // Paddle collision - Player
      if (ball.vx < 0 && ball.lastHit !== 'player') {
        if (ball.x <= player.x + player.w &&
            ball.x + ball.size >= player.x &&
            ball.y + ball.size >= player.y &&
            ball.y <= player.y + player.h) {
          
          // Reposition
          ball.x = player.x + player.w;
          
          // Compute bounce
          const hitPos = (ball.y + ball.size / 2 - player.y) / player.h;
          const offset = hitPos - 0.5;
          const angle = offset * MAX_ANGLE * 2;
          
          ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_MAX_SPEED);
          ball.vx = Math.cos(angle) * ball.speed;
          ball.vy = Math.sin(angle) * ball.speed;
          ball.lastHit = 'player';
          
          playPaddleHit();
        }
      }
      
      // Paddle collision - CPU
      if (ball.vx > 0 && ball.lastHit !== 'cpu') {
        if (ball.x + ball.size >= cpu.x &&
            ball.x <= cpu.x + cpu.w &&
            ball.y + ball.size >= cpu.y &&
            ball.y <= cpu.y + cpu.h) {
          
          // Reposition
          ball.x = cpu.x - ball.size;
          
          // Compute bounce
          const hitPos = (ball.y + ball.size / 2 - cpu.y) / cpu.h;
          const offset = hitPos - 0.5;
          const angle = offset * MAX_ANGLE * 2;
          
          ball.speed = Math.min(ball.speed + BALL_SPEED_INC, BALL_MAX_SPEED);
          ball.vx = -Math.cos(angle) * ball.speed;
          ball.vy = Math.sin(angle) * ball.speed;
          ball.lastHit = 'cpu';
          
          playPaddleHit();
        }
      }
      
      // Scoring
      if (ball.x + ball.size < 0) {
        cpuScore++;
        serveToward = 'player';
        playScore();
        onScore();
      } else if (ball.x > W) {
        playerScore++;
        serveToward = 'cpu';
        playScore();
        onScore();
      }
    }
    
    function onScore() {
      if (playerScore >= WIN_SCORE) {
        winner = 'PLAYER';
        state = STATE_GAMEOVER;
        playWin();
      } else if (cpuScore >= WIN_SCORE) {
        winner = 'CPU';
        state = STATE_GAMEOVER;
        playLose();
      } else {
        resetRound();
        state = STATE_SERVE;
      }
    }
    
    function update(dt) {
      if (state === STATE_SERVE) {
        serveTimer -= dt * 1000;
        if (serveTimer <= 0) {
          serveBall();
          state = STATE_PLAYING;
        }
      } else if (state === STATE_PLAYING) {
        updatePlayer(dt);
        updateCPU(dt);
        updateBall(dt);
      }
    }
    
    // ==================== RENDERING ====================
    function drawDivider() {
      ctx.fillStyle = '#FFF';
      const dashH = 16;
      const gap = 10;
      for (let y = 0; y < H; y += dashH + gap) {
        ctx.fillRect(W / 2 - 2, y, 4, dashH);
      }
    }
    
    function drawScore() {
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(playerScore.toString(), W / 4, 50);
      ctx.fillText(cpuScore.toString(), 3 * W / 4, 50);
    }
    
    function drawPaddle(p) {
      ctx.fillStyle = '#FFF';
      ctx.fillRect(p.x, p.y, p.w, p.h);
    }
    
    function drawBall() {
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
    }
    
    function drawTitle() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 64px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PONG', W / 2, H / 2 - 80);
      
      ctx.font = '20px monospace';
      ctx.fillText('Player: Arrow Keys or W/S', W / 2, H / 2);
      ctx.fillText('CPU: Automatic', W / 2, H / 2 + 30);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = '24px monospace';
        ctx.fillText('Press Enter to Start', W / 2, H / 2 + 100);
      }
    }
    
    function drawServeReady() {
      if (Math.floor(Date.now() / 300) % 2 === 0) {
        ctx.fillStyle = '#FFF';
        ctx.font = '24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('READY', W / 2, H / 2);
      }
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2);
      
      ctx.font = '20px monospace';
      ctx.fillText('Press P to Resume', W / 2, H / 2 + 50);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      
      if (winner === 'PLAYER') {
        ctx.fillStyle = '#0F0';
        ctx.fillText('PLAYER WINS', W / 2, H / 2 - 60);
      } else {
        ctx.fillStyle = '#F00';
        ctx.fillText('CPU WINS', W / 2, H / 2 - 60);
      }
      
      ctx.fillStyle = '#FFF';
      ctx.font = '32px monospace';
      ctx.fillText(`${playerScore} - ${cpuScore}`, W / 2, H / 2);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 60);
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawDivider();
        drawScore();
        drawPaddle(player);
        drawPaddle(cpu);
        drawBall();
        drawTitle();
      } else if (state === STATE_SERVE) {
        drawDivider();
        drawScore();
        drawPaddle(player);
        drawPaddle(cpu);
        drawBall();
        drawServeReady();
      } else if (state === STATE_PLAYING) {
        drawDivider();
        drawScore();
        drawPaddle(player);
        drawPaddle(cpu);
        drawBall();
      } else if (state === STATE_PAUSED) {
        drawDivider();
        drawScore();
        drawPaddle(player);
        drawPaddle(cpu);
        drawBall();
        drawPaused();
      } else if (state === STATE_GAMEOVER) {
        drawDivider();
        drawScore();
        drawPaddle(player);
        drawPaddle(cpu);
        drawBall();
        drawGameOver();
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
