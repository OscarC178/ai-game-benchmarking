<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Courier New", monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      max-width: 100vw;
      max-height: 100vh;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    // Canvas and context
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    // Game constants
    const WIDTH = 800;
    const HEIGHT = 600;
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 84;
    const BALL_SIZE = 12;
    const PADDLE_SPEED = 420;
    const CPU_SPEED = 320;
    const SERVE_DELAY = 0.75;
    const MAX_SPEED = 620;
    const BASE_SPEED = 340;
    const SPEED_INCREMENT = 22;

    // Game states
    const STATES = {
      TITLE: 'title',
      PLAYING: 'playing',
      PAUSED: 'paused',
      GAME_OVER: 'game_over',
      SERVE: 'serve'
    };

    // Game objects
    let playerPaddle = {
      x: 32,
      y: 258,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      vy: 0
    };

    let cpuPaddle = {
      x: WIDTH - 32 - PADDLE_WIDTH,
      y: 258,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      vy: 0,
      targetY: 258,
      reactionTimer: 0
    };

    let ball = {
      x: WIDTH / 2 - BALL_SIZE / 2,
      y: HEIGHT / 2 - BALL_SIZE / 2,
      vx: 0,
      vy: 0,
      width: BALL_SIZE,
      height: BALL_SIZE
    };

    let gameState = STATES.TITLE;
    let playerScore = 0;
    let cpuScore = 0;
    let serveTimer = 0;
    let paused = false;
    let keys = {};
    let audioCtx = null;

    // Input handling
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) {
          resetGame();
          gameState = STATES.SERVE;
          serveTimer = SERVE_DELAY;
        }
      }

      if (e.key.toLowerCase() === 'p') {
        e.preventDefault();
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function resetGame() {
      playerScore = 0;
      cpuScore = 0;
      resetRound();
    }

    function resetRound() {
      playerPaddle.y = 258;
      playerPaddle.vy = 0;
      cpuPaddle.y = 258;
      cpuPaddle.vy = 0;
      cpuPaddle.targetY = 258;
      cpuPaddle.reactionTimer = 0;

      ball.x = WIDTH / 2 - BALL_SIZE / 2;
      ball.y = HEIGHT / 2 - BALL_SIZE / 2;
      ball.vx = 0;
      ball.vy = 0;

      serveTimer = SERVE_DELAY;
    }

    function update(deltaTime) {
      if (gameState === STATES.TITLE) {
        return;
      }

      if (gameState === STATES.PAUSED) {
        return;
      }

      if (gameState === STATES.SERVE) {
        serveTimer -= deltaTime;
        if (serveTimer <= 0) {
          serveBall();
          gameState = STATES.PLAYING;
        }
        return;
      }

      if (gameState === STATES.PLAYING) {
        // Update player paddle
        playerPaddle.vy = 0;
        if (keys['arrowup'] || keys['w']) {
          playerPaddle.vy = -PADDLE_SPEED;
        }
        if (keys['arrowdown'] || keys['s']) {
          playerPaddle.vy = PADDLE_SPEED;
        }

        playerPaddle.y += playerPaddle.vy * deltaTime;
        playerPaddle.y = Math.max(0, Math.min(HEIGHT - PADDLE_HEIGHT, playerPaddle.y));

        // Update CPU paddle with simple AI
        cpuPaddle.reactionTimer += deltaTime;
        if (cpuPaddle.reactionTimer >= 0.08) {
          cpuPaddle.reactionTimer = 0;
          // Update target based on ball position with some imperfection
          if (ball.vx > 0) {
            // Ball moving toward CPU
            cpuPaddle.targetY = ball.y + ball.height / 2 - PADDLE_HEIGHT / 2;
            // Add slight dead zone
            if (Math.abs(cpuPaddle.y + PADDLE_HEIGHT / 2 - (ball.y + ball.height / 2)) < 20) {
              cpuPaddle.targetY = cpuPaddle.y;
            }
          } else {
            // Ball moving away, drift toward center
            cpuPaddle.targetY = HEIGHT / 2 - PADDLE_HEIGHT / 2;
          }
        }

        // Move CPU toward target
        cpuPaddle.vy = 0;
        if (cpuPaddle.y < cpuPaddle.targetY - 5) {
          cpuPaddle.vy = CPU_SPEED;
        } else if (cpuPaddle.y > cpuPaddle.targetY + 5) {
          cpuPaddle.vy = -CPU_SPEED;
        }

        cpuPaddle.y += cpuPaddle.vy * deltaTime;
        cpuPaddle.y = Math.max(0, Math.min(HEIGHT - PADDLE_HEIGHT, cpuPaddle.y));

        // Update ball
        ball.x += ball.vx * deltaTime;
        ball.y += ball.vy * deltaTime;

        // Ball collision with top/bottom walls
        if (ball.y < 0) {
          ball.y = 0;
          ball.vy = -ball.vy;
          playSound(400, 0.05);
        }
        if (ball.y + ball.height > HEIGHT) {
          ball.y = HEIGHT - ball.height;
          ball.vy = -ball.vy;
          playSound(400, 0.05);
        }

        // Ball collision with paddles
        if (ball.vx < 0 && checkAABB(ball, playerPaddle)) {
          let hitPos = (ball.y + ball.height / 2 - playerPaddle.y) / PADDLE_HEIGHT;
          hitPos = Math.max(0, Math.min(1, hitPos));
          let angle = (hitPos - 0.5) * Math.PI / 3; // ±60 degrees
          let speed = Math.min(Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) + SPEED_INCREMENT, MAX_SPEED);
          ball.vx = Math.cos(angle) * speed;
          ball.vy = Math.sin(angle) * speed;
          ball.x = playerPaddle.x + playerPaddle.width;
          playSound(800, 0.04);
        }

        if (ball.vx > 0 && checkAABB(ball, cpuPaddle)) {
          let hitPos = (ball.y + ball.height / 2 - cpuPaddle.y) / PADDLE_HEIGHT;
          hitPos = Math.max(0, Math.min(1, hitPos));
          let angle = (hitPos - 0.5) * Math.PI / 3; // ±60 degrees
          let speed = Math.min(Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) + SPEED_INCREMENT, MAX_SPEED);
          ball.vx = -Math.cos(angle) * speed;
          ball.vy = Math.sin(angle) * speed;
          ball.x = cpuPaddle.x - ball.width;
          playSound(800, 0.04);
        }

        // Scoring
        if (ball.x < 0) {
          cpuScore++;
          playSound(300, 0.1);
          if (cpuScore >= 7) {
            gameState = STATES.GAME_OVER;
          } else {
            gameState = STATES.SERVE;
            resetRound();
          }
        }

        if (ball.x + ball.width > WIDTH) {
          playerScore++;
          playSound(300, 0.1);
          if (playerScore >= 7) {
            gameState = STATES.GAME_OVER;
          } else {
            gameState = STATES.SERVE;
            resetRound();
          }
        }
      }
    }

    function checkAABB(rect1, rect2) {
      return rect1.x < rect2.x + rect2.width &&
             rect1.x + rect1.width > rect2.x &&
             rect1.y < rect2.y + rect2.height &&
             rect1.y + rect1.height > rect2.y;
    }

    function serveBall() {
      let direction = Math.random() < 0.5 ? 1 : -1;
      let angle = (Math.random() - 0.5) * (Math.PI / 6.5);
      ball.vx = Math.cos(angle) * BASE_SPEED * direction;
      ball.vy = Math.sin(angle) * BASE_SPEED;
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (gameState === STATES.TITLE) {
        renderTitle();
      } else if (gameState === STATES.GAME_OVER) {
        renderGameOver();
      } else {
        renderGame();
      }

      if (gameState === STATES.PAUSED) {
        renderPauseOverlay();
      }
    }

    function renderGame() {
      // Center divider
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 4;
      ctx.setLineDash([16, 10]);
      ctx.beginPath();
      ctx.moveTo(WIDTH / 2, 0);
      ctx.lineTo(WIDTH / 2, HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
      ctx.fillRect(cpuPaddle.x, cpuPaddle.y, cpuPaddle.width, cpuPaddle.height);

      // Ball
      ctx.fillRect(ball.x, ball.y, ball.width, ball.height);

      // Scores
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(playerScore, WIDTH / 2 - 40, 60);
      ctx.textAlign = 'left';
      ctx.fillText(cpuScore, WIDTH / 2 + 40, 60);
    }

    function renderTitle() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 72px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PONG', WIDTH / 2, 150);

      ctx.font = '24px "Courier New", monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('PLAYER vs CPU', WIDTH / 2, 220);

      ctx.font = '16px "Courier New", monospace';
      ctx.fillStyle = '#888888';
      ctx.fillText('Arrow Keys or W/S to move', WIDTH / 2, 280);
      ctx.fillText('P to pause', WIDTH / 2, 310);
      ctx.fillText('First to 7 wins', WIDTH / 2, 340);

      ctx.font = 'bold 20px "Courier New", monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText('Press ENTER to Start', WIDTH / 2, 450);
    }

    function renderGameOver() {
      let winner = playerScore > cpuScore ? 'PLAYER WINS!' : 'CPU WINS!';
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(winner, WIDTH / 2, 150);

      ctx.font = '32px "Courier New", monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText(playerScore + ' - ' + cpuScore, WIDTH / 2, 250);

      ctx.font = 'bold 20px "Courier New", monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
    }

    function renderPauseOverlay() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);

      ctx.font = '16px "Courier New", monospace';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('Press P to Resume', WIDTH / 2, HEIGHT / 2 + 60);
    }

    function playSound(freq, duration) {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          return;
        }
      }

      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.frequency.value = freq;
        osc.type = 'square';

        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {
        // Fail silently
      }
    }

    // Main game loop
    let lastTime = performance.now();
    function gameLoop(currentTime) {
      const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(deltaTime);
      render();

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
