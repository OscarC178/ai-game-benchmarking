  GAME:      Pong
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600;
const PW=12,PH=84,BALL=12;
const P_SPEED=420,CPU_SPEED=320,WIN_SCORE=7;
const SERVE_DELAY=0.9;

// Scale canvas to viewport
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H)*0.95;
  cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize);resize();

// Audio
let audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(freq,dur,vol,type){
  if(!audioCtx)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=vol||0.08;g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function sndPaddle(){beep(440,0.05,0.1);}
function sndWall(){beep(300,0.04,0.06);}
function sndScore(){beep(180,0.2,0.12);}
function sndWin(){beep(660,0.1,0.1);setTimeout(()=>beep(880,0.15,0.1),120);}

// States
const ST_TITLE=0,ST_SERVE=1,ST_PLAY=2,ST_PAUSE=3,ST_OVER=4;
let state=ST_TITLE;

// Game objects
let playerY,cpuY,ballX,ballY,ballVx,ballVy,ballSpeed;
let pScore,cScore,serveTimer,serveDir,lastHitSide;
let cpuTarget,cpuReactTimer;

// Input
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Enter'||e.code==='Space'||e.code==='KeyP')e.preventDefault();
  initAudio();
  // State transitions on keydown
  if(e.code==='Enter'||e.code==='Space'){
    if(state===ST_TITLE){startMatch();return;}
    if(state===ST_OVER){startMatch();return;}
  }
  if(e.code==='KeyP'&&state===ST_PLAY){state=ST_PAUSE;return;}
  if(e.code==='KeyP'&&state===ST_PAUSE){state=ST_PLAY;return;}
  if(e.code==='Enter'&&state===ST_PAUSE){state=ST_PLAY;return;}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function startMatch(){
  pScore=0;cScore=0;serveDir=Math.random()<0.5?-1:1;
  resetRound();state=ST_SERVE;
}

function resetRound(){
  playerY=258;cpuY=258;
  ballX=394;ballY=294;ballVx=0;ballVy=0;ballSpeed=340;
  serveTimer=SERVE_DELAY;lastHitSide=0;
  cpuTarget=H/2;cpuReactTimer=0;
}

function serve(){
  const angle=(Math.random()*56-28)*Math.PI/180;
  ballVx=Math.cos(angle)*ballSpeed*serveDir;
  ballVy=Math.sin(angle)*ballSpeed;
  state=ST_PLAY;
}

// Update
function update(dt){
  if(state===ST_SERVE){
    serveTimer-=dt;
    updatePlayer(dt);
    if(serveTimer<=0)serve();
    return;
  }
  if(state!==ST_PLAY)return;

  // Player paddle
  updatePlayer(dt);

  // CPU paddle
  updateCPU(dt);

  // Ball movement
  ballX+=ballVx*dt;
  ballY+=ballVy*dt;

  // Wall bounce
  if(ballY<0){ballY=-ballY;ballVy=Math.abs(ballVy);sndWall();}
  if(ballY+BALL>H){ballY=2*H-2*BALL-ballY;ballVy=-Math.abs(ballVy);sndWall();}

  // Paddle collision — left paddle
  if(ballVx<0&&lastHitSide!==1){
    if(ballX<32+PW&&ballX+BALL>32&&ballY+BALL>playerY&&ballY<playerY+PH){
      paddleBounce(32+PW,playerY,1);
    }
  }
  // Right paddle
  if(ballVx>0&&lastHitSide!==2){
    if(ballX+BALL>756&&ballX<756+PW&&ballY+BALL>cpuY&&ballY<cpuY+PH){
      paddleBounce(756-BALL,cpuY,-1);
    }
  }

  // Scoring
  if(ballX+BALL<0){
    cScore++;sndScore();
    if(cScore>=WIN_SCORE){state=ST_OVER;sndWin();return;}
    serveDir=1;resetRound();state=ST_SERVE;return;
  }
  if(ballX>W){
    pScore++;sndScore();
    if(pScore>=WIN_SCORE){state=ST_OVER;sndWin();return;}
    serveDir=-1;resetRound();state=ST_SERVE;return;
  }
}

function updatePlayer(dt){
  let dir=0;
  if(keys['ArrowUp']||keys['KeyW'])dir=-1;
  if(keys['ArrowDown']||keys['KeyS'])dir=1;
  playerY+=dir*P_SPEED*dt;
  playerY=Math.max(0,Math.min(H-PH,playerY));
}

function updateCPU(dt){
  cpuReactTimer-=dt;
  if(cpuReactTimer<=0){
    cpuReactTimer=0.08;
    if(ballVx>0){
      // Ball moving toward CPU
      cpuTarget=ballY+BALL/2+(Math.random()-0.5)*20;
    }else{
      // Drift toward center
      cpuTarget=H/2;
    }
  }
  const cpuCenter=cpuY+PH/2;
  const diff=cpuTarget-cpuCenter;
  const deadZone=6;
  if(Math.abs(diff)>deadZone){
    const move=Math.sign(diff)*Math.min(CPU_SPEED*dt,Math.abs(diff));
    cpuY+=move;
  }
  cpuY=Math.max(0,Math.min(H-PH,cpuY));
}

function paddleBounce(newBallX,paddleY,hDir){
  ballX=newBallX;
  // Impact offset: -1 (top) to +1 (bottom)
  const hitCenter=ballY+BALL/2;
  const paddleCenter=paddleY+PH/2;
  const offset=Math.max(-1,Math.min(1,(hitCenter-paddleCenter)/(PH/2)));
  // Angle: offset maps to max ±60°
  const maxAngle=60*Math.PI/180;
  const angle=offset*maxAngle;
  // Speed increase
  ballSpeed=Math.min(620,ballSpeed+22);
  ballVx=Math.cos(angle)*ballSpeed*hDir;
  ballVy=Math.sin(angle)*ballSpeed;
  lastHitSide=hDir>0?1:2;
  sndPaddle();
}

// Render
function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  // Center divider
  cx.fillStyle='#444';
  for(let y=0;y<H;y+=26){
    cx.fillRect(W/2-2,y,4,16);
  }

  switch(state){
    case ST_TITLE:
      cx.fillStyle='#FFF';cx.font='bold 72px monospace';cx.textAlign='center';
      cx.fillText('PONG',W/2,200);
      cx.font='18px monospace';
      cx.fillText('Arrow Up/Down or W/S — Move Paddle',W/2,320);
      cx.fillText('P — Pause',W/2,350);
      cx.fillStyle='#AAA';cx.font='22px monospace';
      if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',W/2,450);
      break;

    case ST_SERVE:
    case ST_PLAY:
      drawGame();
      if(state===ST_SERVE){
        cx.fillStyle='rgba(255,255,255,0.5)';cx.font='24px monospace';cx.textAlign='center';
        cx.fillText('READY',W/2,H/2+60);
      }
      break;

    case ST_PAUSE:
      drawGame();
      cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
      cx.fillStyle='#FFF';cx.font='bold 48px monospace';cx.textAlign='center';
      cx.fillText('PAUSED',W/2,H/2-10);
      cx.font='18px monospace';cx.fillStyle='#AAA';
      cx.fillText('Press P to Resume',W/2,H/2+30);
      break;

    case ST_OVER:
      drawGame();
      cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
      cx.fillStyle='#FFF';cx.font='bold 42px monospace';cx.textAlign='center';
      const winner=pScore>=WIN_SCORE?'PLAYER WINS!':'CPU WINS!';
      cx.fillText(winner,W/2,H/2-40);
      cx.font='28px monospace';
      cx.fillText(pScore+' — '+cScore,W/2,H/2+10);
      cx.fillStyle='#AAA';cx.font='20px monospace';
      if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+60);
      break;
  }
}

function drawGame(){
  // Scores
  cx.fillStyle='#FFF';cx.font='bold 64px monospace';cx.textAlign='center';
  cx.fillText(String(pScore),W/2-80,70);
  cx.fillText(String(cScore),W/2+80,70);

  // Paddles
  cx.fillStyle='#FFF';
  cx.fillRect(32,playerY,PW,PH);
  cx.fillRect(756,cpuY,PW,PH);

  // Ball
  cx.fillRect(ballX,ballY,BALL,BALL);
}

// Main loop
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);
  render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
