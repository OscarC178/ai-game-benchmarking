<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #FFF;
    font-family: monospace;
    overflow: hidden;
  }
  canvas {
    background-color: #000;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    image-rendering: crisp-edges;
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
// --- Audio System (Web Audio API) ---
const audio = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    playTone(freq, type, duration, vol = 0.1, slideFreq = null) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    playNoise(duration, vol) {
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1000;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
        noise.stop(this.ctx.currentTime + duration);
    },
    shoot() { this.playTone(880, 'square', 0.1, 0.1, 110); },
    alienKill() { this.playNoise(0.15, 0.2); },
    playerDeath() { 
        this.playNoise(0.5, 0.3); 
        this.playTone(200, 'sawtooth', 0.5, 0.2, 50);
    },
    mysterySound() { this.playTone(600, 'sine', 0.1, 0.05, 800); },
    step(index) { 
        const notes = [150, 140, 130, 120];
        this.playTone(notes[index % 4], 'square', 0.05, 0.05); 
    }
};

// --- Game Constants ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_PAUSED = 2;
const STATE_GAMEOVER = 3;
const STATE_WAVECLEAR = 4;
const STATE_RESPAWN = 5;

// Player
const P_W = 40, P_H = 16, P_SPEED = 300, P_START_Y = 550;

// Alien Grid
const A_COLS = 11, A_ROWS = 5;
const A_SPACING_X = 50, A_SPACING_Y = 40;
const A_START_X = 120, A_START_Y = 80;

// Bullets
const BULLET_W = 3, BULLET_H = 12;
const P_BULLET_SPEED = 500;
const A_BULLET_SPEED = 250;

// Shields
const SHLD_COLS = 20, SHLD_ROWS = 16, SHLD_CELL = 4;
const SHLD_Y = 480;
const SHLD_POSITIONS = [140, 300, 460, 620];

// Mystery Ship
const MYS_W = 48, MYS_H = 16, MYS_SPEED = 150, MYS_Y = 40;

// --- Entity Data ---
let state = STATE_TITLE;
let lastTime = 0;
let score = 0;
let highScore = parseInt(localStorage.getItem('si_high')) || 0;
let lives = 3;
let wave = 1;

let stateTimer = 0;
let animFrame = 0;

const keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false, Space: false };

let player = { x: 0, y: P_START_Y, dead: false };
let pBullet = null; // {x, y} or null
let aBullets = []; // [{x, y}]

let aliens = {
    grid: [], // 2D array of {alive: boolean, type: number}
    offsetX: 0,
    offsetY: 0,
    dir: 1,
    aliveCount: 0,
    stepTimer: 0,
    stepInterval: 0.8,
    stepIndex: 0
};

let shields = []; // Array of boolean grids
let mysteryShip = { active: false, x: 0, dir: 1, timer: 0 };

// --- Input Handling ---
window.addEventListener('keydown', e => {
    audio.init();
    if (e.code in keys) {
        keys[e.code] = true;
        if (['Space', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    }
    
    if (e.code === 'Enter') {
        if (state === STATE_TITLE || state === STATE_GAMEOVER) {
            startGame();
        }
    } else if (e.code === 'KeyP') {
        if (state === STATE_PLAYING) state = STATE_PAUSED;
        else if (state === STATE_PAUSED) {
            state = STATE_PLAYING;
            lastTime = performance.now();
        }
    }
});

window.addEventListener('keyup', e => {
    if (e.code in keys) keys[e.code] = false;
});

const isLeft = () => keys.ArrowLeft || keys.KeyA;
const isRight = () => keys.ArrowRight || keys.KeyD;

// --- Setup Functions ---
function buildShields() {
    shields = [];
    for (let s = 0; s < 4; s++) {
        let grid = [];
        for (let r = 0; r < SHLD_ROWS; r++) {
            let row = [];
            for (let c = 0; c < SHLD_COLS; c++) {
                // Cutout corners and bottom arch
                let active = true;
                if (r < 2 && (c < 2 - r || c > (SHLD_COLS-1) - (2-r))) active = false; // top corners
                if (r > SHLD_ROWS - 6 && c > 5 && c < SHLD_COLS - 6) active = false; // bottom arch
                row.push(active);
            }
            grid.push(row);
        }
        shields.push({ x: SHLD_POSITIONS[s] - (SHLD_COLS * SHLD_CELL) / 2, grid });
    }
}

function buildAliens() {
    aliens.grid = [];
    aliens.aliveCount = A_COLS * A_ROWS;
    aliens.offsetX = 0;
    aliens.offsetY = 0;
    aliens.dir = 1;
    aliens.stepInterval = Math.max(0.1, 0.8 - (wave * 0.05));
    aliens.stepTimer = aliens.stepInterval;
    aliens.stepIndex = 0;

    for (let r = 0; r < A_ROWS; r++) {
        let row = [];
        let type = r === 0 ? 0 : (r < 3 ? 1 : 2); // 0: Top, 1: Mid, 2: Bot
        for (let c = 0; c < A_COLS; c++) {
            row.push({ alive: true, type });
        }
        aliens.grid.push(row);
    }
}

function resetPlayer() {
    player.x = W / 2 - P_W / 2;
    player.dead = false;
    pBullet = null;
    keys.Space = false; // Require fresh press
}

function startGame() {
    score = 0;
    lives = 3;
    wave = 1;
    buildShields();
    startWave();
    state = STATE_PLAYING;
}

function startWave() {
    buildAliens();
    resetPlayer();
    aBullets = [];
    mysteryShip.active = false;
    mysteryShip.timer = 15;
}

// --- Collision Helpers ---
function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function checkShieldHit(bx, by, bw, bh) {
    for (let s of shields) {
        let sx = s.x;
        // Fast boundary check before checking cells
        if (rectIntersect(bx, by, bw, bh, sx, SHLD_Y, SHLD_COLS*SHLD_CELL, SHLD_ROWS*SHLD_CELL)) {
            // Check individual cells
            for (let r = 0; r < SHLD_ROWS; r++) {
                for (let c = 0; c < SHLD_COLS; c++) {
                    if (s.grid[r][c]) {
                        let cx = sx + c * SHLD_CELL;
                        let cy = SHLD_Y + r * SHLD_CELL;
                        if (rectIntersect(bx, by, bw, bh, cx, cy, SHLD_CELL, SHLD_CELL)) {
                            // Eat away hit cell and a few neighbors for 'chunking' effect
                            for(let dr=-1; dr<=1; dr++){
                                for(let dc=-1; dc<=1; dc++){
                                    if(r+dr>=0 && r+dr<SHLD_ROWS && c+dc>=0 && c+dc<SHLD_COLS){
                                        if (Math.random() < 0.7) s.grid[r+dr][c+dc] = false;
                                    }
                                }
                            }
                            return true;
                        }
                    }
                }
            }
        }
    }
    return false;
}

// --- Update Logic ---
function updateMain(dt) {
    animFrame += dt;

    // -- Player Movement --
    if (isLeft()) player.x -= P_SPEED * dt;
    if (isRight()) player.x += P_SPEED * dt;
    if (player.x < 10) player.x = 10;
    if (player.x + P_W > W - 10) player.x = W - 10 - P_W;

    // -- Player Fire --
    if (keys.Space && !pBullet && !player.dead) {
        pBullet = { x: player.x + P_W / 2 - BULLET_W / 2, y: player.y };
        audio.shoot();
        keys.Space = false;
    }

    // -- Player Bullet --
    if (pBullet) {
        pBullet.y -= P_BULLET_SPEED * dt;
        let bHit = false;

        // Off screen
        if (pBullet.y < 0) bHit = true;
        
        // Hit Mystery Ship
        if (!bHit && mysteryShip.active && rectIntersect(pBullet.x, pBullet.y, BULLET_W, BULLET_H, mysteryShip.x, MYS_Y, MYS_W, MYS_H)) {
            bHit = true;
            mysteryShip.active = false;
            let pts = [50, 100, 150, 300][Math.floor(Math.random() * 4)];
            score += pts;
            if (score > highScore) highScore = score;
            audio.alienKill();
        }

        // Hit Shield
        if (!bHit && checkShieldHit(pBullet.x, pBullet.y, BULLET_W, BULLET_H)) {
            bHit = true;
        }

        // Hit Alien Bullet
        if (!bHit) {
            for (let i = aBullets.length - 1; i >= 0; i--) {
                const ab = aBullets[i];
                if (rectIntersect(pBullet.x, pBullet.y, BULLET_W, BULLET_H, ab.x, ab.y, BULLET_W, BULLET_H)) {
                    bHit = true;
                    aBullets.splice(i, 1);
                    break;
                }
            }
        }

        // Hit Alien
        if (!bHit) {
            for (let r = A_ROWS - 1; r >= 0; r--) {
                for (let c = 0; c < A_COLS; c++) {
                    const al = aliens.grid[r][c];
                    if (!al.alive) continue;
                    
                    const ax = A_START_X + c * A_SPACING_X + aliens.offsetX;
                    const ay = A_START_Y + r * A_SPACING_Y + aliens.offsetY;
                    let aw = al.type === 0 ? 24 : (al.type === 1 ? 28 : 32);
                    let ah = al.type === 0 ? 16 : 20;

                    if (rectIntersect(pBullet.x, pBullet.y, BULLET_W, BULLET_H, ax - aw/2, ay - ah/2, aw, ah)) {
                        bHit = true;
                        al.alive = false;
                        aliens.aliveCount--;
                        
                        score += al.type === 0 ? 40 : (al.type === 1 ? 20 : 10);
                        if (score > highScore) highScore = score;
                        audio.alienKill();
                        
                        // Speed up formation
                        const ratio = aliens.aliveCount / (A_COLS * A_ROWS);
                        const baseInterval = Math.max(0.05, 0.8 - (wave * 0.05));
                        aliens.stepInterval = Math.max(0.02, baseInterval * ratio);
                        
                        break;
                    }
                }
                if (bHit) break;
            }
        }

        if (bHit) pBullet = null;
    }

    // -- Alien Movement (Stepped) --
    if (aliens.aliveCount === 0) {
        state = STATE_WAVECLEAR;
        stateTimer = 2.0;
        return; // Skip rest of update
    }

    aliens.stepTimer -= dt;
    if (aliens.stepTimer <= 0) {
        aliens.stepTimer = aliens.stepInterval;
        audio.step(aliens.stepIndex++);
        
        let moveX = 15 * aliens.dir;
        let hitEdge = false;

        // Check edges based on actual living aliens bounds
        let minX = W, maxX = 0;
        for (let r = 0; r < A_ROWS; r++) {
            for (let c = 0; c < A_COLS; c++) {
                if (aliens.grid[r][c].alive) {
                    const ax = A_START_X + c * A_SPACING_X + aliens.offsetX + moveX;
                    const aw = aliens.grid[r][c].type === 0 ? 24 : 32;
                    if (ax - aw/2 < minX) minX = ax - aw/2;
                    if (ax + aw/2 > maxX) maxX = ax + aw/2;
                }
            }
        }

        if (minX <= 20 || maxX >= W - 20) {
            aliens.dir *= -1;
            aliens.offsetY += 20;
            // Don't move horizontally on the drop step
        } else {
            aliens.offsetX += moveX;
        }

        // Defeat condition (reached shields/player)
        const lowestAliveY = A_START_Y + (A_ROWS - 1) * A_SPACING_Y + aliens.offsetY + 10;
        if (lowestAliveY >= P_START_Y - 20) {
            lives = 0; // Instant lose
            state = STATE_GAMEOVER;
            audio.playerDeath();
            if (score > highScore) localStorage.setItem('si_high', score);
        }
    }

    // -- Alien Fire --
    if (aBullets.length < 3 && Math.random() < (0.01 + wave * 0.005 + (1 - aliens.aliveCount/(A_COLS*A_ROWS)) * 0.02)) {
        // Find valid columns
        let validCols = [];
        for (let c = 0; c < A_COLS; c++) {
            for (let r = A_ROWS - 1; r >= 0; r--) {
                if (aliens.grid[r][c].alive) {
                    validCols.push({c, r});
                    break; // Only bottom-most in column
                }
            }
        }
        if (validCols.length > 0) {
            let choice = validCols[Math.floor(Math.random() * validCols.length)];
            let ax = A_START_X + choice.c * A_SPACING_X + aliens.offsetX;
            let ay = A_START_Y + choice.r * A_SPACING_Y + aliens.offsetY;
            aBullets.push({ x: ax - BULLET_W/2, y: ay + 10 });
        }
    }

    // -- Alien Bullets Move & Collide --
    for (let i = aBullets.length - 1; i >= 0; i--) {
        const ab = aBullets[i];
        ab.y += A_BULLET_SPEED * dt;
        let remove = false;

        if (ab.y > H) remove = true;
        
        if (!remove && checkShieldHit(ab.x, ab.y, BULLET_W, BULLET_H)) {
            remove = true;
        }

        if (!remove && !player.dead && rectIntersect(ab.x, ab.y, BULLET_W, BULLET_H, player.x, player.y, P_W, P_H)) {
            remove = true;
            playerDie();
        }

        if (remove) aBullets.splice(i, 1);
    }

    // -- Mystery Ship --
    if (!mysteryShip.active) {
        mysteryShip.timer -= dt;
        if (mysteryShip.timer <= 0) {
            mysteryShip.active = true;
            mysteryShip.dir = Math.random() < 0.5 ? 1 : -1;
            mysteryShip.x = mysteryShip.dir === 1 ? -MYS_W : W;
            // Set next appearance randomly 15-30s
            mysteryShip.timer = 15 + Math.random() * 15;
            audio.mysterySound(); // Optional lead-in sound
        }
    } else {
        mysteryShip.x += MYS_SPEED * mysteryShip.dir * dt;
        if ((mysteryShip.dir === 1 && mysteryShip.x > W) || (mysteryShip.dir === -1 && mysteryShip.x < -MYS_W)) {
            mysteryShip.active = false;
        } else if (Math.floor(animFrame * 10) % 5 === 0) {
            // Pulse sound
            audio.mysterySound();
        }
    }
}

function playerDie() {
    player.dead = true;
    lives--;
    aBullets = [];
    audio.playerDeath();
    if (lives <= 0) {
        state = STATE_GAMEOVER;
        if (score > highScore) localStorage.setItem('si_high', score);
    } else {
        state = STATE_RESPAWN;
        stateTimer = 1.5;
    }
}

function update(dt) {
    if (state === STATE_LEVELCLEAR) {
        // Handled in WAVE_CLEAR
    } else if (state === STATE_WAVECLEAR) {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            wave++;
            startWave(); // Rebuild aliens, keep shields
            state = STATE_PLAYING;
        }
    } else if (state === STATE_RESPAWN) {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            resetPlayer();
            state = STATE_PLAYING;
        }
    } else if (state === STATE_PLAYING) {
        updateMain(dt);
    }
}

// --- Render ---
function drawRectCenter(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x - w/2), Math.floor(y - h/2), w, h);
}

function drawText(text, x, y, size, align='center', color='#FFF') {
    ctx.fillStyle = color;
    ctx.font = `${size}px monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

function drawPlayer(x, y) {
    ctx.fillStyle = '#0F0';
    // Base
    ctx.fillRect(x, y + 8, P_W, 8);
    // Middle
    ctx.fillRect(x + 4, y + 4, P_W - 8, 4);
    // Gun
    ctx.fillRect(x + P_W/2 - 2, y, 4, 4);
}

function drawAliens() {
    const frame = Math.floor(animFrame * 2) % 2; // Simple toggle for animation

    for (let r = 0; r < A_ROWS; r++) {
        for (let c = 0; c < A_COLS; c++) {
            const al = aliens.grid[r][c];
            if (!al.alive) continue;
            
            const ax = A_START_X + c * A_SPACING_X + aliens.offsetX;
            const ay = A_START_Y + r * A_SPACING_Y + aliens.offsetY;
            
            ctx.save();
            ctx.translate(ax, ay);
            
            if (al.type === 0) {
                // Top: Red, small
                ctx.fillStyle = '#F00';
                drawRectCenter(0, 0, 24, 16, '#F00');
                if(frame===0) { ctx.clearRect(-12, -8, 4, 4); ctx.clearRect(8, -8, 4, 4); }
                else { ctx.clearRect(-12, 4, 4, 4); ctx.clearRect(8, 4, 4, 4); }
                // Eyes
                ctx.clearRect(-6, -4, 4, 4); ctx.clearRect(2, -4, 4, 4);
            } else if (al.type === 1) {
                // Mid: Yellow
                ctx.fillStyle = '#FC0';
                drawRectCenter(0, 0, 28, 20, '#FC0');
                if(frame===0) { ctx.clearRect(-14, 6, 6, 4); ctx.clearRect(8, 6, 6, 4); }
                else { ctx.clearRect(-8, 6, 16, 4); }
                ctx.clearRect(-8, -4, 4, 4); ctx.clearRect(4, -4, 4, 4); // Eyes
            } else {
                // Bot: Cyan, wide
                ctx.fillStyle = '#0CF';
                drawRectCenter(0, 0, 32, 20, '#0CF');
                if(frame===0) { ctx.clearRect(-16, -10, 4, 8); ctx.clearRect(12, -10, 4, 8); }
                else { ctx.clearRect(-16, 6, 4, 4); ctx.clearRect(12, 6, 4, 4); }
                ctx.clearRect(-10, -6, 6, 4); ctx.clearRect(4, -6, 6, 4); // Eyes
            }
            ctx.restore();
        }
    }
}

function drawShields() {
    ctx.fillStyle = '#0F0';
    for (let s of shields) {
        for (let r = 0; r < SHLD_ROWS; r++) {
            for (let c = 0; c < SHLD_COLS; c++) {
                if (s.grid[r][c]) {
                    ctx.fillRect(s.x + c * SHLD_CELL, SHLD_Y + r * SHLD_CELL, SHLD_CELL, SHLD_CELL);
                }
            }
        }
    }
}

function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (state === STATE_TITLE) {
        drawText("SPACE INVADERS", W/2, H/2 - 80, 64, 'center', '#FFF');
        drawText("Arrows/A/D to move. Space to Fire.", W/2, H/2 + 20, 20, 'center', '#0F0');
        drawText("Destroy all aliens before they land.", W/2, H/2 + 50, 20);
        
        let p = (Math.sin(performance.now() / 300) + 1) / 2;
        ctx.globalAlpha = 0.5 + p * 0.5;
        drawText("Press Enter to Start", W/2, H/2 + 120, 24);
        ctx.globalAlpha = 1.0;
        return;
    }

    // --- Draw Playfield ---
    
    // HUD
    drawText(`SCORE\n${score}`, 80, 30, 20, 'center', '#FFF');
    drawText(`HI-SCORE\n${highScore}`, W - 80, 30, 20, 'center', '#FFF');
    drawText(`WAVE\n${wave}`, W/2, 30, 20, 'center', '#FFF');
    
    // Lives (Draw ships)
    ctx.fillStyle = '#0F0';
    drawText(`LIVES`, 40, H - 20, 20, 'left');
    for (let i = 0; i < lives; i++) {
        drawPlayer(110 + i * 50, H - 28);
    }

    drawShields();
    drawAliens();

    if (!player.dead) drawPlayer(player.x, player.y);
    else if (state === STATE_RESPAWN) {
        // Death explosion simple
        ctx.fillStyle = '#0F0';
        for(let i=0; i<10; i++) {
            ctx.fillRect(player.x + Math.random()*P_W, player.y + Math.random()*P_H, 4, 4);
        }
    }

    if (pBullet) {
        ctx.fillStyle = '#FFF';
        ctx.fillRect(pBullet.x, pBullet.y, BULLET_W, BULLET_H);
    }

    ctx.fillStyle = '#F44';
    for (let ab of aBullets) {
        ctx.fillRect(ab.x, ab.y, BULLET_W, BULLET_H);
    }

    if (mysteryShip.active) {
        ctx.fillStyle = '#F00';
        drawRectCenter(mysteryShip.x + MYS_W/2, MYS_Y + MYS_H/2, MYS_W, MYS_H, '#F00');
        ctx.fillStyle = '#FFF';
        for(let i=0; i<3; i++) ctx.fillRect(mysteryShip.x + 10 + i*12, MYS_Y + 6, 4, 4);
    }

    // --- Overlays ---
    if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        drawText("PAUSED", W/2, H/2, 48);
    } else if (state === STATE_WAVECLEAR) {
        drawText(`WAVE ${wave} CLEARED`, W/2, H/2, 48, 'center', '#0F0');
    } else if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, W, H);
        drawText("GAME OVER", W/2, H/2 - 40, 64, 'center', '#F00');
        drawText(`Final Score: ${score}`, W/2, H/2 + 20, 24);
        drawText("Press Enter to Restart", W/2, H/2 + 80, 20, 'center', '#FFF');
    }
}

// --- Main Loop ---
function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    
    if (dt > 0.1) dt = 0.1; // clamp
    
    update(dt);
    render();
    
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
