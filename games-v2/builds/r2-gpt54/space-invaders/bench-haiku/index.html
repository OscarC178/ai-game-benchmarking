<!--
  GAME:      Space Invaders
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Courier New", monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="invadersCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('invadersCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;

    const STATES = {
      TITLE: 'title',
      PLAYING: 'playing',
      PAUSED: 'paused',
      WAVE_CLEAR: 'wave_clear',
      GAME_OVER: 'game_over'
    };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('space_invaders_best') || '0');
    let lives = 3;
    let wave = 1;
    let keys = {};
    let audioCtx = null;

    // Player
    let player = {
      x: 380,
      y: 550,
      width: 40,
      height: 32,
      vx: 0
    };

    let playerBullet = null;

    // Aliens
    let aliens = [];
    let formationOffsetX = 0;
    let formationOffsetY = 0;
    let formationDir = 1;
    let formationSpeed = 30;

    function createAliens() {
      aliens = [];
      const cols = 11;
      const rows = 5;
      const spacing = 50;
      const types = [
        { row: 0, width: 24, height: 16, color: '#FF0000', points: 40 },
        { row: 1, width: 28, height: 20, color: '#FFCC00', points: 20 },
        { row: 2, width: 28, height: 20, color: '#FFCC00', points: 20 },
        { row: 3, width: 32, height: 20, color: '#00CCFF', points: 10 },
        { row: 4, width: 32, height: 20, color: '#00CCFF', points: 10 }
      ];

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const type = types[row];
          aliens.push({
            col: col,
            row: row,
            alive: true,
            x: 120 + col * spacing,
            y: 80 + row * 40,
            width: type.width,
            height: type.height,
            color: type.color,
            points: type.points,
            animFrame: 0
          });
        }
      }
    }

    let alienBullets = [];
    let lastAlienFireTime = 0;
    let alienFireRate = 1;

    // Shields
    let shields = [];
    function createShields() {
      shields = [];
      const positions = [140, 300, 460, 620];
      for (let px of positions) {
        let cells = [];
        for (let y = 0; y < 4; y++) {
          for (let x = 0; x < 4; x++) {
            if ((y === 3 && (x === 1 || x === 2)) || (y === 2 && x === 0) || (y === 2 && x === 3)) {
              continue;
            }
            cells.push({ x: px + x * 4, y: 480 + y * 4, size: 4, alive: true });
          }
        }
        shields.push(cells);
      }
    }

    // Mystery ship
    let mysteryShip = null;
    let mysteryShipTimer = 0;

    // Functions
    function firePlayerBullet() {
      if (playerBullet || gameState !== STATES.PLAYING) return;
      playerBullet = {
        x: player.x + player.width / 2 - 1.5,
        y: player.y - 12,
        width: 3,
        height: 12,
        vy: -500
      };
      playSound(800, 0.05);
    }

    function fireAlienBullet() {
      if (alienBullets.length >= 3) return;
      let aliveCols = new Set();
      for (let a of aliens) {
        if (a.alive) aliveCols.add(a.col);
      }
      if (aliveCols.size === 0) return;

      const col = Array.from(aliveCols)[Math.floor(Math.random() * aliveCols.size)];
      let bottomAlien = null;
      for (let a of aliens) {
        if (a.alive && a.col === col) {
          if (!bottomAlien || a.row > bottomAlien.row) bottomAlien = a;
        }
      }
      if (bottomAlien) {
        alienBullets.push({
          x: formationOffsetX + bottomAlien.x + bottomAlien.width / 2 - 1.5,
          y: formationOffsetY + bottomAlien.y + bottomAlien.height,
          width: 3,
          height: 12,
          vy: 250
        });
      }
    }

    function spawnMysteryShip() {
      if (Math.random() < 0.02) {
        mysteryShip = {
          x: Math.random() < 0.5 ? -48 : WIDTH,
          y: 40,
          width: 48,
          height: 16,
          vx: Math.random() < 0.5 ? 150 : -150
        };
      }
    }

    // Input
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) {
          score = 0;
          lives = 3;
          wave = 1;
          formationSpeed = 30;
          createAliens();
          createShields();
          gameState = STATES.PLAYING;
        }
      }

      if (e.key.toLowerCase() === 'p') {
        e.preventDefault();
        if (gameState === STATES.PLAYING) gameState = STATES.PAUSED;
        else if (gameState === STATES.PAUSED) gameState = STATES.PLAYING;
      }

      if (e.code === 'Space') {
        e.preventDefault();
        firePlayerBullet();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function update(dt) {
      if (gameState === STATES.TITLE || gameState === STATES.PAUSED || gameState === STATES.GAME_OVER) return;

      // Update player
      player.vx = 0;
      if (keys['arrowleft'] || keys['a']) player.vx = -300;
      if (keys['arrowright'] || keys['d']) player.vx = 300;
      player.x += player.vx * dt;
      player.x = Math.max(0, Math.min(WIDTH - player.width, player.x));

      // Update player bullet
      if (playerBullet) {
        playerBullet.y += playerBullet.vy * dt;
        if (playerBullet.y < -playerBullet.height) playerBullet = null;
      }

      // Update formation
      formationOffsetX += formationDir * formationSpeed * dt;
      let maxRight = 0, minLeft = WIDTH;
      for (let a of aliens) {
        if (a.alive) {
          let x = formationOffsetX + a.x;
          minLeft = Math.min(minLeft, x);
          maxRight = Math.max(maxRight, x + a.width);
        }
      }

      if ((formationDir > 0 && maxRight > WIDTH - 20) || (formationDir < 0 && minLeft < 20)) {
        formationDir *= -1;
        formationOffsetY += 20;
      }

      // Alien fire
      lastAlienFireTime += dt;
      if (lastAlienFireTime > 1 / alienFireRate) {
        fireAlienBullet();
        lastAlienFireTime = 0;
      }

      // Update alien bullets
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        alienBullets[i].y += alienBullets[i].vy * dt;
        if (alienBullets[i].y > HEIGHT) alienBullets.splice(i, 1);
      }

      // Update mystery ship
      spawnMysteryShip();
      if (mysteryShip) {
        mysteryShip.x += mysteryShip.vx * dt;
        if (mysteryShip.x > WIDTH || mysteryShip.x < -mysteryShip.width) mysteryShip = null;
      }

      // Collisions: player bullet vs aliens
      if (playerBullet) {
        for (let a of aliens) {
          if (!a.alive) continue;
          let ax = formationOffsetX + a.x;
          let ay = formationOffsetY + a.y;
          if (playerBullet.x < ax + a.width && playerBullet.x + playerBullet.width > ax &&
              playerBullet.y < ay + a.height && playerBullet.y + playerBullet.height > ay) {
            a.alive = false;
            score += a.points;
            playerBullet = null;
            playSound(600, 0.08);
            break;
          }
        }
      }

      // Collisions: player bullet vs mystery ship
      if (playerBullet && mysteryShip) {
        if (playerBullet.x < mysteryShip.x + mysteryShip.width && playerBullet.x + playerBullet.width > mysteryShip.x &&
            playerBullet.y < mysteryShip.y + mysteryShip.height && playerBullet.y + playerBullet.height > mysteryShip.y) {
          score += 100;
          mysteryShip = null;
          playerBullet = null;
          playSound(1000, 0.1);
        }
      }

      // Collisions: alien bullets vs shields
      for (let ab of alienBullets) {
        for (let shield of shields) {
          for (let cell of shield) {
            if (cell.alive && ab.x < cell.x + cell.size && ab.x + ab.width > cell.x &&
                ab.y < cell.y + cell.size && ab.y + ab.height > cell.y) {
              cell.alive = false;
              ab.vy = 0;
            }
          }
        }
      }

      // Collisions: alien bullets vs player
      for (let ab of alienBullets) {
        if (ab.x < player.x + player.width && ab.x + ab.width > player.x &&
            ab.y < player.y + player.height && ab.y + ab.height > player.y) {
          lives--;
          alienBullets = [];
          if (lives <= 0) gameState = STATES.GAME_OVER;
          playSound(200, 0.2);
          break;
        }
      }

      // Collisions: player bullet vs shields
      if (playerBullet) {
        for (let shield of shields) {
          for (let cell of shield) {
            if (cell.alive && playerBullet.x < cell.x + cell.size && playerBullet.x + playerBullet.width > cell.x &&
                playerBullet.y < cell.y + cell.size && playerBullet.y + playerBullet.height > cell.y) {
              cell.alive = false;
              playerBullet = null;
              break;
            }
          }
        }
      }

      // Check alien descent
      let maxY = 0;
      for (let a of aliens) {
        if (a.alive) maxY = Math.max(maxY, formationOffsetY + a.y);
      }
      if (maxY > 500) gameState = STATES.GAME_OVER;

      // Check wave clear
      if (aliens.every(a => !a.alive)) {
        wave++;
        formationSpeed = Math.min(30 + (wave - 1) * 5, 80);
        alienFireRate = Math.min(1 + (wave - 1) * 0.2, 3);
        formationOffsetX = 0;
        formationOffsetY = 0;
        formationDir = 1;
        alienBullets = [];
        createAliens();
        createShields();
      }

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('space_invaders_best', highScore);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', WIDTH / 2, 100);
        ctx.font = '16px "Courier New"';
        ctx.fillStyle = '#AAA';
        ctx.fillText('Move: Arrow Keys or A/D', WIDTH / 2, 200);
        ctx.fillText('Fire: Space', WIDTH / 2, 230);
        ctx.fillText('Destroy all aliens before they descend', WIDTH / 2, 260);
        ctx.fillStyle = '#FF0';
        ctx.font = 'bold 24px "Courier New"';
        ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
      } else {
        // HUD
        ctx.fillStyle = '#FFF';
        ctx.font = '14px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 10, 20);
        ctx.textAlign = 'center';
        ctx.fillText('Wave: ' + wave + ' Lives: ' + lives, WIDTH / 2, 20);
        ctx.textAlign = 'right';
        ctx.fillText('Best: ' + highScore, WIDTH - 10, 20);

        // Player
        ctx.fillStyle = '#0F0';
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Player bullet
        if (playerBullet) {
          ctx.fillStyle = '#FFF';
          ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.width, playerBullet.height);
        }

        // Aliens
        for (let a of aliens) {
          if (!a.alive) continue;
          ctx.fillStyle = a.color;
          let x = formationOffsetX + a.x;
          let y = formationOffsetY + a.y;
          ctx.fillRect(x, y, a.width, a.height);
        }

        // Alien bullets
        ctx.fillStyle = '#F44';
        for (let ab of alienBullets) {
          ctx.fillRect(ab.x, ab.y, ab.width, ab.height);
        }

        // Mystery ship
        if (mysteryShip) {
          ctx.fillStyle = '#F00';
          ctx.fillRect(mysteryShip.x, mysteryShip.y, mysteryShip.width, mysteryShip.height);
        }

        // Shields
        ctx.fillStyle = '#0F0';
        for (let shield of shields) {
          for (let cell of shield) {
            if (cell.alive) ctx.fillRect(cell.x, cell.y, cell.size, cell.size);
          }
        }

        if (gameState === STATES.PAUSED) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
        } else if (gameState === STATES.GAME_OVER) {
          ctx.fillStyle = 'rgba(0,0,0,0.8)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.fillStyle = '#F00';
          ctx.font = 'bold 48px "Courier New"';
          ctx.textAlign = 'center';
          ctx.fillText('GAME OVER', WIDTH / 2, 200);
          ctx.fillStyle = '#FFF';
          ctx.font = '32px "Courier New"';
          ctx.fillText('Score: ' + score, WIDTH / 2, 280);
          ctx.font = 'bold 24px "Courier New"';
          ctx.fillStyle = '#FF0';
          ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
        }
      }
    }

    function playSound(freq, dur) {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          return;
        }
      }
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      } catch (e) {}
    }

    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.016);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    createAliens();
    createShields();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
