<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 'TITLE';
    const STATE_PLAYING = 'PLAYING';
    const STATE_PAUSED = 'PAUSED';
    const STATE_GAMEOVER = 'GAMEOVER';
    const STATE_WAVE_CLEAR = 'WAVE_CLEAR';
    
    // Player
    const PLAYER_W = 40;
    const PLAYER_H = 32;
    const PLAYER_SPEED = 300;
    const PLAYER_START_X = 380;
    const PLAYER_START_Y = 550;
    
    // Player bullet
    const P_BULLET_W = 3;
    const P_BULLET_H = 12;
    const P_BULLET_SPEED = 500;
    
    // Alien formation
    const ALIEN_COLS = 11;
    const ALIEN_ROWS = 5;
    const ALIEN_SPACING_X = 50;
    const ALIEN_SPACING_Y = 40;
    const ALIEN_START_X = 120;
    const ALIEN_START_Y = 80;
    const ALIEN_DROP = 20;
    
    // Alien types (row 0 = top)
    const ALIEN_TYPES = [
      { w: 24, h: 16, color: '#FF0000', points: 40 },  // top row
      { w: 28, h: 20, color: '#FFCC00', points: 20 },  // row 1
      { w: 28, h: 20, color: '#FFCC00', points: 20 },  // row 2
      { w: 32, h: 20, color: '#00CCFF', points: 10 },  // row 3
      { w: 32, h: 20, color: '#00CCFF', points: 10 }   // row 4
    ];
    
    // Alien bullets
    const A_BULLET_W = 3;
    const A_BULLET_H = 12;
    const A_BULLET_SPEED = 250;
    const MAX_ALIEN_BULLETS = 3;
    
    // Mystery ship
    const MYSTERY_W = 48;
    const MYSTERY_H = 16;
    const MYSTERY_SPEED = 120;
    const MYSTERY_POINTS = [50, 100, 150, 300];
    
    // Shields
    const SHIELD_COUNT = 4;
    const SHIELD_W = 80;
    const SHIELD_H = 64;
    const SHIELD_CELL = 4;
    const SHIELD_START_Y = 480;
    const SHIELD_POSITIONS = [140, 300, 460, 620];
    
    // Formation boundaries
    const FORMATION_LEFT = 40;
    const FORMATION_RIGHT = W - 40;
    const DEFEAT_LINE = PLAYER_START_Y - 40;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('spaceinvaders_highscore') || '0');
    let lives = 3;
    let wave = 1;
    
    // Player
    let player = {
      x: PLAYER_START_X,
      y: PLAYER_START_Y,
      w: PLAYER_W,
      h: PLAYER_H,
      alive: true,
      respawnTimer: 0
    };
    
    // Player bullet
    let playerBullet = null;
    
    // Alien formation
    let aliens = [];
    let formationOffsetX = 0;
    let formationOffsetY = 0;
    let formationDir = 1;
    let formationSpeed = 30;
    let alienFireTimer = 0;
    let alienFireInterval = 1500;
    
    // Alien bullets
    let alienBullets = [];
    
    // Mystery ship
    let mysteryShip = null;
    let mysteryTimer = 0;
    let mysteryInterval = 15000;
    
    // Shields
    let shields = [];
    
    // Animation
    let animFrame = 0;
    let animTimer = 0;
    
    // Input
    const keys = {};
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.10) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playShoot() { playTone(800, 0.05, 'square', 0.08); }
    function playHit() { playTone(200, 0.1, 'square', 0.12); }
    function playDeath() { playTone(100, 0.3, 'sawtooth', 0.15); }
    function playMystery() { playTone(600, 0.1, 'sine', 0.12); }
    function playMarch() { playTone(80, 0.05, 'square', 0.05); }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      initAudio();
      
      if (state === STATE_TITLE && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_GAMEOVER && (e.code === 'Enter' || e.code === 'Space')) {
        startGame();
      } else if (state === STATE_PLAYING && e.code === 'KeyP') {
        state = STATE_PAUSED;
      } else if (state === STATE_PAUSED && e.code === 'KeyP') {
        state = STATE_PLAYING;
      } else if (state === STATE_WAVE_CLEAR && (e.code === 'Enter' || e.code === 'Space')) {
        nextWave();
      }
      
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // ==================== GAME LOGIC ====================
    function startGame() {
      score = 0;
      lives = 3;
      wave = 1;
      formationSpeed = 30;
      alienFireInterval = 1500;
      startWave();
      state = STATE_PLAYING;
    }
    
    function startWave() {
      player.x = PLAYER_START_X;
      player.y = PLAYER_START_Y;
      player.alive = true;
      player.respawnTimer = 0;
      playerBullet = null;
      alienBullets = [];
      mysteryShip = null;
      
      createAliens();
      createShields();
      
      formationOffsetX = 0;
      formationOffsetY = 0;
      formationDir = 1;
    }
    
    function nextWave() {
      wave++;
      formationSpeed = Math.min(30 + wave * 10, 80);
      alienFireInterval = Math.max(1500 - wave * 100, 600);
      startWave();
      state = STATE_PLAYING;
    }
    
    function createAliens() {
      aliens = [];
      
      for (let row = 0; row < ALIEN_ROWS; row++) {
        for (let col = 0; col < ALIEN_COLS; col++) {
          const type = ALIEN_TYPES[row];
          aliens.push({
            row: row,
            col: col,
            baseX: ALIEN_START_X + col * ALIEN_SPACING_X,
            baseY: ALIEN_START_Y + row * ALIEN_SPACING_Y,
            w: type.w,
            h: type.h,
            color: type.color,
            points: type.points,
            alive: true
          });
        }
      }
    }
    
    function createShields() {
      shields = [];
      
      for (let i = 0; i < SHIELD_COUNT; i++) {
        const shield = {
          x: SHIELD_POSITIONS[i],
          y: SHIELD_START_Y,
          cells: []
        };
        
        // Create cell grid
        const cols = Math.floor(SHIELD_W / SHIELD_CELL);
        const rows = Math.floor(SHIELD_H / SHIELD_CELL);
        
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            // Create arch cutout at bottom center
            const centerX = cols / 2;
            const archWidth = 6;
            const archStart = centerX - archWidth / 2;
            const archEnd = centerX + archWidth / 2;
            const archHeight = 5;
            
            const inArch = r >= rows - archHeight && 
                          c >= archStart && c < archEnd;
            
            // Top rounded corners
            const topRound = r < 2 && (c < 2 || c >= cols - 2);
            
            if (!inArch && !topRound) {
              shield.cells.push({
                x: c * SHIELD_CELL,
                y: r * SHIELD_CELL,
                alive: true
              });
            }
          }
        }
        
        shields.push(shield);
      }
    }
    
    function getAlienPosition(alien) {
      return {
        x: alien.baseX + formationOffsetX - alien.w / 2,
        y: alien.baseY + formationOffsetY - alien.h / 2
      };
    }
    
    function getAliveAlienCount() {
      return aliens.filter(a => a.alive).length;
    }
    
    function getLeftmostAlien() {
      let min = W;
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const pos = getAlienPosition(alien);
        if (pos.x < min) min = pos.x;
      }
      return min;
    }
    
    function getRightmostAlien() {
      let max = 0;
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const pos = getAlienPosition(alien);
        if (pos.x + alien.w > max) max = pos.x + alien.w;
      }
      return max;
    }
    
    function getBottomAlien(col) {
      let bottom = null;
      for (const alien of aliens) {
        if (!alien.alive || alien.col !== col) continue;
        if (!bottom || alien.row > bottom.row) bottom = alien;
      }
      return bottom;
    }
    
    function updatePlayer(dt) {
      if (!player.alive) {
        player.respawnTimer -= dt * 1000;
        if (player.respawnTimer <= 0) {
          player.alive = true;
          player.x = PLAYER_START_X;
        }
        return;
      }
      
      if (keys['ArrowLeft'] || keys['KeyA']) {
        player.x -= PLAYER_SPEED * dt;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.x += PLAYER_SPEED * dt;
      }
      
      player.x = Math.max(0, Math.min(W - player.w, player.x));
    }
    
    function firePlayerBullet() {
      if (playerBullet || !player.alive) return;
      
      playerBullet = {
        x: player.x + player.w / 2 - P_BULLET_W / 2,
        y: player.y - P_BULLET_H,
        w: P_BULLET_W,
        h: P_BULLET_H
      };
      
      playShoot();
    }
    
    function updatePlayerBullet(dt) {
      if (!playerBullet) return;
      
      playerBullet.y -= P_BULLET_SPEED * dt;
      
      if (playerBullet.y < 0) {
        playerBullet = null;
        return;
      }
      
      // Check alien collision
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const pos = getAlienPosition(alien);
        
        if (rectCollision(playerBullet, { x: pos.x, y: pos.y, w: alien.w, h: alien.h })) {
          alien.alive = false;
          playerBullet = null;
          score += alien.points;
          playHit();
          
          // Speed up formation
          const remaining = getAliveAlienCount();
          formationSpeed = 30 + (55 - remaining) * 1.5;
          
          return;
        }
      }
      
      // Check mystery ship
      if (mysteryShip && rectCollision(playerBullet, mysteryShip)) {
        const bonus = MYSTERY_POINTS[Math.floor(Math.random() * MYSTERY_POINTS.length)];
        score += bonus;
        mysteryShip.bonus = bonus;
        mysteryShip.dying = true;
        playerBullet = null;
        playMystery();
        return;
      }
      
      // Check shield collision
      for (const shield of shields) {
        if (checkShieldHit(shield, playerBullet)) {
          playerBullet = null;
          return;
        }
      }
      
      // Check alien bullet collision
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        if (rectCollision(playerBullet, alienBullets[i])) {
          alienBullets.splice(i, 1);
          playerBullet = null;
          return;
        }
      }
    }
    
    function updateFormation(dt) {
      // Move formation
      formationOffsetX += formationDir * formationSpeed * dt;
      
      // Check boundaries
      const left = getLeftmostAlien();
      const right = getRightmostAlien();
      
      if (formationDir > 0 && right >= FORMATION_RIGHT) {
        formationDir = -1;
        formationOffsetY += ALIEN_DROP;
        playMarch();
      } else if (formationDir < 0 && left <= FORMATION_LEFT) {
        formationDir = 1;
        formationOffsetY += ALIEN_DROP;
        playMarch();
      }
      
      // Check defeat
      for (const alien of aliens) {
        if (!alien.alive) continue;
        const pos = getAlienPosition(alien);
        if (pos.y + alien.h >= DEFEAT_LINE) {
          state = STATE_GAMEOVER;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('spaceinvaders_highscore', highScore);
          }
          return;
        }
      }
      
      // Animation
      animTimer += dt * 1000;
      if (animTimer >= 500) {
        animTimer = 0;
        animFrame = 1 - animFrame;
      }
    }
    
    function updateAlienFire(dt) {
      alienFireTimer -= dt * 1000;
      
      if (alienFireTimer <= 0 && alienBullets.length < MAX_ALIEN_BULLETS) {
        // Get columns with alive aliens
        const validCols = [];
        for (let col = 0; col < ALIEN_COLS; col++) {
          if (getBottomAlien(col)) validCols.push(col);
        }
        
        if (validCols.length > 0) {
          const col = validCols[Math.floor(Math.random() * validCols.length)];
          const alien = getBottomAlien(col);
          
          if (alien) {
            const pos = getAlienPosition(alien);
            alienBullets.push({
              x: pos.x + alien.w / 2 - A_BULLET_W / 2,
              y: pos.y + alien.h,
              w: A_BULLET_W,
              h: A_BULLET_H
            });
          }
        }
        
        alienFireTimer = alienFireInterval + Math.random() * 500;
      }
    }
    
    function updateAlienBullets(dt) {
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const bullet = alienBullets[i];
        bullet.y += A_BULLET_SPEED * dt;
        
        if (bullet.y > H) {
          alienBullets.splice(i, 1);
          continue;
        }
        
        // Check player collision
        if (player.alive && rectCollision(bullet, player)) {
          alienBullets.splice(i, 1);
          lives--;
          player.alive = false;
          player.respawnTimer = 1500;
          playDeath();
          
          if (lives <= 0) {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('spaceinvaders_highscore', highScore);
            }
          }
          continue;
        }
        
        // Check shield collision
        for (const shield of shields) {
          if (checkShieldHit(shield, bullet)) {
            alienBullets.splice(i, 1);
            break;
          }
        }
      }
    }
    
    function checkShieldHit(shield, bullet) {
      for (const cell of shield.cells) {
        if (!cell.alive) continue;
        
        const cellRect = {
          x: shield.x + cell.x,
          y: shield.y + cell.y,
          w: SHIELD_CELL,
          h: SHIELD_CELL
        };
        
        if (rectCollision(bullet, cellRect)) {
          cell.alive = false;
          return true;
        }
      }
      return false;
    }
    
    function updateMysteryShip(dt) {
      mysteryTimer += dt * 1000;
      
      if (!mysteryShip && mysteryTimer >= mysteryInterval) {
        const dir = Math.random() < 0.5 ? 1 : -1;
        mysteryShip = {
          x: dir > 0 ? -MYSTERY_W : W,
          y: 30,
          w: MYSTERY_W,
          h: MYSTERY_H,
          dir: dir,
          dying: false,
          bonus: 0
        };
        mysteryTimer = 0;
      }
      
      if (mysteryShip && !mysteryShip.dying) {
        mysteryShip.x += mysteryShip.dir * MYSTERY_SPEED * dt;
        
        if ((mysteryShip.dir > 0 && mysteryShip.x > W) ||
            (mysteryShip.dir < 0 && mysteryShip.x < -MYSTERY_W)) {
          mysteryShip = null;
        }
      } else if (mysteryShip && mysteryShip.dying) {
        mysteryShip.dying = false;
        mysteryShip = null;
      }
    }
    
    function checkWaveClear() {
      if (getAliveAlienCount() === 0) {
        state = STATE_WAVE_CLEAR;
      }
    }
    
    function rectCollision(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }
    
    function update(dt) {
      if (state === STATE_PLAYING) {
        if (keys['Space']) {
          firePlayerBullet();
          keys['Space'] = false;
        }
        
        updatePlayer(dt);
        updatePlayerBullet(dt);
        updateFormation(dt);
        updateAlienFire(dt);
        updateAlienBullets(dt);
        updateMysteryShip(dt);
        checkWaveClear();
      }
    }
    
    // ==================== RENDERING ====================
    function drawPlayer() {
      if (!player.alive && Math.floor(Date.now() / 100) % 2 === 0) return;
      
      ctx.fillStyle = '#00FF00';
      
      // Ship body
      ctx.fillRect(player.x + 4, player.y + 16, 32, 16);
      ctx.fillRect(player.x + 8, player.y + 8, 24, 8);
      ctx.fillRect(player.x + 18, player.y, 4, 8);
    }
    
    function drawPlayerBullet() {
      if (!playerBullet) return;
      ctx.fillStyle = '#FFF';
      ctx.fillRect(playerBullet.x, playerBullet.y, P_BULLET_W, P_BULLET_H);
    }
    
    function drawAliens() {
      for (const alien of aliens) {
        if (!alien.alive) continue;
        
        const pos = getAlienPosition(alien);
        ctx.fillStyle = alien.color;
        
        // Draw simple alien shape based on row type
        if (alien.row === 0) {
          // Top row - small
          ctx.fillRect(pos.x + 4, pos.y, 16, 4);
          ctx.fillRect(pos.x + 2, pos.y + 4, 20, 8);
          ctx.fillRect(pos.x + 4, pos.y + 12, 4, 4);
          ctx.fillRect(pos.x + 16, pos.y + 12, 4, 4);
        } else if (alien.row === 1 || alien.row === 2) {
          // Middle rows - medium
          ctx.fillRect(pos.x + 4, pos.y, 20, 4);
          ctx.fillRect(pos.x, pos.y + 4, 28, 8);
          ctx.fillRect(pos.x + 4, pos.y + 12, 8, 4);
          ctx.fillRect(pos.x + 16, pos.y + 12, 8, 4);
          if (animFrame === 0) {
            ctx.fillRect(pos.x, pos.y + 12, 4, 4);
            ctx.fillRect(pos.x + 24, pos.y + 12, 4, 4);
          } else {
            ctx.fillRect(pos.x + 4, pos.y + 16, 4, 4);
            ctx.fillRect(pos.x + 20, pos.y + 16, 4, 4);
          }
        } else {
          // Bottom rows - wide
          ctx.fillRect(pos.x + 8, pos.y, 16, 4);
          ctx.fillRect(pos.x, pos.y + 4, 32, 8);
          ctx.fillRect(pos.x + 4, pos.y + 12, 8, 4);
          ctx.fillRect(pos.x + 20, pos.y + 12, 8, 4);
          if (animFrame === 0) {
            ctx.fillRect(pos.x, pos.y + 12, 4, 4);
            ctx.fillRect(pos.x + 28, pos.y + 12, 4, 4);
          } else {
            ctx.fillRect(pos.x + 8, pos.y + 16, 4, 4);
            ctx.fillRect(pos.x + 20, pos.y + 16, 4, 4);
          }
        }
      }
    }
    
    function drawAlienBullets() {
      ctx.fillStyle = '#FF4444';
      for (const bullet of alienBullets) {
        ctx.fillRect(bullet.x, bullet.y, A_BULLET_W, A_BULLET_H);
      }
    }
    
    function drawMysteryShip() {
      if (!mysteryShip) return;
      
      if (mysteryShip.dying) {
        ctx.fillStyle = '#FFF';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('+' + mysteryShip.bonus, mysteryShip.x + MYSTERY_W / 2, mysteryShip.y);
      } else {
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(mysteryShip.x + 8, mysteryShip.y, 32, 8);
        ctx.fillRect(mysteryShip.x + 16, mysteryShip.y + 8, 16, 8);
      }
    }
    
    function drawShields() {
      ctx.fillStyle = '#00AA00';
      for (const shield of shields) {
        for (const cell of shield.cells) {
          if (!cell.alive) continue;
          ctx.fillRect(shield.x + cell.x, shield.y + cell.y, SHIELD_CELL, SHIELD_CELL);
        }
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 20);
      
      ctx.textAlign = 'right';
      ctx.fillText(`High: ${highScore}`, W - 10, 20);
      
      ctx.textAlign = 'center';
      ctx.fillText(`Wave: ${wave}`, W / 2, 20);
      
      // Lives
      ctx.textAlign = 'left';
      ctx.fillStyle = '#00FF00';
      for (let i = 0; i < lives; i++) {
        ctx.fillRect(10 + i * 24, H - 25, 16, 12);
        ctx.fillRect(14 + i * 24, H - 30, 8, 5);
      }
    }
    
    function drawOverlay(title, subtitle, color = '#FFF') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = color;
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(title, W / 2, H / 2 - 40);
      
      ctx.fillStyle = '#CCC';
      ctx.font = '18px monospace';
      ctx.fillText(subtitle, W / 2, H / 2 + 10);
    }
    
    function drawTitle() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);
      
      // Draw some demo aliens
      createAliens();
      formationOffsetX = 0;
      formationOffsetY = 0;
      drawAliens();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE INVADERS', W / 2, H / 2 - 120);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.fillText('Move left/right and destroy all aliens', W / 2, H / 2 - 50);
      ctx.fillText('Use shields for cover', W / 2, H / 2 - 25);
      ctx.fillText('Don\'t let them reach the bottom', W / 2, H / 2);
      
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys or A/D to move', W / 2, H / 2 + 50);
      ctx.fillText('Space to fire', W / 2, H / 2 + 75);
      ctx.fillText('P to pause', W / 2, H / 2 + 100);
      
      ctx.fillStyle = '#888';
      ctx.font = '16px monospace';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 150);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#00FF00';
        ctx.font = '20px monospace';
        ctx.fillText('Press Enter to Start', W / 2, H / 2 + 200);
      }
    }
    
    function drawPaused() {
      drawOverlay('PAUSED', 'Press P to Resume', '#FFC107');
    }
    
    function drawGameOver() {
      drawOverlay('GAME OVER', `Final Score: ${score}`, '#FF0000');
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', W / 2, H / 2 + 80);
      }
    }
    
    function drawWaveClear() {
      drawOverlay('WAVE CLEAR!', `Score: ${score}`, '#00FF00');
      
      ctx.fillStyle = '#FFF';
      ctx.font = '20px monospace';
      ctx.fillText(`Next Wave: ${wave + 1}`, W / 2, H / 2 + 50);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Continue', W / 2, H / 2 + 100);
      }
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitle();
      } else if (state === STATE_PLAYING) {
        drawShields();
        drawAliens();
        drawMysteryShip();
        drawPlayer();
        drawPlayerBullet();
        drawAlienBullets();
        drawHUD();
      } else if (state === STATE_PAUSED) {
        drawShields();
        drawAliens();
        drawMysteryShip();
        drawPlayer();
        drawPlayerBullet();
        drawAlienBullets();
        drawHUD();
        drawPaused();
      } else if (state === STATE_GAMEOVER) {
        drawShields();
        drawAliens();
        drawPlayer();
        drawHUD();
        drawGameOver();
      } else if (state === STATE_WAVE_CLEAR) {
        drawShields();
        drawPlayer();
        drawHUD();
        drawWaveClear();
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
