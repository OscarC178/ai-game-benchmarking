<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const W=700, H=780;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,gain,type,fe){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.value=freq;
    if(fe) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(gain||0.15,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
let wakaPhase=0;
function sndWaka(){ wakaPhase^=1; beep(wakaPhase?440:380,0.07,0.12,'square'); }
function sndPower(){ beep(220,0.3,0.2,'sine'); }
function sndEatGhost(n){ const f=[400,500,650,800][Math.min(n,3)]; beep(f,0.15,0.25,'square'); }
function sndDeath(){ [400,350,300,250,200,150,100].forEach((f,i)=>setTimeout(()=>beep(f,0.1,0.2,'sawtooth'),i*80)); }
function sndLevel(){ [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.1,0.25,'sine'),i*120)); }

// ---- Input ----
const keys={},prev={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- Constants ----
const TILE=24;
const MX=14, MY=30; // maze pixel offset
const COLS=28, ROWS=31;
const ST={TITLE:0,READY:1,PLAYING:2,PAUSED:3,DEAD:4,LEVEL_CLEAR:5,GAMEOVER:6};

// Tile types
const T_WALL=0, T_EMPTY=1, T_DOT=2, T_POWER=3, T_DOOR=4, T_HOUSE=5, T_TUNNEL=6;

// ---- Maze Definition ----
// 28 cols x 31 rows
// W=wall, .=dot, o=power, ' '=empty, -=door, H=house interior, T=tunnel wrap
const MAZE_STR=[
  'WWWWWWWWWWWWWWWWWWWWWWWWWWWW',
  'W............WW............W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'WoWWWW.WWWWW.WW.WWWWW.WWWWoW',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'W..........................W',// row5: just changed
  'W.WWWW.WW.WWWWWWWW.WW.WWWW.W',
  'W.WWWW.WW.WWWWWWWW.WW.WWWW.W',
  'W......WW....WW....WW......W',
  'WWWWWW.WWWWW WW WWWWW.WWWWWW',
  'WWWWWW.WWWWW WW WWWWW.WWWWWW',
  'WWWWWW.WW          WW.WWWWWW',
  'WWWWWW.WW WWWHHWWW WW.WWWWWW',
  'WWWWWW.WW W------W WW.WWWWWW',
  'TTTTTT.   WHHHHHHW   .TTTTTT',
  'WWWWWW.WW WHHHHHHW WW.WWWWWW',
  'WWWWWW.WW WWWWWWWW WW.WWWWWW',
  'WWWWWW.WW          WW.WWWWWW',
  'WWWWWW.WW WWWWWWWW WW.WWWWWW',
  'WWWWWW.WW WWWWWWWW WW.WWWWWW',
  'W............WW............W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'Wo..WW................WW..oW',
  'WWW.WW.WW.WWWWWWWW.WW.WW.WWW',
  'WWW.WW.WW.WWWWWWWW.WW.WW.WWW',
  'W......WW....WW....WW......W',
  'W.WWWWWWWWWW.WW.WWWWWWWWWW.W',
  'W.WWWWWWWWWW.WW.WWWWWWWWWW.W',
  'W..........................W',
  'WWWWWWWWWWWWWWWWWWWWWWWWWWWW',
];

// Parse maze into tile array
let mazeBase=[];
let pelletBase=[];

function parseMaze(){
  mazeBase=[];
  pelletBase=[];
  for(let r=0;r<ROWS;r++){
    const row=MAZE_STR[r]||'';
    for(let c=0;c<COLS;c++){
      const ch=row[c]||'W';
      let tile;
      if(ch==='W') tile=T_WALL;
      else if(ch==='.') tile=T_DOT;
      else if(ch==='o') tile=T_POWER;
      else if(ch==='-') tile=T_DOOR;
      else if(ch==='H') tile=T_HOUSE;
      else if(ch==='T') tile=T_TUNNEL;
      else tile=T_EMPTY;
      mazeBase.push(tile);
      pelletBase.push(tile===T_DOT||tile===T_POWER);
    }
  }
}
parseMaze();

let maze=[], pellets=[];
function resetMaze(){ maze=mazeBase.slice(); pellets=pelletBase.slice(); }

function tileIdx(c,r){ return r*COLS+c; }
function getTile(c,r){
  if(r<0||r>=ROWS) return T_WALL;
  // Tunnel wrap
  if(c<0||c>=COLS) return T_TUNNEL;
  return maze[tileIdx(c,r)];
}
function isWalkable(c,r,forGhost,ghostState){
  const t=getTile(c,r);
  if(t===T_WALL) return false;
  if(t===T_DOOR){
    // Only ghosts in normal active state can pass door going up/into house
    // Eyes returning can also pass
    if(forGhost) return (ghostState==='house'||ghostState==='leaving'||ghostState==='eyes');
    return false;
  }
  if(t===T_HOUSE){
    if(forGhost) return true;
    return false;
  }
  return true;
}

function tilePx(c,r){ return {x:MX+c*TILE+TILE/2, y:MY+r*TILE+TILE/2}; }

// ---- Game State ----
let state=ST.TITLE;
let score,hiScore,lives,level;
let pelletsLeft,ghostChainCount;
let globalModeIdx,globalModeTimer;
let frightenedTimer,frightenedDuration;
let readyTimer,deathTimer,levelClearTimer;
let fruit,fruitTimer,fruitThreshold1,fruitThreshold2;
let totalTime=0;
let floatScores=[];

hiScore=parseInt(localStorage.getItem('pacman_best')||'0');

const GLOBAL_SCHEDULE=[7,20,7,20,5,20,5,Infinity]; // scatter,chase alternating

// ---- Pac-Man ----
let pac;
const PAC_START_COL=14, PAC_START_ROW=23;
const DIRS={LEFT:{dx:-1,dy:0},RIGHT:{dx:1,dy:0},UP:{dx:0,dy:-1},DOWN:{dx:0,dy:1}};
const DIR_KEYS={LEFT:['ArrowLeft','KeyA'],RIGHT:['ArrowRight','KeyD'],UP:['ArrowUp','KeyW'],DOWN:['ArrowDown','KeyS']};

function makePac(){
  const p=tilePx(PAC_START_COL,PAC_START_ROW);
  return {x:p.x,y:p.y,col:PAC_START_COL,row:PAC_START_ROW,dir:DIRS.LEFT,queuedDir:null,speed:120,mouthAngle:0.25,mouthOpen:true,alive:true,invTimer:0};
}

// ---- Ghosts ----
const GHOST_COLORS={blinky:'#FF0000',pinky:'#FFB8FF',inky:'#00FFFF',clyde:'#FFB852'};
const GHOST_SCATTER={
  blinky:{c:25,r:0},pinky:{c:2,r:0},inky:{c:27,r:30},clyde:{c:0,r:30}
};
const GHOST_HOUSE_X=14, GHOST_HOUSE_Y=14; // center of house area

let ghosts;
function makeGhosts(){
  return [
    {name:'blinky',color:'#FF0000',col:14,row:11,x:0,y:0,dir:DIRS.LEFT,state:'active',speed:110,target:{c:0,r:0},releaseAt:0,frightenedTimer:0,subState:'chase',houseTimer:0},
    {name:'pinky', color:'#FFB8FF',col:14,row:14,x:0,y:0,dir:DIRS.DOWN,state:'house',speed:110,target:{c:0,r:0},releaseAt:0,frightenedTimer:0,subState:'chase',houseTimer:0.5},
    {name:'inky',  color:'#00FFFF',col:12,row:14,x:0,y:0,dir:DIRS.UP, state:'house',speed:110,target:{c:0,r:0},releaseAt:30,frightenedTimer:0,subState:'chase',houseTimer:1},
    {name:'clyde', color:'#FFB852',col:16,row:14,x:0,y:0,dir:DIRS.UP, state:'house',speed:110,target:{c:0,r:0},releaseAt:60,frightenedTimer:0,subState:'chase',houseTimer:1.5},
  ];
}

function initGhostPositions(){
  for(const g of ghosts){
    const p=tilePx(g.col,g.row);
    g.x=p.x; g.y=p.y;
  }
}

// ---- Init ----
function startGame(){
  initAC();
  score=0; lives=3; level=1;
  resetMaze();
  pelletsLeft=pellets.filter(p=>p).length;
  globalModeIdx=0; globalModeTimer=GLOBAL_SCHEDULE[0];
  frightenedTimer=0; frightenedDuration=8;
  ghostChainCount=0;
  fruitThreshold1=70; fruitThreshold2=170;
  fruit=null; fruitTimer=0;
  floatScores=[];
  ghosts=makeGhosts(); initGhostPositions();
  pac=makePac();
  readyTimer=2.0;
  state=ST.READY;
  beep(220,0.1,0.2,'sine'); setTimeout(()=>beep(277,0.1,0.2,'sine'),120); setTimeout(()=>beep(330,0.15,0.2,'sine'),240);
}

function resetAfterDeath(){
  pac=makePac();
  ghosts=makeGhosts(); initGhostPositions();
  frightenedTimer=0; ghostChainCount=0;
  globalModeIdx=0; globalModeTimer=GLOBAL_SCHEDULE[0];
  readyTimer=1.5;
  state=ST.READY;
}

// ---- Intersection helpers ----
function getValidDirs(col,row,forGhost,ghostState,currentDir){
  const result=[];
  for(const [name,d] of Object.entries(DIRS)){
    if(forGhost&&currentDir){
      // Ghosts don't reverse (unless frightened/special)
      if(d.dx===-currentDir.dx&&d.dy===-currentDir.dy) continue;
    }
    const nc=col+d.dx, nr=row+d.dy;
    if(isWalkable(nc,nr,forGhost,ghostState)) result.push({name,dir:d});
  }
  return result;
}

function dist2(a,b){ const dx=a.c-b.c,dy=a.r-b.r; return dx*dx+dy*dy; }

function ghostTarget(g){
  if(g.state==='eyes'){
    return {c:GHOST_HOUSE_X,r:GHOST_HOUSE_Y};
  }
  const globalMode=(GLOBAL_SCHEDULE.indexOf===undefined)?'chase':
    (globalModeIdx%2===0?'scatter':'chase');
  const isChase=globalModeIdx%2===1;
  if(!isChase){ return GHOST_SCATTER[g.name]; }
  const pcol=pac.col, prow=pac.row;
  const pdir=pac.dir||DIRS.RIGHT;
  if(g.name==='blinky') return {c:pcol,r:prow};
  if(g.name==='pinky'){
    return {c:Math.max(0,Math.min(COLS-1,pcol+pdir.dx*4)),r:Math.max(0,Math.min(ROWS-1,prow+pdir.dy*4))};
  }
  if(g.name==='inky'){
    const blinky=ghosts.find(x=>x.name==='blinky');
    const px2=pcol+pdir.dx*2, py2=prow+pdir.dy*2;
    const tc=Math.max(0,Math.min(COLS-1,2*px2-(blinky?blinky.col:pcol)));
    const tr=Math.max(0,Math.min(ROWS-1,2*py2-(blinky?blinky.row:prow)));
    return {c:tc,r:tr};
  }
  if(g.name==='clyde'){
    const d2=dist2({c:g.col,r:g.row},{c:pcol,r:prow});
    return d2>64?{c:pcol,r:prow}:GHOST_SCATTER.clyde;
  }
  return {c:pcol,r:prow};
}

// ---- Pac-Man movement ----
function movePac(dt){
  if(!pac.alive) return;
  // Mouth animation
  pac.mouthAngle+=(pac.mouthOpen?1:-1)*3*dt;
  if(pac.mouthAngle>=0.25) pac.mouthOpen=false;
  if(pac.mouthAngle<=0.02) pac.mouthOpen=true;

  const SNAP=4;
  // Try queued direction first at tile center proximity
  const tileCenter=tilePx(pac.col,pac.row);
  const dx=pac.x-tileCenter.x, dy=pac.y-tileCenter.y;
  const atCenter=Math.abs(dx)<SNAP&&Math.abs(dy)<SNAP;

  if(atCenter&&pac.queuedDir){
    const qd=pac.queuedDir;
    const nc=pac.col+qd.dx, nr=pac.row+qd.dy;
    if(isWalkable(nc,nr,false,null)){
      pac.dir=qd; pac.queuedDir=null;
      pac.x=tileCenter.x; pac.y=tileCenter.y;
    }
  }

  // Move in current direction
  const spd=pac.speed;
  const nd=pac.dir;
  if(!nd) return;
  const nx=pac.x+nd.dx*spd*dt;
  const ny=pac.y+nd.dy*spd*dt;

  // Check if crossing into new tile
  const newCol=Math.floor((nx-MX)/TILE);
  const newRow=Math.floor((ny-MY)/TILE);
  const targetCol=pac.col+nd.dx;
  const targetRow=pac.row+nd.dy;

  // Tunnel wrap
  let wrapCol=null;
  if(targetCol<0){ pac.x=MX+COLS*TILE-TILE/2; pac.col=COLS-1; return; }
  if(targetCol>=COLS){ pac.x=MX+TILE/2; pac.col=0; return; }

  if(!isWalkable(targetCol,targetRow,false,null)){
    // Snap to center, stop
    if(atCenter){ pac.x=tileCenter.x; pac.y=tileCenter.y; return; }
  } else {
    pac.x=nx; pac.y=ny;
  }

  // Update tile coords
  pac.col=Math.max(0,Math.min(COLS-1,Math.floor((pac.x-MX)/TILE)));
  pac.row=Math.max(0,Math.min(ROWS-1,Math.floor((pac.y-MY)/TILE)));

  // Eat pellet
  const pi=tileIdx(pac.col,pac.row);
  if(pellets[pi]){
    const t=maze[pi];
    pellets[pi]=false;
    pelletsLeft--;
    if(t===T_POWER){
      score+=50; sndPower();
      frightenedTimer=getFrightenedDuration();
      ghostChainCount=0;
      for(const g of ghosts){
        if(g.state==='active'||g.state==='frightened'){
          g.state='frightened'; g.frightenedTimer=frightenedTimer;
          // Reverse direction
          g.dir={dx:-g.dir.dx,dy:-g.dir.dy};
        }
      }
    } else {
      score+=10; sndWaka();
    }
    if(score>hiScore){ hiScore=score; localStorage.setItem('pacman_best',hiScore); }
    // Fruit spawn
    const eaten=pelletBase.filter(p=>p).length-pelletsLeft;
    if((eaten===fruitThreshold1||eaten===fruitThreshold2)&&!fruit){
      fruit={col:14,row:17,x:tilePx(14,17).x,y:tilePx(14,17).y,pts:100+level*50};
      fruitTimer=10;
    }
  }
}

function getFrightenedDuration(){ return Math.max(2,8-(level-1)*1.5); }

// ---- Ghost movement ----
function moveGhost(g,dt){
  if(g.state==='house'){
    g.houseTimer-=dt;
    if(g.houseTimer<=0||(pelletsLeft<pelletBase.filter(p=>p).length-g.releaseAt)){
      // Check release
      if(pelletsLeft<=pelletBase.filter(p=>p).length-g.releaseAt||g.houseTimer<=0){
        g.state='leaving';
        g.dir=DIRS.UP;
      }
    }
    // Bob up/down in house
    g.y+=g.dir.dy*80*dt;
    if(g.y>tilePx(g.col,15).y) g.dir=DIRS.UP;
    if(g.y<tilePx(g.col,13).y) g.dir=DIRS.DOWN;
    return;
  }
  if(g.state==='leaving'){
    // Move toward exit tile
    const exitP=tilePx(14,11);
    const ddx=exitP.x-g.x, ddy=exitP.y-g.y;
    const dd=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dd<4){
      g.x=exitP.x; g.y=exitP.y; g.col=14; g.row=11;
      g.state='active'; g.dir=DIRS.LEFT;
    } else {
      const mx=ddx/dd, my=ddy/dd;
      g.x+=mx*150*dt; g.y+=my*150*dt;
    }
    return;
  }

  const SNAP=4;
  const tileCenter=tilePx(g.col,g.row);
  const adx=Math.abs(g.x-tileCenter.x), ady=Math.abs(g.y-tileCenter.y);
  const atCenter=adx<SNAP&&ady<SNAP;

  let spd=g.state==='frightened'?60:g.state==='eyes'?200:110+(level-1)*5;
  if(spd>160) spd=160;

  if(atCenter){
    g.x=tileCenter.x; g.y=tileCenter.y;
    // Choose direction
    const target=g.state==='frightened'?null:ghostTarget(g);
    const valid=getValidDirs(g.col,g.row,true,g.state,g.dir);
    if(valid.length===0) return;

    let chosen;
    if(g.state==='frightened'||!target){
      chosen=valid[Math.floor(Math.random()*valid.length)];
    } else {
      // Pick direction that minimizes distance to target
      let bestD=Infinity;
      for(const v of valid){
        const nc=g.col+v.dir.dx, nr=g.row+v.dir.dy;
        const d=dist2({c:nc,r:nr},target);
        if(d<bestD){ bestD=d; chosen=v; }
      }
      if(!chosen) chosen=valid[0];
    }
    g.dir=chosen.dir;

    // Check if arrived at house (eyes state)
    if(g.state==='eyes'&&Math.abs(g.col-GHOST_HOUSE_X)<=1&&Math.abs(g.row-GHOST_HOUSE_Y)<=1){
      g.state='house'; g.houseTimer=1.5; g.col=GHOST_HOUSE_X; g.row=GHOST_HOUSE_Y;
      const p=tilePx(GHOST_HOUSE_X,GHOST_HOUSE_Y);
      g.x=p.x; g.y=p.y;
      return;
    }
  }

  // Move
  g.x+=g.dir.dx*spd*dt; g.y+=g.dir.dy*spd*dt;

  // Tunnel wrap
  if(g.x<MX-TILE/2){ g.x=MX+COLS*TILE-TILE/2; g.col=COLS-1; }
  if(g.x>MX+COLS*TILE-TILE/2){ g.x=MX+TILE/2; g.col=0; }

  // Update tile
  g.col=Math.max(0,Math.min(COLS-1,Math.floor((g.x-MX)/TILE)));
  g.row=Math.max(0,Math.min(ROWS-1,Math.floor((g.y-MY)/TILE)));
}

// ---- Collisions ----
function checkCollisions(){
  for(const g of ghosts){
    if(g.state==='house'||g.state==='leaving'||g.state==='eyes') continue;
    const ddx=pac.x-g.x, ddy=pac.y-g.y;
    const d2=ddx*ddx+ddy*ddy;
    if(d2>18*18) continue;
    if(g.state==='frightened'){
      g.state='eyes'; g.frightenedTimer=0;
      const pts=[200,400,800,1600][Math.min(ghostChainCount,3)];
      score+=pts;
      if(score>hiScore){ hiScore=score; localStorage.setItem('pacman_best',hiScore); }
      floatScores.push({x:g.x,y:g.y,pts,life:1.5});
      ghostChainCount++;
      sndEatGhost(ghostChainCount-1);
    } else if(g.state==='active'){
      // Die
      pac.alive=false;
      deathTimer=1.5;
      state=ST.DEAD;
      sndDeath();
      break;
    }
  }
  // Fruit
  if(fruit){
    const fddx=pac.x-fruit.x, fddy=pac.y-fruit.y;
    if(fddx*fddx+fddy*fddy<20*20){
      score+=fruit.pts;
      if(score>hiScore){ hiScore=score; localStorage.setItem('pacman_best',hiScore); }
      floatScores.push({x:fruit.x,y:fruit.y,pts:fruit.pts,life:1.5});
      fruit=null; fruitTimer=0;
      beep(660,0.1,0.2,'sine');
    }
  }
}

// ---- Update ----
let lastTime=0;

function update(dt){
  totalTime+=dt;

  // Float scores
  for(let i=floatScores.length-1;i>=0;i--){
    floatScores[i].life-=dt; floatScores[i].y-=20*dt;
    if(floatScores[i].life<=0) floatScores.splice(i,1);
  }

  if(state===ST.TITLE||state===ST.PAUSED||state===ST.GAMEOVER) return;

  if(state===ST.READY){
    readyTimer-=dt;
    if(readyTimer<=0) state=ST.PLAYING;
    return;
  }
  if(state===ST.DEAD){
    deathTimer-=dt;
    if(deathTimer<=0){
      lives--;
      if(lives<=0){
        if(score>hiScore){ hiScore=score; localStorage.setItem('pacman_best',hiScore); }
        state=ST.GAMEOVER;
      } else {
        resetAfterDeath();
      }
    }
    return;
  }
  if(state===ST.LEVEL_CLEAR){
    levelClearTimer-=dt;
    if(levelClearTimer<=0){
      level++;
      resetMaze();
      pelletsLeft=pellets.filter(p=>p).length;
      ghosts=makeGhosts(); initGhostPositions();
      pac=makePac();
      frightenedTimer=0; ghostChainCount=0;
      globalModeIdx=0; globalModeTimer=GLOBAL_SCHEDULE[0];
      fruitThreshold1=70; fruitThreshold2=170;
      fruit=null; fruitTimer=0;
      readyTimer=1.5; state=ST.READY;
      sndLevel();
    }
    return;
  }

  // Input for pac
  for(const [dirName,dobj] of Object.entries(DIRS)){
    const codes=DIR_KEYS[dirName];
    if(codes.some(c=>keys[c])) pac.queuedDir=dobj;
  }

  // Global mode timer
  frightenedTimer-=dt;
  if(frightenedTimer<=0){
    frightenedTimer=0;
    for(const g of ghosts){
      if(g.state==='frightened') g.state='active';
    }
    ghostChainCount=0;
  }

  globalModeTimer-=dt;
  if(globalModeTimer<=0&&frightenedTimer<=0){
    globalModeIdx=Math.min(globalModeIdx+1,GLOBAL_SCHEDULE.length-1);
    globalModeTimer=GLOBAL_SCHEDULE[globalModeIdx]||Infinity;
  }

  // Fruit timer
  if(fruit){
    fruitTimer-=dt;
    if(fruitTimer<=0) fruit=null;
  }

  movePac(dt);
  for(const g of ghosts) moveGhost(g,dt);
  checkCollisions();

  // Check level clear
  if(pelletsLeft<=0&&state===ST.PLAYING){
    sndLevel();
    levelClearTimer=2.5; state=ST.LEVEL_CLEAR;
  }
}

// ---- Render ----
function drawMaze(){
  // Background fill for water/road areas by row
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=maze[tileIdx(c,r)];
      const px=MX+c*TILE, py=MY+r*TILE;
      if(t===T_WALL){
        ctx.fillStyle='#0000aa';
        ctx.fillRect(px,py,TILE,TILE);
        ctx.strokeStyle='#2222ff';
        ctx.lineWidth=2;
        ctx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      } else if(t===T_DOOR){
        ctx.fillStyle='#ffb8ff';
        ctx.fillRect(px,py+TILE/2-2,TILE,4);
      } else if(t===T_TUNNEL){
        ctx.fillStyle='#111111';
        ctx.fillRect(px,py,TILE,TILE);
      }
    }
  }
}

function drawPellets(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!pellets[tileIdx(c,r)]) continue;
      const t=maze[tileIdx(c,r)];
      const cx2=MX+c*TILE+TILE/2, cy2=MY+r*TILE+TILE/2;
      if(t===T_POWER){
        const blink=Math.floor(totalTime*4)%2===0;
        if(blink){
          ctx.fillStyle='#ffff44';
          ctx.beginPath(); ctx.arc(cx2,cy2,7,0,Math.PI*2); ctx.fill();
        }
      } else {
        ctx.fillStyle='#ffb8ae';
        ctx.beginPath(); ctx.arc(cx2,cy2,2.5,0,Math.PI*2); ctx.fill();
      }
    }
  }
}

function drawPac(){
  if(!pac.alive) return;
  const {x,y,dir,mouthAngle}=pac;
  let angle=0;
  if(dir===DIRS.RIGHT) angle=0;
  else if(dir===DIRS.LEFT) angle=Math.PI;
  else if(dir===DIRS.UP) angle=-Math.PI/2;
  else if(dir===DIRS.DOWN) angle=Math.PI/2;

  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.arc(x,y,10,angle+mouthAngle,angle+Math.PI*2-mouthAngle);
  ctx.closePath();
  ctx.fill();
}

function drawGhosts(){
  for(const g of ghosts){
    if(g.state==='house'||g.state==='leaving'){
      drawGhostBody(g.x,g.y,g.color,false,false,false);
      continue;
    }
    const frightFlash=frightenedTimer>0&&frightenedTimer<2&&Math.floor(totalTime*5)%2===0;
    if(g.state==='frightened'){
      drawGhostBody(g.x,g.y,frightFlash?'#ffffff':'#0000cc',true,false,false);
    } else if(g.state==='eyes'){
      // Just eyes
      drawGhostEyes(g.x,g.y,g.dir,true);
    } else {
      drawGhostBody(g.x,g.y,g.color,false,false,false);
    }
  }
}

function drawGhostBody(x,y,color,frightened,flash,eyesOnly){
  const r=11;
  ctx.fillStyle=color;
  // Body: dome top, scalloped bottom
  ctx.beginPath();
  ctx.arc(x,y-2,r,Math.PI,0);
  // scalloped bottom
  const bw=r*2/3;
  ctx.lineTo(x+r,y+r-2);
  for(let i=0;i<3;i++){
    const bx=x+r-i*bw-bw/2;
    ctx.arc(bx,y+r-2,bw/2,0,Math.PI,true);
  }
  ctx.lineTo(x-r,y+r-2);
  ctx.closePath();
  ctx.fill();
  // Eyes
  if(!frightened){
    drawGhostEyes(x,y,null,false);
  } else {
    // Scared face
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x-4,y-3,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4,y-3,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=flash?'#ff0':' #ff8888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x-5,y+3); ctx.lineTo(x-3,y+1); ctx.lineTo(x-1,y+3); ctx.lineTo(x+1,y+1); ctx.lineTo(x+3,y+3); ctx.lineTo(x+5,y+1); ctx.stroke();
  }
}

function drawGhostEyes(x,y,dir,eyesOnly){
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x-4,y-3,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4,y-3,3.5,0,Math.PI*2); ctx.fill();
  const pd=dir||DIRS.RIGHT;
  ctx.fillStyle='#0000cc';
  ctx.beginPath(); ctx.arc(x-4+pd.dx*2,y-3+pd.dy*2,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4+pd.dx*2,y-3+pd.dy*2,2,0,Math.PI*2); ctx.fill();
}

function drawHUD(){
  ctx.fillStyle='#fff'; ctx.font='18px monospace'; ctx.textAlign='left';
  ctx.fillText('Score: '+score,10,22);
  ctx.fillStyle='#888'; ctx.textAlign='right';
  ctx.fillText('Best: '+hiScore,W-10,22);
  ctx.fillStyle='#aaa'; ctx.textAlign='center';
  ctx.fillText('Level '+level,W/2,22);
  // Lives
  for(let i=0;i<lives;i++){
    const lx=20+i*22, ly=H-18;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();
    ctx.moveTo(lx,ly);
    ctx.arc(lx,ly,9,0.3,Math.PI*2-0.3);
    ctx.closePath(); ctx.fill();
  }
  // Fruit display
  if(fruit){
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(fruit.x,fruit.y,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8888'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText('F',fruit.x,fruit.y+4);
  }
}

function drawFloatScores(){
  for(const fs of floatScores){
    ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.globalAlpha=Math.min(1,fs.life);
    ctx.fillText(fs.pts,fs.x,fs.y);
  }
  ctx.globalAlpha=1;
}

function render(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  if(state===ST.TITLE){ drawTitle(); return; }

  drawMaze();
  drawPellets();
  drawGhosts();
  drawPac();
  drawFloatScores();
  drawHUD();

  if(state===ST.READY){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,MY+14*TILE-15,W,34);
    ctx.fillStyle='#FFD700'; ctx.font='bold 26px monospace'; ctx.textAlign='center';
    ctx.fillText('READY!',W/2,MY+14*TILE+12);
  }
  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);
    ctx.fillStyle='#888'; ctx.font='18px monospace';
    ctx.fillText('P to resume',W/2,H/2+50);
  }
  if(state===ST.DEAD){
    ctx.fillStyle='rgba(180,0,0,0.2)'; ctx.fillRect(0,0,W,H);
  }
  if(state===ST.LEVEL_CLEAR){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('LEVEL CLEAR!',W/2,H/2-10);
    ctx.fillStyle='#fff'; ctx.font='22px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+35);
  }
  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff0000'; ctx.font='bold 52px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-40);
    ctx.fillStyle='#fff'; ctx.font='24px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    const blink=Math.floor(totalTime*2)%2===0;
    ctx.fillStyle=blink?'#aaa':'#444'; ctx.font='18px monospace';
    ctx.fillText('Press Enter to Restart',W/2,H/2+65);
  }
}

function drawTitle(){
  ctx.fillStyle='#FFD700'; ctx.font='bold 64px monospace'; ctx.textAlign='center';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=20;
  ctx.fillText('PAC-MAN',W/2,160);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaa'; ctx.font='17px monospace';
  ctx.fillText('Navigate the maze and eat every dot.',W/2,240);
  ctx.fillText('Avoid the ghosts!',W/2,268);
  ctx.fillText('Large flashing dots let you eat ghosts briefly.',W/2,296);
  ctx.fillText('Use side tunnels to wrap around.',W/2,324);
  ctx.fillText('Clear all dots to advance.',W/2,352);
  ctx.fillStyle='#888'; ctx.font='15px monospace';
  ctx.fillText('Arrow Keys or WASD to move  |  P to pause',W/2,406);
  const blink=Math.floor(totalTime*2)%2===0;
  ctx.fillStyle=blink?'#fff':'#444'; ctx.font='22px monospace';
  ctx.fillText('Press Enter to Start',W/2,470);
  ctx.fillStyle='#333'; ctx.font='15px monospace';
  ctx.fillText('Best: '+hiScore,W/2,510);
}

// ---- Main Loop ----
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  const enterDown=keys['Enter']&&!prev['Enter'];
  const pDown=keys['KeyP']&&!prev['KeyP'];
  Object.assign(prev,keys);

  if(enterDown){
    if(state===ST.TITLE) startGame();
    else if(state===ST.GAMEOVER) startGame();
  }
  if(pDown){
    if(state===ST.PLAYING) state=ST.PAUSED;
    else if(state===ST.PAUSED) state=ST.PLAYING;
  }

  update(dt);
  render();
}

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
