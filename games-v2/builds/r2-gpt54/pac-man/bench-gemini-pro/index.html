<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pac-Man</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
    font-family: monospace;
    overflow: hidden;
  }
  canvas {
    background-color: #000;
    image-rendering: crisp-edges;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
</style>

<body>

<canvas id="gameCanvas" width="700" height="780"></canvas>

<script>
// --- Audio System ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx = null;

function initAudio() {
    if (!actx) actx = new AudioContext();
    if (actx.state === 'suspended') actx.resume();
}

function playTone(freq, type, dur, vol, slideFreq) {
    if (!actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    if (slideFreq) {
        osc.frequency.exponentialRampToValueAtTime(slideFreq, actx.currentTime + dur);
    }
    
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
    
    osc.connect(gain);
    gain.connect(actx.destination);
    
    osc.start();
    osc.stop(actx.currentTime + dur);
}

const sfx = {
    waka: (alt) => playTone(alt ? 300 : 400, 'triangle', 0.1, 0.05),
    eatGhost: () => playTone(800, 'sawtooth', 0.4, 0.1, 200),
    eatFruit: () => playTone(600, 'square', 0.3, 0.1, 1200),
    powerPellet: () => playTone(200, 'square', 0.2, 0.05, 300),
    die: () => playTone(300, 'sawtooth', 1.0, 0.2, 50),
    ready: () => {
        [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2, 0.1), i * 150));
    }
};

// --- Constants ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const TILE = 24;
const COLS = 28;
const ROWS = 31;
const MAZE_X = 14;
const MAZE_Y = 30;

const DIR = { NONE: -1, UP: 0, LEFT: 1, DOWN: 2, RIGHT: 3 };
const DX = [0, -1, 0, 1];
const DY = [-1, 0, 1, 0];

const STATE_TITLE = 0;
const STATE_READY = 1;
const STATE_PLAYING = 2;
const STATE_PAUSED = 3;
const STATE_DYING = 4;
const STATE_GAMEOVER = 5;
const STATE_LEVELCLEAR = 6;

// Classic maze layout 
// 0: empty, 1: wall, 2: pellet, 3: power pellet, 4: door, 5: ghost house empty
const rawMap = [
    "1111111111111111111111111111",
    "1222222222222112222222222221",
    "1211112111112112111112111121",
    "1311112111112112111112111131",
    "1211112111112112111112111121",
    "1222222222222222222222222221",
    "1211112112111111112112111121",
    "1211112112111111112112111121",
    "1222222112222112222112222221",
    "1111112111110110111112111111",
    "1111112111110110111112111111",
    "1111112110000000000112111111",
    "1111112110111441110112111111",
    "1111112110155555510112111111",
    "0000002000155555510002000000",
    "1111112110155555510112111111",
    "1111112110111111110112111111",
    "1111112110000000000112111111",
    "1111112110111111110112111111",
    "1111112110111111110112111111",
    "1222222222222112222222222221",
    "1211112111112112111112111121",
    "1211112111112112111112111121",
    "1322112222222002222222112231",
    "1112112112111111112112112111",
    "1112112112111111112112112111",
    "1222222112222112222112222221",
    "1211111111112112111111111121",
    "1211111111112112111111111121",
    "1222222222222222222222222221",
    "1111111111111111111111111111"
];

let map = [];
let dotCount = 0;
let totalDots = 0;

function parseMap() {
    map = [];
    totalDots = 0;
    dotCount = 0;
    for (let r = 0; r < ROWS; r++) {
        let row = [];
        for (let c = 0; c < COLS; c++) {
            let v = parseInt(rawMap[r][c], 10);
            row.push(v);
            if (v === 2 || v === 3) totalDots++;
        }
        map.push(row);
    }
}

// --- Game State Variables ---
let state = STATE_TITLE;
let stateTimer = 0;
let lastTime = 0;

let score = 0;
let highScore = parseInt(localStorage.getItem('pacmanHigh')) || 0;
let lives = 3;
let level = 1;

let wakaAlt = false;

// Movement Config
const PAC_SPEED = 120;
const GHOST_NORM_SPEED = 110;
const GHOST_FRIGHT_SPEED = 60;
const GHOST_EYES_SPEED = 200;

// Entities
let pac = { x: 0, y: 0, tx: 13.5, ty: 23, dir: DIR.LEFT, nextDir: DIR.NONE, mouthAnim: 0 };

let ghosts = [];
const ID_BLINKY = 0; // Red
const ID_PINKY = 1;  // Pink
const ID_INKY = 2;   // Cyan
const ID_CLYDE = 3;  // Orange

const CACHE_DIRS = [DIR.UP, DIR.LEFT, DIR.DOWN, DIR.RIGHT];

// Global schedules
let globalMode = 'scatter'; // 'scatter' or 'chase'
let globalPhase = 0;
let globalTimer = 0;
const PHASE_TIMES = [7, 20, 7, 20, 5, 20, 5, Infinity];

let frightenedTimer = 0;
let frightChain = 0;

let fruit = null;

// --- Input ---
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, KeyW: false, KeyS: false, KeyA: false, KeyD: false };
window.addEventListener('keydown', e => {
    initAudio();
    if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    keys[e.code] = true;
    
    if (e.code === 'Enter') {
        if (state === STATE_TITLE || state === STATE_GAMEOVER) startNewGame();
    } else if (e.code === 'KeyP') {
        if (state === STATE_PLAYING) state = STATE_PAUSED;
        else if (state === STATE_PAUSED) { state = STATE_PLAYING; lastTime = performance.now(); }
    }
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
});

// --- Helpers ---
function tx(x) { return Math.floor((x - MAZE_X) / TILE); }
function ty(y) { return Math.floor((y - MAZE_Y) / TILE); }
function px(tx) { return MAZE_X + tx * TILE + TILE / 2; }
function py(ty) { return MAZE_Y + ty * TILE + TILE / 2; }

function isSolid(tx, ty, isGhost = false, ghostState = 'normal') {
    if (tx < 0 || tx >= COLS) return false; // tunnel
    if (ty < 0 || ty >= ROWS) return true;
    let v = map[ty][tx];
    if (v === 1) return true;
    if (v === 4) {
        // Door logic
        if (!isGhost) return true;
        if (ghostState === 'normal' || ghostState === 'frightened') return true; // solid once outside
        if (ghostState === 'eyes' || ghostState === 'leaving') return false; // can pass
    }
    return false;
}

function getOpposite(d) {
    if (d === DIR.UP) return DIR.DOWN;
    if (d === DIR.DOWN) return DIR.UP;
    if (d === DIR.LEFT) return DIR.RIGHT;
    if (d === DIR.RIGHT) return DIR.LEFT;
    return DIR.NONE;
}

function wrap(x) {
    let wrapW = COLS * TILE;
    if (x < MAZE_X - TILE/2) return x + wrapW + TILE;
    if (x > MAZE_X + wrapW + TILE/2) return x - wrapW - TILE;
    return x;
}

// --- Setup ---
function spawnGhosts() {
    ghosts = [
        { id: ID_BLINKY, x: px(13.5), y: py(11), tx: 13.5, ty: 11, dir: DIR.LEFT, color: '#FF0000', state: 'normal', scatterT: {x: 25, y: 0} },
        { id: ID_PINKY,  x: px(13.5), y: py(14), tx: 13.5, ty: 14, dir: DIR.DOWN, color: '#FFB8FF', state: 'leaving', scatterT: {x: 2,  y: 0} },
        { id: ID_INKY,   x: px(11.5), y: py(14), tx: 11.5, ty: 14, dir: DIR.UP,   color: '#00FFFF', state: 'house',   scatterT: {x: 27, y: 31} },
        { id: ID_CLYDE,  x: px(15.5), y: py(14), tx: 15.5, ty: 14, dir: DIR.UP,   color: '#FFB852', state: 'house',   scatterT: {x: 0,  y: 31} }
    ];
}

function resetActors() {
    pac = { x: px(13.5), y: py(23), tx: 13.5, ty: 23, dir: DIR.LEFT, nextDir: DIR.NONE, mouthAnim: 0 };
    spawnGhosts();
    frightenedTimer = 0;
    globalPhase = 0;
    globalTimer = 0;
    globalMode = 'scatter';
}

function startNewGame() {
    score = 0;
    lives = 3;
    level = 1;
    parseMap();
    resetActors();
    fruit = null;
    state = STATE_READY;
    stateTimer = 2.0;
    sfx.ready();
}

function nextLevel() {
    level++;
    parseMap();
    resetActors();
    fruit = null;
    state = STATE_READY;
    stateTimer = 2.0;
    sfx.ready();
}

function loseLife() {
    lives--;
    sfx.die();
    state = STATE_DYING;
    stateTimer = 2.0;
}

// --- Update Logic ---

function getGhostTarget(g) {
    if (g.state === 'eyes') return { x: 13.5, y: 11 }; // Door
    
    // Force target if in special state
    if (g.state === 'leaving') return { x: 13.5, y: 11 };
    if (g.state === 'house') {
        // Bounce up and down
        return { x: g.tx, y: g.dir === DIR.UP ? 13 : 15 };
    }
    
    // Frightened handles randomness inside movement logic, target is ignored
    if (g.state === 'frightened') return { x: 0, y: 0 }; 

    if (globalMode === 'scatter') return g.scatterT;

    // Chase Mode logic
    let ptx = tx(pac.x);
    let pty = ty(pac.y);

    if (g.id === ID_BLINKY) {
        return { x: ptx, y: pty };
    }
    else if (g.id === ID_PINKY) {
        let ntx = ptx + DX[pac.dir] * 4;
        let nty = pty + DY[pac.dir] * 4;
        if (pac.dir === DIR.UP) ntx -= 4; // Classic bug replication
        return { x: ntx, y: nty };
    }
    else if (g.id === ID_INKY) {
        let ntx = ptx + DX[pac.dir] * 2;
        let nty = pty + DY[pac.dir] * 2;
        if (pac.dir === DIR.UP) ntx -= 2;
        let bx = tx(ghosts[0].x);
        let by = ty(ghosts[0].y);
        let vecX = ntx - bx;
        let vecY = nty - by;
        return { x: bx + vecX * 2, y: by + vecY * 2 };
    }
    else if (g.id === ID_CLYDE) {
        let distSQ = Math.pow(ptx - tx(g.x), 2) + Math.pow(pty - ty(g.y), 2);
        if (distSQ > 64) return { x: ptx, y: pty };
        return g.scatterT;
    }
}

function updatePacman(dt) {
    // Read input
    if (keys.ArrowUp || keys.KeyW) pac.nextDir = DIR.UP;
    if (keys.ArrowDown || keys.KeyS) pac.nextDir = DIR.DOWN;
    if (keys.ArrowLeft || keys.KeyA) pac.nextDir = DIR.LEFT;
    if (keys.ArrowRight || keys.KeyD) pac.nextDir = DIR.RIGHT;

    let targetX = px(tx(pac.x));
    let targetY = py(ty(pac.y));

    // Cornering / grid alignment logic
    let dx = pac.x - targetX;
    let dy = pac.y - targetY;
    let distFromCenter = Math.hypot(dx, dy);

    // If near center, try to execute queued turn
    if (distFromCenter < 4 && pac.nextDir !== DIR.NONE && pac.nextDir !== pac.dir) {
        let currTX = tx(pac.x);
        let currTY = ty(pac.y);
        if (!isSolid(currTX + DX[pac.nextDir], currTY + DY[pac.nextDir])) {
            // Snap to center and turn
            pac.x = targetX;
            pac.y = targetY;
            pac.dir = pac.nextDir;
            pac.nextDir = DIR.NONE;
        }
    }

    // Try to reverse instantly
    if (pac.nextDir === getOpposite(pac.dir)) {
        pac.dir = pac.nextDir;
        pac.nextDir = DIR.NONE;
    }

    // Move
    let speed = PAC_SPEED * dt;
    let tryX = pac.x + DX[pac.dir] * speed;
    let tryY = pac.y + DY[pac.dir] * speed;

    let nextTX = tx(tryX + DX[pac.dir]*8);
    let nextTY = ty(tryY + DY[pac.dir]*8);

    if (isSolid(nextTX, nextTY)) {
        // Hit wall, snap to center
        pac.x = targetX;
        pac.y = targetY;
        pac.mouthAnim = 0; // stop animating
    } else {
        pac.x = tryX;
        pac.y = tryY;
        pac.mouthAnim += dt * 15;
    }

    pac.x = wrap(pac.x);

    // Eat pellets
    let currTX = tx(pac.x);
    let currTY = ty(pac.y);
    
    if (currTX >= 0 && currTX < COLS && currTY >= 0 && currTY < ROWS) {
        let p = map[currTY][currTX];
        if (p === 2 || p === 3) {
            map[currTY][currTX] = 0;
            dotCount++;
            
            if (p === 2) {
                score += 10;
                sfx.waka(wakaAlt); wakaAlt = !wakaAlt;
            } else if (p === 3) {
                score += 50;
                sfx.powerPellet();
                
                // Trigger Frightened
                frightenedTimer = Math.max(2, 8 - (level-1) * 2);
                frightChain = 0;
                for (let g of ghosts) {
                    if (g.state === 'normal' || g.state === 'frightened') {
                        g.state = 'frightened';
                        g.dir = getOpposite(g.dir); // reverse immediately
                    }
                }
            }
            if (score > highScore) highScore = score;

            // Fruit spawn
            if (dotCount === 70 || dotCount === 170) {
                fruit = { x: px(13.5), y: py(17), timer: 10 };
            }

            // Ghost release based on dots
            if (dotCount === 30 && ghosts[ID_INKY].state === 'house') ghosts[ID_INKY].state = 'leaving';
            if (dotCount === 60 && ghosts[ID_CLYDE].state === 'house') ghosts[ID_CLYDE].state = 'leaving';

            // Win check
            if (dotCount >= totalDots) {
                state = STATE_LEVELCLEAR;
                stateTimer = 2.0;
            }
        }
    }

    // Eat fruit
    if (fruit) {
        fruit.timer -= dt;
        if (Math.hypot(pac.x - fruit.x, pac.y - fruit.y) < 16) {
            score += 100 * level;
            sfx.eatFruit();
            fruit = null;
        } else if (fruit.timer <= 0) {
            fruit = null;
        }
    }
}

function updateGhost(g, dt) {
    let speed = GHOST_NORM_SPEED;
    if (g.state === 'frightened') speed = GHOST_FRIGHT_SPEED;
    if (g.state === 'eyes') speed = GHOST_EYES_SPEED;
    if (tx(g.x) < 5 || tx(g.x) > 22) speed *= 0.6; // Tunnel slowdown

    let step = speed * dt;
    
    let targetX = px(tx(g.x));
    let targetY = py(ty(g.y));
    let distToCenter = Math.hypot(g.x - targetX, g.y - targetY);

    // Reached a tile center -> make a decision
    if (distToCenter < step) {
        g.x = targetX;
        g.y = targetY;
        
        // Handle special exits/entries
        if (g.state === 'leaving') {
            if (Math.abs(g.x - px(13.5)) > 2) {
                g.dir = g.x > px(13.5) ? DIR.LEFT : DIR.RIGHT;
            } else if (g.y > py(11)) {
                g.x = px(13.5);
                g.dir = DIR.UP;
            } else {
                g.y = py(11);
                g.dir = DIR.LEFT;
                g.state = 'normal';
            }
        } else if (g.state === 'eyes' && tx(g.x) === 13 && ty(g.y) === 11) {
            g.state = 'house';
            g.dir = DIR.DOWN;
        } else if (g.state === 'house') {
            if (g.y < py(13.5)) g.dir = DIR.DOWN;
            else if (g.y > py(14.5)) g.dir = DIR.UP;
        } else {
            // Normal navigation
            let possible = [];
            for (let d of CACHE_DIRS) {
                if (d === getOpposite(g.dir)) continue; // Never reverse
                
                // Classic quirk: ghosts can't pick UP in certain zones. (Simplified: just allow all for now)
                
                let curTX = tx(g.x); let curTY = ty(g.y);
                if (!isSolid(curTX + DX[d], curTY + DY[d], true, g.state)) {
                    possible.push(d);
                }
            }

            if (possible.length === 0) {
                g.dir = getOpposite(g.dir); // Trapped (shouldn't happen in proper maze)
            } else if (possible.length === 1) {
                g.dir = possible[0];
            } else {
                if (g.state === 'frightened') {
                    // Random turn
                    g.dir = possible[Math.floor(Math.random() * possible.length)];
                } else {
                    // Target finding
                    let tTile = getGhostTarget(g);
                    let currTX = tx(g.x); let currTY = ty(g.y);
                    let bestDir = g.dir;
                    let bestDist = Infinity;

                    // UP, LEFT, DOWN, RIGHT tie-breaker order (classic logic)
                    for (let d of CACHE_DIRS) {
                        if (!possible.includes(d)) continue;
                        let ntx = currTX + DX[d];
                        let nty = currTY + DY[d];
                        let distSQ = Math.pow(ntx - tTile.x, 2) + Math.pow(nty - tTile.y, 2);
                        if (distSQ < bestDist) {
                            bestDist = distSQ;
                            bestDir = d;
                        }
                    }
                    g.dir = bestDir;
                }
            }
        }
    }

    // Move
    g.x += DX[g.dir] * step;
    g.y += DY[g.dir] * step;
    g.x = wrap(g.x);
}

function updatePlaying(dt) {
    // Global Modes
    if (frightenedTimer > 0) {
        frightenedTimer -= dt;
        if (frightenedTimer <= 0) {
            for (let g of ghosts) {
                if (g.state === 'frightened') g.state = 'normal';
            }
        }
    } else {
        globalTimer += dt;
        if (globalPhase < PHASE_TIMES.length && globalTimer >= PHASE_TIMES[globalPhase]) {
            globalTimer = 0;
            globalPhase++;
            globalMode = globalPhase % 2 === 0 ? 'scatter' : 'chase';
            // Reverse on phase change
            for (let g of ghosts) {
                if (g.state === 'normal') {
                    g.dir = getOpposite(g.dir);
                    // snap to grid nicely to prevent wall clipping
                    g.x = px(tx(g.x)); g.y = py(ty(g.y));
                }
            }
        }
    }

    updatePacman(dt);

    for (let g of ghosts) {
        updateGhost(g, dt);
        
        // Collisions
        if (state === STATE_PLAYING && Math.hypot(pac.x - g.x, pac.y - g.y) < 16) {
            if (g.state === 'frightened') {
                g.state = 'eyes';
                g.x = px(tx(g.x)); g.y = py(ty(g.y)); // snap
                score += 200 * Math.pow(2, frightChain);
                frightChain++;
                sfx.eatGhost();
                // Brief pause possible here, skip for fluidity
            } else if (g.state === 'normal') {
                loseLife();
            }
        }
    }
}

// --- Render ---

function drawMaze() {
    ctx.strokeStyle = '#2121DE';
    ctx.lineWidth = 2;
    // We do simple blocks for walls to preserve code size, not arc perfection
    for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
            let v = map[r][c];
            let x = MAZE_X + c * TILE;
            let y = MAZE_Y + r * TILE;

            if (v === 1) { // Wall block
                ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
            } else if (v === 4) { // Door
                ctx.fillStyle = '#FFB8FF';
                ctx.fillRect(x, y + TILE/2 - 2, TILE, 4);
            } else if (v === 2) { // Pellet
                ctx.fillStyle = '#FFB8AE';
                ctx.fillRect(x + TILE/2 - 2, y + TILE/2 - 2, 4, 4);
            } else if (v === 3) { // Power pellet
                if (Math.floor(performance.now()/200)%2===0) {
                    ctx.fillStyle = '#FFB8AE';
                    ctx.beginPath(); ctx.arc(x + TILE/2, y + TILE/2, 8, 0, Math.PI*2); ctx.fill();
                }
            }
        }
    }
}

function drawPacman() {
    ctx.save();
    ctx.translate(pac.x, pac.y);
    let angle = 0;
    if (pac.dir === DIR.UP) angle = -Math.PI/2;
    if (pac.dir === DIR.DOWN) angle = Math.PI/2;
    if (pac.dir === DIR.LEFT) angle = Math.PI;

    ctx.rotate(angle);
    ctx.fillStyle = '#FFFF00';
    
    let mouth = 0;
    if (state === STATE_PLAYING || state === STATE_READY) {
        mouth = Math.abs(Math.sin(pac.mouthAnim)) * 0.8;
    } else if (state === STATE_DYING) {
        let p = stateTimer / 2.0; // 1 to 0
        mouth = (1 - p) * Math.PI; 
    }

    if (mouth < Math.PI) {
        ctx.beginPath();
        ctx.arc(0, 0, 12, mouth, Math.PI*2 - mouth);
        ctx.lineTo(0,0);
        ctx.fill();
    }
    ctx.restore();
}

function drawGhost(g) {
    ctx.save();
    ctx.translate(g.x, g.y);

    let isFrightened = g.state === 'frightened';
    let isEyes = g.state === 'eyes';
    
    let bob = Math.sin(performance.now() / 150 + g.id) * 2;

    if (!isEyes) {
        ctx.fillStyle = isFrightened ? 
            ((frightenedTimer < 2 && Math.floor(frightenedTimer*5)%2===0) ? '#FFFFFF' : '#0000FF') 
            : g.color;
        
        ctx.beginPath();
        ctx.arc(0, -2 + bob, 12, Math.PI, 0); // round top
        ctx.lineTo(12, 12 + bob);
        // Scalloped bottom
        ctx.lineTo(8, 8 + bob); ctx.lineTo(4, 12 + bob); ctx.lineTo(0, 8 + bob);
        ctx.lineTo(-4, 12 + bob); ctx.lineTo(-8, 8 + bob); ctx.lineTo(-12, 12 + bob);
        ctx.closePath();
        ctx.fill();
    }

    // Eyes
    if (!isFrightened || isEyes) {
        let ex = 0, ey = 0;
        if (g.dir === DIR.RIGHT) ex = 2;
        if (g.dir === DIR.LEFT) ex = -2;
        if (g.dir === DIR.UP) ey = -2;
        if (g.dir === DIR.DOWN) ey = 2;
        
        let yoff = isEyes ? 0 : bob;

        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(-4 + ex, -4 + ey + yoff, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(4 + ex, -4 + ey + yoff, 4, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = '#00F';
        ctx.beginPath(); ctx.arc(-4 + ex*2, -4 + ey*2 + yoff, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(4 + ex*2, -4 + ey*2 + yoff, 2, 0, Math.PI*2); ctx.fill();
    } else {
        // Frightened face
        ctx.fillStyle = '#FFB8AE';
        ctx.fillRect(-4, -2 + bob, 2, 2); ctx.fillRect(2, -2 + bob, 2, 2); // eyes
        // squiggle mouth
        ctx.beginPath(); ctx.moveTo(-6, 6 + bob); ctx.lineTo(-3, 3 + bob); ctx.lineTo(0, 6 + bob); ctx.lineTo(3, 3 + bob); ctx.lineTo(6, 6 + bob);
        ctx.strokeStyle = '#FFB8AE'; ctx.lineWidth=2; ctx.stroke();
    }

    ctx.restore();
}

function drawText(txt, x, y, size, align='center', color='#FFF') {
    ctx.fillStyle = color; ctx.font = `${size}px monospace`; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.fillText(txt,x,y);
}

function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    
    if (state === STATE_TITLE) {
        drawText("PAC-MAN", W/2, H/3, 72, 'center', '#FF0');
        drawText("Arrows / WASD to move", W/2, H/2 - 20, 20);
        drawText("Eat all dots. Avoid Ghosts.", W/2, H/2 + 10, 20);
        drawText("Power Pellets let you eat ghosts.", W/2, H/2 + 40, 20);
        if (Math.floor(performance.now()/500)%2===0) drawText("Press Enter to Start", W/2, H*2/3, 24, 'center', '#FFF');
        return;
    }

    drawMaze();
    
    if (fruit) {
        drawText("🍒", fruit.x, fruit.y, 20);
    }
    
    if (state !== STATE_DYING && state !== STATE_LEVELCLEAR) {
        for (let g of ghosts) drawGhost(g);
    }
    
    if (state !== STATE_LEVELCLEAR) {
        drawPacman();
    }

    // HUD
    drawText(`SCORE: ${score}`, 20, 15, 20, 'left');
    drawText(`HIGH: ${highScore}`, W-20, 15, 20, 'right');
    
    // Lives bottom left
    for (let i=0; i<lives-1; i++) {
        ctx.fillStyle = '#FF0';
        ctx.beginPath(); ctx.arc(30 + i*24, H - 20, 10, 0.4, Math.PI*2 - 0.4); ctx.lineTo(30+i*24, H-20); ctx.fill();
    }
    drawText(`LEVEL ${level}`, W-20, H-20, 20, 'right', '#FFB8AE');

    // Overlays
    if (state === STATE_READY) {
        drawText("READY!", W/2, py(17), 24, 'center', '#FF0');
    } else if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
        drawText("PAUSED", W/2, H/2, 48);
    } else if (state === STATE_GAMEOVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
        drawText("GAME OVER", W/2, H/2 - 40, 64, 'center', '#F00');
        drawText(`Score: ${score}`, W/2, H/2 + 20, 24);
        drawText("Press Enter to Restart", W/2, H/2 + 80, 20, 'center', '#FFF');
    }
}

// --- Main Loop ---
function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1; // clamp

    if (state === STATE_READY) {
        stateTimer -= dt;
        if (stateTimer <= 0) state = STATE_PLAYING;
    } else if (state === STATE_PLAYING) {
        updatePlaying(dt);
    } else if (state === STATE_DYING) {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            if (lives <= 0) {
                state = STATE_GAMEOVER;
                if (score > highScore) localStorage.setItem('pacmanHigh', score);
            } else {
                resetActors();
                fruit = null;
                state = STATE_READY;
                stateTimer = 2.0;
            }
        }
    } else if (state === STATE_LEVELCLEAR) {
        stateTimer -= dt;
        if (stateTimer <= 0) {
            nextLevel();
        }
    }

    render();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
