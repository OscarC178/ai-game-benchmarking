<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pac-Man</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="700" height="780"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=700,H=780,T=24,COLS=28,ROWS=31,MX=14,MY=30;
const TAU=Math.PI*2,PI=Math.PI;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H)*0.95;cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';}
addEventListener('resize',resize);resize();

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function beep(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.05;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
let wakaHi=true;
function sndWaka(){beep(wakaHi?600:500,0.06,0.04,'sine');wakaHi=!wakaHi;}
function sndPower(){beep(200,0.3,0.06,'sine');}
function sndEat(){beep(800,0.1,0.08,'sine');}
function sndDie(){beep(300,0.1,0.06,'sawtooth');setTimeout(()=>beep(200,0.15,0.06,'sawtooth'),120);setTimeout(()=>beep(100,0.2,0.06,'sawtooth'),260);}

// Maze: 0=wall,1=path+dot,2=path empty,3=power pellet,4=ghost house,5=ghost door,6=tunnel
const MAZE_STR=[
'0000000000000000000000000000',
'0111111111111001111111111110',
'0100001000010010100001000010',
'0300001000010010100001000030',
'0100001000010010100001000010',
'0111111111111111111111111110',
'0100001001000000010010000010',
'0100001001000000010010000010',
'0111111001111001111001111110',
'0000001010000000001010000000',
'0000001010000000001010000000',
'0000001010002222001010000000',
'0000001000005500001010000000',
'6222221222204440221221222226',
'0000001000204440010010000000',
'0000001000204440010010000000',
'0000001010002222001010000000',
'0000001010000000001010000000',
'0000001010011111101010000000',
'0111111111110010111111111110',
'0100001000010010100001000010',
'0100001000010010100001000010',
'0311001111111111111111001130',
'0001001001000000010010010000',
'0001001001000000010010010000',
'0111111001111001111001111110',
'0100000000010010100000000010',
'0100000000010010100000000010',
'0111111111111111111111111110',
'0000000000000000000000000000',
'0000000000000000000000000000'
];

let maze,pelletCount,totalPellets;

function buildMaze(){
  maze=[];pelletCount=0;
  for(let r=0;r<ROWS;r++){
    maze[r]=[];
    const s=MAZE_STR[r]||'0'.repeat(COLS);
    for(let c=0;c<COLS;c++){
      const v=parseInt(s[c])||0;
      maze[r][c]={type:v,dot:v===1,power:v===3};
      if(v===1)pelletCount++;
      if(v===3)pelletCount++;
    }
  }
  totalPellets=pelletCount;
}

function isWalkable(c,r,isGhost,isEyes){
  if(r<0||r>=ROWS)return false;
  // Tunnel wrap
  if(c<0||c>=COLS){
    if(r===13)return true; // tunnel row
    return false;
  }
  const t=maze[r][c].type;
  if(t===0)return false;
  if(t===5){return isGhost;}// ghost door
  if(t===4){return isGhost;}// ghost house
  return true;
}

function tileCenter(c,r){return{x:MX+c*T+T/2,y:MY+r*T+T/2};}
function pixToTile(px,py){return{c:Math.floor((px-MX)/T),r:Math.floor((py-MY)/T)};}

const DIR={UP:{dx:0,dy:-1},DOWN:{dx:0,dy:1},LEFT:{dx:-1,dy:0},RIGHT:{dx:1,dy:0}};
const DIRS=[DIR.UP,DIR.DOWN,DIR.LEFT,DIR.RIGHT];
const OPP={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
function dirName(d){for(const n in DIR)if(DIR[n]===d)return n;return'';}

// Game state
const ST_TITLE=0,ST_READY=1,ST_PLAY=2,ST_PAUSE=3,ST_DYING=4,ST_LEVELCLEAR=5,ST_OVER=6;
let state=ST_TITLE,stateTimer=0;

let pac,ghosts,score,hiScore,lives,level,frightenedTimer,frightenedChain;
let modeSchedule,modeIndex,modeTimer,globalMode; // 'scatter' or 'chase'
let fruit,fruitTimer,eatenCount,globalTime;

hiScore=0;
try{const v=localStorage.getItem('pm_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('pm_best',String(hiScore));}catch(e){}}}

const SCHEDULE=[ // [mode, duration]
  ['scatter',7],['chase',20],['scatter',7],['chase',20],
  ['scatter',5],['chase',20],['scatter',5],['chase',9999]
];

function resetPositions(){
  pac={c:14,r:23,x:0,y:0,dir:DIR.LEFT,queued:null,speed:120,mouthAngle:0,mouthDir:1,alive:true};
  const tc=tileCenter(14,23);pac.x=tc.x;pac.y=tc.y;

  const ghostDefs=[
    {name:'blinky',color:'#FF0000',sc:14,sr:11,tc:25,tr:0,startOut:true},
    {name:'pinky',color:'#FFB8FF',sc:14,sr:14,tc:2,tr:0,release:0},
    {name:'inky',color:'#00FFFF',sc:12,sr:14,tc:27,tr:30,release:30},
    {name:'clyde',color:'#FFB852',sc:16,sr:14,tc:0,tr:30,release:60}
  ];
  ghosts=ghostDefs.map(d=>{
    const tc2=tileCenter(d.sc,d.sr);
    return{
      name:d.name,color:d.color,
      c:d.sc,r:d.sr,x:tc2.x,y:tc2.y,
      dir:DIR.UP,speed:110,
      state:d.startOut?'active':'house', // active, house, frightened, eyes
      scatterTarget:{c:d.tc,r:d.tr},
      releaseAt:d.release||0,
      homeC:14,homeR:11
    };
  });
  modeIndex=0;modeTimer=SCHEDULE[0][1];globalMode=SCHEDULE[0][0];
  frightenedTimer=0;frightenedChain=0;
  fruit=null;fruitTimer=0;
}

function startGame(){
  buildMaze();score=0;lives=3;level=1;eatenCount=0;globalTime=0;
  resetPositions();
  state=ST_READY;stateTimer=2;
}

function nextLevel(){
  level++;buildMaze();eatenCount=0;
  resetPositions();
  state=ST_READY;stateTimer=2;
}

// Input
const keys={},justP={};
addEventListener('keydown',e=>{if(!keys[e.code])justP[e.code]=true;keys[e.code]=true;ia();e.preventDefault();
  if(e.code==='Enter'){if(state===ST_TITLE||state===ST_OVER)startGame();}
  if(e.code==='KeyP'){if(state===ST_PLAY)state=ST_PAUSE;else if(state===ST_PAUSE)state=ST_PLAY;}
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function getInputDir(){
  if(keys['ArrowUp']||keys['KeyW'])return DIR.UP;
  if(keys['ArrowDown']||keys['KeyS'])return DIR.DOWN;
  if(keys['ArrowLeft']||keys['KeyA'])return DIR.LEFT;
  if(keys['ArrowRight']||keys['KeyD'])return DIR.RIGHT;
  return null;
}

function wrapC(c){
  if(c<0)return COLS-1;if(c>=COLS)return 0;return c;
}

function canMove(c,r,dir,isGhost,isEyes){
  const nc=c+dir.dx,nr=r+dir.dy;
  return isWalkable(wrapC(nc),nr,isGhost,isEyes);
}

function moveActor(a,dt,isGhost,ghostState){
  const spd=a.speed*dt;
  const tc=tileCenter(a.c,a.r);
  const isEyes=ghostState==='eyes';

  // Move toward tile center then decide at center
  let nx=a.x+a.dir.dx*spd;
  let ny=a.y+a.dir.dy*spd;

  // Check if we crossed the tile center
  const prevDist=Math.abs(a.x-tc.x)+Math.abs(a.y-tc.y);
  const newDist=Math.abs(nx-tc.x)+Math.abs(ny-tc.y);
  const crossed=prevDist>1&&newDist<=1||
    (a.dir.dx>0&&a.x<=tc.x&&nx>=tc.x)||
    (a.dir.dx<0&&a.x>=tc.x&&nx<=tc.x)||
    (a.dir.dy>0&&a.y<=tc.y&&ny>=tc.y)||
    (a.dir.dy<0&&a.y>=tc.y&&ny<=tc.y);

  if(crossed){
    // Snap to center, then try next tile
    const remainder=spd-prevDist;
    a.x=tc.x;a.y=tc.y;

    // Try queued direction first (pac-man)
    let turned=false;
    if(!isGhost&&a.queued&&canMove(a.c,a.r,a.queued,false,false)){
      a.dir=a.queued;a.queued=null;turned=true;
    }

    // Check next tile in current dir
    const nc=a.c+a.dir.dx,nr=a.r+a.dir.dy;
    const wnc=wrapC(nc);
    if(isWalkable(wnc,nr,isGhost,isEyes)){
      a.c=wnc;a.r=nr;
      // Handle tunnel wrap
      if(nc<0){a.x=MX+COLS*T+T/2;a.c=COLS-1;}
      else if(nc>=COLS){a.x=MX-T/2;a.c=0;}
      else{
        a.x+=a.dir.dx*Math.max(0,remainder);
        a.y+=a.dir.dy*Math.max(0,remainder);
      }
    }
    // else: blocked, stay at center
  }else{
    // Check we're not going to enter a wall tile
    const nc=a.c+a.dir.dx,nr=a.r+a.dir.dy;
    const wnc=wrapC(nc);
    // Only allow movement toward center or if next tile valid
    const towardCenter=(a.dir.dx!==0&&Math.sign(tc.x-a.x)===Math.sign(a.dir.dx))||
                       (a.dir.dy!==0&&Math.sign(tc.y-a.y)===Math.sign(a.dir.dy));
    if(towardCenter||isWalkable(wnc,nr,isGhost,isEyes)){
      a.x=nx;a.y=ny;
    }

    // Pac-Man: try queued dir with tolerance
    if(!isGhost&&a.queued){
      const distToCenter=Math.abs(a.x-tc.x)+Math.abs(a.y-tc.y);
      if(distToCenter<6&&canMove(a.c,a.r,a.queued,false,false)){
        a.x=tc.x;a.y=tc.y;a.dir=a.queued;a.queued=null;
      }
    }
  }

  // Tunnel x wrap
  if(a.x<MX-T)a.x+=COLS*T;
  if(a.x>MX+COLS*T)a.x-=COLS*T;
  // Update tile from position
  const pt=pixToTile(a.x,a.y);
  if(pt.c>=0&&pt.c<COLS&&pt.r>=0&&pt.r<ROWS){a.c=pt.c;a.r=pt.r;}
}

function ghostTarget(g){
  if(g.state==='eyes')return{c:g.homeC,r:g.homeR};
  if(g.state==='frightened')return{c:Math.floor(Math.random()*COLS),r:Math.floor(Math.random()*ROWS)};
  if(globalMode==='scatter')return g.scatterTarget;

  // Chase targets
  if(g.name==='blinky')return{c:pac.c,r:pac.r};
  if(g.name==='pinky'){return{c:pac.c+pac.dir.dx*4,r:pac.r+pac.dir.dy*4};}
  if(g.name==='inky'){
    const blinky=ghosts[0];
    const ax=pac.c+pac.dir.dx*2,ay=pac.r+pac.dir.dy*2;
    return{c:ax+(ax-blinky.c),r:ay+(ay-blinky.r)};
  }
  if(g.name==='clyde'){
    const d=Math.abs(g.c-pac.c)+Math.abs(g.r-pac.r);
    if(d>8)return{c:pac.c,r:pac.r};
    return g.scatterTarget;
  }
  return{c:pac.c,r:pac.r};
}

function ghostChooseDir(g){
  const target=ghostTarget(g);
  const isEyes=g.state==='eyes';
  const isGhost=true;
  let bestDist=Infinity,bestDir=g.dir;
  const curName=dirName(g.dir);

  for(const d of DIRS){
    const dn=dirName(d);
    // No reverse unless forced
    if(dn===OPP[curName]&&g.state!=='frightened')continue;
    const nc=wrapC(g.c+d.dx),nr=g.r+d.dy;
    if(!isWalkable(nc,nr,isGhost,isEyes))continue;
    const dx=nc-target.c,dy=nr-target.r;
    const dist=dx*dx+dy*dy;
    if(dist<bestDist){bestDist=dist;bestDir=d;}
  }
  g.dir=bestDir;
}

function update(dt){
  globalTime+=dt;

  if(state===ST_READY){stateTimer-=dt;if(stateTimer<=0)state=ST_PLAY;return;}
  if(state===ST_DYING){stateTimer-=dt;if(stateTimer<=0){
    if(lives<=0){state=ST_OVER;saveHi();return;}
    resetPositions();state=ST_READY;stateTimer=1.5;
  }return;}
  if(state===ST_LEVELCLEAR){stateTimer-=dt;if(stateTimer<=0)nextLevel();return;}
  if(state!==ST_PLAY)return;

  // Input
  const inputDir=getInputDir();
  if(inputDir)pac.queued=inputDir;

  // Pac movement
  moveActor(pac,dt,false,null);

  // Mouth anim
  pac.mouthAngle+=pac.mouthDir*dt*12;
  if(pac.mouthAngle>0.8){pac.mouthAngle=0.8;pac.mouthDir=-1;}
  if(pac.mouthAngle<0.05){pac.mouthAngle=0.05;pac.mouthDir=1;}

  // Pellet eating
  const cell=maze[pac.r]&&maze[pac.r][pac.c];
  if(cell){
    if(cell.dot){cell.dot=false;score+=10;pelletCount--;eatenCount++;sndWaka();saveHi();}
    if(cell.power){cell.power=false;score+=50;pelletCount--;eatenCount++;
      frightenedTimer=Math.max(4,8-(level-1)*2);frightenedChain=0;
      sndPower();saveHi();
      for(const g of ghosts){
        if(g.state==='active'||g.state==='frightened'){
          g.state='frightened';g.speed=60;
          g.dir=DIR[OPP[dirName(g.dir)]]||g.dir;
        }
      }
    }
  }

  // Fruit
  if(!fruit&&(eatenCount===70||eatenCount===170)){
    const fc=tileCenter(14,17);
    fruit={x:fc.x,y:fc.y,timer:10};
  }
  if(fruit){
    fruit.timer-=dt;
    if(fruit.timer<=0)fruit=null;
    else if(Math.abs(pac.x-fruit.x)<12&&Math.abs(pac.y-fruit.y)<12){
      score+=100*level;saveHi();sndEat();fruit=null;
    }
  }

  // Mode timer
  if(frightenedTimer>0){
    frightenedTimer-=dt;
    if(frightenedTimer<=0){
      for(const g of ghosts){
        if(g.state==='frightened'){g.state='active';g.speed=110;}
      }
    }
  }else{
    modeTimer-=dt;
    if(modeTimer<=0&&modeIndex<SCHEDULE.length-1){
      modeIndex++;
      globalMode=SCHEDULE[modeIndex][0];
      modeTimer=SCHEDULE[modeIndex][1];
      // Reverse active ghosts
      for(const g of ghosts){
        if(g.state==='active')g.dir=DIR[OPP[dirName(g.dir)]]||g.dir;
      }
    }
  }

  // Ghost release
  for(const g of ghosts){
    if(g.state==='house'&&eatenCount>=g.releaseAt){
      g.state='active';g.r=11;g.c=14;
      const tc2=tileCenter(14,11);g.x=tc2.x;g.y=tc2.y;g.dir=DIR.LEFT;
    }
  }

  // Ghost movement
  for(const g of ghosts){
    if(g.state==='house')continue;

    const prevC=g.c,prevR=g.r;
    g.speed=g.state==='eyes'?200:g.state==='frightened'?60:110;
    moveActor(g,dt,true,g.state);

    // Choose direction at tile center
    if(g.c!==prevC||g.r!==prevR){
      ghostChooseDir(g);
    }

    // Eyes reached home
    if(g.state==='eyes'&&g.c===g.homeC&&g.r===g.homeR){
      g.state='active';g.speed=110;
    }
  }

  // Collision pac vs ghosts
  for(const g of ghosts){
    if(g.state==='house'||g.state==='eyes')continue;
    const d=Math.hypot(pac.x-g.x,pac.y-g.y);
    if(d<16){
      if(g.state==='frightened'){
        g.state='eyes';g.speed=200;
        frightenedChain++;
        const pts=[200,400,800,1600];
        score+=pts[Math.min(frightenedChain-1,3)];saveHi();sndEat();
      }else{
        // Die
        pac.alive=false;lives--;sndDie();
        state=ST_DYING;stateTimer=1.5;return;
      }
    }
  }

  // Level clear
  if(pelletCount<=0){
    state=ST_LEVELCLEAR;stateTimer=2;
  }

  for(const k in justP)delete justP[k];
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#ff0';cx.font='bold 52px monospace';cx.textAlign='center';
    cx.fillText('PAC-MAN',W/2,200);
    cx.fillStyle='#ccc';cx.font='15px monospace';
    cx.fillText('Navigate the maze and eat every dot.',W/2,300);
    cx.fillText('Avoid ghosts — power pellets let you eat them!',W/2,326);
    cx.fillText('Tunnels on the sides wrap around.',W/2,352);
    cx.fillText('Arrow Keys or WASD to move. P to pause.',W/2,400);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',W/2,490);
    if(hiScore>0){cx.fillStyle='#888';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,560);}
    return;
  }

  // Draw maze
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=maze[r][c];
      const px=MX+c*T,py=MY+r*T;
      if(cell.type===0){
        // Wall - draw blue border segments
        cx.fillStyle='#11c';
        // Check neighbors to draw walls nicely
        const hasPathN=r>0&&maze[r-1][c].type!==0;
        const hasPathS=r<ROWS-1&&maze[r+1][c].type!==0;
        const hasPathW=c>0&&maze[r][c-1].type!==0;
        const hasPathE=c<COLS-1&&maze[r][c+1].type!==0;
        cx.fillRect(px+2,py+2,T-4,T-4);
        // Edges toward paths
        if(hasPathN){cx.fillStyle='#33f';cx.fillRect(px+4,py,T-8,4);}
        if(hasPathS){cx.fillStyle='#33f';cx.fillRect(px+4,py+T-4,T-8,4);}
        if(hasPathW){cx.fillStyle='#33f';cx.fillRect(px,py+4,4,T-8);}
        if(hasPathE){cx.fillStyle='#33f';cx.fillRect(px+T-4,py+4,4,T-8);}
        cx.fillStyle='#11c';
      }
      // Dots
      if(cell.dot){
        cx.fillStyle='#ffb8a0';
        cx.beginPath();cx.arc(px+T/2,py+T/2,2.5,0,TAU);cx.fill();
      }
      if(cell.power){
        cx.fillStyle=Math.floor(globalTime*4)%2?'#ffb8a0':'#ff6';
        cx.beginPath();cx.arc(px+T/2,py+T/2,6,0,TAU);cx.fill();
      }
    }
  }

  // Fruit
  if(fruit){
    cx.fillStyle='#f22';
    cx.beginPath();cx.arc(fruit.x,fruit.y,8,0,TAU);cx.fill();
    cx.fillStyle='#0a0';cx.fillRect(fruit.x-2,fruit.y-11,4,5);
  }

  // Ghosts
  for(const g of ghosts){
    if(g.state==='house'&&state===ST_TITLE)continue;
    drawGhost(g);
  }

  // Pac-Man
  if(pac.alive||state===ST_DYING){
    drawPac();
  }

  // HUD
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('SCORE: '+score,10,22);
  cx.textAlign='right';
  cx.fillText('BEST: '+hiScore,W-10,22);
  cx.textAlign='center';
  cx.fillText('L'+level,W/2,22);
  // Lives
  for(let i=0;i<lives;i++){
    cx.fillStyle='#ff0';cx.beginPath();
    cx.arc(30+i*28,H-20,9,0.25*PI,1.75*PI);cx.lineTo(30+i*28,H-20);cx.fill();
  }

  // Overlays
  if(state===ST_READY){
    cx.fillStyle='#ff0';cx.font='bold 24px monospace';cx.textAlign='center';
    cx.fillText('READY!',W/2,MY+17.5*T);
  }
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2);
    cx.font='16px monospace';cx.fillStyle='#aaa';cx.fillText('Press P to Resume',W/2,H/2+35);
  }
  if(state===ST_LEVELCLEAR){
    cx.fillStyle='#fff';cx.font='bold 30px monospace';cx.textAlign='center';
    if(Math.floor(globalTime*4)%2)cx.fillText('LEVEL CLEAR!',W/2,MY+17.5*T);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+40);}
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+80);
  }
}

function drawPac(){
  cx.save();cx.translate(pac.x,pac.y);
  let angle=0;
  if(pac.dir===DIR.RIGHT)angle=0;
  else if(pac.dir===DIR.DOWN)angle=PI/2;
  else if(pac.dir===DIR.LEFT)angle=PI;
  else if(pac.dir===DIR.UP)angle=-PI/2;
  cx.fillStyle='#ff0';
  cx.beginPath();
  cx.arc(0,0,11,angle+pac.mouthAngle,angle+TAU-pac.mouthAngle);
  cx.lineTo(0,0);
  cx.fill();
  cx.restore();
}

function drawGhost(g){
  if(g.state==='house')return;
  cx.save();cx.translate(g.x,g.y);

  let bodyColor=g.color;
  if(g.state==='frightened'){
    bodyColor=(frightenedTimer<2&&Math.floor(globalTime*6)%2)?'#fff':'#2222ff';
  }
  if(g.state==='eyes'){
    // Just eyes
    drawEyes(g);cx.restore();return;
  }

  // Body
  cx.fillStyle=bodyColor;
  cx.beginPath();
  cx.arc(0,-2,11,PI,0);
  cx.lineTo(11,8);
  // Scalloped bottom
  for(let i=0;i<3;i++){
    const bx=11-i*7.33;
    cx.quadraticCurveTo(bx-1.8,14,bx-3.67,8);
  }
  cx.closePath();cx.fill();

  drawEyes(g);
  cx.restore();
}

function drawEyes(g){
  // Eye direction
  let ex=0,ey=0;
  if(g.dir===DIR.LEFT){ex=-2;}
  else if(g.dir===DIR.RIGHT){ex=2;}
  else if(g.dir===DIR.UP){ey=-2;}
  else if(g.dir===DIR.DOWN){ey=2;}

  if(g.state==='frightened'){
    cx.fillStyle='#fff';
    cx.fillRect(-5,-5,3,3);cx.fillRect(2,-5,3,3);
    return;
  }

  // White sclera
  cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(-4,-3,4,5,0,0,TAU);cx.fill();
  cx.beginPath();cx.ellipse(4,-3,4,5,0,0,TAU);cx.fill();
  // Pupils
  cx.fillStyle='#00f';
  cx.beginPath();cx.arc(-4+ex,-3+ey,2,0,TAU);cx.fill();
  cx.beginPath();cx.arc(4+ex,-3+ey,2,0,TAU);cx.fill();
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
