<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 700;
    const H = 780;
    canvas.width = W;
    canvas.height = H;
    
    const TILE = 24;
    const MAZE_X = 14;
    const MAZE_Y = 30;
    const COLS = 28;
    const ROWS = 31;
    
    // Tile types
    const WALL = 1;
    const EMPTY = 0;
    const PELLET = 2;
    const POWER = 3;
    const GHOST_HOUSE = 4;
    const GHOST_DOOR = 5;
    const TUNNEL = 6;
    
    // Directions
    const UP = { x: 0, y: -1 };
    const DOWN = { x: 0, y: 1 };
    const LEFT = { x: -1, y: 0 };
    const RIGHT = { x: 1, y: 0 };
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_READY = 1;
    const STATE_PLAYING = 2;
    const STATE_PAUSED = 3;
    const STATE_DEAD = 4;
    const STATE_LEVEL_CLEAR = 5;
    const STATE_GAMEOVER = 6;
    
    // Ghost states
    const GHOST_CHASE = 0;
    const GHOST_SCATTER = 1;
    const GHOST_FRIGHTENED = 2;
    const GHOST_EATEN = 3;
    const GHOST_HOUSE = 4;
    const GHOST_LEAVING = 5;
    
    // ==================== MAZE DEFINITION ====================
    // Classic Pac-Man maze layout (simplified but authentic)
    const MAZE_TEMPLATE = [
      "1111111111111111111111111111",
      "1222222222222112222222222221",
      "1211112111112112111112111121",
      "1311112111112112111112111131",
      "1211112111112112111112111121",
      "1222222222222222222222222221",
      "1211112112111111112112111121",
      "1211112112111111112112111121",
      "1222222112222112222112222221",
      "1111112111110110111112111111",
      "0000012111110110111112100000",
      "0000012110000000001112100000",
      "0000012110111441110112100000",
      "1111112110154444510112111111",
      "6000022000144444410002200006",
      "1111112110144444410112111111",
      "0000012110111111110112100000",
      "0000012110000000001112100000",
      "0000012110111111110112100000",
      "1111112110111111110112111111",
      "1222222222222112222222222221",
      "1211112111112112111112111121",
      "1211112111112112111112111121",
      "1322112222222002222222112231",
      "1112112112111111112112112111",
      "1112112112111111112112112111",
      "1222222112222112222112222221",
      "1211111111112112111111111121",
      "1211111111112112111111111121",
      "1222222222222222222222222221",
      "1111111111111111111111111111"
    ];
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let level = 1;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('pacman_highscore') || '0');
    let lives = 3;
    let pelletsEaten = 0;
    let totalPellets = 240;
    let frightenedTimer = 0;
    let frightenedDuration = 8000;
    let globalModeTimer = 0;
    let globalModeIndex = 0;
    let ghostEatenChain = 0;
    let fruit = null;
    let fruitTimer = 0;
    let readyTimer = 0;
    let deadTimer = 0;
    let levelClearTimer = 0;
    
    // Ghost mode schedule (scatter/chase alternating)
    const MODE_SCHEDULE = [
      { mode: GHOST_SCATTER, duration: 7000 },
      { mode: GHOST_CHASE, duration: 20000 },
      { mode: GHOST_SCATTER, duration: 7000 },
      { mode: GHOST_CHASE, duration: 20000 },
      { mode: GHOST_SCATTER, duration: 5000 },
      { mode: GHOST_CHASE, duration: 20000 },
      { mode: GHOST_SCATTER, duration: 5000 },
      { mode: GHOST_CHASE, duration: Infinity }
    ];
    
    // Maze grid
    let maze = [];
    let pelletCount = 0;
    
    // Pac-Man
    let pacman = {
      x: 14 * TILE + TILE/2,
      y: 23 * TILE + TILE/2 + MAZE_Y,
      dir: LEFT,
      nextDir: null,
      speed: 120,
      mouthAngle: 0,
      mouthOpen: true
    };
    
    // Ghosts
    let ghosts = [];
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    let wakaPhase = 0;
    
    // Input
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initMaze() {
      maze = [];
      pelletCount = 0;
      
      for (let row = 0; row < ROWS; row++) {
        maze[row] = [];
        for (let col = 0; col < COLS; col++) {
          const char = MAZE_TEMPLATE[row][col];
          let tile = EMPTY;
          
          switch (char) {
            case '1': tile = WALL; break;
            case '2': tile = PELLET; pelletCount++; break;
            case '3': tile = POWER; pelletCount++; break;
            case '4': tile = GHOST_HOUSE; break;
            case '5': tile = GHOST_DOOR; break;
            case '6': tile = TUNNEL; break;
            default: tile = EMPTY;
          }
          
          maze[row][col] = tile;
        }
      }
    }
    
    function initGhosts() {
      ghosts = [
        {
          name: 'Blinky',
          color: '#FF0000',
          x: 14 * TILE + TILE/2,
          y: 11 * TILE + TILE/2 + MAZE_Y,
          dir: LEFT,
          state: GHOST_CHASE,
          speed: 110,
          scatterTarget: { x: COLS - 3, y: 0 },
          release: 0,
          releaseCount: 0
        },
        {
          name: 'Pinky',
          color: '#FFB8FF',
          x: 14 * TILE + TILE/2,
          y: 14 * TILE + TILE/2 + MAZE_Y,
          dir: UP,
          state: GHOST_HOUSE,
          speed: 110,
          scatterTarget: { x: 2, y: 0 },
          release: 0,
          releaseCount: 0
        },
        {
          name: 'Inky',
          color: '#00FFFF',
          x: 12 * TILE + TILE/2,
          y: 14 * TILE + TILE/2 + MAZE_Y,
          dir: UP,
          state: GHOST_HOUSE,
          speed: 110,
          scatterTarget: { x: COLS - 1, y: ROWS - 1 },
          release: 30,
          releaseCount: 0
        },
        {
          name: 'Clyde',
          color: '#FFB852',
          x: 16 * TILE + TILE/2,
          y: 14 * TILE + TILE/2 + MAZE_Y,
          dir: UP,
          state: GHOST_HOUSE,
          speed: 110,
          scatterTarget: { x: 0, y: ROWS - 1 },
          release: 60,
          releaseCount: 0
        }
      ];
    }
    
    function resetPositions() {
      pacman.x = 14 * TILE + TILE/2;
      pacman.y = 23 * TILE + TILE/2 + MAZE_Y;
      pacman.dir = LEFT;
      pacman.nextDir = null;
      
      initGhosts();
      
      globalModeIndex = 0;
      globalModeTimer = 0;
      frightenedTimer = 0;
      ghostEatenChain = 0;
    }
    
    function startGame() {
      level = 1;
      score = 0;
      lives = 3;
      pelletsEaten = 0;
      frightenedDuration = 8000;
      
      initMaze();
      resetPositions();
      
      state = STATE_READY;
      readyTimer = 2000;
    }
    
    function nextLevel() {
      level++;
      pelletsEaten = 0;
      frightenedDuration = Math.max(3000, frightenedDuration - 500);
      
      initMaze();
      resetPositions();
      
      state = STATE_READY;
      readyTimer = 2000;
    }
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.06) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playWaka() {
      playTone(wakaPhase ? 400 : 500, 0.03, 'square', 0.04);
      wakaPhase = !wakaPhase;
    }
    
    function playPower() { playTone(200, 0.15, 'sine', 0.08); }
    function playEatGhost() { playTone(800, 0.1, 'sine', 0.1); }
    function playDeath() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => playTone(400 - i * 60, 0.15, 'square', 0.08), i * 150);
      }
    }
    
    // ==================== UTILITIES ====================
    function getTile(x, y) {
      const col = Math.floor((x - MAZE_X) / TILE);
      const row = Math.floor((y - MAZE_Y) / TILE);
      
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return WALL;
      return maze[row][col];
    }
    
    function getTileAt(col, row) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return WALL;
      return maze[row][col];
    }
    
    function isWall(tile) {
      return tile === WALL;
    }
    
    function isWalkable(tile) {
      return tile !== WALL && tile !== GHOST_HOUSE;
    }
    
    function canWalk(x, y, dir, isGhost = false) {
      const nx = x + dir.x * TILE/2;
      const ny = y + dir.y * TILE/2;
      const tile = getTile(nx, ny);
      
      if (isGhost) return tile !== WALL;
      return isWalkable(tile);
    }
    
    function distance(x1, y1, x2, y2) {
      return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    }
    
    function getOppositeDir(dir) {
      if (dir === UP) return DOWN;
      if (dir === DOWN) return UP;
      if (dir === LEFT) return RIGHT;
      if (dir === RIGHT) return LEFT;
      return dir;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_TITLE) {
        if (keys['Enter']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      if (state === STATE_READY) {
        readyTimer -= dtMs;
        if (readyTimer <= 0) {
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state === STATE_PAUSED) {
        if (keys['KeyP']) {
          state = STATE_PLAYING;
          keys['KeyP'] = false;
        }
        return;
      }
      
      if (state === STATE_DEAD) {
        deadTimer -= dtMs;
        if (deadTimer <= 0) {
          if (lives > 0) {
            resetPositions();
            state = STATE_READY;
            readyTimer = 1500;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('pacman_highscore', highScore);
            }
          }
        }
        return;
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dtMs;
        if (levelClearTimer <= 0) {
          nextLevel();
        }
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter']) {
          startGame();
          keys['Enter'] = false;
        }
        return;
      }
      
      // Playing
      if (keys['KeyP']) {
        state = STATE_PAUSED;
        keys['KeyP'] = false;
        return;
      }
      
      // Update Pac-Man
      updatePacman(dt);
      
      // Update global ghost mode
      updateGlobalMode(dtMs);
      
      // Update frightened timer
      if (frightenedTimer > 0) {
        frightenedTimer -= dtMs;
        if (frightenedTimer <= 0) {
          frightenedTimer = 0;
          ghostEatenChain = 0;
          for (const ghost of ghosts) {
            if (ghost.state === GHOST_FRIGHTENED) {
              ghost.state = MODE_SCHEDULE[globalModeIndex].mode;
            }
          }
        }
      }
      
      // Update ghosts
      for (const ghost of ghosts) {
        updateGhost(ghost, dt);
      }
      
      // Check collisions
      checkCollisions();
      
      // Update fruit
      if (fruit) {
        fruitTimer -= dtMs;
        if (fruitTimer <= 0) {
          fruit = null;
        }
      } else if ((pelletsEaten === 70 || pelletsEaten === 170) && !fruit) {
        fruit = { x: 14 * TILE + TILE/2, y: 17 * TILE + TILE/2 + MAZE_Y };
        fruitTimer = 10000;
      }
      
      // Check level complete
      if (pelletCount === 0) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
      }
    }
    
    function updatePacman(dt) {
      // Handle input
      if (keys['ArrowUp'] || keys['KeyW']) pacman.nextDir = UP;
      if (keys['ArrowDown'] || keys['KeyS']) pacman.nextDir = DOWN;
      if (keys['ArrowLeft'] || keys['KeyA']) pacman.nextDir = LEFT;
      if (keys['ArrowRight'] || keys['KeyD']) pacman.nextDir = RIGHT;
      
      // Try to turn
      if (pacman.nextDir && canWalk(pacman.x, pacman.y, pacman.nextDir)) {
        // Check if near tile center
        const col = Math.round((pacman.x - MAZE_X - TILE/2) / TILE);
        const row = Math.round((pacman.y - MAZE_Y - TILE/2) / TILE);
        const centerX = col * TILE + TILE/2 + MAZE_X;
        const centerY = row * TILE + TILE/2 + MAZE_Y;
        
        if (distance(pacman.x, pacman.y, centerX, centerY) < 4) {
          pacman.x = centerX;
          pacman.y = centerY;
          pacman.dir = pacman.nextDir;
          pacman.nextDir = null;
        }
      }
      
      // Move
      if (canWalk(pacman.x, pacman.y, pacman.dir)) {
        pacman.x += pacman.dir.x * pacman.speed * dt;
        pacman.y += pacman.dir.y * pacman.speed * dt;
      }
      
      // Tunnel wrap
      if (pacman.x < MAZE_X - TILE/2) {
        pacman.x = MAZE_X + COLS * TILE + TILE/2;
      } else if (pacman.x > MAZE_X + COLS * TILE + TILE/2) {
        pacman.x = MAZE_X - TILE/2;
      }
      
      // Animate mouth
      pacman.mouthAngle += 8 * dt;
      if (pacman.mouthAngle > 0.5) {
        pacman.mouthAngle = 0;
        pacman.mouthOpen = !pacman.mouthOpen;
      }
    }
    
    function updateGlobalMode(dtMs) {
      if (frightenedTimer > 0) return;
      
      globalModeTimer += dtMs;
      
      while (globalModeIndex < MODE_SCHEDULE.length - 1) {
        const current = MODE_SCHEDULE[globalModeIndex];
        if (globalModeTimer >= current.duration) {
          globalModeTimer -= current.duration;
          globalModeIndex++;
          
          // Reverse ghost directions on mode change
          for (const ghost of ghosts) {
            if (ghost.state === GHOST_CHASE || ghost.state === GHOST_SCATTER) {
              ghost.dir = getOppositeDir(ghost.dir);
            }
          }
        } else {
          break;
        }
      }
    }
    
    function updateGhost(ghost, dt) {
      // Release logic
      if (ghost.state === GHOST_HOUSE) {
        if (pelletsEaten >= ghost.release) {
          ghost.state = GHOST_LEAVING;
        } else {
          return;
        }
      }
      
      // Leaving house
      if (ghost.state === GHOST_LEAVING) {
        ghost.y -= ghost.speed * dt;
        if (ghost.y <= 11 * TILE + TILE/2 + MAZE_Y) {
          ghost.y = 11 * TILE + TILE/2 + MAZE_Y;
          ghost.state = MODE_SCHEDULE[globalModeIndex].mode;
        }
        return;
      }
      
      // Eyes returning
      if (ghost.state === GHOST_EATEN) {
        const targetX = 14 * TILE + TILE/2 + MAZE_X;
        const targetY = 14 * TILE + TILE/2 + MAZE_Y;
        
        ghost.x += (targetX - ghost.x) * 0.1;
        ghost.y += (targetY - ghost.y) * 0.1;
        
        if (distance(ghost.x, ghost.y, targetX, targetY) < 5) {
          ghost.state = GHOST_LEAVING;
        }
        return;
      }
      
      // Get current tile
      const col = Math.round((ghost.x - MAZE_X - TILE/2) / TILE);
      const row = Math.round((ghost.y - MAZE_Y - TILE/2) / TILE);
      
      // At intersection - choose new direction
      const centerX = col * TILE + TILE/2 + MAZE_X;
      const centerY = row * TILE + TILE/2 + MAZE_Y;
      
      if (distance(ghost.x, ghost.y, centerX, centerY) < 2) {
        ghost.x = centerX;
        ghost.y = centerY;
        
        // Choose target
        let target;
        const currentMode = frightenedTimer > 0 ? GHOST_FRIGHTENED : MODE_SCHEDULE[globalModeIndex].mode;
        
        if (ghost.state === GHOST_FRIGHTENED) {
          // Random direction
          const dirs = [];
          for (const d of [UP, DOWN, LEFT, RIGHT]) {
            if (d !== getOppositeDir(ghost.dir) && canWalk(ghost.x, ghost.y, d, true)) {
              dirs.push(d);
            }
          }
          if (dirs.length > 0) {
            ghost.dir = dirs[Math.floor(Math.random() * dirs.length)];
          }
          return;
        } else if (ghost.state === GHOST_CHASE) {
          target = getChaseTarget(ghost);
        } else {
          target = ghost.scatterTarget;
        }
        
        // Choose best direction toward target
        let bestDir = ghost.dir;
        let bestDist = Infinity;
        
        for (const d of [UP, DOWN, LEFT, RIGHT]) {
          if (d === getOppositeDir(ghost.dir)) continue;
          
          const nx = ghost.x + d.x * TILE;
          const ny = ghost.y + d.y * TILE;
          const tile = getTile(nx, ny);
          
          if (tile === WALL) continue;
          if (tile === GHOST_HOUSE && ghost.state !== GHOST_EATEN) continue;
          
          const dist = distance(nx, ny, 
            target.x * TILE + TILE/2 + MAZE_X,
            target.y * TILE + TILE/2 + MAZE_Y);
          
          if (dist < bestDist) {
            bestDist = dist;
            bestDir = d;
          }
        }
        
        ghost.dir = bestDir;
      }
      
      // Move
      let speed = ghost.speed;
      if (ghost.state === GHOST_FRIGHTENED) speed = 60;
      if (ghost.state === GHOST_EATEN) speed = 200;
      
      // Tunnel slow
      if (col <= 1 || col >= COLS - 2) speed *= 0.6;
      
      ghost.x += ghost.dir.x * speed * dt;
      ghost.y += ghost.dir.y * speed * dt;
      
      // Tunnel wrap
      if (ghost.x < MAZE_X - TILE/2) {
        ghost.x = MAZE_X + COLS * TILE + TILE/2;
      } else if (ghost.x > MAZE_X + COLS * TILE + TILE/2) {
        ghost.x = MAZE_X - TILE/2;
      }
    }
    
    function getChaseTarget(ghost) {
      const pacCol = Math.round((pacman.x - MAZE_X - TILE/2) / TILE);
      const pacRow = Math.round((pacman.y - MAZE_Y - TILE/2) / TILE);
      
      switch (ghost.name) {
        case 'Blinky':
          return { x: pacCol, y: pacRow };
          
        case 'Pinky':
          return {
            x: pacCol + pacman.dir.x * 4,
            y: pacRow + pacman.dir.y * 4
          };
          
        case 'Inky': {
          const blinky = ghosts[0];
          const blinkyCol = Math.round((blinky.x - MAZE_X - TILE/2) / TILE);
          const blinkyRow = Math.round((blinky.y - MAZE_Y - TILE/2) / TILE);
          const aheadX = pacCol + pacman.dir.x * 2;
          const aheadY = pacRow + pacman.dir.y * 2;
          return {
            x: aheadX + (aheadX - blinkyCol),
            y: aheadY + (aheadY - blinkyRow)
          };
        }
        
        case 'Clyde': {
          const dist = distance(ghost.x, ghost.y, pacman.x, pacman.y);
          if (dist > 8 * TILE) {
            return { x: pacCol, y: pacRow };
          }
          return ghost.scatterTarget;
        }
        
        default:
          return { x: pacCol, y: pacRow };
      }
    }
    
    function checkCollisions() {
      const col = Math.round((pacman.x - MAZE_X - TILE/2) / TILE);
      const row = Math.round((pacman.y - MAZE_Y - TILE/2) / TILE);
      
      // Pellet collision
      if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
        const tile = maze[row][col];
        
        if (tile === PELLET) {
          maze[row][col] = EMPTY;
          score += 10;
          pelletsEaten++;
          pelletCount--;
          playWaka();
        } else if (tile === POWER) {
          maze[row][col] = EMPTY;
          score += 50;
          pelletsEaten++;
          pelletCount--;
          
          frightenedTimer = frightenedDuration;
          ghostEatenChain = 0;
          
          for (const ghost of ghosts) {
            if (ghost.state !== GHOST_EATEN && ghost.state !== GHOST_HOUSE && ghost.state !== GHOST_LEAVING) {
              ghost.state = GHOST_FRIGHTENED;
              ghost.dir = getOppositeDir(ghost.dir);
            }
          }
          
          playPower();
        }
      }
      
      // Ghost collision
      for (const ghost of ghosts) {
        if (ghost.state === GHOST_HOUSE || ghost.state === GHOST_LEAVING || ghost.state === GHOST_EATEN) continue;
        
        const dist = distance(pacman.x, pacman.y, ghost.x, ghost.y);
        
        if (dist < 16) {
          if (ghost.state === GHOST_FRIGHTENED) {
            ghost.state = GHOST_EATEN;
            ghostEatenChain++;
            score += [200, 400, 800, 1600][ghostEatenChain - 1] || 1600;
            playEatGhost();
          } else {
            lives--;
            state = STATE_DEAD;
            deadTimer = 1500;
            playDeath();
          }
        }
      }
      
      // Fruit collision
      if (fruit) {
        if (distance(pacman.x, pacman.y, fruit.x, fruit.y) < 16) {
          score += 100 + (level - 1) * 100;
          fruit = null;
        }
      }
      
      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('pacman_highscore', highScore);
      }
    }
    
    // ==================== RENDERING ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitle();
        return;
      }
      
      drawMaze();
      drawPellets();
      if (fruit) drawFruit();
      drawGhosts();
      drawPacman();
      drawHUD();
      
      if (state === STATE_READY) {
        drawReady();
      } else if (state === STATE_PAUSED) {
        drawPaused();
      } else if (state === STATE_LEVEL_CLEAR) {
        drawLevelClear();
      } else if (state === STATE_GAMEOVER) {
        drawGameOver();
      }
    }
    
    function drawMaze() {
      ctx.strokeStyle = '#00F';
      ctx.lineWidth = 2;
      
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const tile = maze[row][col];
          const x = col * TILE + MAZE_X;
          const y = row * TILE + MAZE_Y;
          
          if (tile === WALL) {
            ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
          } else if (tile === GHOST_DOOR) {
            ctx.fillStyle = '#FFB8FF';
            ctx.fillRect(x + 4, y + TILE/2 - 2, TILE - 8, 4);
          }
        }
      }
    }
    
    function drawPellets() {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const tile = maze[row][col];
          const x = col * TILE + MAZE_X + TILE/2;
          const y = row * TILE + MAZE_Y + TILE/2;
          
          if (tile === PELLET) {
            ctx.fillStyle = '#FFB897';
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
          } else if (tile === POWER) {
            const blink = Math.floor(Date.now() / 200) % 2;
            ctx.fillStyle = blink ? '#FFB897' : '#FFF';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
    
    function drawFruit() {
      ctx.fillStyle = '#0F0';
      ctx.beginPath();
      ctx.arc(fruit.x, fruit.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawPacman() {
      if (state === STATE_DEAD) return;
      
      ctx.save();
      ctx.translate(pacman.x, pacman.y);
      
      // Rotate based on direction
      let angle = 0;
      if (pacman.dir === RIGHT) angle = 0;
      else if (pacman.dir === DOWN) angle = Math.PI/2;
      else if (pacman.dir === LEFT) angle = Math.PI;
      else if (pacman.dir === UP) angle = -Math.PI/2;
      
      ctx.rotate(angle);
      
      // Draw Pac-Man
      ctx.fillStyle = '#FF0';
      ctx.beginPath();
      const mouthAngle = pacman.mouthOpen ? 0.25 : 0.05;
      ctx.arc(0, 0, 10, mouthAngle * Math.PI, -mouthAngle * Math.PI);
      ctx.lineTo(0, 0);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }
    
    function drawGhosts() {
      for (const ghost of ghosts) {
        ctx.save();
        ctx.translate(ghost.x, ghost.y);
        
        // Determine color
        let color = ghost.color;
        if (ghost.state === GHOST_FRIGHTENED) {
          const flashPhase = frightenedTimer < 2000 && Math.floor(Date.now() / 150) % 2;
          color = flashPhase ? '#FFF' : '#00F';
        }
        
        if (ghost.state === GHOST_EATEN) {
          // Just eyes
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.arc(-4, -2, 4, 0, Math.PI * 2);
          ctx.arc(4, -2, 4, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = '#00F';
          ctx.beginPath();
          ctx.arc(-4 + ghost.dir.x * 2, -2 + ghost.dir.y * 2, 2, 0, Math.PI * 2);
          ctx.arc(4 + ghost.dir.x * 2, -2 + ghost.dir.y * 2, 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Body
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(0, -2, 10, Math.PI, 0);
          ctx.lineTo(10, 8);
          ctx.lineTo(6, 4);
          ctx.lineTo(2, 8);
          ctx.lineTo(-2, 4);
          ctx.lineTo(-6, 8);
          ctx.lineTo(-10, 4);
          ctx.lineTo(-10, -2);
          ctx.closePath();
          ctx.fill();
          
          // Eyes
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.arc(-4, -2, 4, 0, Math.PI * 2);
          ctx.arc(4, -2, 4, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = '#00F';
          ctx.beginPath();
          ctx.arc(-4 + ghost.dir.x * 2, -2 + ghost.dir.y * 2, 2, 0, Math.PI * 2);
          ctx.arc(4 + ghost.dir.x * 2, -2 + ghost.dir.y * 2, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 25);
      
      ctx.textAlign = 'right';
      ctx.fillText(`HIGH: ${highScore}`, W - 10, 25);
      
      // Lives
      for (let i = 0; i < lives; i++) {
        ctx.fillStyle = '#FF0';
        ctx.beginPath();
        ctx.arc(20 + i * 25, H - 20, 8, 0.25 * Math.PI, -0.25 * Math.PI);
        ctx.lineTo(20 + i * 25, H - 20);
        ctx.fill();
      }
      
      // Level
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`LEVEL ${level}`, W - 10, H - 20);
    }
    
    function drawTitle() {
      ctx.fillStyle = '#FF0';
      ctx.font = 'bold 56px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAC-MAN', W/2, H/2 - 150);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.fillText('Navigate the maze and eat all the dots', W/2, H/2 - 70);
      ctx.fillText('Avoid ghosts or eat them with power pellets', W/2, H/2 - 45);
      ctx.fillText('Large pellets make ghosts vulnerable', W/2, H/2 - 20);
      ctx.fillText('Use tunnels to wrap around', W/2, H/2 + 5);
      ctx.fillText('Clear the maze to advance', W/2, H/2 + 30);
      
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys or WASD to move', W/2, H/2 + 80);
      ctx.fillText('P to pause', W/2, H/2 + 105);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#FF0';
        ctx.font = '22px monospace';
        ctx.fillText('Press Enter to Start', W/2, H/2 + 180);
      }
    }
    
    function drawReady() {
      ctx.fillStyle = '#FF0';
      ctx.font = 'bold 32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('READY!', W/2, H/2);
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF0';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      
      ctx.fillStyle = '#888';
      ctx.font = '18px monospace';
      ctx.fillText('Press P to Resume', W/2, H/2 + 50);
    }
    
    function drawLevelClear() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#0F0';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL CLEAR!', W/2, H/2);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#F00';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '24px monospace';
      ctx.fillText(`Score: ${score}`, W/2, H/2 + 20);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', W/2, H/2 + 80);
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
