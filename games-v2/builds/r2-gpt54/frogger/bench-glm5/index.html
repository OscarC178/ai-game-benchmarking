<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 600;
    const H = 700;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 'TITLE';
    const STATE_PLAYING = 'PLAYING';
    const STATE_PAUSED = 'PAUSED';
    const STATE_DEAD = 'DEAD';
    const STATE_LEVEL_CLEAR = 'LEVEL_CLEAR';
    const STATE_GAMEOVER = 'GAMEOVER';
    
    // Grid
    const ROW_H = 50;
    const COL_W = 50;
    const COLS = 12;
    const ROWS = 13;
    
    // Lanes
    const SAFE_START_ROW = 12;
    const ROAD_ROWS = [11, 10, 9, 8, 7];
    const SAFE_MID_ROW = 6;
    const RIVER_ROWS = [5, 4, 3, 2, 1];
    const HOME_ROW = 0;
    
    // Timer
    const START_TIME = 50000; // 50 seconds in ms
    const HOME_BONUS_MULTIPLIER = 10;
    
    // Score
    const HOP_SCORE = 10;
    const HOME_SCORE = 100;
    const LEVEL_BONUS = 500;
    
    // Colors
    const COLORS = {
      road: '#333',
      water: '#1a237e',
      safe: '#1b5e20',
      home: '#2e7d32',
      frog: '#4caf50',
      frogDark: '#2e7d32',
      car1: '#f44336',
      car2: '#2196f3',
      car3: '#ffeb3b',
      truck: '#795548',
      log: '#5d4037',
      turtle: '#00897b'
    };
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('frogger_highscore') || '0');
    let lives = 3;
    let level = 1;
    let timer = START_TIME;
    let maxRow = 12;
    
    // Frog
    let frog = {
      x: W / 2,
      y: H - ROW_H * 0.5 - ROW_H,
      row: SAFE_START_ROW,
      w: 36,
      h: 40,
      hopping: false,
      hopTimer: 0,
      hopFromX: 0,
      hopFromY: 0,
      hopToX: 0,
      hopToY: 0,
      dead: false
    };
    
    // Home bays
    let homeSlots = [false, false, false, false, false];
    const HOME_POSITIONS = [60, 170, 280, 390, 500];
    const HOME_W = 50;
    
    // Entities
    let vehicles = [];
    let platforms = [];
    
    // Input
    const keys = {};
    let hopCooldown = 0;
    
    // Timers
    let deathTimer = 0;
    let levelClearTimer = 0;
    
    // Audio
    let audioCtx = null;
    let audioReady = false;
    
    // ==================== AUDIO ====================
    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;
      } catch (e) {}
    }
    
    function playTone(freq, duration, type = 'square', vol = 0.08) {
      if (!audioCtx || !audioReady) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    
    function playHop() { playTone(400, 0.04, 'square', 0.06); }
    function playSplat() { playTone(100, 0.2, 'sawtooth', 0.12); }
    function playSplash() { playTone(200, 0.15, 'sine', 0.1); }
    function playHome() { 
      playTone(523, 0.08, 'sine', 0.1);
      setTimeout(() => playTone(659, 0.08, 'sine', 0.1), 80);
      setTimeout(() => playTone(784, 0.12, 'sine', 0.1), 160);
    }
    function playLevelClear() {
      playTone(523, 0.1, 'sine', 0.12);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.12), 100);
      setTimeout(() => playTone(784, 0.1, 'sine', 0.12), 200);
      setTimeout(() => playTone(1047, 0.15, 'sine', 0.12), 300);
    }
    
    // ==================== LEVEL SETUP ====================
    function createLevel() {
      vehicles = [];
      platforms = [];
      homeSlots = [false, false, false, false, false];
      
      const speedMult = 1 + (level - 1) * 0.15;
      
      // Road vehicles (lanes 7-11)
      // Lane 11 - slow cars right
      for (let i = 0; i < 3; i++) {
        vehicles.push({
          x: i * 220,
          y: rowToY(11),
          w: 50,
          h: 32,
          vx: 60 * speedMult,
          color: COLORS.car1
        });
      }
      
      // Lane 10 - trucks left
      for (let i = 0; i < 2; i++) {
        vehicles.push({
          x: i * 350,
          y: rowToY(10),
          w: 90,
          h: 36,
          vx: -80 * speedMult,
          color: COLORS.truck
        });
      }
      
      // Lane 9 - fast cars right
      for (let i = 0; i < 4; i++) {
        vehicles.push({
          x: i * 180,
          y: rowToY(9),
          w: 50,
          h: 32,
          vx: 120 * speedMult,
          color: COLORS.car2
        });
      }
      
      // Lane 8 - medium cars left
      for (let i = 0; i < 3; i++) {
        vehicles.push({
          x: i * 240,
          y: rowToY(8),
          w: 60,
          h: 32,
          vx: -90 * speedMult,
          color: COLORS.car3
        });
      }
      
      // Lane 7 - trucks right
      for (let i = 0; i < 2; i++) {
        vehicles.push({
          x: i * 380,
          y: rowToY(7),
          w: 85,
          h: 34,
          vx: 70 * speedMult,
          color: COLORS.truck
        });
      }
      
      // River platforms (lanes 1-5)
      // Lane 5 - short logs right
      for (let i = 0; i < 4; i++) {
        platforms.push({
          x: i * 200,
          y: rowToY(5),
          w: 90,
          h: ROW_H - 4,
          vx: 50 * speedMult,
          type: 'log'
        });
      }
      
      // Lane 4 - turtles left (diving)
      for (let i = 0; i < 3; i++) {
        platforms.push({
          x: i * 220,
          y: rowToY(4),
          w: 100,
          h: ROW_H - 4,
          vx: -70 * speedMult,
          type: 'turtle',
          diving: true,
          diveTimer: 3000 + i * 1500,
          diveCycle: 4000,
          submerged: false,
          warning: false
        });
      }
      
      // Lane 3 - long logs right
      for (let i = 0; i < 2; i++) {
        platforms.push({
          x: i * 350,
          y: rowToY(3),
          w: 170,
          h: ROW_H - 4,
          vx: 80 * speedMult,
          type: 'log'
        });
      }
      
      // Lane 2 - turtles left (non-diving)
      for (let i = 0; i < 4; i++) {
        platforms.push({
          x: i * 180,
          y: rowToY(2),
          w: 70,
          h: ROW_H - 4,
          vx: -55 * speedMult,
          type: 'turtle',
          diving: false
        });
      }
      
      // Lane 1 - medium logs left
      for (let i = 0; i < 3; i++) {
        platforms.push({
          x: i * 250,
          y: rowToY(1),
          w: 130,
          h: ROW_H - 4,
          vx: -65 * speedMult,
          type: 'log'
        });
      }
    }
    
    function rowToY(row) {
      return H - 50 - (row + 1) * ROW_H + ROW_H / 2;
    }
    
    function resetFrog() {
      frog.x = W / 2;
      frog.y = rowToY(SAFE_START_ROW);
      frog.row = SAFE_START_ROW;
      frog.hopping = false;
      frog.dead = false;
      maxRow = SAFE_START_ROW;
      timer = START_TIME;
    }
    
    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      createLevel();
      resetFrog();
      state = STATE_PLAYING;
    }
    
    function nextLevel() {
      level++;
      createLevel();
      resetFrog();
      state = STATE_PLAYING;
    }
    
    // ==================== FROG MOVEMENT ====================
    function hopFrog(dx, dy, dRow) {
      if (frog.hopping || frog.dead) return;
      
      const newRow = frog.row + dRow;
      if (newRow < 0 || newRow > SAFE_START_ROW) return;
      
      const newX = frog.x + dx;
      if (newX < COL_W/2 || newX > W - COL_W/2) return;
      
      frog.hopFromX = frog.x;
      frog.hopFromY = frog.y;
      frog.hopToX = newX;
      frog.hopToY = rowToY(newRow);
      frog.hopping = true;
      frog.hopTimer = 0;
      frog.row = newRow;
      
      // Score for forward progress
      if (dRow < 0 && newRow < maxRow) {
        score += HOP_SCORE;
        maxRow = newRow;
      }
      
      playHop();
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_TITLE) {
        if (keys['Enter'] || keys['Space']) {
          initAudio();
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        }
        return;
      }
      
      if (state === STATE_PAUSED) {
        if (keys['KeyP']) {
          state = STATE_PLAYING;
          keys['KeyP'] = false;
        }
        return;
      }
      
      if (state === STATE_GAMEOVER) {
        if (keys['Enter'] || keys['Space']) {
          startGame();
          keys['Enter'] = false;
          keys['Space'] = false;
        }
        return;
      }
      
      if (state === STATE_DEAD) {
        deathTimer -= dtMs;
        if (deathTimer <= 0) {
          if (lives > 0) {
            resetFrog();
            state = STATE_PLAYING;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('frogger_highscore', highScore);
            }
          }
        }
        return;
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dtMs;
        if (levelClearTimer <= 0) {
          nextLevel();
        }
        return;
      }
      
      // Playing state
      if (keys['KeyP']) {
        state = STATE_PAUSED;
        keys['KeyP'] = false;
        return;
      }
      
      // Input for hopping
      hopCooldown -= dtMs;
      if (hopCooldown <= 0 && !frog.hopping) {
        if (keys['ArrowUp'] || keys['KeyW']) {
          hopFrog(0, -ROW_H, -1);
          hopCooldown = 100;
          keys['ArrowUp'] = false;
          keys['KeyW'] = false;
        } else if (keys['ArrowDown'] || keys['KeyS']) {
          hopFrog(0, ROW_H, 1);
          hopCooldown = 100;
          keys['ArrowDown'] = false;
          keys['KeyS'] = false;
        } else if (keys['ArrowLeft'] || keys['KeyA']) {
          hopFrog(-COL_W, 0, 0);
          hopCooldown = 100;
          keys['ArrowLeft'] = false;
          keys['KeyA'] = false;
        } else if (keys['ArrowRight'] || keys['KeyD']) {
          hopFrog(COL_W, 0, 0);
          hopCooldown = 100;
          keys['ArrowRight'] = false;
          keys['KeyD'] = false;
        }
      }
      
      // Update hop animation
      if (frog.hopping) {
        frog.hopTimer += dtMs;
        const t = Math.min(frog.hopTimer / 80, 1);
        frog.x = frog.hopFromX + (frog.hopToX - frog.hopFromX) * t;
        frog.y = frog.hopFromY + (frog.hopToY - frog.hopFromY) * t;
        
        if (t >= 1) {
          frog.hopping = false;
          frog.x = frog.hopToX;
          frog.y = frog.hopToY;
        }
        return;
      }
      
      // Update vehicles
      for (const v of vehicles) {
        v.x += v.vx * dt;
        if (v.vx > 0 && v.x > W + v.w) v.x = -v.w;
        if (v.vx < 0 && v.x < -v.w) v.x = W + v.w;
      }
      
      // Update platforms
      for (const p of platforms) {
        p.x += p.vx * dt;
        if (p.vx > 0 && p.x > W + p.w) p.x = -p.w;
        if (p.vx < 0 && p.x < -p.w) p.x = W + p.w;
        
        // Turtle diving
        if (p.diving) {
          p.diveTimer -= dtMs;
          if (p.diveTimer <= 0) {
            p.diveTimer = p.diveCycle;
          }
          
          const cyclePos = p.diveTimer / p.diveCycle;
          p.submerged = cyclePos < 0.3;
          p.warning = cyclePos < 0.4 && cyclePos >= 0.3;
        }
      }
      
      // Check collisions
      checkCollisions();
      
      // If still alive after collision check
      if (!frog.dead && !frog.hopping) {
        // Timer
        timer -= dtMs;
        if (timer <= 0) {
          killFrog();
        }
      }
    }
    
    function checkCollisions() {
      if (frog.dead || frog.hopping) return;
      
      const row = frog.row;
      const fx = frog.x;
      const fy = frog.y;
      const fw = frog.w;
      const fh = frog.h;
      
      // Road collision
      if (ROAD_ROWS.includes(row)) {
        for (const v of vehicles) {
          if (rectCollision(fx - fw/2, fy - fh/2, fw, fh, v.x, v.y - v.h/2, v.w, v.h)) {
            killFrog();
            return;
          }
        }
      }
      
      // River collision
      if (RIVER_ROWS.includes(row)) {
        let onPlatform = false;
        
        for (const p of platforms) {
          if (Math.abs(frog.y - p.y) > ROW_H/2) continue;
          
          if (rectCollision(fx - fw/2, fy - fh/2, fw, fh, p.x, p.y - p.h/2, p.w, p.h)) {
            if (p.type === 'turtle' && p.submerged) {
              killFrog();
              return;
            }
            
            // Carried by platform
            onPlatform = true;
            frog.x += p.vx / 60 * (1/60);
            frog.hopToX = frog.x;
            
            // Off screen
            if (frog.x < 0 || frog.x > W) {
              killFrog();
              return;
            }
            break;
          }
        }
        
        if (!onPlatform) {
          killFrog();
          return;
        }
      }
      
      // Home row
      if (row === HOME_ROW) {
        let landed = false;
        
        for (let i = 0; i < 5; i++) {
          const hx = HOME_POSITIONS[i] + HOME_W / 2;
          
          if (Math.abs(fx - hx) < HOME_W / 2 && !homeSlots[i]) {
            homeSlots[i] = true;
            score += HOME_SCORE + Math.floor(timer / 1000) * HOME_BONUS_MULTIPLIER;
            playHome();
            landed = true;
            
            // Check level complete
            if (homeSlots.every(s => s)) {
              score += LEVEL_BONUS;
              playLevelClear();
              levelClearTimer = 2000;
              state = STATE_LEVEL_CLEAR;
            } else {
              resetFrog();
            }
            break;
          }
        }
        
        if (!landed) {
          killFrog();
        }
      }
    }
    
    function killFrog() {
      if (frog.dead) return;
      
      frog.dead = true;
      lives--;
      
      if (RIVER_ROWS.includes(frog.row)) {
        playSplash();
      } else {
        playSplat();
      }
      
      deathTimer = 1000;
      state = STATE_DEAD;
    }
    
    function rectCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }
    
    // ==================== RENDERING ====================
    function drawBackground() {
      // Top HUD
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, 50);
      
      // Home row
      ctx.fillStyle = COLORS.home;
      ctx.fillRect(0, 50, W, ROW_H);
      
      // Home bays (water cutouts)
      ctx.fillStyle = COLORS.water;
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(HOME_POSITIONS[i], 50, HOME_W, ROW_H);
      }
      
      // Filled homes
      ctx.fillStyle = COLORS.frog;
      for (let i = 0; i < 5; i++) {
        if (homeSlots[i]) {
          drawFrogAt(HOME_POSITIONS[i] + HOME_W/2, 50 + ROW_H/2, 0.7);
        }
      }
      
      // River
      ctx.fillStyle = COLORS.water;
      ctx.fillRect(0, 50 + ROW_H, W, ROW_H * 5);
      
      // Middle safe
      ctx.fillStyle = COLORS.safe;
      ctx.fillRect(0, 50 + ROW_H * 6, W, ROW_H);
      
      // Road
      ctx.fillStyle = COLORS.road;
      ctx.fillRect(0, 50 + ROW_H * 7, W, ROW_H * 5);
      
      // Road markings
      ctx.fillStyle = '#555';
      for (let lane = 0; lane < 5; lane++) {
        const y = 50 + ROW_H * (7 + lane) + ROW_H - 2;
        for (let x = 0; x < W; x += 40) {
          ctx.fillRect(x, y, 20, 4);
        }
      }
      
      // Bottom safe
      ctx.fillStyle = COLORS.safe;
      ctx.fillRect(0, 50 + ROW_H * 12, W, ROW_H);
    }
    
    function drawFrogAt(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      
      // Body
      ctx.fillStyle = COLORS.frog;
      ctx.beginPath();
      ctx.ellipse(0, 0, 16, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(-8, -10, 5, 0, Math.PI * 2);
      ctx.arc(8, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-8, -10, 2, 0, Math.PI * 2);
      ctx.arc(8, -10, 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Legs
      ctx.fillStyle = COLORS.frogDark;
      ctx.fillRect(-18, 8, 8, 10);
      ctx.fillRect(10, 8, 8, 10);
      
      ctx.restore();
    }
    
    function drawFrog() {
      if (frog.dead) return;
      
      // Death animation
      if (state === STATE_DEAD) {
        ctx.fillStyle = '#F00';
        for (let i = 0; i < 6; i++) {
          const angle = i / 6 * Math.PI * 2;
          const dist = 20 + Math.random() * 10;
          ctx.beginPath();
          ctx.arc(
            frog.x + Math.cos(angle) * dist,
            frog.y + Math.sin(angle) * dist,
            3, 0, Math.PI * 2
          );
          ctx.fill();
        }
        return;
      }
      
      // Hop animation arc
      let hopHeight = 0;
      if (frog.hopping) {
        const t = frog.hopTimer / 80;
        hopHeight = Math.sin(t * Math.PI) * 10;
      }
      
      ctx.save();
      ctx.translate(frog.x, frog.y - hopHeight);
      
      // Body
      ctx.fillStyle = COLORS.frog;
      ctx.beginPath();
      ctx.ellipse(0, 0, 18, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Legs
      ctx.fillStyle = COLORS.frogDark;
      ctx.fillRect(-22, 10, 10, 12);
      ctx.fillRect(12, 10, 10, 12);
      
      // Eyes
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(-9, -12, 6, 0, Math.PI * 2);
      ctx.arc(9, -12, 6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-9, -12, 3, 0, Math.PI * 2);
      ctx.arc(9, -12, 3, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
    
    function drawVehicles() {
      for (const v of vehicles) {
        ctx.fillStyle = v.color;
        
        // Car body
        const x = v.x - v.w/2;
        const y = v.y - v.h/2;
        
        ctx.fillRect(x, y, v.w, v.h);
        
        // Windows
        ctx.fillStyle = '#333';
        if (v.w < 80) {
          ctx.fillRect(x + 8, y + 4, v.w - 16, v.h - 8);
        } else {
          ctx.fillRect(x + 10, y + 4, 20, v.h - 8);
          ctx.fillRect(x + v.w - 30, y + 4, 20, v.h - 8);
        }
        
        // Headlights
        ctx.fillStyle = '#FF0';
        if (v.vx > 0) {
          ctx.fillRect(x + v.w - 4, y + 4, 4, 4);
          ctx.fillRect(x + v.w - 4, y + v.h - 8, 4, 4);
        } else {
          ctx.fillRect(x, y + 4, 4, 4);
          ctx.fillRect(x, y + v.h - 8, 4, 4);
        }
      }
    }
    
    function drawPlatforms() {
      for (const p of platforms) {
        const x = p.x - p.w/2;
        const y = p.y - p.h/2;
        
        if (p.type === 'log') {
          ctx.fillStyle = COLORS.log;
          ctx.fillRect(x, y, p.w, p.h);
          
          // Wood grain
          ctx.fillStyle = '#3e2723';
          for (let i = 0; i < p.w; i += 20) {
            ctx.fillRect(x + i + 5, y + 5, 2, p.h - 10);
          }
        } else {
          // Turtles
          const turtleW = 24;
          const numTurtles = Math.floor(p.w / turtleW);
          
          // If submerged, draw warning or nothing
          if (p.submerged) {
            ctx.fillStyle = 'rgba(0, 137, 123, 0.3)';
            ctx.fillRect(x, y, p.w, p.h);
            continue;
          }
          
          if (p.warning) {
            ctx.fillStyle = 'rgba(0, 137, 123, 0.5)';
            ctx.fillRect(x, y, p.w, p.h);
          }
          
          for (let i = 0; i < numTurtles; i++) {
            const tx = x + i * turtleW + turtleW/2;
            
            ctx.fillStyle = COLORS.turtle;
            ctx.beginPath();
            ctx.ellipse(tx, p.y, 10, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Shell pattern
            ctx.fillStyle = '#00695c';
            ctx.beginPath();
            ctx.ellipse(tx, p.y, 6, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#4db6ac';
            ctx.beginPath();
            ctx.arc(tx, p.y - 10, 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE: ${score}`, 10, 30);
      
      ctx.textAlign = 'right';
      ctx.fillText(`HIGH: ${highScore}`, W - 10, 30);
      
      ctx.textAlign = 'center';
      ctx.fillText(`LEVEL ${level}`, W/2, 30);
      
      // Lives
      ctx.fillStyle = COLORS.frog;
      for (let i = 0; i < lives; i++) {
        drawFrogAt(20 + i * 35, H - 25, 0.5);
      }
      
      // Timer bar
      const timerWidth = (timer / START_TIME) * (W - 20);
      ctx.fillStyle = timer < 10000 ? '#F44' : '#4CAF50';
      ctx.fillRect(10, H - 15, timerWidth, 10);
      ctx.strokeStyle = '#FFF';
      ctx.strokeRect(10, H - 15, W - 20, 10);
    }
    
    function drawTitle() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      // Demo background
      ctx.fillStyle = COLORS.water;
      ctx.fillRect(0, H/2 - 100, W, 200);
      ctx.fillStyle = COLORS.road;
      ctx.fillRect(0, H/2 + 100, W, 150);
      
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 64px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FROGGER', W/2, H/2 - 150);
      
      ctx.font = '16px monospace';
      ctx.fillText('Cross the road without getting hit', W/2, H/2 - 60);
      ctx.fillText('Cross the river by riding logs and turtles', W/2, H/2 - 35);
      ctx.fillText('Reach all 5 home slots at the top', W/2, H/2 - 10);
      ctx.fillText('You die in water unless on a platform', W/2, H/2 + 15);
      ctx.fillText('Beat the clock!', W/2, H/2 + 40);
      
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow Keys or WASD to hop', W/2, H/2 + 90);
      ctx.fillText('P to pause', W/2, H/2 + 115);
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#4CAF50';
        ctx.font = '22px monospace';
        ctx.fillText('Press Enter to Start', W/2, H/2 + 180);
      }
    }
    
    function drawPaused() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFC107';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W/2, H/2);
      
      ctx.fillStyle = '#888';
      ctx.font = '18px monospace';
      ctx.fillText('Press P to Resume', W/2, H/2 + 50);
    }
    
    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#F44336';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 40);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '24px monospace';
      ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 20);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#4CAF50';
        ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 60);
      }
      
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter to Restart', W/2, H/2 + 110);
      }
    }
    
    function drawLevelClear() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#4CAF50';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL CLEAR!', W/2, H/2);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '24px monospace';
      ctx.fillText(`Next: Level ${level + 1}`, W/2, H/2 + 50);
    }
    
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitle();
        return;
      }
      
      drawBackground();
      drawPlatforms();
      drawVehicles();
      drawFrog();
      drawHUD();
      
      if (state === STATE_PAUSED) {
        drawPaused();
      } else if (state === STATE_GAMEOVER) {
        drawGameOver();
      } else if (state === STATE_LEVEL_CLEAR) {
        drawLevelClear();
      }
    }
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      initAudio();
      e.preventDefault();
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Start
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
