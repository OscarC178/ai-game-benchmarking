<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE - Classic Arcade</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #111;
            display: block;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="snakeCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const CANVAS_SIZE = 600;
        const GRID_COUNT = 20;
        const CELL_SIZE = CANVAS_SIZE / GRID_COUNT; // 30px
        const INITIAL_SPEED = 8; // ticks per second
        const MAX_SPEED = 15;
        const SPEED_INCREMENT = 0.5;

        // Game States
        const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, WIN: 4 };

        // Globals
        let gameState = STATES.TITLE;
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snake_highscore') || 0;
        let tickRate = INITIAL_SPEED;
        let tickAccumulator = 0;
        let lastTime = 0;
        let hasQueuedTurn = false;
        let audioCtx = null;

        // Audio
        function playSfx(freq, type = 'square', duration = 0.1, volume = 0.1) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Input
        window.addEventListener('keydown', e => {
            initAudio();
            
            if (e.code === 'Enter') {
                if (gameState === STATES.TITLE || gameState === STATES.GAMEOVER || gameState === STATES.WIN) {
                    resetGame();
                    gameState = STATES.PLAYING;
                    playSfx(440, 'triangle', 0.2);
                }
            } else if (e.code === 'KeyP') {
                if (gameState === STATES.PLAYING) gameState = STATES.PAUSED;
                else if (gameState === STATES.PAUSED) gameState = STATES.PLAYING;
            }

            if (gameState === STATES.PLAYING && !hasQueuedTurn) {
                const key = e.code;
                if ((key === 'ArrowUp' || key === 'KeyW') && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                    hasQueuedTurn = true;
                } else if ((key === 'ArrowDown' || key === 'KeyS') && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                    hasQueuedTurn = true;
                } else if ((key === 'ArrowLeft' || key === 'KeyA') && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                    hasQueuedTurn = true;
                } else if ((key === 'ArrowRight' || key === 'KeyD') && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                    hasQueuedTurn = true;
                }
            }
        });

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            tickRate = INITIAL_SPEED;
            tickAccumulator = 0;
            hasQueuedTurn = false;
            spawnFood();
        }

        function spawnFood() {
            if (snake.length >= GRID_COUNT * GRID_COUNT) {
                gameState = STATES.WIN;
                return;
            }

            const freeCells = [];
            for (let x = 0; x < GRID_COUNT; x++) {
                for (let y = 0; y < GRID_COUNT; y++) {
                    const isOccupied = snake.some(s => s.x === x && s.y === y);
                    if (!isOccupied) freeCells.push({ x, y });
                }
            }

            if (freeCells.length > 0) {
                const randomCell = freeCells[Math.floor(Math.random() * freeCells.length)];
                food = { x: randomCell.x, y: randomCell.y };
            } else {
                gameState = STATES.WIN;
            }
        }

        function updateTick() {
            direction = nextDirection;
            hasQueuedTurn = false;

            const head = snake[0];
            const newHead = { x: head.x + direction.x, y: head.y + direction.y };

            // Collision: Walls
            if (newHead.x < 0 || newHead.x >= GRID_COUNT || newHead.y < 0 || newHead.y >= GRID_COUNT) {
                endGame();
                return;
            }

            // Collision: Self
            // Note: If we aren't eating, the tail moves, so moving into the current tail spot is safe.
            const isEating = (newHead.x === food.x && newHead.y === food.y);
            const collisionCheckBody = isEating ? snake : snake.slice(0, -1);
            if (collisionCheckBody.some(s => s.x === newHead.x && s.y === newHead.y)) {
                endGame();
                return;
            }

            // Move
            snake.unshift(newHead);

            if (isEating) {
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snake_highscore', highScore);
                }
                tickRate = Math.min(MAX_SPEED, tickRate + SPEED_INCREMENT);
                playSfx(880, 'square', 0.05);
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            gameState = STATES.GAMEOVER;
            playSfx(110, 'sawtooth', 0.5, 0.2);
        }

        function render(time) {
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            if (gameState === STATES.PLAYING) {
                tickAccumulator += dt;
                const tickInterval = 1 / tickRate;
                while (tickAccumulator >= tickInterval) {
                    updateTick();
                    tickAccumulator -= tickInterval;
                }
            }

            // Clear
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // subtle grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }

            // Food
            const foodSizePulse = 18 + Math.sin(time / 150) * 2;
            ctx.fillStyle = '#f33';
            ctx.beginPath();
            ctx.roundRect(
                food.x * CELL_SIZE + (CELL_SIZE - foodSizePulse) / 2,
                food.y * CELL_SIZE + (CELL_SIZE - foodSizePulse) / 2,
                foodSizePulse, foodSizePulse, 4
            );
            ctx.fill();

            // Snake
            snake.forEach((s, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#4f4' : '#2a2';
                const inset = 2;
                const size = CELL_SIZE - (inset * 2);
                
                ctx.beginPath();
                ctx.roundRect(
                    s.x * CELL_SIZE + inset,
                    s.y * CELL_SIZE + inset,
                    size, size, 4
                );
                ctx.fill();

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = '#000';
                    const eyeSize = 4;
                    const eyeOffset = 6;
                    // Horizontal eyes relative to direction
                    if (direction.x !== 0) {
                        ctx.fillRect(s.x * CELL_SIZE + 20, s.y * CELL_SIZE + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(s.x * CELL_SIZE + 20, s.y * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(s.x * CELL_SIZE + eyeOffset, s.y * CELL_SIZE + (direction.y < 0 ? 6 : 20), eyeSize, eyeSize);
                        ctx.fillRect(s.x * CELL_SIZE + CELL_SIZE - eyeOffset - eyeSize, s.y * CELL_SIZE + (direction.y < 0 ? 6 : 20), eyeSize, eyeSize);
                    }
                }
            });

            // HUD Overlays
            renderUI();

            requestAnimationFrame(render);
        }

        function renderUI() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 25);
            ctx.textAlign = 'right';
            ctx.fillText(`BEST: ${highScore}`, CANVAS_SIZE - 10, 25);

            if (gameState === STATES.TITLE) {
                drawOverlay('SNAKE', 'ARROW KEYS TO MOVE\nEAT TO GROW\nPRESS ENTER TO START');
            } else if (gameState === STATES.PAUSED) {
                drawOverlay('PAUSED', 'PRESS P TO RESUME');
            } else if (gameState === STATES.GAMEOVER) {
                drawOverlay('GAME OVER', `FINAL SCORE: ${score}\nPRESS ENTER TO RESTART`);
            } else if (gameState === STATES.WIN) {
                drawOverlay('YOU WIN!', `PERFECT RUN! FINAL SCORE: ${score}\nPRESS ENTER TO RESTART`);
            }
        }

        function drawOverlay(title, subtitle) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            ctx.fillStyle = '#4f4';
            ctx.font = 'bold 80px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(title, CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 20);

            ctx.fillStyle = '#fff';
            ctx.font = '18px monospace';
            const lines = subtitle.split('\n');
            lines.forEach((line, i) => {
                ctx.fillText(line, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 30 + (i * 25));
            });
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
