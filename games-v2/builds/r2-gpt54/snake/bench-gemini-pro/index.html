<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: monospace;
    overflow: hidden;
  }
  canvas {
    background-color: #111111;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<script>
// --- Constants ---
const COLS = 20;
const ROWS = 20;
const CELL_SIZE = 30; // 600 / 20

const DIR_UP = { x: 0, y: -1 };
const DIR_DOWN = { x: 0, y: 1 };
const DIR_LEFT = { x: -1, y: 0 };
const DIR_RIGHT = { x: 1, y: 0 };

const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_PAUSED = 2;
const STATE_GAMEOVER = 3;
const STATE_WIN = 4;

const START_FPS = 8;
const MAX_FPS = 15;
const SPEED_INC = 0.5;

// --- State ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = STATE_TITLE;
let snake = [];
let dir = DIR_RIGHT;
let nextDir = DIR_RIGHT;
let food = { x: -1, y: -1 };
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;

let lastTime = 0;
let tickAccumulator = 0;
let currentFPS = START_FPS;

let pulseAnim = 0;

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration, vol=0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxEat() { playTone(600, 'square', 0.1, 0.05); }
function sfxDie() { playTone(150, 'sawtooth', 0.4, 0.1); }
function sfxWin() { 
    [400, 500, 600, 800].forEach((f, i) => {
        setTimeout(() => playTone(f, 'square', 0.15, 0.05), i * 150);
    });
}
function sfxStart() { playTone(440, 'sine', 0.1, 0.05); }

// --- Game Logic ---
function resetGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    dir = DIR_RIGHT;
    nextDir = DIR_RIGHT;
    score = 0;
    currentFPS = START_FPS;
    tickAccumulator = 0;
    spawnFood();
}

function spawnFood() {
    let freeCells = [];
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (!snake.some(segment => segment.x === x && segment.y === y)) {
                freeCells.push({ x, y });
            }
        }
    }
    
    if (freeCells.length === 0) {
        // Board full!
        gameState = STATE_WIN;
        saveHighScore();
        sfxWin();
        return;
    }
    
    const idx = Math.floor(Math.random() * freeCells.length);
    food = freeCells[idx];
}

function updateTick() {
    dir = nextDir;
    const head = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };
    
    // Wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        gameOver();
        return;
    }
    
    const eating = (newHead.x === food.x && newHead.y === food.y);
    
    // Self collision
    // If we are not eating, the tail will move, so it's safe to move into the current tail position
    const hitBody = snake.some((segment, index) => {
        if (!eating && index === snake.length - 1) return false; // Ignore tail if moving
        return segment.x === newHead.x && segment.y === newHead.y;
    });
    
    if (hitBody) {
        gameOver();
        return;
    }
    
    // Move
    snake.unshift(newHead);
    
    if (eating) {
        score += 10;
        if (score > highScore) highScore = score;
        currentFPS = Math.min(MAX_FPS, currentFPS + SPEED_INC);
        sfxEat();
        
        if (snake.length === COLS * ROWS) {
            gameState = STATE_WIN;
            saveHighScore();
            sfxWin();
        } else {
            spawnFood();
        }
    } else {
        snake.pop();
    }
}

function gameOver() {
    gameState = STATE_GAMEOVER;
    saveHighScore();
    sfxDie();
}

function saveHighScore() {
    if (score > (parseInt(localStorage.getItem('snakeHighScore')) || 0)) {
        localStorage.setItem('snakeHighScore', score);
    }
}

// --- Input ---
window.addEventListener('keydown', e => {
    // Prevent default scrolling for arrows and space
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) {
        e.preventDefault();
    }
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    if (e.code === 'Enter' || e.code === 'Space') {
        if (gameState === STATE_TITLE || gameState === STATE_GAMEOVER || gameState === STATE_WIN) {
            resetGame();
            gameState = STATE_PLAYING;
            sfxStart();
        }
        return;
    }
    
    if (e.code === 'KeyP') {
        if (gameState === STATE_PLAYING) {
            gameState = STATE_PAUSED;
        } else if (gameState === STATE_PAUSED) {
            gameState = STATE_PLAYING;
            lastTime = performance.now(); // Reset time to avoid jump
        }
        return;
    }
    
    if (gameState !== STATE_PLAYING) return;
    
    // Queue turn (only allow one valid turn per tick by checking against 'dir', not 'nextDir')
    if ((e.code === 'ArrowUp' || e.code === 'KeyW') && dir !== DIR_DOWN)   nextDir = DIR_UP;
    if ((e.code === 'ArrowDown' || e.code === 'KeyS') && dir !== DIR_UP)     nextDir = DIR_DOWN;
    if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && dir !== DIR_RIGHT)  nextDir = DIR_LEFT;
    if ((e.code === 'ArrowRight' || e.code === 'KeyD') && dir !== DIR_LEFT)  nextDir = DIR_RIGHT;
});

// --- Render ---
function drawGrid() {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += CELL_SIZE) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    for (let y = 0; y <= canvas.height; y += CELL_SIZE) {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
}

function drawSnake() {
    snake.forEach((segment, index) => {
        const isHead = index === 0;
        const px = segment.x * CELL_SIZE;
        const py = segment.y * CELL_SIZE;
        
        ctx.fillStyle = isHead ? '#4CAF50' : '#388E3C';
        
        // Inset slightly for a nice blocky retro look
        const inset = 2;
        const size = CELL_SIZE - inset * 2;
        
        ctx.fillRect(px + inset, py + inset, size, size);
        
        // Eyes for the head
        if (isHead) {
            ctx.fillStyle = '#111';
            const eyeSize = 4;
            let ex1, ey1, ex2, ey2;
            
            // Eye placement based on direction
            if (dir === DIR_UP) {
                ex1 = px + 8; ey1 = py + 6;
                ex2 = px + 22 - eyeSize; ey2 = py + 6;
            } else if (dir === DIR_DOWN) {
                ex1 = px + 8; ey1 = py + 24 - eyeSize;
                ex2 = px + 22 - eyeSize; ey2 = py + 24 - eyeSize;
            } else if (dir === DIR_LEFT) {
                ex1 = px + 6; ey1 = py + 8;
                ex2 = px + 6; ey2 = py + 22 - eyeSize;
            } else { // RIGHT
                ex1 = px + 24 - eyeSize; ey1 = py + 8;
                ex2 = px + 24 - eyeSize; ey2 = py + 22 - eyeSize;
            }
            
            ctx.fillRect(ex1, ey1, eyeSize, eyeSize);
            ctx.fillRect(ex2, ey2, eyeSize, eyeSize);
        }
    });
}

function drawFood() {
    if (food.x === -1) return; // No food (win state)
    
    const px = food.x * CELL_SIZE;
    const py = food.y * CELL_SIZE;
    
    // Subtle pulse effect
    const pulseOffset = Math.sin(pulseAnim * Math.PI * 2) * 2;
    const size = 16 + pulseOffset;
    const offset = (CELL_SIZE - size) / 2;
    
    ctx.fillStyle = '#E53935'; // Red apple color
    ctx.beginPath();
    ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, size/2, 0, Math.PI * 2);
    ctx.fill();
    
    // Apple stem/leaf highlight
    ctx.fillStyle = '#81C784';
    ctx.fillRect(px + CELL_SIZE/2 - 2, py + CELL_SIZE/2 - size/2 - 2, 4, 4);
}

function drawHUD() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, canvas.width, 30);
    
    ctx.fillStyle = '#FFF';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`SCORE: ${score}`, 10, 15);
    
    ctx.textAlign = 'right';
    ctx.fillText(`BEST: ${highScore}`, canvas.width - 10, 15);
}

function drawOverlay(title, lines) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    ctx.fillStyle = '#4CAF50';
    ctx.font = 'bold 48px monospace';
    ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 60);
    
    ctx.fillStyle = '#FFF';
    ctx.font = '18px monospace';
    
    let y = canvas.height / 2 + 10;
    lines.forEach(line => {
        ctx.fillText(line, canvas.width / 2, y);
        y += 30;
    });
}

function render() {
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawGrid();
    
    if (gameState === STATE_TITLE) {
        // Draw a neat minimal snake shape on title screen for flair
        ctx.fillStyle = '#388E3C';
        ctx.fillRect(canvas.width/2 - 45, canvas.height/2 - 150, 90, 30);
        
        drawOverlay("SNAKE", [
            "Use ARROWS or WASD to move.",
            "Eat food to grow.",
            "Avoid walls and your own tail.",
            "",
            "> Press ENTER to Start <"
        ]);
        return;
    }
    
    drawFood();
    drawSnake();
    drawHUD();
    
    if (gameState === STATE_PAUSED) {
        drawOverlay("PAUSED", ["> Press P to Resume <"]);
    } else if (gameState === STATE_GAMEOVER) {
        drawOverlay("GAME OVER", [
            `Final Score: ${score}`,
            "",
            "> Press ENTER to Try Again <"
        ]);
    } else if (gameState === STATE_WIN) {
        drawOverlay("YOU WIN!", [
            "BOARD CLEARED!",
            `Final Score: ${score}`,
            "",
            "> Press ENTER to Play Again <"
        ]);
    }
}

// --- Main Loop ---
function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    
    // Avoid large jumps if tab was inactive
    if (dt < 0.2) {
        pulseAnim += dt;
        
        if (gameState === STATE_PLAYING) {
            tickAccumulator += dt;
            const tickRate = 1 / currentFPS;
            
            while (tickAccumulator >= tickRate) {
                tickAccumulator -= tickRate;
                updateTick();
                // If updateTick changed state (e.g. game over), stop simulating
                if (gameState !== STATE_PLAYING) break; 
            }
        }
    }
    
    render();
    requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
