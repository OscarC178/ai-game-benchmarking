<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Courier New", monospace;
    }
    canvas {
      background: #111111;
      display: block;
      border: 2px solid #444;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas" width="600" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const WIDTH = 600;
    const HEIGHT = 600;
    const GRID_SIZE = 20;
    const CELL_SIZE = 30;
    const BASE_TICK_RATE = 8;
    const MAX_TICK_RATE = 15;
    const SPEED_INCREMENT = 0.5;

    // Game states
    const STATES = {
      TITLE: 'title',
      PLAYING: 'playing',
      PAUSED: 'paused',
      GAME_OVER: 'game_over',
      WIN: 'win'
    };

    // Directions
    const DIRS = {
      RIGHT: [1, 0],
      LEFT: [-1, 0],
      UP: [0, -1],
      DOWN: [0, 1]
    };

    // Game state
    let gameState = STATES.TITLE;
    let snake = [];
    let direction = DIRS.RIGHT;
    let queuedDirection = null;
    let hasQueuedTurn = false;
    let food = null;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snake_best') || '0');
    let tickRate = BASE_TICK_RATE;
    let tickAccumulator = 0;
    let keys = {};
    let audioCtx = null;

    // Initialize
    function resetGame() {
      snake = [
        [10, 10],
        [9, 10],
        [8, 10]
      ];
      direction = DIRS.RIGHT;
      queuedDirection = null;
      hasQueuedTurn = false;
      score = 0;
      tickRate = BASE_TICK_RATE;
      tickAccumulator = 0;
      spawnFood();
    }

    function spawnFood() {
      let free = [];
      for (let x = 0; x < GRID_SIZE; x++) {
        for (let y = 0; y < GRID_SIZE; y++) {
          let occupied = false;
          for (let seg of snake) {
            if (seg[0] === x && seg[1] === y) {
              occupied = true;
              break;
            }
          }
          if (!occupied) free.push([x, y]);
        }
      }

      if (free.length === 0) {
        gameState = STATES.WIN;
        return;
      }

      food = free[Math.floor(Math.random() * free.length)];
    }

    function queueDirection(dir) {
      if (gameState !== STATES.PLAYING) return;
      if (hasQueuedTurn) return;

      // Prevent direct reversal
      if ((dir === DIRS.LEFT && direction === DIRS.RIGHT) ||
          (dir === DIRS.RIGHT && direction === DIRS.LEFT) ||
          (dir === DIRS.UP && direction === DIRS.DOWN) ||
          (dir === DIRS.DOWN && direction === DIRS.UP)) {
        return;
      }

      queuedDirection = dir;
      hasQueuedTurn = true;
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER || gameState === STATES.WIN) {
          resetGame();
          gameState = STATES.PLAYING;
        }
      }

      if (e.key.toLowerCase() === 'p') {
        e.preventDefault();
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      // Queue direction
      if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') {
        queueDirection(DIRS.UP);
      }
      if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
        queueDirection(DIRS.DOWN);
      }
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
        queueDirection(DIRS.LEFT);
      }
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
        queueDirection(DIRS.RIGHT);
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function updateTick() {
      if (gameState !== STATES.PLAYING) return;

      // Apply queued direction
      if (queuedDirection) {
        direction = queuedDirection;
        queuedDirection = null;
        hasQueuedTurn = false;
      }

      // Compute next head
      let head = snake[0];
      let nextHead = [head[0] + direction[0], head[1] + direction[1]];

      // Check wall collision
      if (nextHead[0] < 0 || nextHead[0] >= GRID_SIZE || nextHead[1] < 0 || nextHead[1] >= GRID_SIZE) {
        gameState = STATES.GAME_OVER;
        playSound(200, 0.2);
        return;
      }

      // Check self collision (excluding current tail if not eating)
      let foodEaten = food && food[0] === nextHead[0] && food[1] === nextHead[1];
      for (let i = 0; i < snake.length; i++) {
        if (i === snake.length - 1 && !foodEaten) continue; // Tail will move away
        if (snake[i][0] === nextHead[0] && snake[i][1] === nextHead[1]) {
          gameState = STATES.GAME_OVER;
          playSound(200, 0.2);
          return;
        }
      }

      // Add new head
      snake.unshift(nextHead);

      // Handle food
      if (foodEaten) {
        score += 10;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snake_best', highScore);
        }
        tickRate = Math.min(tickRate + SPEED_INCREMENT, MAX_TICK_RATE);
        playSound(800, 0.05);
        spawnFood();
        if (snake.length === GRID_SIZE * GRID_SIZE) {
          gameState = STATES.WIN;
        }
      } else {
        snake.pop();
      }
    }

    function update(deltaTime) {
      if (gameState === STATES.TITLE || gameState === STATES.PAUSED || gameState === STATES.GAME_OVER || gameState === STATES.WIN) {
        return;
      }

      tickAccumulator += deltaTime;
      let tickInterval = 1 / tickRate;

      while (tickAccumulator >= tickInterval) {
        tickAccumulator -= tickInterval;
        updateTick();
      }
    }

    function drawSnake() {
      for (let i = 0; i < snake.length; i++) {
        let seg = snake[i];
        let x = seg[0] * CELL_SIZE + 1;
        let y = seg[1] * CELL_SIZE + 1;

        if (i === 0) {
          // Head
          ctx.fillStyle = '#00FF00';
          ctx.fillRect(x, y, CELL_SIZE - 2, CELL_SIZE - 2);
          // Eyes
          ctx.fillStyle = '#000000';
          ctx.fillRect(x + 4, y + 4, 4, 4);
          ctx.fillRect(x + CELL_SIZE - 10, y + 4, 4, 4);
        } else {
          // Body
          ctx.fillStyle = '#00CC00';
          ctx.fillRect(x, y, CELL_SIZE - 2, CELL_SIZE - 2);
        }
      }
    }

    function drawFood() {
      if (!food) return;
      let x = food[0] * CELL_SIZE + 5;
      let y = food[1] * CELL_SIZE + 5;
      let pulse = Math.sin(performance.now() / 200) * 0.3 + 0.7;
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(x + 10, y + 10, 10 * pulse, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGrid() {
      ctx.strokeStyle = '#222222';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, HEIGHT);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(WIDTH, i * CELL_SIZE);
        ctx.stroke();
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Best: ' + highScore, WIDTH - 10, 25);
    }

    function drawTitle() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 72px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', WIDTH / 2, 120);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px "Courier New", monospace';
      ctx.fillText('Arrow Keys or WASD', WIDTH / 2, 200);
      ctx.fillText('Eat Food to Grow', WIDTH / 2, 240);
      ctx.fillText('Avoid Walls and Yourself', WIDTH / 2, 280);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 24px "Courier New", monospace';
      ctx.fillText('Press ENTER to Start', WIDTH / 2, 400);
    }

    function drawPause() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '16px "Courier New", monospace';
      ctx.fillText('Press P to Resume', WIDTH / 2, HEIGHT / 2 + 60);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', WIDTH / 2, 120);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '32px "Courier New", monospace';
      ctx.fillText('Score: ' + score, WIDTH / 2, 200);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 24px "Courier New", monospace';
      ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
    }

    function drawWin() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', WIDTH / 2, 120);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '32px "Courier New", monospace';
      ctx.fillText('Score: ' + score, WIDTH / 2, 200);

      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 24px "Courier New", monospace';
      ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
    }

    function render() {
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawGrid();

      if (gameState === STATES.TITLE) {
        drawTitle();
      } else if (gameState === STATES.PLAYING || gameState === STATES.PAUSED || gameState === STATES.GAME_OVER || gameState === STATES.WIN) {
        drawSnake();
        drawFood();
        drawHUD();

        if (gameState === STATES.PAUSED) {
          drawPause();
        } else if (gameState === STATES.GAME_OVER) {
          drawGameOver();
        } else if (gameState === STATES.WIN) {
          drawWin();
        }
      }
    }

    function playSound(freq, duration) {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          return;
        }
      }

      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.frequency.value = freq;
        osc.type = 'square';

        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {
        // Fail silently
      }
    }

    // Main loop
    let lastTime = performance.now();
    function gameLoop(currentTime) {
      const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(deltaTime);
      render();

      requestAnimationFrame(gameLoop);
    }

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
