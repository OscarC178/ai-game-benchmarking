<!--
  GAME:      Snake
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=600,H=600,GRID=20,CELL=30;
const START_SPEED=8,MAX_SPEED=15,SPEED_INC=0.5;

// States
const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_WIN=4;
let state=ST_TITLE;

// Game vars
let snake,dir,queuedDir,hasQueued,food,score,highScore,tickRate,tickAcc,globalTime=0;

// Load high score
highScore=0;
try{const v=localStorage.getItem('snake_best');if(v)highScore=parseInt(v)||0;}catch(e){}
function saveHigh(){if(score>highScore){highScore=score;try{localStorage.setItem('snake_best',String(highScore));}catch(e){}}}

// Audio
let audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(freq,dur,vol,type){
  if(!audioCtx)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=vol||0.08;g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function sndEat(){beep(660,0.06,0.1,'sine');}
function sndDie(){beep(150,0.3,0.12,'sawtooth');}
function sndWin(){beep(880,0.1,0.1,'sine');setTimeout(()=>beep(1100,0.15,0.1,'sine'),120);}

// Directions: 0=up,1=right,2=down,3=left
const DX=[0,1,0,-1],DY=[-1,0,1,0];

function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir=1;queuedDir=1;hasQueued=false;
  score=0;tickRate=START_SPEED;tickAcc=0;
  spawnFood();
  state=ST_PLAY;
}

function spawnFood(){
  const occupied=new Set();
  for(const s of snake)occupied.add(s.x+','+s.y);
  const free=[];
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    if(!occupied.has(x+','+y))free.push({x,y});
  }
  if(free.length===0){state=ST_WIN;sndWin();saveHigh();return;}
  food=free[Math.floor(Math.random()*free.length)];
}

function queueDirection(d){
  if(state!==ST_PLAY)return;
  // Prevent reverse
  if((d+2)%4===dir)return;
  if(!hasQueued){queuedDir=d;hasQueued=true;}
}

function tick(){
  if(state!==ST_PLAY)return;

  // Apply queued direction
  if(hasQueued){
    if((queuedDir+2)%4!==dir)dir=queuedDir;
    hasQueued=false;
  }

  const head=snake[0];
  const nx=head.x+DX[dir],ny=head.y+DY[dir];

  // Wall collision
  if(nx<0||nx>=GRID||ny<0||ny>=GRID){
    state=ST_OVER;sndDie();saveHigh();return;
  }

  // Self collision (tail may vacate)
  const eating=food&&nx===food.x&&ny===food.y;
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    if(s.x===nx&&s.y===ny){
      // If it's the tail and we're not eating, tail will move away
      if(i===snake.length-1&&!eating)continue;
      state=ST_OVER;sndDie();saveHigh();return;
    }
  }

  // Move
  snake.unshift({x:nx,y:ny});

  if(eating){
    score+=10;sndEat();
    tickRate=Math.min(MAX_SPEED,tickRate+SPEED_INC);
    if(snake.length>=GRID*GRID){
      state=ST_WIN;sndWin();saveHigh();return;
    }
    spawnFood();
  }else{
    snake.pop();
  }
}

// Input
window.addEventListener('keydown',e=>{
  initAudio();
  const c=e.code;
  if(c==='ArrowUp'||c==='KeyW'){queueDirection(0);e.preventDefault();}
  if(c==='ArrowRight'||c==='KeyD'){queueDirection(1);e.preventDefault();}
  if(c==='ArrowDown'||c==='KeyS'){queueDirection(2);e.preventDefault();}
  if(c==='ArrowLeft'||c==='KeyA'){queueDirection(3);e.preventDefault();}
  if(c==='Enter'||c==='Space'){
    if(state===ST_TITLE||state===ST_OVER||state===ST_WIN)startGame();
    e.preventDefault();
  }
  if(c==='KeyP'){
    if(state===ST_PLAY){state=ST_PAUSE;tickAcc=0;}
    else if(state===ST_PAUSE)state=ST_PLAY;
  }
});

// Render
function render(){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);

  // Grid lines
  cx.strokeStyle='#1a1a1a';cx.lineWidth=1;
  for(let i=0;i<=GRID;i++){
    cx.beginPath();cx.moveTo(i*CELL,0);cx.lineTo(i*CELL,H);cx.stroke();
    cx.beginPath();cx.moveTo(0,i*CELL);cx.lineTo(W,i*CELL);cx.stroke();
  }

  if(state===ST_TITLE){
    cx.fillStyle='#4a4';cx.font='bold 72px monospace';cx.textAlign='center';
    cx.fillText('SNAKE',W/2,200);
    cx.fillStyle='#999';cx.font='16px monospace';
    cx.fillText('Arrow Keys or WASD to move',W/2,300);
    cx.fillText('Eat food to grow',W/2,330);
    cx.fillText('Avoid walls and yourself',W/2,360);
    cx.fillStyle='#ccc';cx.font='20px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',W/2,440);
    if(highScore>0){cx.fillStyle='#666';cx.font='14px monospace';cx.fillText('Best: '+highScore,W/2,500);}
    return;
  }

  // Draw food
  if(food){
    const pulse=1+0.08*Math.sin(globalTime*8);
    const sz=18*pulse;
    const fx=food.x*CELL+CELL/2,fy=food.y*CELL+CELL/2;
    cx.fillStyle='#e33';
    cx.beginPath();cx.arc(fx,fy,sz/2,0,Math.PI*2);cx.fill();
    cx.fillStyle='#f66';
    cx.beginPath();cx.arc(fx-2,fy-3,sz/4,0,Math.PI*2);cx.fill();
  }

  // Draw snake
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i];
    const px=s.x*CELL,py=s.y*CELL;
    if(i===0){
      // Head
      cx.fillStyle='#5d5';
      cx.fillRect(px+1,py+1,CELL-2,CELL-2);
      // Eyes based on direction
      cx.fillStyle='#111';
      const ecx=px+CELL/2,ecy=py+CELL/2;
      const ex=DX[dir]*5,ey=DY[dir]*5;
      // Two eyes perpendicular to direction
      const px1=dir%2===0?-5:0,py1=dir%2===0?0:-5;
      cx.beginPath();cx.arc(ecx+ex+px1,ecy+ey+py1,3,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(ecx+ex-px1,ecy+ey-py1,3,0,Math.PI*2);cx.fill();
    }else{
      // Body - gradient from bright to darker
      const t=i/snake.length;
      const g=Math.floor(180-t*80);
      cx.fillStyle=`rgb(40,${g},40)`;
      cx.fillRect(px+2,py+2,CELL-4,CELL-4);
    }
  }

  // HUD
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,28);
  cx.fillStyle='#fff';cx.font='14px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,10,19);
  cx.textAlign='right';
  cx.fillText('Best: '+highScore,W-10,19);
  cx.textAlign='center';
  cx.fillStyle='#888';cx.font='12px monospace';
  cx.fillText('Length: '+snake.length,W/2,19);

  // Overlays
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillStyle='#aaa';
    cx.fillText('Press P to Resume',W/2,H/2+30);
  }

  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=highScore&&score>0){
      cx.fillStyle='#fd0';cx.font='16px monospace';
      cx.fillText('NEW HIGH SCORE!',W/2,H/2+40);
    }
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+80);
  }

  if(state===ST_WIN){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#4f4';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('YOU WIN!',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    cx.fillStyle='#fd0';cx.font='16px monospace';
    cx.fillText('BOARD CLEARED - PERFECT!',W/2,H/2+40);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+80);
  }
}

// Main loop
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.1)dt=0.1;
  globalTime+=dt;

  if(state===ST_PLAY){
    tickAcc+=dt;
    const interval=1/tickRate;
    while(tickAcc>=interval){
      tickAcc-=interval;
      tick();
      if(state!==ST_PLAY)break;
    }
  }

  render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
