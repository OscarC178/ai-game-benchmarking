  GAME:      Snake
  RUN:       r2-gpt54
  BUILDER:   openai/gpt-5.4-mini

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Snake</title>
<style>
  html,body{height:100%;margin:0;background:#0b0b0b;display:flex;align-items:center;justify-content:center}
  #container{width:90vmin;max-width:600px;max-height:600px;height:90vmin;position:relative}
  canvas{width:100%;height:100%;display:block;background:#111111}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Courier, monospace;pointer-events:none;text-align:center;white-space:pre-wrap}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="overlay" class="overlay"></div>
</div>
<script>
(() => {
  // Constants
  const CANVAS_SIZE = 600;
  const COLS = 20, ROWS = 20;
  const CELL = 30; // pixels
  const START_LEN = 3;
  const START_DIR = 'right';
  const START_TICKS_PER_SEC = 8;
  const SPEED_INCREMENT = 0.5; // ticks/sec per food
  const MAX_TPS = 15; // ticks per second cap
  const SCORE_PER_FOOD = 10;

  // Canvas
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const overlay = document.getElementById('overlay');

  // Game state
  let gameState = 'title'; // title, playing, paused, gameover, win
  let tickRate = START_TICKS_PER_SEC; // ticks per second
  let tickAcc = 0; // seconds accumulator
  let lastTime = performance.now();

  let snake = []; // array of {x,y} head at index 0
  let dir = {x:1,y:0};
  let queuedDir = null; // queued direction for next tick
  let queuedThisTick = false;
  let food = null; // {x,y}
  let score = 0;
  let best = 0;

  // Audio (optional)
  let audioCtx = null, audioOk=false;
  function unlockAudio(){ if(audioOk) return; audioOk=true; audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', unlockAudio, {once:true});
  window.addEventListener('keydown', (e)=>{ if(e.key==='Enter') unlockAudio(); }, {once:true});
  function beep(freq=440, dur=0.08, type='sine'){ if(!audioOk) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = type; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }

  // Utilities
  function posEq(a,b){ return a.x===b.x && a.y===b.y; }
  function inBounds(p){ return p.x>=0 && p.x<COLS && p.y>=0 && p.y<ROWS; }
  function randInt(n){ return Math.floor(Math.random()*n); }

  // High score
  try{ const s = localStorage.getItem('snake_best'); if(s) best = parseInt(s,10)||0; }catch(e){ best = 0; }
  function saveBest(){ try{ localStorage.setItem('snake_best', String(best)); }catch(e){} }

  // Initialize
  function resetAll(){ // reset everything for a fresh run
    tickRate = START_TICKS_PER_SEC; tickAcc = 0; queuedDir = null; queuedThisTick = false; score = 0; gameState='title'; overlayMessage(titleText());
    spawnInitialSnake(); food = null; }

  function spawnInitialSnake(){ snake = []; const hx = 10, hy = 10; // head at (10,10)
    for(let i=0;i<START_LEN;i++){ snake.push({x: hx - i, y: hy}); }
    dir = {x:1,y:0}; queuedDir=null; queuedThisTick=false;
  }

  function startGame(){ spawnInitialSnake(); placeFood(); score = 0; tickRate = START_TICKS_PER_SEC; gameState='playing'; overlayMessage(''); lastTime = performance.now(); }

  function placeFood(){ // choose a random free cell
    const occupied = new Set(snake.map(s=>s.x + ',' + s.y));
    if(occupied.size >= COLS*ROWS){ // full board
      food = null; gameState='win'; overlayMessage(winText()); if(score>best){ best=score; saveBest(); } beep(880,0.3,'sine'); return; }
    let tries = 0; while(true){ const x = randInt(COLS); const y = randInt(ROWS); const key = x+','+y; if(!occupied.has(key)){ food = {x,y}; break; } tries++; if(tries>10000) break; }
  }

  // Input handling
  const keyDir = {
    'ArrowUp': {x:0,y:-1}, 'w': {x:0,y:-1}, 'W':{x:0,y:-1},
    'ArrowDown': {x:0,y:1}, 's': {x:0,y:1}, 'S':{x:0,y:1},
    'ArrowLeft': {x:-1,y:0}, 'a': {x:-1,y:0}, 'A':{x:-1,y:0},
    'ArrowRight': {x:1,y:0}, 'd': {x:1,y:0}, 'D':{x:1,y:0}
  };

  window.addEventListener('keydown', (e)=>{
    if(gameState === 'title' && e.key === 'Enter'){ startGame(); }
    else if((gameState === 'gameover' || gameState === 'win') && e.key === 'Enter'){ startGame(); }
    else if(e.key === 'p' || e.key === 'P'){ if(gameState==='playing'){ gameState='paused'; overlayMessage('PAUSED\nPress P to Resume'); } else if(gameState==='paused'){ gameState='playing'; overlayMessage(''); lastTime = performance.now(); }
    }
    // queue direction only if playing and not already queued this tick
    if(gameState === 'playing'){
      const kd = keyDir[e.key]; if(kd){ // ignore direct reverse
        if(queuedThisTick) return; // only one queued turn per tick
        if(kd.x === -dir.x && kd.y === -dir.y) return; // direct reverse not allowed
        queuedDir = kd; queuedThisTick = true;
      }
    }
    if(e.key === ' '){ // allow space as start/restart too
      if(gameState==='title') startGame(); else if(gameState==='gameover' || gameState==='win') startGame(); else if(gameState==='playing'){ gameState='paused'; overlayMessage('PAUSED\nPress P to Resume'); }
    }
  });

  // Game tick update (discrete)
  function tickUpdate(){ // apply queued direction
    if(queuedDir){ dir = queuedDir; queuedDir = null; }
    queuedThisTick = false;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    // collision with walls
    if(!inBoundsGrid(head)){ gameOver(); return; }
    // check self collision with nuance: tail will be removed if not eating
    const willEat = food && head.x === food.x && head.y === food.y;
    const tail = snake[snake.length-1];
    // check collision against body (allow moving into tail if tail will move this tick)
    for(let i=0;i<snake.length;i++){ const s = snake[i]; if(posEq(s, head)){ // if it's the tail and not growing, allow
        if(i === snake.length-1 && !willEat){ // allowed
          break; }
        gameOver(); return; }
    }
    // add new head
    snake.unshift(head);
    if(willEat){ score += SCORE_PER_FOOD; // grow: don't remove tail
      // increase speed
      tickRate = Math.min(MAX_TPS, tickRate + SPEED_INCREMENT);
      placeFood(); // spawn new food or mark win
      beep(900,0.08,'sine');
    } else { // normal move: remove tail
      snake.pop();
    }
    // win condition: filled board
    if(snake.length >= COLS*ROWS){ gameWin(); }
  }

  function inBoundsGrid(p){ return p.x >=0 && p.x < COLS && p.y >=0 && p.y < ROWS; }

  function gameOver(){ gameState='gameover'; overlayMessage('GAME OVER\nScore: '+score+'\nBest: '+best+'\nPress Enter to Restart'); beep(120,0.5,'square'); if(score>best){ best=score; saveBest(); } }
  function gameWin(){ gameState='win'; overlayMessage('YOU WIN!\nScore: '+score+'\nBest: '+best+'\nPress Enter to Play Again'); beep(1500,0.6,'triangle'); if(score>best){ best=score; saveBest(); } }

  // Rendering
  function drawGrid(){ ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1; for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL, CANVAS_SIZE); ctx.stroke(); } for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(CANVAS_SIZE,y*CELL); ctx.stroke(); } }

  function draw(){ // clear
    ctx.fillStyle = '#111111'; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
    // subtle grid lines
    drawGrid();
    // draw food
    if(food){ const fx = food.x*CELL, fy = food.y*CELL; const r = 8; // circle
      ctx.fillStyle = '#ff4b4b'; ctx.beginPath(); ctx.arc(fx+CELL/2, fy+CELL/2, r, 0, Math.PI*2); ctx.fill(); // small shine
      ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.beginPath(); ctx.arc(fx+CELL/2 -3, fy+CELL/2 -5, 3,0,Math.PI*2); ctx.fill(); }
    // draw snake body
    for(let i=snake.length-1;i>=0;i--){ const s = snake[i]; const px = s.x*CELL, py = s.y*CELL; const inset = 2; if(i===0){ // head
        // head rectangle slightly larger and with eye depending on direction
        ctx.fillStyle = '#a8ff8a'; ctx.fillRect(px+2, py+2, CELL-4, CELL-4);
        // eye
        ctx.fillStyle='#003300'; const eyeSize = 4; let ex = px + CELL/2, ey = py + CELL/2; if(dir.x>0){ ex = px + CELL - 8; ey = py + 8; } else if(dir.x<0){ ex = px + 8; ey = py + 8; } else if(dir.y>0){ ex = px + CELL - 8; ey = py + CELL - 8; } else { ex = px + 8; ey = py + 8; } ctx.fillRect(ex-eyeSize/2, ey-eyeSize/2, eyeSize, eyeSize);
      } else {
        ctx.fillStyle = '#68c768'; ctx.fillRect(px+3, py+3, CELL-6, CELL-6);
      } }

    // HUD: score and best
    ctx.fillStyle = '#fff'; ctx.font = '18px monospace'; ctx.textAlign='left'; ctx.fillText('Score: '+score, 8, 20); ctx.textAlign='right'; ctx.fillText('Best: '+best, CANVAS_SIZE-8, 20);

    // overlay handled via DOM overlay element
  }

  function overlayMessage(txt){ overlay.textContent = txt || ''; }

  function titleText(){ return 'SNAKE\n\nUse Arrow keys or WASD to steer.\nPress Enter to Start.\nEat food to grow (+10). Avoid walls and yourself.\nPress P to Pause.'; }
  function winText(){ return 'YOU WIN!\nBoard cleared. Great job!\nScore: '+score+'\nBest: '+best+'\nPress Enter to Play Again'; }

  // Main loop using rAF and tick accumulation
  function loop(now){ const dt = Math.min(0.1, (now - lastTime)/1000); lastTime = now;
    if(gameState === 'playing'){
      tickAcc += dt;
      const tickInterval = 1 / tickRate;
      while(tickAcc >= tickInterval){ tickAcc -= tickInterval; tickUpdate(); }
    }
    // render each frame
    draw(); lastFrame = now; requestAnimationFrame(loop);
  }

  // start
  resetAll(); requestAnimationFrame(loop);

  // helper: immediate start if desired
  window.SNAKE_DEBUG = { startGame, resetAll };
})();
</script>
</body>
</html>
