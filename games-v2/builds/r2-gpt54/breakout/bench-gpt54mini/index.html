  GAME:      Breakout
  RUN:       r2-gpt54
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Breakout</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #wrap{width:100vmin;height:75vmin;max-width:800px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#000}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;pointer-events:none;white-space:pre-wrap;text-align:center}
  #hud{position:absolute;left:12px;top:8px;color:#fff;font-family:monospace;pointer-events:none}
  #hud .right{position:absolute;right:12px;left:auto;text-align:right}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="hud"><div id="score"></div><div id="meta" style="margin-top:6px"></div></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  // Canvas
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const metaEl = document.getElementById('meta');

  // Constants
  const W = 800, H = 600;
  const PADDLE_W = 104, PADDLE_H = 14;
  const PADDLE_START_X = 348, PADDLE_START_Y = 560;
  const PADDLE_SPEED = 520; // px/s
  const BALL_R = 8;
  const BALL_START_X = 400, BALL_START_Y = 548;
  const BALL_START_SPEED = 340; // px/s
  const BALL_SPEED_INCREMENT_LEVEL = 20; // per level
  const BALL_SPEED_MAX = 520;

  const BRICK_COLS = 10, BRICK_ROWS = 6;
  const BRICK_W = 70, BRICK_H = 20;
  const BRICK_START_X = 19, BRICK_START_Y = 52;
  const BRICK_GAP_X = Math.floor((W - 2*BRICK_START_X - BRICK_COLS*BRICK_W) / (BRICK_COLS - 1) || 6);
  const BRICK_GAP_Y = 8;
  const LIVES_START = 3;

  const ROW_COLORS = ['#ff3b3b','#ff8a3b','#ffec3b','#7eff67','#4fb3ff','#c47bff'];
  const ROW_VALUES = [70,50,40,30,20,10];

  // State
  let state = 'title'; // title, playing, paused, life_lost, level_clear, gameover
  let paddle = { x: PADDLE_START_X, y: PADDLE_START_Y, w: PADDLE_W, h: PADDLE_H, vx:0 };
  let ball = { x: BALL_START_X, y: BALL_START_Y, vx:0, vy:0, speed: BALL_START_SPEED, attached:true };
  let bricks = [];
  let score = 0; let high = 0; let lives = LIVES_START; let level = 1;

  // input
  const keys = { left:false, right:false };
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') keys.left = true;
    if(e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = true;
    if(e.key===' '){ if(state==='playing' && ball.attached) launchBall(); else if(state==='title'){ startGame(); } else if(state==='gameover'){ startGame(); } e.preventDefault(); }
    if(e.key==='Enter'){ if(state==='title' || state==='gameover') startGame(); }
    if(e.key==='p' || e.key==='P'){ togglePause(); }
  });
  window.addEventListener('keyup', e=>{ if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') keys.left = false; if(e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = false; });

  // audio
  let audioCtx=null, audioOk=false;
  function ensureAudio(){ if(audioOk) return; audioOk=true; audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', ensureAudio, {once:true});
  function sfx(freq,dur=0.08,type='sine'){ if(!audioOk) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur+0.02); }

  // persistence
  try{ const h = localStorage.getItem('breakout_high'); if(h) high = parseInt(h,10)||0; }catch(e){ high = 0; }
  function saveHigh(){ try{ localStorage.setItem('breakout_high', String(high)); }catch(e){} }

  // bricks
  function makeBricks(){ bricks = []; for(let row=0; row<BRICK_ROWS; row++){ for(let col=0; col<BRICK_COLS; col++){ const x = BRICK_START_X + col*(BRICK_W + BRICK_GAP_X); const y = BRICK_START_Y + row*(BRICK_H + BRICK_GAP_Y); bricks.push({x,y,w:BRICK_W,h:BRICK_H,row,col,color:ROW_COLORS[row],value:ROW_VALUES[row]}); } } }

  // reset positions
  function resetPositions(){ paddle.x = PADDLE_START_X; paddle.vx = 0; ball.x = PADDLE_START_X + paddle.w/2; ball.y = BALL_START_Y; ball.attached = true; ball.speed = Math.min(BALL_START_SPEED + (level-1)*BALL_SPEED_INCREMENT_LEVEL, BALL_SPEED_MAX); ball.vx = 0; ball.vy = 0; }

  function startGame(){ score = 0; lives = LIVES_START; level = 1; makeBricks(); resetPositions(); state='playing'; overlayText(''); }

  function launchBall(){ if(!ball.attached) return; ensureAudio(); // random angle between 240° and 300° (degrees) -> in radians
    const deg = 240 + Math.random()*60; const rad = deg * Math.PI/180; ball.vx = Math.cos(rad) * ball.speed; ball.vy = Math.sin(rad) * ball.speed; ball.attached = false; }

  function togglePause(){ if(state==='playing'){ state='paused'; overlayText('PAUSED'); } else if(state==='paused'){ state='playing'; overlayText(''); } }

  function loseLife(){ lives--; sfx(150,0.4,'sawtooth'); if(lives<=0){ state='gameover'; overlayText('GAME OVER\nScore: '+score+'\nPress Enter to Restart'); if(score>high){ high=score; saveHigh(); } } else { // reset attached
      resetPositions(); overlayText('Life lost - Press Space to Launch'); }
  }

  function nextLevel(){ level++; // increase ball base speed
    makeBricks(); resetPositions(); ball.speed = Math.min(BALL_START_SPEED + (level-1)*BALL_SPEED_INCREMENT_LEVEL, BALL_SPEED_MAX); overlayText('Level '+level+'\nPress Space to Launch'); sfx(900,0.2,'sine'); }

  // collision helpers
  function rectCircleCollide(cx,cy,r,rx,ry,rw,rh){ // closest point
    const closestX = Math.max(rx, Math.min(cx, rx+rw)); const closestY = Math.max(ry, Math.min(cy, ry+rh)); const dx = cx - closestX; const dy = cy - closestY; return (dx*dx + dy*dy) <= r*r; }

  // main update
  let lastTime = performance.now(); function update(now){ const dt = Math.min(0.033, (now - lastTime)/1000); lastTime = now; if(state==='paused' || state==='title' || state==='gameover'){ render(); requestAnimationFrame(update); return; }
    // input - paddle
    let mv = 0; if(keys.left) mv -= 1; if(keys.right) mv += 1; paddle.vx = mv * PADDLE_SPEED; paddle.x += paddle.vx * dt; paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    // attached ball follows paddle
    if(ball.attached){ ball.x = paddle.x + paddle.w/2; ball.y = BALL_START_Y; }
    else {
      // advance ball
      ball.x += ball.vx * dt; ball.y += ball.vy * dt;
      // walls
      if(ball.x - BALL_R <= 0){ ball.x = BALL_R; ball.vx = -ball.vx; sfx(420,0.06); }
      if(ball.x + BALL_R >= W){ ball.x = W - BALL_R; ball.vx = -ball.vx; sfx(420,0.06); }
      if(ball.y - BALL_R <= 0){ ball.y = BALL_R; ball.vy = -ball.vy; sfx(420,0.06); }
      // paddle collision - only if moving downward and intersects
      if(ball.vy > 0 && rectCircleCollide(ball.x, ball.y, BALL_R, paddle.x, paddle.y, paddle.w, paddle.h)){
        // compute hit offset
        const hitX = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1..1
        const maxAngle = 60 * Math.PI/180; // 60deg from vertical
        const angle = hitX * maxAngle; // map to angle
        // new direction: always upward
        const vy = -Math.cos(angle); // negative = up
        const vx = Math.sin(angle);
        // normalize and apply speed
        const mag = Math.hypot(vx, vy);
        ball.vx = (vx / mag) * ball.speed;
        ball.vy = (vy / mag) * ball.speed;
        // reposition above paddle
        ball.y = paddle.y - BALL_R - 0.5;
        sfx(880,0.06);
      }
      // brick collisions: check each brick for collision
      for(let i=0;i<bricks.length;i++){
        const b = bricks[i]; if(!b) continue;
        if(rectCircleCollide(ball.x, ball.y, BALL_R, b.x, b.y, b.w, b.h)){
          // determine side of collision by comparing previous position
          // compute penetration vectors
          const prevX = ball.x - ball.vx * dt; const prevY = ball.y - ball.vy * dt;
          let collidedHoriz = false, collidedVert = false;
          if(prevX + BALL_R <= b.x || prevX - BALL_R >= b.x + b.w) collidedHoriz = true;
          if(prevY + BALL_R <= b.y || prevY - BALL_R >= b.y + b.h) collidedVert = true;
          // if both true, choose the larger overlap
          if(collidedHoriz && !collidedVert) ball.vx = -ball.vx;
          else if(collidedVert && !collidedHoriz) ball.vy = -ball.vy;
          else { // ambiguous, invert vertical for stable behaviour
            ball.vy = -ball.vy;
          }
          // remove brick
          score += b.value || 20; sfx(1200,0.06,'square'); bricks.splice(i,1);
          break;
        }
      }
      // bottom out
      if(ball.y - BALL_R > H){ // fell
        loseLife();
      }
    }

    // check level clear
    if(bricks.length === 0){ nextLevel(); }

    render(); requestAnimationFrame(update);
  }

  // render
  function render(){ // clear
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    // draw bricks
    for(const b of bricks){ ctx.fillStyle = b.color; ctx.fillRect(Math.round(b.x)+1, Math.round(b.y)+1, b.w-2, b.h-2); ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.strokeRect(Math.round(b.x)+1, Math.round(b.y)+1, b.w-2, b.h-2); }
    // paddle
    ctx.fillStyle = '#fff'; roundRect(ctx, Math.round(paddle.x), Math.round(paddle.y), paddle.w, paddle.h, 6); ctx.fill();
    // ball
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
    // HUD
    scoreEl.innerText = 'Score: ' + score + '   Lives: ' + lives + '   Level: ' + level;
    // highscore separately
    metaEl.innerText = 'High: ' + high;
  }

  function overlayText(t){ overlay.textContent = t || ''; }
  function titleScreen(){ return 'BREAKOUT\n\nBounce the ball with the paddle\nBreak all bricks to clear the level\nDon\'t let the ball fall\n\nControls: ← → or A D to move, Space to Launch, P to Pause\n\nPress Enter to Start'; }

  function roundRect(c,x,y,w,h,r){ const m = Math.min(w,h)/2; if(r>m) r=m; c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

  // initialization
  function init(){ makeBricks(); resetPositions(); overlayText(titleScreen()); requestAnimationFrame(update); }

  init();
})();
</script>
</body>
</html>
