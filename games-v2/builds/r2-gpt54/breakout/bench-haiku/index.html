  GAME:      Breakout
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Courier New", monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="breakoutCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('breakoutCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const WIDTH = 800;
    const HEIGHT = 600;
    const PADDLE_WIDTH = 104;
    const PADDLE_HEIGHT = 14;
    const PADDLE_SPEED = 520;
    const BALL_RADIUS = 8;
    const BASE_BALL_SPEED = 340;
    const SPEED_INCREMENT = 20;
    const MAX_BALL_SPEED = 520;

    // Brick constants
    const BRICK_WIDTH = 70;
    const BRICK_HEIGHT = 20;
    const BRICKS_COLS = 10;
    const BRICKS_ROWS = 6;
    const BRICK_START_X = 19;
    const BRICK_START_Y = 52;
    const BRICK_COLORS = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#8B00FF'];
    const BRICK_POINTS = [70, 50, 40, 30, 20, 10];

    // Game states
    const STATES = {
      TITLE: 'title',
      PLAYING: 'playing',
      PAUSED: 'paused',
      READY: 'ready',
      LEVEL_CLEAR: 'level_clear',
      GAME_OVER: 'game_over'
    };

    // Game objects
    let paddle = {
      x: WIDTH / 2 - PADDLE_WIDTH / 2,
      y: 560,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      vx: 0
    };

    let ball = {
      x: WIDTH / 2,
      y: paddle.y - 20,
      vx: 0,
      vy: 0,
      radius: BALL_RADIUS,
      attached: true
    };

    let bricks = [];
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('breakout_best') || '0');
    let lives = 3;
    let level = 1;
    let ballSpeed = BASE_BALL_SPEED;
    let keys = {};
    let audioCtx = null;

    // Initialize bricks
    function createBricks() {
      bricks = [];
      for (let row = 0; row < BRICKS_ROWS; row++) {
        for (let col = 0; col < BRICKS_COLS; col++) {
          bricks.push({
            x: BRICK_START_X + col * (BRICK_WIDTH + 2),
            y: BRICK_START_Y + row * (BRICK_HEIGHT + 2),
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            color: BRICK_COLORS[row],
            row: row,
            active: true
          });
        }
      }
    }

    function resetLevel() {
      createBricks();
      paddle.x = WIDTH / 2 - PADDLE_WIDTH / 2;
      ball.x = WIDTH / 2;
      ball.y = paddle.y - 20;
      ball.vx = 0;
      ball.vy = 0;
      ball.attached = true;
      gameState = STATES.READY;
    }

    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      ballSpeed = BASE_BALL_SPEED;
      resetLevel();
      gameState = STATES.READY;
    }

    function launchBall() {
      if (!ball.attached) return;
      let angle = 240 + Math.random() * 60; // 240-300 degrees
      let rad = angle * Math.PI / 180;
      ball.vx = Math.cos(rad) * ballSpeed;
      ball.vy = Math.sin(rad) * ballSpeed;
      ball.attached = false;
      gameState = STATES.PLAYING;
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (gameState === STATES.TITLE || gameState === STATES.GAME_OVER) {
          resetGame();
          gameState = STATES.READY;
        }
      }

      if (e.key.toLowerCase() === 'p') {
        e.preventDefault();
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === STATES.READY || gameState === STATES.PLAYING && ball.attached) {
          launchBall();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function update(deltaTime) {
      if (gameState === STATES.TITLE || gameState === STATES.PAUSED || gameState === STATES.GAME_OVER) {
        return;
      }

      // Update paddle
      paddle.vx = 0;
      if (keys['arrowleft'] || keys['a']) {
        paddle.vx = -PADDLE_SPEED;
      }
      if (keys['arrowright'] || keys['d']) {
        paddle.vx = PADDLE_SPEED;
      }

      paddle.x += paddle.vx * deltaTime;
      paddle.x = Math.max(0, Math.min(WIDTH - PADDLE_WIDTH, paddle.x));

      // Update ball
      if (ball.attached) {
        ball.x = paddle.x + PADDLE_WIDTH / 2;
        ball.y = paddle.y - 20;
      } else {
        ball.x += ball.vx * deltaTime;
        ball.y += ball.vy * deltaTime;

        // Wall collisions
        if (ball.x - ball.radius < 0) {
          ball.x = ball.radius;
          ball.vx = -ball.vx;
          playSound(400, 0.05);
        }
        if (ball.x + ball.radius > WIDTH) {
          ball.x = WIDTH - ball.radius;
          ball.vx = -ball.vx;
          playSound(400, 0.05);
        }
        if (ball.y - ball.radius < 0) {
          ball.y = ball.radius;
          ball.vy = -ball.vy;
          playSound(400, 0.05);
        }

        // Paddle collision
        if (ball.vy > 0 && 
            ball.y + ball.radius > paddle.y &&
            ball.y - ball.radius < paddle.y + paddle.height &&
            ball.x > paddle.x &&
            ball.x < paddle.x + paddle.width) {
          let hitPos = (ball.x - paddle.x) / paddle.width;
          hitPos = Math.max(0, Math.min(1, hitPos));
          let angle = (hitPos - 0.5) * Math.PI / 3;
          let speed = ballSpeed;
          ball.vx = Math.sin(angle) * speed;
          ball.vy = -Math.cos(angle) * speed;
          ball.y = paddle.y - ball.radius;
          playSound(800, 0.04);
        }

        // Brick collision
        for (let i = 0; i < bricks.length; i++) {
          let brick = bricks[i];
          if (!brick.active) continue;

          if (ball.x + ball.radius > brick.x &&
              ball.x - ball.radius < brick.x + brick.width &&
              ball.y + ball.radius > brick.y &&
              ball.y - ball.radius < brick.y + brick.height) {
            brick.active = false;
            score += BRICK_POINTS[brick.row];
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('breakout_best', highScore);
            }
            playSound(600, 0.08);

            // Simple collision resolution
            let overlapLeft = (ball.x + ball.radius) - brick.x;
            let overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
            let overlapTop = (ball.y + ball.radius) - brick.y;
            let overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);

            let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapLeft || minOverlap === overlapRight) {
              ball.vx = -ball.vx;
            } else {
              ball.vy = -ball.vy;
            }
            break;
          }
        }

        // Out of bounds
        if (ball.y > HEIGHT) {
          lives--;
          if (lives > 0) {
            ball.attached = true;
            ball.x = paddle.x + PADDLE_WIDTH / 2;
            ball.y = paddle.y - 20;
            gameState = STATES.READY;
            playSound(200, 0.2);
          } else {
            gameState = STATES.GAME_OVER;
            playSound(100, 0.3);
          }
        }

        // Level clear
        let allCleared = bricks.every(b => !b.active);
        if (allCleared) {
          level++;
          ballSpeed = Math.min(ballSpeed + SPEED_INCREMENT, MAX_BALL_SPEED);
          resetLevel();
          gameState = STATES.READY;
          playSound(1000, 0.1);
        }
      }
    }

    function drawBricks() {
      for (let brick of bricks) {
        if (!brick.active) continue;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
      }
    }

    function drawPaddle() {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }

    function drawBall() {
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHUD() {
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Best: ' + highScore, WIDTH - 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('Lives: ' + lives + '  Level: ' + level, WIDTH / 2, 25);
    }

    function drawTitle() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 72px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BREAKOUT', WIDTH / 2, 100);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '18px "Courier New", monospace';
      ctx.fillText('Bounce the ball with the paddle', WIDTH / 2, 180);
      ctx.fillText('Break all bricks to clear the level', WIDTH / 2, 210);
      ctx.fillText("Don't let the ball fall", WIDTH / 2, 240);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '16px "Courier New", monospace';
      ctx.fillText('Arrow Keys or A/D to move', WIDTH / 2, 300);
      ctx.fillText('Space to launch', WIDTH / 2, 330);

      ctx.fillStyle = '#FFFF00';
      ctx.font = 'bold 24px "Courier New", monospace';
      ctx.fillText('Press ENTER to Start', WIDTH / 2, 450);
    }

    function drawPause() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);

      ctx.fillStyle = '#AAAAAA';
      ctx.font = '16px "Courier New", monospace';
      ctx.fillText('Press P to Resume', WIDTH / 2, HEIGHT / 2 + 60);
    }

    function drawReady() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FFFF00';
      ctx.font = '20px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press SPACE to Launch', WIDTH / 2, 300);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', WIDTH / 2, 150);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = '32px "Courier New", monospace';
      ctx.fillText('Score: ' + score, WIDTH / 2, 240);

      ctx.fillStyle = '#FFFF00';
      ctx.font = 'bold 24px "Courier New", monospace';
      ctx.fillText('Press ENTER to Restart', WIDTH / 2, 400);
    }

    function render() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (gameState === STATES.TITLE) {
        drawTitle();
      } else if (gameState === STATES.GAME_OVER) {
        drawBricks();
        drawPaddle();
        drawBall();
        drawHUD();
        drawGameOver();
      } else {
        drawBricks();
        drawPaddle();
        drawBall();
        drawHUD();

        if (gameState === STATES.PAUSED) {
          drawPause();
        } else if (gameState === STATES.READY) {
          drawReady();
        }
      }
    }

    function playSound(freq, duration) {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          return;
        }
      }

      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.frequency.value = freq;
        osc.type = 'square';

        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration);
      } catch (e) {
        // Fail silently
      }
    }

    // Main loop
    let lastTime = performance.now();
    function gameLoop(currentTime) {
      const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.016);
      lastTime = currentTime;

      update(deltaTime);
      render();

      requestAnimationFrame(gameLoop);
    }

    createBricks();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
