<!--
  GAME:      Breakout
  RUN:       r2-gpt54
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600;

// Scale to viewport
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H)*0.95;
  cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize);resize();

// Constants
const PW=104,PH=14,BALL_R=8;
const P_SPEED=520,BASE_BALL_SPEED=340,MAX_BALL_SPEED=520,SPEED_INC=20;
const BRICK_COLS=10,BRICK_ROWS=6,BRICK_W=70,BRICK_H=20;
const BRICK_OX=19,BRICK_OY=52,BRICK_GAP_X=5,BRICK_GAP_Y=4;
const ROW_COLORS=['#e33','#f80','#ee0','#3b3','#48f','#a4f'];
const ROW_POINTS=[70,50,40,30,20,10];
const WIN_LIVES=3;

// Audio
let audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(freq,dur,vol,type){
  if(!audioCtx)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=vol||0.08;g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function sndWall(){beep(300,0.04,0.06);}
function sndPaddle(){beep(440,0.05,0.1);}
function sndBrick(){beep(660,0.06,0.1,'sine');}
function sndLose(){beep(150,0.25,0.12,'sawtooth');}
function sndClear(){beep(880,0.1,0.1,'sine');setTimeout(()=>beep(1100,0.12,0.1,'sine'),120);}

// States
const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3;
let state=ST_TITLE;

// Game vars
let paddle,ball,bricks,score,hiScore,lives,level,ballSpeed,attached;

hiScore=0;
try{const v=localStorage.getItem('breakout_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('breakout_best',String(hiScore));}catch(e){}}}

function createBricks(){
  bricks=[];
  for(let r=0;r<BRICK_ROWS;r++){
    for(let c=0;c<BRICK_COLS;c++){
      bricks.push({
        x:BRICK_OX+c*(BRICK_W+BRICK_GAP_X),
        y:BRICK_OY+r*(BRICK_H+BRICK_GAP_Y),
        w:BRICK_W,h:BRICK_H,
        color:ROW_COLORS[r],
        points:ROW_POINTS[r],
        alive:true
      });
    }
  }
}

function resetPaddleBall(){
  paddle={x:348,y:560,w:PW,h:PH};
  ball={x:400,y:548,vx:0,vy:0};
  attached=true;
}

function startGame(){
  score=0;lives=WIN_LIVES;level=1;
  ballSpeed=BASE_BALL_SPEED;
  createBricks();resetPaddleBall();
  state=ST_PLAY;
}

function launchBall(){
  if(!attached)return;
  attached=false;
  // Random angle between 240° and 300° (math angles: up-left to up-right)
  const angle=(240+Math.random()*60)*Math.PI/180;
  ball.vx=Math.cos(angle)*ballSpeed;
  ball.vy=Math.sin(angle)*ballSpeed;
}

function loseLife(){
  lives--;sndLose();
  if(lives<=0){state=ST_OVER;saveHi();return;}
  resetPaddleBall();
}

function clearLevel(){
  sndClear();
  level++;
  ballSpeed=Math.min(MAX_BALL_SPEED,BASE_BALL_SPEED+(level-1)*SPEED_INC);
  createBricks();resetPaddleBall();
}

// Input
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;initAudio();
  if(e.code==='Enter'||e.code==='Space')e.preventDefault();
  if(e.code==='Enter'){
    if(state===ST_TITLE)startGame();
    else if(state===ST_OVER)startGame();
  }
  if(e.code==='Space'&&state===ST_PLAY&&attached)launchBall();
  if(e.code==='KeyP'){
    if(state===ST_PLAY){state=ST_PAUSE;}
    else if(state===ST_PAUSE){state=ST_PLAY;}
  }
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// Update
function update(dt){
  if(state!==ST_PLAY)return;

  // Paddle
  let pdx=0;
  if(keys['ArrowLeft']||keys['KeyA'])pdx=-1;
  if(keys['ArrowRight']||keys['KeyD'])pdx=1;
  paddle.x+=pdx*P_SPEED*dt;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  // Attached ball
  if(attached){
    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-BALL_R;
    return;
  }

  // Move ball
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;

  // Wall collisions
  if(ball.x-BALL_R<0){ball.x=BALL_R;ball.vx=Math.abs(ball.vx);sndWall();}
  if(ball.x+BALL_R>W){ball.x=W-BALL_R;ball.vx=-Math.abs(ball.vx);sndWall();}
  if(ball.y-BALL_R<0){ball.y=BALL_R;ball.vy=Math.abs(ball.vy);sndWall();}

  // Bottom out
  if(ball.y-BALL_R>H){loseLife();return;}

  // Paddle collision
  if(ball.vy>0){
    const px=paddle.x,py=paddle.y,pw=paddle.w,ph=paddle.h;
    if(ball.x+BALL_R>px&&ball.x-BALL_R<px+pw&&ball.y+BALL_R>py&&ball.y-BALL_R<py+ph){
      // Hit offset -1 to +1
      const offset=((ball.x-(px+pw/2))/(pw/2));
      const clampOff=Math.max(-1,Math.min(1,offset));
      // Angle: -60° to +60° from straight up
      const angle=clampOff*60*Math.PI/180;
      const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      ball.vx=Math.sin(angle)*spd;
      ball.vy=-Math.cos(angle)*spd;
      ball.y=py-BALL_R;
      sndPaddle();
    }
  }

  // Brick collisions
  let anyAlive=false;
  for(const b of bricks){
    if(!b.alive)continue;
    anyAlive=true;
    // Circle vs AABB
    const closestX=Math.max(b.x,Math.min(ball.x,b.x+b.w));
    const closestY=Math.max(b.y,Math.min(ball.y,b.y+b.h));
    const dx=ball.x-closestX,dy=ball.y-closestY;
    if(dx*dx+dy*dy<BALL_R*BALL_R){
      b.alive=false;
      score+=b.points;saveHi();
      sndBrick();
      // Determine reflection side
      const overlapL=ball.x+BALL_R-b.x;
      const overlapR=(b.x+b.w)-(ball.x-BALL_R);
      const overlapT=ball.y+BALL_R-b.y;
      const overlapB=(b.y+b.h)-(ball.y-BALL_R);
      const minOverlapX=Math.min(overlapL,overlapR);
      const minOverlapY=Math.min(overlapT,overlapB);
      if(minOverlapX<minOverlapY){
        ball.vx=-ball.vx;
        ball.x+=(overlapL<overlapR?-minOverlapX:minOverlapX)*0.5;
      }else{
        ball.vy=-ball.vy;
        ball.y+=(overlapT<overlapB?-minOverlapY:minOverlapY)*0.5;
      }
      break;// one brick per frame
    }
  }

  // Check level clear
  if(!bricks.some(b=>b.alive))clearLevel();
}

// Render
function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#e33';cx.font='bold 64px monospace';cx.textAlign='center';
    cx.fillText('BREAKOUT',W/2,180);
    cx.fillStyle='#ccc';cx.font='16px monospace';
    cx.fillText('Bounce the ball with the paddle.',W/2,270);
    cx.fillText('Break all bricks to clear the level.',W/2,300);
    cx.fillText("Don't let the ball fall!",W/2,330);
    cx.fillText('Arrow Keys or A/D — Move Paddle',W/2,380);
    cx.fillText('Space — Launch Ball',W/2,410);
    cx.fillText('P — Pause',W/2,440);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Start',W/2,510);
    if(hiScore>0){cx.fillStyle='#888';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,560);}
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive)continue;
    cx.fillStyle=b.color;
    cx.fillRect(b.x,b.y,b.w,b.h);
    cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;
    cx.strokeRect(b.x+0.5,b.y+0.5,b.w-1,b.h-1);
  }

  // Paddle
  cx.fillStyle='#fff';
  cx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

  // Ball
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);cx.fill();

  // HUD
  cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='left';
  cx.fillText('Score: '+score,12,26);
  cx.textAlign='right';
  cx.fillText('Best: '+hiScore,W-12,26);
  cx.textAlign='center';
  cx.fillText('Lives: '+lives+'  Level: '+level,W/2,26);

  // Attached prompt
  if(attached&&state===ST_PLAY){
    cx.fillStyle='rgba(255,255,255,0.5)';cx.font='16px monospace';cx.textAlign='center';
    cx.fillText('Press Space to Launch',W/2,520);
  }

  // Pause overlay
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='16px monospace';cx.fillStyle='#aaa';
    cx.fillText('Press P to Resume',W/2,H/2+30);
  }

  // Game over
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 48px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){
      cx.fillStyle='#fd0';cx.font='16px monospace';
      cx.fillText('NEW HIGH SCORE!',W/2,H/2+40);
    }
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press Enter to Restart',W/2,H/2+80);
  }
}

// Main loop
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);
  render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
