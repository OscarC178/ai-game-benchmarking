<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAKOUT - Classic Arcade</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PADDLE_WIDTH = 104;
        const PADDLE_HEIGHT = 14;
        const BALL_RADIUS = 8;
        const INITIAL_BALL_SPEED = 340;
        const PADDLE_SPEED = 520;
        const BRICK_ROWS = 6;
        const BRICK_COLS = 10;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 20;
        const BRICK_TOP_OFFSET = 52;
        const BRICK_LEFT_OFFSET = 19;
        const BRICK_GAP = 8;

        const COLORS = ['#FF0000', '#FF8C00', '#FFFF00', '#00FF00', '#0000FF', '#8B00FF'];
        const ROW_POINTS = [70, 50, 40, 30, 20, 10];

        // Game State
        const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };
        let gameState = STATES.TITLE;
        let score = 0;
        let lives = 3;
        let level = 1;
        let highScore = localStorage.getItem('breakout_highscore') || 0;
        let lastTime = 0;

        // Entities
        const paddle = {
            x: (CANVAS_WIDTH - PADDLE_WIDTH) / 2,
            y: 560,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT
        };

        const ball = {
            x: 0,
            y: 0,
            radius: BALL_RADIUS,
            vx: 0,
            vy: 0,
            speed: INITIAL_BALL_SPEED,
            attached: true
        };

        let bricks = [];

        // Audio
        let audioCtx = null;
        function playSound(freq, type = 'square', duration = 0.1, vol = 0.1) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            initAudio();
            keys[e.code] = true;
            if (e.code === 'Enter') {
                if (gameState === STATES.TITLE || gameState === STATES.GAMEOVER) {
                    resetGame();
                    gameState = STATES.PLAYING;
                }
            } else if (e.code === 'KeyP') {
                if (gameState === STATES.PLAYING) gameState = STATES.PAUSED;
                else if (gameState === STATES.PAUSED) gameState = STATES.PLAYING;
            } else if (e.code === 'Space') {
                if (gameState === STATES.PLAYING && ball.attached) {
                    launchBall();
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function resetGame() {
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = INITIAL_BALL_SPEED;
            initLevel();
        }

        function initLevel() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: BRICK_LEFT_OFFSET + c * (BRICK_WIDTH + BRICK_GAP),
                        y: BRICK_TOP_OFFSET + r * (BRICK_HEIGHT + BRICK_GAP),
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color: COLORS[r],
                        points: ROW_POINTS[r],
                        active: true
                    });
                }
            }
            resetBall();
        }

        function resetBall() {
            ball.attached = true;
            ball.vx = 0;
            ball.vy = 0;
        }

        function launchBall() {
            ball.attached = false;
            // Launch upward at a random angle between approx 240 and 300 degrees
            const angle = (240 + Math.random() * 60) * (Math.PI / 180);
            ball.vx = Math.cos(angle) * ball.speed;
            ball.vy = Math.sin(angle) * ball.speed;
            playSound(440, 'triangle', 0.15);
        }

        function update(dt) {
            if (gameState !== STATES.PLAYING) return;

            // Paddle movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                paddle.x -= PADDLE_SPEED * dt;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                paddle.x += PADDLE_SPEED * dt;
            }
            paddle.x = Math.max(0, Math.min(CANVAS_WIDTH - paddle.width, paddle.x));

            if (ball.attached) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
            } else {
                ball.x += ball.vx * dt;
                ball.y += ball.vy * dt;

                // Wall collisions
                if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx *= -1;
                    playSound(220);
                } else if (ball.x + ball.radius > CANVAS_WIDTH) {
                    ball.x = CANVAS_WIDTH - ball.radius;
                    ball.vx *= -1;
                    playSound(220);
                }
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                    ball.vy *= -1;
                    playSound(220);
                } else if (ball.y > CANVAS_HEIGHT) {
                    lives--;
                    playSound(110, 'sawtooth', 0.3);
                    if (lives <= 0) {
                        gameState = STATES.GAMEOVER;
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('breakout_highscore', highScore);
                        }
                    } else {
                        resetBall();
                    }
                }

                // Paddle collision
                if (ball.vy > 0 && 
                    ball.y + ball.radius > paddle.y && 
                    ball.y - ball.radius < paddle.y + paddle.height &&
                    ball.x > paddle.x && 
                    ball.x < paddle.x + paddle.width) {
                    
                    const hitPos = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2);
                    const bounceAngle = hitPos * (Math.PI / 3); // max 60 degrees
                    ball.vx = Math.sin(bounceAngle) * ball.speed;
                    ball.vy = -Math.cos(bounceAngle) * ball.speed;
                    ball.y = paddle.y - ball.radius; 
                    playSound(660, 'sine', 0.1);
                }

                // Brick collisions
                for (let b of bricks) {
                    if (b.active && 
                        ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.width &&
                        ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.height) {
                        
                        b.active = false;
                        score += b.points;
                        
                        // Detect side of hit for reflection
                        const overlapLeft = (ball.x + ball.radius) - b.x;
                        const overlapRight = (b.x + b.width) - (ball.x - ball.radius);
                        const overlapTop = (ball.y + ball.radius) - b.y;
                        const overlapBottom = (b.y + b.height) - (ball.y - ball.radius);

                        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                            ball.vx *= -1;
                        } else {
                            ball.vy *= -1;
                        }

                        playSound(880, 'square', 0.05, 0.05);
                        checkLevelClear();
                        break;
                    }
                }
            }
        }

        function checkLevelClear() {
            if (bricks.every(b => !b.active)) {
                level++;
                ball.speed = Math.min(520, ball.speed + 20);
                playSound(880, 'triangle', 0.5);
                initLevel();
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (gameState === STATES.TITLE) {
                ctx.fillStyle = '#FFF';
                ctx.textAlign = 'center';
                ctx.font = 'bold 64px sans-serif';
                ctx.fillText('BREAKOUT', CANVAS_WIDTH / 2, 250);
                ctx.font = '18px sans-serif';
                ctx.fillText('Bounce the ball with the paddle.', CANVAS_WIDTH / 2, 320);
                ctx.fillText('Break all bricks to clear the level.', CANVAS_WIDTH / 2, 345);
                ctx.fillText('Don\'t let the ball fall.', CANVAS_WIDTH / 2, 370);
                ctx.font = 'bold 20px sans-serif';
                ctx.fillText('ARROWS/WASD to MOVE | SPACE to LAUNCH ball', CANVAS_WIDTH / 2, 430);
                ctx.fillText('PRESS ENTER TO START', CANVAS_WIDTH / 2, 500);
            } else {
                // HUD
                ctx.fillStyle = '#FFF';
                ctx.font = '16px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`SCORE: ${score}`, 20, 30);
                ctx.textAlign = 'center';
                ctx.fillText(`LEVEL: ${level}   LIVES: ${lives}`, CANVAS_WIDTH / 2, 30);
                ctx.textAlign = 'right';
                ctx.fillText(`HIGH SCORE: ${highScore}`, CANVAS_WIDTH - 20, 30);

                // Paddle
                ctx.fillStyle = '#FFF';
                ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

                // Ball
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();

                // Bricks
                bricks.forEach(b => {
                    if (b.active) {
                        ctx.fillStyle = b.color;
                        ctx.fillRect(b.x, b.y, b.width, b.height);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(b.x, b.y, b.width, b.height);
                    }
                });

                if (gameState === STATES.PAUSED) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    ctx.fillStyle = '#FFF';
                    ctx.textAlign = 'center';
                    ctx.font = '40px bold sans-serif';
                    ctx.fillText('PAUSED', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
                } else if (gameState === STATES.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    ctx.fillStyle = '#FFF';
                    ctx.textAlign = 'center';
                    ctx.font = '64px bold sans-serif';
                    ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 250);
                    ctx.font = '24px sans-serif';
                    ctx.fillText(`FINAL SCORE: ${score}`, CANVAS_WIDTH / 2, 320);
                    ctx.fillText('PRESS ENTER TO RESTART', CANVAS_WIDTH / 2, 450);
                } else if (ball.attached) {
                    ctx.fillStyle = '#FFF';
                    ctx.textAlign = 'center';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('PRESS SPACE TO LAUNCH', CANVAS_WIDTH / 2, 450);
                }
            }
        }

        function gameLoop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
