<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 600;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Grid settings
    const GRID_SIZE = 20;
    const CELL_SIZE = W / GRID_SIZE;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    const STATE_VICTORY = 4;
    
    // Colors
    const COLORS = {
      background: '#111111',
      grid: '#222222',
      snakeHead: '#44FF44',
      snakeBody: '#00CC00',
      snakeTail: '#008800',
      food: '#FF3333',
      foodPulse: '#FF6666',
      text: '#FFFFFF',
      death: '#FF0000'
    };
    
    // Game settings
    const INITIAL_TICK_INTERVAL = 150;
    const MIN_TICK_INTERVAL = 60;
    const SPEED_INCREASE_FOOD = 5;
    const SPEED_INCREASE_AMOUNT = 10;
    const POINTS_PER_FOOD = 10;
    const INITIAL_LENGTH = 3;
    
    // Directions
    const DIRECTIONS = {
      UP: { x: 0, y: -1 },
      DOWN: { x: 0, y: 1 },
      LEFT: { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 }
    };
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let snake = [];
    let food = null;
    let currentDirection = DIRECTIONS.RIGHT;
    let nextDirection = DIRECTIONS.RIGHT;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snake_highscore') || '0');
    let tickInterval = INITIAL_TICK_INTERVAL;
    let lastTickTime = 0;
    let foodEaten = 0;
    let foodPulse = 0;
    let deathFlash = 0;
    
    // Input
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      // Initialize snake at center, moving right
      snake = [];
      const startX = Math.floor(GRID_SIZE / 2);
      const startY = Math.floor(GRID_SIZE / 2);
      
      for (let i = 0; i < INITIAL_LENGTH; i++) {
        snake.push({ x: startX - i, y: startY });
      }
      
      currentDirection = DIRECTIONS.RIGHT;
      nextDirection = DIRECTIONS.RIGHT;
      score = 0;
      foodEaten = 0;
      tickInterval = INITIAL_TICK_INTERVAL;
      deathFlash = 0;
      
      spawnFood();
    }
    
    function spawnFood() {
      const emptyCells = [];
      
      for (let x = 0; x < GRID_SIZE; x++) {
        for (let y = 0; y < GRID_SIZE; y++) {
          const isOccupied = snake.some(segment => segment.x === x && segment.y === y);
          if (!isOccupied) {
            emptyCells.push({ x, y });
          }
        }
      }
      
      if (emptyCells.length === 0) {
        // Victory! Snake fills entire grid
        food = null;
        return false;
      }
      
      const randomIndex = Math.floor(Math.random() * emptyCells.length);
      food = emptyCells[randomIndex];
      return true;
    }
    
    // ==================== UPDATE ====================
    function update(currentTime) {
      if (state !== STATE_PLAYING) return;
      
      // Check if it's time for a game tick
      if (currentTime - lastTickTime < tickInterval) return;
      lastTickTime = currentTime;
      
      // Apply buffered direction
      currentDirection = nextDirection;
      
      // Calculate new head position
      const head = snake[0];
      const newHead = {
        x: head.x + currentDirection.x,
        y: head.y + currentDirection.y
      };
      
      // Check wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
          newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameOver();
        return;
      }
      
      // Check self collision (exclude tail since it will move)
      for (let i = 0; i < snake.length - 1; i++) {
        if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
          gameOver();
          return;
        }
      }
      
      // Add new head
      snake.unshift(newHead);
      
      // Check food collision
      if (food && newHead.x === food.x && newHead.y === food.y) {
        // Eat food
        score += POINTS_PER_FOOD;
        foodEaten++;
        
        // Increase speed
        if (foodEaten % SPEED_INCREASE_FOOD === 0) {
          tickInterval = Math.max(MIN_TICK_INTERVAL, tickInterval - SPEED_INCREASE_AMOUNT);
        }
        
        // Spawn new food
        if (!spawnFood()) {
          // Victory!
          victory();
          return;
        }
        
        // Don't remove tail - snake grows
      } else {
        // Remove tail
        snake.pop();
      }
    }
    
    function gameOver() {
      state = STATE_GAMEOVER;
      deathFlash = 20;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_highscore', highScore);
      }
    }
    
    function victory() {
      state = STATE_VICTORY;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_highscore', highScore);
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      // Clear canvas
      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, W, H);
      
      // Draw grid
      drawGrid();
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Draw food
      if (food) {
        drawFood();
      }
      
      // Draw snake
      drawSnake();
      
      // Draw score
      drawScore();
      
      // Draw overlays
      if (state === STATE_PAUSED) {
        drawPauseScreen();
      } else if (state === STATE_GAMEOVER) {
        drawGameOverScreen();
      } else if (state === STATE_VICTORY) {
        drawVictoryScreen();
      }
    }
    
    function drawGrid() {
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      
      for (let i = 0; i <= GRID_SIZE; i++) {
        // Vertical lines
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, H);
        ctx.stroke();
        
        // Horizontal lines
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(W, i * CELL_SIZE);
        ctx.stroke();
      }
    }
    
    function drawSnake() {
      for (let i = snake.length - 1; i >= 0; i--) {
        const segment = snake[i];
        const x = segment.x * CELL_SIZE;
        const y = segment.y * CELL_SIZE;
        
        // Calculate color based on position
        let color;
        if (deathFlash > 0 && i === 0) {
          // Flash red on death
          color = deathFlash % 2 === 0 ? COLORS.death : COLORS.snakeHead;
        } else if (i === 0) {
          // Head
          color = COLORS.snakeHead;
        } else {
          // Body gradient
          const ratio = i / snake.length;
          const r = Math.floor(0x00 + (0x00 - 0x00) * ratio);
          const g = Math.floor(0xCC + (0x88 - 0xCC) * ratio);
          const b = Math.floor(0x00 + (0x00 - 0x00) * ratio);
          color = `rgb(${r}, ${g}, ${b})`;
        }
        
        // Draw segment with rounded corners
        ctx.fillStyle = color;
        const padding = 1;
        const radius = 4;
        
        roundRect(
          x + padding,
          y + padding,
          CELL_SIZE - padding * 2,
          CELL_SIZE - padding * 2,
          radius
        );
        ctx.fill();
        
        // Draw eyes on head
        if (i === 0) {
          drawEyes(segment);
        }
      }
      
      if (deathFlash > 0) {
        deathFlash--;
      }
    }
    
    function drawEyes(head) {
      const x = head.x * CELL_SIZE;
      const y = head.y * CELL_SIZE;
      const eyeSize = 4;
      const eyeOffset = 8;
      
      ctx.fillStyle = '#000';
      
      // Position eyes based on direction
      let eye1X, eye1Y, eye2X, eye2Y;
      
      if (currentDirection === DIRECTIONS.RIGHT) {
        eye1X = x + CELL_SIZE - eyeOffset;
        eye1Y = y + eyeOffset;
        eye2X = x + CELL_SIZE - eyeOffset;
        eye2Y = y + CELL_SIZE - eyeOffset - eyeSize;
      } else if (currentDirection === DIRECTIONS.LEFT) {
        eye1X = x + eyeOffset - eyeSize;
        eye1Y = y + eyeOffset;
        eye2X = x + eyeOffset - eyeSize;
        eye2Y = y + CELL_SIZE - eyeOffset - eyeSize;
      } else if (currentDirection === DIRECTIONS.UP) {
        eye1X = x + eyeOffset;
        eye1Y = y + eyeOffset - eyeSize;
        eye2X = x + CELL_SIZE - eyeOffset - eyeSize;
        eye2Y = y + eyeOffset - eyeSize;
      } else {
        eye1X = x + eyeOffset;
        eye1Y = y + CELL_SIZE - eyeOffset;
        eye2X = x + CELL_SIZE - eyeOffset - eyeSize;
        eye2Y = y + CELL_SIZE - eyeOffset;
      }
      
      ctx.beginPath();
      ctx.arc(eye1X + eyeSize/2, eye1Y + eyeSize/2, eyeSize/2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(eye2X + eyeSize/2, eye2Y + eyeSize/2, eyeSize/2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawFood() {
      foodPulse += 0.1;
      const pulse = Math.sin(foodPulse) * 0.15 + 1;
      const size = CELL_SIZE * 0.7 * pulse;
      const offset = (CELL_SIZE - size) / 2;
      
      const x = food.x * CELL_SIZE + CELL_SIZE / 2;
      const y = food.y * CELL_SIZE + CELL_SIZE / 2;
      
      // Draw food with pulse effect
      ctx.fillStyle = COLORS.foodPulse;
      ctx.beginPath();
      ctx.arc(x, y, size / 2 + 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = COLORS.food;
      ctx.beginPath();
      ctx.arc(x, y, size / 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Sparkle
      ctx.fillStyle = '#FFF';
      const sparkle = Math.sin(foodPulse * 2) * 2;
      ctx.beginPath();
      ctx.arc(x - 4, y - 4, 2 + sparkle, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawScore() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 24px Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 30);
      
      // High score
      ctx.font = '18px Arial, sans-serif';
      ctx.fillText(`High: ${highScore}`, 10, 55);
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = COLORS.snakeHead;
      ctx.font = 'bold 72px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', W / 2, H / 2 - 100);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText('Press SPACE to start', W / 2, H / 2);
      
      ctx.font = '18px Arial, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow keys or WASD to move', W / 2, H / 2 + 50);
      ctx.fillText('Eat food to grow', W / 2, H / 2 + 80);
      ctx.fillText('Avoid walls and yourself!', W / 2, H / 2 + 110);
      
      ctx.fillStyle = COLORS.food;
      ctx.font = '16px Arial, sans-serif';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 170);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press SPACE to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.death;
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 20);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = COLORS.snakeHead;
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 60);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 110);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 140);
    }
    
    function drawVictoryScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.snakeHead;
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.food;
      ctx.font = 'bold 32px Arial, sans-serif';
      ctx.fillText('PERFECT SCORE!', W / 2, H / 2);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 50);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 110);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 140);
    }
    
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
    
    // ==================== INPUT HANDLING ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      // Title screen
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        lastTickTime = performance.now();
        e.preventDefault();
        return;
      }
      
      // Playing state - direction controls
      if (state === STATE_PLAYING) {
        let newDirection = null;
        
        if ((e.code === 'ArrowUp' || e.code === 'KeyW') && currentDirection !== DIRECTIONS.DOWN) {
          newDirection = DIRECTIONS.UP;
        } else if ((e.code === 'ArrowDown' || e.code === 'KeyS') && currentDirection !== DIRECTIONS.UP) {
          newDirection = DIRECTIONS.DOWN;
        } else if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && currentDirection !== DIRECTIONS.RIGHT) {
          newDirection = DIRECTIONS.LEFT;
        } else if ((e.code === 'ArrowRight' || e.code === 'KeyD') && currentDirection !== DIRECTIONS.LEFT) {
          newDirection = DIRECTIONS.RIGHT;
        }
        
        if (newDirection) {
          nextDirection = newDirection;
          e.preventDefault();
          return;
        }
      }
      
      // Pause toggle
      if (e.code === 'Space') {
        if (state === STATE_PLAYING) {
          state = STATE_PAUSED;
        } else if (state === STATE_PAUSED) {
          state = STATE_PLAYING;
          lastTickTime = performance.now();
        }
        e.preventDefault();
        return;
      }
      
      // Restart
      if (e.code === 'KeyR') {
        initGame();
        state = STATE_PLAYING;
        lastTickTime = performance.now();
        e.preventDefault();
        return;
      }
      
      // Escape to title
      if (e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
        return;
      }
      
      // Prevent default for game keys
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    // Reset keys when window loses focus
    window.addEventListener('blur', () => {
      for (const key in keys) {
        keys[key] = false;
      }
    });
    
    // ==================== GAME LOOP ====================
    function gameLoop(currentTime) {
      update(currentTime);
      render();
      requestAnimationFrame(gameLoop);
    }
    
    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
