<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas" width="600" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 600;
    const HEIGHT = 600;
    const GRID_SIZE = 20;
    const CELL_SIZE = 30;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);

    // Snake
    let snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];

    // Directions
    const directions = {
      UP: { x: 0, y: -1 },
      DOWN: { x: 0, y: 1 },
      LEFT: { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 }
    };

    let currentDirection = directions.RIGHT;
    let nextDirection = directions.RIGHT;

    // Food
    let food = { x: 15, y: 10 };

    // Game timing
    let lastTickTime = 0;
    let tickInterval = 150;

    // Input tracking
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState !== STATES.TITLE) {
          startGame();
        }
      }

      if (key === 'escape') {
        gameState = STATES.TITLE;
      }

      // Direction changes
      if (gameState === STATES.PLAYING || gameState === STATES.PAUSED) {
        if (key === 'arrowup' || key === 'w') {
          if (!isOppositeDirection(directions.UP, currentDirection)) {
            nextDirection = directions.UP;
          }
        }
        if (key === 'arrowdown' || key === 's') {
          if (!isOppositeDirection(directions.DOWN, currentDirection)) {
            nextDirection = directions.DOWN;
          }
        }
        if (key === 'arrowleft' || key === 'a') {
          if (!isOppositeDirection(directions.LEFT, currentDirection)) {
            nextDirection = directions.LEFT;
          }
        }
        if (key === 'arrowright' || key === 'd') {
          if (!isOppositeDirection(directions.RIGHT, currentDirection)) {
            nextDirection = directions.RIGHT;
          }
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function isOppositeDirection(dir1, dir2) {
      return dir1.x === -dir2.x && dir1.y === -dir2.y;
    }

    function startGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      currentDirection = directions.RIGHT;
      nextDirection = directions.RIGHT;
      score = 0;
      tickInterval = 150;
      lastTickTime = Date.now();
      spawnFood();
      gameState = STATES.PLAYING;
    }

    function spawnFood() {
      const emptyCells = [];
      for (let x = 0; x < GRID_SIZE; x++) {
        for (let y = 0; y < GRID_SIZE; y++) {
          const isOccupied = snake.some(segment => segment.x === x && segment.y === y);
          if (!isOccupied) {
            emptyCells.push({ x, y });
          }
        }
      }

      if (emptyCells.length === 0) {
        // Victory condition: entire grid filled
        gameState = STATES.GAME_OVER;
        return;
      }

      const randomIndex = Math.floor(Math.random() * emptyCells.length);
      food = emptyCells[randomIndex];
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      currentDirection = nextDirection;

      // Calculate new head
      const head = snake[0];
      const newHead = {
        x: head.x + currentDirection.x,
        y: head.y + currentDirection.y
      };

      // Wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameState = STATES.GAME_OVER;
        return;
      }

      // Self collision
      for (let i = 0; i < snake.length; i++) {
        if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
          gameState = STATES.GAME_OVER;
          return;
        }
      }

      // Add new head
      snake.unshift(newHead);

      // Check food collision
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
        }

        // Grow snake: don't pop tail
        // Increase speed
        tickInterval = Math.max(60, tickInterval - 2);
        
        spawnFood();
      } else {
        // No food eaten: remove tail
        snake.pop();
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw grid (optional faint lines)
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, HEIGHT);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(WIDTH, pos);
        ctx.stroke();
      }

      // Draw food
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        const segment = snake[i];
        if (i === 0) {
          // Head: bright green
          ctx.fillStyle = '#00FF00';
        } else {
          // Body: darker green, gradient from head to tail
          const darkness = Math.floor(50 + (i / snake.length) * 100);
          ctx.fillStyle = `rgb(0, ${darkness}, 0)`;
        }
        ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      }

      // Draw score
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 30);

      // Draw high score
      ctx.font = '16px Arial';
      ctx.fillText('High Score: ' + highScore, 10, 55);

      // Draw game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SNAKE', WIDTH / 2, 150);

        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);

        ctx.font = '18px Arial';
        ctx.fillText('Arrow keys or WASD to move', WIDTH / 2, 330);
        ctx.fillText('Space to pause', WIDTH / 2, 365);
        ctx.fillText('R to restart', WIDTH / 2, 400);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, WIDTH / 2 - 40);

        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, WIDTH / 2 + 40);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '24px Arial';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);

        if (score === highScore && score > 0) {
          ctx.fillStyle = '#FFFF00';
          ctx.fillText('NEW HIGH SCORE!', WIDTH / 2, 330);
          ctx.fillStyle = '#FFFFFF';
        }

        ctx.font = '20px Arial';
        ctx.fillText('Press R to play again', WIDTH / 2, 380);
        ctx.fillText('Press ESC for title', WIDTH / 2, 415);
      }
    }

    function gameLoop(currentTime) {
      // Check if it's time for a game tick
      if (currentTime - lastTickTime >= tickInterval) {
        lastTickTime = currentTime;
        update();
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
