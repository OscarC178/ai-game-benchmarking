<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #111;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;
  const GRID = 20;
  const CELL = 30;
  const BASE_TICK = 150;
  const MIN_TICK = 60;

  const STATES = {
    TITLE: 'title',
    PLAYING: 'playing',
    PAUSED: 'paused',
    GAME_OVER: 'game_over',
    VICTORY: 'victory'
  };

  const DIRS = {
    up: { x: 0, y: -1, name: 'up' },
    down: { x: 0, y: 1, name: 'down' },
    left: { x: -1, y: 0, name: 'left' },
    right: { x: 1, y: 0, name: 'right' }
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let snake = [];
  let direction = DIRS.right;
  let pendingDirection = null;
  let food = null;
  let score = 0;
  let highScore = loadHighScore();
  let foodEaten = 0;
  let tickInterval = BASE_TICK;
  let lastTickTime = 0;
  let lastTime = 0;
  let moveProgress = 0;
  let deathFlash = 0;
  let foodPulse = 0;

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('snake_best_r4_glm5') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('snake_best_r4_glm5', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function isOpposite(a, b) {
    return a.x === -b.x && a.y === -b.y;
  }

  function resetGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = DIRS.right;
    pendingDirection = null;
    score = 0;
    foodEaten = 0;
    tickInterval = BASE_TICK;
    deathFlash = 0;
    spawnFood();
    lastTickTime = performance.now();
    moveProgress = 0;
  }

  function spawnFood() {
    const empty = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        const occupied = snake.some(seg => seg.x === x && seg.y === y);
        if (!occupied) empty.push({ x, y });
      }
    }
    if (empty.length === 0) {
      food = null;
      state = STATES.VICTORY;
      updateHighScore();
      return;
    }
    food = empty[Math.floor(Math.random() * empty.length)];
  }

  function queueDirection(dir) {
    const reference = pendingDirection || direction;
    if (!isOpposite(dir, reference)) pendingDirection = dir;
  }

  function handleDirectionInput() {
    if (justPressed('ArrowUp') || justPressed('KeyW')) queueDirection(DIRS.up);
    else if (justPressed('ArrowDown') || justPressed('KeyS')) queueDirection(DIRS.down);
    else if (justPressed('ArrowLeft') || justPressed('KeyA')) queueDirection(DIRS.left);
    else if (justPressed('ArrowRight') || justPressed('KeyD')) queueDirection(DIRS.right);
  }

  function gameOver() {
    state = STATES.GAME_OVER;
    deathFlash = 0.7;
    updateHighScore();
  }

  function updateTick() {
    if (pendingDirection && !isOpposite(pendingDirection, direction)) {
      direction = pendingDirection;
    }
    pendingDirection = null;

    const head = snake[0];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };

    if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
      gameOver();
      return;
    }

    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(newHead);

    if (food && newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      foodEaten += 1;
      updateHighScore();
      tickInterval = Math.max(MIN_TICK, BASE_TICK - Math.floor(foodEaten / 5) * 10);
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function update(dt, now) {
    foodPulse += dt * 4;
    deathFlash = Math.max(0, deathFlash - dt);

    if (state !== STATES.PLAYING) return;

    if (now - lastTickTime >= tickInterval) {
      const steps = Math.min(4, Math.floor((now - lastTickTime) / tickInterval));
      for (let i = 0; i < steps; i++) {
        if (state !== STATES.PLAYING) break;
        updateTick();
        lastTickTime += tickInterval;
      }
    }

    moveProgress = Math.min(1, (now - lastTickTime) / tickInterval);
  }

  function interpolatedSegment(index) {
    const seg = snake[index];
    if (!seg) return null;

    if (index === 0) {
      return {
        x: (seg.x - direction.x * (1 - moveProgress)) * CELL,
        y: (seg.y - direction.y * (1 - moveProgress)) * CELL
      };
    }

    const prev = snake[index - 1];
    return {
      x: (seg.x + (prev.x - seg.x) * moveProgress) * CELL,
      y: (seg.y + (prev.y - seg.y) * moveProgress) * CELL
    };
  }

  function drawGrid() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL + 0.5, 0);
      ctx.lineTo(i * CELL + 0.5, H);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL + 0.5);
      ctx.lineTo(W, i * CELL + 0.5);
      ctx.stroke();
    }
  }

  function drawFood() {
    if (!food) return;
    const cx = food.x * CELL + CELL / 2;
    const cy = food.y * CELL + CELL / 2;
    const pulse = 9 + Math.sin(foodPulse) * 2.5;
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 4, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
      const pos = interpolatedSegment(i);
      if (!pos) continue;
      const inset = 3;
      const size = CELL - inset * 2;
      const shade = i === 0 ? 255 : Math.max(90, 220 - i * 4);
      const color = state === STATES.GAME_OVER && deathFlash > 0 ? '#ff4444' : (i === 0 ? `rgb(68,255,68)` : `rgb(0,${shade},0)`);
      ctx.fillStyle = color;
      roundRect(ctx, pos.x + inset, pos.y + inset, size, size, 8);
      ctx.fill();

      if (i === 0) {
        const headX = pos.x + CELL / 2;
        const headY = pos.y + CELL / 2;
        ctx.fillStyle = '#001100';
        const eyes = eyePositions(headX, headY);
        ctx.beginPath();
        ctx.arc(eyes[0].x, eyes[0].y, 2.2, 0, Math.PI * 2);
        ctx.arc(eyes[1].x, eyes[1].y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function eyePositions(cx, cy) {
    if (direction === DIRS.right) return [{ x: cx + 6, y: cy - 6 }, { x: cx + 6, y: cy + 6 }];
    if (direction === DIRS.left) return [{ x: cx - 6, y: cy - 6 }, { x: cx - 6, y: cy + 6 }];
    if (direction === DIRS.up) return [{ x: cx - 6, y: cy - 6 }, { x: cx + 6, y: cy - 6 }];
    return [{ x: cx - 6, y: cy + 6 }, { x: cx + 6, y: cy + 6 }];
  }

  function roundRect(context, x, y, w, h, r) {
    context.beginPath();
    context.moveTo(x + r, y);
    context.arcTo(x + w, y, x + w, y + h, r);
    context.arcTo(x + w, y + h, x, y + h, r);
    context.arcTo(x, y + h, x, y, r);
    context.arcTo(x, y, x + w, y, r);
    context.closePath();
  }

  function drawHUD() {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`Score: ${score}`, 12, 8);
    ctx.textAlign = 'right';
    ctx.fillText(`High: ${highScore}`, W - 12, 8);
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 56px Arial';
    ctx.fillText(title, W / 2, H / 2 - 70);
    ctx.font = '24px Arial';
    lines.forEach((line, i) => {
      ctx.fillText(line, W / 2, H / 2 + i * 34);
    });
  }

  function render() {
    drawGrid();
    drawFood();
    drawSnake();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('SNAKE', [
        'Press SPACE to start',
        'Arrow keys or WASD to move',
        `High Score: ${highScore}`
      ], true);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press SPACE to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      const lines = [
        `Score: ${score}`,
        'Press R to play again',
        'Press ESC for title screen'
      ];
      if (score >= highScore && score > 0) lines.splice(1, 0, 'New High Score!');
      drawOverlay('GAME OVER', lines, true);
    } else if (state === STATES.VICTORY) {
      drawOverlay('YOU WIN!', [
        `Perfect Score: ${score}`,
        'Press R to play again',
        'Press ESC for title screen'
      ], true);
    }
  }

  function handleStateInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) {
        resetGame();
        state = STATES.PLAYING;
      } else if (state === STATES.PLAYING) {
        state = STATES.PAUSED;
      } else if (state === STATES.PAUSED) {
        state = STATES.PLAYING;
        lastTickTime = performance.now();
      }
    }

    if (justPressed('KeyR')) {
      if (state === STATES.PLAYING || state === STATES.PAUSED || state === STATES.GAME_OVER || state === STATES.VICTORY) {
        resetGame();
        state = STATES.PLAYING;
      }
    }

    if (justPressed('Escape')) {
      if (state !== STATES.TITLE) {
        state = STATES.TITLE;
      }
    }
  }

  function syncPrev() {
    const watched = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyR','Escape'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    handleDirectionInput();
    handleStateInput();
    update(dt, now);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyR','Escape'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  resetGame();
  state = STATES.TITLE;
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
