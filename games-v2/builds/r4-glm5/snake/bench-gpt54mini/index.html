<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   openai/gpt-5.4-mini
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Snake</title>
<style>
  html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
  #container{width:90vmin;height:90vmin;max-width:600px;max-height:600px;position:relative}
  canvas{width:100%;height:100%;display:block;background:#111}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:monospace;white-space:pre-wrap;text-align:center;pointer-events:none}
  #hud{position:absolute;left:8px;top:8px;color:#fff;font-family:monospace;font-size:16px;pointer-events:none;text-align:left}
</style>
</head>
<body>
<div id="container">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="hud"></div>
  <div id="overlay" class="overlay"></div>
</div>
<script>
(() => {
  // Grid and canvas
  const CANVAS = document.getElementById('c');
  const ctx = CANVAS.getContext('2d');
  const HUD = document.getElementById('hud');
  const OVERLAY = document.getElementById('overlay');

  const CANVAS_PX = 600;
  const COLS = 20, ROWS = 20;
  const CELL = 30; // pixels

  // Game constants
  const START_LENGTH = 3;
  const START_HEAD = { x: 10, y: 10 };
  const START_DIR = { x: 1, y: 0 }; // moving right
  const INITIAL_TICK_MS = 150; // 150ms per tick
  const SPEED_DECREASE_MS = 5; // decrease tick interval by 5ms per food (as optional)
  const MIN_TICK_MS = 60; // cap
  const SCORE_PER_FOOD = 10;

  // State
  let gameState = 'title'; // title, playing, paused, gameover, win
  let snake = []; // head at index 0
  let dir = { ...START_DIR };
  let queuedDir = null; // single queued direction
  let queuedThisTick = false;
  let food = null;
  let score = 0;
  let high = 0;
  let tickMs = INITIAL_TICK_MS;

  // Timing
  let lastFrame = performance.now();
  let tickAccumulator = 0;

  // Audio
  let audioCtx = null, audioOk = false;
  function unlockAudio(){ if(audioOk) return; audioOk = true; audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  window.addEventListener('pointerdown', unlockAudio, { once: true });
  window.addEventListener('keydown', e=>{ if(e.key==='Enter') unlockAudio(); }, { once: true });
  function playEat(){ if(!audioOk) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(440,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(880,audioCtx.currentTime+0.12); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,audioCtx.currentTime+0.01); o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.18); o.stop(audioCtx.currentTime+0.2); }
  function playDie(){ if(!audioOk) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(220,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.4); g.gain.setValueAtTime(0.0001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.14,audioCtx.currentTime+0.02); o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.48); o.stop(audioCtx.currentTime+0.5); }

  // Load high score
  try{ const saved = localStorage.getItem('snake_high'); if(saved) high = parseInt(saved,10) || 0; }catch(e){ high = 0; }
  function saveHigh(){ try{ localStorage.setItem('snake_high', String(high)); }catch(e){} }

  // Utility
  function inBounds(p){ return p.x >= 0 && p.x < COLS && p.y >= 0 && p.y < ROWS; }
  function eq(a,b){ return a.x === b.x && a.y === b.y; }
  function clone(p){ return { x: p.x, y: p.y }; }

  // Setup / reset
  function resetAll(){ snake = []; dir = { ...START_DIR }; queuedDir = null; queuedThisTick = false; food = null; score = 0; tickMs = INITIAL_TICK_MS; gameState = 'title'; overlayText(titleText()); }
  function initSnake(){ snake = []; for(let i=0;i<START_LENGTH;i++){ snake.push({ x: START_HEAD.x - i, y: START_HEAD.y }); } dir = { ...START_DIR }; queuedDir = null; queuedThisTick=false; }

  function startGame(){ initSnake(); placeFood(); score = 0; tickMs = INITIAL_TICK_MS; gameState = 'playing'; overlayText(''); lastFrame = performance.now(); tickAccumulator = 0; }

  function titleText(){ return 'SNAKE\n\nArrow keys or WASD to move\nPress Enter to Start\nPress Space to Pause'; }
  function gameOverText(){ return 'GAME OVER\nScore: ' + score + '\nPress Enter to Restart'; }
  function winText(){ return 'YOU WIN!\nScore: ' + score + '\nPress Enter to Play Again'; }

  // Food spawn ensuring empty cell
  function placeFood(){ // generate list of empty cells
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    if(occupied.size >= COLS * ROWS){ food = null; gameState = 'win'; overlayText(winText()); if(score > high){ high = score; saveHigh(); } playEat(); return; }
    let empties = [];
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){ const key = x+','+y; if(!occupied.has(key)) empties.push({x,y}); }
    if(empties.length === 0){ food = null; gameState = 'win'; overlayText(winText()); if(score > high){ high = score; saveHigh(); } return; }
    const pick = empties[Math.floor(Math.random()*empties.length)]; food = pick; }

  // Input handling with single queued turn per tick
  const dirMap = { 'ArrowUp': {x:0,y:-1}, 'w': {x:0,y:-1}, 'W': {x:0,y:-1}, 'ArrowDown': {x:0,y:1}, 's': {x:0,y:1}, 'S': {x:0,y:1}, 'ArrowLeft': {x:-1,y:0}, 'a': {x:-1,y:0}, 'A': {x:-1,y:0}, 'ArrowRight': {x:1,y:0}, 'd': {x:1,y:0}, 'D': {x:1,y:0} };
  window.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      if(gameState === 'title'){ startGame(); }
      else if(gameState === 'gameover' || gameState === 'win'){ startGame(); }
      e.preventDefault();
      return;
    }
    if(e.key === ' '){ if(gameState === 'playing'){ gameState = 'paused'; overlayText('PAUSED\nPress Space to Resume'); } else if(gameState === 'paused'){ gameState = 'playing'; overlayText(''); lastFrame = performance.now(); } e.preventDefault(); return; }
    if(e.key === 'r' || e.key === 'R'){ startGame(); return; }
    if(e.key === 'Escape'){ resetAll(); return; }
    if(e.key === 'p' || e.key === 'P'){ if(gameState === 'playing'){ gameState = 'paused'; overlayText('PAUSED\nPress P to Resume'); } else if(gameState === 'paused'){ gameState = 'playing'; overlayText(''); lastFrame = performance.now(); } return; }

    if(gameState !== 'playing') return;
    const d = dirMap[e.key]; if(!d) return;
    // determine effectiveDir = queuedDir if exists else current dir
    const effective = queuedDir ? queuedDir : dir;
    // prevent reversing
    if(d.x === -effective.x && d.y === -effective.y) return;
    if(!queuedThisTick){ queuedDir = d; queuedThisTick = true; }
  });

  // Tick update (discrete)
  function tick(){ // apply queued direction
    if(queuedDir){ dir = queuedDir; queuedDir = null; }
    queuedThisTick = false;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // wall collision
    if(!inBounds(head)){ // game over
      gameState = 'gameover'; overlayText(gameOverText()); playDie(); if(score > high){ high = score; saveHigh(); } return; }
    const willEat = food && head.x === food.x && head.y === food.y;
    // self collision with tail nuance: allow moving into tail if tail will move (i.e., not eating)
    for(let i=0;i<snake.length;i++){
      const s = snake[i];
      if(s.x === head.x && s.y === head.y){ if(i === snake.length - 1 && !willEat) break; // allowed
        gameState = 'gameover'; overlayText(gameOverText()); playDie(); if(score > high){ high = score; saveHigh(); } return; }
    }
    // add head
    snake.unshift(head);
    if(willEat){ score += SCORE_PER_FOOD; playEat(); // increase speed slightly by decreasing tickMs
      // decrease tickMs but respect min
      tickMs = Math.max(MIN_TICK_MS, tickMs - SPEED_DECREASE_MS);
      placeFood(); }
    else { snake.pop(); }
    // win condition: full board
    if(snake.length >= COLS * ROWS){ gameState = 'win'; overlayText(winText()); if(score > high){ high = score; saveHigh(); } playEat(); }
  }

  // Render functions
  function drawGrid(){ ctx.strokeStyle = '#222'; ctx.lineWidth = 1; for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,CANVAS_PX); ctx.stroke(); } for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(CANVAS_PX,y*CELL); ctx.stroke(); } }

  function render(){ // clear
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,CANVAS_PX,CANVAS_PX);
    drawGrid();
    // draw food
    if(food){ const fx = food.x*CELL, fy = food.y*CELL; const size = CELL*0.6; const off = (CELL - size)/2; ctx.fillStyle = '#ff3333'; roundRect(ctx, fx+off, fy+off, size, size, 6); ctx.fill(); }
    // draw snake segments (tail to head)
    for(let i=snake.length-1;i>=0;i--){ const seg = snake[i]; const px = seg.x*CELL, py = seg.y*CELL; if(i===0){ // head
        ctx.fillStyle = '#44FF44'; roundRect(ctx, px+2, py+2, CELL-4, CELL-4, 6); ctx.fill(); // eyes
        ctx.fillStyle = '#003300'; const eye = 4; let ex = px + 6, ey = py + 6; if(dir.x>0){ ex = px + CELL - 8; ey = py + 8; } else if(dir.x<0){ ex = px + 6; ey = py + 8; } else if(dir.y>0){ ex = px + CELL - 8; ey = py + CELL - 8; } else { ex = px + 6; ey = py + 6; } ctx.fillRect(ex, ey, eye, eye);
      } else {
        // body gradient based on index
        const t = i / Math.max(1, snake.length-1);
        const g = Math.floor(204 - t*120);
        ctx.fillStyle = 'rgb(0,' + g + ',0)'; roundRect(ctx, px+3, py+3, CELL-6, CELL-6, 5); ctx.fill(); }
    }
    // HUD
    HUD.innerText = 'Score: ' + score + '\nBest: ' + high + '\nTick: ' + Math.round(1000/tickMs) + ' tps';
  }

  function overlayText(t){ OVERLAY.textContent = t || ''; }
  function titleText(){ return 'SNAKE\n\nUse Arrow keys or WASD to move\nEat food to grow (+10)\nPress Enter to Start'; }

  // helper for rounded rect
  function roundRect(ctx, x, y, w, h, r){ const min = Math.min(w,h)/2; if(r>min) r=min; ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // main loop
  function loop(now){ const dt = Math.min(0.1, (now - lastFrame)/1000); lastFrame = now; if(gameState === 'playing'){ tickAccumulator += dt*1000; while(tickAccumulator >= tickMs){ tickAccumulator -= tickMs; tick(); queuedThisTick = false; } }
    render(); requestAnimationFrame(loop); }

  // start
  resetAll(); lastFrame = performance.now(); requestAnimationFrame(loop);

})();
</script>
</body>
</html>
