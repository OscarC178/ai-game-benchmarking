  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Arcade Classic</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            text-align: center;
            width: 600px;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score" id="scoreBoard">Score: 0</div>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');

        // Constants
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        const CANVAS_SIZE = 600;

        // Game State
        let state = 'TITLE'; // TITLE, PLAYING, PAUSED, GAMEOVER, VICTORY
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let lastTickTime = 0;
        let tickInterval = 150;
        let foodEatenThisTick = false;

        const DIRS = {
            UP:    { x: 0,  y: -1 },
            DOWN:  { x: 0,  y: 1  },
            LEFT:  { x: -1, y: 0  },
            RIGHT: { x: 1,  y: 0  }
        };

        // Input Handling
        window.addEventListener('keydown', handleKey);

        function handleKey(e) {
            const key = e.key.toLowerCase();
            
            if (state === 'TITLE' || state === 'GAMEOVER' || state === 'VICTORY') {
                if (key === ' ' || key === 'enter') {
                    resetGame();
                    state = 'PLAYING';
                }
                return;
            }

            if (state === 'PLAYING') {
                if (key === ' ' || key === 'escape') {
                    state = 'PAUSED';
                    return;
                }
                
                // Direction changes
                if ((key === 'arrowup' || key === 'w') && direction.y === 0) nextDirection = DIRS.UP;
                if ((key === 'arrowdown' || key === 's') && direction.y === 0) nextDirection = DIRS.DOWN;
                if ((key === 'arrowleft' || key === 'a') && direction.x === 0) nextDirection = DIRS.LEFT;
                if ((key === 'arrowright' || key === 'd') && direction.x === 0) nextDirection = DIRS.RIGHT;
            } else if (state === 'PAUSED') {
                if (key === ' ' || key === 'escape') {
                    state = 'PLAYING';
                }
                if (key === 'r') {
                    resetGame();
                    state = 'PLAYING';
                }
            }
            
            if (key === 'escape' && (state === 'GAMEOVER' || state === 'VICTORY')) {
                state = 'TITLE';
            }
        }

        function resetGame() {
            score = 0;
            tickInterval = 150;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = DIRS.RIGHT;
            nextDirection = DIRS.RIGHT;
            spawnFood();
            updateScore();
        }

        function spawnFood() {
            const emptyCells = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    const isOccupied = snake.some(s => s.x === x && s.y === y);
                    if (!isOccupied) emptyCells.push({ x, y });
                }
            }
            if (emptyCells.length === 0) {
                state = 'VICTORY';
                return;
            }
            const rand = Math.floor(Math.random() * emptyCells.length);
            food = emptyCells[rand];
        }

        function updateScore() {
            scoreBoard.innerText = `Score: ${score}`;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        function update() {
            if (state !== 'PLAYING') return;

            direction = nextDirection;
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Wall Collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                state = 'GAMEOVER';
                return;
            }

            // Self Collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                state = 'GAMEOVER';
                return;
            }

            snake.unshift(newHead);

            // Food Collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                updateScore();
                spawnFood();
                // Speed increase every 5 food
                if (score % 50 === 0 && tickInterval > 60) {
                    tickInterval -= 10;
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Grid lines
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(600, i * CELL_SIZE);
                ctx.stroke();
            }

            // Draw Food
            ctx.fillStyle = '#FF3333';
            ctx.beginPath();
            const foodCenterX = food.x * CELL_SIZE + CELL_SIZE / 2;
            const foodCenterY = food.y * CELL_SIZE + CELL_SIZE / 2;
            ctx.arc(foodCenterX, foodCenterY, CELL_SIZE / 2 - 4, 0, Math.PI * 2);
            ctx.fill();
            // Food highlight
            ctx.fillStyle = '#FF9999';
            ctx.beginPath();
            ctx.arc(foodCenterX - 4, foodCenterY - 4, 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw Snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#44FF44' : `rgb(0, ${Math.max(100, 204 - index * 2)}, 0)`;
                
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const radius = 6;
                
                // Rounded segments
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = '#000';
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    if (direction.x === 1) { // Right
                        eyeX1 = x + 20; eyeY1 = y + 8; eyeX2 = x + 20; eyeY2 = y + 22;
                    } else if (direction.x === -1) { // Left
                        eyeX1 = x + 10; eyeY1 = y + 8; eyeX2 = x + 10; eyeY2 = y + 22;
                    } else if (direction.y === -1) { // Up
                        eyeX1 = x + 8; eyeY1 = y + 10; eyeX2 = x + 22; eyeY2 = y + 10;
                    } else { // Down
                        eyeX1 = x + 8; eyeY1 = y + 20; eyeX2 = x + 22; eyeY2 = y + 20;
                    }
                    ctx.beginPath(); ctx.arc(eyeX1, eyeY1, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeX2, eyeY2, 2, 0, Math.PI * 2); ctx.fill();
                }
            });

            // Overlays
            if (state === 'TITLE') {
                drawOverlay('SNAKE', 'Press SPACE to start', `High Score: ${highScore}`);
            } else if (state === 'PAUSED') {
                drawOverlay('PAUSED', 'Press SPACE to resume', 'Press R to restart');
            } else if (state === 'GAMEOVER') {
                drawOverlay('GAME OVER', `Final Score: ${score}`, 'Press R to play again');
            } else if (state === 'VICTORY') {
                drawOverlay('VICTORY!', 'PERFECT SCORE!', 'Press R to play again');
            }
        }

        function drawOverlay(title, sub, detail) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            
            ctx.font = 'bold 80px Segoe UI';
            ctx.fillText(title, CANVAS_SIZE / 2, 250);
            
            ctx.font = '24px Segoe UI';
            ctx.fillText(sub, CANVAS_SIZE / 2, 320);
            
            ctx.font = '18px Segoe UI';
            ctx.fillStyle = '#888';
            ctx.fillText(detail, CANVAS_SIZE / 2, 370);
        }

        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);
            
            if (state === 'PLAYING') {
                if (currentTime - lastTickTime >= tickInterval) {
                    lastTickTime = currentTime;
                    update();
                }
            }
            
            draw();
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
