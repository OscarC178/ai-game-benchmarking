<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600, CELL = 30, COLS = 20, ROWS = 20;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = (W*s)+'px'; canvas.style.height = (H*s)+'px';
}
window.addEventListener('resize', resize); resize();

// ---- State machine ----
const ST = { TITLE:0, PLAYING:1, PAUSED:2, GAMEOVER:3 };
let state = ST.TITLE;

// ---- Snake & food ----
let snake, dir, pendingDir, food, score, hiScore, tickInterval, foodCount;
hiScore = parseInt(localStorage.getItem('snake4_hi')||'0');
let lastTick = 0, totalTime = 0;
let deathFlash = 0;

const DIRS = {
  UP:    {x:0,  y:-1},
  DOWN:  {x:0,  y:1},
  LEFT:  {x:-1, y:0},
  RIGHT: {x:1,  y:0}
};

function opposite(a, b){ return a.x === -b.x && a.y === -b.y; }

function initGame(){
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = DIRS.RIGHT; pendingDir = null;
  score = 0; foodCount = 0;
  tickInterval = 150;
  spawnFood();
  lastTick = performance.now();
  deathFlash = 0;
}

function spawnFood(){
  const empty = [];
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){
    if(!snake.some(s=>s.x===x&&s.y===y)) empty.push({x,y});
  }
  if(!empty.length){ food=null; return; }
  food = empty[Math.floor(Math.random()*empty.length)];
}

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e=>{
  const k = e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]){
    // Edge-triggered
    if(k===' '||k==='Spacebar'){
      if(state===ST.TITLE){ initGame(); state=ST.PLAYING; }
      else if(state===ST.PLAYING) state=ST.PAUSED;
      else if(state===ST.PAUSED) state=ST.PLAYING;
    }
    if((k==='r'||k==='R')){
      if(state===ST.PAUSED||state===ST.GAMEOVER||state===ST.PLAYING){ initGame(); state=ST.PLAYING; }
    }
    if(k==='Escape'){
      if(state!==ST.TITLE){ state=ST.TITLE; }
    }
    // Direction input
    let newDir = null;
    if(k==='ArrowUp'||k==='w'||k==='W') newDir = DIRS.UP;
    if(k==='ArrowDown'||k==='s'||k==='S') newDir = DIRS.DOWN;
    if(k==='ArrowLeft'||k==='a'||k==='A') newDir = DIRS.LEFT;
    if(k==='ArrowRight'||k==='d'||k==='D') newDir = DIRS.RIGHT;
    if(newDir && !opposite(newDir, pendingDir||dir)) pendingDir = newDir;
  }
  keys[k] = true;
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });
window.addEventListener('blur', ()=>{ for(const k in keys) keys[k]=false; });

// ---- Update ----
function update(now){
  if(state!==ST.PLAYING) return;
  if(now - lastTick < tickInterval) return;
  lastTick = now;

  if(pendingDir){ dir = pendingDir; pendingDir = null; }

  const head = snake[0];
  const newHead = {x: head.x+dir.x, y: head.y+dir.y};

  // Wall collision
  if(newHead.x<0||newHead.x>=COLS||newHead.y<0||newHead.y>=ROWS){
    die(); return;
  }
  // Self collision
  for(let i=0;i<snake.length-1;i++){
    if(newHead.x===snake[i].x&&newHead.y===snake[i].y){ die(); return; }
  }

  snake.unshift(newHead);
  const eaten = food && newHead.x===food.x && newHead.y===food.y;
  if(eaten){
    score+=10; foodCount++;
    if(score>hiScore){ hiScore=score; localStorage.setItem('snake4_hi',hiScore); }
    tickInterval = Math.max(60, 150 - Math.floor(foodCount/5)*10);
    spawnFood();
    if(!food){ state=ST.GAMEOVER; return; } // victory
  } else {
    snake.pop();
  }
}

function die(){
  deathFlash = 8;
  setTimeout(()=>{ state=ST.GAMEOVER; }, 500);
  state=ST.PAUSED; // freeze during death anim
}

// ---- Render ----
function render(now){
  totalTime = now/1000;
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  for(let i=0;i<=COLS;i++){ ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,H); ctx.stroke(); }
  for(let j=0;j<=ROWS;j++){ ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(W,j*CELL); ctx.stroke(); }

  if(state===ST.TITLE){
    ctx.fillStyle='#00FF00'; ctx.font='bold 80px sans-serif'; ctx.textAlign='center';
    ctx.fillText('SNAKE',W/2,200);
    ctx.fillStyle='#fff'; ctx.font='22px sans-serif';
    ctx.fillText('Press SPACE to start',W/2,300);
    ctx.fillStyle='#888'; ctx.font='16px sans-serif';
    ctx.fillText('Arrow keys or WASD to move',W/2,345);
    ctx.fillStyle='#555'; ctx.font='15px sans-serif';
    ctx.fillText('Best: '+hiScore,W/2,410);
    return;
  }

  // Food pulse
  if(food){
    const pulse = 1+Math.sin(totalTime*5)*0.15;
    const r = CELL/2*pulse;
    ctx.fillStyle='#FF3333';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, r, 0, Math.PI*2); ctx.fill();
  }

  // Snake
  const dying = deathFlash>0 && Math.floor(deathFlash)%2===0;
  for(let i=snake.length-1;i>=0;i--){
    const seg = snake[i];
    const t = i/snake.length;
    const g = dying ? 0 : Math.round(200 - t*100);
    ctx.fillStyle = dying ? '#FF4444' : (i===0?'#44FF44':`rgb(0,${g},0)`);
    const pad = 2;
    ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
    // Head eyes
    if(i===0){
      ctx.fillStyle='#000';
      const cx=seg.x*CELL+CELL/2, cy=seg.y*CELL+CELL/2;
      const ex=dir.x*8, ey=dir.y*8;
      const perp=dir.y!==0?{x:5,y:0}:{x:0,y:5};
      ctx.beginPath(); ctx.arc(cx+ex+perp.x,cy+ey+perp.y,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex-perp.x,cy+ey-perp.y,3,0,Math.PI*2); ctx.fill();
    }
  }
  if(deathFlash>0) deathFlash--;

  // Score
  ctx.fillStyle='#fff'; ctx.font='bold 24px sans-serif'; ctx.textAlign='left';
  ctx.fillText('Score: '+score, 8, 28);

  if(state===ST.PAUSED&&deathFlash===0){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 52px sans-serif'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-20);
    ctx.font='20px sans-serif'; ctx.fillStyle='#aaa';
    ctx.fillText('Press SPACE to resume  |  R to restart',W/2,H/2+30);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF4444'; ctx.font='bold 56px sans-serif'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-50);
    ctx.fillStyle='#fff'; ctx.font='26px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    if(score>=hiScore&&score>0){ ctx.fillStyle='#FFD700'; ctx.font='20px sans-serif'; ctx.fillText('New High Score!',W/2,H/2+45); }
    ctx.fillStyle='#aaa'; ctx.font='18px sans-serif';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+90);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render(now);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
