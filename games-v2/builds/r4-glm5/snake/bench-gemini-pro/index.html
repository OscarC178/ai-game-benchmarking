<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #111;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #FFF;
        font-family: sans-serif;
    }
    canvas {
        background-color: #000;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<script>
// --- CONSTANTS & CONFIG ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;
const ROWS = 20;
const CELL = Math.floor(canvas.width / COLS); // 30

const DIR = {
    UP: { x: 0, y: -1 },
    DOWN: { x: 0, y: 1 },
    LEFT: { x: -1, y: 0 },
    RIGHT: { x: 1, y: 0 }
};

const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_PAUSED = 2;
const STATE_GAMEOVER = 3;
const STATE_VICTORY = 4;

// --- STATE ---
let state = STATE_TITLE;
let lastTickTime = 0;
let tickInterval = 150; // ms
let frameTime = 0;

let snake = [];
let currentDir = DIR.RIGHT;
let nextDir = DIR.RIGHT; // Buffered input

let food = null;
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;

let deathAnimTimer = 0;

// --- SETUP ---

function resetGame() {
    // Initial 3 segments, moving right from center
    let startX = Math.floor(COLS / 2);
    let startY = Math.floor(ROWS / 2);
    
    snake = [
        { x: startX, y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY }
    ];
    
    currentDir = DIR.RIGHT;
    nextDir = DIR.RIGHT;
    score = 0;
    tickInterval = 150;
    deathAnimTimer = 0;
    
    spawnFood();
}

function spawnFood() {
    let emptyCells = [];
    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            let occupied = false;
            for (let s of snake) {
                if (s.x === x && s.y === y) {
                    occupied = true; break;
                }
            }
            if (!occupied) emptyCells.push({ x: x, y: y });
        }
    }
    
    if (emptyCells.length === 0) {
        food = null; // Victory!
        return;
    }
    
    let rnd = Math.floor(Math.random() * emptyCells.length);
    food = emptyCells[rnd];
}

// --- INPUT ---
window.addEventListener('keydown', e => {
    // Prevent default scrolling for game keys
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
    }
    
    let k = e.key.toLowerCase();
    
    if (k === ' ') {
        if (state === STATE_TITLE) {
            resetGame();
            state = STATE_PLAYING;
            lastTickTime = performance.now();
        } else if (state === STATE_PLAYING) {
            state = STATE_PAUSED;
        } else if (state === STATE_PAUSED) {
            state = STATE_PLAYING;
            lastTickTime = performance.now();
        }
        return;
    }
    
    if (k === 'r') {
        if (state === STATE_GAMEOVER || state === STATE_PAUSED || state === STATE_VICTORY || state === STATE_PLAYING) {
            resetGame();
            state = STATE_PLAYING;
            lastTickTime = performance.now();
        }
        return;
    }
    
    if (k === 'escape') {
        state = STATE_TITLE;
        return;
    }
    
    if (state !== STATE_PLAYING) return;

    // Buffer direction (only accept if not opposite to CURRENT direction)
    // NOTE: We check against currentDir, not nextDir, so you can't rapidly queue two inputs to reverse.
    // If you buffer an input, we just overwrite the buffer. Simple priority.
    let newDir = null;
    if ((k === 'arrowup' || k === 'w') && currentDir !== DIR.DOWN) newDir = DIR.UP;
    if ((k === 'arrowdown' || k === 's') && currentDir !== DIR.UP) newDir = DIR.DOWN;
    if ((k === 'arrowleft' || k === 'a') && currentDir !== DIR.RIGHT) newDir = DIR.LEFT;
    if ((k === 'arrowright' || k === 'd') && currentDir !== DIR.LEFT) newDir = DIR.RIGHT;
    
    if (newDir) nextDir = newDir;
});

// --- LOGIC ---

function die() {
    state = STATE_GAMEOVER;
    deathAnimTimer = 0.5; // seconds
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
    }
}

function updateTick() {
    if (state !== STATE_PLAYING) return;
    
    currentDir = nextDir; // Apply buffered input
    
    let head = snake[0];
    let newHead = {
        x: head.x + currentDir.x,
        y: head.y + currentDir.y
    };
    
    // Bounds collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        die();
        return;
    }
    
    // Self collision (excluding the very last tail segment because it will move, unless we just ate but this logic is simpler)
    for (let i = 0; i < snake.length; i++) {
        // Technically if it's the exact tail, it moves out of the way. 
        // We do a strict check on all just to be safe & classic.
        if (i === snake.length - 1) continue; // tail is safe
        
        if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
            die();
            return;
        }
    }
    
    // Move
    snake.unshift(newHead);
    
    // Food check
    if (food && newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        spawnFood();
        
        // Speed up slightly every 50 points
        if (score % 50 === 0) {
            tickInterval = Math.max(60, tickInterval - 10);
        }
        
        if (!food) {
            // Victory
            state = STATE_VICTORY;
            if (score > highScore) localStorage.setItem('snakeHighScore', score);
        }
        
    } else {
        // Didn't eat, pop tail
        snake.pop();
    }
}

// --- RENDER ---

function renderTextCenter(text, y, size, color='#FFF') {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, y);
}

function render() {
    // BG
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid (faint)
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += CELL) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
    for (let y = 0; y <= canvas.height; y += CELL) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
    ctx.stroke();
    
    if (state === STATE_TITLE) {
        renderTextCenter("SNAKE", canvas.height/3, 80, '#0F0');
        renderTextCenter("Press SPACE to start", canvas.height/2, 24);
        renderTextCenter("Arrow keys or WASD to move", canvas.height/2 + 40, 16, '#888');
        if (highScore > 0) renderTextCenter(`High Score: ${highScore}`, canvas.height - 50, 20, '#FFD700');
        return;
    }

    // Render Food
    if (food) {
        // Pulse food
        let pulse = Math.sin(frameTime * 10) * 0.15 + 0.85; // 0.7 to 1.0
        let foodRad = (CELL / 2) * pulse - 2;
        
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, foodRad, 0, Math.PI*2);
        ctx.fill();
        
        // Sparkle
        ctx.fillStyle = '#FFAAAA';
        ctx.beginPath();
        ctx.arc(food.x * CELL + CELL/2 - foodRad*0.3, food.y * CELL + CELL/2 - foodRad*0.3, foodRad*0.2, 0, Math.PI*2);
        ctx.fill();
    }

    // Render Snake
    // Draw from tail to head so head goes on top visually if overlap
    for (let i = snake.length - 1; i >= 0; i--) {
        let seg = snake[i];
        let isHead = (i === 0);
        
        // Gradient color calculation based on position in body
        let ratio = i / snake.length; // 0 (head) to 1 (tail)
        // Red component stays 0, Green goes 255 -> 100, Blue goes 0
        let g = Math.floor(255 - (ratio * 155));
        
        if (state === STATE_GAMEOVER && isHead) {
            // Flash head red if dead
            ctx.fillStyle = Math.floor(frameTime * 10) % 2 === 0 ? '#F00' : '#FFF';
        } else {
            ctx.fillStyle = `rgb(0, ${g}, 0)`;
        }
        
        // Draw slightly rounded rect
        let px = seg.x * CELL;
        let py = seg.y * CELL;
        let pPad = 1;
        let pSize = CELL - pPad * 2;
        
        ctx.beginPath();
        ctx.roundRect(px + pPad, py + pPad, pSize, pSize, isHead ? 6 : 4);
        ctx.fill();
        
        // Eyes for head
        if (isHead) {
            ctx.fillStyle = '#000';
            let ex1 = px + CELL/2, ey1 = py + CELL/2;
            let ex2 = px + CELL/2, ey2 = py + CELL/2;
            let er = 3;
            let off = 6;
            
            // Render eyes based on actual direction taken
            if (currentDir === DIR.RIGHT) { ex1 += off; ey1 -= off/2; ex2 += off; ey2 += off/2; }
            else if (currentDir === DIR.LEFT) { ex1 -= off; ey1 -= off/2; ex2 -= off; ey2 += off/2; }
            else if (currentDir === DIR.UP) { ex1 -= off/2; ey1 -= off; ex2 += off/2; ey2 -= off; }
            else if (currentDir === DIR.DOWN) { ex1 -= off/2; ey1 += off; ex2 += off/2; ey2 += off; }
            
            ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI*2); ctx.fill();
        }
    }

    // Score HUD
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`Score: ${score}`, 10, 10);
    
    if (state === STATE_PLAYING && tickInterval < 150) {
        let lvl = Math.floor((150 - tickInterval) / 10) + 1;
        ctx.fillStyle = '#AAA';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText(`Lvl ${lvl}`, 10, 40);
    }

    // Overlays
    if (state === STATE_PAUSED) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        renderTextCenter("PAUSED", canvas.height/2 - 20, 60);
        renderTextCenter("Press SPACE to resume", canvas.height/2 + 30, 20);
    }
    else if (state === STATE_GAMEOVER) {
        if (deathAnimTimer <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            renderTextCenter("GAME OVER", canvas.height/3, 70, '#F00');
            renderTextCenter(`Score: ${score}`, canvas.height/2, 30);
            if (score >= highScore && score > 0) renderTextCenter("NEW HIGH SCORE!", canvas.height/2 - 40, 20, '#FFD700');
            
            renderTextCenter("Press R to play again", canvas.height/2 + 60, 20);
            renderTextCenter("Press ESC for title screen", canvas.height/2 + 90, 16, '#888');
        }
    }
    else if (state === STATE_VICTORY) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        renderTextCenter("PERFECT SCORE!", canvas.height/3, 60, '#0FF');
        renderTextCenter(`Score: ${score}`, canvas.height/2, 30);
        renderTextCenter("Press R to play again", canvas.height/2 + 60, 20);
    }
}

// --- MAIN LOOP ---

let lastActualTime = 0;

function loop(currentTime) {
    requestAnimationFrame(loop);
    
    if (!lastActualTime) lastActualTime = currentTime;
    let dt = (currentTime - lastActualTime) / 1000;
    lastActualTime = currentTime;
    
    frameTime += dt;
    
    if (state === STATE_GAMEOVER && deathAnimTimer > 0) {
        deathAnimTimer -= dt;
        render(); // render death flashes
        return;
    }

    if (state === STATE_PLAYING) {
        if (currentTime - lastTickTime >= tickInterval) {
            lastTickTime = currentTime;
            updateTick();
        }
    }
    
    render();
}

// Polyfill for roundRect if needed (most modern browsers support it)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

requestAnimationFrame(loop);

</script>
</body>
</html>
