<!--
  GAME:      Snake
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=600,H=600,GS=20,CS=30;

const DIR={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_WIN=4;

let state=ST_TITLE;
let snake,dir,nextDir,food,score,hiScore,tickInterval,lastTick;
let deathFlash,foodPulse;

hiScore=0;
try{const v=localStorage.getItem('snake4_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('snake4_best',String(hiScore));}catch(e){}}}

function initGame(){
  snake=[{x:12,y:10},{x:11,y:10},{x:10,y:10}];
  dir=DIR.RIGHT;nextDir=DIR.RIGHT;
  score=0;tickInterval=150;lastTick=0;
  deathFlash=0;foodPulse=0;
  spawnFood();
}

function spawnFood(){
  const empty=[];
  for(let x=0;x<GS;x++)for(let y=0;y<GS;y++){
    if(!snake.some(s=>s.x===x&&s.y===y))empty.push({x,y});
  }
  if(empty.length===0){state=ST_WIN;saveHi();return;}
  food=empty[Math.floor(Math.random()*empty.length)];
}

function isOpposite(a,b){return a.x===-b.x&&a.y===-b.y;}

function update(){
  dir=nextDir;
  const head=snake[0];
  const nh={x:head.x+dir.x,y:head.y+dir.y};

  // Wall collision
  if(nh.x<0||nh.x>=GS||nh.y<0||nh.y>=GS){
    state=ST_OVER;deathFlash=0.4;saveHi();return;
  }
  // Self collision
  for(let i=0;i<snake.length;i++){
    if(nh.x===snake[i].x&&nh.y===snake[i].y){
      state=ST_OVER;deathFlash=0.4;saveHi();return;
    }
  }

  snake.unshift(nh);

  if(nh.x===food.x&&nh.y===food.y){
    score+=10;saveHi();
    // Speed up every 5 food
    if(score%50===0&&tickInterval>60)tickInterval-=10;
    spawnFood();
  }else{
    snake.pop();
  }
}

const keys={};
addEventListener('keydown',e=>{
  const k=e.code;keys[k]=true;
  ia();e.preventDefault();

  if(k==='Space'){
    if(state===ST_TITLE){initGame();state=ST_PLAY;return;}
    if(state===ST_PLAY){state=ST_PAUSE;return;}
    if(state===ST_PAUSE){state=ST_PLAY;return;}
  }
  if(k==='KeyR'){
    if(state===ST_OVER||state===ST_PLAY||state===ST_PAUSE||state===ST_WIN){initGame();state=ST_PLAY;return;}
  }
  if(k==='Escape'){state=ST_TITLE;return;}

  if(state===ST_PLAY){
    let nd=null;
    if(k==='ArrowUp'||k==='KeyW')nd=DIR.UP;
    if(k==='ArrowDown'||k==='KeyS')nd=DIR.DOWN;
    if(k==='ArrowLeft'||k==='KeyA')nd=DIR.LEFT;
    if(k==='ArrowRight'||k==='KeyD')nd=DIR.RIGHT;
    if(nd&&!isOpposite(nd,dir))nextDir=nd;
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});
addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});

// Audio
let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndEat(){tone(500,0.06,0.05,'sine');setTimeout(()=>tone(700,0.06,0.05,'sine'),60);}
function sndDie(){tone(200,0.2,0.06,'sawtooth');setTimeout(()=>tone(120,0.25,0.06,'sawtooth'),200);}

function render(now){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);

  // Grid
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(let i=0;i<=GS;i++){
    cx.beginPath();cx.moveTo(i*CS,0);cx.lineTo(i*CS,H);cx.stroke();
    cx.beginPath();cx.moveTo(0,i*CS);cx.lineTo(W,i*CS);cx.stroke();
  }

  if(state===ST_TITLE){
    cx.fillStyle='#0f0';cx.font='bold 56px monospace';cx.textAlign='center';
    cx.fillText('SNAKE',W/2,220);
    cx.fillStyle='#ccc';cx.font='18px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to start',W/2,330);
    cx.fillStyle='#888';cx.font='14px monospace';
    cx.fillText('Arrow keys or WASD to move',W/2,390);
    cx.fillText('SPACE Pause   R Restart   ESC Title',W/2,420);
    if(hiScore>0){cx.fillStyle='#555';cx.fillText('Best: '+hiScore,W/2,470);}
    return;
  }

  // Food
  if(food){
    foodPulse+=0.004;
    const pulse=1+Math.sin(foodPulse*8)*0.12;
    const sz=CS*pulse;
    const off=(CS-sz)/2;
    cx.fillStyle='#f33';
    cx.beginPath();
    cx.arc(food.x*CS+CS/2,food.y*CS+CS/2,sz/2-2,0,Math.PI*2);
    cx.fill();
  }

  // Snake
  const dying=state===ST_OVER&&deathFlash>0;
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i];
    const t=1-i/Math.max(snake.length-1,1);
    const r=dying?200:Math.floor(t*40);
    const g=dying?(Math.floor(deathFlash*10)%2?50:200):Math.floor(80+t*175);
    const b=dying?50:Math.floor(t*30);
    cx.fillStyle=`rgb(${r},${g},${b})`;

    const pad=1;
    const rad=4;
    const x=s.x*CS+pad,y=s.y*CS+pad,w=CS-pad*2,h=CS-pad*2;
    cx.beginPath();
    cx.moveTo(x+rad,y);cx.lineTo(x+w-rad,y);cx.quadraticCurveTo(x+w,y,x+w,y+rad);
    cx.lineTo(x+w,y+h-rad);cx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
    cx.lineTo(x+rad,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-rad);
    cx.lineTo(x,y+rad);cx.quadraticCurveTo(x,y,x+rad,y);
    cx.fill();

    // Eyes on head
    if(i===0&&!dying){
      cx.fillStyle='#fff';
      const cx0=s.x*CS+CS/2,cy0=s.y*CS+CS/2;
      let ex1,ey1,ex2,ey2;
      if(dir===DIR.RIGHT){ex1=cx0+5;ey1=cy0-5;ex2=cx0+5;ey2=cy0+5;}
      else if(dir===DIR.LEFT){ex1=cx0-5;ey1=cy0-5;ex2=cx0-5;ey2=cy0+5;}
      else if(dir===DIR.UP){ex1=cx0-5;ey1=cy0-5;ex2=cx0+5;ey2=cy0-5;}
      else{ex1=cx0-5;ey1=cy0+5;ex2=cx0+5;ey2=cy0+5;}
      cx.beginPath();cx.arc(ex1,ey1,3,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(ex2,ey2,3,0,Math.PI*2);cx.fill();
      cx.fillStyle='#000';
      cx.beginPath();cx.arc(ex1+dir.x,ey1+dir.y,1.5,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(ex2+dir.x,ey2+dir.y,1.5,0,Math.PI*2);cx.fill();
    }
  }

  // HUD
  cx.fillStyle='#fff';cx.font='bold 22px sans-serif';cx.textAlign='left';
  cx.fillText('Score: '+score,12,28);
  cx.textAlign='right';
  cx.fillText('Best: '+hiScore,W-12,28);

  // Overlays
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='18px monospace';cx.fillText('Press SPACE to resume',W/2,H/2+30);
  }
  if(state===ST_OVER){
    if(deathFlash<=0){
      cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
      cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
      cx.fillText('GAME OVER',W/2,H/2-40);
      cx.fillStyle='#fff';cx.font='24px monospace';
      cx.fillText('Score: '+score,W/2,H/2+5);
      if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
      cx.fillStyle='#aaa';cx.font='16px monospace';
      if(Math.floor(now/600)%2)cx.fillText('Press R to play again',W/2,H/2+70);
      cx.fillText('Press ESC for title',W/2,H/2+95);
    }
  }
  if(state===ST_WIN){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#0f0';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('YOU WIN!',W/2,H/2-20);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,H/2+20);
    cx.font='16px monospace';cx.fillText('Press R to play again',W/2,H/2+60);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  const dt=(now-lastTime)/1000;lastTime=now;

  if(state===ST_PLAY){
    if(now-lastTick>=tickInterval){
      lastTick=now;
      const prevLen=snake.length;
      update();
      if(snake.length>prevLen)sndEat();
      if(state===ST_OVER)sndDie();
    }
  }
  if(state===ST_OVER&&deathFlash>0)deathFlash-=dt;

  render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
