<!--
  GAME:      Donkey Kong
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="dkCanvas" width="448" height="512"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('dkCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 448;
    const HEIGHT = 512;
    const TILE = 16;
    const STATES = { TITLE: 0, STAGE_START: 1, PLAYING: 2, PAUSED: 3, DEATH: 4, STAGE_COMPLETE: 5, GAME_OVER: 6 };

    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('donkeyKongHighScore') || '0', 10);
    let lives = 3;
    let level = 1;
    let stateTimer = 0;
    let speedMult = 1;

    const mario = {
      x: 50,
      y: 450,
      width: 14,
      height: 20,
      vx: 0,
      vy: 0,
      jumping: false,
      climbing: false,
      jumpStartY: 0,
      jumpFrame: 0,
      jumpDuration: 15,
      jumpHeight: 40,
      facing: 1,
      hammerTime: 0,
      speed: 1.5
    };

    const platforms = [
      { x: 50, y: 450, width: 300, height: 16, angle: 0 },
      { x: 100, y: 370, width: 300, height: 16, angle: 0 },
      { x: 50, y: 290, width: 300, height: 16, angle: 0 },
      { x: 100, y: 210, width: 300, height: 16, angle: 0 },
      { x: 50, y: 130, width: 300, height: 16, angle: 0 }
    ];

    const ladders = [
      { x: 90, y: 370, length: 80 },
      { x: 250, y: 370, length: 80 },
      { x: 75, y: 290, length: 80 },
      { x: 320, y: 290, length: 80 },
      { x: 110, y: 210, length: 80 },
      { x: 280, y: 210, length: 80 }
    ];

    let barrels = [];
    let fireballs = [];
    let hammers = [
      { x: 150, y: 390, active: true },
      { x: 300, y: 310, active: true }
    ];

    let barrelSpawnTimer = 0;
    let barrelSpawnInterval = 180;

    const pauline = { x: 380, y: 120, width: 24, height: 24 };
    const donkeyKong = { x: 200, y: 100, width: 48, height: 48 };

    let keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (gameState === STATES.TITLE && key === ' ') {
        initGame();
      }
      if (key === 'p' || key === 'escape') {
        if (gameState === STATES.PLAYING) gameState = STATES.PAUSED;
        else if (gameState === STATES.PAUSED) gameState = STATES.PLAYING;
      }
      if (key === 'r') {
        if (gameState !== STATES.TITLE) initGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function initGame() {
      score = 0;
      lives = 3;
      level = 1;
      speedMult = 1;
      mario.x = 50;
      mario.y = 450;
      mario.hammerTime = 0;
      barrels = [];
      fireballs = [];
      hammers = [
        { x: 150, y: 390, active: true },
        { x: 300, y: 310, active: true }
      ];
      gameState = STATES.STAGE_START;
      stateTimer = 120;
    }

    function getPlatformAt(x, y) {
      for (let p of platforms) {
        if (x > p.x && x < p.x + p.width && Math.abs(y - p.y) < 10) {
          return p;
        }
      }
      return null;
    }

    function getLadderAt(x, y) {
      for (let l of ladders) {
        if (Math.abs(x - l.x) < 8 && y > l.y - 10 && y < l.y + l.length + 10) {
          return l;
        }
      }
      return null;
    }

    function update() {
      if (gameState !== STATES.PLAYING) {
        if (gameState === STATES.STAGE_START) {
          stateTimer--;
          if (stateTimer <= 0) gameState = STATES.PLAYING;
        }
        return;
      }

      // Mario controls
      if (keys['arrowleft'] || keys['a']) {
        if (!mario.jumping && !mario.climbing) mario.x -= mario.speed;
        mario.facing = -1;
      }
      if (keys['arrowright'] || keys['d']) {
        if (!mario.jumping && !mario.climbing) mario.x += mario.speed;
        mario.facing = 1;
      }

      // Climbing
      const ladder = getLadderAt(mario.x, mario.y);
      if (ladder && (keys['arrowup'] || keys['w'])) {
        mario.climbing = true;
        mario.y -= 1;
      } else if (ladder && (keys['arrowdown'] || keys['s'])) {
        mario.climbing = true;
        mario.y += 1;
      } else {
        mario.climbing = false;
      }

      // Jumping
      if ((keys[' '] || keys['spacebar']) && !mario.jumping && !mario.climbing) {
        mario.jumping = true;
        mario.jumpStartY = mario.y;
        mario.jumpFrame = 0;
      }

      if (mario.jumping) {
        mario.jumpFrame++;
        const progress = mario.jumpFrame / mario.jumpDuration;
        const height = Math.sin(progress * Math.PI) * mario.jumpHeight;
        mario.y = mario.jumpStartY - height;
        mario.x += mario.facing * 1.5;

        if (mario.jumpFrame >= mario.jumpDuration) {
          mario.jumping = false;
        }
      }

      // Gravity
      if (!mario.jumping && !mario.climbing) {
        const p = getPlatformAt(mario.x, mario.y);
        if (p) {
          mario.y = p.y - mario.height;
        } else if (mario.y < HEIGHT - 30) {
          mario.y += 2;
        } else {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            gameState = STATES.DEATH;
            stateTimer = 60;
          }
          return;
        }
      }

      mario.x = Math.max(20, Math.min(WIDTH - 20, mario.x));

      // Hammer pickup
      mario.hammerTime = Math.max(0, mario.hammerTime - 1);
      for (let h of hammers) {
        if (h.active && Math.abs(mario.x - h.x) < 20 && Math.abs(mario.y - h.y) < 20) {
          mario.hammerTime = 360;
          h.active = false;
        }
      }

      // Spawn barrels
      barrelSpawnTimer++;
      if (barrelSpawnTimer > barrelSpawnInterval) {
        barrelSpawnTimer = 0;
        barrels.push({
          x: donkeyKong.x + 10,
          y: donkeyKong.y + 40,
          vx: -2.5 * speedMult,
          vy: 0,
          speed: 2.5 * speedMult,
          width: 16,
          height: 16
        });
        barrelSpawnInterval = Math.max(100, 180 - level * 10);
      }

      // Update barrels
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        b.x += b.vx;
        b.y += b.vy;

        // Gravity
        const p = getPlatformAt(b.x, b.y);
        if (p) {
          b.y = p.y - b.height;
          b.vy = 0;
          if (b.vx === 0) b.vx = -b.speed;
        } else {
          b.vy += 2;
          b.vy = Math.min(b.vy, 5);
        }

        // Bounce off edges
        if (b.x < 0 || b.x > WIDTH) b.vx *= -1;

        // Remove if off screen
        if (b.y > HEIGHT) {
          barrels.splice(i, 1);
          continue;
        }

        // Collision with mario
        if (mario.hammerTime > 0) {
          if (Math.abs(b.x - mario.x) < 20 && Math.abs(b.y - mario.y) < 20) {
            score += 500;
            barrels.splice(i, 1);
          }
        } else if (Math.abs(b.x - mario.x) < 20 && Math.abs(b.y - mario.y) < 20) {
          if (!mario.jumping) {
            lives--;
            if (lives <= 0) gameState = STATES.GAME_OVER;
            else {
              gameState = STATES.DEATH;
              stateTimer = 60;
            }
            return;
          } else if (mario.y + mario.height < b.y) {
            score += 100;
          }
        }
      }

      // Spawn fireballs
      if (Math.random() < 0.01 * speedMult && fireballs.length < 2) {
        fireballs.push({
          x: 50,
          y: 450,
          vx: 1.5 * speedMult,
          vy: 0,
          width: 12,
          height: 12
        });
      }

      // Update fireballs
      for (let i = fireballs.length - 1; i >= 0; i--) {
        const f = fireballs[i];
        f.x += f.vx;
        f.y += f.vy;

        // Gravity
        const p = getPlatformAt(f.x, f.y);
        if (p) {
          f.y = p.y - f.height;
          f.vy = 0;
        } else {
          f.vy += 1;
        }

        // Bounce off edges
        if (f.x < 0 || f.x > WIDTH) f.vx *= -1;

        // Try climbing ladder
        const l = getLadderAt(f.x, f.y);
        if (l && Math.random() < 0.02) {
          f.vy = -1.5;
        }

        // Remove if off screen
        if (f.y > HEIGHT) {
          fireballs.splice(i, 1);
          continue;
        }

        // Collision with mario
        if (mario.hammerTime > 0) {
          if (Math.abs(f.x - mario.x) < 20 && Math.abs(f.y - mario.y) < 20) {
            score += 500;
            fireballs.splice(i, 1);
          }
        } else if (Math.abs(f.x - mario.x) < 20 && Math.abs(f.y - mario.y) < 20) {
          lives--;
          if (lives <= 0) gameState = STATES.GAME_OVER;
          else {
            gameState = STATES.DEATH;
            stateTimer = 60;
          }
          return;
        }
      }

      // Check pauline collision
      if (Math.abs(mario.x - pauline.x) < 30 && Math.abs(mario.y - pauline.y) < 30) {
        gameState = STATES.STAGE_COMPLETE;
        score += 1000;
        level++;
        speedMult = 1 + (level - 1) * 0.15;
        stateTimer = 120;
      }

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('donkeyKongHighScore', highScore);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw platforms
      ctx.fillStyle = '#4444FF';
      for (let p of platforms) {
        ctx.fillRect(p.x, p.y, p.width, p.height);
      }

      // Draw ladders
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 2;
      for (let l of ladders) {
        ctx.beginPath();
        ctx.moveTo(l.x - 4, l.y);
        ctx.lineTo(l.x - 4, l.y + l.length);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(l.x + 4, l.y);
        ctx.lineTo(l.x + 4, l.y + l.length);
        ctx.stroke();
        for (let y = l.y; y < l.y + l.length; y += 12) {
          ctx.beginPath();
          ctx.moveTo(l.x - 4, y);
          ctx.lineTo(l.x + 4, y);
          ctx.stroke();
        }
      }

      // Draw hammers
      ctx.fillStyle = '#FF8800';
      for (let h of hammers) {
        if (h.active) {
          ctx.fillRect(h.x - 6, h.y - 4, 12, 8);
        }
      }

      // Draw barrels
      ctx.fillStyle = '#FF6600';
      for (let b of barrels) {
        ctx.fillRect(b.x - b.width / 2, b.y - b.height / 2, b.width, b.height);
      }

      // Draw fireballs
      ctx.fillStyle = '#FF4400';
      for (let f of fireballs) {
        ctx.beginPath();
        ctx.arc(f.x, f.y, 6, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw Donkey Kong
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(donkeyKong.x, donkeyKong.y, donkeyKong.width, donkeyKong.height);
      ctx.fillStyle = '#D2B48C';
      ctx.fillRect(donkeyKong.x + 10, donkeyKong.y + 15, 28, 20);

      // Draw Pauline
      ctx.fillStyle = '#FF1493';
      ctx.fillRect(pauline.x - pauline.width / 2, pauline.y - pauline.height / 2, pauline.width, pauline.height);

      // Draw Mario
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(mario.x - mario.width / 2, mario.y - mario.height / 2, mario.width / 2 + 2, mario.height / 2);
      ctx.fillStyle = '#0000FF';
      ctx.fillRect(mario.x - mario.width / 2, mario.y, mario.width, mario.height / 2);
      ctx.fillStyle = '#FFCC99';
      ctx.fillRect(mario.x - mario.width / 2 + 2, mario.y - mario.height / 2 - 5, mario.width - 4, 5);

      // Draw hammer on mario
      if (mario.hammerTime > 0) {
        ctx.fillStyle = '#999999';
        ctx.fillRect(mario.x + 8, mario.y - mario.height / 2, 6, 12);
      }

      // UI
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 14px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 20);
      ctx.textAlign = 'center';
      ctx.fillText('Lives: ' + lives, WIDTH / 2, 20);
      ctx.textAlign = 'right';
      ctx.fillText('Level: ' + level, WIDTH - 10, 20);

      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 28px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('DONKEY KONG', WIDTH / 2, 150);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '14px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 320);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.STAGE_START) {
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('Stage ' + level, WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.STAGE_COMPLETE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FFFF00';
        ctx.font = 'bold 20px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE CLEAR!', WIDTH / 2, HEIGHT / 2 - 20);
        ctx.fillText('Score: ' + score, WIDTH / 2, HEIGHT / 2 + 20);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 28px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 150);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 250);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 300);
        ctx.fillText('Press R to play again', WIDTH / 2, 380);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
