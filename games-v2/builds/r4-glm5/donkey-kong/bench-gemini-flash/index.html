<!--
  GAME:      Donkey Kong
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong - Arcade Classic</title>
    <style>
        body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { background-color: #000; border: 2px solid #333; display: block; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="448" height="512"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const TILE = 16;
        const WIDTH = 448;
        const HEIGHT = 512;
        const GRAVITY = 0.25;

        // Game State
        let state = 'TITLE'; // TITLE, READY, PLAYING, PAUSED, DEATH, WIN, GAMEOVER
        let score = 0;
        let highScore = parseInt(localStorage.getItem('dkHighScore')) || 0;
        let lives = 3;
        let timer = 5000;
        let lastTime = 0;
        let spawnTimer = 0;

        // Entities
        let player = {
            x: 40, y: 440, w: 14, h: 20,
            vx: 0, vy: 0,
            dir: 1, anim: 0,
            jumping: false, climbing: false,
            onGround: true, hammerTime: 0
        };

        const platforms = [
            { x: 0, y: 480, w: WIDTH, h: 12, angle: 0 }, // Floor
            { x: 32, y: 416, w: 384, h: 12, angle: -0.03 },
            { x: 32, y: 352, w: 384, h: 12, angle: 0.03 },
            { x: 32, y: 288, w: 384, h: 12, angle: -0.03 },
            { x: 32, y: 224, w: 384, h: 12, angle: 0.03 },
            { x: 32, y: 160, w: 384, h: 12, angle: -0.03 },
            { x: 160, y: 96, w: 128, h: 12, angle: 0 } // Pauline platform
        ];

        const ladders = [
            { x: 380, top: 416, bot: 480 },
            { x: 60, top: 352, bot: 416 },
            { x: 380, top: 288, bot: 352 },
            { x: 60, top: 224, bot: 288 },
            { x: 380, top: 160, bot: 224 },
            { x: 224, top: 96, bot: 160 }
        ];

        let barrels = [];
        let hammers = [
            { x: 50, y: 330, active: true },
            { x: 380, y: 200, active: true }
        ];

        // Input
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetPlayer() {
            player.x = 40; player.y = 440;
            player.vx = 0; player.vy = 0;
            player.climbing = false; player.jumping = false;
            player.hammerTime = 0;
        }

        function initGame() {
            score = 0; lives = 3; timer = 5000;
            barrels = [];
            hammers.forEach(h => h.active = true);
            resetPlayer();
            state = 'PLAYING';
        }

        function getPlatformAt(x, y) {
            for (let p of platforms) {
                let px = x + player.w/2;
                if (px >= p.x && px <= p.x + p.w) {
                    let groundY = p.y + (px - p.x) * Math.tan(p.angle);
                    if (y + player.h >= groundY - 5 && y + player.h <= groundY + 10) return groundY;
                }
            }
            return null;
        }

        function getLadderAt(x, y) {
            for (let l of ladders) {
                if (Math.abs(x + player.w/2 - l.x) < 10) {
                    if (y + player.h >= l.top && y <= l.bot) return l;
                }
            }
            return null;
        }

        function update(time) {
            const dt = (time - lastTime) / 16.67;
            lastTime = time;

            if (state !== 'PLAYING') {
                if (state === 'TITLE' && keys['Space']) initGame();
                if (state === 'GAMEOVER' && keys['KeyR']) initGame();
                return;
            }

            timer = Math.max(0, timer - dt);
            if (timer <= 0) die();

            // Player Logic
            if (!player.climbing) {
                if (keys['ArrowLeft']) { player.vx = -2; player.dir = -1; player.anim += 0.2; }
                else if (keys['ArrowRight']) { player.vx = 2; player.dir = 1; player.anim += 0.2; }
                else { player.vx *= 0.8; }

                if (keys['Space'] && player.onGround && !player.jumping && player.hammerTime <= 0) {
                    player.vy = -5;
                    player.jumping = true;
                    player.onGround = false;
                }

                player.vy += GRAVITY * dt;
                player.x += player.vx * dt;
                player.y += player.vy * dt;

                let gy = getPlatformAt(player.x, player.y);
                if (gy && player.vy >= 0) {
                    player.y = gy - player.h;
                    player.vy = 0;
                    player.onGround = true; 
                    player.jumping = false;
                } else {
                    player.onGround = false;
                }
            }

            // Climbing
            const ladder = getLadderAt(player.x, player.y);
            if (ladder && player.hammerTime <= 0) {
                if (keys['ArrowUp'] && player.y + player.h > ladder.top) {
                    player.climbing = true;
                    player.y -= 1.5 * dt;
                    player.x = ladder.x - player.w/2;
                } else if (keys['ArrowDown'] && player.y + player.h < ladder.bot) {
                    player.climbing = true;
                    player.y += 1.5 * dt;
                    player.x = ladder.x - player.w/2;
                } else {
                    if (player.climbing && player.onGround) player.climbing = false;
                }
            } else {
                player.climbing = false;
            }

            if (player.x < 0) player.x = 0;
            if (player.x > WIDTH - player.w) player.x = WIDTH - player.w;

            // Hammer logic
            if (player.hammerTime > 0) player.hammerTime -= dt;
            hammers.forEach(h => {
                if (h.active && Math.hypot(player.x - h.x, player.y - h.y) < 20) {
                    h.active = false;
                    player.hammerTime = 400; // ~7 seconds
                }
            });

            // Barrel spawning
            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                barrels.push({ x: 100, y: 140, vx: 2.5, vy: 0, dir: 1 });
                spawnTimer = 150 + Math.random() * 100;
            }

            // Barrel movement
            barrels.forEach((b, i) => {
                const bGy = getPlatformAt(b.x, b.y);
                if (bGy) {
                    b.y = bGy - 16;
                    b.vy = 0;
                    // Determine direction from angle
                    for (let p of platforms) {
                        if (b.x + 8 >= p.x && b.x + 8 <= p.x + p.w) {
                            if (p.angle > 0) b.vx = 2.5; 
                            else if (p.angle < 0) b.vx = -2.5;
                            else if (b.y > 400) b.vx = -2.5; // bottom floor
                        }
                    }
                } else {
                    b.vy += GRAVITY * dt;
                }
                b.x += b.vx * dt;
                b.y += b.vy * dt;

                // Collisions
                const dist = Math.hypot(player.x - b.x, player.y - b.y);
                if (dist < 18) {
                    if (player.hammerTime > 0) {
                        barrels.splice(i, 1);
                        score += 500;
                    } else if (player.jumping && player.y + player.h < b.y + 5) {
                        // Jumped over
                        score += 100;
                    } else {
                        die();
                    }
                }

                if (b.x < -20 || b.x > WIDTH + 20 || b.y > HEIGHT) barrels.splice(i, 1);
            });

            // Win Condition
            if (player.y < 100 && player.x > 200) {
                state = 'WIN';
                setTimeout(initGame, 3000);
            }
        }

        function die() {
            lives--;
            if (lives <= 0) {
                state = 'GAMEOVER';
                if (score > highScore) { highScore = score; localStorage.setItem('dkHighScore', highScore); }
            } else {
                state = 'DEATH';
                setTimeout(() => { resetPlayer(); state = 'PLAYING'; }, 1500);
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Platforms
            ctx.fillStyle = '#44FF';
            platforms.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillRect(0, 0, p.w, p.h);
                ctx.restore();
            });

            // Ladders
            ctx.fillStyle = '#4FF';
            ladders.forEach(l => {
                ctx.fillRect(l.x - 6, l.top, 2, l.bot - l.top);
                ctx.fillRect(l.x + 4, l.top, 2, l.bot - l.top);
                for (let ry = l.top; ry < l.bot; ry += 8) {
                    ctx.fillRect(l.x - 6, ry, 12, 2);
                }
            });

            // Mario
            ctx.fillStyle = player.hammerTime > 0 ? (Math.floor(Date.now()/50)%2 ? '#FFF' : '#F00') : '#F00';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#FFC0CB'; // Face
            ctx.fillRect(player.x + (player.dir > 0 ? 8 : 2), player.y + 2, 4, 4);
            if (player.hammerTime > 0) {
                ctx.fillStyle = '#888';
                let hY = Math.sin(Date.now()*0.02) * 15;
                ctx.fillRect(player.x + (player.dir > 0 ? 14 : -10), player.y + hY, 10, 10);
            }

            // Donkey Kong
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(40, 112, 48, 48);
            ctx.fillStyle = '#F5DEB3'; // Belly
            ctx.fillRect(54, 130, 20, 20);

            // Pauline
            ctx.fillStyle = '#FF69B4';
            ctx.fillRect(220, 72, 16, 24);

            // Barrels
            ctx.fillStyle = '#D2691E';
            barrels.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x + 8, b.y + 8, 8, 0, 7); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.stroke();
            });

            // Hammers
            ctx.fillStyle = '#888';
            hammers.forEach(h => { if(h.active) ctx.fillRect(h.x, h.y, 8, 12); });

            // UI
            ctx.fillStyle = '#FFF';
            ctx.font = '16px "Courier New"';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 20);
            ctx.textAlign = 'center';
            ctx.fillText(`HI: ${highScore}`, WIDTH/2, 20);
            ctx.textAlign = 'right';
            ctx.fillText(`LIVES: ${lives}  BONUS: ${Math.floor(timer)}`, WIDTH - 10, 20);

            if (state === 'TITLE') overlay('DONKEY KONG', 'PRESS SPACE TO START');
            if (state === 'GAMEOVER') overlay('GAME OVER', 'PRESS R TO RESTART');
            if (state === 'WIN') overlay('VICTORY!', 'YOU RESCUED PAULINE!');
        }

        function overlay(t1, t2) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#F00';
            ctx.font = 'bold 32px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText(t1, WIDTH/2, HEIGHT/2 - 20);
            ctx.font = '16px "Courier New"';
            ctx.fillStyle = '#FFF';
            ctx.fillText(t2, WIDTH/2, HEIGHT/2 + 20);
        }

        function loop(t) {
            update(t);
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
