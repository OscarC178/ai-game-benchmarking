<!--
  GAME:      Donkey Kong
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 448;
    const H = 512;
    canvas.width = W;
    canvas.height = H;
    
    const TILE = 16;
    const COLS = Math.floor(W / TILE);
    const ROWS = Math.floor(H / TILE);
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_READY = 1;
    const STATE_PLAYING = 2;
    const STATE_PAUSED = 3;
    const STATE_DEATH = 4;
    const STATE_GAMEOVER = 5;
    const STATE_LEVEL_CLEAR = 6;
    
    // Colors
    const COLORS = {
      bg: '#000000',
      platform: '#4444FF',
      ladder: '#00FFFF',
      mario: '#FF0000',
      marioOveralls: '#0000FF',
      dk: '#8B4513',
      dkFace: '#DEB887',
      barrel: '#FF6600',
      fireball: '#FF4400',
      pauline: '#FF88FF',
      hammer: '#8B4513',
      hammerHead: '#888888',
      text: '#FFFFFF',
      rivet: '#FFFF00'
    };
    
    // Physics
    const GRAVITY = 0.5;
    const MARIO_SPEED = 2;
    const MARIO_JUMP_SPEED = -8;
    const MARIO_CLIMB_SPEED = 1.5;
    const BARREL_SPEED = 2;
    const FIREBALL_SPEED = 1;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('dkong_highscore') || '0');
    let lives = 3;
    let level = 1;
    let stage = 1;
    let timer = 100;
    let timerMax = 100;
    
    let mario = null;
    let dk = null;
    let pauline = null;
    let barrels = [];
    let fireballs = [];
    let platforms = [];
    let ladders = [];
    let hammers = [];
    let rivets = [];
    let particles = [];
    
    let barrelTimer = 0;
    let barrelInterval = 180;
    let hammerTimer = 0;
    let levelClearTimer = 0;
    
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      initStage();
      score = 0;
      lives = 3;
      level = 1;
      stage = 1;
    }
    
    function initStage() {
      mario = {
        x: 60,
        y: H - 60,
        vx: 0,
        vy: 0,
        width: 14,
        height: 20,
        grounded: false,
        jumping: false,
        climbing: false,
        facing: 1,
        frame: 0,
        hasHammer: false,
        hammerTime: 0,
        alive: true
      };
      
      dk = {
        x: 40,
        y: 80,
        width: 48,
        height: 48,
        frame: 0,
        throwing: false,
        throwTimer: 0
      };
      
      pauline = {
        x: W - 80,
        y: 60,
        width: 16,
        height: 24,
        frame: 0
      };
      
      barrels = [];
      fireballs = [];
      particles = [];
      barrelTimer = 0;
      hammerTimer = 0;
      
      initLevel();
      
      timer = Math.max(100 - (level - 1) * 5, 50);
      timerMax = timer;
    }
    
    function initLevel() {
      platforms = [];
      ladders = [];
      hammers = [];
      rivets = [];
      
      // Create platforms based on stage
      if (stage === 1 || stage > 4) {
        // Girder stage
        createGirderStage();
      } else if (stage === 2) {
        createConveyorStage();
      } else if (stage === 3) {
        createElevatorStage();
      } else if (stage === 4) {
        createRivetStage();
      }
    }
    
    function createGirderStage() {
      // Diagonal platforms
      const platformData = [
        { y: H - 50, x1: 20, x2: W - 40, angle: 0.1 },
        { y: H - 120, x1: 40, x2: W - 20, angle: -0.1 },
        { y: H - 190, x1: 20, x2: W - 40, angle: 0.1 },
        { y: H - 260, x1: 40, x2: W - 20, angle: -0.1 },
        { y: H - 330, x1: 20, x2: W - 40, angle: 0.1 },
        { y: H - 400, x1: 40, x2: W - 20, angle: -0.1 },
        { y: 100, x1: 20, x2: 180, angle: 0 },
        { y: 100, x1: W - 180, x2: W - 20, angle: 0 }
      ];
      
      platformData.forEach(p => {
        platforms.push({
          x: p.x1,
          y: p.y,
          width: p.x2 - p.x1,
          height: 8,
          angle: p.angle
        });
      });
      
      // Ladders
      const ladderData = [
        { x: 80, y1: H - 50, y2: H - 120 },
        { x: W - 100, y1: H - 50, y2: H - 120 },
        { x: 150, y1: H - 120, y2: H - 190 },
        { x: W - 170, y1: H - 120, y2: H - 190 },
        { x: 80, y1: H - 190, y2: H - 260 },
        { x: W - 100, y1: H - 190, y2: H - 260 },
        { x: 150, y1: H - 260, y2: H - 330 },
        { x: W - 170, y1: H - 260, y2: H - 330 },
        { x: 80, y1: H - 330, y2: H - 400 },
        { x: W - 100, y1: H - 330, y2: H - 400 },
        { x: 180, y1: H - 400, y2: 100 },
        { x: W - 200, y1: H - 400, y2: 100 }
      ];
      
      ladderData.forEach(l => {
        ladders.push({
          x: l.x,
          y: l.y2,
          width: 12,
          height: l.y1 - l.y2
        });
      });
      
      // Hammers
      hammers.push({ x: 120, y: H - 130, active: true });
      hammers.push({ x: W - 140, y: H - 270, active: true });
    }
    
    function createConveyorStage() {
      createGirderStage(); // Simplified - use girder layout
    }
    
    function createElevatorStage() {
      createGirderStage();
    }
    
    function createRivetStage() {
      // Top platform with rivets
      platforms.push({ x: 20, y: 100, width: W - 40, height: 8, angle: 0 });
      
      // Rivets
      for (let i = 0; i < 4; i++) {
        rivets.push({ x: 60 + i * 80, y: 95, removed: false });
        rivets.push({ x: W - 100 - i * 80, y: 95, removed: false });
      }
      
      // Lower platforms
      createGirderStage();
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_DEATH) {
        updateDeath(dtMs);
        return;
      }
      
      if (state === STATE_LEVEL_CLEAR) {
        levelClearTimer -= dtMs;
        if (levelClearTimer <= 0) {
          nextStage();
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Timer
      timer -= dt;
      if (timer <= 0) {
        killMario();
        return;
      }
      
      // Update DK
      dk.throwTimer += dtMs;
      if (dk.throwTimer > barrelInterval) {
        dk.throwTimer = 0;
        dk.throwing = true;
        setTimeout(() => { dk.throwing = false; }, 500);
        throwBarrel();
      }
      
      // Update Mario
      updateMario(dtMs);
      
      // Update barrels
      updateBarrels(dtMs);
      
      // Update fireballs
      updateFireballs(dtMs);
      
      // Update particles
      updateParticles(dtMs);
      
      // Check collisions
      checkCollisions();
      
      // Check hammer timer
      if (mario.hasHammer) {
        mario.hammerTime -= dtMs;
        if (mario.hammerTime <= 0) {
          mario.hasHammer = false;
        }
      }
      
      // Check win
      checkWin();
    }
    
    function updateMario(dtMs) {
      // Input
      if (!mario.climbing) {
        if (keys.left) {
          mario.vx = -MARIO_SPEED;
          mario.facing = -1;
        } else if (keys.right) {
          mario.vx = MARIO_SPEED;
          mario.facing = 1;
        } else {
          mario.vx = 0;
        }
        
        if (keys.jump && mario.grounded && !mario.jumping) {
          mario.vy = MARIO_JUMP_SPEED;
          mario.jumping = true;
          mario.grounded = false;
        }
      } else {
        mario.vx = 0;
        if (keys.up) {
          mario.vy = -MARIO_CLIMB_SPEED;
        } else if (keys.down) {
          mario.vy = MARIO_CLIMB_SPEED;
        } else {
          mario.vy = 0;
        }
      }
      
      // Apply physics
      if (!mario.climbing) {
        mario.vy += GRAVITY;
      }
      
      mario.x += mario.vx;
      mario.y += mario.vy;
      
      // Ladder check
      const onLadder = checkLadder();
      if (onLadder && (keys.up || keys.down) && !mario.jumping) {
        mario.climbing = true;
        mario.vy = 0;
        // Snap to ladder
        mario.x = onLadder.x + onLadder.width / 2 - mario.width / 2;
      }
      
      if (mario.climbing && !onLadder) {
        mario.climbing = false;
      }
      
      // Platform collision
      mario.grounded = false;
      for (const p of platforms) {
        if (mario.vy >= 0 && 
            mario.x + mario.width > p.x && 
            mario.x < p.x + p.width &&
            mario.y + mario.height >= p.y && 
            mario.y + mario.height <= p.y + p.height + mario.vy) {
          mario.y = p.y - mario.height;
          mario.vy = 0;
          mario.grounded = true;
          mario.jumping = false;
        }
      }
      
      // Screen bounds
      mario.x = Math.max(0, Math.min(W - mario.width, mario.x));
      
      // Fall off screen
      if (mario.y > H) {
        killMario();
      }
      
      // Animation
      if (mario.vx !== 0 || mario.climbing) {
        mario.frame += 0.2;
      }
      
      // Hammer swing
      if (mario.hasHammer) {
        mario.frame += 0.3;
      }
    }
    
    function checkLadder() {
      for (const l of ladders) {
        if (mario.x + mario.width > l.x && 
            mario.x < l.x + l.width &&
            mario.y + mario.height > l.y && 
            mario.y < l.y + l.height) {
          return l;
        }
      }
      return null;
    }
    
    function throwBarrel() {
      barrels.push({
        x: dk.x + dk.width / 2,
        y: dk.y + dk.height,
        vx: 1,
        vy: 0,
        width: 16,
        height: 16,
        rolling: true
      });
    }
    
    function updateBarrels(dtMs) {
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        
        b.x += b.vx * BARREL_SPEED;
        b.y += b.vy;
        
        // Apply gravity if not on platform
        let onPlatform = false;
        for (const p of platforms) {
          if (b.y + b.height >= p.y && 
              b.y + b.height <= p.y + 16 &&
              b.x + b.width > p.x && 
              b.x < p.x + p.width) {
            onPlatform = true;
            b.y = p.y - b.height;
            b.vy = 0;
            // Roll along platform angle
            b.vy = p.angle * BARREL_SPEED;
          }
        }
        
        if (!onPlatform) {
          b.vy += GRAVITY;
        }
        
        // Bounce off walls
        if (b.x <= 0 || b.x + b.width >= W) {
          b.vx *= -1;
        }
        
        // Remove if off screen
        if (b.y > H + 50) {
          barrels.splice(i, 1);
        }
      }
    }
    
    function updateFireballs(dtMs) {
      for (let i = fireballs.length - 1; i >= 0; i--) {
        const f = fireballs[i];
        
        f.x += f.vx;
        f.y += f.vy;
        
        // Bounce off walls
        if (f.x <= 0 || f.x + f.width >= W) {
          f.vx *= -1;
        }
        
        // Simple AI - climb ladders sometimes
        const onLadder = checkFireballLadder(f);
        if (onLadder && Math.random() < 0.02) {
          f.climbing = true;
          f.vy = -FIREBALL_SPEED;
        }
        
        // Remove if off screen
        if (f.y > H + 50 || f.y < -50) {
          fireballs.splice(i, 1);
        }
      }
    }
    
    function checkFireballLadder(f) {
      for (const l of ladders) {
        if (f.x + f.width > l.x && 
            f.x < l.x + l.width &&
            f.y + f.height > l.y && 
            f.y < l.y + l.height) {
          return l;
        }
      }
      return null;
    }
    
    function updateParticles(dtMs) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dtMs;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function checkCollisions() {
      // Mario vs barrels
      for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        if (rectIntersect(mario, b)) {
          if (mario.hasHammer) {
            // Destroy barrel
            createExplosion(b.x, b.y);
            barrels.splice(i, 1);
            score += 500;
          } else if (mario.jumping && mario.vy > 0 && mario.y + mario.height < b.y + 8) {
            // Jumping over
            score += 100;
          } else {
            killMario();
            return;
          }
        }
      }
      
      // Mario vs fireballs
      for (let i = fireballs.length - 1; i >= 0; i--) {
        const f = fireballs[i];
        if (rectIntersect(mario, f)) {
          if (mario.hasHammer) {
            createExplosion(f.x, f.y);
            fireballs.splice(i, 1);
            score += 500;
          } else {
            killMario();
            return;
          }
        }
      }
      
      // Mario vs hammers
      if (!mario.hasHammer) {
        for (const h of hammers) {
          if (h.active && rectIntersect(mario, { x: h.x, y: h.y, width: 24, height: 16 })) {
            h.active = false;
            mario.hasHammer = true;
            mario.hammerTime = 5000;
          }
        }
      }
      
      // Mario vs rivets
      for (const r of rivets) {
        if (!r.removed && rectIntersect(mario, { x: r.x - 8, y: r.y - 8, width: 16, height: 16 })) {
          r.removed = true;
          score += 100;
        }
      }
    }
    
    function rectIntersect(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function createExplosion(x, y) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          life: 500
        });
      }
    }
    
    function checkWin() {
      // Check if reached Pauline
      if (mario.x + mario.width > pauline.x && 
          mario.x < pauline.x + pauline.width &&
          mario.y < pauline.y + pauline.height + 20) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
        score += Math.floor(timer) * 10;
      }
      
      // Check rivets stage
      if (stage === 4 && rivets.length > 0 && rivets.every(r => r.removed)) {
        state = STATE_LEVEL_CLEAR;
        levelClearTimer = 2000;
        score += 1000;
      }
    }
    
    function nextStage() {
      stage++;
      if (stage > 4) {
        stage = 1;
        level++;
      }
      initStage();
      state = STATE_READY;
      setTimeout(() => { state = STATE_PLAYING; }, 2000);
    }
    
    function killMario() {
      mario.alive = false;
      lives--;
      state = STATE_DEATH;
      createExplosion(mario.x + mario.width / 2, mario.y + mario.height / 2);
    }
    
    function updateDeath(dtMs) {
      updateParticles(dtMs);
      hammerTimer += dtMs;
      if (hammerTimer > 1500) {
        if (lives <= 0) {
          state = STATE_GAMEOVER;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('dkong_highscore', highScore);
          }
        } else {
          initStage();
          state = STATE_READY;
          setTimeout(() => { state = STATE_PLAYING; }, 2000);
        }
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      drawPlatforms();
      drawLadders();
      drawRivets();
      drawHammers();
      drawDK();
      drawPauline();
      drawBarrels();
      drawFireballs();
      drawMario();
      drawParticles();
      drawHUD();
      
      if (state === STATE_READY) drawReady();
      if (state === STATE_PAUSED) drawPauseScreen();
      if (state === STATE_GAMEOVER) drawGameOverScreen();
      if (state === STATE_LEVEL_CLEAR) drawLevelClear();
    }
    
    function drawPlatforms() {
      ctx.fillStyle = COLORS.platform;
      for (const p of platforms) {
        ctx.fillRect(p.x, p.y, p.width, p.height);
        // Draw girders
        ctx.fillStyle = '#6666FF';
        for (let i = 0; i < p.width; i += TILE) {
          ctx.fillRect(p.x + i, p.y, TILE - 2, p.height);
        }
        ctx.fillStyle = COLORS.platform;
      }
    }
    
    function drawLadders() {
      ctx.strokeStyle = COLORS.ladder;
      ctx.lineWidth = 2;
      for (const l of ladders) {
        // Rails
        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.height);
        ctx.moveTo(l.x + l.width, l.y);
        ctx.lineTo(l.x + l.width, l.y + l.height);
        ctx.stroke();
        // Rungs
        for (let y = l.y; y < l.y + l.height; y += 8) {
          ctx.beginPath();
          ctx.moveTo(l.x, y);
          ctx.lineTo(l.x + l.width, y);
          ctx.stroke();
        }
      }
    }
    
    function drawRivets() {
      ctx.fillStyle = COLORS.rivet;
      for (const r of rivets) {
        if (!r.removed) {
          ctx.beginPath();
          ctx.arc(r.x, r.y, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    
    function drawHammers() {
      for (const h of hammers) {
        if (h.active) {
          ctx.fillStyle = COLORS.hammer;
          ctx.fillRect(h.x, h.y + 8, 4, 12);
          ctx.fillStyle = COLORS.hammerHead;
          ctx.fillRect(h.x - 8, h.y, 20, 10);
        }
      }
    }
    
    function drawDK() {
      ctx.fillStyle = COLORS.dk;
      // Body
      ctx.beginPath();
      ctx.ellipse(dk.x + dk.width / 2, dk.y + dk.height / 2, dk.width / 2, dk.height / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Face
      ctx.fillStyle = COLORS.dkFace;
      ctx.beginPath();
      ctx.ellipse(dk.x + dk.width / 2, dk.y + 20, 15, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(dk.x + 18, dk.y + 15, 6, 6);
      ctx.fillRect(dk.x + 30, dk.y + 15, 6, 6);
      
      // Throwing animation
      if (dk.throwing) {
        ctx.fillStyle = COLORS.dk;
        ctx.fillRect(dk.x + dk.width, dk.y + 30, 20, 6);
      }
    }
    
    function drawPauline() {
      ctx.fillStyle = COLORS.pauline;
      // Head
      ctx.beginPath();
      ctx.arc(pauline.x + 8, pauline.y + 6, 6, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillRect(pauline.x + 2, pauline.y + 10, 12, 14);
      // Help animation
      ctx.fillStyle = '#FFF';
      ctx.font = '12px Arial';
      ctx.fillText('HELP!', pauline.x - 5, pauline.y - 5);
    }
    
    function drawMario() {
      if (!mario.alive && state === STATE_DEATH) return;
      
      ctx.save();
      ctx.translate(mario.x + mario.width / 2, mario.y + mario.height / 2);
      ctx.scale(mario.facing, 1);
      
      // Body
      ctx.fillStyle = COLORS.mario;
      ctx.fillRect(-5, -8, 10, 12);
      
      // Head
      ctx.beginPath();
      ctx.arc(0, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      
      // Overalls
      ctx.fillStyle = COLORS.marioOveralls;
      ctx.fillRect(-5, -4, 10, 8);
      
      // Hammer
      if (mario.hasHammer) {
        ctx.fillStyle = COLORS.hammer;
        ctx.fillRect(5, -12 + Math.sin(mario.frame) * 4, 4, 12);
        ctx.fillStyle = COLORS.hammerHead;
        ctx.fillRect(0, -12 + Math.sin(mario.frame) * 4, 16, 8);
      }
      
      ctx.restore();
    }
    
    function drawBarrels() {
      for (const b of barrels) {
        ctx.fillStyle = COLORS.barrel;
        ctx.beginPath();
        ctx.ellipse(b.x + b.width / 2, b.y + b.height / 2, b.width / 2, b.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Bands
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 4);
        ctx.lineTo(b.x + b.width, b.y + 4);
        ctx.moveTo(b.x, b.y + b.height - 4);
        ctx.lineTo(b.x + b.width, b.y + b.height - 4);
        ctx.stroke();
      }
    }
    
    function drawFireballs() {
      for (const f of fireballs) {
        ctx.fillStyle = COLORS.fireball;
        ctx.beginPath();
        ctx.arc(f.x + f.width / 2, f.y + f.height / 2, f.width / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = '#FFFF00';
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 16px Courier New, monospace';
      ctx.textAlign = 'right';
      ctx.fillText('SCORE: ' + score, W - 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('HI: ' + highScore, W / 2, 25);
      
      // Timer bar
      ctx.fillStyle = '#333';
      ctx.fillRect(10, 10, 100, 8);
      ctx.fillStyle = timer > timerMax * 0.3 ? '#00FF00' : '#FF0000';
      ctx.fillRect(10, 10, (timer / timerMax) * 100, 8);
      
      // Lives
      ctx.fillStyle = COLORS.mario;
      for (let i = 0; i < lives; i++) {
        ctx.fillRect(15 + i * 18, H - 15, 12, 15);
      }
      
      // Level
      ctx.fillStyle = COLORS.text;
      ctx.font = '14px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText('L:' + level + ' S:' + stage, 10, H - 25);
      
      // Hammer indicator
      if (mario.hasHammer) {
        ctx.fillStyle = '#FFAA00';
        ctx.fillRect(W - 40, 10, 30, 8);
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(W - 40, 10, (mario.hammerTime / 5000) * 30, 8);
      }
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = '#FFAA00';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('DONKEY KONG', W / 2, 180);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '18px Arial';
      ctx.fillText('Press SPACE to start', W / 2, 280);
      
      ctx.font = '14px Arial';
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow keys or WASD to move', W / 2, 350);
      ctx.fillText('SPACE to jump', W / 2, 375);
      ctx.fillText('P to pause', W / 2, 400);
      
      ctx.fillStyle = '#FFD700';
      ctx.font = '16px Arial';
      ctx.fillText('HIGH SCORE: ' + highScore, W / 2, 480);
    }
    
    function drawReady() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('READY!', W / 2, H / 2);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '18px Arial';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + score, W / 2, H / 2);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '18px Arial';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 100);
    }
    
    function drawLevelClear() {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('STAGE CLEAR!', W / 2, H / 2);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial';
      ctx.fillText('Bonus: ' + Math.floor(timer * 10), W / 2, H / 2 + 40);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_READY;
        setTimeout(() => { state = STATE_PLAYING; }, 2000);
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyP' || e.code === 'Escape') {
        if (state === STATE_PLAYING) {
          state = STATE_PAUSED;
        } else if (state === STATE_PAUSED) {
          state = STATE_PLAYING;
        }
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_READY;
        setTimeout(() => { state = STATE_PLAYING; }, 2000);
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    // Key state helpers
    Object.defineProperty(keys, 'left', {
      get: function() { return this['ArrowLeft'] || this['KeyA'] || this['a'] || this['A']; }
    });
    Object.defineProperty(keys, 'right', {
      get: function() { return this['ArrowRight'] || this['KeyD'] || this['d'] || this['D']; }
    });
    Object.defineProperty(keys, 'up', {
      get: function() { return this['ArrowUp'] || this['KeyW'] || this['w'] || this['W']; }
    });
    Object.defineProperty(keys, 'down', {
      get: function() { return this['ArrowDown'] || this['KeyS'] || this['s'] || this['S']; }
    });
    Object.defineProperty(keys, 'jump', {
      get: function() { return this['Space']; }
    });
    
    window.addEventListener('blur', () => {
      for (const key in keys) keys[key] = false;
    });
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
