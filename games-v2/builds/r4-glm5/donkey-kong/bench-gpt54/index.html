<!--
  GAME:      Donkey Kong
  RUN:       r4-glm5
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donkey Kong</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="448" height="512"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;
  const DT_CAP = 1 / 30;
  const GRAVITY = 0.35;

  const STATES = {
    TITLE: 'title',
    START: 'start',
    PLAYING: 'playing',
    DYING: 'dying',
    STAGE_CLEAR: 'stage_clear',
    PAUSED: 'paused',
    GAME_OVER: 'game_over'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let score = 0;
  let highScore = loadHighScore();
  let lives = 3;
  let stage = 1;
  let stateTimer = 0;
  let timeLimit = 75;
  let timeRemaining = 75;
  let extraLives = [7000, 20000];

  let mario = null;
  let dk = null;
  let pauline = null;
  let oil = null;
  let platforms = [];
  let ladders = [];
  let hammers = [];
  let barrels = [];
  let fireballs = [];
  let particles = [];
  let scoreFloat = null;
  let barrelTimer = 0;
  let fireballCooldown = 0;

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('donkey_kong_best_r4_glm5') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('donkey_kong_best_r4_glm5', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function addScore(points, x = null, y = null) {
    score += points;
    updateHighScore();
    while (extraLives.length && score >= extraLives[0]) {
      lives += 1;
      extraLives.shift();
    }
    if (x !== null && y !== null) scoreFloat = { x, y, text: `+${points}`, life: 1.2 };
  }

  function createStage() {
    platforms = [
      { x1: 28, x2: 420, y1: 470, y2: 454, conveyor: 0 },
      { x1: 44, x2: 404, y1: 396, y2: 410, conveyor: 0 },
      { x1: 28, x2: 388, y1: 338, y2: 322, conveyor: 0 },
      { x1: 60, x2: 420, y1: 264, y2: 278, conveyor: 0 },
      { x1: 28, x2: 372, y1: 206, y2: 190, conveyor: 0 },
      { x1: 58, x2: 220, y1: 138, y2: 138, conveyor: 0 },
      { x1: 248, x2: 410, y1: 108, y2: 108, conveyor: 0 }
    ];

    ladders = [
      { x: 112, top: 392, bottom: 462, broken: false },
      { x: 248, top: 384, bottom: 456, broken: false },
      { x: 352, top: 388, bottom: 458, broken: true },
      { x: 144, top: 326, bottom: 402, broken: false },
      { x: 292, top: 332, bottom: 396, broken: false },
      { x: 84, top: 258, bottom: 334, broken: false },
      { x: 224, top: 266, bottom: 326, broken: true },
      { x: 344, top: 272, bottom: 324, broken: false },
      { x: 154, top: 194, bottom: 270, broken: false },
      { x: 300, top: 202, bottom: 266, broken: false },
      { x: 212, top: 136, bottom: 196, broken: false },
      { x: 276, top: 108, bottom: 196, broken: false }
    ];

    hammers = [
      { x: 176, y: 372, w: 24, h: 16, active: true },
      { x: 284, y: 248, w: 24, h: 16, active: true }
    ];

    mario = {
      x: 48,
      y: 438,
      w: 14,
      h: 20,
      vx: 0,
      vy: 0,
      facing: 1,
      onGround: false,
      jumping: false,
      jumpTimer: 0,
      jumpDuration: 0.55,
      jumpArc: 54,
      jumpStartY: 0,
      climb: false,
      ladder: null,
      hasHammer: false,
      hammerTimer: 0,
      walkAnim: 0
    };

    dk = { x: 122, y: 88, throwAnim: 0, taunt: 0 };
    pauline = { x: 366, y: 78, wiggle: 0 };
    oil = { x: 46, y: 444, flame: 0 };

    barrels = [];
    fireballs = [];
    particles = [];
    barrelTimer = 1.4;
    fireballCooldown = 0;
    timeLimit = Math.max(55, 75 - (stage - 1) * 4);
    timeRemaining = timeLimit;
  }

  function resetRun() {
    score = 0;
    lives = 3;
    stage = 1;
    extraLives = [7000, 20000];
    createStage();
    state = STATES.START;
    stateTimer = 2.0;
  }

  function platformYAt(platform, x) {
    const t = (x - platform.x1) / (platform.x2 - platform.x1);
    return platform.y1 + (platform.y2 - platform.y1) * t;
  }

  function platformUnder(entity, tolerance = 6) {
    const feetX = entity.x + entity.w / 2;
    const feetY = entity.y + entity.h;
    for (const p of platforms) {
      if (feetX >= p.x1 - 4 && feetX <= p.x2 + 4) {
        const py = platformYAt(p, feetX);
        if (Math.abs(feetY - py) <= tolerance && entity.vy >= -1) {
          return p;
        }
      }
    }
    return null;
  }

  function ladderAt(x, y) {
    for (const ladder of ladders) {
      if (Math.abs((x + mario.w / 2) - ladder.x) < 10 && y + mario.h > ladder.top - 6 && y < ladder.bottom + 6) {
        return ladder;
      }
    }
    return null;
  }

  function nearestSupportY(x, fromY) {
    let best = null;
    for (const p of platforms) {
      if (x >= p.x1 - 4 && x <= p.x2 + 4) {
        const py = platformYAt(p, x);
        if (py >= fromY && (best === null || py < best)) best = py;
      }
    }
    return best;
  }

  function spawnBarrel() {
    const speedMul = 1 + Math.min((stage - 1) * 0.1, 0.35);
    barrels.push({
      x: dk.x + 36,
      y: 112,
      w: 16,
      h: 16,
      dir: 1,
      speed: 2.0 * speedMul,
      state: 'rolling',
      ladder: null,
      jumped: false,
      rotation: 0
    });
    dk.throwAnim = 0.45;
  }

  function spawnFireball() {
    if (fireballs.length >= 2) return;
    const speedMul = 1 + Math.min((stage - 1) * 0.1, 0.35);
    fireballs.push({
      x: oil.x + 18,
      y: oil.y - 8,
      w: 12,
      h: 12,
      dir: 1,
      speed: 1.2 * speedMul,
      climbTimer: rand(1.4, 3.2),
      climb: false,
      ladder: null,
      flame: Math.random() * Math.PI * 2
    });
  }

  function startJump() {
    if (state !== STATES.PLAYING || mario.jumping || mario.climb || mario.hasHammer || !mario.onGround) return;
    mario.jumping = true;
    mario.jumpTimer = 0;
    mario.jumpStartY = mario.y;
    mario.vy = -6;
  }

  function pickHammer(hammer) {
    hammer.active = false;
    mario.hasHammer = true;
    mario.hammerTimer = Math.max(4.5, 6 - (stage - 1) * 0.3);
    mario.climb = false;
    mario.ladder = null;
  }

  function killMario() {
    if (state === STATES.DYING || state === STATES.GAME_OVER) return;
    state = STATES.DYING;
    stateTimer = 1.2;
    lives -= 1;
    for (let i = 0; i < 16; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(20, 80);
      particles.push({ x: mario.x + mario.w / 2, y: mario.y + mario.h / 2, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.8, maxLife: 0.8, color: '#ff5555' });
    }
    if (lives <= 0) state = STATES.GAME_OVER;
  }

  function completeStage() {
    addScore(Math.floor(timeRemaining) * 100 + 1000, pauline.x, pauline.y);
    state = STATES.STAGE_CLEAR;
    stateTimer = 2.5;
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function marioHazardOverlap(h) {
    const box = { x: mario.x + 2, y: mario.y + 2, w: mario.w - 4, h: mario.h - 2 };
    return rectsOverlap(box, h);
  }

  function updateMario(dt) {
    mario.walkAnim += dt * 10;

    if (mario.hasHammer) {
      mario.hammerTimer -= dt;
      if (mario.hammerTimer <= 0) mario.hasHammer = false;
    }

    const moveLeft = keys.ArrowLeft || keys.KeyA;
    const moveRight = keys.ArrowRight || keys.KeyD;
    const moveUp = keys.ArrowUp || keys.KeyW;
    const moveDown = keys.ArrowDown || keys.KeyS;

    let move = 0;
    if (moveLeft) move -= 1;
    if (moveRight) move += 1;
    if (move !== 0) mario.facing = move;

    const ladder = ladderAt(mario.x, mario.y);
    if (!mario.hasHammer && ladder && !mario.jumping && (moveUp || moveDown)) {
      mario.climb = true;
      mario.ladder = ladder;
      mario.x = ladder.x - mario.w / 2;
      mario.vx = 0;
      mario.vy = 0;
    }

    if (mario.climb && mario.ladder) {
      const climbSpeed = 70 * dt;
      if (moveUp) mario.y -= climbSpeed;
      if (moveDown) mario.y += climbSpeed;
      mario.x = mario.ladder.x - mario.w / 2;

      if (mario.y + mario.h < mario.ladder.top || mario.y > mario.ladder.bottom) {
        mario.climb = false;
        mario.ladder = null;
      }
      const support = platformUnder(mario, 8);
      if (support && !moveUp && !moveDown) {
        mario.climb = false;
        mario.ladder = null;
        mario.y = platformYAt(support, mario.x + mario.w / 2) - mario.h;
      }
      return;
    }

    const walkSpeed = mario.hasHammer ? 70 * dt : 92 * dt;
    mario.x += move * walkSpeed;
    mario.x = clamp(mario.x, 8, W - mario.w - 8);

    if (mario.jumping) {
      mario.jumpTimer += dt;
      const progress = mario.jumpTimer / mario.jumpDuration;
      const height = Math.sin(Math.min(progress, 1) * Math.PI) * mario.jumpArc;
      mario.y = mario.jumpStartY - height;
      mario.x += move * 38 * dt;
      if (progress >= 1) {
        mario.jumping = false;
        mario.vy = 0;
      }
    } else {
      mario.vy += GRAVITY * 60 * dt;
      mario.y += mario.vy;
    }

    const support = platformUnder(mario, 8);
    if (support && !mario.jumping) {
      mario.onGround = true;
      mario.vy = 0;
      mario.y = platformYAt(support, mario.x + mario.w / 2) - mario.h;
    } else if (!mario.climb) {
      mario.onGround = false;
    }

    if (mario.y > H + 16) killMario();

    hammers.forEach(h => {
      if (h.active && rectsOverlap(mario, { x: h.x, y: h.y, w: h.w, h: h.h })) pickHammer(h);
    });

    if (Math.abs((mario.x + mario.w / 2) - pauline.x) < 18 && Math.abs((mario.y + mario.h / 2) - pauline.y) < 22) completeStage();
  }

  function updateBarrels(dt) {
    for (let i = barrels.length - 1; i >= 0; i--) {
      const barrel = barrels[i];
      barrel.rotation += barrel.speed * dt * 10;

      if (barrel.state === 'ladder') {
        barrel.y += barrel.speed * 55 * dt;
        if (barrel.y + barrel.h >= barrel.ladder.bottom) {
          barrel.state = 'rolling';
          barrel.dir *= -1;
          barrel.ladder = null;
        }
      } else {
        barrel.x += barrel.dir * barrel.speed * 40 * dt;
        const supportY = nearestSupportY(barrel.x + barrel.w / 2, barrel.y + barrel.h - 8);
        if (supportY !== null) barrel.y = supportY - barrel.h;

        for (const ladder of ladders) {
          if (ladder.broken) continue;
          if (Math.abs((barrel.x + barrel.w / 2) - ladder.x) < 7 && barrel.y + barrel.h <= ladder.top + 8 && Math.random() < 0.004 * (stage + 1)) {
            barrel.state = 'ladder';
            barrel.ladder = ladder;
            barrel.x = ladder.x - barrel.w / 2;
            break;
          }
        }

        const support = platformUnder({ x: barrel.x, y: barrel.y, w: barrel.w, h: barrel.h, vy: 1 }, 10);
        if (support) {
          const goingRight = support.y2 > support.y1;
          barrel.dir = goingRight ? 1 : -1;
        }
      }

      if (barrel.x < -30 || barrel.x > W + 30 || barrel.y > H + 20) {
        barrels.splice(i, 1);
        continue;
      }

      const oilHit = Math.abs(barrel.x - oil.x) < 16 && Math.abs(barrel.y - oil.y) < 16;
      if (oilHit && fireballCooldown <= 0) {
        spawnFireball();
        fireballCooldown = 5;
      }

      if (mario.hasHammer && marioHazardOverlap(barrel)) {
        addScore(500, barrel.x, barrel.y);
        for (let p = 0; p < 8; p++) {
          const a = Math.random() * Math.PI * 2;
          particles.push({ x: barrel.x + 8, y: barrel.y + 8, vx: Math.cos(a) * 55, vy: Math.sin(a) * 55, life: 0.5, maxLife: 0.5, color: '#ffaa33' });
        }
        barrels.splice(i, 1);
        continue;
      }

      if (marioHazardOverlap(barrel)) {
        if (mario.jumping && mario.y + mario.h < barrel.y + 8) {
          if (!barrel.jumped) {
            barrel.jumped = true;
            addScore(100, barrel.x, barrel.y - 10);
          }
        } else {
          killMario();
          return;
        }
      }
    }
  }

  function updateFireballs(dt) {
    for (let i = fireballs.length - 1; i >= 0; i--) {
      const fire = fireballs[i];
      fire.flame += dt * 10;
      fire.climbTimer -= dt;

      if (fire.climb && fire.ladder) {
        fire.y -= fire.speed * 35 * dt;
        fire.x = fire.ladder.x - fire.w / 2;
        if (fire.y <= fire.ladder.top - 4) {
          fire.climb = false;
          fire.dir = Math.random() < 0.5 ? -1 : 1;
          fire.climbTimer = rand(1.5, 3.2);
        }
      } else {
        fire.x += fire.dir * fire.speed * 35 * dt;
        const supportY = nearestSupportY(fire.x + fire.w / 2, fire.y + fire.h - 4);
        if (supportY !== null) fire.y = supportY - fire.h;
        if (fire.x < 10 || fire.x > W - 20) fire.dir *= -1;

        const ladder = ladderAt(fire.x, fire.y);
        if (ladder && !ladder.broken && fire.climbTimer <= 0 && Math.abs((fire.x + fire.w / 2) - ladder.x) < 8) {
          fire.climb = true;
          fire.ladder = ladder;
        }
      }

      if (mario.hasHammer && marioHazardOverlap(fire)) {
        addScore(500, fire.x, fire.y);
        fireballs.splice(i, 1);
        continue;
      }
      if (marioHazardOverlap(fire)) {
        killMario();
        return;
      }
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (scoreFloat) {
      scoreFloat.y -= 16 * dt;
      scoreFloat.life -= dt;
      if (scoreFloat.life <= 0) scoreFloat = null;
    }
  }

  function update(dt) {
    updateParticles(dt);
    oil.flame += dt * 12;
    dk.throwAnim = Math.max(0, dk.throwAnim - dt);
    pauline.wiggle += dt * 6;
    fireballCooldown = Math.max(0, fireballCooldown - dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER) return;

    if (state === STATES.START) {
      stateTimer -= dt;
      if (stateTimer <= 0) state = STATES.PLAYING;
      return;
    }

    if (state === STATES.DYING) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        if (lives > 0) {
          createStage();
          state = STATES.START;
          stateTimer = 1.6;
        } else {
          state = STATES.GAME_OVER;
        }
      }
      return;
    }

    if (state === STATES.STAGE_CLEAR) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        stage += 1;
        createStage();
        state = STATES.START;
        stateTimer = 1.8;
      }
      return;
    }

    timeRemaining -= dt;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      killMario();
      return;
    }

    barrelTimer -= dt;
    const throwInterval = Math.max(1.25, 2.4 - (stage - 1) * 0.12);
    if (barrelTimer <= 0) {
      spawnBarrel();
      barrelTimer = throwInterval;
    }

    updateMario(dt);
    updateBarrels(dt);
    updateFireballs(dt);
  }

  function drawPlatform(p) {
    ctx.strokeStyle = '#4a68ff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y1);
    ctx.lineTo(p.x2, p.y2);
    ctx.stroke();

    ctx.strokeStyle = '#7fa0ff';
    ctx.lineWidth = 1;
    for (let x = p.x1; x < p.x2; x += 18) {
      const y = platformYAt(p, x);
      ctx.beginPath();
      ctx.moveTo(x, y - 4);
      ctx.lineTo(x + 8, y + 4);
      ctx.stroke();
    }
  }

  function drawLadder(l) {
    ctx.strokeStyle = l.broken ? 'rgba(100,255,255,0.35)' : '#66e0ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(l.x - 6, l.top);
    ctx.lineTo(l.x - 6, l.bottom);
    ctx.moveTo(l.x + 6, l.top);
    ctx.lineTo(l.x + 6, l.bottom);
    ctx.stroke();
    for (let y = l.top + 6; y < l.bottom; y += 8) {
      if (l.broken && y > (l.top + l.bottom) / 2) continue;
      ctx.beginPath();
      ctx.moveTo(l.x - 6, y);
      ctx.lineTo(l.x + 6, y);
      ctx.stroke();
    }
  }

  function drawMario() {
    ctx.save();
    ctx.translate(mario.x + mario.w / 2, mario.y + mario.h / 2);
    if (state === STATES.DYING) ctx.rotate((1 - stateTimer / 1.2) * Math.PI * 2);
    ctx.scale(mario.facing, 1);

    ctx.fillStyle = '#ff0000';
    ctx.fillRect(-7, -10, 14, 5);
    ctx.fillRect(-6, -15, 12, 5);
    ctx.fillStyle = '#f1c27d';
    ctx.fillRect(-5, -10, 10, 8);
    ctx.fillStyle = '#0000ff';
    ctx.fillRect(-6, -2, 12, 10);
    ctx.fillRect(-6, 8, 4, 8);
    ctx.fillRect(2, 8, 4, 8);
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(-6, 14, 4, 2);
    ctx.fillRect(2, 14, 4, 2);
    ctx.fillStyle = '#f1c27d';
    ctx.fillRect(-8, 0, 2, 6);
    ctx.fillRect(6, 0, 2, 6);

    if (mario.hasHammer) {
      ctx.save();
      const swing = Math.sin(performance.now() / 100) * 0.9;
      ctx.rotate(swing);
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(2, -18, 3, 18);
      ctx.fillStyle = '#bbbbbb';
      ctx.fillRect(-5, -22, 15, 6);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawDonkeyKong() {
    const armOffset = Math.sin(dk.throwAnim * Math.PI * 2) * 6;
    ctx.save();
    ctx.translate(dk.x, dk.y);
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(-24, -18, 48, 36);
    ctx.fillStyle = '#d2a679';
    ctx.fillRect(-12, -6, 24, 18);
    ctx.fillStyle = '#000';
    ctx.fillRect(-10, -8, 4, 4);
    ctx.fillRect(6, -8, 4, 4);
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(-30, -12 - armOffset, 10, 24);
    ctx.fillRect(20, -12 + armOffset, 10, 24);
    ctx.restore();
  }

  function drawPauline() {
    const bob = Math.sin(pauline.wiggle) * 2;
    ctx.save();
    ctx.translate(pauline.x, pauline.y + bob);
    ctx.fillStyle = '#ff4d88';
    ctx.fillRect(-6, -8, 12, 18);
    ctx.fillStyle = '#f1c27d';
    ctx.fillRect(-5, -18, 10, 10);
    ctx.fillStyle = '#331100';
    ctx.fillRect(-6, -20, 12, 4);
    ctx.restore();
  }

  function drawOil() {
    ctx.fillStyle = '#3555cc';
    ctx.fillRect(oil.x - 12, oil.y - 12, 24, 24);
    ctx.strokeStyle = '#99bbff';
    ctx.strokeRect(oil.x - 12, oil.y - 12, 24, 24);
    const flame = 8 + Math.sin(oil.flame) * 3;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(oil.x, oil.y - 20 - flame);
    ctx.lineTo(oil.x - 8, oil.y - 10);
    ctx.lineTo(oil.x + 8, oil.y - 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffff55';
    ctx.beginPath();
    ctx.moveTo(oil.x, oil.y - 16 - flame * 0.6);
    ctx.lineTo(oil.x - 4, oil.y - 10);
    ctx.lineTo(oil.x + 4, oil.y - 10);
    ctx.closePath();
    ctx.fill();
  }

  function drawBarrel(b) {
    ctx.save();
    ctx.translate(b.x + 8, b.y + 8);
    ctx.rotate(b.rotation);
    ctx.fillStyle = '#c96b2c';
    ctx.fillRect(-8, -8, 16, 16);
    ctx.strokeStyle = '#6b3a12';
    ctx.lineWidth = 2;
    ctx.strokeRect(-8, -8, 16, 16);
    ctx.beginPath();
    ctx.moveTo(-4, -8);
    ctx.lineTo(-4, 8);
    ctx.moveTo(4, -8);
    ctx.lineTo(4, 8);
    ctx.stroke();
    ctx.restore();
  }

  function drawFireball(f) {
    ctx.save();
    ctx.translate(f.x + 6, f.y + 6);
    ctx.fillStyle = '#ff3300';
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff66';
    ctx.beginPath();
    ctx.arc(Math.sin(f.flame) * 1.5, -1, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHammer(h) {
    if (!h.active) return;
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(h.x + 8, h.y, 4, 16);
    ctx.fillStyle = '#bbbbbb';
    ctx.fillRect(h.x, h.y, 16, 6);
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = `rgba(${hexToRgb(p.color)},${p.life / p.maxLife})`;
      ctx.fillRect(p.x, p.y, 3, 3);
    });
    if (scoreFloat) {
      ctx.fillStyle = `rgba(255,255,255,${scoreFloat.life})`;
      ctx.font = '16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(scoreFloat.text, scoreFloat.x, scoreFloat.y);
    }
  }

  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    const num = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
    return `${(num >> 16) & 255},${(num >> 8) & 255},${num & 255}`;
  }

  function drawHUD() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, 32);
    ctx.fillStyle = '#fff';
    ctx.font = '18px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`MARIO ${score}`, 8, 22);
    ctx.textAlign = 'center';
    ctx.fillText(`HI ${highScore}`, W / 2, 22);
    ctx.textAlign = 'right';
    ctx.fillText(`STAGE ${stage}`, W - 8, 22);

    const ratio = timeRemaining / timeLimit;
    ctx.fillStyle = '#333';
    ctx.fillRect(144, H - 18, 160, 8);
    ctx.fillStyle = ratio > 0.5 ? '#66ff66' : ratio > 0.25 ? '#ffcc33' : '#ff5555';
    ctx.fillRect(144, H - 18, 160 * clamp(ratio, 0, 1), 8);

    for (let i = 0; i < lives; i++) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(12 + i * 16, H - 22, 10, 6);
      ctx.fillStyle = '#0000ff';
      ctx.fillRect(12 + i * 16, H - 16, 10, 8);
    }

    if (mario.hasHammer) {
      ctx.fillStyle = '#ffff66';
      ctx.fillRect(320, H - 18, 90 * (mario.hammerTimer / 6), 8);
      ctx.strokeStyle = '#ffffff';
      ctx.strokeRect(320, H - 18, 90, 8);
    }
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 34px Arial';
    ctx.fillText(title, W / 2, H / 2 - 70);
    ctx.font = '20px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 30));
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    platforms.forEach(drawPlatform);
    ladders.forEach(drawLadder);
    hammers.forEach(drawHammer);
    drawOil();
    drawDonkeyKong();
    drawPauline();
    barrels.forEach(drawBarrel);
    fireballs.forEach(drawFireball);
    drawMario();
    drawParticles();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('DONKEY KONG', [
        'Press SPACE to start',
        'Arrow keys / WASD to move and climb',
        'SPACE to jump • P to pause',
        `High Score: ${highScore}`
      ], true);
    } else if (state === STATES.START) {
      drawOverlay('25m', ['Reach Pauline. Avoid barrels.', 'Grab hammers for 500-point smashes.'], true);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.STAGE_CLEAR) {
      drawOverlay('HOW HIGH CAN YOU GET?', ['Pauline rescued!', 'Prepare for the next stage'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', [
        `Final Score: ${score}`,
        'Press R to play again',
        'Press Escape for title'
      ], true);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) resetRun();
      else if (state === STATES.PLAYING) startJump();
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING || state === STATES.START) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) resetRun();
    }
  }

  function syncPrev() {
    const watched = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  createStage();
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
