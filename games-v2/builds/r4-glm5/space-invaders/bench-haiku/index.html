<!--
  GAME:      Space Invaders
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="invadersCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('invadersCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, WAVE_COMPLETE: 4 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('spaceInvadersHighScore') || '0', 10);
    let lives = 3;
    let wave = 1;

    // Player
    const player = { x: 375, y: 550, width: 50, height: 30, speed: 5 };
    let playerLaser = null;

    // Aliens
    let aliens = [];
    let alienDirection = 1;
    let alienStepTimer = 0;
    let baseStepInterval = 800;
    let currentStepInterval = baseStepInterval;
    let alienAnimationFrame = 0;

    // Bombs
    let bombs = [];

    // Shields (4 shields, pixel-based)
    let shields = [];
    const shieldPositions = [
      { x: 100, y: 420 },
      { x: 280, y: 420 },
      { x: 460, y: 420 },
      { x: 640, y: 420 }
    ];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          initGame();
        } else if (gameState === STATES.PLAYING) {
          fireLaser();
        }
      }

      if (key === 'p') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState !== STATES.TITLE) {
          initGame();
        }
      }

      if (key === 'escape') {
        gameState = STATES.TITLE;
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function initShields() {
      shields = [];
      for (let s = 0; s < 4; s++) {
        const shield = [];
        for (let y = 0; y < 50; y++) {
          shield[y] = [];
          for (let x = 0; x < 70; x++) {
            const inArch = (y < 30) || (x > 20 && x < 50 && y >= 30);
            shield[y][x] = inArch;
          }
        }
        shields.push(shield);
      }
    }

    function damageShield(shieldIdx, hitX, hitY) {
      const shield = shields[shieldIdx];
      const pos = shieldPositions[shieldIdx];
      const localX = hitX - pos.x;
      const localY = hitY - pos.y;
      const radius = 5;

      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy <= radius * radius) {
            const px = Math.floor(localX + dx);
            const py = Math.floor(localY + dy);
            if (py >= 0 && py < 50 && px >= 0 && px < 70) {
              shield[py][px] = false;
            }
          }
        }
      }
    }

    function createAliens() {
      aliens = [];
      const types = [
        { type: 'A', width: 30, height: 20, points: 30 },
        { type: 'A', width: 30, height: 20, points: 30 },
        { type: 'B', width: 40, height: 25, points: 20 },
        { type: 'B', width: 40, height: 25, points: 20 },
        { type: 'C', width: 50, height: 30, points: 10 }
      ];

      let alienY = 60 - (wave - 1) * 10;
      for (let row = 0; row < 5; row++) {
        const typeData = types[row];
        for (let col = 0; col < 11; col++) {
          aliens.push({
            x: 60 + col * 65,
            y: alienY + row * 50,
            width: typeData.width,
            height: typeData.height,
            type: typeData.type,
            points: typeData.points,
            alive: true,
            frame: 0
          });
        }
      }
      alienDirection = 1;
      alienAnimationFrame = 0;
    }

    function initGame() {
      score = 0;
      lives = 3;
      wave = 1;
      player.x = 375;
      playerLaser = null;
      bombs = [];
      createAliens();
      initShields();
      baseStepInterval = 800;
      currentStepInterval = baseStepInterval;
      gameState = STATES.PLAYING;
    }

    function fireLaser() {
      if (playerLaser === null && gameState === STATES.PLAYING) {
        playerLaser = {
          x: player.x + player.width / 2 - 1.5,
          y: player.y - 15,
          width: 3,
          height: 15
        };
      }
    }

    function getShooterAliens() {
      const shooters = [];
      for (let col = 0; col < 11; col++) {
        let lowestAlien = null;
        for (let row = 0; row < 5; row++) {
          const alien = aliens[row * 11 + col];
          if (alien && alien.alive) {
            lowestAlien = alien;
          }
        }
        if (lowestAlien) {
          shooters.push(lowestAlien);
        }
      }
      return shooters;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Player movement
      if (keys['arrowleft'] || keys['a']) {
        player.x -= player.speed;
      }
      if (keys['arrowright'] || keys['d']) {
        player.x += player.speed;
      }
      player.x = Math.max(0, Math.min(WIDTH - player.width, player.x));

      // Player laser
      if (playerLaser) {
        playerLaser.y -= 8;

        if (playerLaser.y + playerLaser.height < 0) {
          playerLaser = null;
        } else {
          // Check alien collisions
          for (let i = aliens.length - 1; i >= 0; i--) {
            const alien = aliens[i];
            if (alien.alive &&
                playerLaser.x < alien.x + alien.width &&
                playerLaser.x + playerLaser.width > alien.x &&
                playerLaser.y < alien.y + alien.height &&
                playerLaser.y + playerLaser.height > alien.y) {
              alien.alive = false;
              score += alien.points;
              playerLaser = null;
              break;
            }
          }

          // Check shield collisions
          if (playerLaser) {
            for (let s = 0; s < 4; s++) {
              const pos = shieldPositions[s];
              if (playerLaser.x >= pos.x && playerLaser.x < pos.x + 70 &&
                  playerLaser.y >= pos.y && playerLaser.y < pos.y + 50) {
                damageShield(s, playerLaser.x, playerLaser.y);
                playerLaser = null;
                break;
              }
            }
          }
        }
      }

      // Alien movement
      alienStepTimer += 16;
      const aliensAlive = aliens.filter(a => a.alive).length;
      
      if (aliensAlive > 44) currentStepInterval = 800;
      else if (aliensAlive > 34) currentStepInterval = 600;
      else if (aliensAlive > 24) currentStepInterval = 400;
      else if (aliensAlive > 14) currentStepInterval = 250;
      else if (aliensAlive > 4) currentStepInterval = 150;
      else currentStepInterval = 80;

      if (alienStepTimer >= currentStepInterval) {
        alienStepTimer = 0;
        alienAnimationFrame = 1 - alienAnimationFrame;

        let leftMost = 800, rightMost = 0;
        for (let alien of aliens) {
          if (alien.alive) {
            leftMost = Math.min(leftMost, alien.x);
            rightMost = Math.max(rightMost, alien.x + alien.width);
          }
        }

        let shouldReverse = false;
        if (alienDirection === 1 && rightMost + 10 > 780) {
          shouldReverse = true;
        } else if (alienDirection === -1 && leftMost - 10 < 20) {
          shouldReverse = true;
        }

        for (let alien of aliens) {
          if (alien.alive) {
            if (shouldReverse) {
              alien.y += 20;
            } else {
              alien.x += 10 * alienDirection;
            }
          }
        }

        if (shouldReverse) {
          alienDirection *= -1;
        }

        // Check if aliens reached bottom
        for (let alien of aliens) {
          if (alien.alive && alien.y + alien.height >= 500) {
            gameState = STATES.GAME_OVER;
            return;
          }
        }
      }

      // Alien shooting
      if (Math.random() < 0.01 && bombs.length < 4) {
        const shooters = getShooterAliens();
        if (shooters.length > 0) {
          const shooter = shooters[Math.floor(Math.random() * shooters.length)];
          bombs.push({
            x: shooter.x + shooter.width / 2 - 2,
            y: shooter.y + shooter.height,
            width: 4,
            height: 4
          });
        }
      }

      // Update bombs
      for (let i = bombs.length - 1; i >= 0; i--) {
        const bomb = bombs[i];
        bomb.y += 3;

        if (bomb.y > HEIGHT) {
          bombs.splice(i, 1);
          continue;
        }

        // Check player collision
        if (bomb.x < player.x + player.width &&
            bomb.x + bomb.width > player.x &&
            bomb.y < player.y + player.height &&
            bomb.y + bomb.height > player.y) {
          lives--;
          bombs.splice(i, 1);
          if (lives <= 0) {
            gameState = STATES.GAME_OVER;
          } else {
            player.x = 375;
            playerLaser = null;
          }
          continue;
        }

        // Check shield collision
        for (let s = 0; s < 4; s++) {
          const pos = shieldPositions[s];
          if (bomb.x >= pos.x && bomb.x < pos.x + 70 &&
              bomb.y >= pos.y && bomb.y < pos.y + 50) {
            damageShield(s, bomb.x, bomb.y);
            bombs.splice(i, 1);
            break;
          }
        }
      }

      // Check wave complete
      if (aliens.every(a => !a.alive)) {
        wave++;
        gameState = STATES.WAVE_COMPLETE;
        setTimeout(() => {
          createAliens();
          gameState = STATES.PLAYING;
        }, 2000);
      }

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('spaceInvadersHighScore', highScore);
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw shields
      ctx.fillStyle = '#00FF00';
      for (let s = 0; s < 4; s++) {
        const shield = shields[s];
        const pos = shieldPositions[s];
        for (let y = 0; y < 50; y++) {
          for (let x = 0; x < 70; x++) {
            if (shield[y][x]) {
              ctx.fillRect(pos.x + x, pos.y + y, 1, 1);
            }
          }
        }
      }

      // Draw aliens
      ctx.fillStyle = '#00FF00';
      for (let alien of aliens) {
        if (alien.alive) {
          ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
        }
      }

      // Draw player
      ctx.fillStyle = '#00FFFF';
      ctx.fillRect(player.x + 15, player.y, 20, 15);
      ctx.fillRect(player.x, player.y + 15, 50, 15);

      // Draw laser
      if (playerLaser) {
        ctx.fillStyle = '#FFFF00';
        ctx.fillRect(playerLaser.x, playerLaser.y, playerLaser.width, playerLaser.height);
      }

      // Draw bombs
      ctx.fillStyle = '#FF0000';
      for (let bomb of bombs) {
        ctx.fillRect(bomb.x, bomb.y, bomb.width, bomb.height);
      }

      // Draw HUD
      ctx.fillStyle = '#00FF00';
      ctx.font = '20px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('Wave: ' + wave, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', WIDTH / 2, 120);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('← → or A D to move', WIDTH / 2, 350);
        ctx.fillText('SPACE to fire', WIDTH / 2, 385);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 40);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, HEIGHT / 2 + 40);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '24px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);
        ctx.fillText('High Score: ' + highScore, WIDTH / 2, 330);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
        ctx.fillText('Press ESC for title', WIDTH / 2, 435);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
