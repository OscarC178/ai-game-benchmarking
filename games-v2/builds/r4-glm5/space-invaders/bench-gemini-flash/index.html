<!--
  GAME:      Space Invaders
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #000;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="invaders" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('invaders');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800;
        const HEIGHT = 600;
        const PLAYER_WIDTH = 50;
        const PLAYER_HEIGHT = 30;
        const ALIEN_ROWS = 5;
        const ALIEN_COLS = 11;
        const ALIEN_STEP_X = 15;
        const ALIEN_DROP_Y = 20;
        const SHIELD_COUNT = 4;
        const SHIELD_WIDTH = 70;
        const SHIELD_HEIGHT = 50;

        // Assets / Shapes
        const alienTypes = [
            { type: 'A', w: 30, h: 20, pts: 30 }, // Squid
            { type: 'A', w: 30, h: 20, pts: 30 },
            { type: 'B', w: 40, h: 25, pts: 20 }, // Crab
            { type: 'B', w: 40, h: 25, pts: 20 },
            { type: 'C', w: 50, h: 30, pts: 10 }  // Octopus
        ];

        // Game State
        let state = 'TITLE'; // TITLE, PLAYING, PAUSED, GAMEOVER, WAVE_COMPLETE
        let score = 0;
        let lives = 3;
        let wave = 1;
        let highScore = parseInt(localStorage.getItem('spaceInvHighScore')) || 0;

        let player = { x: WIDTH / 2 - PLAYER_WIDTH / 2, y: HEIGHT - 50, w: PLAYER_WIDTH, h: PLAYER_HEIGHT, alive: true };
        let laser = null; // {x, y, w, h}
        let bombs = []; // [{x, y, w, h}]
        let aliens = []; // [{x, y, w, h, type, pts, alive, frame}]
        let shields = []; // [{x, y, pixels: [[row[col]]}]
        let mysteryShip = null; // {x, y, w, h, dir}

        let alienDirection = 1; // 1: Right, -1: Left
        let stepTimer = 0;
        let lastTime = 0;
        let mysteryTimer = 0;

        const keys = { left: false, right: false };

        // Input Handling
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ' || e.code === 'Space') handleSpace();
            if (e.key.toLowerCase() === 'p') togglePause();
            if (e.key.toLowerCase() === 'r') initGame();
            if (e.key === 'Escape') state = 'TITLE';
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
        });

        function handleSpace() {
            if (state === 'TITLE') {
                initGame();
                state = 'PLAYING';
            } else if (state === 'PLAYING') {
                fireLaser();
            } else if (state === 'GAMEOVER') {
                initGame();
                state = 'PLAYING';
            }
        }

        function togglePause() {
            if (state === 'PLAYING') state = 'PAUSED';
            else if (state === 'PAUSED') state = 'PLAYING';
        }

        function fireLaser() {
            if (laser === null && player.alive) {
                laser = {
                    x: player.x + player.w / 2 - 1.5,
                    y: player.y - 15,
                    w: 3,
                    h: 15
                };
            }
        }

        function initGame() {
            score = 0;
            lives = 3;
            wave = 1;
            initWave();
            initShields();
            player.alive = true;
            player.x = WIDTH / 2 - player.w / 2;
        }

        function initWave() {
            aliens = [];
            const startY = 80 + (wave - 1) * 20; // Lower each wave
            for (let r = 0; r < ALIEN_ROWS; r++) {
                for (let c = 0; c < ALIEN_COLS; c++) {
                    const type = alienTypes[r];
                    aliens.push({
                        x: 80 + c * 60,
                        y: startY + r * 45,
                        w: type.w,
                        h: type.h,
                        pts: type.pts,
                        type: type.type,
                        alive: true,
                        frame: 0
                    });
                }
            }
            laser = null;
            bombs = [];
            alienDirection = 1;
            stepTimer = 0;
            mysteryTimer = Math.random() * 20000 + 10000;
        }

        function initShields() {
            shields = [];
            for (let i = 0; i < SHIELD_COUNT; i++) {
                const sx = 100 + i * 180;
                const sy = 450;
                let pixels = [];
                for (let y = 0; y < SHIELD_HEIGHT; y++) {
                    pixels[y] = [];
                    for (let x = 0; x < SHIELD_WIDTH; x++) {
                        // Arch shape
                        const isArch = y < 35 || (x < 20 || x > 50);
                        pixels[y][x] = isArch;
                    }
                }
                shields.push({ x: sx, y: sy, pixels });
            }
        }

        function update(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            if (state !== 'PLAYING') return;

            // Player movement
            if (player.alive) {
                if (keys.left) player.x -= 5;
                if (keys.right) player.x += 5;
                player.x = Math.max(0, Math.min(WIDTH - player.w, player.x));
            }

            // Laser movement
            if (laser) {
                laser.y -= 8;
                if (laser.y + laser.h < 0) laser = null;
            }

            // Bomb movement
            bombs.forEach((bomb, index) => {
                bomb.y += 3.5;
                if (bomb.y > HEIGHT) bombs.splice(index, 1);
            });

            // Alien movement
            const aliveCount = aliens.filter(a => a.alive).length;
            if (aliveCount === 0) {
                state = 'WAVE_COMPLETE';
                setTimeout(() => { wave++; initWave(); state = 'PLAYING'; }, 2000);
                return;
            }

            const interval = calculateInterval(aliveCount);
            stepTimer += deltaTime;
            if (stepTimer >= interval) {
                stepTimer = 0;
                moveAliens();
            }

            // Mystery ship
            mysteryTimer -= deltaTime;
            if (mysteryTimer <= 0 && !mysteryShip) {
                mysteryShip = {
                    x: -60,
                    y: 40,
                    w: 60,
                    h: 25,
                    dir: 1
                };
                if (Math.random() > 0.5) {
                    mysteryShip.x = WIDTH;
                    mysteryShip.dir = -1;
                }
            }

            if (mysteryShip) {
                mysteryShip.x += 3 * mysteryShip.dir;
                if (mysteryShip.x < -60 || mysteryShip.x > WIDTH) {
                    mysteryShip = null;
                    mysteryTimer = Math.random() * 20000 + 15000;
                }
            }

            // Alien bombing
            if (Math.random() < 0.01 && bombs.length < 4) {
                const shooters = getShooters();
                if (shooters.length > 0) {
                    const s = shooters[Math.floor(Math.random() * shooters.length)];
                    bombs.push({ x: s.x + s.w/2 - 2, y: s.y + s.h, w: 4, h: 8 });
                }
            }

            checkCollisions();
        }

        function calculateInterval(count) {
            if (count > 44) return 800;
            if (count > 34) return 600;
            if (count > 24) return 400;
            if (count > 14) return 250;
            if (count > 4) return 150;
            return 80;
        }

        function moveAliens() {
            let leftMost = WIDTH, rightMost = 0, bottomMost = 0;
            aliens.forEach(a => {
                if (a.alive) {
                    leftMost = Math.min(leftMost, a.x);
                    rightMost = Math.max(rightMost, a.x + a.w);
                    bottomMost = Math.max(bottomMost, a.y + a.h);
                }
            });

            if (bottomMost >= player.y) {
                state = 'GAMEOVER';
                return;
            }

            let reverse = false;
            if (alienDirection === 1 && rightMost + ALIEN_STEP_X > WIDTH - 20) reverse = true;
            else if (alienDirection === -1 && leftMost - ALIEN_STEP_X < 20) reverse = true;

            const shiftX = reverse ? 0 : ALIEN_STEP_X * alienDirection;
            const shiftY = reverse ? ALIEN_DROP_Y : 0;

            aliens.forEach(a => {
                if (a.alive) {
                    a.x += shiftX;
                    a.y += shiftY;
                    a.frame = 1 - a.frame;
                }
            });

            if (reverse) alienDirection *= -1;
        }

        function getShooters() {
            const cols = [];
            for (let c = 0; c < ALIEN_COLS; c++) {
                let lowest = null;
                for (let r = 0; r < ALIEN_ROWS; r++) {
                    const a = aliens[r * ALIEN_COLS + c];
                    if (a.alive) lowest = a;
                }
                if (lowest) cols.push(lowest);
            }
            return cols;
        }

        function checkCollisions() {
            // Laser vs Aliens
            if (laser) {
                for (let a of aliens) {
                    if (a.alive && rectIntersect(laser, a)) {
                        a.alive = false;
                        laser = null;
                        score += a.pts;
                        updateHighScore();
                        break;
                    }
                }
            }

            // Laser vs Mystery
            if (laser && mysteryShip && rectIntersect(laser, mysteryShip)) {
                score += [50, 100, 150, 300][Math.floor(Math.random() * 4)];
                mysteryShip = null;
                laser = null;
                mysteryTimer = Math.random() * 20000 + 20000;
                updateHighScore();
            }

            // Bomb vs Player
            bombs.forEach((bomb, index) => {
                if (player.alive && rectIntersect(bomb, player)) {
                    bombs.splice(index, 1);
                    onPlayerHit();
                }
            });

            // Projectiles vs Shields
            if (laser) checkShieldPixelCollision(laser, true);
            bombs.forEach((bomb, index) => {
                if (checkShieldPixelCollision(bomb, false)) bombs.splice(index, 1);
            });
        }

        function onPlayerHit() {
            lives--;
            player.alive = false;
            if (lives <= 0) {
                state = 'GAMEOVER';
            } else {
                setTimeout(() => {
                    player.alive = true;
                    player.x = WIDTH / 2 - player.w / 2;
                }, 1500);
            }
        }

        function checkShieldPixelCollision(rect, isLaser) {
            for (let s of shields) {
                if (rect.x + rect.w > s.x && rect.x < s.x + SHIELD_WIDTH &&
                    rect.y + rect.h > s.y && rect.y < s.y + SHIELD_HEIGHT) {
                    
                    const localX = Math.floor(rect.x + rect.w/2 - s.x);
                    const localY = Math.floor(isLaser ? (rect.y - s.y) : (rect.y + rect.h - s.y));

                    if (localY >= 0 && localY < SHIELD_HEIGHT && localX >= 0 && localX < SHIELD_WIDTH) {
                        if (s.pixels[localY][localX]) {
                            // Damage shield
                            damageShield(s, localX, localY);
                            if (isLaser) laser = null;
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function damageShield(shield, lx, ly) {
            const r = 5;
            for (let dy = -r; dy <= r; dy++) {
                for (let dx = -r; dx <= r; dx++) {
                    if (dx*dx + dy*dy <= r*r) {
                        const px = lx + dx;
                        const py = ly + dy;
                        if (px >= 0 && px < SHIELD_WIDTH && py >= 0 && py < SHIELD_HEIGHT) {
                            shield.pixels[py][px] = false;
                        }
                    }
                }
            }
        }

        function rectIntersect(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceInvHighScore', highScore);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Aliens
            aliens.forEach(a => {
                if (!a.alive) return;
                ctx.fillStyle = '#FFF';
                if (a.type === 'C') ctx.fillStyle = '#F44';
                if (a.type === 'B') ctx.fillStyle = '#FB0';
                
                // Simplified sprites
                if (a.frame === 0) {
                    ctx.fillRect(a.x, a.y + a.h/4, a.w, a.h/2);
                    ctx.fillRect(a.x + a.w/4, a.y, a.w/2, a.h);
                } else {
                    ctx.fillRect(a.x, a.y, a.w, a.h/3);
                    ctx.fillRect(a.x + a.w/4, a.y, a.w/2, a.h);
                    ctx.fillRect(a.x, a.y + a.h*2/3, a.w, a.h/3);
                }
            });

            // Player
            if (player.alive) {
                ctx.fillStyle = '#0FF';
                ctx.fillRect(player.x, player.y + 10, player.w, 20);
                ctx.fillRect(player.x + 20, player.y, 10, 10);
            } else {
                // Draw explosion bits
                ctx.fillStyle = '#F00';
                for(let i=0; i<8; i++) ctx.fillRect(player.x + Math.random()*50, player.y + Math.random()*30, 4, 4);
            }

            // Projectiles
            if (laser) { ctx.fillStyle = '#FF0'; ctx.fillRect(laser.x, laser.y, laser.w, laser.h); }
            ctx.fillStyle = '#F00';
            bombs.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Shields
            shields.forEach(s => {
                ctx.fillStyle = '#0F0';
                for (let y = 0; y < SHIELD_HEIGHT; y++) {
                    for (let x = 0; x < SHIELD_WIDTH; x++) {
                        if (s.pixels[y][x]) ctx.fillRect(s.x + x, s.y + y, 1, 1);
                    }
                }
            });

            // Mystery Ship
            if (mysteryShip) {
                ctx.fillStyle = '#F00';
                ctx.fillRect(mysteryShip.x, mysteryShip.y, mysteryShip.w, mysteryShip.h);
                ctx.fillStyle = '#FFF';
                ctx.fillRect(mysteryShip.x + 10, mysteryShip.y + 5, 40, 5);
            }

            // UI
            ctx.fillStyle = '#FFF'; ctx.font = '20px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 30);
            ctx.textAlign = 'center'; ctx.fillText(`HI-SCORE: ${highScore}`, WIDTH/2, 30);
            ctx.textAlign = 'right'; ctx.fillText(`LIVES: ${lives}`, WIDTH - 20, 30);

            // Overlays
            if (state === 'TITLE') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = 'bold 60px Segoe UI';
                ctx.fillText('SPACE INVADERS', WIDTH/2, 250);
                ctx.font = '24px Segoe UI'; ctx.fillText('Press SPACE to start', WIDTH/2, 350);
            } else if (state === 'PAUSED') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = 'bold 60px Segoe UI';
                ctx.fillText('PAUSED', WIDTH/2, 300);
            } else if (state === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#F00'; ctx.textAlign = 'center'; ctx.font = 'bold 80px Segoe UI';
                ctx.fillText('GAME OVER', WIDTH/2, 300);
            }
        }

        function loop(t) {
            update(t);
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
