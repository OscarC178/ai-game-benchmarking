<!--
  GAME:      Space Invaders
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_PLAYER_DEAD = 3;
    const STATE_GAMEOVER = 4;
    const STATE_WAVE_CLEAR = 5;
    
    // Colors
    const COLORS = {
      background: '#000000',
      player: '#00FFFF',
      alienA: '#00FF00',
      alienB: '#FFFF00',
      alienC: '#FF4444',
      laser: '#FFFFFF',
      bomb: '#FF6666',
      shield: '#00FF00',
      mystery: '#FF0000',
      text: '#FFFFFF'
    };
    
    // Player settings
    const PLAYER_WIDTH = 50;
    const PLAYER_HEIGHT = 30;
    const PLAYER_SPEED = 5;
    const PLAYER_Y = H - 50;
    
    // Laser settings
    const LASER_WIDTH = 3;
    const LASER_HEIGHT = 15;
    const LASER_SPEED = 8;
    
    // Alien settings
    const ALIEN_ROWS = 5;
    const ALIEN_COLS = 11;
    const ALIEN_SPACING_X = 55;
    const ALIEN_SPACING_Y = 45;
    const ALIEN_START_X = 80;
    const ALIEN_START_Y = 80;
    
    // Bomb settings
    const BOMB_WIDTH = 4;
    const BOMB_HEIGHT = 12;
    const BOMB_SPEED = 4;
    const MAX_BOMBS = 4;
    
    // Shield settings
    const SHIELD_COUNT = 4;
    const SHIELD_WIDTH = 70;
    const SHIELD_HEIGHT = 50;
    const SHIELD_Y = 450;
    
    // Mystery ship
    const MYSTERY_WIDTH = 60;
    const MYSTERY_HEIGHT = 25;
    const MYSTERY_Y = 40;
    const MYSTERY_SPEED = 3;
    
    // Points
    const POINTS_A = 30;
    const POINTS_B = 20;
    const POINTS_C = 10;
    const MYSTERY_POINTS = [50, 100, 150, 300];
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('spaceinvaders_highscore') || '0');
    let lives = 3;
    let wave = 1;
    
    let player = null;
    let laser = null;
    let aliens = [];
    let bombs = [];
    let shields = [];
    let mystery = null;
    let mysteryTimer = 0;
    let mysteryScore = null;
    
    let alienDirection = 1;
    let alienStepTimer = 0;
    let alienStepInterval = 800;
    let alienAnimFrame = 0;
    let alienDropDistance = 0;
    
    let deathTimer = 0;
    let waveClearTimer = 0;
    let invincibleTimer = 0;
    
    // Input
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      player = {
        x: W / 2 - PLAYER_WIDTH / 2,
        y: PLAYER_Y,
        width: PLAYER_WIDTH,
        height: PLAYER_HEIGHT
      };
      
      laser = null;
      bombs = [];
      mystery = null;
      mysteryTimer = 15000;
      mysteryScore = null;
      
      initAliens();
      initShields();
      
      lives = 3;
      score = 0;
      wave = 1;
      invincibleTimer = 0;
    }
    
    function initAliens() {
      aliens = [];
      alienDirection = 1;
      alienAnimFrame = 0;
      alienStepTimer = 0;
      
      const startOffset = ALIEN_START_X + (wave - 1) * 10;
      
      for (let row = 0; row < ALIEN_ROWS; row++) {
        for (let col = 0; col < ALIEN_COLS; col++) {
          let type, width, height, points;
          
          if (row < 2) {
            type = 'A';
            width = 30;
            height = 20;
            points = POINTS_A;
          } else if (row < 4) {
            type = 'B';
            width = 40;
            height = 25;
            points = POINTS_B;
          } else {
            type = 'C';
            width = 50;
            height = 30;
            points = POINTS_C;
          }
          
          aliens.push({
            x: startOffset + col * ALIEN_SPACING_X - width / 2,
            y: ALIEN_START_Y + row * ALIEN_SPACING_Y + (wave - 1) * 20,
            type: type,
            width: width,
            height: height,
            points: points,
            alive: true
          });
        }
      }
      
      updateAlienInterval();
    }
    
    function initShields() {
      shields = [];
      
      for (let i = 0; i < SHIELD_COUNT; i++) {
        const shieldX = 100 + i * 180 - SHIELD_WIDTH / 2;
        const pixels = [];
        
        for (let y = 0; y < SHIELD_HEIGHT; y++) {
          pixels[y] = [];
          for (let x = 0; x < SHIELD_WIDTH; x++) {
            // Arch shape - inverted U
            const isArch = y < 35 || (x < 25 || x > 45);
            pixels[y][x] = isArch;
          }
        }
        
        shields.push({
          x: shieldX,
          y: SHIELD_Y,
          pixels: pixels
        });
      }
    }
    
    function updateAlienInterval() {
      const alive = aliens.filter(a => a.alive).length;
      
      if (alive > 44) alienStepInterval = 800;
      else if (alive > 34) alienStepInterval = 600;
      else if (alive > 24) alienStepInterval = 400;
      else if (alive > 14) alienStepInterval = 250;
      else if (alive > 4) alienStepInterval = 150;
      else alienStepInterval = 80;
      
      alienStepInterval = Math.max(80, alienStepInterval - (wave - 1) * 50);
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_PLAYER_DEAD) {
        deathTimer -= dtMs;
        if (deathTimer <= 0) {
          if (lives > 0) {
            player.x = W / 2 - PLAYER_WIDTH / 2;
            state = STATE_PLAYING;
            invincibleTimer = 2000;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('spaceinvaders_highscore', highScore);
            }
          }
        }
        return;
      }
      
      if (state === STATE_WAVE_CLEAR) {
        waveClearTimer -= dtMs;
        if (waveClearTimer <= 0) {
          wave++;
          initAliens();
          laser = null;
          bombs = [];
          mystery = null;
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Invincibility timer
      if (invincibleTimer > 0) {
        invincibleTimer -= dtMs;
      }
      
      // Update player
      if (keys.left) {
        player.x -= PLAYER_SPEED;
      }
      if (keys.right) {
        player.x += PLAYER_SPEED;
      }
      player.x = Math.max(0, Math.min(W - player.width, player.x));
      
      // Fire laser
      if (keys.space && laser === null) {
        laser = {
          x: player.x + player.width / 2 - LASER_WIDTH / 2,
          y: player.y - LASER_HEIGHT,
          width: LASER_WIDTH,
          height: LASER_HEIGHT
        };
      }
      
      // Update laser
      if (laser) {
        laser.y -= LASER_SPEED;
        if (laser.y < 0) {
          laser = null;
        }
      }
      
      // Update alien movement
      alienStepTimer += dtMs;
      if (alienStepTimer >= alienStepInterval) {
        alienStepTimer = 0;
        moveAliens();
        alienAnimFrame = 1 - alienAnimFrame;
      }
      
      // Alien shooting
      if (Math.random() < 0.02 && bombs.length < MAX_BOMBS) {
        const shooters = getShooterAliens();
        if (shooters.length > 0) {
          const shooter = shooters[Math.floor(Math.random() * shooters.length)];
          bombs.push({
            x: shooter.x + shooter.width / 2 - BOMB_WIDTH / 2,
            y: shooter.y + shooter.height,
            width: BOMB_WIDTH,
            height: BOMB_HEIGHT
          });
        }
      }
      
      // Update bombs
      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += BOMB_SPEED;
        if (bombs[i].y > H) {
          bombs.splice(i, 1);
        }
      }
      
      // Update mystery ship
      mysteryTimer -= dtMs;
      if (mystery === null && mysteryTimer <= 0 && Math.random() < 0.01) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        mystery = {
          x: dir > 0 ? -MYSTERY_WIDTH : W,
          y: MYSTERY_Y,
          width: MYSTERY_WIDTH,
          height: MYSTERY_HEIGHT,
          dir: dir,
          points: MYSTERY_POINTS[Math.floor(Math.random() * MYSTERY_POINTS.length)]
        };
        mysteryTimer = 20000 + Math.random() * 10000;
      }
      
      if (mystery) {
        mystery.x += MYSTERY_SPEED * mystery.dir;
        if (mystery.x < -MYSTERY_WIDTH || mystery.x > W) {
          mystery = null;
          mysteryScore = null;
        }
      }
      
      // Update mystery score display
      if (mysteryScore) {
        mysteryScore.y -= 1;
        mysteryScore.life -= dtMs;
        if (mysteryScore.life <= 0) {
          mysteryScore = null;
        }
      }
      
      // Check collisions
      checkCollisions();
      
      // Check invasion
      const lowestAlien = Math.max(...aliens.filter(a => a.alive).map(a => a.y + a.height));
      if (lowestAlien >= player.y - 10) {
        state = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('spaceinvaders_highscore', highScore);
        }
      }
      
      // Check wave clear
      if (aliens.every(a => !a.alive)) {
        state = STATE_WAVE_CLEAR;
        waveClearTimer = 2000;
      }
    }
    
    function moveAliens() {
      let leftMost = W, rightMost = 0;
      aliens.forEach(a => {
        if (a.alive) {
          leftMost = Math.min(leftMost, a.x);
          rightMost = Math.max(rightMost, a.x + a.width);
        }
      });
      
      const stepSize = 10 + (wave - 1) * 2;
      const dropDistance = 15 + (wave - 1) * 3;
      
      let shouldDrop = false;
      if (alienDirection === 1 && rightMost + stepSize > W - 20) {
        shouldDrop = true;
      } else if (alienDirection === -1 && leftMost - stepSize < 20) {
        shouldDrop = true;
      }
      
      aliens.forEach(a => {
        if (a.alive) {
          if (shouldDrop) {
            a.y += dropDistance;
          } else {
            a.x += stepSize * alienDirection;
          }
        }
      });
      
      if (shouldDrop) {
        alienDirection *= -1;
      }
    }
    
    function getShooterAliens() {
      const shooters = [];
      
      for (let col = 0; col < ALIEN_COLS; col++) {
        let lowest = null;
        for (let row = ALIEN_ROWS - 1; row >= 0; row--) {
          const idx = row * ALIEN_COLS + col;
          const alien = aliens[idx];
          if (alien.alive) {
            lowest = alien;
            break;
          }
        }
        if (lowest) shooters.push(lowest);
      }
      
      return shooters;
    }
    
    function checkCollisions() {
      // Laser vs Aliens
      if (laser) {
        for (const alien of aliens) {
          if (!alien.alive) continue;
          
          if (rectIntersect(laser, alien)) {
            alien.alive = false;
            laser = null;
            score += alien.points;
            updateAlienInterval();
            break;
          }
        }
      }
      
      // Laser vs Mystery
      if (laser && mystery && rectIntersect(laser, mystery)) {
        score += mystery.points;
        mysteryScore = { x: mystery.x, y: mystery.y, points: mystery.points, life: 1000 };
        mystery = null;
        laser = null;
      }
      
      // Laser vs Shields
      if (laser) {
        for (const shield of shields) {
          if (damageShield(shield, laser.x + laser.width / 2, laser.y)) {
            laser = null;
            break;
          }
        }
      }
      
      // Bombs vs Player
      if (invincibleTimer <= 0) {
        for (let i = bombs.length - 1; i >= 0; i--) {
          if (rectIntersect(bombs[i], player)) {
            bombs.splice(i, 1);
            killPlayer();
            return;
          }
        }
      }
      
      // Bombs vs Shields
      for (let i = bombs.length - 1; i >= 0; i--) {
        for (const shield of shields) {
          if (damageShield(shield, bombs[i].x + bombs[i].width / 2, bombs[i].y + bombs[i].height)) {
            bombs.splice(i, 1);
            break;
          }
        }
      }
      
      // Aliens vs Shields
      for (const alien of aliens) {
        if (!alien.alive) continue;
        for (const shield of shields) {
          if (alien.y + alien.height >= shield.y) {
            clearShieldSection(shield, alien.x, alien.y, alien.width, alien.height);
          }
        }
      }
    }
    
    function rectIntersect(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function damageShield(shield, hitX, hitY) {
      const localX = Math.floor(hitX - shield.x);
      const localY = Math.floor(hitY - shield.y);
      
      if (localX < 0 || localX >= SHIELD_WIDTH || localY < 0 || localY >= SHIELD_HEIGHT) {
        return false;
      }
      
      const radius = 5;
      let hit = false;
      
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy <= radius * radius) {
            const px = localX + dx;
            const py = localY + dy;
            if (py >= 0 && py < SHIELD_HEIGHT && px >= 0 && px < SHIELD_WIDTH) {
              if (shield.pixels[py][px]) {
                shield.pixels[py][px] = false;
                hit = true;
              }
            }
          }
        }
      }
      
      return hit;
    }
    
    function clearShieldSection(shield, x, y, w, h) {
      const startX = Math.max(0, Math.floor(x - shield.x));
      const startY = Math.max(0, Math.floor(y - shield.y));
      const endX = Math.min(SHIELD_WIDTH, Math.floor(x + w - shield.x));
      const endY = Math.min(SHIELD_HEIGHT, Math.floor(y + h - shield.y));
      
      for (let py = startY; py < endY; py++) {
        for (let px = startX; px < endX; px++) {
          shield.pixels[py][px] = false;
        }
      }
    }
    
    function killPlayer() {
      lives--;
      deathTimer = 1500;
      state = STATE_PLAYER_DEAD;
      laser = null;
      bombs = [];
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Draw shields
      drawShields();
      
      // Draw aliens
      drawAliens();
      
      // Draw mystery
      if (mystery) {
        drawMystery();
      }
      
      // Draw mystery score
      if (mysteryScore) {
        ctx.fillStyle = COLORS.text;
        ctx.font = 'bold 18px Courier New, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('+' + mysteryScore.points, mysteryScore.x + MYSTERY_WIDTH / 2, mysteryScore.y);
      }
      
      // Draw laser
      if (laser) {
        ctx.fillStyle = COLORS.laser;
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
      }
      
      // Draw bombs
      ctx.fillStyle = COLORS.bomb;
      for (const bomb of bombs) {
        ctx.fillRect(bomb.x, bomb.y, bomb.width, bomb.height);
      }
      
      // Draw player
      if (state !== STATE_PLAYER_DEAD || deathTimer > 750) {
        if (invincibleTimer <= 0 || Math.floor(invincibleTimer / 100) % 2 === 0) {
          drawPlayer();
        }
      }
      
      // Draw HUD
      drawHUD();
      
      // Draw overlays
      if (state === STATE_PAUSED) {
        drawPauseScreen();
      } else if (state === STATE_GAMEOVER) {
        drawGameOverScreen();
      } else if (state === STATE_WAVE_CLEAR) {
        drawWaveClearScreen();
      }
    }
    
    function drawPlayer() {
      ctx.fillStyle = COLORS.player;
      
      // Base
      ctx.fillRect(player.x, player.y + 15, player.width, 15);
      // Barrel
      ctx.fillRect(player.x + 20, player.y, 10, 15);
      // Wings
      ctx.fillRect(player.x + 5, player.y + 10, 40, 8);
    }
    
    function drawAliens() {
      const colorMap = { 'A': COLORS.alienA, 'B': COLORS.alienB, 'C': COLORS.alienC };
      
      for (const alien of aliens) {
        if (!alien.alive) continue;
        
        ctx.fillStyle = colorMap[alien.type];
        
        // Simple alien shapes
        if (alien.type === 'A') {
          // Squid-like
          ctx.fillRect(alien.x + 10, alien.y, 10, 5);
          ctx.fillRect(alien.x + 5, alien.y + 5, 20, 5);
          ctx.fillRect(alien.x, alien.y + 10, 30, 5);
          if (alienAnimFrame === 0) {
            ctx.fillRect(alien.x, alien.y + 15, 8, 5);
            ctx.fillRect(alien.x + 22, alien.y + 15, 8, 5);
          } else {
            ctx.fillRect(alien.x + 5, alien.y + 15, 8, 5);
            ctx.fillRect(alien.x + 17, alien.y + 15, 8, 5);
          }
        } else if (alien.type === 'B') {
          // Crab-like
          ctx.fillRect(alien.x + 15, alien.y, 10, 5);
          ctx.fillRect(alien.x + 5, alien.y + 5, 30, 5);
          ctx.fillRect(alien.x, alien.y + 10, 40, 10);
          if (alienAnimFrame === 0) {
            ctx.fillRect(alien.x, alien.y + 15, 10, 10);
            ctx.fillRect(alien.x + 30, alien.y + 15, 10, 10);
          } else {
            ctx.fillRect(alien.x + 5, alien.y + 15, 10, 10);
            ctx.fillRect(alien.x + 25, alien.y + 15, 10, 10);
          }
        } else {
          // Octopus-like
          ctx.fillRect(alien.x + 20, alien.y, 10, 5);
          ctx.fillRect(alien.x + 10, alien.y + 5, 30, 5);
          ctx.fillRect(alien.x + 5, alien.y + 10, 40, 10);
          ctx.fillRect(alien.x, alien.y + 20, 50, 5);
          if (alienAnimFrame === 0) {
            ctx.fillRect(alien.x, alien.y + 20, 10, 10);
            ctx.fillRect(alien.x + 40, alien.y + 20, 10, 10);
          } else {
            ctx.fillRect(alien.x + 10, alien.y + 20, 10, 10);
            ctx.fillRect(alien.x + 30, alien.y + 20, 10, 10);
          }
        }
      }
    }
    
    function drawMystery() {
      ctx.fillStyle = COLORS.mystery;
      ctx.fillRect(mystery.x + 20, mystery.y, 20, 8);
      ctx.fillRect(mystery.x + 10, mystery.y + 8, 40, 10);
      ctx.fillRect(mystery.x, mystery.y + 18, 60, 7);
    }
    
    function drawShields() {
      ctx.fillStyle = COLORS.shield;
      
      for (const shield of shields) {
        for (let y = 0; y < SHIELD_HEIGHT; y++) {
          for (let x = 0; x < SHIELD_WIDTH; x++) {
            if (shield.pixels[y][x]) {
              ctx.fillRect(shield.x + x, shield.y + y, 1, 1);
            }
          }
        }
      }
    }
    
    function drawHUD() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 20px Courier New, monospace';
      
      // Score
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + score, 10, 25);
      
      // High score
      ctx.textAlign = 'center';
      ctx.fillText('HI-SCORE: ' + highScore, W / 2, 25);
      
      // Lives
      ctx.textAlign = 'right';
      ctx.fillText('LIVES: ' + lives, W - 10, 25);
      
      // Wave
      ctx.font = '16px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('WAVE: ' + wave, 10, H - 10);
    }
    
    function drawTitleScreen() {
      // Title
      ctx.fillStyle = COLORS.alienC;
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE INVADERS', W / 2, 150);
      
      // Demo aliens
      ctx.fillStyle = COLORS.alienA;
      ctx.fillText('= 30 PTS', W / 2 + 40, 250);
      ctx.fillRect(W / 2 - 100, 235, 30, 20);
      
      ctx.fillStyle = COLORS.alienB;
      ctx.fillText('= 20 PTS', W / 2 + 40, 290);
      ctx.fillRect(W / 2 - 100, 275, 40, 25);
      
      ctx.fillStyle = COLORS.alienC;
      ctx.fillText('= 10 PTS', W / 2 + 40, 340);
      ctx.fillRect(W / 2 - 100, 320, 50, 30);
      
      ctx.fillStyle = COLORS.mystery;
      ctx.fillText('= ??? PTS', W / 2 + 40, 390);
      ctx.fillRect(W / 2 - 100, 370, 60, 25);
      
      // Instructions
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press SPACE to start', W / 2, 470);
      
      ctx.font = '16px Arial, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow keys or WASD to move', W / 2, 520);
      ctx.fillText('SPACE to fire', W / 2, 545);
      
      // High score
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px Arial, sans-serif';
      ctx.fillText('HIGH SCORE: ' + highScore, W / 2, 590);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '28px Arial, sans-serif';
      ctx.fillText('Final Score: ' + score, W / 2, H / 2);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 24px Arial, sans-serif';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 100);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 130);
    }
    
    function drawWaveClearScreen() {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('WAVE ' + wave + ' CLEAR!', W / 2, H / 2);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      // Title screen
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Pause
      if (state === STATE_PLAYING && (e.code === 'KeyP' || e.code === 'Escape')) {
        state = STATE_PAUSED;
        e.preventDefault();
        return;
      }
      
      if (state === STATE_PAUSED && e.code === 'KeyP') {
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Restart
      if (e.code === 'KeyR') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Title screen from game over
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
        return;
      }
      
      // Prevent default
      if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    // Update key state tracking
    Object.defineProperty(keys, 'left', {
      get: function() {
        return this['ArrowLeft'] || this['KeyA'] || this['a'] || this['A'];
      }
    });
    
    Object.defineProperty(keys, 'right', {
      get: function() {
        return this['ArrowRight'] || this['KeyD'] || this['d'] || this['D'];
      }
    });
    
    Object.defineProperty(keys, 'space', {
      get: function() {
        return this['Space'];
      }
    });
    
    // Reset keys on blur
    window.addEventListener('blur', () => {
      for (const key in keys) {
        keys[key] = false;
      }
    });
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start game
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
