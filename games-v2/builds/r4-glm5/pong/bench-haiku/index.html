<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3 };

    // Game state
    let gameState = STATES.TITLE;
    let score1 = 0, score2 = 0;

    // Paddles
    const paddle1 = { x: 30, y: 250, width: 15, height: 100, speed: 8, vy: 0 };
    const paddle2 = { x: 755, y: 250, width: 15, height: 100, speed: 8, vy: 0 };

    // Ball
    let ball = { x: 400, y: 300, size: 15, vx: 5, vy: 5, maxSpeed: 12 };

    // Input tracking
    const keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (e.key.toLowerCase() === 'r') {
        if (gameState === STATES.GAME_OVER || gameState === STATES.PLAYING || gameState === STATES.PAUSED) {
          startGame();
        }
      }

      if (e.key === 'Escape') {
        gameState = STATES.TITLE;
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('blur', () => {
      for (let key in keys) keys[key] = false;
    });

    function startGame() {
      score1 = 0;
      score2 = 0;
      ball.x = 400;
      ball.y = 300;
      serveTowardPlayer(Math.random() < 0.5 ? 1 : 2);
      paddle1.y = 250;
      paddle2.y = 250;
      gameState = STATES.PLAYING;
    }

    function serveTowardPlayer(player) {
      const angle = 30 + Math.random() * 30;
      const angleRad = (angle * Math.PI) / 180;
      const speed = 5;
      const dirX = player === 1 ? 1 : -1;
      const dirY = Math.random() < 0.5 ? 1 : -1;

      ball.vx = Math.cos(angleRad) * speed * dirX;
      ball.vy = Math.sin(angleRad) * speed * dirY;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Update paddle positions based on keys
      if (keys['w']) paddle1.y = Math.max(0, paddle1.y - paddle1.speed);
      if (keys['s']) paddle1.y = Math.min(HEIGHT - paddle1.height, paddle1.y + paddle1.speed);
      if (keys['arrowup']) paddle2.y = Math.max(0, paddle2.y - paddle2.speed);
      if (keys['arrowdown']) paddle2.y = Math.min(HEIGHT - paddle2.height, paddle2.y + paddle2.speed);

      // Update ball position
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall collisions (top/bottom)
      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
      }
      if (ball.y + ball.size >= HEIGHT) {
        ball.y = HEIGHT - ball.size;
        ball.vy = -ball.vy;
      }

      // Paddle collision - left paddle
      if (
        ball.x < paddle1.x + paddle1.width &&
        ball.x + ball.size > paddle1.x &&
        ball.y < paddle1.y + paddle1.height &&
        ball.y + ball.size > paddle1.y
      ) {
        ball.x = paddle1.x + paddle1.width;
        ball.vx = -ball.vx;

        // Calculate angle based on hit position
        const hitPos = (ball.y + ball.size / 2) - (paddle1.y + paddle1.height / 2);
        const normalizedHit = hitPos / (paddle1.height / 2);
        const maxAngle = Math.PI / 3; // 60 degrees
        const bounceAngle = normalizedHit * maxAngle;
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = Math.cos(bounceAngle) * speed;
        ball.vy = -Math.sin(bounceAngle) * speed;

        // Speed increase
        const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        const newSpeed = Math.min(currentSpeed * 1.03, ball.maxSpeed);
        const ratio = newSpeed / currentSpeed;
        ball.vx *= ratio;
        ball.vy *= ratio;
      }

      // Paddle collision - right paddle
      if (
        ball.x < paddle2.x + paddle2.width &&
        ball.x + ball.size > paddle2.x &&
        ball.y < paddle2.y + paddle2.height &&
        ball.y + ball.size > paddle2.y
      ) {
        ball.x = paddle2.x - ball.size;
        ball.vx = -ball.vx;

        // Calculate angle based on hit position
        const hitPos = (ball.y + ball.size / 2) - (paddle2.y + paddle2.height / 2);
        const normalizedHit = hitPos / (paddle2.height / 2);
        const maxAngle = Math.PI / 3; // 60 degrees
        const bounceAngle = normalizedHit * maxAngle;
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = -Math.cos(bounceAngle) * speed;
        ball.vy = -Math.sin(bounceAngle) * speed;

        // Speed increase
        const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        const newSpeed = Math.min(currentSpeed * 1.03, ball.maxSpeed);
        const ratio = newSpeed / currentSpeed;
        ball.vx *= ratio;
        ball.vy *= ratio;
      }

      // Goal detection
      if (ball.x < 0) {
        score2++;
        if (score2 >= 11) {
          gameState = STATES.GAME_OVER;
        } else {
          ball.x = 400;
          ball.y = 300;
          serveTowardPlayer(1);
        }
      }

      if (ball.x > WIDTH) {
        score1++;
        if (score1 >= 11) {
          gameState = STATES.GAME_OVER;
        } else {
          ball.x = 400;
          ball.y = 300;
          serveTowardPlayer(2);
        }
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw center line
      ctx.strokeStyle = '#666666';
      ctx.lineWidth = 2;
      ctx.setLineDash([20, 10]);
      ctx.beginPath();
      ctx.moveTo(WIDTH / 2, 0);
      ctx.lineTo(WIDTH / 2, HEIGHT);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(paddle1.x, paddle1.y, paddle1.width, paddle1.height);
      ctx.fillRect(paddle2.x, paddle2.y, paddle2.width, paddle2.height);

      // Draw ball
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

      // Draw score
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 48px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(score1 + '   ' + score2, WIDTH / 2, 60);

      // Draw game state messages
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 64px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PONG', WIDTH / 2, 200);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('W/S - Player 1 (left)', WIDTH / 2, 360);
        ctx.fillText('↑/↓ - Player 2 (right)', WIDTH / 2, 390);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, 320);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        const winner = score1 >= 11 ? 'PLAYER 1 WINS' : 'PLAYER 2 WINS';
        ctx.fillText(winner, WIDTH / 2, 250);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 320);
        ctx.fillText('Press ESC for title', WIDTH / 2, 360);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
