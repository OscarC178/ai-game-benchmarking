<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = (W*s)+'px'; canvas.style.height = (H*s)+'px';
}
window.addEventListener('resize', resize); resize();

// ---- State ----
const ST = { TITLE:0, PLAYING:1, PAUSED:2, GAMEOVER:3 };
let state = ST.TITLE;
let score1 = 0, score2 = 0;
const WIN = 11;

// ---- Paddles ----
const PAD_W = 15, PAD_H = 100, PAD_SPD = 8;
let p1 = { x:30, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H, flash:0 };
let p2 = { x:W-30-PAD_W, y:H/2-PAD_H/2, w:PAD_W, h:PAD_H, flash:0 };

// ---- Ball ----
const BALL = 15, MAX_SPD = 12;
let ball = { x:0, y:0, vx:0, vy:0 };
let trail = [];
let serveTimer = 0, serveTo = 0; // 1=left, 2=right

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key;
  if(!keys[k]) {
    // edge triggers
    if(k === ' ' || k === 'Spacebar') {
      e.preventDefault();
      if(state === ST.TITLE) beginGame();
      else if(state === ST.PLAYING) state = ST.PAUSED;
      else if(state === ST.PAUSED) state = ST.PLAYING;
    }
    if((k === 'r' || k === 'R') && (state === ST.PAUSED || state === ST.GAMEOVER || state === ST.PLAYING)) {
      beginGame();
    }
    if((k === 'Escape') && state !== ST.TITLE) {
      state = ST.TITLE;
    }
  }
  keys[k] = true;
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('blur', () => { for(const k in keys) keys[k] = false; });

// ---- Game init ----
function beginGame(){
  score1 = 0; score2 = 0;
  p1.y = H/2-PAD_H/2; p2.y = H/2-PAD_H/2;
  serve(0); // random first serve
  state = ST.PLAYING;
}

function serve(toPlayer){
  // toPlayer: 1=left,2=right,0=random
  if(toPlayer === 0) toPlayer = Math.random()<0.5?1:2;
  ball.x = W/2 - BALL/2; ball.y = H/2 - BALL/2;
  const angle = (30 + Math.random()*30) * Math.PI/180;
  const spd = 5;
  ball.vx = Math.cos(angle) * spd * (toPlayer===1 ? -1 : 1);
  ball.vy = Math.sin(angle) * spd * (Math.random()<0.5 ? 1 : -1);
  trail = [];
  serveTimer = 0; serveTo = 0;
}

function serveAfterGoal(toPlayer){
  ball.x = W/2 - BALL/2; ball.y = H/2 - BALL/2;
  ball.vx = 0; ball.vy = 0;
  trail = [];
  serveTo = toPlayer;
  serveTimer = 60; // frames
}

// ---- Update ----
function update(){
  if(state !== ST.PLAYING) return;

  // Serve delay
  if(serveTimer > 0){
    serveTimer--;
    if(serveTimer === 0) serve(serveTo);
    return;
  }

  // Paddle movement
  if(keys['w'] || keys['W']) p1.y = Math.max(0, p1.y - PAD_SPD);
  if(keys['s'] || keys['S']) p1.y = Math.min(H-PAD_H, p1.y + PAD_SPD);
  if(keys['ArrowUp']) p2.y = Math.max(0, p2.y - PAD_SPD);
  if(keys['ArrowDown']) p2.y = Math.min(H-PAD_H, p2.y + PAD_SPD);

  // Flash decay
  if(p1.flash > 0) p1.flash--;
  if(p2.flash > 0) p2.flash--;

  // Trail
  trail.push({x:ball.x, y:ball.y});
  if(trail.length > 5) trail.shift();

  // Move ball
  ball.x += ball.vx; ball.y += ball.vy;

  // Wall collisions
  if(ball.y <= 0){ ball.y = 0; ball.vy = Math.abs(ball.vy); }
  if(ball.y + BALL >= H){ ball.y = H-BALL; ball.vy = -Math.abs(ball.vy); }

  // Paddle collisions
  function paddleCollide(pad, isLeft){
    if(ball.x < pad.x + pad.w && ball.x + BALL > pad.x &&
       ball.y < pad.y + pad.h && ball.y + BALL > pad.y){
      // Position correction
      if(isLeft) ball.x = pad.x + pad.w;
      else ball.x = pad.x - BALL;
      // Angle deflection
      const offset = (ball.y + BALL/2) - (pad.y + pad.h/2);
      const norm = offset / (pad.h/2); // -1 to +1
      const maxAngle = 60 * Math.PI/180;
      const angle = norm * maxAngle;
      const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
      const newSpd = Math.min(spd * 1.03, MAX_SPD);
      ball.vx = Math.cos(angle) * newSpd * (isLeft ? 1 : -1);
      ball.vy = Math.sin(angle) * newSpd;
      pad.flash = 6;
    }
  }
  paddleCollide(p1, true);
  paddleCollide(p2, false);

  // Scoring
  if(ball.x + BALL < 0){
    score2++;
    if(score2 >= WIN) { state = ST.GAMEOVER; return; }
    serveAfterGoal(1);
  }
  if(ball.x > W){
    score1++;
    if(score1 >= WIN) { state = ST.GAMEOVER; return; }
    serveAfterGoal(2);
  }
}

// ---- Render ----
function render(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // Center dashed line
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.setLineDash([20,10]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  if(state === ST.TITLE){
    ctx.fillStyle = '#fff'; ctx.font = 'bold 80px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PONG', W/2, H/2-60);
    ctx.font = '22px monospace'; ctx.fillStyle = '#ccc';
    ctx.fillText('Press SPACE to start', W/2, H/2+20);
    ctx.font = '16px monospace'; ctx.fillStyle = '#888';
    ctx.fillText('W/S for Player 1   ↑/↓ for Player 2', W/2, H/2+60);
    return;
  }

  // Scores
  ctx.fillStyle = '#fff'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
  ctx.fillText(score1, W/2 - 80, 60);
  ctx.fillText(score2, W/2 + 80, 60);

  // Trail
  for(let i=0;i<trail.length;i++){
    const a = (i+1)/trail.length * 0.4;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.fillRect(trail[i].x, trail[i].y, BALL, BALL);
  }
  ctx.globalAlpha = 1;

  // Ball
  ctx.fillStyle = '#fff';
  ctx.fillRect(ball.x, ball.y, BALL, BALL);

  // Paddles
  ctx.fillStyle = p1.flash > 0 ? '#FFD700' : '#fff';
  ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = p2.flash > 0 ? '#FFD700' : '#fff';
  ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

  // Serve delay message
  if(state === ST.PLAYING && serveTimer > 0){
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '20px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Serving...', W/2, H/2+30);
  }

  if(state === ST.PAUSED){
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 56px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2-20);
    ctx.font = '20px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('Press SPACE to resume  |  R to restart', W/2, H/2+40);
  }

  if(state === ST.GAMEOVER){
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
    ctx.fillText(score1>=WIN ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!', W/2, H/2-30);
    ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
    ctx.fillText('Press R to play again  |  ESC for title', W/2, H/2+40);
  }
}

// ---- Loop ----
function loop(){
  requestAnimationFrame(loop);
  update();
  render();
}
loop();

})();
</script>
</body>
</html>
