<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600;

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3;
let state=ST_TITLE;

const PW=15,PH=100,PSPEED=480,BS=15,MAXSPD=720,WINSC=11;
let p1,p2,ball,score1,score2,serveTimer,winner;
let scoreFlash1=0,scoreFlash2=0;
let trail=[];

function resetBall(toLeft){
  ball={x:W/2-BS/2,y:H/2-BS/2,vx:0,vy:0};
  trail=[];
  const angle=(30+Math.random()*30)*Math.PI/180;
  const speed=300;
  const dx=toLeft?-1:1;
  const dy=Math.random()<0.5?-1:1;
  ball.vx=Math.cos(angle)*speed*dx;
  ball.vy=Math.sin(angle)*speed*dy;
  serveTimer=0.7;
}

function initGame(){
  p1={x:30,y:H/2-PH/2,flash:0};
  p2={x:W-30-PW,y:H/2-PH/2,flash:0};
  score1=0;score2=0;winner=0;
  scoreFlash1=0;scoreFlash2=0;
  resetBall(Math.random()<0.5);
}

initGame();

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state===ST_TITLE){state=ST_PLAY;initGame();}
    else if(state===ST_PLAY)state=ST_PAUSE;
    else if(state===ST_PAUSE)state=ST_PLAY;
  }
  if(k==='r'){
    if(state===ST_OVER||state===ST_PLAY||state===ST_PAUSE){initGame();state=ST_PLAY;}
  }
  if(e.code==='Escape'){
    state=ST_TITLE;initGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key.toLowerCase()]=false;});
addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});

function update(dt){
  if(state!==ST_PLAY)return;

  // Serve delay
  if(serveTimer>0){serveTimer-=dt;return;}

  // Paddle movement
  if(keys['w']||keys['W'])p1.y-=PSPEED*dt;
  if(keys['s']||keys['S'])p1.y+=PSPEED*dt;
  if(keys['ArrowUp'])p2.y-=PSPEED*dt;
  if(keys['ArrowDown'])p2.y+=PSPEED*dt;
  p1.y=Math.max(0,Math.min(H-PH,p1.y));
  p2.y=Math.max(0,Math.min(H-PH,p2.y));

  // Flash decay
  if(p1.flash>0)p1.flash-=dt;
  if(p2.flash>0)p2.flash-=dt;
  if(scoreFlash1>0)scoreFlash1-=dt;
  if(scoreFlash2>0)scoreFlash2-=dt;

  // Ball trail
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>5)trail.shift();

  // Move ball
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;

  // Wall collision
  if(ball.y<=0){ball.y=0;ball.vy=Math.abs(ball.vy);}
  if(ball.y+BS>=H){ball.y=H-BS;ball.vy=-Math.abs(ball.vy);}

  // Paddle collision - left
  if(ball.vx<0&&
     ball.x<p1.x+PW&&ball.x+BS>p1.x&&
     ball.y+BS>p1.y&&ball.y<p1.y+PH){
    ball.x=p1.x+PW;
    const offset=((ball.y+BS/2)-(p1.y+PH/2))/(PH/2);
    const maxAngle=65*Math.PI/180;
    const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.03,MAXSPD);
    const ang=offset*maxAngle;
    ball.vx=Math.cos(ang)*spd;
    ball.vy=Math.sin(ang)*spd;
    p1.flash=0.1;
  }

  // Paddle collision - right
  if(ball.vx>0&&
     ball.x+BS>p2.x&&ball.x<p2.x+PW&&
     ball.y+BS>p2.y&&ball.y<p2.y+PH){
    ball.x=p2.x-BS;
    const offset=((ball.y+BS/2)-(p2.y+PH/2))/(PH/2);
    const maxAngle=65*Math.PI/180;
    const spd=Math.min(Math.hypot(ball.vx,ball.vy)*1.03,MAXSPD);
    const ang=offset*maxAngle;
    ball.vx=-Math.cos(ang)*spd;
    ball.vy=Math.sin(ang)*spd;
    p2.flash=0.1;
  }

  // Scoring
  if(ball.x+BS<0){
    score2++;scoreFlash2=0.3;
    if(score2>=WINSC){winner=2;state=ST_OVER;return;}
    resetBall(true);// serve toward p1
  }
  if(ball.x>W){
    score1++;scoreFlash1=0.3;
    if(score1>=WINSC){winner=1;state=ST_OVER;return;}
    resetBall(false);// serve toward p2
  }
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);

  // Center line
  cx.setLineDash([20,10]);cx.strokeStyle='#666';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
  cx.setLineDash([]);

  if(state===ST_TITLE){
    cx.fillStyle='#fff';cx.font='bold 72px monospace';cx.textAlign='center';
    cx.fillText('PONG',W/2,220);
    cx.font='22px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press SPACE to start',W/2,340);
    cx.fillStyle='#aaa';cx.font='16px monospace';
    cx.fillText('W/S for Player 1     ↑/↓ for Player 2',W/2,420);
    cx.fillText('SPACE Pause   R Restart   ESC Title',W/2,455);
    return;
  }

  // Trail
  for(let i=0;i<trail.length;i++){
    const a=(i+1)/(trail.length+1)*0.3;
    cx.fillStyle=`rgba(255,255,255,${a})`;
    cx.fillRect(trail[i].x,trail[i].y,BS,BS);
  }

  // Ball (hide during serve delay in play)
  if(serveTimer<=0||state!==ST_PLAY){
    cx.fillStyle='#fff';cx.fillRect(ball.x,ball.y,BS,BS);
  }else{
    // Blink during serve
    if(Math.floor(serveTimer*8)%2){cx.fillStyle='#fff';cx.fillRect(ball.x,ball.y,BS,BS);}
  }

  // Paddles
  cx.fillStyle=p1.flash>0?'#ff0':'#fff';
  cx.fillRect(p1.x,p1.y,PW,PH);
  cx.fillStyle=p2.flash>0?'#ff0':'#fff';
  cx.fillRect(p2.x,p2.y,PW,PH);

  // Score
  cx.textAlign='center';
  const s1sz=scoreFlash1>0?56:48;
  const s2sz=scoreFlash2>0?56:48;
  cx.fillStyle=scoreFlash1>0?'#ff0':'#fff';
  cx.font=`bold ${s1sz}px monospace`;
  cx.fillText(String(score1),W/2-80,55);
  cx.fillStyle=scoreFlash2>0?'#ff0':'#fff';
  cx.font=`bold ${s2sz}px monospace`;
  cx.fillText(String(score2),W/2+80,55);

  // Overlays
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 42px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='18px monospace';cx.fillText('Press SPACE to resume',W/2,H/2+30);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#ff0';cx.font='bold 42px monospace';cx.textAlign='center';
    cx.fillText('PLAYER '+winner+' WINS!',W/2,H/2-20);
    cx.fillStyle='#aaa';cx.font='18px monospace';
    cx.fillText('Press R to play again',W/2,H/2+25);
    cx.fillText('Press ESC for title screen',W/2,H/2+55);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
