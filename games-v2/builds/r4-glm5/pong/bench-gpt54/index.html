<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;
  const DT_CAP = 1 / 30;

  const PADDLE_W = 15;
  const PADDLE_H = 100;
  const PADDLE_SPEED = 480;
  const BALL_SIZE = 15;
  const SERVE_SPEED = 300;
  const MAX_SPEED = 720;
  const WIN_SCORE = 11;

  const STATES = {
    TITLE: 'title',
    PLAYING: 'playing',
    PAUSED: 'paused',
    GAME_OVER: 'game_over',
    SERVE: 'serve'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  const leftPaddle = {
    x: 30,
    y: H / 2 - PADDLE_H / 2,
    w: PADDLE_W,
    h: PADDLE_H,
    flash: 0
  };

  const rightPaddle = {
    x: W - 30 - PADDLE_W,
    y: H / 2 - PADDLE_H / 2,
    w: PADDLE_W,
    h: PADDLE_H,
    flash: 0
  };

  const ball = {
    x: W / 2 - BALL_SIZE / 2,
    y: H / 2 - BALL_SIZE / 2,
    size: BALL_SIZE,
    vx: 0,
    vy: 0,
    trail: []
  };

  let state = STATES.TITLE;
  let lastTime = 0;
  let leftScore = 0;
  let rightScore = 0;
  let serveTimer = 0;
  let serveDirection = Math.random() < 0.5 ? -1 : 1;
  let winner = 0;
  let scorePulse = 0;
  let particles = [];

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function resetPaddles() {
    leftPaddle.y = H / 2 - PADDLE_H / 2;
    rightPaddle.y = H / 2 - PADDLE_H / 2;
    leftPaddle.flash = 0;
    rightPaddle.flash = 0;
  }

  function resetBall() {
    ball.x = W / 2 - BALL_SIZE / 2;
    ball.y = H / 2 - BALL_SIZE / 2;
    ball.vx = 0;
    ball.vy = 0;
    ball.trail.length = 0;
  }

  function randomServeVelocity(direction) {
    const angle = (Math.PI / 180) * (30 + Math.random() * 30);
    const signY = Math.random() < 0.5 ? -1 : 1;
    ball.vx = Math.cos(angle) * SERVE_SPEED * direction;
    ball.vy = Math.sin(angle) * SERVE_SPEED * signY;
  }

  function startServe(direction, delay = 0.75) {
    serveDirection = direction;
    resetBall();
    serveTimer = delay;
    state = STATES.SERVE;
  }

  function startMatch() {
    leftScore = 0;
    rightScore = 0;
    winner = 0;
    scorePulse = 0;
    particles.length = 0;
    resetPaddles();
    startServe(Math.random() < 0.5 ? -1 : 1, 0.6);
  }

  function restartGame() {
    startMatch();
  }

  function returnToTitle() {
    state = STATES.TITLE;
    leftScore = 0;
    rightScore = 0;
    winner = 0;
    scorePulse = 0;
    particles.length = 0;
    resetPaddles();
    resetBall();
  }

  function spawnWallParticles(x, y) {
    for (let i = 0; i < 8; i++) {
      const a = Math.random() * Math.PI - Math.PI;
      const speed = 40 + Math.random() * 100;
      particles.push({
        x,
        y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: 0.35
      });
    }
  }

  function updatePaddles(dt) {
    let leftMove = 0;
    if (keys.KeyW) leftMove -= 1;
    if (keys.KeyS) leftMove += 1;
    let rightMove = 0;
    if (keys.ArrowUp) rightMove -= 1;
    if (keys.ArrowDown) rightMove += 1;

    leftPaddle.y += leftMove * PADDLE_SPEED * dt;
    rightPaddle.y += rightMove * PADDLE_SPEED * dt;

    leftPaddle.y = clamp(leftPaddle.y, 0, H - PADDLE_H);
    rightPaddle.y = clamp(rightPaddle.y, 0, H - PADDLE_H);

    leftPaddle.flash = Math.max(0, leftPaddle.flash - dt * 8);
    rightPaddle.flash = Math.max(0, rightPaddle.flash - dt * 8);
  }

  function pushTrail() {
    ball.trail.unshift({ x: ball.x, y: ball.y });
    if (ball.trail.length > 5) ball.trail.length = 5;
  }

  function speedUpBall() {
    const currentSpeed = Math.hypot(ball.vx, ball.vy);
    const newSpeed = Math.min(currentSpeed * 1.03, MAX_SPEED);
    const ratio = newSpeed / currentSpeed;
    ball.vx *= ratio;
    ball.vy *= ratio;
  }

  function resolvePaddleCollision(paddle, isLeft) {
    const paddleCenter = paddle.y + paddle.h / 2;
    const ballCenter = ball.y + ball.size / 2;
    const offset = clamp((ballCenter - paddleCenter) / (paddle.h / 2), -1, 1);
    const maxBounce = Math.PI / 3;
    const bounceAngle = offset * maxBounce;
    const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.03, MAX_SPEED);
    const dir = isLeft ? 1 : -1;

    ball.vx = Math.cos(bounceAngle) * speed * dir;
    ball.vy = Math.sin(bounceAngle) * speed;

    if (Math.abs(offset) < 0.08) {
      ball.vy *= 0.25;
    }

    if (isLeft) {
      ball.x = paddle.x + paddle.w;
      leftPaddle.flash = 1;
    } else {
      ball.x = paddle.x - ball.size;
      rightPaddle.flash = 1;
    }
  }

  function crossedPaddlePlane(paddle, isLeft, prevX, nextX) {
    if (isLeft) {
      const plane = paddle.x + paddle.w;
      return prevX >= plane && nextX <= plane;
    }
    const plane = paddle.x;
    return prevX + ball.size <= plane && nextX + ball.size >= plane;
  }

  function paddleCollisionCheck(paddle, isLeft, prevX, nextX) {
    const intersects = (
      ball.x < paddle.x + paddle.w &&
      ball.x + ball.size > paddle.x &&
      ball.y < paddle.y + paddle.h &&
      ball.y + ball.size > paddle.y
    );

    const crossing = crossedPaddlePlane(paddle, isLeft, prevX, nextX);
    const verticalOverlap = ball.y + ball.size > paddle.y && ball.y < paddle.y + paddle.h;

    if ((intersects || (crossing && verticalOverlap)) && ((isLeft && ball.vx < 0) || (!isLeft && ball.vx > 0))) {
      resolvePaddleCollision(paddle, isLeft);
      return true;
    }
    return false;
  }

  function scorePoint(side) {
    if (side === 'left') {
      leftScore += 1;
      serveDirection = 1;
    } else {
      rightScore += 1;
      serveDirection = -1;
    }

    scorePulse = 0.6;

    if (leftScore >= WIN_SCORE || rightScore >= WIN_SCORE) {
      winner = leftScore >= WIN_SCORE ? 1 : 2;
      state = STATES.GAME_OVER;
      resetBall();
      return;
    }

    startServe(serveDirection, 0.75);
  }

  function updateBall(dt) {
    pushTrail();

    const prevX = ball.x;
    const prevY = ball.y;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy *= -1;
      spawnWallParticles(ball.x + ball.size / 2, 0);
    } else if (ball.y + ball.size >= H) {
      ball.y = H - ball.size;
      ball.vy *= -1;
      spawnWallParticles(ball.x + ball.size / 2, H);
    }

    if (paddleCollisionCheck(leftPaddle, true, prevX, ball.x)) return;
    if (paddleCollisionCheck(rightPaddle, false, prevX, ball.x)) return;

    if (ball.x + ball.size < 0) {
      scorePoint('right');
      return;
    }
    if (ball.x > W) {
      scorePoint('left');
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function update(dt) {
    updateParticles(dt);
    scorePulse = Math.max(0, scorePulse - dt * 2);

    if (state === STATES.TITLE || state === STATES.GAME_OVER || state === STATES.PAUSED) return;

    updatePaddles(dt);

    if (state === STATES.SERVE) {
      serveTimer -= dt;
      if (serveTimer <= 0) {
        randomServeVelocity(serveDirection);
        state = STATES.PLAYING;
      }
      return;
    }

    if (state === STATES.PLAYING) {
      updateBall(dt);
    }
  }

  function drawCenterLine() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 10]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.restore();
  }

  function drawPaddle(paddle) {
    ctx.fillStyle = paddle.flash > 0 ? '#ffff99' : '#ffffff';
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
  }

  function drawBall() {
    for (let i = ball.trail.length - 1; i >= 0; i--) {
      const t = ball.trail[i];
      const alpha = (i + 1) / (ball.trail.length + 2) * 0.35;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(t.x, t.y, ball.size, ball.size);
    }
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
  }

  function drawScore() {
    const pulse = 1 + Math.sin((1 - scorePulse) * 18) * scorePulse * 0.12;
    ctx.save();
    ctx.translate(W / 2, 55);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${leftScore}   ${rightScore}`, 0, 0);
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0, p.life / 0.35)})`;
      ctx.fillRect(p.x, p.y, 3, 3);
    }
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 64px monospace';
    ctx.fillText(title, W / 2, H / 2 - 70);
    ctx.font = '24px monospace';
    lines.forEach((line, index) => {
      ctx.fillText(line, W / 2, H / 2 + index * 34);
    });
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawCenterLine();
    drawScore();
    drawParticles();

    if (state !== STATES.TITLE) {
      drawPaddle(leftPaddle);
      drawPaddle(rightPaddle);
      if (state !== STATES.TITLE) drawBall();
    }

    if (state === STATES.TITLE) {
      drawOverlay('PONG', [
        'Press SPACE to start',
        'W/S for Player 1, ↑/↓ for Player 2',
        'SPACE pause • R restart • ESC title'
      ], false);
    } else if (state === STATES.PAUSED) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, W, H);
      drawOverlay('PAUSED', ['Press SPACE to resume', 'Press R to restart'], false);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay(`PLAYER ${winner} WINS!`, ['Press R to play again', 'Press ESC for title screen'], true);
    } else if (state === STATES.SERVE) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(0, 0, W, H);
      drawOverlay('READY?', ['Serve incoming...'], false);
    }
  }

  function handleInput() {
    if (justPressed('Space')) {
      if (state === STATES.TITLE) {
        startMatch();
      } else if (state === STATES.PLAYING) {
        state = STATES.PAUSED;
      } else if (state === STATES.PAUSED) {
        state = STATES.PLAYING;
      }
    }

    if (justPressed('KeyR')) {
      if (state === STATES.PLAYING || state === STATES.PAUSED || state === STATES.GAME_OVER || state === STATES.SERVE) {
        restartGame();
      }
    }

    if (justPressed('Escape')) {
      returnToTitle();
    }
  }

  function syncPrev() {
    const watched = ['KeyW', 'KeyS', 'ArrowUp', 'ArrowDown', 'Space', 'KeyR', 'Escape'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['KeyW', 'KeyS', 'ArrowUp', 'ArrowDown', 'Space', 'KeyR', 'Escape'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
  });

  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
