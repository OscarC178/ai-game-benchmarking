<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    canvas {
        background-color: #000;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        display: block;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// --- GAME STATES ---
const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_PAUSED = 2;
const STATE_GAMEOVER = 3;
const STATE_SERVE_DELAY = 4;

let state = STATE_TITLE;
let serveDelayTimer = 0;

// --- ENTITIES ---

const PADDLE_W = 15;
const PADDLE_H = 100;
const PADDLE_SPEED = 8; // pixels per frame

const BALL_SIZE = 15;
const BALL_START_SPEED = 5;
const BALL_MAX_SPEED = 12;
const SPEED_MULT = 1.03; // 3% increase per hit
const MAX_BOUNCE_ANGLE = Math.PI / 4; // 45 degrees

let p1 = { x: 30, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0, hitTimer: 0 };
let p2 = { x: W - 30 - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, score: 0, hitTimer: 0 };

let ball = { x: W/2 - BALL_SIZE/2, y: H/2 - BALL_SIZE/2, vx: 0, vy: 0, s: BALL_SIZE, speed: BALL_START_SPEED };
let ballTrails = []; // for motion blur

let particles = [];

// --- INPUT ---
const keys = { w: false, s: false, ArrowUp: false, ArrowDown: false };
let spacePressed = false; // Edge trigger
let rPressed = false;
let escPressed = false;

window.addEventListener('keydown', e => {
    let k = e.key;
    if (k === 'w' || k === 'W') keys.w = true;
    if (k === 's' || k === 'S') keys.s = true;
    if (k === 'ArrowUp') keys.ArrowUp = true;
    if (k === 'ArrowDown') keys.ArrowDown = true;
    
    if (k === ' ' && !spacePressed) {
        spacePressed = true;
        if (state === STATE_TITLE) {
            resetGame();
            state = STATE_PLAYING;
            serveBall(Math.random() < 0.5 ? -1 : 1);
        } else if (state === STATE_PLAYING) {
            state = STATE_PAUSED;
        } else if (state === STATE_PAUSED) {
            state = STATE_PLAYING;
        }
    }
    
    if ((k === 'r' || k === 'R') && !rPressed) {
        rPressed = true;
        if (state === STATE_GAMEOVER || state === STATE_PAUSED || state === STATE_PLAYING) {
            resetGame();
            state = STATE_PLAYING;
            serveBall(Math.random() < 0.5 ? -1 : 1);
        }
    }
    
    if (k === 'Escape' && !escPressed) {
        escPressed = true;
        state = STATE_TITLE;
    }
    
    if ([' ', 'ArrowUp', 'ArrowDown'].includes(k)) e.preventDefault(); // prevent scrolling
});

window.addEventListener('keyup', e => {
    let k = e.key;
    if (k === 'w' || k === 'W') keys.w = false;
    if (k === 's' || k === 'S') keys.s = false;
    if (k === 'ArrowUp') keys.ArrowUp = false;
    if (k === 'ArrowDown') keys.ArrowDown = false;
    if (k === ' ') spacePressed = false;
    if (k === 'r' || k === 'R') rPressed = false;
    if (k === 'Escape') escPressed = false;
});

window.addEventListener('blur', () => {
    keys.w = false; keys.s = false; keys.ArrowUp = false; keys.ArrowDown = false;
    if (state === STATE_PLAYING) state = STATE_PAUSED;
});

// --- LOGIC ---

function resetGame() {
    p1.score = 0; p2.score = 0;
    p1.y = H/2 - PADDLE_H/2;
    p2.y = H/2 - PADDLE_H/2;
    ballTrails = [];
    particles = [];
}

function serveBall(dirX) {
    ball.x = W/2 - BALL_SIZE/2;
    ball.y = H/2 - BALL_SIZE/2;
    ball.speed = BALL_START_SPEED;
    
    // Random angle between 30 and 60 deg (PI/6 and PI/3)
    let angle = (Math.random() * (Math.PI/6)) + (Math.PI/6);
    let dirY = Math.random() < 0.5 ? 1 : -1;
    
    ball.vx = Math.cos(angle) * ball.speed * dirX;
    ball.vy = Math.sin(angle) * ball.speed * dirY;
    
    ballTrails = [];
}

function spawnParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1.0,
            color: color
        });
    }
}

// Custom Continuous Collision roughly mimicking swept testing or just goalie checks
function sweepRectIntersect(x1, y1, w1, h1, px2, py2, nx2, ny2, w2, h2) {
    return nx2 < x1 + w1 &&
           nx2 + w2 > x1 &&
           ny2 < y1 + h1 &&
           ny2 + h2 > y1;
}

function update() {
    if (state === STATE_TITLE || state === STATE_PAUSED || state === STATE_GAMEOVER) return;

    if (state === STATE_SERVE_DELAY) {
        serveDelayTimer -= 1/60; // Approximate using steady frame rate
        
        // Allow paddle movement during delay
        if (keys.w) p1.y -= PADDLE_SPEED;
        if (keys.s) p1.y += PADDLE_SPEED;
        if (keys.ArrowUp) p2.y -= PADDLE_SPEED;
        if (keys.ArrowDown) p2.y += PADDLE_SPEED;
        
        p1.y = Math.max(0, Math.min(H - PADDLE_H, p1.y));
        p2.y = Math.max(0, Math.min(H - PADDLE_H, p2.y));
        
        if (serveDelayTimer <= 0) {
            state = STATE_PLAYING;
            // Serve to whoever conceded logically depends on last direction, 
            // the setup below passes -1 to serve left if p2 scored
            let dirX = (lastScorer === 1) ? 1 : -1;
            serveBall(dirX);
        }
        return;
    }

    // --- PADDLES ---
    if (keys.w) p1.y -= PADDLE_SPEED;
    if (keys.s) p1.y += PADDLE_SPEED;
    if (keys.ArrowUp) p2.y -= PADDLE_SPEED;
    if (keys.ArrowDown) p2.y += PADDLE_SPEED;

    // Clamp
    p1.y = Math.max(0, Math.min(H - PADDLE_H, p1.y));
    p2.y = Math.max(0, Math.min(H - PADDLE_H, p2.y));

    // Flash timers
    if (p1.hitTimer > 0) p1.hitTimer -= 1/60;
    if (p2.hitTimer > 0) p2.hitTimer -= 1/60;

    // --- BALL ---
    let prevX = ball.x;
    let prevY = ball.y;
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Trail
    ballTrails.unshift({x: ball.x, y: ball.y});
    if (ballTrails.length > 5) ballTrails.pop();

    // Walls
    if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = Math.abs(ball.vy);
        spawnParticles(ball.x + ball.s/2, 0, '#FFF');
    } else if (ball.y + ball.s >= H) {
        ball.y = H - ball.s;
        ball.vy = -Math.abs(ball.vy);
        spawnParticles(ball.x + ball.s/2, H, '#FFF');
    }

    // Goal checks (Score)
    if (ball.x < 0) {
        p2.score++;
        lastScorer = 2;
        checkWin();
        return;
    } else if (ball.x > W) {
        p1.score++;
        lastScorer = 1;
        checkWin();
        return;
    }

    // Paddle Collisions (Goalie Check to prevent tunneling past thin paddles at high speed)
    // Left Paddle
    if (prevX >= p1.x + p1.w && ball.x < p1.x + p1.w) { // Crossed front face plane
        // Calculate Y intersection point explicitly
        let t = (p1.x + p1.w - prevX) / (ball.x - prevX);
        let intersectY = prevY + (ball.y - prevY) * t;
        
        if (intersectY + ball.s >= p1.y && intersectY <= p1.y + p1.h) {
            handleHit(p1, 1);
        }
    } else if (sweepRectIntersect(p1.x, p1.y, p1.w, p1.h, prevX, prevY, ball.x, ball.y, ball.s, ball.s)) {
        // Broad phase catch (e.g. top/bottom corners)
        handleHit(p1, 1);
    }
    
    // Right Paddle
    if (prevX + ball.s <= p2.x && ball.x + ball.s > p2.x) { // Crossed front face plane
        let t = (p2.x - (prevX + ball.s)) / (ball.x - prevX);
        let intersectY = prevY + (ball.y - prevY) * t;
        
        if (intersectY + ball.s >= p2.y && intersectY <= p2.y + p2.h) {
            handleHit(p2, -1);
        }
    } else if (sweepRectIntersect(p2.x, p2.y, p2.w, p2.h, prevX, prevY, ball.x, ball.y, ball.s, ball.s)) {
        handleHit(p2, -1);
    }

    // Particles logic
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        particles[i].life -= 0.05;
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

let lastScorer = 0;

function handleHit(pad, dir) {
    pad.hitTimer = 0.1; // Flash duration
    
    // Fix position
    if (dir === 1) ball.x = pad.x + pad.w;
    else ball.x = pad.x - ball.s;
    
    // Calculate angle based on hit position
    let ballCenterY = ball.y + ball.s/2;
    let padCenterY = pad.y + pad.h/2;
    // Offset normalized from -1 (top) to +1 (bottom)
    let offset = (ballCenterY - padCenterY) / (pad.h / 2);
    offset = Math.max(-1, Math.min(1, offset)); // clamp just in case
    
    let angle = offset * MAX_BOUNCE_ANGLE;
    
    // Increase speed
    let currentSpeed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    let newSpeed = Math.min(currentSpeed * SPEED_MULT, BALL_MAX_SPEED);
    
    ball.speed = newSpeed;
    ball.vx = Math.cos(angle) * ball.speed * dir;
    ball.vy = Math.sin(angle) * ball.speed;
}

function checkWin() {
    if (p1.score >= 11 || p2.score >= 11) {
        state = STATE_GAMEOVER;
    } else {
        state = STATE_SERVE_DELAY;
        serveDelayTimer = 1.0;
        ball.x = W/2 - BALL_SIZE/2; ball.y = H/2 - BALL_SIZE/2; // hide in center
        ballTrails = [];
    }
}

// --- RENDER ---
function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawText(text, x, y, size, align='center', color='#FFF') {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    ctx.fillText(text, x, y);
}

function render() {
    // Backdrop
    drawRect(0, 0, W, H, '#000');

    // Particles
    particles.forEach(p => {
        ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 2, 2);
    });

    if (state === STATE_TITLE) {
        drawText("PONG", W/2, H/3, 80);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press SPACE to start", W/2, H/2, 24);
        
        drawText("W/S for Player 1", W/2, H/2 + 60, 16, 'center', '#AAA');
        drawText("↑/↓ for Player 2", W/2, H/2 + 90, 16, 'center', '#AAA');
        return;
    }

    // Center Line
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 10]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Scores
    drawText(p1.score.toString(), W/2 - 80, 40, 48, 'right');
    drawText(p2.score.toString(), W/2 + 80, 40, 48, 'left');

    // Paddles (with hit flash)
    drawRect(p1.x, p1.y, p1.w, p1.h, p1.hitTimer > 0 ? '#FFFF00' : '#FFF');
    drawRect(p2.x, p2.y, p2.w, p2.h, p2.hitTimer > 0 ? '#FFFF00' : '#FFF');

    // Ball & Trail
    if (state === STATE_PLAYING) {
        for (let i = 0; i < ballTrails.length; i++) {
            let op = 1.0 - (i / ballTrails.length);
            ctx.fillStyle = `rgba(255, 255, 255, ${op * 0.3})`;
            ctx.fillRect(Math.floor(ballTrails[i].x), Math.floor(ballTrails[i].y), ball.s, ball.s);
        }
        drawRect(ball.x, ball.y, ball.s, ball.s, '#FFF');
    }

    // Overlays
    if (state === STATE_PAUSED) {
        drawRect(0, 0, W, H, 'rgba(0,0,0,0.7)');
        drawText("PAUSED", W/2, H/2 - 20, 48);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press SPACE to resume", W/2, H/2 + 40, 20);
        drawText("Press R to restart", W/2, H/2 + 80, 16, 'center', '#AAA');
    } 
    else if (state === STATE_GAMEOVER) {
        drawRect(0, 0, W, H, 'rgba(0,0,0,0.8)');
        let msg = p1.score >= 11 ? "PLAYER 1 WINS!" : "PLAYER 2 WINS!";
        drawText(msg, W/2, H/2 - 40, 48);
        
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press R to play again", W/2, H/2 + 30, 24);
        drawText("Press ESC for title screen", W/2, H/2 + 70, 16, 'center', '#AAA');
    }
}

// --- MAIN LOOP ---
function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

// Start
requestAnimationFrame(loop);

</script>
</body>
</html>
