<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_GAMEOVER = 3;
    const STATE_SERVE = 4;
    
    // Colors
    const COLORS = {
      background: '#000000',
      white: '#FFFFFF',
      gray: '#666666',
      yellow: '#FFFF00'
    };
    
    // Paddle settings
    const PADDLE_WIDTH = 15;
    const PADDLE_HEIGHT = 100;
    const PADDLE_SPEED = 8;
    const PADDLE_MARGIN = 30;
    
    // Ball settings
    const BALL_SIZE = 15;
    const BALL_INITIAL_SPEED = 5;
    const BALL_MAX_SPEED = 12;
    const BALL_SPEED_INCREASE = 1.03;
    
    // Game settings
    const WINNING_SCORE = 11;
    const SERVE_DELAY = 1000;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let scores = { left: 0, right: 0 };
    let winner = null;
    let serveTimer = 0;
    let serveTo = 'left';
    
    // Entities
    let leftPaddle = null;
    let rightPaddle = null;
    let ball = null;
    let ballTrail = [];
    
    // Visual effects
    let leftPaddleFlash = 0;
    let rightPaddleFlash = 0;
    let wallHitParticles = [];
    let scorePulse = { left: 0, right: 0 };
    
    // Input
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      leftPaddle = {
        x: PADDLE_MARGIN,
        y: H / 2 - PADDLE_HEIGHT / 2,
        width: PADDLE_WIDTH,
        height: PADDLE_HEIGHT
      };
      
      rightPaddle = {
        x: W - PADDLE_MARGIN - PADDLE_WIDTH,
        y: H / 2 - PADDLE_HEIGHT / 2,
        width: PADDLE_WIDTH,
        height: PADDLE_HEIGHT
      };
      
      resetBall();
      scores = { left: 0, right: 0 };
      winner = null;
      ballTrail = [];
    }
    
    function resetBall() {
      ball = {
        x: W / 2 - BALL_SIZE / 2,
        y: H / 2 - BALL_SIZE / 2,
        vx: 0,
        vy: 0,
        size: BALL_SIZE,
        active: false
      };
      ballTrail = [];
    }
    
    function serveBall() {
      ball.active = true;
      
      // Random angle between 30 and 60 degrees
      const angle = (30 + Math.random() * 30) * Math.PI / 180;
      
      // Random direction
      const dirX = serveTo === 'left' ? -1 : 1;
      const dirY = Math.random() > 0.5 ? -1 : 1;
      
      ball.vx = Math.cos(angle) * BALL_INITIAL_SPEED * dirX;
      ball.vy = Math.sin(angle) * BALL_INITIAL_SPEED * dirY;
    }
    
    // ==================== UPDATE ====================
    function update() {
      if (state === STATE_SERVE) {
        serveTimer--;
        if (serveTimer <= 0) {
          serveBall();
          state = STATE_PLAYING;
        }
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Update paddle positions
      updatePaddles();
      
      // Update ball
      updateBall();
      
      // Update effects
      updateEffects();
      
      // Check win condition
      checkWin();
    }
    
    function updatePaddles() {
      // Left paddle (W/S)
      if (keys['KeyW'] || keys['w']) {
        leftPaddle.y -= PADDLE_SPEED;
      }
      if (keys['KeyS'] || keys['s']) {
        leftPaddle.y += PADDLE_SPEED;
      }
      
      // Right paddle (Arrow keys)
      if (keys['ArrowUp']) {
        rightPaddle.y -= PADDLE_SPEED;
      }
      if (keys['ArrowDown']) {
        rightPaddle.y += PADDLE_SPEED;
      }
      
      // Clamp paddle positions
      leftPaddle.y = Math.max(0, Math.min(H - PADDLE_HEIGHT, leftPaddle.y));
      rightPaddle.y = Math.max(0, Math.min(H - PADDLE_HEIGHT, rightPaddle.y));
    }
    
    function updateBall() {
      if (!ball.active) return;
      
      // Store trail position
      ballTrail.push({ x: ball.x, y: ball.y });
      if (ballTrail.length > 5) {
        ballTrail.shift();
      }
      
      // Move ball
      ball.x += ball.vx;
      ball.y += ball.vy;
      
      // Wall collision (top/bottom)
      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
        addWallParticles(ball.x, 0);
      }
      if (ball.y + ball.size >= H) {
        ball.y = H - ball.size;
        ball.vy = -ball.vy;
        addWallParticles(ball.x, H);
      }
      
      // Paddle collision
      if (checkPaddleCollision(leftPaddle)) {
        handlePaddleHit(leftPaddle, 1);
        leftPaddleFlash = 10;
      }
      
      if (checkPaddleCollision(rightPaddle)) {
        handlePaddleHit(rightPaddle, -1);
        rightPaddleFlash = 10;
      }
      
      // Goal detection
      if (ball.x + ball.size < 0) {
        // Right player scores
        scores.right++;
        scorePulse.right = 20;
        serveTo = 'left';
        startServe();
      }
      
      if (ball.x > W) {
        // Left player scores
        scores.left++;
        scorePulse.left = 20;
        serveTo = 'right';
        startServe();
      }
    }
    
    function checkPaddleCollision(paddle) {
      return ball.x < paddle.x + paddle.width &&
             ball.x + ball.size > paddle.x &&
             ball.y < paddle.y + paddle.height &&
             ball.y + ball.size > paddle.y;
    }
    
    function handlePaddleHit(paddle, direction) {
      // Position correction
      if (direction > 0) {
        ball.x = paddle.x + paddle.width;
      } else {
        ball.x = paddle.x - ball.size;
      }
      
      // Calculate hit position relative to paddle center
      const ballCenter = ball.y + ball.size / 2;
      const paddleCenter = paddle.y + paddle.height / 2;
      const offset = (ballCenter - paddleCenter) / (paddle.height / 2);
      
      // Calculate new angle based on offset
      const maxAngle = 60 * Math.PI / 180;
      const angle = offset * maxAngle;
      
      // Increase speed
      const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      const newSpeed = Math.min(currentSpeed * BALL_SPEED_INCREASE, BALL_MAX_SPEED);
      
      // Set new velocity
      ball.vx = Math.cos(angle) * newSpeed * direction;
      ball.vy = Math.sin(angle) * newSpeed;
    }
    
    function startServe() {
      resetBall();
      state = STATE_SERVE;
      serveTimer = SERVE_DELAY / 16; // Convert to frames
    }
    
    function addWallParticles(x, y) {
      for (let i = 0; i < 5; i++) {
        wallHitParticles.push({
          x: x + BALL_SIZE / 2,
          y: y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          life: 10
        });
      }
    }
    
    function updateEffects() {
      // Paddle flash
      if (leftPaddleFlash > 0) leftPaddleFlash--;
      if (rightPaddleFlash > 0) rightPaddleFlash--;
      
      // Score pulse
      if (scorePulse.left > 0) scorePulse.left--;
      if (scorePulse.right > 0) scorePulse.right--;
      
      // Wall particles
      for (let i = wallHitParticles.length - 1; i >= 0; i--) {
        const p = wallHitParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) {
          wallHitParticles.splice(i, 1);
        }
      }
    }
    
    function checkWin() {
      if (scores.left >= WINNING_SCORE) {
        winner = 'left';
        state = STATE_GAMEOVER;
      } else if (scores.right >= WINNING_SCORE) {
        winner = 'right';
        state = STATE_GAMEOVER;
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      // Clear
      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Draw center line
      drawCenterLine();
      
      // Draw scores
      drawScores();
      
      // Draw paddles
      drawPaddle(leftPaddle, leftPaddleFlash);
      drawPaddle(rightPaddle, rightPaddleFlash);
      
      // Draw ball trail
      drawBallTrail();
      
      // Draw ball
      if (ball) {
        ctx.fillStyle = COLORS.white;
        ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
      }
      
      // Draw particles
      drawParticles();
      
      // Draw overlays
      if (state === STATE_PAUSED) {
        drawPauseScreen();
      } else if (state === STATE_GAMEOVER) {
        drawGameOverScreen();
      } else if (state === STATE_SERVE) {
        drawServeIndicator();
      }
    }
    
    function drawCenterLine() {
      ctx.strokeStyle = COLORS.gray;
      ctx.lineWidth = 2;
      ctx.setLineDash([20, 10]);
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    function drawScores() {
      ctx.fillStyle = COLORS.white;
      ctx.font = 'bold 48px Courier New, monospace';
      ctx.textAlign = 'center';
      
      // Left score
      let leftScale = 1 + scorePulse.left * 0.02;
      ctx.save();
      ctx.translate(W / 4, 60);
      ctx.scale(leftScale, leftScale);
      ctx.fillText(scores.left, 0, 0);
      ctx.restore();
      
      // Right score
      let rightScale = 1 + scorePulse.right * 0.02;
      ctx.save();
      ctx.translate(3 * W / 4, 60);
      ctx.scale(rightScale, rightScale);
      ctx.fillText(scores.right, 0, 0);
      ctx.restore();
    }
    
    function drawPaddle(paddle, flash) {
      ctx.fillStyle = flash > 0 ? COLORS.yellow : COLORS.white;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }
    
    function drawBallTrail() {
      for (let i = 0; i < ballTrail.length; i++) {
        const t = ballTrail[i];
        const alpha = (i + 1) / (ballTrail.length + 1) * 0.3;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(t.x, t.y, ball.size, ball.size);
      }
    }
    
    function drawParticles() {
      for (const p of wallHitParticles) {
        const alpha = p.life / 10;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      }
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = COLORS.white;
      ctx.font = 'bold 96px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PONG', W / 2, H / 2 - 100);
      
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText('Press SPACE to start', W / 2, H / 2);
      
      ctx.font = '18px Arial, sans-serif';
      ctx.fillStyle = COLORS.gray;
      ctx.fillText('W / S for Player 1 (Left)', W / 2, H / 2 + 60);
      ctx.fillText('↑ / ↓ for Player 2 (Right)', W / 2, H / 2 + 90);
      
      ctx.fillStyle = COLORS.white;
      ctx.font = '16px Arial, sans-serif';
      ctx.fillText('First to 11 wins!', W / 2, H / 2 + 150);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.white;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press SPACE to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.white;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      
      const winText = winner === 'left' ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!';
      ctx.fillText(winText, W / 2, H / 2 - 40);
      
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText(`Final Score: ${scores.left} - ${scores.right}`, W / 2, H / 2 + 20);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 80);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 110);
    }
    
    function drawServeIndicator() {
      ctx.fillStyle = COLORS.white;
      ctx.font = '20px Arial, sans-serif';
      ctx.textAlign = 'center';
      
      const text = serveTo === 'left' ? 'Serving to Player 1...' : 'Serving to Player 2...';
      ctx.fillText(text, W / 2, H / 2 + 100);
    }
    
    // ==================== INPUT HANDLING ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (e.code === 'Space') {
        e.preventDefault();
        
        if (state === STATE_TITLE) {
          initGame();
          state = STATE_SERVE;
          serveTimer = SERVE_DELAY / 16;
        } else if (state === STATE_PLAYING) {
          state = STATE_PAUSED;
        } else if (state === STATE_PAUSED) {
          state = STATE_PLAYING;
        }
      }
      
      if (e.code === 'KeyR') {
        initGame();
        state = STATE_SERVE;
        serveTimer = SERVE_DELAY / 16;
      }
      
      if (e.code === 'Escape') {
        state = STATE_TITLE;
      }
      
      // Prevent arrow key scrolling
      if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
    });
    
    // Reset keys when window loses focus
    window.addEventListener('blur', () => {
      for (const key in keys) {
        keys[key] = false;
      }
    });
    
    // ==================== GAME LOOP ====================
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }
    
    // Start the game loop
    initGame();
    gameLoop();
  </script>
</body>
</html>
