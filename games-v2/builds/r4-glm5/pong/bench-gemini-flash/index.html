<!--
  GAME:      Pong
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100 vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800;
        const HEIGHT = 600;
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 15;
        const WIN_SCORE = 11;
        const PADDLE_SPEED = 8;
        const BALL_START_SPEED = 5;
        const BALL_MAX_SPEED = 12;

        // Game State
        let state = 'TITLE'; // TITLE, PLAYING, PAUSED, GAMEOVER
        let scoreLeft = 0;
        let scoreRight = 0;
        let winner = 0;

        const keys = {};

        const paddleLeft = {
            x: 30,
            y: (HEIGHT - PADDLE_HEIGHT) / 2,
            w: PADDLE_WIDTH,
            h: PADDLE_HEIGHT,
            flash: 0
        };

        const paddleRight = {
            x: WIDTH - 30 - PADDLE_WIDTH,
            y: (HEIGHT - PADDLE_HEIGHT) / 2,
            w: PADDLE_WIDTH,
            h: PADDLE_HEIGHT,
            flash: 0
        };

        const ball = {
            x: WIDTH / 2 - BALL_SIZE / 2,
            y: HEIGHT / 2 - BALL_SIZE / 2,
            w: BALL_SIZE,
            h: BALL_SIZE,
            vx: 0,
            vy: 0,
            trail: [] // Stores {x, y}
        };

        // Input Handling
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('blur', () => { for (let k in keys) keys[k] = false; });

        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                if (state === 'TITLE') {
                    resetGame();
                    state = 'PLAYING';
                } else if (state === 'PLAYING') {
                    state = 'PAUSED';
                } else if (state === 'PAUSED') {
                    state = 'PLAYING';
                }
            }
            if (e.code === 'KeyR') {
                resetGame();
                state = 'PLAYING';
            }
            if (e.code === 'Escape') {
                state = 'TITLE';
            }
        });

        function resetGame() {
            scoreLeft = 0;
            scoreRight = 0;
            winner = 0;
            resetBall(1); // Serve right first
            paddleLeft.y = (HEIGHT - PADDLE_HEIGHT) / 2;
            paddleRight.y = (HEIGHT - PADDLE_HEIGHT) / 2;
        }

        function resetBall(dirX) {
            ball.x = WIDTH / 2 - BALL_SIZE / 2;
            ball.y = HEIGHT / 2 - BALL_SIZE / 2;
            ball.trail = [];
            
            // Random angle between 30 and 60 degrees
            const angle = (Math.random() * 30 + 30) * Math.PI / 180;
            const dirY = Math.random() < 0.5 ? 1 : -1;
            
            ball.vx = Math.cos(angle) * BALL_START_SPEED * dirX;
            ball.vy = Math.sin(angle) * BALL_START_SPEED * dirY;
        }

        function update() {
            if (state !== 'PLAYING') return;

            // Move Paddles
            if (keys['KeyW'] && paddleLeft.y > 0) paddleLeft.y -= PADDLE_SPEED;
            if (keys['KeyS'] && paddleLeft.y < HEIGHT - PADDLE_HEIGHT) paddleLeft.y += PADDLE_SPEED;
            if (keys['ArrowUp'] && paddleRight.y > 0) paddleRight.y -= PADDLE_SPEED;
            if (keys['ArrowDown'] && paddleRight.y < HEIGHT - PADDLE_HEIGHT) paddleRight.y += PADDLE_SPEED;

            // Ball Trail
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > 5) ball.trail.shift();

            // Move Ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Wall Collisions
            if (ball.y <= 0) {
                ball.y = 0;
                ball.vy *= -1;
            } else if (ball.y + ball.h >= HEIGHT) {
                ball.y = HEIGHT - ball.h;
                ball.vy *= -1;
            }

            // Paddle Collisions
            // Check Left Paddle
            if (ball.vx < 0 && 
                ball.x < paddleLeft.x + paddleLeft.w && 
                ball.x + ball.w > paddleLeft.x &&
                ball.y < paddleLeft.y + paddleLeft.h && 
                ball.y + ball.h > paddleLeft.y) {
                
                ball.x = paddleLeft.x + paddleLeft.w;
                handlePaddleHit(paddleLeft);
            }

            // Check Right Paddle
            if (ball.vx > 0 && 
                ball.x + ball.w > paddleRight.x && 
                ball.x < paddleRight.x + paddleRight.w &&
                ball.y < paddleRight.y + paddleRight.h && 
                ball.y + ball.h > paddleRight.y) {
                
                ball.x = paddleRight.x - ball.w;
                handlePaddleHit(paddleRight);
            }

            // Scoring
            if (ball.x < 0) {
                scoreRight++;
                if (scoreRight >= WIN_SCORE) {
                    winner = 2;
                    state = 'GAMEOVER';
                } else {
                    resetBall(1);
                }
            } else if (ball.x > WIDTH) {
                scoreLeft++;
                if (scoreLeft >= WIN_SCORE) {
                    winner = 1;
                    state = 'GAMEOVER';
                } else {
                    resetBall(-1);
                }
            }

            // Update Flash
            if (paddleLeft.flash > 0) paddleLeft.flash -= 10;
            if (paddleRight.flash > 0) paddleRight.flash -= 10;
        }

        function handlePaddleHit(paddle) {
            paddle.flash = 100;
            ball.vx *= -1.03; // Reverse and speed up 3%
            
            // Influence vertical speed by hit position
            const paddleCenter = paddle.y + paddle.h / 2;
            const ballCenter = ball.y + ball.h / 2;
            const offset = (ballCenter - paddleCenter) / (paddle.h / 2); // -1 to 1
            
            const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            const angle = offset * (Math.PI / 3); // Max 60 degrees deflection
            
            ball.vy = Math.sin(angle) * currentSpeed;
            // Re-normalize vx to keep speed consistent (with 3% increase)
            ball.vx = Math.sign(ball.vx) * Math.sqrt(Math.abs(currentSpeed * currentSpeed - ball.vy * ball.vy));

            // Cap Speed
            const finalSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (finalSpeed > BALL_MAX_SPEED) {
                const ratio = BALL_MAX_SPEED / finalSpeed;
                ball.vx *= ratio;
                ball.vy *= ratio;
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Mid Line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 10]);
            ctx.beginPath();
            ctx.moveTo(WIDTH / 2, 0);
            ctx.lineTo(WIDTH / 2, HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);

            if (state === 'TITLE') {
                drawText('PONG', 'bold 80px Courier New', WIDTH / 2, HEIGHT / 2 - 40);
                drawText('Press SPACE to start', '24px Courier New', WIDTH / 2, HEIGHT / 2 + 40);
                drawText('W/S for Player 1, ↑/↓ for Player 2', '18px Courier New', WIDTH / 2, HEIGHT / 2 + 80);
                return;
            }

            // Scores
            ctx.font = 'bold 48px Courier New';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(scoreLeft, WIDTH / 2 - 100, 60);
            ctx.fillText(scoreRight, WIDTH / 2 + 100, 60);

            // Paddles
            ctx.fillStyle = `rgb(255, 255, ${255 - paddleLeft.flash * 2})`;
            ctx.fillRect(paddleLeft.x, paddleLeft.y, paddleLeft.w, paddleLeft.h);
            ctx.fillStyle = `rgb(255, 255, ${255 - paddleRight.flash * 2})`;
            ctx.fillRect(paddleRight.x, paddleRight.y, paddleRight.w, paddleRight.h);

            // Ball Trail
            ball.trail.forEach((t, i) => {
                ctx.fillStyle = `rgba(255, 255, 255, ${(i+1) / 10})`;
                ctx.fillRect(t.x, t.y, ball.w, ball.h);
            });

            // Ball
            ctx.fillStyle = '#fff';
            ctx.fillRect(ball.x, ball.y, ball.w, ball.h);

            if (state === 'PAUSED') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                drawText('PAUSED', 'bold 60px Courier New', WIDTH / 2, HEIGHT / 2);
                drawText('Press SPACE to resume', '24px Courier New', WIDTH / 2, HEIGHT / 2 + 60);
            }

            if (state === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                drawText(`PLAYER ${winner} WINS!`, 'bold 60px Courier New', WIDTH / 2, HEIGHT / 2 - 40);
                drawText('Press R to play again', '24px Courier New', WIDTH / 2, HEIGHT / 2 + 40);
                drawText('Press ESC for title screen', '18px Courier New', WIDTH / 2, HEIGHT / 2 + 80);
            }
        }

        function drawText(text, font, x, y) {
            ctx.font = font;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(text, x, y);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
