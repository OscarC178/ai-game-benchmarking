<!--
  GAME:      Galaga
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 480;
    const H = 640;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_STAGE_START = 1;
    const STATE_PLAYING = 2;
    const STATE_PAUSED = 3;
    const STATE_PLAYER_DEAD = 4;
    const STATE_GAMEOVER = 5;
    const STATE_BONUS = 6;
    const STATE_STAGE_CLEAR = 7;
    
    // Colors
    const COLORS = {
      ship: '#00BFFF',
      shipDual: '#00FFFF',
      laser: '#FFFF00',
      missile: '#FF4444',
      zako: '#FFAA00',
      goei: '#FF44AA',
      boss: '#44FF88',
      tractor: '#FFAA00',
      text: '#FFFFFF',
      star: '#FFFFFF'
    };
    
    // Player settings
    const SHIP_SPEED = 5;
    const LASER_SPEED = 10;
    const MAX_LASERS = 2;
    const MAX_LASERS_DUAL = 4;
    
    // Enemy settings
    const ENEMY_TYPES = {
      zako: { width: 24, height: 24, points: 50, divePoints: 80, color: COLORS.zako },
      goei: { width: 28, height: 28, points: 80, divePoints: 160, color: COLORS.goei },
      boss: { width: 36, height: 36, points: 150, divePoints: 400, color: COLORS.boss, hp: 2 }
    };
    
    // Formation
    const FORMATION = [
      ['boss', 'boss', 'boss', 'boss'],
      ['goei', 'goei', 'goei', 'goei'],
      ['goei', 'goei', 'goei', 'goei'],
      ['zako', 'zako', 'zako', 'zako'],
      ['zako', 'zako', 'zako', 'zako']
    ];
    
    const FORMATION_SPACING_X = 55;
    const FORMATION_SPACING_Y = 40;
    const FORMATION_OFFSET_X = W / 2 - 80;
    const FORMATION_OFFSET_Y = 100;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('galaga_highscore') || '0');
    let lives = 3;
    let stage = 1;
    let stageTimer = 0;
    
    let player = null;
    let playerShips = [];
    let lasers = [];
    let enemies = [];
    let missiles = [];
    let particles = [];
    let stars = [];
    
    let capturedShip = null;
    let capturingBoss = null;
    
    let formationDir = 1;
    let formationOffsetX = 0;
    let formationTimer = 0;
    
    let diveTimer = 0;
    let entryTimer = 0;
    let enteringEnemies = [];
    
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      player = {
        x: W / 2,
        y: H - 60,
        width: 32,
        height: 32,
        dual: false,
        invincible: 0
      };
      
      playerShips = [];
      lasers = [];
      enemies = [];
      missiles = [];
      particles = [];
      capturedShip = null;
      capturingBoss = null;
      
      score = 0;
      lives = 3;
      stage = 1;
      stageTimer = 0;
      formationDir = 1;
      formationOffsetX = 0;
      diveTimer = 0;
      entryTimer = 0;
      enteringEnemies = [];
      
      initStars();
      spawnFormation();
    }
    
    function initStars() {
      stars = [];
      for (let i = 0; i < 50; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 2 + 0.5,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }
    
    function spawnFormation() {
      enemies = [];
      enteringEnemies = [];
      
      for (let row = 0; row < FORMATION.length; row++) {
        for (let col = 0; col < FORMATION[row].length; col++) {
          const type = FORMATION[row][col];
          const config = ENEMY_TYPES[type];
          
          const baseX = FORMATION_OFFSET_X + col * FORMATION_SPACING_X + (row % 2 === 1 ? 25 : 0);
          const baseY = FORMATION_OFFSET_Y + row * FORMATION_SPACING_Y;
          
          const enemy = {
            type: type,
            x: baseX,
            y: type === 'boss' ? -50 - row * 30 : -50 - row * 30,
            formationX: baseX,
            formationY: baseY,
            width: config.width,
            height: config.height,
            hp: config.hp || 1,
            maxHp: config.hp || 1,
            points: config.points,
            divePoints: config.divePoints,
            color: config.color,
            alive: true,
            inFormation: false,
            diving: false,
            divePhase: 0,
            diveTime: 0,
            diveStartX: 0,
            diveStartY: 0,
            hasCapturedShip: false,
            animFrame: 0,
            animTimer: 0
          };
          
          if (stage > 1) {
            enteringEnemies.push(enemy);
          } else {
            enemy.x = baseX;
            enemy.y = baseY;
            enemy.inFormation = true;
            enemies.push(enemy);
          }
        }
      }
      
      entryTimer = 0;
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      updateStars(dt);
      updateParticles(dt);
      
      if (state === STATE_STAGE_START) {
        stageTimer += dtMs;
        updateEntry(dtMs);
        if (enteringEnemies.length === 0 && stageTimer > 1000) {
          state = isBonusStage() ? STATE_BONUS : STATE_PLAYING;
        }
      }
      
      if (state === STATE_PLAYER_DEAD) {
        stageTimer += dtMs;
        if (stageTimer > 1500) {
          if (lives > 0) {
            player.x = W / 2;
            player.invincible = 2000;
            state = STATE_PLAYING;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('galaga_highscore', highScore);
            }
          }
        }
      }
      
      if (state === STATE_STAGE_CLEAR) {
        stageTimer += dtMs;
        if (stageTimer > 2000) {
          stage++;
          spawnFormation();
          state = STATE_STAGE_START;
          stageTimer = 0;
        }
      }
      
      if (state !== STATE_PLAYING && state !== STATE_BONUS && state !== STATE_STAGE_START) return;
      
      // Update player invincibility
      if (player.invincible > 0) {
        player.invincible -= dtMs;
      }
      
      // Player movement
      if (keys.left) player.x -= SHIP_SPEED;
      if (keys.right) player.x += SHIP_SPEED;
      player.x = Math.max(20, Math.min(W - 20, player.x));
      
      // Fire
      if (keys.fire) {
        fireLaser();
        keys.fire = false;
      }
      
      // Update lasers
      updateLasers();
      
      // Update missiles
      updateMissiles();
      
      // Update enemies
      updateEnemies(dt, dtMs);
      
      // Update entry
      if (state === STATE_STAGE_START) {
        updateEntry(dtMs);
      }
      
      // Check collisions
      checkCollisions();
      
      // Check stage clear
      if (enemies.filter(e => e.alive).length === 0 && enteringEnemies.length === 0) {
        if (state === STATE_PLAYING || state === STATE_BONUS) {
          state = STATE_STAGE_CLEAR;
          stageTimer = 0;
        }
      }
    }
    
    function updateStars(dt) {
      for (const star of stars) {
        star.y += star.speed;
        if (star.y > H) {
          star.y = 0;
          star.x = Math.random() * W;
        }
      }
    }
    
    function updateLasers() {
      for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].y -= LASER_SPEED;
        if (lasers[i].y < 0) {
          lasers.splice(i, 1);
        }
      }
    }
    
    function updateMissiles() {
      for (let i = missiles.length - 1; i >= 0; i--) {
        missiles[i].y += missiles[i].vy;
        missiles[i].x += missiles[i].vx || 0;
        if (missiles[i].y > H) {
          missiles.splice(i, 1);
        }
      }
    }
    
    function updateEnemies(dt, dtMs) {
      // Formation movement
      formationTimer += dtMs;
      if (formationTimer > 50) {
        formationTimer = 0;
        formationOffsetX += formationDir * 0.5;
        if (Math.abs(formationOffsetX) > 30) {
          formationDir *= -1;
        }
      }
      
      // Dive attacks
      diveTimer += dtMs;
      if (diveTimer > 2000 && state === STATE_PLAYING) {
        diveTimer = 0;
        triggerDive();
      }
      
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        
        enemy.animTimer += dtMs;
        if (enemy.animTimer > 200) {
          enemy.animTimer = 0;
          enemy.animFrame = 1 - enemy.animFrame;
        }
        
        if (enemy.diving) {
          updateDivingEnemy(enemy, dtMs);
        } else if (enemy.inFormation) {
          enemy.x = enemy.formationX + formationOffsetX;
        }
      }
      
      // Update captured ship position
      if (capturedShip && capturingBoss) {
        capturedShip.x = capturingBoss.x;
        capturedShip.y = capturingBoss.y + 30;
      }
    }
    
    function updateDivingEnemy(enemy, dtMs) {
      enemy.diveTime += dtMs;
      
      if (enemy.type === 'boss' && enemy.divePhase === 'tractor') {
        updateTractorDive(enemy);
      } else {
        // Straight or loop dive
        const t = enemy.diveTime;
        const speed = 4;
        
        if (enemy.divePhase === 'down') {
          enemy.y += speed;
          enemy.x += Math.sin(t * 0.01) * 2;
          
          // Fire missiles
          if (Math.random() < 0.01 && state === STATE_PLAYING) {
            fireMissile(enemy.x, enemy.y);
          }
          
          if (enemy.y > H + 50) {
            enemy.diving = false;
            enemy.inFormation = true;
            enemy.x = enemy.formationX + formationOffsetX;
            enemy.y = enemy.formationY;
          }
        }
      }
    }
    
    function updateTractorDive(boss) {
      if (boss.divePhase === 'descend') {
        boss.y += 2;
        if (boss.y > H * 0.5) {
          boss.divePhase = 'hover';
          boss.tractorActive = true;
        }
      } else if (boss.divePhase === 'hover') {
        boss.x += (player.x - boss.x) * 0.02;
        
        // Try capture
        if (boss.tractorActive && !capturedShip && player.invincible <= 0) {
          const dx = player.x - boss.x;
          const dy = player.y - boss.y;
          if (Math.abs(dx) < 30 && dy < 60 && dy > 0) {
            capturePlayer();
          }
        }
        
        boss.hoverTime = (boss.hoverTime || 0) + 1;
        if (boss.hoverTime > 150) {
          boss.tractorActive = false;
          boss.divePhase = 'return';
          boss.hoverTime = 0;
        }
      } else if (boss.divePhase === 'return') {
        const dx = (boss.formationX + formationOffsetX) - boss.x;
        const dy = boss.formationY - boss.y;
        boss.x += dx * 0.05;
        boss.y += dy * 0.05;
        
        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
          boss.diving = false;
          boss.inFormation = true;
          boss.x = boss.formationX + formationOffsetX;
          boss.y = boss.formationY;
        }
      }
    }
    
    function updateEntry(dtMs) {
      entryTimer += dtMs;
      
      for (let i = enteringEnemies.length - 1; i >= 0; i--) {
        const enemy = enteringEnemies[i];
        const t = entryTimer + i * 50;
        
        // Looping entry pattern
        enemy.x = enemy.formationX + Math.sin(t * 0.005) * 100;
        enemy.y = Math.min(enemy.formationY, t * 0.5 - i * 5);
        
        if (enemy.y >= enemy.formationY) {
          enemy.y = enemy.formationY;
          enemy.x = enemy.formationX;
          enemy.inFormation = true;
          enemies.push(enemy);
          enteringEnemies.splice(i, 1);
        }
      }
    }
    
    function triggerDive() {
      const candidates = enemies.filter(e => e.alive && e.inFormation && !e.diving);
      if (candidates.length === 0) return;
      
      // Weight by type
      const weighted = [];
      candidates.forEach(e => {
        const weight = e.type === 'boss' ? 4 : (e.type === 'goei' ? 2 : 1);
        for (let i = 0; i < weight; i++) weighted.push(e);
      });
      
      const enemy = weighted[Math.floor(Math.random() * weighted.length)];
      
      enemy.diving = true;
      enemy.inFormation = false;
      enemy.diveTime = 0;
      enemy.diveStartX = enemy.x;
      enemy.diveStartY = enemy.y;
      
      if (enemy.type === 'boss' && Math.random() < 0.4) {
        enemy.divePhase = 'descend';
        enemy.tractorActive = false;
      } else {
        enemy.divePhase = 'down';
      }
    }
    
    function fireLaser() {
      const maxLasers = player.dual ? MAX_LASERS_DUAL : MAX_LASERS;
      if (lasers.length >= maxLasers) return;
      
      if (player.dual) {
        lasers.push({ x: player.x - 15, y: player.y - 15, width: 3, height: 12 });
        lasers.push({ x: player.x + 12, y: player.y - 15, width: 3, height: 12 });
      } else {
        lasers.push({ x: player.x - 1.5, y: player.y - 15, width: 3, height: 12 });
      }
    }
    
    function fireMissile(x, y) {
      missiles.push({
        x: x,
        y: y,
        vx: (player.x - x) * 0.01,
        vy: 5,
        width: 4,
        height: 8
      });
    }
    
    function capturePlayer() {
      capturedShip = {
        x: capturingBoss ? capturingBoss.x : player.x,
        y: player.y,
        width: 32,
        height: 32
      };
      
      if (player.dual) {
        player.dual = false;
        lives--;
      } else {
        lives--;
      }
      
      if (capturingBoss) {
        capturingBoss.hasCapturedShip = true;
      }
    }
    
    function rescueShip() {
      if (!capturedShip) return;
      
      player.dual = true;
      createExplosion(capturedShip.x, capturedShip.y, 10);
      capturedShip = null;
      
      if (capturingBoss) {
        capturingBoss.hasCapturedShip = false;
      }
    }
    
    // ==================== COLLISION ====================
    function checkCollisions() {
      // Lasers vs Enemies
      for (let i = lasers.length - 1; i >= 0; i--) {
        const laser = lasers[i];
        
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          
          if (rectIntersect(laser, enemy)) {
            lasers.splice(i, 1);
            
            enemy.hp--;
            if (enemy.hp <= 0) {
              enemy.alive = false;
              const points = enemy.diving ? enemy.divePoints : enemy.points;
              score += points;
              createExplosion(enemy.x, enemy.y, 15);
              
              if (enemy.hasCapturedShip && capturedShip) {
                rescueShip();
              }
            } else {
              createExplosion(enemy.x, enemy.y, 5);
            }
            break;
          }
        }
      }
      
      if (state === STATE_BONUS || player.invincible > 0) return;
      
      // Missiles vs Player
      for (let i = missiles.length - 1; i >= 0; i--) {
        if (rectIntersect(missiles[i], { x: player.x - 16, y: player.y - 16, width: 32, height: 32 })) {
          missiles.splice(i, 1);
          killPlayer();
          return;
        }
      }
      
      // Enemies vs Player
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (enemy.diving && rectIntersect(
          { x: player.x - 16, y: player.y - 16, width: 32, height: 32 },
          enemy
        )) {
          if (enemy.type === 'boss' && enemy.tractorActive) {
            capturingBoss = enemy;
            capturePlayer();
          } else {
            killPlayer();
          }
          return;
        }
      }
    }
    
    function rectIntersect(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function killPlayer() {
      createExplosion(player.x, player.y, 20);
      lives--;
      state = STATE_PLAYER_DEAD;
      stageTimer = 0;
      capturedShip = null;
      
      if (player.dual) {
        player.dual = false;
        if (lives > 0) {
          lives++;
        }
      }
    }
    
    function createExplosion(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 500 + Math.random() * 500,
          color: '#FFFF00'
        });
      }
    }
    
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt * 1000;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function isBonusStage() {
      return stage % 4 === 0;
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      // Stars
      ctx.fillStyle = COLORS.star;
      for (const star of stars) {
        ctx.fillRect(star.x, star.y, star.size, star.size);
      }
      
      // Particles
      for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Enemies
      for (const enemy of enemies) {
        if (enemy.alive) drawEnemy(enemy);
      }
      
      for (const enemy of enteringEnemies) {
        drawEnemy(enemy);
      }
      
      // Captured ship
      if (capturedShip && capturingBoss) {
        drawShip(capturedShip.x, capturedShip.y, true);
      }
      
      // Tractor beam
      if (capturingBoss && capturingBoss.tractorActive) {
        drawTractorBeam(capturingBoss);
      }
      
      // Lasers
      ctx.fillStyle = COLORS.laser;
      for (const laser of lasers) {
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
      }
      
      // Missiles
      ctx.fillStyle = COLORS.missile;
      for (const missile of missiles) {
        ctx.fillRect(missile.x - 2, missile.y, missile.width, missile.height);
      }
      
      // Player
      if (state !== STATE_PLAYER_DEAD && state !== STATE_GAMEOVER) {
        if (player.invincible <= 0 || Math.floor(player.invincible / 100) % 2 === 0) {
          if (player.dual) {
            drawShip(player.x - 15, player.y, false);
            drawShip(player.x + 15, player.y, false);
          } else {
            drawShip(player.x, player.y, false);
          }
        }
      }
      
      // HUD
      drawHUD();
      
      // Overlays
      if (state === STATE_PAUSED) drawPauseScreen();
      if (state === STATE_GAMEOVER) drawGameOverScreen();
      if (state === STATE_STAGE_START) drawStageStart();
      if (state === STATE_STAGE_CLEAR) drawStageClear();
      if (state === STATE_BONUS) drawBonusIndicator();
    }
    
    function drawShip(x, y, captured) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = captured ? '#FF6666' : COLORS.ship;
      
      // Main body
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(-12, 12);
      ctx.lineTo(-6, 8);
      ctx.lineTo(0, 10);
      ctx.lineTo(6, 8);
      ctx.lineTo(12, 12);
      ctx.closePath();
      ctx.fill();
      
      // Wings
      ctx.fillRect(-14, 4, 4, 8);
      ctx.fillRect(10, 4, 4, 8);
      
      ctx.restore();
    }
    
    function drawEnemy(enemy) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.fillStyle = enemy.diving ? '#FFFFFF' : enemy.color;
      
      const w = enemy.width;
      const h = enemy.height;
      const frame = enemy.animFrame;
      
      if (enemy.type === 'zako') {
        // Bee/drone shape
        ctx.beginPath();
        ctx.ellipse(0, 0, w/2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Wings
        if (frame === 0) {
          ctx.fillRect(-w/2 - 4, -2, 6, 4);
          ctx.fillRect(w/2 - 2, -2, 6, 4);
        } else {
          ctx.fillRect(-w/2 - 4, 2, 6, 4);
          ctx.fillRect(w/2 - 2, 2, 6, 4);
        }
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(-6, -4, 4, 4);
        ctx.fillRect(2, -4, 4, 4);
      } else if (enemy.type === 'goei') {
        // Butterfly shape
        ctx.beginPath();
        ctx.ellipse(0, 0, w/3, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Wings
        ctx.fillRect(-w/2 - 2, frame === 0 ? -8 : -4, 8, 16);
        ctx.fillRect(w/2 - 6, frame === 0 ? -8 : -4, 8, 16);
      } else if (enemy.type === 'boss') {
        // Boss Galaga
        ctx.beginPath();
        ctx.ellipse(0, 0, w/2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Wings
        ctx.fillRect(-w/2 - 4, -4, 8, 12);
        ctx.fillRect(w/2 - 4, -4, 8, 12);
        // Eyes
        ctx.fillStyle = enemy.hp < enemy.maxHp ? '#FF0000' : '#000';
        ctx.beginPath();
        ctx.arc(-8, -2, 5, 0, Math.PI * 2);
        ctx.arc(8, -2, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    }
    
    function drawTractorBeam(boss) {
      ctx.save();
      ctx.translate(boss.x, boss.y);
      
      ctx.fillStyle = 'rgba(255, 170, 0, 0.4)';
      ctx.beginPath();
      ctx.moveTo(-15, 20);
      ctx.lineTo(-25, 80);
      ctx.lineTo(25, 80);
      ctx.lineTo(15, 20);
      ctx.closePath();
      ctx.fill();
      
      ctx.strokeStyle = COLORS.tractor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-15, 20);
      ctx.lineTo(-25, 80);
      ctx.moveTo(15, 20);
      ctx.lineTo(25, 80);
      ctx.stroke();
      
      ctx.restore();
    }
    
    function drawHUD() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 18px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText(score.toString().padStart(6, '0'), 10, 30);
      
      ctx.textAlign = 'center';
      ctx.fillText('HI ' + highScore.toString().padStart(6, '0'), W / 2, 30);
      
      // Lives
      ctx.textAlign = 'right';
      for (let i = 0; i < lives; i++) {
        drawShipMini(W - 20 - i * 25, 25);
      }
      
      ctx.textAlign = 'left';
      ctx.font = '14px Courier New';
      ctx.fillText('STAGE ' + stage, 10, H - 15);
    }
    
    function drawShipMini(x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(0.5, 0.5);
      ctx.fillStyle = COLORS.ship;
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(-10, 10);
      ctx.lineTo(10, 10);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 56px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GALAGA', W / 2, 200);
      
      ctx.font = '18px Arial';
      ctx.fillText('Press SPACE to start', W / 2, 350);
      
      ctx.font = '14px Arial';
      ctx.fillStyle = '#888';
      ctx.fillText('← → to move', W / 2, 420);
      ctx.fillText('SPACE to fire', W / 2, 445);
      ctx.fillText('P to pause', W / 2, 470);
      
      ctx.fillStyle = '#FFD700';
      ctx.font = '16px Arial';
      ctx.fillText('HI-SCORE: ' + highScore, W / 2, 550);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      ctx.font = '18px Arial';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial';
      ctx.fillText('SCORE: ' + score, W / 2, H / 2);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '18px Arial';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 100);
    }
    
    function drawStageStart() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('STAGE ' + stage, W / 2, H / 2);
    }
    
    function drawStageClear() {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('STAGE CLEAR!', W / 2, H / 2);
    }
    
    function drawBonusIndicator() {
      ctx.fillStyle = '#FFFF00';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('CHALLENGING STAGE', W / 2, 60);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_STAGE_START;
        stageTimer = 0;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'Space' && (state === STATE_PLAYING || state === STATE_BONUS)) {
        keys.fire = true;
        e.preventDefault();
      }
      
      if (e.code === 'KeyP' && state === STATE_PLAYING) {
        state = STATE_PAUSED;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyP' && state === STATE_PAUSED) {
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_STAGE_START;
        stageTimer = 0;
        e.preventDefault();
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
      }
      
      if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys.fire = false;
    });
    
    // Key state helpers
    Object.defineProperty(keys, 'left', { get: function() { return this['ArrowLeft'] || this['KeyA']; } });
    Object.defineProperty(keys, 'right', { get: function() { return this['ArrowRight'] || this['KeyD']; } });
    
    window.addEventListener('blur', () => {
      for (const key in keys) keys[key] = false;
    });
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    initStars();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
