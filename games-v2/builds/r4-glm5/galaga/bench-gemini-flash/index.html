<!--
  GAME:      Galaga
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="640"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 480;
        const HEIGHT = 640;
        const PLAYER_Y = HEIGHT - 50;
        const SHIP_SIZE = 32;
        const BULLET_SPEED = 10;
        const MAX_PLAYER_BULLETS = 2;

        // Game State
        let state = 'TITLE'; // TITLE, STARTING, PLAYING, PAUSED, DEAD, GAMEOVER
        let score = 0;
        let highScore = parseInt(localStorage.getItem('galagaHighScore')) || 0;
        let lives = 3;
        let stage = 1;
        let lastTime = 0;
        let keys = {};

        // Entities
        let player = {
            x: WIDTH / 2,
            y: PLAYER_Y,
            dual: false,
            invuln: 0,
            capturing: false
        };

        let stars = [];
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let explosions = [];
        let diveTimer = 0;

        // --- Initialization ---
        function initStars() {
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT,
                    speed: Math.random() * 2 + 1
                });
            }
        }

        function initStage() {
            enemies = [];
            const formationRows = 5;
            const cols = 8;
            const startX = (WIDTH - (cols * 40)) / 2 + 20;
            const startY = 100;

            for (let r = 0; r < formationRows; r++) {
                for (let c = 0; c < 4; c++) {
                    let type = 'zako';
                    let pts = 50;
                    let hp = 1;
                    let color = '#FFFF00';

                    if (r === 0) {
                        type = 'boss';
                        pts = 150;
                        hp = 2;
                        color = '#00FF00';
                    } else if (r < 3) {
                        type = 'goei';
                        pts = 80;
                        color = '#FF00FF';
                    }

                    // Mirrors
                    const offset = (r % 2 === 0) ? 0 : 20;
                    enemies.push(createEnemy(startX + offset + c * 80, startY + r * 35, type, pts, hp, color));
                }
            }
            diveTimer = 120;
        }

        function createEnemy(fx, fy, type, pts, hp, color) {
            return {
                x: fx, y: fy,
                fx: fx, fy: fy,
                type: type,
                pts: pts,
                color: color,
                hp: hp,
                state: 'formation',
                vx: 0, vy: 0,
                anim: 0,
                diveProgress: 0
            };
        }

        function resetGame() {
            score = 0;
            lives = 3;
            stage = 1;
            player.dual = false;
            player.x = WIDTH / 2;
            initStage();
            state = 'PLAYING';
        }

        // --- Core Loop ---
        function update(currentTime) {
            const dt = (currentTime - lastTime) / 16.67;
            lastTime = currentTime;

            // Background
            stars.forEach(s => {
                s.y += s.speed * dt;
                if (s.y > HEIGHT) s.y = 0;
            });

            if (state === 'TITLE') {
                if (keys['Space']) resetGame();
                return;
            }

            if (state === 'PLAYING') {
                // Player move
                if (keys['ArrowLeft'] && player.x > 20) player.x -= 5 * dt;
                if (keys['ArrowRight'] && player.x < WIDTH - 20) player.x += 5 * dt;

                // Bullets
                bullets.forEach((b, i) => {
                    b.y -= BULLET_SPEED * dt;
                    if (b.y < 0) bullets.splice(i, 1);
                });

                enemyBullets.forEach((b, i) => {
                    b.y += 4 * dt;
                    if (b.y > HEIGHT) enemyBullets.splice(i, 1);
                });

                // Enemies
                let formationOffset = Math.sin(currentTime * 0.002) * 20;
                enemies.forEach(e => {
                    e.anim += 0.1 * dt;
                    if (e.state === 'formation') {
                        e.x = e.fx + formationOffset;
                    } else if (e.state === 'diving') {
                        e.y += 4 * dt;
                        e.x += Math.sin(e.y * 0.05) * 3 * dt;
                        if (e.y > HEIGHT) {
                            e.y = -50;
                            e.state = 'returning';
                        }
                        if (Math.random() < 0.01) fireEnemyBullet(e.x, e.y);
                    } else if (e.state === 'returning') {
                        e.y += 4 * dt;
                        if (e.y >= e.fy) {
                            e.y = e.fy;
                            e.state = 'formation';
                        }
                    }
                });

                // Dive Trigger
                diveTimer -= dt;
                if (diveTimer <= 0) {
                    const ready = enemies.filter(ev => ev.state === 'formation');
                    if (ready.length > 0) {
                        const diver = ready[Math.floor(Math.random() * ready.length)];
                        diver.state = 'diving';
                    }
                    diveTimer = 60 + Math.random() * 120;
                }

                checkCollisions();

                if (enemies.length === 0) {
                    stage++;
                    initStage();
                }
            }

            explosions.forEach((ex, i) => {
                ex.life -= dt;
                if (ex.life <= 0) explosions.splice(i, 1);
            });
        }

        function fireBullet() {
            const max = player.dual ? 4 : 2;
            if (bullets.length >= max || state !== 'PLAYING') return;
            bullets.push({ x: player.x, y: player.y - 15 });
            if (player.dual) bullets.push({ x: player.x + 20, y: player.y - 15 });
        }

        function fireEnemyBullet(x, y) {
            enemyBullets.push({ x, y });
        }

        function checkCollisions() {
            // Player bullets vs Enemies
            bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < 20) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if (e.hp <= 0) {
                            score += (e.state === 'formation') ? e.pts : e.pts * 2;
                            explosions.push({ x: e.x, y: e.y, life: 20 });
                            enemies.splice(ei, 1);
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('galagaHighScore', highScore);
                            }
                        }
                    }
                });
            });

            // Enemy bullets vs Player
            enemyBullets.forEach((b, bi) => {
                const dist = Math.hypot(b.x - player.x, b.y - player.y);
                if (dist < 15 && !player.capturing) {
                    enemyBullets.splice(bi, 1);
                    hitPlayer();
                }
            });

            // Enemy body vs Player
            enemies.forEach(e => {
                const dist = Math.hypot(e.x - player.x, e.y - player.y);
                if (dist < 25 && e.state === 'diving') {
                    hitPlayer();
                }
            });
        }

        function hitPlayer() {
            explosions.push({ x: player.x, y: player.y, life: 40 });
            lives--;
            if (lives <= 0) state = 'GAMEOVER';
            else {
                state = 'DEAD';
                setTimeout(() => {
                    player.x = WIDTH / 2;
                    state = 'PLAYING';
                }, 1000);
            }
        }

        // --- Rendering ---
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Stars
            ctx.fillStyle = '#FFF';
            stars.forEach(s => ctx.fillRect(s.x, s.y, 1, 1));

            if (state === 'TITLE') {
                ctx.fillStyle = '#FFF';
                ctx.textAlign = 'center';
                ctx.font = 'bold 40px Courier New';
                ctx.fillText('GALAGA', WIDTH / 2, 250);
                ctx.font = '20px Courier New';
                ctx.fillText('PRESS SPACE TO START', WIDTH / 2, 350);
                return;
            }

            // Player
            if (state !== 'DEAD') {
                drawFighter(player.x, player.y);
                if (player.dual) drawFighter(player.x + 25, player.y);
            }

            // Enemies
            enemies.forEach(e => {
                drawEnemy(e);
            });

            // Bullets
            ctx.fillStyle = '#FFFF00';
            bullets.forEach(b => ctx.fillRect(b.x - 1, b.y, 3, 12));
            ctx.fillStyle = '#FF0000';
            enemyBullets.forEach(b => ctx.fillRect(b.x - 1, b.y, 3, 6));

            // Explosions
            ctx.fillStyle = '#FFA500';
            explosions.forEach(ex => {
                ctx.beginPath();
                ctx.arc(ex.x, ex.y, 15 * (ex.life / 20), 0, Math.PI * 2);
                ctx.fill();
            });

            // UI
            ctx.fillStyle = '#FFF';
            ctx.font = '18px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 30);
            ctx.textAlign = 'center';
            ctx.fillText(`HI: ${highScore}`, WIDTH / 2, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`STAGE ${stage}`, WIDTH - 10, 30);

            for (let i = 0; i < lives; i++) {
                drawFighter(20 + i * 30, HEIGHT - 20, 0.5);
            }

            if (state === 'GAMEOVER') {
                ctx.fillStyle = '#F00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 40px Courier New';
                ctx.fillText('GAME OVER', WIDTH / 2, HEIGHT / 2);
                ctx.font = '20px Courier New';
                ctx.fillStyle = '#FFF';
                ctx.fillText('PRESS R TO RESTART', WIDTH / 2, HEIGHT / 2 + 50);
            }
        }

        function drawFighter(x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(0, -15);
            ctx.lineTo(-15, 10);
            ctx.lineTo(-10, 15);
            ctx.lineTo(10, 15);
            ctx.lineTo(15, 10);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#00F';
            ctx.fillRect(-5, 0, 10, 10);
            ctx.restore();
        }

        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            const flap = Math.sin(e.anim) * 5;
            ctx.fillStyle = e.color;
            if (e.type === 'boss') {
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(-18 - flap, 5);
                ctx.lineTo(0, 15);
                ctx.lineTo(18 + flap, 5);
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(-12 - flap, 5);
                ctx.lineTo(12 + flap, 5);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }

        // --- Input Handling ---
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space') fireBullet();
            if (e.code === 'KeyR' && state === 'GAMEOVER') resetGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- Loop ---
        function loop(t) {
            update(t);
            draw();
            requestAnimationFrame(loop);
        }

        initStars();
        initStage();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
