<!--
  GAME:      Galaga
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="galagaCanvas" width="480" height="640"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('galagaCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 480;
    const HEIGHT = 640;
    const STATES = { TITLE: 0, STAGE_START: 1, PLAYING: 2, PAUSED: 3, PLAYER_DEAD: 4, STAGE_CLEAR: 5, GAME_OVER: 6 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('galagaHighScore') || '0', 10);
    let lives = 3;
    let stage = 1;
    let stateTimer = 0;

    // Player
    const player = {
      x: WIDTH / 2,
      y: HEIGHT - 50,
      width: 32,
      height: 32,
      speed: 6,
      dual: false,
      ship1: { x: 0, y: 0 },
      ship2: { x: 0, y: 0 }
    };

    // Lasers
    let lasers = [];

    // Enemies
    let enemies = [];
    let formationOffsetX = 0;
    let formationDriftDir = 1;

    // Missiles
    let missiles = [];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          startGame();
        } else if (gameState === STATES.PLAYING) {
          fireLaser();
        }
      }

      if (key === 'p' || key === 'escape') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState !== STATES.TITLE) {
          startGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      stage = 1;
      player.dual = false;
      lasers = [];
      missiles = [];
      initStage();
    }

    function initStage() {
      enemies = [];
      formationOffsetX = 0;
      formationDriftDir = 1;
      lasers = [];
      missiles = [];

      // Formation layout
      const formationData = [
        { type: 'boss', row: 0, col: 0 },
        { type: 'boss', row: 0, col: 1 },
        { type: 'boss', row: 0, col: 2 },
        { type: 'boss', row: 0, col: 3 },
        { type: 'goei', row: 1, col: 0 },
        { type: 'goei', row: 1, col: 1 },
        { type: 'goei', row: 1, col: 2 },
        { type: 'goei', row: 1, col: 3 },
        { type: 'goei', row: 2, col: 0 },
        { type: 'goei', row: 2, col: 1 },
        { type: 'goei', row: 2, col: 2 },
        { type: 'goei', row: 2, col: 3 },
        { type: 'zako', row: 3, col: 0 },
        { type: 'zako', row: 3, col: 1 },
        { type: 'zako', row: 3, col: 2 },
        { type: 'zako', row: 3, col: 3 },
        { type: 'zako', row: 4, col: 0 },
        { type: 'zako', row: 4, col: 1 },
        { type: 'zako', row: 4, col: 2 },
        { type: 'zako', row: 4, col: 3 }
      ];

      formationData.forEach(data => {
        const offsetX = data.col * 50 + (data.row % 2 ? 25 : 0);
        const offsetY = data.row * 35;
        const x = 60 + offsetX;
        const y = 50 + offsetY;

        let size, color, points;
        if (data.type === 'boss') {
          size = 36;
          color = '#00FF00';
          points = 150;
        } else if (data.type === 'goei') {
          size = 28;
          color = '#FF00FF';
          points = 80;
        } else {
          size = 24;
          color = '#FFFF00';
          points = 50;
        }

        enemies.push({
          type: data.type,
          x: x,
          y: y,
          formX: x,
          formY: y,
          width: size,
          height: size,
          color: color,
          points: points,
          inFormation: true,
          diving: false,
          diveTime: 0,
          hp: data.type === 'boss' ? 2 : 1,
          captured: false
        });
      });

      gameState = STATES.STAGE_START;
      stateTimer = 120;
    }

    function fireLaser() {
      if (gameState !== STATES.PLAYING) return;
      const maxLasers = player.dual ? 4 : 2;
      if (lasers.length >= maxLasers) return;

      if (player.dual) {
        lasers.push({ x: player.ship1.x, y: player.ship1.y, vy: -10 });
        lasers.push({ x: player.ship2.x, y: player.ship2.y, vy: -10 });
      } else {
        lasers.push({ x: player.x, y: player.y, vy: -10 });
      }
    }

    function selectDivingEnemy() {
      const candidates = enemies.filter(e => e.inFormation && !e.diving && e.hp > 0);
      if (candidates.length === 0) return null;

      const weighted = [];
      candidates.forEach(e => {
        if (e.type === 'boss') weighted.push(e, e, e);
        else if (e.type === 'goei') weighted.push(e, e);
        else weighted.push(e);
      });

      return weighted[Math.floor(Math.random() * weighted.length)];
    }

    function update() {
      if (gameState === STATES.TITLE) return;

      if (gameState === STATES.STAGE_START) {
        stateTimer--;
        if (stateTimer <= 0) {
          gameState = STATES.PLAYING;
        }
        return;
      }

      if (gameState === STATES.PLAYING) {
        // Player movement
        if (keys['arrowleft'] || keys['a']) {
          player.x = Math.max(20, player.x - player.speed);
        }
        if (keys['arrowright'] || keys['d']) {
          player.x = Math.min(WIDTH - 20, player.x + player.speed);
        }

        if (player.dual) {
          player.ship1.x = player.x - 20;
          player.ship2.x = player.x + 20;
          player.ship1.y = player.y;
          player.ship2.y = player.y;
        }

        // Update lasers
        for (let i = lasers.length - 1; i >= 0; i--) {
          lasers[i].y += lasers[i].vy;
          if (lasers[i].y < -10) {
            lasers.splice(i, 1);
          }
        }

        // Update missiles
        for (let i = missiles.length - 1; i >= 0; i--) {
          missiles[i].y += missiles[i].vy;
          if (missiles[i].y > HEIGHT) {
            missiles.splice(i, 1);
          }
        }

        // Formation movement
        formationOffsetX += formationDriftDir * 0.5;
        if (formationOffsetX < -30 || formationOffsetX > 30) {
          formationDriftDir *= -1;
        }

        // Update enemies
        let allDiving = true;
        for (let enemy of enemies) {
          if (enemy.hp <= 0) continue;

          if (enemy.inFormation) {
            allDiving = false;
            enemy.x = enemy.formX + formationOffsetX;
            enemy.y = enemy.formY;

            // Random dive
            if (Math.random() < 0.002) {
              enemy.diving = true;
              enemy.inFormation = false;
              enemy.diveTime = 0;
            }
          } else if (enemy.diving) {
            enemy.diveTime++;
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.hypot(dx, dy);
            enemy.x += (dx / dist) * 2.5;
            enemy.y += (dy / dist) * 2.5;

            // Fire missile
            if (Math.random() < 0.03) {
              const mx = Math.random() - 0.5;
              const my = Math.random() + 0.5;
              missiles.push({ x: enemy.x, y: enemy.y, vx: mx * 2, vy: my * 3 });
            }

            // Return to formation
            if (enemy.diveTime > 180 || enemy.y > HEIGHT) {
              enemy.diving = false;
              enemy.inFormation = true;
              enemy.diveTime = 0;
            }
          }
        }

        // Laser-enemy collision
        for (let i = lasers.length - 1; i >= 0; i--) {
          for (let j = enemies.length - 1; j >= 0; j--) {
            const enemy = enemies[j];
            if (enemy.hp <= 0) continue;
            const dist = Math.hypot(lasers[i].x - enemy.x, lasers[i].y - enemy.y);
            if (dist < enemy.width / 2 + 5) {
              enemy.hp--;
              if (enemy.hp <= 0) {
                score += enemy.points * (enemy.diving ? 2 : 1);
              }
              lasers.splice(i, 1);
              break;
            }
          }
        }

        // Missile-player collision
        for (let i = missiles.length - 1; i >= 0; i--) {
          let hit = false;
          if (player.dual) {
            if (Math.hypot(missiles[i].x - player.ship1.x, missiles[i].y - player.ship1.y) < 20) {
              hit = true;
              player.dual = false;
            } else if (Math.hypot(missiles[i].x - player.ship2.x, missiles[i].y - player.ship2.y) < 20) {
              hit = true;
              player.dual = false;
            }
          } else {
            if (Math.hypot(missiles[i].x - player.x, missiles[i].y - player.y) < 20) {
              hit = true;
            }
          }

          if (hit) {
            lives--;
            missiles.splice(i, 1);
            if (lives <= 0) {
              gameState = STATES.GAME_OVER;
            } else {
              gameState = STATES.PLAYER_DEAD;
              stateTimer = 60;
            }
            break;
          }
        }

        // Check stage clear
        if (enemies.every(e => e.hp <= 0)) {
          stage++;
          gameState = STATES.STAGE_CLEAR;
          stateTimer = 120;
        }

        if (score > highScore) {
          highScore = score;
          localStorage.setItem('galagaHighScore', highScore);
        }
      }

      if (gameState === STATES.PLAYER_DEAD) {
        stateTimer--;
        if (stateTimer <= 0) {
          player.x = WIDTH / 2;
          player.y = HEIGHT - 50;
          gameState = STATES.PLAYING;
        }
      }

      if (gameState === STATES.STAGE_CLEAR) {
        stateTimer--;
        if (stateTimer <= 0) {
          initStage();
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw starfield
      ctx.fillStyle = '#FFF';
      for (let i = 0; i < 50; i++) {
        const x = (i * 97) % WIDTH;
        const y = (i * 137) % HEIGHT;
        ctx.fillRect(x, y, 1, 1);
      }

      // Draw score and lives
      ctx.fillStyle = '#0F0';
      ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('HI: ' + highScore, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw enemies
      for (let enemy of enemies) {
        if (enemy.hp <= 0) continue;
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);
      }

      // Draw lasers
      ctx.fillStyle = '#FFFF00';
      for (let laser of lasers) {
        ctx.fillRect(laser.x - 1.5, laser.y - 6, 3, 12);
      }

      // Draw missiles
      ctx.fillStyle = '#FF0000';
      for (let missile of missiles) {
        ctx.fillRect(missile.x - 1.5, missile.y - 1.5, 3, 3);
      }

      // Draw player ship
      if (gameState === STATES.PLAYING || gameState === STATES.PLAYER_DEAD) {
        if (player.dual) {
          ctx.fillStyle = '#00FFFF';
          ctx.fillRect(player.ship1.x - 16, player.ship1.y - 16, 32, 32);
          ctx.fillRect(player.ship2.x - 16, player.ship2.y - 16, 32, 32);
        } else {
          ctx.fillStyle = '#00FFFF';
          ctx.fillRect(player.x - 16, player.y - 16, 32, 32);
        }
      }

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GALAGA', WIDTH / 2, 150);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 280);
        ctx.fillText('← → to move, SPACE to fire', WIDTH / 2, 320);
      } else if (gameState === STATES.STAGE_START) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE ' + stage, WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 30);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, HEIGHT / 2 + 30);
      } else if (gameState === STATES.STAGE_CLEAR) {
        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE CLEAR', WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 330);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
