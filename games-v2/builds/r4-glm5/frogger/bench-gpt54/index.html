<!--
  GAME:      Frogger
  RUN:       r4-glm5
  BUILDER:   openai/gpt-5.4
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    canvas {
      display: block;
      background: #111;
      box-shadow: 0 0 28px rgba(255,255,255,0.08);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game" width="560" height="650"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;
  const CELL = 40;
  const HUD_H = 50;
  const FIELD_Y = HUD_H;
  const COLS = 14;
  const ROWS = 15;
  const FIELD_H = ROWS * CELL;
  const DT_CAP = 1 / 30;

  const STATES = {
    TITLE: 'title',
    LEVEL_START: 'level_start',
    PLAYING: 'playing',
    DYING: 'dying',
    LEVEL_COMPLETE: 'level_complete',
    PAUSED: 'paused',
    GAME_OVER: 'game_over'
  };

  const keys = Object.create(null);
  const prevKeys = Object.create(null);

  let state = STATES.TITLE;
  let lastTime = 0;
  let score = 0;
  let highScore = loadHighScore();
  let lives = 3;
  let level = 1;
  let stateTimer = 0;
  let vehicles = [];
  let riverObjects = [];
  let homeBays = [];
  let particles = [];
  let frog = null;
  let timeLimit = 60;
  let timeRemaining = 60;
  let scoreFloat = null;

  const rowKinds = {
    0: 'home',
    1: 'river',
    2: 'river',
    3: 'river',
    4: 'river',
    5: 'river',
    6: 'riverbank',
    7: 'median',
    8: 'road',
    9: 'road',
    10: 'road',
    11: 'road',
    12: 'road',
    13: 'start',
    14: 'hudpad'
  };

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('frogger_best_r4_glm5') || '0', 10) || 0; } catch { return 0; }
  }

  function saveHighScore() {
    try { localStorage.setItem('frogger_best_r4_glm5', String(highScore)); } catch {}
  }

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      saveHighScore();
    }
  }

  function justPressed(code) {
    return !!keys[code] && !prevKeys[code];
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rowToY(row) {
    return FIELD_Y + row * CELL;
  }

  function yToRow(y) {
    return Math.floor((y - FIELD_Y) / CELL);
  }

  function resetFrog() {
    frog = {
      gridX: 7,
      gridY: 13,
      x: 7 * CELL + CELL / 2,
      y: rowToY(13) + CELL / 2,
      facing: 'up',
      alive: true,
      rideVX: 0,
      hopFlash: 0
    };
    timeRemaining = timeLimit;
  }

  function createHomeBays() {
    const centers = [1, 4, 7, 10, 13].map(c => c * CELL - CELL / 2);
    homeBays = centers.map((x, i) => ({ x, y: rowToY(0) + CELL / 2, occupied: false, fly: false, flyTimer: 0, index: i }));
  }

  function addVehicle(row, width, speed, color, offset) {
    vehicles.push({
      row,
      x: offset,
      y: rowToY(row),
      width,
      height: CELL,
      vx: speed,
      color
    });
  }

  function addRiverObject(row, kind, width, speed, offset, extra = {}) {
    riverObjects.push({
      row,
      kind,
      x: offset,
      y: rowToY(row),
      width,
      height: CELL,
      vx: speed,
      cycle: Math.random() * 8,
      surfaced: true,
      ...extra
    });
  }

  function buildLevel() {
    vehicles = [];
    riverObjects = [];
    particles = [];
    scoreFloat = null;

    const speedMul = 1 + Math.min((level - 1) * 0.1, 0.3);
    timeLimit = Math.max(45, 60 - (level - 1) * 5);

    createHomeBays();

    const vehicleRows = [
      { row: 12, width: 40, speed: -90 * speedMul, color: '#e53935', gap: 140 },
      { row: 11, width: 80, speed: 60 * speedMul, color: '#3949ab', gap: 180 },
      { row: 10, width: 40, speed: -140 * speedMul, color: '#fdd835', gap: 120 },
      { row: 9, width: 120, speed: 45 * speedMul, color: '#6d4c41', gap: 220 },
      { row: 8, width: 40, speed: -110 * speedMul, color: '#29b6f6', gap: 150 }
    ];

    vehicleRows.forEach(cfg => {
      for (let x = -cfg.width; x < W + cfg.gap; x += cfg.gap) {
        addVehicle(cfg.row, cfg.width, cfg.speed, cfg.color, x);
      }
    });

    addRiverObject(6, 'log', 80, -70 * speedMul, 20);
    addRiverObject(6, 'log', 80, -70 * speedMul, 220);
    addRiverObject(6, 'log', 80, -70 * speedMul, 420);

    addRiverObject(5, 'turtle', 120, 55 * speedMul, -10);
    addRiverObject(5, 'turtle', 120, 55 * speedMul, 220);
    addRiverObject(5, 'turtle', 120, 55 * speedMul, 450);

    addRiverObject(4, 'log', 120, -45 * speedMul, 0);
    addRiverObject(4, 'log', 120, -45 * speedMul, 240);
    addRiverObject(4, 'log', 120, -45 * speedMul, 480);

    addRiverObject(3, 'log', 40, -130 * speedMul, 30);
    addRiverObject(3, 'log', 40, -130 * speedMul, 180);
    addRiverObject(3, 'log', 40, -130 * speedMul, 330);
    addRiverObject(3, 'log', 40, -130 * speedMul, 480);

    addRiverObject(2, 'turtle', 120, 80 * speedMul, 10);
    addRiverObject(2, 'turtle', 120, 80 * speedMul, 220);
    addRiverObject(2, 'turtle', 120, 80 * speedMul, 430);

    addRiverObject(1, 'log', 80, 100 * speedMul, -20);
    addRiverObject(1, 'log', 80, 100 * speedMul, 180);
    addRiverObject(1, 'log', 80, 100 * speedMul, 380);

    resetFrog();
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    buildLevel();
    state = STATES.LEVEL_START;
    stateTimer = 1.5;
  }

  function moveFrog(dir) {
    if (state !== STATES.PLAYING || !frog.alive) return;
    let moved = false;
    if (dir === 'up' && frog.gridY > 0) {
      frog.gridY -= 1;
      frog.facing = 'up';
      score += 10;
      updateHighScore();
      moved = true;
    } else if (dir === 'down' && frog.gridY < 13) {
      frog.gridY += 1;
      frog.facing = 'down';
      moved = true;
    } else if (dir === 'left' && frog.gridX > 0) {
      frog.gridX -= 1;
      frog.facing = 'left';
      moved = true;
    } else if (dir === 'right' && frog.gridX < COLS - 1) {
      frog.gridX += 1;
      frog.facing = 'right';
      moved = true;
    }
    if (moved) {
      frog.x = frog.gridX * CELL + CELL / 2;
      frog.y = rowToY(frog.gridY) + CELL / 2;
      frog.hopFlash = 0.15;
      checkHomeBay();
    }
  }

  function spawnDeathParticles(x, y, color = '#00ff00') {
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 30 + Math.random() * 70;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.6, maxLife: 0.6, color });
    }
  }

  function killFrog(reason) {
    if (!frog.alive || state === STATES.DYING || state === STATES.GAME_OVER) return;
    frog.alive = false;
    state = STATES.DYING;
    stateTimer = 1.0;
    lives -= 1;
    spawnDeathParticles(frog.x, frog.y, reason === 'car' ? '#ff5555' : '#66ccff');
    if (lives <= 0) {
      state = STATES.GAME_OVER;
      updateHighScore();
    }
  }

  function completeBay(bay) {
    bay.occupied = true;
    const bonus = 50 + Math.floor(timeRemaining) * 10 + (bay.fly ? 200 : 0);
    score += bonus;
    updateHighScore();
    scoreFloat = { x: bay.x, y: bay.y, text: `+${bonus}`, life: 1.2 };
    bay.fly = false;

    if (homeBays.every(b => b.occupied)) {
      score += 1000;
      updateHighScore();
      state = STATES.LEVEL_COMPLETE;
      stateTimer = 2.0;
    } else {
      resetFrog();
    }
  }

  function checkHomeBay() {
    if (frog.gridY !== 0 || !frog.alive) return;
    for (const bay of homeBays) {
      if (Math.abs(frog.x - bay.x) < CELL * 0.55) {
        if (bay.occupied) {
          killFrog('occupied');
        } else {
          completeBay(bay);
        }
        return;
      }
    }
    killFrog('water');
  }

  function updateVehicles(dt) {
    for (const v of vehicles) {
      v.x += v.vx * dt;
      if (v.vx > 0 && v.x > W + 10) v.x = -v.width - 10;
      if (v.vx < 0 && v.x + v.width < -10) v.x = W + 10;
    }
  }

  function updateRiverObjects(dt) {
    for (const obj of riverObjects) {
      obj.x += obj.vx * dt;
      if (obj.vx > 0 && obj.x > W + 10) obj.x = -obj.width - 10;
      if (obj.vx < 0 && obj.x + obj.width < -10) obj.x = W + 10;
      if (obj.kind === 'turtle') {
        obj.cycle += dt;
        const t = obj.cycle % 6.5;
        obj.surfaced = !(t > 3.8 && t < 5.4);
        obj.warning = t > 3.1 && t <= 3.8;
      }
    }
  }

  function updateHomeFlies(dt) {
    homeBays.forEach(bay => {
      bay.flyTimer -= dt;
      if (bay.flyTimer <= 0) {
        bay.fly = !bay.occupied && Math.random() < 0.25;
        bay.flyTimer = 5 + Math.random() * 6;
      }
    });
  }

  function updateFrog(dt) {
    if (!frog.alive) return;
    frog.hopFlash = Math.max(0, frog.hopFlash - dt);
    frog.rideVX = 0;

    if (frog.gridY >= 8 && frog.gridY <= 12) {
      const frogLeft = frog.x - 16;
      const frogRight = frog.x + 16;
      for (const v of vehicles) {
        if (v.row !== frog.gridY) continue;
        if (frogRight > v.x && frogLeft < v.x + v.width) {
          killFrog('car');
          return;
        }
      }
    }

    if (frog.gridY >= 1 && frog.gridY <= 6) {
      let riding = null;
      for (const obj of riverObjects) {
        if (obj.row !== frog.gridY) continue;
        const safe = obj.kind === 'log' || (obj.kind === 'turtle' && obj.surfaced);
        if (frog.x > obj.x && frog.x < obj.x + obj.width) {
          if (!safe) {
            killFrog('water');
            return;
          }
          riding = obj;
          break;
        }
      }
      if (!riding) {
        killFrog('water');
        return;
      }
      frog.x += riding.vx * dt;
      frog.rideVX = riding.vx;
      frog.gridX = clamp(Math.floor(frog.x / CELL), 0, COLS - 1);
      if (frog.x < 12 || frog.x > W - 12) {
        killFrog('water');
      }
    }
  }

  function updateTimer(dt) {
    if (state !== STATES.PLAYING) return;
    timeRemaining -= dt;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      killFrog('timeout');
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (scoreFloat) {
      scoreFloat.y -= 18 * dt;
      scoreFloat.life -= dt;
      if (scoreFloat.life <= 0) scoreFloat = null;
    }
  }

  function update(dt) {
    updateParticles(dt);

    if (state === STATES.TITLE || state === STATES.PAUSED || state === STATES.GAME_OVER) return;

    updateVehicles(dt);
    updateRiverObjects(dt);
    updateHomeFlies(dt);

    if (state === STATES.LEVEL_START) {
      stateTimer -= dt;
      if (stateTimer <= 0) state = STATES.PLAYING;
      return;
    }

    if (state === STATES.DYING) {
      stateTimer -= dt;
      if (stateTimer <= 0 && lives > 0) {
        resetFrog();
        state = STATES.PLAYING;
      }
      return;
    }

    if (state === STATES.LEVEL_COMPLETE) {
      stateTimer -= dt;
      if (stateTimer <= 0) {
        level += 1;
        buildLevel();
        state = STATES.LEVEL_START;
        stateTimer = 1.5;
      }
      return;
    }

    updateFrog(dt);
    updateTimer(dt);
  }

  function drawBackground() {
    for (let row = 0; row < 14; row++) {
      const y = rowToY(row);
      let color = '#228B22';
      if (row >= 8 && row <= 12) color = '#333333';
      if (row >= 1 && row <= 6) color = '#1d57c8';
      if (row === 7 || row === 13 || row === 0) color = '#2e8b57';
      ctx.fillStyle = color;
      ctx.fillRect(0, y, W, CELL);

      if (row >= 8 && row <= 12) {
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        for (let x = 0; x < W; x += 60) ctx.fillRect(x, y + CELL / 2 - 2, 30, 4);
      }
      if (row >= 1 && row <= 6) {
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        for (let x = 0; x < W; x += 32) ctx.fillRect(x, y + 10 + (row % 2) * 5, 14, 2);
      }
    }
  }

  function drawHomeBays() {
    ctx.fillStyle = '#0d2c7a';
    ctx.fillRect(0, rowToY(0), W, CELL);
    for (let i = 0; i < 5; i++) {
      const bay = homeBays[i];
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath();
      ctx.arc(bay.x, bay.y, 16, 0, Math.PI * 2);
      ctx.fill();
      if (bay.fly) {
        ctx.fillStyle = '#ffff66';
        ctx.beginPath();
        ctx.arc(bay.x, bay.y - 8, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      if (bay.occupied) drawFrogSprite(bay.x, bay.y, 'up', false, true);
    }
  }

  function drawVehicles() {
    for (const v of vehicles) {
      ctx.fillStyle = v.color;
      ctx.fillRect(v.x, v.y + 6, v.width, CELL - 12);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(v.x + 6, v.y + 10, Math.min(v.width - 12, 24), 10);
      ctx.fillStyle = '#111';
      ctx.fillRect(v.x + 8, v.y + CELL - 12, 10, 6);
      ctx.fillRect(v.x + v.width - 18, v.y + CELL - 12, 10, 6);
    }
  }

  function drawLogsAndTurtles() {
    for (const obj of riverObjects) {
      if (obj.kind === 'log') {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(obj.x, obj.y + 8, obj.width, CELL - 16);
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let x = 8; x < obj.width; x += 20) ctx.fillRect(obj.x + x, obj.y + 10, 4, CELL - 20);
        ctx.beginPath();
        ctx.arc(obj.x, obj.y + CELL / 2, 12, Math.PI / 2, Math.PI * 1.5);
        ctx.arc(obj.x + obj.width, obj.y + CELL / 2, 12, -Math.PI / 2, Math.PI / 2);
        ctx.fillStyle = '#7a3a10';
        ctx.fill();
      } else {
        const alpha = obj.surfaced ? 1 : obj.warning ? 0.45 : 0.12;
        for (let i = 0; i < 3; i++) {
          const tx = obj.x + i * 40 + 20;
          ctx.fillStyle = `rgba(60,160,80,${alpha})`;
          ctx.beginPath();
          ctx.ellipse(tx, obj.y + 22, 14, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = `rgba(220,255,220,${alpha})`;
          ctx.beginPath();
          ctx.arc(tx + 8, obj.y + 14, 4, 0, Math.PI * 2);
          ctx.fill();
          if (obj.warning) {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(tx, obj.y + 6, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
  }

  function drawFrogSprite(x, y, facing, hopping, home = false) {
    ctx.save();
    ctx.translate(x, y);
    const rot = facing === 'up' ? 0 : facing === 'right' ? Math.PI / 2 : facing === 'down' ? Math.PI : -Math.PI / 2;
    ctx.rotate(rot);
    ctx.scale(1, hopping ? 1.12 : 1);
    ctx.fillStyle = home ? '#7CFC00' : '#00FF66';
    ctx.beginPath();
    ctx.ellipse(0, 4, 12, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -8, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-5, -13, 4, 0, Math.PI * 2);
    ctx.arc(5, -13, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-5, -13, 2, 0, Math.PI * 2);
    ctx.arc(5, -13, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFrog() {
    if (!frog) return;
    if (!frog.alive) return;
    drawFrogSprite(frog.x, frog.y, frog.facing, frog.hopFlash > 0);
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = `rgba(${hexToRgb(p.color)},${p.life / p.maxLife})`;
      ctx.fillRect(p.x, p.y, 4, 4);
    }
    if (scoreFloat) {
      ctx.fillStyle = `rgba(255,255,255,${scoreFloat.life})`;
      ctx.font = '18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(scoreFloat.text, scoreFloat.x, scoreFloat.y);
    }
  }

  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    const full = h.length === 3 ? h.split('').map(ch => ch + ch).join('') : h;
    const num = parseInt(full, 16);
    return `${(num >> 16) & 255},${(num >> 8) & 255},${num & 255}`;
  }

  function drawHUD() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE ${score}`, 10, 28);
    ctx.textAlign = 'center';
    ctx.fillText(`HIGH ${highScore}`, W / 2, 28);
    ctx.textAlign = 'right';
    ctx.fillText(`LEVEL ${level}`, W - 10, 28);

    const barX = 160;
    const barY = 34;
    const barW = 240;
    const ratio = timeRemaining / timeLimit;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, 10);
    ctx.fillStyle = ratio > 0.5 ? '#66ff66' : ratio > 0.25 ? '#ffcc33' : '#ff5555';
    ctx.fillRect(barX, barY, barW * clamp(ratio, 0, 1), 10);

    for (let i = 0; i < lives; i++) {
      drawFrogSprite(18 + i * 24, H - 18, 'up', false, true);
    }
  }

  function drawOverlay(title, lines, dim = true) {
    if (dim) {
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 42px Arial';
    ctx.fillText(title, W / 2, H / 2 - 80);
    ctx.font = '22px Arial';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + i * 32));
  }

  function render() {
    drawBackground();
    drawHomeBays();
    drawLogsAndTurtles();
    drawVehicles();
    drawFrog();
    drawParticles();
    drawHUD();

    if (state === STATES.TITLE) {
      drawOverlay('FROGGER', [
        'Press SPACE to start',
        'Arrow keys or WASD to hop',
        'Reach all 5 homes before time runs out',
        `High Score: ${highScore}`
      ], true);
    } else if (state === STATES.LEVEL_START) {
      drawOverlay(`LEVEL ${level}`, ['Get ready...'], true);
    } else if (state === STATES.LEVEL_COMPLETE) {
      drawOverlay('LEVEL COMPLETE!', ['+1000 level bonus', 'Prepare for the next crossing'], true);
    } else if (state === STATES.PAUSED) {
      drawOverlay('PAUSED', ['Press P or Escape to resume', 'Press R to restart'], true);
    } else if (state === STATES.GAME_OVER) {
      drawOverlay('GAME OVER', [
        `Final Score: ${score}`,
        'Press R to play again',
        'Press Escape for title'
      ], true);
    }
  }

  function handleInput() {
    if (justPressed('Space') && state === STATES.TITLE) startGame();

    if (state === STATES.PLAYING) {
      if (justPressed('ArrowUp') || justPressed('KeyW')) moveFrog('up');
      else if (justPressed('ArrowDown') || justPressed('KeyS')) moveFrog('down');
      else if (justPressed('ArrowLeft') || justPressed('KeyA')) moveFrog('left');
      else if (justPressed('ArrowRight') || justPressed('KeyD')) moveFrog('right');
    }

    if (justPressed('KeyP') || justPressed('Escape')) {
      if (state === STATES.PLAYING) state = STATES.PAUSED;
      else if (state === STATES.PAUSED) state = STATES.PLAYING;
      else if (state === STATES.GAME_OVER) state = STATES.TITLE;
    }

    if (justPressed('KeyR')) {
      if (state !== STATES.TITLE) startGame();
    }
  }

  function syncPrev() {
    const watched = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyP','Escape','KeyR'];
    for (const key of watched) prevKeys[key] = !!keys[key];
  }

  function frame(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(DT_CAP, (ts - lastTime) / 1000);
    lastTime = ts;

    handleInput();
    update(dt);
    render();
    syncPrev();
    requestAnimationFrame(frame);
  }

  window.addEventListener('keydown', (e) => {
    const handled = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyP','Escape','KeyR'];
    if (handled.includes(e.code)) e.preventDefault();
    keys[e.code] = true;
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  window.addEventListener('blur', () => {
    for (const key in keys) keys[key] = false;
  });

  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
