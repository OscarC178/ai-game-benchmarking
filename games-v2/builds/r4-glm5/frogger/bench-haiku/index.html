<!--
  GAME:      Frogger
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="froggerCanvas" width="560" height="650"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('froggerCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 560;
    const HEIGHT = 650;
    const CELL_SIZE = 40;
    const STATES = { TITLE: 0, LEVEL_START: 1, PLAYING: 2, PAUSED: 3, FROG_DEAD: 4, LEVEL_COMPLETE: 5, GAME_OVER: 6 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('froggerHighScore') || '0', 10);
    let lives = 3;
    let level = 1;
    let speedMult = 1;
    let stateTimer = 0;

    // Frog
    const frog = {
      x: WIDTH / 2,
      y: HEIGHT - CELL_SIZE,
      gridX: 7,
      gridY: 15,
      alive: true
    };

    // Vehicles
    let vehicles = [];

    // River objects (logs and turtles)
    let riverObjects = [];

    // Home bays
    const homeBays = [
      { x: 60, occupied: false },
      { x: 140, occupied: false },
      { x: 220, occupied: false },
      { x: 300, occupied: false },
      { x: 380, occupied: false }
    ];

    let timeRemaining = 60;
    let keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (!keys[key]) {
        keys[key] = true;

        if (gameState === STATES.TITLE && key === ' ') {
          e.preventDefault();
          startGame();
        } else if (gameState === STATES.PLAYING) {
          if (key === 'arrowup' || key === 'w') {
            e.preventDefault();
            moveFrog(0, -1);
          } else if (key === 'arrowdown' || key === 's') {
            e.preventDefault();
            moveFrog(0, 1);
          } else if (key === 'arrowleft' || key === 'a') {
            e.preventDefault();
            moveFrog(-1, 0);
          } else if (key === 'arrowright' || key === 'd') {
            e.preventDefault();
            moveFrog(1, 0);
          }
        }

        if (key === 'p' || key === 'escape') {
          if (gameState === STATES.PLAYING) {
            gameState = STATES.PAUSED;
          } else if (gameState === STATES.PAUSED) {
            gameState = STATES.PLAYING;
          }
        }

        if (key === 'r') {
          if (gameState !== STATES.TITLE) {
            startGame();
          }
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      speedMult = 1;
      homeBays.forEach(bay => bay.occupied = false);
      gameState = STATES.LEVEL_START;
      stateTimer = 120;
      initLevel();
    }

    function initLevel() {
      speedMult = 1 + (level - 1) * 0.1;
      timeRemaining = Math.max(30, 60 - level * 2);

      vehicles = [];
      riverObjects = [];

      // Road vehicles (rows 1-5, y: 40-240)
      // Row 1: cars left
      for (let i = 0; i < 3; i++) {
        vehicles.push({ x: i * 150, y: 50, width: 40, height: 30, vx: -1.5 * speedMult, row: 1 });
      }
      // Row 2: trucks right
      for (let i = 0; i < 2; i++) {
        vehicles.push({ x: i * 250, y: 90, width: 80, height: 30, vx: 0.8 * speedMult, row: 2 });
      }
      // Row 3: cars left
      for (let i = 0; i < 4; i++) {
        vehicles.push({ x: i * 140, y: 130, width: 40, height: 30, vx: -2 * speedMult, row: 3 });
      }
      // Row 4: trucks right
      for (let i = 0; i < 2; i++) {
        vehicles.push({ x: i * 280, y: 170, width: 120, height: 30, vx: 0.5 * speedMult, row: 4 });
      }
      // Row 5: cars left
      for (let i = 0; i < 3; i++) {
        vehicles.push({ x: i * 160, y: 210, width: 40, height: 30, vx: -1.8 * speedMult, row: 5 });
      }

      // River objects (rows 7-12, y: 280-520)
      // Row 7: logs left
      for (let i = 0; i < 3; i++) {
        riverObjects.push({ x: i * 200, y: 290, width: 80, height: 30, vx: -1 * speedMult, type: 'log', row: 7 });
      }
      // Row 8: turtles right
      for (let i = 0; i < 2; i++) {
        riverObjects.push({ x: i * 300, y: 330, width: 120, height: 30, vx: 0.8 * speedMult, type: 'turtle', row: 8, cycleTimer: i * 150, surfaced: true });
      }
      // Row 9: logs left
      for (let i = 0; i < 2; i++) {
        riverObjects.push({ x: i * 280, y: 370, width: 120, height: 30, vx: -0.5 * speedMult, type: 'log', row: 9 });
      }
      // Row 10: logs right
      for (let i = 0; i < 3; i++) {
        riverObjects.push({ x: i * 180, y: 410, width: 80, height: 30, vx: 1.5 * speedMult, type: 'log', row: 10 });
      }
      // Row 11: turtles left
      for (let i = 0; i < 2; i++) {
        riverObjects.push({ x: i * 300, y: 450, width: 120, height: 30, vx: -1 * speedMult, type: 'turtle', row: 11, cycleTimer: i * 150, surfaced: true });
      }
      // Row 12: logs right
      for (let i = 0; i < 2; i++) {
        riverObjects.push({ x: i * 280, y: 490, width: 120, height: 30, vx: 1.2 * speedMult, type: 'log', row: 12 });
      }

      spawnFrog();
    }

    function spawnFrog() {
      frog.x = WIDTH / 2;
      frog.y = HEIGHT - CELL_SIZE;
      frog.gridX = Math.floor(frog.x / CELL_SIZE);
      frog.gridY = 15;
      frog.alive = true;
      timeRemaining = Math.max(30, 60 - level * 2);
    }

    function moveFrog(dx, dy) {
      const newGridX = frog.gridX + dx;
      const newGridY = frog.gridY + dy;

      if (newGridX >= 0 && newGridX < 14 && newGridY >= 0 && newGridY <= 15) {
        frog.gridX = newGridX;
        frog.gridY = newGridY;
        frog.x = frog.gridX * CELL_SIZE + CELL_SIZE / 2;
        frog.y = frog.gridY * CELL_SIZE + CELL_SIZE / 2;

        if (newGridY < 15 || frog.gridX > 0) {
          score += 10;
        }

        checkCollisions();
      }
    }

    function checkCollisions() {
      // Check if in road (rows 1-5)
      if (frog.gridY >= 1 && frog.gridY <= 5) {
        for (let vehicle of vehicles) {
          if (Math.abs(frog.y - vehicle.y - 15) < 30) {
            if (frog.x > vehicle.x && frog.x < vehicle.x + vehicle.width) {
              frogDeath();
              return;
            }
          }
        }
      }

      // Check if in river (rows 7-12)
      if (frog.gridY >= 7 && frog.gridY <= 12) {
        let onSomething = false;

        for (let obj of riverObjects) {
          if (Math.abs(frog.y - obj.y - 15) < 30) {
            if (frog.x > obj.x && frog.x < obj.x + obj.width) {
              if (obj.type === 'log' || obj.surfaced) {
                onSomething = true;
              } else {
                frogDeath();
                return;
              }
            }
          }
        }

        if (!onSomething) {
          frogDeath();
          return;
        }
      }

      // Check if reached home bay
      if (frog.gridY === 0) {
        for (let bay of homeBays) {
          if (Math.abs(frog.x - bay.x) < CELL_SIZE) {
            if (!bay.occupied) {
              bay.occupied = true;
              score += 50 + Math.floor(timeRemaining * 10);
              spawnFrog();
              checkLevelComplete();
            } else {
              frogDeath();
            }
            return;
          }
        }
        frogDeath();
      }
    }

    function checkLevelComplete() {
      if (homeBays.every(bay => bay.occupied)) {
        level++;
        score += 1000;
        gameState = STATES.LEVEL_COMPLETE;
        stateTimer = 120;
      }
    }

    function frogDeath() {
      frog.alive = false;
      lives--;
      if (lives <= 0) {
        gameState = STATES.GAME_OVER;
      } else {
        gameState = STATES.FROG_DEAD;
        stateTimer = 60;
      }
    }

    function update() {
      if (gameState === STATES.TITLE) return;

      if (gameState === STATES.LEVEL_START) {
        stateTimer--;
        if (stateTimer <= 0) {
          gameState = STATES.PLAYING;
        }
        return;
      }

      if (gameState === STATES.PLAYING) {
        // Update timer
        timeRemaining -= 1 / 60;
        if (timeRemaining <= 0) {
          frogDeath();
          return;
        }

        // Update vehicles
        for (let vehicle of vehicles) {
          vehicle.x += vehicle.vx;
          if (vehicle.vx > 0 && vehicle.x > WIDTH) {
            vehicle.x = -vehicle.width;
          } else if (vehicle.vx < 0 && vehicle.x + vehicle.width < 0) {
            vehicle.x = WIDTH;
          }
        }

        // Update river objects
        let frogOnObj = null;
        for (let obj of riverObjects) {
          obj.x += obj.vx;
          if (obj.vx > 0 && obj.x > WIDTH) {
            obj.x = -obj.width;
          } else if (obj.vx < 0 && obj.x + obj.width < 0) {
            obj.x = WIDTH;
          }

          // Update turtle diving
          if (obj.type === 'turtle') {
            obj.cycleTimer++;
            if (obj.cycleTimer > 300) obj.cycleTimer = 0;
            obj.surfaced = obj.cycleTimer < 240;
          }

          // Move frog with river object
          if (frog.gridY >= 7 && frog.gridY <= 12) {
            if (Math.abs(frog.y - obj.y - 15) < 30) {
              if (frog.x > obj.x && frog.x < obj.x + obj.width) {
                if (obj.type === 'log' || obj.surfaced) {
                  frog.x += obj.vx;
                  frogOnObj = obj;
                } else {
                  frogDeath();
                  return;
                }
              }
            }
          }
        }

        // Check if frog carried off screen
        if (frog.x < -CELL_SIZE / 2 || frog.x > WIDTH + CELL_SIZE / 2) {
          frogDeath();
          return;
        }

        // Check vehicle collisions
        for (let vehicle of vehicles) {
          if (frog.gridY >= 1 && frog.gridY <= 5) {
            if (Math.abs(frog.y - vehicle.y - 15) < 30) {
              if (frog.x > vehicle.x && frog.x < vehicle.x + vehicle.width) {
                frogDeath();
                return;
              }
            }
          }
        }

        // Check if in water but not on object
        if (frog.gridY >= 7 && frog.gridY <= 12 && !frogOnObj) {
          let onSomething = false;
          for (let obj of riverObjects) {
            if (Math.abs(frog.y - obj.y - 15) < 30) {
              if (frog.x > obj.x && frog.x < obj.x + obj.width) {
                if (obj.type === 'log' || obj.surfaced) {
                  onSomething = true;
                } else {
                  frogDeath();
                  return;
                }
              }
            }
          }
          if (!onSomething) {
            frogDeath();
            return;
          }
        }

        if (score > highScore) {
          highScore = score;
          localStorage.setItem('froggerHighScore', highScore);
        }
      }

      if (gameState === STATES.FROG_DEAD) {
        stateTimer--;
        if (stateTimer <= 0) {
          spawnFrog();
          gameState = STATES.PLAYING;
        }
      }

      if (gameState === STATES.LEVEL_COMPLETE) {
        stateTimer--;
        if (stateTimer <= 0) {
          homeBays.forEach(bay => bay.occupied = false);
          initLevel();
          gameState = STATES.LEVEL_START;
          stateTimer = 120;
        }
      }
    }

    function render() {
      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, 0, WIDTH, 40);

      ctx.fillStyle = '#333333';
      for (let i = 1; i <= 5; i++) {
        ctx.fillRect(0, i * 40, WIDTH, 40);
      }

      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, 240, WIDTH, 40);

      ctx.fillStyle = '#0000AA';
      for (let i = 7; i <= 12; i++) {
        ctx.fillRect(0, i * 40, WIDTH, 40);
      }

      // Draw vehicles
      ctx.fillStyle = '#FF0000';
      for (let vehicle of vehicles) {
        ctx.fillRect(vehicle.x, vehicle.y, vehicle.width, vehicle.height);
      }

      // Draw river objects
      ctx.fillStyle = '#8B4513';
      for (let obj of riverObjects) {
        if (obj.type === 'log') {
          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
      }

      ctx.fillStyle = '#228B22';
      for (let obj of riverObjects) {
        if (obj.type === 'turtle' && obj.surfaced) {
          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
      }

      // Draw home bays
      ctx.fillStyle = '#00FF00';
      for (let bay of homeBays) {
        ctx.fillRect(bay.x - 15, 10, 30, 30);
        if (bay.occupied) {
          ctx.fillStyle = '#00AA00';
          ctx.fillRect(bay.x - 10, 15, 20, 20);
          ctx.fillStyle = '#00FF00';
        }
      }

      // Draw frog
      if (frog.alive) {
        ctx.fillStyle = '#00FF00';
        ctx.beginPath();
        ctx.arc(frog.x, frog.y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(frog.x - 5, frog.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(frog.x + 5, frog.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw UI
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, HEIGHT - 10);
      ctx.textAlign = 'center';
      ctx.fillText('Level: ' + level, WIDTH / 2, HEIGHT - 10);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, HEIGHT - 10);

      ctx.fillStyle = '#FFFF00';
      ctx.fillText('Time: ' + Math.ceil(timeRemaining), WIDTH / 2, 630);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('FROGGER', WIDTH / 2, 200);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 320);
        ctx.fillText('← → ↑ ↓ to move', WIDTH / 2, 360);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 30);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, HEIGHT / 2 + 30);
      } else if (gameState === STATES.LEVEL_START) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + level, WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.LEVEL_COMPLETE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 28px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL COMPLETE', WIDTH / 2, HEIGHT / 2 - 30);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, HEIGHT / 2 + 30);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 330);

        ctx.font = '16px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
