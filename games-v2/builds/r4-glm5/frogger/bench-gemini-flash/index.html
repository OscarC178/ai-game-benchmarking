<!--
  GAME:      Frogger
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="560" height="650"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constants
        const GRID = 40;
        const WIDTH = 560;
        const HEIGHT = 650;
        const TIME_LIMIT = 60;

        // Colors
        const GRASS = '#228B22';
        const ROAD = '#333333';
        const RIVER = '#0000AA';
        const FROG_COLOR = '#00FF00';

        // Game State
        let state = 'TITLE'; // TITLE, PLAYING, PAUSED, DEATH, LEVEL_UP, GAMEOVER
        let score = 0;
        let highScore = parseInt(localStorage.getItem('frogger_highscore')) || 0;
        let lives = 3;
        let level = 1;
        let timeRemaining = TIME_LIMIT;
        let homeBays = [];
        let lastTime = 0;

        const frog = {
            x: WIDTH / 2,
            y: HEIGHT - GRID * 1.5,
            gridX: 7,
            gridY: 14,
            facing: 'up',
            w: 30,
            h: 30,
            onObject: null,
            moving: false
        };

        const vehicles = [];
        const riverObjects = [];

        function initHomeBays() {
            homeBays = [];
            for (let i = 0; i < 5; i++) {
                homeBays.push({
                    x: 40 + i * 110,
                    y: 50,
                    occupied: false
                });
            }
        }

        function initLanes() {
            vehicles.length = 0;
            riverObjects.length = 0;

            // Road Lanes (Indices 1-5 from bottom)
            addRoadLane(1, 'car', 40, -1.5, '#CC0000', 150);
            addRoadLane(2, 'truck', 80, 1.0, '#CCCC00', 200);
            addRoadLane(3, 'car', 40, -2.5, '#00CCCC', 120);
            addRoadLane(4, 'truck', 120, 0.8, '#FF8800', 250);
            addRoadLane(5, 'car', 40, -2.0, '#FFFFFF', 180);

            // River Lanes (Indices 7-12 from bottom)
            addRiverLane(7, 'log', 80, -1.2, '#8B4513', 180);
            addRiverLane(8, 'turtle', 120, 0.8, '#008800', 220, true);
            addRiverLane(9, 'log', 160, -0.6, '#8B4513', 280);
            addRiverLane(10, 'log', 80, 1.5, '#8B4513', 160);
            addRiverLane(11, 'turtle', 80, -1.0, '#008800', 200, true);
            addRiverLane(12, 'log', 120, 1.2, '#8B4513', 200);
        }

        function addRoadLane(idx, type, w, speed, color, spacing) {
            const y = HEIGHT - (idx + 1) * GRID - GRID/2;
            const count = Math.ceil(WIDTH / spacing) + 1;
            for (let i = 0; i < count; i++) {
                vehicles.push({
                    x: i * spacing,
                    y: y + (GRID - GRID * 0.8) / 2,
                    w: w,
                    h: GRID * 0.8,
                    speed: speed * (1 + (level-1) * 0.1),
                    color: color,
                    type: type
                });
            }
        }

        function addRiverLane(idx, type, w, speed, color, spacing, diving = false) {
            const y = HEIGHT - (idx + 1) * GRID - GRID/2;
            const count = Math.ceil(WIDTH / spacing) + 1;
            for (let i = 0; i < count; i++) {
                riverObjects.push({
                    x: i * spacing,
                    y: y,
                    w: w,
                    h: GRID,
                    speed: speed * (1 + (level-1) * 0.1),
                    color: color,
                    type: type,
                    diving: diving,
                    cycle: Math.random() * 300,
                    surfaced: true,
                    row: 14 - idx
                });
            }
        }

        function resetFrog() {
            frog.gridX = 7;
            frog.gridY = 14;
            frog.x = WIDTH / 2;
            frog.y = HEIGHT - GRID * 1.5;
            frog.facing = 'up';
            timeRemaining = TIME_LIMIT;
            frog.onObject = null;
        }

        function initGame() {
            score = 0;
            lives = 3;
            level = 1;
            initHomeBays();
            initLanes();
            resetFrog();
            state = 'PLAYING';
        }

        // Input
        window.addEventListener('keydown', e => {
            if (state === 'TITLE' || state === 'GAMEOVER') {
                if (e.code === 'Space') initGame();
                return;
            }
            if (state === 'PLAYING') {
                if (e.code === 'ArrowUp' || e.code === 'KeyW') moveFrog('up');
                else if (e.code === 'ArrowDown' || e.code === 'KeyS') moveFrog('down');
                else if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveFrog('left');
                else if (e.code === 'ArrowRight' || e.code === 'KeyD') moveFrog('right');
                else if (e.code === 'KeyP' || e.code === 'Escape') state = 'PAUSED';
            } else if (state === 'PAUSED') {
                if (e.code === 'KeyP' || e.code === 'Escape' || e.code === 'Space') state = 'PLAYING';
                if (e.code === 'KeyR') initGame();
            }
        });

        function moveFrog(dir) {
            switch(dir) {
                case 'up':
                    if (frog.gridY > 1) {
                        frog.gridY--;
                        frog.y -= GRID;
                        frog.facing = 'up';
                        score += 10;
                    }
                    break;
                case 'down':
                    if (frog.gridY < 14) {
                        frog.gridY++;
                        frog.y += GRID;
                        frog.facing = 'down';
                    }
                    break;
                case 'left':
                    if (frog.gridX > 0) {
                        frog.gridX--;
                        frog.x -= GRID;
                        frog.facing = 'left';
                    }
                    break;
                case 'right':
                    if (frog.gridX < 13) {
                        frog.gridX++;
                        frog.x += GRID;
                        frog.facing = 'right';
                    }
                    break;
            }
            checkHomeBay();
        }

        function checkHomeBay() {
            if (frog.gridY === 1) {
                let hit = false;
                for (let bay of homeBays) {
                    if (!bay.occupied && Math.abs(frog.x - bay.x) < GRID / 2) {
                        bay.occupied = true;
                        score += 50 + Math.floor(timeRemaining) * 10;
                        hit = true;
                        if (homeBays.every(b => b.occupied)) {
                            state = 'LEVEL_UP';
                            setTimeout(() => {
                                level++;
                                initHomeBays();
                                initLanes();
                                resetFrog();
                                state = 'PLAYING';
                            }, 1500);
                        } else {
                            resetFrog();
                        }
                        break;
                    }
                }
                if (!hit) die();
            }
        }

        function die() {
            lives--;
            state = 'DEATH';
            setTimeout(() => {
                if (lives <= 0) {
                    state = 'GAMEOVER';
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('frogger_highscore', highScore);
                    }
                } else {
                    resetFrog();
                    state = 'PLAYING';
                }
            }, 1000);
        }

        // Logic
        function update(currentTime) {
            const dt = (currentTime - lastTime) / 16.67;
            lastTime = currentTime;

            if (state !== 'PLAYING') return;

            timeRemaining -= (16.67 * dt) / 1000;
            if (timeRemaining <= 0) die();

            // Move entities
            vehicles.forEach(v => {
                v.x += v.speed * dt;
                if (v.speed > 0 && v.x > WIDTH) v.x = -v.w;
                if (v.speed < 0 && v.x < -v.w) v.x = WIDTH;
            });

            riverObjects.forEach(r => {
                r.x += r.speed * dt;
                if (r.speed > 0 && r.x > WIDTH) r.x = -r.w;
                if (r.speed < 0 && r.x < -r.w) r.x = WIDTH;

                if (r.diving) {
                    r.cycle = (r.cycle + dt) % 300;
                    r.surfaced = r.cycle < 200;
                }
            });

            // Collision Detection
            // Road
            if (frog.gridY >= 9 && frog.gridY <= 13) {
                for (let v of vehicles) {
                    if (frog.x + frog.w/2 > v.x && frog.x - frog.w/2 < v.x + v.w &&
                        Math.abs(frog.y + GRID/2 - (v.y + v.h/2)) < GRID/2) {
                        die();
                        return;
                    }
                }
            }

            // River
            if (frog.gridY >= 2 && frog.gridY <= 7) {
                let onObject = false;
                for (let r of riverObjects) {
                    if (r.row === frog.gridY) {
                        if (frog.x > r.x && frog.x < r.x + r.w) {
                            if (r.surfaced) {
                                frog.x += r.speed * dt;
                                onObject = true;
                                break;
                            } else {
                                die(); // Drowned on diving turtle
                                return;
                            }
                        }
                    }
                }
                if (!onObject) die(); // In water
                if (frog.x < 0 || frog.x > WIDTH) die(); // Carried off screen
            }
        }

        // Render
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Draw Lanes
            // Grass
            ctx.fillStyle = GRASS;
            ctx.fillRect(0, HEIGHT - GRID, WIDTH, GRID); // Start
            ctx.fillRect(0, HEIGHT - GRID * 7, WIDTH, GRID); // Median
            ctx.fillRect(0, 0, WIDTH, GRID * 2); // Top

            // Road
            ctx.fillStyle = ROAD;
            ctx.fillRect(0, HEIGHT - GRID * 6, WIDTH, GRID * 5);

            // River
            ctx.fillStyle = RIVER;
            ctx.fillRect(0, GRID * 2, WIDTH, GRID * 6);

            // Home Bays
            homeBays.forEach(bay => {
                ctx.fillStyle = bay.occupied ? GRASS : RIVER;
                ctx.fillRect(bay.x - 20, 45, 40, 40);
                if (bay.occupied) drawFrogSprite(bay.x, 65, 'up', 0.8);
            });

            // Road objects
            vehicles.forEach(v => {
                ctx.fillStyle = v.color;
                ctx.roundRect(v.x, v.y, v.w, v.h, 5);
                ctx.fill();
            });

            // River objects
            riverObjects.forEach(r => {
                if (r.type === 'log') {
                    ctx.fillStyle = r.color;
                    ctx.fillRect(r.x, r.y + 5, r.w, r.h - 10);
                } else if (r.type === 'turtle') {
                    if (r.surfaced) {
                        ctx.fillStyle = r.color;
                        for (let i = 0; i < 3; i++) {
                            ctx.beginPath();
                            ctx.arc(r.x + 20 + i * 40, r.y + 20, 18, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    } else if (r.cycle > 180 || r.cycle < 220) {
                        ctx.strokeStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.arc(r.x + 60, r.y + 20, 10, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            });

            // UI
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 30);
            ctx.textAlign = 'center';
            ctx.fillText(`LEVEL: ${level}`, WIDTH / 2, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`HIGH: ${highScore}`, WIDTH - 10, 30);

            // Timer
            const timerW = (WIDTH - 40) * (timeRemaining / TIME_LIMIT);
            ctx.fillStyle = timeRemaining < 10 ? '#F00' : '#0F0';
            ctx.fillRect(20, HEIGHT - 25, timerW, 10);

            // Lives
            for (let i = 0; i < lives; i++) {
                drawFrogSprite(20 + i * 30, HEIGHT - 45, 'up', 0.5);
            }

            // Frog
            if (state !== 'DEATH') {
                drawFrogSprite(frog.x, frog.y, frog.facing);
            } else {
                ctx.fillStyle = '#F00';
                ctx.font = 'bold 30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('X', frog.x, frog.y + 15);
            }

            // Overlays
            if (state === 'TITLE') overlay('FROGGER', 'PRESS SPACE TO START');
            if (state === 'PAUSED') overlay('PAUSED', 'PRESS SPACE TO RESUME');
            if (state === 'GAMEOVER') overlay('GAME OVER', `SCORE: ${score} - PRESS SPACE`);
            if (state === 'LEVEL_UP') overlay('LEVEL COMPLETE!', 'PREPARING NEXT...');
        }

        function drawFrogSprite(x, y, facing, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            const rot = { 'up': 0, 'down': Math.PI, 'left': -Math.PI/2, 'right': Math.PI/2 }[facing];
            ctx.rotate(rot);
            
            ctx.fillStyle = FROG_COLOR;
            // Body
            ctx.beginPath();
            ctx.ellipse(0, 0, 15, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.beginPath(); ctx.arc(-8, -10, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(8, -10, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(-8, -11, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(8, -11, 2, 0, Math.PI * 2); ctx.fill();
            
            ctx.restore();
        }

        function overlay(t1, t2) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 50px Courier New';
            ctx.fillText(t1, WIDTH/2, HEIGHT/2 - 30);
            ctx.font = '20px Courier New';
            ctx.fillText(t2, WIDTH/2, HEIGHT/2 + 20);
        }

        function loop(t) {
            update(t);
            draw();
            requestAnimationFrame(loop);
        }

        initHomeBays();
        initLanes();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
