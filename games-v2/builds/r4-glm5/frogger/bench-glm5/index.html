<!--
  GAME:      Frogger
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 560;
    const H = 650;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_PLAYER_DEAD = 3;
    const STATE_GAMEOVER = 4;
    const STATE_LEVEL_COMPLETE = 5;
    
    // Colors
    const COLORS = {
      grass: '#228B22',
      road: '#333333',
      river: '#1E90FF',
      log: '#8B4513',
      turtle: '#2E8B57',
      car: '#FF4444',
      truck: '#666666',
      frog: '#00FF00',
      frogDark: '#008800',
      lilyPad: '#00AA00',
      text: '#FFFFFF',
      timerBg: '#333333',
      timerGreen: '#00FF00',
      timerYellow: '#FFFF00',
      timerRed: '#FF0000'
    };
    
    // Grid settings
    const CELL_SIZE = 40;
    const COLS = Math.floor(W / CELL_SIZE);
    const ROWS = 16;
    
    // Time settings
    const TIME_LIMIT = 60;
    const LIVES = 3;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('frogger_highscore') || '0');
    let lives = LIVES;
    let level = 1;
    let timeRemaining = TIME_LIMIT;
    
    let frog = null;
    let vehicles = [];
    let logs = [];
    let turtles = [];
    let homeBays = [];
    
    let deathTimer = 0;
    let levelTimer = 0;
    
    const keys = {};
    let keyProcessed = false;
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      frog = {
        x: W / 2,
        y: H - CELL_SIZE / 2 - 10,
        gridY: ROWS,
        facing: 'up',
        alive: true,
        riding: null
      };
      
      vehicles = [];
      logs = [];
      turtles = [];
      homeBays = [];
      
      score = 0;
      lives = LIVES;
      level = 1;
      timeRemaining = TIME_LIMIT;
      
      initVehicles();
      initRiver();
      initHomeBays();
    }
    
    function initLevel() {
      frog.x = W / 2;
      frog.y = H - CELL_SIZE / 2 - 10;
      frog.gridY = ROWS;
      frog.facing = 'up';
      frog.alive = true;
      frog.riding = null;
      
      timeRemaining = Math.max(TIME_LIMIT - (level - 1) * 5, 30);
      
      initVehicles();
      initRiver();
      
      // Reset home bays but keep occupied state if any
      for (let i = 0; i < homeBays.length; i++) {
        homeBays[i].occupied = false;
      }
    }
    
    function initVehicles() {
      vehicles = [];
      const speedMult = 1 + (level - 1) * 0.1;
      
      // Lane configurations: [row, direction, speed, type, count]
      const lanes = [
        { row: 1, dir: -1, speed: 1.5 * speedMult, type: 'car', count: 3, width: 40 },
        { row: 2, dir: 1, speed: 1 * speedMult, type: 'truck', count: 2, width: 80 },
        { row: 3, dir: -1, speed: 2.5 * speedMult, type: 'car', count: 3, width: 40 },
        { row: 4, dir: 1, speed: 0.7 * speedMult, type: 'truck', count: 2, width: 120 },
        { row: 5, dir: -1, speed: 2 * speedMult, type: 'car', count: 4, width: 40 }
      ];
      
      for (const lane of lanes) {
        const y = H - CELL_SIZE - lane.row * CELL_SIZE;
        const spacing = W / lane.count;
        
        for (let i = 0; i < lane.count; i++) {
          vehicles.push({
            x: i * spacing + Math.random() * 50,
            y: y,
            width: lane.width,
            height: CELL_SIZE - 4,
            vx: lane.speed * lane.dir,
            type: lane.type,
            color: lane.type === 'car' ? getRandomCarColor() : COLORS.truck
          });
        }
      }
    }
    
    function getRandomCarColor() {
      const colors = ['#FF4444', '#FFAA00', '#4444FF', '#FFFFFF', '#FF00FF'];
      return colors[Math.floor(Math.random() * colors.length)];
    }
    
    function initRiver() {
      logs = [];
      turtles = [];
      const speedMult = 1 + (level - 1) * 0.1;
      
      // Log configurations: [row, direction, speed, width, count]
      const logLanes = [
        { row: 7, dir: -1, speed: 1 * speedMult, width: 80, count: 3 },
        { row: 9, dir: -1, speed: 0.7 * speedMult, width: 120, count: 2 },
        { row: 11, dir: 1, speed: 1.2 * speedMult, width: 80, count: 3 },
        { row: 13, dir: -1, speed: 0.8 * speedMult, width: 120, count: 2 }
      ];
      
      for (const lane of logLanes) {
        const y = H - CELL_SIZE - lane.row * CELL_SIZE;
        const spacing = W / lane.count + 60;
        
        for (let i = 0; i < lane.count; i++) {
          logs.push({
            x: i * spacing,
            y: y,
            width: lane.width,
            height: CELL_SIZE - 4,
            vx: lane.speed * lane.dir,
            row: lane.row
          });
        }
      }
      
      // Turtle configurations
      const turtleLanes = [
        { row: 8, dir: 1, speed: 0.8 * speedMult, count: 3, diving: true },
        { row: 10, dir: 1, speed: 1 * speedMult, count: 3, diving: false },
        { row: 12, dir: -1, speed: 0.6 * speedMult, count: 2, diving: true }
      ];
      
      for (const lane of turtleLanes) {
        const y = H - CELL_SIZE - lane.row * CELL_SIZE;
        const spacing = W / lane.count + 80;
        
        for (let i = 0; i < lane.count; i++) {
          turtles.push({
            x: i * spacing,
            y: y,
            width: 100,
            height: CELL_SIZE - 4,
            vx: lane.speed * lane.dir,
            row: lane.row,
            diving: lane.diving,
            cycleTimer: Math.random() * 300,
            surfaced: true,
            divePhase: 0
          });
        }
      }
    }
    
    function initHomeBays() {
      homeBays = [];
      const bayPositions = [40, 140, 240, 340, 440];
      
      for (let i = 0; i < 5; i++) {
        homeBays.push({
          x: bayPositions[i],
          y: 20,
          width: CELL_SIZE,
          height: CELL_SIZE,
          occupied: false
        });
      }
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_PLAYER_DEAD) {
        deathTimer -= dtMs;
        if (deathTimer <= 0) {
          if (lives > 0) {
            respawnFrog();
            state = STATE_PLAYING;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('frogger_highscore', highScore);
            }
          }
        }
        updateVehicles(dt);
        updateLogs(dt);
        updateTurtles(dt);
        return;
      }
      
      if (state === STATE_LEVEL_COMPLETE) {
        levelTimer -= dtMs;
        if (levelTimer <= 0) {
          level++;
          initLevel();
          state = STATE_PLAYING;
        }
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Timer
      timeRemaining -= dt;
      if (timeRemaining <= 0) {
        killFrog('timeout');
        return;
      }
      
      // Input
      handleInput();
      
      // Update objects
      updateVehicles(dt);
      updateLogs(dt);
      updateTurtles(dt);
      
      // Check collisions
      checkCollisions();
      
      // Update frog position based on riding
      if (frog.riding) {
        frog.x += frog.riding.vx;
        if (frog.x < -CELL_SIZE / 2 || frog.x > W + CELL_SIZE / 2) {
          killFrog('drowned');
        }
      }
    }
    
    function handleInput() {
      if (keyProcessed) return;
      
      let moved = false;
      
      if (keys.up || keys.ArrowUp || keys.KeyW) {
        frog.y -= CELL_SIZE;
        frog.gridY--;
        frog.facing = 'up';
        score += 10;
        moved = true;
      } else if (keys.down || keys.ArrowDown || keys.KeyS) {
        if (frog.y < H - CELL_SIZE / 2 - 10) {
          frog.y += CELL_SIZE;
          frog.gridY++;
          frog.facing = 'down';
          moved = true;
        }
      } else if (keys.left || keys.ArrowLeft || keys.KeyA) {
        frog.x -= CELL_SIZE;
        frog.facing = 'left';
        moved = true;
      } else if (keys.right || keys.ArrowRight || keys.KeyD) {
        frog.x += CELL_SIZE;
        frog.facing = 'right';
        moved = true;
      }
      
      if (moved) {
        keyProcessed = true;
        frog.riding = null;
        
        // Clamp position
        frog.x = Math.max(CELL_SIZE / 2, Math.min(W - CELL_SIZE / 2, frog.x));
        
        // Check home bay
        if (frog.gridY <= 0) {
          checkHomeBay();
        }
      }
    }
    
    function updateVehicles(dt) {
      for (const v of vehicles) {
        v.x += v.vx;
        
        // Wrap around
        if (v.vx > 0 && v.x > W + 50) {
          v.x = -v.width - 50;
        } else if (v.vx < 0 && v.x + v.width < -50) {
          v.x = W + 50;
        }
      }
    }
    
    function updateLogs(dt) {
      for (const log of logs) {
        log.x += log.vx;
        
        // Wrap around
        if (log.vx > 0 && log.x > W + 50) {
          log.x = -log.width - 50;
        } else if (log.vx < 0 && log.x + log.width < -50) {
          log.x = W + 50;
        }
      }
    }
    
    function updateTurtles(dt) {
      for (const turtle of turtles) {
        turtle.x += turtle.vx;
        
        // Wrap around
        if (turtle.vx > 0 && turtle.x > W + 50) {
          turtle.x = -turtle.width - 50;
        } else if (turtle.vx < 0 && turtle.x + turtle.width < -50) {
          turtle.x = W + 50;
        }
        
        // Diving cycle
        if (turtle.diving) {
          turtle.cycleTimer++;
          
          const cycleLength = 300;
          const diveStart = 200;
          const diveEnd = 280;
          
          if (turtle.cycleTimer >= cycleLength) {
            turtle.cycleTimer = 0;
          }
          
          if (turtle.cycleTimer < diveStart) {
            turtle.surfaced = true;
            turtle.divePhase = 0;
          } else if (turtle.cycleTimer < diveStart + 20) {
            turtle.surfaced = true;
            turtle.divePhase = 1; // Warning
          } else if (turtle.cycleTimer < diveEnd) {
            turtle.surfaced = false;
            turtle.divePhase = 2; // Underwater
          } else {
            turtle.surfaced = true;
            turtle.divePhase = 1; // Resurfacing
          }
        }
      }
    }
    
    function checkCollisions() {
      // Road collision
      const frogRow = getFrogRow();
      
      if (frogRow >= 1 && frogRow <= 5) {
        // On road
        for (const v of vehicles) {
          if (rectIntersect(
            { x: frog.x - CELL_SIZE / 2, y: frog.y - CELL_SIZE / 2, width: CELL_SIZE - 4, height: CELL_SIZE - 4 },
            v
          )) {
            killFrog('squished');
            return;
          }
        }
      }
      
      // River collision
      if (frogRow >= 7 && frogRow <= 13) {
        // On river
        let onSafeObject = false;
        frog.riding = null;
        
        // Check logs
        for (const log of logs) {
          if (frogRow === log.row && frogOnObject(log)) {
            onSafeObject = true;
            frog.riding = log;
            break;
          }
        }
        
        // Check turtles
        if (!onSafeObject) {
          for (const turtle of turtles) {
            if (frogRow === turtle.row && frogOnObject(turtle)) {
              if (turtle.surfaced) {
                onSafeObject = true;
                frog.riding = turtle;
              } else {
                killFrog('drowned');
                return;
              }
              break;
            }
          }
        }
        
        if (!onSafeObject) {
          killFrog('drowned');
          return;
        }
      }
    }
    
    function getFrogRow() {
      return Math.floor((H - frog.y - CELL_SIZE / 2 + 10) / CELL_SIZE);
    }
    
    function frogOnObject(obj) {
      return frog.x > obj.x - 5 && frog.x < obj.x + obj.width + 5;
    }
    
    function rectIntersect(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }
    
    function checkHomeBay() {
      for (const bay of homeBays) {
        if (Math.abs(frog.x - bay.x - bay.width / 2) < CELL_SIZE / 2) {
          if (!bay.occupied) {
            // Success!
            bay.occupied = true;
            score += 50 + Math.floor(timeRemaining) * 10;
            timeRemaining = Math.max(TIME_LIMIT - (level - 1) * 5, 30);
            
            // Check level complete
            if (homeBays.every(b => b.occupied)) {
              score += 1000;
              state = STATE_LEVEL_COMPLETE;
              levelTimer = 2000;
              return;
            }
            
            respawnFrog();
            return;
          }
        }
      }
      
      // Not in a bay - drowned
      killFrog('drowned');
    }
    
    function killFrog(reason) {
      frog.alive = false;
      lives--;
      deathTimer = 1000;
      state = STATE_PLAYER_DEAD;
    }
    
    function respawnFrog() {
      frog.x = W / 2;
      frog.y = H - CELL_SIZE / 2 - 10;
      frog.gridY = ROWS;
      frog.facing = 'up';
      frog.alive = true;
      frog.riding = null;
      timeRemaining = Math.max(TIME_LIMIT - (level - 1) * 5, 30);
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      drawBackground();
      drawVehicles();
      drawLogs();
      drawTurtles();
      drawHomeBays();
      
      if (frog && (state === STATE_PLAYING || state === STATE_PLAYER_DEAD)) {
        drawFrog();
      }
      
      drawHUD();
      
      if (state === STATE_TITLE) drawTitleScreen();
      if (state === STATE_PAUSED) drawPauseScreen();
      if (state === STATE_GAMEOVER) drawGameOverScreen();
      if (state === STATE_LEVEL_COMPLETE) drawLevelComplete();
    }
    
    function drawBackground() {
      // Grass at bottom
      ctx.fillStyle = COLORS.grass;
      ctx.fillRect(0, H - CELL_SIZE - 10, W, CELL_SIZE + 10);
      
      // Road
      ctx.fillStyle = COLORS.road;
      ctx.fillRect(0, H - CELL_SIZE * 6 - 10, W, CELL_SIZE * 5);
      
      // Median
      ctx.fillStyle = COLORS.grass;
      ctx.fillRect(0, H - CELL_SIZE * 7 - 10, W, CELL_SIZE);
      
      // River
      ctx.fillStyle = COLORS.river;
      ctx.fillRect(0, CELL_SIZE + 10, W, CELL_SIZE * 7);
      
      // Home bay area
      ctx.fillStyle = COLORS.river;
      ctx.fillRect(0, 0, W, CELL_SIZE + 10);
    }
    
    function drawVehicles() {
      for (const v of vehicles) {
        ctx.fillStyle = v.color;
        ctx.fillRect(v.x, v.y + 2, v.width, v.height);
        
        // Wheels
        ctx.fillStyle = '#222';
        ctx.fillRect(v.x + 5, v.y, 8, 4);
        ctx.fillRect(v.x + v.width - 13, v.y, 8, 4);
        ctx.fillRect(v.x + 5, v.y + v.height - 2, 8, 4);
        ctx.fillRect(v.x + v.width - 13, v.y + v.height - 2, 8, 4);
      }
    }
    
    function drawLogs() {
      for (const log of logs) {
        ctx.fillStyle = COLORS.log;
        ctx.beginPath();
        ctx.roundRect(log.x, log.y + 2, log.width, log.height, 10);
        ctx.fill();
        
        // Wood grain
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 2;
        for (let i = 0; i < log.width; i += 20) {
          ctx.beginPath();
          ctx.moveTo(log.x + i + 10, log.y + 5);
          ctx.lineTo(log.x + i + 10, log.y + log.height - 3);
          ctx.stroke();
        }
      }
    }
    
    function drawTurtles() {
      for (const turtle of turtles) {
        if (turtle.surfaced || turtle.divePhase < 2) {
          const alpha = turtle.surfaced ? 1 : 0.5;
          ctx.globalAlpha = alpha;
          
          // Draw 3 turtles
          for (let i = 0; i < 3; i++) {
            const tx = turtle.x + i * 35;
            const ty = turtle.y;
            
            // Shell
            ctx.fillStyle = COLORS.turtle;
            ctx.beginPath();
            ctx.ellipse(tx + 17, ty + 18, 15, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#3CB371';
            ctx.beginPath();
            ctx.ellipse(tx + 17, ty + 8, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          
          ctx.globalAlpha = 1;
        }
      }
    }
    
    function drawHomeBays() {
      for (const bay of homeBays) {
        // Bay background
        ctx.fillStyle = COLORS.river;
        ctx.fillRect(bay.x - 10, bay.y - 10, bay.width + 20, bay.height + 20);
        
        // Lily pad
        ctx.fillStyle = COLORS.lilyPad;
        ctx.beginPath();
        ctx.ellipse(bay.x + bay.width / 2, bay.y + bay.height / 2, 16, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Occupied frog
        if (bay.occupied) {
          drawFrogAt(bay.x + bay.width / 2, bay.y + bay.height / 2, 'up');
        }
      }
    }
    
    function drawFrog() {
      if (!frog.alive) {
        // Death animation
        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(frog.x, frog.y, 15, 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      
      drawFrogAt(frog.x, frog.y, frog.facing);
    }
    
    function drawFrogAt(x, y, facing) {
      ctx.save();
      ctx.translate(x, y);
      
      // Rotate based on facing
      const angles = { up: 0, down: Math.PI, left: -Math.PI / 2, right: Math.PI / 2 };
      ctx.rotate(angles[facing] || 0);
      
      // Body
      ctx.fillStyle = COLORS.frog;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(-6, -10, 5, 0, Math.PI * 2);
      ctx.arc(6, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-6, -10, 2, 0, Math.PI * 2);
      ctx.arc(6, -10, 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Legs
      ctx.fillStyle = COLORS.frogDark;
      ctx.fillRect(-14, 5, 8, 10);
      ctx.fillRect(6, 5, 8, 10);
      
      ctx.restore();
    }
    
    function drawHUD() {
      // Score
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 18px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + score, 10, H - 5);
      
      // High score
      ctx.textAlign = 'center';
      ctx.fillText('HI: ' + highScore, W / 2, H - 5);
      
      // Lives
      ctx.textAlign = 'right';
      ctx.fillText('LIVES: ' + lives, W - 10, H - 5);
      
      // Timer bar
      const timerWidth = W - 20;
      const timerHeight = 8;
      const timerY = H - CELL_SIZE - 25;
      const timerPercent = timeRemaining / Math.max(TIME_LIMIT - (level - 1) * 5, 30);
      
      ctx.fillStyle = COLORS.timerBg;
      ctx.fillRect(10, timerY, timerWidth, timerHeight);
      
      const timerColor = timerPercent > 0.5 ? COLORS.timerGreen :
                         timerPercent > 0.25 ? COLORS.timerYellow : COLORS.timerRed;
      ctx.fillStyle = timerColor;
      ctx.fillRect(10, timerY, timerWidth * timerPercent, timerHeight);
      
      // Level indicator
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 16px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('LEVEL ' + level, 10, 25);
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.frog;
      ctx.font = 'bold 56px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('FROGGER', W / 2, 200);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial';
      ctx.fillText('Press SPACE to start', W / 2, 320);
      
      ctx.font = '16px Arial';
      ctx.fillStyle = '#888';
      ctx.fillText('Arrow keys or WASD to move', W / 2, 400);
      ctx.fillText('P to pause', W / 2, 430);
      
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px Arial';
      ctx.fillText('HIGH SCORE: ' + highScore, W / 2, 520);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + score, W / 2, H / 2);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 100);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 130);
    }
    
    function drawLevelComplete() {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 36px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL ' + level + ' COMPLETE!', W / 2, H / 2);
      
      ctx.font = '24px Arial';
      ctx.fillText('+1000 BONUS', W / 2, H / 2 + 50);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyP' && state === STATE_PLAYING) {
        state = STATE_PAUSED;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyP' && state === STATE_PAUSED) {
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
        keyProcessed = false;
        e.preventDefault();
        return;
      }
      
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
        return;
      }
      
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
      keyProcessed = false;
    });
    
    // Key state helpers
    Object.defineProperty(keys, 'up', {
      get: function() { return this['ArrowUp'] || this['KeyW'] || this['w'] || this['W']; }
    });
    
    Object.defineProperty(keys, 'down', {
      get: function() { return this['ArrowDown'] || this['KeyS'] || this['s'] || this['S']; }
    });
    
    Object.defineProperty(keys, 'left', {
      get: function() { return this['ArrowLeft'] || this['KeyA'] || this['a'] || this['A']; }
    });
    
    Object.defineProperty(keys, 'right', {
      get: function() { return this['ArrowRight'] || this['KeyD'] || this['d'] || this['D']; }
    });
    
    window.addEventListener('blur', () => {
      for (const key in keys) keys[key] = false;
      keyProcessed = false;
    });
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start
    initHomeBays();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
