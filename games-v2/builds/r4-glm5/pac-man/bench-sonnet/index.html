function buildMaze(){
  const grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    const line=MAZE_STR[r]||'';
    for(let c=0;c<COLS;c++){
      const ch=line[c]||'#';
      if(ch==='#') grid[r][c]=0;
      else if(ch==='.') grid[r][c]=2;
      else if(ch==='O') grid[r][c]=3;
      else if(ch==='-') grid[r][c]=4;
      else grid[r][c]=1; // space or other = open
    }
  }
  return grid;
}

// Build maze grid
let maze=[];
let totalDots=0;
function initMaze(){
  maze=[];
  totalDots=0;
  for(let r=0;r<ROWS;r++){
    maze[r]=[];
    const row=M[r]||'############################';
    for(let c=0;c<COLS;c++){
      const ch=c<row.length?row[c]:'#';
      if(ch==='#') maze[r][c]=0;
      else if(ch==='.'){maze[r][c]=2;totalDots++;}
      else if(ch==='O'){maze[r][c]=3;totalDots++;}
      else if(ch==='-') maze[r][c]=4; // ghost door
      else maze[r][c]=1; // open
    }
  }
}

function isWall(r,c){
  if(r<0||r>=ROWS) return true;
  // Tunnel row 14: wrap
  c=((c%COLS)+COLS)%COLS;
  const t=maze[r][c];
  return t===0;
}
function isGhostDoor(r,c){
  c=((c%COLS)+COLS)%COLS;
  return maze[r]&&maze[r][c]===4;
}

// ---- Directions ----
const DIR={NONE:{x:0,y:0},UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};

// ---- Pixel helpers ----
function tileToPixel(c,r){ return{x:c*TS+TS/2, y:r*TS+TS/2+16}; } // +16 for score HUD
function pixelToTile(px,py){ return{c:Math.round((px-TS/2)/TS), r:Math.round((py-16-TS/2)/TS)}; }

const GHOST_COLORS=['#FF0000','#FFB8FF','#00FFFF','#FFB852'];

];

let ghosts=[];

function makeGhost(i){
  const p=tileToPixel(GHOST_STARTS[i].c,GHOST_STARTS[i].r);
  return{
    idx:i,x:p.x,y:p.y,
    dir:i===0?DIR.LEFT:DIR.UP,
    mode:'scatter',// scatter,chase,frightened,eaten
    speed:1.9,
    inHouse:i>0,
    exitTimer:i*5,
    color:GHOST_COLORS[i],
    eyeDir:DIR.LEFT,
  };
}

function resetGhosts(){
  ghosts=[];
  for(let i=0;i<4;i++) ghosts.push(makeGhost(i));
  modeTimer=0; modePhase=0;
}

// ---- Init ----
function startGame(){
  score=0; lives=3; level=1; dotsEaten=0;
  initMaze(); resetPac(); resetGhosts();
  frightOn=false; ghostEatCount=0; fruitActive=false;
  readyTimer=2.5; floatScores=[];
  state=ST.READY;
}

function nextLevel(){
  level++;
  initMaze(); dotsEaten=0;
  resetPac(); resetGhosts();
  frightOn=false; ghostEatCount=0; fruitActive=false;
  readyTimer=2; floatScores=[];
  state=ST.READY;
}

function activateFright(){
  frightOn=true;
  const dur=Math.max(0,6-level+1);
  frightTimer=dur;
  ghostEatCount=0;
  for(const g of ghosts){
    if(g.mode!=='eaten'){
      g.mode='frightened';
      g.speed=1.1;
    }
  }
}

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,type,gain,fe){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.setValueAtTime(freq,AC.currentTime);
    if(fe) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(gain||0.08,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}

// ---- Input ----

window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]) wasDown[k]=true;
  keys[k]=true; initAC();

  // Direction
  if(state===ST.PLAYING){
    if(k==='ArrowUp'||k==='w'||k==='W') pac.nextDir=DIR.UP;
    if(k==='ArrowDown'||k==='s'||k==='S') pac.nextDir=DIR.DOWN;

});

// ---- Collision / movement helpers ----
function canMove(px,py,d,spd){
  const nx=px+d.x*spd, ny=py+d.y*spd;
  // Check tile at new position
  const t=pixelToTile(nx,ny);
  return !isWall(t.r,t.c);
}

function canMoveGhost(px,py,d,spd,allowDoor){
  const nx=px+d.x*spd*1.5, ny=py+d.y*spd*1.5;
  const t=pixelToTile(nx,ny);
  const c=((t.c%COLS)+COLS)%COLS;
  const r=t.r;
  if(r<0||r>=ROWS) return false;
  const tile=maze[r][c];
  if(tile===0) return false;
  if(tile===4&&!allowDoor) return false;
  return true;
}

function wrap(px){
  if(px<-8) return CW+8;
  if(px>CW+8) return -8;
  return px;
}

function dist(ax,ay,bx,by){ return Math.sqrt((ax-bx)**2+(ay-by)**2); }
function tileDist(ar,ac,br,bc){ return Math.abs(ar-br)+Math.abs(ac-bc); }

// ---- Ghost AI ----
function ghostTarget(g){
  const pt=pixelToTile(pac.x,pac.y);
  const pr=pt.r, pc2=pt.c;
  if(g.mode==='scatter') return SCATTER_TARGETS[g.idx];
  // Chase
  if(g.idx===0){ return{r:pr,c:pc2}; } // Blinky
  if(g.idx===1){ // Pinky: 4 ahead
    return{r:pr+pac.dir.y*4,c:pc2+pac.dir.x*4};
  }
  if(g.idx===2){ // Inky: vector from blinky*2
    const b=ghosts[0];
    const bt=pixelToTile(b.x,b.y);
    const ahead={r:pr+pac.dir.y*2,c:pc2+pac.dir.x*2};
    return{r:ahead.r*2-bt.r,c:ahead.c*2-bt.c};
  }
  // Clyde
  const d=dist(g.x,g.y,pac.x,pac.y)/TS;
  if(d>8) return{r:pr,c:pc2};
  return SCATTER_TARGETS[3];
}

function chooseGhostDir(g){
  const t=pixelToTile(g.x,g.y);
  let target;
  if(g.mode==='frightened'){
    // Random
    const opts=DIRS.filter(d=>d.x!==(-g.dir.x)||d.y!==(-g.dir.y));
    const valid=opts.filter(d=>canMoveGhost(g.x,g.y,d,g.speed,false));
    if(valid.length>0) return valid[Math.floor(Math.random()*valid.length)];
    return g.dir;
  }
  if(g.mode==='eaten'){
    target={r:11,c:14}; // back to house entrance
  } else {
    target=ghostTarget(g);
  }
  const opts=DIRS.filter(d=>{
    if(d.x===(-g.dir.x)&&d.y===(-g.dir.y)) return false; // no reverse
    return canMoveGhost(g.x,g.y,d,g.speed,g.mode==='eaten');
  });
  if(opts.length===0) return{x:-g.dir.x,y:-g.dir.y}; // reverse
  opts.sort((a,b)=>{
    const ar=t.r+a.y,ac=t.c+a.x;
    const br=t.r+b.y,bc=t.c+b.x;
    return tileDist(ar,ac,target.r,target.c)-tileDist(br,bc,target.r,target.c);
  });
  return opts[0];
}

// ---- Update ----
let lastTime=performance.now();
function update(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now; totalTime+=dt;

  for(let i=floatScores.length-1;i>=0;i--){ floatScores[i].y-=20*dt; floatScores[i].life-=dt; if(floatScores[i].life<=0)floatScores.splice(i,1); }

  if(state===ST.PAUSED||state===ST.TITLE||state===ST.GAMEOVER) return;

  if(state===ST.READY){
    readyTimer-=dt;
    if(readyTimer<=0) state=ST.PLAYING;
    return;
  }

  if(state===ST.DYING){
    dyingTimer-=dt;
    pac.dyingAnim=1-dyingTimer/0.8;
    if(dyingTimer<=0){
      lives--;
      if(lives<=0){ if(score>hiScore){hiScore=score;localStorage.setItem('pm4_hi',hiScore);} state=ST.GAMEOVER; }
      else { resetPac(); resetGhosts(); frightOn=false; readyTimer=1.5; state=ST.READY; }
    }
    return;
  }

  if(state===ST.LEVELUP){
    levelupTimer-=dt;
    if(levelupTimer<=0) nextLevel();
    return;
  }

  // ---- PLAYING ----
  // Mode timer (scatter/chase)
  if(!frightOn){
    modeTimer+=dt;
    const phases=MODE_SCHEDULE;
    let acc=0,ph=0;
    for(let i=0;i<phases.length;i++){
      acc+=phases[i];
      if(modeTimer<acc){ph=i;break;}
      ph=i;
    }
    modePhase=ph;
    const newMode=ph%2===0?'scatter':'chase';
    for(const g of ghosts){
      if(g.mode!=='frightened'&&g.mode!=='eaten') g.mode=newMode;
    }
  }

  // Fright timer
  if(frightOn){
    frightTimer-=dt;
    if(frightTimer<=0){
      frightOn=false;
      for(const g of ghosts){ if(g.mode==='frightened'){g.mode=modePhase%2===0?'scatter':'chase'; g.speed=1.9;} }
    }
  }

  // Move Pac-Man
  const TILE_SNAP=2; // snap threshold
  const pt=pixelToTile(pac.x,pac.y);
  // Try to apply next direction
  if(pac.nextDir.x!==0||pac.nextDir.y!==0){
    if(canMove(pac.x,pac.y,pac.nextDir,pac.speed+1)){
      pac.dir=pac.nextDir;
    }
  }
  if(canMove(pac.x,pac.y,pac.dir,pac.speed)){
    pac.x+=pac.dir.x*pac.speed;
    pac.y+=pac.dir.y*pac.speed;
    pac.x=wrap(pac.x);
    // Snap to grid center on axis perpendicular to movement
    if(pac.dir.x!==0){ const cy=pt.r*TS+TS/2+16; if(Math.abs(pac.y-cy)<TILE_SNAP) pac.y=cy; }
    if(pac.dir.y!==0){ const cx=pt.c*TS+TS/2; if(Math.abs(pac.x-cx)<TILE_SNAP) pac.x=cx; }
  }

  // Mouth animation
  pac.mouthOpen+=pac.mouthDir*0.05;
  if(pac.mouthOpen>=0.45){pac.mouthDir=-1;}
  if(pac.mouthOpen<=0.02){pac.mouthDir=1;}

  // Eat dots
  const et=pixelToTile(pac.x,pac.y);
  const ec=((et.c%COLS)+COLS)%COLS, er=et.r;
  if(er>=0&&er<ROWS){
    const tile=maze[er][ec];
    if(tile===2){maze[er][ec]=1;score+=10;dotsEaten++;beep(600,0.04,'sine',0.05);}
    else if(tile===3){
      maze[er][ec]=1;score+=50;dotsEaten++;
      activateFright();
      beep(400,0.1,'square',0.1,200);
    }
    if(score>hiScore){hiScore=score;localStorage.setItem('pm4_hi',hiScore);}
  }

  // Fruit
  if(dotsEaten===70||dotsEaten===170){
    if(!fruitActive){ fruitActive=true; fruitTimer=10; fruitPts=[100,300,500,700,1000][Math.min(level-1,4)]; }
  }
  if(fruitActive){ fruitTimer-=dt; if(fruitTimer<=0)fruitActive=false; }
  // Pac eats fruit
  if(fruitActive&&dist(pac.x,pac.y,CW/2,tileToPixel(14,17).y)<18){
    score+=fruitPts; fruitActive=false;
    floatScores.push({x:CW/2,y:tileToPixel(14,17).y,pts:fruitPts,life:1.5});
    beep(880,0.1,'sine',0.12);
  }

  // Win check
  if(dotsEaten>=totalDots){
    levelupTimer=2; state=ST.LEVELUP;
    beep(880,0.1,'sine',0.15); setTimeout(()=>beep(1100,0.15,'sine',0.15),200);
    return;
  }

  // Move ghosts
  for(const g of ghosts){
    if(g.inHouse){
      g.exitTimer-=dt;
      if(g.exitTimer<=0){
        g.inHouse=false;
        const ep=tileToPixel(14,11);
        g.x=ep.x; g.y=ep.y; g.dir=DIR.LEFT;
      } else { continue; }
    }
    // Choose direction at tile centers
    const gt=pixelToTile(g.x,g.y);
    const snap=1.5;
    const atCenter=Math.abs(g.x-(gt.c*TS+TS/2))<snap&&Math.abs(g.y-(gt.r*TS+TS/2+16))<snap;
    if(atCenter) g.dir=chooseGhostDir(g);

    // Eaten mode check: arrived at house entrance
    if(g.mode==='eaten'){
      const hp=tileToPixel(14,11);
      if(dist(g.x,g.y,hp.x,hp.y)<2){ g.mode=modePhase%2===0?'scatter':'chase'; g.speed=1.9; g.dir=DIR.LEFT; }
    }

    g.x+=g.dir.x*g.speed; g.y+=g.dir.y*g.speed;
    g.x=wrap(g.x);
  }

  // Ghost-Pac collision
  for(const g of ghosts){
    if(g.inHouse) continue;
    if(dist(pac.x,pac.y,g.x,g.y)<12){
      if(g.mode==='frightened'){
        g.mode='eaten'; g.speed=3;
        ghostEatCount++;
        const pts=[200,400,800,1600][Math.min(ghostEatCount-1,3)];
        score+=pts; if(score>hiScore){hiScore=score;localStorage.setItem('pm4_hi',hiScore);}
        floatScores.push({x:g.x,y:g.y,pts,life:1.2});
        beep(660,0.08,'square',0.12);
      } else if(g.mode!=='eaten'){
        pac.alive=false; dyingTimer=1.2; state=ST.DYING;
        beep(200,0.5,'sawtooth',0.18,50);
        return;
      }
    }
  }
}

// ---- Render ----
function drawMaze(){
  // Walls
  ctx.strokeStyle='#2121DE'; ctx.lineWidth=2;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(maze[r][c]===0){
      const x=c*TS,y=r*TS+16;
      ctx.fillStyle='#1111aa';
      ctx.fillRect(x,y,TS,TS);
      // Draw border edges
      ctx.fillStyle='#2121DE';
      if(c===0||maze[r][c-1]!==0) ctx.fillRect(x,y,2,TS);
      if(c===COLS-1||maze[r][c+1]!==0) ctx.fillRect(x+TS-2,y,2,TS);
      if(r===0||maze[r-1][c]!==0) ctx.fillRect(x,y,TS,2);
      if(r===ROWS-1||maze[r+1][c]!==0) ctx.fillRect(x,y+TS-2,TS,2);
    }
    if(maze[r][c]===4){
      // Ghost door
      const x=c*TS,y=r*TS+16+TS/2-1;
      ctx.fillStyle='#FFB8FF'; ctx.fillRect(x,y,TS,3);
    }
  }
  // Dots
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const tile=maze[r][c];
    const cx=c*TS+TS/2, cy=r*TS+TS/2+16;
    if(tile===2){
      ctx.fillStyle='#FFB8AE'; ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2); ctx.fill();
    } else if(tile===3){
      const pulse=0.7+Math.sin(totalTime*6)*0.3;
      ctx.fillStyle='#FFB8AE'; ctx.globalAlpha=pulse;
      ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function drawPac(){
  if(state===ST.DYING){
    const a=pac.dyingAnim;
    ctx.fillStyle='#FFFF00';
    ctx.beginPath();
    ctx.moveTo(pac.x,pac.y);
    const start=a*Math.PI;
    ctx.arc(pac.x,pac.y,7*(1-a*0.5),start,Math.PI*2-start);
    ctx.closePath(); ctx.fill();
    return;
  }
  if(!pac.alive) return;
  // Determine mouth angle based on direction
  let baseAngle=0;
  if(pac.dir===DIR.LEFT) baseAngle=Math.PI;
  else if(pac.dir===DIR.UP) baseAngle=-Math.PI/2;
  else if(pac.dir===DIR.DOWN) baseAngle=Math.PI/2;
  const mo=pac.mouthOpen*Math.PI;
  ctx.fillStyle='#FFFF00';
  ctx.beginPath();
  ctx.moveTo(pac.x,pac.y);
  ctx.arc(pac.x,pac.y,7,baseAngle+mo,baseAngle+Math.PI*2-mo);
  ctx.closePath(); ctx.fill();
}

function drawGhost(g){
  if(g.inHouse) return;
  const x=g.x,y=g.y,r=7;
  let bodyColor=g.color;
  let frightFlash=false;
  if(g.mode==='frightened'){
    bodyColor=frightOn&&frightTimer<2&&Math.floor(frightTimer*4)%2===0?'#fff':'#0000ff';
  }
  if(g.mode==='eaten'){
    // Just eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x-3,y-2,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3,y-2,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00f';
    ctx.beginPath(); ctx.arc(x-3+g.dir.x*1.5,y-2+g.dir.y*1.5,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3+g.dir.x*1.5,y-2+g.dir.y*1.5,1.5,0,Math.PI*2); ctx.fill();
    return;
  }
  // Body
  ctx.fillStyle=bodyColor;
  ctx.beginPath();
  ctx.arc(x,y-1,r,Math.PI,0);
  // Wavy bottom
  const w=r*2,bsy=y-1+r;
  ctx.lineTo(x+r,bsy+4);
  const waves=3, ws=w/waves;
  for(let i=waves-1;i>=0;i--){
    const bx=x-r+i*ws;
    ctx.quadraticCurveTo(bx+ws*0.75,bsy+(i%2===0?-3:4),bx+ws*0.5,bsy);
    ctx.quadraticCurveTo(bx+ws*0.25,bsy+(i%2===0?4:-3),bx,bsy+4);
  }
  ctx.closePath(); ctx.fill();
  if(g.mode!=='frightened'){
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x-3,y-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3,y-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00f';
    ctx.beginPath(); ctx.arc(x-3+g.dir.x*1.2,y-3+g.dir.y*1.2,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3+g.dir.x*1.2,y-3+g.dir.y*1.2,1.2,0,Math.PI*2); ctx.fill();
  } else {
    // Scared expression
    ctx.fillStyle='#fff'; ctx.font='8px monospace';
    ctx.textAlign='center'; ctx.fillText('~~',x,y+2);
    ctx.beginPath(); ctx.arc(x-3,y-3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3,y-3,2,0,Math.PI*2); ctx.fill();
  }
}

function drawHUD(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,16);
  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
  ctx.fillText(score,2,13);
  ctx.textAlign='center'; ctx.fillStyle='#888'; ctx.font='11px monospace';
  ctx.fillText('HI: '+hiScore,CW/2,13);
  ctx.fillStyle='#ff0'; ctx.textAlign='right';
  ctx.fillText('L'+level,CW-2,13);
  // Lives row at bottom
  const by=ROWS*TS+16+4;
  ctx.fillStyle='#000'; ctx.fillRect(0,by-2,CW,16);
  for(let i=0;i<lives-1;i++){
    ctx.fillStyle='#FFFF00'; ctx.beginPath();
    ctx.moveTo(8+i*18,by+8); ctx.arc(8+i*18,by+8,6,0.3,Math.PI*2-0.3); ctx.closePath(); ctx.fill();
  }
}

function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);

  if(state===ST.TITLE){
    ctx.fillStyle='#FFFF00'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
    ctx.fillText('PAC-MAN',CW/2,180);
    ctx.fillStyle='#fff'; ctx.font='18px monospace';
    ctx.fillText('Press SPACE to start',CW/2,260);
    ctx.fillStyle='#888'; ctx.font='13px monospace';
    ctx.fillText('Arrow keys or WASD to move',CW/2,300);
    ctx.fillStyle='#FFB8AE'; ctx.font='14px monospace';
    ctx.fillText('Eat all dots to win!',CW/2,340);
    ctx.fillStyle='#ffff00'; ctx.font='14px monospace';
    ctx.fillText('HI: '+hiScore,CW/2,390);
    // Animated pac
    const pb=0.3+Math.sin(totalTime*6)*0.25;
    ctx.fillStyle='#FFFF00'; ctx.beginPath();
    ctx.moveTo(CW/2,440); ctx.arc(CW/2,440,14,pb,Math.PI*2-pb); ctx.closePath(); ctx.fill();
    return;
  }

  drawMaze();

  // Fruit
  if(fruitActive){
    ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.arc(CW/2,tileToPixel(14,17).y,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aa0000'; ctx.beginPath(); ctx.arc(CW/2,tileToPixel(14,17).y+2,5,0,Math.PI); ctx.fill();
  }

  for(const g of ghosts) drawGhost(g);
  drawPac();

  // Float scores
  for(const f of floatScores){
    ctx.globalAlpha=Math.min(1,f.life);
    ctx.fillStyle='#00ffff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText(f.pts,f.x,f.y);
  }
  ctx.globalAlpha=1;

  drawHUD();

  if(state===ST.READY){
    ctx.fillStyle='#FFB852'; ctx.font='bold 20px monospace'; ctx.textAlign='center';
    ctx.fillText('READY!',CW/2,CH/2);
  }

  if(state===ST.LEVELUP){
    const flash=Math.floor(totalTime*8)%2===0;
    ctx.fillStyle=flash?'rgba(255,255,255,0.3)':'rgba(0,0,80,0.3)';
    ctx.fillRect(0,16,CW,ROWS*TS);
    ctx.fillStyle='#fff'; ctx.font='bold 24px monospace'; ctx.textAlign='center';
    ctx.fillText('LEVEL CLEAR!',CW/2,CH/2);
  }

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff'; ctx.font='bold 32px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',CW/2,CH/2-20);
    ctx.font='14px monospace'; ctx.fillStyle='#aaa';
    ctx.fillText('P to resume  |  R to restart',CW/2,CH/2+20);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#FF0000'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',CW/2,CH/2-30);
    ctx.fillStyle='#fff'; ctx.font='20px monospace';
    ctx.fillText('Score: '+score,CW/2,CH/2+20);
    ctx.fillStyle='#aaa'; ctx.font='14px monospace';
    ctx.fillText('R to play again',CW/2,CH/2+65);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
