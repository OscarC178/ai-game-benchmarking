<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndBrick(pts){tone(400+pts*6,0.06,0.05,'sine');}
function sndPaddle(){tone(300,0.04,0.04);}
function sndWall(){tone(200,0.03,0.03);}
function sndLose(){tone(150,0.3,0.06,'sawtooth');}
function sndWin(){tone(523,0.08,0.06,'sine');setTimeout(()=>tone(659,0.08,0.06,'sine'),100);setTimeout(()=>tone(784,0.12,0.06,'sine'),200);}

const PW=120,PH=15,PY=H-45,PSPD=480;
const BR=10,BC=10,BW=75,BH=25,BGAP=0,BOX=25,BOY=50;
const BCOLORS=[
  {color:'#FF0000',pts:70},{color:'#FF8800',pts:60},{color:'#FFFF00',pts:50},
  {color:'#00FF00',pts:40},{color:'#0088FF',pts:30},{color:'#8800FF',pts:20}
];
const BALL_R=6,MAX_SPD=600,INIT_SPD=360;

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_WIN=4;
let state=ST_TITLE;

let paddle,ball,bricks,score,hiScore,lives,onPaddle,bricksAlive;

hiScore=0;
try{const v=localStorage.getItem('brk4_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('brk4_best',String(hiScore));}catch(e){}}}

function initBricks(){
  bricks=[];bricksAlive=0;
  for(let r=0;r<6;r++){
    for(let c=0;c<BC;c++){
      bricks.push({
        x:BOX+c*(BW+BGAP),y:BOY+r*(BH+BGAP),
        w:BW,h:BH,color:BCOLORS[r].color,pts:BCOLORS[r].pts,alive:true
      });
      bricksAlive++;
    }
  }
}

function resetBall(){
  onPaddle=true;
  ball={x:paddle.x+PW/2,y:PY-BALL_R*2,vx:0,vy:0,r:BALL_R};
}

function launchBall(){
  if(!onPaddle)return;
  onPaddle=false;
  const angle=(45+Math.random()*15)*Math.PI/180;
  const dir=Math.random()<0.5?-1:1;
  ball.vx=Math.sin(angle)*INIT_SPD*dir;
  ball.vy=-Math.cos(angle)*INIT_SPD;
}

function initGame(){
  paddle={x:W/2-PW/2,y:PY,w:PW,h:PH};
  score=0;lives=3;
  initBricks();resetBall();
}

const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;ia();e.preventDefault();
  if(e.code==='Space'){
    if(state===ST_TITLE){initGame();state=ST_PLAY;return;}
    if(state===ST_PLAY&&onPaddle){launchBall();return;}
    if(state===ST_PLAY){state=ST_PAUSE;return;}
    if(state===ST_PAUSE){state=ST_PLAY;return;}
  }
  if(e.code==='KeyR'){
    if(state!==ST_TITLE){initGame();state=ST_PLAY;}
  }
  if(e.code==='Escape'){state=ST_TITLE;}
});
addEventListener('keyup',e=>{keys[e.code]=false;});
addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});

function update(dt){
  if(state!==ST_PLAY)return;

  // Paddle
  if(keys['ArrowLeft']||keys['KeyA'])paddle.x-=PSPD*dt;
  if(keys['ArrowRight']||keys['KeyD'])paddle.x+=PSPD*dt;
  paddle.x=Math.max(0,Math.min(W-PW,paddle.x));

  if(onPaddle){
    ball.x=paddle.x+PW/2;
    ball.y=PY-BALL_R*2;
    return;
  }

  // Move ball
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;

  // Wall collisions
  if(ball.x-ball.r<=0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);sndWall();}
  if(ball.x+ball.r>=W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);sndWall();}
  if(ball.y-ball.r<=0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);sndWall();}

  // Ball lost
  if(ball.y-ball.r>H){
    lives--;sndLose();
    if(lives<=0){state=ST_OVER;saveHi();return;}
    resetBall();return;
  }

  // Paddle collision
  if(ball.vy>0){
    const bx=ball.x,by=ball.y+ball.r;
    if(by>=paddle.y&&by<=paddle.y+paddle.h&&bx>=paddle.x&&bx<=paddle.x+PW){
      const hitRatio=((bx-paddle.x)/PW)*2-1;
      const maxAngle=Math.PI/3;
      const angle=hitRatio*maxAngle;
      const spd=Math.hypot(ball.vx,ball.vy);
      ball.vx=Math.sin(angle)*spd;
      ball.vy=-Math.abs(Math.cos(angle)*spd);
      ball.y=paddle.y-ball.r;
      sndPaddle();
    }
  }

  // Brick collisions
  for(const b of bricks){
    if(!b.alive)continue;
    // AABB vs circle approximation
    const bx=ball.x,by=ball.y,br=ball.r;
    if(bx+br>b.x&&bx-br<b.x+b.w&&by+br>b.y&&by-br<b.y+b.h){
      b.alive=false;bricksAlive--;
      score+=b.pts;saveHi();
      sndBrick(b.pts);

      // Determine side
      const oleft=(bx+br)-b.x;
      const oright=(b.x+b.w)-(bx-br);
      const otop=(by+br)-b.y;
      const obot=(b.y+b.h)-(by-br);
      const minX=Math.min(oleft,oright);
      const minY=Math.min(otop,obot);

      if(minX<minY){
        ball.vx=-ball.vx;
        if(oleft<oright)ball.x=b.x-br;else ball.x=b.x+b.w+br;
      }else{
        ball.vy=-ball.vy;
        if(otop<obot)ball.y=b.y-br;else ball.y=b.y+b.h+br;
      }

      // Speed up slightly
      const spd=Math.hypot(ball.vx,ball.vy);
      if(spd<MAX_SPD){
        const ns=spd*1.005;
        const r2=ns/spd;
        ball.vx*=r2;ball.vy*=r2;
      }

      if(bricksAlive<=0){state=ST_WIN;saveHi();sndWin();}
      break; // Only one brick per frame
    }
  }
}

function render(now){
  cx.fillStyle='#111';cx.fillRect(0,0,W,H);

  if(state===ST_TITLE){
    cx.fillStyle='#f44';cx.font='bold 56px monospace';cx.textAlign='center';
    cx.fillText('BREAKOUT',W/2,230);
    cx.fillStyle='#ccc';cx.font='18px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press SPACE to start',W/2,330);
    cx.fillStyle='#888';cx.font='14px monospace';
    cx.fillText('← → or A D to move paddle   SPACE to launch',W/2,400);
    cx.fillText('SPACE Pause   R Restart   ESC Title',W/2,430);
    if(hiScore>0){cx.fillStyle='#555';cx.fillText('Best: '+hiScore,W/2,480);}
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive)continue;
    cx.fillStyle=b.color;
    cx.fillRect(b.x+1,b.y+1,b.w-2,b.h-2);
    // Highlight
    cx.fillStyle='rgba(255,255,255,0.15)';
    cx.fillRect(b.x+1,b.y+1,b.w-2,b.h/3);
  }

  // Paddle
  cx.fillStyle='#ddd';
  cx.fillRect(paddle.x,paddle.y,PW,PH);
  cx.fillStyle='rgba(255,255,255,0.2)';
  cx.fillRect(paddle.x,paddle.y,PW,PH/3);

  // Ball
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);cx.fill();

  // HUD
  cx.fillStyle='#fff';cx.font='bold 20px sans-serif';cx.textAlign='left';
  cx.fillText('Score: '+score,12,28);
  cx.textAlign='right';
  cx.fillText('Lives: '+lives,W-12,28);
  cx.textAlign='center';
  cx.fillStyle='#666';cx.font='14px sans-serif';
  cx.fillText('Best: '+hiScore,W/2,28);

  if(onPaddle&&state===ST_PLAY){
    cx.fillStyle='#aaa';cx.font='16px monospace';cx.textAlign='center';
    if(Math.floor(now/500)%2)cx.fillText('Press SPACE to launch',W/2,H/2+60);
  }

  // Overlays
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='18px monospace';cx.fillText('Press SPACE to resume',W/2,H/2+30);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,H/2+5);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press R to play again',W/2,H/2+70);
    cx.fillText('Press ESC for title',W/2,H/2+95);
  }
  if(state===ST_WIN){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#0f0';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('YOU WIN!',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='22px monospace';
    cx.fillText('Score: '+score,W/2,H/2+5);
    cx.fillStyle='#aaa';cx.font='16px monospace';
    if(Math.floor(now/600)%2)cx.fillText('Press R to play again',W/2,H/2+50);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render(now);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
