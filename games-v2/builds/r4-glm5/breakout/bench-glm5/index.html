<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_BALL_ON_PADDLE = 1;
    const STATE_PLAYING = 2;
    const STATE_PAUSED = 3;
    const STATE_GAMEOVER = 4;
    const STATE_VICTORY = 5;
    
    // Colors
    const COLORS = {
      background: '#111111',
      paddle: '#FFFFFF',
      ball: '#FFFFFF',
      text: '#FFFFFF',
      wall: '#333333'
    };
    
    // Brick colors and points (row 0 = top)
    const BRICK_COLORS = [
      { color: '#FF0000', points: 70 },  // Red
      { color: '#FF8800', points: 60 },  // Orange
      { color: '#FFFF00', points: 50 },  // Yellow
      { color: '#00FF00', points: 40 },  // Green
      { color: '#0088FF', points: 30 },  // Blue
      { color: '#8800FF', points: 20 }   // Purple
    ];
    
    // Paddle settings
    const PADDLE_WIDTH = 120;
    const PADDLE_HEIGHT = 15;
    const PADDLE_SPEED = 8;
    const PADDLE_Y = H - 45;
    
    // Ball settings
    const BALL_SIZE = 12;
    const BALL_INITIAL_SPEED = 6;
    const BALL_MAX_SPEED = 10;
    const BALL_MIN_SPEED = 4;
    const BALL_SPEED_INCREASE = 1.005;
    
    // Brick settings
    const BRICK_ROWS = 6;
    const BRICK_COLS = 10;
    const BRICK_WIDTH = 75;
    const BRICK_HEIGHT = 25;
    const BRICK_PADDING = 2;
    const BRICK_OFFSET_TOP = 50;
    const BRICK_OFFSET_LEFT = 25;
    
    // Game settings
    const INITIAL_LIVES = 3;
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('breakout_highscore') || '0');
    let lives = INITIAL_LIVES;
    
    // Entities
    let paddle = null;
    let ball = null;
    let bricks = [];
    
    // Input
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      // Initialize paddle
      paddle = {
        x: W / 2 - PADDLE_WIDTH / 2,
        y: PADDLE_Y,
        width: PADDLE_WIDTH,
        height: PADDLE_HEIGHT
      };
      
      // Initialize ball
      ball = {
        x: W / 2 - BALL_SIZE / 2,
        y: PADDLE_Y - BALL_SIZE - 2,
        width: BALL_SIZE,
        height: BALL_SIZE,
        vx: 0,
        vy: 0,
        active: false
      };
      
      // Initialize bricks
      initBricks();
      
      score = 0;
      lives = INITIAL_LIVES;
    }
    
    function initBricks() {
      bricks = [];
      
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLS; col++) {
          bricks.push({
            x: BRICK_OFFSET_LEFT + col * (BRICK_WIDTH + BRICK_PADDING),
            y: BRICK_OFFSET_TOP + row * (BRICK_HEIGHT + BRICK_PADDING),
            width: BRICK_WIDTH,
            height: BRICK_HEIGHT,
            color: BRICK_COLORS[row].color,
            points: BRICK_COLORS[row].points,
            alive: true
          });
        }
      }
    }
    
    function launchBall() {
      if (ball.active) return;
      
      // Random angle between 45 and 60 degrees
      const angle = (45 + Math.random() * 15) * Math.PI / 180;
      const dirX = Math.random() > 0.5 ? 1 : -1;
      
      ball.vx = Math.cos(angle) * BALL_INITIAL_SPEED * dirX;
      ball.vy = -Math.sin(angle) * BALL_INITIAL_SPEED;
      ball.active = true;
    }
    
    // ==================== UPDATE ====================
    function update() {
      // Update paddle position
      updatePaddle();
      
      // Update ball
      if (state === STATE_BALL_ON_PADDLE) {
        // Ball follows paddle
        ball.x = paddle.x + paddle.width / 2 - ball.width / 2;
        ball.y = paddle.y - ball.height - 2;
      } else if (state === STATE_PLAYING) {
        updateBall();
      }
    }
    
    function updatePaddle() {
      if (keys.left) {
        paddle.x -= PADDLE_SPEED;
      }
      if (keys.right) {
        paddle.x += PADDLE_SPEED;
      }
      
      // Clamp paddle to screen bounds
      paddle.x = Math.max(0, Math.min(W - paddle.width, paddle.x));
    }
    
    function updateBall() {
      if (!ball.active) return;
      
      // Move ball
      ball.x += ball.vx;
      ball.y += ball.vy;
      
      // Wall collisions
      // Top wall
      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
      }
      
      // Left wall
      if (ball.x <= 0) {
        ball.x = 0;
        ball.vx = -ball.vx;
      }
      
      // Right wall
      if (ball.x + ball.width >= W) {
        ball.x = W - ball.width;
        ball.vx = -ball.vx;
      }
      
      // Ball fell below paddle
      if (ball.y + ball.height >= H) {
        loseLife();
        return;
      }
      
      // Paddle collision
      checkPaddleCollision();
      
      // Brick collisions
      checkBrickCollisions();
    }
    
    function checkPaddleCollision() {
      // Only check if ball moving downward
      if (ball.vy <= 0) return;
      
      // Check if ball intersects paddle
      if (ball.y + ball.height >= paddle.y &&
          ball.y <= paddle.y + paddle.height &&
          ball.x + ball.width >= paddle.x &&
          ball.x <= paddle.x + paddle.width) {
        
        // Calculate hit position (-1 to +1)
        const ballCenter = ball.x + ball.width / 2;
        const paddleCenter = paddle.x + paddle.width / 2;
        const hitRatio = (ballCenter - paddleCenter) / (paddle.width / 2);
        
        // Clamp to -1 to +1
        const clampedRatio = Math.max(-1, Math.min(1, hitRatio));
        
        // Calculate angle (max 60 degrees from vertical)
        const maxAngle = Math.PI / 3;
        const angle = clampedRatio * maxAngle;
        
        // Get current speed
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        
        // Set new velocity (always upward)
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.abs(Math.cos(angle) * speed);
        
        // Position correction
        ball.y = paddle.y - ball.height;
      }
    }
    
    function checkBrickCollisions() {
      for (const brick of bricks) {
        if (!brick.alive) continue;
        
        // Check collision
        if (ball.x < brick.x + brick.width &&
            ball.x + ball.width > brick.x &&
            ball.y < brick.y + brick.height &&
            ball.y + ball.height > brick.y) {
          
          // Destroy brick
          brick.alive = false;
          score += brick.points;
          
          // Calculate penetration depth
          const overlapLeft = (ball.x + ball.width) - brick.x;
          const overlapRight = (brick.x + brick.width) - ball.x;
          const overlapTop = (ball.y + ball.height) - brick.y;
          const overlapBottom = (brick.y + brick.height) - ball.y;
          
          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);
          
          if (minOverlapX < minOverlapY) {
            // Horizontal collision
            ball.vx = -ball.vx;
            if (overlapLeft < overlapRight) {
              ball.x = brick.x - ball.width;
            } else {
              ball.x = brick.x + brick.width;
            }
          } else {
            // Vertical collision
            ball.vy = -ball.vy;
            if (overlapTop < overlapBottom) {
              ball.y = brick.y - ball.height;
            } else {
              ball.y = brick.y + brick.height;
            }
          }
          
          // Increase ball speed
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          if (speed < BALL_MAX_SPEED) {
            const newSpeed = Math.min(speed * BALL_SPEED_INCREASE, BALL_MAX_SPEED);
            const ratio = newSpeed / speed;
            ball.vx *= ratio;
            ball.vy *= ratio;
          }
          
          // Check victory
          if (bricks.every(b => !b.alive)) {
            victory();
          }
          
          // Only handle one brick collision per frame
          break;
        }
      }
    }
    
    function loseLife() {
      lives--;
      
      if (lives <= 0) {
        gameOver();
      } else {
        // Reset ball to paddle
        ball.active = false;
        ball.vx = 0;
        ball.vy = 0;
        ball.x = paddle.x + paddle.width / 2 - ball.width / 2;
        ball.y = paddle.y - ball.height - 2;
        state = STATE_BALL_ON_PADDLE;
      }
    }
    
    function gameOver() {
      state = STATE_GAMEOVER;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('breakout_highscore', highScore);
      }
    }
    
    function victory() {
      state = STATE_VICTORY;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('breakout_highscore', highScore);
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      // Clear canvas
      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Draw bricks
      drawBricks();
      
      // Draw paddle
      drawPaddle();
      
      // Draw ball
      drawBall();
      
      // Draw HUD
      drawHUD();
      
      // Draw overlays
      if (state === STATE_PAUSED) {
        drawPauseScreen();
      } else if (state === STATE_GAMEOVER) {
        drawGameOverScreen();
      } else if (state === STATE_VICTORY) {
        drawVictoryScreen();
      }
    }
    
    function drawBricks() {
      for (const brick of bricks) {
        if (!brick.alive) continue;
        
        // Draw brick
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        
        // Draw highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.fillRect(brick.x, brick.y, brick.width, 3);
        
        // Draw shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(brick.x, brick.y + brick.height - 3, brick.width, 3);
      }
    }
    
    function drawPaddle() {
      ctx.fillStyle = COLORS.paddle;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, 3);
    }
    
    function drawBall() {
      ctx.fillStyle = COLORS.ball;
      ctx.fillRect(ball.x, ball.y, ball.width, 3);
      }
    }
    
    function drawPaddle() {
      ctx.fillStyle = COLORS.paddle;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      
      // Rounded edges effect
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, 3);
    }
    
    function drawBall() {
      ctx.fillStyle = COLORS.ball;
      ctx.fillRect(ball.x, ball.y, ball.width, ball.height);
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(ball.x + 2, ball.y + 2, ball.width - 4, 3);
    }
    
    function drawHUD() {
      // Score
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 20px Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 10, 25);
      
      // Lives
      ctx.textAlign = 'right';
      ctx.fillText(`Lives: ${lives}`, W - 10, 25);
      
      // High score
      ctx.textAlign = 'center';
      ctx.font = '16px Arial, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText(`High: ${highScore}`, W / 2, 25);
    }
    
    function drawTitleScreen() {
      // Title
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 72px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BREAKOUT', W / 2, H / 2 - 120);
      
      // Instructions
      ctx.fillStyle = COLORS.text;
      ctx.font = '24px Arial, sans-serif';
      ctx.fillText('Press SPACE to start', W / 2, H / 2 - 20);
      
      ctx.font = '18px Arial, sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('← → or A D to move paddle', W / 2, H / 2 + 30);
      ctx.fillText('SPACE to launch ball / pause', W / 2, H / 2 + 60);
      
      // Sample bricks
      ctx.font = '16px Arial, sans-serif';
      ctx.fillText('Destroy all bricks to win!', W / 2, H / 2 + 120);
      
      // Draw sample bricks
      const sampleY = H / 2 + 160;
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = BRICK_COLORS[i].color;
        ctx.fillRect(W / 2 - 150 + i * 60, sampleY, 55, 20);
      }
      
      // High score
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px Arial, sans-serif';
      ctx.fillText(`High Score: ${highScore}`, W / 2, sampleY + 60);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 48px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press SPACE to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '28px Arial, sans-serif';
      ctx.fillText(`Score: ${score}`, W / 2, H / 2);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 24px Arial, sans-serif';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 100);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 130);
    }
    
    function drawVictoryScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#44FF44';
      ctx.font = 'bold 56px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', W / 2, H / 2 - 60);
      
      ctx.fillStyle = '#FFD700';
      ctx.font = '28px Arial, sans-serif';
      ctx.fillText('ALL BRICKS CLEARED!', W / 2, H / 2 - 10);
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '28px Arial, sans-serif';
      ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 40);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 24px Arial, sans-serif';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 80);
      }
      
      ctx.fillStyle = COLORS.text;
      ctx.font = '20px Arial, sans-serif';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 130);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 160);
    }
    
    // ==================== INPUT HANDLING ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      keys[e.key] = true;
      
      // Title screen
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_BALL_ON_PADDLE;
        e.preventDefault();
        return;
      }
      
      // Ball on paddle - launch
      if (state === STATE_BALL_ON_PADDLE && e.code === 'Space') {
        launchBall();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Playing - pause
      if (state === STATE_PLAYING && e.code === 'Space') {
        state = STATE_PAUSED;
        e.preventDefault();
        return;
      }
      
      // Paused - resume
      if (state === STATE_PAUSED && e.code === 'Space') {
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Restart
      if (e.code === 'KeyR') {
        initGame();
        state = STATE_BALL_ON_PADDLE;
        e.preventDefault();
        return;
      }
      
      // Escape to title
      if (e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
        return;
      }
      
      // Track left/right keys
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        keys.left = true;
      }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        keys.right = true;
      }
      
      // Prevent default for game keys
      if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
      keys[e.key] = false;
      
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        keys.left = false;
      }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        keys.right = false;
      }
    });
    
    // Reset keys when window loses focus
    window.addEventListener('blur', () => {
      for (const key in keys) {
        keys[key] = false;
      }
    });
    
    // ==================== GAME LOOP ====================
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }
    
    // Start the game loop
    initGame();
    gameLoop();
  </script>
</body>
</html>
