<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=800, H=600;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,type,fe,gain){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.value=freq;
    if(fe!==undefined) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(gain||0.15,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}

// ---- State ----
const ST={TITLE:0,ONPADDLE:1,PLAYING:2,PAUSED:3,GAMEOVER:4,VICTORY:5};
let state=ST.TITLE;
let score,hiScore,lives,bricks;
hiScore=parseInt(localStorage.getItem('brk4_hi')||'0');
let totalTime=0;

// ---- Paddle ----
const PAD_W=120,PAD_H=15,PAD_Y=H-45,PAD_SPD=8;
let pad={x:W/2-PAD_W/2,y:PAD_Y,w:PAD_W,h:PAD_H,flash:0};

// ---- Ball ----
const BALL_S=12,MAX_SPD=10,MIN_SPD=4;
let ball={x:0,y:0,vx:0,vy:0,w:BALL_S,h:BALL_S};

// ---- Bricks ----
const BRICK_COLS=10, BRICK_ROWS=6, BRICK_W=75, BRICK_H=25, BRICK_PAD=2;
const BRICK_OFF_X=25, BRICK_OFF_Y=50;
const ROW_COLORS=[
  {color:'#FF0000',pts:70},{color:'#FF8800',pts:60},{color:'#FFFF00',pts:50},
  {color:'#00FF00',pts:40},{color:'#0088FF',pts:30},{color:'#8800FF',pts:20}
];

function makeBricks(){
  const arr=[];
  for(let r=0;r<BRICK_ROWS;r++){
    for(let c=0;c<BRICK_COLS;c++){
      arr.push({
        x:BRICK_OFF_X+c*(BRICK_W+BRICK_PAD),
        y:BRICK_OFF_Y+r*(BRICK_H+BRICK_PAD),
        w:BRICK_W,h:BRICK_H,
        color:ROW_COLORS[r].color,pts:ROW_COLORS[r].pts,
        alive:true
      });
    }
  }
  return arr;
}

// ---- Input ----
const keys={};
window.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  if(!keys[k]){
    if(k===' '||k==='Spacebar'){
      initAC();
      if(state===ST.TITLE){ startGame(); }
      else if(state===ST.ONPADDLE){ launchBall(); }
      else if(state===ST.PLAYING){ state=ST.PAUSED; }
      else if(state===ST.PAUSED){ state=ST.PLAYING; }
    }
    if(k==='r'||k==='R'){
      if(state===ST.PAUSED||state===ST.GAMEOVER||state===ST.VICTORY||state===ST.PLAYING){ startGame(); }
    }
    if(k==='Escape'){ if(state!==ST.TITLE){ state=ST.TITLE; } }
  }
  keys[k]=true;
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });
window.addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; });

// ---- Game init ----
function startGame(){
  score=0; lives=3;
  bricks=makeBricks();
  pad.x=W/2-PAD_W/2;
  placeBallOnPaddle();
  state=ST.ONPADDLE;
}

function placeBallOnPaddle(){
  ball.x=pad.x+PAD_W/2-BALL_S/2;
  ball.y=PAD_Y-BALL_S-1;
  ball.vx=0; ball.vy=0;
}

function launchBall(){
  const angle=(45+Math.random()*30)*Math.PI/180;
  const dir=Math.random()<0.5?1:-1;
  const spd=6;
  ball.vx=Math.cos(angle)*spd*dir;
  ball.vy=-Math.sin(angle)*spd;
  state=ST.PLAYING;
}

// ---- Update ----
function update(){
  if(state!==ST.PLAYING&&state!==ST.ONPADDLE) return;

  // Paddle movement
  if(keys['ArrowLeft']||keys['a']||keys['A']) pad.x=Math.max(0,pad.x-PAD_SPD);
  if(keys['ArrowRight']||keys['d']||keys['D']) pad.x=Math.min(W-PAD_W,pad.x+PAD_SPD);
  if(pad.flash>0) pad.flash--;

  if(state===ST.ONPADDLE){
    ball.x=pad.x+PAD_W/2-BALL_S/2;
    ball.y=PAD_Y-BALL_S-1;
    return;
  }

  // Move ball
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Wall collisions
  if(ball.x<=0){ ball.x=0; ball.vx=Math.abs(ball.vx); beep(300,0.04,'square'); }
  if(ball.x+BALL_S>=W){ ball.x=W-BALL_S; ball.vx=-Math.abs(ball.vx); beep(300,0.04,'square'); }
  if(ball.y<=0){ ball.y=0; ball.vy=Math.abs(ball.vy); beep(300,0.04,'square'); }

  // Paddle collision
  if(ball.vy>0 && ball.y+BALL_S>=pad.y && ball.y<=pad.y+PAD_H &&
     ball.x+BALL_S>=pad.x && ball.x<=pad.x+PAD_W){
    const hitPos=((ball.x+BALL_S/2)-(pad.x+PAD_W/2))/(PAD_W/2);
    const maxAngle=Math.PI/3;
    const angle=Math.max(-1,Math.min(1,hitPos))*maxAngle;
    const spd=clampSpd(Math.sqrt(ball.vx**2+ball.vy**2)*1.003);
    ball.vx=Math.sin(angle)*spd;
    ball.vy=-Math.abs(Math.cos(angle)*spd);
    ball.y=pad.y-BALL_S;
    pad.flash=6;
    beep(440,0.05,'square');
  }

  // Ball lost
  if(ball.y>H+20){
    beep(200,0.25,'sawtooth',60,0.2);
    lives--;
    if(lives<=0){ state=ST.GAMEOVER; if(score>hiScore){hiScore=score;localStorage.setItem('brk4_hi',hiScore);} }
    else { placeBallOnPaddle(); state=ST.ONPADDLE; }
    return;
  }

  // Brick collisions
  for(const b of bricks){
    if(!b.alive) continue;
    const olx=(ball.x+BALL_S)-b.x;
    const orx=(b.x+b.w)-ball.x;
    const oty=(ball.y+BALL_S)-b.y;
    const oby=(b.y+b.h)-ball.y;
    if(olx>0&&orx>0&&oty>0&&oby>0){
      b.alive=false;
      score+=b.pts;
      if(score>hiScore){hiScore=score;localStorage.setItem('brk4_hi',hiScore);}
      const minX=Math.min(olx,orx), minY=Math.min(oty,oby);
      if(minX<minY){
        ball.vx=-ball.vx;
        ball.x=olx<orx?b.x-BALL_S:b.x+b.w;
      } else {
        ball.vy=-ball.vy;
        ball.y=oty<oby?b.y-BALL_S:b.y+b.h;
      }
      // Speed up
      const spd=Math.sqrt(ball.vx**2+ball.vy**2);
      const ns=clampSpd(spd*1.005);
      const r=ns/spd; ball.vx*=r; ball.vy*=r;
      beep(600+b.pts*2,0.06,'square');
      break;
    }
  }

  // Victory check
  if(bricks.every(b=>!b.alive)){
    if(score>hiScore){hiScore=score;localStorage.setItem('brk4_hi',hiScore);}
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'sine',null,0.2),i*100));
    state=ST.VICTORY;
  }
}

function clampSpd(s){ return Math.max(MIN_SPD,Math.min(MAX_SPD,s)); }

// ---- Render ----
function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(state===ST.TITLE){
    ctx.fillStyle='#fff'; ctx.font='bold 72px sans-serif'; ctx.textAlign='center';
    ctx.fillText('BREAKOUT',W/2,200);
    ctx.font='22px sans-serif'; ctx.fillStyle='#ccc';
    ctx.fillText('Press SPACE to start',W/2,290);
    ctx.fillStyle='#888'; ctx.font='16px sans-serif';
    ctx.fillText('← → or A D  to move  |  Space to launch / pause',W/2,335);
    ctx.fillStyle='#555'; ctx.font='15px sans-serif';
    ctx.fillText('Best: '+hiScore,W/2,395);
    return;
  }

  // Bricks
  for(const b of bricks){
    if(!b.alive) continue;
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(b.x,b.y,b.w,4);
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.fillRect(b.x,b.y+b.h-4,b.w,4);
  }

  // Paddle
  ctx.fillStyle=pad.flash>0?'#FFD700':'#fff';
  ctx.fillRect(pad.x,pad.y,PAD_W,PAD_H);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(pad.x,pad.y,PAD_W,4);

  // Ball
  ctx.fillStyle='#fff';
  ctx.fillRect(ball.x,ball.y,BALL_S,BALL_S);

  // HUD
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif'; ctx.textAlign='left';
  ctx.fillText('Score: '+score,10,H-12);
  ctx.textAlign='right';
  ctx.fillText('Lives: '+'♥'.repeat(lives),W-10,H-12);

  if(state===ST.ONPADDLE){
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='18px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Press SPACE to launch',W/2,H-68);
  }

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 56px sans-serif'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-20);
    ctx.font='20px sans-serif'; ctx.fillStyle='#aaa';
    ctx.fillText('SPACE to resume  |  R to restart',W/2,H/2+35);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF4444'; ctx.font='bold 60px sans-serif'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-50);
    ctx.fillStyle='#fff'; ctx.font='26px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    ctx.fillStyle='#aaa'; ctx.font='18px sans-serif';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+60);
  }

  if(state===ST.VICTORY){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700'; ctx.font='bold 60px sans-serif'; ctx.textAlign='center';
    ctx.fillText('YOU WIN!',W/2,H/2-50);
    ctx.fillStyle='#fff'; ctx.font='26px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    ctx.fillStyle='#aaa'; ctx.font='18px sans-serif';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+60);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  totalTime=now/1000;
  update();
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
