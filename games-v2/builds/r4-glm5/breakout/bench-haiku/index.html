<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="breakoutCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('breakoutCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, BALL_ON_PADDLE: 1, PLAYING: 2, PAUSED: 3, GAME_OVER: 4, VICTORY: 5 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('breakoutHighScore') || '0', 10);
    let lives = 3;

    // Paddle
    const paddle = { x: 340, y: 555, width: 120, height: 15, speed: 8 };

    // Ball
    let ball = { x: 400, y: 540, width: 12, height: 12, vx: 0, vy: 0, maxSpeed: 10 };

    // Bricks
    let bricks = [];
    const brickRows = 6;
    const brickCols = 10;
    const brickWidth = 75;
    const brickHeight = 25;
    const brickColors = [
      { color: '#FF0000', points: 70 },
      { color: '#FF8800', points: 60 },
      { color: '#FFFF00', points: 50 },
      { color: '#00FF00', points: 40 },
      { color: '#0088FF', points: 30 },
      { color: '#8800FF', points: 20 }
    ];

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          initGame();
        } else if (gameState === STATES.BALL_ON_PADDLE) {
          launchBall();
        } else if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState !== STATES.TITLE) {
          initGame();
        }
      }

      if (key === 'escape') {
        gameState = STATES.TITLE;
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function initGame() {
      score = 0;
      lives = 3;
      initBricks();
      resetPaddle();
      resetBall();
      gameState = STATES.BALL_ON_PADDLE;
    }

    function initBricks() {
      bricks = [];
      for (let row = 0; row < brickRows; row++) {
        for (let col = 0; col < brickCols; col++) {
          bricks.push({
            x: 25 + col * (brickWidth + 2),
            y: 50 + row * (brickHeight + 2),
            width: brickWidth,
            height: brickHeight,
            color: brickColors[row].color,
            points: brickColors[row].points,
            alive: true
          });
        }
      }
    }

    function resetPaddle() {
      paddle.x = (WIDTH - paddle.width) / 2;
    }

    function resetBall() {
      ball.x = paddle.x + paddle.width / 2 - ball.width / 2;
      ball.y = paddle.y - ball.height - 5;
      ball.vx = 0;
      ball.vy = 0;
    }

    function launchBall() {
      const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
      const direction = Math.random() < 0.5 ? 1 : -1;
      const speed = 6;
      ball.vx = Math.sin(angle) * speed * direction;
      ball.vy = -Math.cos(angle) * speed;
      gameState = STATES.PLAYING;
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      // Paddle movement
      if (keys['arrowleft'] || keys['a']) {
        paddle.x -= paddle.speed;
      }
      if (keys['arrowright'] || keys['d']) {
        paddle.x += paddle.speed;
      }
      paddle.x = Math.max(0, Math.min(WIDTH - paddle.width, paddle.x));

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall collisions
      if (ball.x <= 0) {
        ball.x = 0;
        ball.vx = -ball.vx;
      }
      if (ball.x + ball.width >= WIDTH) {
        ball.x = WIDTH - ball.width;
        ball.vx = -ball.vx;
      }
      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
      }

      // Ball lost
      if (ball.y > HEIGHT) {
        lives--;
        if (lives <= 0) {
          gameState = STATES.GAME_OVER;
        } else {
          resetBall();
          gameState = STATES.BALL_ON_PADDLE;
        }
        return;
      }

      // Paddle collision
      if (ball.y + ball.height >= paddle.y &&
          ball.y <= paddle.y + paddle.height &&
          ball.x + ball.width >= paddle.x &&
          ball.x <= paddle.x + paddle.width &&
          ball.vy > 0) {
        const hitPos = ((ball.x + ball.width / 2) - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        const maxAngle = Math.PI / 3;
        const angle = Math.max(-1, Math.min(1, hitPos)) * maxAngle;
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.abs(Math.cos(angle) * speed);
        ball.y = paddle.y - ball.height;
      }

      // Brick collisions
      for (let i = bricks.length - 1; i >= 0; i--) {
        const brick = bricks[i];
        if (!brick.alive) continue;

        if (ball.x + ball.width >= brick.x &&
            ball.x <= brick.x + brick.width &&
            ball.y + ball.height >= brick.y &&
            ball.y <= brick.y + brick.height) {

          brick.alive = false;
          score += brick.points;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('breakoutHighScore', highScore);
          }

          // Penetration depth approach
          const overlapLeft = (ball.x + ball.width) - brick.x;
          const overlapRight = (brick.x + brick.width) - ball.x;
          const overlapTop = (ball.y + ball.height) - brick.y;
          const overlapBottom = (brick.y + brick.height) - ball.y;

          const minOverlapX = Math.min(overlapLeft, overlapRight);
          const minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            ball.vx = -ball.vx;
            if (overlapLeft < overlapRight) {
              ball.x = brick.x - ball.width;
            } else {
              ball.x = brick.x + brick.width;
            }
          } else {
            ball.vy = -ball.vy;
            if (overlapTop < overlapBottom) {
              ball.y = brick.y - ball.height;
            } else {
              ball.y = brick.y + brick.height;
            }
          }

          // Speed increase
          const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          if (currentSpeed < ball.maxSpeed) {
            const newSpeed = Math.min(currentSpeed * 1.005, ball.maxSpeed);
            const ratio = newSpeed / currentSpeed;
            ball.vx *= ratio;
            ball.vy *= ratio;
          }

          break;
        }
      }

      // Check victory
      if (bricks.every(b => !b.alive)) {
        gameState = STATES.VICTORY;
      }
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw paddle
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

      // Draw bricks
      for (let brick of bricks) {
        if (brick.alive) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        }
      }

      // Draw ball
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(ball.x, ball.y, ball.width, ball.height);

      // Draw score and lives
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw high score
      ctx.font = '16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('High Score: ' + highScore, WIDTH / 2, 25);

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('BREAKOUT', WIDTH / 2, 200);

        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '18px Arial';
        ctx.fillText('← → or A D to move paddle', WIDTH / 2, 350);
        ctx.fillText('Space to launch / pause', WIDTH / 2, 385);
      } else if (gameState === STATES.BALL_ON_PADDLE) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Press SPACE to launch', WIDTH / 2, HEIGHT / 2);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 40);

        ctx.font = '24px Arial';
        ctx.fillText('Press SPACE to resume', WIDTH / 2, HEIGHT / 2 + 40);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '24px Arial';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);

        ctx.font = '20px Arial';
        ctx.fillText('Press R to play again', WIDTH / 2, 360);
        ctx.fillText('Press ESC for title', WIDTH / 2, 395);
      } else if (gameState === STATES.VICTORY) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('YOU WIN!', WIDTH / 2, 200);

        ctx.font = '24px Arial';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);

        ctx.font = '20px Arial';
        ctx.fillText('Press R to play again', WIDTH / 2, 360);
        ctx.fillText('Press ESC for title', WIDTH / 2, 395);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
