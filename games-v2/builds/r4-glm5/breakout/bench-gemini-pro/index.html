<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
    body {
        margin: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: sans-serif;
    }
    canvas {
        background-color: #000;
        box-shadow: 0 0 20px rgba(255,255,255,0.1);
        display: block;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// --- Constants ---
const PADDLE_W = 120;
const PADDLE_H = 15;
const PADDLE_Y = H - 30;
const PADDLE_SPEED = 8;

const BALL_R = 10;
const BALL_START_SPEED = 6;
const BALL_MAX_SPEED = 10;
const BALL_MIN_SPEED = 4;
const MAX_BOUNCE_ANGLE = Math.PI / 3; // 60 degrees

const BRICK_ROWS = 6;
const BRICK_COLS = 10;
const BRICK_W = 75;
const BRICK_H = 25;
const BRICK_PAD = 2;
const BRICK_OFFSET_TOP = 50;
const BRICK_OFFSET_LEFT = 25;

const COLORS = [
    { c: '#FF0000', pts: 70 }, // Row 1
    { c: '#FF8800', pts: 60 }, // Row 2
    { c: '#FFFF00', pts: 50 }, // Row 3
    { c: '#00FF00', pts: 40 }, // Row 4
    { c: '#0088FF', pts: 30 }, // Row 5
    { c: '#8800FF', pts: 20 }  // Row 6
];

const ST_TITLE = 0;
const ST_READY = 1; // Ball on paddle
const ST_PLAY = 2;
const ST_PAUSE = 3;
const ST_OVER = 4;
const ST_WIN = 5;

// --- State ---
let state = ST_TITLE;
let score = 0;
let lives = 3;
let bricks = [];

let pad = { x: W/2 - PADDLE_W/2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
let ball = { x: W/2, y: PADDLE_Y - BALL_R, vx: 0, vy: 0, r: BALL_R, speed: BALL_START_SPEED };

const keys = { left: false, right: false };
let spacePressed = false;
let rPressed = false;
let escPressed = false;

// --- Setup ---

function resetLevel() {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            bricks.push({
                x: BRICK_OFFSET_LEFT + c * (BRICK_W + BRICK_PAD),
                y: BRICK_OFFSET_TOP + r * (BRICK_H + BRICK_PAD),
                w: BRICK_W,
                h: BRICK_H,
                color: COLORS[r].c,
                pts: COLORS[r].pts,
                alive: true
            });
        }
    }
}

function resetBall() {
    pad.x = W/2 - pad.w/2;
    ball.x = pad.x + pad.w/2;
    ball.y = pad.y - ball.r;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = BALL_START_SPEED;
    state = ST_READY;
}

function startGame() {
    score = 0;
    lives = 3;
    resetLevel();
    resetBall();
}

function launchBall() {
    let angle = (Math.random() * (Math.PI/6)) + (Math.PI/4); // 45 to 75 deg relative to plane
    let dirX = Math.random() < 0.5 ? 1 : -1;
    
    ball.vx = Math.cos(angle) * ball.speed * dirX;
    ball.vy = -Math.sin(angle) * ball.speed;
}

// --- Input ---

window.addEventListener('keydown', e => {
    let k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.left = true;
    if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.right = true;
    
    if (k === ' ' && !spacePressed) {
        spacePressed = true;
        if (state === ST_TITLE) startGame();
        else if (state === ST_READY) { state = ST_PLAY; launchBall(); }
        else if (state === ST_PLAY) state = ST_PAUSE;
        else if (state === ST_PAUSE) state = ST_PLAY;
    }
    
    if ((k === 'r' || k === 'R') && !rPressed) {
        rPressed = true;
        if (state === ST_OVER || state === ST_WIN || state === ST_PAUSE) startGame();
    }
    
    if (k === 'Escape' && !escPressed) {
        escPressed = true;
        state = ST_TITLE;
    }
});

window.addEventListener('keyup', e => {
    let k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.left = false;
    if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.right = false;
    if (k === ' ') spacePressed = false;
    if (k === 'r' || k === 'R') rPressed = false;
    if (k === 'Escape') escPressed = false;
});

// --- Logic ---

function update() {
    if (state === ST_TITLE || state === ST_PAUSE || state === ST_OVER || state === ST_WIN) return;

    // Move Pad
    if (keys.left) pad.x -= PADDLE_SPEED;
    if (keys.right) pad.x += PADDLE_SPEED;
    
    if (pad.x < 0) pad.x = 0;
    if (pad.x + pad.w > W) pad.x = W - pad.w;

    if (state === ST_READY) {
        ball.x = pad.x + pad.w/2;
        return; // wait for launch
    }

    // Move Ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall Collisions
    if (ball.x - ball.r <= 0) {
        ball.x = ball.r;
        ball.vx = -ball.vx;
    } else if (ball.x + ball.r >= W) {
        ball.x = W - ball.r;
        ball.vx = -ball.vx;
    }

    if (ball.y - ball.r <= 0) {
        ball.y = ball.r;
        ball.vy = -ball.vy;
    }

    // Death
    if (ball.y - ball.r >= H) {
        lives--;
        if (lives <= 0) state = ST_OVER;
        else resetBall();
        return;
    }

    // Pad Collision
    // Ensure we only bounce if ball is moving down and intersecting top face
    if (ball.vy > 0 && 
        ball.y + ball.r >= pad.y && 
        ball.y - ball.r <= pad.y + pad.h && 
        ball.x + ball.r >= pad.x && 
        ball.x - ball.r <= pad.x + pad.w) {
        
        let hitRatio = (ball.x - (pad.x + pad.w/2)) / (pad.w/2);
        hitRatio = Math.max(-1, Math.min(1, hitRatio));
        
        let angle = hitRatio * MAX_BOUNCE_ANGLE;
        
        ball.vx = Math.sin(angle) * ball.speed;
        ball.vy = -Math.abs(Math.cos(angle) * ball.speed); // force up
        
        ball.y = pad.y - ball.r; // correction
    }

    // Brick Collisions
    let bricksAlive = 0;
    for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        if (!b.alive) continue;
        bricksAlive++;

        // AABB using ball bounds
        let ballLeft = ball.x - ball.r;
        let ballRight = ball.x + ball.r;
        let ballTop = ball.y - ball.r;
        let ballBottom = ball.y + ball.r;

        let bLeft = b.x;
        let bRight = b.x + b.w;
        let bTop = b.y;
        let bBottom = b.y + b.h;

        if (ballRight >= bLeft && ballLeft <= bRight && ballBottom >= bTop && ballTop <= bBottom) {
            
            b.alive = false;
            score += b.pts;
            bricksAlive--;

            // Penetration depth check
            let overlapLeft = ballRight - bLeft;
            let overlapRight = bRight - ballLeft;
            let overlapTop = ballBottom - bTop;
            let overlapBottom = bBottom - ballTop;

            let minX = Math.min(overlapLeft, overlapRight);
            let minY = Math.min(overlapTop, overlapBottom);

            if (minX < minY) {
                ball.vx = -ball.vx;
                ball.x = overlapLeft < overlapRight ? bLeft - ball.r : bRight + ball.r;
            } else {
                ball.vy = -ball.vy;
                ball.y = overlapTop < overlapBottom ? bTop - ball.r : bBottom + ball.r;
            }

            // Speed up
            ball.speed = Math.min(ball.speed * 1.005, BALL_MAX_SPEED);
            let currentS = Math.hypot(ball.vx, ball.vy);
            ball.vx = (ball.vx / currentS) * ball.speed;
            ball.vy = (ball.vy / currentS) * ball.speed;

            break; // Only hit one brick per frame
        }
    }

    if (bricksAlive === 0 && state === ST_PLAY) {
        state = ST_WIN;
    }
}

// --- Render ---

function drawRect(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawCircle(x, y, r, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(Math.floor(x), Math.floor(y), Math.floor(r), 0, Math.PI*2);
    ctx.fill();
}

function drawText(txt, x, y, size, align='center', col='#FFF') {
    ctx.fillStyle = col;
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    ctx.fillText(txt, Math.floor(x), Math.floor(y));
}

function render() {
    drawRect(0, 0, W, H, '#000');

    if (state === ST_TITLE) {
        drawText("BREAKOUT", W/2, H/3, 80);
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press SPACE to start", W/2, H/2 + 20, 24);
        drawText("← → or A D to move paddle", W/2, H/2 + 70, 16, 'center', '#AAA');
        return;
    }

    // Bricks
    for (let b of bricks) {
        if (b.alive) drawRect(b.x, b.y, b.w, b.h, b.color);
    }

    // Pad
    drawRect(pad.x, pad.y, pad.w, pad.h, '#FFF');

    // Ball
    drawCircle(ball.x, ball.y, ball.r, '#FFF');

    // UI
    drawText(`Score: ${score}`, 20, 20, 20, 'left');
    drawText(`Lives: ${lives}`, W - 20, 20, 20, 'right');

    // Overlays
    if (state === ST_PAUSE) {
        drawRect(0, 0, W, H, 'rgba(0,0,0,0.6)');
        drawText("PAUSED", W/2, H/2 - 30, 60);
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press SPACE to resume", W/2, H/2 + 40, 20);
    } else if (state === ST_OVER) {
        drawRect(0, 0, W, H, 'rgba(0,0,0,0.8)');
        drawText("GAME OVER", W/2, H/2 - 50, 60, 'center', '#F00');
        drawText(`Score: ${score}`, W/2, H/2 + 20, 30);
        drawText("Press R to play again", W/2, H/2 + 70, 20);
        drawText("Press ESC for title screen", W/2, H/2 + 110, 16, 'center', '#AAA');
    } else if (state === ST_WIN) {
        drawRect(0, 0, W, H, 'rgba(0,0,0,0.8)');
        drawText("YOU WIN!", W/2, H/2 - 50, 60, 'center', '#0F0');
        drawText(`Score: ${score}`, W/2, H/2 + 20, 30);
        drawText("Press R to play again", W/2, H/2 + 70, 20);
        drawText("Press ESC for title screen", W/2, H/2 + 110, 16, 'center', '#AAA');
    } else if (state === ST_READY) {
        let blink = Math.floor(performance.now() / 500) % 2 === 0;
        if (blink) drawText("Press SPACE to launch", W/2, pad.y - 40, 20);
    }
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
