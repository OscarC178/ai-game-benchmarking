<!--
  GAME:      Breakout
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Arcade Classic</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #000;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="breakout" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('breakout');
        const ctx = canvas.getContext('2d');

        // Constants
        const WIDTH = 800;
        const HEIGHT = 600;
        const PADDLE_WIDTH = 120;
        const PADDLE_HEIGHT = 15;
        const BALL_SIZE = 12;
        const BRICK_ROWS = 6;
        const BRICK_COLS = 10;
        const BRICK_WIDTH = 75;
        const BRICK_HEIGHT = 25;
        const BRICK_OFFSET_TOP = 50;
        const BRICK_OFFSET_LEFT = 25;
        const PADDLE_SPEED = 8;
        const INITIAL_BALL_SPEED = 6;
        const MAX_BALL_SPEED = 10;

        // Game State
        let state = 'TITLE'; // TITLE, READY, PLAYING, PAUSED, GAMEOVER, VICTORY
        let score = 0;
        let lives = 3;
        let bricks = [];
        let lastTime = 0;

        const keys = { left: false, right: false };

        const paddle = {
            x: WIDTH / 2 - PADDLE_WIDTH / 2,
            y: HEIGHT - 30 - PADDLE_HEIGHT,
            w: PADDLE_WIDTH,
            h: PADDLE_HEIGHT
        };

        const ball = {
            x: 0,
            y: 0,
            w: BALL_SIZE,
            h: BALL_SIZE,
            vx: 0,
            vy: 0,
            active: false
        };

        const brickColors = [
            { color: "#FF0000", points: 70 },
            { color: "#FF8800", points: 60 },
            { color: "#FFFF00", points: 50 },
            { color: "#00FF00", points: 40 },
            { color: "#0088FF", points: 30 },
            { color: "#8800FF", points: 20 }
        ];

        // Input Listeners
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ') handleSpace();
            if (e.key.toLowerCase() === 'r') initGame();
            if (e.key === 'Escape') state = 'TITLE';
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
        });

        function handleSpace() {
            if (state === 'TITLE') {
                initGame();
            } else if (state === 'READY') {
                launchBall();
            } else if (state === 'PLAYING') {
                state = 'PAUSED';
            } else if (state === 'PAUSED') {
                state = 'PLAYING';
            }
        }

        function initGame() {
            score = 0;
            lives = 3;
            state = 'READY';
            initBricks();
            resetPaddle();
            resetBall();
        }

        function initBricks() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: BRICK_OFFSET_LEFT + c * (BRICK_WIDTH + 2),
                        y: BRICK_OFFSET_TOP + r * (BRICK_HEIGHT + 2),
                        w: BRICK_WIDTH,
                        h: BRICK_HEIGHT,
                        color: brickColors[r].color,
                        points: brickColors[r].points,
                        alive: true
                    });
                }
            }
        }

        function resetPaddle() {
            paddle.x = WIDTH / 2 - PADDLE_WIDTH / 2;
        }

        function resetBall() {
            ball.active = false;
            ball.vx = 0;
            ball.vy = 0;
            ball.x = paddle.x + paddle.w / 2 - ball.w / 2;
            ball.y = paddle.y - ball.h;
        }

        function launchBall() {
            state = 'PLAYING';
            ball.active = true;
            const angle = (Math.random() * (Math.PI / 4)) + (Math.PI / 4); // 45 to 90 degrees
            const dir = Math.random() < 0.5 ? -1 : 1;
            ball.vx = Math.cos(angle) * INITIAL_BALL_SPEED * dir;
            ball.vy = -Math.sin(angle) * INITIAL_BALL_SPEED;
        }

        function update() {
            if (state !== 'PLAYING' && state !== 'READY') return;

            // Paddle move
            if (keys.left) paddle.x -= PADDLE_SPEED;
            if (keys.right) paddle.x += PADDLE_SPEED;
            paddle.x = Math.max(0, Math.min(WIDTH - paddle.w, paddle.x));

            if (state === 'READY') {
                ball.x = paddle.x + paddle.w / 2 - ball.w / 2;
                ball.y = paddle.y - ball.h;
                return;
            }

            // Ball move
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Wall Collisions
            if (ball.x <= 0) {
                ball.x = 0;
                ball.vx = -ball.vx;
            } else if (ball.x + ball.w >= WIDTH) {
                ball.x = WIDTH - ball.w;
                ball.vx = -ball.vx;
            }

            if (ball.y <= 0) {
                ball.y = 0;
                ball.vy = -ball.vy;
            }

            // Bottom out
            if (ball.y > HEIGHT) {
                lives--;
                if (lives <= 0) {
                    state = 'GAMEOVER';
                } else {
                    state = 'READY';
                    resetBall();
                    resetPaddle();
                }
                return;
            }

            // Paddle Collision
            if (ball.vy > 0 && 
                ball.y + ball.h >= paddle.y && 
                ball.y <= paddle.y + paddle.h &&
                ball.x + ball.w >= paddle.x && 
                ball.x <= paddle.x + paddle.w) {
                
                const hitPos = ((ball.x + ball.w / 2) - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                const maxAngle = Math.PI / 3;
                const angle = hitPos * maxAngle;
                
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                ball.vx = Math.sin(angle) * speed;
                ball.vy = -Math.cos(angle) * speed;
                ball.y = paddle.y - ball.h;
            }

            // Brick Collisions
            for (let b of bricks) {
                if (!b.alive) continue;

                if (ball.x + ball.w >= b.x && ball.x <= b.x + b.w &&
                    ball.y + ball.h >= b.y && ball.y <= b.y + b.h) {
                    
                    // Collision detected
                    b.alive = false;
                    score += b.points;

                    // Side of collision
                    const overlapLeft = (ball.x + ball.w) - b.x;
                    const overlapRight = (b.x + b.w) - ball.x;
                    const overlapTop = (ball.y + ball.h) - b.y;
                    const overlapBottom = (b.y + b.h) - ball.y;

                    const minX = Math.min(overlapLeft, overlapRight);
                    const minY = Math.min(overlapTop, overlapBottom);

                    if (minX < minY) {
                        ball.vx = -ball.vx;
                        ball.x = (overlapLeft < overlapRight) ? b.x - ball.w : b.x + b.w;
                    } else {
                        ball.vy = -ball.vy;
                        ball.y = (overlapTop < overlapBottom) ? b.y - ball.h : b.y + b.h;
                    }

                    // Speed increase
                    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                    if (speed < MAX_BALL_SPEED) {
                        const ratio = (speed * 1.005) / speed;
                        ball.vx *= ratio;
                        ball.vy *= ratio;
                    }

                    break; // One brick per frame
                }
            }

            if (bricks.every(b => !b.alive)) {
                state = 'VICTORY';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Bricks
            for (let b of bricks) {
                if (!b.alive) continue;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
            }

            // Paddle
            ctx.fillStyle = '#FFF';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            // Ball
            ctx.fillStyle = '#FFF';
            ctx.fillRect(ball.x, ball.y, ball.w, ball.h);

            // UI
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`Lives: ${lives}`, WIDTH - 20, 30);

            // Overlays
            ctx.textAlign = 'center';
            if (state === 'TITLE') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 80px Segoe UI';
                ctx.fillText('BREAKOUT', WIDTH/2, HEIGHT/2 - 40);
                ctx.font = '24px Segoe UI';
                ctx.fillText('Press SPACE to start', WIDTH/2, HEIGHT/2 + 40);
                ctx.font = '18px Segoe UI';
                ctx.fillText('← → or A D to move paddle', WIDTH/2, HEIGHT/2 + 80);
            } else if (state === 'READY') {
                ctx.fillStyle = '#FFF';
                ctx.font = '24px Segoe UI';
                ctx.fillText('Press SPACE to launch', WIDTH/2, HEIGHT/2 + 100);
            } else if (state === 'PAUSED') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 60px Segoe UI';
                ctx.fillText('PAUSED', WIDTH/2, HEIGHT/2);
                ctx.font = '24px Segoe UI';
                ctx.fillText('Press SPACE to resume', WIDTH/2, HEIGHT/2 + 60);
            } else if (state === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#F00';
                ctx.font = 'bold 80px Segoe UI';
                ctx.fillText('GAME OVER', WIDTH/2, HEIGHT/2 - 40);
                ctx.fillStyle = '#FFF';
                ctx.font = '24px Segoe UI';
                ctx.fillText(`Score: ${score}`, WIDTH/2, HEIGHT/2 + 40);
                ctx.fillText('Press R to play again', WIDTH/2, HEIGHT/2 + 90);
            } else if (state === 'VICTORY') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#0F0';
                ctx.font = 'bold 80px Segoe UI';
                ctx.fillText('YOU WIN!', WIDTH/2, HEIGHT/2 - 40);
                ctx.fillStyle = '#FFF';
                ctx.font = '24px Segoe UI';
                ctx.fillText(`Score: ${score}`, WIDTH/2, HEIGHT/2 + 40);
                ctx.fillText('Press R to play again', WIDTH/2, HEIGHT/2 + 90);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
