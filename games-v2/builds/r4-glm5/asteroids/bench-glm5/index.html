<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   z-ai/glm-5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ==================== CONSTANTS ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;
    
    // Game states
    const STATE_TITLE = 0;
    const STATE_PLAYING = 1;
    const STATE_PAUSED = 2;
    const STATE_PLAYER_DEAD = 3;
    const STATE_GAMEOVER = 4;
    
    // Ship settings
    const SHIP_SIZE = 15;
    const SHIP_ROTATION_SPEED = 0.08;
    const SHIP_THRUST = 0.12;
    const SHIP_MAX_SPEED = 7;
    const SHIP_FRICTION = 0.99;
    
    // Bullet settings
    const BULLET_SPEED = 10;
    const BULLET_MAX_AGE = 60;
    const MAX_BULLETS = 4;
    
    // Asteroid settings
    const ASTEROID_SPEEDS = { large: 1.5, medium: 2.5, small: 3.5 };
    const ASTEROID_RADII = { large: 45, medium: 22, small: 12 };
    const ASTEROID_POINTS = { large: 20, medium: 50, small: 100 };
    
    // Saucer settings
    const SAUCER_INTERVAL_MIN = 15000;
    const SAUCER_INTERVAL_MAX = 30000;
    const SAUCER_LARGE_POINTS = 200;
    const SAUCER_SMALL_POINTS = 1000;
    
    // Colors
    const COLORS = {
      ship: '#FFFFFF',
      thrust: '#FFA500',
      bullet: '#FFFFFF',
      asteroid: '#FFFFFF',
      saucer: '#FFFFFF',
      text: '#FFFFFF'
    };
    
    // ==================== GAME STATE ====================
    let state = STATE_TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('asteroids_highscore') || '0');
    let lives = 3;
    let wave = 1;
    
    let ship = null;
    let bullets = [];
    let asteroids = [];
    let saucer = null;
    let saucerBullets = [];
    let particles = [];
    let saucerTimer = 0;
    let nextSaucerTime = SAUCER_INTERVAL_MIN;
    
    let respawnTimer = 0;
    let invincibleTimer = 0;
    
    const keys = {};
    
    // ==================== INITIALIZATION ====================
    function initGame() {
      ship = {
        x: W / 2,
        y: H / 2,
        vx: 0,
        vy: 0,
        angle: -Math.PI / 2,
        thrusting: false
      };
      
      bullets = [];
      asteroids = [];
      saucer = null;
      saucerBullets = [];
      particles = [];
      saucerTimer = 0;
      nextSaucerTime = SAUCER_INTERVAL_MIN;
      
      score = 0;
      lives = 3;
      wave = 1;
      invincibleTimer = 0;
      
      spawnAsteroids();
    }
    
    function spawnAsteroids() {
      const count = Math.min(4 + Math.floor(wave / 2), 6);
      
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * W;
          y = Math.random() * H;
        } while (distance(x, y, W / 2, H / 2) < 150);
        
        asteroids.push(createAsteroid(x, y, 'large'));
      }
    }
    
    function createAsteroid(x, y, size) {
      const speed = ASTEROID_SPEEDS[size] * (0.8 + Math.random() * 0.4);
      const angle = Math.random() * Math.PI * 2;
      
      const numVertices = 8 + Math.floor(Math.random() * 5);
      const vertices = [];
      const baseRadius = ASTEROID_RADII[size];
      
      for (let i = 0; i < numVertices; i++) {
        const a = (i / numVertices) * Math.PI * 2;
        const r = baseRadius * (0.7 + Math.random() * 0.5);
        vertices.push({
          x: Math.cos(a) * r,
          y: Math.sin(a) * r
        });
      }
      
      return {
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: size,
        radius: baseRadius,
        vertices: vertices,
        rotation: 0,
        rotationSpeed: (Math.random() - 0.5) * 0.03
      };
    }
    
    function splitAsteroid(asteroid) {
      const newAsteroids = [];
      
      if (asteroid.size === 'large') {
        const count = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
          newAsteroids.push(createAsteroid(
            asteroid.x + (Math.random() - 0.5) * 20,
            asteroid.y + (Math.random() - 0.5) * 20,
            'medium'
          ));
        }
      } else if (asteroid.size === 'medium') {
        const count = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
          newAsteroids.push(createAsteroid(
            asteroid.x + (Math.random() - 0.5) * 10,
            asteroid.y + (Math.random() - 0.5) * 10,
            'small'
          ));
        }
      }
      
      return newAsteroids;
    }
    
    function spawnSaucer() {
      const fromLeft = Math.random() < 0.5;
      const isSmall = score > 50000 && Math.random() < 0.4;
      
      saucer = {
        x: fromLeft ? -30 : W + 30,
        y: Math.random() * (H - 100) + 50,
        vx: (fromLeft ? 1 : -1) * (2 + wave * 0.2),
        vy: (Math.random() - 0.5) * 2,
        isSmall: isSmall,
        width: isSmall ? 20 : 40,
        radius: isSmall ? 12 : 24,
        lastShot: 0,
        dirChangeTimer: 0
      };
    }
    
    // ==================== UPDATE ====================
    function update(dt) {
      const dtMs = dt * 1000;
      
      if (state === STATE_PLAYER_DEAD) {
        updateParticles(dt);
        respawnTimer -= dtMs;
        if (respawnTimer <= 0) {
          if (lives > 0) {
            ship.x = W / 2;
            ship.y = H / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = -Math.PI / 2;
            state = STATE_PLAYING;
            invincibleTimer = 3000;
          } else {
            state = STATE_GAMEOVER;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('asteroids_highscore', highScore);
            }
          }
        }
        updateAsteroids();
        if (saucer) updateSaucer(dt);
        updateSaucerBullets();
        return;
      }
      
      if (state !== STATE_PLAYING) return;
      
      // Update invincibility
      if (invincibleTimer > 0) {
        invincibleTimer -= dtMs;
      }
      
      // Ship controls
      if (keys.left) ship.angle -= SHIP_ROTATION_SPEED;
      if (keys.right) ship.angle += SHIP_ROTATION_SPEED;
      
      if (keys.thrust) {
        ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
        ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
        ship.thrusting = true;
      } else {
        ship.thrusting = false;
      }
      
      // Limit speed
      const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
      if (speed > SHIP_MAX_SPEED) {
        ship.vx = (ship.vx / speed) * SHIP_MAX_SPEED;
        ship.vy = (ship.vy / speed) * SHIP_MAX_SPEED;
      }
      
      // Apply friction
      ship.vx *= SHIP_FRICTION;
      ship.vy *= SHIP_FRICTION;
      
      // Move ship
      ship.x += ship.vx;
      ship.y += ship.vy;
      wrapPosition(ship);
      
      // Fire bullets
      if (keys.fire && bullets.length < MAX_BULLETS) {
        bullets.push({
          x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
          y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
          vx: ship.vx + Math.cos(ship.angle) * BULLET_SPEED,
          vy: ship.vy + Math.sin(ship.angle) * BULLET_SPEED,
          age: 0
        });
        keys.fire = false;
      }
      
      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].vx;
        bullets[i].y += bullets[i].vy;
        bullets[i].age++;
        wrapPosition(bullets[i]);
        if (bullets[i].age > BULLET_MAX_AGE) {
          bullets.splice(i, 1);
        }
      }
      
      // Update asteroids
      updateAsteroids();
      
      // Saucer spawning
      saucerTimer += dtMs;
      if (!saucer && saucerTimer > nextSaucerTime) {
        spawnSaucer();
        saucerTimer = 0;
        nextSaucerTime = SAUCER_INTERVAL_MIN + Math.random() * (SAUCER_INTERVAL_MAX - SAUCER_INTERVAL_MIN);
      }
      
      // Update saucer
      if (saucer) {
        updateSaucer(dt);
      }
      
      // Update saucer bullets
      updateSaucerBullets();
      
      // Update particles
      updateParticles(dt);
      
      // Check collisions
      checkCollisions();
      
      // Check wave complete
      if (asteroids.length === 0 && !saucer) {
        wave++;
        spawnAsteroids();
      }
    }
    
    function updateAsteroids() {
      for (const asteroid of asteroids) {
        asteroid.x += asteroid.vx;
        asteroid.y += asteroid.vy;
        asteroid.rotation += asteroid.rotationSpeed;
        wrapPosition(asteroid);
      }
    }
    
    function updateSaucer(dt) {
      saucer.x += saucer.vx;
      saucer.y += saucer.vy;
      
      // Random direction changes
      saucer.dirChangeTimer += dt * 1000;
      if (saucer.dirChangeTimer > 1000) {
        saucer.dirChangeTimer = 0;
        saucer.vy = (Math.random() - 0.5) * 3;
      }
      
      // Keep in vertical bounds
      if (saucer.y < 30) saucer.y = 30;
      if (saucer.y > H - 30) saucer.y = H - 30;
      
      // Wrap horizontally
      if (saucer.x < -50 || saucer.x > W + 50) {
        saucer = null;
        return;
      }
      
      // Shooting
      saucer.lastShot += dt * 1000;
      const shootInterval = saucer.isSmall ? 800 : 1500;
      if (saucer.lastShot > shootInterval && ship) {
        saucer.lastShot = 0;
        
        let angle;
        if (saucer.isSmall) {
          // Aim at player with some inaccuracy
          angle = Math.atan2(ship.y - saucer.y, ship.x - saucer.x);
          angle += (Math.random() - 0.5) * 0.3;
        } else {
          // Random direction
          angle = Math.random() * Math.PI * 2;
        }
        
        saucerBullets.push({
          x: saucer.x,
          y: saucer.y,
          vx: Math.cos(angle) * 6,
          vy: Math.sin(angle) * 6,
          age: 0
        });
      }
    }
    
    function updateSaucerBullets() {
      for (let i = saucerBullets.length - 1; i >= 0; i--) {
        saucerBullets[i].x += saucerBullets[i].vx;
        saucerBullets[i].y += saucerBullets[i].vy;
        saucerBullets[i].age++;
        wrapPosition(saucerBullets[i]);
        if (saucerBullets[i].age > BULLET_MAX_AGE * 1.5) {
          saucerBullets.splice(i, 1);
        }
      }
    }
    
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt * 1000;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function wrapPosition(obj) {
      if (obj.x < 0) obj.x = W;
      if (obj.x > W) obj.x = 0;
      if (obj.y < 0) obj.y = H;
      if (obj.y > H) obj.y = 0;
    }
    
    function distance(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      return Math.sqrt(dx * dx + dy * dy);
    }
    
    // ==================== COLLISION ====================
    function checkCollisions() {
      // Bullets vs Asteroids
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const asteroid = asteroids[j];
          if (distance(bullet.x, bullet.y, asteroid.x, asteroid.y) < asteroid.radius) {
            bullets.splice(i, 1);
            score += ASTEROID_POINTS[asteroid.size];
            createExplosion(asteroid.x, asteroid.y, 10);
            const newAsteroids = splitAsteroid(asteroid);
            asteroids.splice(j, 1);
            asteroids.push(...newAsteroids);
            break;
          }
        }
      }
      
      // Bullets vs Saucer
      if (saucer) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          if (distance(bullets[i].x, bullets[i].y, saucer.x, saucer.y) < saucer.radius) {
            bullets.splice(i, 1);
            score += saucer.isSmall ? SAUCER_SMALL_POINTS : SAUCER_LARGE_POINTS;
            createExplosion(saucer.x, saucer.y, 15);
            saucer = null;
            break;
          }
        }
      }
      
      // Ship collisions (if not invincible)
      if (invincibleTimer <= 0 && ship) {
        // Ship vs Asteroids
        for (const asteroid of asteroids) {
          if (distance(ship.x, ship.y, asteroid.x, asteroid.y) < asteroid.radius + SHIP_SIZE * 0.6) {
            destroyShip();
            return;
          }
        }
        
        // Ship vs Saucer
        if (saucer && distance(ship.x, ship.y, saucer.x, saucer.y) < saucer.radius + SHIP_SIZE * 0.6) {
          destroyShip();
          return;
        }
        
        // Ship vs Saucer Bullets
        for (let i = saucerBullets.length - 1; i >= 0; i--) {
          if (distance(ship.x, ship.y, saucerBullets[i].x, saucerBullets[i].y) < SHIP_SIZE * 0.6) {
            saucerBullets.splice(i, 1);
            destroyShip();
            return;
          }
        }
      }
    }
    
    function destroyShip() {
      createExplosion(ship.x, ship.y, 20);
      lives--;
      state = STATE_PLAYER_DEAD;
      respawnTimer = 2500;
      ship = null;
      bullets = [];
      saucerBullets = [];
    }
    
    function createExplosion(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 500 + Math.random() * 500
        });
      }
    }
    
    // ==================== RENDER ====================
    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      if (state === STATE_TITLE) {
        drawTitleScreen();
        return;
      }
      
      // Draw particles
      ctx.strokeStyle = COLORS.ship;
      ctx.lineWidth = 2;
      for (const p of particles) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
        ctx.stroke();
      }
      
      // Draw asteroids
      ctx.strokeStyle = COLORS.asteroid;
      ctx.lineWidth = 2;
      for (const asteroid of asteroids) {
        drawAsteroid(asteroid);
      }
      
      // Draw saucer
      if (saucer) {
        drawSaucer(saucer);
      }
      
      // Draw bullets
      ctx.fillStyle = COLORS.bullet;
      for (const bullet of bullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Draw saucer bullets
      ctx.fillStyle = '#FF6666';
      for (const bullet of saucerBullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Draw ship
      if (ship && (state === STATE_PLAYING || state === STATE_PAUSED)) {
        if (invincibleTimer <= 0 || Math.floor(invincibleTimer / 100) % 2 === 0) {
          drawShip();
        }
      }
      
      // Draw HUD
      drawHUD();
      
      // Draw overlays
      if (state === STATE_PAUSED) {
        drawPauseScreen();
      } else if (state === STATE_GAMEOVER) {
        drawGameOverScreen();
      }
    }
    
    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      
      ctx.strokeStyle = COLORS.ship;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(SHIP_SIZE, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.6);
      ctx.lineTo(-SHIP_SIZE * 0.4, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.6);
      ctx.closePath();
      ctx.stroke();
      
      // Thrust flame
      if (ship.thrusting && Math.random() > 0.3) {
        ctx.strokeStyle = COLORS.thrust;
        ctx.beginPath();
        const flameLen = 8 + Math.random() * 8;
        ctx.moveTo(-SHIP_SIZE * 0.5, -SHIP_SIZE * 0.3);
        ctx.lineTo(-SHIP_SIZE * 0.5 - flameLen, 0);
        ctx.lineTo(-SHIP_SIZE * 0.5, SHIP_SIZE * 0.3);
        ctx.stroke();
      }
      
      ctx.restore();
    }
    
    function drawAsteroid(asteroid) {
      ctx.save();
      ctx.translate(asteroid.x, asteroid.y);
      ctx.rotate(asteroid.rotation);
      
      ctx.beginPath();
      asteroid.vertices.forEach((v, i) => {
        if (i === 0) ctx.moveTo(v.x, v.y);
        else ctx.lineTo(v.x, v.y);
      });
      ctx.closePath();
      ctx.stroke();
      
      ctx.restore();
    }
    
    function drawSaucer(saucer) {
      ctx.strokeStyle = COLORS.saucer;
      ctx.lineWidth = 2;
      
      const w = saucer.width;
      const h = w * 0.4;
      
      ctx.beginPath();
      // Top dome
      ctx.ellipse(saucer.x, saucer.y - h * 0.2, w * 0.25, h * 0.35, 0, Math.PI, 0);
      // Bottom body
      ctx.ellipse(saucer.x, saucer.y + h * 0.1, w * 0.5, h * 0.35, 0, 0, Math.PI);
      ctx.stroke();
    }
    
    function drawHUD() {
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(score.toString(), 20, 35);
      
      // High score
      ctx.textAlign = 'center';
      ctx.font = '18px Arial';
      ctx.fillText('HI ' + highScore, W / 2, 35);
      
      // Lives
      ctx.textAlign = 'right';
      ctx.save();
      for (let i = 0; i < lives; i++) {
        ctx.translate(W - 30 - i * 25, 28);
        ctx.rotate(-Math.PI / 2);
        ctx.strokeStyle = COLORS.ship;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-7, -6);
        ctx.lineTo(-4, 0);
        ctx.lineTo(-7, 6);
        ctx.closePath();
        ctx.stroke();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }
      ctx.restore();
    }
    
    function drawTitleScreen() {
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 56px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('ASTEROIDS', W / 2, 150);
      
      ctx.font = '20px Arial';
      ctx.fillText('Press SPACE to start', W / 2, 280);
      
      ctx.font = '16px Arial';
      ctx.fillStyle = '#888';
      ctx.fillText('← → or A D to rotate', W / 2, 360);
      ctx.fillText('↑ or W to thrust', W / 2, 390);
      ctx.fillText('SPACE to fire', W / 2, 420);
      ctx.fillText('P to pause', W / 2, 450);
      
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px Arial';
      ctx.fillText('HIGH SCORE: ' + highScore, W / 2, 540);
    }
    
    function drawPauseScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2 - 20);
      
      ctx.font = '20px Arial';
      ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
      ctx.fillText('Press R to restart', W / 2, H / 2 + 60);
    }
    
    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 56px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
      
      ctx.fillStyle = '#FFF';
      ctx.font = '28px Arial';
      ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
      
      if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 30);
      }
      
      ctx.fillStyle = '#FFF';
      ctx.font = '20px Arial';
      ctx.fillText('Press R to play again', W / 2, H / 2 + 90);
      ctx.fillText('Press ESC for title screen', W / 2, H / 2 + 120);
    }
    
    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      
      // Title screen
      if (state === STATE_TITLE && e.code === 'Space') {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Pause toggle
      if (state === STATE_PLAYING && (e.code === 'KeyP' || e.code === 'Escape')) {
        state = STATE_PAUSED;
        e.preventDefault();
        return;
      }
      
      if (state === STATE_PAUSED && e.code === 'KeyP') {
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Restart
      if (e.code === 'KeyR' && state !== STATE_TITLE) {
        initGame();
        state = STATE_PLAYING;
        e.preventDefault();
        return;
      }
      
      // Title from game over
      if (state === STATE_GAMEOVER && e.code === 'Escape') {
        state = STATE_TITLE;
        e.preventDefault();
        return;
      }
      
      // Fire (handle as one-shot)
      if (e.code === 'Space' && state === STATE_PLAYING) {
        keys.fire = true;
        e.preventDefault();
      }
      
      // Prevent default for game keys
      if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
        e.preventDefault();
      }
    });
    
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    
    // Key state helpers
    Object.defineProperty(keys, 'left', {
      get: function() { return this['ArrowLeft'] || this['KeyA']; }
    });
    
    Object.defineProperty(keys, 'right', {
      get: function() { return this['ArrowRight'] || this['KeyD']; }
    });
    
    Object.defineProperty(keys, 'thrust', {
      get: function() { return this['ArrowUp'] || this['KeyW']; }
    });
    
    // Reset on blur
    window.addEventListener('blur', () => {
      for (const key in keys) {
        keys[key] = false;
      }
    });
    
    // ==================== GAME LOOP ====================
    let lastTime = 0;
    
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // Start game
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
