<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-flash-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Arcade Classic</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background-color: #000; border: 2px solid #333; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800;
        const HEIGHT = 600;

        // Game State
        let state = 'TITLE'; // TITLE, PLAYING, PAUSED, GAMEOVER
        let score = 0;
        let lives = 3;
        let wave = 1;
        let highScore = parseInt(localStorage.getItem('asteroidsHighScore')) || 0;
        let keys = {};

        // Entities
        let ship = null;
        let asteroids = [];
        let bullets = [];
        let saucer = null;
        let saucerBullets = [];
        let particles = [];

        // Constants
        const SHIP_SIZE = 15;
        const ROTATION_SPEED = 0.08;
        const THRUST = 0.15;
        const FRICTION = 0.99;
        const BULLET_SPEED = 10;
        const MAX_BULLETS = 6;
        const INVULN_TIME = 180; // frames

        // Input
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                if (state === 'TITLE' || state === 'GAMEOVER') initGame();
                else if (state === 'PLAYING') fireBullet();
            }
            if (e.code === 'KeyP' || e.code === 'Escape') {
                if (state === 'PLAYING') state = 'PAUSED';
                else if (state === 'PAUSED') state = 'PLAYING';
            }
        });

        function wrap(obj, margin = 0) {
            if (obj.x < -margin) obj.x = WIDTH + margin;
            else if (obj.x > WIDTH + margin) obj.x = -margin;
            if (obj.y < -margin) obj.y = HEIGHT + margin;
            else if (obj.y > HEIGHT + margin) obj.y = -margin;
        }

        function createShip() {
            return {
                x: WIDTH / 2, y: HEIGHT / 2,
                vx: 0, vy: 0,
                angle: -Math.PI / 2,
                radius: 10,
                invuln: INVULN_TIME,
                thrusting: false
            };
        }

        function createAsteroid(x, y, radius, sizeType) {
            const vertices = [];
            const segments = 10 + Math.floor(Math.random() * 5);
            for (let i = 0; i < segments; i++) {
                const ang = (i / segments) * Math.PI * 2;
                const r = radius * (0.8 + Math.random() * 0.4);
                vertices.push({ x: Math.cos(ang) * r, y: Math.sin(ang) * r });
            }
            const angle = Math.random() * Math.PI * 2;
            const speed = sizeType === 'large' ? 1.5 : (sizeType === 'medium' ? 2.5 : 3.5);
            return {
                x, y, radius, sizeType, vertices,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                rot: (Math.random() - 0.5) * 0.05,
                angle: 0
            };
        }

        function initGame() {
            score = 0; lives = 3; wave = 0;
            asteroids = []; bullets = []; saucer = null; particles = [];
            ship = createShip();
            nextWave();
            state = 'PLAYING';
        }

        function nextWave() {
            wave++;
            const count = 3 + wave;
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * WIDTH;
                    y = Math.random() * HEIGHT;
                } while (Math.hypot(x - WIDTH / 2, y - HEIGHT / 2) < 150);
                asteroids.push(createAsteroid(x, y, 40, 'large'));
            }
        }

        function fireBullet() {
            if (bullets.length >= MAX_BULLETS || !ship || ship.invuln > INVULN_TIME - 10) return;
            bullets.push({
                x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
                y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
                vx: ship.vx + Math.cos(ship.angle) * BULLET_SPEED,
                vy: ship.vy + Math.sin(ship.angle) * BULLET_SPEED,
                life: 60
            });
        }

        function splitAsteroid(a) {
            const nextSize = a.sizeType === 'large' ? 'medium' : (a.sizeType === 'medium' ? 'small' : null);
            const nextRadius = a.sizeType === 'large' ? 22 : 10;
            if (nextSize) {
                for (let i = 0; i < 2; i++) {
                    asteroids.push(createAsteroid(a.x, a.y, nextRadius, nextSize));
                }
            }
            score += a.sizeType === 'large' ? 20 : (a.sizeType === 'medium' ? 50 : 100);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('asteroidsHighScore', highScore);
            }
            // Debris
            for (let i = 0; i < 6; i++) {
                const ang = Math.random() * Math.PI * 2;
                particles.push({ x: a.x, y: a.y, vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2, life: 30 });
            }
        }

        function update() {
            if (state !== 'PLAYING') return;

            // Ship
            if (ship) {
                if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= ROTATION_SPEED;
                if (keys['ArrowRight'] || keys['KeyD']) ship.angle += ROTATION_SPEED;
                ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
                if (ship.thrusting) {
                    ship.vx += Math.cos(ship.angle) * THRUST;
                    ship.vy += Math.sin(ship.angle) * THRUST;
                }
                ship.vx *= FRICTION; ship.vy *= FRICTION;
                ship.x += ship.vx; ship.y += ship.vy;
                wrap(ship);
                if (ship.invuln > 0) ship.invuln--;
            }

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                wrap(b);
                b.life--;
                if (b.life <= 0) { bullets.splice(i, 1); continue; }

                // Check asteroid hits
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const a = asteroids[j];
                    if (Math.hypot(b.x - a.x, b.y - a.y) < a.radius) {
                        splitAsteroid(a);
                        asteroids.splice(j, 1);
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            // Asteroids
            asteroids.forEach(a => {
                a.x += a.vx; a.y += a.vy;
                a.angle += a.rot;
                wrap(a, a.radius);

                // Check ship collision
                if (ship && ship.invuln <= 0) {
                    if (Math.hypot(ship.x - a.x, ship.y - a.y) < a.radius + ship.radius) {
                        lives--;
                        if (lives <= 0) state = 'GAMEOVER';
                        else ship = createShip();
                    }
                }
            });

            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (asteroids.length === 0) nextWave();
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;

            // Ship
            if (ship) {
                if (ship.invuln % 10 < 5) {
                    ctx.save();
                    ctx.translate(ship.x, ship.y);
                    ctx.rotate(ship.angle);
                    ctx.beginPath();
                    ctx.moveTo(SHIP_SIZE, 0);
                    ctx.lineTo(-SHIP_SIZE + 5, -SHIP_SIZE + 5);
                    ctx.lineTo(-SHIP_SIZE + 5, SHIP_SIZE - 5);
                    ctx.closePath(); ctx.stroke();
                    if (ship.thrusting) {
                        ctx.beginPath();
                        ctx.moveTo(-SHIP_SIZE + 5, -5); ctx.lineTo(-SHIP_SIZE - 5, 0); ctx.lineTo(-SHIP_SIZE + 5, 5);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            // Asteroids
            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y); ctx.rotate(a.angle);
                ctx.beginPath();
                a.vertices.forEach((v, i) => {
                    ctx[i === 0 ? 'moveTo' : 'lineTo'](v.x, v.y);
                });
                ctx.closePath(); ctx.stroke();
                ctx.restore();
            });

            // Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x - 1, b.y - 1, 2, 2));

            // Particles
            particles.forEach(p => ctx.fillRect(p.x, p.y, 1, 1));

            // UI
            ctx.fillStyle = '#fff'; ctx.font = '20px monospace'; ctx.textAlign = 'left';
            ctx.fillText(score, 20, 40);
            ctx.textAlign = 'center'; ctx.fillText(`HI: ${highScore}`, WIDTH / 2, 40);
            ctx.textAlign = 'right';
            for (let i = 0; i < lives; i++) {
                const lx = WIDTH - 20 - i * 25;
                ctx.beginPath(); ctx.moveTo(lx, 30); ctx.lineTo(lx - 7, 50); ctx.lineTo(lx + 7, 50); ctx.closePath(); ctx.stroke();
            }

            if (state === 'TITLE') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 60px monospace';
                ctx.fillText('ASTEROIDS', WIDTH / 2, 250);
                ctx.font = '20px monospace';
                ctx.fillText('PRESS SPACE TO START', WIDTH / 2, 350);
                ctx.fillText('ARROW KEYS to MOVE, SPACE to FIRE', WIDTH / 2, 400);
            } else if (state === 'PAUSED') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 40px monospace';
                ctx.fillText('PAUSED', WIDTH / 2, 300);
            } else if (state === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = '#f00'; ctx.textAlign = 'center'; ctx.font = 'bold 50px monospace';
                ctx.fillText('GAME OVER', WIDTH / 2, 280);
                ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
                ctx.fillText(`FINAL SCORE: ${score}`, WIDTH / 2, 340);
                ctx.fillText('PRESS SPACE TO RESTART', WIDTH / 2, 400);
            }
        }

        function loop(t) {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
