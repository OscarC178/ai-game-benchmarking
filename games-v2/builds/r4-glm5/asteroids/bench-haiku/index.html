<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-haiku-4.5
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      background: #000;
      display: block;
      border: 2px solid #0F0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="asteroidsCanvas" width="800" height="600"></canvas>
  <script>
    'use strict';

    const canvas = document.getElementById('asteroidsCanvas');
    const ctx = canvas.getContext('2d');

    const WIDTH = 800;
    const HEIGHT = 600;
    const STATES = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAME_OVER: 3, PLAYER_DEAD: 4 };

    // Game state
    let gameState = STATES.TITLE;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('asteroidsHighScore') || '0', 10);
    let lives = 3;
    let wave = 1;
    let lastSaucerTime = Date.now();

    // Ship
    const ship = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      vx: 0,
      vy: 0,
      angle: 0,
      radius: 12,
      rotationSpeed: 0.1,
      thrustPower: 0.3,
      maxSpeed: 8,
      thrusting: false,
      invincible: 0
    };

    // Bullets
    let bullets = [];

    // Asteroids
    let asteroids = [];

    // Saucer
    let saucer = null;

    // Input
    const keys = {};

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (key === ' ') {
        e.preventDefault();
        if (gameState === STATES.TITLE) {
          initGame();
        } else if (gameState === STATES.PLAYING) {
          fireBullet();
        }
      }

      if (key === 'p' || key === 'escape') {
        if (gameState === STATES.PLAYING) {
          gameState = STATES.PAUSED;
        } else if (gameState === STATES.PAUSED) {
          gameState = STATES.PLAYING;
        }
      }

      if (key === 'r') {
        if (gameState !== STATES.TITLE) {
          initGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function initGame() {
      score = 0;
      lives = 3;
      wave = 1;
      bullets = [];
      asteroids = [];
      saucer = null;
      ship.x = WIDTH / 2;
      ship.y = HEIGHT / 2;
      ship.vx = 0;
      ship.vy = 0;
      ship.angle = 0;
      ship.invincible = 180;
      spawnWave();
      gameState = STATES.PLAYING;
    }

    function spawnWave() {
      asteroids = [];
      const count = Math.min(4 + Math.floor((wave - 1) / 2), 6);
      for (let i = 0; i < count; i++) {
        let x, y;
        do {
          x = Math.random() * WIDTH;
          y = Math.random() * HEIGHT;
        } while (Math.hypot(x - ship.x, y - ship.y) < 100);

        asteroids.push(createAsteroid(x, y, 45));
      }
    }

    function createAsteroid(x, y, radius) {
      const vertices = [];
      const numVertices = 8 + Math.floor(Math.random() * 4);
      for (let i = 0; i < numVertices; i++) {
        const angle = (i / numVertices) * Math.PI * 2;
        const r = radius * (0.7 + Math.random() * 0.6);
        vertices.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r
        });
      }

      let size = 'large';
      let points = 20;
      if (radius < 30) {
        size = 'medium';
        points = 50;
      }
      if (radius < 18) {
        size = 'small';
        points = 100;
      }

      return {
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        radius: radius,
        size: size,
        points: points,
        vertices: vertices,
        rotation: 0,
        rotationSpeed: (Math.random() - 0.5) * 0.05
      };
    }

    function fireBullet() {
      if (bullets.length >= 4 || gameState !== STATES.PLAYING) return;

      bullets.push({
        x: ship.x + Math.cos(ship.angle) * 18,
        y: ship.y + Math.sin(ship.angle) * 18,
        vx: ship.vx + Math.cos(ship.angle) * 10,
        vy: ship.vy + Math.sin(ship.angle) * 10,
        age: 0,
        radius: 2
      });
    }

    function wrapPosition(obj) {
      if (obj.x < -obj.radius) obj.x = WIDTH + obj.radius;
      if (obj.x > WIDTH + obj.radius) obj.x = -obj.radius;
      if (obj.y < -obj.radius) obj.y = HEIGHT + obj.radius;
      if (obj.y > HEIGHT + obj.radius) obj.y = -obj.radius;
    }

    function checkSaucerSpawn() {
      if (saucer) return;
      const now = Date.now();
      if (now - lastSaucerTime > 15000 + Math.random() * 15000) {
        lastSaucerTime = now;
        const fromLeft = Math.random() < 0.5;
        const isSmall = Math.random() < 0.3;
        saucer = {
          x: fromLeft ? -30 : WIDTH + 30,
          y: 50 + Math.random() * (HEIGHT - 100),
          vx: fromLeft ? 2 : -2,
          vy: (Math.random() - 0.5) * 1.5,
          width: isSmall ? 20 : 40,
          height: 15,
          isSmall: isSmall,
          points: isSmall ? 1000 : 200,
          lastShot: 0,
          radius: isSmall ? 10 : 20
        };
      }
    }

    function splitAsteroid(asteroid) {
      if (asteroid.size === 'large') {
        for (let i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
          asteroids.push(createAsteroid(
            asteroid.x + (Math.random() - 0.5) * 30,
            asteroid.y + (Math.random() - 0.5) * 30,
            25
          ));
        }
      } else if (asteroid.size === 'medium') {
        for (let i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
          asteroids.push(createAsteroid(
            asteroid.x + (Math.random() - 0.5) * 20,
            asteroid.y + (Math.random() - 0.5) * 20,
            15
          ));
        }
      }
    }

    function update() {
      if (gameState !== STATES.PLAYING) return;

      ship.invincible--;

      // Ship controls
      if (keys['arrowleft'] || keys['a']) {
        ship.angle -= ship.rotationSpeed;
      }
      if (keys['arrowright'] || keys['d']) {
        ship.angle += ship.rotationSpeed;
      }

      ship.thrusting = keys['arrowup'] || keys['w'];
      if (ship.thrusting) {
        ship.vx += Math.cos(ship.angle) * ship.thrustPower;
        ship.vy += Math.sin(ship.angle) * ship.thrustPower;

        const speed = Math.hypot(ship.vx, ship.vy);
        if (speed > ship.maxSpeed) {
          ship.vx = (ship.vx / speed) * ship.maxSpeed;
          ship.vy = (ship.vy / speed) * ship.maxSpeed;
        }
      }

      ship.x += ship.vx;
      ship.y += ship.vy;
      wrapPosition(ship);

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.x += bullet.vx;
        bullet.y += bullet.vy;
        bullet.age++;
        wrapPosition(bullet);

        if (bullet.age > 60) {
          bullets.splice(i, 1);
        }
      }

      // Update asteroids
      for (let asteroid of asteroids) {
        asteroid.x += asteroid.vx;
        asteroid.y += asteroid.vy;
        asteroid.rotation += asteroid.rotationSpeed;
        wrapPosition(asteroid);
      }

      // Bullet-asteroid collision
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j = asteroids.length - 1; j >= 0; j--) {
          const asteroid = asteroids[j];
          const dist = Math.hypot(bullet.x - asteroid.x, bullet.y - asteroid.y);
          if (dist < bullet.radius + asteroid.radius) {
            score += asteroid.points;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('asteroidsHighScore', highScore);
            }
            splitAsteroid(asteroid);
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Saucer logic
      checkSaucerSpawn();
      if (saucer) {
        saucer.x += saucer.vx;
        saucer.y += saucer.vy;
        saucer.lastShot++;

        if (saucer.x < -50 || saucer.x > WIDTH + 50) {
          saucer = null;
        } else if (saucer.lastShot > 60) {
          saucer.lastShot = 0;
          if (saucer.isSmall) {
            // Aimed shot
            const dx = ship.x - saucer.x;
            const dy = ship.y - saucer.y;
            const angle = Math.atan2(dy, dx);
            const inaccuracy = (Math.random() - 0.5) * 0.3;
            bullets.push({
              x: saucer.x,
              y: saucer.y,
              vx: Math.cos(angle + inaccuracy) * 8,
              vy: Math.sin(angle + inaccuracy) * 8,
              age: 0,
              radius: 2
            });
          } else {
            // Random shot
            const angle = Math.random() * Math.PI * 2;
            bullets.push({
              x: saucer.x,
              y: saucer.y,
              vx: Math.cos(angle) * 6,
              vy: Math.sin(angle) * 6,
              age: 0,
              radius: 2
            });
          }
        }

        // Bullet-saucer collision
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          const dist = Math.hypot(bullet.x - saucer.x, bullet.y - saucer.y);
          if (dist < bullet.radius + saucer.radius) {
            score += saucer.points;
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('asteroidsHighScore', highScore);
            }
            saucer = null;
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Ship-asteroid collision
      if (ship.invincible <= 0) {
        for (let asteroid of asteroids) {
          const dist = Math.hypot(ship.x - asteroid.x, ship.y - asteroid.y);
          if (dist < ship.radius + asteroid.radius) {
            lives--;
            if (lives <= 0) {
              gameState = STATES.GAME_OVER;
            } else {
              gameState = STATES.PLAYER_DEAD;
              setTimeout(() => {
                ship.x = WIDTH / 2;
                ship.y = HEIGHT / 2;
                ship.vx = 0;
                ship.vy = 0;
                ship.invincible = 180;
                gameState = STATES.PLAYING;
              }, 1500);
            }
            return;
          }
        }

        // Ship-saucer collision
        if (saucer) {
          const dist = Math.hypot(ship.x - saucer.x, ship.y - saucer.y);
          if (dist < ship.radius + saucer.radius) {
            lives--;
            if (lives <= 0) {
              gameState = STATES.GAME_OVER;
            } else {
              gameState = STATES.PLAYER_DEAD;
              setTimeout(() => {
                ship.x = WIDTH / 2;
                ship.y = HEIGHT / 2;
                ship.vx = 0;
                ship.vy = 0;
                ship.invincible = 180;
                gameState = STATES.PLAYING;
              }, 1500);
            }
            return;
          }
        }
      }

      // Wave complete
      if (asteroids.length === 0 && !saucer) {
        wave++;
        spawnWave();
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Draw score and lives
      ctx.fillStyle = '#0F0';
      ctx.font = '20px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('Score: ' + score, 10, 25);
      ctx.textAlign = 'center';
      ctx.fillText('HI: ' + highScore, WIDTH / 2, 25);
      ctx.textAlign = 'right';
      ctx.fillText('Lives: ' + lives, WIDTH - 10, 25);

      // Draw asteroids
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      for (let asteroid of asteroids) {
        ctx.save();
        ctx.translate(asteroid.x, asteroid.y);
        ctx.rotate(asteroid.rotation);
        ctx.beginPath();
        for (let i = 0; i < asteroid.vertices.length; i++) {
          const v = asteroid.vertices[i];
          if (i === 0) ctx.moveTo(v.x, v.y);
          else ctx.lineTo(v.x, v.y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      // Draw bullets
      ctx.fillStyle = '#FFFFFF';
      for (let bullet of bullets) {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw saucer
      if (saucer) {
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(saucer.x, saucer.y, saucer.width / 2, saucer.height / 2, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(saucer.x, saucer.y - 5, saucer.width / 4, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Draw ship
      if (gameState === STATES.PLAYING || gameState === STATES.PLAYER_DEAD) {
        if (ship.invincible > 0 && Math.floor(ship.invincible / 10) % 2 === 0) {
          ctx.save();
          ctx.translate(ship.x, ship.y);
          ctx.rotate(ship.angle);
          ctx.strokeStyle = '#FFFFFF';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(15, 0);
          ctx.lineTo(-10, -10);
          ctx.lineTo(-5, 0);
          ctx.lineTo(-10, 10);
          ctx.closePath();
          ctx.stroke();

          if (ship.thrusting) {
            ctx.strokeStyle = '#FFA500';
            const flameLen = 8 + Math.random() * 8;
            ctx.beginPath();
            ctx.moveTo(-5, -6);
            ctx.lineTo(-5 - flameLen, 0);
            ctx.lineTo(-5, 6);
            ctx.stroke();
          }

          ctx.restore();
        }
      }

      // Game state overlays
      if (gameState === STATES.TITLE) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 48px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('ASTEROIDS', WIDTH / 2, 150);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press SPACE to start', WIDTH / 2, 300);
        ctx.font = '16px "Courier New"';
        ctx.fillText('← → to rotate, ↑ to thrust', WIDTH / 2, 350);
        ctx.fillText('SPACE to fire', WIDTH / 2, 375);
      } else if (gameState === STATES.PAUSED) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', WIDTH / 2, 300);

        ctx.font = '20px "Courier New"';
        ctx.fillText('Press P to resume', WIDTH / 2, 360);
      } else if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#0F0';
        ctx.font = 'bold 40px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', WIDTH / 2, 200);

        ctx.font = '24px "Courier New"';
        ctx.fillText('Score: ' + score, WIDTH / 2, 280);
        ctx.fillText('High: ' + highScore, WIDTH / 2, 330);

        ctx.font = '18px "Courier New"';
        ctx.fillText('Press R to play again', WIDTH / 2, 400);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
