<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-sonnet-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteroids</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=800,H=600;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize); resize();

// ---- Audio ----
let AC=null;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq,dur,type,gain,fe){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,AC.currentTime);
    if(fe) o.frequency.exponentialRampToValueAtTime(Math.max(1,fe),AC.currentTime+dur);
    g.gain.setValueAtTime(gain||0.1,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}

let beatTimer=0,beatPhase=0;
function updateBeat(dt,n){
  if(state!==ST.PLAYING) return;
  const interval=Math.max(0.1,0.8*(n/20));
  beatTimer-=dt;
  if(beatTimer<=0){ beatTimer=interval; beep(beatPhase%2?120:80,interval*0.4,'square',0.07); beatPhase++; }
}

// ---- State ----
const ST={TITLE:0,PLAYING:1,PAUSED:2,GAMEOVER:3};
let state=ST.TITLE;
let score,hiScore,lives,wave,totalTime;
hiScore=parseInt(localStorage.getItem('ast4_hi')||'0');

// ---- Objects ----
let ship,bullets=[],asteroids=[],saucer=null,saucerBullets=[];
let particles=[];
let deadTimer=0,invincible=0;
let saucerTimer=0,saucerInterval=20;
let waveTimer=0,waveComplete=false;

// ---- Input ----
const keys={},wasDown={};
window.addEventListener('keydown',e=>{
  const k=e.key;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) e.preventDefault();
  if(!keys[k]) wasDown[k]=true;
  keys[k]=true; initAC();
  if(k===' '||k==='Enter'){
    if(state===ST.TITLE){ startGame(); }
    else if(state===ST.PLAYING&&!deadTimer) fireBullet();
  }
  if(k==='p'||k==='P'){ if(state===ST.PLAYING)state=ST.PAUSED; else if(state===ST.PAUSED)state=ST.PLAYING; }
  if(k==='Escape'){ if(state===ST.PAUSED||state===ST.GAMEOVER)state=ST.TITLE; }
  if(k==='r'||k==='R'){ if(state===ST.PAUSED||state===ST.GAMEOVER||state===ST.PLAYING)startGame(); }
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });
window.addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; });
function consume(k){ const v=wasDown[k]; wasDown[k]=false; return v; }

// ---- Wraparound ----
function wrap(obj){
  const r=obj.radius||0;
  if(obj.x<-r) obj.x=W+r;
  if(obj.x>W+r) obj.x=-r;
  if(obj.y<-r) obj.y=H+r;
  if(obj.y>H+r) obj.y=-r;
}

function dist2(a,b){
  let dx=a.x-b.x, dy=a.y-b.y;
  // Check wrap distance
  if(Math.abs(dx)>W/2) dx=W-Math.abs(dx);
  if(Math.abs(dy)>H/2) dy=H-Math.abs(dy);
  return dx*dx+dy*dy;
}

// ---- Asteroid shape generation ----
function makeAsteroid(x,y,size){
  const radii={large:45,medium:22,small:11};
  const pts={large:20,medium:50,small:100};
  const r=radii[size];
  const n=8+Math.floor(Math.random()*5);
  const verts=[];
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const rv=r*(0.7+Math.random()*0.6);
    verts.push({x:Math.cos(a)*rv,y:Math.sin(a)*rv});
  }
  const spd=size==='large'?0.8+Math.random()*1.2:size==='medium'?1+Math.random()*1.5:1.5+Math.random()*2;
  const ang=Math.random()*Math.PI*2;
  return{x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.03,radius:r,size,pts:pts[size],verts};
}

function spawnAsteroids(count){
  const arr=[];
  for(let i=0;i<count;i++){
    let x,y;
    do{ x=Math.random()*W; y=Math.random()*H; }
    while(Math.sqrt((x-W/2)**2+(y-H/2)**2)<120);
    arr.push(makeAsteroid(x,y,'large'));
  }
  return arr;
}

// ---- Init ----
function startGame(){
  score=0; lives=3; wave=1;
  bullets=[]; saucerBullets=[]; particles=[]; saucer=null;
  deadTimer=0; invincible=3; waveComplete=false; waveTimer=0;
  saucerTimer=0; saucerInterval=20+Math.random()*10;
  beatPhase=0; beatTimer=0;
  ship=makeShip(); asteroids=spawnAsteroids(4);
  state=ST.PLAYING;
}

function makeShip(){ return{x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,radius:14}; }

// ---- Fire ----
function fireBullet(){
  if(bullets.length>=4||deadTimer>0) return;
  const spd=11;
  bullets.push({x:ship.x+Math.cos(ship.angle)*16,y:ship.y+Math.sin(ship.angle)*16,
    vx:ship.vx+Math.cos(ship.angle)*spd,vy:ship.vy+Math.sin(ship.angle)*spd,age:0,radius:3});
  beep(880,0.07,'square',0.1);
}

// ---- Explosion particles ----
function explode(x,y,n,speed){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.6+Math.random()*0.4,maxLife:1});
  }
}

// ---- Kill ship ----
function killShip(){
  if(deadTimer>0) return;
  explode(ship.x,ship.y,12,3);
  beep(200,0.4,'sawtooth',0.2,50);
  lives--;
  if(lives<=0){
    if(score>hiScore){hiScore=score;localStorage.setItem('ast4_hi',hiScore);}
    deadTimer=2; // show explosion then game over
  } else {
    deadTimer=2.5;
  }
}

// ---- Saucer ----
function spawnSaucer(){
  const fromLeft=Math.random()<0.5;
  const small=score>5000&&Math.random()<0.35;
  saucer={x:fromLeft?-25:W+25,y:50+Math.random()*(H-100),
    vx:fromLeft?2.5:-2.5,vy:(Math.random()-0.5)*1.5,
    radius:small?12:22,small,pts:small?1000:200,
    shootTimer:1.5+Math.random(),changeDirTimer:2+Math.random()*2};
}

// ---- Asteroid split ----
function splitAsteroid(ast){
  explode(ast.x,ast.y,6,1.5+ast.radius*0.05);
  beep(ast.size==='large'?120:ast.size==='medium'?200:350,0.15,'sawtooth',0.12);
  if(ast.size==='large'){
    const n=2+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++) asteroids.push(makeAsteroid(ast.x+(Math.random()-0.5)*20,ast.y+(Math.random()-0.5)*20,'medium'));
  } else if(ast.size==='medium'){
    const n=2+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++) asteroids.push(makeAsteroid(ast.x+(Math.random()-0.5)*15,ast.y+(Math.random()-0.5)*15,'small'));
  }
}

// ---- Update ----
let lastTime=performance.now();
function update(now){
  if(state!==ST.PLAYING){ lastTime=now; return; }
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now; totalTime=(totalTime||0)+dt;

  updateBeat(dt, asteroids.length + (saucer?5:0));

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }

  if(waveComplete){
    waveTimer-=dt;
    if(waveTimer<=0){
      wave++; waveComplete=false;
      const count=Math.min(4+Math.floor((wave-1)/2),8);
      asteroids=spawnAsteroids(count);
      if(ship&&deadTimer<=0){ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;invincible=3;}
    }
    return;
  }

  // Dead timer
  if(deadTimer>0){
    deadTimer-=dt;
    // Move asteroids still
    for(const a of asteroids){ a.x+=a.vx; a.y+=a.vy; a.rot+=a.rotSpd; wrap(a); }
    if(saucer){ saucer.x+=saucer.vx; saucer.y+=saucer.vy; }
    if(deadTimer<=0){
      if(lives<=0){ state=ST.GAMEOVER; return; }
      ship=makeShip(); invincible=3;
    }
    return;
  }

  if(invincible>0) invincible=Math.max(0,invincible-dt);

  // Ship controls
  const rotSpd=4*Math.PI/180;
  if(keys['ArrowLeft']||keys['a']||keys['A']) ship.angle-=rotSpd;
  if(keys['ArrowRight']||keys['d']||keys['D']) ship.angle+=rotSpd;

  ship.thrusting=keys['ArrowUp']||keys['w']||keys['W'];
  if(ship.thrusting){
    const thrust=0.12;
    ship.vx+=Math.cos(ship.angle)*thrust;
    ship.vy+=Math.sin(ship.angle)*thrust;
    const spd=Math.sqrt(ship.vx**2+ship.vy**2);
    if(spd>8){ const r=8/spd; ship.vx*=r; ship.vy*=r; }
  }
  // Friction
  ship.vx*=0.99; ship.vy*=0.99;
  ship.x+=ship.vx; ship.y+=ship.vy; wrap(ship);

  // Hyperspace
  if(consume('ArrowDown')||consume('s')||consume('S')){
    ship.x=50+Math.random()*(W-100); ship.y=50+Math.random()*(H-100);
    ship.vx=0; ship.vy=0; invincible=Math.max(invincible,1.5);
    beep(300,0.1,'sine',0.08);
  }

  // Fire (space handled edge-triggered in keydown; also check held for rapid fire prevention)
  // (handled in keydown)

  // Update bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.x+=b.vx; b.y+=b.vy; b.age+=dt; wrap(b);
    if(b.age>1.1){ bullets.splice(i,1); continue; }
    // vs asteroids
    let hit=false;
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(dist2(b,a)<a.radius**2){ score+=a.pts; if(score>hiScore){hiScore=score;localStorage.setItem('ast4_hi',hiScore);} splitAsteroid(a); asteroids.splice(j,1); bullets.splice(i,1); hit=true; break; }
    }
    if(hit) continue;
    // vs saucer
    if(saucer&&dist2(b,saucer)<saucer.radius**2){
      score+=saucer.pts; if(score>hiScore){hiScore=score;localStorage.setItem('ast4_hi',hiScore);}
      explode(saucer.x,saucer.y,10,2); beep(300,0.2,'sawtooth',0.15);
      saucer=null; bullets.splice(i,1); saucerTimer=0; saucerInterval=15+Math.random()*15;
    }
  }

  // Move asteroids
  for(const a of asteroids){ a.x+=a.vx; a.y+=a.vy; a.rot+=a.rotSpd; wrap(a); }

  // Ship vs asteroids
  if(invincible<=0){
    for(const a of asteroids){
      if(dist2(ship,a)<(ship.radius+a.radius-8)**2){ killShip(); break; }
    }
  }

  // Saucer logic
  saucerTimer+=dt;
  if(!saucer&&saucerTimer>=saucerInterval){ spawnSaucer(); saucerTimer=0; saucerInterval=15+Math.random()*15; }
  if(saucer){
    saucer.x+=saucer.vx; saucer.y+=saucer.vy;
    saucer.changeDirTimer-=dt;
    if(saucer.changeDirTimer<=0){ saucer.vy=(Math.random()-0.5)*3; saucer.changeDirTimer=1.5+Math.random()*2; }
    wrap(saucer);
    // Off screen left/right exit
    if((saucer.vx>0&&saucer.x>W+40)||(saucer.vx<0&&saucer.x<-40)){ saucer=null; }

    if(saucer){
      saucer.shootTimer-=dt;
      if(saucer.shootTimer<=0&&saucerBullets.length<4){
        saucer.shootTimer=1.5+Math.random();
        let ang;
        if(saucer.small){
          ang=Math.atan2(ship.y-saucer.y,ship.x-saucer.x)+(Math.random()-0.5)*0.3;
        } else {
          ang=Math.random()*Math.PI*2;
        }
        saucerBullets.push({x:saucer.x,y:saucer.y,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,age:0,radius:3});
        beep(220,0.06,'square',0.07);
      }
      // vs ship
      if(invincible<=0&&dist2(ship,saucer)<(ship.radius+saucer.radius)**2) killShip();
    }
  }

  // Saucer bullets
  for(let i=saucerBullets.length-1;i>=0;i--){
    const b=saucerBullets[i]; b.x+=b.vx; b.y+=b.vy; b.age+=dt; wrap(b);
    if(b.age>1.3){ saucerBullets.splice(i,1); continue; }
    if(invincible<=0&&dist2(b,ship)<(ship.radius)**2){ killShip(); saucerBullets.splice(i,1); continue; }
    // vs asteroids (saucer bullets also destroy asteroids? classic: no. skip.)
  }

  // Wave check
  if(asteroids.length===0&&!saucer&&!waveComplete&&deadTimer<=0){
    waveComplete=true; waveTimer=2;
    beep(660,0.1,'sine',0.15); setTimeout(()=>beep(880,0.1,'sine',0.15),150); setTimeout(()=>beep(1100,0.15,'sine',0.15),300);
  }
}

// ---- Render ----
function drawShip(){
  if(deadTimer>0) return;
  if(invincible>0&&Math.floor(invincible*8)%2===0) return;
  ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(16,0);
  ctx.lineTo(-10,-10);
  ctx.lineTo(-6,0);
  ctx.lineTo(-10,10);
  ctx.closePath();
  ctx.stroke();
  // Thrust flame
  if(ship.thrusting&&Math.random()>0.3){
    const fl=10+Math.random()*8;
    ctx.strokeStyle='#FF8800'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-7,-4); ctx.lineTo(-6-fl,0); ctx.lineTo(-7,4); ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroid(a){
  ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  a.verts.forEach((v,i)=>{ if(i===0) ctx.moveTo(v.x,v.y); else ctx.lineTo(v.x,v.y); });
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

function drawSaucer(s){
  ctx.save(); ctx.translate(s.x,s.y);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  const w=s.radius*2, h=s.radius;
  ctx.beginPath();
  ctx.moveTo(-w/2,0); ctx.lineTo(-w/4,-h/2); ctx.lineTo(w/4,-h/2); ctx.lineTo(w/2,0);
  ctx.lineTo(w/4,h/2); ctx.lineTo(-w/4,h/2); ctx.closePath(); ctx.stroke();
  // Dome
  ctx.beginPath(); ctx.arc(0,-h/2,w/4,Math.PI,0); ctx.stroke();
  ctx.restore();
}

function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(state===ST.TITLE){
    ctx.fillStyle='#fff'; ctx.font='bold 64px monospace'; ctx.textAlign='center';
    ctx.fillText('ASTEROIDS',W/2,180);
    ctx.font='20px monospace'; ctx.fillStyle='#ccc';
    ctx.fillText('Press SPACE to start',W/2,270);
    ctx.fillStyle='#888'; ctx.font='14px monospace';
    ['← → rotate  |  ↑ thrust  |  SPACE fire','↓ hyperspace  |  P pause  |  R restart'].forEach((t,i)=>ctx.fillText(t,W/2,330+i*25));
    ctx.fillStyle='#ffff00'; ctx.font='16px monospace';
    ctx.fillText('HI: '+hiScore,W/2,420);
    return;
  }

  // Particles
  for(const p of particles){
    const t=p.life/p.maxLife;
    ctx.globalAlpha=t; ctx.fillStyle='#fff';
    ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
  }
  ctx.globalAlpha=1;

  // Asteroids
  for(const a of asteroids) drawAsteroid(a);

  // Ship
  if(state===ST.PLAYING||state===ST.PAUSED) drawShip();

  // Bullets
  ctx.fillStyle='#ffff00';
  for(const b of bullets) ctx.fillRect(b.x-1.5,b.y-1.5,3,3);
  ctx.fillStyle='#ff8888';
  for(const b of saucerBullets) ctx.fillRect(b.x-1.5,b.y-1.5,3,3);

  // Saucer
  if(saucer) drawSaucer(saucer);

  // HUD
  ctx.fillStyle='#fff'; ctx.font='bold 20px monospace'; ctx.textAlign='left';
  ctx.fillText(score,10,28);
  ctx.textAlign='center';
  ctx.fillStyle='#888'; ctx.font='14px monospace';
  ctx.fillText('HI: '+hiScore,W/2,28);
  ctx.fillStyle='#fff'; ctx.font='14px monospace'; ctx.textAlign='right';
  ctx.fillText('WAVE '+wave,W-10,28);
  // Lives (mini ships)
  for(let i=0;i<lives;i++){
    const lx=W-20-i*22, ly=H-15;
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(-Math.PI/2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(9,0); ctx.lineTo(-6,-6); ctx.lineTo(-3,0); ctx.lineTo(-6,6); ctx.closePath(); ctx.stroke();
    ctx.restore();
  }

  if(state===ST.PAUSED){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 52px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-20);
    ctx.font='18px monospace'; ctx.fillStyle='#aaa';
    ctx.fillText('P to resume  |  R to restart',W/2,H/2+35);
  }

  if(waveComplete&&state===ST.PLAYING){
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('WAVE '+wave+' CLEAR',W/2,H/2);
  }

  if(state===ST.GAMEOVER){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 56px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-40);
    ctx.font='22px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+15);
    ctx.fillStyle='#aaa'; ctx.font='16px monospace';
    ctx.fillText('R to play again  |  ESC for title',W/2,H/2+65);
  }
}

// ---- Loop ----
function loop(now){
  requestAnimationFrame(loop);
  update(now);
  render();
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
