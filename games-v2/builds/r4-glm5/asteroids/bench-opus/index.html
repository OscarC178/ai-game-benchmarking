<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   anthropic/claude-opus-4.6
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteroids</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
(function(){
'use strict';
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=800,H=600,TAU=Math.PI*2;

let ac=null;
function ia(){if(ac)return;try{ac=new(AudioContext||webkitAudioContext)();}catch(e){}}
function tone(f,d,v,t){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.03;g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sndFire(){if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(800,ac.currentTime);o.frequency.linearRampToValueAtTime(200,ac.currentTime+0.06);g.gain.value=0.06;g.gain.linearRampToValueAtTime(0,ac.currentTime+0.06);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.06);}catch(e){}}
function sndExplode(sz){tone(50+sz*30,0.12+sz*0.04,0.08,'sawtooth');}
function sndThrust(){tone(55,0.04,0.03,'sawtooth');}
let beatTimer=0,beatIdx=0;
function sndBeat(){tone(beatIdx===0?100:106,0.05,0.04,'sine');beatIdx=1-beatIdx;}
function sndSaucer(){tone(500,0.08,0.03,'sine');setTimeout(()=>tone(400,0.08,0.03,'sine'),80);}

function wrap(o){
  if(o.x<-50)o.x+=W+100;if(o.x>W+50)o.x-=W-100;
  if(o.y<-50)o.y+=H+100;if(o.y>H+50)o.y-=H-100;
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function rng(a,b){return a+Math.random()*(b-a);}

function makeShape(r){
  const pts=[],n=8+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){
    const a=TAU*i/n,pr=r*(0.7+Math.random()*0.6);
    pts.push({x:Math.cos(a)*pr,y:Math.sin(a)*pr});
  }
  return pts;
}

const ST_TITLE=0,ST_PLAY=1,ST_PAUSE=2,ST_OVER=3,ST_RESPAWN=4,ST_WAVE=5;
let state=ST_TITLE,stateTimer=0;

let ship,bullets,asteroids,saucer,saucerBullets,particles;
let score,hiScore,lives,wave,saucerTimer,invulnTimer,thrustOn;

hiScore=0;
try{const v=localStorage.getItem('ast4_best');if(v)hiScore=parseInt(v)||0;}catch(e){}
function saveHi(){if(score>hiScore){hiScore=score;try{localStorage.setItem('ast4_best',String(hiScore));}catch(e){}}}

function spawnAsteroids(n){
  for(let i=0;i<n;i++){
    let ax,ay;
    do{ax=Math.random()*W;ay=Math.random()*H;}while(Math.hypot(ax-W/2,ay-H/2)<120);
    const a=Math.random()*TAU,sp=rng(30,70);
    asteroids.push({
      x:ax,y:ay,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      r:45,size:2,shape:makeShape(45),spin:rng(-1.5,1.5),angle:0
    });
  }
}

function splitAsteroid(a){
  if(a.size<=0)return;
  const ns=a.size-1,radii=[12,22,45],nr=radii[ns];
  const count=2+Math.floor(Math.random()*1.5);
  for(let i=0;i<count;i++){
    const ang=Math.random()*TAU,sp=rng(40+ns*15,90+ns*15);
    asteroids.push({
      x:a.x+rng(-5,5),y:a.y+rng(-5,5),
      vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      r:nr,size:ns,shape:makeShape(nr),spin:rng(-2,2),angle:0
    });
  }
}

function resetShip(){
  ship={x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,r:12,alive:true};
  invulnTimer=3;
}

function startGame(){
  score=0;lives=3;wave=1;
  bullets=[];asteroids=[];saucerBullets=[];particles=[];saucer=null;
  saucerTimer=20;beatTimer=0;thrustOn=false;
  resetShip();
  spawnAsteroids(4);
  state=ST_PLAY;
}

function nextWave(){
  wave++;
  spawnAsteroids(Math.min(4+Math.floor(wave/2),8));
  saucerTimer=15;
  state=ST_PLAY;
}

function killShip(){
  if(!ship.alive)return;
  ship.alive=false;sndExplode(2);
  for(let i=0;i<14;i++){
    const a=Math.random()*TAU,sp=rng(40,180);
    particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:rng(0.4,1),maxLife:1,angle:Math.random()*TAU,len:rng(5,15)});
  }
  lives--;
  if(lives<=0){state=ST_OVER;saveHi();return;}
  state=ST_RESPAWN;stateTimer=2.5;
}

function safeToSpawn(){
  for(const a of asteroids){if(dist(a,{x:W/2,y:H/2})<a.r+60)return false;}
  return true;
}

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;ia();e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});

let fireCd=0;

function update(dt){
  // Beat
  if(state===ST_PLAY||state===ST_RESPAWN){
    const total=asteroids.length;
    const maxAst=Math.max(1,(4+Math.floor(wave/2))*7);
    const beatInt=Math.max(0.12,0.7*(total/maxAst));
    beatTimer+=dt;
    if(beatTimer>=beatInt){beatTimer=0;sndBeat();}
  }

  if(state===ST_TITLE){if(keys['Enter']||keys['Space'])startGame();return;}
  if(state===ST_OVER){if(keys['Enter']||keys['KeyR']){state=ST_TITLE;}return;}
  if(state===ST_PAUSE){
    if(keys['KeyP']||keys['Escape']){state=ST_PLAY;keys['KeyP']=false;keys['Escape']=false;}
    if(keys['KeyR'])startGame();
    return;
  }
  if(state===ST_RESPAWN){
    stateTimer-=dt;updateAsteroids(dt);updateSaucer(dt);updateParticles(dt);
    if(stateTimer<=0){if(safeToSpawn()){resetShip();state=ST_PLAY;}else stateTimer=0.3;}
    return;
  }
  if(state===ST_WAVE){
    stateTimer-=dt;updateParticles(dt);
    if(stateTimer<=0)nextWave();
    return;
  }

  // Pause
  if(keys['KeyP']||keys['Escape']){state=ST_PAUSE;keys['KeyP']=false;keys['Escape']=false;return;}
  if(keys['KeyR']){startGame();return;}

  if(invulnTimer>0)invulnTimer-=dt;
  fireCd-=dt;

  // Ship
  if(ship.alive){
    const rotSpd=4.5;
    if(keys['ArrowLeft']||keys['KeyA'])ship.angle-=rotSpd*dt;
    if(keys['ArrowRight']||keys['KeyD'])ship.angle+=rotSpd*dt;
    thrustOn=keys['ArrowUp']||keys['KeyW'];
    if(thrustOn){
      ship.vx+=Math.cos(ship.angle)*280*dt;
      ship.vy+=Math.sin(ship.angle)*280*dt;
      if(Math.random()<0.3)sndThrust();
    }
    const spd=Math.hypot(ship.vx,ship.vy);
    if(spd>380){ship.vx*=380/spd;ship.vy*=380/spd;}
    ship.vx*=Math.pow(0.99,dt*60);
    ship.vy*=Math.pow(0.99,dt*60);
    ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;
    wrap(ship);

    // Fire
    if((keys['Space'])&&fireCd<=0&&bullets.length<4){
      fireCd=0.15;
      bullets.push({
        x:ship.x+Math.cos(ship.angle)*14,
        y:ship.y+Math.sin(ship.angle)*14,
        vx:Math.cos(ship.angle)*600+ship.vx*0.15,
        vy:Math.sin(ship.angle)*600+ship.vy*0.15,
        life:1.1
      });
      sndFire();
    }

    // Hyperspace
    if(keys['ArrowDown']||keys['KeyS']){
      keys['ArrowDown']=false;keys['KeyS']=false;
      if(Math.random()<1/6){killShip();return;}
      ship.x=Math.random()*W;ship.y=Math.random()*H;
      ship.vx=0;ship.vy=0;invulnTimer=0.5;
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    wrap(b);
    if(b.life<=0){bullets.splice(i,1);continue;}
    let hit=false;
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(dist(b,a)<a.r){
        hit=true;bullets.splice(i,1);
        const pts=[100,50,20];score+=pts[a.size];saveHi();
        sndExplode(a.size);
        for(let k=0;k<4;k++){const pa=Math.random()*TAU,ps=rng(20,80);
          particles.push({x:a.x,y:a.y,vx:Math.cos(pa)*ps,vy:Math.sin(pa)*ps,life:rng(0.2,0.5),maxLife:0.5,angle:0,len:0});}
        splitAsteroid(a);asteroids.splice(j,1);break;
      }
    }
    if(hit)continue;
    if(saucer&&dist(b,saucer)<saucer.r){
      bullets.splice(i,1);score+=saucer.small?1000:200;saveHi();sndExplode(1);
      for(let k=0;k<6;k++){const pa=Math.random()*TAU,ps=rng(30,100);
        particles.push({x:saucer.x,y:saucer.y,vx:Math.cos(pa)*ps,vy:Math.sin(pa)*ps,life:0.4,maxLife:0.4,angle:0,len:0});}
      saucer=null;
    }
  }

  updateAsteroids(dt);
  updateSaucer(dt);
  updateParticles(dt);

  // Collisions with ship
  if(ship.alive&&invulnTimer<=0){
    for(const a of asteroids){
      if(dist(ship,a)<a.r+ship.r){killShip();return;}
    }
    if(saucer&&dist(ship,saucer)<saucer.r+ship.r){killShip();return;}
    for(let i=saucerBullets.length-1;i>=0;i--){
      if(dist(ship,saucerBullets[i])<ship.r+3){saucerBullets.splice(i,1);killShip();return;}
    }
  }

  // Extra life
  const prevLives=Math.floor((score-1)/10000);
  if(Math.floor(score/10000)>prevLives&&score>0){/* Could award life */}

  // Wave clear
  if(asteroids.length===0&&!saucer){state=ST_WAVE;stateTimer=2;}
}

function updateAsteroids(dt){
  for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.angle+=a.spin*dt;wrap(a);}
}

function updateSaucer(dt){
  if(!saucer){
    saucerTimer-=dt;
    if(saucerTimer<=0&&asteroids.length>0){
      const small=score>5000&&Math.random()<0.35;
      const dir=Math.random()<0.5?1:-1;
      saucer={x:dir>0?-30:W+30,y:rng(60,H-60),vx:dir*rng(90,140),vy:0,
        r:small?12:22,small,fireCd:rng(1,2),alive:true};
      saucerTimer=rng(18,30);
    }
    return;
  }
  saucer.x+=saucer.vx*dt;
  saucer.vy+=rng(-200,200)*dt;saucer.vy=Math.max(-60,Math.min(60,saucer.vy));
  saucer.y+=saucer.vy*dt;saucer.y=Math.max(20,Math.min(H-20,saucer.y));
  if(saucer.x<-50||saucer.x>W+50){saucer=null;return;}
  saucer.fireCd-=dt;
  if(saucer.fireCd<=0&&ship.alive){
    saucer.fireCd=saucer.small?rng(0.8,1.5):rng(1.2,2.5);
    let a;
    if(saucer.small){a=Math.atan2(ship.y-saucer.y,ship.x-saucer.x)+rng(-0.15,0.15);}
    else{a=Math.random()*TAU;}
    const sp=rng(200,300);
    saucerBullets.push({x:saucer.x,y:saucer.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:2.5});
    sndSaucer();
  }
  for(let i=saucerBullets.length-1;i>=0;i--){
    const b=saucerBullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;wrap(b);
    if(b.life<=0)saucerBullets.splice(i,1);
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}

function render(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);
  cx.strokeStyle='#fff';cx.lineWidth=1.5;

  if(state===ST_TITLE){
    cx.fillStyle='#fff';cx.font='bold 52px monospace';cx.textAlign='center';
    cx.fillText('ASTEROIDS',W/2,200);
    cx.font='16px monospace';cx.fillStyle='#aaa';
    cx.fillText('← → Rotate   ↑ Thrust   Space Fire   ↓ Hyperspace',W/2,300);
    cx.fillText('P Pause   R Restart',W/2,330);
    cx.fillStyle='#fff';cx.font='22px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press SPACE / ENTER to Start',W/2,420);
    if(hiScore>0){cx.fillStyle='#666';cx.font='14px monospace';cx.fillText('Best: '+hiScore,W/2,480);}
    return;
  }

  // Asteroids
  for(const a of asteroids){
    cx.save();cx.translate(a.x,a.y);cx.rotate(a.angle);
    cx.beginPath();
    cx.moveTo(a.shape[0].x,a.shape[0].y);
    for(let i=1;i<a.shape.length;i++)cx.lineTo(a.shape[i].x,a.shape[i].y);
    cx.closePath();cx.stroke();
    cx.restore();
  }

  // Saucer
  if(saucer){
    cx.save();cx.translate(saucer.x,saucer.y);
    const r=saucer.r;
    cx.beginPath();cx.ellipse(0,0,r,r*0.4,0,0,TAU);cx.stroke();
    cx.beginPath();cx.ellipse(0,-r*0.2,r*0.5,r*0.3,0,Math.PI,0);cx.stroke();
    cx.restore();
  }

  // Saucer bullets
  cx.fillStyle='#f66';
  for(const b of saucerBullets){cx.beginPath();cx.arc(b.x,b.y,2.5,0,TAU);cx.fill();}

  // Bullets
  cx.fillStyle='#fff';
  for(const b of bullets){cx.beginPath();cx.arc(b.x,b.y,2,0,TAU);cx.fill();}

  // Ship
  if(ship.alive&&(state===ST_PLAY||state===ST_WAVE)){
    const blink=invulnTimer>0&&Math.floor(invulnTimer*8)%2;
    if(!blink){
      cx.save();cx.translate(ship.x,ship.y);cx.rotate(ship.angle);
      cx.beginPath();
      cx.moveTo(14,0);cx.lineTo(-10,-8);cx.lineTo(-5,0);cx.lineTo(-10,8);cx.closePath();
      cx.stroke();
      if(thrustOn){
        cx.strokeStyle='#f80';
        cx.beginPath();
        cx.moveTo(-7,-4);cx.lineTo(-14-Math.random()*8,0);cx.lineTo(-7,4);
        cx.stroke();
        cx.strokeStyle='#fff';
      }
      cx.restore();
    }
  }

  // Particles
  for(const p of particles){
    const a=Math.max(0,p.life/(p.maxLife||0.5));
    cx.globalAlpha=a;
    if(p.len>0){
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.angle);
      cx.beginPath();cx.moveTo(-p.len/2,0);cx.lineTo(p.len/2,0);cx.stroke();
      cx.restore();
    }else{
      cx.fillStyle='#fff';cx.beginPath();cx.arc(p.x,p.y,2,0,TAU);cx.fill();
    }
    cx.globalAlpha=1;
  }

  // HUD
  cx.fillStyle='#fff';cx.font='22px monospace';cx.textAlign='left';
  cx.fillText(String(score),15,30);
  cx.textAlign='right';cx.fillText('HI: '+hiScore,W-15,30);
  cx.textAlign='center';cx.fillText('WAVE '+wave,W/2,30);

  // Lives
  for(let i=0;i<lives;i++){
    const lx=20+i*24,ly=H-20;
    cx.save();cx.translate(lx,ly);cx.rotate(-Math.PI/2);
    cx.beginPath();cx.moveTo(9,0);cx.lineTo(-6,-5);cx.lineTo(-3,0);cx.lineTo(-6,5);cx.closePath();cx.stroke();
    cx.restore();
  }

  // Overlays
  if(state===ST_WAVE){
    cx.fillStyle='#fff';cx.font='bold 32px monospace';cx.textAlign='center';
    cx.fillText('WAVE '+(wave+1),W/2,H/2);
  }
  if(state===ST_PAUSE){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff';cx.font='bold 40px monospace';cx.textAlign='center';
    cx.fillText('PAUSED',W/2,H/2-10);
    cx.font='18px monospace';cx.fillText('P to resume   R to restart',W/2,H/2+25);
  }
  if(state===ST_OVER){
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#f44';cx.font='bold 44px monospace';cx.textAlign='center';
    cx.fillText('GAME OVER',W/2,H/2-40);
    cx.fillStyle='#fff';cx.font='24px monospace';
    cx.fillText('Score: '+score,W/2,H/2+5);
    if(score>=hiScore&&score>0){cx.fillStyle='#fd0';cx.font='16px monospace';cx.fillText('NEW HIGH SCORE!',W/2,H/2+35);}
    cx.fillStyle='#aaa';cx.font='18px monospace';
    if(Math.floor(Date.now()/600)%2)cx.fillText('Press ENTER / R to Continue',W/2,H/2+75);
  }
}

let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  let dt=(now-lastTime)/1000;lastTime=now;
  if(dt>0.05)dt=0.05;
  update(dt);render();
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
