<!--
  GAME:      Asteroids
  RUN:       r4-glm5
  BUILDER:   google/gemini-3-pro-preview
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids</title>
<style>
    body {
        margin: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: monospace;
        color: white;
    }
    canvas {
        background-color: #000;
        border: 1px solid #333;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// --- GAME STATE ---
const ST_TITLE = 0;
const ST_PLAYING = 1;
const ST_PAUSED = 2;
const ST_DEAD = 3;
const ST_OVER = 4;
const ST_WAVE_TRANSITION = 5;

let state = ST_TITLE;
let stateTimer = 0;

let score = 0;
let highScore = parseInt(localStorage.getItem('ast_highscore')) || 0;
let lives = 3;
let wave = 1;

let ship = null;
let asteroids = [];
let bullets = [];
let saucer = null;
let sBullets = [];
let particles = [];

let extraLifeMilestone = 10000;

const keys = { ArrowUp: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, d: false, Space: false };
let spacePressed = false;

// --- CONFIG ---
const SHIP_MAX_SPEED = 8;
const SHIP_THRUST = 0.15;
const SHIP_ROT_SPEED = 0.08;
const FRICTION = 0.99;

const AST_L = { r: 45, pts: 20 };
const AST_M = { r: 25, pts: 50 };
const AST_S = { r: 12, pts: 100 };

// --- HELPERS ---
function dist(x1, y1, x2, y2) {
    // Basic
    let dx = x2 - x1;
    let dy = y2 - y1;
    
    // Wrap distance check
    if (Math.abs(dx) > W/2) dx = W - Math.abs(dx);
    if (Math.abs(dy) > H/2) dy = H - Math.abs(dy);
    
    return Math.sqrt(dx*dx + dy*dy);
}

function randRange(min, max) { return Math.random() * (max - min) + min; }

function wrap(obj) {
    if (obj.x < -obj.r) obj.x += W + obj.r*2;
    else if (obj.x > W + obj.r) obj.x -= W + obj.r*2;
    if (obj.y < -obj.r) obj.y += H + obj.r*2;
    else if (obj.y > H + obj.r) obj.y -= H + obj.r*2;
}

// --- ENTITIES ---

function createShip() {
    ship = {
        x: W/2,
        y: H/2,
        vx: 0,
        vy: 0,
        angle: -Math.PI / 2, // point up
        r: 10, // Approx collision radius
        invuln: 3.0 // seconds
    };
}

function createAsteroid(x, y, type, velRange) {
    let pts = [];
    let verts = Math.floor(randRange(8, 13));
    for (let i = 0; i < verts; i++) {
        let a = (i / verts) * Math.PI * 2;
        let r = type.r * randRange(0.7, 1.3);
        pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
    }
    
    let a = randRange(0, Math.PI * 2);
    let v = randRange(velRange[0], velRange[1]);
    
    return {
        x: x, y: y,
        vx: Math.cos(a) * v,
        vy: Math.sin(a) * v,
        r: type.r,
        pts: pts,
        type: type
    };
}

function initAsteroidsForWave() {
    asteroids = [];
    let num = Math.min(4 + (wave - 1), 8); // Max 8 large
    for (let i = 0; i < num; i++) {
        let x, y;
        do {
            x = randRange(0, W);
            y = randRange(0, H);
        } while (ship && dist(x, y, ship.x, ship.y) < 150); // don't spawn on player
        
        asteroids.push(createAsteroid(x, y, AST_L, [0.5, 1.5]));
    }
}

function spawnSaucer() {
    let isSmall = Math.random() < 0.3;
    let r = isSmall ? 10 : 20;
    let fromLeft = Math.random() < 0.5;
    
    saucer = {
        x: fromLeft ? -20 : W + 20,
        y: randRange(100, H - 100),
        vx: fromLeft ? 2 : -2,
        vy: randRange(-1, 1),
        r: r,
        isSmall: isSmall,
        pts: isSmall ? 1000 : 200,
        fireTimer: randRange(1.0, 2.5)
    };
}

function explodeShip() {
    for (let i = 0; i < 5; i++) {
        let a = Math.random() * Math.PI * 2;
        let v = randRange(0.5, 2);
        particles.push({
            x: ship.x, y: ship.y,
            vx: ship.vx + Math.cos(a)*v,
            vy: ship.vy + Math.sin(a)*v,
            life: randRange(1, 2),
            l: randRange(10, 20), // Line length
            ang: a,
            rotSpd: randRange(-0.1, 0.1)
        });
    }
}

function explodeAsteroid(ast) {
    for (let i=0; i<8; i++) {
        let a = Math.random() * Math.PI*2;
        let v = randRange(1, 3);
        particles.push({
            x: ast.x, y: ast.y,
            vx: Math.cos(a)*v, vy: Math.sin(a)*v,
            life: randRange(0.5, 1.0),
            l: 2, ang: 0, rotSpd: 0
        });
    }
}

function startGame() {
    score = 0;
    lives = 3;
    wave = 1;
    extraLifeMilestone = 10000;
    createShip();
    initAsteroidsForWave();
    bullets = [];
    sBullets = [];
    saucer = null;
    particles = [];
    state = ST_PLAYING;
}

// --- INPUT ---
window.addEventListener('keydown', e => {
    let k = e.key;
    if (['ArrowUp', 'ArrowLeft', 'ArrowRight', ' '].includes(k)) e.preventDefault();
    
    if (k === 'ArrowLeft' || k.toLowerCase() === 'a') keys.ArrowLeft = true;
    if (k === 'ArrowRight' || k.toLowerCase() === 'd') keys.ArrowRight = true;
    if (k === 'ArrowUp' || k.toLowerCase() === 'w') keys.ArrowUp = true;
    if (k === ' ') {
        keys.Space = true;
        
        if (!spacePressed) {
            spacePressed = true;
            if (state === ST_TITLE) startGame();
            else if (state === ST_PLAYING && ship) {
                // FIRE
                if (bullets.length < 4) {
                    bullets.push({
                        x: ship.x + Math.cos(ship.angle) * 15,
                        y: ship.y + Math.sin(ship.angle) * 15,
                        vx: ship.vx + Math.cos(ship.angle) * 12,
                        vy: ship.vy + Math.sin(ship.angle) * 12,
                        life: 1.0, // 1 second
                        r: 2 // padding
                    });
                }
            }
        }
    }
    if (k.toLowerCase() === 'r') {
        if (state === ST_OVER || state === ST_PAUSED) startGame();
    }
    if (k.toLowerCase() === 'p' || k === 'Escape') {
        if (state === ST_PLAYING) state = ST_PAUSED;
        else if (state === ST_PAUSED) state = ST_PLAYING;
    }
    if (k.toLowerCase() === 's' || k === 'ArrowDown') {
        if (state === ST_PLAYING && ship && !keys.s) {
            // Hyperspace
            ship.x = randRange(0, W);
            ship.y = randRange(0, H);
            ship.vx = 0; ship.vy = 0;
            ship.invuln = 0; // Risky!
        }
        keys.s = true;
    }
});

window.addEventListener('keyup', e => {
    let k = e.key;
    if (k === 'ArrowLeft' || k.toLowerCase() === 'a') keys.ArrowLeft = false;
    if (k === 'ArrowRight' || k.toLowerCase() === 'd') keys.ArrowRight = false;
    if (k === 'ArrowUp' || k.toLowerCase() === 'w') keys.ArrowUp = false;
    if (k === ' ') { keys.Space = false; spacePressed = false; }
    if (k.toLowerCase() === 's' || k === 'ArrowDown') keys.s = false;
});

// --- LOGIC ---

function checkScore(pts) {
    score += pts;
    if (score >= extraLifeMilestone) {
        lives++;
        extraLifeMilestone += 10000;
    }
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('ast_highscore', highScore);
    }
}

// Global Saucer timer
let saucerTimer = randRange(15, 30);

function update(dt) {
    if (state === ST_TITLE || state === ST_PAUSED || state === ST_OVER) return;

    if (state === ST_DEAD || state === ST_WAVE_TRANSITION) {
        stateTimer -= dt;
        
        // Let particles live
        updateParticles(dt);
        // Let asteroids float
        updateAsteroids(dt);
        
        if (stateTimer <= 0) {
            if (state === ST_DEAD) {
                if (lives > 0) {
                    createShip();
                    state = ST_PLAYING;
                } else {
                    state = ST_OVER;
                }
            } else if (state === ST_WAVE_TRANSITION) {
                wave++;
                initAsteroidsForWave();
                bullets = []; sBullets = []; saucer = null; particles = [];
                // Ship stays where it is
                state = ST_PLAYING;
            }
        }
        return;
    }

    if (state !== ST_PLAYING) return;

    // --- SHIP ---
    if (ship) {
        if (keys.ArrowLeft) ship.angle -= SHIP_ROT_SPEED;
        if (keys.ArrowRight) ship.angle += SHIP_ROT_SPEED;
        
        if (keys.ArrowUp) {
            ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
            ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
        }
        
        ship.vx *= FRICTION;
        ship.vy *= FRICTION;
        
        let spd = Math.hypot(ship.vx, ship.vy);
        if (spd > SHIP_MAX_SPEED) {
            ship.vx = (ship.vx / spd) * SHIP_MAX_SPEED;
            ship.vy = (ship.vy / spd) * SHIP_MAX_SPEED;
        }
        
        ship.x += ship.vx;
        ship.y += ship.vy;
        wrap(ship);
        
        if (ship.invuln > 0) ship.invuln -= dt;
    }

    // --- PROJECTILES ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        wrap(b);
        b.life -= dt;
        if (b.life <= 0) bullets.splice(i, 1);
    }
    
    for (let i = sBullets.length - 1; i >= 0; i--) {
        let b = sBullets[i];
        b.x += b.vx; b.y += b.vy;
        wrap(b);
        b.life -= dt;
        if (b.life <= 0) sBullets.splice(i, 1);
    }

    // --- ASTEROIDS ---
    updateAsteroids(dt); // x,y update + wrap

    // --- SAUCER ---
    if (!saucer) {
        saucerTimer -= dt;
        if (saucerTimer <= 0) {
            spawnSaucer();
        }
    } else {
        saucer.x += saucer.vx;
        saucer.y += saucer.vy;
        
        if (Math.random() < 0.01) saucer.vy = randRange(-2, 2);
        
        // Saucer wrap
        if (saucer.y < -saucer.r) saucer.y += H + saucer.r*2;
        if (saucer.y > H + saucer.r) saucer.y -= H + saucer.r*2;
        
        // Leave screen
        if ((saucer.vx > 0 && saucer.x > W + 50) || (saucer.vx < 0 && saucer.x < -50)) {
            saucer = null;
            saucerTimer = randRange(15, 30);
        } else {
            // Saucer Fire
            saucer.fireTimer -= dt;
            if (saucer.fireTimer <= 0) {
                let ang = 0;
                if (saucer.isSmall && ship) {
                    // Aim at player
                    let dx = ship.x - saucer.x;
                    let dy = ship.y - saucer.y;
                    if (Math.abs(dx) > W/2) dx = dx > 0 ? dx - W : dx + W;
                    if (Math.abs(dy) > H/2) dy = dy > 0 ? dy - H : dy + H;
                    ang = Math.atan2(dy, dx) + randRange(-0.1, 0.1); // Slight inaccuracy
                } else {
                    ang = randRange(0, Math.PI*2);
                }
                
                sBullets.push({
                    x: saucer.x, y: saucer.y,
                    vx: saucer.vx + Math.cos(ang) * 8,
                    vy: saucer.vy + Math.sin(ang) * 8,
                    life: 1.5, r: 2
                });
                
                saucer.fireTimer = randRange(1.0, 2.5);
            }
        }
    }
    
    updateParticles(dt);

    // --- COLLISIONS ---
    
    // Player vs Ast / Saucer / sBullet
    if (ship && ship.invuln <= 0) {
        let hit = false;
        for (let a of asteroids) {
            if (dist(ship.x, ship.y, a.x, a.y) < ship.r + a.r) { hit = true; break; }
        }
        if (!hit && saucer && dist(ship.x, ship.y, saucer.x, saucer.y) < ship.r + saucer.r * 0.8) hit = true;
        if (!hit) {
            for (let sb of sBullets) {
                if (dist(ship.x, ship.y, sb.x, sb.y) < ship.r) { hit = true; break; }
            }
        }
        
        if (hit) {
            explodeShip();
            ship = null;
            state = ST_DEAD;
            stateTimer = 2.0;
        }
    }
    
    // Bullets vs Asteroids & Saucer
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        let hit = false;
        
        // vs saucer
        if (saucer && dist(b.x, b.y, saucer.x, saucer.y) < saucer.r) {
            explodeAsteroid(saucer); // Same effect
            checkScore(saucer.pts);
            saucer = null;
            saucerTimer = randRange(15, 30);
            hit = true;
        }
        
        // vs asteroid
        if (!hit) {
            for (let j = asteroids.length - 1; j >= 0; j--) {
                let a = asteroids[j];
                if (dist(b.x, b.y, a.x, a.y) < a.r) {
                    hit = true;
                    explodeAsteroid(a);
                    checkScore(a.type.pts);
                    
                    if (a.type === AST_L) {
                        asteroids.push(createAsteroid(a.x, a.y, AST_M, [1, 2.5]));
                        asteroids.push(createAsteroid(a.x, a.y, AST_M, [1, 2.5]));
                    } else if (a.type === AST_M) {
                        asteroids.push(createAsteroid(a.x, a.y, AST_S, [2, 4]));
                        asteroids.push(createAsteroid(a.x, a.y, AST_S, [2, 4]));
                    }
                    
                    asteroids.splice(j, 1);
                    break;
                }
            }
        }
        
        if (hit) bullets.splice(i, 1);
    }
    
    // Wave clear check
    if (asteroids.length === 0 && !saucer) {
        state = ST_WAVE_TRANSITION;
        stateTimer = 2.0;
    }
}

function updateAsteroids(dt) {
    for (let a of asteroids) {
        a.x += a.vx; a.y += a.vy; // per frame logic here roughly matches requested velocity, not proper dt scaling for brevity
        wrap(a);
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.ang += p.rotSpd;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// --- RENDERING ---

function drawPoly(x, y, pts, angle=0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

function drawText(txt, x, y, size, align='left') {
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${size}px monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    ctx.fillText(txt, x, y);
}

function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1.5;

    // UI
    drawText(`${score}`, 20, 20, 24);
    drawText(`HI: ${highScore}`, W/2, 20, 20, 'center');
    
    // Lives
    for (let i=0; i<lives-1; i++) {
        ctx.save();
        ctx.translate(30 + i*20, 70);
        ctx.beginPath();
        ctx.moveTo(0, -8); ctx.lineTo(6, 8); ctx.lineTo(-6, 8);
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    }

    if (state === ST_TITLE) {
        drawText("ASTEROIDS", W/2, H/3, 60, 'center');
        let bl = Math.floor(performance.now() / 500) % 2 === 0;
        if (bl) drawText("Press SPACE to start", W/2, H/2 + 20, 20, 'center');
        return;
    }

    // Asteroids
    for (let a of asteroids) {
        drawPoly(a.x, a.y, a.pts);
    }

    // Saucer
    if (saucer) {
        ctx.save();
        ctx.translate(saucer.x, saucer.y);
        ctx.scale(saucer.isSmall ? 0.6 : 1.0, saucer.isSmall ? 0.6 : 1.0);
        
        ctx.beginPath(); // Base
        ctx.moveTo(-20, 0); ctx.lineTo(-10, 5); ctx.lineTo(10, 5); ctx.lineTo(20, 0);
        ctx.lineTo(10, -5); ctx.lineTo(-10, -5); ctx.closePath();
        ctx.stroke();
        
        ctx.beginPath(); // Dome
        ctx.moveTo(-10, -5); ctx.lineTo(-5, -12); ctx.lineTo(5, -12); ctx.lineTo(10, -5);
        ctx.stroke();
        
        ctx.restore();
    }

    // Bullets
    ctx.fillStyle = '#FFF';
    for (let b of bullets) ctx.fillRect(b.x-1, b.y-1, 2, 2);
    for (let b of sBullets) ctx.fillRect(b.x-1, b.y-1, 2, 2);

    // Particles
    for (let p of particles) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${p.life})`;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.ang);
        ctx.beginPath(); ctx.moveTo(-p.l/2, 0); ctx.lineTo(p.l/2, 0); ctx.stroke();
        ctx.restore();
    }
    ctx.strokeStyle = '#FFF'; // reset

    // Ship
    if (ship && state !== ST_DEAD && state !== ST_OVER) {
        // Flicker if invuln
        let draw = true;
        if (ship.invuln > 0) {
            draw = Math.floor(performance.now() / 150) % 2 === 0;
        }
        
        if (draw) {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            
            // Triangle pointing Right (angle 0 is right in standard trig, but we start -PI/2)
            ctx.beginPath();
            ctx.moveTo(15, 0); // Nose
            ctx.lineTo(-10, -8); // TL
            ctx.lineTo(-6, 0); // Back indent
            ctx.lineTo(-10, 8); // BL
            ctx.closePath();
            ctx.stroke();
            
            // Flame
            if (keys.ArrowUp && Math.random() < 0.7) {
                let fl = 10 + Math.random()*15;
                ctx.strokeStyle = '#FFA500'; // Orange
                ctx.beginPath();
                ctx.moveTo(-8, -4);
                ctx.lineTo(-8 - fl, 0); // pointing backwards
                ctx.lineTo(-8, 4);
                ctx.stroke();
                ctx.strokeStyle = '#FFF'; // reset
            }
            
            ctx.restore();
        }
    }

    // Overlays
    if (state === ST_PAUSED) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0,0,W,H);
        drawText("PAUSED", W/2, H/2, 40, 'center');
    } else if (state === ST_OVER) {
        drawText("GAME OVER", W/2, H/2 - 20, 50, 'center');
        let bl = Math.floor(performance.now() / 500) % 2 === 0;
        if (bl) drawText("Press R to play again", W/2, H/2 + 40, 20, 'center');
    } else if (state === ST_WAVE_TRANSITION) {
        drawText(`WAVE ${wave} COMPLETE`, W/2, H/2, 30, 'center');
    }
}

// --- LOOP ---
let _lastTime = 0;
function loop(timestamp) {
    if (!_lastTime) _lastTime = timestamp;
    let dt = (timestamp - _lastTime) / 1000;
    _lastTime = timestamp;
    
    if (dt > 0.1) dt = 0.1; // clamp lag spikes
    
    update(dt);
    render();
    
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
